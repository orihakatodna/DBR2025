া প্রতি স্বাক্ষরিত।</strong></h5>\n<h5 class=\"h-lv5\">(২) কর্তৃপক্ষ উপ-বিধি (১) এ উল্লিখিত ব্যক্তি ব্যতীত অন্য কোনো ব্যক্তি কর্তৃক প্রস্তুতকৃত নকশা বা প্রতিবেদন অনুমোদনের জন্য বিবেচনা করিবে না।</h5>\n<h5 class=\"h-lv5\">(৩) নকশা প্রণয়নকারী কারিগরি ব্যক্তিকে প্রকল্প সাইটের সঠিক অবস্থান, সংলগ্ন রাস্তাসমূহের প্রশস্ততা, জমির পরিমাণ ও পরিমাপ এবং, প্রযোজ্য ক্ষেত্রে, পরিকল্পনা প্রতিবেদনে উল্লিখিত নির্দেশনাসমূহ নিশ্চিত হইয়া এই বিধিমালার বিধান সাপেক্ষে নকশা প্রণয়ন করিতে হইবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第３８条（技術者の権限及び責任等）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>表２（続き）</strong></h5>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>業務の種類</th><th>登録技術者の職種</th><th>建築物の分類に基づく最低必要経験年数（年）</th><th></th><th></th><th></th></tr></thead>\n<tbody>\n<tr><td></td><td></td><td></td><td>第 I 種</td><td>第 II 種</td><td>第 III 種</td><td>第 IV 種</td></tr>\n<tr><td><strong>６</strong></td><td><strong>給排水設備設計</strong></td><td>給排水技術者</td><td>不要</td><td>不要</td><td>４</td><td>８</td></tr>\n<tr><td></td><td></td><td>建築士 (Architect)</td><td>不要</td><td>不要</td><td>不要</td><td>―</td></tr>\n<tr><td></td><td></td><td>ディプロマ技術者 (土木)</td><td>不要</td><td>３</td><td>不要</td><td>不要</td></tr>\n<tr><td><strong>７</strong></td><td><strong>機械設備設計 (HVAC/垂直動線)</strong></td><td>機械技術者</td><td>不要</td><td>２</td><td>４</td><td>８</td></tr>\n<tr><td><strong>８</strong></td><td><strong>電気設備設計</strong></td><td>電気技術者</td><td>不要</td><td>２</td><td>４</td><td>８</td></tr>\n<tr><td></td><td></td><td>ディプロマ技術者 (電気)</td><td>不要</td><td>３</td><td>不要</td><td>不要</td></tr>\n<tr><td><strong>９</strong></td><td><strong>工事監理 (Supervision)</strong></td><td>建築士、技術者又は PEng</td><td>不要</td><td>２</td><td>４</td><td>８</td></tr>\n<tr><td></td><td></td><td>ディプロマ建築士/技術者</td><td>不要</td><td>２</td><td>４</td><td><strong>２０</strong>*</td></tr>\n<tr><td><strong>10</strong></td><td><strong>建築物除却 (解体)</strong></td><td>土木・構造技術者</td><td>不要</td><td>不要</td><td>２</td><td>８</td></tr>\n<tr><td></td><td></td><td>ディプロマ技術者 (土木)</td><td>不要</td><td>２</td><td>不要</td><td>不要</td></tr>\n<tr><td><strong>11</strong></td><td><strong>工事完了報告書</strong></td><td>建築士及び技術者</td><td>不要</td><td>２</td><td>４</td><td>８</td></tr>\n</tbody>\n</table></div>\n<h5 class=\"h-lv5\"><strong>* 第 IV 種建築物については、適切な登録又はライセンスを保持する建築士若しくは技術者による連署（প্রতি স্বাক্ষরিত / Counter-signature）を要する。</strong></h5>\n<h5 class=\"h-lv5\">２　所管行政庁は、第１項に規定する者以外の者が作成した設計図書又は報告書を、承認のための審査対象としない。</h5>\n<h5 class=\"h-lv5\">３　設計を担当する技術者は、敷地の正確な位置、接道幅員、敷地面積及び寸法、並びに（該当する場合）計画報告書に記載された指示事項を確認した上で、本規則の規定に従って設計を行わなければならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>設備設計の専門的分離（項番６・７・８）</strong>:</p>\n<p>ダッカ規則では、給排水（প্লাম্বিং）、機械（যান্ত্রিক）、電気（বৈদ্যুতিক）の各設備設計について、それぞれの専門工学学位を持つ技術者の署名を階級（第II種以上）に応じて求めている。日本の建築基準法では、一定規模以上の建築物において「設備設計一級建築士」の関与（法第３条第１項等）が義務付けられているが、ダッカ規則はより早期の段階から、各専門分野の技術者に独立した署名権限と責任を認めている点が特徴である。</p>\n<p>2. <strong>ディプロマ保持者の実務制限と連署（項番９）</strong>:</p>\n<p>工事監理において、ディプロマ建築士・技術者が第IV種（大規模・高層）を担当する場合、「２０年」という極めて長い実務経験と、正規ライセンス保持者の「連署（প্রতি স্বাক্ষরিত）」を要求している。これは日本の二級建築士・木造建築士が設計・監理できる範囲に絶対的な制限（法第３条第２項等）があるのと同様の思想だが、経験年数によって上位区分への関与を（連署条件下で）認めるという、より連続的なキャリアパスを提示している。</p>\n<p>3. <strong>設計前の調査義務の法文化（第３項）</strong>:</p>\n<p>設計者に対し、接道幅員や敷地面積、計画報告書の指示事項の「確認義務（ নিশ্চিত হইয়া ）」を法文上で直接課している。日本では建築士法第１８条等に包括される内容だが、ダッカ規則では設計の前提となる「現況確認」が不十分なことによるトラブルを防ぐため、これを明文化している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における技術者の資格要件及び責務に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．「第 IV 種建築物」の給排水設備設計（Plumbing Design）において、建築士（Architect）は実務経験年数に関わらず単独で署名することができる。</p>\n<p>２．「第 IV 種建築物」の工事監理を行うディプロマ技術者は、２０年以上の実務経験を有し、かつ、適切なライセンスを保持する建築士又は技術者の連署（Counter-signature）が必要である。</p>\n<p>３．電気設備設計（Electrical Design）において、ディプロマ技術者（電気）は、実務経験が ５年 以上あれば「第 III 種建築物」の設計図書に署名することができる。</p>\n<p>４．設計図書の作成にあたり、技術者は敷地の位置や接道幅員について、申請者が提供したデータのみに基づけば足り、自ら確認する義務はない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。表２の項番６により、建築士（Architect）の第 IV 種の欄は「---（対象外）」となっている。</p>\n<p><strong>2. 正しい。</strong> 表２の項番９及び注釈（*）の規定通りである。</p>\n<p>3. 誤り。表２の項番８により、ディプロマ技術者（電気）の署名資格は「第 II 種（経験３年）」までに限定されている。</p>\n<p>4. 誤り。第３項により、設計者は自ら正確な位置、幅員、面積等を「確認（ নিশ্চিত হইয়া ）」しなければならない。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13450","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৩৮। কারিগরি ব্যক্তির কর্তৃত্ব ও দায়িত্ব, ইত্যাদি (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(৪) একটি ইমারতের বিভিন্ন স্তর, বিভিন্ন ধরনের নকশা বা প্রতিবেদন বা নির্মাণকার্যে নিয়োজিত দলগতভাবে বা কোনো প্রতিষ্ঠানের পক্ষে কর্মরত কারিগরি বিষয়ে অভিজ্ঞ একাধিক ব্যক্তি থাকিলে অন্যূন একজনের সংশ্লিষ্ট বিষয়ে কাজ করিবার যোগ্যতা থাকিতে হইবে এবং এক্ষেত্রে প্রত্যেকে স্ব স্ব নকশায় স্বাক্ষরের অধিকারী হইবেন।</h5>\n<h5 class=\"h-lv5\">(৫) সংশ্লিষ্ট কারিগরি ব্যক্তিগণকে তাহাদের যোগ্যতা অনুযায়ী কাজে নিয়োগ করিতে হইবে এবং একটি প্রকল্পে একাধিক কারিগরি ব্যক্তি নিযুক্ত করা হইলে স্থপতি বা প্রকৌশলী, প্রকল্পের স্থাপত্য নকশা, কাঠামো নকশাসহ অন্যান্য নকশা বাস্তবায়ন সমন্বয় সাধন করিবে এবং নির্মাণকালীন ও নির্মাণ শেষে সংশ্লিষ্ট স্থপতি, প্রকৌশলী ও নির্মাণ তদারককারী তাহাদের নিজ নিজ ক্ষেত্রের নির্মাণ নকশা ও সমাপ্তি প্রতিবেদন প্রণয়ন করিবেন।</h5>\n<h5 class=\"h-lv5\">(৬) এই বিধিমালার অন্যান্য বিধানে যাহা কিছুই থাকুক না কেন, কারিগরি ব্যক্তিদের যোগ্যতা নির্ধারণের ক্ষেত্রে কোড এবং সরকার কর্তৃক, সময় সময়, জারীকৃত সকল নির্দেশনা অনুসরণ করিতে হইবে।</h5>\n<h3 class=\"h-lv3\"><strong>পঞ্চম অধ্যায়</strong></h3>\n<p><strong>ইমারত নির্মাণ সংক্রান্ত আনুষঙ্গিক বিষয়</strong></p>\n<h4 class=\"h-lv4\"><strong>৩৯। রাস্তা।</strong></h4>\n<h5 class=\"h-lv5\">(১) কেবল বিশদ অঞ্চল পরিকল্পনায় চিহ্নিত ঘনবসতি এলাকায় বিদ্যমান রাস্তার প্রশস্ততা ন্যূনতম ১.৮০ (এক দশমিক আট শূন্য) মিটার হইলে আবাসিক ইমারতের নকশা অনুমোদনের জন্য আবেদন করা যাইবে, তবে রাস্তার প্রস্থ বিবেচনার জন্য প্লটের সম্মুখ হইতে, রেলপথ ব্যতীত, যানবাহন চলাচলের উপযুক্ত সড়কসমূহের সংযোগ পর্যন্ত ন্যূনতম প্রস্থ বিবেচ্য হইবে।</h5>\n<h5 class=\"h-lv5\">(২) পরিকল্পনা অনুমোদনপত্রে রাস্তা প্রশস্তকরনের জন্য, প্রযোজ্য ক্ষেত্রে, যে পরিমাণ জমি প্রয়োজন হইবে, রাস্তার উভয় দিকে অবস্থিত প্লট মালিকগণ সমপরিমাণে জমি নিম্নবর্ণিত পদ্ধতিতে ছাড়িয়া দিতে বাধ্য থাকিবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) মহাপরিকল্পনাভুক্ত এলাকার যে সকল প্রবেশ রাস্তা প্রশস্তকরণর প্রস্তাব মহাপরিকল্পনায় চিহ্নিত করা নাই, সেই সকল রাস্তা কর্তৃপক্ষ কর্তৃক পরিকল্পনা অনুমোদনপত্র প্রদানকালে পরিকল্পনা অনুমোদনকারী চলমান রাস্তার ক্ষেত্রে জনস্বার্থে ৬ (ছয়) মিটার পর্যন্ত বিধি ৪৭ এর উপ-বিধি (৭) অনুসরণক্রমে প্রশস্তকরণর প্রস্তাবনা প্রদান করিতে পারিবে;</h6>\n<h6 class=\"h-lv6\">(খ) দফা (ক) এ উল্লিখিত রাস্তা প্রশস্তকরণর ক্ষেত্রে কর্তৃপক্ষ উক্ত রাস্তার প্রস্তাবনা সংক্রান্ত তথ্য সর্বসাধারণের প্রদর্শনের জন্য উন্মুক্ত রাখিতে হইবে।</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第３８条（技術者の権限及び責任等）（承前）</strong></h4>\n<h5 class=\"h-lv5\">４　一の建築物の異なる段階、異なる種類の設計若しくは報告書又は建築工事に従事するチーム若しくは機関に、専門技術を有する複数の者が存在する場合、少なくともその中の一名は当該業務を行う資格を有していなければならない。この場合において、各技術者は自らが作成した設計図書に署名する権限を有する。</h5>\n<h5 class=\"h-lv5\">５　技術者はその資格に従って業務に任命されなければならない。一のプロジェクトに複数の技術者が任命された場合、建築士又は技術者は、意匠設計、構造設計その他の設計図書の実施の調整を図らなければならない。また、工事中及び完了後において、関連する建築士、技術者及び監理者は、それぞれの専門分野における設計図書及び工事完了報告書を作成しなければならない。</h5>\n<h5 class=\"h-lv5\">６　本規則の他の規定にかかわらず、技術者の資格要件の決定にあたっては、法典（Code）及び政府が随時発行するすべての指示に従わなければならない。</h5>\n<h3 class=\"h-lv3\"><strong>第５章　建築工事に関する付随事項</strong></h3>\n<h4 class=\"h-lv4\"><strong>第３９条（道路）</strong></h4>\n<h5 class=\"h-lv5\">１　詳細地区計画（DAP）において指定された高密居住区域内に限り、現存する道路の幅員が最小 １．８０メートル 以上である場合に、住宅の建築確認申請を行うことができる。ただし、道路幅員の判定にあたっては、当該敷地の前面から、鉄道を除き、車両通行が可能な道路との接続点までの最小幅員を考慮するものとする。</h5>\n<h5 class=\"h-lv5\">２　計画承認（Planning Permit）において道路の拡幅が必要とされる場合、道路の両側に位置する敷地所有者は、次に掲げる方法により、均等に土地を供出しなければならない。</h5>\n<h6 class=\"h-lv6\">一　マスタープラン区域内において、拡幅計画が指定されていない進入道路については、当局は計画承認の交付に際し、現存する道路について公共の利益のために最大 ６メートル まで、第４７条第７項の規定に従い拡幅を提案することができる。</h6>\n<h6 class=\"h-lv6\">二　前号に掲げる道路拡幅の提案を行う場合、当局は当該道路計画に関する情報を一般の公覧に供しなければならない。</h6>\n<hr class=\"sep\">\n<p>1. <strong>極低幅員道路での建築許可（第３９条第１項）</strong>:</p>\n<p>日本の建築基準法（法第４２条第１項）では、原則として幅員４メートル（特定行政庁が指定する区域では６メートル）以上のものを道路と定義し、敷地の接道義務（法第４３条）を課している。これに対しダッカ規則では、特定の高密居住区において<strong>「幅員１．８０メートル」</strong>という、日本における「２項道路（幅員４メートル未満）」の救済基準よりもさらに狭い道路での建築を法的に認めている。これは過密都市ダッカの現況に即した現実的な救済規定である。</p>\n<p>2. <strong>道路拡幅のための強制供出義務（第３９条第２項）</strong>:</p>\n<p>計画承認に際し、道路の両側の所有者が「均等（ সমপরিমাণে ）」に土地を供出（セットバック）する義務が明文で規定されている。日本の法第４２条第２項（セットバック）では、中心線から２メートル（又は３メートル）後退させる義務があるが、ダッカ規則では当局が<strong>「最大 ６メートル」</strong>までの拡幅を提案できる権限を有しており、その情報を一般公開するプロセスまで法制化されている。</p>\n<p>3. <strong>設計チーム内の「連帯と調整」の法制化（第３８条第５項）</strong>:</p>\n<p>複数の技術者が関与するプロジェクトにおいて、建築士や技術者が「設計の実施調整（ সমন্বয় সাধন ）」を行う責任を負うことを明記している。日本の建築基準法でも設計者・監理者の責任は明確だが、ダッカ規則はプロジェクトの「ライフサイクル（設計〜完了報告）」全体を通じた各専門家の役割分担と協調体制を、規則の本体で詳細に規定している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における「道路（Road）」に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．詳細地区計画（DAP）において指定された高密居住区域であっても、前面道路の幅員が ２．０メートル 未満である場合は、いかなる場合も住宅の建築確認を申請することができない。</p>\n<p>２．道路幅員の判定にあたっては、当該敷地の前面から、鉄道を含むあらゆる既存の交通施設との接続点までの最小幅員を考慮しなければならない。</p>\n<p>３．当局は公共の利益のため、マスタープラン区域内の進入道路について、計画承認時に最大 ６メートル までの拡幅を提案することができる。</p>\n<p>４．計画承認において道路の拡幅が必要となった場合、道路の片側の敷地所有者のみが、当該拡幅に必要な土地を全額負担しなければならない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第３９条第１項により、幅員が １．８０メートル 以上あれば申請が可能である。</p>\n<p>2. 誤り。第３９条第１項の規定により、鉄道（ রেলপথ ব্যতীত ）は除外される。</p>\n<p><strong>3. 正しい。</strong> 第３９条第２項（ক）の規定通りである。</p>\n<p>4. 誤り。第３９条第２項により、道路の両側の所有者が「均等（ সমপরিমাণে ）」に土地を供出しなければならない。</span></p>"},{"num":"13451","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৩৯। রাস্তা (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(৩) প্রযোজ্য সকল রাস্তা প্রশস্তকরণর জন্য জমির প্রযোজ্য অংশ হস্তান্তর করিবার পর হ্রাসকৃত প্লটের আকারের উপর ভিত্তি করিয়া প্লটের প্রয়োজনীয় সর্বমোট নির্মাণযোগ্য ক্ষেত্রফল, সেটব্যাক এবং সর্বোচ্চ ভূমি আচ্ছাদন হিসাব করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৪) পরিকল্পনা অনুমোদনপত্রের নির্দেশনা অনুযায়ী রাস্তা প্রশস্তকরণর জন্য আবেদনকারীকে প্রযোজ্য ভূমি সংশ্লিষ্ট স্থানীয় সরকার বা কর্তৃপক্ষের নিকট ইজমেন্ট দলিলের মাধ্যমে হস্তান্তর করিতে হইবে এবং হস্তান্তর প্রক্রিয়া সম্পন্ন হইবার পূর্বে ইমারত নির্মাণ অনুমোদনের আবেদন করা যাইবে না যাহা নির্মাণ অনুমোদনকালে নিশ্চিত করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৫) বেসরকারি প্রতিষ্ঠান কর্তৃক উন্নয়নকৃত হাউজিং বা অ্যাপার্টমেন্ট কমপ্লেক্স বা এলাকায় অভ্যন্তরীণ রাস্তাসমূহের ন্যূনতম প্রস্থ নির্ধারণের ক্ষেত্রে বেসরকারি আবাসিক প্রকল্পের ভূমি উন্নয়ন বিধিমালা, ২০০৪ প্রযোজ্য হইবে:</h5>\n<h6 class=\"h-lv6\"><strong>তবে শর্ত থাকে যে,</strong> উক্ত বিধিমালা জারির পূর্বে অনুমোদিত প্রকল্পের পরবর্তী কোনো সংশোধন অনুমোদন হইয়া না থাকিলে এই বিধান প্রযোজ্য হইবে না।</h6>\n<h4 class=\"h-lv4\"><strong>৪০। কিনারা সরলীকরণ।</strong></h4>\n<h5 class=\"h-lv5\">সকল কর্নার প্লটের ক্ষেত্রে ২ মিটার <span class=\"math\">\\times</span> ২ মিটার পরিসর বিশিষ্ট জমি রাস্তার জন্য ছাড়িয়া সীমানা দেয়াল নির্মাণ করিতে হইবে এবং উক্ত জায়গা রাস্তা ব্যতীত অন্য কোনো কাজে ব্যবহার করা যাইবে না।</h5>\n<h4 class=\"h-lv4\"><strong>৪১। সীমানা হইতে সেটব্যাক।</strong></h4>\n<h5 class=\"h-lv5\">(১) প্লট সংলগ্ন বিদ্যমান রাস্তার কেন্দ্র হইতে ৪.৫ (চার দশমিক পাঁচ) মিটার অথবা প্লটের সীমানা হইতে ১.৫ (এক দশমিক পাঁচ) মিটার দূরত্বের মধ্যে যাহা অধিক তাহার চাইতে কম দূরত্বে ইমারত নির্মাণ করা যাইবে না:</h5>\n<h6 class=\"h-lv6\"><strong>তবে শর্ত থাকে যে,</strong> প্রযোজ্য ক্ষেত্রে, পরিকল্পনা অনুমোদনপত্র বা বিশদ অঞ্চল পরিকল্পনার প্রস্তাবনা অনুযায়ী ভবিষ্যৎ রাস্তা প্রশস্তকরণর জন্য প্রয়োজনীয় জমি বাদ রাখিয়া উক্ত দূরত্ব হিসাব করিতে হইবে:</h6>\n<h6 class=\"h-lv6\"><strong>আরও শর্ত থাকে যে,</strong> বন্ধ রাস্তার ক্ষেত্রে বিবেচ্য প্লটের সম্মুখের দৈর্ঘ্যসহ বন্ধ রাস্তার শেষ পর্যন্ত দৈর্ঘ্য অনধিক ৫০ (পঞ্চাশ) মিটার হইলে সীমানা হইতে অন্যূন ১.৫ (এক দশমিক পাঁচ) মিটার সেটব্যাক বা উন্মুক্ত স্থান রাখিয়া ইমারত নির্মাণ করা যাইবে।</h6>\n<h5 class=\"h-lv5\">(২) প্রতিটি প্লটের সম্মুখ, পার্শ্ব এবং পশ্চাৎ পরিশিষ্ট-৫ অনুযায়ী নির্ধারণ করিতে হইবে এবং যেকোনো একটি দিক সম্মুখ বিবেচনার জন্য নির্ধারিত হইবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第３９条（道路）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>３</strong>　道路拡幅のために土地を供出した場合、建築物の延べ面積、容積率、セットバック及び最高建蔽率の計算は、当該供出後の<strong>減歩された敷地面積</strong>に基づいて算定するものとする。</h5>\n<h5 class=\"h-lv5\"><strong>４</strong>　計画承認（Planning Permit）の指示に基づき道路拡幅に供する土地については、申請者は地方政府又は当局に対し、イজমেন্ট（地役権等）契約を通じて提供しなければならない。当該提供手続が完了する前は、建築確認の申請を行うことができず、確認審査時にその完了を確認するものとする。</h5>\n<h5 class=\"h-lv5\"><strong>５</strong>　民間事業者により開発された住宅地又は共同住宅地内の内部道路の最小幅員については、「民間居住プロジェクト土地開発規則2004」の規定を適用する。</h5>\n<h6 class=\"h-lv6\"><strong>ただし、</strong> 本規則の施行前に承認されたプロジェクトにおいて、その後の計画修正がないものについては、この限りでない。</h6>\n<h4 class=\"h-lv4\"><strong>第４０条（角地の隅切り）</strong></h4>\n<h5 class=\"h-lv5\">全ての角地（Corner plot）においては、２メートル <span class=\"math\">\\times</span> ２メートルの範囲を道路のために開放し、その境界に沿って外構壁を設置しなければならない。当該範囲は、道路以外の目的に使用してはならない。</h5>\n<h4 class=\"h-lv4\"><strong>第４１条（境界線からの壁面後退）</strong></h4>\n<h5 class=\"h-lv5\"><strong>１</strong>　建築物は、隣接する既存道路の中心線から４.５メートル、又は敷地境界線から１.５メートルのうち、<strong>いずれか大きい方の距離</strong>を超えて道路側に突き出して建築してはならない。</h5>\n<h6 class=\"h-lv6\"><strong>ただし、</strong> 計画承認又は詳細地区計画（DAP）に基づき将来の道路拡幅が予定されている場合は、当該拡幅予定地を除外した上で、上記の距離を算定するものとする。</h6>\n<h6 class=\"h-lv6\"><strong>また、</strong> 袋路（Dead-end road）に面する敷地において、当該道路の長さが５０メートル以下である場合は、境界線から少なくとも１.５メートルの後退（外壁後退）距離を確保して建築することができる。</h6>\n<h5 class=\"h-lv5\"><strong>２</strong>　各敷地の正面、側面及び背面の空地（セットバック）については、別表第５の規定に従い算定するものとする。この場合において、いずれか一面を「正面」として指定しなければならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>容積率算定の基礎となる敷地面積（第３９条第３項）</strong>:</p>\n<p>ダッカ規則では、道路拡幅のために供出した土地（セットバック部分）を明確に「減歩された敷地面積」として扱い、残りの面積で容積率や建蔽率を計算する。 日本の建築基準法（法第４２条第２項）でも、道路とみなされるセットバック部分は敷地面積に算入できない（令第２条第１項第一号）ため、基本的な考え方は共通している。</p>\n<p>2. <strong>角地の隅切り規定（第４０条）</strong>:</p>\n<p>ダッカ規則は一律に「２ｍ <span class=\"math\">\\times</span> ２ｍ」の隅切りを要求している。 日本では、各都道府県の建築安全条例（例：東京都）により、底辺２ｍの二等辺三角形の隅切りを求める規定が一般的である。ダッカ規則は「２ｍ四方（2m x 2m area）」という表現をとっており、日本よりも広い回転半径を確保しようとする意図が見える。</p>\n<p>3. <strong>道路中心線からの後退距離（第４１条第１項）</strong>:</p>\n<p>ダッカ規則は、道路中心線から一律に<strong>４.５メートル</strong>の後退を求めている。 日本の法第４２条第２項（２項道路）では中心線から２メートル後退（幅員４メートル確保）が原則であり、ダッカ規則の方が「幅員９メートル」の確保を標準的な目標としている点、あるいは壁面後退をより厳格に求めている点で、道路環境への要求水準が高い。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における道路及びセットバックに関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．道路拡幅のために土地を供出した場合、建築物の最大延べ面積の算定にあたっては、拡幅前の元の敷地面積を用いることができる。</p>\n<p>２．角地（Corner plot）において義務付けられる道路のための開放範囲は、１.５メートル <span class=\"math\">\\times</span> １.５メートルである。</p>\n<p>３．建築物の配置にあたっては、原則として隣接する既存道路の中心線から４.５メートル以上、かつ敷地境界線から１.５メートル以上の後退距離を確保しなければならない。</p>\n<p>４．長さが６０メートルの袋路（Dead-end road）に面する敷地においては、敷地境界線からのセットバック距離を一律に１.０メートルまで緩和することができる。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第３９条第３項により、減歩された（hrahkrto）敷地面積に基づいて計算しなければならない。</p>\n<p>2. 誤り。第４０条により、２メートル <span class=\"math\">\\times</span> ２メートルである。</p>\n<p><strong>3. 正しい。</strong> 第４１条第１項の規定通りである。</p>\n<p>3. 誤り。第４１条第１項の緩和規定は、道路の長さが「５０メートル以下」の場合に限定されている。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13452","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৪১। সীমানা হইতে সেটব্যাক (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(৩) উপ-বিধি (১) অনুযায়ী সম্মুখ এবং নিম্নবর্ণিত সারণি-১ অনুযায়ী একই প্লটে অবস্থিত ভবনসমূহের মধ্যবর্তী ন্যূনতম দূরত্ব, ইমারতের পশ্চাৎ ও পার্শ্ব সেটব্যাক বা উন্মুক্ত স্থান রাখিতে হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\"><strong>সারণি-১</strong></h6>\n<h6 class=\"h-lv6\"><strong>ইমারতের ন্যূনতম সেটব্যাক</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নম্বর</th><th>ইমারতের তলা</th><th>একই প্লটে অবস্থিত ভবনসমূহের মধ্যবর্তী ন্যূনতম দূরত্ব (পাশাপাশি বা সামনা সামনি) (মিটার)</th><th>সীমানা রেখা হইতে পার্শ্ব সেটব্যাক (মিটার)</th><th>সীমানা রেখা হইতে পশ্চাৎ সেটব্যাক (মিটার)</th></tr></thead>\n<tbody>\n<tr><td>(১)</td><td>(২)</td><td>(৩)</td><td>(৪)</td><td>(৫)</td></tr>\n<tr><td>১।</td><td>৭ তলা পর্যন্ত</td><td>২.০০</td><td>১.০০</td><td>১.২৫</td></tr>\n<tr><td>২।</td><td>৮ তলা হইতে ১০ তলা পর্যন্ত</td><td>২.৫০</td><td>১.২৫</td><td>২.০০</td></tr>\n<tr><td>৩।</td><td>১১ তলা হইতে ১৫ তলা পর্যন্ত</td><td>৫.০০</td><td>৩.০০</td><td>৩.০০</td></tr>\n<tr><td>৪।</td><td>১৬ তলা হইতে ২০ তলা পর্যন্ত</td><td>৬.০০</td><td>৩.২৫</td><td>৩.২৫</td></tr>\n<tr><td>৫।</td><td>২১ তলা হইতে ৩০ তলা পর্যন্ত</td><td>৬.৫</td><td>৩.৫০</td><td>৩.৫০</td></tr>\n<tr><td>৬।</td><td>৩১ তলা হইতে ৪০ তলা পর্যন্ত</td><td>৭</td><td>৪.৫০</td><td>৪.৫০</td></tr>\n<tr><td>৭।</td><td>৪০ তলার ঊর্ধ্বে</td><td>১০.০০</td><td>৫.০০</td><td>৫.০০</td></tr>\n</tbody>\n</table></div>\n<h6 class=\"h-lv6\"><strong>দ্রষ্টব্য:</strong></h6>\n<h6 class=\"h-lv6\">১। মহাপরিকল্পনায় চিহ্নিত কোনো নির্দিষ্ট ভূমি ব্যবহারে প্রশস্ত রাস্তার সুবিধা নিয়ে অন্য অ-আবাসিক ব্যবহার করিলে মহাপরিকল্পনায় উল্লিখিত বিধান মোতাবেক অতিরিক্ত সেটব্যাক প্রযোজ্য হইবে। আবাসিক হোটেল (A-5), শিক্ষা প্রতিষ্ঠান (B), স্বাস্থ্য-সেবা (D), সমাবেশ (I), বাণিজ্যিক (F), ব্যবসা (E), শিল্প কারখানা (G2), গুদাম (H), বিপজ্জনক ব্যবহারের ভবন (J) ও বহুবিধ ব্যবহারের শ্রেণিভুক্ত ইমারতের সম্মুখে যানবাহনে আরোহণ ও অবতরণের জন্য ন্যূনতম ৬ (ছয়) মিটার প্রস্থ ও সম্মুখের প্লটের দৈর্ঘ্যের সমপরিমাণ জায়গা খালি রাখিতে হইবে, এই অংশের মধ্যে বিধি অনুযায়ী ভূমি আচ্ছাদন বিবেচনায় রাখিয়া প্রযোজ্য সম্মুখ সেটব্যাক পর্যন্ত ভূমির নিচে বেজমেন্ট, ভূমির উপরিতলে পোর্চ অথবা ভূমিতল (finished ground level) হইতে ন্যূনতম ৬ (ছয়) মিটার উচ্চতা পর্যন্ত ঊর্ধ্ব দিকে উন্মুক্ত রাখিয়া তাহার উপরের অংশে ইমারত নির্মাণ করা যাইবে।</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第４１条（境界線からの壁面後退）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>３</strong>　建築物の配置にあたっては、第１項に規定する正面の後退距離に加え、同一敷地内における建築物相互の最短外壁間距離、並びに敷地境界線からの側面及び背面の後退距離（空地）について、次の表１に定める数値を確保しなければならない。</h5>\n<h6 class=\"h-lv6\"><strong>表１：建築物の最小後退距離（セットバック）</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>建築物の階数</th><th>同一敷地内の建築物相互の最小間隔（ｍ）</th><th>側部敷地境界線からの後退距離（ｍ）</th><th>背後敷地境界線からの後退距離（ｍ）</th></tr></thead>\n<tbody>\n<tr><td>1</td><td>７階建まで</td><td>2.00</td><td>1.00</td><td>1.25</td></tr>\n<tr><td>2</td><td>８階〜１０階</td><td>2.50</td><td>1.25</td><td>2.00</td></tr>\n<tr><td>3</td><td>１１階〜１５階</td><td>5.00</td><td>3.00</td><td>3.00</td></tr>\n<tr><td>4</td><td>１６階〜２０階</td><td>6.00</td><td>3.25</td><td>3.25</td></tr>\n<tr><td>5</td><td>２１階〜３０階</td><td>6.50</td><td>3.50</td><td>3.50</td></tr>\n<tr><td>6</td><td>３１階〜４０階</td><td>7.00</td><td>4.50</td><td>4.50</td></tr>\n<tr><td>7</td><td>４０階超</td><td>10.00</td><td>5.00</td><td>5.00</td></tr>\n</tbody>\n</table></div>\n<h6 class=\"h-lv6\"><strong>備考：</strong></h6>\n<h6 class=\"h-lv6\">１　マスタープランにおいて指定された特定の土地において、幅員のある道路の利便性を利用して非住宅用途に供する場合、マスタープランの規定に基づく追加のセットバックを適用する。ホテル（A-5）、教育施設（B）、医療施設（D）、集会施設（I）、商業施設（F）、事務所（E）、工場（G2）、倉庫（H）、危険物施設（J）及び複合用途建築物の<strong>前面</strong>には、車両の乗降のため、<strong>最小幅員６メートル</strong>かつ敷地の間口全幅にわたる空地を確保しなければならない。当該範囲においては、建蔽率の制限を考慮した上で、所定の前面セットバックラインまでの地下部分に地階を設けること、又は地上部分にポーチを設けること、若しくは仕上げ地盤面（Finished ground level）から<strong>高さ６メートルまで</strong>を吹き抜け（ピロティ等）として上部に建築物を建築することができる。</h6>\n<hr class=\"sep\">\n<p>1. <strong>階数に応じた一律のセットバック規定（表１）</strong>:</p>\n<p>ダッカ規則では、建築物の階数が上がるにつれて、敷地境界線からの後退距離が段階的に増大する（最大５メートル）。日本の建築基準法では、用途地域ごとの外壁後退（法第５４条、最大１.５メートル）や隣地斜線制限（法第５６条）によって間接的に距離が決定されるが、ダッカ規則のように「階数」のみを指標として具体的な後退数値をメートル単位でマトリクス化している点は、極めて簡明かつ強力な形態規制である。</p>\n<p>2. <strong>同一敷地内における棟間隔の制限</strong>:</p>\n<p>日本の建築基準法では、同一敷地内の建築物相互の間隔について、直接的な距離規定は（防火上の延焼のおそれのある部分を除き）原則として存在しない。対してダッカ規則は、高層化に伴い最大１０メートルの棟間隔を求めており、過密化による採光・通風の悪化を物理的に抑制しようとしている。</p>\n<p>3. <strong>特定用途における前面空地の義務化（備考１）</strong>:</p>\n<p>ホテル、学校、店舗等の不特定多数が利用する建築物に対し、車両乗降用の「幅６メートル」の前面空地を義務付けている。これは日本の「附置義務駐車場」や「道路境界線からの後退（条例）」に近いが、ピロティ形式（高さ６メートルまで開放）を前提とした空間構成を法的に認めている点は、熱帯・亜熱帯地域における開放的な地上階の形成を促進する意図が見て取れる。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における建築物のセットバックに関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．階数が１２階建ての住宅建築物を建築する場合、側部敷地境界線からの後退距離は２.５メートル確保すれば足りる。</p>\n<p>２．同一敷地内に建築物を２棟建築する場合において、それらが２５階建てであるとき、建築物相互の最小間隔は６.５メートル以上としなければならない。</p>\n<p>３．商業施設（F）を建築する場合、車両の乗降を目的として、前面に最小幅員３メートルの空地を確保しなければならない。</p>\n<p>４．建築物の階数が４０階を超える場合であっても、背後敷地境界線からの後退距離の上限は４.５メートルとされている。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。表１の項番３により、１１階〜１５階の側部後退距離は３.０メートルである。</p>\n<p>2. <strong>正しい。</strong> 表１の項番５により、２１階〜３０階の棟間隔は６.５メートルである。</p>\n<p>3. 誤り。備考１により、商業施設等の前面空地は「最小幅員６メートル」である。</p>\n<p>4. 誤り。表１の項番７により、４０階超の背後後退距離は５.０メートルである。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13453","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৪১। সীমানা হইতে সেটব্যাক (চলমান)</strong></h4>\n<h6 class=\"h-lv6\">২। বিপজ্জনক ব্যবহারের ভবন (J) এর ক্ষেত্রে সকল দিকের সেটব্যাক ন্যূনতম ৯ (নয়) মিটার হইবে।</h6>\n<h6 class=\"h-lv6\">৩। ইমারতের কোনো তলে, ইউটিলিটি সার্ভিস ব্যতীত ইহার বহিঃদেওয়ালের বাহিরে আবশ্যিক অনাচ্ছাদিত স্থানের (আনুষঙ্গিক দূরত্ব ০.৫ মিটার) মধ্যে ঝুলন্ত প্ল্যান্টার, এসি ও টয়লেট ডাক্ট (duct) বা যেকোনো ধরণের অ-ব্যবহারিক ফ্লোর স্পেস নির্মাণ করা যাইবে।</h6>\n<h5 class=\"h-lv5\">(৪) শুধু সংশ্লিষ্ট প্লটেই শেষ হইয়াছে এবং এজমালি নহে এইরূপ রাস্তা সংবলিত জমিতে প্রস্তাবিত ইমারতের জন্য সম্মুখ সেটব্যাক ১.৫ (এক দশমিক পাঁচ) মিটার হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>৪২। বেজমেন্টের সেটব্যাক।</strong></h4>\n<h5 class=\"h-lv5\">(১) বেজমেন্ট আবশ্যিক অনাচ্ছাদিত স্থানের মধ্যে বর্ধিত করা যাইবে, তবে উক্ত বর্ধিতাংশ বিধি ৪৫ এ উল্লিখিত সারণি-৩ অনুযায়ী অনাচ্ছাদিত স্থানের যে পরিমাণ ভূমি অতিরিক্ত ভূমি আচ্ছাদনের আওতাভুক্ত হইবে তাহার মধ্যে সীমাবদ্ধ থাকিবে, অবশিষ্ট ভূমি বৃষ্টির পানি শোষনার্থে ভূমি সমতলে উন্মুক্ত রাখিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(২) বৃষ্টির পানি শোষনার্থে সারণি-৩ এ উল্লিখিত বাধ্যতামূলক অনাচ্ছাদিত স্থানে এ বেজমেন্ট নির্মাণ করা যাইবে না।</h5>\n<h4 class=\"h-lv4\"><strong>৪৩। তলা ও বেজমেন্ট।</strong></h4>\n<h5 class=\"h-lv5\">(১) ইমারতের বিভিন্ন তলাকে বেজমেন্ট, সেমি বেজমেন্ট, নিচতলা, দ্বিতীয় তলা, তৃতীয় তলা, ছাদ, ইত্যাদি নামকরণ করা যাইবে।</h5>\n<h5 class=\"h-lv5\">(২) বেজমেন্টের জন্য নিম্নবর্ণিত বিষয়াদি বিবেচনায় রাখিতে হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) বেজমেন্টকে প্রয়োজনে যান্ত্রিক পদ্ধতি ব্যবহার করিয়া প্রয়োজনীয় আলো ও বাতাসের ব্যবস্থা করিতে হইবে এবং সর্বদা শুষ্ক রাখিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(খ) বেজমেন্টে যাহাতে বৃষ্টির পানি প্রবেশ করিতে না পারে বা অন্য কোনো উপায়ে পানি জমিতে না পারে সেজন্য যথাযথ প্রতিরোধমূলক ব্যবস্থা রাখিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(গ) ব্যবহারকারীর সংখ্যা ও যাতায়াত দূরত্বের উপর নির্ভর করিয়া এই বিধিমালা ও কোড অনুযায়ী বেজমেন্টে প্রস্থান সংখ্যা নির্ধারণ করিতে হইবে:</h6>\n<h6 class=\"h-lv6\"><strong>তবে শর্ত থাকে যে,</strong> সকল বেজমেন্ট অন্যূন একটি সিঁড়ি দিয়া নিচতলা অথবা ভূমি সমতলের সহিত সরাসরি সংযুক্ত থাকিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(ঘ) বেজমেন্ট নির্মাণের জন্য খনন কাজ আরম্ভ করিবার পূর্বে যথাযথভাবে সকল নিরাপত্তামূলক ব্যবস্থা গ্রহণ ও সম্পন্ন করিতে হইবে, অন্যথায় কর্তৃপক্ষ নির্মাণ কাজ বন্ধ করিয়া দিতে পারিবে;</h6>\n<h6 class=\"h-lv6\">(ঙ) বেজমেন্ট নির্মাণ কাজ চলাকালে প্রতিবেশীর ইমারত ও জনগণের স্বার্থ সুবিধাদি রক্ষা করিবার জন্য পূর্ব হইতেই সতর্কতামূলক ব্যবস্থা গ্রহণ করিতে হইবে এবং ক্ষতিপূরণ মুচলেকা (Indemnity bond) প্রদান করিতে হইবে;</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第４１条（境界線からの壁面後退）（承前）</strong></h4>\n<h6 class=\"h-lv6\"><strong>二</strong>　危険物貯蔵・処理施設（用途分類 J）については、周囲の全方位にわたり最小９メートルの後退距離を確保しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>三</strong>　建築物の各階において、設備用スペースを除き、外壁の外側の義務的空地内（境界から０.５メートル以内）には、吊り下げ式のプランター、エアコン室外機、トイレ用ダクト、その他非居住目的のフロアスペースを設置することができる。</h6>\n<h5 class=\"h-lv5\"><strong>４</strong>　当該敷地内のみで終端し、かつ共有ではない私道に接する土地において、計画建築物の前面後退距離は１.５メートルとする。</h5>\n<h4 class=\"h-lv4\"><strong>第４２条（地階の後退距離）</strong></h4>\n<h5 class=\"h-lv5\"><strong>１</strong>　地階（ベージェント）は、義務的空地の範囲内に拡張することができる。ただし、当該拡張部分は第４５条表３に規定する空地面積のうち、許容建蔽率の超過分として認められる範囲内に限るものとし、残りの土地は雨水の浸透を目的として地表面で開放しなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>２</strong>　雨水の浸透を目的として表３に指定された「義務的非舗装空地」の直下には、地階を設けることができない。</h5>\n<h4 class=\"h-lv4\"><strong>第４３条（階及び地階）</strong></h4>\n<h5 class=\"h-lv5\"><strong>１</strong>　建築物の各階の名称は、地階（Basement）、半地階（Semi-basement）、１階（Ground floor）、２階、３階、屋上等と定義することができる。</h5>\n<h5 class=\"h-lv5\"><strong>２</strong>　地階の設置にあたっては、次に掲げる事項を遵守しなければならない。</h5>\n<h6 class=\"h-lv6\"><strong>一</strong>　必要に応じて機械換気・照明設備を設置し、適切な採光及び換気を確保するとともに、常に乾燥状態を維持すること。</h6>\n<h6 class=\"h-lv6\"><strong>二</strong>　雨水の流入又はその他の浸水を防止するため、適切な防水・防排水措置を講じること。</h6>\n<h6 class=\"h-lv6\"><strong>三</strong>　利用者数及び歩行距離に応じ、本規則及び法典（Code）に基づき避難出口数を決定すること。</h6>\n<h6 class=\"h-lv6\"><strong>ただし、</strong> 全ての地階は少なくとも一つの階段により、１階又は地盤面に直接接続していなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>四</strong>　地階の建設に伴う掘削工事の着手前に、適切な安全対策を完了しなければならない。対策が不十分な場合、当局は工事停止を命ずることができる。</h6>\n<h6 class=\"h-lv6\"><strong>五</strong>　工事期間中、隣接建築物及び公衆の利益を保護するため事前に対策を講じるとともに、損害賠償保証（Indemnity bond）を提出しなければならない。</h6>\n<hr class=\"sep\">\n<p>1. <strong>危険物施設の一律セットバック規定（第４１条第２項）</strong>:</p>\n<p>ダッカ規則では危険物施設に対し、用途分類に基づく一律「全方位９メートル」の強力なセットバックを求めている。 日本では消防法に基づく保有空地や、建築基準法第４８条（用途地域）及び第６章（危険物）により規制されるが、単一の数値でこれほど広大な距離を明記する点は、都市過密地域での爆発・火災リスクへの強い警戒の表れである。</p>\n<p>2. <strong>雨水浸透と地階設置の制限（第４２条）</strong>:</p>\n<p>ダッカ規則は、都市浸水対策として「雨水浸透用空地」を重視しており、その直下への地階設置を厳格に禁じている。 日本の建築基準法でも建蔽率の算定に地階（１メートル以下）の不算入規定（令第２条第１項第二号）はあるが、環境負荷低減（浸水対策）のために地階の容積的な広がりを「地上の透水性」と直接リンクさせて制限する規定は、気候変動下における最新の都市開発ルールといえる。</p>\n<p>3. <strong>掘削時の損害賠償保証義務（第４３条第２項五号）</strong>:</p>\n<p>掘削工事に際し、「損害賠償保証（Indemnity bond）」の提出を法的に義務付けている。 日本の民法や建設業法等における不法行為責任に近いが、建築確認のプロセスにおいて行政が直接、対隣地者への保証書提出を求める点は、隣接建物との境界トラブルが多発するダッカの実態を反映した強行規定である。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における建築物の空地及び地階（ベージェント）に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．危険物貯蔵・処理施設（J）を建築する場合、前面道路側のセットバックを９メートル確保すれば、側部及び背後の後退距離は１.５メートルまで緩和できる。</p>\n<p>２．地階（ベージェント）は、雨水の浸透を目的として指定された義務的非舗装空地の直下であっても、防水措置を講じれば設置することができる。</p>\n<p>３．地階の設置にあたっては、少なくとも一つの階段を、１階（Ground floor）又は地盤面に直接通ずるように設置しなければならない。</p>\n<p>４．地階の建設に伴う掘削工事を行う際、隣地所有者に対する損害賠償保証（Indemnity bond）の提出は、工事完了後に行えば足りる。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第４１条第２項により、「全方位（all sides）」で９メートルのセットバックが必須である。</p>\n<p>2. 誤り。第４２条第２項により、雨水浸透用の指定空地への設置は禁止されている。</p>\n<p><strong>3. 正しい。</strong> 第４３条第２項（ガ）の但書きの規定通りである。</p>\n<p>3. 誤り。第４３条第２項（ニャ）により、工事着手前（পূর্ব হইতেই）の対策及び保証の提示が求められる。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13454","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৪৩। তলা ও বেজমেন্ট (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(২) (চলমান)</h5>\n<h6 class=\"h-lv6\">(চ) সংযুক্ত প্লটের কোনো রূপ ক্ষতি সাধন না করিয়া বেজমেন্টের ছাদ সংযুক্ত রাস্তার সর্বোচ্চ তল হইতে অনধিক ১.৮৫ (এক দশমিক আট পাঁচ) মিটার উপরে নির্মাণ করা যাইবে; উক্ত ১.৮৫ (এক দশমিক আট পাঁচ) মিটার উচ্চতায় উঠিবার বা নামিবার জন্য প্রযোজ্য সিঁড়ি বা র‍্যাম্প সীমানা দেয়াল সংলগ্ন করিয়া ইমারতের সেটব্যাক অংশ নির্মাণ করা যাইবে, তবে অনুরূপ সিঁড়ি বা র‍্যাম্পের উপর সেটব্যাক অংশে স্থায়ী বা অস্থায়ী আচ্ছাদন তৈরি করা যাইবে না;</h6>\n<h6 class=\"h-lv6\">(ছ) বেজমেন্ট যান্ত্রিক উপায়ে যথাযথভাবে নিয়ন্ত্রিত বায়ু প্রবাহের ব্যবস্থায় সুষ্ঠু পরিবেশ নিশ্চিত হইলে এবং এই বিধিমালা ও কোডের সংশ্লিষ্ট বিধানসমূহ যথাযথভাবে অনুসরণ করিলে বেজমেন্টে আবাসিক, গ্যাস সিলিন্ডার বা দাহ্য পদার্থ, দাহ্য পদার্থের গুদাম জাতীয় ব্যবহার ব্যতীত কোডে উল্লিখিত ফায়ার জোন অনুসরণপূর্বক মিশ্র ব্যবহার করা যাইবে:</h6>\n<h6 class=\"h-lv6\"><strong>তবে শর্ত থাকে যে,</strong> ব্যবহার সনদ আবেদন দাখিলের সহিত ফায়ার সার্ভিস, বিদ্যুৎ ও প্রযোজ্য ক্ষেত্রে, সংশ্লিষ্ট কর্তৃপক্ষের অনুমোদনের প্রমাণক দাখিল করিতে হইবে।</h6>\n<h4 class=\"h-lv4\"><strong>৪৪। সেটব্যাকের ক্ষেত্রে ব্যতিক্রম।</strong></h4>\n<h5 class=\"h-lv5\">সাধারণভাবে প্লটের সীমানা হইতে স্থাপনার দূরত্ব বা সেটব্যাক, সারণি-১ এ উল্লিখিত নির্দেশনা অনুযায়ী নির্ণয় করিতে হইবে, তবে নিম্নবর্ণিত সারণি ২ এ উল্লিখিত প্রযোজ্য ব্যতিক্রমসমূহ ব্যতীত কোনো উপাদানই সেটব্যাকের সীমার ভিতরে অনুমোদনযোগ্য হইবে না, যথা:—</h5>\n<h6 class=\"h-lv6\"><strong>সারণি-২</strong></h6>\n<h6 class=\"h-lv6\"><strong>সেটব্যাকের স্থানে প্রযোজ্য ব্যতিক্রমসমূহ</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নং</th><th>উপাদান</th><th>পরিমাণ</th><th>শর্ত</th></tr></thead>\n<tbody>\n<tr><td>১।</td><td>ড্রাইভওয়ে ও পার্কিং</td><td>সম্মুখ অংশ পার্কিং</td><td>(১) কোনো রূপ বেষ্টনী দিয়া ঘেরা যাইবে না;</td></tr>\n<tr><td></td><td></td><td></td><td>(২) আবশ্যিক অনাচ্ছাদিত স্থানের সর্বমোট প্রযোজ্য অংশ (সারণি ৩) বৃষ্টির পানি শোষণের লক্ষ্যে উন্মুক্ত রাখিতে হইবে।</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第４３条（階及び地階）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>２</strong>（承前）</h5>\n<h6 class=\"h-lv6\"><strong>六</strong>　隣接する敷地に対して損害を与えないことを条件として、地階（ベージェント）の天井高は、接する道路の最高面から<strong>１.８５メートル以下</strong>としなければならない。当該１.８５メートルの高さに昇降するための階段又は র‍্যাম্প（スロープ）は、境界壁に接してセットバック（外壁後退）部分に設置することができる。ただし、当該階段又は র‍্যাম্পの上部のセットバック部分には、恒久的又は一時的な屋根（カバー）を設けてはならない。</h6>\n<h6 class=\"h-lv6\"><strong>七</strong>　本規則及び法典（BNBC）の規定に従い、機械換気設備により適切な環境が確保される場合にあっては、地階を居住目的、ガスシリンダー若しくは可燃物の貯蔵、又は可燃物倉庫として使用する場合を除き、法典に定める防火区画（Fire zone）に従った複合用途に供することができる。</h6>\n<h6 class=\"h-lv6\"><strong>ただし、</strong> 使用許可証（Occupancy Certificate）の申請に際し、消防局、電力当局、及び（該当する場合）関連当局の承認証明書を提出しなければならない。</h6>\n<h4 class=\"h-lv4\"><strong>第４４条（セットバックの例外）</strong></h4>\n<h5 class=\"h-lv5\">敷地境界線から建築物までの距離（セットバック）は、原則として表１の規定に従うものとする。ただし、次の表２に掲げる例外を除き、いかなる構造物もセットバックの範囲内に突出してはならない。</h5>\n<h6 class=\"h-lv6\"><strong>表２：セットバック範囲内における許容例外事項</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>項目</th><th>許容範囲</th><th>条件</th></tr></thead>\n<tbody>\n<tr><td>1</td><td>車路（ドライブウェイ）及び駐車場</td><td>前面部分の駐車場</td><td>(1) いかなる囲い（フェンス等）によっても密閉してはならない。</td></tr>\n<tr><td></td><td></td><td></td><td>(2) 義務的空地（表３）の所定部分は、雨水浸透を目的として開放しなければならない。</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">\n<p>1. <strong>地階の地上露出高さ制限（第４３条第２項六号）</strong>:</p>\n<p>ダッカ規則では、地階の天井の道路面からの露出高さを<strong>１.８５メートル以下</strong>に制限している。 日本の建築基準法（令第１条第二号）では、床面が地盤面下にある階を地階と定義し、容積率緩和（法第５２条第３項）を受けるための天井露出制限は「地盤面から１メートル以下」である。ダッカ規則は、物理的な突出をより高く（１.８５メートルまで）認める一方で、その昇降用のスロープ等に屋根をかけることを厳格に禁じ、空地の開放性を維持しようとしている。</p>\n<p>2. <strong>地階の用途制限（第４３条第２項七号）</strong>:</p>\n<p>ダッカ規則は、地階における<strong>「居住（Residential）」</strong>及び<strong>「ガス等の危険物貯蔵」</strong>を原則として一律禁止している。 日本では、衛生上の制限を満たせば地階の居室も可能だが、ダッカ規則は洪水リスクや換気の安全性を考慮し、非居住の複合用途のみを認めるという、より保守的かつ安全重視のスタンスをとっている。</p>\n<p>3. <strong>前面後退距離（セットバック）内の駐車場利用（第４４条 表２）</strong>:</p>\n<p>セットバック範囲内（前面道路側）において、車路や駐車場の設置を認めているが、<strong>「囲いの禁止」</strong>と<strong>「透水性の維持」</strong>を絶対条件としている。 日本の建築基準法でも外壁後退等があるが、ダッカ規則は都市浸水対策として「雨水浸透」を法文上で直接的にセットバック内の利用条件と結びつけている点が特徴的である。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における地階（ベージェント）及びセットバックに関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．地階の天井（ ছাদ ）は、隣接する敷地に損害を与えない場合であっても、接する道路の最高面から２.０メートルを超えて突出させてはならない。</p>\n<p>２．地階の天井から地上へ昇降するための階段をセットバック範囲内に設置する場合、当該階段を保護するために恒久的な屋根を設置しなければならない。</p>\n<p>３．地階は、機械換気設備により適切な環境が確保されている場合であっても、居住の用（Residential use）に供することはできない。</p>\n<p>４．前面道路側のセットバック範囲内に駐車場を設ける場合、防犯の観点から、周囲をフェンスや囲い（ বেষ্টনী ）で密閉して管理しなければならない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第４３条第２項六号により、突出の制限値は「１.৮৫ (１.８５) メートル」である。</p>\n<p>2. 誤り。第４３条第２項六号により、セットバック部分の階段や র‍্যাম্প の上に、屋根を設けることは禁止されている。</p>\n<p><strong>3. 正しい。</strong> 第４３条第２項七号により、地階での居住目的の使用は禁止されている。</p>\n<p>3. 誤り。第４４条表２により、駐車場として利用する際は、いかなる囲いによっても囲ってはならないと規定されている。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13455","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৪৪। সেটব্যাকের ক্ষেত্রে ব্যতিক্রম (চলমান)</strong></h4>\n<h6 class=\"h-lv6\"><strong>সারণি-২ (চলমান)</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নং</th><th>উপাদান</th><th>পরিমাণ</th><th>শর্ত</th></tr></thead>\n<tbody>\n<tr><td>২।</td><td>গার্ডরুম বা নিরাপত্তা পোস্ট</td><td>রাস্তার লেভেল হইতে সর্বোচ্চ ৩.২৫ (তিন দশমিক দুই পাঁচ) মিটার উঁচু এবং সর্বোচ্চ ৫ (পাঁচ) বর্গমিটার ক্ষেত্রফল বিশিষ্ট</td><td>সম্মুখ রাস্তার দিকে সীমানা দেয়াল সংলগ্ন হইতে হইবে।</td></tr>\n<tr><td>৩।</td><td>মূল ছাদের বর্ধিতাংশ</td><td>ইমারতের মূল অংশ হইতে সর্বোচ্চ ১ (এক) মিটার পর্যন্ত</td><td>(১) কেবল ইমারতের রাস্তাভিমুখী করা যাইবে; (২) ভূমি সমতল হইতে ৮ (আট) মিটারের নিচে হইবে না; (৩) সানশেড বা কার্নিশ কোনোরূপ বেষ্টনি দিয়া ঘেরা যাইবে না; (৪) সকল পার্শ্ব উন্মুক্ত হইতে হইবে।</td></tr>\n<tr><td>৪।</td><td>সানশেড, সানশেড-প্লান্টার, কার্নিশ বা ছাদের বর্ধিতাংশ</td><td>(ক) ইমারতের মূল অংশ হইতে সর্বোচ্চ ০.৫ (শূন্য দশমিক পাঁচ) মিটার পর্যন্ত; (খ) পাশের ও পশ্চাতের সেটব্যাক ১.২৫ (এক দশমিক দুই পাঁচ) মিটারের কম হইলে সর্বোচ্চ ০.৩ (শূন্য দশমিক তিন) মিটার পর্যন্ত</td><td>(১) কোনোরূপ বেষ্টনী দিয়া ঘেরা যাইবে না; (২) বারান্দা বা ব্যালকনি হিসাবে ব্যবহার করা যাইবে না; (৩) রক্ষণাবেক্ষণ ব্যতীত অন্য কোনো কারণে প্রবেশযোগ্য হইবে না।</td></tr>\n<tr><td>৫।</td><td>ভার্টিক্যাল ফিন (fin) বা সূর্যের আলো প্রতিরোধে জালির দেয়াল</td><td>সর্বোচ্চ ২০০ (দুইশত) মি.মি. পুরু</td><td>বহিঃদেয়ালের বাহিরে সানশেড বরাবর।</td></tr>\n</tbody>\n</table></div>\n<h4 class=\"h-lv4\"><strong>৪৫। ভূমি আচ্ছাদন ও আবশ্যিক অনাচ্ছাদিত স্থান।</strong></h4>\n<h5 class=\"h-lv5\">(১) প্লটের আয়তন অনুযায়ী অনুমোদনযোগ্য সর্বোচ্চ ভূমি আচ্ছাদন (Maximum Ground Coverage) ও আবশ্যিক অনাচ্ছাদিত স্থান (Mandatory Open Space), বৃষ্টির পানি শোষনার্থে বাধ্যতামূলক অনাচ্ছাদিত স্থান নিম্নবর্ণিত সারণি ৩ অনুসারে নির্ধারিত হইবে, যথা:—</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第４４条（セットバックの例外）（承前）</strong></h4>\n<h6 class=\"h-lv6\"><strong>表２（承前）</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>項目</th><th>許容範囲</th><th>条件</th></tr></thead>\n<tbody>\n<tr><td>2</td><td>警備室又は守衛所</td><td>道路面から高さ最大３.２５ｍ、床面積最大５㎡</td><td>前面道路側の境界壁に隣接して設置すること。</td></tr>\n<tr><td>3</td><td>主屋根の張り出し部分</td><td>外壁面から最大１ｍまで</td><td>(1) 道路に面する側に限る。 (2) 地盤面から高さ８ｍ以上の位置にあること。 (3) いかなる囲いによっても密閉しないこと。 (4) 全側面を開放すること。</td></tr>\n<tr><td>4</td><td>日よけ、プランター一体型日よけ、コーニス等</td><td>(a) 外壁面から最大０.５ｍまで。 (b) 側部・背後の後退距離が１.２５ｍ未満の場合は最大０.３ｍまで。</td><td>(1) 囲いによって密閉しないこと。 (2) ベランダ又はバルコニーとして使用しないこと。 (3) 維持管理目的以外での立入りを禁止すること。</td></tr>\n<tr><td>5</td><td>垂直フィン又は日よけ用格子壁</td><td>厚さ最大２００ｍｍ</td><td>外壁の外側、日よけと並行して設置すること。</td></tr>\n</tbody>\n</table></div>\n<h4 class=\"h-lv4\"><strong>第４５条（建蔽率及び義務的空地）</strong></h4>\n<h5 class=\"h-lv5\"><strong>１</strong>　敷地面積に応じた許容最高建蔽率（Maximum Ground Coverage）及び義務的空地（Mandatory Open Space）並びに雨水浸透を目的とした義務的空地については、次の表３の規定に従うものとする。</h5>\n<hr class=\"sep\">\n<p>1. <strong>日よけ（庇）の突き出し制限（第４４条 表２）</strong>:</p>\n<p>日本の建築基準法施行令第２条第１項第一号では、軒や庇などは「１メートル」まで建築面積に算入されない。対してダッカ規則では、通常のセットバック範囲内において<strong>「０.５メートル」</strong>、狭小な後退距離（１.２５ｍ未満）の場合は<strong>「０.３メートル」</strong>にまで制限が強化されている。これは、過密地域における隣地との離隔確保を優先した設計制限である。</p>\n<p>2. <strong>空地の定義と雨水対策（第４５条）</strong>:</p>\n<p>日本の建蔽率（法第５３条）の主な目的は防火と通風だが、ダッカ規則では空地の確保理由として<strong>「雨水浸透（Rainwater absorption）」</strong>が法文上で明示されている。単なる空地ではなく「非舗装」や「浸透可能」な状態を法的に求めている点が、熱帯の豪雨・浸水対策を反映した独自の特徴である。</p>\n<p>3. <strong>警備室の規格化</strong>:</p>\n<p>前面道路側に設置する警備室のサイズを「５㎡・高さ３.２５ｍ」と全国一律で規格化している。日本では個別審査や自治体条例に委ねられる事項だが、ダッカ規則は道路空間の秩序維持のため詳細な寸法規定を設けている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025におけるセットバック範囲内の突出物及び空地に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．前面道路側の境界壁に隣接して設置する警備室は、道路面からの高さが４.０メートルであれば、床面積に関わらず設置が認められる。</p>\n<p>２．主屋根の張り出し部分は、地盤面から高さ６.０メートルの位置にある場合であっても、道路側であれば最大１メートルまで突出させることができる。</p>\n<p>３．側部後退距離（セットバック）が１.０メートルである箇所において、日よけ（サンシェード）を設置する場合、外壁面からの突出長さは最大０.３メートルとしなければならない。</p>\n<p>４．義務的空地（Mandatory Open Space）の確保は、専ら火災時の延焼防止を目的としており、雨水の浸透については考慮されていない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。警備室の高さは最大「３.２５メートル」までである。</p>\n<p>2. 誤り。主屋根の張り出しは、地盤面から「８メートル」以上の高さが必要である。</p>\n<p><strong>3. 正しい。</strong> 後退距離が１.２５メートル未満の場合、突出は最大「０.３メートル」に制限される。</p>\n<p>3. 誤り。第４５条第１項により、雨水浸透が義務的空地の明示的な目的の一つである。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13456","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h6 class=\"h-lv6\"><strong>সারণি ৩</strong></h6>\n<h6 class=\"h-lv6\"><strong>প্লটের পরিমাণভেদে ভূমি আচ্ছাদন, অনাচ্ছাদিত স্থান ও বৃষ্টির পানি শোষনার্থে বাধ্যতামূলক সংরক্ষিত এলাকা (সকল হিসাব মোট জমির শতকরা হিসাবে উল্লিখিত)</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নং</th><th>প্লটের পরিমাণ</th><th>সর্বনিম্ন ভূমি আচ্ছাদন (MGC)</th><th>সর্বোচ্চ ভূমি আচ্ছাদন (MGC)</th><th>আবশ্যিক অনাচ্ছাদিত স্থান (Mandatory open space)</th><th>প্রায়োগিক ব্যতিক্রম অনুযায়ী অতিরিক্ত ভূমি আচ্ছাদন (সর্বোচ্চ)</th><th>বৃষ্টির পানি শোষনার্থে বাধ্যতামূলক অনাচ্ছাদিত এলাকা [৫-(৬)]</th></tr></thead>\n<tbody>\n<tr><td>১</td><td>২</td><td>৩</td><td>৪</td><td>৫</td><td>৬</td><td>৭ (৫—৬)</td></tr>\n<tr><td>১।</td><td>A6: সাশ্রয়ী আবাসন (যে-কোনো প্লটের ক্ষেত্রে)</td><td>৫২%</td><td>৭৫%</td><td>২৫%</td><td>১২.৫%</td><td>১২.৫%</td></tr>\n<tr><td>২।</td><td>১৩৪ ব.মি. (২ কাঠা) বা ইহার নিম্নে</td><td>৫২.৫%</td><td>৭০%</td><td>৩০%</td><td>১৫%</td><td>১৫%</td></tr>\n<tr><td>৩।</td><td>১৩৪ ব.মি. (২ কাঠা) এর অধিক হইতে ২০১ ব.মি. (৩ কাঠা) পর্যন্ত</td><td>৫০%</td><td>৬৭.৫%</td><td>৩২.৫%</td><td>১৬.২৫%</td><td>১৬.২৫%</td></tr>\n<tr><td>৪।</td><td>২০১ ব.মি. (৩ কাঠা) এর অধিক হইতে ২৬৮ ব.মি. (৪ কাঠা) পর্যন্ত</td><td>৪৮.৫%</td><td>৬৫%</td><td>৩৫%</td><td>১৭.৫০%</td><td>১৭.৫০%</td></tr>\n<tr><td>৫।</td><td>২৬৮ ব.মি. (৪ কাঠা) এর অধিক হইতে ৪০২ ব.মি. (৬ কাঠা) পর্যন্ত</td><td>৪৬.৫%</td><td>৬২.৫%</td><td>৩৭.৫%</td><td>১৮.৭৫%</td><td>১৮.৭৫%</td></tr>\n<tr><td>৬।</td><td>৪০২ ব.মি. (৬ কাঠা) এর অধিক হইতে ৬৭০ ব.মি. (১০ কাঠা) পর্যন্ত</td><td>৪৫%</td><td>৬০%</td><td>৪০%</td><td>২০%</td><td>২০%</td></tr>\n<tr><td>৭।</td><td>৬৭০ ব.মি. (১০ কাঠা) এর অধিক হইতে ৯৩৭ ব.মি. (১৪ কাঠা) পর্যন্ত</td><td>-</td><td>৫৫%</td><td>৪৫%</td><td>২২.৫%</td><td>২২.৫%</td></tr>\n<tr><td>৮।</td><td>৯৩৭ ব.মি. (১৪ কাঠা) এর অধিক হইতে ১৩৩৯ ব.মি. (২০ কাঠা) পর্যন্ত</td><td>-</td><td>৫০%</td><td>৫০%</td><td>২৫%</td><td>২৫%</td></tr>\n<tr><td>৯।</td><td>১৩৩৯ ব.মি. (২০ কাঠা) এর অধিক হইতে ২৬৭৭ ব.মি. (৪০ কাঠা) পর্যন্ত</td><td>-</td><td>৪৫%</td><td>৫৫%</td><td>২৭.৫%</td><td>২৭.৫%</td></tr>\n<tr><td>১০।</td><td>২৬৭৭ ব.মি. (৪০ কাঠa) এর অধিক</td><td>-</td><td>৪০%</td><td>৬০%</td><td>৩০%</td><td>৩০%</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h6 class=\"h-lv6\"><strong>表３：敷地面積に応じた建蔽率、空地及び雨水浸透用義務的保存領域（数値は全て敷地面積に対するパーセンテージ）</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>敷地面積</th><th>最低建蔽率 (MGC)</th><th>最高建蔽率 (MGC)</th><th>義務的空地 (Mandatory Open Space)</th><th>例外規定による追加の建蔽率（最大）</th><th>雨水浸透用義務的空地領域 [Column 5 - 6]</th></tr></thead>\n<tbody>\n<tr><td>1</td><td>A6: 手頃な価格の住宅（全敷地対象）</td><td>52%</td><td>75%</td><td>25%</td><td>12.5%</td><td>12.5%</td></tr>\n<tr><td>2</td><td>134㎡ (2 Katha) 以下</td><td>52.5%</td><td>70%</td><td>30%</td><td>15%</td><td>15%</td></tr>\n<tr><td>3</td><td>134㎡超〜201㎡ (3 Katha) まで</td><td>50%</td><td>67.5%</td><td>32.5%</td><td>16.25%</td><td>16.25%</td></tr>\n<tr><td>4</td><td>201㎡超〜268㎡ (4 Katha) まで</td><td>48.5%</td><td>65%</td><td>35%</td><td>17.50%</td><td>17.50%</td></tr>\n<tr><td>5</td><td>268㎡超〜402㎡ (6 Katha) まで</td><td>46.5%</td><td>62.5%</td><td>37.5%</td><td>18.75%</td><td>18.75%</td></tr>\n<tr><td>6</td><td>402㎡超〜670㎡ (10 Katha) まで</td><td>45%</td><td>60%</td><td>40%</td><td>20%</td><td>20%</td></tr>\n<tr><td>7</td><td>670㎡超〜937㎡ (14 Katha) まで</td><td>-</td><td>55%</td><td>45%</td><td>22.5%</td><td>22.5%</td></tr>\n<tr><td>8</td><td>937㎡超〜1339㎡ (20 Katha) まで</td><td>-</td><td>50%</td><td>50%</td><td>25%</td><td>25%</td></tr>\n<tr><td>9</td><td>1339㎡超〜2677㎡ (40 Katha) まで</td><td>-</td><td>45%</td><td>55%</td><td>27.5%</td><td>27.5%</td></tr>\n<tr><td>10</td><td>2677㎡ (40 Katha) 超</td><td>-</td><td>40%</td><td>60%</td><td>30%</td><td>30%</td></tr>\n</tbody>\n</table></div>\n<p>※注：Katha（カサ）はバングラデシュの伝統的単位。1 Katha ≒ 67㎡。</p>\n<hr class=\"sep\">\n<p>1. <strong>敷地規模に応じた建蔽率の逓減</strong>:</p>\n<p>日本の建築基準法では、建蔽率は主に「用途地域」によって指定される。対してダッカ規則の表３では、<strong>敷地面積が大きくなるほど許容される最高建蔽率（MGC）が段階的に下がる</strong>（75%から40%へ）仕組みをとっている。これは大規模敷地における過密化を抑制し、環境負荷を低減させるための強力な形態規制である。</p>\n<p>2. <strong>雨水浸透空地の義務化（Column 7）</strong>:</p>\n<p>本表の最も特徴的な点は、義務的空地のうち、<strong>その半分を「雨水浸透用」として非舗装のまま保存することを義務付けている</strong>点である。日本の建築基準法には「空地」の概念はあるが、雨水浸透を目的とした「非舗装領域」の割合を建築確認の主要な数値としてこれほど詳細に規定している例はない。ダッカの洪水対策と地下水涵養を意図した独自の環境規制といえる。</p>\n<p>3. <strong>最低建蔽率（Minimum Ground Coverage）の規定</strong>:</p>\n<p>小規模敷地において「最低建蔽率」が設定されている点は興味深い。これは低密すぎる開発を防ぎ、一定の居住密度を確保する都市計画的意図が読み取れるが、大規模敷地ではこの制限がなくなっている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025 表３に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．敷地面積が 1,000平方メートルの一般的な建築物において、最高建蔽率（MGC）は 55%である。</p>\n<p>２．「手頃な価格の住宅（Affordable Housing）」に分類されるプロジェクトでは、敷地面積に関わらず最高建蔽率は 75%まで認められ、そのうち 12.5%を雨水浸透用の義務的空地として確保しなければならない。</p>\n<p>３．敷地面積が 134平方メートル（2 Katha）以下の小規模敷地における義務的空地（Mandatory Open Space）の割合は 25%である。</p>\n<p>４．敷地面積が 3,000平方メートルを超える大規模開発において、雨水浸透用義務的空地として確保すべき面積は、敷地面積の 25%以上でなければならない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。1,000㎡（約15 Katha）は項目8に該当し、最高建蔽率は 50%である。</p>\n<p><strong>2. 正しい。</strong> 項目1の規定通りである。</p>\n<p>2. 誤り。項目2により、義務的空地は 30%である。</p>\n<p>3. 誤り。項目10（2677㎡超）に該当し、雨水浸透用空地は 30%必要である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13457","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h6 class=\"h-lv6\"><strong>দ্রষ্টব্য:</strong></h6>\n<h6 class=\"h-lv6\">১। প্রায়োগিক ব্যতিক্রম অনুযায়ী অতিরিক্ত ভূমি আচ্ছাদন (সর্বোচ্চ) এবং বৃষ্টির পানি শোষনার্থে বাধ্যতামূলক অনাচ্ছাদিত এলাকা, আবশ্যিক অনাচ্ছাদিত স্থানের শতকরা (কলাম- ৫ ও ৭ এ উল্লিখিত) হিসাবে নির্ধারিত হইবে। তবে “সাশ্রয়ী আবাসন” ব্যতীত কলাম ৪ ও ৬ এর যোগফল কোনোক্রমেই বেজমেন্ট বা ভূমি তলের উপরে মোট ভূমির (সমর্পিত জমি বাদে) ৭৫% অতিক্রম করিবে না।</h6>\n<h6 class=\"h-lv6\">২। শুধু বাণিজ্যিকভাবে গাড়ির পার্কিং গ্যারেজ বা কমিউনিটি পার্কিং ইমারত নির্মাণে সারণি ২ এ প্রদত্ত সেটব্যাক অনুযায়ী উন্মুক্ত স্থান রাখিতে হইবে, এক্ষেত্রে সারণি ৩ এ উল্লিখিত সর্বোচ্চ ভূমি আচ্ছাদন প্রযোজ্য হইবে না।</h6>\n<h6 class=\"h-lv6\">৩। মাধ্যমিক বিদ্যালয়, কলেজ, বিশ্ববিদ্যালয় (B1 ও B2) শ্রেণির ইমারতের ক্ষেত্রে সর্বোচ্চ ৪৫% ভূমি আচ্ছাদন প্রযোজ্য হইবে এবং শিক্ষা প্রতিষ্ঠানের ক্ষেত্রে মানদন্ড (মোট জমির এক তৃতীয়াংশ একত্রে যাহা সেটব্যাকের জন্য সংরক্ষিত জমি ব্যতীত এবং প্রস্থ দৈর্ঘ্যের অর্ধেকের কম হইতে পারিবে না) অনুযায়ী খেলার মাঠ থাকা বাধ্যতামূলক।</h6>\n<h6 class=\"h-lv6\">৪। বিপজ্জনক ব্যবহারের ভবন (J) এর ক্ষেত্রে ৩০% পর্যন্ত সর্বোচ্চ ভূমি আচ্ছাদন প্রযোজ্য হইবে এবং শিল্প শ্রেণির ইমারতের ক্ষেত্রে সারণি ৩ এর ক্রমিক নং ৭ হইতে যে-কোনো পরিমাণ জমির ক্ষেত্রে ৬০% পর্যন্ত সর্বোচ্চ ভূমি আচ্ছাদন নেওয়া যাইবে।</h6>\n<h5 class=\"h-lv5\">(২) আবশ্যিক অনাচ্ছাদিত স্থান ইমারত উন্নয়নের অবিভাজ্য অংশ এবং ইমারত অনুমোদনের বিধান হিসাবে বিবেচিত হইবে এবং পৃথকভাবে বিভক্তি, বিক্রয় বা উন্নয়নযোগ্য হইবে না।</h5>\n<h5 class=\"h-lv5\">(৩) সারণি ৩ এ বর্ণিত প্রায়োগিক ব্যতিক্রম অংশে উল্লিখিত ভবনের নির্দিষ্ট উপাদান বা অংশ ব্যতীত ইমারতের অন্য কোনো অংশ সর্বোচ্চ অনুমোদিত ভূমি আচ্ছাদনের বাহিরে, আবশ্যিক অনাচ্ছাদিত স্থানের মধ্যে বর্ধিত করা যাইবে না।</h5>\n<h5 class=\"h-lv5\">(৪) বৃষ্টির পানি শোষনার্থে বাধ্যতামূলক অনাচ্ছাদিত এলাকা হিসাবে সংশ্লিষ্ট প্লটের নির্ধারিত পরিমাণ অংশ ভূমিতলের উপরে এবং নীচে (বেজমেন্ট ইত্যাদির ক্ষেত্রসহ) সম্পূর্ণ ভেদ্য (permeable) অর্থাৎ পানি প্রবেশের উপযোগী হিসাবে সংরক্ষণ করিতে হইবে এবং এই অংশে ভূমিতলের উপরে ও নীচে ফাউন্ডেশন বা কোনো পাকা স্থাপনা (paved) বা স্থাপনার অংশ বর্ধিত করা যাইবে না।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h6 class=\"h-lv6\"><strong>備考：</strong></h6>\n<h6 class=\"h-lv6\">１　適用上の例外による追加の建蔽率（最大）及び雨水浸透用の義務的空地は、第４５条表３の第５列及び第７列に掲げる「義務的空地」の割合に基づき算定する。「手頃な価格の住宅（Affordable Housing）」を除き、表３の第４列（最高建蔽率）と第６列（例外による追加分）の合計は、地階又は地上階において、敷地面積（道路等への提供分を除く）の<strong>７５％を超えてはならない</strong>。</h6>\n<h6 class=\"h-lv6\">２　専ら営利目的の立体駐車場又は共同駐車場建築物を建築する場合、第４４条表２の規定に基づくセットバック（後退距離）を確保しなければならない。この場合、表３に定める最高建蔽率の制限は適用しない。</h6>\n<h6 class=\"h-lv6\">３　中学校、高校、大学等の教育施設（用途分類 B1 及び B2）については、<strong>最高建蔽率を４５％とする。また、教育施設にあっては、基準（敷地面積の３分の１以上を一画にまとめ、セットバック面積を除外した上で、短辺が長辺の２分の１以上であること）に適合する運動場（Playing field）の設置を義務付ける</strong>。</h6>\n<h6 class=\"h-lv6\">４　危険物貯蔵・処理施設（用途分類 J）については、<strong>最高建蔽率を３０％</strong>とする。また、工業用建築物については、表３の項番７以降（大規模敷地）に該当する場合、最高建蔽率を６０％まで認めることができる。</h6>\n<h5 class=\"h-lv5\"><strong>２</strong>　義務的空地は、建築開発における<strong>不可分の一部</strong>であり、建築承認の必須要件とみなす。当該空地を個別に分割し、売却し、又は開発の用に供してはならない。</h5>\n<h5 class=\"h-lv5\"><strong>３</strong>　表３の例外規定に明記された特定の部位を除き、建築物のいかなる部分も、最高建蔽率を超えて義務的空地内に突出させてはならない。</h5>\n<h5 class=\"h-lv5\"><strong>４</strong>　雨水浸透用義務的空地として指定された敷地部分は、地上及び地下（地階等の直上を含む）にわたって、<strong>完全に透水性（Permeable）</strong>を有する、すなわち雨水が浸透可能な状態で維持しなければならない。当該部分においては、地上及び地下を問わず、基礎、舗装構造物（Paved structures）又は建物の一部を設置若しくは拡張してはならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>透水性維持に関する絶対的禁止規定（第４項）</strong>:</p>\n<p>ダッカ規則では、雨水浸透用空地の「地下」においても基礎や構造物の設置を厳格に禁じている。日本の建築基準法では、地盤面下にある構造物は基本的に建築面積に含まれないが、ダッカ規則は「雨水の垂直方向の浸透経路」を確保するため、地下の利用まで制限している。これは激甚化する都市洪水への対策が法典の根幹にあることを示している。</p>\n<p>2. <strong>教育施設における運動場の定量的義務化（備考３）</strong>:</p>\n<p>日本の建築基準法には学校の運動場面積に関する直接的な義務規定はない。対してダッカ規則は、建築確認の要件として「敷地面積の３分の１以上」かつ「形状（短辺比率）」まで指定し、運動場の設置を強行的に求めている。都市部での活動空間確保を建築法規が直接担っている。</p>\n<p>3. <strong>空地の「不可分性」の明文化（第２項）</strong>:</p>\n<p>一度空地として承認された部分は、将来的に分割したり売却したりして開発することを禁じている。日本でも確認後の無断増築は是正対象となるが、ダッカ規則では「不可分な一部（indivisible part）」という概念を用い、空地の法的地位をより強固に定義している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における建蔽率及び空地に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．大学（用途分類 B2）を建築する場合、最高建蔽率は５０％まで認められ、運動場の設置については各教育機関の判断に委ねられている。</p>\n<p>２．雨水浸透用義務的空地として指定された区域であっても、地盤面下であれば、建築物の基礎や地階の壁体を設置することができる。</p>\n<p>３．専ら営利を目的とした立体駐車場建築物については、セットバック距離を遵守すれば、建蔽率（MGC）の制限は適用されない。</p>\n<p>４．義務的空地は、将来的な開発計画がある場合に限り、建築承認後に分筆して売却することができる。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。備考３により、教育施設の最高建蔽率は「４５％」であり、運動場（Playing field）の設置は義務である。</p>\n<p>2. 誤り。第４項により、雨水浸透用空地の地下部分にも基礎や構造物を設置することは禁じられている。</p>\n<p><strong>3. 正しい。</strong> 備考２の規定通り、営利目的の駐車場建築物は建蔽率制限の適用除外となる。</p>\n<p>3. 誤り。第２項により、義務的空地は「不可分の一部」であり、分割や売却は禁じられている。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13458","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৪৬। আবশ্যিক অনাচ্ছাদিত স্থানের ক্ষেত্রে প্রায়োগিক ব্যতিক্রম।</strong></h4>\n<h5 class=\"h-lv5\">(১) আবশ্যিক অনাচ্ছাদিত স্থানের জন্য সর্বোচ্চ ভূমি আচ্ছাদন কার্যকর করিবার ক্ষেত্রে নিম্নবর্ণিত সারণি ৪ এ উল্লিখিত শর্তসমূহ পালন সাপেক্ষে কতিপয় প্রায়োগিক ব্যতিক্রম প্রযোজ্য হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\"><strong>সারণি ৪</strong></h6>\n<h6 class=\"h-lv6\"><strong>সর্বোচ্চ ভূমি আচ্ছাদনের ক্ষেত্রে প্রযোজ্য ব্যতিক্রমসমূহ</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নং</th><th>উপাদান</th><th>পরিমাপ</th><th>শর্ত</th></tr></thead>\n<tbody>\n<tr><td>১।</td><td>সর্বোচ্চ ভূমি আচ্ছাদনের অতিরিক্ত পাকা (Paved) আচ্ছাদন (ভূমি তলে)</td><td>প্লটের আয়তন অনুযায়ী সারণি-৩ এ উল্লিখিত অতিরিক্ত ভূমি আচ্ছাদনের পরিমাপের অধিক নহে</td><td>(১) ড্রাইভওয়ে, পার্কিং ও নিরাপত্তা বুথ ব্যতীত অন্য কোনো কাজে ব্যবহার করা যাইবে না; (২) পার্কিং হিসাবে ব্যবহৃত হইলে নিরেট দেয়াল দিয়া (নিরাপত্তা পোস্ট ব্যতীত) বন্ধ করা যাইবে না; (৩) জমির অভ্যন্তরে বায়ু চলাচলের সুব্যবস্থা থাকিতে হইবে।</td></tr>\n<tr><td>২।</td><td>আবৃত পরিসর (ছাদ)</td><td>(ক) প্লটের সংলগ্ন রাস্তার লেভেল হইতে ৬ (ছয়) মিটার অধিক উচ্চতায় ছাদ হইতে পারিবে; (খ) প্লটের আয়তন অনুযায়ী সারণি ৩ এ উল্লিখিত অতিরিক্ত ভূমি আচ্ছাদনের পরিমাপের চেয়ে বেশি নহে</td><td>(১) কোনোভাবেই সেটব্যাক স্থানের মধ্যে তৈরি করা যাইবে না; (২) শুধু টেরেসা বা টেরেসা গার্ডেন ব্যতীত অন্য কোনো কাজে ব্যবহার করা যাইবে না; (৩) কোনো ভাবেই স্থায়ী বা অস্থায়ী কাঠামো দ্বারা আচ্ছাদিত হইতে পারিবে না。</td></tr>\n<tr><td>৩।</td><td>কার্নিশ (রাস্তাভিমুখী দিকে)</td><td>সেটব্যাকের অতিরিক্ত জায়গা ছাড়িয়া ইমারত নির্মাণ করিলে ইমারতের মূল অংশ হইতে সর্বোচ্চ ২ (দুই) মিটার পর্যন্ত; উল্লিখিত সীমার অধিক বৃদ্ধি করিলে অতিরিক্ত অংশ ভূমি আচ্ছাদনের পরিমাপের অন্তর্ভুক্ত হইবে</td><td>(১) কোনভাবেই সেটব্যাক স্থানের মধ্যে তৈরি করা যাইবে না; (২) কেবল ইমারতের রাস্তাভিমুখী দিকে করা যাইবে; (৩) ভূমি সমতল হইতে ৮ মিটারের নিচে হইবে না; (৪) প্লান্টার ব্যতীত ছাদের বর্ধিতাংশ তিন পার্শ্ব উন্মুক্ত থাকিতে হইবে।</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第４６条（義務的空地における実務上の例外）</strong></h4>\n<h5 class=\"h-lv5\"><strong>１</strong>　義務的空地（Mandatory Open Space）における最高建蔽率の適用にあたっては、次の表４に掲げる条件を遵守する場合に限り、実務上の例外規定を適用するものとする。</h5>\n<h6 class=\"h-lv6\"><strong>表４：最高建蔽率における許容例外事項</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>項目</th><th>許容範囲</th><th>条件</th></tr></thead>\n<tbody>\n<tr><td><strong>1</strong></td><td><strong>最高建蔽率を超えて設置する地盤面の舗装（Paved）部分</strong></td><td>第４５条表３に定める「例外規定による追加の建蔽率」の範囲内とする。</td><td>(1) 車路、駐車場及び守衛所（セキュリティブース）以外の目的に供してはならない。 (2) 駐車場として利用する場合、守衛所を除き、耐力壁や袖壁（Solid wall）で囲んではならない。 (3) 敷地内部の通風を確保しなければならない。</td></tr>\n<tr><td><strong>2</strong></td><td><strong>被覆された空間（屋根・庇等）</strong></td><td>(a) 隣接道路面から<strong>高さ６メートルを超える位置</strong>に設けるものとする。 (b) 面積は表３の追加建蔽率の範囲内とする。</td><td>(1) セットバック（外壁後退）範囲内に設置してはならない。 (2) テラス又は屋上庭園以外の目的に供してはならない。 (3) 恒久的又は一時的な構造物によって密閉してはならない。</td></tr>\n<tr><td><strong>3</strong></td><td><strong>コーニス（道路に面する側）</strong></td><td>セットバック距離以上の余剰空地を確保して建築する場合、建物本体から<strong>最大２メートルまで</strong>。これを超える場合は建蔽率に算入する。</td><td>(1) セットバック範囲内に設置してはならない。 (2) 道路に面する側に限る。 (3) 地盤面から<strong>高さ８メートル以上</strong>の位置になければならない。 (4) プランター部分を除き、張り出し部分の三方を stag（開放）しなければならない。</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">\n<p>1. <strong>舗装空地の用途制限（項番1）</strong>:</p>\n<p>ダッカ規則では、建蔽率の例外として認められる「舗装された空地」について、車路や駐車場に限定し、かつ「壁による密閉」を禁じている。日本の建築基準法では、地盤面の舗装自体は建蔽率に影響しないが、ダッカ規則は都市浸水対策との兼ね合いで、「舗装すること自体」を例外的な権利として扱い、通風の確保を条件としている点が独特である。</p>\n<p>2. <strong>高所における被覆空間の緩和（項番2）</strong>:</p>\n<p>道路面から<strong>６メートル以上</strong>の高さにある屋根付き空間（テラス等）を、一定の面積枠（追加建蔽率）の中で認めている。これは、地上階の開放性を保ちつつ、高層階での半屋外空間の利用を促進する意図がある。日本の建築基準法施行令における「高い開放性を有する庇」の不算入規定に近いが、高さ基準を「６メートル」と明記している点は非常に具体的である。</p>\n<p>3. <strong>道路面コーニスの突出制限（項番3）</strong>:</p>\n<p>道路側のコーニス（軒飾り）に対し、高さ<strong>８メートル以上</strong>という厳しい制限を設けている。日本の建築基準法では軒の出は１メートルまで建築面積不算入だが、ダッカ規則では「２メートル」まで認める代わりに、低層部での突出を禁じ、上部空間での意匠的自由度を与えている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における建蔽率の例外規定に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．最高建蔽率を超えて地盤面に舗装を施す場合、防犯の観点から当該駐車場部分を耐力壁（Solid wall）で囲まなければならない。</p>\n<p>２．隣接道路面から高さ４.０メートルの位置に設ける屋根付きのテラスは、セットバック範囲外であれば建蔽率の例外規定の適用を受けることができる。</p>\n<p>３．建築物の道路に面する側に設けるコーニス（Cornice）は、地盤面から高さ８メートル以上の位置にあり、かつ建物本体からの張り出しが２メートル以内であれば、所所定の条件下でセットバック以外の空地に設置できる。</p>\n<p>４．セットバック（外壁後退）の範囲内であれば、高さに関わらずテラスやコーニスを自由に設置することができる。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。表４項番１の条件(2)により、駐車場を耐力壁等で囲むことは禁じられている。</p>\n<p>2. 誤り。表４項番２の条件(a)により、被覆された空間は高さ「６メートル」を超える位置になければならない。</p>\n<p><strong>3. 正しい。</strong> 表４項番３の規定通りである。</p>\n<p>3. 誤り。表４のすべての項目において、「セットバック範囲内への設置禁止」が共通の条件となっている。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13459","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h6 class=\"h-lv6\"><strong>সারণি ৪ (চলমান)</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নং</th><th>উপাদান</th><th>পরিমাপ</th><th>শর্ত</th></tr></thead>\n<tbody>\n<tr><td>৪।</td><td>সানশেড, প্লান্টার, কার্নিশ বা ছাদের বর্ধিতাংশ সমূহ (রাস্তা ব্যতীত অন্যান্য দিকে)</td><td>সেটব্যাকের অতিরিক্ত জায়গা ছাড়িয়া ইমারত নির্মাণ করিলে ইমারতের মূল অংশ হইতে সর্বোচ্চ ১.৫ মিটার পর্যন্ত; উল্লিখিত সীমার অধিক বৃদ্ধি করিলে অতিরিক্ত অংশ ভূমি আচ্ছাদনের পরিমাপের অন্তর্ভুক্ত হইবে</td><td>(১) কোনভাবেই সেটব্যাক স্থানের মধ্যে তৈরি করা যাইবে না; (২) কোনোরূপ বেষ্টনি দিয়া ঘেরা যাইবে না; (৩) বারান্দা বা ব্যালকনি হিসাবে ব্যবহার করা যাইবে না; (৪) রক্ষণাবেক্ষণ ব্যতীত অন্য কোনো কারণে প্রবেশযোগ্য হইবে না; (৫) প্লান্টার ব্যতীত ছাদের বর্ধিতাংশ তিন পার্শ্ব উন্মুক্ত থাকিতে হইবে।</td></tr>\n<tr><td>৫।</td><td>ব্যালকনি</td><td>ব্যালকনির ক্ষেত্রফল ইমারতের রাস্তা সংলগ্ন প্রস্থের ৩০% এবং ১ মিটার ব্যালকনির প্রস্থ বিবেচনা করিলে যাহা হয় তাহার অধিক হইতে পারিবে না</td><td>(১) কোনভাবেই সেটব্যাক স্থানের মধ্যে তৈরি করা যাইবে না; (২) কেবল ইমারতের সকল রাস্তাভিমুখী দিকে করা যাইবে; (৩) ভূমি সমতল হইতে ৩.৫০ মিটারের নিচে হইবে না।</td></tr>\n</tbody>\n</table></div>\n<h5 class=\"h-lv5\">(২) উপ-বিধি (১) এ উল্লিখিত বাহিরের ভবন বা স্থাপনার অন্য কোনো অংশ বা উপাদানের ক্ষেত্রেই অনুরূপ ব্যতিক্রম প্রযোজ্য হইবে না এবং অতিরিক্ত আচ্ছাদনের পরিমাণ কোনোভাবেই সারণি ৩ এ উল্লিখিত অতিরিক্ত ভূমি আচ্ছাদনের পরিমাণ হইতে অধিক হইবে না।</h5>\n<h4 class=\"h-lv4\"><strong>৪৭। Floor Area Ratio (FAR) সূচক নির্ণয়।</strong></h4>\n<h5 class=\"h-lv5\">(১) আবাসিক ভূমির ব্যবহার, আবাসন ইউনিট ও মহাপরিকল্পনায় বর্ণিত অন্যান্য প্রণোদনাসহ ইমারতের ক্ষেত্রে নিম্নবর্ণিত ২ (দুই) টি FAR সূচক মান বিবেচনা করিতে হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) এলাকাভিত্তিক FAR; ও</h6>\n<h6 class=\"h-lv6\">(খ) রোডভিত্তিক FAR।</h6>\n<h5 class=\"h-lv5\">(২) আবেদনকৃত জমির অবস্থান যে জনঘনত্ব ব্লকে অবস্থিত তাহার এলাকাভিত্তিক FAR মহাপরিকল্পনায় উল্লিখিত মান অনুযায়ী নির্ধারিত হইবে।</h5>\n<h5 class=\"h-lv5\">(৩) এলাকাভিত্তিক FAR এবং রোডভিত্তিক FAR উভয়ের মধ্যে ক্ষুদ্রতরটি ভিত্তি FAR যাহা নিঃশর্তভাবে প্রযোজ্য হইবে এবং উভয়ের মধ্যে যাহা সর্বোচ্চ তাহা সর্বোচ্চ FAR হিসাবে বিবেচিত হইবে এবং সর্বোচ্চ FAR অর্জন করিতে হইলে প্রণোদনা গ্রহণ করিতে হইবে, তবে অনুমোদনযোগ্য FAR কোনোভাবেই সর্বোচ্চ FAR কে অতিক্রম করিবে না:</h5>\n<h6 class=\"h-lv6\"><strong>তবে শর্ত থাকে যে,</strong> ব্লকভিত্তিক উন্নয়ন, আরবান রিজেনারেশন এলাকা, এবং টিডিআর এর ক্ষেত্রে প্রণোদনাযুক্ত সাপেক্ষে সর্বোচ্চ FAR-কে ০.৫ পর্যন্ত অতিক্রম করা যাইবে।</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第４６条（義務的空地における実務上の例外）（承前）</strong></h4>\n<h6 class=\"h-lv6\"><strong>表４（承前）</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>項目</th><th>許容範囲</th><th>条件</th></tr></thead>\n<tbody>\n<tr><td><strong>4</strong></td><td><strong>日よけ、プランター、コーニス等（道路面以外）</strong></td><td>セットバック以上の余剰空地を確保する場合、建物本体から<strong>最大１.５ｍまで</strong>。これを超える部分は建蔽率に算入する。</td><td>(1) セットバック（外壁後退）範囲内に設置しないこと。 (2) 囲い等で密閉しないこと。 (3) ベランダ等として使用しないこと。 (4) 維持管理以外での立入りを禁止すること。 (5) 三方を stag（開放）すること。</td></tr>\n<tr><td><strong>5</strong></td><td><strong>バルコニー</strong></td><td>道路に面する壁面幅の３０％に、幅１ｍを乗じた面積を超えてはならない。</td><td>(1) セットバック範囲内に設置しないこと。 (2) 道路に面する側に限る。 (3) 地盤面から<strong>高さ３.５０ｍ以上</strong>に設置すること。</td></tr>\n</tbody>\n</table></div>\n<h5 class=\"h-lv5\"><strong>２</strong>　前項の例外は、他の建築物や工作物の部位には適用されない。また、追加の建蔽率の合計は、第４５条表３に定める上限を超えてはならない。</h5>\n<h4 class=\"h-lv4\"><strong>第４７条（容積率（FAR）指標の算定）</strong></h4>\n<h5 class=\"h-lv5\"><strong>１</strong>　住宅、住戸数、及びマスタープランに定める各種インセンティブを適用する建築物においては、次の２つの容積率（FAR）指標を考慮するものとする。</h5>\n<h6 class=\"h-lv6\"><strong>一</strong>　地区別容積率（Area-based FAR）</h6>\n<h6 class=\"h-lv6\"><strong>二</strong>　接道別容積率（Road-based FAR）</h6>\n<h5 class=\"h-lv5\"><strong>２</strong>　地区別容積率は、当該敷地が位置するマスタープラン上の人口密度ブロックの指定値に従うものとする。</h5>\n<h5 class=\"h-lv5\"><strong>３</strong>　地区別容積率と接道別容積率のうち、<strong>いずれか小さい方の値</strong>を「基礎容積率（Base FAR）」として無条件に適用する。両者のうち大きい方の値を「最高容積率」とし、これを得るにはインセンティブの適用を受けなければならない。ただし、許可される容積率は最高容積率を超えてはならない。</h5>\n<h6 class=\"h-lv6\"><strong>ただし、</strong> ブロック単位の開発、都市再生区域、及び開発権移転（TDR）が適用される場合は、インセンティブにより最高容積率を<strong>最大０.５</strong>まで加算することができる。</h6>\n<hr class=\"sep\">\n<p>1. <strong>容積率算定の二重基準（第４７条）</strong>:</p>\n<p>ダッカ規則では、都市計画上の「地区別制限」と「接道状況による制限」の<strong>いずれか小さい方</strong>を基礎容積率とする。 日本の建築基準法でも、指定容積率と、前面道路幅員に一定の係数を乗じた数値の小さい方をとる仕組みになっており、計算のロジックが非常に類似している。</p>\n<p>2. <strong>バルコニーの定量的な突出制限（表４項番５）</strong>:</p>\n<p>バルコニーの面積制限として「道路面幅の３０％×幅１ｍ」という具体的な計算式を提示している。 日本の建築基準法ではバルコニーの先端から１ｍまでは建築面積に算入しないという「奥行き」主体の緩和だが、ダッカ規則は「壁面に対する比率」も加味しており、立面的な過密感の抑制を意図している。</p>\n<p>3. <strong>インセンティブによる容積率加算</strong>:</p>\n<p>マスタープランに基づく都市再生やTDRに対し、最大０.５の容積率加算を認めている。 日本の「特例容積率適用地区」や「総合設計制度」に相当するが、ダッカ規則では緩和の幅を「＋０.５」と具体的な定数で上限設定している点が実務上の透明性を高めている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における容積率（FAR）及びバルコニーの制限に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．地区別容積率が ３.５、接道別容積率が ３.０ である敷地において、特別なインセンティブを適用しない場合の「基礎容積率（Base FAR）」は ３.５ となる。</p>\n<p>２．都市再生区域における開発において、インセンティブを適用した場合、最高容積率（Maximum FAR）を最大で ０.５ 加算することができる。</p>\n<p>３．バルコニーを設置する場合、高さに関する制限はなく、１階の地盤面から直接立ち上がる形式であってもセットバック範囲外であれば認められる。</p>\n<p>４．道路に面しない側に設ける日よけは、建物本体から最大２.０ｍまで、建蔽率に算入せずに突出させることができる。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。第４７条第３項により、地区別と接道別の「いずれか小さい方」が基礎容積率となる。</p>\n<p><strong>2. 正しい。</strong> 第４７条第３項の但書きの規定通りである。</p>\n<p>2. 誤り。表４項番５により、バルコニーは地盤面から高さ ３.５０ｍ以上に設置しなければならない。</p>\n<p>3. 誤り。表４項番４により、道路面以外の日よけ等の突出上限は １.５ｍである。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13460","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৪৭। Floor Area Ratio (FAR) সূচক নির্ণয় (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(৪) আবাসিক ইমারত এবং আবাসিক ইমারতের সহিত মিশ্রণের ক্ষেত্র ব্যতীত মহাপরিকল্পনা অনুসরণপূর্বক শতভাগ অ-আবাসিক ক্ষেত্রফল বিশিষ্ট ইমারতের শ্রেণির জন্য ২ (দুই)টি FAR সূচকের পরিবর্তে কেবল উপ-বিধি ৮ অনুযায়ী রাস্তার প্রশস্ততা ভিত্তিতে FAR নির্ধারিত হইবে।</h5>\n<h5 class=\"h-lv5\">(৫) রোডভিত্তিক FAR নিম্নবর্ণিত সারণি-৫ অনুযায়ী নির্ধারিত হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\"><strong>সারণি-৫</strong></h6>\n<h6 class=\"h-lv6\"><strong>প্লট সংলগ্ন বিদ্যমান রাস্তার জন্য প্রযোজ্য FAR সূচক</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নং</th><th>ইমারতের শ্রেণি</th><th>ইমারতের উপ-শ্রেণি</th><th>ব্যবহারের ধরন</th><th>রাস্তার প্রশস্ততা সংশ্লিষ্ট অনুমোদনযোগ্য FAR সূচক</th><th></th><th></th><th></th><th></th><th></th><th></th><th></th><th></th></tr></thead>\n<tbody>\n<tr><td></td><td></td><td></td><td></td><td>১.৮ মিটার হইতে ২.৫ মিটারের কম</td><td>২.৫ মিটার হইতে ৩.৬৬ মিটারের কম</td><td>৩.৬৬ মিটার হইতে ৪.৮৮ মিটারের কম</td><td>৪.৮৮ মিটার</td><td>৬.০ মিটার</td><td>৯.০ মিটার</td><td>১২.০ মিটার</td><td>১৮.০ মিটার</td><td>২৪.০ মিটার বা তদূর্ধ্ব</td></tr>\n<tr><td>(১)</td><td>(২)</td><td>(৩)</td><td>(৪)</td><td>(৫)</td><td>(৬)</td><td>(৭)</td><td>(৮)</td><td>(৯)</td><td>(১০)</td><td>(১১)</td><td>(১২)</td><td>(১৩)</td></tr>\n<tr><td>১</td><td>A: আবাসিক (কেন্দ্রীয় ঢাকা)</td><td>A1</td><td>একক পরিবারবাড়ি</td><td>১.২৫</td><td>১.৫</td><td>১.৭৫</td><td>২.০</td><td>২.৫</td><td>৩.০</td><td>৩.২</td><td>৩.৭৫</td><td>৪.২৫</td></tr>\n<tr><td></td><td></td><td>A2</td><td>দুই পরিবারের বাড়ি</td><td>১.২৫</td><td>১.৫</td><td>১.৭৫</td><td>২.০</td><td>২.৫</td><td>৩.০</td><td>৩.২</td><td>৩.৭৫</td><td>৪.২৫</td></tr>\n<tr><td></td><td></td><td>A3</td><td>ফ্ল্যাট ও এ্যাপার্টমেন্ট বাড়ি</td><td>১.২৫</td><td>১.৭৫</td><td>২.০০</td><td>২.২৫</td><td>৩.২৫</td><td>৩.৪</td><td>৪.০</td><td>৪.২৫</td><td>৪.৭৫</td></tr>\n<tr><td></td><td></td><td>A4</td><td>মেস, ডরমিটরি, ও হোস্টেল</td><td>-</td><td>২.০</td><td>২.২৫</td><td>২.৫</td><td>৩.০</td><td>৩.৪</td><td>৪.০</td><td>৪.৫</td><td>৫.৫</td></tr>\n<tr><td></td><td></td><td>A5</td><td>হোটেল, সার্ভিস এপার্টমেন্ট</td><td>-</td><td>-</td><td>-</td><td>-</td><td>৪.০</td><td>৪.৫</td><td>৫.০</td><td>৬.০</td><td>৭.০ *NR</td></tr>\n<tr><td></td><td></td><td>A6</td><td>সাশ্রয়ী আবাসন</td><td>১.৫</td><td>২.০</td><td>২.২৫</td><td>২.৫</td><td>৩.০</td><td>৩.২৫</td><td>৩.৭৫</td><td>৪.০</td><td>৪.২৫</td></tr>\n<tr><td>২</td><td>A: আবাসিক (বহিঃস্থ নগর অঞ্চল)</td><td>A1</td><td>একক পরিবারের বাড়ি</td><td>১.০</td><td>১.২৫</td><td>১.৫</td><td>১.৭৫</td><td>২.২৫</td><td>২.৭৫</td><td>৩.২৫</td><td>৩.৫</td><td>৪.০</td></tr>\n<tr><td></td><td></td><td>A2</td><td>দুই পরিবারের বাড়ি</td><td>১.০</td><td>১.২৫</td><td>১.৫</td><td>১.৭৫</td><td>২.২৫</td><td>২.৭৫</td><td>৩.২৫</td><td>৩.৫</td><td>৪.০</td></tr>\n<tr><td></td><td></td><td>A3</td><td>ফ্ল্যাট ও এ্যাপার্টমেন্ট বাড়ি</td><td>১.২৫</td><td>১.৫</td><td>১.৭৫</td><td>২.০</td><td>২.৫</td><td>৩.০</td><td>৩.৫</td><td>৩.৭５</td><td>৪.২৫</td></tr>\n<tr><td></td><td></td><td>A4</td><td>মেস, ডরমিটরি, ও হোস্টেল</td><td>১.২৫</td><td>১.৭৫</td><td>২.০</td><td>২.২৫</td><td>২.৭৫</td><td>৩.২৫</td><td>৩.৭৫</td><td>৪.২৫</td><td>৪.৭৫</td></tr>\n<tr><td></td><td></td><td>A5</td><td>হোটেল, সার্ভিস এপার্টমেন্ট</td><td>-</td><td>-</td><td>-</td><td>-</td><td>৩.৭৫</td><td>৪.২৫</td><td>৪.৭৫</td><td>৫.৭৫</td><td>৬.৭৫</td></tr>\n<tr><td></td><td></td><td>A6</td><td>সাশ্রয়ী আবাসন</td><td>১.৫</td><td>১.৭৫</td><td>২.০</td><td>২.২৫</td><td>২.৭৫</td><td>৩.০</td><td>৩.৫</td><td>৩.৭৫</td><td>৪.০</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第４７条（容積率（FAR）指標の算定）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>４</strong>　住宅建築物及び住宅の用途を含む複合建築物を除く、都市計画（マスタープラン）に基づき延べ面積の１００パーセントを非住宅の用途に供する建築物にあっては、２つの容積率（FAR）指標を考慮することに代え、道路幅員のみを基準として容積率を決定するものとする。</h5>\n<h5 class=\"h-lv5\"><strong>５</strong>　道路幅員別容積率は、次の表５に定めるところによる。</h5>\n<h6 class=\"h-lv6\"><strong>表５：敷地に接する現存道路の幅員に基づく許容容積率（FAR）指標</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>建築物の分類</th><th>小分類</th><th>用途の類型</th><th>道路幅員に応じた許容容積率（FAR）指標</th><th></th><th></th><th></th><th></th><th></th><th></th><th></th><th></th></tr></thead>\n<tbody>\n<tr><td></td><td></td><td></td><td></td><td>1.8m以上 2.5m未満</td><td>2.5m以上 3.66m未満</td><td>3.66m以上 4.88m未満</td><td>4.88m以上</td><td>6.0m以上</td><td>9.0m以上</td><td>12.0m以上</td><td>18.0m以上</td><td>24.0m以上</td></tr>\n<tr><td><strong>1</strong></td><td><strong>用途 A：住宅（中央ダッカ）</strong></td><td><strong>A1</strong></td><td>戸建住宅（一世帯）</td><td>1.25</td><td>1.5</td><td>1.75</td><td>2.0</td><td>2.5</td><td>3.0</td><td>3.2</td><td>3.75</td><td>4.25</td></tr>\n<tr><td></td><td></td><td><strong>A2</strong></td><td>二世帯住宅</td><td>1.25</td><td>1.5</td><td>1.75</td><td>2.0</td><td>2.5</td><td>3.0</td><td>3.2</td><td>3.75</td><td>4.25</td></tr>\n<tr><td></td><td></td><td><strong>A3</strong></td><td>共同住宅</td><td>1.25</td><td>1.75</td><td>2.00</td><td>2.25</td><td>3.25</td><td>3.4</td><td>4.0</td><td>4.25</td><td>4.75</td></tr>\n<tr><td></td><td></td><td><strong>A4</strong></td><td>寄宿舎、ホステル</td><td>―</td><td>2.0</td><td>2.25</td><td>2.5</td><td>3.0</td><td>3.4</td><td>4.0</td><td>4.5</td><td>5.5</td></tr>\n<tr><td></td><td></td><td><strong>A5</strong></td><td>ホテル等</td><td>―</td><td>―</td><td>―</td><td>―</td><td>4.0</td><td>4.5</td><td>5.0</td><td>6.0</td><td>7.0 *NR</td></tr>\n<tr><td></td><td></td><td><strong>A6</strong></td><td>手頃な価格の住宅</td><td>1.5</td><td>2.0</td><td>2.25</td><td>2.5</td><td>3.0</td><td>3.25</td><td>3.75</td><td>4.0</td><td>4.25</td></tr>\n<tr><td><strong>2</strong></td><td><strong>用途 A：住宅（郊外都市区域）</strong></td><td><strong>A1</strong></td><td>戸建住宅（一世帯）</td><td>1.0</td><td>1.25</td><td>1.5</td><td>1.75</td><td>2.25</td><td>2.75</td><td>3.25</td><td>3.5</td><td>4.0</td></tr>\n<tr><td></td><td></td><td><strong>A2</strong></td><td>二世帯住宅</td><td>1.0</td><td>1.25</td><td>1.5</td><td>1.75</td><td>2.25</td><td>2.75</td><td>3.25</td><td>3.5</td><td>4.0</td></tr>\n<tr><td></td><td></td><td><strong>A3</strong></td><td>共同住宅</td><td>1.25</td><td>1.5</td><td>1.75</td><td>2.0</td><td>2.5</td><td>3.0</td><td>3.5</td><td>3.75</td><td>4.25</td></tr>\n<tr><td></td><td></td><td><strong>A4</strong></td><td>寄宿舎、ホステル</td><td>1.25</td><td>1.75</td><td>2.0</td><td>2.25</td><td>2.75</td><td>3.25</td><td>3.75</td><td>4.25</td><td>4.75</td></tr>\n<tr><td></td><td></td><td><strong>A5</strong></td><td>ホテル等</td><td>―</td><td>―</td><td>―</td><td>―</td><td>3.75</td><td>4.25</td><td>4.75</td><td>5.75</td><td>6.75</td></tr>\n<tr><td></td><td></td><td><strong>A6</strong></td><td>手頃な価格の住宅</td><td>1.5</td><td>1.75</td><td>2.0</td><td>2.25</td><td>2.75</td><td>3.0</td><td>3.5</td><td>3.75</td><td>4.0</td></tr>\n</tbody>\n</table></div>\n<p>*NR = 制限なし（Non-Restricted）</p>\n<hr class=\"sep\">\n<p>1. <strong>道路幅員による容積率の段階設定（表５）</strong>:</p>\n<p>ダッカ規則では、道路幅員に応じて細かいステップで容積率（FAR）が指定されている。日本の建築基準法では、前面道路幅員に一定の係数を乗じて算出される連続的な制限値となるが、ダッカ規則は「幅員の範囲」ごとに定数を割り当てる「階段状」の制限方式を採用している。</p>\n<p>2. <strong>地域による基準値の格差（中央 vs 郊外）</strong>:</p>\n<p>同じ「戸建住宅（A1）」であっても、中央ダッカと郊外都市区域では、同じ幅員の道路に面していても中央ダッカの方が容積率が高く設定されている。これは、都心部への高密度集積を法的に容認・促進する都市計画の反映である。</p>\n<p>3. <strong>「手頃な価格の住宅（A6）」への優遇措置</strong>:</p>\n<p>狭隘道路において、通常の住宅の容積率が 1.0〜1.25 であるのに対し、A6は一律 1.5 と高く設定されている。これは、低所得者向け住宅供給を促進するための法的な「ボーナス」として機能している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における容積率（FAR）の制限に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．中央ダッカ地区において、幅員 ３.０メートルの道路に面する戸建住宅（A1）を建築する場合、許容容積率（FAR）は １.৭৫ である。</p>\n<p>２．郊外都市区域において、共同住宅（A3）を建築する場合の容積率は、いかなる道路幅員であっても中央ダッカ地区の数値を超えることはない。</p>\n<p>３．ホテル（A5）を建築する場合、前面道路の幅員が ４.৮৮メートル 未満であれば、中央ダッカ及び郊外のいずれの区域においても容積率の指定がない（建築不可）。</p>\n<p>４．「手頃な価格の住宅（A6）」は、社会政策上の重要性から、中央ダッカ地区においては道路幅員に関わらず一律に容積率制限が適用されない（Non-Restricted）。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。表５の項番１により、2.5m以上3.66m未満の範囲に属するため、容積率は １.৫ である。</p>\n<p>2. 誤り。道路幅員 12.0m時、郊外（A3）は ３.৫、中央（A3）は ４.০。</p>\n<p><strong>3. 正しい。</strong> 表５の A5 の列を確認すると、4.88m以下の欄はすべて空欄となっており、6.0m以上の道路幅員が必須であることを示している。</p>\n<p>3. 誤り。A6 であっても表に基づき段階的な数値制限がある。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13461","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h6 class=\"h-lv6\"><strong>সারণি-৫ (চলমান)</strong></h6>\n<h6 class=\"h-lv6\"><strong>প্লট সংলগ্ন বিদ্যমান রাস্তার জন্য প্রযোজ্য FAR সূচক</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নং</th><th>ইমারতের শ্রেণি</th><th>ইমারতের উপ-শ্রেণি</th><th>ব্যবহারের ধরন</th><th>রাস্তার প্রশস্ততা সংশ্লিষ্ট অনুমোদনযোগ্য FAR সূচক</th><th></th><th></th><th></th><th></th><th></th><th></th><th></th><th></th></tr></thead>\n<tbody>\n<tr><td></td><td></td><td></td><td></td><td>১.৮ মিটার হইতে ২.৫ মিটারের কম</td><td>২.৫ মিটার হইতে ৩.৬৬ মিটারের কম</td><td>৩.৬৬ মিটার হইতে ৪.৮৮ মিটারের কম</td><td>৪.৮৮ মিটার</td><td>৬.০ মিটার</td><td>৯.০ মিটার</td><td>১২.০ মিটার</td><td>১৮.০ মিটার</td><td>২৪.০ মিটার বা তদূর্ধ্ব</td></tr>\n<tr><td>(১)</td><td>(২)</td><td>(৩)</td><td>(৪)</td><td>(৫)</td><td>(৬)</td><td>(৭)</td><td>(৮)</td><td>(৯)</td><td>(১০)</td><td>(১১)</td><td>(১২)</td><td>(১৩)</td></tr>\n<tr><td>৩</td><td>A: আবাসিক (অন্যান্য এলাকা)</td><td>A1</td><td>একক পরিবার বাড়ি</td><td>১.০</td><td>১.২৫</td><td>১.৫</td><td>১.৭৫</td><td>২.২৫</td><td>২.৭৫</td><td>৩.২৫</td><td>৩.৫</td><td>৪.০</td></tr>\n<tr><td></td><td></td><td>A2</td><td>দুই পরিবারের বাড়ি</td><td>১.০</td><td>১.২৫</td><td>১.৫</td><td>১.৭৫</td><td>২.২৫</td><td>২.৭৫</td><td>৩.২৫</td><td>৩.৫</td><td>৪.০</td></tr>\n<tr><td></td><td></td><td>A3</td><td>ফ্ল্যাট ও এ্যাপার্টমেন্ট বাড়ি</td><td>১.০</td><td>১.২৫</td><td>১.৫</td><td>১.৭৫</td><td>২.৩</td><td>২.৮</td><td>৩.৫</td><td>৪.০</td><td>৪.৫</td></tr>\n<tr><td></td><td></td><td>A4</td><td>মেস, বো ングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h6 class=\"h-lv6\"><strong>表５（承前）</strong></h6>\n<h6 class=\"h-lv6\"><strong>敷地に接する現存道路の幅員に基づく許容容積率（FAR）指標</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>建築物の用途分類</th><th>小分類</th><th>用途の形態</th><th>道路幅員に応じた許容容積率（FAR）指標</th><th></th><th></th><th></th><th></th><th></th><th></th><th></th><th></th></tr></thead>\n<tbody>\n<tr><td></td><td></td><td></td><td></td><td>1.8m以上 2.5m未満</td><td>2.5m以上 3.66m未満</td><td>3.66m以上 4.88m未満</td><td>4.88m以上</td><td>6.0m以上</td><td>9.0m以上</td><td>12.0m以上</td><td>18.0m以上</td><td>24.0m以上</td></tr>\n<tr><td>(1)</td><td>(2)</td><td>(3)</td><td>(4)</td><td>(5)</td><td>(6)</td><td>(7)</td><td>(8)</td><td>(9)</td><td>(10)</td><td>(11)</td><td>(12)</td><td>(13)</td></tr>\n<tr><td><strong>3</strong></td><td><strong>用途 A：住宅（その他の区域）</strong></td><td><strong>A1</strong></td><td>戸建住宅（一世帯）</td><td>1.0</td><td>1.25</td><td>1.5</td><td>1.75</td><td>2.25</td><td>2.75</td><td>3.25</td><td>3.5</td><td>4.0</td></tr>\n<tr><td></td><td></td><td><strong>A2</strong></td><td>二世帯住宅</td><td>1.0</td><td>1.25</td><td>1.5</td><td>1.75</td><td>2.25</td><td>2.75</td><td>3.25</td><td>3.5</td><td>4.0</td></tr>\n<tr><td></td><td></td><td><strong>A3</strong></td><td>共同住宅（アパートメント等）</td><td>1.0</td><td>1.25</td><td>1.5</td><td>1.75</td><td>2.3</td><td>2.8</td><td>3.5</td><td>4.0</td><td>4.5</td></tr>\n<tr><td></td><td></td><td><strong>A4</strong></td><td>寄宿舎、ドミトリー、ホステル</td><td>1.0</td><td>1.5</td><td>1.75</td><td>2.0</td><td>2.5</td><td>3.0</td><td>3.5</td><td>4.0</td><td>5.5</td></tr>\n<tr><td></td><td></td><td><strong>A5</strong></td><td>ホテル、モーテル、サービスアパートメント</td><td>―</td><td>―</td><td>―</td><td>―</td><td>3.5</td><td>4.0</td><td>5.5</td><td>6.5</td><td>7.0</td></tr>\n<tr><td></td><td></td><td><strong>A6</strong></td><td>手頃な価格の住宅 (Affordable Housing)</td><td>1.5</td><td>1.75</td><td>2.0</td><td>2.25</td><td>2.75</td><td>3.0</td><td>3.5</td><td>3.75</td><td>4.0</td></tr>\n<tr><td><strong>4</strong></td><td><strong>用途 B：教育施設</strong></td><td><strong>B1</strong></td><td>学校、カレッジ（第12学年まで）</td><td>―</td><td>―</td><td>―</td><td>―</td><td>2.5</td><td>3.0</td><td>3.5</td><td>4.0</td><td>4.5</td></tr>\n<tr><td></td><td></td><td><strong>B2</strong></td><td>大学、医科大学、研修所（第12学年超）</td><td>―</td><td>―</td><td>―</td><td>―</td><td>2.5</td><td>3.4</td><td>4.0</td><td>6.0</td><td>7.00, *NR</td></tr>\n<tr><td></td><td></td><td><strong>B3</strong></td><td>幼稚園・保育園（Pre-school）</td><td>―</td><td>―</td><td>―</td><td>2.0</td><td>2.5</td><td>3.0</td><td>3.5</td><td>4.5</td><td>5.5</td></tr>\n<tr><td><strong>5</strong></td><td><strong>用途 C：公衆福祉・矯正施設（Institutional）</strong></td><td><strong>C1</strong></td><td>乳幼児保育施設</td><td>―</td><td>―</td><td>2.0</td><td>2.5</td><td>3.0</td><td>3.4</td><td>4.0</td><td>5.0</td><td>6.0</td></tr>\n<tr><td></td><td></td><td><strong>C2</strong></td><td>高齢者福祉施設（身体機能維持者）</td><td>―</td><td>―</td><td>―</td><td>2.5</td><td>3.0</td><td>3.4</td><td>4.0</td><td>5.0</td><td>6.0</td></tr>\n<tr><td></td><td></td><td><strong>C3</strong></td><td>高齢者福祉施設（要介護者等）</td><td>―</td><td>―</td><td>―</td><td>―</td><td>2.0</td><td>3.4</td><td>4.0</td><td>5.0</td><td>6.0</td></tr>\n<tr><td></td><td></td><td><strong>C4</strong></td><td>児童自立支援施設、精神保健施設等</td><td>―</td><td>―</td><td>―</td><td>―</td><td>2.0</td><td>3.4</td><td>4.0</td><td>5.0</td><td>6.0, *NR</td></tr>\n</tbody>\n</table></div>\n<p>*NR = 制限なし（Non-Restricted）</p>\n<hr class=\"sep\">\n<p>1. <strong>教育施設および矯正施設の道路幅員要件（表５）</strong>:</p>\n<p>ダッカ規則では、第12学年までの学校（B1）や大学（B2）を建築する場合、前面道路幅員が最低でも「6.0メートル以上」であることが実質的な条件となっている（それ未満の欄が空欄）。日本の建築基準法でも、学校等の特殊建築物（法第2条第2号）に対し、地方自治体の条例（東京都建築安全条例等）で接道幅員制限（原則4m〜6m以上）が課されるが、ダッカ規則は全国一律の表として、より高い幅員要件を容積率とセットで規定している。</p>\n<p>2. <strong>高齢者施設における身体能力別の細分化（用途 C）</strong>:</p>\n<p>用途分類 C において、高齢者施設を「身体的に可能な者（C2）」と「身体的に可能でない者（C3）」で区分し、後者（要介護等）に対してより広い道路幅員（9.0m以上でようやく容積率 3.4 が発生）を求めている。これは、火災等の緊急避難時における車両アクセスや救助の困難性を、道路幅員と密度の制限によって法的に調整している。</p>\n<p>3. <strong>大学等の大規模施設における「制限なし（NR）」</strong>:</p>\n<p>道路幅員が 24.0メートル以上の場合、大学（B2）や矯正施設（C4）等に対し「NR（Non-Restricted / 制限なし）」のオプションを認めている。これは日本の「都市再生特別地区」や「特定ブロック」等で見られる容積率の個別緩和に近いが、道路インフラが十分な場合には大幅な高密度開発を許容する極端なインセンティブ制度といえる。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における容積率（FAR）の制限に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．住宅（その他の区域）において、幅員 2.0メートルの道路に面する「共同住宅（A3）」を建築する場合、許容容積率は 1.5 である。</p>\n<p>２．「大学（B2）」を建築する場合、前面道路の幅員が 4.88メートル であれば、容積率 2.5 の適用を受けることができる。</p>\n<p>３．「高齢者福祉施設（要介護者等・C3）」は、前面道路の幅員が 6.0メートル 未満の区域においては、容積率の指定がなく建築することができない。</p>\n<p>４．「幼稚園・保育園（B3）」に分類される建築物は、道路幅員が 18.0メートル以上 24.0メートル未満であれば、容積率 6.0 の適用を受けることができる。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。表５の項番３（A3）において、1.8m〜2.5m未満の欄を確認すると、容積率は 1.0 である。</p>\n<p>2. 誤り。表５の項番４（B2）において、4.88mの欄（Column 8）は空欄（―）であり、6.0m以上の道路が必要である。</p>\n<p><strong>3. 正しい。</strong> 表５の項番５（C3）を確認すると、4.88mまでの欄はすべて空欄（―）であり、6.0m以上の道路に面していなければ容積率が算定されない。</p>\n<p>3. 誤り。表５の項番４（B3）において、18.0mの欄（Column 12）を確認すると、容積率は 4.5 である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13462","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h6 class=\"h-lv6\"><strong>সারণি-৫ (চলমান)</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নং</th><th>ইমারতের শ্রেণি</th><th>ইমারতের উপ-শ্রেণি</th><th>ব্যবহারের ধরন</th><th>রাস্তার প্রশস্ততা সংশ্লিষ্ট অনুমোদনযোগ্য FAR সূচক</th><th></th><th></th><th></th><th></th><th></th><th></th><th></th><th></th></tr></thead>\n<tbody>\n<tr><td></td><td></td><td></td><td></td><td>১.৮ মিটার হইতে ২.৫ মিটারের কম</td><td>২.৫ মিটার হইতে ৩.৬৬ মিটারের কম</td><td>৩.৬৬ মিটার হইতে ৪.৮৮ মিটারের কম</td><td>৪.৮৮ মিটার</td><td>৬.০ মিটার</td><td>৯.০ মিটার</td><td>১২.০ মিটার</td><td>১৮.০ মিটার</td><td>২৪.০ মিটার বা তদূর্ধ্ব</td></tr>\n<tr><td></td><td></td><td>C5</td><td>বয়স্কদের জন্য কারাগার, মানসিক ও অন্যান্য পুনর্বাসন কেন্দ্র (Penal and mental institutions for adults)</td><td>-</td><td>-</td><td>-</td><td>-</td><td>২.০</td><td>৩.৪</td><td>৪.০</td><td>৫.০</td><td>৬.০ *NR</td></tr>\n<tr><td>৬</td><td>D: স্বাস্থ্য-সেবা</td><td>D1</td><td>সাধারণ স্বাস্থ্য-সেবা (হাসপাতাল, ক্লিনিক, মেডিকেল হাসপাতাল)</td><td>-</td><td>-</td><td>-</td><td>-</td><td>৩.০</td><td>৪.০</td><td>৪.৫</td><td>৫.৫০ *NR</td><td>৬.৫০ *NR</td></tr>\n<tr><td></td><td></td><td>D2</td><td>স্বাস্থ্য সেবা জরুরি অবস্থায় কার্যকর (হাসপাতাল, ক্লিনিক (দুর্যোগকালীন এবং পরবর্তী জরুরি ব্যবস্থাপনাসহ)</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>৪.০</td><td>৪.৫</td><td>৫.৫০ *NR</td><td>৬.৫০ *NR</td></tr>\n<tr><td></td><td></td><td>D3</td><td>ডক্টর চেম্বার, ডায়াগনস্টিক ল্যাব, প্যাথলজি ল্যাব (বেড ব্যতীত)</td><td>-</td><td>-</td><td>-</td><td>১.৫</td><td>২.৫</td><td>৩.০</td><td>৩.৫</td><td>৪.০</td><td>৪.৫</td></tr>\n<tr><td>৭</td><td>E: ব্যবসা</td><td>E1</td><td>অফিস</td><td>-</td><td>-</td><td>-</td><td>১.২</td><td>২.০</td><td>৩.০</td><td>৪.০</td><td>৫.৫</td><td>৬.৫০ *NR</td></tr>\n<tr><td></td><td></td><td>E2</td><td>গবেষণা ও পরীক্ষাগার (রিসার্চ প্রতিষ্ঠান জাতীয় স্থাপনা)</td><td>-</td><td>-</td><td>-</td><td>-</td><td>২.৫</td><td>৩.০</td><td>৪.০</td><td>৫.০</td><td>৬.০</td></tr>\n<tr><td></td><td></td><td>E3</td><td>নিত্য প্রয়োজনীয় অন্যান্য সেবা (ব্যাংক, পোস্ট অফিস ও সমজাতীয়)</td><td>-</td><td>-</td><td>-</td><td>১.২</td><td>২.০</td><td>৩.০</td><td>৪.০</td><td>৫.৫</td><td>৬.৫০ *NR</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h6 class=\"h-lv6\"><strong>表５（承前）</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>建築物の用途分類</th><th>小分類</th><th>用途の形態</th><th>道路幅員に応じた許容容積率（FAR）指標</th><th></th><th></th><th></th><th></th><th></th><th></th><th></th><th></th></tr></thead>\n<tbody>\n<tr><td></td><td></td><td></td><td></td><td>1.8m以上 2.5m未満</td><td>2.5m以上 3.66m未満</td><td>3.66m以上 4.88m未満</td><td>4.88m以上</td><td>6.0m以上</td><td>9.0m以上</td><td>12.0m以上</td><td>18.0m以上</td><td>24.0m以上</td></tr>\n<tr><td></td><td></td><td><strong>C5</strong></td><td>成人向け矯正施設、精神保健施設、その他リハビリテーションセンター</td><td>―</td><td>―</td><td>―</td><td>―</td><td>2.0</td><td>3.4</td><td>4.0</td><td>5.0</td><td>6.0 *NR</td></tr>\n<tr><td><strong>6</strong></td><td><strong>用途 D：医療施設</strong></td><td><strong>D1</strong></td><td>一般医療施設（病院、クリニック、医科大学附属病院）</td><td>―</td><td>―</td><td>―</td><td>―</td><td>3.0</td><td>4.0</td><td>4.5</td><td>5.50 *NR</td><td>6.50 *NR</td></tr>\n<tr><td></td><td></td><td><strong>D2</strong></td><td>災害時緊急対応医療施設（病院、クリニック、災害時及び災害後の緊急管理体制を含む）</td><td>―</td><td>―</td><td>―</td><td>―</td><td>―</td><td>4.0</td><td>4.5</td><td>5.50 *NR</td><td>6.50 *NR</td></tr>\n<tr><td></td><td></td><td><strong>D3</strong></td><td>診療所、診断ラボ、病理ラボ（病床を有しないもの）</td><td>―</td><td>―</td><td>―</td><td>1.5</td><td>2.5</td><td>3.0</td><td>3.5</td><td>4.0</td><td>4.5</td></tr>\n<tr><td><strong>7</strong></td><td><strong>用途 E：事務所・業務施設</strong></td><td><strong>E1</strong></td><td>事務所（オフィス）</td><td>―</td><td>―</td><td>―</td><td>1.2</td><td>2.0</td><td>3.0</td><td>4.0</td><td>5.5</td><td>6.50 *NR</td></tr>\n<tr><td></td><td></td><td><strong>E2</strong></td><td>研究所、試験場（国家機関等の研究施設）</td><td>―</td><td>―</td><td>―</td><td>―</td><td>2.5</td><td>3.0</td><td>4.0</td><td>5.0</td><td>6.0</td></tr>\n<tr><td></td><td></td><td><strong>E3</strong></td><td>日常利便サービス施設（銀行、郵便局、その他これらに類するもの）</td><td>―</td><td>―</td><td>―</td><td>1.2</td><td>2.0</td><td>3.0</td><td>4.0</td><td>5.5</td><td>6.50 *NR</td></tr>\n</tbody>\n</table></div>\n<p>*NR = 制限なし（Non-Restricted）</p>\n<p>1. <strong>特定用途における道路幅員要件の厳格化（用途 D）</strong>:</p>\n<p>ダッカ規則では、一般病院（D1）や緊急医療施設（D2）を建築する場合、前面道路幅員が原則として<strong>6.0メートル以上</strong>（D2の場合は9.0メートル以上）でなければ容積率が割り当てられない仕組みとなっている。日本の建築基準法では、病院等の特殊建築物（法第2条第2号）に対し、地方自治体の条例等で接道幅員制限が課されるが、ダッカ規則は全国一律の表として、より高水準なインフラ要件を直接的に規定している。</p>\n<p>2. <strong>災害対応能力の評価（用途 D2）</strong>:</p>\n<p>災害時対応医療施設（D2）に対し、一般病院（D1）よりも広い道路幅員（9.0m以上）を求めている。これは、緊急車両の通行やトリアージスペースの確保を想定した「都市の強靭化」を、容積率という形態規制を通じて法的に担保しようとするものであり、日本の単体規定としての病院規制よりも都市計画的な性格が強い。</p>\n<p>3. <strong>大規模道路沿いにおける制限撤廃（NR）</strong>:</p>\n<p>道路幅員が18.0メートル又は24.0メートルを超える場合、医療施設や事務所（E1）に対し、容積率の絶対値に加えて<strong>「NR（制限なし）」</strong>のオプションを付与している。これは日本の「容積率の最高限度の特例（法第52条第14項等）」に近いが、特定の用途（医療等）について、インフラが十分な場合には事実上の高容積開発を無条件に近い形で許容する積極的な誘導策といえる。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における容積率（FAR）の制限に関する次の記述のうち、正しいものはどれか。</strong> １．前面道路の幅員が 5.0メートル である敷地において、病床を有しない「診療所（D3）」を建築する場合、許容容積率は 2.5 である。</p>\n<p>２．災害時緊急対応医療施設（D2）は、前面道路の幅員が 6.0メートル 以上 9.0メートル 未満の範囲においては、容積率の指定があり建築が可能である。</p>\n<p>３．銀行や郵便局などの「日常利便サービス施設（E3）」を建築する場合、道路幅員が 4.88メートル であれば 1.2 の容積率が適用される。</p>\n<p>４．一般医療施設（D1）を建築する場合、前面道路の幅員が 12.0メートル 以上であれば、常に容積率の制限が撤廃（Non-Restricted）される。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong> 1. 誤り。表5のD3（項番6）において、4.88m以上6.0m未満の欄を確認すると、容積率は <strong>1.5</strong> である。</p>\n<p>2. 誤り。D2は道路幅員 <strong>9.0メートル以上</strong>（Column 10）からしか数値が設定されていないため、6.0m道路では建築不可である。</p>\n<p><strong>3. 正しい。</strong> E3（項番7）において、4.88mの欄（Column 8）には <strong>1.2</strong> と明記されている。</p>\n<p>4. 誤り。D1で制限なし（NR）が適用されるのは、道路幅員が <strong>18.0メートル以上</strong>（Column 12）からである。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13463","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h6 class=\"h-lv6\"><strong>সারণি-৫ (চলমান)</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নং</th><th>ইমারতের শ্রেণি</th><th>ইমারতের উপ-শ্রেণি</th><th>ব্যবহারের ধরন</th><th>রাস্তার প্রশস্ততা সংশ্লিষ্ট অনুমোদনযোগ্য FAR সূচক</th><th></th><th></th><th></th><th></th><th></th><th></th><th></th><th></th></tr></thead>\n<tbody>\n<tr><td></td><td></td><td></td><td></td><td>১.৮ মিটার হইতে ২.৫ মিটারের কম</td><td>২.৫ মিটার হইতে ৩.৬৬ মিটারের কম</td><td>৩.৬৬ মিটার হইতে ৪.৮৮ মিটারের কম</td><td>৪.৮৮ মিটার</td><td>৬.০ মিটার</td><td>৯.০ মিটার</td><td>১২.০ মিটার</td><td>১৮.০ মিটার</td><td>২৪.০ মিটার বা তদূর্ধ্ব</td></tr>\n<tr><td>(১)</td><td>(২)</td><td>(৩)</td><td>(৪)</td><td>(৫)</td><td>(৬)</td><td>(৭)</td><td>(৮)</td><td>(৯)</td><td>(১০)</td><td>(১১)</td><td>(১২)</td><td>(১৩)</td></tr>\n<tr><td>৮</td><td>F: বাণিজ্যিক</td><td 月１４日</strong></p>\n<h6 class=\"h-lv6\"><strong>表５（承前）</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>建築物の用途分類</th><th>小分類</th><th>用途の形態</th><th>道路幅員に応じた許容容積率（FAR）指標</th><th></th><th></th><th></th><th></th><th></th><th></th><th></th><th></th></tr></thead>\n<tbody>\n<tr><td></td><td></td><td></td><td></td><td>1.8m以上 2.5m未満</td><td>2.5m以上 3.66m未満</td><td>3.66m以上 4.88m未満</td><td>4.88m以上</td><td>6.0m以上</td><td>9.0m以上</td><td>12.0m以上</td><td>18.0m以上</td><td>24.0m以上</td></tr>\n<tr><td>(1)</td><td>(2)</td><td>(3)</td><td>(4)</td><td>(5)</td><td>(6)</td><td>(7)</td><td>(8)</td><td>(9)</td><td>(10)</td><td>(11)</td><td>(12)</td><td>(13)</td></tr>\n<tr><td><strong>8</strong></td><td><strong>用途 F：商業施設</strong></td><td><strong>F1</strong></td><td>小規模店舗及び市場（延べ面積 300㎡未満）</td><td>―</td><td>―</td><td>―</td><td>1.0</td><td>1.75</td><td>2.0</td><td>2.25</td><td>2.5</td><td>2.75</td></tr>\n<tr><td></td><td></td><td><strong>F2</strong></td><td>大規模店舗及び市場（延べ面積 300㎡以上）</td><td>―</td><td>―</td><td>―</td><td>―</td><td>―</td><td>2.0</td><td>3.0</td><td>4.0</td><td>4.5</td></tr>\n<tr><td></td><td></td><td><strong>F3</strong></td><td>ガソリンスタンド（フィリングステーション）</td><td>―</td><td>―</td><td>―</td><td>―</td><td>―</td><td>―</td><td>1.25</td><td>1.5</td><td>1.75</td></tr>\n<tr><td><strong>9</strong></td><td><strong>用途 G：工場</strong></td><td><strong>G1</strong></td><td>低汚染・低危険性工場及び家内工業</td><td>―</td><td>―</td><td>―</td><td>―</td><td>―</td><td>3.0</td><td>4.0</td><td>4.5</td><td>5.5</td></tr>\n<tr><td></td><td></td><td><strong>G2</strong></td><td>一般汚染性工場</td><td>―</td><td>―</td><td>―</td><td>―</td><td>―</td><td>3.0</td><td>4.0</td><td>4.5</td><td>5.0</td></tr>\n<tr><td><strong>10</strong></td><td><strong>用途 H：倉庫</strong></td><td><strong>H1</strong></td><td>低可燃性物資倉庫</td><td>―</td><td>―</td><td>―</td><td>―</td><td>1.0</td><td>2.0</td><td>2.5</td><td>3.5</td><td>4.5</td></tr>\n<tr><td></td><td></td><td><strong>H2</strong></td><td>一般可燃性物資倉庫</td><td>―</td><td>―</td><td>―</td><td>―</td
