<!-- 游ゴシック / Yu Gothic はiOS・macOS・Windowsのシステムフォント。外部読み込み不要 -->
<style>
:root {
  --bg:       #f5f4f0;
  --surface:  #ffffff;
  --border:   #d8d4cc;
  --accent:   #1a4c8b;
  --accent2:  #b05e00;
  --text:     #1a1a1a;
  --text-sub: #555;
  --toc-bg:   #f0eeea;
  --toc-w:    280px;
  --header-h: 56px;
  --font-jp:  'YuGothic', 'Yu Gothic', '游ゴシック', -apple-system, 'Helvetica Neue', sans-serif;
  --font-bn:  'Noto Sans Bengali', 'YuGothic', 'Yu Gothic', sans-serif;
  --font-mono: ui-monospace, 'SF Mono', 'Menlo', 'Consolas', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-jp);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.9;
}

/* ─── HEADER ─── */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--header-h);
  background: var(--accent);
  display: flex; align-items: center; gap: 16px;
  padding: 0 20px;
  box-shadow: 0 2px 6px rgba(0,0,0,.25);
}
#header .site-title {
  color: #fff; font-size: 13px; font-weight: 600;
  line-height: 1.3; flex: 1;
}
#header .site-title span { display: block; }
#header .site-title .sub { font-size: 11px; opacity: .75; font-weight: 400; font-family: var(--font-bn); }

.lang-toggle {
  display: flex; align-items: center; gap: 0;
  border: 1.5px solid rgba(255,255,255,.5); border-radius: 6px; overflow: hidden;
}
.lang-btn {
  padding: 5px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: none; background: transparent; color: rgba(255,255,255,.65);
  transition: background .15s, color .15s;
  font-family: var(--font-mono);
}
.lang-btn.active { background: #fff; color: var(--accent); }

#toc-toggle-btn {
  display: none;
  background: transparent; border: none;
  color: #fff; cursor: pointer; padding: 6px;
  font-size: 20px; line-height: 1;
}

/* ─── LAYOUT ─── */
#layout {
  display: flex;
  padding-top: var(--header-h);
  min-height: 100vh;
}

/* ─── TOC ─── */
#toc {
  width: var(--toc-w); flex-shrink: 0;
  background: var(--toc-bg);
  border-right: 1px solid var(--border);
  position: fixed; top: var(--header-h); bottom: 0;
  overflow-y: auto; overflow-x: hidden;
  padding: 16px 0 40px;
  transition: transform .25s ease;
  z-index: 50;
}
#toc::-webkit-scrollbar { width: 4px; }
#toc::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.toc-section-label {
  font-size: 10px; font-weight: 600; letter-spacing: .08em;
  color: var(--text-sub); text-transform: uppercase;
  padding: 14px 16px 4px; font-family: var(--font-mono);
}

.toc-item {
  display: block; width: 100%;
  padding: 5px 16px 5px calc(16px + var(--indent, 0px));
  font-size: 12.5px; line-height: 1.4; color: var(--text);
  text-decoration: none; border: none; background: none;
  cursor: pointer; text-align: left;
  transition: background .1s;
  border-left: 3px solid transparent;
  font-family: var(--font-jp);
}
.toc-item[data-level="2"] { --indent: 0px; font-weight: 600; font-size: 12px; color: var(--accent); }
.toc-item[data-level="3"] { --indent: 8px; font-weight: 600; font-size: 12px; }
.toc-item[data-level="4"] { --indent: 18px; font-size: 11.5px; color: var(--text-sub); }
.toc-item:hover { background: rgba(0,0,0,.05); }
.toc-item.active { background: #e8eef6; border-left-color: var(--accent); color: var(--accent); font-weight: 600; }
.toc-item.active[data-level="4"] { color: var(--accent); }

/* Bengali TOC labels */
body.lang-bn .toc-item { font-family: var(--font-bn); }

/* ─── MAIN CONTENT ─── */
#main {
  margin-left: var(--toc-w);
  flex: 1; padding: 0 0 60px;
  min-width: 0;
}

/* ─── PAGE VIEW ─── */
.page-view {
  display: none;
  max-width: 860px; margin: 0 auto; padding: 32px 40px;
}
.page-view.active { display: block; }

.page-header {
  display: flex; align-items: center; gap: 12px;
  padding-bottom: 12px; margin-bottom: 24px;
  border-bottom: 2px solid var(--accent);
}
.page-num-badge {
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  color: #fff; background: var(--accent);
  padding: 3px 10px; border-radius: 3px; letter-spacing: .05em;
}
.page-gazette {
  font-size: 11.5px; color: var(--text-sub);
  font-family: var(--font-bn);
}
body:not(.lang-bn) .page-gazette { font-family: var(--font-jp); font-size: 11px; }

/* ─── CONTENT TYPOGRAPHY ─── */
.content { font-family: var(--font-jp); }
body.lang-bn .content { font-family: var(--font-bn); font-size: 14.5px; }

.content h2.h-lv2 {
  font-size: 14px; font-weight: 600; letter-spacing: .03em;
  color: var(--accent); text-transform: none;
  padding: 20px 0 4px; margin-bottom: 2px;
  border-top: 1px solid var(--border);
}
.content h3.h-lv3 {
  font-size: 14px; font-weight: 600;
  color: var(--accent2);
  padding: 14px 0 4px;
}
.content h4.h-lv4 {
  font-size: 15px; font-weight: 600;
  color: var(--text);
  margin: 18px 0 8px;
  padding-left: 10px;
  border-left: 3px solid var(--accent);
}
.content h5.h-lv5 {
  font-size: 14.5px; font-weight: 400;
  margin: 7px 0 5px; padding-left: 20px;
  color: var(--text);
}
.content h6.h-lv6 {
  font-size: 14px; font-weight: 400;
  margin: 5px 0; padding-left: 36px;
  color: var(--text);
}
.content p {
  font-size: 14.5px; margin: 6px 0 6px 20px;
  color: var(--text);
}
.content p.list-item { padding-left: 36px; text-indent: -14px; }
.content hr.sep { border: none; border-top: 1px dashed var(--border); margin: 16px 0; }

/* ─── TABLE ─── */
.content .table-wrap {
  overflow-x: auto; margin: 16px 0;
  border: 1px solid var(--border); border-radius: 4px;
}
.content table {
  width: 100%; border-collapse: collapse;
  font-size: 12px;
}
.content table thead tr { background: var(--accent); color: #fff; }
.content table th {
  padding: 8px 10px; font-weight: 600; text-align: left;
  border-right: 1px solid rgba(255,255,255,.2);
}
.content table td {
  padding: 7px 10px; border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  vertical-align: top;
}
.content table tbody tr:nth-child(even) { background: #f7f6f3; }
.content table tbody tr:hover { background: #eef2f8; }
.content .math { font-family: var(--font-mono); background: #f0f0f0; padding: 1px 5px; border-radius: 3px; }

/* ─── PAGE NAV ─── */
.page-nav {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 40px 0; max-width: 860px; margin: 0 auto;
  border-top: 1px solid var(--border);
}
.nav-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; font-size: 13px; font-weight: 500;
  color: var(--accent); border: 1.5px solid var(--accent);
  border-radius: 4px; cursor: pointer; background: none;
  text-decoration: none; transition: all .15s;
  font-family: var(--font-jp);
}
.nav-btn:hover { background: var(--accent); color: #fff; }
.nav-btn:disabled { opacity: .3; cursor: default; }
.nav-btn:disabled:hover { background: none; color: var(--accent); }
.page-pos { font-family: var(--font-mono); font-size: 12px; color: var(--text-sub); }

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  :root { --toc-w: 260px; }
  #toc { transform: translateX(-100%); }
  #toc.open { transform: translateX(0); box-shadow: 4px 0 20px rgba(0,0,0,.15); }
  #main { margin-left: 0; }
  #toc-toggle-btn { display: block; }
  .page-view { padding: 20px 16px; }
  .page-nav { padding: 20px 16px 0; }
  #toc-overlay {
    display: none; position: fixed; inset: 0; z-index: 40;
    background: rgba(0,0,0,.35);
  }
  #toc-overlay.show { display: block; }
}

  /* iOS Safe Area (ノッチ・ホームバー対応) */
  @supports (padding-top: env(safe-area-inset-top)) {
    #header {
      padding-top: env(safe-area-inset-top);
      height: calc(var(--header-h) + env(safe-area-inset-top));
    }
    #layout {
      padding-top: calc(var(--header-h) + env(safe-area-inset-top));
    }
    #toc {
      top: calc(var(--header-h) + env(safe-area-inset-top));
    }
    #main {
      padding-bottom: calc(60px + env(safe-area-inset-bottom));
    }
    .page-nav {
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }
    #pwa-banner {
      padding-bottom: calc(20px + env(safe-area-inset-bottom)) !important;
    }
  }
  /* スタンドアロン時のヘッダー調整 */
  @media (display-mode: standalone) {
    body { -webkit-user-select: none; user-select: none; }
    .content { -webkit-user-select: text; user-select: text; }
  }

</style>
</head>

  <div class="site-title">

<script>
(function(){
  const PAGES = [{"num":"13409","bn":"<h2 class=\"h-lv2\">১ম অধ্যায়</h2>\n<h3 class=\"h-lv3\">প্রারম্ভিক</h3>\n<h4 class=\"h-lv4\"><strong>১। শিরোনাম, প্রয়োগ ও প্রবর্তন।</strong></h4>\n<h5 class=\"h-lv5\">(১) এই বিধিমালা ঢাকা মহানগর ইমারত বিধিমালা, ২০২৫ নামে অভিহিত হইবে।</h5>\n<h5 class=\"h-lv5\">(২) ইহা Town Improvement Act, 1953 (Act No. XIII of 1953) এর আওতাভুক্ত ঢাকা মহানগর মহাপরিকল্পনাভুক্ত (Master Plan) এলাকার জন্য প্রযোজ্য হইবে।</h5>\n<h5 class=\"h-lv5\">(৩) ইহা অবিলম্বে কার্যকর হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>২। সংজ্ঞা।</strong></h4>\n<h5 class=\"h-lv5\">বিষয় বা প্রসঙ্গের পরিপন্থী কোনো কিছু না থাকিলে, এই বিধিমালায়—</h5>\n<h6 class=\"h-lv6\">(১) “অনুমোদিত নকশা” অর্থ Bangladesh National Building Code, 2020 এবং এতদসংক্রান্ত প্রচলিত অন্যান্য বিধি-বিধান অনুযায়ী যথাযথ কর্তৃপক্ষ কর্তৃক অনুমোদিত নকশা;</h6>\n<hr class=\"sep\">","jp":"<h2 class=\"h-lv2\">第１編 [PART I]</h2>\n<h3 class=\"h-lv3\">序論 [Preliminary]</h3>\n<h4 class=\"h-lv4\">第１条　名称、適用及び施行 [Short Title, Application and Commencement]</h4>\n<h5 class=\"h-lv5\">１　本規則は、ダッカ首都圏建築規則2025（Dhaka Metropolitan Building Rules, 2025）と称する。</h5>\n<h5 class=\"h-lv5\">２　本規則は、1953年都市改良法（1953年法律第13号）に基づき策定されたダッカ首都圏マスタープランの対象区域内に適用する。</h5>\n<h5 class=\"h-lv5\">３　本規則は直ちに施行する。</h5>\n<h4 class=\"h-lv4\">第２条　用語の定義 [Definitions]</h4>\n<h5 class=\"h-lv5\">本規則において、文脈上別段の解釈を要する場合を除き、次の用語の定義は、それぞれ当該各号に定めるところによる。</h5>\n<h6 class=\"h-lv6\">（１）「承認図 [Approved Design]」とは、2020年バングラデシュ国家建築法典（BNBC 2020）及び関連法令に従い、所管行政庁によって承認された図面をいう。</h6>"},{"num":"13410","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>২। সংজ্ঞা (চলমান)</strong></h4>\n<h5 class=\"h-lv5\"><strong>(২)</strong> <strong>\"অথরাইজড অফিসার\"</strong> অর্থ Building Construction Act, 1952 এর section 2 এর clause (a)-তে বর্ণিত Authorised Officer;</h5>\n<h5 class=\"h-lv5\"><strong>(৩)</strong> <strong>\"অঙ্গন\"</strong> বা <strong>\"আঙিনা\"</strong> অর্থ ভূমিতে অবস্থিত ইমারত দ্বারা সম্পূর্ণ বা আংশিকভাবে বেষ্টিত স্থায়ীভাবে উন্মুক্ত কোনো পরিসর;</h5>\n<h5 class=\"h-lv5\"><strong>(৪)</strong> <strong>\"অগ্নি নিরাপদ সিঁড়ি”</strong> অর্থ বিভিন্ন তলা হইতে ল্যান্ডিং বা লবি দ্বারা সংযোজিত অগ্নি-নিরোধক উপকরণ দ্বারা নির্মিত সিঁড়ি, যাহা অগ্নি-প্রতিরোধক দরজার মাধ্যমে ইমারত বা অন্যান্য ব্যবহারিক এলাকা হইতে সুরক্ষিত এবং ইমারতের বহির্ভাগে খোলা স্থানের সহিত উন্মুক্ত থাকিবে;</h5>\n<h5 class=\"h-lv5\"><strong>(৫)</strong> <strong>“অগ্নি-প্রতিরোধক দরজা\"</strong> অর্থ বিশেষভাবে তৈরি দরজা (Fire Grade) যাহা নির্দিষ্ট সময়ের জন্য তাপ ও আগুন সঞ্চালনের প্রতিরোধক হিসাবে কাজ করে;</h5>\n<h5 class=\"h-lv5\"><strong>(৬)</strong> <strong>\"অকুপেন্সি টাইপ\"</strong> অর্থ পরিশিষ্ট-৩ এ নির্ধারিত ইমারতের ব্যবহারভিত্তিক শ্রেণিবিন্যাস এবং উক্ত নির্ধারিত ধরনের ব্যবহারের সহিত সংশ্লিষ্ট আনুষঙ্গিক ব্যবহারও ইহার অন্তর্ভুক্ত হইবে; তবে এক্ষেত্রে কোনো অস্পষ্টতা নিরসরণকল্পে কোড অনুসরণ করিতে হইবে;</h5>\n<h5 class=\"h-lv5\"><strong>(৭)</strong> <strong>\"আইন”</strong> অর্থ Building Construction Act, 1952 (Act No. II of 1953);</h5>\n<h5 class=\"h-lv5\"><strong>(৮)</strong> <strong>\"আবেদন”</strong> অর্থ এই বিধিমালার অধীন কোনো আবেদন;</h5>\n<h5 class=\"h-lv5\"><strong>(৯)</strong> <strong>\"আবেদনকারী\"</strong> অর্থ সংশ্লিষ্ট ভূমির বৈধ মালিক অথবা ভূমির বৈধ মালিক কর্তৃক আমমোক্তারনামা বলে আবেদনকারী হিসাবে নিযুক্ত ব্যক্তি অথবা প্রতিষ্ঠান;</h5>\n<h5 class=\"h-lv5\"><strong>(১০)</strong> <strong>\"আবেদন ফি\"</strong> অর্থ এই বিধিমালার অধীন সেবাগ্রহীতা কর্তৃক দাখিলকৃত আবেদনের ফি;</h5>\n<h5 class=\"h-lv5\"><strong>(১১)</strong> <strong>\"আচ্ছাদিত স্থান\"</strong> অর্থ ইমারত দ্বারা ভূমিতলসহ উপরিভাগের আচ্ছাদিত ক্ষেত্র, যাহা প্রিন্থ স্তরের ঠিক পরবর্তী স্তর বা তলা, তবে নিম্নবর্ণিত স্থানসমূহ ইহার অন্তর্ভুক্ত হইবে না, যথা:-</h5>\n<h6 class=\"h-lv6\"><strong>(ক)</strong> বাগান, পারগোলা, তরুশালা, জলাশয়, সুইমিংপুল (অনাচ্ছাদিত), গাছের নিচের বেদী, জলাধার, ফোয়ারা এবং আসন;</h6>\n<h6 class=\"h-lv6\"><strong>(খ)</strong> জলনির্গমন ব্যবস্থা, কালভার্ট, সেপটিক ট্যাংক, সোক পিট;</h6>\n<h6 class=\"h-lv6\"><strong>(গ)</strong> সীমানা প্রাচীর ও ফটক, পোর্চ, র‍্যাম্প, উন্মুক্ত সিঁড়ি (গ্রাউন্ড ফ্লোর), গার্ডরুম, বিচ্ছিন্ন পাম্প হাউস (বৃহৎ শিল্প, এ্যাপার্টমেন্ট কমপ্লেক্স, ইত্যাদি) গার্বেজ সুট, অনাচ্ছাদিত যেকোনো ইউটিলিটি স্ট্রাকচার, কার্নিশ এবং সানসেড কর্তৃক আচ্ছাদিত স্থান;</h6>\n<h5 class=\"h-lv5\"><strong>(১২)</strong> <strong>\"আপিল কমিটি\"</strong> অর্থ বিধি ৩১ এর অধীন গঠিত আপিল কমিটি;</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第２条（用語の定義）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>２</strong>　<strong>「建築主事（Authorised Officer）」</strong>とは、１９５２年建築建設法（Building Construction Act, 1952）第２条第ａ項に規定する建築主事をいう。</h5>\n<h5 class=\"h-lv5\"><strong>３</strong>　<strong>「中庭（Courtyard / Angon / Angina）」</strong>とは、地盤面に位置する建築物によって全面的又は部分的に囲まれた、恒久的な開放空間をいう。</h5>\n<h5 class=\"h-lv5\"><strong>４</strong>　<strong>「避難階段（Fire Escape Stair）」</strong>とは、各階から踊場又はロビーによって連結された耐火材料で造られた階段であって、防火戸等によって建築物又はその他の用途部分から保護され、かつ、建築物の外部の開放された場所に直接通じているものをいう。</h5>\n<h5 class=\"h-lv5\"><strong>５</strong>　<strong>「防火戸（Fire-resistant Door）」</strong>とは、一定の時間、熱及び火災の延焼を遮断するように特別に製作された戸（耐火等級（Fire Grade））をいう。</h5>\n<h5 class=\"h-lv5\"><strong>６</strong>　<strong>「用途の類型（Occupancy Type）」</strong>とは、付録３に規定する建築物の用途別分類をいい、当該用途に附随する附属的な用途を含むものとする。ただし、疑義がある場合は、法典（BNBC）に従わなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>７</strong>　<strong>「法（Act）」</strong>とは、１９５２年建築建設法（１９５３年法律第２号）をいう。</h5>\n<h5 class=\"h-lv5\"><strong>８</strong>　<strong>「申請（Application）」</strong>とは、この規則に基づく申請をいう。</h5>\n<h5 class=\"h-lv5\"><strong>９</strong>　<strong>「申請者（Applicant）」</strong>とは、当該敷地の適法な所有者、又は適法な所有者から委任状により申請者として選任された者若しくは法人をいう。</h5>\n<h5 class=\"h-lv5\"><strong>１０</strong>　<strong>「申請手数料（Application Fee）」</strong>とは、この規則に基づきサービス受給者が納付する申請手数料をいう。</h5>\n<h5 class=\"h-lv5\"><strong>１１</strong>　<strong>「建築面積（被覆面積 / Covered Area / Acchadito sthan）」</strong>とは、建築物によって地盤面を含む上部が覆われた区域であって、基礎（Plinth）面の直上の階に位置するものをいう。ただし、次に掲げる場所は、これに含まないものとする。</h5>\n<h6 class=\"h-lv6\"><strong>ａ</strong>　庭園、パーゴラ、温室、水域、屋外水泳プール、樹木下のベンチ、貯水槽、噴水及び座席</h6>\n<h6 class=\"h-lv6\"><strong>ｂ</strong>　排水施設、カルバート、浄化槽、浸透桝</h6>\n<h6 class=\"h-lv6\"><strong>ｃ</strong>　境界塀及び門、ポーチ、車いす用スロープ、屋外階段（１階部分）、守衛室、独立したポンプ室（大規模工場、共同住宅等）、ダストシュート、覆いのない設備構造物、軒蛇腹（Cornice）及び庇（Sunshade）によって覆われた場所</h6>\n<h5 class=\"h-lv5\"><strong>１２</strong>　<strong>「不服審査委員会（Appellate Committee）」</strong>とは、第３１条の規定に基づき設置された不服審査委員会をいう。</h5>\n<hr class=\"sep\">\n<p>1. <strong>「建築面積」の算定除外項目の詳細性（第２条第１１号）</strong>:</p>\n<p>ダッカ規則では、建築面積（Covered Area）の算定から除外される項目が極めて詳細に列挙されている。日本の建築基準法施行令第２条第１項第２号では、軒や庇の１メートル後退などの算定ルールが主であるが、ダッカ規則では「セプティックタンク（浄化槽）」や「守衛室」、「屋外階段（１階）」、「ダストシュート」などが明示的に除外項目として定義されている点は、過密な都市環境におけるインフラ機能の確保を優先する姿勢の表れといえる。</p>\n<p>2. <strong>避難階段の構成要件（第２条第４号）</strong>:</p>\n<p>避難階段（Fire Escape Stair）の定義において、耐火材料の使用、ロビーによる連結、防火戸による保護、および「外部の開放空間への直通性」をすべて累積的な要件として求めている。これは、日本の建築基準法施行令第１２３条（避難階段の構造）における屋外避難階段や特別避難階段の要件と論理的に極めて整合しており、国際的な防火基準（NFPA等）の影響が強く反映されている。</p>\n<p>3. <strong>「防火戸」の等級化（第２条第５号）</strong>:</p>\n<p>防火戸を「Fire Grade（耐火等級）」という概念で定義し、特定の時間、熱と火の回りを遮断する機能を求めている。日本の建築基準法における「防火設備（法第２条第９号の２ロ）」や「特定防火設備」の区分けに近い考え方だが、規則の定義段階で「時間（specific period of time）」という性能基準を強調している点が特徴的である。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025の用語の定義に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．<strong>「中庭（Courtyard）」</strong>とは、建築物によって全面的に囲まれている空間を指し、部分的に囲まれているだけの開放空間はこれに含まれない。</p>\n<p>２．<strong>「避難階段（Fire Escape Stair）」</strong>は、火災時に使用するため、建築物の内部の閉鎖された空間にのみ設置されなければならず、外部の開放された場所に通じていてはならない。</p>\n<p>３．<strong>「用途の類型（Occupancy Type）」</strong>に関して本規則の内容に不明瞭な点がある場合は、当該敷地の所有者の判断により用途を決定することができる。</p>\n<p>４．<strong>「建築面積（Covered Area）」</strong>の算定において、浄化槽（セプティックタンク）や車いす用スロープ、１階部分の屋外階段は、原則としてその面積に算入しない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：４</strong></p>\n<p>1. 誤り。第２条第３号により、「全面的又は部分的（সম্পূর্ণ বা আংশিকভাবে）」に囲まれた空間をいう。</p>\n<p>2. 誤り。第２条第４号により、外部の開放された場所に通じていなければならない（বহির্ভাগে খোলা স্থানের সহিত উন্মুক্ত থাকিবে）。</p>\n<p>3. 誤り。第２条第６号により、疑義がある場合は「法典（BNBC）に従わなければならない（কোড অনুসরণ করিতে হইবে）」と規定されている。</p>\n<p><strong>4. 正しい。</strong> 第２条第１１号（ｋｈ）および（ｇ）により、これらは建築面積に含まれない（ইহার অন্তর্ভুক্ত হইবে না）。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13411","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>২। সংজ্ঞা (চলমান)</strong></h4>\n<h5 class=\"h-lv5\"><strong>(১৩)</strong> <strong>\"আবেদনকারী প্রতিনিধি”</strong> অর্থ নকশা প্রণয়ন ও নির্মাণ তদারকির নিমিত্ত কর্তৃপক্ষ কর্তৃক নিবন্ধিত ডেভেলপার, সরকার অনুমোদিত পেশাজীবী প্রতিষ্ঠান কর্তৃক নিবন্ধিত স্থপতি, প্রকৌশলী বা পরিকল্পনাবিদ এবং সরকার কর্তৃক নিবন্ধিত এতদসংশ্লিষ্ট অন্যান্য কারিগরি ব্যক্তি বা প্রতিষ্ঠান যাহাকে ভূমির মালিকের পক্ষে আবেদনকারী হিসাবে দায়িত্ব পালন করিবার উদ্দেশ্যে নিম্নবর্ণিত শর্তসাপেক্ষে মনোনীত করা হইয়াছে, যথা:-</h5>\n<h6 class=\"h-lv6\"><strong>(ক)</strong> আবেদনকারীর প্রতিনিধির নিয়োগ লিখিতভাবে কর্তৃপক্ষ কর্তৃক নির্ধারিত ফরমের মাধ্যমে ও স্বাক্ষরযুক্ত হইতে হইবে; এবং</h6>\n<h6 class=\"h-lv6\"><strong>(খ)</strong> আবেদনকারীর প্রতিনিধি কর্তৃক দাখিলকৃত ভূমি বা সম্পত্তির দলিলাদির সঠিকতা সর্ম্পকে আবেদনকারী দায়ী থাকিবেন;</h6>\n<h5 class=\"h-lv5\"><strong>(১৪)</strong> <strong>\"অ্যাজ-বিল্ট ড্রয়িং\"</strong> বা <strong>\"ইমারতের নির্মিত নকশা\"</strong> অর্থ নির্মাণকাজ সম্পন্ন হইবার পর সংশ্লিষ্ট কারিগরি (স্থপতি বা প্রকৌশলী) ব্যক্তি দ্বারা স্বাক্ষরিত ইমারতের বাস্তবায়িত বা নির্মিত স্থাপত্য, কাঠামো, বিল্ডিং সার্ভিসেস সম্পর্কিত সকল নকশা;</h5>\n<h5 class=\"h-lv5\"><strong>(১৫)</strong> <strong>\"ইমারত”</strong> অর্থ আইনের section 2 এর clause (b) এবং কোডের Article 6 এ সংজ্ঞায়িত Building;</h5>\n<h5 class=\"h-lv5\"><strong>(১৬)</strong> <strong>\"ইমারত নির্মাণ কমিটি”</strong> অর্থ আইনের section 3 এর sub-section (2) এ উল্লিখিত কমিটি;</h5>\n<h5 class=\"h-lv5\"><strong>(১৭)</strong> <strong>\"ইমারতের উচ্চতা\"</strong> অর্থ রেফারেন্স ডেটাম (নিকটতম ফুটপাতের উচ্চতা অথবা উহার কেন্দ্রস্থলে অবস্থিত নিকটতম রাস্তা বা রাস্তা সংলগ্ন ফুটপাথের উচ্চতা, যাহা বেশি) হইতে ভবনের সর্বোচ্চ বিন্দু পর্যন্ত উল্লম্ব দূরত্ব, যাহার মধ্যে ইমারতের উপর অন্যান্য স্থাপনা বা ইমারতের অন্যান্য উপাদান, যেমন ইমারতের ছাদে অবস্থিত সিঁড়িঘর, জলাধার, স্থাপত্যের উপাদান, লাইটনিং এরেস্টর, এন্টেনা বা মোবাইল টাওয়ার, ইত্যাদি অন্তর্ভুক্ত হইবে;</h5>\n<h5 class=\"h-lv5\"><strong>(১৮)</strong> <strong>\"ইমারত পরিদর্শক\"</strong> অর্থ কর্তৃপক্ষ কর্তৃক নিয়োগপ্রাপ্ত কোনো ব্যক্তি যিনি ইমারত সংশ্লিষ্ট পরিদর্শন কাজে নিয়োজিত হইবেন;</h5>\n<h5 class=\"h-lv5\"><strong>(১৯)</strong> <strong>\"ইলেকট্রিক্যাল ইঞ্জিনিয়ার বা তড়িৎ প্রকৌশলী\"</strong> অর্থ যিনি সংশ্লিষ্ট বিষয়ে স্নাতক ডিগ্রি প্রাপ্ত, ইন্সটিটিউশন অব ইঞ্জিনিয়ার্স, বাংলাদেশ এর সদস্য এবং বিধি ৩৬ অনুযায়ী তালিকাভুক্ত;</h5>\n<h5 class=\"h-lv5\"><strong>(২০)</strong> <strong>\"উচ্চতা”</strong> অর্থ</h5>\n<h6 class=\"h-lv6\"><strong>(ক)</strong> কক্ষের উচ্চতার ক্ষেত্রে সম্পন্নকৃত মেঝের উপর হইতে বাঁধামুক্ত ছাদের নিচ তল পর্যন্ত উলম্ব পরিমাপ;</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第２条（用語の定義）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>１３</strong>　<strong>「申請者の代理人（Representative of Applicant）」</strong>　設計の策定及び工事監理の目的で、所管行政庁（Authority）に登録された開発業者（Developer）、政府が承認した職能団体に登録された建築士、技術者若しくは計画策定者、又は政府に登録された関連する専門技術者若しくは法人であって、敷地所有者に代わり申請者としての職務を遂行するために次に掲げる条件に基づき指名されたものをいう。</h5>\n<h6 class=\"h-lv6\"><strong>ａ</strong>　代理人の選任は、所管行政庁が定める様式により書面で行い、署名を付さなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>ｂ</strong>　代理人が提出した土地又は資産に関する書類の正確性については、申請者が責任を負わなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>１４</strong>　<strong>「完成図（As-built Drawing）」又は「建築物の完成設計図」</strong>　工事完了後に担当技術者（建築士又は技術者）が署名した、建築物の実施又は完成に係る意匠、構造、建築設備（Building Services）に関する全ての設計図をいう。</h5>\n<h5 class=\"h-lv5\"><strong>１５</strong>　<strong>「建築物（Building）」</strong>　法の第２条第ｂ項及び本法典（BNBC）の第６条に定義される建築物（Building）をいう。</h5>\n<h5 class=\"h-lv5\"><strong>１６</strong>　<strong>「建築審査委員会（Building Construction Committee）」</strong>　法の第３条第２項に規定する委員会をいう。</h5>\n<h5 class=\"h-lv5\"><strong>１７</strong>　<strong>「建築物の高さ（Building Height）」</strong>　基準面（Reference Datum：直近の歩道の高さ、又はその中心に位置する直近の道路若しくは道路に隣接する歩道の高さのうち、いずれか高いもの）から建築物の最高点までの垂直距離をいう。これには、建築物の屋上に設置される他の工作物又は建築物の構成要素（屋上に位置する階段室、貯水槽、意匠部材、避雷針、アンテナ又は携帯電話鉄塔（Mobile tower）等）を含むものとする。</h5>\n<h5 class=\"h-lv5\"><strong>１８</strong>　<strong>「建築物検査員（Building Inspector）」</strong>　建築物の検査業務に従事するために、所管行政庁により任命された者をいう。</h5>\n<h5 class=\"h-lv5\"><strong>１９</strong>　<strong>「電気技術者（Electrical Engineer）」</strong>　関連分野の学士号を有し、バングラデシュ技術者協会（IEB）の会員であり、かつ、第３６条の規定に基づき登録された者をいう。</h5>\n<h5 class=\"h-lv5\"><strong>２０</strong>　<strong>「高さ（Height）」</strong>　次に掲げるものをいう。</h5>\n<h6 class=\"h-lv6\"><strong>ａ</strong>　居室の高さについては、仕上げられた床面から、障害物のない天井（屋根）の下面までの垂直距離をいう。</h6>\n<hr class=\"sep\">\n<p>1. <strong>「建築物の高さ」に算入される屋上工作物の範囲（第２条第１７号）</strong>:</p>\n<p>ダッカ規則では、建築物の高さに「アンテナ」や「携帯電話鉄塔（Mobile tower）」を明示的に含めている。日本の建築基準法施行令第２条第１項第６号では、避雷針や一定の屋上突出物（階段室等）は高さに算入しない、あるいは一定の限度で不算入とする規定があるが、ダッカ規則は通信設備等を一律に高さ制限ের対象とする、より厳格な都市景観・安全管理の姿勢が見られる。</p>\n<p>2. <strong>基準面（Reference Datum）の定義（第２条第１７号）</strong>:</p>\n<p>高さを測る起点を「直近の歩道」又は「道路中心」のうち「高い方」としている。日本の建築基準法施行令第２条第２項では「地盤面（建築物が周囲の地面と接する位置の平均の高さ）」を基準とするが、ダッカ規則はインフラ（道路・歩道）の現況レベルを優先して基準点に採用しており、浸水対策等の観点から道路レベルとの関係を重視している。</p>\n<p>3. <strong>「完成図（As-built Drawing）」の定義（第２条第１４号）</strong>:</p>\n<p>「完成図」が用語の定義として独立して掲げられ、意匠・構造だけでなく「建築設備（Building Services）」の図面まで含まれることが明記されている。日本の建築基準法では「検査済証」の交付をもって完了とするが、ダッカ規則では「技術者が署名した完成実態を示す図面」そのものを法的な定義対象とすることで、維持管理段階の透明性を担保しようとしている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における用語の定義に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．<strong>「建築物の高さ（Building Height）」</strong>の算定において、屋上に設置される貯水槽や避雷針は含まれるが、携帯電話用の鉄塔（Mobile tower）については、工作物として扱われるため建築物の高さには含まれない。</p>\n<p>２．<strong>「建築物の高さ」</strong>を測る際の基準面（Reference Datum）は、常に当該敷地の平均地盤面とし、隣接する歩道の高さに影響されることはない。</p>\n<p>３．<strong>「完成図（As-built Drawing）」</strong>とは、工事完了後に担当技術者（建築士又は技術者）が署名した、建築物の実施状況に係る意匠、構造及び建築設備に関する全ての設計図をいう。</p>\n<p>４．<strong>「申請者の代理人（Representative of Applicant）」</strong>が提出した土地に関する書類の正確性については、その選任に関わらず代理人のみが全ての法的責任を負い、所有者が責任を負うことはない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第２条第１７号により、携帯電話鉄塔（ মোবাইল টাওয়ার ）も高さに含まれる。</p>\n<p>2. 誤り。第２条第１７号により、直近の歩道又は道路中心の高さのうち高い方を基準面とする。</p>\n<p><strong>3. 正しい。</strong> 第２条第１４号の規定通りである。</p>\n<p>3. 誤り。第２条第１３号（ｋｈ）により、提出書類の正確性については申請者（所有者等）が責任を負わなければならない。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13412","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>২। সংজ্ঞা (চলমান)</strong></h4>\n<h5 class=\"h-lv5\"><strong>(২০)</strong> <strong>\"উচ্চতা\" (চলমান)</strong></h5>\n<h6 class=\"h-lv6\"><strong>(খ)</strong> কোনো তলার উচ্চতার ক্ষেত্রে সম্পন্নকৃত একটি তলার মেঝের উপর হইতে অন্য তলার মেঝের উপর পর্যন্ত অথবা পরবর্তী তল না থাকিলে ছাদ বা আচ্ছাদনের উপর পর্যন্ত উলম্ব পরিমাপ;</h6>\n<h6 class=\"h-lv6\"><strong>(গ)</strong> দেয়ালের উচ্চতা হিসাবে একটি দেয়ালের ভূমি হইতে দেয়ালের উপরিভাগ পর্যন্ত উলম্ব পরিমাপ;</h6>\n<h5 class=\"h-lv5\"><strong>(২১)</strong> \"<strong>উন্মুক্ত জায়গা বা স্থান</strong>\" অর্থ সাইটের সর্বোচ্চ ভূমি আচ্ছাদনের বহির্ভূত অংশ যাহা ভূমিতল হইতে উর্ধ্বদিকে স্থায়ীভাবে উন্মুক্ত;</h5>\n<h5 class=\"h-lv5\"><strong>(২২)</strong> \"<strong>উন্নয়ন স্বত্ত্ব বিনিময় (Transfer of Development Rights, TDR)</strong>\" অর্থ কর্তৃপক্ষের আওতাধীন প্রেরণ এলাকা (sending site, যেখানে মহাপরিকল্পনা, আইন বা বিধিমালা দ্বারা উন্নয়ন কার্যক্রম অনুমোদিত নহে কিংবা সংরক্ষিত এলাকা যেমন, উন্মুক্ত স্থান, কৃষি জমি, বন্যাপ্রবাহ এলাকা, পরিবেশগতভাবে সংবেদনশীল এলাকা, ঐতিহাসিক গুরুত্বপূর্ণ স্থান বা স্থাপনা ইত্যাদি) হইতে গ্রহণ এলাকায় (receiving site, যেখানে মহাপরিকল্পনা, আইন বা বিধিমালা অনুযায়ী উন্নয়ন কার্যক্রম অনুমোদিত) উন্নয়ন স্বত্ত্ব অর্থের বা সুবিধাদির বিনিময়ে স্থানান্তর হয়;</h5>\n<h5 class=\"h-lv5\"><strong>(২৩)</strong> \"<strong>এট্রিয়াম (Atrium)</strong>\" অর্থ ইমারতের অভ্যন্তরে একাধিক তল বিশিষ্ট একটি বৃহৎ আয়তনের স্থান যাহা সর্বনিম্ন ২ (দুই) তলা ও অনুমোদিত ভবনের উচ্চতাকে সর্বোচ্চ, করিডোর বা অনুরূপ উপাদান রহিয়াছে এবং যাহার উপরিতল গ্লেজিং (Glazing) বা তল দ্বারা সম্পূর্ণ বা আংশিক আচ্ছাদিত, তবে যথাযথ বায়ু চলাচলের ব্যবস্থা থাকিতে হইবে;</h5>\n<h5 class=\"h-lv5\"><strong>(২৪)</strong> \"<strong>এয়ারওয়েল</strong>\" বা \"<strong>লাইটওয়েল</strong>\" অর্থ প্রাকৃতিক বায়ু ও আলো চলাচলের সুবিধা অর্জনের উদ্দেশ্যে ইমারতের অভ্যন্তরে অবস্থিত ঊর্ধ্বদিকে স্থায়ীভাবে উন্মুক্ত পরিসর যাহা ইমারত দ্বারা আবদ্ধ;</h5>\n<h5 class=\"h-lv5\"><strong>(২৫)</strong> \"<strong>এপার্টমেন্ট কমপ্লেক্স</strong>\" অর্থ একাধিক ভবনের মধ্যে একগুচ্ছ আবাস বা এপার্টমেন্ট বা ফ্ল্যাটের সমাবেশ যেখানে বেসরকারী আবাসিক প্রকল্পের ভূমি উন্নয়ন বিধিমালা, ২০০৪ ও বিশদ অঞ্চল পরিকল্পনা অনুযায়ী সাধারণ নাগরিক সুযোগ-সুবিধা সকলের সম্মিলিত ব্যবহারের জন্য বিদ্যমান থাকে;</h5>\n<h5 class=\"h-lv5\"><strong>(২৬)</strong> \"<strong>ঐতিহ্যবাহী ইমারত বা স্থাপনা বা স্থান বা এলাকা</strong>\" অর্থ সরকার কর্তৃক অনুমোদিত এবং গেজেটকৃত ঐতিহ্যবাহী ইমারত বা স্থাপনা বা স্থান বা এলাকা;</h5>\n<h5 class=\"h-lv5\"><strong>(২৭)</strong> \"<strong>এলাকা ভিত্তিক Floor Area Ratio (FAR)</strong>\" অর্থ মহাপরিকল্পনায় বর্ণিত প্রতিটি জনঘনত্ব ব্লকের অধীন উল্লিখিত FAR;</h5>\n<h5 class=\"h-lv5\"><strong>(২৮)</strong> \"<strong>কর্তৃপক্ষ</strong>\" অর্থ Town Improvement Act, 1953 এর অধীন প্রতিষ্ঠিত রাজধানী উন্নয়ন কর্তৃপক্ষ (রাজউক);</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第２条（用語の定義）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>２０</strong>　<strong>「高さ」（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>二（খ）</strong>　階高（Story height）については、仕上げられた一の階の床面から、他の階の仕上げられた床面までの垂直距離、又は直上階がない場合にあっては屋根若しくは被覆物の上面までの垂直距離をいう 。</h6>\n<h6 class=\"h-lv6\"><strong>三（গ）</strong>　壁高（Wall height）については、一の壁の基部から当該壁の頂部までの垂直距離をいう 。</h6>\n<h5 class=\"h-lv5\"><strong>２１</strong>　<strong>空地（Open space / Unmukto jayga ba sthan）</strong>　敷地の最高建蔽率（Maximum Ground Coverage）に含まれない部分であって、地盤面から上部に向かって恒久的に開放されているものをいう 。</h5>\n<h5 class=\"h-lv5\"><strong>２２</strong>　<strong>開発権移転（Transfer of Development Rights, TDR）</strong>　所管行政庁の管轄下にある送出敷地（Sending site：マスタープラン、法律又は規則により開発行為が許可されない区域、若しくは開放空間、農地、洪水流下区域、環境敏感地域、史跡又は伝統的建築物等の保存区域）から、受入敷地（Receiving site：マスタープラン、法律又は規則により開発行為が許可されている区域）へ、金銭又は便益と引き換えに開発権を移転することをいう 。</h5>\n<h5 class=\"h-lv5\"><strong>２３</strong>　<strong>アトリウム（Atrium）</strong>　建築物内部の複数階にわたる広大な空間であって、最低２階以上の高さを有し、承認された建築物の最高高さ、廊下又はこれらに類する構成要素を含み、かつ上面がガラス張り（Glazing）又は屋根により全面的若しくは部分的に覆われているものをいう。ただし、適切な換気設備を備えなければならない 。</h5>\n<h5 class=\"h-lv5\"><strong>２４</strong>　<strong>光庭（Air-well / Light-well）</strong>　自然の換気及び採光を確保することを目的に、建築物の内部に設けられた上部に向かって恒久的に開放された空間であって、建築物に囲まれたものをいう 。</h5>\n<h5 class=\"h-lv5\"><strong>２５</strong>　<strong>アパートメント・コンプレックス（Apartment Complex）</strong>　複数の建築物の中に住居、アパートメント又は住戸（フラット）の集合体があるものであって、２００４年民間住宅プロジェクト土地開発規則及び詳細地域計画（DAP）に基づき、一般的な市民向け公共施設が共同使用のために備えられているものをいう 。</h5>\n<h5 class=\"h-lv5\"><strong>２６</strong>　<strong>伝統的建築物、工作物、場所又は地域（Heritage building, structure, site or area）</strong>　政府によって承認され、かつ官報に掲載された伝統的な建築物、工作物、場所又は地域をいう 。</h5>\n<h5 class=\"h-lv5\"><strong>２７</strong>　<strong>地区別容積率（Area-based Floor Area Ratio）</strong>　マスタープランに定められた各人口密度ブロックごとに規定された容積率（FAR）をいう 。</h5>\n<h5 class=\"h-lv5\"><strong>２８</strong>　<strong>所管行政庁（Authority）</strong>　１９５３年都市改良法に基づき設立された首都開発庁（RAJUK）をいう 。</h5>\n<hr class=\"sep\">\n<p>1. <strong>開発権移転（TDR）の定義の網羅性（第２条第２２号）</strong>:</p>\n<p>ダッカ規則では「開発権移転（TDR）」の定義の中に、送出敷地（Sending site）の具体例として「洪水流下区域」や「環境敏感地域」まで含めている 。日本の建築基準法（法第５７条の２：特例容積率適用地区）では、主に歴史的建造物の保存や高度利用を目的とするが、ダッカ規則は防災（洪水対策）や環境保全と容積率移転を直接リンクさせて定義している点が極めて特徴的である。</p>\n<p>2. <strong>アトリウムの法的要件（第２条第２３号）</strong>:</p>\n<p>アトリウムを定義する際、「最低２階以上の高さ」および「適切な換気設備の義務化」を要件としている 。日本の建築基準法では、アトリウムは主に避難上の安全検証（法第３８条等に基づく大臣認定）や、床面積の算定、排煙設備に関連して扱われるが、用語の定義として換気性能を直結させている点は、熱帯地域の建築における熱負荷対策を象徴している。</p>\n<p>3. <strong>「所管行政庁（Authority）」の固有名詞化（第２条第２８号）</strong>:</p>\n<p>本規則において「Authority」は、一般的な行政庁を指すのではなく、<strong>首都開発庁（RAJUK）</strong>を指すと固有名詞的に定義されている 。日本の建築基準法における「特定行政庁（法第２条第３５号）」が、建築主事を置く地方自治体の長を包括的に指すのに対し、ダッカ規則はダッカ首都圏の都市計画と建築審査を一手に担うRAJUKという組織の強固な権限を前提に構成されている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における用語の定義に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．<strong>「開発権移転（TDR）」</strong>において、開発権を送り出すことができる敷地（Sending site）は、歴史的に重要な場所や伝統的建築物の保存区域に限定されており、農地や洪水流下区域は含まれない。</p>\n<p>２．<strong>「アトリウム（Atrium）」</strong>とは、建築物内部の複数階にわたる広大な空間であって、最低 ３階以上 の高さを有し、かつ上面が全面的に屋根で覆われているものをいう。</p>\n<p>３．<strong>「空地（Open space）」</strong>とは、敷地の最高建蔽率（Maximum Ground Coverage）に含まれない部分であって、地盤面から上部に向かって恒久的に開放されているものをいう。</p>\n<p>４．<strong>「アパートメント・コンプレックス（Apartment Complex）」</strong>とは、単一の建物内に複数のフラットが存在するものを指し、公共施設の共同利用の有無は定義に関係しない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第２条第２２号により、送出敷地には農地（ কৃষি জমি ）や洪水流下区域（ বন্যাপ্রবাহ এলাকা ）も含まれる 。</p>\n<p>2. 誤り。第２条第２３号により、高さの基準は最低 「২ (দুই) তলা（２階）」 以上である 。</p>\n<p><strong>3. 正しい。</strong> 第２条第２１号の規定通りである 。</p>\n<p>3. 誤り。第２条第２５号により、市民向け公共施設が共同使用のために存在すること（ সাধারণ নাগরিক সুযোগ-সুবিধা সকলের সম্মিলিত ব্যবহারের জন্য বিদ্যমান থাকে ）が要件である 。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13413","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>২। সংজ্ঞা (চলমান)</strong></h4>\n<h5 class=\"h-lv5\"><strong>(২৯)</strong> <strong>\"কাজ আরম্ভ\"</strong> অর্থ ইমারত নির্মাণের উদ্দেশ্যে মাটি কাটা, পাইলিং বা ভিত্তি নির্মাণ বা যেকোনো নির্মাণ, পুনঃনির্মাণ অথবা বিদ্যমান ইমারতে পরিবর্তন বা পরিবর্ধনের প্রকৃত সূত্রপাত;</h5>\n<h5 class=\"h-lv5\"><strong>(৩০)</strong> <strong>\"কার্নিশ\"</strong> অর্থ রোদ বা বৃষ্টি হইতে রক্ষার জন্য ইমারতের সর্বশেষ ছাদের বর্ধিতাংশ যাহা কোনো দেয়াল দ্বারা আবদ্ধ করা যাইবে না;</h5>\n<h5 class=\"h-lv5\"><strong>(৩১)</strong> <strong>\"কাড় (Loft)\"</strong> অর্থ ছাদ ও মেঝের মধ্যবর্তী অপর একটি ছাদ দ্বারা তৈরি অন্যূন ১.৫ (এক দশমিক পাঁচ) মিটার উচ্চতা বিশিষ্ট স্থান, যাহা তাপ প্রতিরোধ এবং সর্বোচ্চ ছাদের আর্দ্রতা প্রতিরোধক হিসাবে, স্যানিটারি, মেকানিক্যাল কাজে, পানি সংরক্ষণ, ছাদে বাগান, সুইমিং পুল বা অনুরূপ কাজে ব্যবহৃত হইতে পারে;</h5>\n<h5 class=\"h-lv5\"><strong>(৩২)</strong> <strong>\"কোড\"</strong> অর্থ Bangladesh National Building Code (BNBC), 2020;</h5>\n<h5 class=\"h-lv5\"><strong>(৩৩)</strong> <strong>\"স্ট্রাকচারাল প্রকৌশলী\"</strong> অর্থ কোনো পুরকৌশলী বা পুর-প্রকৌশলী যিনি কাঠামো ডিজাইন (design) প্রণয়নে অভিজ্ঞ এবং বিধি ৩৬ অনুযায়ী কারিগরি ব্যক্তি হিসাবে তালিকাভুক্ত ও সংশ্লিষ্ট পেশাজীবী প্রতিষ্ঠানের সদস্য;</h5>\n<h5 class=\"h-lv5\"><strong>(৩৪)</strong> <strong>\"কারিগরি ব্যক্তি\"</strong> অর্থ বিধি ৩৬ এর অধীন তালিকাভুক্ত কোনো কারিগরি ব্যক্তি;</h5>\n<h5 class=\"h-lv5\"><strong>(৩৫)</strong> <strong>\"চেয়ারম্যান\"</strong> অর্থ রাজধানী উন্নয়ন কর্তৃপক্ষের চেয়ারম্যান;</h5>\n<h5 class=\"h-lv5\"><strong>(৩৬)</strong> <strong>\"চিমনি\"</strong> অর্থ ইমারতের এইরূপ অংশ যাহার মাধ্যমে তাপ উৎপাদনকারী যন্ত্রাদি হইতে দহনক্রিয়ার মাধ্যমে নির্গত বা উৎপন্ন বস্তুসমূহ ধূম্রনালীর মাধ্যমে উন্মুক্ত বাতাসে নির্গত হয়;</h5>\n<h5 class=\"h-lv5\"><strong>(৩৭)</strong> <strong>\"জিওটেকনিক্যাল প্রকৌশলী\"</strong> অর্থ বিধি ৩৬ হইতে বিধি ৩৮ এ বর্ণিত স্নাতক বা স্নাতকোত্তর পুর-প্রকৌশলী যাহার জিও টেকনিক্যাল বা ফাউন্ডেশন ইঞ্জিনিয়ারিং বিষয়ে অভিজ্ঞতা রহিয়াছে এবং যিনি ইনস্টিটিউশন অব ইঞ্জিনিয়ার্স, বাংলাদেশ (IEB) এর সদস্য;</h5>\n<h5 class=\"h-lv5\"><strong>(৩৮)</strong> <strong>\"জাতীয় বা আঞ্চলিক মহাসড়ক বা প্রধান সড়ক\"</strong> অর্থ সংশ্লিষ্ট আইন অনুযায়ী বা রাজধানী উন্নয়ন কর্তৃপক্ষ বা সড়ক ও জনপথ অধিদপ্তর কর্তৃক নির্ধারিত জাতীয় বা আঞ্চলিক মহাসড়ক বা প্রধান সড়ক;</h5>\n<h5 class=\"h-lv5\"><strong>(৩৯)</strong> <strong>\"ঝুঁকিপূর্ণ ইমারত\"</strong> অর্থ কোড অনুযায়ী কাঠামোগত অনিরাপদ, জরাজীর্ণ, অস্বাস্থ্যকর, অগ্নি-ঝুঁকিপূর্ণ, যথাযথ জরুরি নির্গমন পথবিহীন, ভগ্নপ্রায়, যথাযথ রক্ষণাবেক্ষণবিহীন, পরিত্যক্ত, অধিবাসী ও সংলগ্ন এলাকার জনসাধারণের নিরাপত্তার প্রতি হুমকি হিসাবে কর্তৃপক্ষ কর্তৃক চিহ্নিত যেকোনো ইমারত বা নির্মাণকার্য;</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第２条（用語の定義）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>２９</strong>　<strong>工事の着手（Commencement of work / Kaj arombho）</strong>　建築物の建築を目的とした根切り（掘削）、杭打ち若しくは基礎の築造、又は既存建築物に対するあらゆる新築、改築、模様替若しくは増築の実質的な開始をいう。</h5>\n<h5 class=\"h-lv5\"><strong>３０</strong>　<strong>軒蛇腹（Cornice）</strong>　日射又は雨水を防ぐための建築物の最上部屋根の張り出し部分であって、いかなる壁によっても囲まれていないものをいう。</h5>\n<h5 class=\"h-lv5\"><strong>３１</strong>　<strong>ロフト（Loft / Kar）</strong>　屋根（天井）と床の間の中間階として設けられた、高さが少なくとも１．５メートル以上の空間であって、断熱、防湿、衛生設備、機械設備、貯水、屋上庭園、水泳プールその他これらに類する用途に供されるものをいう。</h5>\n<h5 class=\"h-lv5\"><strong>３২</strong>　<strong>法典（Code）</strong>　バングラデシュ国家建築法典（Bangladesh National Building Code, 2020）をいう。</h5>\n<h5 class=\"h-lv5\"><strong>３３</strong>　<strong>構造設計一級建築士（Structural Engineer）</strong>　構造設計（Design）の策定に精通した土木・構造技術者であって、第３６条の規定により専門技術者として登録され、かつ関連する職能団体の正会員である者をいう。</h5>\n<h5 class=\"h-lv5\"><strong>３４</strong>　<strong>専門技術者（Technical person / Karigori byakti）</strong>　第３６条の規定により登録された者をいう。</h5>\n<h5 class=\"h-lv5\"><strong>３５</strong>　<strong>会長（Chairman）</strong>　首都開発庁（RAJUK）の会長をいう。</h5>\n<h5 class=\"h-lv5\"><strong>３６</strong>　<strong>煙突（Chimney）</strong>　熱発生装置から燃焼等により発生した物質を、煙道を通じて大気中に放出するための建築物の部分をいう。</h5>\n<h5 class=\"h-lv5\"><strong>３７</strong>　<strong>土質一級建築士（Geotechnical Engineer）</strong>　第３６条から第３８条までに規定する土木・構造工学の学士号又は修士号を有し、土質工学又は基礎工学に関する経験を有するバングラデシュ技術者協会（IEB）の正会員をいう。</h5>\n<h5 class=\"h-lv5\"><strong>３８</strong>　<strong>国道、地方道又は主要道路（National or Regional Highway or Main Road）</strong>　関連法令に基づき、又は首都開発庁（RAJUK）若しくは道路局によって指定された国道、地方道又は主要道路をいう。</h5>\n<h5 class=\"h-lv5\"><strong>３９</strong>　<strong>危険建築物（Unsafe building / Jhukipurno imarot）</strong>　法典に基づき、構造的な不備、老朽化、不衛生、火災の危険、適切な避難経路の欠如、崩壊の恐れ、適切な維持管理の欠如、又は放置等により、居住者及び近隣住民の安全に対する脅威であると所管行政庁によって特定された建築物又は建築工事をいう。</h5>\n<hr class=\"sep\">\n<p>1. <strong>「工事の着手」の定義の広範性（第２条第２９号）</strong>:</p>\n<p>ダッカ規則では、単なる建築工事だけでなく「根切り（ মাটি কাটা / soil cutting）」や「杭打ち（ পাইলিং ）」そのものを「工事の着手」と定義している。日本の建築基準法では、確認済証交付前の着手禁止（法第６条第１項）に関連し、根切り工事も着手とみなされる実務上の扱いがあるが、ダッカ規則ではこれを用語の定義として明文化し、行政の監視範囲を掘削段階から明確に担保している。</p>\n<p>2. <strong>ロフトの多目的な位置づけ（第２条第３１号）</strong>:</p>\n<p>ロフトを単なる収納空間ではなく、「断熱（ তাপ প্রতিরোধ ）」や「屋上庭園（ ছাদে বাগান ）」、「水泳プール（ সুইমিং পুল ）」の受け皿として定義している。日本の建築基準法（法第２条）上の小屋裏物置等の扱い（階高の１／２、天井高１．４ｍ以下等）に比べ、高さ基準（１．５ｍ以上）が異なり、かつ断熱や設備維持のための機能的空間としての側面が法的に強調されている。</p>\n<p>3. <strong>危険建築物の広範な定義（第２条第３９号）</strong>:</p>\n<p>危険建築物の定義の中に「適切な維持管理の欠如（ যথাযথ রক্ষণাবেক্ষণবিহীন ）」や「放置（ পরিত্যক্ত ）」を明示的に含めている。日本の建築基準法第１０条（建築物の維持管理）や空家等対策特別措置法に近い内容だが、建築規則の本体において、これらを「危険（ unsafe ）」の定義に直接組み込むことで、所管行政庁による是正命令の法的根拠をより強固にしている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における用語の定義に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．<strong>「工事の着手（Commencement of work）」</strong>とは、建築物の地上部分の壁又は柱の築造を開始することをいい、地盤の掘削や杭打ちの段階はこれに含まれない。</p>\n<p>２．<strong>「ロフト（Loft）」</strong>とは、屋根と床の間に設けられた高さが １．২メートル 未満の空間をいい、専ら収納の用途に供さなければならない。</p>\n<p>３．<strong>「煙突（Chimney）」</strong>とは、燃焼によって生じた煙等の物質を大気中に放出するための建築物の部分をいう。</p>\n<p>４．<strong>「危険建築物（Unsafe building）」</strong>とは、構造的に不安全な建築物のみを指し、衛生上の不備や避難経路の欠如によって指定されることはない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第２条第２９号により、地盤の掘削（ মাটি কাটা ）や杭打ち（ পাইলিং ）も「工事の着手」に含まれる。</p>\n<p>2. 誤り。第２条第３１号により、ロフトの高さは最小 「১.৫ (এক দশমিক পাঁচ) মিটার（１．５メートル）」 以上であり、用途も断熱、貯水、屋上庭園等多岐にわたる。</p>\n<p><strong>3. 正しい。</strong> 第２条第３６号の規定通りである。</p>\n<p>3. 誤り。第２条第３９号により、不衛生（ অস্বাস্থ্যকর ）、避難経路の欠如（ যথাযথ জরুরি নির্গমন পথবিহীন ）、維持管理の欠如等も定義に含まれる。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13414","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>২। সংজ্ঞা (চলমান)</strong></h4>\n<h5 class=\"h-lv5\"><strong>(৪০)</strong> <strong>\"ঝুলন্ত প্ল্যান্টার\"</strong> অর্থ ইমারত হইতে বর্ধিত একটি ঝুলন্ত সর্বোচ্চ ০.৫০ (শূন্য দশমিক পাঁচ শূন্য) মিটার গভীরতা বিশিষ্ট স্থান যাহাতে গাছপালা জন্মাইতে পারে এবং যাহার ক্ষেত্রফল সংশ্লিষ্ট ফ্লোর এরিয়ার সর্বোচ্চ ২.৫% (দুই দশমিক পাঁচ শতাংশ) পর্যন্ত হইতে পারিবে, ইহার অধিক হইলে FAR অন্তর্ভুক্ত হইবে; তবে কোনোক্ষেত্রেই সেটব্যাকে করা যাইবে না;</h5>\n<h5 class=\"h-lv5\"><strong>(৪১)</strong> <strong>\"টোটাল ফ্লোর এরিয়া\"</strong> অর্থ ইমারতের সকল ফ্লোর (FAR অন্তর্ভুক্ত ও বহির্ভূত) এরিয়ার যোগফল;</h5>\n<h5 class=\"h-lv5\"><strong>(৪২)</strong> <strong>\"ডিটেইলড এরিয়া প্ল্যান (DAP)\"</strong> অর্থ মহাপরিকল্পনার আওতাভুক্ত কোনো এলাকার পরিকল্পিত উন্নয়নের জন্য বিস্তারিত স্থানিক নকশাসহ পরিকল্পনা;</h5>\n<h5 class=\"h-lv5\"><strong>(৪৩)</strong> <strong>\"ডিজিটাল স্বাক্ষর\"</strong> অর্থ তথ্য ও যোগাযোগ প্রযুক্তি আইন, ২০০৬ (২০০৬ সনের ৩৯ নং আইন) এর ধারা ২ এর দফা (১)-এ সংজ্ঞায়িত ইলেকট্রনিক স্বাক্ষর;</h5>\n<h5 class=\"h-lv5\"><strong>(৪৪)</strong> <strong>\"ডিপ্লোমা স্থপতি\"</strong> অর্থ এইরূপ কারিগরি ব্যক্তি যিনি স্বীকৃত কোনো পলিটেকনিক ইনস্টিটিউট বা কারিগরি ইনস্টিটিউট হইতে স্থাপত্য বিষয়ে ডিপ্লোমা ইন আর্কিটেকচার সনদপ্রাপ্ত ও ইনস্টিটিউশন অব ডিপ্লোমা ইঞ্জিনিয়ার্স, বাংলাদেশ এর সদস্য এবং বিধি ৩৬ অনুযায়ী তালিকাভুক্ত;</h5>\n<h5 class=\"h-lv5\"><strong>(৪৫)</strong> <strong>\"ডিপ্লোমা প্রকৌশলী\"</strong> অর্থ এইরূপ কারিগরি ব্যক্তি যিনি স্বীকৃত কোনো পলিটেকনিক ইনস্টিটিউট বা কারিগরি ইনস্টিটিউট হইতে প্রকৌশল বিষয়ে ডিপ্লোমা ইন ইঞ্জিনিয়ারিং সনদপ্রাপ্ত ও ইনস্টিটিউশন অব ডিপ্লোমা ইঞ্জিনিয়ার্স বাংলাদেশ এর সদস্য, এবং বিধি ৩৬ অনুযায়ী তালিকাভুক্ত;</h5>\n<h5 class=\"h-lv5\"><strong>(৪৬)</strong> <strong>\"ডেভেলপার\"</strong> অর্থ রিয়েল এস্টেট ব্যবসা পরিচালনার উদ্দেশ্যে রিয়েল এস্টেট উন্নয়ন ও ব্যবস্থাপনা আইন, ২০১০ (২০১০ সনের ৪৮ নং আইন) এর অধীনে নিবন্ধিত ব্যক্তি;</h5>\n<h5 class=\"h-lv5\"><strong>(৪৭)</strong> <strong>“নির্মাণ”</strong> অর্থ যেকোনো ধরনের ইমারত বা স্থাপনা নির্মাণ, পুনঃনির্মাণ বা প্রতিস্থাপন;</h5>\n<h5 class=\"h-lv5\"><strong>(৪৮)</strong> <strong>“নির্মাণ তদারকি”</strong> অর্থ বিধি ৩৬ অনুযায়ী তালিকাভুক্ত সংশ্লিষ্ট কারিগরি ব্যক্তি কর্তৃক পূর্ণকালীন নির্মাণ তদারকি;</h5>\n<h5 class=\"h-lv5\"><strong>(৪৯)</strong> <strong>“নির্মাতা”</strong> অর্থ আবেদনকারী ভূমি মালিক বা আবেদনকারী কর্তৃক নিয়োজিত নির্মাণকারী ব্যক্তি বা প্রতিষ্ঠান;</h5>\n<h5 class=\"h-lv5\"><strong>(৫০)</strong> <strong>“নির্মাণ অনুমোদন নকশা”</strong> অর্থ এই বিধিমালার অধীন নির্মাণ সময়ের জন্য কর্তৃপক্ষ কর্তৃক ইমারত বা স্থাপনার স্থাপত্য, কাঠামোগত, ইলেকট্রিক্যাল, প্লাম্বিং নকশা এবং, প্রযোজ্য ক্ষেত্রে, মেকানিক্যাল, অগ্নিনিরাপত্তা ও নির্বাপন নকশা;</h5>\n<h5 class=\"h-lv5\"><strong>(৫১)</strong> <strong>“নকশা”</strong> অর্থ এই বিধিমালার অধীন ইমারত বা স্থাপনা নির্মাণের উদ্দেশ্যে প্রস্তুতকৃত কোনো নকশা;</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第２条（用語の定義）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>４０</strong>　<strong>吊り下げ式プランター（Hanging Planter）</strong>　建築物から突き出した、植物を栽培するための最大深さ０．５０メートルの吊り下げられた空間をいい、その面積は当該階の床面積（Floor Area）の最大２．５パーセントまでとする。これを超える面積については、容積率（FAR）に算入するものとする。ただし、いかなる場合においても、外壁の後退距離（Setback）内に設置してはならない。</h5>\n<h5 class=\"h-lv5\"><strong>４１</strong>　<strong>延べ面積（Total Floor Area）</strong>　建築物の全ての階（容積率算入対象及び不算入対象の双方を含む）の床面積の合計をいう。</h5>\n<h5 class=\"h-lv5\"><strong>４２</strong>　<strong>詳細地区計画（Detailed Area Plan / DAP）</strong>　都市計画（Master Plan）の対象区域内における計画的な開発のための、詳細な空間設計を含む計画をいう。</h5>\n<h5 class=\"h-lv5\"><strong>４３</strong>　<strong>電子署名（Digital Signature）</strong>　２００６年情報通信技術法（２００６年法律第３９号）第２条第１号に定義される電子署名をいう。</h5>\n<h5 class=\"h-lv5\"><strong>４４</strong>　<strong>ディプロマ建築士（Diploma Architect）</strong>　認定されたポリテクニック・インスティテュート又は技術学院において建築学のディプロマ（Diploma in Architecture）を取得した者であって、バングラデシュ・ディプロマ技術者協会の会員であり、かつ第３６条の規定に基づき登録された専門技術者をいう。</h5>\n<h5 class=\"h-lv5\"><strong>４５</strong>　<strong>ディプロマ技術者（Diploma Engineer）</strong>　認定されたポリテクニック・インスティテュート又は技術学院において工学のディプロマ（Diploma in Engineering）を取得した者であって、バングラデシュ・ディプロマ技術者協会の会員であり、かつ第３６条の規定に基づき登録された専門技術者をいう。</h5>\n<h5 class=\"h-lv5\"><strong>４６</strong>　<strong>開発業者（Developer）</strong>　不動産業を営む目的で、２０１０年不動産開発管理法（２０１０年法律第４８号）に基づき登録された者をいう。</h5>\n<h5 class=\"h-lv5\"><strong>４７</strong>　<strong>建築（Construction / Nirman）</strong>　あらゆる種類の建築物若しくは工作物の新築、増築、改築、模様替又は移転をいう。</h5>\n<h5 class=\"h-lv5\"><strong>４８</strong>　<strong>工事監理（Construction Supervision / Nirman todaroki）</strong>　第３６条の規定に基づき登録された関連専門技術者による、工事期間中の全期にわたる工事監理をいう。</h5>\n<h5 class=\"h-lv5\"><strong>４９</strong>　<strong>施工者（Constructor / Nirmata）</strong>　申請者である土地所有者、又は申請者によって雇用された建築工事を行う個人若しくは法人をいう。</h5>\n<h5 class=\"h-lv5\"><strong>５０</strong>　<strong>確認済設計図書（Construction Permit Design）</strong>　この規則に基づき建築期間のために所管行政庁（Authority）が承認する、建築物又は工作物の意匠、構造、電気、給排水設備に関する設計図書をいい、必要に応じて、機械、防火及び消火設備に関する設計図書を含むものとする。</h5>\n<h5 class=\"h-lv5\"><strong>５１</strong>　<strong>設計図書（Drawing / Plan / Noksha）</strong>　この規則に基づき建築物又は工作物を建築する目的で作成された図面をいう。</h5>\n<hr class=\"sep\">\n<p>1. <strong>吊り下げ式プランターの容積率算定（第２条第４０号）</strong>:</p>\n<p>ダッカ規則では、建築物から突き出したプランターに対し「深さ０．５ｍ以内」かつ「床面積の２．５％以内」であれば容積率（FAR）に算入しないという具体的な定量的緩和を設けている。日本の建築基準法では、バルコニー等の床面積不算入（先端から２ｍ以内等）の規定はあるが、特定の「植栽用空間」に絞った面積比率による不算入規定は珍しく、垂直緑化を法的に促進・管理する意図が伺える。</p>\n<p>2. <strong>工事監理の「全期的」定義（第２条第４８号）</strong>:</p>\n<p>工事監理（Construction Supervision）を、登録技術者による「全期間（full-time / পূর্নকালীন）」の監視であると定義している。日本の建築基準法（法第２条第１１号）では「その者の責任において、工事を設計図書と照合し、それが設計図書通りに実施されているかを確認すること」と定義されるが、ダッカ規則は時間的な専従性をより強調している点が実務上の特徴である。</p>\n<p>3. <strong>確認済設計図書の範囲（第２条第５０号）</strong>:</p>\n<p>「確認済設計図書（Construction Permit Design）」の定義の中に、意匠・構造だけでなく「電気（ইলেকট্রিক্যাল）」や「給排水（প্লাম্বিং）」、さらには「消防設備」の図面までを一括して含めている。日本の建築基準法（法第６条）における「確認済証」の対象は主に建築基準法・消防法への適合性であるが、ダッカ規則では設備設計図書一式が確認済証の法的効力と不可分に結びついている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における用語の定義に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．<strong>「吊り下げ式プランター（Hanging Planter）」</strong>は、深さが ０．৫メートル 以内であれば、設置場所にかかわらず容積率（FAR）の算定に含めない。</p>\n<p>２．<strong>「延べ面積（Total Floor Area）」</strong>とは、建築物の階のうち、容積率（FAR）の算定に含まれる床面積の合計のみを指す。</p>\n<p>３．<strong>「工事監理（Construction Supervision）」</strong>とは、第３６条の規定に基づき登録された専門技術者が、工事期間中に全期にわたって行う監理業務をいう。</p>\n<p>４．<strong>「確認済設計図書（Construction Permit Design）」</strong>には、意匠設計及び構造設計の図面が含まれるが、給排水設備や電気設備の図面は含まれない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第２条第４０号により、床面積の <strong>২.৫%（２．５％）</strong> を超える場合や、<strong>外壁後退距離（ সেটব্যাক ）内</strong>に設置される場合は、緩和の対象外となる。</p>\n<p>2. 誤り。第２条第４１号により、容積率算入・不算入の <strong>双方（ FAR অন্তর্ভুক্ত ও বহির্ভূত ）</strong> の床面積の合計である。</p>\n<p><strong>3. 正しい。</strong> 第２条第４８号の規定通りである（ পূর্নকালীন / full-time ）。</p>\n<p>3. 誤り。第２条第５０号により、電気（ ইলেকট্রিক্যাল ）や給排水（ প্লাম্বিং ）等の設備図面も含まれる。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13415","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>২। সংজ্ঞা (চলমান)</strong></h4>\n<h5 class=\"h-lv5\"><strong>(৫২)</strong> \"<strong>নগর উন্নয়ন কমিটি</strong>\" অর্থ বিধি ৩২ এর অধীন গঠিত নগর উন্নয়ন কমিটি;</h5>\n<h5 class=\"h-lv5\"><strong>(৫৩)</strong> “<strong>নির্মাণ অনুমোদন ফি</strong>” অর্থ এই বিধিমালার অধীন স্থাপনা নির্মাণের নিমিত্ত পরিশিষ্ট ৪ এ উল্লিখিত ফি;</h5>\n<h5 class=\"h-lv5\"><strong>(৫৪)</strong> \"<strong>নগর পুনঃউন্নয়ন</strong>\" অর্থ শহরের কোনো ঝুঁকিপূর্ণ, জরাজীর্ণ বা অপ্রতুল নাগরিক সুযোগ-সুবিধা সম্পন্ন এলাকার সহজাত বৈশিষ্ট্য অক্ষুণ্ণ রাখিয়া পুনঃউন্নয়ন প্রক্রিয়ায় উক্ত এলাকার জীবনযাত্রার মান, অর্থনৈতিক অবস্থা ও কাঠামোগত উন্নয়ন;</h5>\n<h5 class=\"h-lv5\"><strong>(৫৫)</strong> “<strong>তলা</strong>” অর্থ ইমারতের যেকোনো ফ্লোর বা মেঝের উপরিপৃষ্ঠ এবং পরবর্তী ফ্লোরের সম্পন্নকৃত উপরিভাগ অথবা পরবর্তী ফ্লোর না থাকিলে ছাদ বা অন্য আচ্ছাদনের সম্পন্নকৃত উপরিপৃষ্ঠ;</h5>\n<h5 class=\"h-lv5\"><strong>(৫৬)</strong> \"<strong>তালিকাভুক্ত ইমারত বা স্থাপনা</strong>\" অর্থ নান্দনিক, ঐতিহাসিক, বৈজ্ঞানিক, সামাজিক, ধর্মীয় প্রতিষ্ঠান অথবা আধ্যাত্মিক গুরুত্ব বহনকারী অথবা সরকার কর্তৃক অনুমোদিত ও গেজেটকৃত ইমারত বা স্থাপনা;</h5>\n<h5 class=\"h-lv5\"><strong>(৫৭)</strong> \"<strong>পরিশিষ্ট</strong>” অর্থ এই বিধিমালার কোনো পরিশিষ্ট;</h5>\n<h5 class=\"h-lv5\"><strong>(৫৮)</strong> “<strong>প্রস্থান পথ (Exit)</strong>\" অর্থ কোনো বিল্ডিং এর যেকোনো তলা হইতে রাস্তা বা নিরাপদ উন্মুক্ত স্থানে যাইবার জন্য বহির্গমন পথ;</h5>\n<h5 class=\"h-lv5\"><strong>(৫৯)</strong> \"<strong>প্রাকৃতিক বায়ু চলাচল ব্যবস্থা</strong>\" বা \"<strong>বায়ু চলাচল ব্যবস্থা</strong>” অর্থ ইমারতের দরজা-জানালা মাধ্যমে বাতাসের স্বাভাবিক প্রবাহ ঘরের অভ্যন্তরে সরবরাহ ব্যবস্থা;</h5>\n<h5 class=\"h-lv5\"><strong>(৬০)</strong> \"<strong>প্যারাপেট</strong>” অর্থ অন্যূন ১ (এক) মিটার উচ্চতা বিশিষ্ট রেলিং অথবা দেয়াল যাহা ছাদ বা তলের চারপাশ ঘিরে তৈরিকৃত;</h5>\n<h5 class=\"h-lv5\"><strong>(৬১)</strong> \"<strong>পার্কিং স্থান</strong>\" অর্থ যানবাহন রাখিবার মতো আবদ্ধ বা খোলা, বিধি অনুযায়ী আচ্ছাদিত বা উন্মুক্ত পর্যাপ্ত আয়তনের জায়গা, যাহার সহিত যানবাহন যাতায়াত উপযোগী পথের মাধ্যমে ভিতর ও বাহিরের রাস্তার সংযোগ থাকে;</h5>\n<h5 class=\"h-lv5\"><strong>(৬২)</strong> \"<strong>পেশাজীবী প্রতিষ্ঠান</strong>\" অর্থ বিধি ৩৬ এ উল্লিখিত কোনো প্রতিষ্ঠান;</h5>\n<h5 class=\"h-lv5\"><strong>(৬৩)</strong> \"<strong>পরিকল্পনাবিদ</strong>” অর্থ যিনি নগর ও অঞ্চল বা গ্রামীণ পরিকল্পনা বিষয়ে স্নাতক ডিগ্রিপ্রাপ্ত ও বাংলাদেশ ইনস্টিটিউট অব প্লানার্স এর সদস্য এবং বিধি ৩৬ অনুযায়ী তালিকাভুক্ত;</h5>\n<h5 class=\"h-lv5\"><strong>(৬৪)</strong> \"<strong>পরামর্শক</strong>” অর্থ বিধি ৩৬ অনুযায়ী তালিকাভুক্ত কোনো কারিগরি ব্যক্তি বা প্রতিষ্ঠান;</h5>\n<h5 class=\"h-lv5\"><strong>(৬৫)</strong> \"<strong>প্লাম্বিং প্রকৌশলী</strong>\" অর্থ স্থপতি, পুরকৌশলী, যান্ত্রিক প্রকৌশলী বা ডিপ্লোমা পুরকৌশলী যিনি প্লাম্বিং বিষয়ে অভিজ্ঞ এবং বিধি ৩৬ অনুযায়ী কারিগরি ব্যক্তি হিসাবে তালিকাভুক্ত ও সংশ্লিষ্ট পেশাজীবী প্রতিষ্ঠানের সদস্য;</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第２条（用語の定義）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>５２</strong>　<strong>「都市開発委員会（Urban Development Committee）」</strong>　第３２条の規定に基づき設置された都市開発委員会をいう。</h5>\n<h5 class=\"h-lv5\"><strong>５３</strong>　<strong>「建築確認手数料（Construction Permit Fee）」</strong>　この規則に基づき工作物を建築する際に納付すべき付録４に記載の手数料をいう。</h5>\n<h5 class=\"h-lv5\"><strong>５４</strong>　<strong>「都市再開発（Urban Redevelopment）」</strong>　都市の危険、老朽化、又は市民向け公共施設が不十分な区域において、その固有の特性を維持しつつ、生活水準、経済状況及び構造的改善を行う再開発プロセスをいう。</h5>\n<h5 class=\"h-lv5\"><strong>５５</strong>　<strong>「階（Story / Tola）」</strong>　建築物の任意の階の床の上面から直上の階の仕上げられた上面までの間、又は直上の階がない場合は、屋根面若しくはその他の被覆物の上面までの間をいう。</h5>\n<h5 class=\"h-lv5\"><strong>５６</strong>　<strong>「登録建築物等（Listed Building or Structure）」</strong>　意匠、歴史、科学、社会、若しくは宗教上の重要性を有するもの、又は精神的に重要な拠点であって、政府によって承認され公報に掲載された建築物又は工作物をいう。</h5>\n<h5 class=\"h-lv5\"><strong>５７</strong>　<strong>「付録（Appendix）」</strong>　この規則の任意の付録をいう。</h5>\n<h5 class=\"h-lv5\"><strong>５８</strong>　<strong>「避難出口（Exit）」</strong>　建築物の任意の階から道路又は安全な開放空間へ至るための出口をいう。</h5>\n<h5 class=\"h-lv5\"><strong>５９</strong>　<strong>「自然換気（Natural Ventilation）」</strong>　建築物の扉又は窓を介して、室内に自然な空気の流れを供給するシステムをいう。</h5>\n<h5 class=\"h-lv5\"><strong>６０</strong>　<strong>「パラペット（Parapet）」</strong>　屋根又は床の周囲を囲むように設置される、高さ１メートル以上の手摺又は壁をいう。</h5>\n<h5 class=\"h-lv5\"><strong>６１</strong>　<strong>「駐車場（Parking Space）」</strong>　車両を駐車するための、屋内若しくは屋外の、規則に従い被覆された若しくは開放された十分な面積を有する場所であって、車両の通行に適した通路を介して内部及び外部の道路と接続されているものをいう。</h5>\n<h5 class=\"h-lv5\"><strong>６２</strong>　<strong>「職能団体（Professional Body）」</strong>　第３６条に規定する団体をいう。</h5>\n<h5 class=\"h-lv5\"><strong>６３</strong>　<strong>「都市計画家（Planner）」</strong>　都市計画、地域計画又は農村計画の学士号を有し、バングラデシュ都市計画家協会の会員であり、かつ、第３６条の規定に基づき登録された者をいう。</h5>\n<h5 class=\"h-lv5\"><strong>６４</strong>　<strong>「コンサルタント（Consultant）」</strong>　第３６条の規定に基づき登録された専門技術者又は法人をいう。</h5>\n<h5 class=\"h-lv5\"><strong>６５</strong>　<strong>「給排水衛生設備技術者（Plumbing Engineer）」</strong>　給排水衛生設備に関する経験を有する建築士、土木技術者、機械技術者又はディプロマ技術者（土木）であって、第３６条の規定に基づき専門技術者として登録され、かつ、関連する職能団体の会員である者をいう。</h5>\n<hr class=\"sep\">\n<p>1. <strong>「階（Story）」の定義（第２条第５５号）</strong>:</p>\n<p>ダッカ規則では、階の境界を「床の上面から直上の階の床の上面まで」としている。日本の建築基準法では、直接的な「階」の定義はないが、階数の算定（令第２条第１項第８号）において「床面積」を有する空間として扱われる。ダッカ規則は、仕上げられた上面（সম্পন্নকৃত উপরিভাগ）を基準点に据えることで、階高の算定根拠を明確にしている。</p>\n<p>2. <strong>パラペットの最小高さ設定（第２条第６０号）</strong>:</p>\n<p>パラペットに対し「高さ１メートル以上」という具体的な数値を定義段階で求めている。日本の建築基準法施行令第１２６条（屋上広場等の手摺）では「高さ１．１メートル以上」とされており、ダッカ規則の方がわずかに緩和されているが、墜落防止という安全上の機能を定義として明文化している点は共通している。</p>\n<p>3. <strong>「都市再開発」の定義の包括性（第２条第５４号）</strong>:</p>\n<p>都市再開発を単なる建て替えではなく、経済状況（ অর্থনৈতিক অবস্থা ）や生活水準（ জীবনযাত্রার মান ）の向上までを含むプロセスとして定義している。日本の「都市再開発法」等に基づく制度趣旨と整合するが、建築規則の用語定義としてソフト面（経済・生活）の改善を明記している点は、都市政策と建築規制の密接な連携を示唆している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における用語の定義に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．<strong>「都市再開発（Urban Redevelopment）」</strong>とは、老朽化した建物を解体して最新の工法で再建築することのみを指し、住民の生活水準の向上等は含まれない。</p>\n<p>２．<strong>「階（Story）」</strong>の算定において、屋根がある場合であっても、最上階の床の上面から屋根の上面までの間を「階」として扱うことはできない。</p>\n<p>３．<strong>「避難出口（Exit）」</strong>とは、建築物の任意の階から、道路又は安全な開放空間へ至るための経路をいう。</p>\n<p>４．<strong>「パラペット（Parapet）」</strong>とは、屋根の周囲に設置される防護用の壁であり、その高さは ０．５メートル 以上あれば本規則の基準に適合する。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第２条第５４号により、生活水準や経済状況の改善も再開発の定義に含まれる。</p>\n<p>2. 誤り。第２条第５５号により、直上階がない場合は屋根面（ ছাদ ）の上面までを階とする。</p>\n<p><strong>3. 正しい。</strong> 第２条第５８号の規定通りである。</p>\n<p>3. 誤り。第２条第６０号により、パラペットの高さは最小 「১ (এক) মিটার（１メートル）」 以上必要である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13416","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>২। সংজ্ঞা (চলমান)</strong></h4>\n<h5 class=\"h-lv5\"><strong>(৬৬)</strong> \"<strong>পয়ঃনিষ্কাশন ব্যবস্থা</strong>\" অর্থ যেকোনো পয়ঃনালী, নর্দমা, সেপটিক ট্যাংক, সোকওয়েল, পরিশোধন কেন্দ্র অথবা সংশ্লিষ্ট অন্যান্য ব্যবস্থাদি;</h5>\n<h5 class=\"h-lv5\"><strong>(৬৭)</strong> \"<strong>পাহাড়</strong>\" অর্থ সন্নিহিত স্থান হইতে নির্দিষ্ট আয়তনের উঁচু কোনো প্রাকৃতিক ভূখন্ড যাহা মাটি বা পাথরের তৈরি, প্রায় বর্তুলাকার এবং যাহার ঢাল খুব তীক্ষ্মভাবে খাড়া নহে;</h5>\n<h5 class=\"h-lv5\"><strong>(৬৮)</strong> “<strong>প্লিন্থ</strong>” অর্থ প্লট সংলগ্ন রাস্তার সাপেক্ষে অন্যূন ০.৪৫ (শূন্য দশমিক চার পাঁচ) মিটার ও অনধিক ১.৮৫ (এক দশমিক আট পাঁচ) মিটার এবং Formation Level হইতে সর্বোচ্চ ১ (এক) মিটার উচ্চতা বিশিষ্ট মেঝে যাহা ভবনের মূল তল হিসাবে বিবেচ্য;</h5>\n<h5 class=\"h-lv5\"><strong>(৬৯)</strong> “<strong>পোডিয়াম</strong>” অর্থ ইমারতের সম্পূর্ণ (প্যারাপেড ব্যতীত) বা আংশিক নিম্নাংশ যাহা ইমারতের সম্মুখ সংলগ্ন রাস্তার উপরিতল হইতে ১২ (বারো) মিটার উচ্চতার মধ্যে সীমাবদ্ধ হইবে;</h5>\n<h5 class=\"h-lv5\"><strong>(৭০)</strong> \"<strong>প্রকৌশলী</strong>” অর্থ যিনি প্রকৌশল বিষয়ে স্নাতক ডিগ্রিপ্রাপ্ত এবং বিধি ৩৬ অনুযায়ী কারিগরি ব্যক্তি হিসাবে তালিকাভুক্ত এবং সংশ্লিষ্ট পেশাজীবী প্রতিষ্ঠানের সদস্য;</h5>\n<h5 class=\"h-lv5\"><strong>(৭১)</strong> \"<strong>পরামর্শক প্রতিষ্ঠান</strong>\" অর্থ পেশাজীবী প্রতিষ্ঠানের সদস্য ও বিধি অনুযায়ী তালিকাভুক্ত কারিগরি লোকবলের সমন্বয়ে গঠিত প্রতিষ্ঠান যাহা পেশাগত সেবা প্রদানের জন্য গঠিত;</h5>\n<h5 class=\"h-lv5\"><strong>(৭২)</strong> \"<strong>ফরম</strong>\" অর্থ কর্তৃপক্ষ কর্তৃক নির্ধারিত ফরম;</h5>\n<h5 class=\"h-lv5\"><strong>(৭৩)</strong> \"<strong>ফলস সিলিং</strong>” অর্থ কক্ষের উচ্চতার মধ্যে একটি মধ্যবর্তী অতিরিক্ত ছাদ, যাহা নান্দনিক কারণে, ভান্ডার বা সার্ভিস তদারকি, ইত্যাদি কাজে ব্যবহৃত হয়, তবে উহা বসবাসযোগ্য নহে;</h5>\n<h5 class=\"h-lv5\"><strong>(৭৪)</strong> \"<strong>ফিনস্ বা লুভার (Fins or Louver)</strong>\" অর্থ ইমারতের একটি খাড়া বা আনুভূমিক উপাদান, যাহা সচরাচর সূর্য ও বৃষ্টি হইতে রক্ষা পাইবার জন্য জানালা, বারান্দা, বেলকনি ও করিডোরের বহির্মুখে ব্যবহৃত হয়;</h5>\n<h5 class=\"h-lv5\"><strong>(৭৫)</strong> \"<strong>ফিনিসড্ ফ্লোর লেভেল (Finished Floor Level)</strong>\" অর্থ মেঝের সম্পন্নকৃত উপরিতল;</h5>\n<h5 class=\"h-lv5\"><strong>(৭৬)</strong> \"<strong>ফিনিসড্ গ্রাউন্ড লেভেল (Finished Ground Level)</strong>\" অর্থ জমির সম্পন্নকৃত উপরিতল;</h5>\n<h5 class=\"h-lv5\"><strong>(৭৭)</strong> \"<strong>ফিনিসড্ সিলিং লেভেল (Finished Celling Level)</strong>\" অর্থ ছাদের সম্পন্নকৃত নিম্নতল;</h5>\n<h5 class=\"h-lv5\"><strong>(৭৮)</strong> \"<strong>ফুটপাত</strong>” অর্থ রাস্তার পার্শ্বে বা অন্য কোনো স্থানে পায়ে হাঁটার পথ;</h5>\n<h5 class=\"h-lv5\"><strong>(৭৯)</strong> \"<strong>ফ্ল্যাট বা এপার্টমেন্ট</strong>” অর্থ বাসযোগ্য একক আবাস, যাহার মধ্যে রান্নাঘর, গোসলখানা, শৌচাগার, প্রসাধনকক্ষ, ইত্যাদি অন্তর্ভুক্ত থাকিবে;</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第２条（用語の定義）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>６６</strong>　<strong>「排水設備（Sewage system）」</strong>　あらゆる排水管、下水溝、浄化槽（セプティックタンク）、浸透桝、処理施設又はこれらに関連するその他の設備をいう。</h5>\n<h5 class=\"h-lv5\"><strong>６７</strong>　<strong>「山（Hill / Pahar）」</strong>　周辺の地盤から特定の規模で盛り上がった、土又は石で構成された天然の地塊であって、ほぼ円形をなし、その傾斜が著しく急峻ではないものをいう。</h5>\n<h5 class=\"h-lv5\"><strong>６８</strong>　<strong>「基礎（土台 / Plinth）」</strong>　敷地に接する道路の路面から０．４５メートル以上１．８５メートル以下、かつ、造成レベル（Formation Level）から最高１メートルの高さにある床であって、建築物の主要な階（メインフロア）とみなされるものをいう。</h5>\n<h5 class=\"h-lv5\"><strong>６９</strong>　<strong>「ポディウム（Podium）」</strong>　建築物の全体（パラペットを除く。）又は一部の下層部であって、建築物の前面に接する道路の路面から高さ１２メートル以内に制限されるものをいう。</h5>\n<h5 class=\"h-lv5\"><strong>７０</strong>　<strong>「技術者（Engineer / Prokoushuli）」</strong>　工学の学士号を有し、第３６条の規定により専門技術者として登録された、関連する職能団体の正会員をいう。</h5>\n<h5 class=\"h-lv5\"><strong>７１</strong>　<strong>「コンサルタント機関（Consultancy firm）」</strong>　職能団体の会員及び規定により登録された技術的な人材によって構成され、専門的なサービスを提供することを目的として設立された機関をいう。</h5>\n<h5 class=\"h-lv5\"><strong>７２</strong>　<strong>「様式（Form）」</strong>　所管行政庁（Authority）が定める様式をいう。</h5>\n<h5 class=\"h-lv5\"><strong>７３</strong>　<strong>「吊り天井（False ceiling）」</strong>　室の高さの中間に設けられた追加の天井であって、意匠上の目的、倉庫又は設備の点検等のために使用されるものをいう。ただし、居室（居住用）として使用することはできない。</h5>\n<h5 class=\"h-lv5\"><strong>７４</strong>　<strong>「フィン又はルーバー（Fins or Louver）」</strong>　建築物の垂直又は水平の部材であって、通常、日射又は雨から保護するために、窓、縁側（Verandah）、バルコニー又は廊下の外部に使用されるものをいう。</h5>\n<h5 class=\"h-lv5\"><strong>７５</strong>　<strong>「設計床高（Finished Floor Level）」</strong>　仕上げられた床の上面のレベルをいう。</h5>\n<h5 class=\"h-lv5\"><strong>７６</strong>　<strong>「設計地盤面（Finished Ground Level）」</strong>　仕上げられた土地の表面のレベルをいう。</h5>\n<h5 class=\"h-lv5\"><strong>７７</strong>　<strong>「設計天井高（Finished Ceiling Level）」</strong>　仕上げられた天井の下面のレベルをいう。</h5>\n<h5 class=\"h-lv5\"><strong>７８</strong>　<strong>「歩道（Footpath）」</strong>　道路の側部又はその他の場所に設けられた歩行者専用の道をいう。</h5>\n<h5 class=\"h-lv5\"><strong>７９</strong>　<strong>「住戸（Flat or Apartment）」</strong>　居住に適した個別の住居であって、台所、浴室、便所、洗面所等を含むものをいう。</h5>\n<hr class=\"sep\">\n<p>1. <strong>基礎（Plinth）の定義と道路レベルの連動（第２条第６８号）</strong>:</p>\n<p>ダッカ規則では、建築物の主要階の基準となる「Plinth」の高さを、接する道路面に対して <strong>０．４５ｍ以上１．８５ｍ以下</strong> と数値で厳格に指定している。日本の建築基準法施行令第２条第２項では「地盤面」の定義（建築物が周囲の地面と接する平均の高さ）はあるが、主要階の床高さを道路面からの定数範囲で法的に縛る規定はない。これはダッカの慢性的な冠水対策として、生活空間を物理的にかさ上げさせる意図がある。</p>\n<p>2. <strong>ポディウムの高さ制限の明文化（第２条第６９号）</strong>:</p>\n<p>建築物の下層部（基壇部）を「ポディウム（Podium）」と定義し、道路面から <strong>１２メートル</strong>（約３〜４階相当）までと制限している。日本の建築基準法では「総合設計制度」等により基壇部の形態が議論されることはあるが、用語の定義として「１２メートル」という一律の数値を設けている点は、都市景観の連続性を維持しようとする強力な形態規制の表れである。</p>\n<p>3. <strong>吊り天井の非居室性の明示（第２条第７３号）</strong>:</p>\n<p>吊り天井（False ceiling）を定義する際、「居住用（ বসবাসযোগ্য ）ではない」ことを明記している。日本の建築基準法では、天井裏の空間を居室とみなさないのは自明だが、ダッカ規則ではメンテナンスや倉庫としての利用を認めつつ、違法な居住化を防ぐための「居住不可」という法的属性を定義段階で付与している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における用語の定義に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．<strong>「基礎（Plinth）」</strong>とは、建築物の主要な階（メインフロア）を指し、造成レベル（Formation Level）からの高さは ２メートル 以下としなければならない。</p>\n<p>２．<strong>「ポディウム（Podium）」</strong>とは、建築物の下層部をいい、屋上パラペットの高さを含めて、前面道路の路面から １５メートル 以内の高さに制限される。</p>\n<p>３．<strong>「吊り天井（False ceiling）」</strong>は、意匠や設備点検のために設けられるものであり、状況に応じて居室として使用することができる。</p>\n<p>４．<strong>「フィン又はルーバー（Fins or Louver）」</strong>は、日射又は雨から保護するために、窓やバルコニーの外部に使用される垂直又は水平の部材をいう。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：４</strong></p>\n<p>1. 誤り。第２条第６８号により、造成レベル（Formation Level）からの最高高さは <strong>১ (এক) মিটার（１メートル）</strong> である。</p>\n<p>2. 誤り。第２条第６９号により、高さ制限は <strong>১২ (বারো) মিটার（１２メートル）</strong> であり、かつパラペットは除外される。</p>\n<p>3. 誤り。第２条第７３号により、吊り天井部分は <strong>বসবাসযোগ্য নহে（居住用ではない）</strong> と規定されている。</p>\n<p><strong>4. 正しい。</strong> 第２条第７４号の規定通りである。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13417","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>২। সংজ্ঞা (চলমান)</strong></h4>\n<h5 class=\"h-lv5\"><strong>(৮০)</strong> \"<strong>ফ্লোর এরিয়া (Floor Area)</strong>\" অর্থ দেয়াল ও অন্যান্য ভারবাহী কাঠামোর আনুভূমিক ক্ষেত্রফলসহ ইমারতের ব্যবহারযোগ্য একটি তলার ক্ষেত্রফল;</h5>\n<h5 class=\"h-lv5\"><strong>(৮১)</strong> “<strong>ফ্লোর এরিয়া অনুপাত (Floor Area Ratio বা FAR)</strong>\" অর্থ জমির ক্ষেত্রফলের অনুপাতে ইমারতে সন্নিবেশযোগ্য সম্পূর্ণ মেঝের ক্ষেত্রফল, যথা: একটি প্লটের মাঝে তৈরি সম্পূর্ণ ফ্লোর এরিয়ার যোগফলকে উক্ত প্লটের বিদ্যমান জমির ক্ষেত্রফল দ্বারা বিভাজনের ফল, যাহার ফর্মুলা নিম্নরূপ—</h5>\n<h6 class=\"h-lv6\"></h6>\n<p>$<span class=\"math\">FAR = \\frac{জমির ক্ষেত্রফল (প্রযোজ্য ক্ষেত্রে রাস্তার জন্য ছাড়িয়া দেওয়া জমির ক্ষেত্রফল ব্যতীত)）}{সকল মেঝের সম্মিলিত ক্ষেত্রফল (বিধিমালার আওতায় ছাড়যোগ্য ক্ষেত্রফলসমূহ ব্যতীত）}</span>$</p>\n<h5 class=\"h-lv5\"><strong>(৮২)</strong> \"<strong>বসতবাড়ি</strong>\" অর্থ স্বতন্ত্র বসবাস, রন্ধন এবং স্বাস্থ্য ব্যবস্থার সুবিধা সংবলিত এক স্বাবলম্বী বসত ব্যবস্থা যাহা এক বা একাধিক কক্ষের সমন্বয়ে গঠিত ইমারত বা ইমারতের অংশবিশেষ;</h5>\n<h5 class=\"h-lv5\"><strong>(৮৩)</strong> \"<strong>বন্যার পানি উচ্চতা</strong>\" অর্থ একটি নির্দিষ্ট এলাকার জন্য ভূমি অথবা নদীর সর্বোচ্চ তল হইতে বন্যাকালীন পানির উচ্চতা, যাহা বাংলাদেশ পানি উন্নয়ন বোর্ড কর্তৃক Flood Hazard Map এ সংরক্ষিত;</h5>\n<h5 class=\"h-lv5\"><strong>(৮৪)</strong> “<strong>বসবাসযোগ্য কক্ষ</strong>\" অর্থ লিভিং রুম, শয়ন, অধ্যয়ন বা খাওয়ার জন্য ব্যবহৃত কক্ষ; তবে বাথরুম, টয়লেট, রান্নাঘর, লন্ড্রি, ভান্ডার, করিডোর, প্যান্ট্রি, ভূগর্ভস্থ রুম, চিলেকোঠা, অনিয়মিত ব্যবহৃত জায়গা ইহার অন্তর্ভুক্ত হইবে না;</h5>\n<h5 class=\"h-lv5\"><strong>(৮৫)</strong> \"<strong>বসবাস বা ব্যবহার সনদ</strong>\" অর্থ বিধি ২২ এর অধীন প্রদত্ত বসবাস বা ব্যবহার সনদ বা, ক্ষেত্রমত, বিধি ২৫ এর অধীন নবায়নকৃত বসবাস বা ব্যবহার সনদ;</h5>\n<h5 class=\"h-lv5\"><strong>(৮৬)</strong> \"<strong>বহুতল ইমারত</strong>\" অর্থ কোডের Article 6 এ সংজ্ঞায়িত High Rise Building বা বহুতল ইমারত;</h5>\n<h5 class=\"h-lv5\"><strong>(৮৭)</strong> \"<strong>ব্যালকনি</strong>” অর্থ ইমারতের মূল অংশ হইতে বহিঃদিকে বর্ধিত যাহা প্লিন্থ হইতে অন্যূন ২.২৮৬ (দুই দশমিক দুই আট ছয়) মিটার উচ্চতায় ব্যবহারযোগ্য জায়গা যাহার ভূমি পর্যন্ত বর্ধিত কোনো অবলম্বন নাই, বাহিরের দিকে নিরেট কোনো বেষ্টনী দ্বারা সম্পূর্ণ আবদ্ধ নহে এবং যাহার ২ (দুই) বা ৩ (তিন) পার্শ্ব অবাধ বা উন্মুক্ত থাকিবে:</h5>\n<h6 class=\"h-lv6\"><strong>তবে শর্ত থাকে যে,</strong></h6>\n<h6 class=\"h-lv6\"><strong>(ক)</strong> ব্যালকনিতে ব্যবহৃত নিরেট বেষ্টনীর উচ্চতা সর্বোচ্চ ১.২৫ (এক দশমিক দুই পাঁচ) মিটার হইবে;</h6>\n<h6 class=\"h-lv6\"><strong>(খ)</strong> কোনো অবস্থাতেই ইমারতের সেটব্যাকের মধ্যে উক্ত ব্যালকনি বর্ধিত হইতে পারিবে না;</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第２条（用語の定義）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>８０</strong>　<strong>床面積（Floor Area）</strong>　壁その他の耐力構造の水平投影面積を含む、建築物の使用可能な一の階の面積をいう。</h5>\n<h5 class=\"h-lv5\"><strong>８１</strong>　<strong>容積率（Floor Area Ratio / FAR）</strong>　敷地面積に対する建築物の延べ面積の割合をいい、一の敷地内の各階床面積の合計を当該敷地の面積で除して得た数値をいう。その算定式は、次のとおりとする。</h5>\n<h6 class=\"h-lv6\"></h6>\n<p>$<span class=\"math\">容積率（FAR） = \\frac{全床面積の合計（本規則に基づき除外される面積を除く。）}{敷地面積（適用がある場合において、道路後退部分の面積を除く。）}</span>$</p>\n<h5 class=\"h-lv5\"><strong>８２</strong>　<strong>住居（Residence / Basotbari）</strong>　独立した居住、調理及び衛生設備の機能を備えた自立的な居住体系であって、一又は二以上の室により構成される建築物又は建築物の一部をいう。</h5>\n<h5 class=\"h-lv5\"><strong>８３</strong>　<strong>洪水位（Flood water level）</strong>　特定の区域における地盤面又は河川の最高水位からの洪水時の水位であって、バングラデシュ水資源開発委員会による洪水ハザードマップ（Flood Hazard Map）に記録されたものをいう。</h5>\n<h5 class=\"h-lv5\"><strong>８４</strong>　<strong>居室（Habitable Room）</strong>　居間、寝室、書斎又は食事のために使用される室をいう。ただし、浴室、便所、台所、洗濯室、納戸、廊下、配膳室、地下室、屋根裏部屋及び一時的に使用される場所は、これに含まない。</h5>\n<h5 class=\"h-lv5\"><strong>８５</strong>　<strong>使用許可証（Occupancy Certificate / Bosobas ba byobohar sonod）</strong>　第２２条の規定により交付された使用許可証又は、場合により、第２５条の規定により更新された使用許可証をいう。</h5>\n<h5 class=\"h-lv5\"><strong>８６</strong>　<strong>高層建築物（High Rise Building）</strong>　法典（Code）第６条に定義される高層建築物をいう。</h5>\n<h5 class=\"h-lv5\"><strong>８７</strong>　<strong>ベランダ（Balcony）</strong>　建築物の主要構造部から外部に突出した部分であって、基礎（Plinth）から２．２８６メートル以上の高さに位置する使用可能な空間をいう。この場合において、地盤面まで達する支柱を有せず、外部に向かって不透明な囲いにより完全に密閉されておらず、かつ、２面又は３面が開放されているものをいう。</h5>\n<h6 class=\"h-lv6\"><strong>ただし、次に掲げる条件に従わなければならない。</strong></h6>\n<h6 class=\"h-lv6\"><strong>一</strong>　ベランダに使用される不透明な囲いの高さは、最大１．２５メートルとすること。</h6>\n<h6 class=\"h-lv6\"><strong>二</strong>　いかなる場合においても、外壁の後退距離（セットバック）内に当該ベランダを突出させてはならない。</h6>\n<hr class=\"sep\">\n<p>1. <strong>「居室」の定義と除外項目（第２条第８４号）</strong>:</p>\n<p>ダッカ規則では、居室（Habitable Room）の定義から「台所（ রান্নাঘর / Kitchen）」を明示的に除外している。日本の建築基準法（法第２条第４号）では、台所は「継続的に使用する室」として居室に含まれるのが原則だが、ダッカ規則では居住・就寝・学習・食事の場に限定し、サービス空間としての台所を切り離している点が特徴的である。</p>\n<p>2. <strong>ベランダの定義と高さ制限（第２条第８７号）</strong>:</p>\n<p>ベランダの定義において、基礎（Plinth）から <strong>２．２８６メートル</strong>（約７．５フィート）以上の高さにあることを要件としている。日本の建築基準法では高さによるベランダの定義はないが、ダッカ規則では地盤面から浮いた空間であることを定義上求めており、かつ外壁後退（セットバック）内への突出を一切禁じることで、隣地との離隔を厳格に管理している。</p>\n<p>3. <strong>洪水位の法制化（第２条第８３号）</strong>:</p>\n<p>「洪水位（ বন্যার পানি উচ্চতা ）」という用語を建築規則の定義として掲げ、公的な洪水ハザードマップとの連動を明記している。日本の建築基準法では、災害危険区域（法第３９条）等での制限はあるが、建築用語の定義として洪水位を直接掲げる例は少なく、デルタ地帯に位置するダッカの地理的脆弱性に対応した実務的な規定といえる。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における用語の定義に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．<strong>「容積率（FAR）」</strong>の算定において、敷地面積には道路拡幅のために供出した土地の面積を含めなければならない。</p>\n<p>２．<strong>「居室（Habitable Room）」</strong>には、居間、寝室、書斎のほか、調理を行うための台所（Kitchen）も含まれる。</p>\n<p>３．<strong>「ベランダ（Balcony）」</strong>の周囲に不透明な囲いを設ける場合、その高さは地盤面から １．২৫メートル 以下としなければならない。</p>\n<p>４．<strong>「ベランダ（Balcony）」</strong>は、いかなる場合においても建築物の外壁の後退距離（セットバック）内に突出させてはならない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：４</strong></p>\n<p>1. 誤り。第２条第８１号の算定式により、道路後退部分は敷地面積から除外される（ ব্যতীত ）。</p>\n<p>2. 誤り。第２条第８４号及び第８５号により、台所（ রান্নাঘর ）は居室に含まれない。</p>\n<p>3. 誤り。第２条第８７号（ｋａ）により、不透明な囲いの高さはベランダの床面から最大 <strong>১.২৫（１．２５）メートル</strong> である。</p>\n<p><strong>4. 正しい。</strong> 第２条第８７号（ｋｈ）の規定通りである。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13418","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>২। সংজ্ঞা (চলমান)</strong></h4>\n<h5 class=\"h-lv5\"><strong>(৮৮)</strong> \"<strong>ব্যত্যয়কৃত ইমারত বা ভবন</strong>\" অর্থ কোড ও বিধির ব্যত্যয় করিয়া নির্মিত অনুমোদিত বা অননুমোদিত ইমারত;</h5>\n<h5 class=\"h-lv5\"><strong>(৮৯)</strong> \"<strong>বারান্দা</strong>\" অর্থ ইমারতের যেকোনো তলে অবস্থিত অংশ, যেখানে ছাদ বা সিলিং রহিয়াছে ও কমপক্ষে একটি দিক বাহিরের দিকে ২.১৩ (দুই দশমিক এক তিন) মিটার উচ্চতা পর্যন্ত খোলা এবং বিধি অনুযায়ী অন্যূন উচ্চতা বিশিষ্ট বেষ্টনী বা গার্ডরেইল দ্বারা আবদ্ধ;</h5>\n<h5 class=\"h-lv5\"><strong>(৯০)</strong> \"<strong>বিদ্যমান ইমারত</strong>\" অর্থ এই বিধিমালা কার্যকর হইবার পূর্বে কর্তৃপক্ষ কর্তৃক অনুমোদিত বা অ-অনুমোদিত কোনো ইমারত;</h5>\n<h5 class=\"h-lv5\"><strong>(৯১)</strong> \"<strong>বিশেষ এলাকা</strong>\" অর্থ প্রাকৃতিক বা সাংস্কৃতিক গুরুত্ব বহনকারী এবং মহাপরিকল্পনার অধীন প্রস্তুত বিশদ অঞ্চল পরিকল্পনাতে নির্দেশিত এলাকা;</h5>\n<h5 class=\"h-lv5\"><strong>(৯২)</strong> \"<strong>বিশেষ ইমারত</strong>\" অর্থ বিধি ১০ এর উপ-বিধি (১) এ উল্লিখিত শ্রেণির ইমারত;</h5>\n<h5 class=\"h-lv5\"><strong>(৯৩)</strong> \"<strong>বেজমেন্ট</strong>\" অর্থ ইমারতের তল যাহার ৫০% (পঞ্চাশ শতাংশ) বা তদূর্ধ্ব অংশ প্রধান প্রবেশ পথের সর্বোচ্চ উপরিতল হইতে ১ (এক) মিটার বা তদূর্ধ্ব গভীরতায় অবস্থিত;</h5>\n<h5 class=\"h-lv5\"><strong>(৯৪)</strong> \"<strong>ভূমি আচ্ছাদন</strong>\" অর্থ ইমারত দ্বারা আবৃত জমির পরিমাণ যাহা শতকরা হার হিসাবে উল্লিখিত হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\"></h6>\n<p>$<span class=\"math\">ভূমি আচ্ছাদন (Ground Coverage) = \\frac{বিধিমালার আওতায় ছাড়যোগ্য ক্ষেত্রফল বাদে ইমারত দ্বারা জমির আবৃত এলাকা \\times ১০০}{জমির ক্ষেত্রফল (প্রযোজ্য ক্ষেত্রে রাস্তার জন্য ছাড়িয়া দেওয়া জমির ক্ষেত্রফল ব্যতীত)}</span>$</p>\n<h5 class=\"h-lv5\"><strong>(৯৫)</strong> \"<strong>পরিকল্পনা অনুমোদনপত্র</strong>\" অর্থ কর্তৃপক্ষ কর্তৃক Town Improvement Act, 1953 (Act No. XIII of 1953) এর অধীন প্রণীত মহাপরিকল্পনা এবং মহানগরী, বিভাগীয় শহর ও জেলা শহরের পৌর এলাকাসহ দেশের সকল পৌর এলাকার খেলার মাঠ, উন্মুক্ত স্থান, উদ্যান এবং প্রাকৃতিক জলাধার সংরক্ষণ আইন, ২০০০ (২০০০ সনের ৩৬ নং আইন) ও সংশ্লিষ্ট অন্যান্য আইন ও বিধিমালার আলোকে প্রদত্ত পরিকল্পনা অনুমোদন সম্পর্কিত পত্র;</h5>\n<h5 class=\"h-lv5\"><strong>(৯৬)</strong> \"<strong>ভূমি জরিপকারী</strong>\" অর্থ কোনো কারিগরি ব্যক্তি যিনি ভূমি জরিপকারী হিসাবে বিধি ৩৬ এ উল্লিখিত কোনো পেশাজীবী প্রতিষ্ঠানে তালিকাভুক্ত;</h5>\n<h5 class=\"h-lv5\"><strong>(৯৭)</strong> \"<strong>মহাপরিকল্পনা</strong>\" অর্থ Town Improvement Act, 1953 (Act No. XIII of 1953) এর অধীন প্রণীত সর্বশেষ অনুমোদিত পরিকল্পনা;</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第２条（用語の定義）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>８８</strong>　<strong>不適合建築物（Deviated Building）</strong>　法典（BNBC）又は本規則の規定に抵触して建築された、承認済み又は未承認の建築物をいう。</h5>\n<h5 class=\"h-lv5\"><strong>８９</strong>　<strong>縁側（Verandah）</strong>　建築物の任意の階に位置する部分であって、屋根又は天井を有し、少なくとも一側面が外部に向かって２．１３メートル以上の高さまで開放され、かつ、本規則の規定に基づく一定の高さの柵又はガードレールにより囲われたものをいう。</h5>\n<h5 class=\"h-lv5\"><strong>９０</strong>　<strong>既存建築物（Existing Building）</strong>　本規則の施行前に、所管行政庁により承認を受け、又は承認を受けずに存在した建築物をいう。</h5>\n<h5 class=\"h-lv5\"><strong>９１</strong>　<strong>特別区域（Special Area）</strong>　自然又は文化的に重要であり、都市計画（マスタープラン）に基づき策定された詳細地域計画（ＤＡＰ）において指定された区域をいう。</h5>\n<h5 class=\"h-lv5\"><strong>９２</strong>　<strong>特殊建築物（Special Building）</strong>　第１０条第１項に規定する分類の建築物をいう。</h5>\n<h5 class=\"h-lv5\"><strong>９３</strong>　<strong>地階（Basement）</strong>　床の５０パーセント以上が、主要な出入口の最高接地面から１メートル以上の深さに位置する階をいう。</h5>\n<h5 class=\"h-lv5\"><strong>９４</strong>　<strong>建蔽率（Ground Coverage / Building Area Ratio）</strong>　建築物の建築面積の敷地面積に対する割合をいい、百分率で表す。算定式は、次のとおりとする。</h5>\n<h6 class=\"h-lv6\"></h6>\n<p>$<span class=\"math\">建蔽率 = \\frac{建築面積（本規則に基づき除外される面積を除く。） \\times 100}{敷地面積（適用がある場合において、道路後退部分の面積を除く。）}</span>$</p>\n<h5 class=\"h-lv5\"><strong>９５</strong>　<strong>計画承認書（Planning Permit）</strong>　所管行政庁が、１９５３年都市改良法（１９５３年法律第１３号）に基づき策定された都市計画（マスタープラン）並びに２０００年公園、広場、庭園及び天然水体保存法（２０００年法律第３６号）その他関連法令に照らして交付する、計画承認に関する文書をいう。</h5>\n<h5 class=\"h-lv5\"><strong>９６</strong>　<strong>土地家屋調査士（Land Surveyor / Bhumi joripkari）</strong>　第３６条に掲げる専門職団体に土地家屋調査士として登録された専門技術者をいう。</h5>\n<h5 class=\"h-lv5\"><strong>９７</strong>　<strong>都市計画（マスタープラン）</strong>　１９５３年都市改良法（１９５３年法律第１３号）に基づき策定された、最新の承認済み計画をいう。</h5>\n<hr class=\"sep\">\n<p>1. <strong>地階の算定基準の相違（第２条第９３号）</strong>:</p>\n<p>ダッカ規則では、地階（Basement）の定義として「床の５０％以上が１ｍ以上の深さにあること」を求めている。日本の建築基準法（令第１条第２号）では、床から地盤面までの高さが天井の高さの３分の１以上であることを要件とするが、面積割合（５０％）を直接の定義に組み込んでいる点はダッカ規則独自の基準である。</p>\n<p>2. <strong>建蔽率算定における道路供出地の除外（第２条第９４号）</strong>:</p>\n<p>建蔽率（Ground Coverage）の算定において、将来の道路拡幅のために供出された土地（道路後退部分）を敷地面積から明示的に除外するとしている。これは日本の建築基準法第４２条第２項（セットバック）による敷地面積不算入の原則と論理的に共通している。</p>\n<p>3. <strong>「縁側（Verandah）」の構造要件（第２条第８９号）</strong>:</p>\n<p>縁側の定義において、外部への開放高さを「２．１３メートル以上」と極めて具体的に規定している。日本の法令ではバルコニーやベランダの定義にこれほど詳細な開放高さの数値を設ける例は少なく、通風・換気に対する機能的な要求が法制化されている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における用語の定義に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．<strong>「縁側（Verandah）」</strong>とは、建築物の各階に位置し、少なくとも一側面が外部に向かって １．８０メートル 以上の高さまで開放されているものをいう。</p>\n<p>２．<strong>「既存建築物（Existing Building）」</strong>とは、本規則が施行される前に、所管行政庁により適法に承認を受けていた建築物のみを指し、未承認のものは含まない。</p>\n<p>３．<strong>「地階（Basement）」</strong>とは、床の ５０パーセント 以上が、主要な出入口の最高接地面から １メートル 以上の深さに位置する階をいう。</p>\n<p>４．<strong>「建蔽率（Ground Coverage）」</strong>の算定において、道路拡幅のために後退した部分（セットバック部分）の面積は、敷地面積に含めなければならない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第２条第８９号により、開放部の高さは <strong>২.১৩（２．１３）メートル</strong> 以上である。</p>\n<p>2. 誤り。第２条第９０号により、承認・未承認のいずれも含まれる（ অনুমোদিত বা অ-অনুমোদিত ）。</p>\n<p><strong>3. 正しい。</strong> 第２条第９３号の規定通りである。</p>\n<p>3. 誤り。第２条第９４号の算定式により、道路後退部分は敷地面積から除外される（ ব্যতীত ）。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13419","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>২। সংজ্ঞা (চলমান)</strong></h4>\n<h5 class=\"h-lv5\"><strong>(৯৮)</strong> \"<strong>মেজানাইন তলা (Mezzanine Floor)</strong>\" অর্থ যেকোনো কক্ষের মেঝে ও ছাদের অন্তর্বর্তী এক বা একাধিক আংশিক তলা, তবে ইহা মেঝের আয়তনের এক তৃতীয়াংশ অপেক্ষা অধিক হইতে পারিবে না, ইমারতের তলা গণনা করিবার ক্ষেত্রে মেজানাইন তলাকে ইমারতের তলা হিসাবে গণ্য করা হইবে না, কিন্তু মেজানাইন তলার প্রযোজ্য অংশ FAR ভুক্ত ক্ষেত্রফল এর অন্তর্ভুক্ত হইবে;</h5>\n<h5 class=\"h-lv5\"><strong>(৯৯)</strong> \"<strong>মেঝে</strong>\" অর্থ ভূমির আনুভূমিক ইমারতের তলা;</h5>\n<h5 class=\"h-lv5\"><strong>(১০০)</strong> \"<strong>মেকানিক্যাল ইঞ্জিনিয়ার বা যন্ত্র প্রকৌশলী</strong>\" অর্থ যিনি সংশ্লিষ্ট বিষয়ে স্নাতক ডিগ্রিপ্রাপ্ত, ইন্সটিটিউশন অব ইঞ্জিনিয়ার্স, বাংলাদেশ এর সদস্য এবং বিধি ৩৬ অনুযায়ী তালিকাভুক্ত;</h5>\n<h5 class=\"h-lv5\"><strong>(১০১)</strong> \"<strong>যান্ত্রিক বায়ু চলাচল ব্যবস্থা</strong>\" অর্থ যান্ত্রিকভাবে কোনো ইমারত বা উহার অংশ বিশেষ বাতাস প্রবেশ অথবা প্রয়োজনে বাতাস বাহির করিয়া দেওয়ার ব্যবস্থা;</h5>\n<h5 class=\"h-lv5\"><strong>(১০২)</strong> \"<strong>রাস্তা</strong>\" অর্থ ভূমি-জরিপ ম্যাপ, সংশ্লিষ্ট সিটি কর্পোরেশন, রাজধানী উন্নয়ন কর্তৃপক্ষ, মিউনিসিপ্যালিটি বা সমজাতীয় নাগরিক সুবিধা প্রদানকারী কোনো সংস্থার ম্যাপ বা রেকর্ডভুক্ত চলাচলের পথ, সকল ধরনের সড়ক, মহাসড়ক, বিদ্যমান সড়ক সংলগ্ন ফুটপাথ, ড্রেন অথবা পথ নির্মাণের জন্য নির্ধারিত স্থান (ROW); এবং উক্ত রাস্তাকে নিকটবর্তী গাড়ি চলাচলের জন্য উপযুক্ত কোনো রাস্তার সহিত সংযুক্ত হইতে হইবে;</h5>\n<h5 class=\"h-lv5\"><strong>(১০৩)</strong> \"<strong>রাস্তার প্রস্থ</strong>\" অর্থ রাস্তা, রাস্তা-সংলগ্ন ড্রেন, ফুটপাথ, ইত্যাদিসহ রাস্তার সর্বমোট বিস্তার এবং রাস্তার প্রস্থ বিবেচনার জন্য প্লটের রাস্তা সংলগ্ন দুই পাশের সীমানা কর্ণার হইতে উভয় দিকে ৫০ (পঞ্চাশ) মিটার রাস্তার দৈর্ঘ্য পর্যন্ত গড় (ন্যূনতম এবং সর্বোচ্চ) প্রস্থ বিদ্যমান রাস্তার প্রস্থ হিসাবে বিবেচনা করিতে হইবে;</h5>\n<h5 class=\"h-lv5\"><strong>(১০৪)</strong> \"<strong>রিয়েল এস্টেট উন্নয়ন প্রকল্প বা প্রকল্প</strong>\" অর্থ আবাসিক বা প্রাতিষ্ঠানিক বা বাণিজ্যিক বা শিল্প প্লট উন্নয়ন ও বরাদ্দকরণ এবং নিম্নবর্ণিত প্রকল্প বা প্রকল্পসমূহ ইহার অন্তর্ভুক্ত হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\"><strong>(ক)</strong> ডেভেলপার কর্তৃক বেসরকারি রিয়েল এস্টেট নির্মাণ, ক্রয়-বিক্রয়, বরাদ্দ, ইত্যাদির জন্য গৃহীত প্রকল্প বা প্রকল্পসমূহ;</h6>\n<h6 class=\"h-lv6\"><strong>(খ)</strong> সরকারের উদ্যোগে রিয়েল এস্টেট নির্মাণ, ক্রয়-বিক্রয়, বরাদ্দ, ইত্যাদির জন্য গৃহীত প্রকল্প বা প্রকল্পসমূহ;</h6>\n<h5 class=\"h-lv5\"><strong>(১০৫)</strong> \"<strong>রোডভিত্তিক FAR</strong>\" অর্থ মহাপরিকল্পনার আলোকে রাস্তার প্রশস্ততার ভিত্তিতে বিধি ৪৭ অনুসারে নির্ধারিত FAR;</h5>\n<h5 class=\"h-lv5\"><strong>(১০৬)</strong> \"<strong>স্থপতি</strong>\" অর্থ যিনি স্থাপত্য বিষয়ে স্নাতক ডিগ্রিপ্রাপ্ত এবং ইনস্টিটিউট অব আর্কিটেক্টস, বাংলাদেশ এর সদস্য এবং বিধি ৩৬ অনুযায়ী তালিকাভুক্ত;</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第２条（用語の定義）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>９８</strong>　<strong>中二階（Mezzanine Floor）</strong>　室の床と天井との間に設けられた一又は二以上の部分的な階をいう。ただし、当該中二階の面積は、直下階の床面積の３分の１を超えてはならない。建築物の階数を算定する場合、中二階は階数に算入しないものとする。ただし、中二階の該当する部分は、容積率（FAR）算定の基礎となる床面積に算入しなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>９９</strong>　<strong>床（Floor）</strong>　建築物の各階における水平な面をいう。</h5>\n<h5 class=\"h-lv5\"><strong>１００</strong>　<strong>機械技術者（Mechanical Engineer）</strong>　関連分野の学士号を有し、バングラデシュ技術者協会（IEB）の会員であり、かつ、第３６条の規定により登録された者をいう。</h5>\n<h5 class=\"h-lv5\"><strong>１０１</strong>　<strong>機械換気設備（Mechanical ventilation system）</strong>　機械的作用により、建築物又はその一部に外気を導入し、又は必要に応じて内部の空気を排出するシステムをいう。</h5>\n<h5 class=\"h-lv5\"><strong>１０２</strong>　<strong>道路（Road / Rasta）</strong>　地籍図、関連する市公社（City Corporation）、首都開発庁（RAJUK）、地方自治体又は同等の市民向け公共サービス提供機関の地図若しくは記録に登録された通路、あらゆる種類の道路、高速道路、既存の道路に附随する歩道、排水溝、又は道路建設のために指定された区域（ROW）をいう。当該道路は、近隣の車両通行に適した道路に接続されていなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>１０３</strong>　<strong>道路幅員（Road Width）</strong>　道路、道路に附随する排水溝、歩道等を含む道路の全幅をいう。幅員の算定にあたっては、敷地が接する道路の境界線の両端からそれぞれ５０メートル区間における平均（最小及び最大）幅員を、現況の道路幅員とみなす。</h5>\n<h5 class=\"h-lv5\"><strong>１０４</strong>　<strong>不動産開発事業（Real estate development project）</strong>　住宅、施設、商業又は工業用区画の開発及び割り当てをいい、次に掲げる事業を含むものとする。</h5>\n<h6 class=\"h-lv6\"><strong>一</strong>　開発業者（Developer）による民間不動産の建設、売買、割り当て等のための事業</h6>\n<h6 class=\"h-lv6\"><strong>二</strong>　政府の主導による不動産の建設、売買、割り当て等のための事業</h6>\n<h5 class=\"h-lv5\"><strong>１０５</strong>　<strong>道路幅員別容積率（Road-based Floor Area Ratio）</strong>　都市計画（Master Plan）に基づき、道路幅員に応じて第４７条の規定により算定される容積率（FAR）をいう。</h5>\n<h5 class=\"h-lv5\"><strong>１０６</strong>　<strong>建築士（Architect / Sthapoti）</strong>　建築学の学士号を有し、バングラデシュ建築家協会（IAB）の会員であり、かつ、第３６条の規定により登録された者をいう。</h5>\n<hr class=\"sep\">\n<p>1. <strong>中二階（メザニン）の算定基準（第２条第９８号）</strong>:</p>\n<p>ダッカ規則では、中二階が「階数」に含まれないための面積要件を直下階の <strong>３分の１（one-third）以下</strong> としている。日本の建築基準法（令第１条第１号、法第２条第８号等の運用）では、床面積の２分の１未満、かつ天井高１．４ｍ以下であれば「階」として算入しない取扱いがあるが、ダッカ規則は面積比率をより厳格（１／３）に制限している。一方で、容積率（FAR）には「該当する部分を算入する」と明記し、床の多層化による高密化を厳格に管理している。</p>\n<p>2. <strong>道路幅員の定義範囲（第２条第１０３号）</strong>:</p>\n<p>道路幅員（Road Width）に「排水溝（Drain）」や「歩道（Footpath）」を明確に含めている。日本の建築基準法第４２条における道路幅員は、一般に側溝等の外側線までの距離（官民境界等）を指すが、ダッカ規則はインフラ構成要素を一体として「幅員」と定義している。また、接道箇所から前後 <strong>５０メートル</strong> の平均値を採用する定量的算出法は、局所的な幅員の増減に左右されない合理的な基準といえる。</p>\n<p>3. <strong>専門技術者の適格要件（第２条第１００号・第１０６号）</strong>:</p>\n<p>建築士や機械技術者の定義において、「学士号の取得」に加えて「職能団体（IAB/IEB）への正会員登録」を法的な要件としている。日本の「建築士法」に基づく国家資格制度とは異なり、大学教育と職能団体による自主管理を建築規制の法的基盤に組み込んでいる。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における用語の定義に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．<strong>「中二階（Mezzanine Floor）」</strong>の床面積が直下階の床面積の ２分の１ 未満であれば、建築物の階数には算入されず、容積率（FAR）の算定基礎となる床面積にも含める必要はない。</p>\n<p>２．<strong>「道路幅員（Road Width）」</strong>を算定する場合、道路に附随する排水溝や歩道の幅は、道路の本来の機能ではないため含めてはならない。</p>\n<p>３．敷地が接する<strong>「道路（Road）」</strong>は、車両通行に適した近隣の道路に接続されていなければならない。</p>\n<p>４．<strong>「建築士（Architect）」</strong>とは、建築学の学士号を有していれば足り、特定の専門職団体への所属や本規則に基づく登録は要件とされない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第２条第９８号により、面積制限は <strong>３分の１（এক তৃতীয়াংশ）</strong> 以下であり、かつ容積率（FAR）には算入しなければならない。</p>\n<p>2. 誤り。第２条第１０３号により、排水溝（ ড্রেন ）や歩道（ ফুটপাথ ）も全幅に含まれる。</p>\n<p><strong>3. 正しい。</strong> 第２条第１０২号の規定通りである（ গাড়ি চলাচলের জন্য উপযুক্ত কোনো রাস্তার সহিত সংযুক্ত হইতে হইবে ）。</p>\n<p>3. 誤り。第２条第１０６号により、学士号に加え、バングラデシュ建築家協会（ IAB ）の会員であること及び第３６条に基づく登録が必要である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13420","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>২। সংজ্ঞা (চলমান)</strong></h4>\n<h5 class=\"h-lv5\"><strong>(১০৭)</strong> \"<strong>সংশোধন বা পরিবর্তন</strong>\" অর্থ অনুমোদিত নকশার ব্যবহার পরিবর্তন বা কোনো স্থাপত্য বা কাঠামোগত পরিবর্তন যেমন: ইমারতের ক্ষেত্রফল বা উচ্চতার সহিত সংযোজন, অংশবিশেষ অপসারণ এবং কোনো দেয়াল, কলাম, বিম, সিঁড়ি, লিফট বা মেঝে নির্মাণ, কর্তন বা অপসারণ এর মাধ্যমে কাঠামোর কোনো পরিবর্তন, কোনো প্রবেশপথ বা বহির্গমন পথের পরিবর্তন বা বন্ধ করা অথবা যে কোনো উপকরণ ও সরঞ্জামাদি পরিবর্তন;</h5>\n<h5 class=\"h-lv5\"><strong>(১০৮)</strong> \"<strong>সংযোজন</strong>\" অর্থ ইমারতের মেঝের ক্ষেত্রফল, উচ্চতা বা ঘন আয়তনের সহিত যেকোনো ধরনের স্থাপনা যুক্তকরণ;</h5>\n<h5 class=\"h-lv5\"><strong>(১০৯)</strong> \"<strong>সংরক্ষিত এলাকা</strong>\" অর্থ বিশদ অঞ্চল পরিকল্পনা বা ডিটেইলড এরিয়া প্ল্যান (DAP) বা অন্য কোনো আইন বিধি দ্বারা সংজ্ঞায়িত সংরক্ষিত এলাকা;</h5>\n<h5 class=\"h-lv5\"><strong>(১১০)</strong> \"<strong>সারণি</strong>\" অর্থ এই বিধিমালার কোনো সারণি;</h5>\n<h5 class=\"h-lv5\"><strong>(১১১)</strong> \"<strong>সেটব্যাক (Setback)</strong>\" অর্থ প্রতিটি ইমারতের সম্মুখে, পার্শ্বে এবং পশ্চাতে ন্যূনতম উন্মুক্ত স্থান;</h5>\n<h5 class=\"h-lv5\"><strong>(১১২)</strong> \"<strong>সেটব্যাক লাইন</strong>\" অর্থ প্লট বা সাইটে প্রস্তাবিত বা বিদ্যমান ইমারতের চতুর্দিকের অনুমোদনযোগ্য বা অনুমোদিত সীমারেখা;</h5>\n<h5 class=\"h-lv5\"><strong>(১১৩)</strong> \"<strong>সার্ভিস ড্রইং</strong>\" অর্থ বিধি ৩৬ অনুযায়ী নিবন্ধিত কারিগরি ব্যক্তি কর্তৃক প্রস্তুতকৃত নকশাসমূহ, যাহাতে নিম্নবর্ণিত বিষয়সমূহ অন্তর্ভুক্ত থাকিবে, যথা:-</h5>\n<h6 class=\"h-lv6\"><strong>(ক)</strong> পানি সরবরাহ, পয়ঃ ও পানি নিষ্কাশন, প্রযোজ্য ক্ষেত্রে, রেইন ওয়াটার হার্ভেস্টিং, সুয়ারেজ ট্রিটমেন্ট প্ল্যান্ট (STP), শিল্পবর্জ্য শোধনাগার (ETP), ড্রেইনেজ, গ্যাস সরবরাহ, রেটিকুলেটেড গ্যাস সরবরাহ সিস্টেম, ইত্যাদির লে-আউট প্ল্যান ও ড্রইং;</h6>\n<h6 class=\"h-lv6\"><strong>(খ)</strong> বৈদ্যুতিক স্থাপনা, উপ-কেন্দ্র, বৈদ্যুতিক সার্কিট ডায়াগ্রাম, সৌর বৈদ্যুতিক, ইত্যাদির লে-আউট প্ল্যান ও ড্রইং;</h6>\n<h6 class=\"h-lv6\"><strong>(গ)</strong> শীতাতপ নিয়ন্ত্রণ ব্যবস্থার (যদি থাকে) প্ল্যান, ডিজাইন ও লে-আউট এবং লিফট, এস্কেলেটর ও মুভিং ওয়াক স্থাপন (যদি থাকে) স্থাপনের ড্রইং;</h6>\n<h6 class=\"h-lv6\"><strong>(ঘ)</strong> গ্যারেজ, উত্তাপন (Heating), অভ্যন্তরীণ শব্দ (Acoustics) নিয়ন্ত্রণ সংক্রান্ত ড্রইং (প্রযোজ্য ক্ষেত্রে);</h6>\n<h6 class=\"h-lv6\"><strong>(ঙ)</strong> বিল্ডিং ম্যানেজমেন্ট সিস্টেম (BMS) সংক্রান্ত ড্রইং (প্রযোজ্য ক্ষেত্রে);</h6>\n<h6 class=\"h-lv6\"><strong>(চ)</strong> ফাইবার অপটিক্যাল ক্যাবল নেটওয়ার্ক এর জন্য ডাক্ট (বহুতল ইমারতের ক্ষেত্রে বাধ্যতামূলক);</h6>\n<h6 class=\"h-lv6\"><strong>(ছ)</strong> ভবনের অন্যান্য সেবাসমূহের বিস্তারিত ড্রইং (প্রযোজ্য ক্ষেত্রে);</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第２条（用語の定義）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>１０７</strong>　<strong>修正又は変更（Modification or Alteration / Songshodhon ba Poriborton）</strong>　承認済み設計における用途の変更、又は建築物の面積若しくは高さに係る増築、部分的な撤去並びに壁、柱、梁、階段、昇降機若しくは床の築造、切断若しくは撤去による構造の変更、出入口若しくは避難経路の変更若しくは閉鎖、又はあらゆる材料及び備品の変更をいう。</h5>\n<h5 class=\"h-lv5\"><strong>１０８</strong>　<strong>増築（Addition / Sonzojon）</strong>　建築物の床面積、高さ又は容積に、いかなる種類であっても構造物を付加することをいう。</h5>\n<h5 class=\"h-lv5\"><strong>１０９</strong>　<strong>保存区域（Protected Area / Songrokkhito Elaka）</strong>　詳細地域計画（DAP）又はその他の法令により定義される保存区域をいう。</h5>\n<h5 class=\"h-lv5\"><strong>１１０</strong>　<strong>表（Table / Saroni）</strong>　本規則の別表をいう。</h5>\n<h5 class=\"h-lv5\"><strong>１１１</strong>　<strong>外壁の後退距離（Setback）</strong>　建築物の前面、側面及び背面において確保されるべき最小限の空地をいう。</h5>\n<h5 class=\"h-lv5\"><strong>１１２</strong>　<strong>後退線（Setback Line）</strong>　敷地（Plot / Site）において計画され、又は現に存する建築物の周囲に設定される、建築可能な境界線をいう。</h5>\n<h5 class=\"h-lv5\"><strong>１１３</strong>　<strong>設備図（Service Drawing / Service Droing）</strong>　第３６条の規定により登録された専門技術者（Technical person）が作成する図面であって、次に掲げる事項を含むものをいう。</h5>\n<h6 class=\"h-lv6\"><strong>ａ</strong>　給水、排水、雨水利用、汚水処理施設（STP）、産業廃液処理施設（ETP）、排水系、ガス供給、集中ガス供給システム等の配置図及び詳細図</h6>\n<h6 class=\"h-lv6\"><strong>ｂ</strong>　電気工作物、変電所、回路図、太陽光発電設備等の配置図及び詳細図</h6>\n<h6 class=\"h-lv6\"><strong>ｃ</strong>　空気調和設備（存する場合に限る。）の計画、設計及び配置、並びに昇降機、エスカレーター及び動く歩道（存する場合に限る。）の設置詳細図</h6>\n<h6 class=\"h-lv6\"><strong>ｄ</strong>　車庫、暖房、音響制御に関する図面（適用がある場合に限る。）</h6>\n<h6 class=\"h-lv6\"><stron
