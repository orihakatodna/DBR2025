d></td><td>H2</td><td>সাধারণ দাহ্য পদার্থের গুদাম (Moderate fire risk storage)</td></tr>\n<tr><td><strong>৯।</strong></td><td><strong>I : সমাবেশ (Assembly)</strong></td><td>I1</td><td>বড় মিলনায়তন (আসন স্থানান্তরযোগ্য নহে)</td></tr>\n<tr><td></td><td></td><td>I2</td><td>ছোট মিলনায়তন (আসন স্থানান্তরযোগ্য নহে এবং জনসংখ্যা ৩০০ এর কম)</td></tr>\n<tr><td></td><td></td><td>I3</td><td>বড় মিলনায়তন (আসন স্থানান্তরযোগ্য)</td></tr>\n<tr><td></td><td></td><td>I4</td><td>ছোট মিলনায়তন (আসন স্থানান্তরযোগ্য এবং জনসংখ্যা ৩০০ এর কম)</td></tr>\n<tr><td></td><td></td><td>I5</td><td>ক্রীড়া বিষয়ক</td></tr>\n<tr><td><strong>১০।</strong></td><td><strong>J : বিপজ্জনক ভবনের ব্যবহার</strong></td><td>J1</td><td>বিস্ফোরণ ঘটাইতে পারে এইরূপ ভবন (Explosion hazard building)</td></tr>\n<tr><td></td><td></td><td>J2</td><td>রাসায়নিক ধরনের বিপজ্জনক ভবন (Chemical hazard building)</td></tr>\n<tr><td></td><td></td><td>J3</td><td>জীবাণু ধরনের বিপজ্জনক ভবন (Biological hazard building)</td></tr>\n<tr><td></td><td></td><td>J4</td><td>বিকিরণ ধরনের বিপজ্জনক ভবন (Radiation hazard building)</td></tr>\n<tr><td><strong>১১।</strong></td><td><strong>K : পার্কিং</strong></td><td>K1</td><td>বাণিজ্যিক পার্কিং</td></tr>\n<tr><td></td><td></td><td>K2</td><td>ব্যক্তি মালিকানাধীন পার্কিং</td></tr>\n<tr><td></td><td></td><td>K3</td><td>মেরামত কারখানা</td></tr>\n<tr><td><strong>১২।</strong></td><td><strong>L : ইউটিলিটি</strong></td><td>L</td><td>ইউটিলিটি সার্ভিসসমূহ (পাম্প হাউজ, সাব-স্টেশন ইত্যাদি)</td></tr>\n<tr><td><strong>১৩।</strong></td><td><strong>M : Miscellaneous</strong></td><td>M1</td><td>বিশেষ ধরনের কাঠামো (স্মৃতি সৌধ, শহীদ মিনার ইত্যাদি)</td></tr>\n<tr><td></td><td></td><td>M2</td><td>সীমানা দেয়াল, জলাধার, টাওয়ার, বিলবোর্ড ইত্যাদি</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>付録３ 用途分類（承前）</strong></h4>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>建築物の用途分類</th><th>小分類</th><th>使用用途の具体的種類</th></tr></thead>\n<tbody>\n<tr><td><strong>６</strong></td><td><strong>F：商業（Mercantile）</strong></td><td>F1</td><td>小規模な店舗及び市場（３００㎡未満）</td></tr>\n<tr><td></td><td></td><td>F2</td><td>大規模な店舗及び市場（３００㎡以上）</td></tr>\n<tr><td><strong>７</strong></td><td><strong>G：工場（Industrial）</strong></td><td>G1</td><td>低公害・低危険の工場及び家内工業</td></tr>\n<tr><td><strong>８</strong></td><td><strong>H：倉庫（Storage）</strong></td><td>H1</td><td>低可燃性物質の倉庫</td></tr>\n<tr><td><strong>９</strong></td><td><strong>I：集会（Assembly）</strong></td><td>I1</td><td>大規模ホール（座席固定型）</td></tr>\n<tr><td></td><td></td><td>I2</td><td>小規模ホール（座席固定、３００人未満）</td></tr>\n<tr><td><strong>１０</strong></td><td><strong>J：危険物（Hazardous）</strong></td><td>J1</td><td>爆発の危険性がある建築物</td></tr>\n<tr><td></td><td></td><td>J3</td><td>生物学的危険性がある建築物</td></tr>\n<tr><td><strong>１１</strong></td><td><strong>K：駐車場（Parking）</strong></td><td>K1</td><td>商業用駐車場</td></tr>\n<tr><td></td><td></td><td>K3</td><td>自動車修理工場</td></tr>\n<tr><td><strong>１２</strong></td><td><strong>L：ユーティリティ</strong></td><td>L</td><td>公共設備施設（ポンプ室、変電所等）</td></tr>\n<tr><td><strong>１３</strong></td><td><strong>M：その他</strong></td><td>M1</td><td>特殊な構造物（記念碑等）</td></tr>\n<tr><td></td><td></td><td>M2</td><td>境界塀、タワー、看板等</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">\n<p>1. <strong>商業施設の規模による区分（F分類）</strong>:</p>\n<p>ダッカ規則では、店舗の規模を <strong>３００平方メートル</strong> を境に F1 と F2 に分類している。日本の基準法においても面積による耐火義務等の段階設定はあるが、３００㎡という比較的小規模な段階で管理区分を設けている点は、密集地における延焼防止を強く意識している。</p>\n<p>2. <strong>集会ホールの詳細な分類（I分類）</strong>:</p>\n<p>集会施設について、座席の固定・可動及び収容人員 <strong>３００人</strong> の有無により I1 から I4 までの詳細な分類を行っている。避難荷重が変動しやすい可動型を独立定義しており、避難設計の精度を高める意図が伺える。</p>\n<p>3. <strong>危険物施設の災害リスク別区分（J分類）</strong>:</p>\n<p>危険物施設を「爆発」「化学」「生物」「放射線」といった災害の性質ごとに細分化している。生物学的や放射線リスクを基本用途分類に明記している点は、現代的なリスク管理に即した体系といえる。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025 付録３「用途分類」に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．「床面積 ４００平方メートル の衣料品店」は、商業分類の <strong>F1</strong> に該当する。</p>\n<p>２．集会施設において、収容人員が <strong>২৫০人</strong> で座席が固定されている小規模なホールは、分類 <strong>I2</strong> とされる。</p>\n<p>３．「自動車修理工場（Repair workshop）」は、その機能から工場分類の <strong>G1</strong> に区分される。</p>\n<p>４．低可燃性物質を貯蔵する倉庫については、用途分類 <strong>M</strong>（Miscellaneous）に含まれる。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。F1は３００㎡未満であり、４００㎡の場合は <strong>F2</strong> に該当する。</p>\n<p><strong>2. 正しい。</strong> 分類 I2 は「座席固定型」且つ「人員３００人未満」の条件を満たす。</p>\n<p>2. 誤り。自動車修理工場は駐車場分類の <strong>K3</strong> に区分されている。</p>\n<p>3. 誤り。低可燃性物質の倉庫は倉庫分類の <strong>H1</strong> に該当する。 </span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13516","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h6 class=\"h-lv6\"><strong>নোট:</strong></h6>\n<h6 class=\"h-lv6\">১। কফিশপ, টি-স্টল, বেকারির দোকান বাণিজ্যিক (<strong>F1</strong>) শ্রেণীভুক্ত হইবে।</h6>\n<h6 class=\"h-lv6\">২। বাংলাদেশ ন্যাশনাল বিল্ডিং কোড অনুসারে রেস্টুরেন্টের ডাইনিং এবং পার্কিং (<strong>I</strong>) শ্রেণীর অন্তর্ভুক্ত হইবে এবং রান্নাঘর ও স্টোরেজ (<strong>L</strong>) শ্রেণীর অন্তর্ভুক্ত হইবে।</h6>\n<h6 class=\"h-lv6\">৩। পরিশিষ্ট- ৩ যে সকল ইমারত অন্তর্ভুক্ত নেই সেই সকল ইমারতের শ্রেণিবিন্যাস কোড অনুসারে নির্ধারিত হইবে।</h6>\n<h4 class=\"h-lv4\"><strong>পরিশিষ্ট- ৪</strong></h4>\n<h4 class=\"h-lv4\"><strong>ফি, ইত্যাদি</strong></h4>\n<h4 class=\"h-lv4\"><strong>[৪(২), ১৩(৯) দ্রষ্টব্য]</strong></h4>\n<h5 class=\"h-lv5\">(ক) <strong>পরিকল্পনা অনুমোদন পত্রের আবেদন ফি:</strong> ৫,০০০ (পাঁচ হাজার) টাকা।</h5>\n<h5 class=\"h-lv5\">(খ) <strong>ব্লকভিত্তিক আবাসন আবেদন ফি:</strong> প্রতি কাঠার জন্য ৫,০০০ (পাঁচ হাজার) টাকা。</h5>\n<h5 class=\"h-lv5\">(গ) <strong>ইমারত নির্মাণ অনুমোদন ফি:</strong> নিম্নবর্ণিত হারে সর্বমোট মেঝে এলাকার জন্য নির্ধারণযোগ্য হইবে:</h5>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নম্বর</th><th>ভবনের শ্রেণি</th><th>ভবনের উপ-শ্রেণি</th><th>প্রতি বর্গমিটার মেঝের জন্য ফি</th></tr></thead>\n<tbody>\n<tr><td>১।</td><td>আবাসিক</td><td>A-1, A-2, A-3, A-6</td><td>৫০/-</td></tr>\n<tr><td></td><td></td><td>A-4, A-5</td><td>৭৫/-</td></tr>\n<tr><td>২।</td><td>B-শিক্ষা প্রতিষ্ঠান</td><td>B-1, B-2, B-3</td><td>৫০/-</td></tr>\n<tr><td>৩।</td><td>C-প্রাতিষ্ঠানিক</td><td>C-1, C-2, C-3, C-4, C-5</td><td>৫০/-</td></tr>\n<tr><td>৪।</td><td>D-স্বাস্থ্যসেবা</td><td>D-1, D-2</td><td>৬০/-</td></tr>\n<tr><td>৫।</td><td>E- ব্যবসা</td><td>E-1, E-2, E-3</td><td>১৫০/-</td></tr>\n<tr><td>৬।</td><td>F-বাণিজ্যিক</td><td>F-1, F-2, F-3</td><td>১৫০/-</td></tr>\n<tr><td>৭।</td><td>G-শিল্প কারখানা</td><td>G-1, G-2</td><td>১৫০/-</td></tr>\n<tr><td>৮।</td><td>H-গুদাম</td><td>H-1, H-2</td><td>১৫০/-</td></tr>\n<tr><td>৯।</td><td>I-সমাবেশ</td><td>I-1, I-2, I-3, I-4, I-5</td><td>৭৫/-</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h6 class=\"h-lv6\"><strong>注釈:</strong></h6>\n<h6 class=\"h-lv6\">１　コーヒーショップ等は商業（<strong>F1</strong>）分類とする。</h6>\n<h6 class=\"h-lv6\">２　レストランの客席等は集会（<strong>I</strong>）分類、厨房等は公共設備（<strong>L</strong>）分類に含める。</h6>\n<h4 class=\"h-lv4\"><strong>付録４ 手数料（Fees）等</strong></h4>\n<h5 class=\"h-lv5\">一（ক）　<strong>土地利用許可（Planning Permit）等の申請手数料：</strong> ５,０００タカ。</h5>\n<h5 class=\"h-lv5\">二（খ）　<strong>ブロック住宅開発申請手数料：</strong> １カタ当たり ５,０００タカ。</h5>\n<h5 class=\"h-lv5\">三（গ）　<strong>建築確認（Construction Permit）申請手数料：</strong> 延べ面積に対し次に掲げる表の料率により算定する。</h5>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>建築物の用途分類</th><th>小分類</th><th>１㎡当たりの規定額（タカ）</th></tr></thead>\n<tbody>\n<tr><td><strong>１</strong></td><td>住宅</td><td>A-1, A-2, A-3, A-6</td><td>５０</td></tr>\n<tr><td></td><td></td><td>A-4, A-5</td><td>７５</td></tr>\n<tr><td><strong>２</strong></td><td><strong>B-教育施設</strong></td><td>B-1, B-2, B-3</td><td>５０</td></tr>\n<tr><td><strong>４</strong></td><td><strong>D-医療施設</strong></td><td>D-1, D-2</td><td>６０</td></tr>\n<tr><td><strong>５</strong></td><td><strong>E-業務施設</strong></td><td>E-1, E-2, E-3</td><td>１５０</td></tr>\n<tr><td><strong>６</strong></td><td><strong>F-商業施設</strong></td><td>F-1, F-2, F-3</td><td>１５０</td></tr>\n<tr><td><strong>９</strong></td><td><strong>I-集会施設</strong></td><td>I-1, I-2, I-3, I-4, I-5</td><td>７５</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">\n<p>1. <strong>レストランの用途区分（注釈２）</strong>:</p>\n<p>ダッカ規則では、同一の飲食店でも、客席を「集会(I)」、厨房を「公共設備(L)」と異なる用途分類に分けるよう規定している。日本の基準法では主要用途を一つとして扱うのが一般的だが、ダッカ規則は各室の機能ごとに厳密に用途コードを割り当てる思想を採っている。</p>\n<p>2. <strong>建築確認手数料の算定構造（付録４）</strong>:</p>\n<p>日本の手数料は床面積の合計階層に応じて一律の金額が設定されることが多いが、ダッカ規則は「用途分類 × １㎡あたりの単価」という比例配分方式を採用している。住宅（50タカ/㎡）に比べ、業務施設（150タカ/㎡）の手数料を高く設定している点は実務的な料率構成である。</p>\n<p>3. <strong>土地利用単位の課金（付録４項番（খ））</strong>:</p>\n<p>ブロック開発において、敷地面積の単位である<strong>「カタ（Katha）」</strong>（約６７㎡）ごとに手数料を課している。日本にはない独自の単位を用いた課金体系である。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における用途分類及び手数料に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．「コーヒーショップ」は、集会施設（用途分類Ｉ）として分類される。</p>\n<p>２．レストランの厨房（キッチン）部分は、客席部分と同様に集会として扱わなければならない。</p>\n<p>３．一戸建て住宅（A-1）の建築確認申請手数料は、延べ面積に対し １㎡ 当たり <strong>৫০（５０）タカ</strong> の単価を用いて算出する。</p>\n<p>４．商業施設（Ｆ）の手数料単価は、業務施設（Ｅ）の単価よりも高く設定されている。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。商業（ <strong>F1</strong> ）分類に属する。</p>\n<p>2. 誤り。厨房は公共設備（ <strong>L</strong> ）分類として扱う。</p>\n<p><strong>3. 正しい。</strong> 手数料一覧表の項番１の規定通りである。</p>\n<p>3. 誤り。両者の単価はいずれも <strong>১৫০/-</strong> であり同額である。 </span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13517","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নম্বর</th><th>ভবনের শ্রেণি</th><th>ভবনের উপ-শ্রেণি</th><th>প্রতি বর্গমিটার মেঝের জন্য নির্ধারিত ফি</th></tr></thead>\n<tbody>\n<tr><td>(১)</td><td>(২)</td><td>(৩)</td><td>(৪)</td></tr>\n<tr><td>১০।</td><td>J-বিপজ্জনক ভবনের ব্যবহার</td><td>J-1, J-2, J-3, J-4</td><td>৭৫/-</td></tr>\n<tr><td>১১।</td><td>J-পার্কিং</td><td>K-1, K-2, K-3</td><td>৫০/-</td></tr>\n<tr><td>১২।</td><td>L- ইউটিলিটি</td><td>L</td><td>২৫/-</td></tr>\n<tr><td>১৩।</td><td>M- বিবিধ</td><td>M-1, M-2</td><td>৫০/-</td></tr>\n</tbody>\n</table></div>\n<h6 class=\"h-lv6\"><strong>বিশেষ দ্রষ্টব্য:</strong></h6>\n<h6 class=\"h-lv6\">১। একই সাইটে একাধিক শ্রেণির ইমারত নির্মাণের ক্ষেত্রে প্রতিটি শ্রেণির জন্য আলাদা হিসাবে ফি প্রদান করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">২। ধর্মীয় উপাসনালয়ের উপাসনালয়ের জন্য ইমারত নির্মাণ অনুমোদন ফি প্রদান করিতে হইবে না।</h6>\n<h6 class=\"h-lv6\">৩। মিশ্র উন্নয়নের ক্ষেত্রে, যে ব্যবহারের ফি বেশি সেই ফি নির্ধারিত হইবে।</h6>\n<h5 class=\"h-lv5\">(ঙ) প্রাচীর নির্মাণের ফি: প্রতি বর্গমিটারের জন্য ২০ টাকা এবং সর্বমোট ন্যূনতম ২,০০০ টাকা।</h5>\n<h5 class=\"h-lv5\">(চ) বিলবোর্ড (M2) স্থাপনের ফি: প্রতি বর্গমিটারের জন্য ৫০ টাকা এবং সর্বমোট ন্যূনতম ৫,০০০ টাকা।</h5>\n<h5 class=\"h-lv5\">(ছ) জলাধার (M2) নির্মাণের ফি: প্রতি ঘনমিটারের জন্য ১০০ টাকা এবং সর্বমোট ন্যূনতম ১০,০০০ টাকা।</h5>\n<h5 class=\"h-lv5\">(জ) টাওয়ার (M2) স্থাপনের ফি: প্রতি ঘনメータের জন্য ১০০ টাকা এবং সর্বমোট ন্যূনতম ১০,০০০ টাকা。</h5>\n<h5 class=\"h-lv5\">(ঝ) ব্যবহার উপযোগিতা সনদপত্র ও নবায়নের জন্য ফি: প্রতিবারের জন্য ১,০০০ টাকা।</h5>\n<h5 class=\"h-lv5\">(ঞ) অপসারণের জন্য আবেদন ফি: ৫,০০০ টাকা মাত্র।</h5>\n<h5 class=\"h-lv5\">(ট) আপিলের জন্য আবেদন ফি: ৫,০০০ টাকা মাত্র।</h5>\n<h6 class=\"h-lv6\"><strong>বিশেষ দ্রষ্টব্য:</strong></h6>\n<h6 class=\"h-lv6\">ইমারতের ছাদে টেলিযোগাযোগ টাওয়ারের জন্য সংস্থানকৃত যান্ত্রিক কক্ষটি সর্বোচ্চ ১৫ বর্গমিটার পর্যন্ত <strong>FAR</strong> বহির্ভূত ক্ষেত্রফল হিসাবে অনুমোদনযোগ্য হইবে।</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>付録４ 手数料一覧（承前）</strong></h4>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>建築物の用途分類</th><th>小分類</th><th>１㎡当たりの規定額（タカ）</th></tr></thead>\n<tbody>\n<tr><td>１０</td><td>J-危険物施設</td><td>J-1 〜 J-4</td><td>７５</td></tr>\n<tr><td>１１</td><td>J-駐車場（※）</td><td>K-1 〜 K-3</td><td>５０</td></tr>\n<tr><td>１２</td><td>L-ユーティリティ</td><td>L</td><td>２５</td></tr>\n<tr><td>１３</td><td>M-その他</td><td>M-1, M-2</td><td>５０</td></tr>\n</tbody>\n</table></div>\n<h6 class=\"h-lv6\"><strong>特別注記:</strong></h6>\n<h6 class=\"h-lv6\">１　複数用途の建築物を建築する場合、各用途ごとに個別に算出した手数料の合計額を支払わなければならない。</h6>\n<h6 class=\"h-lv6\">２　モスク等の宗教施設については、建築確認申請手数料を免除する。</h6>\n<h6 class=\"h-lv6\">３　混合用途の場合、含まれる用途のうち最も高い料率の手数料を適用する。</h6>\n<h5 class=\"h-lv5\">五（ঙ）　囲障（塀）の築造手数料： １㎡当たり ２０タカ（最低額 ２,０００タカ）。</h5>\n<h5 class=\"h-lv5\">六（চ）　看板（M2）の設置手数料： １㎡当たり ５０タカ（最低額 ５,０００タカ）。</h5>\n<h5 class=\"h-lv5\">七（ছ）　貯水槽（M2）の築造手数料： １㎥当たり １００タカ（最低額 １０,０００タカ）。</h5>\n<h5 class=\"h-lv5\">八（জ）　タワー（M2）の設置手数料： １㎥当たり １００タカ（最低額 １０,０００タカ）。</h5>\n<h5 class=\"h-lv5\">九（ঝ）　使用適合証（OC）交付・更新手数料： １,０００タカ。</h5>\n<h5 class=\"h-lv5\">十（ঞ）　工作物除却手数料： ５,０００タカ。</h5>\n<h6 class=\"h-lv6\"><strong>特別注記:</strong></h6>\n<h6 class=\"h-lv6\">屋上タワー用機械室は、面積 <strong>１５平方メートル</strong> までは容積率（FAR）に算入しない。</h6>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p>1. <strong>容積率不算入の具体的緩和（特別注記）</strong>:</p>\n<p>ダッカ規則では、屋上の電気通信用機械室について <strong>１５平方メートル</strong> という具体的な上限値を設けて容積率（FAR）の算入除外を認めている。日本の基準法でも機械室等は不算入となる運用はあるが、規則の「手数料」の項で緩和条件を明記している点は実務的である。</p>\n<p>2. <strong>工作物手数料の体積課金方式（付録４項番（ছ）, （জ））</strong>:</p>\n<p>貯水槽やタワーに対し、<strong>「立方メートル（㎥）」</strong> あたりの単価による課金を採用している。日本の工事費ベース等の設定と異なり、都市空間を占拠する物理的量に応じた受益者負担の考え方が反映されている。</p>\n<p>3. <strong>宗教施設の公的免除（特別注記２）</strong>:</p>\n<p>宗教施設の建築について、確認手数料の全額免除を規則レベルで明文化している。バングラデシュでは宗教施設を社会インフラの特殊枠として明確に法制上の特別待遇を付与している。</p>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025 付録４に定める手数料及び容積率の取扱いに関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．同一敷地内に複数用途の建築物を建築する場合、最も低い料率を用いて全体を算出する。</p>\n<p>２．モスクを建築する場合、商業用途を併設していても常に建築確認申請手数料は全額免除される。</p>\n<p>３．屋上に設置する電気通信用タワーの機械室は、面積が <strong>১৫平方メートル</strong> 以内であれば容積率に算入しなくてよい。</p>\n<p>４．屋外に貯水槽を築造する場合の手数料は、その設置床面積に比例して算定しなければならない。</p>\n<p>* <strong>解説</strong>: <span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。複数用途の場合は各用途ごとに計算して合計する。</p>\n<p>2. 誤り。宗教的用途等に限定されることが条件である。</p>\n<p><strong>3. 正しい。</strong> ページ下部の特別注記の規定通りである。</p>\n<p>3. 誤り。体積（立方メートル）に基づき算定される。 </span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13518","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>পরিশিষ্ট- ৫</strong></h4>\n<h6 class=\"h-lv6\"><strong>[বিধি-৪০ দ্রষ্টব্য]</strong></h6>\n<p>#######</p>\n<h6 class=\"h-lv6\"><strong>দুই বা ততোধিক রাস্তার সংযোগস্থল</strong></h6>\n<h6 class=\"h-lv6\"><strong>ব্যাসার্ধ ২ মি.</strong></h6>\n<h6 class=\"h-lv6\"><strong>সাইট</strong></h6>\n<h6 class=\"h-lv6\"><strong>রাস্তা</strong></h6>\n<h6 class=\"h-lv6\"><strong>[বিধি-৪১ (২) দ্রষ্টব্য]</strong></h6>\n<p>#######</p>\n<h6 class=\"h-lv6\"><strong>দুই বা ততোধিক রাস্তার সংযোগস্থল</strong></h6>\n<h6 class=\"h-lv6\"><strong>ব্যাসার্ধ ২ মি.</strong></h6>\n<h6 class=\"h-lv6\"><strong>সাইট</strong></h6>\n<h6 class=\"h-lv6\"><strong>রাস্তা</strong></h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>付録５</strong></h4>\n<h6 class=\"h-lv6\"><strong>［第４０条関係］</strong></h6>\n<p>#######</p>\n<h6 class=\"h-lv6\"><strong>図：二以上の道路の交差点（角地の隅切り・セットバック）</strong></h6>\n<h6 class=\"h-lv6\"><strong>半径 ２ｍ</strong></h6>\n<h6 class=\"h-lv6\"><strong>敷地（サイト）</strong></h6>\n<h6 class=\"h-lv6\"><strong>道路</strong></h6>\n<h6 class=\"h-lv6\"><strong>［第４１条第２項関係］</strong></h6>\n<p>#######</p>\n<h6 class=\"h-lv6\"><strong>図：二以上の道路の交差点（四方道路等における隅切り）</strong></h6>\n<h6 class=\"h-lv6\"><strong>半径 ２ｍ</strong></h6>\n<h6 class=\"h-lv6\"><strong>敷地（サイト）</strong></h6>\n<h6 class=\"h-lv6\"><strong>道路</strong></h6>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p>1. <strong>角地の隅切り基準（付録５）</strong>:</p>\n<p>ダッカ規則では、交差点の角地において、道路境界線の交点から<strong>半径２メートル</strong>の円弧による隅切りを規定している。日本の建築安全条例等で求められる底辺２ｍの二等辺三角形による隅切りと目的は共通するが、ダッカ規則は円弧による具体的形状を図解で明示している。</p>\n<p>2. <strong>第４０条及び第４１条の図解化</strong>:</p>\n<p>本文の第４０条及び第４１条第２項の具体的適用例として、角地の処理方法を図示している。交通安全上の強行規定として、建築確認審査における物理的なチェックポイントとなっている。</p>\n<p>3. <strong>多面接道の敷地処理</strong>:</p>\n<p>敷地が複数の道路に面している場合のすべての角について、一律に半径２メートルの隅切りを求めている。日本よりも簡明な単一数値基準（２ｍ）を採用し、一貫した都市景観と安全性の確保を図っている。</p>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、角地の処理に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．二つの道路が交差する角地において、道路境界線の交点から １.৫メートル の範囲を隅切りしなければならない。</p>\n<p>２．付録５の図解によれば、角地の隅切りは直線で行わなければならない。</p>\n<p>３．第４０条の規定に基づく角地の処理において、確保すべき隅切りの寸法は <strong>半径 ২メートル</strong> である。</p>\n<p>４．敷地が四方を道路に囲まれている場合、隅切りを行う必要があるのは一箇所のみでよい。</p>\n<p>* <strong>解説</strong>: <span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。寸法は <strong>২ মি.</strong>（２メートル）である。</p>\n<p>2. 誤り。図解において円弧（曲線）による処理が示されている。</p>\n<p><strong>3. 正しい。</strong> 付録５の図解（ বিধি-৪০ দ্রষ্টব্য ）の記載通りである。</p>\n<p>3. 誤り。図解によれば、すべての角に対して隅切りが適用されている。 </span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13519","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>#######</p>\n<h6 class=\"h-lv6\"><strong>সাইট সমূহের সম্মুখ পশ্চাৎ ও পার্শ্ব</strong></h6>\n<h6 class=\"h-lv6\"><strong>রাস্তা</strong></h6>\n<h6 class=\"h-lv6\"><strong>সম্মুখ</strong></h6>\n<h6 class=\"h-lv6\"><strong>পশ্চাৎ</strong></h6>\n<h6 class=\"h-lv6\"><strong>পার্শ্ব</strong></h6>\n<h6 class=\"h-lv6\"><strong>সাইট</strong></h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<p>#######</p>\n<h6 class=\"h-lv6\"><strong>敷地の前面、背面及び側面（の定義図）</strong></h6>\n<h6 class=\"h-lv6\"><strong>道路（Rasta）</strong></h6>\n<h6 class=\"h-lv6\"><strong>前面／正面（Sommukh）</strong></h6>\n<h6 class=\"h-lv6\"><strong>背面（Poshchat）</strong></h6>\n<h6 class=\"h-lv6\"><strong>側面（Parshwa）</strong></h6>\n<h6 class=\"h-lv6\"><strong>敷地／サイト（Site）</strong></h6>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p>1. <strong>敷地の前面・背面・側面の定義（付録図解）</strong>:</p>\n<p>ダッカ規則では、道路との接道状況に基づき、敷地の「前面」「背面」「側面」を視覚的に定義している。日本の基準法でも隣地境界線の区分等で斜線制限等の適用面が決まるが、ダッカ規則は特に変形地等における「前面」の取り方を網羅的に図示し、セットバック算定基準を明確化している。</p>\n<p>2. <strong>接道方位による方位種別の特定</strong>:</p>\n<p>道路に面する側が常に「前面」と定義され、その反対側が「背面」、それ以外が「側面」として扱われることが示されている。不整形な敷地においても、どの境界線がどの方位に該当するかを幾何学的に確定させる仕組みとなっている。</p>\n<p>3. <strong>形態規制への連動性</strong>:</p>\n<p>これらの定義は、規則本文に定めるセットバック各数値規定を適用する際の基礎となる。配置図におけるこれら方位の特定が、容積率や建蔽率審査の出発点となっている。</p>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025 付録に示された敷地の方位定義に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．一つの道路に面する矩形の敷地において、道路に面する境界線は「前面」、その両隣は「背面」と定義される。</p>\n<p>２．二つの道路が交差する角地において、両方の道路に面する側を「前面」として扱う図解は存在しない。</p>\n<p>３．不整形な敷地において、道路に接する境界線の反対側にある境界線は「背面」として分類される。</p>\n<p>４．敷地の「側面」とは、前面（道路側）及び背面のいずれにも該当しない境界線方向を指す。</p>\n<p>* <strong>解説</strong>: <span style=\"color: #ffffff;\"></p>\n<p><strong>正解：４</strong></p>\n<p>1. 誤り。道路に面する側の両隣は「側面」である。</p>\n<p>2. 誤り。図解中段に二方道路において双方を前面とするケースが示されている。</p>\n<p>3. 誤り。不整形地であっても、道路の入り方によって幾何学的に決定される。</p>\n<p><strong>4. 正しい。</strong> 図解に示されたすべてのパターンにおいて、側面は前面・背面の直交方向または中間的境界線として定義されている。 </span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13520","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>#######</p>\n<h6 class=\"h-lv6\"><strong>সাইট সমূহের সম্মুখ পশ্চাৎ ও পার্শ্ব</strong></h6>\n<h6 class=\"h-lv6\">[চিত্রসমূহ: সাইটের দিক নির্দেশক নকশা (চলমান)]</h6>\n<h6 class=\"h-lv6\"><strong>রাস্তা</strong></h6>\n<h6 class=\"h-lv6\"><strong>সম্মুখ</strong></h6>\n<h6 class=\"h-lv6\"><strong>পশ্চাৎ</strong></h6>\n<h6 class=\"h-lv6\"><strong>পার্শ্ব</strong></h6>\n<h6 class=\"h-lv6\"><strong>সাইট</strong></h6>\n<h6 class=\"h-lv6\"><strong>রাষ্ট্রপতির আদেশক্রমে</strong></h6>\n<h6 class=\"h-lv6\"><strong>ড. মোঃ নূরুল আমিন</strong></h6>\n<h6 class=\"h-lv6\"><strong>উপসচিব।</strong></h6>\n<h6 class=\"h-lv6\"><strong>মোহাম্মদ আবু ইউসুফ, তেজগাঁও, ঢাকা কর্তৃক মুদ্রিত।</strong></h6>\n<h6 class=\"h-lv6\"><strong>website : www.bgpress.gov.bd</strong></h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<p>#######</p>\n<h6 class=\"h-lv6\"><strong>敷地の前面、背面及び側面（の定義図）</strong></h6>\n<h6 class=\"h-lv6\">[図解：敷地の各方位の定義（続き）]</h6>\n<h6 class=\"h-lv6\"><strong>道路（Rasta）</strong></h6>\n<h6 class=\"h-lv6\"><strong>前面／正面（Sommukh）</strong></h6>\n<h6 class=\"h-lv6\"><strong>背面（Poshchat）</strong></h6>\n<h6 class=\"h-lv6\"><strong>側面（Parshwa）</strong></h6>\n<h6 class=\"h-lv6\"><strong>敷地／サイト（Site）</strong></h6>\n<h6 class=\"h-lv6\"><strong>大統領の命により</strong></h6>\n<h6 class=\"h-lv6\"><strong>Dr. Md. ヌルル・アミン</strong></h6>\n<h6 class=\"h-lv6\"><strong>副次官</strong></h6>\n<h6 class=\"h-lv6\"><strong>ウェブサイト：www.bgpress.gov.bd</strong></h6>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p>1. <strong>不整形な敷地における方位の裁定的定義（付録図解）</strong>:</p>\n<p>ダッカ規則では、道路の屈曲部（図面上段）においてどの境界線までを「前面」とし、どこからを「側面」とするかを幾何学的なガイドラインで一義的に決定させている。日本の実務よりも、不整形地でのセットバック規定適用における曖昧さを排除する姿勢が強い。</p>\n<p>2. <strong>角地の「背面」の特定</strong>:</p>\n<p>二方道路において、それぞれの前面に対する「背面」の取り方を明確に示している。日本の隣地境界線の概念と比較し、セットバック規定を正しく適用させるため、すべての境界線がいずれの方位種別に属するかを確定させる体系を採っている。</p>\n<p>3. <strong>規則の法的拘束力の明示（ページ下部）</strong>:</p>\n<p>本ページには大統領の命による公告である旨が記されている。これらの図解が単なる例示ではなく、建築確認における法的拘束力を持った技術基準であることを示している。</p>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025 付録に示された、敷地の方位の定義に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．敷地が道路の屈曲部に面している場合、すべての境界線は一律に「前面」として扱われる。</p>\n<p>２．Ｌ字型の敷地（図面中段）において、道路に面していない奥まった境界線の一部は「前面」と定義される。</p>\n<p>３．四方を道路に囲まれた敷地（図面下段右）においては、すべての境界線が「前面」と定義される。</p>\n<p>４．敷地の方位種別（前面・背面・側面）は、本規則におけるセットバックの算定基準を決定するために用いられる。</p>\n<p>* <strong>解説</strong>: <span style=\"color: #ffffff;\"></p>\n<p><strong>正解：４</strong></p>\n<p>1. 誤り。図面上段によれば、角度等に基づき前面と側面の境界が区分されている。</p>\n<p>2. 誤り。図面中段によれば、反対方向は背面として定義されている。</p>\n<p>3. 誤り。図面によればすべて「前面」と記されているが、４が運用の目的として最も適切である。</p>\n<p><strong>4. 正しい。</strong> これらの図解は、規則本文に定めるセットバック規定を適用するための基礎定義である。 </span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"}];

  let currentLang = 'jp';
  let currentIdx  = 0;

  // ─── TOC BUILD ───
  const tocEl = document.getElementById('toc');
  function buildToc() {
    tocEl.innerHTML = '';
    const label = document.createElement('div');
    label.className = 'toc-section-label';
    label.textContent = currentLang === 'jp' ? '目　次' : 'বিষয়সূচি';
    tocEl.appendChild(label);

    let lastLevel = 0;
    TOC.forEach((item, i) => {
      const btn = document.createElement('button');
      btn.className = 'toc-item';
      btn.dataset.level = item.level;
      btn.dataset.page  = item.page;
      btn.dataset.idx   = i;
      btn.textContent   = currentLang === 'jp' ? item.jp : item.bn;
      btn.addEventListener('click', () => {
        const pi = PAGES.findIndex(p => p.num === item.page);
        if (pi >= 0) showPage(pi);
        if (window.innerWidth <= 768) closeToc();
      });
      tocEl.appendChild(btn);
    });
  }

  function updateTocActive() {
    const currentPage = PAGES[currentIdx].num;
    tocEl.querySelectorAll('.toc-item').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.page === currentPage);
    });
    // スクロール
    const activeBtn = tocEl.querySelector('.toc-item.active');
    if (activeBtn) {
      activeBtn.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }

  // ─── PAGE RENDER ───
  const container = document.getElementById('pages-container');
  const posEl     = document.getElementById('page-pos');
  const btnPrev   = document.getElementById('btn-prev');
  const btnNext   = document.getElementById('btn-next');

  function showPage(idx) {
    currentIdx = idx;
    const p = PAGES[idx];

    container.innerHTML = '';
    const view = document.createElement('div');
    view.className = 'page-view active';

    const hdr = document.createElement('div');
    hdr.className = 'page-header';
    hdr.innerHTML = `
      <span class="page-num-badge">p. ${p.num}</span>
      <span class="page-gazette">${currentLang === 'jp'
        ? 'バングラデシュ公報 臨時増刊 2025年12月14日'
        : 'বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫'}</span>
    `;
    view.appendChild(hdr);

    const cnt = document.createElement('div');
    cnt.className = 'content';
    cnt.innerHTML = currentLang === 'jp' ? p.jp : p.bn;
    view.appendChild(cnt);

    container.appendChild(view);

    btnPrev.disabled = idx === 0;
    btnNext.disabled = idx === PAGES.length - 1;
    posEl.textContent = `${idx + 1} / ${PAGES.length}`;

    updateTocActive();
    window.scrollTo({ top: 0 });
  }

  // ─── LANG SWITCH ───
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentLang = btn.dataset.lang;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b === btn));
      document.body.classList.toggle('lang-bn', currentLang === 'bn');
      buildToc();
      showPage(currentIdx);
    });
  });

  // ─── NAVIGATION ───
  btnPrev.addEventListener('click', () => { if (currentIdx > 0) showPage(currentIdx - 1); });
  btnNext.addEventListener('click', () => { if (currentIdx < PAGES.length - 1) showPage(currentIdx + 1); });

  // キーボード
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') btnNext.click();
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   btnPrev.click();
  });

  // ─── MOBILE TOC ───
  const tocToggle  = document.getElementById('toc-toggle-btn');
  const tocOverlay = document.getElementById('toc-overlay');
  const tocNav     = document.getElementById('toc');

  function openToc()  { tocNav.classList.add('open'); tocOverlay.classList.add('show'); }
  function closeToc() { tocNav.classList.remove('open'); tocOverlay.classList.remove('show'); }

  tocToggle.addEventListener('click', () => {
    tocNav.classList.contains('open') ? closeToc() : openToc();
  });
  tocOverlay.addEventListener('click', closeToc);

  // ─── INIT ───
  buildToc();
  showPage(0);
})();
</script>
