g>ｅ</strong>　ビル管理システム（BMS）に関する図面（適用がある場合に限る。）</h6>\n<h6 class=\"h-lv6\"><strong>ｆ</strong>　光ファイバーケーブル用ダクト（高層建築物においては必須とする。）</h6>\n<h6 class=\"h-lv6\"><strong>ｇ</strong>　その他建築物の各種サービスに関する詳細図（適用がある場合に限る。）</h6>\n<hr class=\"sep\">\n<p>1. <strong>「修正又は変更」の定義範囲の広さ（第２条第１０７号）</strong>:</p>\n<p>ダッカ規則では「修正又は変更（Modification or Alteration）」の定義に、出入口の閉鎖（ বন্ধ করা ）や、単なる「材料（ উপকরণ ）」の変更まで含めている。日本の建築基準法（法第２条第１４号・第１５号）における「大規模の修繕・大規模の模様替」は、主要構造部の過半に及ぶものを指すが、ダッカ規則はより広範な行為を「変更」として捕捉し、行政の管理下に置こうとする意図が見られる。</p>\n<p>2. <strong>設備図（Service Drawing）の提出義務項目の現代性（第２条第１１３号）</strong>:</p>\n<p>設備図の定義の中に「光ファイバー用ダクト（ ফাইবার অপটিক্যাল ক্যাবল নেটওয়ার্ক ）」が含まれており、高層建築物（ বহুতল ইমারত ）では設置が「義務（ বাধ্যতামূলক ）」とされている。日本の建築基準法では、電気・給排水等の設備基準はあるが、通信インフラ用ダクトの設置を建築規則上の「設備図」の一部として一律に義務付ける規定はなく、最新の都市通信環境への配慮が法文化されている。</p>\n<p>3. <strong>セットバック（Setback）概念の包括性（第２条第１１１号）</strong>:</p>\n<p>ダッカ規則におけるセットバックは、前面道路からの後退だけでなく、側面（ পার্শ্বে ）及び背面（ পশ্চাতে ）の最小空地をすべて包括する用語として定義されている。日本の建築基準法では「道路境界線からの後退」や「隣地境界線からの後退」を個別の条項で規制するが、ダッカ規則では敷地周囲の開放性を維持するための総合的な空地概念として「セットバック」を位置づけている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における用語の定義に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．<strong>「増築（Addition）」</strong>とは、建築物の床面積を増加させることをいい、高さや容積のみを付加する場合はこれに含まれない。</p>\n<p>２．<strong>「修正又は変更（Modification or Alteration）」</strong>には、承認された図面に基づく建築物の用途の変更だけでなく、出入口の閉鎖や使用材料の変更も含まれる。</p>\n<p>３．<strong>「外壁の後退距離（Setback）」</strong>とは、建築物の前面に確保されるべき最小限の空地を指し、側面や背面の空地はこれに含まれない。</p>\n<p>４．<strong>「設備図（Service Drawing）」</strong>において、高層建築物を建築する場合であっても、光ファイバーケーブル用ダクトの設置に関する計画を含めるかどうかは任意である。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。第２条第１０８号により、高さ（ উচ্চতা ）や容積（ ঘন আয়তন ）の付加も「増築」に含まれる。</p>\n<p><strong>2. 正しい。</strong> 第２条第１０７号の規定通りである。</p>\n<p>2. 誤り。第２条第１１১号により、前面（ সম্মুখে ）だけでなく、側面（ পার্শ্বে ）及び背面（ পশ্চাতে ）の空地も含まれる。</p>\n<p>3. 誤り。第２条第１１৩号（ｃｈｏ）により、高層建築物においては光ファイバー用ダクトは義務（ বাধ্যতামূলক ）である。</span></p>"},{"num":"13421","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>২। সংজ্ঞা (চলমান)</strong></h4>\n<h5 class=\"h-lv5\"><strong>(১১৪)</strong> \"<strong>সার্ভিস কক্ষ</strong>\" অর্থ বসবাস ব্যতীত অন্যান্য কক্ষ এবং আবৃত স্থান, যেমন- পার্কিং এরিয়া, ইলেকট্রো মেকানিক্যাল সহায়ক কক্ষ, এয়ার কন্ডিশニング প্ল্যান্ট, বিল্ডিং সার্ভিসেসের জন্য সংরক্ষিত স্থান, রেটিকুলেটেড গ্যাস সরবরাহ কক্ষ, মেডিকেল গ্যাস কক্ষ, জেনারেটর এর জন্য নির্ধারিত স্থান, গৃহস্থালী কাজের জন্য স্টোর রুম, স্ট্রং রুম সার্ভিস স্টেশন, অদাহ্য বস্তু রাখিবার কক্ষসমূহ, ইত্যাদি;</h5>\n<h5 class=\"h-lv5\"><strong>(১১৫)</strong> \"<strong>সার্ভিস রোড</strong>\" অর্থ সার্ভিসের প্রয়োজনে প্লটের সম্মুখে পশ্চাতে কিংবা পার্শ্বে সংরক্ষিত রাস্তা বা লেইন;</h5>\n<h5 class=\"h-lv5\"><strong>(১১৬)</strong> \"<strong>সাইট</strong>\" অর্থ ইমারত নির্মাণ, ভূমি উন্নয়ন, পুকুর খননের জন্য নির্দিষ্ট সীমারেখা বেষ্টিত স্থান;</h5>\n<h5 class=\"h-lv5\"><strong>(১১৭)</strong> \"<strong>সানশেড</strong>\" অর্থ রোদ বা বৃষ্টি হইতে রক্ষার জন্য ইমারতের বহিঃদেওয়ালের উপর স্থাপিত ওভার হ্যাং যাহা মূল স্থাপনা হইতে সর্বোচ্চ ০.৫ (শূন্য দশমিক পাঁচ) মিটার পর্যন্ত বর্ধিত;</h5>\n<h5 class=\"h-lv5\"><strong>(১১৮)</strong> \"<strong>সার্বজনীন গম্যতা</strong>\" অর্থ সার্বজনীন গম্যতা নীতিতে নকশাকৃত নির্মিত পরিবেশ;</h5>\n<h5 class=\"h-lv5\"><strong>(১১৯)</strong> \"<strong>সার্বজনীন ডিজাইন</strong>\" অর্থ এমন একটি নকশানীতি কার্যক্রম যেখানে বিশেষ সক্ষমতা সম্পন্ন ও বিশেষচাহিদা সম্পন্ন ব্যক্তি বিশেষের প্রয়োজনকে আলাদা না করিয়া সকল মানুষের সার্বজনীন প্রয়োজনকে পরিকল্পনায় অর্ন্তভুক্ত করা হয়।</h5>\n<h3 class=\"h-lv3\"><strong>দ্বিতীয় অধ্যায়</strong></h3>\n<p><strong>পরিকল্পনা ও ইমারত নির্মাণ অনুমোদন পত্রের আবেদন, অনুমোদন এবং বসবাস বা ব্যবহার সনদ, ইত্যাদি</strong></p>\n<h4 class=\"h-lv4\"><strong>৩। পরিকল্পনা, ইমারত নির্মাণ ও বসবাস উপযোগিতার অনুমোদন পদ্ধতি।</strong></h4>\n<h5 class=\"h-lv5\">(১) এই বিধিমালার অধীন পরিকল্পনা, ইমারত নির্মাণ, উহার নকশা এবং বসবাস উপযোগিতার অনুমোদন পদ্ধতি নিম্নবর্ণিত পর্যায়ে সম্পন্ন হইবে, যথা:--</h5>\n<h6 class=\"h-lv6\">(ক) পরিকল্পনা অনুমোদন (Planning Permit);</h6>\n<h6 class=\"h-lv6\">(খ) নির্মাণ অনুমোদন (Construction Permit); এবং</h6>\n<h6 class=\"h-lv6\">(গ) বসবাস বা ব্যবহার সনদ (Occupancy Certificate)।</h6>\n<h5 class=\"h-lv5\">(২) উপ-বিধি (১) এ উল্লিখিত বিষয়ে আবেদনকারী নিজে বা তাহার প্রতিনিধির মাধ্যমে আবেদন করিতে পারিবে।</h5>\n<h5 class=\"h-lv5\">(৩) উপ-বিধি (১) এ উল্লিখিত অনুমোদন বা, ক্ষেত্রমত, সনদ প্রদানের আবেদন ও নিষ্পত্তি সংক্রান্ত বিষয়াদি ইলেক্ট্রনিক বা ডিজিটাল পদ্ধতিতে সম্পাদন করিতে হইবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第２条（用語の定義）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>１１４</strong>　<strong>「サービスルーム（Service Room / Sarvis kokkho）」</strong>　居室以外のその他の室及び被覆された空間をいい、駐車場、電気・機械設備室、空調プラント、建築設備用スペース、集中ガス供給室、医療用ガス室、発電機室、家事用貯蔵室、金庫室、サービスステーション、不燃物貯蔵室等を含む。</h5>\n<h5 class=\"h-lv5\"><strong>１１５</strong>　<strong>「サービス道路（Service Road）」</strong>　建築設備の維持管理等の必要に応じて、敷地の前面、背面又は側面に確保された道路又はレーンをいう。</h5>\n<h5 class=\"h-lv5\"><strong>１１６</strong>　<strong>「敷地（Site）」</strong>　建築物の建築、土地の開発、池の掘削のために特定の境界線により囲まれた場所をいう。</h5>\n<h5 class=\"h-lv5\"><strong>１１７</strong>　<strong>「庇（Sunshade）」</strong>　日射又は雨水を避ける目的で建築物の外壁に設けられたオーバーハングであって、主要構造部から最大０．５メートルまで突出したものをいう。</h5>\n<h5 class=\"h-lv5\"><strong>１１８</strong>　<strong>「ユニバーサルアクセシビリティ（Universal Accessibility）」</strong>　ユニバーサルアクセシビリティの原則に基づき設計された構築環境をいう。</h5>\n<h5 class=\"h-lv5\"><strong>１１９</strong>　<strong>「ユニバーサルデザイン（Universal Design）」</strong>　特別な能力を必要とする者や特別なニーズを持つ者の必要性を分けることなく、全ての人の普遍的なニーズを計画に組み込む設計方針をいう。</h5>\n<h3 class=\"h-lv3\"><strong>第２章　計画承認、確認済証の申請、承認及び使用許可証等</strong></h3>\n<h4 class=\"h-lv4\"><strong>第３条（計画承認、確認済証及び使用許可の承認手続）</strong></h4>\n<h5 class=\"h-lv5\">１　この規則に基づく計画、建築物の建築、その設計及び使用の承認手続は、次に掲げる段階を経て行わなければならない。</h5>\n<h6 class=\"h-lv6\">一　計画承認（Planning Permit）</h6>\n<h6 class=\"h-lv6\">二　確認済証（Construction Permit）</h6>\n<h6 class=\"h-lv6\">三　使用許可証（Occupancy Certificate）</h6>\n<h5 class=\"h-lv5\">２　前項に規定する承認等の事項について、申請者は自ら、又はその代理人を通じて申請することができる。</h5>\n<h5 class=\"h-lv5\">３　第１項に規定する承認又は、場合により、証書の交付に関する申請及び処理に係る事項は、電子又はデジタル方式により行わなければならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>承認プロセスの三段階制（第３条第１項）</strong>:</p>\n<p>ダッカ規則では「計画承認（Planning Permit）」、「確認済証（Construction Permit）」、「使用許可証（Occupancy Certificate）」の３段階が明文化されている。日本の建築基準法（法第６条等）における「建築確認」と「完了検査（検査済証）」のプロセスと比較すると、建築確認の前に「計画承認」という都市計画的な事前審査が、技術的な確認申請とは独立した法的段階としてより明確に位置付けられている。</p>\n<p>2. <strong>庇（Sunshade）の突出限界の厳格性（第２条第１１７号）</strong>:</p>\n<p>ダッカ規則では、庇の突出を「最大０．５メートル」に制限している。日本の建築基準法施行令第２条第１項第２号では、１メートル後退した残りの部分を建築面積に算入する等の規定があるが、ダッカ規則は定義段階で物理的な突出量を一律に抑制しており、過密都市における隣地離隔の確保を優先している。</p>\n<p>3. <strong>デジタル申請の全面義務化（第３条第３項）</strong>:</p>\n<p>申請及び処理を「電子又はデジタル方式」で行うことを義務付けている。日本でも電子申請の普及は進んでいるが、法文上で全面的に義務（ shall / করিতে হইবে ）としている点は、行政のデジタル化を通じた透明性確保と事務処理の迅速化を強力に推進する姿勢の現れである。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における承認手続及び用語の定義に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．<strong>「サービスルーム（Service Room）」</strong>には、居住の用に供する目的の室であっても、発電機室や家事用貯蔵室であれば含まれる。</p>\n<p>２．<strong>「庇（Sunshade）」</strong>は、建築物の外壁に設けられた日射や雨を避けるための構造物であり、主要構造部から最高 １．０メートル まで突出させることができる。</p>\n<p>３．建築物の建築に関する承認手続は、「計画承認」、「確認済証」及び「使用許可証」の三段階で構成される。</p>\n<p>４．本規則に基づく承認又は証書の交付に関する申請手続は、書面による提出が原則であり、デジタル方式による申請は認められていない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第２条第１１４号により、サービスルームは「居室以外の室（ বসবাস ব্যতীত অন্যান্য কক্ষ ）」と定義されている。</p>\n<p>2. 誤り。第２条第１１７号により、庇の突出限界は「最高 ０．５メートル（ সর্বোচ্চ ০.৫ মিটার ）」である。</p>\n<p><strong>3. 正しい。</strong> 第３条第１項に規定されている。</p>\n<p>4. 誤り。第３条第３項により、デジタル方式による申請及び処理が義務付けられている（ সম্পাদন করিতে হইবে ）。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13422","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৪। পরিকল্পনা অনুমোদনপত্রের আবেদন।</strong></h4>\n<h5 class=\"h-lv5\">(১) নির্মাণ অনুমোদনপত্রের আবেদন দাখিলের পূর্বে কর্তৃপক্ষের আওতাভুক্ত যেকোনো ভূমিতে ইমারত নির্মাণের ক্ষেত্রে, কর্তৃপক্ষের নিকট হইতে পরিকল্পনা অনুমোদন গ্রহণের জন্য আবেদন করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(২) উপ-বিধি (১) এ উল্লিখিত আবেদনের সহিত নিম্নবর্ণিত কাগজাদি দাখিল করিতে হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) আবেদনকারী ও, ক্ষেত্রমত, প্রস্তাবিত উন্নয়ন কাজে ব্যবহৃত ভূমি বা ভবনের মালিকের জাতীয় পরিচয়পত্র, হালনাগাদ ভূমি উন্নয়ন কর, দলিল, সর্বশেষ নামজারি খতিয়ান ও প্রযোজ্য ক্ষেত্রে, অন্যান্য কাগজপত্রের মূল কপির স্ক্যান কপি;</h6>\n<h6 class=\"h-lv6\">(খ) পরিশিষ্ট ৪ অনুযায়ী ফি পরিশোধের প্রমাণ পত্র;</h6>\n<h6 class=\"h-lv6\">(গ) উপযুক্ত স্কেলের (যেমন- ১:১৯৮০, ১:৭৯২) ন্যূনতম ৪ (চার) টি কো-অর্ডিনেট মানসহ ডিজিটাল সার্ভে (পরিমাপযোগ্য ফরম্যাটে ড্রইং, pdf, jpeg) এবং জমি ও সংলগ্ন রাস্তার স্থিরচিত্র (jpeg format);</h6>\n<h6 class=\"h-lv6\">(ঘ) আবেদনকারীর প্রতিনিধি কর্তৃক আবেদন দাখিলের ক্ষেত্রে প্রতিনিধি নিয়োগ সংক্রান্ত প্রত্যয়নপত্র।</h6>\n<h5 class=\"h-lv5\">(৩) উপ-বিধি (২) এ উল্লিখিত কাগজাদি ছাড়াও বিশেষ ক্ষেত্রে, যেমন:- ৫ একরের অধিক পরিমাণের ভূমিতে এপার্টメント কমপ্লেক্স বা রিয়েল এস্টেট উন্নয়ন প্রকল্প, ব্লকভিত্তিক উন্নয়ন, বিশেষ ইমারত, ইত্যাদি নিম্নবর্ণিত কাগজাদি দাখিল করিতে হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) বেসরকারী আবাসিক প্রকল্পের ভূমি উন্নয়ন বিধিমালা, ২০০৪ অনুসারে অনুমোদিত বেসরকারি আবাসিক প্রকল্প এলাকার ক্ষেত্রে সংশ্লিষ্ট হাউজিং কোম্পানি কর্তৃক প্রদত্ত চূড়ান্ত পজেশন সার্টিফিকেট এবং, প্রযোজ্য ক্ষেত্রে, প্লট একত্রীকরণ পত্র;</h6>\n<h6 class=\"h-lv6\">(খ) বেসরকারী আবাসিক প্রকল্পের ভূমি উন্নয়ন বিধিমালা, ২০০৪ অনুযায়ী নাগরিক সুবিধা সংবলিত Pdf ফরম্যাটে লে-আউট প্ল্যান;</h6>\n<h6 class=\"h-lv6\">(গ) কনসেপ্ট প্ল্যান সংবলিত পরিকল্পনা প্রতিবেদন;</h6>\n<h6 class=\"h-lv6\">(ঘ) ১:১৯৮০ স্কেলে সাইট প্ল্যান;</h6>\n<h6 class=\"h-lv6\">(ঙ) প্রক্ষেপিত জনসংখ্যার আলোকে নগর পরিকল্পনা, পারিপার্শিক অবস্থা, প্রস্তাবিত প্রকল্পের সহিত বিদ্যমান যোগাযোগ ব্যবস্থা, পলিসি ও অন্যান্য বিধি বিধানের আলোকে সামঞ্জস্যতা, ইত্যাদি বিষয়াদি সংক্রান্ত পরিকল্পনাবিদ কর্তৃক প্রস্তুত ও স্বাক্ষরিত পরিকল্পনা প্রতিবেদন;</h6>\n<h6 class=\"h-lv6\">(চ) প্রযোজ্য ক্ষেত্রে, জমির মালিকানার বিষয়ে জেলা প্রশাসকের অনাপত্তিপত্র;</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第４条（計画承認書の申請）</strong></h4>\n<h5 class=\"h-lv5\">１　確認済証（Construction Permit）の申請に先立ち、所管行政庁（Authority）の管轄下にある土地において建築物を建築しようとする場合は、所管行政庁に対し計画承認（Planning Permit）の申請を行わなければならない。</h5>\n<h5 class=\"h-lv5\">２　前項の申請にあたっては、次に掲げる書類を提出しなければならない。</h5>\n<h6 class=\"h-lv6\">一　申請者及び、該当する場合、当該土地若しくは建築物の所有者の国民身分証、最新の土地開発税納税証明、権利証、最新の名義変更（Mutation）記録、その他必要書類の原本の正本スキャン写し</h6>\n<h6 class=\"h-lv6\">二　付録４の規定に基づく手数料の納付証明書</h6>\n<h6 class=\"h-lv6\">三　適切な縮尺（１：１９８０、１：７９２等）による、最小４つの座標値（Coordinate values）を含むデジタル測量図（CAD、PDF、JPEG等の形式）並びに土地及び接道状況を示す写真（JPEG形式）</h6>\n<h6 class=\"h-lv6\">四　代理人により申請を行う場合にあっては、代理人の選任に係る証明書</h6>\n<h5 class=\"h-lv5\">３　前項に規定する書類のほか、特別な場合（５エーカーを超える敷地における共同住宅、不動産開発事業、街区単位の開発、特殊建築物等）においては、次に掲げる書類を提出しなければならない。</h5>\n<h6 class=\"h-lv6\">一　「２００４年民間居住プロジェクト土地開発規則」に基づき承認された開発区域においては、住宅会社が発行する最終引渡証明書（Possession certificate）及び、適用がある場合、敷地統合承諾書</h6>\n<h6 class=\"h-lv6\">二　「２００４年民間居住プロジェクト土地開発規則」に基づく公共施設を明記したＰＤＦ形式の配置図（Layout plan）</h6>\n<h6 class=\"h-lv6\">三　コンセプトプランを含む計画報告書</h6>\n<h6 class=\"h-lv6\">四　縮尺１：１９８０による敷地案内図</h6>\n<h6 class=\"h-lv6\">五　将来推計人口に基づく都市計画、周辺環境、既存交通網との接続性、並びに政策及び諸規定との整合性に関し、都市計画家（Planner）が作成及び署名した計画報告書</h6>\n<h6 class=\"h-lv6\">六　適用がある場合において、土地所有権に関する郡知事（District Collector / DC）の無異議証明書（NOC）</h6>\n<hr class=\"sep\">\n<p>1. <strong>二段階承認制度の徹底（第４条第１項）</strong>:</p>\n<p>ダッカ規則では、建築技術的な「確認済証（Construction Permit）」の前に、都市計画的な適合性を審査する「計画承認（Planning Permit）」が独立した必須のステップとして定義されている。日本の建築基準法では、確認申請（法第６条）において都市計画法等の適合性も一括して審査されるが、ダッカ規則は大規模な都市開発における土地利用の妥当性を先行して確定させる方式を採っている。</p>\n<p>2. <strong>デジタル測量と座標系の義務化（第４条第２項第三号）</strong>:</p>\n<p>申請図書として「最小４つの座標値」を含むデジタル測量図を求めている。日本の建築確認における敷地調査報告書でも境界の明示は求められるが、規則レベルでデジタルデータ（CAD等）と座標による特定を明文化している点は、土地境界紛争が多い地域事情と、ＧＩＳ（地理情報システム）ベースの行政管理を反映している。</p>\n<p>3. <strong>大規模開発における専門職（Planner）の関与（第４条第３項第五号）</strong>:</p>\n<p>５エーカー超の開発等に対し、都市計画家（Planner）による詳細な「技術報告書（推計人口や交通網との整合性等）」の提出を義務付けている。日本の建築基準法が主に「建築士（一級・二級）」を主役とするのに対し、ダッカ規則は大規模開発において「都市計画家」という別個の専門職の署名を法的な必須要件として位置づけている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における計画承認（Planning Permit）の申請に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．建築物の確認済証（Construction Permit）を申請した後であれば、計画承認（Planning Permit）の申請を省略することができる。</p>\n<p>２．計画承認の申請に用いるデジタル測量図には、敷地の位置を特定するため、最小 ２つ の座標値（Coordinate values）を記載すれば足りる。</p>\n<p>３．５エーカー を超える敷地において不動産開発事業を行う場合、都市計画家（Planner）が作成し署名した計画報告書を提出しなければならない。</p>\n<p>４．計画承認の申請において、申請者が適法な土地所有者本人である場合であっても、最新の土地開発税の納税証明書を提出する必要はない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第４条第１項により、確認済証の申請「前（ পূর্বে ）」に計画承認を受ける義務がある。</p>\n<p>2. 誤り。第４条第２項（ｇ）により、最小 <strong>৪ (চার) টি（４つ）</strong> の座標値が必要である。</p>\n<p><strong>3. 正しい。</strong> 第４条第３項（ｎｙａ）の規定通り、大規模開発等では都市計画家による署名入り報告書が必須である。</p>\n<p>4. 誤り。第４条第２項（ｋａ）により、納税証明（ হালনাগাদ ভূমি উন্নয়ন কর ）の提出は必須である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13423","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৪। পরিকল্পনা অনুমোদনপত্রের আবেদন (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(৩) (চলমান)</h5>\n<h6 class=\"h-lv6\">(ছ) প্রযোজ্য ক্ষেত্রে, বেসরকারি বিমান চলাচল কর্তৃপক্ষ, সংশ্লিষ্ট সিটি কর্পোরেশন বা অন্য কোনো স্থানীয় সরকার কর্তৃপক্ষ, সড়ক ও জনপথ অধিদপ্তর, বাংলাদেশ অভ্যন্তরীণ নৌ-পরিবহন কর্তৃপক্ষ, গণপূর্ত অধিদপ্তর, জাতীয় গৃহায়ন কর্তৃপক্ষ অথবা অন্য কোনো সংশ্লিষ্ট সংস্থা বা মন্ত্রণালয়ের অনাপত্তি পত্র;</h6>\n<h6 class=\"h-lv6\">(জ) প্রযোজ্য ক্ষেত্রে, পরিবেশগত সমীক্ষা প্রতিবেদন এবং পরিবেশ অধিদপ্তরের অনাপত্তিপত্র ও অবস্থানগত ছাড়পত্র;</h6>\n<h6 class=\"h-lv6\">(ঝ) প্রযোজ্য ক্ষেত্রে, ট্রাফিক সমীক্ষা প্রতিবেদন, ইত্যাদি এবং ঢাকা পরিবহন সমন্বয় কর্তৃপক্ষের অনাপত্তিপত্র;</h6>\n<h6 class=\"h-lv6\">(ঞ) প্রযোজ্য ক্ষেত্রে, ঢাকা পরিবহন সমন্বয় কর্তৃপক্ষ হইতে অনুমোদিত Traffic Impact Assessment (TIA) ও Traffic Circulation ছাড়পত্র; এবং</h6>\n<h6 class=\"h-lv6\">(ট) প্রযোজ্য ক্ষেত্রে, Key Point Installation (কেপিআই) বা হেরিটেজ সংক্রান্ত বিষয়ে সংশ্লিষ্ট মন্ত্রণালয়, বিভাগ বা প্রতিষ্ঠানের অনাপত্তিপত্র।</h6>\n<h5 class=\"h-lv5\">(৪) উপ-বিধি (১) এর অধীন আবেদন প্রাপ্তির পর কর্তৃপক্ষ কর্তৃক পরিকল্পিত ও উন্নয়নকৃত সাইট অ্যান্ড সার্ভিসেস প্রকল্প এলাকার প্লটের ক্ষেত্রে রাজউক বা জাতীয় গৃহায়ন কর্তৃপক্ষের এস্টেট ও ভূমি শাখা হইতে জমির মালিকানা ও অনুমোদিত লে-আউেটর বিষয়ে অনাপত্তি গ্রহণ করিতে হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>৫। পরিকল্পনা অনুমোদনের সাধারণ শর্তাবলি।</strong></h4>\n<h5 class=\"h-lv5\">(১) যেকোনো অকুপেন্সি টাইপের ইমারতের পরিকল্পনা অনুমোদনের নিমিত্ত উক্ত অকুপেন্সি টাইপের জন্য সারণি-৫ এ উল্লিখিত ন্যূনতম FAR বিবেচনার ক্ষেত্রে উক্ত ন্যূনতম FAR সূচক সাপেক্ষে, কেবল বিদ্যমান রাস্তার প্রশস্ততা বিবেচ্য হইবে।</h5>\n<h5 class=\"h-lv5\">(২) বিশেষ ইমারত নির্মাণ অনুমোদনের ক্ষেত্রে ইমারত নির্মাণ কমিটি, কর্তৃপক্ষ কর্তৃক পরিকল্পনা অনুমোদনপত্রে আরোপিত শর্তের অতিরিক্ত শর্ত আরোপ করিতে পারিবে, যাহা কর্তৃপক্ষ কর্তৃক আরোপিত শর্তের প্রতিবন্ধক হইবে না:</h5>\n<h6 class=\"h-lv6\"><strong>তবে শর্ত থাকে যে,</strong> ইমারত নির্মাণ কমিটি কর্তৃক আরোপিত শর্তের মাধ্যমে কর্তৃপক্ষ কর্তৃক পরিকল্পনা অনুমোদনপত্রে আরোপিত কোনো শর্ত অপসারণ করা যাইবে না।</h6>\n<h4 class=\"h-lv4\"><strong>৬। পরিকল্পনা অনুমোদনের আবেদন অনুমোদন, প্রত্যাখ্যান ও বাতিল।</strong></h4>\n<h5 class=\"h-lv5\">(১) পরিকল্পনা অনুমোদনপত্রের আবেদন দাখিলের ৩০ (ত্রিশ) কার্যদিবসের মধ্যে সংশ্লিষ্ট আইন, বিধিমালা ও মহাপরিকল্পনার ভিত্তিতে আবেদন, প্রয়োজনে যেকোনো শর্ত সাপেক্ষে, অনুমোদন বা প্রত্যাখ্যানের মাধ্যমে নিষ্পত্তি করা হইবে:</h5>\n<h6 class=\"h-lv6\"><strong>তবে শর্ত থাকে যে,</strong> ৫ (পাঁচ) একরের অধিক পরিমাণের ভূমিতে এপার্টメント কমপ্লেক্স বা রিয়েল এস্টেট উন্নয়ন প্রকল্প, ব্লকভিত্তিক উন্নয়ন ও বিশেষ ইমারতের ক্ষেত্রে পরিকল্পনা অনুমোদনের আবেদন নিষ্পত্তির সময়সীমা হইবে ৪৫ (পঁয়তাল্লিশ) কার্যদিবস।</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第４条（計画承認書の申請）（承前）</strong></h4>\n<h5 class=\"h-lv5\">３（承前）</h5>\n<h6 class=\"h-lv6\">ｇ　適用がある場合において、民間航空局、関連する市公社（City Corporation）若しくはその他の地方政府当局、道路・高速道路局、バングラデシュ内陸水運局（BIWTA）、公務員局（PWD）、国家住宅公社（NHA）又はその他の関連機関若しくは省庁の無異議証明書（NOC）。</h6>\n<h6 class=\"h-lv6\">ｈ　適用がある場合において、環境影響調査報告書並びに環境局の無異議証明書及び立地許可書。</h6>\n<h6 class=\"h-lv6\">ｉ　適用がある場合において、交通量調査報告書等及びダッカ交通調整局の無異議証明書。</h6>\n<h6 class=\"h-lv6\">ｊ　適用がある場合において、ダッカ交通調整局から承認された交通影響評価（TIA）及び交通循環許可書。</h6>\n<h6 class=\"h-lv6\">ｋ　適用がある場合において、重要拠点（KPI）又は遺産（Heritage）に関する事項に係る関連省庁、部門又は機関の無異議証明書。</h6>\n<h5 class=\"h-lv5\">４　第１項の規定による申請を受けた後、所管行政庁（Authority）により計画・開発された「サイト・アンド・サービス」プロジェクト区域内の敷地については、首都開発庁（RAJUK）又は国家住宅公社の地所・土地部門から、土地の所有権及び承認されたレイアウトに関する無異議証明書を取得しなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第５条（計画承認の一般条件）</strong></h4>\n<h5 class=\"h-lv5\">１　あらゆる用途（Occupancy Type）の建築物の計画承認において、別表５に定める最小容積率（FAR）指標を考慮する場合、当該最小容積率に関しては、<strong>現存する道路の幅員</strong>のみを考慮するものとする。</h5>\n<h5 class=\"h-lv5\">２　特殊建築物（Special Building）の建築承認において、建築審査委員会（Building Construction Committee）は、所管行政庁が計画承認書において課した条件に加え、追加の条件を課すことができる。ただし、当該条件は所管行政庁が課した条件の妨げとなるものであってはならない。</h5>\n<h6 class=\"h-lv6\">ただし、建築審査委員会が課す条件により、所管行政庁が計画承認書において課した条件を撤廃してはならない。</h6>\n<h4 class=\"h-lv4\"><strong>第６条（計画承認申請の承認、却下及び取消し）</strong></h4>\n<h5 class=\"h-lv5\">１　計画承認書の申請が提出されたときは、関連法令、本規則及び都市計画（Master Plan）に基づき、必要に応じて条件を付した上で、提出の日から<strong>３０執務日</strong>以内に承認又は却下の決定をしなければならない。</h5>\n<h6 class=\"h-lv6\">ただし、５エーカーを超える敷地におけるアパートメント・コンプレックス若しくは不動産開発事業、街区単位の開発又は特殊建築物に係る計画承認申請の処理期間は、<strong>４５執務日</strong>以内とする。</h6>\n<hr class=\"sep\">\n<p>1. <strong>審査期間の法定化と規模による区分（第６条第１項）</strong>:</p>\n<p>ダッカ規則では、計画承認（Planning Permit）の審査期間を原則 <strong>３０執務日</strong> とし、大規模開発や特殊建築物については <strong>４５執務日</strong> と延長している。日本の建築基準法第６条第１項及び第２項における確認済証の交付期限（７日〜３５日）の構造と類似しているが、ダッカ規則は建築技術審査の「前段階」である都市計画審査（Planning Permit）のみでこれだけの法定期間を要する点が実務上の特徴である。</p>\n<p>2. <strong>交通影響評価（TIA）の承認義務化（第４条第３項ｊ号）</strong>:</p>\n<p>大規模な開発において、交通調整局（DTCA）による交通影響評価（TIA）の承認を計画承認の必須要件としている。日本の建築基準法にはTIAに相当する直接的な承認規定はなく、主に都市計画法に基づく開発許可や条例レベルで扱われるが、ダッカ規則は過密都市の交通負荷を建築の入口段階で強力に制御している。</p>\n<p>3. <strong>既存インフラ（道路幅員）の優先（第５条第１項）</strong>:</p>\n<p>容積率（FAR）の算定において、「現存する道路の幅員（ বিদ্যমান রাস্তার প্রশস্ততা ）」のみを考慮することを明文化している。日本の建築基準法第５２条第２項でも前面道路幅員が基準となるが、ダッカ規則は計画道路への依存を排し、現況のインフラ能力に応じた密度制限を徹底させている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における計画承認（Planning Permit）に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．計画承認の申請を受けた所管行政庁は、いかなる建築物の申請であっても、提出の日から一律に ３０執務日 以内に審査を完了しなければならない。</p>\n<p>２．特殊建築物の建築承認において、建築審査委員会は、所管行政庁が計画承認書で課した条件を緩和するために、当該条件の一部を撤廃することができる。</p>\n<p>３．５エーカー を超える敷地におけるアパートメント・コンプレックスの計画承認申請の処理期間は、原則として ４５執務日 以内とされる。</p>\n<p>４．建築物の容積率（FAR）を決定する際、将来の拡幅が予定されている道路に面している場合は、現存する道路幅員ではなく、拡幅後の計画幅員を基準としなければならない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第６条第１項但書きにより、大規模開発や特殊建築物の場合は <strong>৪৫ (পঁয়তাল্লিশ) কার্যদিবস（４５執務日）</strong> に延長される。</p>\n<p>2. 誤り。第５条第２項但書きにより、建築審査委員会が所管行政庁の条件を撤廃（ অপসারণ ）することは禁じられている。</p>\n<p><strong>3. 正しい。</strong> 第６条第１項但書きの規定通りである。</p>\n<p>4. 誤り。第５条第１項により、容積率の考慮においては「現存する道路の幅員（ বিদ্যমান রাস্তার প্রশস্ততা ）」のみが考慮される。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13424","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৬। পরিকল্পনা অনুমোদনের আবেদন অনুমোদন, প্রত্যাখ্যান ও বাতিল (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(২) পরিকল্পনা অনুমোদনপত্রের আবেদন, কর্তৃপক্ষের নগর পরিকল্পনার শাখার উপনগর পরিকল্পনাবিদ পর্যায়ে নিষ্পত্তি হইবে:</h5>\n<h6 class=\"h-lv6\"><strong>তবে শর্ত থাকে যে,</strong> ৫ (পাঁচ) একরের অধিক পরিমাণের ভূমিতে এপার্টメント কমপ্লেক্স বা রিয়েল এস্টেট উন্নয়ন প্রকল্প, ব্লকভিত্তিক উন্নয়ন ও বিশেষ ইমারতের ক্ষেত্রে কর্তৃপক্ষের নগর পরিকল্পনাবিদ বা প্রধান নগর পরিকল্পনাবিদের অনুমোদনক্রমে, নিষ্পত্তি করিতে হইবে।</h6>\n<h5 class=\"h-lv5\">(৩) পরিকল্পনা অনুমোদনের আবেদন অনুমোদিত হইলে আবেদনকারীর অনুকূলে পরিকল্পনা অনুমোদনপত্র ইস্যু করা হইবে।</h5>\n<h5 class=\"h-lv5\">(৪) কর্তৃপক্ষ পরিকল্পনা অনুমোদনের আবেদন, প্রয়োজনে, যুক্তিসংগত শর্ত সাপেক্ষে, অনুমোদন অথবা প্রত্যাখ্যান করিতে পারিবে。</h5>\n<h5 class=\"h-lv5\">(৫) আবেদনকারীর কোনো তথ্যের ঘাটতি থাকিলে অথবা কোনো অতিরিক্ত তথ্যের প্রয়োজন হইলে উহা আবেদনকারীকে অবহিত করিতে হইবে এবং অনুরূপ অবহিতকরণের ৩০ (ত্রিশ) দিন অতিবাহিত হইবার পরও কোনো তথ্য প্রদান বা জবাব পাওয়া না গেলে আবেদন প্রত্যাখ্যান করা যাইবে।</h5>\n<h5 class=\"h-lv5\">(৬) যদি কোনো আবেদনকারী মহাপরিকল্পনায় বর্ণিত ভূমি ব্যবহারের উদ্দেশ্য ব্যতীত অন্য কোনো উদ্দেশ্যে ভূমি ব্যবহারের আবেদন করে তাহা হইলেও উক্ত আবেদন প্রত্যাখ্যান করা যাইবে।</h5>\n<h5 class=\"h-lv5\">(৭) পরিকল্পনা অনুমোদন কোনো উন্নয়ন বা নির্মাণ কাজের অনুমতি বলিয়া গণ্য হইবে না এবং ইহা আবেদনকারীকে কোনোরূপ কাজ আরম্ভ বা সম্পাদনের অধিকার প্রদান করিবে না।</h5>\n<h5 class=\"h-lv5\">(৮) পরিকল্পনা অনুমোদনপত্রের কোনো শর্ত লঙ্ঘন বা মালিকানা সংক্রান্ত মিথ্যা তথ্য প্রদান করা হইলে পরিকল্পনা অনুমোদনপত্র বাতিল করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৯) উপ-বিধি (৮) অনুযায়ী কোনো পরিকল্পনা অনুমোদন বাতিল হইলে বিষয়টি ভবন মালিক ও সংশ্লিষ্ট সকলকে কর্তৃপক্ষ কর্তৃক অবহিত করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(১০) পরিকল্পনা অনুমোদন বাতিল হইবার সঙ্গে সঙ্গে নির্মাণ অনুমোদনপত্র ও বসবার বা ব্যবহার সনদ বাতিল করিতে হইবে এবং কর্তৃপক্ষ সংশ্লিষ্ট সকলকে বিষয়টি অবহিত করিবে।</h5>\n<h4 class=\"h-lv4\"><strong>৭। পরিকল্পনা অনুমোদন প্রত্যাখ্যানের বিরুদ্ধে আপিল।</strong></h4>\n<h5 class=\"h-lv5\">(১) কোনো পরিকল্পনা অনুমোদনের আবেদন প্রত্যাখ্যান করা হইলে, আবেদনকারী উক্তরূপে প্রত্যাখ্যাত হইবার ৩০ (ত্রিশ) দিনের মধ্যে পরিশিষ্ট ৪ এ বর্ণিত ফি পরিশোধ সাপেক্ষে, কর্তৃপক্ষের চেয়ারম্যান বরারর আপিল করিতে পারিবে।</h5>\n<h5 class=\"h-lv5\">(২) উপ-বিধি (১) এর অধীন কোনো আপিল আবেদন প্রাপ্তির ৩০ (ত্রিশ) দিনের মধ্যে চেয়ারম্যান আপিল আবেদনের বিষয়ে সিদ্ধান্ত প্রদান করিবেন।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第６条（計画承認申請の承認、却下及び取消し）（承前）</strong></h4>\n<h5 class=\"h-lv5\">２　計画承認（Planning Permit）の申請は、所管行政庁（Authority）の都市計画部門の副都市計画家の段階において処理されるものとする。ただし、５エーカーを超える敷地におけるアパートメント・コンプレックス若しくは不動産開発事業、街区単位の開発又は特殊建築物（Special Building）に係る申請にあっては、所管行政庁の都市計画家又は主任都市計画家の承認を得て処理しなければならない。</h5>\n<h5 class=\"h-lv5\">３　計画承認の申請が承認されたときは、申請者に対し計画承認書を発行しなければならない。</h5>\n<h5 class=\"h-lv5\">４　所管行政庁は、計画承認の申請に対し、必要があると認めるときは、合理的な条件を付して承認し、又はこれを却下することができる。</h5>\n<h5 class=\"h-lv5\">５　申請書類に不足がある場合又は追加の情報を必要とする場合は、所管行政庁は申請者にその旨を通知しなければならない。当該通知から３０日を経過しても情報提供又は回答がないときは、当該申請を却下することができる。</h5>\n<h5 class=\"h-lv5\">６　申請者が、都市計画（Master Plan）に定められた土地利用の目的以外の目的で申請を行ったときは、当該申請を却下することができる。</h5>\n<h5 class=\"h-lv5\">７　計画承認は、開発又は工事の許可とみなしてはならず、また、申請者に工事の着手又は実施の権利を付与するものではない。</h5>\n<h5 class=\"h-lv5\">８　計画承認書の条件に違反した場合又は所有権に関する虚偽の情報が提供された場合は、計画承認を取り消さなければならない。</h5>\n<h5 class=\"h-lv5\">９　前項の規定により計画承認が取り消されたときは、所管行政庁は建築物の所有者及び関係者全員にその旨を通知しなければならない。</h5>\n<h5 class=\"h-lv5\">１０　計画承認が取り消されたときは、直ちに確認済証（Construction Permit）及び居住又は使用許可証（Occupancy Certificate）を取り消すものとし、所管行政庁は関係者全員にその旨を通知しなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第７条（計画承認の却下に対する不服申立て）</strong></h4>\n<h5 class=\"h-lv5\">１　計画承認の申請が却下された場合、申請者は、当該却下の通知を受けた日から３０日以内に、付録４に定める手数料を納付した上で、所管行政庁の会長（Chairman）に対し不服申立て（Appeal）をすることができる。</h5>\n<h5 class=\"h-lv5\">２　前項の規定による服申立てを受理したときは、会長は受理した日から３０日以内に当該申立てに関する決定を行わなければならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>計画承認の法的地位の明文化（第６条第７項）</strong>:</p>\n<p>ダッカ規則では「計画承認（Planning Permit）」が、工事着手（ Kaj arombho ）の権利を一切付与しないことを明文で規定している。日本の建築基準法では確認済証（法第６条）の交付をもって全ての法的ハードルを越えるが、ダッカ規則は都市計画的適合性（Planning）と技術的適合性（Construction）を法的に切り離し、前者の承認だけでは一歩も着工できないことを強調している。</p>\n<p>2. <strong>根源的承認の取消しに伴う連鎖失効（第６条第１０項）</strong>:</p>\n<p>「計画承認」が取り消された場合、後続の「確認済証」や「使用許可証」も「直ちに（ সঙ্গে সঙ্গে ）」取り消される連動制を採用している。日本の建築基準法でも確認の取消しは可能だが、規則レベルでこれほど直接的に、川上の承認取消が川下の全許可を自動的に無効化する旨を明記している点は、行政手続の厳格なピラミッド構造を示している。</p>\n<p>3. <strong>審査不備に対する却下期限の法定化（第６条第５項）</strong>:</p>\n<p>情報不足の通知から「３０日」という具体的な期限を切り、それを過ぎれば却下できるとしている。日本の行政手続法や建築基準法における補正期間は「相当の期間」とされることが多いが、ダッカ規則は数値で期限を固定することで、滞留案件の自動的な整理と事務処理の迅速化を図っている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における計画承認（Planning Permit）の申請及び手続に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．計画承認を得た申請者は、これをもって当該建築物の開発又は工事の許可を得たものとみなされ、直ちに工事に着手する権利を有する。</p>\n<p>２．特殊建築物（Special Building）の計画承認は、所管行政庁の都市計画部門における副都市計画家の判断のみで処理される。</p>\n<p>３．申請書類の不足に関し所管行政庁から通知を受けた申請者が、当該通知から １５日 以内に回答を行わなかった場合、当該申請は直ちに却下されたものとみなされる。</p>\n<p>４．計画承認が取り消された場合、当該計画承認に基づいて既に交付されていた確認済証（Construction Permit）及び使用許可証（Occupancy Certificate）も、直ちに取り消される。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：４</strong></p>\n<p>1. 誤り。第６条第７項により、計画承認は工事着手の権利を付与しない（ অধিকার প্রদান করিবে না ）。</p>\n<p>2. 誤り。第６条第２項但書きにより、特殊建築物等は都市計画家又は主任都市計画家の承認が必要である（ অনুমোদনক্রমে, নিষ্পত্তি করিতে হইবে ）。</p>\n<p>3. 誤り。第６条第５項により、期限は <strong>৩০ (ত্রিশ) দিন（３０日）</strong> である。</p>\n<p><strong>4. 正しい。</strong> 第６条第１０項の規定通りである（ বাতিল করিতে হইবে ）。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13425","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৭। পরিকল্পনা অনুমোদন প্রত্যাখ্যানের বিরুদ্ধে আপিল (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(৩) উপ-বিধি (২) এর অধীন আপিলে প্রদত্ত সিদ্ধান্তের বিরুদ্ধে কোনো পক্ষ সংক্ষুব্ধ হইলে তিনি উক্ত সিদ্ধান্ত প্রাপ্তির ৩০ (ত্রিশ) দিনের মধ্যে পরিশিষ্ট ৪ এ বর্ণিত ফি পরিশোধ সাপেক্ষে, সরকার বরারর পুনরায় আপিল করিতে পারিবেন।</h5>\n<h5 class=\"h-lv5\">(৪) উপ-বিধি (৩) এর অধীন কোনো আপিল আবেদন প্রাপ্তির ৬০ (ষাট) দিনের মধ্যে সরকার আপিল আবেদনের বিষয়ে সিদ্ধান্ত প্রদান করিবেন।</h5>\n<h5 class=\"h-lv5\">(৫) উপ-বিধি (৪) এর অধীন আপিলে প্রদত্ত সিদ্ধান্তের বিরুদ্ধে উক্ত সিদ্ধান্ত প্রাপ্তির ১৫ (পনেরো) দিনের মধ্যে সরকার বরারর উহা পুনর্বিবেচনার আবেদন করা যাইবে এবং সরকার এইরূপ পুনর্বিবেচনার আবেদন ৩০ (ত্রিশ) দিনের মধ্যে নিষ্পত্তি করিবে।</h5>\n<h4 class=\"h-lv4\"><strong>৮। পরিকল্পনা অনুমোদনপত্রের মেয়াদ।</strong></h4>\n<h5 class=\"h-lv5\">(১) পরিকল্পনা অনুমোদনপত্র প্রাপ্তির পর নকশা অনুমোদনের আবেদন দাখিলের নিমিত্ত পরিকল্পনা অনুমোদনপত্রের মেয়াদ হইবে অনুমোদনের তারিখ হইতে ২ (দুই) বৎসর।</h5>\n<h5 class=\"h-lv5\">(২) উপ-বিধি (১) এ বর্ণিত মেয়াদ উত্তীর্ণ হইবার পূর্বে কোনো আবেদনকারী, পরিশিষ্ট ৪ এ বর্ণিত ফি পরিশোধপূর্বক, পরিকল্পনা অনুমোদনপত্র নবায়নের জন্য আবেদন করিতে পারিবেন।</h5>\n<h5 class=\"h-lv5\">(৩) উপ-বিধি (২) এর অধীন নবায়নের কোনো আবেদন প্রাপ্তির পর কর্তৃপক্ষ, আইন, মহাপরিকল্পনা, কোড এবং এই বিধিমালার সংশ্লিষ্ট বিধির সহিত সংগতিপূর্ণ হওয়া সাপেক্ষে, অনুমোদনপত্রের মেয়াদ অতিক্রান্ত হইবার পর হইতে অনুমোদনপত্রে উল্লিখিত মহাপরিকল্পনার অনুরূপ প্রস্তাবনা বলবৎ থাকা সাপেক্ষে, এক বৎসরের জন্য পরিকল্পনা অনুমোদনপত্র নবায়ন করিতে পারিবে।</h5>\n<h5 class=\"h-lv5\">(৪) পরিকল্পনা অনুমোদনপত্র বা, প্রযোজ্য ক্ষেত্রে, নবায়নকৃত পরিকল্পনা অনুমোদনপত্রের মেয়াদ উত্তীর্ণ হইলে নূতন করিয়া পরিকল্পনা অনুমোদন গ্রহণ করিতে হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>৯। নির্মাণ অনুমোদনপত্রের আবেদন।</strong></h4>\n<h5 class=\"h-lv5\">(১) কোনো ব্যক্তি, সরকারি, আধা-সরকারি, বেসরকারি বা স্বায়ত্তশাসিত সংস্থা নূতন কোনো ইমারত বা স্থাপনা নির্মাণ করিতে চাহিলে অথবা বিদ্যমান ইমারত বা স্থাপনা পরিবর্তন বা সংযোজন করিতে চাহিলে আইন, এই বিধিমালা এবং সংশ্লিষ্ট বিধি-বিধান অনুযায়ী কর্তৃপক্ষের নিকট হইতে নির্মাণ অনুমোদনপত্রের আবেদন করিতে হইবে。</h5>\n<h5 class=\"h-lv5\">(২) উপ-বিধি (১) এ উল্লিখিত আবেদনের সহিত নিম্নবর্ণিত তথ্য, কাগজাদি ও নকশা দাখিল করিতে হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) পরিকল্পনা অনুমোদনপত্র;</h6>\n<h6 class=\"h-lv6\">(খ) কারিগরি নিয়োগ পত্র: প্রকল্পে আবেদনকারী এবং কারিগরি ব্যক্তি চুক্তিবদ্ধ হইয়াছেন মর্মে ৩০০ (তিনশত) টাকার ননজুডিসিয়াল স্ট্যাম্পে যৌথ স্বাক্ষরে অঙ্গীকারনামা এবং আবেদনকারী প্রতিষ্ঠানের ক্ষেত্রে কারিগরি ব্যক্তির নিয়োগপত্র;</h6>\n<h6 class=\"h-lv6\">(গ) নির্ধারিত স্কেলে প্রয়োজনীয় নকশা: নকশা অনুমোদনের জন্য কোড অনুসরণপূর্বক স্থাপত্য, কাঠামোগত, ইলেকট্রিক্যাল, মেকানিক্যাল, এবং প্লাম্বিং নকশা;</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第７条（計画承認の却下に対する不服申立て）（承前）</strong></h4>\n<h5 class=\"h-lv5\">３　第２項の規定による不服申立ての決定に不服がある者は、当該決定の通知を受けた日から３０日以内に、付録４に定める手数料を納付した上で、政府（Government）に対し再度不服申立てをすることができる。</h5>\n<h5 class=\"h-lv5\">４　前項の規定による不服申立てを受理したときは、政府は受理した日から６０日以内に当該申立てに関する決定を行わなければならない。</h5>\n<h5 class=\"h-lv5\">５　第４項の規定による不服申立ての決定に不服がある者は、当該決定の通知を受けた日から１５日以内に、政府に対し再審査の請求をすることができる。政府は、当該再審査の請求を受理した日から３０日以内にこれを裁決しなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第８条（計画承認書の有効期間）</strong></h4>\n<h5 class=\"h-lv5\">１　計画承認（Planning Permit）の有効期間は、確認済証（Construction Permit）の申請を行うため、承認の日から<strong>２年</strong>とする。</h5>\n<h5 class=\"h-lv5\">２　前項に規定する期間が経過する前に、申請者は、付録４に定める手数料を納付した上で、計画承認の更新を申請することができる。</h5>\n<h5 class=\"h-lv5\">３　前項の規定による更新の申請を受けたときは、所管行政庁は、法、都市計画（Master Plan）、法典（Code）及び本規則の関連規定に適合する場合に限り、有効期間満了の日から<strong>１年間</strong>に限り、計画承認を更新することができる。</h5>\n<h5 class=\"h-lv5\">４　計画承認又は、該当する場合、更新された計画承認の有効期間が満了したときは、新たに計画承認を受けなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第９条（確認済証の申請）</strong></h4>\n<h5 class=\"h-lv5\">１　建築物若しくは工作物を新築し、又は既存の建築物若しくは工作物の用途変更、増築若しくは改築をしようとする者（国、地方公共団体、民間企業又は法人を含む。）は、法、本規則及び関連規定に基づき、所管行政庁に対し確認済証（Construction Permit）の申請をしなければならない。</h5>\n<h5 class=\"h-lv5\">２　前項の申請書には、次に掲げる図書を添えなければならない。</h5>\n<h6 class=\"h-lv6\">一　計画承認書（Planning Permit）</h6>\n<h6 class=\"h-lv6\">二　専門技術者選任届：申請者と専門技術者が契約を締結したことを証する<strong>３００タカの非司法印紙（Non-judicial stamp）</strong>による連署の誓約書、及び申請者が法人である場合にあっては当該専門技術者の選任状</h6>\n<h6 class=\"h-lv6\">三　所定の縮尺による設計図書：法典（Code）に基づき作成された意匠、構造、電気設備、機械設備及び給排水衛生設備の各設計図</h6>\n<hr class=\"sep\">\n<p>1. <strong>計画承認の有効期間と更新制度（第８条）</strong>:</p>\n<p>ダッカ規則では計画承認（Planning Permit）に <strong>２年</strong> という明確な有効期間を設け、<strong>１年</strong> の更新を認めている。日本の建築基準法では、確認済証（法第６条）自体に一律の失効期限はないが、一定期間内に工事に着手しない場合に確認が失効する旨を各自治体の条例等で定める場合がある。ダッカ規則は、建築技術審査（確認済証）の前提となる都市計画的承認の鮮度を法的に厳格に管理している。</p>\n<p>2. <strong>不服申立ての多段階制（第７条第３項〜第５項）</strong>:</p>\n<p>所管行政庁（RAJUK）の長による決定の後に、さらに「政府（Government）」への不服申立て、およびその「再審査請求（ পুনর্বিবেচনা ）」という重層的な救済措置が明文化されている。日本の建築基準法第９４条に基づく審査請求が、都道府県の建築審査会（第三者機関）によって行われる一段階の法的救済を主とするのと比較し、ダッカ規則は最終的な決定権を政府（省庁レベル）に委ねる行政不服申立ての性格が強い。</p>\n<p>3. <strong>専門技術者選任の証拠能力（第９条第２項第二号）</strong>:</p>\n<p>専門技術者の選任届において、<strong>「３００タカの非司法印紙（Non-judicial stamp）」</strong>を用いた連署の誓約書の提出を求めている。日本の建築確認申請でも設計者・監理者の記載は必須だが、金銭的な印紙を伴う公証的な形式で契約関係の真正性を担保させる規定は、専門職の法的責任の明確化を意図した独自の実務慣行である。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における計画承認及び確認済証の申請に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．計画承認（Planning Permit）の有効期間は承認の日から ３年 であり、いかなる場合も更新することはできない。</p>\n<p>２．計画承認の却下に対する不服申立てにおいて、政府の決定に不服がある者は、当該決定の通知を受けた日から ３０日 以内に再審査の請求をしなければならない。</p>\n<p>３．確認済証（Construction Permit）の申請を行う際、専門技術者の選任を証する書類には、３００タカの非司法印紙（Non-judicial stamp）による誓約書の添付が必要である。</p>\n<p>４．建築物の増築（Addition）をしようとする場合、申請者が地方公共団体であるときは、本規則に基づく確認済証の申請は免除される。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第８条第１項により、有効期間は <strong>২ (দুই) বৎসর（２年）</strong> であり、第３項により１年の更新が可能である。</p>\n<p>2. 誤り。第７条第５項により、再審査の請求期限は通知を受けた日から <strong>১৫ (পনেরো) দিন（１５日）</strong> 以内である。</p>\n<p><strong>3. 正しい。</strong> 第９条第２項第二号（ｋｈ）の規定通りである。</p>\n<p>4. 誤り。第９条第１項により、政府、半政府、民間、自治体（ সরকারি, আধা-সরকারি, বেসরকারি বা স্বায়ত্তশাসিত সংস্থা ）のいずれも申請が必要である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13426","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৯। নির্মাণ অনুমোদনপত্রের আবেদন (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(২) (চলমান)</h5>\n<h6 class=\"h-lv6\">(ঘ) ব্যক্তি বা বেসরকারি প্রতিষ্ঠানের আবেদনের ক্ষেত্রে হালনাগাদ আয়কর রিটার্ন স্লিপ;</h6>\n<h6 class=\"h-lv6\">(ঙ) অনলাইন সিস্টেম হইতে প্রাপ্ত পরিকল্পনা অনুমোদন পত্র সংশ্লিষ্ট তথ্যাদি;</h6>\n<h6 class=\"h-lv6\">(চ) কোড অনুসরণপূর্বক প্রকৌশলীর ডিজাইন প্রতিবেদন; এবং</h6>\n<h6 class=\"h-lv6\">(ছ) ইনডেমিনিটি বন্ড: গভীর ভিত্তি (foundation) নির্মাণ, পাইলিং, বেজমেন্ট বা ভূগর্ভস্থ তলা নির্মাণ কাজের ক্ষেত্রে কর্তৃপক্ষ অনুমোদিত ফরমে আবেদনকারী কর্তৃক স্বাক্ষরিত ইনডেমিনিটি বন্ড (Indemnity bond)。</h6>\n<h5 class=\"h-lv5\">(৩) উপ-বিধি (২) এ উল্লিখিত কাগজাদি ছাড়াও বিশেষ ইমারত নির্মাণ বা, প্রযোজ্য ক্ষেত্রে, নিম্নবর্ণিত কাগজাদি দাখিল করিতে হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) রাস্তার জন্য জমি সমর্পণের ইজমেন্ট দলিল;</h6>\n<h6 class=\"h-lv6\">(খ) অগ্নিনিরাপত্তা ও নির্বাপণ নকশা;</h6>\n<h6 class=\"h-lv6\">(গ) কর্তৃপক্ষ কর্তৃক ডেভেলপারের নিবন্ধনের কপি;</h6>\n<h6 class=\"h-lv6\">(ঘ) ইজমেন্ট দলিল;</h6>\n<h6 class=\"h-lv6\">(ঙ) ফায়ার সার্ভিস ও সিভিল ডিফেন্স অধিদপ্তরের অনাপত্তিপত্র;</h6>\n<h6 class=\"h-lv6\">(চ) Key Point Installation (কেপিআই) বা হেরিটেজ সংক্রান্ত বিষয়ে সংশ্লিষ্ট মন্ত্রণালয়, বিভাগ বা প্রতিষ্ঠানের অনাপত্তিপত্র;</h6>\n<h6 class=\"h-lv6\">(ছ) ক্যান্টনমেন্ট বোর্ড, জাতীয় গৃহায়ন কর্তৃপক্ষ, গণপূর্ত অধিদপ্তর, ঢাকা ম্যাস ট্রানজিট কোম্পানি লিমিটেড, বেসরকারি বিমান চলাচল কর্তৃপক্ষ বা সংশ্লিষ্ট প্রতিষ্ঠানের অনুমোদনপত্র;</h6>\n<h6 class=\"h-lv6\">(জ) পূর্বতন অনুমোদিত নকশা, যদি থাকে;</h6>\n<h6 class=\"h-lv6\">(ঝ) বিশেষ ইমারতের ১:১০০ স্কেলে অঙ্কিত লে-আউট ড্রইং যাহাতে মধ্যে নিম্নবর্ণিত তথ্যসমূহ সন্নিবেশিত থাকিবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(১) সাইটের সকল দিকের মাপ ও সীমানা;</h6>\n<h6 class=\"h-lv6\">(২) প্রযোজ্য ক্ষেত্রে, সাইটের উপর স্থাপিত ভবনসমূহের পরিসীমা, ভবনসমূহের বহিঃস্থ অংশের মাপ, উচ্চতা, তলার সংখ্যা ও বাধ্যতামূলক উন্মুক্ত স্থানের মাপ;</h6>\n<h6 class=\"h-lv6\">(৩) প্রযোজ্য ক্ষেত্রে, সাইটের উপর অবস্থিত ভবন ও কাঠামোসমূহের প্রস্তাবিত ও বিদ্যমান অবস্থান, পুকুর বা জলাশয়ের অবস্থান, বাগানসহ অন্যান্য এলাকা, নিচুভূমি, উন্মুক্ত তৃণভূমি, বনাঞ্চল, ইত্যাদি;</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第９条（確認済証の申請）（承前）</strong></h4>\n<h5 class=\"h-lv5\">２（承前）</h5>\n<h6 class=\"h-lv6\">ঘ　個人又は民間機関による申請にあっては、最新の所得税確定申告書受領証（Income tax return slip）</h6>\n<h6 class=\"h-lv6\">ঙ　オンラインシステムにより取得した計画承認（Planning Permit）に係る関連情報</h6>\n<h6 class=\"h-lv6\">চ　法典（Code）に準拠した技術者による設計報告書</h6>\n<h6 class=\"h-lv6\">ছ　<strong>損害賠償保証書（Indemnity bond）</strong>：深基礎（Deep foundation）工事、杭打ち工事、地階（Basement）又は地下階の築造工事を行う場合にあっては、所管行政庁が承認する様式により申請者が署名した損害賠償保証書</h6>\n<h5 class=\"h-lv5\">３　前項に規定する書類のほか、**特殊建築物（Special Building）を建築する場合又は適用がある場合にあっては、次に掲げる書類を提出しなければならない。</h5>\n<h6 class=\"h-lv6\">ａ　道路築造のための土地提供に係る地役権設定証書（Easement deed）</h6>\n<h6 class=\"h-lv6\">ｂ　火災安全及び消火設計図</h6>\n<h6 class=\"h-lv6\">ｃ　所管行政庁による開発業者（Developer）登録証の写し</h6>\n<h6 class=\"h-lv6\">ｄ　地役権設定証書</h6>\n<h6 class=\"h-lv6\">ｅ　消防・民間防衛局の無異議証明書（NOC）</h6>\n<h6 class=\"h-lv6\">ｆ　重要拠点（KPI）又は文化遺産（Heritage）に関する事項に係る関連省庁、部門又は機関の無異議証明書</h6>\n<h6 class=\"h-lv6\">ｇ　駐屯地委員会（Cantonment Board）、国家住宅公社（NHA）、公務員局（PWD）、ダッカ・マス・トランジット会社（DMTCL）、民間航空局（CAAB）又は関連機関の承認書</h6>\n<h6 class=\"h-lv6\">ｈ　従前の承認済み設計図（存する場合に限る。）</h6>\n<h6 class=\"h-lv6\">ｉ　縮尺１：１００による特殊建築物の配置図（Layout drawing）**。当該図面には次に掲げる事項を記載しなければならない。</h6>\n<h6 class=\"h-lv6\">一　敷地の各辺の寸法及び敷地境界線</h6>\n<h6 class=\"h-lv6\">二　適用がある場合において、敷地内の建築物の外形、建築物の外壁寸法、建築物の高さ、階数及び義務的外壁後退距離（Mandatory setbacks）の寸法</h6>\n<h6 class=\"h-lv6\">三　適用がある場合において、敷地内の建築物及び工作物の計画位置及び現況位置、池又は水域の位置、庭園を含むその他の区域、低地、開放草地、森林等の位置</h6>\n<hr class=\"sep\">\n<p>1. <strong>申請者の経済的適格性の審査（第９条第２項ｄ号）</strong>:</p>\n<p>ダッカ規則では、確認済証（Construction Permit）の申請時に、個人や民間企業に対し「所得税確定申告書受領証（ আয়কর রিটার্ন স্লিপ ）」の提出を求めている。日本の建築基準法では、申請者の納税状況や所得を確認する規定はなく、建築物の技術的基準の適合性のみを審査対象とする。ダッカ規則は、建築主の経済的責任能力を公的に担保させようとする意図が強い。</p>\n<p>2. <strong>地下工事における損害賠償保証の明文化（第９条第２項ｇ号）</strong>:</p>\n<p>地階（Basement）や杭打ちなどの地下掘削を伴う工事に対し、所管行政庁指定様式の「損害賠償保証書（Indemnity bond）」の提出を義務付けている。日本でも民法上の損害賠償責任はあるが、建築確認のプロセスにおいて行政が直接、対隣地者等への保証の宣誓を求める点は、地盤沈下や周辺建物への被害リスクが極めて高い過密都市ダッカの実態を反映している。</p>\n<p>3. <strong>特殊建築物の配置図における環境情報の詳細性（第９条第３項ｉ号）</strong>:</p>\n<p>特殊建築物の配置図において、単なる建物位置だけでなく、敷地内の「低地（ নিচুভূমি ）」、「草地（ উন্মুক্ত তৃণভূমি ）」、「森林（ বনাঞ্চল ）」等の自然状況の表示を求めている。日本の建築基準法（法施行規則第１条の３）の配置図要件と比較し、現況の地形や植生情報の記載を強く求めており、環境保全と一体となった審査体制が見て取れる。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における確認済証（Construction Permit）の申請書類に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．地階（Basement）の築造工事を含む確認済証の申請にあっては、所管行政庁が承認する様式による申請者の署名入りの損害賠償保証書（Indemnity bond）を提出しなければならない。</p>\n<p>２．特殊建築物（Special Building）の申請において、敷地内に現存する池や庭園がある場合であっても、配置図（Layout drawing）には計画される建築物の位置のみを表示すれば足りる。</p>\n<p>３．個人が建築主として申請を行う場合であっても、所得税に関する書類（所得税確定申告書受領証等）を提出する必要はない。</p>\n<p>４．特殊建築物の配置図については、審査の迅速化を図るため、縮尺 ２００分の１ を用いて作成しなければならない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：１</strong></p>\n<p>1. <strong>正しい。</strong> 第９条第２項（ｇ）により、地階や杭打ち等の工事には損害賠償保証書（ ইনডেমিনিটি বন্ড ）の提出が必須である。</p>\n<p>2. 誤り。第９条第３項（ｉ）の三により、現況の池（ পুকুর বা জলাশয় ）や庭園（ বাগান ）等の位置も表示しなければならない。</p>\n<p>3. 誤り。第９条第２項（ｄ）により、個人の申請であっても所得税確定申告書受領証（ আয়কর রিটার্ন স্লিপ ）が必要である。</p>\n<p>4. 誤り。第９条第３項（ｉ）により、縮尺は <strong>১:১০০（１００分の１）</strong> と定められている。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13427","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৯। নির্মাণ অনুমোদনপত্রের আবেদন (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(৩) (চলমান)</h5>\n<h6 class=\"h-lv6\">(ঝ) বিশেষ ইমারতের লে-আউট ড্রইং (চলমান)</h6>\n<h6 class=\"h-lv6\">(৪) এলাকা ও রাস্তাসমূহের নাম, প্রস্থ;</h6>\n<h6 class=\"h-lv6\">(৫) পার্শ্ববর্তী রাস্তা ও তাহাদের প্রস্থের সঙ্গে সম্পর্ক বিবেচনা করিয়া সংশ্লিষ্ট সাইট ও প্লটের দিকসমূহের নির্দেশক (indication of directions), সাইটের সহিত সংযুক্ত রাস্তার প্রস্থ এবং ব্যক্তিগত বা নিজেদের রাস্তার ক্ষেত্রে সমগ্র রাস্তার দৈর্ঘ্য ও প্রস্থ;</h6>\n<h6 class=\"h-lv6\">(৬) রাস্তা হইতে সাইটের প্রবেশ পথ (entrance) ও নির্গমন পথের (exit) উপর স্থাপিত গেটের অবস্থান, প্রস্তাবিত ও বিদ্যমান ইমারতসমূহের চারপাশ ঘিরে নর্দমার (ড্রেইন), যদি থাকে, অবস্থান ও পানিপ্রবাহের দিক নির্দেশক;</h6>\n<h6 class=\"h-lv6\">(৭) ভূগর্ভস্থ জলাধার, সেপটিক ট্যাংক, সোক পিট, Sewerage Treatment Plant ও পয়ঃনিষ্কাশন লাইনের সহিত সংযোগসমূহের অবস্থান, যদি থাকে;</h6>\n<h6 class=\"h-lv6\">(৮) সাইটের অভ্যন্তরে বর্জ্য বা আবর্জনা সংগ্রহস্থলের অবস্থান;</h6>\n<h6 class=\"h-lv6\">(৯) নির্মাণ অনুমোদনের আবেদনের সহিত পরিকল্পনা অনুমোদনপত্র প্রদানকালে অনুমোদনকৃত সকল ধারণাগত নকশা, স্যাটেলাইট ইমেজ, ম্যাপ, প্রযোজ্য ক্ষেত্রে, অন্যান্য সংস্থার অনাপত্তি, পরিকল্পনা প্রতিবেদন;</h6>\n<h6 class=\"h-lv6\">(১০) একাধিক ভবন, অন্যান্য কাঠামো ও স্থাপনা অন্তর্ভুক্ত রহিয়াছে এইরূপ বিশেষ ইমারতের ক্ষেত্রে প্রস্তুতকৃত একটি মাস্টারপ্ল্যান যাহা পরিকল্পনা অনুমোদনপত্রের সহিত সংযুক্ত এবং যাহাতে সকল ভবন বা কাঠামো, রাস্তাসমূহের লে-আউট, ভূমির উপর অবস্থিত সকল বস্তু ও সকল ভৌগোলিক উপাদান, যেমন- গাছ, পাহাড়, পুকুর বা জলাশয়, মাটি খনন বা মাটি ফরাট, ইত্যাদির অবস্থান, পরিসীমা ও নাগরিক সুবিধাসমূহ প্রদর্শিত থাকে;</h6>\n<h5 class=\"h-lv5\"><strong>(ঞ)</strong> বেজমেন্ট ও মেজানাইন (mezzanine) তলাসহ ভবনের সকল তলার ১:১০০ স্কেলে অঙ্কিত ফ্লোর প্ল্যান যাহাতে নিম্নবর্ণিত তথ্যসমূহ সন্নিবেশিত থাকিবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(১) দরজা ও জানালার অবস্থান সহকারে সকল কক্ষ ও ফাঁকা জায়গার মাপ, আকার, অবস্থান ও ব্যবহার;</h6>\n<h6 class=\"h-lv6\">(২) সিঁড়িঘর, লিফট কোর, র‍্যাম্প, জরুরি বহির্গমন সিঁড়ির অবস্থান ও ম্যাপ;</h6>\n<h6 class=\"h-lv6\">(৩) ছাদের পানি নিষ্কাশন ব্যবস্থা, টেরাস (যদি থাকে), প্রযোজ্য ক্ষেত্রে, লিফটের মেশিনরুম, সিঁড়িঘরের ছাদ, জরুরি বহির্গমন, ছাদে স্থায়ী জলাধার, যদি থাকে, ও পানি বেরিয়ে যাওয়ার পথ প্রদর্শনপূর্বক ছাদের নকশা;</h6>\n<h6 class=\"h-lv6\">(৪) প্রযোজ্য ক্ষেত্রে, প্রবেশ পথ (entrance), নির্গমন পথ (exit), ড্রপিং বে ড্রাইভওয়ে ও পার্কিং স্থান প্রদর্শনপূর্বক পার্কিং পরিকল্পনা এবং নিরাপত্তা চৌকির (security post) অবস্থান;</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第９条（確認済証の申請）（承前）</strong></h4>\n<h5 class=\"h-lv5\">３（承前）</h5>\n<h6 class=\"h-lv6\">ঝ　特殊建築物の配置図（承前）：</h6>\n<h6 class=\"h-lv6\">四　区域及び道路の名称並びにその幅員</h6>\n<h6 class=\"h-lv6\">五　隣接道路及びその幅員との関係を考慮した当該敷地の方位（Indication of directions）、敷地に接する道路の幅員、並びに私道にあっては当該道路の全延長及び幅員</h6>\n<h6 class=\"h-lv6\">六　道路から敷地への出入口（Entrance / Exit）に設置される門の位置、並びに計画建築物及び既存建築物の周囲の排水施設（存する場合に限る。）の位置及び排水方向の指示</h6>\n<h6 class=\"h-lv6\">七　地下貯水槽、浄化槽（Septic tank）、浸透桝、汚水処理施設（STP）及び公共下水道への接続箇所の位置（存する場合に限る。）</h6>\n<h6 class=\"h-lv6\">八　敷地内における廃棄物集積所の位置</h6>\n<h6 class=\"h-lv6\">九　計画承認（Planning Permit）時に承認された全ての概念設計図、衛星写真、地図、並びに（適用がある場合）関連機関の無異議証明書（NOC）及び計画報告書</h6>\n<h6 class=\"h-lv6\">十　複数の建築物、その他の構造物又は工作物を含む特殊建築物にあっては、計画承認書に添付されたマスタープラン。当該図面には、全ての建築物若しくは構造物の配置、道路の形状、地上に存する全ての物件、並びに樹木、山、池、土工事（切土又は盛土）の範囲及び公共施設の位置を表示しなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>ঞ</strong>　地階（Basement）及び中二階（Mezzanine）を含む各階平面図（縮尺１：１００）。当該図面には次に掲げる事項を記載しなければならない。</h5>\n<h6 class=\"h-lv6\">一　開口部（窓及び扉）の位置を伴う全ての室及び空地の寸法、形状、位置並びに用途</h6>\n<h6 class=\"h-lv6\">二　階段室、エレベーターシャフト、スロープ、非常階段の位置及び配置図</h6>\n<h6 class=\"h-lv6\">三　屋根伏図。これには雨水排水計画、テラス（存する場合に限る。）、並びに（適用がある場合）エレベーター機械室、階段室屋根、非常出口、屋上固定貯水槽及び排水経路を表示しなければならない。</h6>\n<h6 class=\"h-lv6\">四　適用がある場合において、出入口（Entrance / Exit）、ドロップオフ・ベイ（Dropping bay）、車路及び駐車スペースを表示した駐車場計画並びに警備員室（Security post）の位置</h6>\n<hr class=\"sep\">\n<p>1. <strong>特殊建築物の配置図における環境情報の詳細性（第９条第３項）</strong>:</p>\n<p>ダッカ規則では、特殊建築物の配置図（マスタープラン）において、単なる建物位置だけでなく「樹木（ গাছ ）」、「山（ পাহাড় ）」、「池（ পুকুর ）」などの自然地形や、さらに「土工事（ মাটি খনন বা মাটি ফরাট / Excavation or Fill）」の範囲まで表示することを義務付けている。日本の建築基準法（法施行規則第１条の３）における配置図要件と比較し、現況地形の改変状況を建築確認の段階で極めて詳細に把握しようとする強い環境保全の意図が見て取れる。</p>\n<p>2. <strong>汚水処理施設（STP）の記載義務（第９条第３項）</strong>:</p>\n<p>配置図において、浄化槽（Septic tank）のみならず「汚水処理施設（STP）」や「下水道接続箇所」の明示を求めている。日本の建築基準法でも浄化槽の記載はあるが、大規模開発における自律的な汚水処理インフラ（STP）の設置箇所を、建築確認の必須記載事項として明文化している点は、都市インフラが未整備な地域における「個別完結型インフラ」の重要性を反映している。</p>\n<p>3. <strong>平面図における「駐車場計画」の統合（第９条第３項）</strong>:</p>\n<p>各階平面図の一部として、「ドロップオフ・ベイ（Dropping bay）」や「警備員室（Security post）」を含む駐車場計画の詳細記載を求めている。日本の建築基準法では、駐車場は主に「附置義務条例」等で扱われるが、ダッカ規則では避難経路や機械室（昇降機等）と並んで、セキュリティと車両動線の情報を平面図の必須要件としている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における特殊建築物（Special Building）の確認済証（Construction Permit）の申請図書に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．配置図には、敷地に接する道路の幅員を表示すれば足り、私道（Personal road）がある場合であっても、その延長を表示する必要はない。</p>\n<p>２．特殊建築物のマスタープランには、建築物の配置だけでなく、樹木や池、さらには土工事（切土又は盛土）の範囲についても表示しなければならない。</p>\n<p>３．各階平面図については、地階（Basement）及び中二階（Mezzanine）については、避難上の重要性が低いため作成を省略することができる。</p>\n<p>４．屋根伏図（Roof plan）には、高架水槽や非常出口の位置を表示しなければならないが、雨水排水経路を表示する必要はない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。第９条第３項（ｉ）の五により、私道については「全延長及び幅員（ সমগ্র রাস্তার দৈর্ঘ্য ও প্রস্থ ）」を表示しなければならない。</p>\n<p><strong>2. 正しい。</strong> 第９条第３項（ｉ）の十の規定通りである。</p>\n<p>3. 誤り。第９条第３項（ｊ）により、平面図は地階及び中二階を含む「全ての階（ সকল তলার ）」について作成が義務付けられている。</p>\n<p>4. 誤り。第９条第３項（ｊ）の三により、雨水排水計画（ পানি নিষ্কাশন ব্যবস্থা ）及び排水経路（ পানি বেরিয়ে যাওয়ার পথ ）の表示も必須である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13428","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৯। নির্মাণ অনুমোদনপত্রের আবেদন (চলমান)</strong></h4>\n<h5 class=\"h-lv5\"><strong>(ঞ)</strong> ফ্লোর প্ল্যান (চলমান)</h5>\n<h6 class=\"h-lv6\">(৫) প্রযোজ্য ক্ষেত্রে, বৈদ্যুতিক ও যান্ত্রিক কক্ষের অবস্থান; এবং</h6>\n<h6 class=\"h-lv6\">(৬) একাধিক ভবন বা স্থাপনা রহিয়াছে এইরূপ কমপ্লেক্সের ক্ষেত্রে যানবাহন ও পথচারীদের জন্য প্রবেশ পথ, অভ্যন্তরীণ চলাচলের রাস্তা, যাত্রীদের জন্য গাড়ি হইতে অবতরণ এবং আরোহণের ব্যবস্থা;</h6>\n<h5 class=\"h-lv5\"><strong>(ট)</strong> প্রয়োজনীয় অংশে মাপসহ ১:১০০ স্কেল অনুসরণপূর্বক প্রস্তুতকৃত নকশার অন্তর্গত অন্যূন ২ (দুই)টি সেকশন (লম্বালম্বি ও আড়াআড়ি) যাহার মধ্যে অন্তত একটি সেকশনকে অবশ্যই সিঁড়িঘর ছেদ (cut) করিতে হইবে এবং ছেদ করা নকশায় নিম্নবর্ণিত বিষয়গুলি প্রদর্শন করিতে হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(১) মেজানাইন (mezzanine) তলাসহ, প্রযোজ্য ক্ষেত্রে, প্রতিটি তলার উচ্চতা, চিলেকোঠা (loft), উপরে স্থাপিত জলাধার (যদি থাকে), লিফটের মেশিন রুম (যদি থাকে), ছাদের কিনারা বরাবর প্যারাপেট (parapet) এর উচ্চতা, বর্তমান ভূমি, রাস্তা ও ফুটপাথের প্রেক্ষিতে ইমারতের সর্বোচ্চ উচ্চতা;</h6>\n<h6 class=\"h-lv6\">(২) বিভিন্ন অংশের মাপ, যাহাদের বহিঃস্থ দিকগুলি দেয়াল হইতে সম্প্রসারিত (ব্যালকনি, সানশেড, ইত্যাদি); এবং</h6>\n<h6 class=\"h-lv6\">(৩) মেঝে-তল (floor surface) এর বর্তমান ও প্রস্তাবিত লেভেল (level);</h6>\n<h5 class=\"h-lv5\"><strong>(ঠ)</strong> ১:১০০ স্কেলে প্রণীত ভবনের সর্বোচ্চ উচ্চতা ও প্রয়োজনীয় মাপসহ সকল দিকের elevation drawing;</h5>\n<h5 class=\"h-lv5\"><strong>(ড)</strong> কোড অনুসরণপূর্বক ১:১০০ স্কেল অনুসরণ করিয়া ভবনের প্রস্তুতকৃত নিম্নবর্ণিত কাঠামো নকশা (Structural Design) যাহাতে নিম্নবর্ণিত তথ্যাদি সন্নিবেশিত থাকিবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(১) কোড মোতাবেক সিসমিক ডিটেইলিং ও প্যারামিটারসহ জেনারেল নোট (General Notes) এবং ম্যাটেরিয়াল স্পেসিফিকেশন;</h6>\n<h6 class=\"h-lv6\">(২) ফাউন্ডেশন ডিটেইলড প্লান, সেকশন, প্রযোজ্য ক্ষেত্রে, Shore Protection ও Excavation ডিজাইন;</h6>\n<h6 class=\"h-lv6\">(৩) কলাম, শিয়ার ওয়াল ও রিটেইনিং ওয়ালের লে-আউট এবং সিডিউল ও ডিটেইলিং;</h6>\n<h6 class=\"h-lv6\">(৪) বীম লে-আউট ও ডিটেইলিং;</h6>\n<h6 class=\"h-lv6\">(৫) স্লাবের পুরুত্ব (thickness)-সহ রেইনফোর্সমেন্ট (reinforcement) ডিটেইলড (detailed);</h6>\n<h6 class=\"h-lv6\">(৬) সিঁড়ির পুরুত্ব (thickness) রেইন্সফোর্সমেন্ট ডিটেইলড;</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第９条（確認済証の申請）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>ঞ</strong>（承前）</h5>\n<h6 class=\"h-lv6\">五　適用がある場合において、電気設備室及び機械設備室の設置位置</h6>\n<h6 class=\"h-lv6\">六　複数の建築物若しくは工作物が存する複合施設（Complex）にあっては、車両及び歩行者のための出入口、敷地内通路、並びに旅客の乗降のための停留スペースの整備状況</h6>\n<h5 class=\"h-lv5\"><strong>ট</strong>　必要な箇所に寸法を記入した縮尺１：１００の<strong>断面図（Sections）</strong>。長手方向及び桁行方向の２面以上を作成しなければならない。この場合において、少なくとも１面は階段室を切り通す（cut）ものとし、当該図面には次に掲げる事項を表示しなければならない。</h5>\n<h6 class=\"h-lv6\">一　中二階（Mezzanine）を含む各階の高さ、ロフト（Loft / 小屋裏物置）、屋上水槽（存する場合に限る。）、昇降機機械室（存する場合に限る。）、屋上端部のパラペット（Parapet）の高さ、並びに現況地盤、道路及び歩道を基準とした建築物の最高高さ</h6>\n<h6 class=\"h-lv6\">二　外壁面から突出する各部分（ベランダ、庇等）の寸法</h6>\n<h6 class=\"h-lv6\">三　床面（Floor surface）の現況レベル及び設計レベル</h6>\n<h5 class=\"h-lv5\"><strong>ঠ</strong>　縮尺１：１００による、建築物の最高高さ及び必要な寸法を記載した全方位の<strong>立面図（Elevation drawing）</strong></h5>\n<h5 class=\"h-lv5\"><strong>ড</strong>　法典（Code）に準拠し、縮尺１：１００により作成された次に掲げる<strong>構造設計図（Structural Design）</strong>。当該図面には次に掲げる事項を記載しなければならない。</h5>\n<h6 class=\"h-lv6\">一　法典に基づく耐震詳細（Seismic detailing）及び設計定数を含む一般事項（General Notes）並びに材料仕様（Material specification）</h6>\n<h6 class=\"h-lv6\">二　基礎（Foundation）の詳細図及び断面図。適用がある場合においては、山留め（Shore Protection）及び根切り（Excavation）の設計図</h6>\n<h6 class=\"h-lv6\">三　柱、耐震壁（Shear wall）及び擁壁（Retaining wall）の配置図、リスト並びに詳細図</h6>\n<h6 class=\"h-lv6\">四　梁の配置図及び詳細図</h6>\n<h6 class=\"h-lv6\">五　床版（Slab）の厚さ及び配筋（Reinforcement）詳細図</h6>\n<h6 class=\"h-lv6\">六　階段の厚さ及び配筋詳細図</h6>\n<hr class=\"sep\">\n<p>1. <strong>断面図における階段室通過の義務化（第９条第３項ト号）</strong>:</p>\n<p>ダッカ規則では、作成すべき２面以上の断面図のうち「少なくとも１面は階段室を通過させること（ সিঁড়িঘর ছেদ করিতে হইবে ）」を明文で義務付けている。日本の建築基準法施行規則（第１条の３、別表第２）では断面図に「階段の形状」を表示するよう求めているが、断面の切断位置を階段室に特定するまでの強行規定はなく、審査の厳格性が伺える。</p>\n<p>2. <strong>構造図における施工情報（山留め・根切り）の要求（第９条第３項ド号）</strong>:</p>\n<p>基礎図の一部として「山留め（Shore Protection）」及び「根切り（Excavation）」の設計図の提出を求めている。日本ではこれらは通常「施工図」や労働安全衛生法の範疇とされることが多いが、ダッカ規則では建築確認の申請図書（構造設計図）の一部として詳細設計を法的に義務付けている。</p>\n<p>3. <strong>図面尺度の定数的指定（第９条第３項ト〜ド号）</strong>:</p>\n<p>断面図、立面図、構造図のすべてにおいて「縮尺 １：１００（ ১:১০০ স্কেল ）」を一律に指定している。日本の建築基準法では「適当な縮尺」とされることが多く、大規模建築物では１／２００等も許容されるが、ダッカ規則は審査の正確性を期すために詳細な尺度を法的に固定している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、特殊建築物の確認済証（Construction Permit）の申請図書に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．建築物の断面図は、長手方向又は桁行方向のいずれか １面 を作成すれば足りる。</p>\n<p>２．断面図のうち少なくとも １面 は、必ず階段室を切り通す（階段室を通る断面とする）ように作成しなければならない。</p>\n<p>３．立面図（Elevation drawing）については、建築物の正面及び主要な側面の計 ２面 を表示すれば足り、全方位を作成する必要はない。</p>\n<p>４．構造設計図（Structural Design）には、柱や耐震壁の詳細は表示しなければならないが、階段の配筋詳細まで表示する必要はない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。第９条第３項（ｔ）により、長手及び桁行の「２面以上（ অন্যূন ২ টি ）」が必要である。</p>\n<p><strong>2. 正しい。</strong> 第９条第３項（ｔ）の規定通りである（ সিঁড়িঘর ছেদ করিতে হইবে ）。</p>\n<p>3. 誤り。第９条第３項（ｔｈ）により、「全方位（ সকল দিকের ）」の作成が義務付けられている。</p>\n<p>4. 誤り。第９条第３項（ｄ）の六により、階段の配筋詳細（ সিঁড়ির ... রেইন্সফোর্সমেন্ট ডিটেইলড ）も必須項目である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13429","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৯। নির্মাণ অনুমোদনপত্রের আবেদন (চলমান)</strong></h4>\n<h5 class=\"h-lv5\"><strong>(ড)</strong> কাঠামো নকশা (Structural Design) (চলমান)</h5>\n<h6 class=\"h-lv6\">(৭) স্ট্যান্ডার্ড স্পেসিফিকেশনসহ সেপ্টিক ট্যাংক, আন্ডারগ্রাউন্ড এবং ওভারহেড ওয়াটার ট্যাঙ্কের প্ল্যান, সেকশনসহ রেইন্সফোর্সমেন্ট ডিটেইলড;</h6>\n<h6 class=\"h-lv6\">(৮) প্রযোজ্য ক্ষেত্রে, এক্সপানশন জয়েন্ট, সিসমিক জয়েন্ট ডিটেইলড;</h6>\n<h6 class=\"h-lv6\">(৯) র‍্যাম্প ও লিফট কোরের ডিটেইল্ড; এবং</h6>\n<h6 class=\"h-lv6\">(১০) কোড অনুসারে প্রকৌশলী কর্তৃক স্বাক্ষরিত প্রত্যয়নপত্র;</h6>\n<h5 class=\"h-lv5\"><strong>(ঢ)</strong> কোড অনুসরণপূর্বক, পঠনযোগ্য ও যথাযথ স্কেল অনুসরণে ভবনের নিম্নবর্ণিত মেকানিক্যাল, ইলেকট্রিক্যাল, প্লাম্বিং (MEP) ও অগ্নি-নিরাপত্তা নকশা (design) যাহাতে নিম্নবর্ণিত তথ্যাদি সন্নিবেশিত থাকিবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(১) কোডে উল্লিখিত নীতিমালা অনুযায়ী ইমারত বা স্থাপনার বিস্তারিত ইলেকট্রিক্যাল বা ইলেকট্রো মেকানিক্যাল নকশা;</h6>\n<h6 class=\"h-lv6\">(২) প্রযোজ্য ক্ষেত্রে, Sewage Treatment Plant-সহ কোড অনুসারে ইমারত বা স্থাপনার বিস্তারিত প্লাম্বিং (plumbing) নকশা;</h6>\n<h6 class=\"h-lv6\">(৩) এই বিধিমালা বা কোড অনুযায়ী অগ্নি নিরাপত্তা ও নির্বাপন নকশা বা, প্রযোজ্য ক্ষেত্রে, ফায়ার সার্ভিস ও সিভিল ডিফেন্স অধিদপ্তর কর্তৃক অনুমোদিত নকশা;</h6>\n<h6 class=\"h-lv6\">(৪) প্রযোজ্য ক্ষেত্রে, শীততাপ নিয়ন্ত্রণ, বায়ু চলাচল ও ভেন্টিলেশন ব্যবস্থা;</h6>\n<h6 class=\"h-lv6\">(৫) প্রযোজ্য ক্ষেত্রে, ফায়ার হাইড্রেন্ট ও অগ্নি নির্বাপন ব্যবস্থা;</h6>\n<h6 class=\"h-lv6\">(৬) প্রযোজ্য ক্ষেত্রে, ফায়ার ডিটেকশন, এলার্ম ও জরুরি নির্গমণ ব্যবস্থা;</h6>\n<h6 class=\"h-lv6\">(৭) প্রযোজ্য ক্ষেত্রে, বৈদ্যুতিক সাবস্টেশন, জেনারেটর ও সৌর বিদ্যুৎ ব্যবস্থা;</h6>\n<h6 class=\"h-lv6\">(八) প্রযোজ্য ক্ষেত্রে, আর্থিং, বজ্রপাত নিরোধক ও বিদ্যুৎ সরবরাহ ব্যবস্থা;</h6>\n<h6 class=\"h-lv6\">(৯) প্রযোজ্য ক্ষেত্রে, পানি সরবরাহ পয়ঃ ও পানি নিষ্কাশন ও পয়ঃপরিশোধন ব্যবস্থা;</h6>\n<h6 class=\"h-lv6\">(১০) প্রযোজ্য ক্ষেত্রে, শব্দ নিয়ন্ত্রণ ব্যবস্থা;</h6>\n<h6 class=\"h-lv6\">(১১) প্রযোজ্য ক্ষেত্রে, লিফট, এসকেলেটর, মুভিং ওয়াক, ইত্যাদির ব্যবস্থা; এবং</h6>\n<h6 class=\"h-lv6\">(১২) কোড অনুসারে প্রকৌশলী কর্তৃক স্বাক্ষরিত প্রত্যয়নপত্র;</h6>\n<h5 class=\"h-lv5\"><strong>(ণ)</strong> ডিজাইন প্রতিবেদন যাহাতে নিম্নবর্ণিত বিষয় সন্নিবেশিত থাকিবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(১) সাইটের মৃত্তিকা পরীক্ষা প্রতিবেদন;</h6>\n<h6 class=\"h-lv6\">(২) কোড অনুযায়ী ক্যালকুলেশনসহ বিস্তারিত ডিজাইন প্রতিবেদন;</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第９条（確認済証の申請）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>ড</strong>（承前）</h5>\n<h6 class=\"h-lv6\">七　標準仕様に基づく浄化槽（セプティックタンク）、地下貯水槽及び高架水槽の配置図、断面図並びに配筋（Reinforcement）詳細図</h6>\n<h6 class=\"h-lv6\">八　適用がある場合において、伸縮継手（Expansion joint）及び耐震継手（Seismic joint）の詳細図</h6>\n<h6 class=\"h-lv6\">九　スロープ（Ramp）及び昇降機シャフト（Lift core）の詳細図</h6>\n<h6 class=\"h-lv6\">十　法典（Code）に基づき技術者が署名した証明書</h6>\n<h5 class=\"h-lv5\"><strong>ঢ</strong>　法典に準拠し、判読可能かつ適切な縮尺により作成された建築物の<strong>機械、電気、給排水衛生設備（MEP）及び火災安全設計図</strong>。当該図面には次に掲げる事項を記載しなければならない。</h5>\n<h6 class=\"h-lv6\">一　法典に定める指針に基づく建築物又は工作物の詳細な電気設備又は電気機械設備設計図</h6>\n<h6 class=\"h-lv6\">二　適用がある場合において、汚水処理施設（STP）を含む、法典に基づく建築物又は工作物の詳細な給排水衛生設備（Plumbing）設計図</h6>\n<h6 class=\"h-lv6\">三　本規則又は法典に基づく火災安全及び消火設計図、又は（適用がある場合）消防・民間防衛局が承認した設計図</h6>\n<h6 class=\"h-lv6\">四　適用がある場合において、空気調和、気流及び換気（Ventilation）システム</h6>\n<h6 class=\"h-lv6\">五　適用がある場合において、消火栓（Fire hydrant）及び消火設備</h6>\n<h6 class=\"h-lv6\">六　適用がある場合において、火災検知、警報及び非常出口（Emergency exit）システム</h6>\n<h6 class=\"h-lv6\">七　適用がある場合において、電気変電所、発電機及び太陽光発電システム</h6>\n<h6 class=\"h-lv6\">八　適用がある場合において、接地（Earthing）、避雷（Lightning arrester）及び電力供給システム</h6>\n<h6 class=\"h-lv6\">九　適用がある場合において、給水、排水、汚水排出及び水処理システム</h6>\n<h6 class=\"h-lv6\">十　適用がある場合において、音響制御システム</h6>\n<h6 class=\"h-lv6\">十一　適用がある場合において、昇降機、エスカレーター、動く歩道等の設備</h6>\n<h6 class=\"h-lv6\">十二　法典に基づき技術者が署名した証明書</h6>\n<h5 class=\"h-lv5\"><strong>ণ</strong>　次に掲げる事項を記載した<strong>設計報告書（Design Report）</strong>。</h5>\n<h6 class=\"h-lv6\">一　敷地の土質調査（Soil test）報告書</h6>\n<h6 class=\"h-lv6\">二　法典に基づく計算書を含む詳細な設計報告書</h6>\n<hr class=\"sep\">\n<p>1. <strong>設備設計図書の包括的な定義（第９条第３項ｄｈ号）</strong>:</p>\n<p>ダッカ規則では、確認済証（Construction Permit）の申請段階において、電気、機械、給排水だけでなく「太陽光発電（ সৌর বিদ্যুৎ ）」や「避難出口（ জরুরি নির্গমণ ）」のシステム詳細までを一括して「MEP及び火災安全設計」として求めている。日本の建築基準法では、設備関係は建築主事による確認（法第６条）や設備設計一級建築士の関与（法第３条）によって担保されるが、ダッカ規則はこれらを一つの法的サブセクションとしてまとめ、個別に技術者の署名証明（ প্রত্যয়নপত্র ）を求めている点が特徴的である。</p>\n<p>2. <strong>汚水処理施設（STP）の個別明記（第９条第３項ｄｈ号二）</strong>:</p>\n<p>給排水設計図の中に、適用がある場合は「汚水処理施設（STP）」を含むことを明文で義務付けている。日本の建築基準法では、浄化槽の設置は浄化槽法等との連動で扱われるが、ダッカ規則は都市インフラの未整備を補完するため、建築確認の必須図書としてＳＴＰの詳細設計を強く求めている。</p>\n<p>3. <strong>土質調査報告書の確認申請への統合（第９条第３項ｎ号）</strong>:</p>\n<p>「設計報告書」の第一項目として「土質調査報告書（ সাইটের মৃত্তিকা পরীক্ষা প্রতিবেদন ）」を掲げている。日本の建築基準法（法第１９条、令第３８条）においても地盤調査は必須だが、確認申請の「構成図書」としての報告書（Design Report）の中で、計算書と並んで土質情報を法的に最優先させている点は、地盤沈下や倒壊事故への警戒感の表れである。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における確認済証（Construction Permit）の申請図書に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．建築物の構造設計図（Structural Design）には、伸縮継手（Expansion joint）や耐震継手（Seismic joint）の詳細を含める必要はない。</p>\n<p>２．給排水衛生設備（Plumbing）の設計図には、法典（Code）に準拠した詳細を記載しなければならないが、汚水処理施設（STP）に関する計画は含まれない。</p>\n<p>３．建築物の火災安全設計図には、火災検知システムや警報システムのほか、非常出口（Emergency exit）に関するシステムも含まれる。</p>\n<p>４．設計報告書（Design Report）には、法典に基づく構造計算書を添付すれば足り、敷地の土質調査報告書（Soil test report）を別途提出する必要はない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第９条第３項（ｄ）の八により、伸縮継手や耐震継手の詳細は必須図書である。</p>\n<p>2. 誤り。第９条第３項（ｄｈ）の二により、適用がある場合は汚水処理施設（ Sewage Treatment Plant ）を含む必要がある。</p>\n<p><strong>3. 正しい。</strong> 第９条第３項（ｄｈ）の六の規定通りである。</p>\n<p>4. 誤り。第９条第３項（ｎ）の一により、土質調査報告書（ মৃত্তিকা পরীক্ষা প্রতিবেদন ）は設計報告書の必須構成要素である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13430","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৯। নির্মাণ অনুমোদনপত্রের আবেদন (চলমান)</strong></h4>\n<h5 class=\"h-lv5\"><strong>(ণ)</strong> ডিজাইন প্রতিবেদন (চলমান)</h5>\n<h6 class=\"h-lv6\">(৩) ম্যাটেরিয়ালস স্পেসিফিকেশনসহ স্ট্রাকচারাল ডিজাইন প্রতিবেদন, কারিগরি তথ্যাদি ও কর্মপদ্ধতি (<strong>Construction Work Safety Plan</strong>) যাহাতে নির্মাণ কার্যক্রমের কারণে পার্শ্ববর্তী কোনো ইমারত, স্থাপনা, সাইট, ইউটিলিটি সার্ভিস লাইন, রাস্তা বা অন্য কোনো অবকাঠামো বা জানমাল ও পরিবেশের ক্ষতি না হয়;</h6>\n<h6 class=\"h-lv6\">(৪) ইলেকট্রিক্যাল বা ইলেকট্রোমেকানিক্যাল ডিজাইন ক্যালকুলেশন রিপোর্ট; প্লাম্বিং ও পানি সরবরাহ এবং, প্রযোজ্য ক্ষেত্রে, Sewage Treatment Plant (STP) এর ডিজাইন ক্যালকুলেশন রিপোর্ট。</h6>\n<h5 class=\"h-lv5\"><strong>(৪)</strong> পরিকল্পনা অনুমোদনপত্র গ্রহণ করা হইয়া থাকিলে নির্মাণ অনুমোদন আবেদনকালে মালিকানা সংক্রান্ত কাগজপত্র পুনরায় দাখিল করিতে হইবে না।</h5>\n<h5 class=\"h-lv5\"><strong>(৫)</strong> নির্মাণ অনুমোদনের আবেদনের প্রেক্ষিতে নির্মাণ সময়ের জন্য কর্তৃপক্ষ কর্তৃক ইমারত বা স্থাপনার স্থাপত্য, কাঠামোগত, ইলেকট্রিক্যাল, প্লাম্বিং নকশা এবং, প্রযোজ্য ক্ষেত্রে, মেকানিক্যাল, অগ্নিনিরাপত্তা ও নির্বাপন নকশা '<strong>নির্মাণ অনুমোদন নকশা</strong>' হিসাবে গণ্য হইবে।</h5>\n<h5 class=\"h-lv5\"><strong>(৬)</strong> ইমারত বা স্থাপনার সম্পূর্ণ বা আংশিক নির্মাণ শেষে বসবাস বা ব্যবহার সনদ প্রাপ্তি ইমারতের সম্পূর্ণ বা আংশিক অংশের চূড়ান্ত অনুমোদন হিসাবে গণ্য হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>১০। বিশেষ ইমারত।</strong></h4>\n<h5 class=\"h-lv5\">(১) নিম্নবর্ণিত যেকোনো বৈশিষ্ট্যসম্পন্ন স্থাপনার ক্ষেত্রে উহা বিশেষ ইমারত হিসাবে গণ্য হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) ৭,৫০০ (সাত হাজার পাঁচশত) বর্গমিটারের অধিক (গ্রস এরিয়া) মেঝে বিশিষ্ট যেকোনো ইমারত;</h6>\n<h6 class=\"h-lv6\">(খ) জাতীয় মহাসড়কের সহিত সরাসরি সংযোগ বিশিষ্ট যেকোনো ইমারত;</h6>\n<h6 class=\"h-lv6\">(গ) মহাপরিকল্পনায় নির্দেশিত ২ (দুই) বা ততোধিক প্রধান সড়কের ১০০ (একশত) মিটার সংযোগস্থলে প্রস্তাবিত স্থাপনা;</h6>\n<h6 class=\"h-lv6\">(ঘ) পরিবেশ অধিদপ্তর কর্তৃক ঘোষিত পরিবেশগত সংকটাপন্ন এলাকার ২৫০ (দুইশত পঞ্চাশ) মিটার দূরত্বের মধ্যে যেকোনো ধরনের নির্মাণ বা উন্নয়ন;</h6>\n<h6 class=\"h-lv6\">(ঙ) ইটের ভাটাসহ পরিবেশ দূষণমূলক বা বিপজ্জনক ব্যবহারের ভবন (J) বা স্বাস্থ্যসেবা (D);</h6>\n<h6 class=\"h-lv6\">(চ) সরকার কর্তৃক চিহ্নিত ঐতিহ্যবাহী ইমারত বা স্থাপনার সীমানা প্রাচীর হইতে ২৫０ (দুইশত পঞ্চাশ) মিটার দূরত্বের মধ্যে যেকোনো নির্মাণ বা উন্নয়ন;</h6>\n<h6 class=\"h-lv6\">(ছ) মহাপরিকল্পনায় চিহ্নিত প্রাকৃতিক সৌন্দর্যমণ্ডিত এলাকার ১৫০ (একশত পঞ্চাশ) মিটার দূরত্বের মধ্যে যেকোনো নির্মাণ বা উন্নয়ন (Water Based Park, বন্যাপ্রবাহ এলাকা, বনভূমি, উদ্যান);</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第９条（確認済証の申請）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>ণ</strong>（承前）</h5>\n<h6 class=\"h-lv6\">三　材料仕様書を含む構造設計報告書、技術資料及び<strong>施工安全計画（Construction Work Safety Plan）</strong>。これらは、建築工事により隣接する建築物、工作物、敷地、公共設備配管、道路その他のインフラストラクチャー、並びに人命、財産及び環境に対して損害を与えないものでなければならない。</h6>\n<h6 class=\"h-lv6\">四　電気又は電気機械設備設計計算報告書、並びに給排水設備、水供給及び（適用がある場合）汚水処理施設（STP）の設計計算報告書。</h6>\n<h5 class=\"h-lv5\">４　計画承認（Planning Permit）を取得済みである場合にあっては、確認済証（Construction Permit）の申請時に、土地の所有権に関する書類を再度提出することを要しない。</h5>\n<h5 class=\"h-lv5\">５　確認済証の申請に対し、工事期間中のために所管行政庁（Authority）が承認した建築物又は工作物の意匠、構造、電気、給排水の各図面、及び（適用がある場合）機械、火災安全・消火の各図面は、<strong>「確認済設計図書（নির্মাণ অনুমোদন নকশা）」</strong>とみなす。</h5>\n<h5 class=\"h-lv5\">６　建築物又は工作物の全部又は一部の工事完了後、使用許可証（Occupancy Certificate）を取得したことをもって、当該建築物の全部又は一部の最終的な承認とみなす。</h5>\n<h4 class=\"h-lv4\"><strong>第１０条（特殊建築物（Special Building））</strong></h4>\n<h5 class=\"h-lv5\">１　次に掲げる特徴のいずれかを有する建築物又は工作物は、特殊建築物（ বিশেষ ইমারত ）とみなす。</h5>\n<h6 class=\"h-lv6\">一　延べ面積（Gross Area）が７,５００平方メートルを超える建築物</h6>\n<h6 class=\"h-lv6\">二　国道（National Highway）に直接接続する建築物</h6>\n<h6 class=\"h-lv6\">三　都市計画（Master Plan）において指定された２以上の主要道路の交差点から１００メートル以内の地点に計画される工作物</h6>\n<h6 class=\"h-lv6\">四　環境局（Department of Environment）が宣言した環境保護区域（Ecologically Critical Area）から２５０メートル以内の距離におけるあらゆる建築又は開発</h6>\n<h6 class=\"h-lv6\">五　レンガ焼き窯を含む環境汚染若しくは危険用途の建築物（用途分類Ｊ）又は医療施設（用途分類Ｄ）</h6>\n<h6 class=\"h-lv6\">六　政府が指定した伝統的建築物（Heritage Building）又は工作物の境界壁から２５０メートル以内の距離における建築又は開発</h6>\n<h6 class=\"h-lv6\">七　都市計画において指定された自然景観区域（水辺公園、洪水流下区域、森林、公園等）から１５０メートル以内の距離における建築又は開発</h6>\n<hr class=\"sep\">\n<p>1. <strong>「特殊建築物」の定義基準の相違（第１０条第１項）</strong>:</p>\n<p>日本の建築基準法（法第２条第２号）における「特殊建築物」は、主に学校、病院、劇場等の「用途」に基づいて定義される。これに対しダッカ規則では、用途（用途分類ＪやＤ）だけでなく、「国道への直接接続（ খ ）」や「主要交差点からの距離（ গ ）」、「環境保護区や歴史的建築物からの距離（ ঘ, চ ）」といった<strong>立地条件</strong>が特殊建築物の判定基準として強力に機能している。これは、都市インフラへの負荷や景観・環境保護を建築確認の初期段階で厳格にコントロールしようとする強い意図の表れである。</p>\n<p>2. <strong>施工安全計画の確認申請への統合（第９条第３項）</strong>:</p>\n<p>確認済証（Construction Permit）の申請段階で、隣接物への損害防止を含む「施工安全計画（ Construction Work Safety Plan ）」の提出を義務付けている。日本では通常、確認申請後の施工段階で作成される事項（道路使用許可や施工計画）であるが、ダッカ規則では周辺環境への外部不経済を抑制するための「工事手法の妥当性」を確認の要件に組み込んでいる。</p>\n<p>3. <strong>最終承認概念の明文化（第９条第６項）</strong>:</p>\n<p>使用許可証（Occupancy Certificate）の取得が、建築物の「最終的な承認（ চূড়ান্ত অনুমোদন ）」であると定義されている。日本の建築基準法（法第７条）における検査済証の交付に近い位置づけだが、ダッカ規則では「使用許可＝法的承認の完成」という法的地位をより直接的に規定している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における「特殊建築物（Special Building）」の定義に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．延べ面積（Gross Area）が ５,０００平方メートル を超える建築物は、その用途にかかわらず特殊建築物とみなされる。</p>\n<p>２．国道（National Highway）に直接接続する建築物は、その規模にかかわらず特殊建築物に含まれる。</p>\n<p>３．環境局が宣言した環境保護区域から ５００メートル の距離において行われる開発行為は、特殊建築物に係る規定の適用を受ける。</p>\n<p>４．政府が指定した伝統的建築物（Heritage Building）の境界壁から ３００メートル 離れた地点における建築は、特殊建築物とみなされる。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。第１０条第１項（ｋａ）により、基準は <strong>৭,৫০০ (সাত হাজার পাঁচশত) বর্গমিটার（７,５００㎡）</strong> 超である。</p>\n<p><strong>2. 正しい。</strong> 第１０条第１項（ｋｈ）の規定通りである。</p>\n<p>3. 誤り。第１０条第１項（ｇｈ）により、基準は <strong>২৫০ (দুইশত পঞ্চাশ) মিটার（２５０ｍ）</strong> 以内である。</p>\n<p>4. 誤り。第１０条第１項（ｃｈｏ）により、基準は <strong>২৫০ (দুইশত পঞ্চাশ) মিটার（２５０ｍ）</strong> 以内である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13431","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>১০। বিশেষ ইমারত (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(১) (চলমান)</h5>\n<h6 class=\"h-lv6\">(জ) মহাপরিকল্পনায় চিহ্নিত বনাঞ্চল, পাহাড়ি এলাকা অথবা পাহাড় হিসাবে দৃশ্যমান ভূমি অথবা এইরূপ ভূমির ১৫০ (একশত পঞ্চাশ) মিটারের মধ্যে যেকোনো ধরনের নির্মাণ বা উন্নয়ন;</h6>\n<h6 class=\"h-lv6\">(ঝ) নদী তীরবর্তী ২৫০ (দুইশত পঞ্চাশ) মিটার দূরত্বের মধ্যে যেকোনো ধরনের নির্মাণ বা উন্নয়ন;</h6>\n<h6 class=\"h-lv6\">(ঞ) ৫,০০০ (পাঁচ হাজার) বর্গমিটারের অধিক (গ্রস এরিয়া) মেঝে বিশিষ্ট কোনো বিপণী কেন্দ্র; এবং</h6>\n<h6 class=\"h-lv6\">(ট) প্রযুক্তিগত অথবা পরিবেশগত কারণে এই বিধিমালার বিধানাবলি সরাসরি প্রয়োগ করা যাইবে না এইরূপ বৈশিষ্ট্যসম্পন্ন স্থাপনা যাহা সন্নিহিত এলাকায় বিশেষ প্রভাব তৈরি করিতে পারে।</h6>\n<h5 class=\"h-lv5\">(২) বিশেষ ইমারতের জন্য কোনো অতিরিক্ত নকশা অনুমোদন গ্রহণ করিতে হইবে না।</h5>\n<h4 class=\"h-lv4\"><strong>১১। বিশেষ ইমারতের নির্মাণ অনুমোদনে বিবেচ্য বিষয়।</strong></h4>\n<h5 class=\"h-lv5\">(১) বিশেষ ইমারত নির্মাণ অনুমোদনে ইমারত নির্মাণ কমিটি কর্তৃক নকশা ও প্রতিবেদন যাচাইকালে নিম্নবর্ণিত বিষয়াদিসহ প্রাসঙ্গিক অন্যান্য বিষয় বিবেচনা করিতে হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) পরিকল্পনা অনুমোদনপত্রের শর্তাবলি পালন করা হইয়াছে কিনা এবং কোনো অতিরিক্ত শর্তাদি প্রযোজ্য কিনা;</h6>\n<h6 class=\"h-lv6\">(খ) ঐতিহ্যবাহী ইমারত (heritage) সংলগ্ন ও প্রাকৃতিক সৌন্দর্যমণ্ডিত এলাকার ক্ষেত্রে প্রস্তাবিত ইমারতের উচ্চতা, ব্যবহার, নির্মাণ সময়ের সঙ্গে প্রস্তাবিত ইমারতের সামঞ্জস্যতা, প্রভৃতি;</h6>\n<h6 class=\"h-lv6\">(গ) পরিকল্পনা প্রতিবেদন অনুযায়ী প্রস্তাবিত প্রকল্প সন্নিহিত পারস্পরিক এলাকার সঙ্গে সামঞ্জস্যপূর্ণ কিনা;</h6>\n<h6 class=\"h-lv6\">(ঘ) প্রয়োজনীয় নাগরিক সুবিধাদির সংস্থান করা হইয়াছে কিনা;</h6>\n<h6 class=\"h-lv6\">(ঙ) সমাবেশ, বাণিজ্যিক, ইত্যাদি ব্যবহারের কারণে অধিক পরিমাণে যানবাহন সমাগমের জন্য পর্যাপ্ত ট্রাফিক সার্কুলেশন ব্যবস্থার সংস্থান করা হইয়াছে কিনা;</h6>\n<h6 class=\"h-lv6\">(চ) নদী তীরবর্তী বা বন্যাপ্রবণ এলাকার ক্ষেত্রে প্রকল্পের অবস্থান বন্যার প্রাকৃতিক প্রবাহ বাধাগ্রস্ত করিবে কিনা, প্রকল্প বাস্তবায়ন করা হইলে বন্যার পানির স্বাভাবিক উচ্চতা, গতিবেগ, ইত্যাদি বৃদ্ধি পাইবে কিনা কিংবা বৃষ্টির পানি নিষ্কাশন কিরূপ প্রভাব সৃষ্টি করিবে;</h6>\n<h6 class=\"h-lv6\">(ছ) প্রকল্প বাস্তবায়নের ফলে কোনো পরিবেশগত বিরূপ প্রতিক্রিয়া সৃষ্টি হইবে কিনা এবং হইলে সেক্ষেত্রে সম্ভাব্য করণীয়; এবং</h6>\n<h6 class=\"h-lv6\">(জ) বর্জ্য ব্যবস্থাপনার ক্ষেত্রে প্রয়োজনীয় ইউটিলিটি সরবরাহ পর্যাপ্ত কিনা।</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第１０条（特殊建築物）（承前）</strong></h4>\n<h5 class=\"h-lv5\">１（承前）</h5>\n<h6 class=\"h-lv6\">ｈ　都市計画（マスタープラン）において指定された森林地帯、丘陵地帯若しくは丘陵とみなされる土地、又は当該土地から１５０メートル以内の距離におけるあらゆる建築又は開発</h6>\n<h6 class=\"h-lv6\">ｉ　河川沿岸から２５０メートル以内の距離におけるあらゆる建築又は開発</h6>\n<h6 class=\"h-lv6\">ｊ　延べ面積（Gross Area）が５,０００平方メートルを超える物販店舗（ショッピングセンター）</h6>\n<h6 class=\"h-lv6\">ｋ　技術的又は環境的な理由により本規則の規定を直接適用することができず、かつ、隣接区域に重大な影響を及ぼすおそれのある特徴を有する施設</h6>\n<h5 class=\"h-lv5\">２　特殊建築物（Special Building）のために、追加の設計承認を受けることを要しない。</h5>\n<h4 class=\"h-lv4\"><strong>第１１条（特殊建築物の建築承認における考慮事項）</strong></h4>\n<h5 class=\"h-lv5\">１　建築審査委員会（Building Construction Committee）は、特殊建築物の建築承認において設計図書及び報告書を審査する際、次に掲げる事項その他関連する事項を考慮しなければならない。</h5>\n<h6 class=\"h-lv6\">ａ　計画承認（Planning Permit）の条件が遵守されているか、及び追加の条件が必要であるか。</h6>\n<h6 class=\"h-lv6\">ｂ　伝統的建築物（Heritage）の隣接地又は自然景観区域において、計画建築物の高さ、用途及び工期が当該地域と調和しているか。</h6>\n<h6 class=\"h-lv6\">ｃ　計画報告書に基づき、当該プロジェクトが周辺区域と調和しているか。</h6>\n<h6 class=\"h-lv6\">ｄ　必要な公共施設（Civic amenities）の整備がなされているか。</h6>\n<h6 class=\"h-lv6\">ｅ　集会、商業等の用途により、多量の車両流入が見込まれる場合、十分な交通循環（Traffic circulation）体系が確保されているか。</h6>\n<h6 class=\"h-lv6\">ｆ　河川沿岸又は洪水多発区域において、プロジェクトの立地が自然な洪水流下を妨げないか、また、プロジェクトの実施により洪水時の水位、流速等が上昇しないか、若しくは雨水排水にどのような影響を及ぼすか。</h6>\n<h6 class=\"h-lv6\">ｇ　プロジェクトの実施により環境への悪影響が生じないか。生じる場合にあっては、その対策が検討されているか。</h6>\n<h6 class=\"h-lv6\">ｈ　廃棄物管理（Waste management）において、必要な公共供給設備（Utility）が十分であるか。</h6>\n<hr class=\"sep\">\n<p>1. <strong>立地による「特殊建築物」指定の広範性（第１０条第１項）</strong>:</p>\n<p>日本の建築基準法第２条第２号における「特殊建築物」は、主に学校、病院、劇場等の「用途」に基づいて定義される。対してダッカ規則では、用途（物販店舗）だけでなく、「河川からの距離（２５０ｍ）」や「丘陵からの距離（１５０ｍ）」といった立地条件によって特殊建築物とみなされる点が非常に特徴的である。これは、特定の地形・環境における災害リスク管理を、個別の建築規制（確認事務）に直接的に連動させている。</p>\n<p>2. <strong>洪水・排水影響の技術的審査（第１１条第１項ｆ）</strong>:</p>\n<p>建築審査委員会が考慮すべき事項として、プロジェクトが「洪水位や流速を上昇させないか」を明文化している。日本の建築基準法でも、災害危険区域等における制限（法第３９条）はあるが、個別の建築プロジェクトが地域の「洪水流下能力」に与える影響までを審査項目として列挙している点は、極めて過密かつ水害リスクの高いダッカの地理的特性を反映している。</p>\n<p>3. <strong>交通循環への直接的関与（第１１条第１項ｅ）</strong>:</p>\n<p>集客施設等の建築承認に際し、「十分な交通循環（Traffic circulation）体系」の有無を審査する。日本では交通影響は主に都市計画法や各自治体の条例（附置義務駐車場等）で扱われるが、ダッカ規則では「建築承認」のプロセスにおいて、周辺道路網への負荷を技術的に審査させる構造となっている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における「特殊建築物」及びその「建築承認」に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．延べ面積が ４,০০০平方メートル の物販店舗は、いかなる場合も特殊建築物とはみなされない。</p>\n<p>２．マスタープランにおいて指定された丘陵地帯から ２০০メートル 離れた地点における建築行為は、特殊建築物に係る規定の適用を受けない。</p>\n<p>３．建築審査委員会は、特殊建築物の建築承認に際し、河川沿岸のプロジェクトが洪水時の水位や流速に及ぼす影響について考慮しなければならない。</p>\n<p>４．特殊建築物の建築承認を得るためには、計画承認（Planning Permit）の条件を遵守している場合であっても、必ず別途追加の設計承認（Additional design approval）を受けなければならない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。物販店舗の基準は ５,０００㎡超 だが、河川からの距離（２５０ｍ以内）等、他の条件に該当すれば特殊建築物となる（第１０条第１項）。</p>\n<p>2. 誤り。丘陵地等から「１５０メートル以内」が基準であり、本肢の２００メートル地点は当該号には該当しないが、他の号（面積等）により特殊建築物となる可能性を排除できない。</p>\n<p><strong>3. 正しい。</strong> 第１１条第１項（চ）の規定通りである。</p>\n<p>4. 誤り。第１０条第２項により、特殊建築物のための「追加の設計承認」は不要とされている。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13432","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>১১। বিশেষ ইমারতের নির্মাণ অনুমোদনে বিবেচ্য বিষয় (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(২) জাতীয় স্বার্থ সংশ্লিষ্ট অথবা বিশেষ প্রভাবসম্পন্ন কোনো প্রকল্পের ক্ষেত্রে অথবা পরিবেশের উপর বৈরী প্রভাব ফেলিতে পারে এইরূপ কোনো প্রকল্পের ক্ষেত্রে কর্তৃপক্ষ প্রকল্পের সকল নকশা জনসাধারণের অবলোকন ও মতামতের জন্য ১৫ (পনেরো) দিন যাবৎ সহজে দৃশ্যমান কোনো স্থানে প্রদর্শনের ব্যবস্থা করিবে।</h5>\n<h5 class=\"h-lv5\">(৩) উপ-বিধি (২) এর অধীন প্রদর্শনের পর যদি কোনো ব্যক্তি বিবেচনা করেন যে, কোনো প্রকল্প আইন, এই বিধিমালা অথবা বিদ্যমান অন্য কোনো আইন বা বিধি-বিধানের পরিপন্থি হইবে বা উহা জনগণ অথবা পরিবেশকে ক্ষতিগ্রস্থ বা বিপন্ন করিবে তাহা হইলে সংশ্লিষ্ট ব্যক্তির আবেদনের প্রেক্ষিতে উক্ত প্রকল্পের নকশাসমূহ তাহাকে পর্যবেক্ষণের সুযোগ প্রদান করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৪) উপ-বিধি (২) এর অধীন প্রদর্শনের পর জনগণের নিকট হইতে প্রাপ্ত সকল মতামত, যদি থাকে, বিবেচনাক্রমে ইমারত নির্মাণ কমিটি অনুমোদন বা প্রত্যাখ্যানের সিদ্ধান্ত গ্রহণ করিবে।</h5>\n<h4 class=\"h-lv4\"><strong>১২। নকশা বিষয়ে কারিগরি ব্যক্তির করণীয়।</strong></h4>\n<h5 class=\"h-lv5\">(১) আবেদনকারী কর্তৃক দায়িত্বপ্রাপ্ত কারিগরি ব্যক্তি তদ্কর্তৃক প্রণীত ও নির্মাণ অনুমোদনের জন্য দাখিলকৃত নকশায় স্বাক্ষর বা ডিজিটাল স্বাক্ষর প্রদান করিবেন।</h5>\n<h5 class=\"h-lv5\">(২) উপ-বিধি (১) এ বর্ণিত নকশা কম্পিউটার এইডেড ড্রইং এবং JPEG বা pdf উভয় ফরম্যাটে দাখিল করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৩) নির্মাণ অনুমোদনের জন্য দাখিলকৃত সকল নকশায় নিম্নবর্ণিত তথ্যসমূহ সন্নিবেশিত থাকিতে হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) নকশার শিরোনাম;</h6>\n<h6 class=\"h-lv6\">(খ) পরিকল্পনা অনুমোদনপত্রের স্মারক নম্বর ও তারিখ;</h6>\n<h6 class=\"h-lv6\">(গ) আবেদনকারীর পূর্ণ নাম, ঠিকানা, ফোন নম্বর, ই-মেইল, অমুদ্রিত বা ডিজিটাল স্বাক্ষর;</h6>\n<h6 class=\"h-lv6\">(ঘ) সংশ্লিষ্ট কারিগরি ব্যক্তিবর্গের নাম, ঠিকানা, ফোন নম্বর, সংশ্লিষ্ট পেশাজীবী ইনস্টিটিউশনের সদস্য নম্বর ও রেজিস্ট্রেশন নম্বর;</h6>\n<h6 class=\"h-lv6\">(ঙ) আবেদনকারীর প্রতিনিধি কর্তৃক আবেদনকৃত নকশায় সংশ্লিষ্ট প্লট বা হোল্ডিং মালিকের নাম, ঠিকানা, ফোন নম্বর, ই-মেইল, আবেদনকৃত প্লট সংলগ্ন রাস্তা বা সড়কের নাম;</h6>\n<h6 class=\"h-lv6\">(চ) কোড অনুসারে ইমারত নির্মাণ ও প্রস্তাবিত ব্যবহারের ধরন; এবং</h6>\n<h6 class=\"h-lv6\">(ছ) নির্মাণ সাইটটি যে থানার অন্তর্গত সেই থানা ও মৌজার নাম, এবং সিএস খতিয়ান বা এসএ খতিয়ান, আরএস খতিয়ান বা/ এবং মহানগর জরিপে উল্লিখিত দাগ নম্বর ও, প্রযোজ্য ক্ষেত্রে, প্লট নম্বর।</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第１１条（特殊建築物の建築承認における考慮事項）（承前）</strong></h4>\n<h5 class=\"h-lv5\">２　国家の利益に関わるプロジェクト、特別な影響を及ぼすプロジェクト、又は環境に悪影響を及ぼすおそれのあるプロジェクトについては、所管行政庁は当該プロジェクトの全ての設計図書を一般の閲覧及び意見公募に供するため、１５日間、容易に視認できる場所に掲示しなければならない。</h5>\n<h5 class=\"h-lv5\">３　前項の規定による掲示の後、当該プロジェクトが法、本規則若しくは現行の他の法令に抵触し、又は公衆若しくは環境に損害を与え、若しくはこれらを危険にさらすと認める者は、所管行政庁に対し、当該プロジェクトの設計図書の閲覧を請求することができる。</h5>\n<h5 class=\"h-lv5\">４　建築審査委員会（Building Construction Committee）は、第２項の規定による掲示の後に公衆から寄せられた全ての意見（存する場合に限る。）を考慮した上で、承認又は却下の決定を行わなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第１２条（設計図書に関する専門技術者の義務）</strong></h4>\n<h5 class=\"h-lv5\">１　申請者により委任された専門技術者（Technical person）は、自ら作成し、かつ、確認済証（Construction Permit）の申請のために提出する設計図書に署名又は電子署名を行わなければならない。</h5>\n<h5 class=\"h-lv5\">２　前項の規定による設計図書は、コンピュータ支援設計（CAD）により作成し、JPEG及びPDFの双方の形式により提出しなければならない。</h5>\n<h5 class=\"h-lv5\">３　確認済証の申請のために提出する全ての設計図書には、次に掲げる事項を記載しなければならない。</h5>\n<h6 class=\"h-lv6\">ａ　設計図書の名称</h6>\n<h6 class=\"h-lv6\">ｂ　計画承認書（Planning Permit）の文書番号及び日付</h6>\n<h6 class=\"h-lv6\">ｃ　申請者の氏名、住所、電話番号、電子メールアドレス並びに署名（自署又は電子署名）</h6>\n<h6 class=\"h-lv6\">ｄ　関連する専門技術者の氏名、住所、電話番号、所属する専門職団体の会員番号及び登録番号</h6>\n<h6 class=\"h-lv6\">ｅ　申請者の代理人により申請が行われる場合にあっては、当該敷地（Plot）の所有者の氏名、住所、電話番号、電子メールアドレス並びに当該敷地に接する道路の名称</h6>\n<h6 class=\"h-lv6\">ｆ　法典（Code）に基づく建築物の構造及び予定される用途の類型</h6>\n<h6 class=\"h-lv6\">ｇ　工事現場が属する警察署（Thana）及び地区（Mouza）の名称、並びに地籍調査（CS, SA, RS又は都市調査）に基づく地番（Dag No.）及び、適用がある場合にあっては、敷地番号（Plot No.）</h6>\n<hr class=\"sep\">\n<p>1. <strong>特定プロジェクトの一般公覧制度（第１１条第２項）</strong>:</p>\n<p>ダッカ規則では、国家の利益や環境への影響が大きいプロジェクトに対し、確認申請図書の「１５日間の一般公覧」を義務付けている。日本の建築基準法では、通常の建築確認において一般公覧を行う規定はない。中高層建築物紛争防止条例等に基づく近隣への事前説明義務はあるが、法典として確認の要件に「一般の意見聴取」を組み込んでいる点は、透明性と周辺環境への配慮を法的に強く求めている証左である。</p>\n<p>2. <strong>設計図書の提出形式の厳格指定（第１２条第２項）</strong>:</p>\n<p>確認申請における設計図書について、CAD作成に加え「JPEG及びPDFの双方」での提出を義務付けている。日本の建築確認（e-Submission）ではPDF形式が標準的であるが、特定の画像形式（JPEG）をPDFと並んで強行規定として設けている点は、審査事務の利便性と記録保存の確実性を具体的に追求している。</p>\n<p>3. <strong>歴史的地籍データの記載義務（第１２条第３項ｇ）</strong>:</p>\n<p>敷地の特定に際し、警察署（Thana）の名称だけでなく、バングラデシュの土地行政における歴史的な変遷（CS, SA, RS, 都市調査等）に基づく地番の記載を求めている。日本の不動産登記制度（地番）と比較して、過去の複数の調査記録との整合性を建築規則レベルで要求している点は、土地権利関係の複雑さを法的に処理しようとする実務的な規定である。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における確認済証（Construction Permit）の申請に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．環境に悪影響を及ぼすおそれのあるプロジェクトについては、所管行政庁は当該プロジェクトの設計図書を１５日間掲示し、一般の意見を募らなければならない。</p>\n<p>２．確認済証の申請に用いる設計図書は、コンピュータ支援設計（CAD）により作成されていれば、PDF形式のみで提出することができる。</p>\n<p>３．申請者の代理人が申請を行う場合、設計図書には代理人の署名があれば足り、本来の敷地所有者の連絡先を記載する必要はない。</p>\n<p>４．設計図書に記載する敷地の所在については、地籍調査に基づく地番を記載すれば足り、管轄する警察署（Thana）の名称を記載する必要はない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：１</strong></p>\n<p><strong>1. 正しい。</strong> 第１１条第２項の規定通りである。</p>\n<p>2. 誤り。第１２条第２項により、JPEG及びPDFの「双方」の形式での提出が義務付けられている。</p>\n<p>3. 誤り。第１２条第３項（ঙ）により、代理人申請時も敷地所有者の詳細情報の記載が必要である。</p>\n<p>4. 誤り。第１２条第３項（ছ）により、管轄警察署（Thana）及び地区（Mouza）の名称記載は必須である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13433","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>১৩। নির্মাণ অনুমোদনপত্রের আবেদন অনুমোদন, প্রত্যাখ্যান ও বাতিল।</strong></h4>\n<h5 class=\"h-lv5\">(১) নির্মাণ অনুমোদনপত্রের আবেদন প্রাপ্তির পর সংশ্লিষ্ট অথরাইজড অফিসার বিধি ৩৬ অনুযায়ী তালিকাভুক্ত কারিগরি ব্যক্তিবর্গের সমন্বয়ে গঠিত ইমারত নির্মাণ কমিটি কর্তৃক নকশা ও প্রতিবেদনসমূহ পরীক্ষা ও যাচাই করিবে।</h5>\n<h5 class=\"h-lv5\">(২) ইমারত নির্মাণ কমিটি উপ-বিধি (১) অনুযায়ী প্রেরিত নকশা ও প্রতিবেদনসমূহ যাচাই করিয়া বিধি ১৫ এ উল্লিখিত সময়সীমার মধ্যে অনুমোদনযোগ্য হইলে অনুমোদনের জন্য এবং অনুমোদনযোগ্য না হইলে কারণ উল্লেখপূর্বক প্রত্যাখানের জন্য অথরাইজড অফিসারকে সুপারিশ করিবে।</h5>\n<h5 class=\"h-lv5\">(৩) উপ-বিধি (২) এর অধীন সুপারিশ প্রাপ্তির পর অথরাইজড অফিসার আবেদনটি অনুমোদন বা প্রত্যাখ্যান করিবে এবং বিষয়টি আবেদনকারীকে অবহিত করিবে।</h5>\n<h5 class=\"h-lv5\">(৪) যদি কোনো আবেদনকারীর দলিলাদি বা তথ্যের ঘাটতি থাকে অথবা নকশা সংশোধনের প্রয়োজন হয় তবে তাহা অথরাইজড অফিসার আবেদনকারীকে জানাইবেন এবং প্রয়োজনীয় তথ্যাদি দাখিল বা নকশা সংশোধনের জন্য ৪৫ (পঁয়তাল্লিশ) দিন সময় প্রদান করিবেন।</h5>\n<h5 class=\"h-lv5\">(৫) উপ-বিধি (৪) এ উল্লিখিত সময় অতিবাহিত হইবার পর প্রয়োজনীয় তথ্য বা সংশোধিত নকশা দাখিল করা না হইলে আবেদনটি প্রত্যাখ্যান করা হইবে।</h5>\n<h5 class=\"h-lv5\">(৬) অনুমোদিত নির্মাণ অনুমোদনপত্রের কোনো শর্ত লঙ্ঘন করা হইলে বা মালিকানা সংক্রান্ত কোনো ভুল বা মিথ্যা তথ্য দাখিল করা হইয়াছে মর্মে প্রমাণিত হইলে সংশ্লিষ্ট নির্মাণ অনুমোদনপত্র বাতিল করা যাইবে।</h5>\n<h5 class=\"h-lv5\">(৭) উপ-বিধি (৬) অনুযায়ী কোনো নির্মাণ অনুমোদনপত্র বাতিল করা হইলে কর্তৃপক্ষ ভবন মালিক ও সংশ্লিষ্ট সকলকে অবহিত করিবে।</h5>\n<h5 class=\"h-lv5\">(৮) নির্মাণ অনুমোদনপত্র প্রাপ্তির পর নির্মাণ কাজ আরম্ভ করিবার অন্যূন ৭ (সাত) দিন পূর্বে আবেদনকারী নির্মাণ কাজ আরম্ভের বিষয়টি কর্তৃপক্ষকে অবহিত করিবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第１３条（建築確認の申請の承認、却下及び取消し）</strong></h4>\n<h5 class=\"h-lv5\">１　確認済証（Construction Permit）の申請を受理したときは、関連する建築主事（Authorised Officer）は、第３６条の規定に基づき登録された専門技術者により構成される建築審査委員会（Building Construction Committee）に、設計図書及び報告書の審査及び検証を行わせなければならない。</h5>\n<h5 class=\"h-lv5\">２　建築審査委員会は、前項の規定により送付された設計図書等を審査し、第１５条に定める期限内に、承認可能な場合は承認の勧告を、承認不可能な場合はその理由を明記して却下の勧告を建築主事に対して行わなければならない。</h5>\n<h5 class=\"h-lv5\">３　前項の規定による勧告を受けたときは、建築主事は申請を承認又は却下し、その旨を申請者に通知しなければならない。</h5>\n<h5 class=\"h-lv5\">４　提出された書類若しくは情報に不足がある場合、又は設計図書の修正が必要な場合にあっては、建築主事は申請者にその旨を通知し、必要情報の提出又は設計図書の修正のために４５日の猶予期間を与えなければならない。</h5>\n<h5 class=\"h-lv5\">５　前項に規定する期間が経過しても、必要な情報又は修正された設計図書が提出されないときは、当該申請を却下するものとする。</h5>\n<h5 class=\"h-lv5\">６　承認された確認済証の条件に違反した場合、又は所有権に関し誤り若しくは虚偽の情報が提出されたことが判明した場合は、当該確認済証を取り消すことができる。</h5>\n<h5 class=\"h-lv5\">７　前項の規定により確認済証が取り消されたときは、所管行政庁は建築主及び関係者全員にその旨を通知しなければならない。</h5>\n<h5 class=\"h-lv5\">８　確認済証を取得した後、工事に着手しようとするときは、申請者は着手の日の少なくとも７日前までに、その旨を所管行政庁に通知しなければならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>確認手続における審査主体と権限（第１３条第１項・第２項）</strong>:</p>\n<p>ダッカ規則では、建築主事（Authorised Officer）が直接審査するのではなく、登録技術者で構成される「建築審査委員会」の勧告に基づいて判断を下す体制をとっている。日本の建築基準法（法第６条第４項）では、建築主事が自ら（又は指定確認検査機関が）図面を審査して適合性を判断するが、ダッカ規則は第三者的・合議制の委員会による専門的検証を法的な承認プロセスの中心に据えている。</p>\n<p>2. <strong>補正猶予期間の定数的設定（第１３条第４項）</strong>:</p>\n<p>書類不備や修正に対する猶予期間を「４５日」と一律に定めている。日本の建築基準法では、確認申請の審査期間内（通常７日〜３５日：法第６条第１項・第２項）に補正を行う必要があるが、不備があった場合にこれほど長い一定の「法的な猶予期間」を明文化している点は、申請者の手続的権利を保護すると同時に、滞留案件の整理を効率化する意図が見られる。</p>\n<p>3. <strong>着工届の提出義務（第１３条第８項）</strong>:</p>\n<p>工事着手の「７日前まで」の通知を義務付けている。日本の建築基準法には「工事届（法第１５条）」はあるが、これは統計目的が主である。実際の着工管理については、日本の場合は確認済証交付後の着手が原則（法第６条第１項）であり、ダッカ規則のように「着手直前の個別通知」を改めて求めることで、現場管理の透明性をより強化している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における確認済証（Construction Permit）の承認及び工事に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．確認済証の申請を受理した建築主事は、建築審査委員会の勧告を待つことなく、自らの判断のみで直ちに承認を与えることができる。</p>\n<p>２．申請図書の修正が必要となり建築主事から通知を受けた申請者は、当該通知の日から ３０日 以内に修正図面を提出しなければならず、これを超えると申請は自動的に却下される。</p>\n<p>３．承認された確認済証の内容であっても、後に土地の所有権に関し虚偽の情報が含まれていたことが判明した場合には、当該確認済証は取り消される。</p>\n<p>４．確認済証を取得した申請者は、所管行政庁への事前の通知なしに、いつでも工事に着手することができる。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第１３条第２項及び第３項により、建築審査委員会の勧告に基づく必要がある。</p>\n<p>2. 誤り。第１３条第４項により、修正のための猶予期間は <strong>৪৫ (পঁয়তাল্লিশ) দিন（４５日）</strong> である。</p>\n<p><strong>3. 正しい。</strong> 第１３条第６項の規定通りである。</p>\n<p>4. 誤り。第１３条第８項により、着手の <strong>৭ (সাত) দিন（７日）</strong> 前までに通知しなければならない。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13434","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>১৩। নির্মাণ অনুমোদনপত্রের আবেদন অনুমোদন, প্রত্যাখ্যান ও বাতিল (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(৯) নির্মাণ অনুমোদনপত্রের আবেদন সুপারিশ প্রাপ্ত হইলে পরিশিষ্ট ৪ অনুসারে নির্মাণ অনুমোদন ফি জমা দিতে হইবে এবং উক্তরূপ ফি জমাদানের পর ইমারত নির্মাণ কমিটি অনুমোদিত নকশায় স্বাক্ষর প্রদান করিবে।</h5>\n<h5 class=\"h-lv5\">(১০) কোনো নির্মাণ অনুমোদনপত্রের আবেদন প্রত্যাখ্যান করা হইলে নির্মাণ অনুমোদন ফি গ্রহণ ব্যতিরেকে অথরাইজড অফিসার আইন, এই বিধিমালা, কোড বা অন্যান্য আইন ও বিধি-বিধানের সুনির্দিষ্ট বিধান ও কারণ উল্লেখপূর্বক আবেদনকারীকে প্রত্যাখ্যান পত্র প্রেরণ করিবে।</h5>\n<h4 class=\"h-lv4\"><strong>১৪। নির্মাণ অনুমোদনের আবেদন প্রত্যাখ্যানের বিরুদ্ধে আপিল।</strong></h4>\n<h5 class=\"h-lv5\">(১) কোনো নির্মাণ অনুমোদনপত্রের আবেদন প্রত্যাখ্যান করা হইলে, আবেদনকারী উক্তরূপে প্রত্যাখ্যাত হইবার ৩০ (ত্রিশ) দিনের মধ্যে পরিশিষ্ট ৪ এ বর্ণিত ফি পরিশোধ সাপেক্ষে, আপিল কমিটি বরাবর আপিল আবেদন করিতে পারিবে।</h5>\n<h5 class=\"h-lv5\">(২) উপ-বিধি (১) এর অধীন কোনো আপিল আবেদন প্রাপ্তির পর আপিল কমিটি, উপ-বিধি (৩) ও (৪) এর বিধান সাপেক্ষে, ৩০ (ত্রিশ) দিনের মধ্যে আপিল আবেদনের বিষয়ে সিদ্ধান্ত গ্রহণ করিবে।</h5>\n<h5 class=\"h-lv5\">(৩) উপ-বিধি (২) অনুযায়ী আপিল নিষ্পত্তির ক্ষেত্রে আপিল কমিটি আইনি স্পষ্টতা ও অধিকতর সিদ্ধান্তের জন্য বিষয়টি নগর উন্নয়ন কমিটিতে প্রেরণ করিতে পারিবে।</h5>\n<h5 class=\"h-lv5\">(৪) উপ-বিধি (২) এ যাহা কিছুই থাকুক না কেন, নগর উন্নয়ন কমিটি উপ-বিধি (৩) এর অধীন কোনো আবেদন প্রাপ্ত হইলে ৪৫ (পঁয়তাল্লিশ) দিনের মধ্যে সুপারিশ প্রদান করিবে এবং নগর উন্নয়ন কমিটির সুপারিশের আলোকে কর্তৃপক্ষ ব্যবস্থা গ্রহণ করিবে।</h5>\n<h5 class=\"h-lv5\">(৫) আপিলে নির্মাণ অনুমোদনের আবেদন—</h5>\n<h6 class=\"h-lv6\">(ক) প্রত্যাখ্যাত হইলে আবেদনকারীকে বিষয়টি লিখিতভাবে অবহিত করিতে হইবে; অথবা</h6>\n<h6 class=\"h-lv6\">(খ) অনুমোদিত হইলে বিধি ১৩ এর উপ-বিধি (৯) অনুসরণ করিয়া সংশ্লিষ্ট অথরাইজড অফিসার অনুমোদিত নকশাসহ অনুমোদনপত্র আবেদনকারীকে প্রেরণ করিবে।</h6>\n<h4 class=\"h-lv4\"><strong>১৫। নির্মাণ অনুমোদনপত্রের মেয়াদ।</strong></h4>\n<h5 class=\"h-lv5\">(১) বিধি ১৩, বা ক্ষেত্রমত, বিধি ১৪ এর অধীন প্রদত্ত ইমারত বা অবকাঠামোর নির্মাণ অনুমোদনপত্রের মেয়াদ হইবে ৩ (তিন) বৎসর এবং এইরূপ মেয়াদের মধ্যে ইমারতের অন্যূন প্লিন্থ লেভেল পর্যন্ত নির্মাণ সম্পন্ন করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(২) আবেদনকারী উপ-বিধি (১) অনুযায়ী ব্যবস্থা গ্রহণে ব্যর্থ হইলে নূতন করিয়া নির্মাণ অনুমোদনপত্র গ্রহণ করিতে হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>১৬। অনুমোদিত নকশা সংশোধন।</strong></h4>\n<h5 class=\"h-lv5\">(১) এই বিধিমালা জারির পূর্বে নির্মিত ও নির্মাণাধীন উভয় ক্ষেত্রে অনুমোদিত ভবনসমূহের সর্বমোট ক্ষেত্রফলসহ তলা প্রতি ক্ষেত্রফল অপরিবর্তিত ও নকশার বহিঃঅবয়ব (দৈর্ঘ্য <span class=\"math\">\\times</span> প্রস্থ <span class=\"math\">\\times</span> উচ্চতা) অনুমোদিত পরিমাপের মধ্যে রাখিয়া যে বিধিমালার অধীনে নকশা অনুমোদিত হইয়াছে সেই বিধিমালা অনুযায়ী অভ্যন্তরীণ পরিবর্তন বা সংশোধন করা যাইবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第１３条（建築確認の申請の承認等）</strong></h4>\n<h5 class=\"h-lv5\">９　建築確認の申請が勧告を受けたときは、付録４に定める建築確認手数料を納付しなければならない。当該手数料の納付後、建築審査委員会は承認された設計図書に署名を行うものとする。</h5>\n<h5 class=\"h-lv5\">１０　建築確認の申請が却下された場合、建築主事（Authorised Officer）は、手数料を徴収することなく、法、本規則、法典（Code）又はその他の法令の具体的な条項及び理由を明記して、申請者に対し却下通知書を送付しなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第１４条（建築確認の申請の却下に対する不服申立て）</strong></h4>\n<h5 class=\"h-lv5\">１　建築確認の申請が却下された場合、申請者は、当該却下の通知を受けた日から３０日以内に、付録４に定める手数料を納付した上で、不服申立委員会（Appellate Committee）に対し審査請求をすることができる。</h5>\n<h5 class=\"h-lv5\">２　不服申立委員会は、前項の審査請求を受理したときは、次項及び第４項の規定に従い、受理した日から３０日以内に当該請求に関する決定を行わなければならない。</h5>\n<h5 class=\"h-lv5\">３　不服申立委員会は、前項の規定による処理において、法律上の明確化又は更なる判断を要すると認める場合は、当該事項を都市開発委員会（Urban Development Committee）に付託することができる。</h5>\n<h5 class=\"h-lv5\">４　第２項の規定にかかわらず、都市開発委員会は、前項の規定により付託を受けたときは、４５日以内に勧告を行わなければならない。所管行政庁は、当該勧告に基づき必要な措置を講ずるものとする。</h5>\n<h5 class=\"h-lv5\">５　不服申立てに係る建築確認の申請については、次の各号に掲げる区分に応じ、当該各号に定めるところによる。</h5>\n<h6 class=\"h-lv6\">一　棄却された場合　申請者に対し、その旨を書面により通知しなければならない。</h6>\n<h6 class=\"h-lv6\">二　認容された場合　第１３条第９項の規定を準用し、関連する建築主事は承認された設計図書を添えて建築確認済証を申請者に交付しなければならない。</h6>\n<h4 class=\"h-lv4\"><strong>第１５条（建築確認済証の有効期間）</strong></h4>\n<h5 class=\"h-lv5\">１　第１３条又は、場合により、第１４条の規定により交付された建築物又は工作物の建築確認済証の有効期間は３年とする。当該期間内に、建築物の少なくとも土台面（Plinth Level）までの工事を完了しなければならない。</h5>\n<h5 class=\"h-lv5\">２　申請者が前項の規定による措置を講じなかったときは、新たに建築確認済証の交付を受けなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第１６条（承認された設計図書の修正）</strong></h4>\n<h5 class=\"h-lv5\">１　本規則の施行前に建築された建築物又は工事中の建築物のいずれにおいても、延べ面積（Total Floor Area）及び各階の面積を変更せず、かつ、設計図書の外郭形状（長さ <span class=\"math\">\\times</span> 幅 <span class=\"math\">\\times</span> 高さ）を承認された範囲内に維持する場合にあっては、当該建築物が承認された当時の規則に基づき、内部の変更又は修正を行うことができる。</h5>\n<hr class=\"sep\">\n<p>1. <strong>有効期間と工事進捗の定義（第１５条第１項）</strong>:</p>\n<p>ダッカ規則では、建築確認済証の有効期間を「３年」とし、その間に「土台面（Plinth Level）」までの工事完了を求めている。日本の建築基準法では、確認済証自体に一律の有効期限はないが、一定期間工事に着手しない場合に確認が失効する旨を条例等で定める場合がある。ダッカ規則は、特定の構造段階（土台面）を期間内の義務的目標として設定している点が非常に具体的である。</p>\n<p>2. <strong>不服申立ての二段構え（第１４条第３項、第４項）</strong>:</p>\n<p>不服申立委員会が判断に迷う場合、都市開発委員会（専門機関）に付託し、その勧告に従うというプロセスは、日本の開発審査会による審査請求（都市計画法）に近い構造だが、建築確認のプロセスに直接組み込まれている点が特徴である。</p>\n<p>3. <strong>既存不適格建築物の改修緩和（第１６条第１項）</strong>:</p>\n<p>新規則施行前の建築物について、外形寸法と面積を維持する限り「旧規則（承認時の規則）」を適用して内部改修を認める旨を規定している。これは日本の法第３条第２項（既存不適格）及び法第８６条の７（既存の建築物に対する制限の緩和）に近い考え方だが、手続上「旧規則の準用」を明言している点が実務的である。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における建築確認済証（Construction Permit）の有効期間及び手続に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．建築確認済証の有効期間は交付の日から２年であり、その期間内に建築物の全ての主要構造部の工事を完了しなければならない。</p>\n<p>２．建築確認の申請が却下された場合、申請者はその手数料を返還請求することができる。</p>\n<p>３．不服申立てにおいて申請が認容された場合、建築主事は改めて手数料を徴収した上で建築確認済証を交付しなければならない。</p>\n<p>４．建築物の建築確認済証の交付を受けた者は、交付から３年以内に、少なくとも建築物の土台面（Plinth Level）までの工事を完了しなければ、当該建築確認済証は効力を失う。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：４</strong></p>\n<p>1. 誤り。期間は３年であり、範囲は土台面までである。</p>\n<p>2. 誤り。第１３条第１０項により、却下時は最初から手数料を徴収しない。</p>\n<p>3. 誤り。認容時は第１３条第９項に従い交付されるが、再徴収の規定はない。</p>\n<p><strong>4. 正しい。</strong> 第１５条第１項及び第２項の規定通りである。</span></p>\n<hr class
