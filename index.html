を行う場合は承認を受けなければならない。</h5>\n<h5 class=\"h-lv5\">２　土工事区域を明確に表示するとともに、次に掲げる情報を提出しなければならない。</h5>\n<h6 class=\"h-lv6\">一　敷地及び隣接道路の現況の等高線図（Contour）、標高及び勾配</h6>\n<hr class=\"sep\">\n<p>1. <strong>開発権移転（TDR）の具体的な証明事項（第６３条第２項）</strong>:</p>\n<p>容積率未消化分を移転する際、許可証に「住宅用途以外への充当」や「幅員１８ｍ以上の道路への接道」といった具体的な受入条件を明記することを義務付けている。移転先の道路条件を厳格に指定することで、高容積化に伴う負荷を幹線道路沿いに限定しようとする強い意図が伺える。</p>\n<p>2. <strong>TDRの転売制限（第６３条第２項五号）</strong>:</p>\n<p>開発権移転許可証の譲渡を「一度限り（একের অধিকবার হস্তান্তর যোগ্য নহে）」に制限している。これは開発権が投機対象となることを防ぎ、実際の建築プロジェクトと直結させるための実務的な制限である。</p>\n<p>3. <strong>水域・丘陵地における土木工事の先行承認（第６４条第１項）</strong>:</p>\n<p>建築確認の枠組みの中で、盛土や掘削といった土木工事を承認事項としている。日本の「宅地造成等規制法」などに相当するが、ダッカ規則は災害脆弱性の高い区域での土地改変を建築規制と一体化して管理している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、開発権移転（TDR）及び特定区域の開発に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．伝統的建築物の保存区域内において、敷地の高さ制限により指定容積率を完全に使い切れない場合であっても、当該未消化分を他区域へ移転することは認められない。</p>\n<p>２．開発権移転許可証（TDR Certificate）に基づき取得した割増床面積は、住宅用途のプロジェクトに充当して使用しなければならない。</p>\n<p>３．丘陵地帯に所在する敷地において建築工事に伴う盛土を行う場合は承認が必要であり、等高線図等の情報の提出が求められる。</p>\n<p>４．開発権移転許可証は、所有者の変更に伴い何度でも自由に譲渡することができる。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第６３条第２項により移転が可能である。</p>\n<p>2. 誤り。第６３条第２項（গ）により移転先は「住宅用途以外」に限定されている。</p>\n<p><strong>3. 正しい。</strong> 第６４条第１項及び第２項の規定通りである。</p>\n<p>3. 誤り。第６３条第２項（ঙ）により許可証は１回を超えて譲渡できない。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13496","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>(খ) নতুন ঢাল বা বাঁধ (যদি প্রস্তাবে থাকে) এবং প্রস্তাবিত ঢাল বা বাঁধ সুদৃঢ়করণের জন্য যোগ্য কারিগরি ব্যক্তি কর্তৃক নিরূপিত এবং সুপারিশকৃত রিটেইনিং ওয়াল বা অন্য প্রয়োজনীয় অবকাঠামো।</p>\n<h5 class=\"h-lv5\">(৩) নির্মাণ অনুমোদনপত্রের জন্য আবেদনের সময়ে রিটেইনিং ওয়াল বা বাঁধের প্রয়োজনীয় নকশা সংযোজন করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৪) পাহাড় হিসাবে দৃশ্যমান জমিতে যেকোনো ধরনের উন্নয়নের ক্ষেত্রে কন্ট্যুর ম্যাপ অনুসরণ করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৫) এইরূপ ভূমিতে কোনো অবস্থাতেই শিল্প স্থাপনা নির্মাণ করা যাইবে না।</h5>\n<h5 class=\"h-lv5\">(৬) পাহাড়ের ভূমিধ্বস এড়াইবার উদ্দেশ্যে পাহাড়ের পাদদেশে অন্যান্য যেকোনো কাজ আরম্ভের পূর্বে নিরাপত্তামূলক রিটেইনিং ওয়াল নির্মাণ করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৭) পাহাড় হইতে আগত পানির স্বাভাবিক প্রবাহের গতিপথ বাধাগ্রস্ত হয় এইরূপ কোনো কর্মকাণ্ড করা যাইবে না।</h5>\n<h5 class=\"h-lv5\">(৮) সকল ক্ষেত্রে বিশদ অঞ্চল পরিকল্পনার নির্দেশিকা অনুযায়ী স্থাপনা নির্মাণ করিতে হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>৬৫। বিশেষ নিয়ন্ত্রণ।</strong>—</h4>\n<h5 class=\"h-lv5\">(১) সরকার কর্তৃক নির্ধারিত কোনো বিশেষ এলাকার জন্য জারীকৃত প্রতিরক্ষা নিয়ন্ত্রণ, Key Point Installation (KPI), জাতীয় নিরাপত্তা, বিমান চলাচল বিষয়ক নিষেধাজ্ঞা ইত্যাদি উক্ত এলাকায় প্রযোজ্য হইবে।</h5>\n<h5 class=\"h-lv5\">(২) সরকার কর্তৃক নির্ধারিত ভিআইপি সড়কসমূহের পার্শ্বে ইমারত নির্মাণের ক্ষেত্রে জনস্বার্থে সরকার কর্তৃক আরোপিত যেকোনো শর্তাবলি প্রযোজ্য হইবে।</h5>\n<h5 class=\"h-lv5\">(৩) জাতীয় স্মৃতি সৌধ, ক্যান্টনমেন্ট এলাকা, টাকশাল, লালবাগ দুর্গ ইত্যাদি রাষ্ট্রীয় গুরুত্বপূর্ণ বিশেষ এলাকাসমূহ উচ্চতা নিয়ন্ত্রণে মহাপরিকল্পনার সুপারিশ ও সরকারি নিষেধাজ্ঞা প্রযোজ্য হইবে।</h5>\n<h5 class=\"h-lv5\">(৪) বিমান বন্দর ও সংলগ্ন এয়ার ফানেল এর জন্য নির্ধারিত এলাকায় সকল ধরনের ইমারত নির্মাণের ক্ষেত্রে বেসামরিক বিমান চলাচল কর্তৃপক্ষ কর্তৃক নির্ধারিত উচ্চতা নিয়ন্ত্রণ নিয়মাবলি প্রযোজ্য হইবে।</h5>\n<h5 class=\"h-lv5\">(৫) কর্তৃপক্ষ বিভিন্ন এলাকাতে অনুমোদনযোগ্য ইমারতের সর্বোচ্চ উচ্চতার বিষয়টি উল্লেখপূর্বক একটি নির্দেশিকা ও নকশা পেশাজীবী ও জনসাধারণের অবগতির জন্য প্রদর্শন বা সরবরাহের ব্যবস্থা করিবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<p>（第６４条（丘陵地帯等）第２項（ক）の続き）</p>\n<h5 class=\"h-lv5\">二（খ）　新設する法面並びに当該法面の補強のために有資格の技術者によって推奨された擁壁（রিটেইনিং ওয়াল）若しくはその他の必要な工作物。</h5>\n<h5 class=\"h-lv5\">３　確認済証の申請に際しては、擁壁等の必要な設計図書を添付しなければならない。</h5>\n<h5 class=\"h-lv5\">４　丘陵地とみなされる土地におけるあらゆる開発にあたっては、等高線図に従わなければならない。</h5>\n<h5 class=\"h-lv5\">５　当該土地においては、いかなる場合も工場（শিল্প স্থাপনা）を建築してはならない。</h5>\n<h5 class=\"h-lv5\">６　丘陵地の地滑りを防止するため、麓において他のいかなる工事を開始する前であっても、安全のための擁壁を建設しなければならない。</h5>\n<h5 class=\"h-lv5\">７　丘陵地から流出する水の自然な経路を妨げるようないかなる行為も行ってはならない。</h5>\n<h5 class=\"h-lv5\">８　全ての建築にあたっては、詳細地区計画（DAP）の指針を遵守しなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第６５条（特別規制（Special Controls））</strong></h4>\n<h5 class=\"h-lv5\">１　政府が指定した特別区域に関し、防衛規制、重要拠点（KPI）、航空等に関する一切の制限は当該区域の建築に適用される。</h5>\n<h5 class=\"h-lv5\">２　政府指定のVIP道路の沿道における建築にあたっては、政府が課す条件を適用する。</h5>\n<h5 class=\"h-lv5\">３　ナショナル・モニュメント、駐屯地、造幣局、ラルバック・フォート等の国家的に重要な特別区域における高さ規制については、都市計画の勧告及び政府の制限を適用する。</h5>\n<h5 class=\"h-lv5\">４　空港及び航空路（Air funnel）指定区域においては、民間航空局（CAAB）が定める高さ制限規定を適用する。</h5>\n<h5 class=\"h-lv5\">５　所管行政庁は、各区域において許可される建築物の最高高さに関するガイドラインを作成し、閲覧に供さなければならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>丘陵地における用途制限の厳格性（第６４条第５項）</strong>:</p>\n<p>ダッカ規則では、丘陵地とみなされる土地において一律に「工場の建設禁止」を明文化している。特定の地形に対して特定の産業用途を直接的に一律禁止する規定は、地滑りや環境保全への強い警戒を示している。</p>\n<p>2. <strong>擁壁工事の先行義務（第６４条第６項）</strong>:</p>\n<p>「他のいかなる工事を開始する前であっても、安全のための擁壁を建設しなければならない」と、施工手順にまで踏み込んだ規定がある。日本の基準法でも擁壁設置は求められるが、ダッカ規則のように「擁壁の先行完成」を着工の絶対的条件としている点は、防災上の強制力が非常に高い。</p>\n<p>3. <strong>国家重要拠点周辺の高さ規制の明文化（第６５条第３項）</strong>:</p>\n<p>駐屯地、ラルバック・フォートといった具体的な施設名を挙げ、それら周辺での高さ制限を建築規則の中に統合している。ダッカ規則はこれらを「建築確認」における特別規制（Special Controls）として直接運用している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、丘陵地及び特別区域の規制に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．丘陵地とみなされる土地において、低汚染の小規模な工場を建築することができる。</p>\n<p>２．丘陵地の地滑り防止のための擁壁の建設は、主要な躯体工事と並行して進めることで足りる。</p>\n<p>３．空港に隣接する航空路指定区域における建築物の高さについては、常に所管行政庁が単独で決定する。</p>\n<p>４．ナショナル・モニュメントやラルバック・フォート等の国家的に重要な特別区域においては、都市計画の勧告及び政府命令に基づく高さ制限が適用される。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：４</strong></p>\n<p>1. 誤り。第６４条第５項により工場建築は禁止されている。</p>\n<p>2. 誤り。第６４条第６項により「工事開始前」に擁壁建設が必要である。</p>\n<p>3. 誤り。第６５条第４項により、民間航空局が定める規定を適用しなければならない。</p>\n<p><strong>4. 正しい。</strong> 第６５条第３項の規定通りである。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13497","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\">(৬) ব্লকভিত্তিক উন্নয়ন ব্যতীত বিমান চলাচল বা অন্য কোনো কারণে উচ্চতা নিয়ন্ত্রিত এলাকাসমূহের প্লটের ক্ষেত্রে প্রযোজ্য সর্বোচ্চ FAR প্রয়োগ করিতে না পারিলে উক্ত প্লটের জন্য আবশ্যিক অনাচ্ছাদিত স্থান সংস্থানের পরিবর্তে প্রযোজ্য সেটব্যাক স্পেস রাখিয়া অনুমোদিত উচ্চতা পর্যন্ত ইমারত নির্মাণ করা যাইবে এবং উক্ত নির্মিত ভবনের FARভুক্ত ক্ষেত্রফল কোনোক্রমেই উক্ত প্লটের জন্য প্রযোজ্য ফারে প্রাপ্য ক্ষেত্রফলের চাইতে বেশি হইতে পারিবে না।</h5>\n<h5 class=\"h-lv5\">(৭) উচ্চতা নিয়ন্ত্রিত এলাকাসমূহের কর্ণার প্লটের ক্ষেত্রে যে রাস্তাকে সম্মুখ ধরিয়া প্লটে প্রবেশ ও বাহির নিয়ন্ত্রিত হইবে শুধু উক্ত রাস্তাকে সম্মুখ বিবেচনা করিয়া রাস্তার কেন্দ্রস্থল হইতে ৪.৫ মিটার অথবা জমির সীমানা হইতে ১.৫ মিটার, যাহা অধিক তাহাই সম্মুখ সেটব্যাক হিসাবে রাখিতে হইবে:</h5>\n<h6 class=\"h-lv6\"><strong>তবে শর্ত থাকে যে,</strong> কর্ণার প্লটের ক্ষেত্রে উভয় রাস্তাকে সম্মুখ হিসাবে ব্যবহারের জন্য উভয় রাস্তার দিককে সম্মুখ বিবেচনা করিয়া প্রযোজ্য সেটব্যাক রাখিতে হইবে।</h6>\n<h4 class=\"h-lv4\"><strong>৬৬। প্রতিবন্ধীসহ সার্বজনীনগম্যতা সম্পর্কিত বিশেষ বিধান।</strong>—</h4>\n<h5 class=\"h-lv5\">(ক) সকল ইমারতে পার্কিং স্পেস হইতে সংলগ্ন তলার লিফট লবি পর্যস্ত সার্বজনীনগম্যতার ব্যবস্থা;</h5>\n<h5 class=\"h-lv5\">(খ) হোটেল, শিক্ষা প্রতিষ্ঠান, চিকিৎসা সেবা ইত্যাদি ১০০ বর্গমিটারের অধিক গণব্যবহার উপযোগী ইমারতে—</h5>\n<h6 class=\"h-lv6\">(১) প্রতিবন্ধীসহ সার্বজনীনগম্যতা;</h6>\n<h6 class=\"h-lv6\">(২) প্রতি তলায় অন্যূন একটি টয়লেট অথবা সর্বমোট টয়লেট সংখ্যার ৫% (যাহা অধিক) পরিমাণ টয়লেট সহজেই প্রবেশযোগ্য হইতে হইবে;</h6>\n<h5 class=\"h-lv5\">(গ) সকল আবাসিক ভবনের ক্ষেত্রে অন্যূন একটি টয়লেট শারীরিক প্রতিবন্ধকতার ক্ষেত্রে হুইল চেয়ারসহ ব্যবহারের জন্য অন্যূন ৯০০ মি.মি. প্রশস্ত; এবং</h5>\n<h5 class=\"h-lv5\">(ঘ) সার্বজনীনগম্যতার অন্যূন মান কোড ও পরিশিষ্ট-২ অনুযায়ী নির্ধারিত হইতে হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>৬৭। বর্জ্য ব্যবস্থাপনা কার্যক্রম।</strong>—</h4>\n<h5 class=\"h-lv5\">(১) ২০০ (দুই শত) বা তদূর্ধ্ব আবাসন ইউনিট বিশিষ্ট ইমারতের নিজস্ব বর্জ্য ব্যবস্থাপনার জন্য প্রয়োজনীয় কার্যক্রম গ্রহণ করিতে হইবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第６５条（特別規制）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>৬</strong>　高さ制限区域内の敷地において指定容積率（FAR）を完全に消化できない場合は、義務的空地の配置に代えて、所定の後退距離（セットバック）を確保した上で、承認された高さまで建築できる。この場合も床面積上限は遵守しなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>৭</strong>　高さ制限区域内の角地において、一方の道路を正面とする場合は道路中心から ４.５メートル 等のセットバックを要する。</h5>\n<h6 class=\"h-lv6\"><strong>ただし、</strong> 両方の道路を正面とする場合は双方に所定のセットバックを確保しなければならない。</h6>\n<h4 class=\"h-lv4\"><strong>第６６条（障害者等を含むユニバーサルアクセシビリティに関する特別規定）</strong></h4>\n<h5 class=\"h-lv5\"><strong>ক</strong>　すべての建築物において、駐車場からエレベーターロビーに至るまでのアクセシビリティを確保しなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>খ</strong>　ホテル、学校、延べ面積１００平方メートルを超える公衆利用建築物等における次に掲げる事項：</h5>\n<h6 class=\"h-lv6\"><strong>１</strong>　ユニバーサルアクセシビリティの確保</h6>\n<h6 class=\"h-lv6\"><strong>２</strong>　各階に少なくとも一つの便所、又は全便所数の ５パーセント 以上の車椅子対応便所の確保</h6>\n<h5 class=\"h-lv5\"><strong>গ</strong>　すべての住宅建築物において、少なくとも一つの便所の扉の有効幅員は ９００ミリメートル 以上としなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>ঘ</strong>　アクセシビリティの最小基準は、法典（Code）及び付録２に従うものとする。</h5>\n<h4 class=\"h-lv4\"><strong>第６７条（廃棄物管理活動）</strong></h4>\n<h5 class=\"h-lv5\"><strong>১</strong>　住戸数が ２００ 以上の建築物にあっては、自ら廃棄物管理を行うために必要な活動を講じなければならない。</h5>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p>1. <strong>ユニバーサルデザインの住宅への適用（第６６条第３号）</strong>:</p>\n<p>ダッカ規則では、すべての住宅建築物に対し、少なくとも一つの便所のドア幅を「９００ｍｍ以上」にすることを義務付けている。日本の基準法では不特定多数利用の建築物が主対象であり、一般的な住宅に対して一律にドア幅を規定する形式は珍しく、居住水準の底上げに対する強い法的介入が伺える。</p>\n<p>2. <strong>高さ制限区域における形態規制の柔軟性（第６５条第６項）</strong>:</p>\n<p>高さの制約により容積率が使い切れない場合、「義務的空地（MGC）」の配置規定を緩和し、「セットバック」の確保で代替することを認めている。日本には空地基準を「引き換える」ような直接的なトレードオフ規定はなく、開発密度の維持を重視した実務的な仕組みとなっている。</p>\n<p>3. <strong>大規模住宅における廃棄物処理の自己完結義務（第６７条第１項）</strong>:</p>\n<p>２００住戸以上の大規模建築物に対し、独自の廃棄物管理活動の実施を義務付けている。建築規則の中に直接「管理活動の義務」として書き込まれている点は、都市インフラの維持を図る姿勢を示している。</p>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025におけるユニバーサルデザイン及び特別規制に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．延べ面積 １５０平方メートル の商業施設は、障害者等のアクセシビリティを確保する義務はない。</p>\n<p>２．すべての住宅建築物において、少なくとも一つの便所の扉の有効幅員は ９００ミリメートル 以上を確保しなければならない。</p>\n<p>３．高さが制限されている区域においては、容積率を完全に適用できない場合であっても、義務的空地の配置基準をセットバックで代用することは認められない。</p>\n<p>４．住戸数が １５０ の住宅建築物においては、自ら廃棄物管理を行うために必要な活動を講じることが義務付けられている。</p>\n<p>* <strong>解説</strong>: <span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。第６６条第２号により １００平方メートル 超の建築物は義務対象である。</p>\n<p><strong>2. 正しい。</strong> 第６６条第３号の規定通りである。</p>\n<p>2. 誤り。第６５条第６項により、緩和代用規定が存在する。</p>\n<p>3. 誤り。第６７条第１項により、義務が生じるのは <strong>２００</strong> 以上の建築物である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13498","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\">(২) নির্মাণ অনুমোদনের জন্য দাখিলকৃত নকশায় বর্জ্য ব্যবস্থাপনা স্পেস, যাহা FAR মুক্ত কিন্তু অতিরিক্ত ভূমি আচ্ছাদনের আওতাভুক্ত হইবে।</h5>\n<h5 class=\"h-lv5\">(৩) ইমারত নির্মাণ, অপসারণ সংশ্লিষ্ট কাজ ও মালামাল পরিবহণে পরিবেশ দূষণ বিষয়ক সকল আইন ও নির্দেশনাবলী অনুসরণ করিতে হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>৬৮। পানির পুনঃব্যবহার।</strong>—</h4>\n<h5 class=\"h-lv5\">(১) ২০০ (দুই শত) বা তদূর্ধ্ব আবাসন ইউনিট বিশিষ্ট ইমারত বা হোটেল (A-5, ৫০ বা তদূর্ধ্ব কক্ষ), অফিস ও সমাবেশ (I, ৭৫০০ বর্গ মিটার বা তদূর্ধ্ব) ভবনে ব্যবহৃত পানির পুনঃব্যবহারের ব্যবস্থা থাকিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(২) পানির পুনঃব্যবহারের স্থাপনা FAR মুক্ত হইবে কিন্তু অতিরিক্ত ভূমি আচ্ছাদনের আওতাভুক্ত হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>৬৯। সৌর বিদ্যুৎ উৎপাদন ও ব্যবহার।</strong>—</h4>\n<h5 class=\"h-lv5\">(১) ইমারতের মালিককে সৌর বিদ্যুৎ উৎপাদন ও ব্যবহারের ব্যবস্থা গ্রহণ করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(২) সৌর বিদ্যুৎ প্যানেলসমূহ স্থাপনের কাঠামো সিভিল এভিয়েশন কর্তৃপক্ষ কর্তৃক নির্ধারিত উচ্চতার অধিক হইবে না।</h5>\n<h4 class=\"h-lv4\"><strong>৭০। Sewage Treatment Plant (STP)</strong>—</h4>\n<h5 class=\"h-lv5\">(১) ৫ (পাঁচ) কাঠা বা তদূর্ধ্ব জমির ক্ষেত্রে বাধ্যতামূলক STP এর সংস্থান রাখিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(২) বিদ্যমান ভবনসমূহের ক্ষেত্রে উক্ত বিধিমালা জারির এক বৎসরের মধ্যে STP স্থাপন করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৩) ঢাকা ওয়াসার পয়ঃবর্জ্য ব্যবস্থাপনা নেটওয়ার্কের সহিত সংযোগ রহিয়াছে এমন ভবনের ক্ষেত্রে STP স্থাপনের প্রয়োজন হইবে না।</h5>\n<h4 class=\"h-lv4\"><strong>৭১। বিধিমালা লঙ্ঘন।</strong>—কোনো ব্যক্তি এই বিধিমালার কোনো বিধান লঙ্ঘন করিলে লঙ্ঘনকারীর বিরুদ্ধে আইন অনুযায়ী ব্যবস্থা গ্রহণ করা হইবে।</h4>\n<h4 class=\"h-lv4\"><strong>৭২। ব্যত্যয়কৃত ও অননুমোদিত ইমারতের সংশোধন।</strong>—</h4>\n<h5 class=\"h-lv5\">(১) অননুমোদিত অথবা অনুমোদিত নকশার ব্যত্যয় ঘটাইয়া নির্মিত সকল ভবন অবৈধ বলিয়া বিবেচিত হইবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<p>（第６７条（廃棄物管理）の続き）</p>\n<h5 class=\"h-lv5\"><strong>২</strong>　設計図書において廃棄物管理用スペースを明記しなければならない。当該スペースは容積率（FAR）には算入しないが、追加の建蔽率制限内とする。</h5>\n<h5 class=\"h-lv5\"><strong>৩</strong>　建築、除却、資材輸送にあたっては、環境汚染に関する一切の法律等を遵守しなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第６８条（水の再利用（Water Reuse））</strong></h4>\n<h5 class=\"h-lv5\"><strong>১</strong>　住戸数が２００以上の住宅、又は客室５０以上のホテル、事務所、大規模集会施設等においては、水の<strong>再利用（পানির পুনঃব্যবহার）</strong>設備を設けなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>২</strong>　再利用施設は容積率には算入しないが、追加の建蔽率制限内とする。</h5>\n<h4 class=\"h-lv4\"><strong>第６９条（太陽光発電及び利用）</strong></h4>\n<h5 class=\"h-lv5\"><strong>১</strong>　建築物の所有者は、太陽光発電及びその利用措置を講じなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>২</strong>　設置構造物の高さは、民間航空局が定める制限高を超えてはならない。</h5>\n<h4 class=\"h-lv4\"><strong>第７０条（汚水処理施設（STP））</strong></h4>\n<h5 class=\"h-lv5\"><strong>১</strong>　敷地面積が<strong>５カサ（約３３５㎡）</strong>以上の土地における建築物には、ＳＴＰの設置を義務付ける。</h5>\n<h5 class=\"h-lv5\"><strong>২</strong>　既存の建築物にあっては、本規則の施行から１年以内にＳＴＰを設置しなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>৩</strong>　ダッカ上下水道局（DWASA）のネットワークに接続されている建築物はＳＴＰ設置を要しない。</h5>\n<h4 class=\"h-lv4\"><strong>第７১条（規則の違反）</strong></h4>\n<h5 class=\"h-lv5\">本規則のいずれかの規定に違反した者に対しては、法律に基づき必要な措置を講じる。</h5>\n<h4 class=\"h-lv4\"><strong>第７２条（不適合建築物及び無許可建築物の是正）</strong></h4>\n<h5 class=\"h-lv5\"><strong>১</strong>　無許可建築物又は承認設計に違反して建築された建築物は、全て<strong>違法（অবৈধ）</strong>とみなす。</h5>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p>1. <strong>中水利用の義務化（第６８条）</strong>:</p>\n<p>大規模住宅（２００戸以上）等に対し、雑排水の再利用設備の設置を法的に義務付けている。日本の基準法には中水利用を直接義務付ける一般規定はなく、ダッカのインフラ負荷を背景とした強力な強行規定である。</p>\n<p>2. <strong>太陽光発電設備の設置義務（第６９条）</strong>:</p>\n<p>すべての建築物所有者に対し、太陽光発電設備の設置を義務付けている。日本でも一部自治体で義務化されているが、ダッカ規則は広域規則の中で全建築物を対象に規定している点が特徴である。</p>\n<p>3. <strong>既存建築物へのＳＴＰ設置の遡及義務（第７０条第２項）</strong>:</p>\n<p>既存建築物に対しても施行から１年以内のＳＴＰ設置を遡及的に義務付けている。日本の既存不適格の原則とは対照的に、公衆衛生確保を最優先し、既存建物に対しても改修を強行的に求めている。</p>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、建築設備及び環境配慮に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．廃棄物管理用スペースは、建蔽率の制限を受けるが容積率には算入しない。</p>\n<p>２．客室数が ４０室 のホテルを新築する場合、水の再利用設備を設ける義務はない。</p>\n<p>３．敷地面積が ５カサ 以上の建築物であっても、下水道ネットワークに接続されている場合は、ＳＴＰを設置しなければならない。</p>\n<p>４．既存建築物に対するＳＴＰの設置義務について、設置期限を延長することは一切認められない。</p>\n<p>* <strong>解説</strong>: <span style=\"color: #ffffff;\"></p>\n<p><strong>正解：１</strong></p>\n<p><strong>1. 正しい。</strong> 第６７条第２項の規定通りである。</p>\n<p>2. 誤り。第６８条第１項によりホテルは <strong>５０室</strong> 以上が義務対象である。</p>\n<p>3. 誤り。第７０条第３項により、接続済みならＳＴＰは「不要」である。</p>\n<p>4. 誤り。第７０条第２項により、正当理由があれば最大１年の延長が可能である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13499","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h6 class=\"h-lv6\">তবে শর্ত থাকে যে, এই বিধিমালা জারির পূর্বে নির্মিত ব্যত্যয়কৃত বা অননুমোদিত ভবনসমূহ কর্তৃপক্ষ এই বিধিমালা ও কোড অনুসরণপূর্বক অনুমোদন বা সংশোধন বা অপসারণ করিতে পারিবে।</h6>\n<h5 class=\"h-lv5\">(২) কর্তৃপক্ষের আওতাধীন এলাকায় অননুমোদিত বা ব্যত্যয়কৃত ভবনের ব্যবস্থাপনার বিষয়ে কর্তৃপক্ষ একটি নীতিমালা প্রণয়ন করিবে এবং তদানুযায়ী কার্যকর ব্যবস্থা গ্রহণ করিবে।</h5>\n<h4 class=\"h-lv4\"><strong>৭৩। অপসারণ।</strong>—</h4>\n<h5 class=\"h-lv5\">(১) ইমারতের মালিককে ঢাকা মহানগর এলাকায় অনুমোদিত বা অননুমোদিত ইমারত অপসারণের পূর্বে কর্তৃপক্ষ কর্তৃক অবহিত করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(২) অপসারণের সময় নিরাপত্তাজনিত বিষয়ের জন্য অন্তত একজন স্ট্রাকচারাল প্রকৌশলীর তত্ত্বাবধানে কোড অনুযায়ী কার্যক্রম গ্রহণ করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৩) মালিক কর্তৃপক্ষকে অবহিত না করিয়া ইমারত অপসারণ করিলে বা কোড অমান্য করিলে আইন অনুযায়ী ব্যবস্থা গ্রহণ করা হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>৭৪। বিধিমালার প্রাধান্য।</strong>—</h4>\n<h5 class=\"h-lv5\">(১) এই বিধিমালা ও কোডের মধ্যে কোনো প্রকার অসংগতির ক্ষেত্রে বিধিমালা প্রাধান্য পাইবে।</h5>\n<h5 class=\"h-lv5\">(২) পরিকল্পনা সংশ্লিষ্ট বিষয়ে মহাপরিকল্পনা ও বিধিমালার মধ্যে কোনো অসংগতির ক্ষেত্রে মহাপরিকল্পনা প্রাধান্য পাইবে।</h5>\n<h4 class=\"h-lv4\"><strong>৭৫। রহিতকরণ ও হেফাজত।</strong>—</h4>\n<h5 class=\"h-lv5\">(১) ঢাকা মহানগর ইমারত বিধিমালা, ২০০৮ এতদ্দ্বারা রহিত করা হইলো।</h5>\n<h5 class=\"h-lv5\">(২) উক্তরূপ রহিতকরণ সত্ত্বেও—</h5>\n<h6 class=\"h-lv6\">(ক) রহিত বিধিমালার অধীনকৃত সকল কাজকর্ম এই বিধিমালার অধীন বলিয়া গণ্য হইবে;</h6>\n<h6 class=\"h-lv6\">(খ) অনিষ্পন্ন কাজকর্ম রহিত বিধিমালার সহিত সামঞ্জস্যপূর্ণ ও এই বিধিমালার সহিত সাংঘর্ষিক না হওয়া সাপেক্ষে অব্যাহত থাকিবে।</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<p>（第７２条（不適合建築物等）の続き）</p>\n<h6 class=\"h-lv6\"><strong>ただし、</strong> 本規則施行前の不適合建築物等については、当局は本規則等に従い承認、修正又は<strong>除却（অপসারণ）</strong>を命ずることができる。</h6>\n<h4 class=\"h-lv4\"><strong>第７３条（除却）</strong></h4>\n<h5 class=\"h-lv5\"><strong>১</strong>　建築物の所有者は、建築物を除却（解体）しようとする場合は、あらかじめ所管行政庁に対し通知しなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>২</strong>　除却を行う際は、少なくとも１名の<strong>構造設計一級建築士</strong>の監督の下、法典（Code）に従って作業を行わなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>৩</strong>　通知なく除却し、又は法典に違反した者に対しては、法律に基づき必要な措置を講ずる。</h5>\n<h4 class=\"h-lv4\"><strong>第７４条（規則の優先）</strong></h4>\n<h5 class=\"h-lv5\"><strong>১</strong>　本規則と法典（BNBC）との間に矛盾がある場合は、<strong>本規則が優先</strong>する。</h5>\n<h5 class=\"h-lv5\"><strong>২</strong>　都市計画（Master Plan）と本規則との間に矛盾がある場合は、<strong>都市計画が優先</strong>する。</h5>\n<h4 class=\"h-lv4\"><strong>第７５条（廃止及び経過措置）</strong></h4>\n<h5 class=\"h-lv5\"><strong>১</strong>　「ダッカ首都圏建築規則２００８」は廃止する。</h5>\n<h5 class=\"h-lv5\"><strong>২</strong>　廃止にかかわらず、旧規則に基づく行為は本規則に基づくものとみなす。進行中の事務は、本規則と矛盾しない範囲で継続される。</h5>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p>1. <strong>解体工事における専門技術者の監督義務（第７３条第２項）</strong>:</p>\n<p>建築物の除却（解体）に際し、<strong>構造設計一級建築士</strong>による監督を法的に義務付けている。日本の基準法では除却届はあるが、解体プロセスそのものに構造設計一級建築士の常時監督を一律に求める規定はなく、事故防止に対する極めて強い規制である。</p>\n<p>2. <strong>法源の優先順位の明文化（第７４条）</strong>:</p>\n<p>「都市計画 ＞ 本規則 ＞ 法典」という優先順位を条文で定義している。日本の法体系でも整合性は重要だが、ダッカ規則のように矛盾時の優先関係を直接規定する形式は、行政判断の遅延を防ぐ工夫といえる。</p>\n<p>3. <strong>既存不適格建築物への是正権限（第７２条）</strong>:</p>\n<p>規則施行前の「不適合建築物」に対しても、所管行政庁が修正や除却を命じることができる包括的権限を付与している。日本の基準法（第３条第２項）による原則的な適用除外とは異なり、不適合建築物の解消に向けた強力な介入を可能にしている。</p>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、建築物の除却及び規則の適用に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．建築物の除却を行う際、構造上の安全が確保されていれば事前の通知は不要である。</p>\n<p>２．本規則とバングラデシュ国家建築法典（BNBC）との間に矛盾がある場合、常に法典が優先される。</p>\n<p>３．建築物の除却工事は、少なくとも１名以上の構造設計一級建築士の監督下で行わなければならない。</p>\n<p>４．本規則の施行により旧規則は廃止されたが、進行中の事務は内容に関わらず直ちに無効となる。</p>\n<p>* <strong>解説</strong>: <span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第７３条第１項により事前通知は必須である。</p>\n<p>2. 誤り。第７４条第１項により「規則」が優先される。</p>\n<p><strong>3. 正しい。</strong> 第７３条第２項の規定通りである。</p>\n<p>3. 誤り。第７５条第２項により、本規則と抵触しない範囲で継続される。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p><strong>১৩৫০০ | বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<hr class=\"sep\">\n<h4 class=\"h-lv4\"><strong>পরিশিষ্ট-১</strong></h4>\n<h4 class=\"h-lv4\"><strong>(বিধি ৬১ (চ) দ্রষ্টব্য)</strong></h4>\n<h4 class=\"h-lv4\"><strong>অগ্নিনিরাপত্তা</strong></h4>\n<h5 class=\"h-lv5\"><strong>১. নির্গমন পথের বিভিন্ন অংশ:</strong></h5>\n<p><strong>Means of Egress</strong>, যাহা একটি ইমারতে আগুন লাগিলে নিরাপদ নির্গমনের পথ, তাহার তিনটি অংশ হইতেছে; (ক) <strong>Exit access</strong>, (খ) <strong>Exit</strong>, এবং (গ) <strong>Exit discharge</strong>; এখানে <strong>Exit access</strong> অর্থ <strong>Exit</strong> এর মুখ পর্যন্ত পৌঁছানোর রাস্তা; <strong>Exit</strong> হইলো ইমারতের ঐ অংশটুকু যাহা আগুন লাগা অংশ হইতে <strong>Exit discharge</strong> পর্যন্ত নিরাপদে নির্গমন ঘটায়; <strong>Exit discharge</strong> হইলো <strong>Exit</strong> শেষ হওয়া হইতে আশ্রয়স্থলের শেষ দেয়াল পর্যন্ত।</p>\n<h5 class=\"h-lv5\"><strong>১.১ Means of Egress এর বিভিন্ন অংশে নিম্নরূপ যে কোনো Exit থাকিবে, যথা:—</strong></h5>\n<p>(ক) দরজা, সিঁড়ি সংযোগকারী করিডোর, র‍্যাম্প, ফায়ার-লিফট অথবা উক্ত অংশসমূহের কয়েকটি একসঙ্গে যেইস্থান হইতে সড়ক বা কোনো নির্দিষ্ট নিরাপদ আশ্রয়স্থলে সহজে প্রবেশ করা যায়;</p>\n<p>(খ) আগুন ও তৎসংলগ্ন এলাকাসমূহ হইতে নিরাপদ কোনো ইমারত সংলগ্ন কোনো নিরাপদ আশ্রয় স্থলে আনুভূমিক <strong>Exit</strong>।</p>\n<h5 class=\"h-lv5\"><strong>১.২</strong> লিফট, এক্সেলেটর, চলন্ত হাঁটার রাস্তাকে সাধারণত <strong>Means of Egress</strong> এর অংশ করা যাইবে না।</h5>\n<h5 class=\"h-lv5\"><strong>২. সাধারণ প্রয়োজন:</strong></h5>\n<h5 class=\"h-lv5\"><strong>২.১</strong> জনসাধারণের ব্যবহারের জন্য নির্মিত সকল ইমারতে যথেষ্ট সংখ্যক নির্গমন পথের ব্যবস্থা থাকিতে হইবে, যাহাতে ব্যবহারকারীরা দ্রুত ও নিরাপদে বাহির হইয়া যাইতে পারে।</h5>\n<h5 class=\"h-lv5\"><strong>২.২ Exit</strong> কে কখনই এমন কোনো কাজে ব্যবহার করা যাইবে না, যাহাতে <strong>Means of Egress</strong> হিসাবে ইহার ব্যবহার ব্যাহত হয়।</h5>\n<h5 class=\"h-lv5\"><strong>২.৩ Exit</strong> এবং <strong>Exit access</strong> এর করিডোরকে <strong>Supply</strong> বা <strong>Return air duct</strong> এর কাজে ব্যবহার করা যাইবে না।</h5>\n<h5 class=\"h-lv5\"><strong>২.৪</strong> নির্গমন পথের তল কোথাও ৫৩০ মি.মি. এর বেশি পরিবর্তিত হইলে র‍্যাম্প ব্যবহার করিতে হইবে।</h5>\n<hr class=\"sep\">"},{"num":"13501","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>২.৫</strong> সকল Exit পরিষ্কার দৃষ্টিগম্য হইতে হইবে এবং Exit access চিহ্নিত থাকিতে হইবে; যেখানে একাধিক Exit বা Exit access থাকিবে এবং জনগণের ব্যবহার্য যেসব এলাকা অন্ধকারে থাকিতে পারে সেইসব স্থানে Exit এর অবস্থান ও দিক নির্দেশক আলোকিত চিহ্ন ব্যবহার করিতে হইবে।</h5>\n<h5 class=\"h-lv5\"><strong>২.৬</strong> প্রতিটি ইমারতের মালিক বা ইজারাদার ইহার সমস্ত ব্যবহারকারীর নিরাপত্তা নিশ্চিত করিবে এবং বর্তমান কোনো ইমারতে Exit সুবিধা অপ্রতুল হইলে, কর্তৃপক্ষ তাহার যথাযথ সংস্থানের নির্দেশ দিতে পারিবে।</h5>\n<h4 class=\"h-lv4\"><strong>৩. Exit এর অবস্থান:</strong></h4>\n<h5 class=\"h-lv5\"><strong>৩.১</strong> কোনো Exit, কোনো সংলগ্ন কক্ষ বা এলাকায় খুলিবে না যদি উহা পূর্বোক্ত এলাকার অবিচ্ছেদ্য বা বর্ধিত অংশ না হয়, বিপজ্জনক কাজে ব্যবহৃত হয় এবং নির্দিষ্ট Exit এলাকার সহিত সরাসরি সংযুক্ত না থাকে।</h5>\n<h5 class=\"h-lv5\"><strong>৩.২</strong> Exit পথের কোনো অংশ ইমারতের এমন কোনো অংশ দিয়া যাইবে না যাহা ইমারত ব্যবহারকালীন সময়ে তালাবদ্ধ থাকিতে পারে।</h5>\n<h5 class=\"h-lv5\"><strong>৩.৩</strong> সব ধরনের জনসমাগমের জন্য মিলনায়তন জাতীয় ইমারতের অন্যূন একটি পার্শ্ব একটি রাস্তার দিকে হইবে যেই দিকে প্রধান Exit discharge অবস্থিত হইতে পারে এবং প্রধান আগমন পথ কমপক্ষে অর্ধেক সংখ্যক ব্যবহারকারীর নির্গমন পথ হিসাবে ব্যবহার করা যাইবে; এই ধরনের ইマーত কয়েক তলা হইলে প্রতিটি তলায় Exit থাকিবে, যাহা কমপক্ষে উক্ত তলার দুই-তৃতীয়াংশ ব্যবহারকারীর প্রয়োজন মিটাইবে।</h5>\n<h5 class=\"h-lv5\"><strong>৩.৪</strong> Exit সমূহ এইরূপ থাকিতে হইবে যাহা ইমারতের সকল অংশের জন্য একটি অবিরাম বাঁধামুক্ত Means of Access নিশ্চিত করিবে।</h5>\n<h4 class=\"h-lv4\"><strong>৪. ব্যবহারকারীর সংখ্যা:</strong></h4>\n<h5 class=\"h-lv5\"><strong>৪.১</strong> ইমারতের Exit সুবিধা ছক-১ অনুযায়ী সর্বোচ্চ ব্যবহারকারীর সংখ্যা দ্বারা নিয়ন্ত্রিত হইবে。</h5>\n<h5 class=\"h-lv5\"><strong>৪.২</strong> যেসব মিলনায়তন ও প্রতিষ্ঠান জাতীয় ইমারতে স্থায়ী আসন রহিয়াছে সেইখানে সর্বমোট আসন সংখ্যা দ্বারা ব্যবহারকারীর সংখ্যা নির্ণিত হইবে; এই ধরনের আসন হাতলবিহীন হইলে প্রতি ৫০০ মি.মি. প্রস্থের জন্য একজন ব্যবহারকারী হিসাব করিতে হইবে।</h5>\n<h5 class=\"h-lv5\"><strong>৪.৩</strong> উপরের হিসাব, ব্যবহার্য মেঝে এলাকার প্রতি ০.৩ বর্গমিটারে একজন ব্যবহারকারী হারের হিসাবের চাইতে বেশি হইবে না।</h5>\n<h5 class=\"h-lv5\"><strong>৪.৩</strong> (sic) মেজেনাইন তল ব্যবহারকারীর সংখ্যা, সংলগ্ন নীচের মেঝে ব্যবহারকারীর সংখ্যার সহিত যোগ হইবে।</h5>\n<h5 class=\"h-lv5\"><strong>৪.৪</strong> ছাদ যদি কোনো রকম জনসমাগমের কাজে ব্যবহৃত হয়, তবে তাহা ব্যবহারকারীর সংখ্যা অনুযায়ী Exit সুবিধা সংবলিত হইতে হইবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>２.５</strong> すべての避難出口（Exit）は明確に視認できなければならず、且つ避難通路（Exit access）が標示されていなければならない。暗所となるおそれがある場所には誘導灯（ আলোকিত চিহ্ন ）を設置しなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>２.６</strong> 建築物の各所有者等は、利用者の安全を確保しなければならない。避難施設が不十分である場合、所管行政庁は適切な整備を命ずることができる。</h5>\n<h4 class=\"h-lv4\"><strong>第３条（避難出口の配置（Location of Exit））</strong></h4>\n<h5 class=\"h-lv5\"><strong>３.১</strong> 避難出口は、隣接する室が当該区域の不可分の一部でない限り、又は危険な用途に供されていない限り、当該隣接室に面して設けてはならない。</h5>\n<h5 class=\"h-lv5\"><strong>３.২</strong> 避難経路の一部は、建築物の利用時間中に施錠されるおそれがある部分を経由してはならない。</h5>\n<h5 class=\"h-lv5\"><strong>３.৩</strong> 集客施設等にあっては、少なくとも一側面を主要な避難放出口（Exit discharge）が位置する道路に面して配置しなければならない。複数階の場合は各階に避難出口を設け、当該階利用者の少なくとも３分の２以上の需要を満たさなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>３.৪</strong> 避難出口は、建築物のすべての部分から連続して障害のない避難へのアクセス（ Means of Access ）を確保するように配置しなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第４条（収容人員（Number of Users））</strong></h4>\n<h5 class=\"h-lv5\"><strong>４.১</strong> 避難施設は、別表１に定める最大収容人員に基づき管理されなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>４.২</strong> 固定席を有する講堂等にあっては、総座席数により算定する。肘掛けのない座席にあっては、幅員 <strong>５００ミリメートル</strong> につき１名として算定しなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>４.৩</strong> 算定される収容人員は、有効床面積の <strong>０.３平方メートル</strong> につき１名の割合を超えてはならない。</h5>\n<h5 class=\"h-lv5\"><strong>４.৩</strong> 中二階（Mezzanine floor）の収容人員は、直下階の収容人員に加算するものとする。</h5>\n<h5 class=\"h-lv5\"><strong>４.৪</strong> 屋上を公衆が集まる用途に使用する場合にあっては、収容人員に応じた避難施設を備えなければならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>収容人員算定における密度上限の規定（付録１第４条第３項）</strong>:</p>\n<p>ダッカ規則では、座席数に基づく算定であっても、最終的な収容人員が「床面積 ０.３㎡ につき１名」を超えてはならないという物理的密度の最大上限値を法制化している。日本の建築基準法では避難安全検証法等を用いない限り、これほど高い集客密度を一律の算定上限として強行規定とする形式は珍しく、雑踏事故防止への意識が伺える。</p>\n<p>2. <strong>避難経路における施錠の制限（付録１第３条第２項）</strong>:</p>\n<p>避難経路が「利用時間中に施錠されるおそれがある場所」を経由することを禁じている。日本では消防法による維持管理として扱われることが多いが、ダッカ規則はこれを建築設計上の強行規定として定義しており、確認申請段階で管理運用面を含めた妥当性を審査する仕組みとなっている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、避難施設及び収容人員の算定に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．講堂において肘掛けのない長椅子を使用する場合、収容人員は座席幅 ４００ミリメートル につき１名として算定できる。</p>\n<p>２．座席数に基づき算定された人員が有効床面積 ０.৩平方メートル につき１名を超える場合、避難施設が十分ならそのまま承認される。</p>\n<p>３．建築物の利用時間中に施錠されるおそれがある区域であっても、管理者が常駐していれば避難経路の一部として経由できる。</p>\n<p>４．複数階からなる講堂建築物においては、各階に避難出口を設け、当該階の利用者の少なくとも ３分の２ 以上の避難需要を満たさなければならない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：４</strong></p>\n<p>1. 誤り。基準は幅 <strong>৫০০ミリメートル</strong> につき１名である。</p>\n<p>2. 誤り。床面積 <strong>０.৩平方メートル</strong> につき１名の割合を超えてはならない。</p>\n<p>3. 誤り。施錠されるおそれのある部分は経由してはならない。</p>\n<p><strong>4. 正しい。</strong> 付録１第３条第３項の規定通りである。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13502","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৫. Exit এর আকার:</strong></h4>\n<h5 class=\"h-lv5\">Means of Exit এর আকার ব্যবহারকারীর সংখ্যা সাপেক্ষে পর্যাপ্ত হইতে হইবে এবং উক্ত বিষয়ে ছক-১ প্রযোজ্য হইবে; Exit এর প্রতিটি অংশের আবশ্যকীয় প্রস্থ ও আকার ছক- ২ ও অনুচ্ছেদ ৬ অনুযায়ী নির্ণীত হইবে।</h5>\n<h6 class=\"h-lv6\"><strong>ছক-১</strong></h6>\n<h6 class=\"h-lv6\"><strong>বিভিন্ন ব্যবহারকারীর সংখ্যা</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>টাইপ</th><th>ইমারতের শ্রেণি</th><th>ব্যবহারকারীর মাথাপিছু মেঝে এলাকা (বর্গমিটার)</th></tr></thead>\n<tbody>\n<tr><td>A.</td><td>আবাসিক</td><td>১৮ গ্রস</td></tr>\n<tr><td>B.</td><td>শিক্ষা প্রতিষ্ঠান</td><td></td></tr>\n<tr><td></td><td>শ্রেণি কক্ষ</td><td>০২ নেট</td></tr>\n<tr><td></td><td>প্রাক-স্কুল</td><td>৩.৫ নেট</td></tr>\n<tr><td>C.</td><td>প্রাতিষ্ঠানিক</td><td>১২ গ্রস</td></tr>\n<tr><td>D.</td><td>স্বাস্থ্য সেবা</td><td></td></tr>\n<tr><td></td><td>ইন-পেশেন্ট এলাকা</td><td>১৫ গ্রস</td></tr>\n<tr><td></td><td>আউট-পেশেন্ট এলাকা</td><td>১০ গ্রস</td></tr>\n<tr><td>E.</td><td>Business</td><td>১০ গ্রস</td></tr>\n<tr><td>F.</td><td>Mercantile</td><td>০৩ গ্রস</td></tr>\n<tr><td>G.</td><td>শিল্প কারখানা</td><td>১০ গ্রস</td></tr>\n<tr><td>H.</td><td>গুদাম</td><td>২০ গ্রস</td></tr>\n<tr><td>I.</td><td>সমাবেশ</td><td></td></tr>\n<tr><td></td><td>ফিক্সড আসন</td><td>আসন সংখ্যা অনুযায়ী</td></tr>\n<tr><td></td><td>ফিক্সড আসনহীন</td><td>০.৯৩ নেট</td></tr>\n<tr><td></td><td>শুধু দাঁড়ানোর জায়গা</td><td>০.৩৭ নেট</td></tr>\n<tr><td></td><td>টেবিল-চেয়ারসহ</td><td>১.৫ নেট</td></tr>\n<tr><td></td><td>টার্মিনাল</td><td>০.১৫ নেট</td></tr>\n<tr><td>J.</td><td>বিপজ্জনক</td><td>১০ গ্রস</td></tr>\n<tr><td>K.</td><td>বিবিধ (প্রযোজ্য ক্ষেত্রে)</td><td>ব্যবহারকারীর সংখ্যা অনুযায়ী</td></tr>\n<tr><td>L.</td><td>ইউটিলিটি</td><td>ব্যবহারকারীর সংখ্যা অনুযায়ী</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第５条（避難施設の規模（Size of Exit））</strong></h4>\n<h5 class=\"h-lv5\">避難施設の規模は収容人員に対し十分なものでなければならず、当該算定には次表１を適用する。</h5>\n<h6 class=\"h-lv6\"><strong>表１：用途別の単位収容人員算定基準（Occupant Load Factors）</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>類型</th><th>建築物の用途（Occupancy）</th><th>１人当たりの占有床面積（㎡）</th></tr></thead>\n<tbody>\n<tr><td>A</td><td>住宅</td><td>１８（延べ面積基準）</td></tr>\n<tr><td>B</td><td>教育施設</td><td></td></tr>\n<tr><td></td><td>教室</td><td>２（正味面積基準）</td></tr>\n<tr><td></td><td>幼稚園・保育園</td><td>３.５（正味面積基準）</td></tr>\n<tr><td>C</td><td>公衆福祉・矯正施設</td><td>１２（延べ面積基準）</td></tr>\n<tr><td>D</td><td>医療施設</td><td></td></tr>\n<tr><td></td><td>入院部門</td><td>１５（延べ面積基準）</td></tr>\n<tr><td></td><td>外来部門</td><td>１０（延べ面積基準）</td></tr>\n<tr><td>E</td><td>事務所・業務施設</td><td>１０（延べ面積基準）</td></tr>\n<tr><td>F</td><td>商業施設</td><td>３（延べ面積基準）</td></tr>\n<tr><td>G</td><td>工場</td><td>１０（延べ面積基準）</td></tr>\n<tr><td>H</td><td>倉庫</td><td>２０（延べ面積基準）</td></tr>\n<tr><td>I</td><td>集会施設</td><td></td></tr>\n<tr><td></td><td>固定席がある場合</td><td>座席数による</td></tr>\n<tr><td></td><td>固定席がない場合</td><td>０.９３（正味面積基準）</td></tr>\n<tr><td></td><td>立席のみの場所</td><td>０.３７（正味面積基準）</td></tr>\n<tr><td></td><td>テーブル・椅子を伴う場所</td><td>１.５（正味面積基準）</td></tr>\n<tr><td></td><td>ターミナル（駅等）</td><td>０.１５（正味面積基準）</td></tr>\n<tr><td>J</td><td>危険物施設</td><td>１０（延べ面積基準）</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">\n<p>1. <strong>収容人員算定基準の明文化（表１）</strong>:</p>\n<p>ダッカ規則では、避難安全設計の基礎となる収容人員算定基準を用途ごとに詳細に規定している。日本の建築基準法では積載荷重の基準はあるが、避難能力算定用の収容人員基準は主に消防法に委ねられており、建築規則本体にこれほど網羅的な表が掲載される点は建築と消防の基準が高度に統合されていることを示している。</p>\n<p>2. <strong>「延べ面積（Gross）」と「正味面積（Net）」の厳格な使い分け</strong>:</p>\n<p>住宅や事務所は「延べ面積」を、教室や集会場は「正味面積」を用いるよう明記している。算定の基礎となる面積の性質を各用途ごとに指定している点は、設計実務における計算誤差を排除する意図がある。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、収容人員の算定基準に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．住宅（用途 A）の収容人員は正味面積 １৮平方メートル につき１名として計算しなければならない。</p>\n<p>２．教育施設（用途 B）において、教室の収容人員は正味面積 <strong>０২平方メートル</strong> につき１名として算定する。</p>\n<p>３．商業施設（用途 F）の収容人員算定基準は、事務所（用途 E）と同じ １０平方メートル である。</p>\n<p>４．集会施設（用途 I）における立席のみの場所は、１平方メートル につき１名として算定される。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。住宅は「延べ面積（১৮ গ্রস）」基準である。</p>\n<p><strong>2. 正しい。</strong> 表１の教室（শ্রেণি কক্ষ）の規定通りである。</p>\n<p>2. 誤り。商業施設は <strong>০৩ গ্রস</strong> 平方メートルにつき１名である。</p>\n<p>3. 誤り。立席のみの場所は <strong>০.৩৭ নেট</strong> 平方メートルにつき１名である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13503","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h6 class=\"h-lv6\"><strong>ছক-২</strong></h6>\n<h6 class=\"h-lv6\"><strong>ব্যবহারকারীর মাথা পিছু Exit এর প্রস্থ</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ভবনের শ্রেণি</th><th>Sprinkler System ছাড়া (মি. মি.)</th><th></th><th></th><th>Sprinkler System সহ (মি. মি.)</th><th></th><th></th></tr></thead>\n<tbody>\n<tr><td></td><td>সিঁড়ি</td><td>র‍্যাম্প/করিডোর</td><td>দরজা</td><td>সিঁড়ি</td><td>র‍্যাম্প/করিডোর</td><td>দরজা</td></tr>\n<tr><td>A. আবাসিক</td><td>৮</td><td>৫</td><td>৪</td><td>৫</td><td>৪</td><td>৪</td></tr>\n<tr><td>B. শিক্ষা প্রতিষ্ঠান</td><td>৮</td><td>৫</td><td>৪</td><td>৫</td><td>৪</td><td>৪</td></tr>\n<tr><td>E, F1, F2, G, H</td><td>৮</td><td>৫</td><td>৪</td><td>৫</td><td>৪</td><td>৪</td></tr>\n<tr><td>C3, C4, C5 প্রাতিষ্ঠানিক</td><td>১০</td><td>৫</td><td>৪</td><td>৮</td><td>৫</td><td>৪</td></tr>\n<tr><td>D স্বাস্থ্যসেবা</td><td>২৫</td><td>১৮</td><td>১০</td><td>১৫</td><td>১২</td><td>১০</td></tr>\n<tr><td>I. সমাবেশ</td><td>১০</td><td>৭</td><td>৫</td><td>৭</td><td>৫</td><td>৫</td></tr>\n<tr><td>J. বিপজ্জনক ব্যবহার</td><td>৮</td><td>৫</td><td>৪</td><td>৮</td><td>৫</td><td>৪</td></tr>\n</tbody>\n</table></div>\n<h4 class=\"h-lv4\"><strong>৬. করিডোর ও প্যাসেজ:</strong></h4>\n<h5 class=\"h-lv5\"><strong>৬.১</strong> ব্যবহারকারী যে কোনো দিকে করিডোর দিয়া রওয়ানা হউক না কেন তাহা কোনো একটি Exit এ পৌঁছাইতে হইবে; যেইদিকে Exit নাই ঐ দিকে বদ্ধ গলির দূরত্ব ১০ মিটার এর বেশি হইবে না।</h5>\n<h5 class=\"h-lv5\"><strong>৬.২</strong> করিডোর ও প্যাসেজের প্রস্থ নিম্নরূপ হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) ৫০ এর বেশি ব্যবহারকারীর ক্ষেত্রে ১.১ মিটার;</h6>\n<h6 class=\"h-lv6\">(খ) ৫০ বা উহার কম ব্যবহারকারীর ক্ষেত্রে ০.৯ মিটার;</h6>\n<h6 class=\"h-lv6\">(গ) স্বাস্থ্যসেবামূলক ভবনে (D) ২.৪ মিটার;</h6>\n<h6 class=\"h-lv6\">(ঘ) ১৫০ এর অধিক ব্যবহারকারী শিক্ষা প্রতিষ্ঠানে (B) ১.৮ মিটার।</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h6 class=\"h-lv6\"><strong>表２：収容人員１人当たりの避難出口等の最小幅員</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>用途分類</th><th>スプリンクラー無 (mm/人)</th><th></th><th></th><th>スプリンクラー有 (mm/人)</th><th></th><th></th></tr></thead>\n<tbody>\n<tr><td></td><td>階段</td><td>傾斜路・廊下</td><td>戸</td><td>階段</td><td>傾斜路・廊下</td><td>戸</td></tr>\n<tr><td>A. 住宅</td><td>８</td><td>５</td><td>４</td><td>５</td><td>４</td><td>４</td></tr>\n<tr><td>D. 医療施設</td><td>২５</td><td>１৮</td><td>１０</td><td>১৫</td><td>১২</td><td>１０</td></tr>\n<tr><td>I. 集会施設</td><td>１０</td><td>৭</td><td>৫</td><td>７</td><td>৫</td><td>৫</td></tr>\n</tbody>\n</table></div>\n<h4 class=\"h-lv4\"><strong>第６条（廊下及び通路（Corridor and Passage））</strong></h4>\n<h5 class=\"h-lv5\"><strong>৬.১</strong> 廊下等は避難出口（Exit）に到達できるよう配置しなければならない。行き止まり部分（Dead-end）の長さは <strong>１０メートル</strong> を超えてはならない。</h5>\n<h5 class=\"h-lv5\"><strong>৬.২</strong> 幅員の最小寸法は次の通りとする。</h5>\n<h6 class=\"h-lv6\">一　収容人員５０人超：<strong>１.１メートル</strong></h6>\n<h6 class=\"h-lv6\">三　医療施設（用途分類Ｄ）：<strong>２.４メートル</strong></h6>\n<h6 class=\"h-lv6\">四　収容人員１５０人超の教育施設（用途分類Ｂ）：<strong>１.８メートル</strong></h6>\n<hr class=\"sep\">\n<p>1. <strong>必要幅員の定量的算出（表２）</strong>:</p>\n<p>日本の建築基準法では、廊下幅は用途等に応じた「絶対的な最小幅」で規定されるが、ダッカ規則は収容人員１人当たりのミリメートル単位で算出する合理的避難設計を基本としている。</p>\n<p>2. <strong>スプリンクラーによる幅員緩和</strong>:</p>\n<p>スプリンクラー設備がある場合、必要幅員を大幅に縮小できる（医療施設階段：25mm→15mm）。日本の歩行距離緩和等とは異なり、避難施設の物理的な「幅員」を設備と連動させて緩和する点が特徴である。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、避難施設及び廊下の基準に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．避難出口のない行き止まり廊下の長さは、最大 １৫メートル まで認められる。</p>\n<p>２．収容人員が ６０人 である廊下の最小有効幅員は １.১メートル 以上を確保しなければならない。</p>\n<p>３．医療施設（D）において、廊下の最小有効幅員は １.৮メートル 以上あれば適合する。</p>\n<p>４．スプリンクラー無の住宅において、階段幅は１人当たり ５ミリメートル で算定できる。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。行き止まり距離は最大 <strong>১০メートル</strong> である。</p>\n<p><strong>2. 正しい。</strong> ５０人超の場合は <strong>১.১メートル</strong> 必要である。</p>\n<p>2. 誤り。医療施設では <strong>২.৪メートル</strong> 以上必要である。</p>\n<p>3. 誤り。スプリンクラー無の住宅階段は１人当たり <strong>৮ミリメートル</strong> 必要である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13504","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৬.৩</strong> Exit করিডোর ও প্যাসেজের প্রস্থ, যেসব দরজা করিডোর ও প্যাসেজের শেষ প্রান্তে বাহির হইয়া যাইবার জন্য একসঙ্গে ব্যবহৃত হইবে তাহাদের প্রস্থের যোগফলের চাইতে কম হইবে না।</h5>\n<h5 class=\"h-lv5\"><strong>৬.৪</strong> করিডোর ও প্যাসেজের বাঁধামুক্ত উচ্চতা ২.৪ মিটারের কম হইবে না।</h5>\n<h5 class=\"h-lv5\"><strong>৬.৫</strong> Exit access এর করিডোরের ন্যূনতম fire rating ১ ঘণ্টা হইবে।</h5>\n<h5 class=\"h-lv5\"><strong>৬.৬</strong> Exit করিডোরে যাইবার দরজার ন্যূনতম fire rating ২০ মিনিট হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>৭। এসেম্বলি আইলস্ (Assembly Aisles):</strong></h4>\n<h5 class=\"h-lv5\"><strong>৭.১</strong> সমাবেশ ভবনের যেখানে আসন রহিয়াছে সেইখানে Exit এর দিকে গমনকারী বাঁধামুক্ত আইল (Aisle) থাকিতে হইবে।</h5>\n<h5 class=\"h-lv5\"><strong>৭.২</strong> Exit access সর্বাধিক ১:১০ ঢালের র‍্যাম্প হইতে পারিবে এবং ইহার ন্যূনতম প্রস্থ ব্যবহারকারী পিছু ৫ মি.মি. হইবে।</h5>\n<h5 class=\"h-lv5\"><strong>৭.৩</strong> Exit access ধাপওয়ালা হইলে ট্রেডের ন্যূনতম গভীরতা ২৭৫ মি.মি. এবং রাইজার এর উচ্চতা ১০০-২০০ মি.মি. এর ভিতর হইতে হইবে।</h5>\n<h5 class=\"h-lv5\"><strong>৭.৪</strong> আইল (Aisle) এর দুই দিকে আসন হইলে ন্যূনতম প্রস্থ ১ মিটার এবং একদিকে আসন হইলে ন্যূনতম প্রস্থ ০.৯ মিটার হইতে হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>৮. দরজা:</strong></h4>\n<h5 class=\"h-lv5\"><strong>৮.১</strong> একটি কক্ষ ব্যবহারকারী প্রত্যেকে অন্ততপক্ষে একটি Exit পাইবে এবং প্রতি নির্গমন দরজার জন্য ব্যবহারকারীর সংখ্যা এবং যাতায়াত দূরত্ব ছক-৩ এর বেশি হইতে পারিবে না।</h5>\n<h6 class=\"h-lv6\"><strong>ছক-৩</strong></h6>\n<h6 class=\"h-lv6\"><strong>একটি নির্গমন দরজার ক্ষেত্রে সর্বোচ্চ ব্যবহারকারীর সংখ্যা এবং সর্বোচ্চ যাতায়াত দূরত্ব</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ভবনের শ্রেণি</th><th>সর্বোচ্চ ব্যবহারকারীর সংখ্যা</th><th>সর্বোচ্চ যাতায়াত দূরত্ব (মিটার)</th></tr></thead>\n<tbody>\n<tr><td>A. আবাসিক</td><td>১২</td><td>২৩</td></tr>\n<tr><td>B. শিক্ষা প্রতিষ্ঠান</td><td>৫০</td><td>২৩</td></tr>\n<tr><td>I. সমাবেশ</td><td>৫০</td><td>২৩</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>৬.৪</strong> 廊下及び通路の有効高さは、<strong>２.৪メートル</strong> を下回ってはならない。</h5>\n<h5 class=\"h-lv5\"><strong>৬.৫</strong> 廊下の最小耐火性能（fire rating）は１時間としなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第７条 客席内通路（Assembly Aisles）</strong></h4>\n<h5 class=\"h-lv5\"><strong>৭.২</strong> 避難通路のスロープ勾配は <strong>１／１０</strong> 以下としなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>৭.৪</strong> 通路（Aisle）の両側に座席がある場合の最小幅員は １メートル、片側のみの場合は ０.৯メートル とする。</h5>\n<h4 class=\"h-lv4\"><strong>第８条 扉（Doors）</strong></h4>\n<h5 class=\"h-lv5\"><strong>৮.১</strong> 各居室の利用者は少なくとも一の避難出口を利用できなければならない。最大歩行距離（Travel Distance）は次表の通り制限される。</h5>\n<h6 class=\"h-lv6\"><strong>表３：一の避難扉当たりの最大収容人員及び最大歩行距離</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>建築物の用途分類</th><th>最大収容人員</th><th>最大歩行距離（ｍ）</th></tr></thead>\n<tbody>\n<tr><td>A. 住宅</td><td>１２</td><td>２３</td></tr>\n<tr><td>I. 集会施設</td><td>５０</td><td>２３</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">\n<p>1. <strong>避難廊下の有効高さ（第６条６.４項）</strong>:</p>\n<p>ダッカ規則は避難用廊下の有効高さを <strong>２.４メートル以上</strong> と規定している。日本の建築基準法では居室は２.１メートル以上とされるが、廊下の高さにこれほど高い数値を一律要求する規定はなく、煙の蓄積を考慮した設計を求めている。</p>\n<p>2. <strong>歩行距離と人員の連動規制（表３）</strong>:</p>\n<p>日本の直通階段までの歩行距離が一律の距離で定まるのに対し、ダッカ規則は距離を <strong>２３メートル</strong> と短く設定するだけでなく、「１つの扉が負担できる人数」とセットで規定しており、必然的に複数の扉設置を強いる構造となっている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における避難施設に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．避難用廊下の有効高さについては、最小 ２.১メートル 以上あれば足りる。</p>\n<p>２．集会施設において、通路（Aisle）の両側に座席がある場合、当該通路の最小幅員は １メートル としなければならない。</p>\n<p>３．住宅建築物（Ａ）において、最大収容人員が ３０名 であっても避難出口は１箇所でよい。</p>\n<p>４．集会施設の避難通路を階段状とする場合、踏面の最小奥行きは ２৪০ミリメートル としなければならない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。廊下の有効高さは <strong>২.৪メートル</strong> 以上必要である。</p>\n<p><strong>2. 正しい。</strong> 第７条７.４項の規定通りである。</p>\n<p>2. 誤り。住宅（Ａ）の一の扉の最大収容人員は <strong>১২名</strong> までである。</p>\n<p>3. 誤り。踏面の最小奥行きは <strong>২৭৫ミリメートル</strong> である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13505","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ভবনের শ্রেণি</th><th>সর্বোচ্চ ব্যবহারকারীর সংখ্যা</th><th>সর্বোচ্চ যাতায়াত দূরত্ব (মিটার)</th></tr></thead>\n<tbody>\n<tr><td><strong>G. শিল্প-কারখানা</strong></td><td>৩০</td><td>৩০</td></tr>\n<tr><td><strong>H. গুদাম</strong></td><td>৩০</td><td>৩০</td></tr>\n<tr><td><strong>J. বিপজ্জনক</strong></td><td>৫</td><td>৮</td></tr>\n</tbody>\n</table></div>\n<h5 class=\"h-lv5\"><strong>৮.২</strong> Exit দরজা ব্যবহারকারীর সংখ্যা এবং যাতায়াত দূরত্ব ছক-৩ এর নির্দিষ্ট মানের চাইতে বেশি হইলে, কমপক্ষে দুইটি নির্গমন দরজার ব্যবস্থা করিতে হইবে।</h5>\n<h5 class=\"h-lv5\"><strong>৮.৩</strong> Exit দরজার প্রস্থ ১ মিটার এবং উচ্চতা ২ মিটারের কম হইতে পারিবে না।</h5>\n<h5 class=\"h-lv5\"><strong>৮.৪</strong> Exit দরজা হিসাবে স্লাইডিং দরজা ব্যবহার করা যাইবে না।</h5>\n<h5 class=\"h-lv5\"><strong>৮.৫</strong> সকল Exit দরজা সাইড-সুইংগিং ধরনের হইতে হইবে; ব্যবহারকারীর সংখ্যা ৫০ এর বেশি হইলে দরজার সুইং কক্ষ হইতে বাহিরের দিকে হইবে; করিডোরের বাকি বাঁধামুক্ত অংশকে কোনোক্রমেই ০.৯ মিটার এর কম করিতে পারিবে না।</h5>\n<h5 class=\"h-lv5\"><strong>৮.৬</strong> Exit দরজাসমূহ কোনো সিঁড়ির ফ্লাইট এ সরাসরি খুলিতে পারিবে না।</h5>\n<h5 class=\"h-lv5\"><strong>৮.৭</strong> ব্যবহারকারীর সংখ্যা ২০০ বা তাহার বেশি হইবে সেইখানে ঘূর্ণায়মান দরজা ব্যবহার করা যাইবে না।</h5>\n<h5 class=\"h-lv5\"><strong>৮.৮</strong> প্রতিটি নির্গমন পথের দরজা চাবি ছাড়াই খুলিতে পারিতে হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>৯. সিঁড়ি:</strong></h4>\n<h5 class=\"h-lv5\"><strong>৯.১</strong> Exit সিঁড়ির প্রয়োজনীয় প্রস্থ ছক-৪ এ বর্ণিত প্রস্থ হইতে কম হইতে পারিবে না।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第８条 扉（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>৮.৩</strong> 避難扉の有効幅員は <strong>１メートル</strong> 以上、有効高さは <strong>２メートル</strong> 以上としなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>৮.৫</strong> 収容人員が５０人を超える場合、扉は室外側へ開く構造とし、且つ廊下の残余有効幅員を <strong>０.৯メートル</strong> 未満としてはならない。</h5>\n<h5 class=\"h-lv5\"><strong>৮.৭</strong> 収容人員が２００人以上の建築物において、回転ドアを使用してはならない。</h5>\n<h4 class=\"h-lv4\"><strong>第９条 階段（Stairs）</strong></h4>\n<h5 class=\"h-lv5\"><strong>৯.১</strong> 避難階段の幅員は、次表４に定める数値を下回ってはならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>避難扉の開放方向と残余幅員（第８条８.５項）</strong>:</p>\n<p>ダッカ規則では人員５０人超の室の扉は外開きを義務付け、且つ扉開放時の廊下の残余幅員を <strong>０.９メートル</strong> 確保することを求めている。衝突事故防止を強く意識した実務的基準である。</p>\n<p>2. <strong>回転ドアの制限（第８条８.７項）</strong>:</p>\n<p>人員２００人以上の建築物等での回転ドア使用を原則禁止している。避難安全の観点から高負荷施設での使用を直接制限している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、避難扉の基準に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．避難扉として引戸（スライディングドア）を使用することができる。</p>\n<p>２．収容人員が ６０名 の室の避難扉は、避難の方向（室外側）へ開く構造としなければならない。</p>\n<p>３．避難扉を開いた際に廊下の幅員を制限する場合、残余の有効幅員は ０.৫メートル あれば足りる。</p>\n<p>４．危険物施設（Ｊ）において、一の避難扉が負担できる最大収容人員は １０名 である。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。引戸は原則禁止されている。</p>\n<p><strong>2. 正しい。</strong> ５０名を超える場合は外開きが義務付けられている。</p>\n<p>2. 誤り。残余幅員は <strong>০.৯メートル</strong> 必要である。</p>\n<p>3. 誤り。危険物施設（Ｊ）では <strong>৫名</strong> である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13506","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h6 class=\"h-lv6\"><strong>ছক- ৪</strong></h6>\n<h6 class=\"h-lv6\"><strong>অগ্নি নিরাপদ সিঁড়ির প্রস্থ</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ভবনের শ্রেণি</th><th>সিঁড়ির ন্যূনতম প্রস্থ (মিটার)</th></tr></thead>\n<tbody>\n<tr><td><strong>A. আবাসিক</strong></td><td></td></tr>\n<tr><td>A1, A2</td><td>১.০</td></tr>\n<tr><td>A3</td><td>১.১৫</td></tr>\n<tr><td>A4, A5</td><td>১.৫</td></tr>\n<tr><td><strong>B. শিক্ষা প্রতিষ্ঠান</strong></td><td></td></tr>\n<tr><td>১৫০ জন পর্যন্ত</td><td>১.৫</td></tr>\n<tr><td>১৫০ জনের অধিক</td><td>২.০</td></tr>\n<tr><td><strong>D. স্বাস্থ্য সেবা</strong></td><td></td></tr>\n<tr><td>পেশেন্ট এরিয়া</td><td>২.২৫</td></tr>\n<tr><td>স্টাফ এরিয়া</td><td>১.১৫</td></tr>\n<tr><td><strong>I. সমাবেশ</strong></td><td></td></tr>\n<tr><td>I1, I3, I5</td><td>২.০</td></tr>\n<tr><td>I2, I4</td><td>১.৫</td></tr>\n</tbody>\n</table></div>\n<h6 class=\"h-lv6\"><strong>নোট</strong></h6>\n<h6 class=\"h-lv6\">২। ৬ তলার অধিক উচ্চতা বিশিষ্ট আবাসিক (A-2, A3, A-4, A-5) ইমারতে একটি মাত্র সিঁড়ি থাকিলে উক্ত সিঁড়িটি অগ্নি নিরাপদ সিঁড়ি হইতে হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>৯.২</strong> Exit সিঁড়ির ল্যান্ডিং ও প্ল্যাটফর্মসমূহের ন্যূনতম মাপ সিঁড়ির জন্য নির্ধারিত প্রস্থের চাইতে কম হইতে পারিবে না, তবে যাতায়াতের দিকের মাপ ১.২ মিটার এর বেশি হওয়া বাধ্যতামূলক নহে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h6 class=\"h-lv6\"><strong>表４：避難階段（Fire Safe Stair）の幅員</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>建築物の用途分類</th><th>階段の最小有効幅員（ｍ）</th></tr></thead>\n<tbody>\n<tr><td><strong>A. 住宅</strong></td><td></td></tr>\n<tr><td>A3（アパートメント）</td><td>１.１５</td></tr>\n<tr><td><strong>B. 教育施設</strong></td><td></td></tr>\n<tr><td>１５０名超</td><td>２.０</td></tr>\n<tr><td><strong>D. 医療施設</strong></td><td></td></tr>\n<tr><td>患者エリア</td><td>２.２５</td></tr>\n</tbody>\n</table></div>\n<h6 class=\"h-lv6\"><strong>注釈</strong></h6>\n<h6 class=\"h-lv6\">２　６階を超える住宅建築物において階段が１つの場合、当該階段は避難階段（Fire safe stair）でなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>৯.২</strong> 踊場（Landing）の最小寸法は、移動方向において <strong>１.２メートル</strong> を超えることは義務付けられない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>医療施設の階段幅（表４）</strong>:</p>\n<p>患者エリアの階段幅を <strong>２.２５メートル</strong> と規定している。日本の基準法の病院の１.２メートル等と比較し、寝台搬送を考慮した広い空間を法的に求めている。</p>\n<p>2. <strong>踊場の移動方向寸法（９.２項）</strong>:</p>\n<p>踊場の奥行きについて <strong>１.２メートル</strong> という具体的な基準値を提示している。避難流動性を確保するための具体的な数値を規則レベルで定めている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における避難階段の基準に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．患者エリアの避難階段の最小有効幅員は、２.২৫メートル としなければならない。</p>\n<p>２．医療施設のスタッフエリアの階段は、最小幅員 １.৫メートル を確保しなければならない。</p>\n<p>３．７階建ての共同住宅において階段が１つの場合、避難階段にする義務はない。</p>\n<p>４．避難階段の踊場の寸法は、移動方向に必ず ２.০メートル 以上を確保しなければならない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：１</strong></p>\n<p><strong>1. 正しい。</strong> 表４の医療施設患者エリアの規定通りである。</p>\n<p>2. 誤り。スタッフエリアは <strong>১.১৫メートル</strong> でよい。</p>\n<p>3. 誤り。<strong>６階</strong> を超える住宅で階段が１つの場合は避難階段化が義務である。</p>\n<p>4. 誤り。移動方向寸法は <strong>১.২メートル</strong> までで足りる。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13507","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৯.৩</strong> স্পাইরাল সিঁড়ি কেবল বসতবাড়ির অভ্যন্তরে এবং ২৫ বর্গমিটার পর্যন্ত মেজানাইন ফ্লোরের জন্য জরুরি নির্গমন হিসাবে ব্যবহার করা যাইবে।</h5>\n<h5 class=\"h-lv5\"><strong>৯.৪</strong> Fire Exit সিঁড়ির বাঁধামুক্ত প্রস্থ ২.২ মিটার এর বেশি হইলে মাঝামাঝি দিয়াও হাত-রেইল দিতে হইবে।</h5>\n<h5 class=\"h-lv5\"><strong>৯.৫</strong> ইমারতের প্রতিটি সিঁড়ি অগ্নি প্রতিরোধী নির্মাণ সামগ্রী দ্বারা তৈরি হইতে হইবে।</h5>\n<h5 class=\"h-lv5\"><strong>৯.৬</strong> লিফট-শ্যাফট এর চারদিক ঘিরিয়া Exit সিঁড়ি দেওয়া যাইবে; তবে দরজা দ্বারা আবদ্ধ অন্তবর্তী স্পেস থাকিতে হইবে।</h5>\n<h5 class=\"h-lv5\"><strong>৯.৭</strong> বহিস্থ সিঁড়িসমূহ সরাসরি ভূমি তলে খোলা জমিতে নির্গমন নিশ্চিত না করিলে Exit হিসাবে বিবেচ্য হইবে না।</h5>\n<h5 class=\"h-lv5\"><strong>৯.৮</strong> সিঁড়িঘরসমূহে প্রাকৃতিকভাবে সুষ্ঠু বায়ু চলাচল (Cross Ventilation) ব্যবস্থা অথবা পজেটিভ প্রেসার থাকিতে হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>১০. র‍্যাম্প:</strong></h4>\n<h5 class=\"h-lv5\"><strong>১০.১</strong> Exit র‍্যাম্প এর ন্যূনতম প্রস্থ করিডোরের প্রস্থ হইতে কম হইবে না।</h5>\n<h5 class=\"h-lv5\"><strong>১০.২</strong> Exit র‍্যাম্প এর ঢাল ১:৮ এর কম হইবে না এবং তাহার উপরিতল অ-পিচ্ছিল সামগ্রী দ্বারা প্রস্তুত হইতে হইবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第９条 階段（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>৯.৪</strong> 避難階段の幅員が <strong>２.২メートル</strong> を超える場合、中央にも手すりを設けなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>৯.৮</strong> 階段室には <strong>加圧防煙（Positive Pressure）</strong> 又は自然換気設備を設けなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第１０条 スロープ（勾配路）</strong></h4>\n<h5 class=\"h-lv5\"><strong>১০.২</strong> 避難用スロープの勾配は <strong>１／８</strong> 以下としなければならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>階段の中央手すり義務化（第９条９.৪項）</strong>:</p>\n<p>避難階段の幅員が <strong>２.２メートル</strong> を超える場合、中央手すりの設置を義務付けている。日本の基準法の３メートル超と比較し、より狭い幅から中央手すりを要求している。</p>\n<p>2. <strong>階段室の加圧防煙（第９条９.৮項）</strong>:</p>\n<p>屋内階段室に対し加圧防煙設備を原則義務化し、代替案として自然換気を認めるという、高度な防煙設計を求めている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025 付録１の避難階段及びスロープに関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．住宅内部のらせん階段は、利用者が １０名 以下であれば避難用出口として認められる。</p>\n<p>２．避難階段の有効幅員が ２.০メートル である場合、階段の中央に手すりを設けなければならない。</p>\n<p>３．エレベーターシャフトの周囲を囲むように避難階段を設置する場合、前室（中間スペース）の設置が義務付けられている。</p>\n<p>４．避難用スロープの勾配は １／৬ 以下としなければならない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。らせん階段の利用は最大 <strong>৫名</strong> までである。</p>\n<p>2. 誤り。中央手すりは <strong>২.২メートル</strong> を超える場合に必要である。</p>\n<p><strong>3. 正しい。</strong> 付録１第９条９.６項の規定通りである。</p>\n<p>3. 誤り。勾配は最大 <strong>১:৮（１／８）</strong> である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13508","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>১০.৩</strong> র‍্যাম্পের ঢাল ১:১৫ এর চাইতে বেশি হইলে ইহার উভয় পার্শ্বে হ্যান্ড-রেইল দিতে হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>১১. আনুভূমিক Exit:</strong></h4>\n<h5 class=\"h-lv5\"><strong>১১.১</strong> আনুভূমিক নির্গমন নিজ হইতে বন্ধ হয় এই রকম দরজা দ্বারা আলাদা হইতে হইবে।</h5>\n<h5 class=\"h-lv5\"><strong>১১.২</strong> এইরূপ Exit এর প্রস্থ ১ মিটার এর কম হইতে পারিবে না।</h5>\n<h5 class=\"h-lv5\"><strong>১১.৩</strong> আনুভূমিক নির্গমন পথ ঢালু হইলে এই ঢাল সর্বাধিক ১:১২ হইবে।</h5>\n<h5 class=\"h-lv5\"><strong>১১.৫</strong> আশ্রয়স্থলের মেঝের ক্ষেত্রফল ব্যবহারকারীর মাথাপিছু ০.২৮ বর্গমিটার ধরিয়া নির্ধারণ করা হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>১২. Exit এর সংখ্যা:</strong></h4>\n<h5 class=\"h-lv5\"><strong>১২.৩</strong> Exit এর সংখ্যা ব্যবহারকারীর সংখ্যার ভিত্তিতে নির্ণিত হইবে-</h5>\n<h6 class=\"h-lv6\">(ক) ৫০ পর্যন্ত- কমপক্ষে ১টি Exit</h6>\n<h6 class=\"h-lv6\">(খ) ৫১ হইতে ৫০০ পর্যন্ত- কমপক্ষে ২টি Exit</h6>\n<h6 class=\"h-lv6\">(গ) ৫০১ হইতে ১০০০ পর্যন্ত- কমপক্ষে ৩টি Exit</h6>\n<h6 class=\"h-lv6\">(ঘ) ১০০০ এর অধিক- কমপক্ষে ৪টি Exit</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第１１条 水平避難出口（Horizontal Exit）</strong></h4>\n<h5 class=\"h-lv5\"><strong>১১.২</strong> 避難出口（Exit）の幅員は <strong>１メートル</strong> を下回ってはならない。</h5>\n<h5 class=\"h-lv5\"><strong>১১.৫</strong> 避難場所（Refuge area）の最小床面積は、利用者１人当たり <strong>０.২৮平方メートル</strong> として算定しなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第１２条 避難出口の数</strong></h4>\n<h5 class=\"h-lv5\"><strong>১২.৩</strong> 各階の収容人員に基づき、次の数を設けなければならない。</h5>\n<h6 class=\"h-lv6\">二　収容人員が５１人から５００人までの場合：少なくとも <strong>２箇所</strong></h6>\n<h6 class=\"h-lv6\">四　収容人員が１０００人を超える場合：少なくとも <strong>４箇所</strong></h6>\n<hr class=\"sep\">\n<p>1. <strong>避難出口数の算定根拠（付録１第１２条）</strong>:</p>\n<p>ダッカ規則では避難出口数を「収容人員」に基づき一律に決定している。１０００人超に対し「４箇所」を義務付ける点は、大規模施設の安全性を物理的に担保する基準である。</p>\n<p>2. <strong>避難場所の単位面積基準（第１１条１１.৫項）</strong>:</p>\n<p>避難場所の有効面積について１人当たり <strong>０.২৮平方メートル</strong> という具体的な数値を規定しており、過密状態での安全確保を数値化している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、避難施設に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．水平避難出口の幅員は、最小 ０.৯メートル とすることができる。</p>\n<p>２．入院患者が存する医療施設における避難場所の面積は、１ベッド当たり １.০ 平方メートル とすれば足りる。</p>\n<p>３．建築物の各階において、収容人員が ６００人 である場合、避難出口の最小数は ３箇所 である。</p>\n<p>４．水平避難経路の勾配は最大 １／৮ とすることができる。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。幅員は <strong>১ মিটার</strong> 以上必要である。</p>\n<p>2. 誤り。医療施設患者エリアでは１ベッド当たり <strong>২.৮平方メートル</strong> 必要である。</p>\n<p><strong>3. 正しい。</strong> ５０１人から１０００人の場合は <strong>৩টি</strong> 必要である。</p>\n<p>3. 誤り。水平避難経路の勾配は最大 <strong>১:১২</strong> である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13509","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h6 class=\"h-lv6\"><strong>ছক- ৫</strong></h6>\n<h6 class=\"h-lv6\"><strong>একটি সিঁড়ি বা একটি বহির্গমন পথযুক্ত ইমারতসমূহ</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ব্যবহারের শ্রেণি</th><th>সর্বোচ্চ সংখ্যক তলা</th><th>শর্ত</th></tr></thead>\n<tbody>\n<tr><td>A3, A6</td><td>১০</td><td>প্রতি তলায় সর্বোচ্চ ৪ ইউনিট এবং ভ্রমণ দূরত্ব ২৩ মি:</td></tr>\n<tr><td>A4, A5, B, C, D, E, F</td><td>২</td><td>ব্যবহারকারীর সংখ্যা ৫০ এবং ভ্রমণ দূরত্ব ২৩ মি:</td></tr>\n</tbody>\n</table></div>\n<h5 class=\"h-lv5\"><strong>১২.৪</strong> ১০ তলা বা ৩৩ মিটার অপেক্ষা অধিক উচ্চতাবিশিষ্ট সকল ইমারতের জন্য কমপক্ষে ২ টি সিঁড়ি থাকিতে হইবে এবং সরাসরি উন্মুক্ত স্থানে খুলিতে হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>১৩. ভ্রমণের দৈর্ঘ্য:</strong></h4>\n<h5 class=\"h-lv5\"><strong>১৩.১</strong> মেঝের ব্যবহৃত অংশ হইতে যে কোনো Exit এর সর্বোচ্চ দূরত্ব নিম্নরূপ হয়-</h5>\n<h6 class=\"h-lv6\">(ক) ভবনের শ্রেণি A, B, C, D, I, J - ২৩ মি:</h6>\n<h6 class=\"h-lv6\">(গ) ভবনের শ্রেণি G - ৪৫ মি:</h6>\n<h4 class=\"h-lv4\"><strong>১৪. গুদাম জাতীয় ভবনের Exit:</strong></h4>\n<h5 class=\"h-lv5\"><strong>১৪.১</strong> গুদামশ্রেণি ভবনের ব্যবহারকারীর সংখ্যা ১০ এর বেশি অথবা মেঝে এলাকা ১৪০০ বর্গমিটার এর বেশি হইলে ন্যূনতম দুইটি আলাদা Means of Exit থাকিতে হইবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第１２条 避難出口（承前）</strong></h4>\n<h5 class=\"h-lv5\">共同住宅（A3）等では、各階４戸以内且つ歩行距離２３ｍ以内であれば <strong>１０階建て</strong> まで単一階段が認められる。</h5>\n<h5 class=\"h-lv5\"><strong>১২.৪</strong> １０階建て若しくは高さ３３メートルを超えるすべての建築物等は、少なくとも <strong>２箇所の階段</strong> を設けなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第１３条 歩行距離（Travel Distance）</strong></h4>\n<h5 class=\"h-lv5\"><strong>১৩.১</strong> 用途分類 A, B, C, D 等の歩行距離は一律 <strong>２３メートル</strong> 以内とする。</h5>\n<h4 class=\"h-lv4\"><strong>第１４条 倉庫建築物の避難出口</strong></h4>\n<h5 class=\"h-lv5\"><strong>১৪.১</strong> 収容人員が１０名超、又は面積が １４００㎡ 超の場合は二以上の独立した避難手段を備えなければならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>単一階段の許容範囲（表５）</strong>:</p>\n<p>ダッカ規則は階数による制限が緩く、共同住宅で１０階まで単一階段を認める代わりに、「戸数制限（４戸）」と「歩行距離（２３ｍ）」で安全を担保している。</p>\n<p>2. <strong>歩行距離の厳格な一律設定（第１３条）</strong>:</p>\n<p>ほぼ全ての用途において、歩行距離を一律 <strong>２３メートル</strong> 以内と定めており、日本の基準よりも短く厳格な数値を採用している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における避難出口及び歩行距離に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．共同住宅（A3）において、各階６戸であれば１０階建てでも階段は１箇所でよい。</p>\n<p>２．面積 １,０００㎡ の倉庫で収容人員が ８名 であれば、避難出口は１箇所でよい。</p>\n<p>３．事務所（E）の歩行距離限度は ３０メートル とされている。</p>\n<p>４．危険物施設（J）において単一の避難経路が認められるのは人員１０名以下である。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。A3で単一階段可なのは「各階 <strong>৪ ইউনিটের</strong> 」までである。</p>\n<p><strong>2. 正しい。</strong> 第１４条１４.১項の条件（人員１０名超または面積１４００㎡超）を下回るため。</p>\n<p>2. 誤り。用途分類Eは <strong>২৩ মি:</strong> 以内である。</p>\n<p>3. 誤り。人員 <strong>৫名</strong> である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13510","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h3 class=\"h-lv3\"><strong>পরিশিষ্ট-২</strong></h3>\n<h3 class=\"h-lv3\"><strong>সার্বজনীন গম্যতার ন্যূনতম মান</strong></h3>\n<h4 class=\"h-lv4\"><strong>১। সাধারণ নিয়ম:</strong></h4>\n<h5 class=\"h-lv5\">(ক) প্রতিটি কক্ষের কোনো না কোনো অংশে হুইল চেয়ার ঘুরাইবার জন্য ন্যূনতম <strong>১৫০০ মি.মি. X ১৫০০ মি.মি.</strong> বাধামুক্ত জায়গা রাখিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(খ) গণপ্রবেশ পথ ও করিডোরের ন্যূনতম প্রস্থ <strong>১২০০ মি.মি.</strong> হইতে হইবে।</h5>\n<h5 class=\"h-lv5\">(গ) পথের প্রস্থ ১৫০০ মি.মি. এর কম হইলে প্রতি <strong>৩০ মি.</strong> দূরত্বে অন্তত একবার <strong>১৫০০ মি.মি. X ১৫০০ মি.মি.</strong> বাধামুক্ত জায়গা রাখিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(ঘ) <strong>৫৮০ মি.মি.</strong> অধিক উচ্চতায় অবস্থিত বস্তু করিডোরের ভিতর <strong>১০০ মি.মি.</strong> এর বেশি বাহির হইয়া আসিতে পারিবে না।</h5>\n<h5 class=\"h-lv5\">(ঙ) মেঝে হইতে <strong>২ মিটার</strong> উচ্চতার ভিতর উপর হইতে কোনোপ্রকার বাধাদানকারী বস্তু থাকিতে পারিবে না।</h5>\n<h5 class=\"h-lv5\">(ছ) তল পরিবর্তন <strong>৬-১২ মি.মি.</strong> এর মধ্যে হইলে সর্বোচ্চ <strong>১:২</strong> ঢালে <strong>বেভেল (Bevel)</strong> করিতে হইবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>付録２ ユニバーサルアクセシビリティの最小基準</strong></h4>\n<h5 class=\"h-lv5\"><strong>১.ক</strong> すべての室等には、車椅子転回用に最小 <strong>１５００ミリメートル角</strong> の空間を確保しなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>১.খ</strong> 公共の出入口等の有効幅員は、最小 <strong>１２００ミリメートル</strong> としなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>১.ঘ</strong> 高さ <strong>５８０ミリメートル</strong> を超える突出物は、通路内へ <strong>１００ミリメートル</strong> を超えて突出してはならない。</h5>\n<h5 class=\"h-lv5\"><strong>১.ছ</strong> 床面の段差が <strong>６ミリメートルから１２ミリメートル</strong> の間であれば、勾配 <strong>１／２</strong> 以下で面取り（Bevel）を行わなければならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>車椅子転回スペースの基準（第１条第一号）</strong>:</p>\n<p>ダッカ規則では「すべての室」に <strong>１５００ミリメートル角</strong> の転回スペースを要求しており、日本の誘導基準を強行規定化したような極めて厳格な内容である。</p>\n<p>2. <strong>小規模な段差の処理（第１条第七号）</strong>:</p>\n<p><strong>６〜１２ミリメートル</strong> という微小な段差への具体的処理基準を建築規則で数値化している点は、実務上の指標として明確である。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025におけるユニバーサルアクセシビリティの基準に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．公共の廊下の有効幅員を １,৫০০ミリメートル 以上確保している場合でも３０メートル毎に転回スペースが必要である。</p>\n<p>２．床面から高さ １.৮メートル の位置にある看板は １৫０ミリメートル 突出させることができる。</p>\n<p>３．床面に １০ミリメートル の段差が生じる場合、勾配 １／২ 以下の面取りでスロープに代えることができる。</p>\n<p>４．車椅子の転回スペースは １,২০০ミリメートル角 を確保すれば足りる。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。幅員が <strong>১৫০০ মি.মি.</strong> 未満の場合に限り必要である。</p>\n<p>2. 誤り。高さ <strong>৫৮০ মি.ミ.</strong> 超の突出は <strong>১০০ মি.মি.</strong> 以内である。</p>\n<p><strong>3. 正しい。</strong> 第１条（ছ）の規定通りである。</p>\n<p>3. 誤り。最小 <strong>১৫০০ মি.মি.角</strong> 必要である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13511","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>২। দরজা :</strong></h4>\n<h5 class=\"h-lv5\">(ক) দরজার প্রতিবন্ধকতা বিহীন ন্যূনতম প্রস্থ <strong>৯০০ মি.মি.</strong> হইতে হইবে এবং উক্ত দরজা ঘূর্ণায়মান হইতে পারিবে না, অথবা টার্নস্টাইল ব্যবহার করা যাইবে না;</h5>\n<h5 class=\"h-lv5\">(খ) দরজার উভয় পার্শ্বে যথেষ্ট পরিমাণ চলাচল উপযোগী খালি জায়গা থাকিতে হইবে।</h5>\n<h6 class=\"h-lv6\">(১) যেদিক হইতে দরজা ধাক্কা দিতে হয় সেইদিকে <strong>১২০০ মি.মি. X ১২০০ মি.মি.</strong> বাধামুক্ত জায়গা এবং দরজার ছিটকিনি বা হাতলের দিকে <strong>৩০০ মি.মি.</strong> খালি দেওয়াল থাকিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(২) যেদিক হইতে দরজা টানিয়া খুলিতে হয় সেইদিকে <strong>১৫০০ মি.মি. X ১৫০০ মি.মি.</strong> বাধামুক্ত জায়গা এবং দরজার ছিটকিনি বা হাতলের দিকে <strong>৬০০ মি.মি.</strong> খালি দেওয়াল থাকিতে হইবে।</h6>\n<h5 class=\"h-lv5\">(গ) দরজার হাতল মেঝে হইতে <strong>৮৫০ মি.মি.</strong> হইতে <strong>৯৫০ মি.মি.</strong> উচ্চতার মধ্যে হইতে হইবে এবং উহা কম শক্তি প্রয়োগের ব্যবহারের বিষয়টি নিশ্চিত করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(ঘ) দরজা ও দরজার ফ্রেম আশপাশের দেওয়াল হইতে ভিন্ন রং এর হইতে হইবে এবং স্পর্শ করিয়া বুঝা যায় এইরূপ চিহ্ন থাকিতে হইবে।</h5>\n<h6 class=\"h-lv6\"><strong>চিত্র: দরজার সামনের বাধামুক্ত স্থান।</strong></h6>\n<h6 class=\"h-lv6\"><strong>চিত্র: দরজার বাধামুক্ত প্রস্থ।</strong></h6>\n<h4 class=\"h-lv4\"><strong>৩। রেইলিং :</strong></h4>\n<h5 class=\"h-lv5\">(ক) হ্যান্ড রেইল ও গ্র্যাব-রেইল গোলাকার হইবে যাহার বাহিরের ব্যাস <strong>৩৫-৫০ মি.মি.</strong> হইতে হইবে এবং ইহা সংলগ্ন দেওয়ালের <strong>৪০ মি.মি.</strong> হইতে <strong>৬০ মি.মি.</strong> দূরত্বে হইতে হইবে, তবে ইহা কোনোভাবেই প্রয়োজনীয় বাধামুক্ত চলাচলের পথের ভিতর চলিয়া আসিতে পারিবে না।</h5>\n<h5 class=\"h-lv5\">(খ) হ্যান্ড রেইল অনবরত এবং পুরো দৈর্ঘ্য জুড়িয়া একই উচ্চতায় (<strong>৮০০-৯০০ মি.মি.</strong>) হইতে হইবে। ইহার চাইতে উপরে বা নীচে বিশেষ প্রয়োজনে অতিরিক্ত হ্যান্ড রেইল দেওয়া যাইবে।</h5>\n<h5 class=\"h-lv5\">(গ) হ্যান্ড রেইলের প্রান্তসমূহ গোলাকার অথবা দেওয়াল বা মেঝের দিকে এইভাবে বাঁকানো বা ঢুকানো থাকিবে যেন তাহা চলার পথে কোনো বিপদ না ঘটায়।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第２条（戸（Doors））</strong></h4>\n<h5 class=\"h-lv5\">一（ক）　戸の有効幅員は、最小 <strong>９００ミリメートル</strong> としなければならない。また、当該戸に回転扉（回転ドア）又はターンタイルを使用してはならない。</h5>\n<h5 class=\"h-lv5\">二（খ）　戸の両側には、通行に十分な空地を確保しなければならない。</h5>\n<h6 class=\"h-lv6\">１　戸を押し開く側にあっては、<strong>１２００ミリメートル × １２００ミリメートル</strong> の障害のない空間を確保し、かつ、戸の引手（ラッチ又はハンドル）の側に <strong>３００ミリメートル</strong> の壁面後退（空地）を設けなければならない。</h6>\n<h6 class=\"h-lv6\">２　戸を手前に引いて開く側にあっては、<strong>１５００ミリメートル × １５００ミリメートル</strong> の障害のない空間を確保し、かつ、戸の引手の側に <strong>６００ミリメートル</strong> の壁面後退（空地）を設けなければならない。</h6>\n<h5 class=\"h-lv5\">三（গ）　戸のハンドル（把手）の高さは、床面から <strong>８５０ミリメートル以上９５０ミリメートル以下</strong> とし、少ない力で操作できることを確実にしなければならない。</h5>\n<h5 class=\"h-lv5\">四（ঘ）　戸及び戸の枠（フレーム）は、周囲の壁面とは異なる色彩とし、かつ、触覚により識別可能な標示を付さなければならない。</h5>\n<h6 class=\"h-lv6\"><strong>図：戸の前面の障害のない空間</strong></h6>\n<h6 class=\"h-lv6\"><strong>図：戸の有効幅員</strong></h6>\n<h4 class=\"h-lv4\"><strong>第３条（手すり（Railing））</strong></h4>\n<h5 class=\"h-lv5\">一（ক）　手すり（ハンドレール）及び掴み棒（グラブレール）の形状は円形とし、その外径は <strong>３５ミリメートルから５０ミリメートル</strong> の間としなければならない。また、隣接する壁面からは <strong>４０ミリメートルから６０ミリメートル</strong> の距離を保たなければならない。ただし、当該手すり等は、規定された有効通路幅員内に突出してはならない。</h5>\n<h5 class=\"h-lv5\">二（খ）　手すりは連続した構造とし、その全長にわたって一定の高さ（床面から <strong>８００ミリメートルから９００ミリメートル</strong> の間）に設置しなければならない。特別な必要がある場合にあっては、当該高さの上下に追加の手すりを設けることができる。</h5>\n<h5 class=\"h-lv5\">三（গ）　手すりの端部は、通行の妨げや危険が生じないよう、円形とするか、又は壁面若しくは床面側へ折り曲げて納めなければならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>戸の操作スペースの厳格な数値規定（第２条第２号）</strong>:</p>\n<p>ダッカ規則では、車椅子利用者が自力で戸を開閉することを前提とし、押し側（1200mm角）と引き側（1500mm角）で異なる操作スペースを義務付けている。日本のバリアフリー法（誘導基準）においても同様の配慮がなされるが、ダッカ規則は建築規則（Rules）の本文において、引手側の壁面後退距離（Push側300mm、Pull側600mm）までミリメートル単位で詳細に規定している点が非常に実務的である。</p>\n<p>2. <strong>色彩及び触覚による識別性（第２条第４号）</strong>:</p>\n<p>視覚障害者への配慮として、戸の枠を「周囲の壁とは異なる色」にすることを法的に義務付けている。日本のJBSAやバリアフリー法では「推奨」に留まることが多い色彩のコントラストについて、ダッカ規則は建築確認の要件として定義しており、環境のユニバーサルデザイン化を強く推進している。</p>\n<p>3. <strong>手すりの設置高さと外径（第３条）</strong>:</p>\n<p>手すりの高さを800〜900mm、外径を35〜50mmと規定している。これは日本のバリアフリー設計指針（手すり高さ一般に750〜850mm）と比較するとやや高く設定されており、現地の平均的な体格や堅牢性を重視した基準設定であると考えられる。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025におけるユニバーサルアクセシビリティの基準に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．公共建築物の出入口に設ける戸の有効幅員は、最小 ８００ミリメートル を確保すれば本規則の基準に適合する。</p>\n<p>２．戸を手前に引いて開く側に確保すべき障害のない空間は、最小 <strong>১,৫০০ミリメートル × ১,৫০০ミリメートル</strong> としなければならない。</p>\n<p>３．手すりの高さについては、階段や通路の全長にわたって 床面から ７００ミリメートル の位置で一定に保たなければならない。</p>\n<p>４．手すりの端部については、意匠性を優先するためであれば、通路側に鋭利な形状で突き出したまま仕上げることが認められる。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。付録２第２条（ক）により、有効幅員は最小 <strong>৯০০ মি.মি.（９００ミリメートル）</strong> 必要である。</p>\n<p><strong>2. 正しい。</strong> 付録２第２条（খ）（২）の規定通りである。</p>\n<p>2. 誤り。付録２第３条（খ）により、手すりの高さは床面から <strong>৮০০-৯০০ মি.মি.（８００〜９００ミリメートル）</strong> の間としなければならない。</p>\n<p>3. 誤り。付録２第３条（গ）により、端部は円形とするか壁面等へ「曲げて納めなければならない」。 </span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13512","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৪। সিঁড়ি:</strong></h4>\n<h5 class=\"h-lv5\">(ক) পুরো সিঁড়ি জুড়িয়া ট্রেড ও রাইজারের মাপ অপরিবর্তিত ও সুষম থাকিবে।</h5>\n<h5 class=\"h-lv5\">(খ) সিঁড়ির ট্রেড ন্যূনতম <strong>৩০০ মি.মি.</strong> গভীর ও রাইজার সর্বোচ্চ <strong>১৫০ মি.মি.</strong> হইবে।</h5>\n<h5 class=\"h-lv5\">(গ) প্রতিটি ট্রেড এ সর্বাধিক <strong>১৫ মি.মি.</strong> বাহির হওয়া গোলাকার নোজিং থাকিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(ঘ) উন্মুক্ত রাইজার হইতে পারিবে না।</h5>\n<h5 class=\"h-lv5\">(ঙ) ফ্লাইটের দুই পার্শ্বেই হ্যান্ড রেইল থাকিবে এবং সিঁড়ির শেষে তাহা ন্যূনতম <strong>৩০০ মি.মি.</strong> ও শুরুতে একটি ট্রেডের গভীরতা ও <strong>৩০০ মি.মি.</strong> এর যোগফলের সমান আনুভূমিকভাবে বর্ধিত হইতে হইবে।</h5>\n<h5 class=\"h-lv5\">(চ) সিঁড়ির তলা অপিচ্ছিল বস্তুতে তৈয়ার করিতে হইবে এবং স্থানটি যথেষ্ট আলোকিত হইতে হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>৫। র‍্যাম্প:</strong></h4>\n<h5 class=\"h-lv5\">(ক) র‍্যাম্প সর্বোচ্চ <strong>১:১২</strong> অনুপাতে ও সুষম ঢালওয়ালা হইতে হইবে এবং একাধিকে একনাগাড়ে <strong>১২ মিটার</strong> এর বেশি দীর্ঘ হইতে পারিবে না।</h5>\n<h5 class=\"h-lv5\">(খ) র‍্যাম্প <strong>১৮০০ মি.মি.</strong> এর চাইতে দীর্ঘ হইলে র‍্যাম্পের উভয়দিকে <strong>৮০০-৯০০ মি.মি.</strong> উচ্চতায় হ্যান্ড রেইল দিতে হইবে এবং এই রেইল র‍্যাম্পের শুরুতে ও শেষে আরো <strong>৩০০ মি.মি.</strong> আনুভূমিকভাবে বর্ধিত হইতে হইবে।</h5>\n<h5 class=\"h-lv5\">(গ) দুই পার্শ্বের হ্যান্ড রেইলের মাঝখানের দূরত্ব <strong>১২০০ মি.মি.</strong> এর কম হইবে না।</h5>\n<h5 class=\"h-lv5\">(ঘ) র‍্যাম্পের খোলাপ্রান্তে মেঝে হইতে ন্যূনতম <strong>৬৫ মি.মি.</strong> উপরের দিকে তুলিয়া বাধা সৃষ্টি করিতে হইবে এবং আলাদা রং ও স্পর্শ দিয়া বুঝা যায় এইরূপ চিহ্ন ব্যবহার করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(ঙ) প্রতিটি র‍্যাম্পের শুরুতে ও শেষে এবং ৯ মিটার এর চাইতে দীর্ঘ বা দিক ঘুরাইতে হয় এইরূপ র‍্যাম্পে বিশ্রামস্থল বা ল্যান্ডিং দিতে হইবে; ঘুরিবার জন্য ল্যান্ডিং এ ন্যূনতম <strong>১.৫ মিটার X ১.৫ মিটার</strong> জায়গা থাকিতে হইবে (বিদ্যুৎ চালিত হুইল চেয়ারের জন্য <strong>২.২৫ মিটার X ২.২৫ মিটার</strong> জায়গা থাকিতে হইবে)।</h5>\n<h5 class=\"h-lv5\">(চ) ল্যান্ডিং এর ন্যূনতম প্রস্থ র‍্যাম্পের প্রস্থের কম হইতে পারিবে না এবং ১৮০° ঘুরিলে ল্যান্ডিং এর দৈর্ঘ্য কমপক্ষে র‍্যাম্পের প্রস্থ বা ১৫০০ মি.মি. (যাহা অধিক) হইতে হইবে。</h5>\n<h5 class=\"h-lv5\">(ছ) দরজা দ্বারা যুক্ত র‍্যাম্পে দরজার সামনে ও পিছনে প্রয়োজনীয় ন্যূনতম জায়গা ক্রমিক ২(খ) অনুযায়ী থাকিতে হইবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第４条（階段（Stairs））</strong></h4>\n<h5 class=\"h-lv5\">一（ক）　階段の全域にわたって、踏面（Tread）及び蹴上げ（Riser）の寸法は変更せず、均一でなければならない。</h5>\n<h5 class=\"h-lv5\">二（খ）　階段の踏面は最小 <strong>３００ミリメートル</strong> の奥行きとし、蹴上げは最大 <strong>１５０ミリメートル</strong> としなければならない。</h5>\n<h5 class=\"h-lv5\">三（গ）　各踏面には、最大 <strong>１５ミリメートル</strong> 突出した丸みを帯びた段鼻（Nosing）を設けなければならない。</h5>\n<h5 class=\"h-lv5\">四（ঘ）　蹴込み板のない（オープンライザー）構造としてはならない。</h5>\n<h5 class=\"h-lv5\">五（ঙ）　階段の段（Flight）の両側に手すりを設けなければならない。当該手すりは、階段の下端において最小 <strong>３００ミリメートル</strong> 、上端においては踏面１段分の奥行きに <strong>３００ミリメートル</strong> を加えた距離だけ、それぞれ水平方向に延長しなければならない。</h5>\n<h5 class=\"h-lv5\">六（চ）　階段の床面は滑りにくい材料で仕上げるものとし、当該場所には十分な照明を確保しなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第５条（勾配路（Ramps））</strong></h4>\n<h5 class=\"h-lv5\">一（ক）　勾配路の勾配は最大 <strong>１／１２</strong>（1:12）以下かつ均一でなければならず、一箇所の連続した長さは <strong>１２メートル</strong> を超えてはならない。</h5>\n<h5 class=\"h-lv5\">二（খ）　勾配路の長さが <strong>１８００ミリメートル</strong> を超える場合にあっては、両側に高さ <strong>８００ミリメートルから９００ミリメートル</strong> の手すりを設けなければならない。当該手すりは、勾配路の起終点からさらに <strong>３００ミリメートル</strong> 水平方向に延長しなければならない。</h5>\n<h5 class=\"h-lv5\">三（গ）　両側の手すり間の有効幅員は、<strong>１２００ミリメートル</strong> を下回ってはならない。</h5>\n<h5 class=\"h-lv5\">四（ঘ）　勾配路の開放された端部には、床面から最小 <strong>６５ミリメートル</strong> 立ち上げた縁石等の障壁を設けなければならない。</h5>\n<h5 class=\"h-lv5\">五（ঙ）　勾配路の起終点、及び長さが９メートルを超える場合若しくは進行方向を変更する場合にあっては、休憩場所又は踊場（Landing）を設けなければならない。転回のための踊場は最小 <strong>１．５メートル × １．５メートル</strong> の面積を確保しなければならない（電動車椅子を利用する場合にあっては、<strong>２．２５メートル × ２．２５メートル</strong> の面積を確保しなければならない）。</h5>\n<h5 class=\"h-lv5\">六（চ）　踊場の最小幅員は勾配路の幅員を下回ってはならない。</h5>\n<h5 class=\"h-lv5\">七（ছ）　戸が設置された勾配路にあっては、戸の前後に必要とされる最小空間を本付録第２条第二号の規定に従い確保しなければならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>階段寸法の厳格性（第４条第２号）</strong>:</p>\n<p>ダッカ規則では、アクセシビリティ対象の階段について蹴上げ <strong>１５０ミリメートル以下</strong> 、踏面 <strong>３００ミリメートル以上</strong> と規定している。日本の建築基準法施行令第２３条（一般の建築物で蹴上げ200mm以下、踏面240mm以上）と比較すると、ダッカ規則（付録２）は日本のバリアフリー法に基づく誘導基準と同等以上の安全基準を全対象建築物に求めている。</p>\n<p>2. <strong>電動車椅子への対応スペース（第５条第５号）</strong>:</p>\n<p>勾配路の転回用踊場について、一般的な車椅子のための <strong>１．５メートル角</strong> に加え、<strong>電動車椅子用として ２．２５メートル角</strong> という広大な空間確保を明文化している。日本の基準では一般に1.5m〜1.8m角が目安とされることが多く、2.25mという基準値は高度なアクセシビリティ基準であるといえる。</p>\n<p>3. <strong>手すりの水平延長距離（第４条第５号）</strong>:</p>\n<p>階段端部における手すりの水平延長を、下端で300mm、上端で「踏面1段分＋300mm」と極めて具体的に義務付けている。これは避難時の安全性と肢体不自由者の移動の確実性を、計算可能な設計条件として法典化したものである。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025 付録２に定めるユニバーサルアクセシビリティ基準に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．ユニバーサルアクセシビリティの対象となる階段については、意匠性を考慮し、蹴込み板のないオープンライザー構造とすることができる。</p>\n<p>２．勾配路（勾配 １／１２）を設置する場合、一箇所の連続した長さが １৫メートル を超えるときは、その間に踊場を設けなければならない。</p>\n<p>３．電動車椅子の利用を想定した勾配路の踊場については、方向転換のために最小 <strong>২.২৫メートル X ২.২৫メートル</strong> の空間を確保しなければならない。</p>\n<p>４．階段の寸法については、利用者の安全のため、蹴上げを １৮০ミリメートル 以下、踏面を ２৪০ミリメートル 以上としなければならない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第４条第４号（ঘ）により、オープンライザーは禁止されている。</p>\n<p>2. 誤り。第５条第１号（ক）により、一箇所の連続した長さは最大 <strong>১২ মিটার（１２メートル）</strong> である。</p>\n<p><strong>3. 正しい。</strong> 第５条第５号（ঙ）の規定通りである。</p>\n<p>3. 誤り。第４条第２号（খ）により、蹴上げは最大 <strong>১৫০ミリメートル</strong> 、踏面は最小 <strong>৩০০ミリメートル</strong> である。 </span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13513","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৬। লিফট :</strong></h4>\n<h5 class=\"h-lv5\">(ক) লিফট লবি প্রবেশগম্য, আলোকিত, চিহ্নিত, আনুভূমিক ও ন্যূনতম (<strong>১.৫ মিটার X ১.৫ মিটার</strong>) বাধাহীন ঘুরিবার জায়গা সম্পন্ন হইতে হইবে।</h5>\n<h5 class=\"h-lv5\">(খ) লিফট নিয়ন্ত্রণের বোতামসমূহ <strong>৮৯০-১২০০ মি.মি.</strong> উচ্চতার মধ্যে অবস্থিত হইতে হইবে এবং বিশেষ সুবিধা সম্পন্ন ব্যক্তিবর্গের ব্যবহার উপযোগী হইতে হইবে।</h5>\n<h5 class=\"h-lv5\">(গ) লিফট কেবিন এর ন্যূনতম বাধামুক্ত পরিমাপ <strong>১৫০০ মি.মি. X ১৭২৫ মি.মি.</strong> হইবে এবং দরজার ন্যূনতম প্রস্থ <strong>৯০০ মি.মি.</strong> হইতে হইবে।</h5>\n<h5 class=\"h-lv5\">(ঘ) যখন লিফট বা র‍্যাম্প দেওয়া সম্ভব হইবে না তখন ন্যূনতম <strong>৯০০ মি.মি. X ১২০০ মি.মি.</strong> আকারের প্ল্যাটফর্ম লিফটিং জাতীয় যন্ত্র ব্যবহার করিতে হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>৭। ওয়াশরুম, টয়লেট, ইত্যাদি:</strong></h4>\n<h5 class=\"h-lv5\">(ক) প্রতি তলায় কমপক্ষে একটি অথবা মোট টয়লেটের <strong>৫%</strong> (যাহা অধিক) সংখ্যক টয়লেট প্রতিবন্ধীদের জন্য প্রবেশগম্য করিয়া তৈরি করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(খ) টয়লেটের ভিতর ন্যূনতম <strong>১.৫ মিটার X ১.৭৫ মিটার</strong> বাধামুক্ত জায়গা থাকিতে হইবে এবং <strong>WC</strong>-এর একদিকের সংলগ্ন দেওয়াল হইতে ন্যূনতম <strong>১২০০ মি.মি.</strong> জায়গা খালি থাকিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(গ) <strong>WC</strong>-এর আসন হইতে <strong>৩০০ মি.মি.</strong> উচ্চতায় পেছনের দেওয়াল হইতে সর্বাধিক <strong>৩০০ মি.মি.</strong> দূরত্বে এবং সামনের দিকে ন্যূনতম <strong>৬০০ মি.মি.</strong> বর্ধিত করিয়া হ্যান্ডরেইল থাকিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(ঘ) পানির কল মেঝে হইতে <strong>৮৫০ মি.মি.</strong> উপরে হইতে হইবে এবং বেসিনের তলা ও পাইপ এমনভাবে থাকিতে হইবে যেন হুইল চেয়ার পৌঁছাইতে পারে।</h5>\n<h5 class=\"h-lv5\">(ঙ) গোসলের জায়গা <strong>১.০ মিটার</strong> প্রস্থসহ <strong>১.৫০ বর্গ মি.</strong> হইবে এবং মেঝেতে কোনো প্রকার বেষ্টনী থাকিতে পারিবে না।</h5>\n<h4 class=\"h-lv4\"><strong>৮। পার্কিং:</strong></h4>\n<h5 class=\"h-lv5\">(ক) প্রতিবন্ধীসহ সার্বজনীন ব্যবহারযোগ্য ন্যূনতম একটি পার্কিং স্পেস থাকিতে হইবে。</h5>\n<h5 class=\"h-lv5\">(খ) উক্ত পার্কিং স্পেসের প্রশস্ততা ন্যূনতম <strong>৩.২ মিটার</strong> এবং দৈর্ঘ্য ন্যূনতম <strong>৪.৮০ মিটার</strong> হইতে হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>৯। সিটিং :</strong></h4>\n<h5 class=\"h-lv5\">(ক) বিভিন্ন সমাবেশ স্থলে নির্দিষ্ট সংখ্যক হুইলচেয়ার ব্যবহারকারীদের উপযোগী আসন সংরক্ষিত ও সমভাবে বণ্টিত থাকিতে হইবে, যাহা প্রবেশ পথ হইতে সহজে দৃশ্যমান ও গম্য হইতে হইবে।</h5>\n<h5 class=\"h-lv5\">(খ) উক্ত আসনসমূহে যাইবার জন্য <strong>৯০০ মি.মি. X ১৫০০ মি.মি.</strong> বাধামুক্ত জায়গা থাকিতে হইবে এবং আসনসমূহ ন্যূনতম <strong>১২০০ মি.মি.</strong> চওড়া আইল এর ধারে হইতে হইবে।</h5>\n<h5 class=\"h-lv5\">(গ) সংরক্ষিত আসন একই সারিতে অন্যান্য আসনের একইতলে অবস্থিত হইবে এবং তাহা অন্যান্য সাধারণ আসনগুলো ব্যবহারে কোনো প্রতিবন্ধকতা তৈরি করিতে পারিবে না।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第６条（昇降機（Lift））</strong></h4>\n<h5 class=\"h-lv5\">一（ক）　エレベーターロビーは、アクセシブルであり、最小 <strong>１．５メートル × １．５メートル</strong> の障害のない転回空間を備えていなければならない。</h5>\n<h5 class=\"h-lv5\">二（খ）　エレベーターの操作ボタンは、床面から <strong>８９０ミリメートルから１２００ミリメートル</strong> の高さの範囲内に設置しなければならない。</h5>\n<h5 class=\"h-lv5\">三（গ）　エレベーターのかごの最小有効内法寸法は <strong>１５００ミリメートル × １７２５ミリメートル</strong> とし、出入口の有効幅員は最小 <strong>９００ミリメートル</strong> としなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第７条（洗面所、便所等）</strong></h4>\n<h5 class=\"h-lv5\">一（ক）　各階には、少なくとも一箇所又は全便所数の <strong>５パーセント</strong>（いずれか多い方の数値）以上の便所について、障害者が利用可能な構造としなければならない。</h5>\n<h5 class=\"h-lv5\">二（খ）　便所の内部には最小 <strong>１．５メートル × １．７５メートル</strong> の障害のない空間を確保し、且つ大便器の一方の側壁から最小 <strong>１２００ミリメートル</strong> の空地を設けなければならない。</h5>\n<h5 class=\"h-lv5\">三（গ）　大便器の座面から３００ミリメートルの高さの位置に、前方へ最小 <strong>６００ミリメートル</strong> 延長した手すりを設けなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第８条（駐車場）</strong></h4>\n<h5 class=\"h-lv5\">二（খ）　障害者等用駐車区画の幅員は最小 <strong>３．２メートル</strong> 、奥行きは最小 <strong>４．８０メートル</strong> としなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第９条（座席（Seating））</strong></h4>\n<h5 class=\"h-lv5\">一（ক）　各種集会施設においては、車椅子利用者のための専用座席を一定数確保しなければならない。</h5>\n<h5 class=\"h-lv5\">二（খ）　当該座席に至るために <strong>９００ミリメートル × １５００ミリメートル</strong> の障害のない空間を確保し、且つ最小幅員 <strong>１２００ミリメートル</strong> の通路（アイル）に面していなければならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>車椅子使用者用駐車施設の区画寸法（第８条）</strong>:</p>\n<p>ダッカ規則では幅員 <strong>３．２メートル</strong> を最小基準としている。日本のバリアフリー法（建築物移動等円滑化誘導基準）では幅員3.5メートル以上とされており、ダッカ規則は日本の基準よりもやや狭い設定だが、一般的な区画に対して明確な割増しを建築規則で義務付けている点は共通している。</p>\n<p>2. <strong>便所内における具体的数値規定（第７条）</strong>:</p>\n<p>大便器の側方に <strong>１２００ミリメートル</strong> の空地を求めるなど、介助や転回に必要な寸法を強行規定として明文化している。日本の基準法では便所内の詳細寸法まで規定することは稀だが、ダッカ規則はアクセシビリティの確保を「法律上の義務（Rules）」として定義している点が極めて厳格である。</p>\n<p>3. <strong>エレベーターの操作盤高さ（第６条第２号）</strong>:</p>\n<p>ボタンの高さを <strong>８９０〜１２００ミリメートル</strong> と定めている。これは日本のJIS基準（車椅子用操作盤：中心高さ1000mm程度）とほぼ合致しており、国際的な基準を強く意識した数値設定となっている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025におけるユニバーサルアクセシビリティの基準に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．エレベーターかごの最小内法寸法は １,২০০ミリメートル × １,২০০ミリメートル を確保すれば本規則の基準に適合する。</p>\n<p>２．障害者用便所の設置にあたっては、便器の背面壁から最大 <strong>৩০০（３００）ミリメートル</strong> の位置に手すりを設けなければならない。</p>\n<p>３．障害者用駐車施設の区画については、幅員を ２.৫メートル、奥行きを ৫.০メートル としなければならない。</p>\n<p>４．集会施設の専用座席に隣接する通路（アイル）の幅員は、最小 ９００ミリメートル 以上あれば足りる。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。第６条第三号（গ）により、最小寸法は <strong>১৫০০ মি.মি. X ১৭২৫ মি.মি.</strong> である。</p>\n<p><strong>2. 正しい。</strong> 第７条第三号（গ）の規定通りである。</p>\n<p>2. 誤り。第８条第二号（খ）により、幅員は最小 <strong>৩.২ মিটার</strong> 必要である。</p>\n<p>3. 誤り。第９条第二号（খ）により、通路の幅員は最小 <strong>১২০০ মি.মি.</strong> 必要である。 </span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13514","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>পরিশিষ্ট- ৩</strong></h4>\n<h4 class=\"h-lv4\"><strong>[বিধি ২(৬) দ্রষ্টব্য]</strong></h4>\n<h4 class=\"h-lv4\"><strong>অকুপেন্সি টাইপ (Occupancy Type) বা ইমারতের ব্যবহার ভিত্তিক শ্রেণিবিন্যাস</strong></h4>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নং</th><th>ইমারত ব্যবহারের শ্রেণি</th><th>উপ- শ্রেণি</th><th>ব্যবহারের ধরন</th></tr></thead>\n<tbody>\n<tr><td>(১)</td><td>(২)</td><td>(৩)</td><td>(৪)</td></tr>\n<tr><td><strong>১।</strong></td><td><strong>A : আবাসিক</strong></td><td>A1</td><td>একক পরিবার বাড়ি</td></tr>\n<tr><td></td><td></td><td>A2</td><td>দুই পরিবারের বাড়ি</td></tr>\n<tr><td></td><td></td><td>A3</td><td>ফ্ল্যাট ও এ্যাপার্টমেন্ট বাড়ি</td></tr>\n<tr><td></td><td></td><td>A4</td><td>মেস, বোর্ডিং, ডরমিটরি ও হোস্টেল</td></tr>\n<tr><td></td><td></td><td>A5</td><td>হোটেল, মোটেল, গেস্ট হাউজ, সার্ভিস এ্যাপার্টমেন্ট ও স্টুডিও এ্যাপার্টমেন্ট</td></tr>\n<tr><td></td><td></td><td>A6</td><td>সাশ্রয়ী আবাসন</td></tr>\n<tr><td><strong>২।</strong></td><td><strong>B : শিক্ষা প্রতিষ্ঠান</strong></td><td>B1</td><td>স্কুল ও কলেজ জাতীয় শিক্ষা প্রতিষ্ঠান (১২ ক্লাস পর্যন্ত)</td></tr>\n<tr><td></td><td></td><td>B2</td><td>বিশ্ববিদ্যালয়, ট্রেনিং একাডেমী ইত্যাদি (১২ ক্লাসের উপরে)</td></tr>\n<tr><td></td><td></td><td>B3</td><td>প্রি-স্কুল</td></tr>\n<tr><td><strong>৩।</strong></td><td><strong>C : প্রাতিষ্ঠানিক</strong></td><td>C1</td><td>শিশু পরিচর্যা</td></tr>\n<tr><td></td><td></td><td>C2</td><td>বয়স্ক পরিচর্যা (শারীরিক সক্ষম)</td></tr>\n<tr><td></td><td></td><td>C3</td><td>বয়স্ক পরিচর্যা (শারীরিক সক্ষম নহে)</td></tr>\n<tr><td></td><td></td><td>C4</td><td>শিশুদের জন্য মানসিক ও অন্যান্য শোধন কেন্দ্র (Penal and mental institutions for children)</td></tr>\n<tr><td></td><td></td><td>C5</td><td>বয়স্কদের জন্য কারাগার, মানসিক ও অন্যান্য শোধন কেন্দ্র (Penal and mental institutions for adults)</td></tr>\n<tr><td><strong>৪।</strong></td><td><strong>D : স্বাস্থ্যসেবা</strong></td><td>D1</td><td>সাধারণ স্বাস্থ্য সেবা (হাসপাতাল, ক্লিনিক মেডিকেল হাসপাতাল)</td></tr>\n<tr><td></td><td></td><td>D2</td><td>স্বাস্থ্য সেবা জরুরি অবস্থায় কার্যকর (হাসপাতাল, ক্লিনিক (দুর্যোগকালীন এবং পরবর্তী জরুরি ব্যবস্থাপনাসহ)</td></tr>\n<tr><td></td><td></td><td>D3</td><td>ডক্টর চেম্বার, ডায়াগনস্টিক ল্যাব, প্যাথলজি ল্যাব (বেড ব্যতীত)</td></tr>\n<tr><td><strong>৫।</strong></td><td><strong>E : ব্যবসা (Business)</strong></td><td>E1</td><td>অফিস (Offices)</td></tr>\n<tr><td></td><td></td><td>E2</td><td>গবেষণা ও পরীক্ষাগার (রিসার্চ প্রতিষ্ঠান জাতীয় স্থাপনা)</td></tr>\n<tr><td></td><td></td><td>E3</td><td>নিত্য প্রয়োজনীয় অন্যান্য সেবা (ব্যাংক, পোস্ট অফিস ও সম জাতীয়)</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>付録３ 用途分類（Occupancy Type）又は建築物の使用用途に基づく区分</strong></h4>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>建築物の用途分類</th><th>小分類</th><th>使用用途の具体的種類</th></tr></thead>\n<tbody>\n<tr><td><strong>１</strong></td><td><strong>A：住宅（Residential）</strong></td><td>A1</td><td>一戸建て住宅</td></tr>\n<tr><td></td><td></td><td>A3</td><td>フラット及び共同住宅</td></tr>\n<tr><td></td><td></td><td>A5</td><td>ホテル、サービスアパートメント等</td></tr>\n<tr><td><strong>２</strong></td><td><strong>B：教育施設（Educational）</strong></td><td>B1</td><td>学校及びカレッジ等（第１２学年まで）</td></tr>\n<tr><td></td><td></td><td>B2</td><td>大学等（第１２学年超）</td></tr>\n<tr><td><strong>３</strong></td><td><strong>C：公衆福祉・矯正施設</strong></td><td>C1</td><td>託児所</td></tr>\n<tr><td></td><td></td><td>C2</td><td>高齢者介護施設（身体的に自立している者）</td></tr>\n<tr><td></td><td></td><td>C3</td><td>高齢者介護施設（身体的に自立していない者）</td></tr>\n<tr><td><strong>４</strong></td><td><strong>D：医療施設（Health Care）</strong></td><td>D1</td><td>一般医療サービス（病院等）</td></tr>\n<tr><td></td><td></td><td>D2</td><td>非常時に機能維持が必要な医療施設</td></tr>\n<tr><td><strong>５</strong></td><td><strong>E：業務施設（Business）</strong></td><td>E1</td><td>事務所（Offices）</td></tr>\n<tr><td></td><td></td><td>E3</td><td>銀行、郵便局及びこれらに類するもの</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">\n<p>1. <strong>用途分類の細分化とコード化（付録３）</strong>:</p>\n<p>ダッカ規則では、建築物の用途を英文字と数字の組み合わせでコード化し詳細に分類している。日本の基準法第２条等でも用途分類はあるが、ダッカ規則（BNBC準拠）の方が、教育施設を学年で区切ったり、介護施設を身体能力で区分したりするなど、避難安全設計やアクセシビリティの基準と連動させるための実務的な細分化がなされている。</p>\n<p>2. <strong>非常時機能維持の医療施設（D2）</strong>:</p>\n<p>医療施設の中に「非常時に機能する」施設（D2）を独立区分として設けている。構造耐力だけでなく、災害時及びその後の管理体制までを建築規則の対象としている点は、レジリエンスを重視した姿勢を示している。</p>\n<p>3. <strong>小規模業務施設の包含（E3）</strong>:</p>\n<p>銀行や郵便局を事務所と同様の「Business」カテゴリに分類することで、大規模な不特定多数利用の商業施設とは区別した、合理的な安全基準の適用を図っている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025 付録３「用途分類」に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．「大学（University）」は、第１２学年を超える教育を行う施設であるため、分類 <strong>B1</strong> に該当する。</p>\n<p>２．身体的に自立した高齢者のための介護施設については、分類 <strong>C2</strong> として区分される。</p>\n<p>３．「ホテル」及び「サービスアパートメント」は、住宅分類の <strong>A3</strong> に含まれる。</p>\n<p>４．入院用のベッドを備えない医師の診察室や病理検査室は、業務施設（Business）分類に該当する。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。付録３項番２により、１２学年を超える施設は <strong>B2</strong> に分類される。</p>\n<p><strong>2. 正しい。</strong> 項番３（C2）に規定されている。</p>\n<p>2. 誤り。ホテル等は <strong>A5</strong> 分類であり、A3はアパートメントである。</p>\n<p>3. 誤り。ベッドを伴わない診察室等は、医療施設分類の <strong>D3</strong> に該当する。 </span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13515","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নং</th><th>ইমারত ব্যবহারের শ্রেণি</th><th>উপ- শ্রেণি</th><th>ব্যবহারের ধরন</th></tr></thead>\n<tbody>\n<tr><td>(১)</td><td>(২)</td><td>(৩)</td><td>(৪)</td></tr>\n<tr><td><strong>৬।</strong></td><td><strong>F : বাণিজ্যিক (Mercantile)</strong></td><td>F1</td><td>ছোট দোকান ও বাজার (৩০০ স্কয়ার মিটার এর কম ক্ষেত্রফল বিশিষ্ট)</td></tr>\n<tr><td></td><td></td><td>F2</td><td>বড় দোকান ও বাজার (৩০০ স্কয়ার মিটার এর বেশি ক্ষেত্রফল বিশিষ্ট)</td></tr>\n<tr><td></td><td></td><td>F3</td><td>ফিলিং স্টেশন (Refueling station)</td></tr>\n<tr><td><strong>৭।</strong></td><td><strong>G : শিল্পকারখানা</strong></td><td>G1</td><td>কম দূষণকারী, কম বিপজ্জনক কারখানা ও কুটিরশিল্প (Low hazard industries)</td></tr>\n<tr><td></td><td></td><td>G2</td><td>সাধারণ বিপজ্জনক কারখানা ও সাধারণ দূষণকারী (Moderate hazard industries)</td></tr>\n<tr><td><strong>৮।</strong></td><td><strong>H : গুদাম</strong></td><td>H1</td><td>কম দাহ্য পদার্থের গুদাম (Low fire risk storage)</td></tr>\n<tr><td></td><t
