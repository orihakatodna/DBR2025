=\"sep\">\n<hr class=\"sep\">"},{"num":"13435","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>১৬। অনুমোদিত নকশা সংশোধন (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(২) এই বিধিমালার অধীন অনুমোদিত নকশার ক্ষেত্রে শুধু অভ্যন্তরীণ পুনর্বিন্যাসের ক্ষেত্রে সর্বমোট মেঝের আয়তন, FAR, আবাসন ইউনিট, কাঠামোগত নকশা, ভূমি আচ্ছাদনের পরিমাণ, বাইরের পরিসীমা এবং ভার্টিক্যাল সার্কুলেশন পদ্ধতি বা পথের অবস্থানগত পরিবর্তন না হইলে নূতন করিয়া অনুমোদনের প্রয়োজন হইবে না।</h5>\n<h5 class=\"h-lv5\">(৩) কক্ষের উচ্চতায় পরিবর্তন ২০ (বিশ) সেন্টিমিটারের মধ্যে হইলে নূতন কোনো অনুমোদনের প্রয়োজন হইবে না যদি না উচ্চতার সহিত সংশ্লিষ্ট অন্যান্য বাধ্যবাধকতা যথাযথ থাকে।</h5>\n<h5 class=\"h-lv5\">(৪) নির্মাণ অনুমোদনপত্রের মেয়াদে অনুমোদিত নকশার কোনো সংশোধনের প্রয়োজন হইলে আবেদনকারী অনুমোদিত নকশাসহ সংশোধিত নকশা সংযুক্ত করিয়া আবেদন দাখিল করিবেন।</h5>\n<h5 class=\"h-lv5\">(৫) নকশা সংশোধনের কারণে মেঝের ক্ষেত্রফল বৃদ্ধি পাইলে পরিশিষ্ট ৪ অনুযায়ী ফি পরিশোধ করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৬) সংশোধিত নকশা পুনরায় অনুমোদনের পূর্বে ভবনের সংশোধিত অংশের নির্মাণকাজ সম্পন্ন করা হইলে এবং অনুরূপ পরিবর্তন এই বিধিমালার অধীন অনুমোদনযোগ্য হইলে পরিশিষ্ট ৪ এ বর্ণিত নির্মাণ অনুমোদনের দশগুণ ফি এবং Building Construction Act, 1952 অনুসারে ধার্যকৃত জরিমানা প্রদানপূর্বক পুনরায় নির্মাণ অনুমোদনপত্র গ্রহণ করিতে হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>১৭। নির্মাণ সংশ্লিষ্ট বিষয়ে আবেদনকারী, কারিগরি ব্যক্তি ও অন্যান্যদের দায়িত্ব ও দায়িত্বে অবহেলা।</strong></h4>\n<h5 class=\"h-lv5\">(১) ইমারত নির্মাণে অনুমোদনপ্রাপ্ত আবেদনকারী কোনো অবস্থাতেই অনুমোদিত নকশা ও দলিলাদির পরিপন্থি কোনো কাজ করিতে পারিবে না।</h5>\n<h5 class=\"h-lv5\">(২) নির্মাণ অনুমোদনপত্র ইস্যু করিবার পর সংশ্লিষ্ট অথরাইজড অফিসারকে অবহিত না করিয়া কোনো নির্মাণ, খনন, অপসারণ বা সাইটে কোনো কাজ আরম্ভ করা যাইবে না।</h5>\n<h5 class=\"h-lv5\">(৩) সকল স্থাপত্য, কাঠামোগত ও সার্ভিস নকশা তদারকির জন্য আবেদনকারী কর্তৃক কারিগরি ব্যক্তি নিয়োজিত করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৪) নির্মাণ সম্পর্কিত তথ্যাবলি সংবলিত সাইনবোর্ড ও অনুমোদিত নকশাসমূহের কপি সাইটে সহজে দৃশ্যমান স্থানে প্রদর্শন করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৫) আবেদনকারীর স্থগিতকৃত কাজ পুনরায় আরম্ভ করিবার কমপক্ষে ১৫ (পনেরো) দিন পূর্বে কর্তৃপক্ষ কর্তৃক নির্ধারিত আবেদন ফরমের মাধ্যমে কাজ আরম্ভ করিবার বিষয়টি কর্তৃপক্ষকে অবহিত করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৬) প্রকল্পে নিয়োজিত কোনো কারিগরি ব্যক্তির নূতন নিয়োগ অথবা পরিবর্তন সম্পর্কে কর্তৃপক্ষকে নিয়োগ বা পরিবর্তনের ১৫ (পনেরো) দিনের মধ্যে অবহিত করিতে হইবে এবং কারিগরি ব্যক্তি পরিবর্তনের ক্ষেত্রে পূর্বের কারিগরি ব্যক্তিবর্গকে অবহিতকরণপূর্বক নূতন নিয়োগপ্রাপ্ত কারিগরি ব্যক্তি দায়িত্ব গ্রহণ না করা পর্যন্ত নির্মাণ কাজ স্থগিত থাকিবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第１６条（承認された設計図書の修正）（承前）</strong></h4>\n<h5 class=\"h-lv5\">２　本規則に基づき承認された設計図書に関し、内部の再配置のみを行う場合であって、延べ面積（Total Floor Area）、容積率（FAR）、住戸数、構造設計、建蔽率（Building Coverage Ratio）、外郭境界線並びに垂直動線計画又は経路の設置位置に変更がないときは、新たに承認を受けることを要しない。</h5>\n<h5 class=\"h-lv5\">３　室の高さの変更が２０センチメートル以内である場合は、高さに関するその他の制限に適合している限りにおいて、新たに承認を受けることを要しない。</h5>\n<h5 class=\"h-lv5\">４　確認済証（Construction Permit）の有効期間内において承認された設計図書の修正が必要となった場合、申請者は、既に承認された設計図書に修正設計図書を添えて申請書を提出しなければならない。</h5>\n<h5 class=\"h-lv5\">５　設計図書の修正により床面積が増加した場合は、付録４の規定に基づき手数料を納付しなければならない。</h5>\n<h5 class=\"h-lv5\">６　修正設計図書の再承認を受ける前に当該修正部分の工事を完了した場合において、当該変更が本規則に基づき承認可能なものであるときは、付録４に定める建築確認手数料の１０倍の額の手数料を納付し、かつ、１９５２年建築建設法（Building Construction Act, 1952）の規定に基づき賦課される過料を納付した上で、改めて確認済証の交付を受けなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第１７条（申請者、専門技術者等の責務及び義務の怠慢）</strong></h4>\n<h5 class=\"h-lv5\">１　建築の承認を受けた申請者は、いかなる場合においても、承認された設計図書及び書類の内容に抵触する工事を行ってはならない。</h5>\n<h5 class=\"h-lv5\">２　確認済証（Construction Permit）の交付後、関連する建築主事（Authorised Officer）に通知することなく、いかなる建築、根切り（掘削）、撤去又は現場における工事に着手してはならない。</h5>\n<h5 class=\"h-lv5\">３　全ての意匠、構造及び設備設計（Service Design）の監理のため、申請者は専門技術者（Technical person）を任命しなければならない。</h5>\n<h5 class=\"h-lv5\">４　工事に関する情報を記載した掲示板（Signboard）及び承認された設計図書の写しを、工事現場内の容易に視認できる場所に掲示しなければならない。</h5>\n<h5 class=\"h-lv5\">５　中断していた工事を再開しようとする場合、申請者は、再開の日の少なくとも１５日前までに、所管行政庁（Authority）が定める申請様式によりその旨を所管行政庁に通知しなければならない。</h5>\n<h5 class=\"h-lv5\">６　プロジェクトに従事する専門技術者の新規選任又は変更があった場合、選任又は変更から１５日以内に所管行政庁に通知しなければならない。専門技術者を変更する場合にあっては、前任の専門技術者への通知を行い、かつ、後任の専門技術者が職務を引き継ぐまでの間は、建築工事を中断しなければならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>軽微な変更の具体的数値基準（第１６条第３項）</strong>:</p>\n<p>日本の建築基準法（法第６条第１項）では、軽微な変更（法施行規則第３条の２）は計画変更の申請を要しない。ダッカ規則では「室の高さの変更が２０ｃｍ以内」であれば再承認不要としており、日本よりも具体的な数値による「軽微な変更」の基準が法文化されている。</p>\n<p>2. <strong>事後承認に対する高額な金銭的制裁（第１６条第６項）</strong>:</p>\n<p>ダッカ規則では、承認前の工事完了に対し「手数料の１０倍」という極めて具体的な金銭的ペナルティを課した上での事後承認を認めている。日本では無確認工事は原則として是正命令（法第９条）の対象となり、追認の仕組みがこれほど直接的に罰則付きで法文に明記されることは稀である。</p>\n<p>3. <strong>工事再開の届出義務（第１７条第５項）</strong>:</p>\n<p>中断していた工事を再開する際、１５日前までの通知を義務付けている。日本の建築基準法では工事の中断・再開に関する詳細な日数指定の通知義務は一般的ではなく、現場管理の透明性確保に対する要求がより強い。</p>\n<p>4. <strong>専門技術者交代時の工事停止義務（第１７条第６項）</strong>:</p>\n<p>監理者（専門技術者）が交代する際、後任が正式に責任を引き継ぐまで「工事を中断（Stay）」させる法的義務がある。日本の建築基準法でも監理者の変更届は必要だが、法文上で直ちに工事停止を命じる規定は非常に強力な規制である。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、設計図書の修正及び建築主等の責務に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．承認された設計図書に関し、内部の再配置のみを行う場合であれば、容積率（FAR）や住戸数に変更が生じる場合であっても、新たに承認を受ける必要はない。</p>\n<p>２．承認された計画において、居室の高さを １５センチメートル 変更しようとする場合、高さに関するその他の制限に適合しているときであっても、常に計画の修正承認を受けなければならない。</p>\n<p>３．確認済証の交付を受けた後であっても、建築主事（Authorised Officer）に通知することなく、現場における根切り（掘削）工事を開始することはできない。</p>\n<p>４．建築工事を監理する専門技術者を変更する場合、変更の日から ３０日 以内に所管行政庁へ通知すれば足り、その間も工事を継続することができる。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第１６条第２項により、容積率や住戸数に変更がある場合は、再承認が必要である。</p>\n<p>2. 誤り。第１６条第３項により、２０センチメートル以内の高さ変更で他の制限に適合する場合は、再承認は不要である。</p>\n<p><strong>3. 正しい。</strong> 第１７条第２項により、建築主事への通知なしの着工（根切り含む）は禁止されている。</p>\n<p>4. 誤り。第１７条第６項により、通知は１５日以内であり、かつ後任者が就任するまで工事は中断しなければならない。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13436","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>১৭। নির্মাণ সংশ্লিষ্ট বিষয়ে আবেদনকারী, কারিগরি ব্যক্তি ও অন্যান্যদের দায়িত্ব ও দায়িত্বে অবহেলা (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(৭) ইমারতের নকশা প্রণয়ন, ইমারত নির্মাণকাল, ইমারত নির্মাণ শেষে অথবা ব্যবহারের সময়ে ত্রুটিপূর্ণ নকশা বা ভুল তথ্য প্রদান, ডিজাইনে বর্ণিত স্পেসিফিকেশন হইতে অপেক্ষাকৃত নিম্নমানের নির্মাণ সামগ্রী ব্যবহার, নির্মাণ নকশার ব্যত্যয় করিয়া নির্মাণ কাজ পরিচালনা, নির্মাণ নকশায় বর্ণিত নির্মাণ সামগ্রী ব্যবহার না করিয়া নিম্নমানের নির্মাণ সামগ্রী ব্যবহারের কারণে নির্মাণজনিত ত্রুটি এবং অন্যান্য আনুষঙ্গিক ত্রুটির জন্য নিম্নবর্ণিত ব্যক্তি বা প্রতিষ্ঠান, স্ব স্ব দায়িত্বে অবহেলা ও সংশ্লিষ্ট নির্মাণ ত্রুটির জন্য দায়ী থাকিবেন, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) বিধি ৩৬ অনুসারে আবেদনকারীর সহিত চুক্তিবদ্ধ কারিগরি ব্যক্তি;</h6>\n<h6 class=\"h-lv6\">(খ) নির্মাণ তদারকিতে নিযুক্ত কারিগরি ব্যক্তি; এবং</h6>\n<h6 class=\"h-lv6\">(গ) ভবন মালিক, আবেদনকারী, ডেভেলপার বা ঠিকাদার।</h6>\n<h5 class=\"h-lv5\">(৮) ভূমির মালিকানা ও আবেদনকারী কর্তৃক দাখিলকৃত যেকোনো অসত্য তথ্যের জন্য আবেদনকারী দায়ী থাকিবেন।</h5>\n<h5 class=\"h-lv5\">(৯) ইমারত বা স্থাপনার স্থাপত্য, কাঠামোগত, ইলেকট্রিক্যাল, প্লাম্বিং, অগ্নি নিরাপত্তা, পরিকল্পনা প্রতিবেদনসহ যাবতীয় নকশার ডিজাইন পর্যাপ্ততা (<strong>design adequacy</strong>) ও উপযুক্ততার যাবতীয় দায়িত্বভার সংশ্লিষ্ট নকশা প্রণয়নকারী স্থপতি, প্রকৌশলী, ডিপ্লোমা স্থপতি/ ডিপ্লোমা প্রকৌশলী বা, ক্ষেত্রমত, পরিকল্পনাবিদের উপর বর্তাইবে।</h5>\n<h5 class=\"h-lv5\">(১০) ইমারত নির্মাণকালীন যেকোনো দুর্ঘটনা সংক্রান্ত ঝুঁকি প্রশমন করিবার লক্ষ্যে ইমারত মালিক, ডেভেলপার এবং ঠিকাদার নির্মাণ মেয়াদকালের জন্য বাধ্যতামূলক দায় বীমা গ্রহণ করিবেন এবং ইমারত নির্মাণ শেষে শিল্প, বাণিজ্যিক এবং এ্যাপার্টমেন্ট কমপ্লেক্স অকুপেন্সি টাইপ ইমারতের ক্ষেত্রে বসবাস বা ব্যবহার সনদ গ্রহণ সাপেক্ষে, ইমারতের ব্যবহার আরম্ভ হইতে অন্যূন ১০ (দশ) বৎসর পর্যন্ত যেকোনো দুর্ঘটনা সংক্রান্ত ঝুঁকি প্রশমন করিবার লক্ষ্যে ইমারত মালিক বাধ্যতামূলক দায় বীমা গ্রহণ করিবেন।</h5>\n<h5 class=\"h-lv5\">(১১) আবেদনকারী বা নিয়োজিত কারিগরি ব্যক্তি, কর্তৃপক্ষের পরিদর্শনের সময়, নিজ খরচে প্রয়োজনীয় তথ্য, ড্রইং ও নির্মাণ উপকরণ পরীক্ষার প্রতিবেদনসহ অন্যান্য প্রয়োজনীয় কাগজপত্র সরবরাহ করিবেন।</h5>\n<h5 class=\"h-lv5\">(১২) ইমারত বা স্থাপনার নকশা প্রণয়ন ও পর্যায়ভিত্তিক পরিদর্শন, নির্মাণ তদারকি অথবা কেবল নির্মাণ তদারকিতে নিযুক্ত কোনো কারিগরি ব্যক্তির ইমারত বা প্রকল্পের সহিত তাহার সংশ্লিষ্টতার মেয়াদ নির্মাণ কাজ সম্পূর্ণ হইবার পূর্বেই সমাপ্ত হইলে ১৫ (পনেরো) দিনের মধ্যে সম্পূর্ণ বা আংশিক কাজ তদারকি বিষয়ে লিখিতভাবে কর্তৃপক্ষকে অবহিত করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(১৩) ইমারত বা যেকোনো স্থাপনা নির্মাণ প্রকল্পের নকশা প্রণয়নে নিযুক্ত কোনো কারিগরি ব্যক্তি কর্তৃক প্রণীত নকশা কর্তৃপক্ষ কর্তৃক অনুমোদনের পর কারিগরি ব্যক্তিকে অবহিত না করিয়া নির্মাণ কাজ আরম্ভ করা হইলে অথবা নির্মাণকালে অনুমোদিত নকশার ব্যত্যয় করা হইলে সংশ্লিষ্ট কারিগরি ব্যক্তি অবিলম্বে আবেদনকারীকে লিখিতভাবে সতর্ক করিবেন এবং কর্তৃপক্ষকে অবহিত করিবেন।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第１７条（申請者、専門技術者等の責務及び義務の怠慢）（承前）</strong></h4>\n<h5 class=\"h-lv5\">７　建築物の設計、工事期間中、工事完了後若しくは使用期間中における不適切な設計若しくは虚偽の情報提供、指定仕様に満たない建築資材の使用、承認された設計図書に違反した工事の実施、又は承認された建築資材を使用せず低品質な建築資材を使用したことに起因する建築上の瑕疵その他の付随的な瑕疵については、次に掲げる者又は機関が、それぞれの職務の怠慢及び当該建築上の瑕疵について責任を負わなければならない。</h5>\n<h6 class=\"h-lv6\">ａ　第３６条の規定に基づき申請者と契約を締結した専門技術者（Technical person）</h6>\n<h6 class=\"h-lv6\">ｂ　工事監理（Construction supervision）に従事する専門技術者</h6>\n<h6 class=\"h-lv6\">ｃ　建築主、申請者、開発事業者（Developer）又は施工者</h6>\n<h5 class=\"h-lv5\">８　土地の所有権及び申請者が提出した一切の虚偽の情報については、申請者が責任を負わなければならない。</h5>\n<h5 class=\"h-lv5\">９　建築物又は工作物の意匠、構造、電気、給排水衛生設備、火災安全及び計画報告書を含む一切の設計図書の設計の妥当性（<strong>Design adequacy</strong>）及び適合性に関する一切の責任は、当該設計を作成した建築士、技術者（Engineer）、ディプロマ建築士若しくはディプロマ技術者又は、場合により、都市計画家に帰属するものとする。</h5>\n<h5 class=\"h-lv5\">１０　建築物の工事期間中の事故に関するリスクを軽減するため、建築主、開発事業者及び施工者は、工事期間中、賠償責任保険（Liability insurance）に強制的に加入しなければならない。</h5>\n<h6 class=\"h-lv6\">また、建築工事完了後において、工業、商業及び共同住宅（Apartment complex）の用途に供する建築物にあっては、使用許可証（Occupancy Certificate）を取得した上で、建築物の使用開始から少なくとも１０年間、事故に関するリスクを軽減するため、建築主は賠償責任保険に強制的に加入しなければならない。</h6>\n<h5 class=\"h-lv5\">１１　申請者又は選任された専門技術者は、所管行政庁（Authority）による検査の際、自己の費用負担により、必要な情報、図面、建築資材の試験報告書その他の必要な書類を提供しなければならない。</h5>\n<h5 class=\"h-lv5\">１２　設計、段階的な検査、工事監理又は工事監理のみに従事する専門技術者が、工事完了前に当該建築物又はプロジェクトとの関係を終了した場合は、１５日以内に、実施した全部又は一部の工事監理について書面により所管行政庁に通知しなければならない。</h5>\n<h5 class=\"h-lv5\">１３　設計に従事する専門技術者が作成した設計図書が所管行政庁により承認された後、当該専門技術者に通知することなく工事が着手された場合、又は工事期間中に承認された設計図書との不適合が生じた場合、関連する専門技術者は直ちに申請者に対して書面により警告し、かつ、所管行政庁に通知しなければならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>特定用途建築物における賠償責任保険の義務化（第１７条第１０項）</strong>:</p>\n<p>ダッカ規則では、建築主、開発事業者、施工者に対し、工事期間中の賠償責任保険（Liability insurance）への加入を義務付けている。さらに、工業・商業用ビルや共同住宅については、使用開始後１０年間の保険加入を建築主に義務付けている。日本では「住宅瑕疵担保履行法」等があるが、ダッカ規則はより広範な用途を対象とし、かつ「事故リスク」全般をカバーする保険を求めている点が特徴的である。</p>\n<p>2. <strong>設計の妥当性（Design adequacy）に関する専門職の直接責任（第１７条第９項）</strong>:</p>\n<p>意匠、構造、設備、計画報告書に至るすべての設計図書の「設計の妥当性」について、それぞれの資格者（建築士、技術者等）に直接的な法的責任を帰属させている。日本でも建築士法に基づき設計者の責任は問われるが、本規則のように各専門分野の責任範囲を法典上で直接マッピングする形式は、技術者の専門的判断に対する法的重みをより明文化したものである。</p>\n<p>3. <strong>技術者による「通報義務」の法制化（第１７条第１３項）</strong>:</p>\n<p>承認後に技術者への通知なく工事が開始されたり、計画との不適合が生じたりした場合、技術者が建築主に「書面で警告」し、さらには当局へ通知する義務がある。これは日本の建築士法第１８条（建築主に対する勧告等）に類似するが、ダッカ規則では「技術者に通知のない着工」そのものを技術者が通報対象とするなど、設計者の管理権限をより直接的に強制している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、建築主及び専門技術者等の責務に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．建築工事期間中に生じる事故のリスクを軽減するための賠償責任保険（Liability insurance）への加入は、建築主及び開発事業者の任意とされている。</p>\n<p>２．共同住宅（Apartment complex）の用途に供する建築物にあっては、建築主は、居住又は使用許可証を取得した後、建築物の使用開始から少なくとも １０年間、事故に関するリスクに備えた賠償責任保険への加入義務を負わなければならない。</p>\n<p>３．設計に従事する専門技術者は、承認された設計図書と実際の工事に不適合が生じた場合、直ちに建築主に対して口頭で警告を行えば足り、所管行政庁に通知する必要はない。</p>\n<p>４．建築物の構造設計の妥当性（Design adequacy）に関する責任は、すべて建築主が負うものとし、設計を行った専門技術者がその責任を負うことはない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。第１７条第１０項により、工事期間中の保険加入は義務である。</p>\n<p><strong>2. 正しい。</strong> 第１７条第１０項の規定通りである。</p>\n<p>3. 誤り。第１７条第１３項により、技術者は建築主に対し「書面（ লিখিতভাবে ）」で警告し、かつ、所管行政庁に「通知（ অবহিত ）」しなければならない。</p>\n<p>4. 誤り。第１７条第９項により、設計の妥当性に関する責任は、当該設計を作成した建築士、技術者等に帰属する。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13437","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>১৭। নির্মাণ সংশ্লিষ্ট বিষয়ে আবেদনকারী, কারিগরি ব্যক্তি ও অন্যান্যদের দায়িত্ব ও দায়িত্বে অবহেলা (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(১৪) উপ-বিধি (১৩) এর অধীন সতর্ক করা সত্ত্বেও আবেদনকারী নির্মাণ কাজ অব্যাহত রাখিলে কারিগরি ব্যক্তি বিষয়টি কর্তৃপক্ষকে এবং তাহার পেশাজীবী প্রতিষ্ঠানকে লিখিতভাবে অবহিত করিবেন এবং তিনি উক্ত নির্মাণ কাজে সংশ্লিষ্ট থাকিবেন না মর্মে আবেদনকারীকে লিখিতভাবে অবহিত করিবেন।</h5>\n<h5 class=\"h-lv5\">(১৫) নির্মাণ কাজ আংশিক বা সম্পূর্ণ সমাপনান্তে বসবাস বা ব্যবহার সনদ গ্রহণের জন্য নির্মাণ সমাপ্তি সনদ প্রদান করা পর্যন্ত কারিগরি ব্যক্তির দায়িত্বের সংশ্লিষ্টতা থাকিবে।</h5>\n<h5 class=\"h-lv5\">(১৬) নিম্নবর্ণিত কার্যাবলি কারিগরি ব্যক্তির দায়িত্বে অবহেলা হিসাবে গণ্য হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) কারিগরি ব্যক্তির তত্ত্বাবধানে ইমারত বা স্থাপনা নির্মাণে কর্তৃপক্ষ কর্তৃক অনুমোদিত নকশার কোনো ব্যত্যয়;</h6>\n<h6 class=\"h-lv6\">(খ) কর্তৃপক্ষ কর্তৃক অনুমোদিত নকশা, যেমন- স্থাপত্য নকশা, কাঠামো নকশা ও অন্যান্য সার্ভিস ড্রইং, ইত্যাদি সম্পর্কিত ভুল তথ্য প্রদান;</h6>\n<h6 class=\"h-lv6\">(গ) অগ্নি-প্রতিরোধক অথবা অনান্য নিরাপত্তা ব্যবস্থা সম্পর্কিত ভুল তথ্য প্রদান;</h6>\n<h6 class=\"h-lv6\">(ঘ) পরিকল্পনা প্রতিবেদনে ভুল তথ্য প্রদান; এবং</h6>\n<h6 class=\"h-lv6\">(ঙ) নির্মাণ অনুমোদন কমিটিকে অসৎ উদ্দেশ্যে প্রভাবিতকরণ।</h6>\n<h4 class=\"h-lv4\"><strong>১৮। কারিগরি ব্যক্তি ও আবেদনকারীর মধ্যে বিরোধ নিষ্পত্তি।</strong></h4>\n<h5 class=\"h-lv5\">(১) কারিগরি ব্যক্তি ও আবেদনকারীর মধ্যে নির্মাণ সংশ্লিষ্ট বিষয়ে কোনো বিরোধ সৃষ্টি হইলে সংশ্লিষ্ট পেশাজীবী প্রতিষ্ঠানের মাধ্যমে নিষ্পত্তি করিয়া কর্তৃপক্ষকে অবহিত না করা পর্যন্ত নির্মাণ কাজ স্থগিত থাকিবে।</h5>\n<h5 class=\"h-lv5\">(২) উপ-বিধি (১) এর অধীন পেশাজীবী প্রতিষ্ঠানের মাধ্যমে ৩০ (ত্রিশ) দিনের মধ্যে বিরোধ নিষ্পত্তি করা সম্ভব না হইলে উক্ত বিরোধ কর্তৃপক্ষ কর্তৃক নিষ্পত্তি করা হইবে এবং এই ক্ষেত্রে কর্তৃপক্ষের সিদ্ধান্ত চূড়ান্ত বলিয়া গণ্য হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>১৯। নির্মাণ প্রকল্পের তদারকি।</strong></h4>\n<h5 class=\"h-lv5\">(১) আবেদনকারী কর্তৃক নিয়োজিত কারিগরি ব্যক্তি তাহার স্বাক্ষরসহ কর্তৃপক্ষ কর্তৃক অনুমোদিত চেকলিস্ট অনুযায়ী স্থাপনা ও প্রকল্পের নির্মাণকাজ তদারকি প্রতিবেদন কর্তৃপক্ষ বরাবর দাখিল করিবেন।</h5>\n<h5 class=\"h-lv5\">(২) উপ-বিধি (১) এ উল্লিখিত প্রতিবেদনে কারিগরি ব্যক্তি এই মর্মে প্রত্যয়ন করিবেন যে,—</h5>\n<h6 class=\"h-lv6\">(ক) যে সকল ছবি, তথ্য ও প্রতিবেদন জমা দেওয়া হইয়াছে তাহা সম্পন্ন নির্মাণ কাজের সত্য ও সঠিক চিত্র; এবং</h6>\n<h6 class=\"h-lv6\">(খ) কাজটি আইন, অনুমোদিত নকশা, কোড এবং এই বিধিমালা অনুযায়ী সম্পন্ন হইয়াছে।</h6>\n<h5 class=\"h-lv5\">(৩) উপ-বিধি (১) এ উল্লিখিত প্রতিবেদনে কারিগরি ব্যক্তি কর্তৃক পরবর্তীতে প্রতিবেদনের ভুল-ত্রুটি গোচরীভূত হইলে তিনি অনুরূপ ভুল সংশোধন করিবার বিষয়ে ব্যবস্থা গ্রহণ করিবেন।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第１７条（申請者、専門技術者等の責務及び義務の怠慢）（承前）</strong></h4>\n<h5 class=\"h-lv5\">１４　前項の規定による警告にもかかわらず、申請者が建築工事を継続する場合、専門技術者は、その旨を所管行政庁及び所属する職能団体に書面により通知しなければならない。また、当該建築工事への関与を終了する旨を申請者に書面により通知しなければならない。</h5>\n<h5 class=\"h-lv5\">１５　専門技術者の責任範囲は、建築工事の全部又は一部の完了後、使用許可証（Occupancy Certificate）を取得するための工事完了証明書を交付するまで継続するものとする。</h5>\n<h5 class=\"h-lv5\">１６　次に掲げる行為は、専門技術者の職務怠慢とみなす。</h5>\n<h6 class=\"h-lv6\">ａ　専門技術者の監理下にある建築物又は工作物の建築において、所管行政庁により承認された設計図書に違反すること。</h6>\n<h6 class=\"h-lv6\">ｂ　意匠設計図、構造設計図、設備図その他の承認された設計図書に関し、不実の情報を提供すること。</h6>\n<h6 class=\"h-lv6\">ｃ　耐火構造その他の安全対策に関し、不実の情報を提供すること。</h6>\n<h6 class=\"h-lv6\">ｄ　計画報告書において不実の情報を提供すること。</h6>\n<h6 class=\"h-lv6\">ｅ　不当な目的をもって建設承認委員会を働きかけること。</h6>\n<h4 class=\"h-lv4\"><strong>第１８条（専門技術者と申請者の間の紛争解決）</strong></h4>\n<h5 class=\"h-lv5\">１　専門技術者と申請者の間に建築関連の事項に関する紛争が生じた場合、関連する職能団体を通じて解決を図り、その旨を所管行政庁に通知するまでの間、当該建築工事を中断しなければならない。</h5>\n<h5 class=\"h-lv5\">２　前項の規定に基づき職能団体を通じて３０日以内に紛争が解決されないときは、所管行政庁が当該紛争を裁決するものとし、この場合における所管行政庁の決定は最終的なものとみなす。</h5>\n<h4 class=\"h-lv4\"><strong>第１９条（建築工事の監理）</strong></h4>\n<h5 class=\"h-lv5\">１　申請者により選任された専門技術者は、自ら署名した上で、所管行政庁により承認された点検表（Checklist）に従い、工作物及びプロジェクトの工事監理報告書を所管行政庁に提出しなければならない。</h5>\n<h5 class=\"h-lv5\">２　前項の報告書において、専門技術者は次に掲げる事項を証明しなければならない。</h5>\n<h6 class=\"h-lv6\">ａ　提出された写真、情報及び報告書が、完了した建築工事の真実かつ正確な状況を示すものであること。</h6>\n<h6 class=\"h-lv6\">ｂ　当該工事が法、承認された設計図書、法典（Code）及び本規則に準拠して完了したこと。</h6>\n<h5 class=\"h-lv5\">３　第１項の報告書において後に誤りが判明した場合、専門技術者は速やかに当該誤りを修正するための措置を講じなければならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>専門職紛争による工事の法的停止（第１８条第１項）</strong>:</p>\n<p>ダッカ規則では、建築主（申請者）と監理者（専門技術者）の間に紛争が生じた場合、職能団体による解決がなされるまで「建築工事の中断（ stay ）」を法的に義務付けている。日本の建築基準法や建築士法には、民事上の紛争を理由に工事を強制停止させる直接の規定はなく、本規則は専門技術者の管理権限と地位を法的に極めて強力に保護している。</p>\n<p>2. <strong>職能団体（Professional Body）への公的な役割付与（第１８条）</strong>:</p>\n<p>紛争解決の第一義的な場を、行政ではなく「職能団体」としている点が特徴的である。日本では建築士会等が紛争相談を受けることはあるが、ダッカ規則のように「団体による解決」を工事再開の法的条件とし、解決不能な場合のみ行政が最終裁決を行うというステップは、専門家の自律性を制度設計に深く組み込んでいる。</p>\n<p>3. <strong>工事監理報告書における「写真の真実性」の証明義務（第１９条第２項）</strong>:</p>\n<p>工事監理報告書において、提出する写真が「完了した工事の真実かつ正確な状況」であることを、技術者が法的に「証明」することを求めている。日本の完了検査（法第７条）でも写真提出は実務上不可欠だが、ダッカ規則では写真の改ざん防止や証拠能力の担保を、技術者の主要な法的義務として直接明文化している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、専門技術者の義務及び工事管理に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．専門技術者が、承認された設計図書に違反した工事を申請者が行っていることを発見し警告した場合において、申請者がなお工事を継続するときは、口頭で所管行政庁にその旨を伝えれば足りる。</p>\n<p>２．専門技術者と申請者の間に建築工事に関する紛争が生じた場合、専門職団体による解決が図られるまでの間であっても、構造上の安全が確保されていれば工事を継続することができる。</p>\n<p>３．工事監理に従事する専門技術者は、所管行政庁が承認した点検表（Checklist）に基づいて工事監理報告書を作成し、提出しなければならない。</p>\n<p>４．専門技術者が提出した工事監理報告書に誤りがあることが後に判明した場合、当該報告書は無効となるため、修正を行うことは認められない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第１７条第１４項により、所管行政庁及び職能団体に対して「書面」により通知しなければならない。</p>\n<p>2. 誤り。第１８条第１項により、紛争が解決されるまでの間は工事を中断しなければならない。</p>\n<p><strong>3. 正しい。</strong> 第１９条第１項の規定通りである。</p>\n<p>4. 誤り。第１９条第３項により、誤りが判明した場合には、専門技術者は当該誤りを修正するための措置を講じなければならない。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13438","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>১৯। নির্মাণ প্রকল্পের তদারকি (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(৪) ইমারত বা স্থাপনা নির্মাণকালে কর্তৃপক্ষ কর্তৃক নির্ধারিত ফরম বা পদ্ধতি অনুসারে পর্যায়ক্রমে নিম্নবর্ণিত প্রতিবেদন জমা প্রদান করিতে হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) ভিত্তি (foundation) নির্মাণ আরম্ভের প্রাক্কালে ও নির্মাণের পর এতদসংশ্লিষ্ট প্রতিবেদন;</h6>\n<h6 class=\"h-lv6\">(খ) প্রিন্থ লেভেল এবং প্রত্যেকটি তলা ও ছাদ লেভেল নির্মাণের পর এতদসংশ্লিষ্ট প্রতিবেদন;</h6>\n<h6 class=\"h-lv6\">(গ) ইলেকট্রিক্যাল বা ইলেকট্রো মেকানিক্যাল, পানি সরবরাহ ও পয়ঃনিষ্কাশন ব্যবস্থা (plumbing system) এর সংকটপূর্ণ পর্যায় (critical phase) সম্পন্ন হইবার পর এতদসংশ্লিষ্ট প্রতিবেদন; এবং</h6>\n<h6 class=\"h-lv6\">(ঘ) নির্মাণকাজ সম্পন্ন হইবার পর এতদসংশ্লিষ্ট প্রতিবেদন।</h6>\n<h5 class=\"h-lv5\">(৫) অনুমোদিত নকশা ও এই বিধিমালা অনুযায়ী সংশ্লিষ্ট নির্মাণ সম্পন্ন করা না হইলে কর্তৃপক্ষ প্রচলিত আইন এবং এই বিধিমালা অনুযায়ী সংশ্লিষ্টদের বিরুদ্ধে প্রয়োজনীয় ব্যবস্থা গ্রহণ করিবে।</h5>\n<h5 class=\"h-lv5\">(৬) নির্মাণ সংশ্লিষ্ট কারিগরি ব্যক্তি ভুল বা অসত্য তথ্য বা কাগজপত্র জমা প্রদান করিলে বা জমাদানের পর উক্ত অসত্য ও ভুল তথ্য সম্পর্কে অবগত হইবার পর তাহা সংশোধন করিতে অনিচ্ছুক বা ব্যর্থ হইলে, কর্তৃপক্ষ সংশ্লিষ্ট কারিগরি ব্যক্তির কার্যক্রম স্থগিত রাখিতে পারিবে অথবা আইনানুগ ব্যবস্থা গ্রহণ করিবে, এবং তাহার বিরুদ্ধে সদস্য পদ বাতিল বা স্থগিতের নিমিত্ত ব্যবস্থা গ্রহণের লক্ষ্যে সংশ্লিষ্ট পেশাজীবী সংগঠনকে বিষয়টি অবহিত করিবে।</h5>\n<h4 class=\"h-lv4\"><strong>২০। নির্মাণ সংশ্লিষ্ট নিরাপত্তা।</strong></h4>\n<h5 class=\"h-lv5\">(১) নির্মাণ কাজের ফলে কোনো রাস্তায় বা স্থানে জনসাধারণের জন্য বাধা, বিপত্তি অথবা অসুবিধা সৃষ্টি হইলে আবেদনকারী কর্তৃক উক্ত স্থানে অস্থায়ী ঘের, জীবনরক্ষাকারী বাধা (Shield) এবং বিকল্প চলাচল পথ তৈরি করিয়া জনসাধারণের নিরাপত্তা নিশ্চিত করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(২) নির্মাণ প্রকল্পের দ্রব্যাদি ও জিনিসপত্র জনপথে কিংবা ফুটপাতে রাখিয়া জনসাধারণের চলাচলে অসুবিধা সৃষ্টি অথবা দিবারাত্রির কোনো সময়ই সাইটে পাথর বা খোয়া ভাঙ্গানো মেশিন ব্যবহার করা যাইবে না।</h5>\n<h5 class=\"h-lv5\">(৩) আবাসিক এলাকায় সন্ধ্যা ৬টা হইতে সকাল ৬টা পর্যন্ত কোনো যন্ত্রপাতি ব্যবহার বা নির্মাণ পদ্ধতির মাধ্যমে নির্মাণ সাইট বা প্রকল্পস্থলে বিরক্তিকর কোনো আওয়াজ বা কোডে বর্ণিত গ্রহণযোগ্য মাত্রার অধিক শব্দের সৃষ্টি করা যাইবে না।</h5>\n<h5 class=\"h-lv5\">(৪) উপ-বিধি (২) হইতে (৩) এ বর্ণিত বিধানের ব্যত্যয় ঘটিলে কর্তৃপক্ষ আবেদনকারী কিংবা নির্মাতা প্রতিষ্ঠানের বিরুদ্ধে আইনানুগ ব্যবস্থা গ্রহণ করিতে পারিবে।</h5>\n<h5 class=\"h-lv5\">(৫) বিদ্যমান আইন, বিধিমালা, এবং সরকার কর্তৃক, সময় সময়, প্রণীত বিধি-বিধান অনুযায়ী নিরাপত্তা সংক্রান্ত সকল বিধান যথাযথভাবে অনুসরণ করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৬) নির্মাণ প্রকল্পে নিয়োজিত শ্রমিক ও কারিগরি ব্যক্তিবর্গের সুরক্ষার নিমিত্ত কোডে উল্লিখিত শর্তাবলির বাস্তবায়ন নিশ্চিত করিতে হইবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第１９条（建築工事の監理）（承前）</strong></h4>\n<h5 class=\"h-lv5\">４　建築物又は工作物の工事期間中、所管行政庁（Authority）が定める様式又は方法に従い、段階的に次に掲げる報告書を提出しなければならない。</h5>\n<h6 class=\"h-lv6\">ａ　基礎（Foundation）工事の着手前及び完了後の関連報告書</h6>\n<h6 class=\"h-lv6\">ｂ　土台面（Plinth Level）並びに各階の床及び屋根の施工後の関連報告書</h6>\n<h6 class=\"h-lv6\">ｃ　電気、電気機械、給排水衛生設備（Plumbing System）の重要段階（Critical Phase）完了後の関連報告書</h6>\n<h6 class=\"h-lv6\">ｄ　建築工事完了後の関連報告書</h6>\n<h5 class=\"h-lv5\">５　承認された設計図書及び本規則に従って工事が実施されない場合、所管行政庁は現行の法律及び本規則に基づき、関係者に対して必要な措置を講ずるものとする。</h5>\n<h5 class=\"h-lv5\">６　建築に関連する専門技術者が誤り若しくは虚偽の情報若しくは書類を提出した場合、又は提出後に当該情報の誤りを認識しながら修正を拒否若しくは修正に失敗した場合、所管行政庁は当該技術者の活動を停止させ、又は法的措置を講じることができる。また、当該技術者の会員資格の取消し又は停止のための措置を講じるよう、関連する職能団体に通知するものとする。</h5>\n<h4 class=\"h-lv4\"><strong>第２０条（建築工事に関連する安全）</strong></h4>\n<h5 class=\"h-lv5\">１　建築工事によって道路又は公共の場所において公衆に妨害、危険又は不便が生じる場合は、申請者は当該場所に仮囲い、防護壁（Shield）及び迂回路を設けることで、公衆の安全を確保しなければならない。</h5>\n<h5 class=\"h-lv5\">２　工事用資材を公道又は歩道に置いて公衆の通行を妨げてはならない。また、昼夜を問わず、現場内で砕石機を使用してはならない。</h5>\n<h5 class=\"h-lv5\">３　住宅地域においては、午後６時から午前６時までの間、いかなる機械の使用若しくは建築工法を通じても、不快な騒音又は法典（Code）に定める許容限度を超える騒音を発生させてはならない。</h5>\n<h5 class=\"h-lv5\">４　第２項又は第３項の規定に違反した場合、所管行政庁は申請者又は施工会社に対して法的措置を講じることができる。</h5>\n<h5 class=\"h-lv5\">５　現行の法律、規則、及び政府が随時制定する諸規定に基づく安全に関する全ての条項を適切に遵守しなければならない。</h5>\n<h5 class=\"h-lv5\">６　建築プロジェクトに従事する労働者及び専門技術者の保護のため、法典に掲げられた条件の履行を確保しなければならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>多段階報告義務（第１９条第４項）</strong>:</p>\n<p>ダッカ規則では、基礎、土台、各階、さらには設備（MEP）の重要段階ごとに報告書の提出を義務付けていている。日本の建築基準法第７条の３（特定工程の指定）に基づく「中間検査」に類似するが、ダッカ規則では設備の重要段階まで報告対象に含めており、目視が困難になる前のプロセス管理をより細密に規定している点が特徴的である。</p>\n<p>2. <strong>現場の騒音制限（第２０条第３項）</strong>:</p>\n<p>住宅地域における夜間（午後６時〜午前６時）の建築騒音を、建築規則の本体で明文禁止している。日本では「騒音規制法」等の環境法令や地方自治体の条例で規制される事項だが、ダッカ規則はこれを確認済証の付帯的義務として建築法規内に直接取り込み、所管行政庁による即時執行を可能にしている。</p>\n<p>3. <strong>石材粉砕の禁止（第２０条第２項）</strong>:</p>\n<p>現場内での「砕石機（ stone crushing machine ）」の使用を昼夜問わず禁止している。これは、現場でレンガや石を砕く工程が騒音・粉塵の大きな原因となっている現地の実態を反映したものであり、日本の都市部における工業製品化された資材搬入を前提とした実務とは異なる、独自の環境・安全規制である。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、建築工事中の報告及び安全管理に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．建築工事が完了した際には、工事監理報告書を提出すれば足り、電気設備や給排水設備の重要段階（critical phase）における個別報告は任意とされている。</p>\n<p>２．住宅地域における建築工事において、騒音が発生する機械の使用は、日中の作業であれば制限されることはないが、午後１０時から午前６時までは一律に禁止される。</p>\n<p>３．建築工事に関連して公道に資材を一時保管することで公衆の通行を妨げることは、昼間に限り、所管行政庁への届出なしに行うことができる。</p>\n<p>４．建築物に従事する専門技術者が虚偽の報告書を提出し、かつその修正を拒否した場合、所管行政庁は当該技術者の活動を停止させるほか、所属する職能団体へその旨を通知して処分を求めることができる。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：４</strong></p>\n<p>1. 誤り。第１９条第４項（গ）により、設備関係の重要段階完了後の報告は義務である。</p>\n<p>2. 誤り。第２０条第３項により、騒音制限は「午後６時（ সন্ধ্যা ৬টা ）」から適用される。</p>\n<p>3. 誤り。第２０条第２項により、公衆の不便となる資材の公道保管は禁止されている。</p>\n<p><strong>4. 正しい。</strong> 第１９条第６項の規定通りである。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13439","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>২১। নির্মাণ কাজ স্থগিতকরণ অথবা অননুমোদিত কাঠামো ভাঙিয়া দেওয়া, ইত্যাদি।</strong></h4>\n<h5 class=\"h-lv5\">(১) কর্তৃপক্ষ নিম্নবর্ণিত ক্ষেত্রে নির্মাণ কাজ স্থগিত, ইউটিলিটি সংযোগ বিচ্ছিন্নকরণ, সঠিক পদ্ধতি প্রয়োগ অথবা কাঠামো ভাঙ্গিবার আদেশ প্রদান করিতে পারিবে, যদি—</h5>\n<h6 class=\"h-lv6\">(ক) কর্তৃপক্ষ কর্তৃক অনুমোদিত নকশার ব্যত্যয় করা হয়;</h6>\n<h6 class=\"h-lv6\">(খ) কর্তৃপক্ষের অনুমোদন ব্যতিরেকে ইমারত নির্মাণ কাজ করা হয়;</h6>\n<h6 class=\"h-lv6\">(গ) যেকোনো পর্যায়ে অনুমোদিত নকশা বহির্ভূত নির্মাণ কাজ গোচরীভূত হয়;</h6>\n<h6 class=\"h-lv6\">(ঘ) কর্তৃপক্ষকে বিধি মোতাবেক অবহিতকরণ ব্যতিরেকে নির্মাণ কাজ আরম্ভ বা পরিচালনা করা হয়;</h6>\n<h6 class=\"h-lv6\">(ঙ) পরিকল্পনা অনুমোদনপত্র ও নির্মাণ অনুমোদনপত্রের নিয়ম ও শর্তসমূহ লঙ্ঘন করা হয়;</h6>\n<h6 class=\"h-lv6\">(চ) নির্মাণ কাজ চলাকালে পার্শ্ববর্তী জনগণের জীবন ও ধন-সম্পত্তির ক্ষতিসহ পরিবেশের জন্য হুমকি ও ঝুঁকিপূর্ণ হয়।</h6>\n<h5 class=\"h-lv5\">(২) নির্মাণ অনুমোদনপত্র স্থগিত বা বাতিল করা যাইবে, যদি—</h5>\n<h6 class=\"h-lv6\">(ক) সংশ্লিষ্ট জমি বা প্লটের বিষয়ে কোনো আইনগত জটিলতা দেখা দেয়;</h6>\n<h6 class=\"h-lv6\">(খ) অনুমোদনের শর্তাবলি ভঙ্গ করা হয়;</h6>\n<h6 class=\"h-lv6\">(গ) আবেদনপত্র বা অন্যান্য প্রযোজ্য ফরমসমূহে ভুল অথবা মিথ্যা তথ্য পরিবেশন করা হয়;</h6>\n<h6 class=\"h-lv6\">(ঘ) অনুমোদন গ্রহণের পর ব্যবহারের ধরন পরিবর্তন করা হয়;</h6>\n<h6 class=\"h-lv6\">(ঙ) নির্মাণ কাজ চলাকালে পার্শ্ববর্তী জনগণের জীবন ও ধন-সম্পত্তির ক্ষতিসহ পরিবেশের জন্য হুমকি ও ঝুঁকিপূর্ণ হয়।</h6>\n<h5 class=\"h-lv5\">(৩) কোনো ইমারতের অনুমোদিত নকশা বাতিল বা স্থগিত করা হইলে কর্তৃপক্ষ কর্তৃক তাহা আইন প্রয়োগকারী সংস্থা, সেবাদানকারী প্রতিষ্ঠান, বিধি বহির্ভূত নকশা প্রণয়নকারীর বিরুদ্ধে প্রয়োজনীয় ব্যবস্থা গ্রহণের নিমিত্ত সংশ্লিষ্ট পেশাজীবী প্রতিষ্ঠান এবং, প্রযোজ্য ক্ষেত্রে, ব্যাংক বা অর্থ বিনিয়োগকারী প্রতিষ্ঠানকে ৩০ (ত্রিশ) দিনের মধ্যে অবহিত করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৪) যে সকল ইমারতের অনুমোদিত নকশা বাতিল বা স্থগিত করা হয় সেই সকল ইমারতে কোনো রূপ সেবা প্রদান না করিবার জন্য অথবা ইতোমধ্যে প্রদত্ত সেবা প্রত্যাহার করিবার জন্য কর্তৃপক্ষ সংশ্লিষ্ট সেবাদানকারী প্রতিষ্ঠানকে অবহিত করিবে।</h5>\n<h4 class=\"h-lv4\"><strong>২২। বসবাস বা ব্যবহার সনদ।</strong></h4>\n<h5 class=\"h-lv5\">(১) ইমারত বা স্থাপনার নির্মাণের পর বসবাস বা ব্যবহারের জন্য বসবাস বা ব্যবহার সনদ গ্রহণ করিতে হইবে:</h5>\n<h6 class=\"h-lv6\"><strong>তবে শর্ত থাকে যে,</strong> ইমারত বা স্থাপনার আংশিক অংশের বসবাস বা ব্যবহারের জন্যও সনদ গ্রহণ করিতে হইবে।</h6>\n<h5 class=\"h-lv5\">(২) পরিশিষ্ট ৪ এ বর্ণিত ফি প্রদান সাপেক্ষে, কর্তৃপক্ষের নিকট বসবাস বা ব্যবহার সনদের আবেদন করিতে হইবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第２１条（建築工事の停止又は無許可構造物の除却等）</strong></h4>\n<h5 class=\"h-lv5\">１　所管行政庁（特定行政庁）は、次の各号のいずれかに該当する場合において、工事の停止、公共設備（ユーティリティ）接続の遮断、是正措置の実施、又は構造物の除却（解体）を命ずることができる。</h5>\n<h6 class=\"h-lv6\">一　承認された設計図書に違反したとき。</h6>\n<h6 class=\"h-lv6\">二　所管行政庁の承認を受けずに建築工事を行ったとき。</h6>\n<h6 class=\"h-lv6\">三　いかなる段階においても、承認された設計図書外の工事が判明したとき。</h6>\n<h6 class=\"h-lv6\">四　本規則に基づく通知を行わずに工事に着手し、又は実施したとき。</h6>\n<h6 class=\"h-lv6\">五　計画承認書又は確認済証（Construction Permit）の規定及び条件に違反したとき。</h6>\n<h6 class=\"h-lv6\">六　工事の実施により、隣接住民の生命若しくは財産に損害を与え、又は環境に対する脅威若しくは危険が生じたとき。</h6>\n<h5 class=\"h-lv5\">２　次の各号のいずれかに該当するときは、確認済証を停止し、又は取り消すことができる。</h5>\n<h6 class=\"h-lv6\">一　当該土地又は敷地に関して法的紛争が生じたとき。</h6>\n<h6 class=\"h-lv6\">二　承認の条件に違反したとき。</h6>\n<h6 class=\"h-lv6\">三　申請書又はその他の様式において、誤り又は虚偽の情報を提供したとき。</h6>\n<h6 class=\"h-lv6\">四　承認取得後に、用途（使用の形態）を変更したとき。</h6>\n<h6 class=\"h-lv6\">五　工事の実施により、隣接住民の生命若しくは財産に損害を与え、又は環境に対する脅威若しくは危険が生じたとき。</h6>\n<h5 class=\"h-lv5\">３　建築物の設計承認が取り消され、又は停止された場合、所管行政庁は３０日以内に、法執行機関、供給事業者（サービス提供機関）、違反設計を行った者に対する処分を求めるための関連専門職団体、及び、適用がある場合において、銀行又は金融機関に対し、その旨を通知しなければならない。</h5>\n<h5 class=\"h-lv5\">４　設計承認が取り消され、又は停止された建築物について、所管行政庁は関連する供給事業者に対し、一切のサービスの提供を行わないよう、又は既に提供されているサービスを停止するよう通知するものとする。</h5>\n<h4 class=\"h-lv4\"><strong>第２２条（居住又は使用許可証）</strong></h4>\n<h5 class=\"h-lv5\">１　建築物又は工作物の完了後、これを使用し、又は居住しようとする者は、居住又は使用許可証（Occupancy Certificate）を取得しなければならない。</h5>\n<h6 class=\"h-lv6\"><strong>ただし、</strong> 建築物又は工作物の一部を使用し、又は居住しようとする場合であっても、当該部分について許可証を取得しなければならない。</h6>\n<h5 class=\"h-lv5\">２　付録４に定める手数料を納付の上、所管行政庁に対し居住又は使用許可証を申請しなければならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>ライフライン遮断による強力な是正措置（第２１条第４項）</strong>:</p>\n<p>ダッカ規則では、違反建築物に対し、所管行政庁が電気・ガス・水等のサービス提供停止を事業者に命じ、あるいは供給を遮断する権限が明文化されている。日本の建築基準法（法第９条第１０項）でも電気・ガス等の供給停止要請は可能だが、ダッカ規則は「サービスの完全な停止・撤回」を設計取消とセットで即座に連動させる極めて強力な執行体制をとっている。</p>\n<p>2. <strong>金融機関及び職能団体への通報（第２１条第３項）</strong>:</p>\n<p>設計承認の取消時に、法執行機関だけでなく「銀行」や「建築士会（専門職団体）」へ３０日以内に通知する義務を定めている。これは、違反建築に対する経済的ペナルティ（融資停止）と技術者の資格制限を連動させる、多角的な違反抑制システムである。</p>\n<p>3. <strong>部分使用許可の厳格化（第２２条第１項）</strong>:</p>\n<p>建築物の「一部」であっても、許可証なしに使用・居住することを禁じている。日本の建築基準法第７条の６（検査済証交付前の使用制限）における「仮使用認定」に近い概念だが、ダッカ規則では「アパートの一部分（partial occupancy）」であっても正式な証明書（sanad）の取得を前提としており、完了確認の徹底を優先している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における違反建築物への措置及び使用許可に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．建築物の確認済証が取り消された場合、所管行政庁は、当該建築物への電気や水等のサービスの提供を継続するよう、供給事業者に指示しなければならない。</p>\n<p>２．建築物の工事完了後、当該建築物の一部のみを居住の用に供する場合にあっては、居住又は使用許可証（Occupancy Certificate）の取得を省略することができる。</p>\n<p>３．所管行政庁は、設計承認を取り消したときは、３０日以内に、その旨を銀行や関連する専門職団体等へ通知しなければならない。</p>\n<p>４．建築工事の着手に際し、所管行政庁への通知（obahitokoron）を怠った場合であっても、設計図書を遵守している限りにおいて、工事の停止を命じられることはない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第２１条第４項により、サービスの停止又は提供済みのサービスの撤回を通知するものとされている。</p>\n<p>2. 誤り。第２２条第１項の但書きにより、一部の使用であっても許可証の取得が義務付けられている。</p>\n<p><strong>3. 正しい。</strong> 第２１条第３項の規定通りである。</p>\n<p>4. 誤り。第２１条第１項（ঘ）により、通知なしの着工は工事停止命令の対象となる。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13440","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>২২। বসবাস বা ব্যবহার সনদ (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(৩) অথরাইজড অফিসার উপ-বিধি (২) এর অধীন আবেদন প্রাপ্তির ১৫ (পনেরো) কার্যদিবসের মধ্যে আবেদনকারী ও কারিগরি ব্যক্তির উপস্থিতিতে ইমারতটি পরিদর্শন করিবেন।</h5>\n<h5 class=\"h-lv5\">(৪) উপ-বিধি (৩) এর অধীন পরিদর্শনের ক্ষেত্রে নিম্নবর্ণিত প্রতিবেদন ও কাগজাদি বিবেচনা করিতে হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) ভিত্তি, প্রিন্থ লেভেল এবং প্রত্যেকটি ফ্লোর ও রুফ লেভেলের আংশিক নির্মাণ সমাপ্তির প্রতিবেদন;</h6>\n<h6 class=\"h-lv6\">(খ) অনুমোদিত নকশা অনুসরণপূর্বক নির্মাণ কাজটি সম্পন্ন হইয়াছে এবং নির্মাণ কাজ সঠিক রহিয়াছে মর্মে নির্মাণ তদারককারী কারিগরি ব্যক্তি বা, ক্ষেত্রমত, নির্মাণকারী প্রতিষ্ঠান কর্তৃক স্বাক্ষরিত তদারকি প্রতিবেদন ও প্রত্যয়নপত্র;</h6>\n<h6 class=\"h-lv6\">(গ) প্রযোজ্য ক্ষেত্রে, ইমারতের নির্মিত নকশা।</h6>\n<h5 class=\"h-lv5\">(৫) উপ-বিধি (৪) এ উল্লিখিত পরিদর্শন প্রতিবেদন ও অন্যান্য কাগজপত্র, পরিষেবা, কাঠামোগত নিরাপত্তা, অগ্নি নিরাপত্তা ও পরিকল্পনা সংশ্লিষ্ট প্রয়োজনীয় শর্তাবলি পর্যালোচনপূর্বক অথরাইজড অফিসার আবেদনের তারিখ হইতে ৩০ (ত্রিশ) দিনের মধ্যে আবেদন অনুমোদন বা, ক্ষেত্রমত, প্রত্যাখ্যান করিতে পারিবেন:</h5>\n<h6 class=\"h-lv6\"><strong>তবে শর্ত থাকে যে,</strong> কোনো আবেদন প্রত্যাখ্যান করিতে হইলে দায় দায়িত্ব নিরূপণসহ প্রত্যাখ্যান করিতে হইবে।</h6>\n<h5 class=\"h-lv5\">(৬) বসবাস বা ব্যবহার সনদ ইমারত বা স্থাপনার চূড়ান্ত অনুমোদন বলিয়া গণ্য হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>২৩। বসবাস বা ব্যবহার সনদ প্রত্যাখ্যানের বিরুদ্ধে আপিল।</strong></h4>\n<h5 class=\"h-lv5\">(১) কোনো বসবাস বা ব্যবহার সনদ আবেদন প্রত্যাখ্যান করা হইলে, আবেদনকারী উক্তরূপে প্রত্যাখ্যাত হইবার ৩০ (ত্রিশ) দিনের মধ্যে পরিশিষ্ট ৪ এ বর্ণিত ফি পরিশোধ সাপেক্ষে, আপিল কমিটি বরাবর আপিল আবেদন করিতে পারিবে।</h5>\n<h5 class=\"h-lv5\">(২) উপ-বিধি (১) এর অধীন কোনো আপিল আবেদন প্রাপ্তির পর আপিল কমিটি, উপ-বিধি (৪) ও (৫) এর বিধান সাপেক্ষে, ৩০ (ত্রিশ) দিনের মধ্যে আপিল আবেদনের বিষয়ে সিদ্ধান্ত গ্রহণ করিবে।</h5>\n<h5 class=\"h-lv5\">(৩) উপ-বিধি (২) অনুযায়ী আপিল নিষ্পত্তির ক্ষেত্রে আপিল কমিটি আইনি স্পষ্টতা ও অধিকতর সিদ্ধান্তের জন্য বিষয়টি নগর উন্নয়ন কমিটিতে প্রেরণ করিতে পারিবে।</h5>\n<h5 class=\"h-lv5\">(৪) উপ-বিধি (২) এ যাহা কিছুই থাকুক না কেন, নগর উন্নয়ন কমিটি উপ-বিধি (৩) এর অধীন আবেদন প্রাপ্তির ৪৫ (পঁয়তাল্লিশ) দিনের মধ্যে সুপারিশ প্রদান করিবে এবং নগর উন্নয়ন কমিটির সুপারিশের আলোকে কর্তৃপক্ষ ব্যবস্থা গ্রহণ করিবে।</h5>\n<h5 class=\"h-lv5\">(৫) আপিলে বসবাস বা ব্যবহার সনদ আবেদন অনুমোদিত বা প্রত্যাখ্যাত হইলে আবেদনকারীকে বিষয়টি লিখিতভাবে অবহিত করিতে হইবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第２２条（居住又は使用許可証）（承前）</strong></h4>\n<h5 class=\"h-lv5\">３　建築主事（Authorised Officer）は、第２項の規定による申請を受理した日から１５執務日以内に、申請者及び技術者（Technical person）の立会いのもと、当該建築物の検査を行わなければならない。</h5>\n<h5 class=\"h-lv5\">４　前項の規定による検査においては、次に掲げる報告書及び書類を考慮するものとする。</h5>\n<h6 class=\"h-lv6\">ａ　基礎、土台面（Plinth level）並びに各階の床及び屋根の段階的な工事完了報告書</h6>\n<h6 class=\"h-lv6\">ｂ　承認された設計図書に従って工事が完了し、かつ、適切である旨を、工事監理を行った技術者又は施工業者が署名した監理報告書及び証明書</h6>\n<h6 class=\"h-lv6\">ｃ　適用がある場合において、建築物の竣工図（As-built drawings）</h6>\n<h5 class=\"h-lv5\">５　建築主事は、前項に規定する検査報告書その他の書類、公共サービス、構造耐力上の安全、火災安全及び計画に係る条件を審査した上で、申請の日から３０日以内に、承認又は却下の決定をすることができる。</h5>\n<h6 class=\"h-lv6\"><strong>ただし、</strong> 却下の決定をする場合にあっては、責任の所在を明確にした上でこれを行わなければならない。</h6>\n<h5 class=\"h-lv5\">６　居住又は使用許可証（Occupancy Certificate）の発行をもって、建築物又は工作物の最終的な承認とみなす。</h5>\n<h4 class=\"h-lv4\"><strong>第２３条（居住又は使用許可証の却下に対する不服申立て）</strong></h4>\n<h5 class=\"h-lv5\">１　居住又は使用許可証の申請が却下された場合、申請者は、当該却下の日から３０日以内に、付録４に定める手数料を納付した上で、不服申立委員会（Appellate Committee）に対し審査請求をすることができる。</h5>\n<h5 class=\"h-lv5\">２　不服申立委員会は、前項の審査請求を受理したときは、３０日以内に決定を行わなければならない。</h5>\n<h5 class=\"h-lv5\">３　不服申立委員会は、法律上の明確化が必要な場合は、都市開発委員会（Urban Development Committee）に意見を求めることができる。</h5>\n<h5 class=\"h-lv5\">４　都市開発委員会は、前項の規定により付託を受けたときは、４５日以内に勧告を行わなければならない。</h5>\n<h5 class=\"h-lv5\">５　不服申立ての結果については、申請者に対し書面で通知しなければならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>検査における技術者の立会い義務（第２２条第３項）</strong>:</p>\n<p>ダッカ規則では、建築主事の検査に「申請者」だけでなく「担当技術者（建築士等）」の立会いを法的に義務付けている。日本の建築基準法（法第７条）では、完了検査時に監理者の立会いが一般的だが、法文上で「技術者の立会い」を期限（１５日以内）とセットで明文化している点は、責任の所在をより現場レベルで厳格化している。</p>\n<p>2. <strong>竣工図（As-built drawings）の要求（第２２条第４項ｃ）</strong>:</p>\n<p>第２２条第４項三号により、検査時に竣工図の提出を求めることができる。日本の建築確認手続では、軽微な変更を除き、確認図面と現況の一致が求められるが、「竣工図」という用語を用いて申請図書との照合を規定している点は、施工途中の変更が多い実態に対応した規定といえる。</p>\n<p>3. <strong>却下時の責任究明義務（第２２条第５項）</strong>:</p>\n<p>第２２条第５項但書きにおいて、却下時には「責任の所在（liability/responsibility）」を明確にすることを当局に義務付けている。これは、行政側が単に不合格とするだけでなく、設計者、施工者、建築主の誰に非があるかを特定させることで、その後の紛争解決や不服申立てを円滑にする意図がある。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における居住又は使用許可証（Occupancy Certificate）に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．建築主事は、使用許可証の申請を受理したときは、申請者の立会いがあれば、設計を担当した技術者の立会いなしに検査を行うことができる。</p>\n<p>２．建築主事は、構造安全や火災安全等の審査を経て、申請の日から３０日以内に使用許可の承認又は却下の決定を行わなければならない。</p>\n<p>３．使用許可の申請が却下された場合、申請者はその翌日から１５日以内に不服申立委員会へ審査請求を行わなければならない。</p>\n<p>４．都市開発委員会が不服申立委員会から付託を受けた場合、当該委員会は６０日以内に勧告を行うものとされている。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。第２２条第３項により、申請者及び「技術者（Technical person）」の両方の立会いが必要である。</p>\n<p><strong>2. 正しい。</strong> 第２２条第５項の規定通りである。</p>\n<p>3. 誤り。不服申立ての期限は却下の日から「３０日以内」である（第２３条第１項）。</p>\n<p>4. 誤り。都市開発委員会の勧告期限は「４５日以内」である（第２３条第４項）。</span></p>"},{"num":"13441","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>২৪। ইমারতের ব্যবহার।</strong></h4>\n<h5 class=\"h-lv5\">(১) অনুমোদিত বসবাস বা ব্যবহার সনদ ব্যতীত কোনো ভবন, ফ্ল্যাট বা স্পেস আবাসিক, বাণিজ্যিক, শিল্প বা অন্য যে কোনো কাজে ব্যবহার করা যাইবে না।</h5>\n<h5 class=\"h-lv5\">(২) কোনো ডেভেলপার কোম্পানি কর্তৃক আবাসিক প্রকল্পের লে-আউট প্ল্যান অনুমোদনের পূর্বে উক্ত প্রকল্পের অন্তর্গত ভূমি বা প্লট হস্তান্তর, বিক্রয় অথবা রেজিস্ট্রি করা যাইবে না।</h5>\n<h5 class=\"h-lv5\">(৩) কোনো ইমারত বা স্থাপনা বসবাস বা ব্যবহার সনদে উল্লিখিত ব্যবহারের উদ্দেশ্য বহির্ভূত অন্য কোনো কাজে ব্যবহার করা যাইবে না বা অন্য কাউকে এইরূপ ব্যবহার করিতে দেওয়া যাইবে না।</h5>\n<h5 class=\"h-lv5\">(৪) বসবাস বা ব্যবহার সনদ ব্যতীত কোনো ভবনে কোনো প্রকার ইউটিলিটি সার্ভিসের নতুন সংযোগ প্রদান করা যাইবে না।</h5>\n<h5 class=\"h-lv5\">(৫) বসবাস বা ব্যবহার সনদ ব্যতীত কোনো ইমারতের সম্পূর্ণ বা আংশিক (অ্যাপার্টমেন্ট বা ফ্ল্যাট) হস্তান্তর, নামজারি ও রেজিস্ট্রেশন করা যাইবে না।</h5>\n<h5 class=\"h-lv5\">(৬) ডেভেলপার, রিয়েল এস্টেট এজেন্ট, আইনসম্মত প্রতিনিধি (আমমোক্তার), বন্ধককারী প্রতিষ্ঠান (মর্টগেজ), বা সম্পদ বিক্রয় বা হস্তান্তরের সঙ্গে সম্পৃক্ত কোনো স্বত্বাধিকারী কোম্পানি (title company) কর্তৃক নূতন মালিক বা ব্যবহারকারীকে বসবাস বা ব্যবহার সনদের কপি প্রদান করিতে হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>২৫। বসবাস বা ব্যবহার সনদ নবায়ন।</strong></h4>\n<h5 class=\"h-lv5\">(১) নিম্নবর্ণিত ক্ষেত্রে বসবাস বা ব্যবহার সনদ নবায়ন করিতে হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) ইমারতের সম্পূর্ণ বা আংশিক ব্যবহার পরিবর্তন;</h6>\n<h6 class=\"h-lv6\">(খ) নকশা সংশোধনের ক্ষেত্র ব্যতীত অনুমোদিত নকশার ব্যত্যয় বা পরিবর্তন;</h6>\n<h6 class=\"h-lv6\">(গ) যেকোনো ধরনের দুর্যোগ, যেমন- অগ্নি, ভূমিকম্প, ইত্যাদি কারিগরি ব্যক্তি কর্তৃক যাচাইক্রমে ইমারতের কাঠামো বা ইউটিলিটি সার্ভিস ক্ষতিগ্রস্ত হওয়া।</h6>\n<h5 class=\"h-lv5\">(২) বসবাস বা ব্যবহার সনদ নবায়নের জন্য পরিশিষ্ট ৪ এ উল্লিখিত ফি প্রদানপূর্বক কর্তৃপক্ষের নিকট আবেদন করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৩) উপ-বিধি (২) অনুসারে আবেদন প্রাপ্তির ১৫ (পনেরো) দিনের মধ্যে কর্তৃপক্ষ ভবনটি পরিদর্শন করিবে এবং পরিদর্শনকালে, অনুমোদিত নকশার কোনো প্রকার বিচ্যুতি বা অসংগতি বিদ্যমান না থাকিলে পরবর্তী ২০ (বিশ) দিনের মধ্যে বসবাস বা ব্যবহার সনদ নবায়ন করিবে, অন্যথায় শনাক্তকৃত বিচ্যুতি বা অসংগতি লিপিবদ্ধ করিয়া আবেদনটি প্রত্যাখ্যান করিবে।</h5>\n<h4 class=\"h-lv4\"><strong>২৬। বসবাস বা ব্যবহার সনদ নবায়ন প্রত্যাখ্যানের বিরুদ্ধে আপিল।</strong></h4>\n<h5 class=\"h-lv5\">(১) কোনো বসবাস বা ব্যবহার সনদ নবায়নের আবেদন প্রত্যাখ্যান করা হইলে, আবেদনকারী উক্তরূপে প্রত্যাখ্যাত হইবার ৩০ (ত্রিশ) দিনের মধ্যে পরিশিষ্ট ৪ এ বর্ণিত ফি পরিশোধ সাপেক্ষে, আপিল কমিটি বরাবর আপিল করিতে পারিবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第２４条（建築物の使用制限）</strong></h4>\n<h5 class=\"h-lv5\">１　承認された居住又は使用許可証（Occupancy Certificate）を得ることなく、いかなる建築物、住戸（フラット）又は区画も、居住、商業、工業その他いかなる目的にも使用してはならない。</h5>\n<h5 class=\"h-lv5\">２　デベロッパーは、住宅プロジェクトのレイアウトプランの承認を受ける前に、当該プロジェクト内の土地又は敷地（プロット）を譲渡、売却又は登記してはならない。</h5>\n<h5 class=\"h-lv5\">３　建築物又は工作物を、居住又は使用許可証に記載された用途以外の目的に使用し、又は他人に使用させてはならない。</h5>\n<h5 class=\"h-lv5\">４　居住又は使用許可証を備えていない建築物に対し、いかなる公共設備（ユーティリティ・サービス）の新規接続も行ってはならない。</h5>\n<h5 class=\"h-lv5\">５　居住又は使用許可証を得ることなく、建築物の全部又は一部（住戸又はフラット）を譲渡し、名義変更し、又は登記してはならない。</h5>\n<h5 class=\"h-lv5\">６　デベロッパー、不動産エージェント、法定代理人、抵当権設定機関又は権原担保会社（Title company）は、新たな所有者又は使用者に対し、居住又は使用許可証の写しを提供しなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第２５条（居住又は使用許可証の更新）</strong></h4>\n<h5 class=\"h-lv5\">１　次に掲げる場合においては、居住又は使用許可証を更新しなければならない。</h5>\n<h6 class=\"h-lv6\">一　建築物の全部又は一部の用途を変更したとき。</h6>\n<h6 class=\"h-lv6\">二　正規の設計変更手続による場合を除き、承認された設計図書との不適合又は変更が生じたとき。</h6>\n<h6 class=\"h-lv6\">三　火災、地震等の災害により、建築物の構造又は公共設備が損傷したと技術者により確認されたとき。</h6>\n<h5 class=\"h-lv5\">２　更新をしようとする者は、別表第４に定める手数料を納付の上、所管行政庁に申請しなければならない。</h5>\n<h5 class=\"h-lv5\">３　所管行政庁は、前項の申請を受理した日から１５日以内に当該建築物を検査し、承認された設計図書との不一致がないと認める場合は、さらに２０日以内に許可証を更新するものとする。不一致が認められる場合は、その理由を記録した上で申請を却下しなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第２６条（更新却下に対する不服申立て）</strong></h4>\n<h5 class=\"h-lv5\">１　居住又は使用許可証の更新申請が却下された者は、その日から３０日以内に、別表第４に定める手数料を納付した上で、不服申立委員会に審査請求をすることができる。</h5>\n<hr class=\"sep\">\n<p>1. <strong>使用許可とライフライン供給の法的直結性（第２４条第４項）</strong>:</p>\n<p>ダッカ規則では、居住又は使用許可証（OC）がない限り、電気・水・ガス等の「公共設備の新規接続」を法的に禁じている。日本の建築基準法第７条の６（検査済証交付前の使用制限）でも原則として使用は制限されるが、供給事業者に供給拒否を法的に義務付けるまでの直接的な規定は弱く、ダッカ規則の方が「検査済証なき建物を物理的に機能させない」という強力な執行力を有している。</p>\n<p>2. <strong>不動産取引におけるOCの義務化（第２４条第５項・第６項）</strong>:</p>\n<p>OCがない建築物の譲渡、名義変更、登記を禁じ、かつ取引関係者にOC写しの提供を義務付けている。日本の不動産取引実務では、検査済証がない物件でも登記や売買自体は可能（融資が困難になる等の実務上の制約はあるが）であるが、ダッカ規則は未完成・未検査物件の流通を法的に完全に遮断している。</p>\n<p>3. <strong>災害後の更新義務（第２５条第１項第三号）</strong>:</p>\n<p>地震や火災などの災害後に「構造や設備が損傷した」場合、使用許可証の「更新」を義務付けている。日本には「被災度区分判定」などはあるが、一度交付された検査済証を災害を理由に「更新」させる制度はなく、建築物の継続的な安全性を許可証の有効性で担保しようとする独自の仕組みである。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における居住又は使用許可証（Occupancy Certificate）に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．デベロッパーは、住宅プロジェクトのレイアウトプランが承認される前であっても、先行して敷地（プロット）の売買契約及び登記を行うことができる。</p>\n<p>２．建築物の用途を変更せずに、火災によって公共設備が一部損傷しただけであれば、居住又は使用許可証を更新する必要はない。</p>\n<p>３．居住又は使用許可証が交付されていない建築物であっても、居住目的に限り、電気や水などの公共設備の新規接続を受けることができる。</p>\n<p>４．建築主は、居住又は使用許可証を取得しなければ、当該建築物の住戸（フラット）を譲渡し、又は登記することができない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：４</strong></p>\n<p>1. 誤り。第２４条第２項により、レイアウトプラン承認前の売買・登記は禁止されている。</p>\n<p>2. 誤り。第２５条第１項三号により、災害で構造や設備が損傷した場合は更新が必要である。</p>\n<p>3. 誤り。第２４条第４項により、許可証なしの新規接続は禁じられている。</p>\n<p><strong>4. 正しい。</strong> 第２４条第５項の規定通りである。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13442","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>২৬। বসবাস বা ব্যবহার সনদ নবায়ন প্রত্যাখ্যানের বিরুদ্ধে আপিল (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(২) উপ-বিধি (১) এর অধীন কোনো আপিল আবেদন প্রাপ্তির পর আপিল কমিটি, উপ-বিধি (৪) ও (৫) এর বিধান সাপেক্ষে, ৩০ (ত্রিশ) দিনের মধ্যে আপিল আবেদনের বিষয়ে সিদ্ধান্ত গ্রহণ করিবে এবং উক্ত সিদ্ধান্ত চূড়ান্ত বলিয়া গণ্য হইবে।</h5>\n<h5 class=\"h-lv5\">(৩) উপ-বিধি (২) অনুযায়ী আপিল নিষ্পত্তির ক্ষেত্রে আপিল কমিটি আইনি স্পষ্টতা ও অধিকতর সিদ্ধান্তের জন্য বিষয়টি নগর উন্নয়ন কমিটিতে প্রেরণ করিতে পারিবে।</h5>\n<h5 class=\"h-lv5\">(৪) উপ-বিধি (২) এ যাহা কিছুই থাকুক না কেন, নগর উন্নয়ন কমিটি উপ-বিধি (৩) এর অধীন আবেদন প্রাপ্তির ৪৫ (পঁয়তাল্লিশ) দিনের মধ্যে সুপারিশ প্রদান করিবে এবং নগর উন্নয়ন কমিটির সুপারিশ পর্যালোচনা করিয়া আপিল কমিটি চূড়ান্ত সিদ্ধান্ত গ্রহণ করিবে।</h5>\n<h5 class=\"h-lv5\">(৫) আপিলে বসবাস বা ব্যবহার সনদ নবায়নের আবেদন অনুমোদিত বা প্রত্যাখ্যাত হইলে আবেদনকারীকে বিষয়টি লিখিতভাবে অবহিত করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৬) বিধি ২৫ এর উপ-বিধি (১) এ উল্লিখিত কারণ থাকা সত্ত্বেও বসবাস বা ব্যবহার সনদ নবায়ন করা না হইলে তজ্জন্য ইমারতের স্বত্বাধিকারী, কারিগরি ব্যক্তি এবং কর্তৃপক্ষের সংশ্লিষ্ট কর্মচারী ও কর্মকর্তা দায়বদ্ধ থাকিবেন এবং দায়ী ব্যক্তির বিরুদ্ধে আইনগত ব্যবস্থা গ্রহণ করা হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>২৭। টাওয়ার নির্মাণ ও পুকুর খনন, ইত্যাদির জন্য অনুমোদন, সংশোধন ও পরিবর্তন ফি।</strong></h4>\n<h5 class=\"h-lv5\">টাওয়ার নির্মাণ ও পুকুর খনন, ইত্যাদির জন্য অনুমোদন, সংশোধন ও পরিবর্তন অনুমোদনের ক্ষেত্রে পরিশিষ্ট ৪ এ বর্ণিত নির্ধারিত ফি প্রদান করিতে হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>২৮। কর্তৃপক্ষের পরিদর্শন, কর্তব্য ও দায়িত্ব।</strong></h4>\n<h5 class=\"h-lv5\">(১) কর্তৃপক্ষ বা তদ্কর্তৃক ক্ষমতাপ্রাপ্ত কোনো কর্মচারী বা ইমারত পরিদর্শক বা কর্তৃপক্ষ কর্তৃক নিয়োগপ্রাপ্ত ব্যক্তি বা প্রতিষ্ঠান নির্মাণাধীন ইমারত নির্মাণের কাজ পরিদর্শন এবং অনুমোদিত নকশা, প্রতিবেদন ও স্পেসিফিকেশন অনুযায়ী নির্মাণ কাজ বাস্তবায়ন হইতেছে কিনা তাহা পরীক্ষা করিবে এবং, এক্ষেত্রে, প্রয়োজনে, দূর-পরিবীক্ষণ (Remote sensing) ও প্রযুক্তির সহায়তা গ্রহণ করা যাইবে।</h5>\n<h5 class=\"h-lv5\">(২) বিধি ১৯ এর উপ-বিধি ৪ অনুসারে প্রতিবেদন প্রাপ্তির পর কর্তৃপক্ষ বা তদ্কর্তৃক ক্ষমতাপ্রাপ্ত কোনো কমিটি, কর্মকর্তা বা ইমারত পরিদর্শক নির্মাণাধীন ইমারতের প্লিন্থ স্তর পর্যন্ত নির্মাণ চলাকালীন ও প্রতি তলার নির্মাণ কাজ অন্তত একবার করিয়া পরিদর্শন করিবেন এবং অনুমোদিত নকশা ও নিয়মানুযায়ী নির্মাণ কাজটি সম্পন্ন করা হইতেছে কিনা সে বিষয়ে কর্তৃপক্ষের নিকট কর্তৃপক্ষ কর্তৃক নির্ধারিত ছক অনুযায়ী স্থিরচিত্র ও ভিডিওসহ প্রতিবেদন দাখিল করিবেন এবং পরবর্তীতে নির্মিত বা নির্মাণাধীন ইমারতের যেকোনো ধরনের ব্যত্যয়ের ক্ষেত্রে তদানুযায়ী দায় দায়িত্ব নিরূপণ করা হইবে।</h5>\n<h5 class=\"h-lv5\">(৩) কর্তৃপক্ষ বা তদ্কর্তৃক ক্ষমতাপ্রাপ্ত বা নিয়োগকৃত কোনো ব্যক্তি বা প্রতিষ্ঠানের দায়-দায়িত্ব হইবে নিম্নরূপ, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) কর্তৃপক্ষ বা তদ্কর্তৃক ক্ষমতাপ্রাপ্ত বা নিয়োগকৃত কোনো কর্মচারী আইন, কোড এবং এই বিধিমালার বিধান অনুসারে যে সকল দায়িত্ব পালনের ক্ষমতাপ্রাপ্ত তাহা নির্ধারিত সময়ে যথাযথভাবে পরিপালন করা;</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第２６条（更新却下に対する不服申立て）（承前）</strong></h4>\n<h5 class=\"h-lv5\">２　不服申立委員会は、審査請求を受理した日から３０日以内に決定を行わなければならず、当該決定は最終的なものとする。</h5>\n<h5 class=\"h-lv5\">３　不服申立委員会は、法律上の明確化又は更なる判断が必要な場合は、当該事項を都市開発委員会（Urban Development Committee）に付託することができる。</h5>\n<h5 class=\"h-lv5\">４　前項の規定による付託を受けた場合、都市開発委員会は４５日以内に勧告を行い、不服申立委員会は当該勧告を検討した上で最終決定を下すものとする。</h5>\n<h5 class=\"h-lv5\">５　不服申立ての結果については、申請者に書面で通知しなければならない。</h5>\n<h5 class=\"h-lv5\">６　第２５条第１項に定める事由があるにもかかわらず、居住又は使用許可証の更新を行わない場合は、建築主、専門技術者、及び当局の担当職員は連帯して責任を負い、法的措置の対象となる。</h5>\n<h4 class=\"h-lv4\"><strong>第２７条（塔の建設及び池の掘削等に係る手数料）</strong></h4>\n<h5 class=\"h-lv5\">通信塔等の建設、池の掘削等の承認、修正及び変更に関しては、付録４に定める所定の手数料を納付しなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第２８条（当局の検査、職務及び責任）</strong></h4>\n<h5 class=\"h-lv5\">１　所管行政庁（Authority）又はその委任を受けた検査員は、工事中の建築物が承認された設計図書及び仕様書に準拠しているかを検査し、必要に応じて<strong>リモートセンシング（Remote sensing）</strong>等の技術を活用することができる。</h5>\n<h5 class=\"h-lv5\">２　所管行政庁は、土台面（Plinth level）までの工事期間中、及び<strong>各階の工事ごとに少なくとも１回</strong>、実地検査を行わなければならない。検査結果は、当局指定の様式に基づき<strong>静止画及び動画</strong>を添えた報告書として提出し、設計との不適合が認められる場合は責任の所在を明確にするものとする。</h5>\n<h5 class=\"h-lv5\">３　所管行政庁又はその委任を受けた者の職務及び責任は次の通りとする。</h5>\n<h6 class=\"h-lv6\">一　法、法典（Code）及び本規則に基づき付与された職務を、所定の期間内に適切に遂行すること。</h6>\n<hr class=\"sep\">\n<p>1. <strong>ハイテク技術を用いた建築検査（第２８条第１項）</strong>:</p>\n<p>ダッカ規則では、検査において「リモートセンシング（遠隔探査）」の使用を法文上で認めている。日本の建築基準法においても目視以外の計測機器による検査は行われるが、実体規定としてリモートセンシングや先端技術の活用を明記している点は、広域かつ過密な都市環境における効率的な監視体制を志向している。</p>\n<p>2. <strong>動画による施工報告の義務化（第２８条第２項）</strong>:</p>\n<p>各階ごとの検査において「写真（静止画）」だけでなく「動画（Video）」の提出を義務付けている。日本の建築基準法第７条の３（特定工程の中間検査）等においても写真撮影は行われるが、法文レベルで動画の添付を求める規定は、改ざん防止や施工の連続性を確認するための極めて厳格な管理手法である。</p>\n<p>3. <strong>池の掘削等の管理（第２７条）</strong>:</p>\n<p>日本では「塔（工作物）」の築造は法第８８条等で規制されるが、「池の掘削」そのものを建築規則の主要な管理項目（手数料規定等）に含めている点は、デルタ地帯に位置し、水辺の保全が都市計画上極めて重要なダッカの地理的特性を反映している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における当局の検査及び管理に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．建築工事の検査において、所管行政庁は目視による確認を原則とし、リモートセンシング等の外部技術を用いることは禁じられている。</p>\n<p>２．建築工事の各階ごとの検査報告書には、工事の状況を証明するため、静止画（写真）に加え、必ず動画（Video）を添付しなければならない。</p>\n<p>３．都市開発委員会が不服申立てに関する勧告を行う場合、その期限は不服申立委員会からの付託を受けてから ３０日 以内とされている。</p>\n<p>４．建築物に使用許可証の更新が必要な事由があるにもかかわらずこれを怠った場合、責任を負うのは建築主のみであり、設計や監理を行った専門技術者が責任を問われることはない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。第２８条第１項により、リモートセンシングや技術のサポートを受けることができる。</p>\n<p><strong>2. 正しい。</strong> 第２８条第２項の規定通りである。</p>\n<p>3. 誤り。第２６条第４項により、都市開発委員会の勧告期限は <strong>৪৫ (পঁয়তাল্লিশ) দিন（４５日）</strong> である。</p>\n<p>4. 誤り。第２６条第６項により、建築主、技術者、及び担当職員は連帯して責任（ দায়বদ্ধ ）を負う。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13443","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>২৮। কর্তৃপক্ষের পরিদর্শন, কর্তব্য ও দায়িত্ব (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(৩) (চলমান)</h5>\n<h6 class=\"h-lv6\">(খ) কর্তৃপক্ষ বা তদ্কর্তৃক ক্ষমতাপ্রাপ্ত বা নিয়োগকৃত কোনো কর্মচারী কোনোভাবেই প্রত্যক্ষ বা পরোক্ষভাবে পরিকল্পনা প্রণয়ন, নকশা প্রণয়ন, নির্মাণ তদারকি, মেরামত, রক্ষণাবেক্ষণ, পরিবর্তন বা পরিবর্ধনে সংশ্লিষ্ট কোনো ইমারত, কোনো কাজের বা উপকরণের সার্টিফিকেটশন, উপকরণ সরবরাহ, শ্রম, সরঞ্জাম, কোড বা এই বিধিমালার বিধান দ্বারা নিয়ন্ত্রিত যন্ত্রপাতি বা অন্য কোনো কাজের সংশ্লিষ্ট না হওয়া;</h6>\n<h6 class=\"h-lv6\">(গ) কর্তৃপক্ষ বা তদ্কর্তৃক ক্ষমতাপ্রাপ্ত বা নিয়োগকৃত কোনো কর্মচারী কর্তৃক প্রত্যক্ষ বা পরোক্ষভাবে নির্মাণ সংশ্লিষ্ট ব্যবসা পরিচালনা, পরিকল্পনাকারী, প্রকৌশলী, স্থপতি, নির্মাতা বা সরবরাহকারী হিসাবে জড়িত না হওয়া।</h6>\n<h5 class=\"h-lv5\">(৪) কর্তৃপক্ষ বা তদ্কর্তৃক ক্ষমতাপ্রাপ্ত বা নিয়োগকৃত কোনো কর্মচারী উপ-বিধি (৩) এ বর্ণিত কোনো দায়িত্বের ব্যত্যয় করিলে আইন ও সংশ্লিষ্ট বিধি-বিধান অনুসারে সংশ্লিষ্ট কর্মচারীর বিরুদ্ধে প্রয়োজনীয় ব্যবস্থা গ্রহণ করা যাইবে।</h5>\n<h3 class=\"h-lv3\"><strong>তৃতীয় অধ্যায়</strong></h3>\n<p><strong>কমিটি</strong></p>\n<h4 class=\"h-lv4\"><strong>২৯। কমিটি গঠন।</strong></h4>\n<h5 class=\"h-lv5\">(১) এই বিধিমালার উদ্দেশ্য পূরণকল্পে, নিম্নরূপ এক বা একাধিক কমিটি থাকিবে, যথা:---</h5>\n<h6 class=\"h-lv6\">(ক) ইমারত নির্মাণ কমিটি;</h6>\n<h6 class=\"h-lv6\">(二) আপিল কমিটি;</h6>\n<h6 class=\"h-lv6\">(গ) নগর উন্নয়ন কমিটি।</h6>\n<h5 class=\"h-lv5\">(২) কর্তৃপক্ষ, প্রয়োজনে, অন্য যেকোনো কমিটি গঠন করিতে পারিবে।</h5>\n<h4 class=\"h-lv4\"><strong>৩০। ইমারত নির্মাণ কমিটি।</strong></h4>\n<h5 class=\"h-lv5\">(১) আইনের section 3 এর sub-section (2) অনুযায়ী বিভিন্ন কারিগরি সদস্যের সমন্বয়ে এক বা একাধিক ইমারত নির্মাণ কমিটি থাকিবে এবং কমিটিতে অথরাইজড অফিসার ও কারিগরি সদস্যের মতামত বাধ্যতামূলক হইবে।</h5>\n<h5 class=\"h-lv5\">(২) আপিল কমিটি বা নগর উন্নয়ন কমিটির কোনো সদস্যকে এই কমিটির সদস্য পদে মনোনীত করা যাইবে না।</h5>\n<h4 class=\"h-lv4\"><strong>৩১। আপিল কমিটি গঠন।</strong></h4>\n<h5 class=\"h-lv5\">(১) আপিল কমিটি নিম্নবর্ণিত সদস্য সমন্বয়ে গঠিত হইবে, যথা:---</h5>\n<h6 class=\"h-lv6\">(ক) কর্তৃপক্ষের চেয়ারম্যান, যিনি উহার সভাপতিও হইবেন;</h6>\n<h6 class=\"h-lv6\">(খ) গৃহায়ন ও গণপূর্ত মন্ত্রণালয় কর্তৃক মনোনীত অন্যূন যুগ্মসচিব পদমর্যাদার একজন প্রতিনিধি; এবং</h6>\n<h6 class=\"h-lv6\">(গ) কর্তৃপক্ষের প্রধান নগর স্থপতি, যিনি উহার সদস্য-সচিবও হইবেন।</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第２８条（当局の検査、職務及び責任）（承前）</strong></h4>\n<h5 class=\"h-lv5\">３（承前）</h5>\n<h6 class=\"h-lv6\">二　所管行政庁の職員又は委任を受けた者は、直接又は間接を問わず、本規則により規制される建築物の計画策定、設計、工事監理、修繕、維持管理、増改築、資材・機器の証明、資材供給、労務、什器備品、又はその他の業務に関与してはならない。</h6>\n<h6 class=\"h-lv6\">三　所管行政庁の職員又は委任を受けた者は、直接又は間接を問わず、建築関連事業の運営、又はプランナー、技術者、建築士、施工者若しくは供給業者としての業務に従事してはならない。</h6>\n<h5 class=\"h-lv5\">４　所管行政庁の職員又は委任を受けた者が前項に規定する義務に違反したときは、関連法令に基づき、当該職員に対し必要な措置を講じるものとする。</h5>\n<h3 class=\"h-lv3\"><strong>第３章　委員会</strong></h3>\n<h4 class=\"h-lv4\"><strong>第２９条（委員会の設置）</strong></h4>\n<h5 class=\"h-lv5\">１　本規則の目的を達成するため、次に掲げる委員会を設置する。</h5>\n<h6 class=\"h-lv6\">一　建築審査委員会（Building Construction Committee）</h6>\n<h6 class=\"h-lv6\">二　不服申立委員会（Appellate Committee）</h6>\n<h6 class=\"h-lv6\">三　都市開発委員会（Urban Development Committee）</h6>\n<h5 class=\"h-lv5\">２　所管行政庁は、必要があると認めるときは、その他の委員会を設置することができる。</h5>\n<h4 class=\"h-lv4\"><strong>第３０条（建築審査委員会）</strong></h4>\n<h5 class=\"h-lv5\">１　１９５２年建築工事法第３条第２項の規定に基づき、専門技術を有する委員により構成される建築審査委員会を設置する。当該委員会における建築主事（Authorised Officer）及び技術委員の意見は、義務的（Mandatory）なものとする。</h5>\n<h5 class=\"h-lv5\">２　不服申立委員会又は都市開発委員会の委員は、建築審査委員会の委員を兼ねることができない。</h5>\n<h4 class=\"h-lv4\"><strong>第３１条（不服申立委員会の構成）</strong></h4>\n<h5 class=\"h-lv5\">１　不服申立委員会は、次に掲げる委員をもって構成する。</h5>\n<h6 class=\"h-lv6\">一　所管行政庁の会長（Chairman）（委員長を兼ねる）</h6>\n<h6 class=\"h-lv6\">二　住宅公共事業省が指名する共同秘書（Joint Secretary）級以上の代表者</h6>\n<h6 class=\"h-lv6\">三　所管行政庁の主任建築士（Chief Architect）（事務局長を兼ねる）</h6>\n<hr class=\"sep\">\n<p>1. <strong>公務員の利益相反行為の厳格な禁止（第２８条第３項）</strong>:</p>\n<p>ダッカ規則では、建築検査等に関わる職員が設計、監理、さらには「資材の供給」や「労務の提供」にまで直接・間接に関与することを具体的に列挙して禁じている。日本の公務員法における兼業制限よりも、建築実務のサプライチェーン全体を視野に入れた強力な癒着防止規定となっており、透明性の確保を法制上最優先している。</p>\n<p>2. <strong>合議制による建築審査（第３０条）</strong>:</p>\n<p>日本の建築基準法（法第６条）における建築確認は、建築主事が独任制で適合性を判断（又は指定確認検査機関が実施）するが、ダッカ規則は「建築審査委員会」という合議体による審査を基本としている。特に建築主事（Authorised Officer）と技術委員の意見を「義務的（Mandatory）」としている点は、属人的な判断を排し、専門的知見を組織的に反映させる仕組みである。</p>\n<p>3. <strong>委員の兼任禁止（第３０条第２項）</strong>:</p>\n<p>審査側（建築審査委員会）と不服申立側（不服申立委員会等）の委員の兼任を禁じている。これは日本の「建築審査会（法第７８条）」が特定行政庁の処分に対する審査請求を扱う際、中立性を確保しているのと同様の「自己審査の禁止」の原則を、規則レベルで明文化したものである。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における委員会及び当局職員の職務に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．建築審査委員会の委員は、専門的な判断を統一するため、不服申立委員会の委員を兼務することが推奨されている。</p>\n<p>２．不服申立委員会は、所管行政庁の会長、住宅公共事業省の代表者、及び主任建築士の３名の委員により構成される。</p>\n<p>３．所管行政庁の検査員は、業務に支障がない範囲であれば、民間の建築プロジェクトにおいて有償で資材供給の助言を行うことができる。</p>\n<p>４．建築審査委員会における決定は、所管行政庁の会長の判断が最優先され、技術委員の意見は参考程度に扱われる。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。第３０条第２項により、委員の兼務は明文で禁止されている。</p>\n<p><strong>2. 正しい。</strong> 第３１条第１項の規定通りである。</p>\n<p>3. 誤り。第２８条第３項により、資材供給（ উপকরণ সরবরাহ ）や関連業務への関与は一切禁じられている。</p>\n<p>4. 誤り。第３０条第１項により、建築主事及び技術委員の意見は義務的（ বাধ্যতামূলক ）である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13444","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৩১। আপিল কমিটি গঠন (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(২) আপিল কমিটি, প্রয়োজনে, যেকোনো বিশেষজ্ঞ বা পেশাজীবী ব্যক্তি অথবা প্রতিষ্ঠানের পরামর্শ গ্রহণ করিতে পারিবে।</h5>\n<h5 class=\"h-lv5\">(৩) ইমারত নির্মাণ কমিটির কোনো সদস্যকে আপিল কমিটির সদস্য পদে মনোনীত করা যাইবে না।</h5>\n<h4 class=\"h-lv4\"><strong>৩২। নগর উন্নয়ন কমিটি।</strong></h4>\n<h5 class=\"h-lv5\">(১) নগর উন্নয়ন কমিটি নিম্নবর্ণিত সদস্য সমন্বয়ে গঠিত হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) সচিব, গৃহায়ন ও গণপূর্ত মন্ত্রণালয়, যিনি উহার সভাপতিও হইবেন;</h6>\n<h6 class=\"h-lv6\">(খ) চেয়ারম্যান, রাজধানী উন্নয়ন কর্তৃপক্ষ;</h6>\n<h6 class=\"h-lv6\">(গ) চেয়ারম্যান, জাতীয় গৃহায়ন কর্তৃপক্ষ;</h6>\n<h6 class=\"h-lv6\">(ঘ) বিভাগীয় কমিশনার, ঢাকা;</h6>\n<h6 class=\"h-lv6\">(ঙ) প্রধান প্রকৌশলী, গণপূর্ত অধিদপ্তর;</h6>\n<h6 class=\"h-lv6\">(চ) প্রধান স্থপতি, স্থাপত্য অধিদপ্তর;</h6>\n<h6 class=\"h-lv6\">(ছ) সংশ্লিষ্ট সিটি কর্পোরেশনের প্রধান নির্বাহী কর্মকর্তা;</h6>\n<h6 class=\"h-lv6\">(জ) পরিচালক, নগর উন্নয়ন অধিদপ্তর;</h6>\n<h6 class=\"h-lv6\">(ঝ) সভাপতি, ইনস্টিটিউট অব আর্কিটেক্টস বাংলাদেশ;</h6>\n<h6 class=\"h-lv6\">(ঞ) সভাপতি, বাংলাদেশ ইনস্টিটিউট অব প্ল্যানার্স;</h6>\n<h6 class=\"h-lv6\">(ট) সভাপতি, ইনস্টিটিউশন অব ইঞ্জিনিয়ার্স, বাংলাদেশ;</h6>\n<h6 class=\"h-lv6\">(ঠ) সভাপতি, ইনস্টিটিউশন অব ডিপ্লোমা ইঞ্জিনিয়ার্স, বাংলাদেশ;</h6>\n<h6 class=\"h-lv6\">(ড) সরকার কর্তৃক মনোনীত বিশ্ববিদ্যালয়ের ৪ (চার) জন অধ্যাপক যাহাদের মধ্যে ১ (এক) জন পরিবেশ বিষয়ক, ১ (এক) জন স্থাপত্য বিষয়ক, ১ (এক) জন পরিকল্পনা বিষয়ক ও ১ (এক) পুর-প্রকৌশল বিষয়ক হইবেন;</h6>\n<h6 class=\"h-lv6\">(ঢ) সরকার কর্তৃক মনোনীত সুশীল সমাজের ৩ (তিন) জন প্রতিনিধি এবং আইন প্রণয়ন ও ব্যাখ্যা প্রদান সংশ্লিষ্ট কাজে অভিজ্ঞতাসম্পন্ন সরকারের ১ (এক) জন কর্মকর্তা;</h6>\n<h6 class=\"h-lv6\">(ণ) নির্বাহী পরিচালক, ঢাকা পরিবহন সমন্বয় কর্তৃপক্ষ;</h6>\n<h6 class=\"h-lv6\">(ত) মহাপরিচালক, ফায়ার সার্ভিস ও সিভিল ডিফেন্স অধিদপ্তর;</h6>\n<h6 class=\"h-lv6\">(থ) প্রধান প্রকৌশলী (প্রকল্প ও বাস্তবায়ন), রাজধানী উন্নয়ন কর্তৃপক্ষ; এবং</h6>\n<h6 class=\"h-lv6\">(দ) প্রধান নগর পরিকল্পনাবিদ, রাজধানী উন্নয়ন কর্তৃপক্ষ, যিনি উহার সদস্য-সচিবও হইবেন।</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第３１条（不服申立委員会の構成）（承前）</strong></h4>\n<h5 class=\"h-lv5\">２　不服申立委員会は、必要があると認めるときは、専門家、専門職の個人又は機関の助言を求めることができる。</h5>\n<h5 class=\"h-lv5\">３　建築審査委員会（Building Construction Committee）の委員は、不服申立委員会の委員に任命されることはできない。</h5>\n<h4 class=\"h-lv4\"><strong>第３２条（都市開発委員会）</strong></h4>\n<h5 class=\"h-lv5\">１　都市開発委員会（Urban Development Committee）は、次に掲げる委員をもって構成する。</h5>\n<h6 class=\"h-lv6\">一　住宅公共事業省秘書（次官級）（委員長を兼ねる）</h6>\n<h6 class=\"h-lv6\">二　首都開発庁（RAJUK）会長</h6>\n<h6 class=\"h-lv6\">三　国家住宅公社（NHA）会長</h6>\n<h6 class=\"h-lv6\">四　ダッカ地区行政官（Divisional Commissioner）</h6>\n<h6 class=\"h-lv6\">五　公務員局（PWD）主任技師</h6>\n<h6 class=\"h-lv6\">六　建築局（DoA）主任建築士</h6>\n<h6 class=\"h-lv6\">七　関連する市公社（City Corporation）の最高経営責任者（CEO）</h6>\n<h6 class=\"h-lv6\">八　都市計画局（UDD）局長</h6>\n<h6 class=\"h-lv6\">九　バングラデシュ建築士協会（IAB）会長</h6>\n<h6 class=\"h-lv6\">十　バングラデシュ都市計画家協会（BIP）会長</h6>\n<h6 class=\"h-lv6\">十一　バングラデシュ技術者協会（IEB）会長</h6>\n<h6 class=\"h-lv6\">十二　バングラデシュ・ディプロマ技術者協会（IDEB）会長</h6>\n<h6 class=\"h-lv6\">十三　政府が指名する大学教授４名（環境、建築、都市計画、土木の各専門分野から各１名）</h6>\n<h6 class=\"h-lv6\">十四　政府が指名する市民社会の代表者３名、及び法律の制定・解釈に精通した政府当局者１名</h6>\n<h6 class=\"h-lv6\">十五　ダッカ交通調整局（DTCA）執行局長</h6>\n<h6 class=\"h-lv6\">十六　消防・民間防衛局長官</h6>\n<h6 class=\"h-lv6\">十七　首都開発庁（RAJUK）主任技師（プロジェクト・実施担当）</h6>\n<h6 class=\"h-lv6\">十八　首都開発庁（RAJUK）主任都市計画家（事務局長を兼ねる）</h6>\n<hr class=\"sep\">\n<p>1. <strong>都市開発委員会（UDC）の巨大な合議制構成（第３２条）</strong>:</p>\n<p>ダッカの都市開発委員会（UDC）は、行政官、各技術局長、大学教授に加え、<strong>４つの主要な専門職職能団体（建築士、プランナー、技師、ディプロマ技師）の会長</strong>を委員に加えている。日本の「都市計画審議会（都市計画法第７７条）」や「建築審査会」が主に学識経験者や議員で構成されるのに比べ、ダッカ規則は実務専門家のトップを委員に迎え、実務的な解釈や政策判断に職能団体の意見を直接反映させる構造をとっている。</p>\n<p>2. <strong>多機関連携の明文化</strong>:</p>\n<p>消防、交通（DTCA）、住宅（NHA）のトップが一同に介する構成は、ダッカという過密巨大都市におけるインフラ、交通、安全の整合性を確保するための「ワンストップ・ガバナンス」を法的に定義している。日本でも同様の協議は行われるが、建築規則上の「委員会」としてこれほど広範な職域を法的に固定している点は特筆すべきである。</p>\n<p>3. <strong>法律専門家の参画（第３２条第１項十四号）</strong>:</p>\n<p>市民社会代表とともに「法律の制定・解釈に精通した政府当局者」を委員に含めている。これは規則の文言解釈をめぐる紛争が多いことを示唆しており、法制執務上の技術的確実性を委員会段階で担保しようとする意図が見える。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における委員会構成に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．建築審査委員会（Building Construction Committee）の現職委員は、公平性を保つため、不服申立委員会（Appellate Committee）の委員を兼ねなければならない。</p>\n<p>２．都市開発委員会（Urban Development Committee）の委員長は、首都開発庁（RAJUK）の会長が務めるものとされている。</p>\n<p>３．都市開発委員会には、政府が指名する４名の大学教授が含まれるが、その専門分野は建築及び都市計画の２分野に限定されている。</p>\n<p>４．都市開発委員会の委員には、バングラデシュ建築士協会（IAB）及びバングラデシュ都市計画家協会（BIP）の会長が含まれている。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：４</strong></p>\n<p>1. 誤り。第３１条第３項により、兼任は明文で禁止されている。</p>\n<p>2. 誤り。第３２条第１項（ｋａ）により、委員長は「住宅公共事業省秘書（ সচিব ）」である。</p>\n<p>3. 誤り。教授４名の分野は、環境、建築、計画、土木の４分野である。</p>\n<p><strong>4. 正しい。</strong> 第３２条第１項（ｊｈａ）及び（ｎｙａ）の規定通りである。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13445","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৩২। নগর উন্নয়ন কমিটি (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(২) উপ-বিধি (১) এর দফা (ঠ) ও (ড)-তে উল্লিখিত সদস্যগণের মেয়াদ হইবে মনোনয়নের তারিখ হইতে ২ (দুই) বৎসর।</h5>\n<h5 class=\"h-lv5\">(৩) নগর উন্নয়ন কমিটি, প্রয়োজনে, যেকোনো বিশেষজ্ঞ বা পেশাজীবী ব্যক্তি অথবা প্রতিষ্ঠানের পরামর্শ গ্রহণ করিতে পারিবে।</h5>\n<h5 class=\"h-lv5\">(৪) ইমারত নির্মাণ অনুমোদন সংশ্লিষ্ট কোনো ব্যক্তিকে নগর উন্নয়ন কমিটির সদস্য পদে মনোনীত করা যাইবে না।</h5>\n<h4 class=\"h-lv4\"><strong>৩৩। নগর উন্নয়ন কমিটির কার্যাবলি।</strong></h4>\n<h5 class=\"h-lv5\">নগর উন্নয়ন কমিটির কার্যাবলি নিম্নরূপ হইবে, যথা:---</h5>\n<h6 class=\"h-lv6\">(ক) কর্তৃপক্ষের আওতাভুক্ত এলাকার সকল পরিকল্পনা, উন্নয়ন এবং উন্নয়ন নিয়ন্ত্রণ কাজের জন্য নীতি ও ভবিষ্যৎ রূপরেখা বিষয়ে সুপারিশ করা;</h6>\n<h6 class=\"h-lv6\">(খ) এই বিধিমালার আওতায় নিষ্পত্তিযোগ্য নহে এইরূপ কোনো বিষয়ে কার্যকর দিক-নির্দেশনা ও সিদ্ধান্ত প্রদান করা;</h6>\n<h6 class=\"h-lv6\">(গ) কর্তৃপক্ষের নিকট হইতে কোনো বিষয়ে ব্যাখ্যা বা বিশ্লেষণের জন্য লিখিত অনুরোধ প্রাপ্ত হইলে, প্রয়োজনে, সংশ্লিষ্ট পেশাজীবী বা বিশেষজ্ঞের সহিত আলোচনা ও পরামর্শের ভিত্তিতে প্রয়োজনীয় নির্দেশনা প্রদান করা;</h6>\n<h6 class=\"h-lv6\">(ঘ) ঢাকা মহানগরীর অবকাঠামো উন্নয়ন কার্যক্রম সমন্বয়, পরিকল্পনা প্রণয়ন, পরিবহন ব্যবস্থা উন্নয়ন, নিয়ন্ত্রণ ও বাস্তবায়নে সার্বিক সহায়তা করা; এবং</h6>\n<h6 class=\"h-lv6\">(ঙ) এই বিধিমালার উদ্দেশ্যপূরণকল্পে, ন্যায় ও সমতা বিধানকল্পে প্রয়োজনীয় অন্যান্য নির্দেশনা প্রদান করা।</h6>\n<h4 class=\"h-lv4\"><strong>৩৪। নগর উন্নয়ন কমিটির সভা।</strong></h4>\n<h5 class=\"h-lv5\">(১) নগর উন্নয়ন কমিটি, প্রয়োজনে, প্রতিমাসে অন্যূন একবার সভায় মিলিত হইবে।</h5>\n<h5 class=\"h-lv5\">(২) নগর উন্নয়ন কমিটির যেকোনো সভায় কোরামের জন্য অন্যূন দুই তৃতীয়াংশ সদস্যের উপস্থিতির প্রয়োজন হইবে।</h5>\n<h5 class=\"h-lv5\">(৩) সভায় উপস্থিত নগর উন্নয়ন কমিটির প্রত্যেক সদস্যের একটি করিয়া ভোটাধিকার থাকিবে।</h5>\n<h5 class=\"h-lv5\">(৪) সভার যেকোনো সিদ্ধান্ত সভায় উপস্থিত সদস্যদের সংখ্যাগরিষ্ট ভোটে গৃহীত হইবে, তবে ভোটের সমতার ক্ষেত্রে সভাপতি দ্বিতীয় বা নির্ণায়ক ভোট প্রদান করিতে পারিবে।</h5>\n<h4 class=\"h-lv4\"><strong>৩৫। নগর উন্নয়ন কমিটি কর্তৃক উপ-কমিটি গঠন, ইত্যাদি।</strong></h4>\n<h5 class=\"h-lv5\">(১) নগর উন্নয়ন কমিটি উহার কার্যাবলি সুষ্ঠুভাবে সম্পাদনের জন্য এবং এতদ্‌সংক্রান্ত সুপারিশ প্রদানের এক বা একাধিক উপ-কমিটি গঠন করিতে পারিবে।</h5>\n<h5 class=\"h-lv5\">(২) উপ-বিধি (১) এ উল্লিখিত যেকোনো উপ-কমিটিতে, প্রয়োজনে, সরকারি কর্মকর্তা, বিশেষজ্ঞ বা পেশাজীবী কোনো ব্যক্তিকে অন্তর্ভুক্ত করা যাইবে।</h5>\n<h5 class=\"h-lv5\">(৩) নগর উন্নয়ন কমিটি উপ-কমিটির যেকোনো সুপারিশ সম্পূর্ণ বা আংশিকভাবে গ্রহণ অথবা অগ্রাহ্য করিতে পারিবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第３２条（都市開発委員会の構成）（承前）</strong></h4>\n<h5 class=\"h-lv5\">２　第１項第１２号及び第１３号に掲げる委員の任期は、指名の日から２年とする。</h5>\n<h5 class=\"h-lv5\">３　都市開発委員会（Urban Development Committee）は、必要があると認めるときは、専門家、実務家又は機関の助言を求めることができる。</h5>\n<h5 class=\"h-lv5\">４　建築物の建築承認業務に直接従事する者は、都市開発委員会の委員に指名されることはできない。</h5>\n<h4 class=\"h-lv4\"><strong>第３３条（都市開発委員会の職務）</strong></h4>\n<h5 class=\"h-lv5\">都市開発委員会の職務は、次に掲げる通りとする。</h5>\n<h6 class=\"h-lv6\">一　所管区域内の全ての計画、開発及び開発規制に係る政策及び将来の枠組みに関する勧告を行うこと。</h6>\n<h6 class=\"h-lv6\">二　本規則において解決できない事項について、実効性のある指針の提示及び決定を行うこと。</h6>\n<h6 class=\"h-lv6\">三　所管行政庁から事項の解釈又は分析に係る書面による要請を受けた場合において、必要に応じて関連する実務家又は専門家との協議及び助言に基づき、必要な指針を提示すること。</h6>\n<h6 class=\"h-lv6\">四　ダッカ首都圏のインフラ開発活動の調整、計画策定、交通体系の開発、規制及び実施を包括的に支援すること。</h6>\n<h6 class=\"h-lv6\">五　本規則の目的を達成するため、公正かつ平等の原則に基づき、必要なその他の指針を提示すること。</h6>\n<h4 class=\"h-lv4\"><strong>第３４条（都市開発委員会の会議）</strong></h4>\n<h5 class=\"h-lv5\">１　都市開発委員会は、必要があると認めるときは、毎月少なくとも１回会議を開催するものとする。</h5>\n<h5 class=\"h-lv5\">２　会議の成立（クォーラム）には、委員総数の３分の２以上の出席を必要とする。</h5>\n<h5 class=\"h-lv5\">３　会議に出席した委員は、各々１個の議決権を有する。</h5>\n<h5 class=\"h-lv5\">４　会議の議事は、出席委員の過半数をもって決する。ただし、可否同数のときは、委員長が決するところによる。</h5>\n<h4 class=\"h-lv4\"><strong>第３５条（都市開発委員会による小委員会の設置等）</strong></h4>\n<h5 class=\"h-lv5\">１　都市開発委員会は、その職務を円滑に遂行し、関連する勧告を行うため、一又は複数の小委員会を設置することができる。</h5>\n<h5 class=\"h-lv5\">２　前項の小委員会には、必要があると認めるときは、政府職員、専門家又は実務家を構成員として含めることができる。</h5>\n<h5 class=\"h-lv5\">３　都市開発委員会は、小委員会の勧告の全部又は一部を採択し、又は棄却することができる。</h5>\n<hr class=\"sep\">\n<p>1. <strong>承認権限と政策解釈権限の厳格な分離（第３２条第４項）</strong>:</p>\n<p>ダッカ規則では、建築物の建築承認に直接関与する実務者が都市開発委員会（UDC）のメンバーになることを禁じている。これは、日本の建築基準法第７８条に基づく「建築審査会」の委員が、特定行政庁の職員を兼ねることができない（中立性の確保）点と共通しているが、ダッカ規則では「政策立案・広域調整・解釈決定権限（UDC）」と「執行権限」の分離をより明示的に規定している。</p>\n<p>2. <strong>規則の不備を補完する超法規的裁定権限（第３３条第２号）</strong>:</p>\n<p>都市開発委員会に対し、「本規則で解決できない事項」についての最終的な決定権限を付与している。日本の建築基準法では、法文にない事項は国土交通大臣の認定（法第３８条）や各自治体の条例に委ねられるが、ダッカ規則では常設の最高専門家会議（UDC）が「実効性のある指針」を提示することで、過密都市特有の複雑な事案に対応する柔軟性を持たせている。</p>\n<p>3. <strong>高度な意思決定の要件（第３４条第２項）</strong>:</p>\n<p>会議の成立要件（クォーラム）として「出席者３分の２以上」を求めている点は、日本の多くの審議会（通常は過半数）と比較して、極めて高い代表性と合意形成を求めている。これは、多岐にわたる専門職トップが参加するUDCの決定が、事実上の法規範に近い重みを持つことを反映している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における「都市開発委員会（Urban Development Committee）」に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．都市開発委員会の会議は、原則として、四半期に１回開催されなければならない。</p>\n<p>２．都市開発委員会の会議を成立させるためには、委員の過半数が出席すれば足りる。</p>\n<p>３．建築物の建築承認（Building construction approval）に直接従事している者は、都市開発委員会の委員として指名されることはできない。</p>\n<p>４．都市開発委員会が設置した小委員会の勧告を受けた場合、委員会はその勧告をそのまま採択しなければならず、棄却することはできない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第３４条第１項により、「毎月少なくとも１回（ প্রতিমাসে অন্যূন একবার ）」の開催が規定されている。</p>\n<p>2. 誤り。第３４条第２項により、「３分の２以上（ অন্যূন দুই তৃতীয়াংশ ）」の出席が必要である。</p>\n<p><strong>3. 正しい。</strong> 第３２条第４項の規定通りである。</p>\n<p>4. 誤り。第３５条第３項により、勧告の全部若しくは一部を採択、又は棄却（ অগ্ৰাহ্য ）することができる。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13446","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h3 class=\"h-lv3\"><strong>চতুর্থ অধ্যায়</strong></h3>\n<p><strong>কারিগরি ব্যক্তির তালিকা, শ্রেণিবিন্যাস, ইত্যাদি</strong></p>\n<h4 class=\"h-lv4\"><strong>৩৬। কারিগরি ব্যক্তি, ইত্যাদি।</strong></h4>\n<h5 class=\"h-lv5\">(১) এই বিধিমালার উদ্দেশ্যপূরণকল্পে, নিম্নবর্ণিত পেশাজীবী প্রতিষ্ঠানের তালিকাভুক্ত সদস্যগণ কারিগরি ব্যক্তি হইবার যোগ্য হইবেন, যথা:---</h5>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নং</th><th>পেশাজীবী প্রতিষ্ঠানের নাম</th><th>নিবন্ধনযোগ্য কারিগরি ব্যক্তির পেশা</th></tr></thead>\n<tbody>\n<tr><td>(১)</td><td>(২)</td><td>(৩)</td></tr>\n<tr><td>১।</td><td>ইঞ্জিনিয়ার্স ইনস্টিটিউশন, বাংলাদেশ</td><td>প্রকৌশলী</td></tr>\n<tr><td>২।</td><td>ইনস্টিটিউট অব আর্কিটেক্টস, বাংলাদেশ</td><td>স্থপতি</td></tr>\n<tr><td>৩।</td><td>বাংলাদেশ ইনস্টিটিউট অব প্ল্যানার্স</td><td>পরিকল্পনাবিদ</td></tr>\n<tr><td>৪।</td><td>ইনস্টিটিউশন অব ডিপ্লোমা ইঞ্জিনিয়ার্স, বাংলাদেশ</td><td>ডিপ্লোমা প্রকৌশলী, ডিপ্লোমা স্থপতি</td></tr>\n</tbody>\n</table></div>\n<h5 class=\"h-lv5\">(২) প্রকল্পের আরম্ভেই আবেদনকারীকে কারিগরি ব্যক্তিগণের সহিত চুক্তিবদ্ধ হইতে হইবে এবং কারিগরি ব্যক্তিগণ তাহাদের স্বাক্ষরিত নকশা জমা প্রদান করিবেন।</h5>\n<h4 class=\"h-lv4\"><strong>৩৭। পেশাজীবী প্রতিষ্ঠানের দায়িত্ব, ইত্যাদি।</strong></h4>\n<h5 class=\"h-lv5\">(১) সংশ্লিষ্ট পেশাজীবী প্রতিষ্ঠান কারিগরি ব্যক্তির কাজ ও সেবার মান এবং পেশাগত সততা ও দক্ষতা নিশ্চিত করিবার দায়িত্ব পালন করিবে এবং সংশ্লিষ্ট ব্যক্তির নিবন্ধন সংক্রান্ত যাবতীয় তথ্যাদি ও তাহার বিরুদ্ধে আনীত শাস্তিমূলক ব্যবস্থার, যদি থাকে, বিষয়ে, সময় সময়, কর্তৃপক্ষকে অবহিত করিবে।</h5>\n<h5 class=\"h-lv5\">(২) কোনো কারিগরি ব্যক্তি এই বিধিমালার কোনো বিধান লঙ্ঘন করিলে কর্তৃপক্ষ সংশ্লিষ্ট কারিগরি ব্যক্তির সদস্য পদ বাতিলের নিমিত্ত সংশ্লিষ্ট পেশাজীবী প্রতিষ্ঠানকে অবহিত করিবে।</h5>\n<h5 class=\"h-lv5\">(৩) বিধি ৩৬ এর অধীন তালিকাভুক্ত কারিগরি ব্যক্তি ব্যতীত অন্য কোনো ব্যক্তি ইমারত নির্মাণের নিমিত্ত নকশা প্রণয়ন ও স্বাক্ষর প্রদান, নির্মাণ কাজ পরিদর্শন ও তদারকি, প্রতিবেদন তৈরি এবং তদসংশ্লিষ্ট কোনো কাজ করিতে পারিবে না।</h5>\n<h4 class=\"h-lv4\"><strong>৩৮। কারিগরি ব্যক্তির কর্তৃত্ব ও দায়িত্ব, ইত্যাদি।</strong></h4>\n<h5 class=\"h-lv5\">(১) ইমারতের ধরন বা ব্যবহার অনুসারে নিম্নবর্ণিত ছক ১ এ উল্লিখিত ইমারতের শ্রেণি এবং নিম্নবর্ণিত ছক ২ এ উল্লিখিত কারিগরি বিষয়ে অভিজ্ঞতা ও যোগ্যতাসম্পন্ন ব্যক্তি এই বিধিমালা অনুযায়ী নকশা প্রণয়ন ও স্বাক্ষর প্রদান, প্রতিবেদন তৈরি ও স্বাক্ষর করিতে পারিবে, যথা:—</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h3 class=\"h-lv3\"><strong>第４章　技術者のリスト、分類等</strong></h3>\n<h4 class=\"h-lv4\"><strong>第３６条（技術者等）</strong></h4>\n<h5 class=\"h-lv5\">１　本規則の目的を達成するため、次に掲げる専門職団体の登録会員は、技術者（Technical person）となる資格を有するものとする。</h5>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>専門職団体の名称</th><th>登録可能な技術者の職種</th></tr></thead>\n<tbody>\n<tr><td>１</td><td>バングラデシュ技術者協会 (IEB)</td><td>技術者（エンジニア）</td></tr>\n<tr><td>２</td><td>バングラデシュ建築士協会 (IAB)</td><td>建築士（アーキテクト）</td></tr>\n<tr><td>３</td><td>バングラデシュ都市計画家協会 (BIP)</td><td>都市計画家（プランナー）</td></tr>\n<tr><td>４</td><td>バングラデシュ・ディプロマ技術者協会 (IDEB)</td><td>ディプロマ技術者、ディプロマ建築士</td></tr>\n</tbody>\n</table></div>\n<h5 class=\"h-lv5\">２　申請者は、プロジェクトの開始時に技術者と契約を締結しなければならず、当該技術者は自ら署名した設計図書を提出しなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第３７条（専門職団体の責任等）</strong></h4>\n<h5 class=\"h-lv5\">１　関連する専門職団体は、技術者の業務及びサービスの質、並びに職業上の誠実性及び専門能力を確保する責任を負うものとし、当該技術者の登録に関する一切の情報及び、該当がある場合においては、当該技術者に対して講じられた懲戒処分について、随時、所管行政庁に通知しなければならない。</h5>\n<h5 class=\"h-lv5\">２　技術者が本規則の規定に違反したときは、所管行政庁は、当該技術者の会員資格の取消しを求めて、関連する専門職団体に通知するものとする。</h5>\n<h5 class=\"h-lv5\">３　第３６条の規定によりリスト化された技術者以外の者は、建築物の建築のための設計の策定及び署名、建築工事の検査及び監理、報告書の作成、並びにこれらに付随するいかなる業務も行ってはならない。</h5>\n<h4 class=\"h-lv4\"><strong>第３８条（技術者の権限及び責任等）</strong></h4>\n<h5 class=\"h-lv5\">１　建築物の種類又は用途に応じ、後記表１に掲げる建築物の分類及び後記表２に掲げる技術的事項に関し、経験及び資格を有する者は、本規則に従って設計図書の策定、署名、報告書の作成及び署名を行うことができる。</h5>\n<hr class=\"sep\">\n<p>1. <strong>有資格者の定義と職能団体の公的役割（第３６条・第３７条）</strong>:</p>\n<p>日本の建築士法では、建築士の免許は国（一級）又は都道府県（二級等）が交付し、行政が直接管理する。これに対しダッカ規則では、<strong>「各専門職団体（IEB, IAB等）への所属」</strong>を技術者の適格要件とし、団体がその誠実性や技術力を「確保する責任（ দায়িত্ব পালন করিবে ）」を負う仕組みをとっている。行政と民間団体の協力による自律的な専門職管理体制が法的に構築されている。</p>\n<p>2. <strong>無資格実務の厳格な排除（第３７条第３項）</strong>:</p>\n<p>日本の建築士法第３条（設計・監理の制限）等と同様に、リスト化された技術者以外の者が設計、署名、監理、報告書作成を行うことを厳格に禁じている。特に「署名」だけでなく「報告書の作成（ প্রতিবেদন তৈরি ）」も独占業務として明記されている。</p>\n<p>3. <strong>懲戒処分の行政・団体連携（第３７条第２項）</strong>:</p>\n<p>規則違反があった場合、行政（所管行政庁）が直接免許を剥奪するのではなく、所属団体に対して「会員資格の取消し（ সদস্য পদ বাতিল ）」を求める通知を行う。これは団体の自治を尊重しつつ、行政の監督権限を実効化させる独自の調整システムである。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における「技術者（Technical person）」に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．建築物の設計図書への署名や工事監理は、関連する専門職団体のリストに含まれていない者であっても、実務経験が １０年 以上あれば行うことができる。</p>\n<p>２．技術者が本規則の規定に違反した場合、所管行政庁は当該技術者の会員資格の取消しを求めて、所属する専門職団体へ通知するものとされている。</p>\n<p>３．バングラデシュ・ディプロマ技術者協会（IDEB）の会員は、ディプロマ技術者として登録することはできるが、ディプロマ建築士としての資格は認められない。</p>\n<p>４．建築主（申請者）は、確認済証（Construction Permit）の交付を受けた後に、必要に応じて技術者と契約を締結すれば足りる。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。第３７条第３項により、リスト化された技術者以外の実務は一切禁じられている。</p>\n<p><strong>2. 正しい。</strong> 第３７条第２項の規定通りである。</p>\n<p>3. 誤り。第３６条第１項の表により、IDEB会員はディプロマ建築士の資格も登録可能である。</p>\n<p>4. 誤り。第３６条第２項により、プロジェクトの「開始時（ আরম্ভেই ）」に契約を締結していなければならない。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13447","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৩৮। কারিগরি ব্যক্তির কর্তৃত্ব ও দায়িত্ব, ইত্যাদি (চলমান)</strong></h4>\n<h5 class=\"h-lv5\"><strong>ছক-১</strong></h5>\n<p><strong>ইমারতের উচ্চতা, মেঝের আয়তন ও ব্যবহার অনুযায়ী ইমারতের শ্রেণিবিভাগ</strong></p>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ইমারতের শ্রেণি</th><th>ইমারতের উচ্চতা</th><th>মেঝের ক্ষেত্রফল</th><th>ব্যবহারের শ্রেণি</th></tr></thead>\n<tbody>\n<tr><td>I</td><td>২ (দুই) তলা অথবা ৮ (আট) মিটার উচ্চতা বিশিষ্ট ইমারত (বেজমেন্ট ব্যতীত)</td><td>২৫০ বর্গমিটার পর্যন্ত ক্ষেত্রফল বিশিষ্ট ইমারত</td><td>A (A1-A2)</td></tr>\n<tr><td>II</td><td>৫ (পাঁচ) তলা পর্যন্ত ইমারত (বেজমেন্ট ব্যতীত বা বেজমেন্টসহ)</td><td>১০০০ বর্গমিটার পর্যন্ত ক্ষেত্রফল বিশিষ্ট ইমারত</td><td>A (A1-A5) এবং A6</td></tr>\n<tr><td>III</td><td>১০ (দশ) তলা বা ৩৩ (তেত্রিশ) মিটারের অধিক উচ্চতা পর্যন্ত ইমারত (বেজমেন্ট ব্যতীত বা বেজমেন্টসহ)</td><td>৭৫০০ বর্গমিটার পর্যন্ত ক্ষেত্রফল বিশিষ্ট ইমারত</td><td>A, B, C, E1, E2, F1, F2 এবং H1</td></tr>\n<tr><td>IV</td><td>বেজমেন্টসহ বা ব্যতীত যেকোনো উচ্চতার ইমারত</td><td>যেকোনো ক্ষেত্রফল</td><td>সকল শ্রেণির ব্যবহার</td></tr>\n</tbody>\n</table></div>\n<h5 class=\"h-lv5\"><strong>ছক-২</strong></h5>\n<p><strong>ডিজাইন, নকশা, প্রতিবেদন এবং নথিতে স্বাক্ষর করিবার জন্য যোগ্য নিবন্ধিত কারিগরি ব্যক্তিবর্গ</strong></p>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নং</th><th>কাজের ধরন</th><th>নিবন্ধিত কারিগরি ব্যক্তি</th><th>ভবনের শ্রেণির ভিত্তিতে সর্বনিম্ন প্রয়োজনীয় অভিজ্ঞতা (বৎসরে)</th><th></th><th></th><th></th></tr></thead>\n<tbody>\n<tr><td></td><td></td><td></td><td>I</td><td>II</td><td>III</td><td>IV</td></tr>\n<tr><td>(১)</td><td>(২)</td><td>(৩)</td><td>(৪)</td><td>(৫)</td><td>(৬)</td><td>(৭)</td></tr>\n<tr><td>১।</td><td>ভূমি জরিপ</td><td>পুর প্রকৌশলী</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td></tr>\n<tr><td></td><td></td><td>পরিকল্পনাবিদ</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td></tr>\n<tr><td></td><td></td><td>ডিপ্লোমা প্রকৌশলী (পুর)</td><td>আবশ্যক নহে</td><td>৩</td><td>৩</td><td>৩</td></tr>\n<tr><td></td><td></td><td>সনদ প্রাপ্ত জরিপকারী</td><td>আবশ্যক নহে</td><td>৩</td><td>৩</td><td>৩</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第３８条（技術者の権限及び責任等）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>表１</strong></h5>\n<p><strong>建築物の高さ、床面積及び用途に基づく建築物の分類</strong></p>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>建築物分類</th><th>建築物の高さ</th><th>床面積</th><th>用途分類</th></tr></thead>\n<tbody>\n<tr><td><strong>第 I 種</strong></td><td>２階建以下又は高さ８ｍ以下（地階を除く）</td><td>２５０㎡以下</td><td>居住用 A (A1-A2)</td></tr>\n<tr><td><strong>第 II 種</strong></td><td>５階建以下（地階の有無を問わない）</td><td>１０００㎡以下</td><td>居住用 A (A1-A5) 及び A6</td></tr>\n<tr><td><strong>第 III 種</strong></td><td>１０階建以下又は高さ３３ｍ以下（地階の有無を問わない）</td><td>７５００㎡以下</td><td>用途 A, B, C, E1, E2, F1, F2 及び H1</td></tr>\n<tr><td><strong>第 IV 種</strong></td><td>地階の有無を問わず制限なし</td><td>制限なし</td><td>全ての用途</td></tr>\n</tbody>\n</table></div>\n<h5 class=\"h-lv5\"><strong>表２</strong></h5>\n<p><strong>設計、図面、報告書及び書類に署名する資格を有する登録技術者</strong></p>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>業務の種類</th><th>登録技術者の職種</th><th>建築物の分類に基づく最低必要経験年数（年）</th><th></th><th></th><th></th></tr></thead>\n<tbody>\n<tr><td></td><td></td><td></td><td>第 I 種</td><td>第 II 種</td><td>第 III 種</td><td>第 IV 種</td></tr>\n<tr><td><strong>１</strong></td><td><strong>土地測量</strong></td><td>土木・構造技術者</td><td>不要</td><td>不要</td><td>不要</td><td>不要</td></tr>\n<tr><td></td><td></td><td>都市計画家</td><td>不要</td><td>不要</td><td>不要</td><td>不要</td></tr>\n<tr><td></td><td></td><td>ディプロマ技術者（土木）</td><td>不要</td><td>３年</td><td>３年</td><td>３年</td></tr>\n<tr><td></td><td></td><td>公認測量士</td><td>不要</td><td>３年</td><td>３年</td><td>３年</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">\n<p>1. <strong>建築物の詳細な階層的分類（表１）</strong>:</p>\n<p>ダッカ規則では、高さ・床面積・用途の三要素を組み合わせた「第I種〜第IV種」のマトリクスにより、設計可能な範囲を定義している。日本の建築基準法（法第３条）や建築士法では、構造、階数、延べ面積により一級・二級・木造建築士の設計範囲を定めているが、ダッカ規則のように「１０階建以下かつ７５００㎡以下」といった具体的な数値による「種別化」が実務の入り口として強調されている。</p>\n<p>2. <strong>実務経験年数による資格制限（表２）</strong>:</p>\n<p>表２において、技術者の職種だけでなく「経験年数」を建築物の種別に応じて直接規定している。日本では、建築士免許取得後の「経験年数」によって設計可能な「建築物の種別」が一律に制限される仕組み（実務上の要件はあるが、確認申請書の署名権限自体）はなく、ダッカ規則は学位や資格に加え、一定の実務実績を直接的に法文上で求めている。</p>\n<p>3. <strong>測量業務における専門職の関与</strong>:</p>\n<p>土地測量の署名資格として、技術者だけでなく「都市計画家（ পরিকল্পনাবিদ ）」を同等に配置している点は、日本の建築確認における敷地調査報告書等が主に土地家屋調査士等によって担われる点と比較して、都市計画的視点の強さを物語っている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における建築物の分類及び技術者の要件に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．「第 I 種建築物」とは、高さが ８ｍ 以下の建築物を指すが、地階（Basement）が含まれる場合であってもこの分類に該当する。</p>\n<p>２．「第 III 種建築物」は、階数が １０階建 以下又は高さが ３৩ｍ 以下の建築物であり、床面積が ৭,৫০০㎡ 以下のものが該当する。</p>\n<p>３．ディプロマ技術者（土木）が「第 II 種建築物」の土地測量に関する書類に署名する場合、最低でも ５年 の実務経験が必要である。</p>\n<p>４．「第 IV 種建築物」に分類される建築物において、土地測量の署名を行うことができるのは、公認測量士に限られる。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。第 I 種建築物は「地階を除く（ বেজমেন্ট ব্যতীত ）」と規定されている。</p>\n<p><strong>2. 正しい。</strong> 表１の「第 III 種建築物」の定義通りである。</p>\n<p>3. 誤り。表２により、ディプロマ技術者（土木）の第 II 種における必要経験年数は <strong>৩ (３) 年</strong> である。</p>\n<p>4. 誤り。表２により、土木・構造技術者（ পুর প্রকৌশলী ）や都市計画家（ পরিকল্পনাবিদ ）も、経験年数を問わず第 IV 種の署名が可能である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13448","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৩৮। কারিগরি ব্যক্তির কর্তৃত্ব ও দায়িত্ব, ইত্যাদি (চলমান)</strong></h4>\n<h5 class=\"h-lv5\"><strong>ছক-২ (চলমান)</strong></h5>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নং</th><th>কাজের ধরন</th><th>নিবন্ধিত কারিগরি ব্যক্তি</th><th>ভবনের শ্রেণির ভিত্তিতে সর্বনিম্ন প্রয়োজনীয় অভিজ্ঞতা (বৎসরে)</th><th></th><th></th><th></th></tr></thead>\n<tbody>\n<tr><td></td><td></td><td></td><td>I</td><td>II</td><td>III</td><td>IV</td></tr>\n<tr><td>(১)</td><td>(২)</td><td>(৩)</td><td>(৪)</td><td>(৫)</td><td>(৬)</td><td>(৭)</td></tr>\n<tr><td>২।</td><td>পরিকল্পনা প্রতিবেদন / টিআইএ / লে-আউট প্রণয়ন পরিকল্পনা সংশ্লিষ্ট যেকোনো এসেসমেন্ট</td><td>পরিকল্পনাবিদ</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td><td>৩</td><td>৫</td></tr>\n<tr><td>৩।</td><td>মৃত্তিকা পরীক্ষা প্রতিবেদন</td><td>জিওটেকনিক্যাল প্রকৌশলী যিনি মৃত্তিকা পরীক্ষার প্রতিবেদন বিশ্লেষণে অভিজ্ঞতা অর্জন করিয়াছেন</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td></tr>\n<tr><td></td><td></td><td>পুর প্রকৌশলী যিনি মৃত্তিকা পরীক্ষার প্রতিবেদন বিশ্লেষণে অভিজ্ঞতা অর্জন করিয়াছেন</td><td>আবশ্যক নহে</td><td>২</td><td>২</td><td>৫</td></tr>\n<tr><td>৪।</td><td>স্থাপত্য নকশা</td><td>স্থপতি</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td><td>২</td><td>৮</td></tr>\n<tr><td></td><td></td><td>পুর প্রকৌশলী</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td></tr>\n<tr><td></td><td></td><td>ডিপ্লোমা স্থপতি</td><td>আবশ্যক নহে</td><td>৫</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td></tr>\n<tr><td>৫।</td><td>কাঠামোগত নকশা</td><td>পুর প্রকৌশলী যাহার কাঠামোগত নকশা করিবার অভিজ্ঞতা অথবা Professional Engineer (পিইঞ্জ) সনদ রহিয়াছে</td><td>আবশ্যক নহে</td><td>২</td><td>৪</td><td>৮ (কাঠামোগত নকশা করিবার ক্ষেত্রে ৫ বৎসরের অভিজ্ঞতা)</td></tr>\n<tr><td></td><td></td><td>পুরপ্রকৌশলী যাহার কাঠামোগত নকশায় স্নাতকোত্তর সনদ রহিয়াছে</td><td>আবশ্যক নহে</td><td>১</td><td>৩</td><td>৮ (কাঠামোগত নকশা করিবার ৪ বৎসরের অভিজ্ঞতা)</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第３８条（技術者の権限及び責任等）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>表２（続き）</strong></h5>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>業務の種類</th><th>登録技術者の職種</th><th>建築物の分類に基づく最低必要経験年数（年）</th><th></th><th></th><th></th></tr></thead>\n<tbody>\n<tr><td></td><td></td><td></td><td>第 I 種</td><td>第 II 種</td><td>第 III 種</td><td>第 IV 種</td></tr>\n<tr><td><strong>２</strong></td><td><strong>計画報告書 / TIA / レイアウト計画 / 計画関連の各種評価</strong></td><td>都市計画家 (Planner)</td><td>不要</td><td>不要</td><td>３</td><td>５</td></tr>\n<tr><td><strong>３</strong></td><td><strong>地質調査報告書 (Soil Test Report)</strong></td><td>地盤技術者 (Geotechnical Engineer) ※地質分析の経験を有する者</td><td>不要</td><td>不要</td><td>不要</td><td>不要</td></tr>\n<tr><td></td><td></td><td>土木・構造技術者 (Civil Engineer) ※地質分析の経験を有する者</td><td>不要</td><td>２</td><td>２</td><td>５</td></tr>\n<tr><td><strong>４</strong></td><td><strong>意匠設計 (Architectural Design)</strong></td><td>建築士 (Architect)</td><td>不要</td><td>不要</td><td>２</td><td>８</td></tr>\n<tr><td></td><td></td><td>土木・構造技術者 (Civil Engineer)</td><td>不要</td><td>不要</td><td>不要</td><td>不要</td></tr>\n<tr><td></td><td></td><td>ディプロマ建築士 (Diploma Architect)</td><td>不要</td><td>５</td><td>不要</td><td>不要</td></tr>\n<tr><td><strong>５</strong></td><td><strong>構造設計 (Structural Design)</strong></td><td>土木・構造技術者 (Civil Engineer) ※構造設計経験者又は PEng 認定者</td><td>不要</td><td>２</td><td>４</td><td>８ (内、構造設計経験５年)</td></tr>\n<tr><td></td><td></td><td>土木・構造技術者 (Civil Engineer) ※構造設計の修士学位保持者</td><td>不要</td><td>１</td><td>３</td><td>８ (内、構造設計経験４年)</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">\n<p>1. <strong>実務経験年数による厳格な設計制限（表２）</strong>:</p>\n<p>ダッカ規則では、建築物の規模（種別）が上がるにつれ、必要とされる実務経験年数が大幅に増大する。特に第IV種（無制限）の意匠設計には「８年」、構造設計にも「８年」の経験が必要とされている。日本の建築基準法・建築士法では、一級建築士免許を取得すれば、構造・設備設計一級建築士の関与義務はあるものの、一律に「経験年数」によって設計可能な「建築物の規模」がこれほど多段階に制限されることはなく、実務キャリアを直接的な法的資格要件に組み込んでいる点が特徴である。</p>\n<p>2. <strong>専門分野（地盤・計画）の独立した権限</strong>:</p>\n<p>地質調査報告書において、専任の「地盤技術者（ জিওটেকনিক্যাল প্রকৌশলী ）」は全種別で経験年数を問わず署名可能である一方、一般的な「土木・構造技術者」が第IV種の報告書を作成するには５年の経験が求められる。また、計画報告書には「都市計画家（ পরিকল্পনাবিদ ）」の署名が不可欠とされている。これは、各専門職の職能分離が法文上で明確に定義されている。</p>\n<p>3. <strong>高学歴者に対する経験年数の短縮規定（項番５）</strong>:</p>\n<p>構造設計において、修士学位（ স্নাতকোত্তর সনদ ）を保持している土木・構造技術者は、第II種及び第III種において、通常の技術者よりも１年間の経験年数短縮が認められている。学術的バックグラウンドを実務経験と同等に評価する仕組みが法制化されている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における技術者の資格要件に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．「第 III 種建築物」の計画報告書（Planning Report）を作成し署名する場合、都市計画家（Planner）であっても最低 ５年 の実務経験が必要である。</p>\n<p>２．地質調査報告書（Soil Test Report）の分析及び署名については、地盤技術者（Geotechnical Engineer）であれば、建築物の種別を問わず実務経験年数の制限なく行うことができる。</p>\n<p>３．ディプロマ建築士（Diploma Architect）は、実務経験が ８年 以上あれば、全ての種別の建築物の意匠設計図書に署名することができる。</p>\n<p>４．「第 IV 種建築物」の構造設計を行う際、構造設計の修士学位を保持している土木・構造技術者は、最低でも ５年 の構造設計実務経験が必要である。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。表２の項番２により、第III種建築物の場合は <strong>৩ (３) 年</strong> である。</p>\n<p><strong>2. 正しい。</strong> 表２の項番３の規定通り、「不要（ আবশ্যক নহে ）」とされている。</p>\n<p>3. 誤り。表２の項番４により、ディプロマ建築士は「第 II 種」のみ署名可能である。</p>\n<p>4. 誤り。表２の項番５により、修士学位保持者の場合は <strong>৪ (４) বছর</strong> の構造設計経験が必要である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13449","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৩৮। কারিগরি ব্যক্তির কর্তৃত্ব ও দায়িত্ব, ইত্যাদি (চলমান)</strong></h4>\n<h5 class=\"h-lv5\"><strong>ছক-২ (চলমান)</strong></h5>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নং</th><th>কাজের ধরন</th><th>নিবন্ধিত কারিগরি ব্যক্তি</th><th>ভবনের শ্রেণির ভিত্তিতে সর্বনিম্ন প্রয়োজনীয় অভিজ্ঞতা (বৎসরে)</th><th></th><th></th><th></th></tr></thead>\n<tbody>\n<tr><td></td><td></td><td></td><td>I</td><td>II</td><td>III</td><td>IV</td></tr>\n<tr><td>(১)</td><td>(২)</td><td>(৩)</td><td>(৪)</td><td>(৫)</td><td>(৬)</td><td>(৭)</td></tr>\n<tr><td>৬।</td><td>প্র্লাম্বিং নকশা</td><td>প্লাম্বিং প্রকৌশলী</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td><td>৪</td><td>৮</td></tr>\n<tr><td></td><td></td><td>স্থপতি</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td><td>---</td></tr>\n<tr><td></td><td></td><td>ডিপ্লোমা প্রকৌশলী (পুর)</td><td>আবশ্যক নহে</td><td>৩</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td></tr>\n<tr><td>৭।</td><td>যান্ত্রিক নকশা (HVAC/উল্লম্ব পরিবহন)</td><td>যন্ত্র প্রকৌশলী</td><td>আবশ্যক নহে</td><td>২</td><td>৪</td><td>৮</td></tr>\n<tr><td>৮।</td><td>বৈদ্যুতিক নকশা</td><td>তড়িৎ প্রকৌশলী</td><td>আবশ্যক নহে</td><td>২</td><td>৪</td><td>৮</td></tr>\n<tr><td></td><td></td><td>ডিপ্লোমা প্রকৌশলী (তড়িৎ)</td><td>আবশ্যক নহে</td><td>৩</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td></tr>\n<tr><td>৯।</td><td>নির্মাণ তদারকি</td><td>স্থপতি বা প্রকৌশলী অথবা পিইঞ্জ</td><td>আবশ্যক নহে</td><td>২</td><td>৪</td><td>৮</td></tr>\n<tr><td></td><td></td><td>ডিপ্লোমা স্থপতি বা ডিপ্লোমা প্রকৌশলী</td><td>আবশ্যক নহে</td><td>২</td><td>৪</td><td>২০*</td></tr>\n<tr><td>১০।</td><td>ভবন অপসারণ</td><td>পুর প্রকৌশলী</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td><td>২</td><td>৮</td></tr>\n<tr><td></td><td></td><td>ডিপ্লোমা প্রকৌশলী (পুর)</td><td>আবশ্যক নহে</td><td>২</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td></tr>\n<tr><td>১১।</td><td>সমাপ্তি প্রতিবেদন</td><td>স্থপতি এবং প্রকৌশলী</td><td>আবশ্যক নহে</td><td>২</td><td>৪</td><td>৮</td></tr>\n</tbody>\n</table></div>\n<h5 class=\"h-lv5\"><strong>* ভবনের শ্রেণি IV এর জন্য উপযুক্ত এবং নিবন্ধিত বা লাইসেন্সধারী স্থপতি বা প্রকৌশলী দ্বার
