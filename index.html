><td>―</td><td>1.5</td><td>2.0</td><td>3.0</td><td>5.0</td></tr>\n<tr><td><strong>11</strong></td><td><strong>用途 I：集会施設</strong></td><td><strong>I1</strong></td><td>大規模講堂（固定席 1000席以上）</td><td>―</td><td>―</td><td>―</td><td>―</td><td>―</td><td>―</td><td>3.5</td><td>4.5</td><td>5.5</td></tr>\n<tr><td></td><td></td><td><strong>I2</strong></td><td>小規模講堂（固定席 1000席未満）</td><td>―</td><td>―</td><td>―</td><td>―</td><td>―</td><td>2.0</td><td>3.0</td><td>4.0</td><td>5.0</td></tr>\n<tr><td></td><td></td><td><strong>I3</strong></td><td>大規模集会場（固定席以外、収容 300人以上）</td><td>―</td><td>―</td><td>―</td><td>―</td><td>―</td><td>1.5</td><td>2.5</td><td>3.5</td><td>4.5</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">\n<p>1. <strong>用途規模による道路幅員要件の差別化（用途 F1 vs F2）</strong>:</p>\n<p>ダッカ規則では、300㎡を境界として店舗を F1（小規模）と F2（大規模）に区分している。小規模店舗（F1）は幅員 4.88m の道路から容積率が割り当てられるのに対し、大規模店舗（F2）は幅員 9.0m 以上の道路に面していなければ容積率の指定がなく、事実上建築が制限される。日本の建築基準法（法第48条）でも用途地域ごとに床面積制限（例：1万㎡超の店舗等）があるが、ダッカ規則はより小規模な段階（300㎡）から、接道幅員というインフラ性能によって建築の可否を峻別している点が非常に厳格である。</p>\n<p>2. <strong>ガソリンスタンド（F3）の立地規制</strong>:</p>\n<p>ガソリンスタンド（F3）については、幅員 12.0m 以上の幹線道路沿いでなければ容積率が算出されない。日本の消防法や建築基準法における危険物施設の規制よりも、都市計画上の動線確保（渋滞防止等）を目的とした幅員制限が形態規制（FAR）の中に直接組み込まれている。</p>\n<p>3. <strong>集会施設（用途 I）の高水準な接道要求</strong>:</p>\n<p>1000席以上の大規模講堂（I1）は、幅員 12.0m 以上の道路を要求している。日本の建築基準法施行令第121条（避難階段）や各自治体の条例（東京都建築安全条例等）でも劇場等の特殊建築物には接道要件があるが、ダッカ規則は容積率の段階値を細かく設定することで、大規模集客施設の郊外・狭隘地へのスプロール化を強く抑制している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における容積率（FAR）の制限に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．延べ面積 500㎡ の大規模店舗（F2）を建築する場合、前面道路の幅員が 6.0m であれば 1.75 の容積率が適用される。</p>\n<p>２．一般可燃性物資を貯蔵する倉庫（H2）は、前面道路の幅員が 9.0m 未満の区域においては容積率の指定がない。</p>\n<p>３．ガソリンスタンド（F3）を建築する場合、前面道路の幅員が 9.0m であれば 1.25 の容積率の適用を受けることができる。</p>\n<p>４．大規模講堂（I1、固定席 1000席以上）を建築する場合、幅員 24.0m 以上の道路に面していても、容積率は 5.0 を超えることができない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。表５の F2（項番8）において、4.88m 及び 6.0m の欄は空欄（―）であり、9.0m 以上の道路が必要である。</p>\n<p><strong>2. 正しい。</strong> 表５の H2（項番10）を確認すると、6.0m までの欄はすべて空欄（―）であり、9.0m 以上の道路に面していなければ容積率が算定されない。</p>\n<p>2. 誤り。F3（項番8）は道路幅員 12.0m（Column 11）からしか数値が設定されていない。</p>\n<p>3. 誤り。I1（項番11）において、幅員 24.0m 以上（Column 13）の欄には 5.5 が設定されている。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13464","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h6 class=\"h-lv6\"><strong>সারণি-৫ (চলমান)</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নং</th><th>ইমারতের শ্রেণি</th><th>ইমারতের উপ-শ্রেণি</th><th>ব্যবহারের ধরন</th><th>রাস্তার প্রশস্ততা সংশ্লিষ্ট অনুমোদনযোগ্য FAR সূচক</th><th></th><th></th><th></th><th></th><th></th><th></th><th></th><th></th></tr></thead>\n<tbody>\n<tr><td></td><td></td><td></td><td></td><td>১.৮ মিটার হইতে ২.৫ মিটারের কম</td><td>২.৫ মিটার হইতে ৩.৬৬ মিটারের কম</td><td>৩.৬৬ মিটার হইতে ৪.৮৮ মিটারের কম</td><td>৪.৮৮ মিটার</td><td>৬.০ মিটার</td><td>৯.০ মিটার</td><td>১২.০ মিটার</td><td>১৮.০ মিটার</td><td>২৪.০ মিটার বা তদূর্ধ্ব</td></tr>\n<tr><td></td><td></td><td>I4</td><td>ছোট মিলনায়তন (আসন স্থানান্তর যোগ্য নহে এবং জনসংখ্যা ৩০০ এর কম)</td><td>-</td><td>-</td><td>-</td><td>১.৫</td><td>১.৭৫</td><td>২.০</td><td>২.২৫</td><td>২.৫</td><td>২.৭৫</td></tr>\n<tr><td></td><td></td><td>I5</td><td>ধর্মীয়, ক্রীড়া ও সংস্কৃতি বিষয়ক</td><td>-</td><td>-</td><td>১.৫</td><td>২.০</td><td>৩.০</td><td>৪.০</td><td>৫.০</td><td>৬.০</td><td>७.০</td></tr>\n<tr><td>১২</td><td>J: বিপজ্জনক ব্যবহারের ভবন</td><td>J1</td><td>বিস্ফোরণ ঘটাইতে পারে এইরূপ ভবন</td><td>-</td><td>-</td><td>-</td><td>-</td><td>২</td><td>২.৫</td><td>৩.২৫</td><td>৪.২৫</td><td>৫.২৫</td></tr>\n<tr><td></td><td></td><td>J2</td><td>রাসায়নিক ধরনের বিপজ্জনক ভবন</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>৩.০</td><td>৪.০</td></tr>\n<tr><td></td><td></td><td>J3</td><td>জীবাণুধরনের বিপজ্জনক ভবন (Biological hazard building)</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>৩.০</td><td>৪.০</td></tr>\n<tr><td></td><td></td><td>J4</td><td>বিকিরন ধরনের বিপজ্জনক ভবন (Radiation hazard building)</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>৩.০</td><td>৪.০</td></tr>\n<tr><td>১৩</td><td>K: বিবিধ</td><td>K1</td><td>বাণিজ্যিক পার্কিং</td><td>-</td><td>-</td><td>-</td><td>-</td><td>৩.৫</td><td>৪.০</td><td>৪.৫</td><td>৬.০০</td><td>৬.৫০</td></tr>\n<tr><td></td><td></td><td>K2</td><td>ব্যক্তি মালিকানাধীন পার্কিং</td><td>-</td><td>-</td><td>১.০</td><td>১.৪</td><td>৩.৫</td><td>৪.০</td><td>৪.৫</td><td>৬.০০</td><td>৬.৫০</td></tr>\n<tr><td></td><td></td><td>K3</td><td>মেরামত কারখানা</td><td>-</td><td>-</td><td>-</td><td>-</td><td>২.০</td><td>২.২৫</td><td>২.৫</td><td>৩.০</td><td>৪.০</td></tr>\n<tr><td>১৪</td><td>L: ইউটিলিটি</td><td>L</td><td>ইউটিলিটি সার্ভিসসমূহ (পাম্প হাউজ, সাব-স্টেশন, আন্ডার-গ্রাউন্ড সাব স্টেশন ইত্যাদি)</td><td>নগর উন্নয়ন কমিটির পরামর্শক্রমে নির্ধারিত হইবে।</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h6 class=\"h-lv6\"><strong>表５（承前）</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>建築物の用途分類</th><th>小分類</th><th>用途の形態</th><th>道路幅員に応じた許容容積率（FAR）指標</th><th></th><th></th><th></th><th></th><th></th><th></th><th></th><th></th></tr></thead>\n<tbody>\n<tr><td></td><td></td><td></td><td></td><td>1.8m以上 2.5m未満</td><td>2.5m以上 3.66m未満</td><td>3.66m以上 4.88m未満</td><td>4.88m以上</td><td>6.0m以上</td><td>9.0m以上</td><td>12.0m以上</td><td>18.0m以上</td><td>24.0m以上</td></tr>\n<tr><td>(1)</td><td>(2)</td><td>(3)</td><td>(4)</td><td>(5)</td><td>(6)</td><td>(7)</td><td>(8)</td><td>(9)</td><td>(10)</td><td>(11)</td><td>(12)</td><td>(13)</td></tr>\n<tr><td></td><td></td><td><strong>I4</strong></td><td>小規模講堂（固定席、収容300人未満）</td><td>―</td><td>―</td><td>―</td><td>1.5</td><td>1.75</td><td>2.0</td><td>2.25</td><td>2.5</td><td>2.75</td></tr>\n<tr><td></td><td></td><td><strong>I5</strong></td><td>宗教、スポーツ及び文化施設</td><td>―</td><td>―</td><td>1.5</td><td>2.0</td><td>3.0</td><td>4.0</td><td>5.0</td><td>6.0</td><td>7.0</td></tr>\n<tr><td><strong>12</strong></td><td><strong>用途 J：危険物施設</strong></td><td><strong>J1</strong></td><td>爆発の危険性がある建築物</td><td>―</td><td>―</td><td>―</td><td>―</td><td>2.0</td><td>2.5</td><td>3.25</td><td>4.25</td><td>5.25</td></tr>\n<tr><td></td><td></td><td><strong>J2</strong></td><td>化学的危険性がある建築物</td><td>―</td><td>―</td><td>―</td><td>―</td><td>―</td><td>―</td><td>―</td><td>3.0</td><td>4.0</td></tr>\n<tr><td></td><td></td><td><strong>J3</strong></td><td>生物学的危険性がある建築物</td><td>―</td><td>―</td><td>―</td><td>―</td><td>―</td><td>―</td><td>―</td><td>3.0</td><td>4.0</td></tr>\n<tr><td></td><td></td><td><strong>J4</strong></td><td>放射線学的危険性がある建築物</td><td>―</td><td>―</td><td>―</td><td>―</td><td>―</td><td>―</td><td>―</td><td>3.0</td><td>4.0</td></tr>\n<tr><td><strong>13</strong></td><td><strong>用途 K：その他</strong></td><td><strong>K1</strong></td><td>営業用駐車場</td><td>―</td><td>―</td><td>―</td><td>―</td><td>3.5</td><td>4.0</td><td>4.5</td><td>6.00</td><td>6.50</td></tr>\n<tr><td></td><td></td><td><strong>K2</strong></td><td>自己用駐車場</td><td>―</td><td>―</td><td>1.0</td><td>1.4</td><td>3.5</td><td>4.0</td><td>4.5</td><td>6.00</td><td>6.50</td></tr>\n<tr><td></td><td></td><td><strong>K3</strong></td><td>修理工場（リペアガレージ）</td><td>―</td><td>―</td><td>―</td><td>―</td><td>2.0</td><td>2.25</td><td>2.5</td><td>3.0</td><td>4.0</td></tr>\n<tr><td><strong>14</strong></td><td><strong>用途 L：インフラ施設</strong></td><td><strong>L</strong></td><td>インフラ設備（ポンプ室、変電所、地下変電所等）</td><td>都市開発委員会の助言に基づき決定するものとする。</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">\n<p>1. <strong>危険物施設（用途 J）に対する極めて厳しい接道要求</strong>:</p>\n<p>ダッカ規則では、化学的、生物学的、放射線学的な危険を伴う建築物（J2, J3, J4）を建築する場合、前面道路幅員が<strong>18.0メートル以上</strong>なければ容積率が算出されない（それ未満の欄はすべて空欄）。日本の建築基準法では、危険物の貯蔵・処理は主に「用途地域（法第48条）」による制限を受けるが、ダッカ規則では道路インフラという物理的条件によって、これら高リスク施設を幹線道路沿いへ強力に誘導・限定している。</p>\n<p>2. <strong>インフラ施設（用途 L）の個別審査制</strong>:</p>\n<p>ポンプ室や変電所などの重要インフラ施設（L）については、道路幅員に応じた一律の数値を定めず、「都市開発委員会の助言（advice of Urban Development Committee）」により個別に決定するとしている。日本の建築基準法第52条第14項（容積率の特例）等に近い運用だが、インフラ施設を最初から「表外」の個別決定事項としている点は、都市機能の維持を最優先する実務的な配慮である。</p>\n<p>3. <strong>駐車場（用途 K）に対する高い容積率の許容</strong>:</p>\n<p>営業用駐車場（K1）や自己用駐車場（K2）に対し、18.0メートル以上の道路沿いでは容積率 <strong>6.0〜6.5</strong> という極めて高い数値を与えている。これは、深刻な路上駐車問題を解決するため、駐車場建築物の高層化・大規模化を法的に強力に奨励（インセンティブを付与）していることを示している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における容積率（FAR）の制限に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．自己用駐車場（K2）を建築する場合、前面道路の幅員が 3.66メートル 以上 4.88メートル 未満の範囲であれば、1.0 の容積率が適用される。</p>\n<p>２．生物学的危険性がある建築物（J3）は、前面道路の幅員が 12.0メートル の区域において、3.0 の容積率の適用を受けて建築することができる。</p>\n<p>３．変電所などのインフラ設備（L）の容積率は、建築主事が道路幅員に基づき一律に決定しなければならない。</p>\n<p>４．宗教施設（I5）は、道路幅員が 6.0メートル であれば 2.0、24.0メートル 以上であれば 7.0 の容積率がそれぞれ適用される。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：１</strong></p>\n<p><strong>1. 正しい。</strong> 表５の K2（項番13）において、3.66m以上4.88m未満の欄（Column 7）を確認すると、容積率は <strong>1.0</strong> である。</p>\n<p>2. 誤り。J3（項番12）は、道路幅員 <strong>18.0メートル以上</strong>（Column 12）からしか数値が設定されていないため、12.0m道路では建築不可である。</p>\n<p>3. 誤り。用途 L は「都市開発委員会の助言（নগর উন্নয়ন কমিটির পরামর্শক্রমে）」に基づき決定される。</p>\n<p>4. 誤り。表５の I5（項番11）において、道路幅員 6.0m のときは <strong>3.0</strong> である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13465","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h6 class=\"h-lv6\"><strong>সারণি-৫ (চলমান)</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নং</th><th>ইমারতের শ্রেণি</th><th>ইমারতের উপ-শ্রেণি</th><th>ব্যবহারের ধরন</th><th>রাস্তার প্রশস্ততা সংশ্লিষ্ট অনুমোদনযোগ্য FAR সূচক</th></tr></thead>\n<tbody>\n<tr><td>১৫</td><td>M: বিবিধ</td><td>M1</td><td>বিশেষ ধরনের কাঠামো (স্মৃতি সৌধ, শহীদ মিনার ইত্যাদি)</td><td>নগর উন্নয়ন কমিটির পরামর্শক্রমে নির্ধারিত হইবে।</td></tr>\n<tr><td></td><td></td><td>M2</td><td>টাওয়ার, বিলবোর্ড বা এরূপ স্থাপনা</td><td>নগর উন্নয়ন কমিটির পরামর্শক্রমে নির্ধারিত হইবে।</td></tr>\n</tbody>\n</table></div>\n<h6 class=\"h-lv6\"><strong>দ্রষ্টব্য:</strong></h6>\n<h6 class=\"h-lv6\">১। A5 (হোটেল, মোটেল, গেস্ট হাউজ, সার্ভিস এপার্টমেন্ট) শ্রেণি বিশদ অঞ্চল পরিকল্পনা (২০২২-২০৩৫) অনুসারে বাণিজ্যিক ব্যবহার হিসাবে গণ্য হইবে এবং তদানুযায়ী ফি প্রযোজ্য হইবে, তবে আবাসিক হিসাবেই FAR বিবেচ্য হইবে এবং কোড অনুযায়ী কাঠামোগত ও অন্যান্য নকশা প্রণয়ন করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">২। অকুপেন্সি টাইপ B এর জন্য আবশ্যিকভাবে মানদণ্ড (মোট জমির এক তৃতীয়াংশ একত্রে যাহা সেটব্যাকের জন্য সংরক্ষিত জমি ব্যতীত এবং প্রস্থ দৈর্ঘ্যের অর্ধেকের কম হইতে পারিবে না) অনুযায়ী খেলার মাঠ রাখিতে হইবে।</h6>\n<h6 class=\"h-lv6\">৩। A4 (মেস, বোর্ডিং, ডরমিটরি, ও হোস্টেল) শ্রেণির ইমারত স্বাস্থ্যসেবা, শিক্ষা প্রতিষ্ঠান, সরকারি উদ্যোগে নির্মিত, বা শিল্প অঞ্চল ভূমি ব্যবহারের ক্ষেত্রে প্রযোজ্য হইবে।</h6>\n<h6 class=\"h-lv6\">৪। A3 ব্যতীত অন্যান্য ক্ষেত্রে জনঘনত্ব নিরূপণে আবাসন ইউনিটের সংখ্যা প্রযোজ্য হইবে না।</h6>\n<h6 class=\"h-lv6\">৫। A5, B, C, D, E এবং I অকুপেন্সি শ্রেণির ইমারতের ক্ষেত্রে ১২ মিটার বা তদূর্ধ্ব প্রশস্ত রাস্তার পাশে ১৩৩৯ বর্গমিটার (২০ কাঠা) বা তদূর্ধ্ব প্লটে সর্বোচ্চ ১২ মিটার (প্যারাপেডের উচ্চতা ব্যতীত) পোডিয়াম নির্মাণ করা যাইবে যাহা FAR অন্তর্ভুক্ত হইবে। পোডিয়াম দ্বারা আচ্ছাদিত ভূমির পরিমাপ অতিরিক্ত ভূমি আচ্ছাদনের বেশি হইতে পারিবে না এবং পোডিয়াম সেটব্যাক স্পেসে নির্মাণ করা যাইবে না।</h6>\n<h6 class=\"h-lv6\">৬। আবাসিক ভূমি ব্যবহারের প্লট ব্যতীত A5 (হোটেল, মোটেল, গেস্ট হাউজ, সার্ভিস এপার্টমেন্ট) শ্রেণির ক্ষেত্রে এক একর বা ইহার অধিক জমির জন্য NR FAR গ্রহণ করা যাইবে।</h6>\n<h6 class=\"h-lv6\">৭। B2 (শিক্ষা প্রতিষ্ঠান) এর জন্য ৩ একর; C4, C5, D1, D2, E1, এবং E3 এর ক্ষেত্রে ২০ কাঠা বা ইহার অধিক জমির জন্য NR FAR গ্রহণ করা যাইবে।</h6>\n<h6 class=\"h-lv6\">৮। আবাসিকের সহিত অন্যান্য ব্যবহার মিশ্রণের ক্ষেত্রে কোড ও মহাপরিকল্পনা অনুসরণপূর্বক অকুপেন্সি টাইপ পরিকল্পনা অনুমোদন পত্রে উল্লেখ থাকিবে।</h6>\n<h6 class=\"h-lv6\">**NR = Non-Restricted</h6>\n<h5 class=\"h-lv5\">(৬) বিদ্যমান রাস্তাটি বর্ণিত ধাপ অপেক্ষা প্রশস্ত হইলে রাস্তার অতিরিক্ত প্রশস্ততার উপর ভিত্তি করিয়া FAR নির্ধারিত হইবে এবং উক্ত বৃদ্ধির পরিমাণ রাস্তার প্রশস্ততা অনুযায়ী পরবর্তী ধাপের FAR সূচক পর্যন্ত সমানুপাতিক হারে বৃদ্ধি পাইবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h6 class=\"h-lv6\"><strong>表５（承前）</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>建築物の用途分類</th><th>小分類</th><th>用途の形態</th><th>道路幅員に応じた許容容積率（FAR）指標</th></tr></thead>\n<tbody>\n<tr><td><strong>15</strong></td><td><strong>用途 M：その他</strong></td><td><strong>M1</strong></td><td>特殊な構造物（記念碑、殉職者記念塔等）</td><td>都市開発委員会の助言に基づき決定するものとする。</td></tr>\n<tr><td></td><td></td><td><strong>M2</strong></td><td>塔、ビルボード（看板）又はこれらに類する工作物</td><td>都市開発委員会の助言に基づき決定するものとする。</td></tr>\n</tbody>\n</table></div>\n<h6 class=\"h-lv6\"><strong>備考：</strong></h6>\n<h6 class=\"h-lv6\">１　ホテル、モーテル、ゲストハウス、サービスアパートメント（用途分類 A5）は、詳細地域計画（2022-2035）に基づき<strong>商業用途</strong>としてみなされ、これに応じた手数料が適用される。ただし、容積率（FAR）の算定にあたっては<strong>住宅用途</strong>として扱い、法典（BNBC）に従った構造設計及びその他の設計を行わなければならない。</h6>\n<h6 class=\"h-lv6\">２　教育施設（用途分類 B）については、基準（敷地面積の３分の１以上を一画にまとめ、セットバック面積を除外した上で、短辺が長辺の２分の１以上であること）に従い、義務的に<strong>運動場（Playing field）</strong> を設置しなければならない。</h6>\n<h6 class=\"h-lv6\">３　寄宿舎、ドミトリー、ホステル（用途分類 A4）は、医療施設、教育施設、政府による建設プロジェクト、又は工業地域における土地利用の場合に適用される。</h6>\n<h6 class=\"h-lv6\">４　共同住宅（用途分類 A3）を除き、人口密度の算定において住戸数（Housing units）の制限は適用されない。</h6>\n<h6 class=\"h-lv6\">５　用途分類 A5、B、C、D、E 及び I の建築物において、幅員 12.0m 以上の道路に接し、かつ面積 1339㎡（20 Katha）以上の敷地である場合は、高さ <strong>12.0m 以下</strong>（パラペットを除く）の<strong>ポディウム（Podium）</strong>を建築することができる。当該ポディウムは容積率に算入されるものとする。ポディウムの建築面積は追加建蔽率を超えてはならず、またセットバック範囲内に建築してはならない。</h6>\n<h6 class=\"h-lv6\">６　住宅用途の敷地を除き、ホテル等（用途分類 A5）で面積 1エーカー（約4047㎡）以上のものについては、<strong>容積率の制限を受けない（NR）</strong>。</h6>\n<h6 class=\"h-lv6\">７　大学（B2）については 3エーカー以上、矯正施設（C4, C5）、病院（D1, D2）及び事務所（E1, E3）については 20 Katha（約1339㎡）以上の敷地である場合、<strong>容積率の制限を受けない（NR）</strong>。</h6>\n<h6 class=\"h-lv6\">８　住宅と他の用途が混在する場合、法典及びマスタープランに従い、計画承認書に用途の類型が明記されるものとする。</h6>\n<h6 class=\"h-lv6\"><strong>**NR = 制限なし（Non-Restricted）</strong></h6>\n<h5 class=\"h-lv5\"><strong>６</strong>　現存する道路の幅員が表に定める段階値の中間にある場合、容積率は当該道路幅員に基づき、次の段階の指標まで<strong>比例配分</strong>により算定されるものとする。</h5>\n<hr class=\"sep\">\n<p>1. <strong>容積率の「無制限（NR）」規定（備考6, 7）</strong>:</p>\n<p>ダッカ規則の最大の特徴は、一定以上の敷地面積（1エーカーや20 Katha等）を有する場合、ホテルや大学、病院等の特定用途に対し容積率制限を撤廃（Non-Restricted）する点にある。日本の建築基準法では、いかなる場合も都市計画による容積率の上限（法第52条）が存在し、ボーナス制度（法第59条の2等）でも一定の数値に抑えられる。ダッカ規則は、大規模敷地への投資と高密化を極めて強力に推進している。</p>\n<p>2. <strong>ポディウム（基壇部）の定義と制限（備考5）</strong>:</p>\n<p>特定の用途かつ広い道路に面した大規模敷地において、「高さ12m以下のポディウム」という形態を法的に定義し、その許容条件を明文化している。日本では「総合設計制度」等により公開空地を設けることで形態が緩和されるが、ダッカ規則のようにポディウムそのものの高さ（12m）を具体的な基準として提示する点は、都市景観の連続性を意図した独自の形態規制である。</p>\n<p>3. <strong>教育施設における「運動場」の定量的義務（備考2）</strong>:</p>\n<p>日本の建築基準法には学校の運動場面積に関する直接的な規定はない（学校教育法等に委ねられる）が、ダッカ規則は「敷地面積の3分の1」かつ「形状（短辺比率）」まで建築法規の中で厳格に定めている。これは都市化による子供の活動空間の喪失を建築制限によって直接防ぐ意図がある。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における容積率（FAR）及び形態規制に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．ホテル（A5）を建築する場合、手数料の算定及び容積率（FAR）の算定のいずれにおいても、商業用途としての規定が適用される。</p>\n<p>２．教育施設（B）を建築する際には、敷地面積の ４分の１ 以上を一画にまとめた運動場（Playing field）を設置しなければならない。</p>\n<p>３．大学（B2）を建築する場合において、敷地面積が ３エーカー 以上であれば、容積率の制限を受けない（Non-Restricted）。</p>\n<p>４．高さ １０.０メートルのポディウム（Podium）を建築する場合、当該部分はセットバック（外壁後退）範囲内であれば建築することができる。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。備考１により、手数料は「商業用」だが、容積率は「住宅用」として算定される。</p>\n<p>2. 誤り。備考２により、運動場の面積は敷地面積の「３分の１（এক তৃতীয়াংশ）」以上でなければならない。</p>\n<p><strong>3. 正しい。</strong> 備考７の規定通りである。</p>\n<p>3. 誤り。備考５により、ポディウムは「セットバック範囲内には建築してはならない（পোডিয়াম সেটব্যাক স্পেসে নির্মাণ করা যাইবে না）」。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13466","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৪৭। Floor Area Ratio (FAR) সূচক নির্ণয় (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(৭) ২.৫ মিটার বা তদূর্ধ্ব কিন্তু ৬ মিটারের কম প্রশস্ত প্লট সংলগ্ন সকল রাস্তা ৬ মিটার পর্যন্ত প্রশস্ত করিতে হইবে এবং ৬ মিটারের অধিক প্রশস্ত প্লট সংলগ্ন কোনো রাস্তা মহাপরিকল্পনায় প্রশস্তকরণর প্রস্তাব থাকিলে উক্ত রাস্তাও প্রশস্ত করিতে হইবে:</h5>\n<h6 class=\"h-lv6\"><strong>তবে শর্ত থাকে যে</strong> ৬ মিটারের অধিক প্রশস্ত প্লট সংলগ্ন কোনো রাস্তা মহাপরিকল্পনায় প্রশস্তকরণর কোনো প্রস্তাব না থাকিলে এবং ৬ মিটারের কম প্রশস্ত কোনো রাস্তা কোনো কারণে প্রশস্তকরণ সম্ভব না হইলে রাস্তার বিদ্যমান প্রশস্ততার ভিত্তিতে রোডভিত্তিক FAR নির্ধারিত হইবে, তদুপরি একটি রাস্তার লিংক (উদাহরণস্বরূপ ইন্টারসেকশন A হইতে ইন্টারসেকশন B) এর সকল প্লট সংলগ্ন রাস্তা একইভাবে কর্তৃপক্ষ কর্তৃক প্রশস্তকরণ নিশ্চিত করিতে হইবে:</h6>\n<h6 class=\"h-lv6\"><strong>আরও শর্ত থাকে যে,</strong> মহাপরিকল্পনা অনুযায়ী অধিক জনবসতি এলাকা কেবল পুরাতন ঢাকার জন্য অন্যূন ১.৮ মিটার হইতে ২.৫ মিটার কম রাস্তার জন্য অনুমোদন দেওয়া যাইবে।</h6>\n<h5 class=\"h-lv5\">(৮) রাস্তা প্রশস্তকরণর প্রস্তাব থাকিলে বিদ্যমান রাস্তার FAR ও প্রস্তাবিত রাস্তার FAR এর গড় FAR সূচকই রোডভিত্তিক FAR হিসাবে বিবেচিত হইবে।</h5>\n<h5 class=\"h-lv5\">(৯) উপ-বিধি (৭) ও (৮) এ বর্ণিত উভয় ক্ষেত্রেই রাস্তা প্রশস্তকরণর জন্য যে পরিমাণ জমি প্রয়োজন হইবে রাস্তার উভয় পাশের প্লট হইতে উহার অর্ধেক জমি সমর্পণ করিতে হইবে, এবং প্রশস্তকরণর নিমিত্ত সমর্পিত জমি ইজমেন্ট দলিলের মাধ্যমে স্থানীয় সরকার কর্তৃপক্ষের নিকট হস্তান্তর করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(১০) কোনো প্লটে একাধিক রাস্তা থাকিলে প্লটে গাড়ি প্রবেশ ও বাহির যাহাই হোক না কেন, সর্বোচ্চ প্রশস্ত রাস্তার ভিত্তিতে বিদ্যমান প্রশস্ততা বিবেচনা করা হইবে।</h5>\n<h5 class=\"h-lv5\">(১১) ব্লকভিত্তিক উন্নয়নের ক্ষেত্রে বিশদ অঞ্চল পরিকল্পনা অনুযায়ী ভিত্তি FAR, সর্বোচ্চ FAR ও জনঘনত্ব পুনঃনির্ধারিত হইবে।</h5>\n<h5 class=\"h-lv5\">(১২) ভিত্তি FAR ও সর্বোচ্চ FAR এর পার্থক্য ০.১ বা উহার কম হইলে আবেদনকারী শর্তহীনভাবে সর্বোচ্চ FAR প্রাপ্ত হইবে।</h5>\n<h5 class=\"h-lv5\">(১৩) সরকার অনুমোদিত পরিকল্পিত এলাকায় সরকার কর্তৃক জারীকৃত প্রজ্ঞাপনের আলোকে প্রকল্পের সম্পূর্ণ লে-আউটের ব্যবহার পরিবর্তন বা সংশোধন করা হইলে পরিবর্তিত ব্যবহারের জন্য FAR প্রযোজ্য হইবে।</h5>\n<h5 class=\"h-lv5\">(১৪) কোনো প্লটের মালিকের আবেদনের প্রেক্ষিতে সরকার অনুমোদিত পরিকল্পিত এলাকায় প্লটের মূল ব্যবহার পরিবর্তিত হইলে মূল ব্যবহার ও পরিবর্তিত ব্যবহারের FAR এর মধ্যে ক্ষুদ্রতরটি প্রযোজ্য হইবে এবং এক্ষেত্রে Traffic Impact Assesment প্রতিবেদন আবশ্যক হইবে।</h5>\n<h5 class=\"h-lv5\">(১৫) পরিকল্পনা অনুমোদনপত্রে মহাপরিকল্পনা অনুযায়ী প্রস্তাবিত প্লটের বিবেচ্য আবাসিক ইউনিট এবং FAR সূচক উল্লেখ থাকিবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第４７条（容積率（FAR）指標の算定）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>７</strong>　敷地に接する道路の幅員が２.５メートル以上６メートル未満である場合は、当該道路を６メートルまで拡幅しなければならない。また、６メートルを超える幅員の道路であっても、都市計画（マスタープラン）において拡幅の提案がある場合は、当該道路を拡幅しなければならない。</h5>\n<h6 class=\"h-lv6\"><strong>ただし、</strong> ６メートルを超える幅員の道路であってマスタープランに拡幅の提案がない場合、又は６メートル未満の道路であって何らかの理由により拡幅が不可能な場合は、現存する道路幅員に基づいて接道別容積率を決定するものとする。なお、一の道路区間（例：交差点Ａから交差点Ｂまで）に接する全ての敷地について、当局は一律に道路の拡幅を確保しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>さらに、</strong> マスタープランに基づき高密居住区域に指定された旧ダッカ地区に限り、１.８メートル以上２.５メートル未満の道路であっても建築の承認を与えることができる。</h6>\n<h5 class=\"h-lv5\"><strong>８</strong>　道路拡幅の提案がある場合、接道別容積率は、現存する道路に基づく容積率と拡幅予定の道路に基づく容積率の平均値（算術平均）とする。</h5>\n<h5 class=\"h-lv5\"><strong>９</strong>　第７項及び第８項の規定による道路拡幅に必要な土地については、道路の両側の敷地からそれぞれ必要量の半分を供出しなければならない。拡幅のために供出された土地は、地役権設定証書（Easement deed）により地方政府当局へ譲渡するものとする。</h5>\n<h5 class=\"h-lv5\"><strong>১০</strong>　一の敷地が複数の道路に接する場合、車両の出入口の位置に関わらず、最も幅員の広い道路を基準として現存幅員を算定するものとする。</h5>\n<h5 class=\"h-lv5\"><strong>১১</strong>　街区単位の開発（Block based development）については、詳細地区計画（DAP）に基づき、基礎容積率、最高容積率及び人口密度を再設定するものとする。</h5>\n<h5 class=\"h-lv5\"><strong>১২</strong>　基礎容積率と最高容積率の差が ０.১ 以下である場合、申請者は無条件で最高容積率の適用を受けることができる。</h5>\n<h5 class=\"h-lv5\"><strong>১৩</strong>　政府承認済みの計画区域において、政府の告示に基づきプロジェクト全体のレイアウトや用途が変更又は修正された場合、変更後の用途に応じた容積率を適用する。</h5>\n<h5 class=\"h-lv5\"><strong>১৪</strong>　敷地所有者の申請に基づき、政府承認済みの計画区域内において敷地の主たる用途が変更された場合、従前の用途と変更後の用途に係る容積率のうち、いずれか小さい方の数値を適用する。この場合において、交通影響評価（TIA）報告書の提出を必須とする。</h5>\n<h5 class=\"h-lv5\"><strong>১৫</strong>　計画承認書（Planning Permit）には、マスタープランに基づく当該敷地の許容住戸数及び容積率（FAR）指標を記載するものとする。</h5>\n<hr class=\"sep\">\n<p>1. <strong>拡幅予定道路による容積率の平均化（第８項）</strong>:</p>\n<p>ダッカ規則の非常にユニークな規定は、道路拡幅計画がある場合、容積率を「現況道路」と「計画道路」の<strong>平均値（Average）</strong>で算出する点である。日本の建築基準法（法第５２条第２項）では、あくまで「前面道路の幅員」に基づき算定され、将来の計画道路を基礎に算定する場合は特定行政庁の許可が必要となるが、ダッカ規則はこれを数式として自動化している。</p>\n<p>2. <strong>道路拡幅土地の強制的な譲渡メカニズム（第９項）</strong>:</p>\n<p>道路拡幅に必要な土地を、道路両側の住民が「半分ずつ（half）」出し合い、それを「地役権（Easement）」として地方政府に譲渡することを建築承認の条件としている。日本の法第４２条第２項（セットバック）では、後退部分は道路とみなされ建築はできないが、所有権は個人に残る場合が多い。ダッカ規則は、より直接的に「公共への土地提供」を開発の対価として法制化している。</p>\n<p>3. <strong>用途変更時の「小さい方の数値」適用（第１４項）</strong>:</p>\n<p>所有者の都合で用途を変更する場合、新旧用途のうち<strong>「小さい方の容積率」</strong>を適用する。これは、容積率の高い用途への変更によるインフラ負荷の増大（フリーライダー）を防ぐための強力な抑制策である。日本の建築基準法では、用途変更後の用途に適用される容積率制限に従うのが原則であり、このような「不利益な方の採用」という規定は存在しない。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における道路幅員と容積率（FAR）に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．一の敷地が幅員 ６メートルの道路と １２メートルの道路の二つに接している場合、現況の道路幅員はこれらを加算した １８メートルとして容積率を算定する。</p>\n<p>２．道路拡幅の提案がある区域における接道別容積率は、現存する道路に基づく容積率と、拡幅後の計画道路に基づく容積率のうち、いずれか大きい方の数値とする。</p>\n<p>３．政府承認済みの計画区域内において、所有者の申請により敷地の用途を変更した場合、容積率は従前の用途と変更後の用途のうち、いずれか小さい方の数値が適用される。</p>\n<p>４．基礎容積率（Base FAR）が ３.０、最高容積率（Max FAR）が ３.১５である敷地において、インセンティブを一切適用しない場合、適用される容積率は ３.০となる。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第１０項により、最も幅員の広い道路（この場合は １２メートル）を基準とする。</p>\n<p>2. 誤り。第８項により、両者の平均値（Average）とする。</p>\n<p><strong>3. 正しい。</strong> 第１４項の規定通り、「いずれか小さい方（ক্ষুদ্রতরটি）」が適用される。</p>\n<p>3. 誤り。第１２項により、差が ０.১৫（０.１超）であるため無条件の最高容積率適用はない。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13467","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৪৮। মোট মেঝের ক্ষেত্রফল নির্ণয়।</strong>—(১) জমির পরিমাণ নির্ধারণের ক্ষেত্রে নিজস্ব মালিকানাধীন রাস্তা অন্তর্ভুক্ত হইবে না অর্থাৎ FAR সূচক অনুযায়ী নির্মাণযোগ্য মোট ক্ষেত্রফল নির্ধারণের ক্ষেত্রে জমির ক্ষেত্রফলের সহিত উক্ত রাস্তার ক্ষেত্রফলের পরিমাণ যোগ করা যাইবে না।</h4>\n<h5 class=\"h-lv5\">(২) প্রযোজ্য এক বা একাধিক সকল রাস্তা প্রশস্তকরণর জন্য জমির প্রযোজ্য অংশ হস্তান্তরের পর হ্রাসকৃত প্লটের আকারের উপর ভিত্তি করিয়া প্লটের জমির পরিমাণ হিসাব করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৩) কেবল কিনারা সরলীকরণের ক্ষেত্রে সমর্পিত জমিসহ অর্থাৎ মূল জমির পরিমাণের উপর ভিত্তি করিয়া মোট মেঝের ক্ষেত্রফল নিরূপণ করা যাইবে।</h5>\n<h5 class=\"h-lv5\">(৪) পরিকল্পনা অনুমোদনপত্র অনুযায়ী রাস্তা প্রশস্তকরণর জন্য সংশ্লিষ্ট প্লটের যে ক্ষেত্রফলের জমি ইজমেন্ট দলিলের মাধ্যমে হস্তান্তর করিতে হইবে সেই ক্ষেত্রফলের ৩ (তিন) গুণ সমপরিমাণ মেঝের ক্ষেত্রফল অতিরিক্ত ক্ষেত্রফল ক্ষতিপূরণ হিসাবে পাওয়া যাইবে এবং উক্ত ক্ষেত্রফল প্রাপ্য FAR অনুযায়ী নির্ধারিত মেঝের ক্ষেত্রফলের সহিত যোগ করিয়া মোট মেঝের ক্ষেত্রফল নির্ণয় করিতে হইবে এবং একাধিক রাস্তার ক্ষেত্রে প্রত্যেক রাস্তার জন্য সমর্পিত জমির পরিমাণের ক্ষেত্রেও উক্ত নির্দেশনা প্রযোজ্য হইবে।</h5>\n<h5 class=\"h-lv5\">(৫) রাস্তার প্রশস্তকরণর জন্য কোনো প্লটের প্রশস্তকরণর পূর্বের রাস্তার সীমারেখা হইতে প্লটের জায়গা ছাড়িতে হইলে উপ-বিধি (৪) এ উল্লিখিত অতিরিক্ত ক্ষেত্রফল ক্ষতিপূরণ প্রযোজ্য হইবে।</h5>\n<h5 class=\"h-lv5\">(৬) FAR সূচক অনুযায়ী মেঝের ক্ষেত্রফল নির্ণয়ের ক্ষেত্রে কক্ষের সর্বোচ্চ উচ্চতা ৪.২৫ মিটার হইতে পারিবে, যাহা ফিনিসড মেঝের উপরিতল হইতে ছাদের নিচ পর্যন্ত ধরা হইবে এবং ঢালু ছাদের ক্ষেত্রে সর্বোচ্চ গড় উচ্চতা ৪.২৫ মিটার হইতে পারিবে।</h5>\n<h5 class=\"h-lv5\">(৭) উচ্চতা সংক্রান্ত অন্য কোনো বাধ্যবাধকতা না থাকিলে FAR সূচক অনুযায়ী মেঝের ক্ষেত্রফল নির্ণয়ের ক্ষেত্রে কক্ষের উচ্চতা ৪.২৫ মিটার হইতে ৭.৬৫ মিটার পর্যন্ত উন্নীত করা যাইবে এবং উক্ত কক্ষের মেঝের ক্ষেত্রফল ইমারতের মোট মেঝের ক্ষেত্রফলের ৫০% এর মধ্যে সীমাবদ্ধ থাকিলে কোনো অতিরিক্ত FAR ভুক্ত ক্ষেত্রফল যোগ (FAR PENALTY) করিতে হইবে না, কিন্তু মেঝের ক্ষেত্রফল ৫০% এলাকার অতিরিক্ত বা কক্ষের উচ্চতা ৭.৬৫ মিটারের ঊর্ধ্বে হইলে অনুরূপ নির্দিষ্ট মেঝের ক্ষেত্রফলের সহিত সমপরিমাণ ক্ষেত্রফল অতিরিক্ত হিসাবে সংযুক্ত হইবে, তবে ইহা A-5, B, D, E1, F, L শ্রেণির ইমারতের শুধু নিচতলা এবং G, I, K, H ও J শ্রেণির ইমারতের সকল ফ্লোরের ক্ষেত্রে ফ্লোর উচ্চতা সংক্রান্ত সীমাবদ্ধতা প্রযোজ্য হইবে না।</h5>\n<h5 class=\"h-lv5\">(৮) ফ্লোর এরিয়া হিসাবের ক্ষেত্রে মধ্যবর্তী মেজানাইন তলার ক্ষেত্রফল যোগ হইবে।</h5>\n<h5 class=\"h-lv5\">(৯) রাস্তা প্রশস্তকরণর জমি হস্তান্তরের পরে অবশিষ্ট জমির উপর ভিত্তি করিয়া ভূমি আচ্ছাদন এবং নির্মাণযোগ্য ক্ষেত্রফল নিরূপিত হইবে এবং মিশ্র অকুপেন্সির ক্ষেত্রে মহাপরিকল্পনায় উল্লিখিত প্রাপ্ত মেঝের ক্ষেত্রফলের অনুপাত অনুসারে প্রতিটি অকুপেন্সি টাইপের ক্ষেত্রফলের পরিমাপ নিরূপিত হইবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第４８条（延べ面積の算定（Determination of Total Floor Area））</strong></h4>\n<h5 class=\"h-lv5\"><strong>১</strong>　敷地面積の算定にあたっては、自己の所有する道路を含まないものとする。すなわち、容積率（FAR）指標に基づく建築可能な延べ面積を算定する場合、敷地面積に当該道路の面積を加算してはならない。</h5>\n<h5 class=\"h-lv5\"><strong>২</strong>　適用がある一又は複数の全ての道路の拡幅のために土地を供出した後の減歩された敷地面積に基づいて、敷地面積を算定しなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>৩</strong>　角地の隅切り（ কিনারা সরলীকরণ ）を行う場合に限り、供出された土地を含む建築前の敷地面積に基づいて、延べ面積を算定することができる。</h5>\n<h5 class=\"h-lv5\"><strong>৪</strong>　計画承認書に基づき道路拡幅のために地役権設定証書（Easement deed）により提供された土地の面積の３倍に相当する床面積を、割増床面積（Additional floor area compensation）として取得することができる。当該床面積は、容積率により算出された床面積に加算して延べ面積を算定するものとし、複数の道路がある場合は各道路への提供面積について本規定を適用する。</h5>\n<h5 class=\"h-lv5\"><strong>৫</strong>　道路拡幅のために従来の道路境界線から敷地を後退させる場合、前項に規定する割増床面積の規定を適用する。</h5>\n<h5 class=\"h-lv5\"><strong>৬</strong>　容積率に基づき床面積を算定する場合、室の最高高さは、仕上げられた床面から天井（屋根の下面）まで４.২৫メートルを上限とする。傾斜屋根の場合は、平均の最高高さを４.২৫メートルとする。</h5>\n<h5 class=\"h-lv5\"><strong>৭</strong>　高さに関する他の制限がない場合、容積率に基づく床面積の算定において、室の最高高さを４.২৫メートルから７.৬৫メートルまで引き上げることができる。当該室の床面積が建築物の全床面積の５０パーセント以内であれば、容積率の加算（FAR PENALTY）を要しない。ただし、当該室の面積が全床面積の５０パーセントを超える場合、又は室の高さが７.৬৫メートルを超える場合には、当該超過部分の面積と同等の面積を割増床面積として算入しなければならない。なお、用途分類 A-5、B、D、E1、F、Lの建築物の１階部分、並びに分類 G、I、K、H及びJの建築物の全ての階においては、本項の高さに関する制限は適用しない。</h5>\n<h5 class=\"h-lv5\"><strong>৮</strong>　床面積の算定において、中二階（Mezzanine floor）の面積は加算しなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>৯</strong>　道路拡幅のための土地提供後の残存敷地に基づいて、建蔽率（Ground Coverage）及び建築可能な延べ面積を算定するものとする。複合用途（Mixed occupancy）の場合は、マスタープランに定める床面積の割合に従って、各用途ごとの床面積を算定しなければならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>道路拡幅に伴う「容積率ボーナス」制度（第４項）</strong>:</p>\n<p>ダッカ規則では、道路拡幅のために土地を提供した場合、提供した土地面積の「３倍」の床面積を容積率制限とは別に加算できる。日本の建築基準法（法第５２条）では、道路後退部分は敷地面積から除外されるだけであり、このような補填規定はない。公共貢献に対する極めて強力なインセンティブといえる。</p>\n<p>2. <strong>階高制限と容積率ペナルティ（第６項・第７項）</strong>:</p>\n<p>容積率上の床面積として算定される室の高さに「４.２５メートル」という基準を設け、これを超えて「７.６５メートル」までの吹き抜け空間等を作る場合は、面積の５０％を超えると「二重カウント（FAR PENALTY）」するという特異な規定がある。これは、階高を極端に高くすることで将来的に違法に床を増設することを防ぐ意図がある。</p>\n<p>3. <strong>角地隅切りの敷地面積算入（第３項）</strong>:</p>\n<p>角地の隅切りのために提供した土地については、延べ面積の算定基礎となる敷地面積に「含めることができる」としている。日本の建築基準法では道路として提供した部分は敷地面積から除外されるのが原則だが、ダッカ規則は角地の安全性向上に協力する地主に対し、開発上の権利を維持させる配慮をしている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における床面積及び容積率（FAR）の算定に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．建築可能な延べ面積を算定する場合、敷地内にある自己所有の道路の面積を敷地面積に加算することができる。</p>\n<p>２．道路拡幅のために地役権設定証書（Easement deed）により１０㎡の土地を提供した場合、容積率により定められた床面積に加えて、３０㎡の床面積を補填として取得できる。</p>\n<p>３．中二階（Mezzanine floor）を設ける場合、その面積は建築物の階数には算入されるが、容積率算定の床面積からは除外される。</p>\n<p>４．住宅（用途分類 A1）の居室の天井高さを ５.০メートル とした場合、その床面積が建築物の全床面積の ４০パーセント であっても、容積率のペナルティとして面積を加算しなければならない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。第４８条第１項により、自己所有の道路は敷地面積に含まれない。</p>\n<p><strong>2. 正しい。</strong> 第４項により、提供した面積の「３倍」が割増床面積として認められる。</p>\n<p>2. 誤り。第８項により、中二階の面積は床面積に加算される。</p>\n<p>3. 誤り。第７項により、高さが ４.２５ｍ〜７.６５ｍ の範囲内であり、かつ全床面積の ５０％ 以内であれば、ペナルティは発生しない。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13468","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৪৯। মোট মেঝের ক্ষেত্রফলের আওতাবহির্ভূত অতিরিক্ত ফ্লোর এরিয়া।</strong>—অনুমোদনযোগ্য FAR সূচক অনুযায়ী ফ্লোর এরিয়া নির্ধারণের ক্ষেত্রে ইমারতের নিম্নবর্ণিত অংশসমূহ বিবেচনায় নেওয়া যাইবে না, যথা:—</h4>\n<h5 class=\"h-lv5\">(ক) সিঁড়ির সর্বোচ্চ তলার ক্ষেত্রফল যাহা টিপিক্যাল তলার সিঁড়ির ক্ষেত্রফল অপেক্ষা অধিক নহে;</h5>\n<h5 class=\"h-lv5\">(খ) লিফটের যন্ত্রকক্ষ, যাহা টিপিক্যাল তলার লিফট এবং লবির সম্মিলিত ক্ষেত্রফল অপেক্ষা বড় নহে;</h5>\n<h5 class=\"h-lv5\">(গ) মেঝের ক্ষেত্রফল হিসাব করিবার ক্ষেত্রে কেবল পার্কিং হিসাবে ব্যবহৃত বেজমেন্ট বা অন্য কোনো ফ্লোরের সর্বোচ্চ এক তৃতীয়াংশ পর্যন্ত এরিয়া কেবল ইলেকট্রোমেকানিক্যাল রুম, সিকিউরিটি বুথ, রিসেপশন বুথ, পানির জলাধার, পাম্প হাউস, টিপিক্যাল সিঁড়ি ও লিফটের অংশসমূহ মূল ক্ষেত্রফলের অংশ হিসাবে বিবেচিত হইবে না;</h5>\n<h5 class=\"h-lv5\">(ঘ) ছাদের উপর ন্যূনতম দুই দিক উন্মুক্ত এবং ছাদের আয়তনের সর্বোচ্চ ১০% পর্যন্ত আচ্ছাদন, নির্ধারিত পার্কিংয়ের সমপরিমাণ ক্ষেত্রফল (ন্যূনতম ১২ ব:মি:), প্লট সংলগ্ন বিদ্যমান রাস্তার প্রস্থ ৬ মিটার বা তাহার অধিক হইলে ন্যূনতম পার্কিংয়ের দুইগুণ ক্ষেত্রফল এবং ইহার কম হইলে ন্যূনতম পার্কিংয়ের দেড়গুণ ক্ষেত্রফল ভূগর্ভস্থ এবং ওভারহেড জলাধার (যদি থাকে):</h5>\n<h6 class=\"h-lv6\"><strong>তবে শর্ত থাকে যে,</strong> সিঁড়ি এবং লিফটের যন্ত্রকক্ষের উপর ওভারহেড জলাধার হইতে পারিবে এবং ব্যবহারযোগ্য সর্বশেষ তলের ছাদের ফিনিসড লেভেলের উপর হইতে সর্বোচ্চ উচ্চতা ৫ মিটারের মধ্যে সীমাবদ্ধ থাকিতে হইবে;</h6>\n<h5 class=\"h-lv5\">(ঙ) ইমারতের জন্য প্রযোজ্য বৈদ্যুতিক, যান্ত্রিক কক্ষসমূহ ও বর্জ্য সংগ্রহের নির্ধারিত স্থান, যেখানে রেটিকুলেটেড গ্যাস চেম্বার, ETP (Effluent Treatment Plant), WTP (Water Treatment Plant), স্যানিটারি পাইপ ও পাম্পসমূহের সংস্থান, সাব-স্টেশন, জেনারেটর, ট্রান্সফরমার, মিটাররুম, BMS ও এয়ার কন্ডিশন প্ল্যান্ট এর সংস্থান করা যাইবে; এই সকল কক্ষ বেজমেন্ট বা কাঠামো প্রকৌশলীর প্রত্যয়ন সাপেক্ষে যে-কোনো ফ্লোরে সংস্থান করা যাইবে:</h5>\n<h6 class=\"h-lv6\"><strong>তবে শর্ত থাকে যে,</strong> সাব-স্টেশন ও ট্রান্সফরমার সংস্থানের ক্ষেত্রে সংশ্লিষ্ট কর্তৃপক্ষের নির্দেশনা এবং কোড অনুসরণ করিতে হইবে এবং রেটিকুলেটেড গ্যাস চেম্বার বেজমেন্টে সংস্থান করা যাইবে না;</h6>\n<h5 class=\"h-lv5\">(চ) গাড়ি পার্কিং এর সুবিধা থাকিলে পার্কিং এর টয়লেট সুবিধাসহ গাড়িচালকদের অপেক্ষার স্থান, যাহার ক্ষেত্রফল প্রদত্ত পার্কিং এরিয়ার ১০% এর অধিক নহে;</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第４９条（延べ面積に算入しない部分（Additional floor area excluded from total floor area））</strong></h4>\n<h5 class=\"h-lv5\"><strong>ক</strong>　階段の最上階の部分の面積であって、基準階（Typical floor）の階段の面積を超えないもの。</h5>\n<h5 class=\"h-lv5\"><strong>খ</strong>　エレベーターの機械室であって、基準階のエレベーター及びロビーの合計面積を超えないもの。</h5>\n<h5 class=\"h-lv5\"><strong>গ</strong>　床面積を算定する場合において、専ら駐車場（Parking）として供される地階（Basement）又はその他の階の床面積の３分の１を限度として、電気機械設備室、守衛室（Security booth）、受付（Reception booth）、貯水槽、ポンプ室、標準的な階段及びエレベーターの部分。</h5>\n<h5 class=\"h-lv5\"><strong>ঘ</strong>　屋上において、少なくとも二面が開放され、かつ、屋根面積の１０％を限度とする被覆部分、所定の駐車場の面積に相当する面積（最小１２㎡）、敷地に接する道路の幅員が６メートル以上の場合は最小駐車場の２倍の面積、６メートル未満の場合は最小駐車場の１.５倍の面積に相当する地下貯水槽及び高架水槽。</h5>\n<h6 class=\"h-lv6\"><strong>ただし、</strong> 階段室及びエレベーター機械室の上部に高架水槽を設置することができるものとし、その高さは、使用可能な最終階の屋根の設計床高（Finished floor level）から５メートルを限度とする。</h6>\n<h5 class=\"h-lv5\"><strong>ঙ</strong>　建築物のための電気設備室、機械設備室及び廃棄物集積所。構造設計一級建築士の証明がある場合は、地階又は任意の階に配置することができる。</h5>\n<h6 class=\"h-lv6\"><strong>ただし、</strong> 変電所及び変圧器の設置については、関連当局の指示及び法典（Code）に従わなければならない。また、集中ガス供給室（Reticulated gas chamber）は地階に配置してはならない。</h6>\n<h5 class=\"h-lv5\"><strong>চ</strong>　駐車場に附随する便所及び運転手控室であって、その面積が当該駐車場の面積の１０％を超えないもの。</h5>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p>1. <strong>駐車場階における設備スペースの緩和（項番 গ）</strong>:</p>\n<p>日本の建築基準法では、駐車場の面積を延べ面積の５分の１まで不算入とする規定がある（法第５２条第６項）。これに対しダッカ規則では、駐車場として使用される階における設備室や守衛室等の付随的スペースについて「当該階の床面積の３分の１」という個別の不算入枠を設けている点が特徴的である。</p>\n<p>2. <strong>接道幅員に連動した貯水機能の評価（項番 ঘ）</strong>:</p>\n<p>容積率から除外される貯水槽の規模を、接する道路の幅員に応じて変動させている（駐車場面積の１.５倍〜２倍）。日本の建築基準法には、インフラ整備状況によって貯水設備の不算入限度額を直接変動させる規定はなく、ダッカのインフラ負荷への配慮が法文に直接反映されている。</p>\n<p>3. <strong>地階における危険物の配置禁止（項番 ঙ）</strong>:</p>\n<p>集中ガス供給室を地階に設置することを厳格に禁じている。日本の建築基準法や消防法でも規制されるが、建築規則の容積率緩和の条件とセットで安全上の配置制限（地階設置禁止）を明文化している点は、防災意識の高さを示している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における容積率（FAR）の算定において、延べ面積に算入しなければならない部分はどれか。</strong></p>\n<p>１．基準階の階段の面積と同等の、階段の最上階の部分の面積。</p>\n<p>２．構造設計一級建築士の証明を得て、地階（Basement）に配置された集中ガス供給室（Reticulated gas chamber）。</p>\n<p>３．駐車場に附随して設けられた運転手控室であって、その床面積が当該駐車場の面積の ８パーセント であるもの。</p>\n<p>４．屋上のエレベーター機械室の上部に設置された高架水槽であって、その高さが屋根の設計床高から ৪.৫メートル であるもの。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 算入しない。項番 ক により除外される。</p>\n<p><strong>2. 算入する（正解）。</strong> 項番 ঙ の但書きにより、集中ガス供給室は地階に配置してはならないとされており、不算入の対象外（あるいは違法配置）となる。</p>\n<p>2. 算入しない。項番 চ により、１０％以内であれば除外される。</p>\n<p>3. 算入しない。項番 ঘ の但書きにより、高さ５メートル以内であれば除外される。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13469","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৪৯। মোট মেঝের ক্ষেত্রফলের আওতাবহির্ভূত অতিরিক্ত ফ্লোর এরিয়া (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(ছ) প্রযোজ্য ক্ষেত্রে, ভবনের নিচতলার আচ্ছাদিত খেলার জায়গা, Landscape সংবলিত উন্মুক্ত জায়গা এবং সর্বোচ্চ ৫.০ বর্গমিটার ক্ষেত্রফল বিশিষ্ট নিচতলার নিরাপত্তা পোষ্ট;</h5>\n<h5 class=\"h-lv5\">(জ) শুধু শিক্ষা প্রতিষ্ঠানের নিচ তলায় উন্মুক্ত স্থান যাহার ছাদ থাকিলেও পার্শ্ব খোলা থাকিবে এবং কোনোরূপ দেয়াল দ্বারা আবদ্ধ হইতে পারিবে না;</h5>\n<h5 class=\"h-lv5\">(ঝ) আকাশের দিকে উন্মুক্ত টেরেস, ছাদ এবং পারগোলা;</h5>\n<h5 class=\"h-lv5\">(ঞ) কাড় (Loft) এলাকা যাহা কক্ষ হিসাবে পরিবর্তন করা যাইবে না;</h5>\n<h5 class=\"h-lv5\">(ট) আলো এবং বাতাস কূপ যাহা সংকুচিত করা যাইবে না;</h5>\n<h5 class=\"h-lv5\">(ঠ) আবশ্যকীয় অগ্নিনিরাপদ সিঁড়ি, তবে যে ইমারতে মাত্র একটি সিঁড়ি রহিয়াছে তাহা একইসঙ্গে অগ্নিনিরাপদ সিঁড়ি হিসাবে ব্যবহৃত হইলেও এই সুবিধা পাইবে না;</h5>\n<h5 class=\"h-lv5\">(ড) পানি ও সৌর শক্তি সংগ্রহের জন্য যেকোনো কাঠামো, যাহা অন্য কোনো উদ্দেশ্যে ব্যবহৃত হইবে না;</h5>\n<h5 class=\"h-lv5\">(ঢ) ইমারতের বাহিরের দিকে ঝুলন্ত ব্যালকনি যাহার ক্ষেত্রফল সংশ্লিষ্ট মেঝের ক্ষেত্রফলের ২.৫% পর্যন্ত হইবে, তবে এই ব্যালকনি আবশ্যিক অনাচ্ছাদিত স্থানের মধ্যে বর্ধিত হইতে পারিবে না;</h5>\n<h5 class=\"h-lv5\">(ণ) পার্কিং ও উহার আনুষঙ্গিক ব্যবহার হিসাবে বেজমেন্ট বা অন্যান্য ফ্লোর ব্যবহৃত হইলে বেজমেন্টে বা অন্যান্য ফ্লোরে প্রবেশ ও বাহির হওয়ার জন্য সংস্থানকৃত র‍্যাম্প, ড্রাইভওয়ে, কার লিফট এলাকার অংশ ও সিঁড়িসমূহ;</h5>\n<h5 class=\"h-lv5\">(ত) প্রযোজ্য ক্ষেত্রে, সর্বোচ্চ ১৫ বর্গমিটার ক্ষেত্রফল বিশিষ্ট একটি অগ্নি-নিরাপত্তা বিষয়ক কন্ট্রোল কক্ষ অতিরিক্ত ভূমি আচ্ছাদনে নির্মাণ করা যাইবে তবে আবশ্যিক অনাচ্ছাদিত স্থানের মধ্যে বর্ধিত হইতে পারিবে না;</h5>\n<h5 class=\"h-lv5\">(থ) ইমারতের রাস্তার দিকে সামনের ব্যালকনিসমূহের (সম্মুখ ব্যালকনি) ক্ষেত্রফল যাহা মেঝের ক্ষেত্রফলের আওতাভুক্ত নহে।</h5>\n<h4 class=\"h-lv4\"><strong>৫০। ইমারত বা অবকাঠামোর উচ্চতা।</strong></h4>\n<h5 class=\"h-lv5\">(১) বিমানবন্দর, মাইক্রোওয়েভ স্টেশন, টেলিযোগাযোগ স্টেশন, গুরুত্বপূর্ণ স্থাপনা অথবা অন্যান্য বিশেষ কাঠামোর নিকটবর্তী এলাকার ক্ষেত্রে ইমারতের উচ্চতা সংশ্লিষ্ট কর্তৃপক্ষ কর্তৃক নির্ধারিত থাকিবে।</h5>\n<h5 class=\"h-lv5\">(২) নদীর ধার, বৃহৎ জলাশয়, বাগান, ঐতিহাসিক এবং বিশেষ গুরুত্বপূর্ণ এলাকায় অবস্থার পরিপ্রেক্ষিতে ইমারতের উচ্চতার উপর কর্তৃপক্ষ বিধিনিষেধ আরোপ করিতে পারিবে।</h5>\n<h5 class=\"h-lv5\">(৩) কোনো ইমারত ৪৫.৭০ মিটার বা তদূর্ধ্ব উচ্চতার হইলে ইমারতের শীর্ষে লাল নিরাপত্তা বাতি স্থাপন করিতে হইবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第４条（延べ面積に算入しない部分）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>ছ</strong>　１階に設けられた屋根のある遊び場、植栽（Landscape）を施した開放空間、及び床面積が最大５.０平方メートルである１階の守衛室。</h5>\n<h5 class=\"h-lv5\"><strong>জ</strong>　教育施設に限り、１階に設けられた開放空間であって、屋根を有する場合でも側面が開放され、壁によって囲まれていないもの。</h5>\n<h5 class=\"h-lv5\"><strong>ঝ</strong>　空に向かって開放されたテラス、屋根及びパーゴラ。</h5>\n<h5 class=\"h-lv5\"><strong>ঞ</strong>　ロフト（Loft）部分であって、居室（Habitable room）に変更することができないもの。</h5>\n<h5 class=\"h-lv5\"><strong>ট</strong>　採光及び換気のための吹き抜け（シャフト）であって、その有効面積を縮小することができないもの。</h5>\n<h5 class=\"h-lv5\"><strong>ঠ</strong>　義務的に設置される避難階段。ただし、階段が１つのみ設置されている建築物においては、避難階段の仕様であっても本号の適用はない。</h5>\n<h5 class=\"h-lv5\"><strong>ড</strong>　雨水利用又は太陽光エネルギー利用のための工作物であって、他の目的に使用されないもの。</h5>\n<h5 class=\"h-lv5\"><strong>ঢ</strong>　外部に突出した吊り下げ式のベランダであって、その面積が当該階の床面積の２.５パーセント以下であるもの。ただし、義務的空地内に突出してはならない。</h5>\n<h5 class=\"h-lv5\"><strong>ণ</strong>　駐車場への出入りのためのスロープ、車路、自動車用昇降機の占める部分及び階段。</h5>\n<h5 class=\"h-lv5\"><strong>ত</strong>　床面積が最大１５平方メートルである火災安全管理室。</h5>\n<h5 class=\"h-lv5\"><strong>থ</strong>　道路に面する建築物の前面に設けられた前面ベランダの面積。</h5>\n<h4 class=\"h-lv4\"><strong>第５０条（建築物又は工作物の高さ）</strong></h4>\n<h5 class=\"h-lv5\"><strong>১</strong>　空港、マイクロ波基地局、重要施設等の近隣区域においては、建築物の高さは関連当局によって制限される。</h5>\n<h5 class=\"h-lv5\"><strong>২</strong>　河川の沿岸、史跡及び特別に重要な区域においては、所管行政庁は建築物の高さに制限を課すことができる。</h5>\n<h5 class=\"h-lv5\"><strong>৩</strong>　建築物の高さが４５.７０メートル以上となる場合は、頂部に赤色の航空障害灯を設置しなければならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>前面ベランダの全面不算入（項番 থ）</strong>:</p>\n<p>日本の建築基準法では、バルコニー等は先端から１ｍ後退した部分は延べ面積に算入されるが、ダッカ規則では「道路に面する前面ベランダ」は原則として不算入となる。これは、道路側の開放的な空間構成を法的に強く誘導している独自規定である。</p>\n<p>2. <strong>避難階段の不算入条件（項番 ঠ）</strong>:</p>\n<p>避難階段は延べ面積から除外されるが、階段が一つしかない建築物では、その階段が避難階段の仕様であっても緩和の対象外となる。これは、最低限必要な動線は面積に含め、安全向上のための「付加的な」階段のみを緩和対象とする思想である。</p>\n<p>3. <strong>航空障害灯の設置基準（第５０条第３項）</strong>:</p>\n<p>設置が必要となる高さが「４５.７０メートル（１５０フィート）」と設定されている。日本の建築基準法・航空法における６０メートルという基準よりも低く設定されており、過密都市における航空安全への配慮がより厳格である。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、延べ面積の算定及び建築物の高さ制限に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．ロフト（Loft）を居室（Habitable room）として使用する場合、その面積は延べ面積に算入しなくてよい。</p>\n<p>２．建築物の頂部に航空障害灯（赤色の安全灯）を設置しなければならない建築物の高さの基準は、６０メートル以上である。</p>\n<p>３．避難階段を設置する場合、建築物に設置される階段がそれ一つのみであるときは、当該階段の面積は延べ面積に算入しなければならない。</p>\n<p>４．道路に面する前面ベランダは、その面積の半分を延べ面積に算入しなければならない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。居室に変更できないことが不算入の条件である（項番 ঞ）。</p>\n<p>2. 誤り。基準は４５.７０メートル以上である（第５０条第３項）。</p>\n<p><strong>3. 正しい。</strong> 階段が一つのみの建築物では、避難階段であっても不算入の特例は受けられない（項番 ঠ）。</p>\n<p>3. 誤り。前面ベランダの面積は延べ面積の算定に含まれない（不算入）（項番 থ）。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13470","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\">(৪) যেকোনো এলাকার জনঘনত্ব নির্ধারণে অনুমোদিত মহাপরিকল্পনার (বিশদ অঞ্চল পরিকল্পনা) নির্দেশনা চূড়ান্ত হিসাবে বিবেচ্য হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>৫১। প্লট বিভাজন।</strong>—(১) কোনো খালি বা ইমারতসহ প্লট দুই বা ততোধিক প্লটে বিভক্ত করা যাইবে এবং এইরূপ বিভক্ত করিবার ক্ষেত্রে, প্রতিটি উপ-প্লটের জন্য রাস্তা এবং যানবাহন প্রবেশগম্যতা নিশ্চিত করিতে হইবে।</h4>\n<h5 class=\"h-lv5\">(২) প্লট বিভাজনের ক্ষেত্রে আবশ্যিক অনাচ্ছাদিত স্থান ইমারত উন্নয়নের অবিভাজ্য অংশ এবং ইমারত অনুমোদনের বিধান হিসাবে বিবেচিত হইবে এবং পৃথকভাবে বিভক্তি, হস্তান্তর বা উন্নয়নযোগ্য হইবে না।</h5>\n<h5 class=\"h-lv5\">(৩) প্লট বিভক্তিকরণের ফলে নূতনভাবে সৃষ্ট উপ-প্লটসমূহে বিদ্যমান ইমারত বা ইমারতসমূহ যদি অপসারণ না করিয়া সংরক্ষণ করা হয় তাহা হইলে যে বিধিমালা বা বিধি অনুসরণপূর্বক ইমারত বা ইমারতসমূহ অনুমোদন ও নির্মাণ করা হইয়েছিল, সেই বিধিমালা বা বিধি অনুসরণপূর্বক প্রয়োজনীয় সেটব্যাক এবং অন্যান্য শর্তাবলি যেমন- ভবনের উচ্চতা, প্রযোজ্য ক্ষেত্রে FAR ভুক্ত মেঝের ক্ষেত্রফল, সর্বোচ্চ ভূমি আচ্ছাদন, ইত্যাদি বজায় রাখিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৪) সরকার কর্তৃক অনুমোদিত আবাসিক প্রকল্পের অভ্যন্তরে আবাসিক প্লট বিভক্তিকরণের ক্ষেত্রে, শুধু একটি উপ-প্লটের জন্য ব্যক্তিগত রাস্তার প্রশস্ততা ন্যূনতম ৩.৬৫ মিটার হইতে হইবে এবং সর্বোচ্চ ২০টি পর্যন্ত সাধারণ গাড়ি পার্কিং এর ব্যবস্থা করা যাইবে, এবং পার্কিং এর সংখ্যা ২০ এর অধিক করিতে হইলে ব্যক্তিগত রাস্তার প্রশস্ততা ন্যূনতম ৪.৮ মিটার হইতে হইবে:</h5>\n<h6 class=\"h-lv6\"><strong>তবে শর্ত থাকে যে,</strong> এই বিধিমালা জারির পূর্বে এই ধরনের আবাসিক প্লটসমূহ উপ-প্লট বিভক্তিকরণের ক্ষেত্রে ব্যক্তিগত রাস্তার প্রশস্ততা যদি ৩.৬৫ মিটার এর কম কিন্তু ২.৫ মিটার বা তাহার অধিক হয় এবং অনুরূপ বিভাজন সংশ্লিষ্ট সংস্থা অথবা, প্রযোজ্য ক্ষেত্রে, মন্ত্রণালয় কর্তৃক অনুমোদিত বা রেজিস্ট্রিকৃত থাকিলে বিভাজিত উপ-প্লটের জন্য ব্যক্তিগত রাস্তার ক্ষেত্রে উল্লিখিত ন্যূনতম প্রশস্ততা প্রযোজ্য হইবে না এবং উহাতে সর্বোচ্চ ২০টি পর্যন্ত গাড়ি পার্কিং এর সংস্থান করা যাইবে।</h6>\n<h5 class=\"h-lv5\">(৫) উপ-বিধি (৪) এ উল্লিখিত আবাসিক উপ-প্লটের ক্ষেত্রে ব্যক্তিগত রাস্তা, যাহা এজমালি নহে, ৩৩ মিটারের অধিক দীর্ঘ না হইলে উক্ত রোডের FAR সূচক নির্ধারণের জন্য মূল রাস্তার প্রশস্ততা বিবেচনায় নিতে হইবে; এইরূপ ক্ষেত্রে নিজস্ব সংযোগকারী রাস্তার ক্ষেত্রফল, FAR সূচক অনুযায়ী FAR ভুক্ত মোট নির্মাণ ক্ষেত্রফল নির্ধারণ ও ভূমি আচ্ছাদনের পরিমাণ নির্ধারণের ক্ষেত্রে বিবেচ্য হইবে না এবং সংযোগ রাস্তার জন্য সমর্পিত জমির পরিমাণ FAR প্রণোদনার ক্ষেত্রে প্রযোজ্য হইবে না।</h5>\n<h5 class=\"h-lv5\">(৬) উপ-বিধি (৪) এ উল্লিখিত আবাসিক উপ-প্লটের ক্ষেত্রে রাস্তা ৩৩ মিটারের অধিক দীর্ঘ হইলে উপ-প্লট সংলগ্ন রাস্তার প্রশস্ততা বিবেচনায় অনুমোদনযোগ্য FAR সূচক প্রযোজ্য হইবে এবং মোট নির্মাণ ক্ষেত্রফল ও ভূমি আচ্ছাদনের পরিমাণ নির্ধারণের ক্ষেত্রে সংযোগকারী রাস্তার ক্ষেত্রফল বিবেচ্য হইবে না।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第５０条（建築物の高さ等）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>৪</strong>　人口密度の決定にあたっては、詳細地区計画（DAP）の指示を最終的なものとみなす。</h5>\n<h4 class=\"h-lv4\"><strong>第５１条（敷地の分割）</strong></h4>\n<h5 class=\"h-lv5\"><strong>১</strong>　更地又は建築物の存する敷地は分割することができる。各敷地について道路及び車両の通行可能性を確保しなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>২</strong>　義務的空地は建築開発の不可分の一部であり、個別に分割し、譲渡し、又は開発の用に供してはならない。</h5>\n<h5 class=\"h-lv5\"><strong>৩</strong>　分割により新たに生じた敷地において既存の建築物を保存する場合、当該建築物の建築時の規則に基づく後退距離（セットバック）等を維持しなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>৪</strong>　計画的な住宅地開発区域における敷地の分割にあっては、専用道路の幅員は最小３.６５メートル以上とし、駐車台数は最大２０台までとする。２０台を超える場合は幅員４.８メートル以上を要する。</h5>\n<h6 class=\"h-lv6\"><strong>ただし、</strong> 本規則の施行前に承認・登記されている分割については、２.５メートル以上の幅員があれば駐車場を２０台まで設置できる。</h6>\n<h5 class=\"h-lv5\"><strong>৫</strong>　専用道路の延長が３３メートル以下の場合は、容積率（FAR）指標の算定にあたって接続する主道路の幅員を基準とすることができる。</h5>\n<h5 class=\"h-lv5\"><strong>৬</strong>　専用道路の延長が３３メートルを超える場合は、当該敷地に接する道路の幅員に基づいて容積率指標を適用するものとする。</h5>\n<hr class=\"sep\">\n<p>1. <strong>専用道路の幅員と駐車台数の連動（第４項）</strong>:</p>\n<p>ダッカ規則では、分割敷地へのアクセス道路の幅員を、駐車台数を境界として段階的に引き上げている（3.65mから4.8mへ）。日本の建築基準法では、接道義務（法第４３条）等により延べ面積や住戸数に応じて通路幅員を規定するが、駐車台数そのものを直接の指標として道路幅員を変動させる規定は珍しい。</p>\n<p>2. <strong>専用道路の延長による容積率算定基準の変化（第５項・第６項）</strong>:</p>\n<p>専用道路（路地状部分）の延長が<strong>３３メートル</strong>を超えるかどうかで、容積率算定の基礎となる道路幅員の採用基準が変わる。３３ｍ以下であれば「主道路」を基準にできるが、それを超えると「接する道路」が基準となり、容積率が制限される仕組みである。これは、旗竿地の奥深くに高密度な建築がなされるのを防ぐ、強力な密度規制である。</p>\n<p>3. <strong>空地の「不可分性」の強調（第２項）</strong>:</p>\n<p>ダッカ規則では「空地は開発の不可分の一部（অবিভাজ্য অংশ）」であり「譲渡や再開発を認めない」と、分割そのものを強く制限する文言を用いている。日本の建築基準法でも、一度確認を受けた敷地内の空地を勝手に分割して建築することは「一敷地一建物の原則」等により禁止されるが、ダッカ規則はより直接的に分割不可を明文化している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における「敷地の分割（Plot division）」に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．分割後の各敷地に既存建築物を保存するときは、常に本規則（2025年規則）に定める最新のセットバック規定を適用しなければならない。</p>\n<p>２．住宅敷地を分割し、一の分割敷地に２５台の駐車場を設置する場合、当該敷地への専用道路の幅員は最小 ３.６５メートル 以上あれば足りる。</p>\n<p>３．住宅用の分割敷地において、専用道路の延長が ３０メートル である場合、当該敷地の容積率（FAR）指標を算定するための基準として、接続する主道路の幅員を採用することができる。</p>\n<p>４．敷地分割によって生じた義務的空地は、分割後の所有者が合意すれば、別個の敷地として切り離して譲渡することができる。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。保存される建築物については、それが承認・建築された当時の規則（যে বিধিমালা... অনুসরণপূর্বক... নির্মাণ করা হইয়েছিল）に従えばよい。</p>\n<p>2. 誤り。２０台を超える場合は最小 ４.৮ メートル 必要である。</p>\n<p><strong>3. 正しい。</strong> 延長が３３メートル（৩৩ মিটারের）以下であれば、主道路の幅員を基準にできる。</p>\n<p>3. 誤り。第２項により、義務的空地は開発の「不可分の一部」であり、個別の譲渡や開発は禁じられている。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13471","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৫১। প্লট বিভাজন (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(৭) শুধু আবাসিক ব্যবহার ব্যতীত অন্যান্য সকল ব্যবহারের ক্ষেত্রে কোনো প্লটকে উপ-প্লটে বিভাজনের জন্য রাস্তার প্রশস্ততা ন্যূনতম ৬ মিটার হইতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৮) সরকারি বা বেসরকারি আবাসিক প্রকল্প এলাকাতে প্লট বিভাজনের ক্ষেত্রে উপ-প্লটের আয়তন কমপক্ষে ৫ (পাঁচ) কাঠা অথবা উক্ত এলাকাতে একক প্লট হিসাবে কর্তৃপক্ষ কর্তৃক বরাদ্দকৃত সর্বনিম্ন আয়তনের প্লট, যাহা বেশি হইবে, তাহা অপেক্ষা ক্ষুদ্র আয়তনের প্লট হিসাবে বিভাজন করা যাইবে না।</h5>\n<h5 class=\"h-lv5\">(৯) কোনো প্লটকে একাধিক উপ-প্লটে বিভাজন করা হইলে উক্ত উপ-প্লটসমূহের ক্ষেত্রে এজমালি রাস্তা ন্যূনতম ৪.৮ মিটার প্রশস্ত হইতে হইবে এবং এজমালী রাস্তার ক্ষেত্রে রোডের FAR সূচক সারণি ৫ অনুযায়ী নির্ধারিত হইবে এবং এই ধরণের প্লটে সম্মুখের সেটব্যাক ১.৫ মিটার এবং অন্যান্য সেটব্যাক সারণি অনুযায়ী প্রাপ্ত হইবে।</h5>\n<h5 class=\"h-lv5\">(১০) বিভাজিত প্লটের ক্ষেত্রে অনুমোদনযোগ্য FAR হইতে ০.২৫ কম প্রাপ্ত হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>৫২। প্লট একত্রীকরণ।</strong></h4>\n<h5 class=\"h-lv5\">(১) উন্নয়নকল্পে একাধিক প্লট একত্রীকরণ করা যাইবে এবং একত্রিত প্লটসমূহ একটি অখণ্ড প্লট হিসাবে গণ্য হইবে।</h5>\n<h5 class=\"h-lv5\">(২) উপ-বিধি (১) এ উল্লিখিত অখণ্ড প্লটের ক্ষেত্রে জমির ক্ষেত্রফল বিবেচনা করিয়া সর্বোচ্চ ভূমি আচ্ছাদন এবং সংলগ্ন রাস্তার প্রশস্ততা বিবেচনা করিয়া বিধি অনুযায়ী FAR সূচক নির্ধারণ করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৩) উপ-বিধি (১) এর অধীন একত্রিত প্লটসমূহ অবস্থিত ভবনাদি নির্মাণকালে বিদ্যমান ইমারত নির্মাণ বিধিমালা অনুযায়ী অনুমোদিত হইয়া থাকিলে উক্ত ভবনাদি একত্রীকরণকৃত প্লটের জন্য ও অনুমোদিত বলিয়া গণ্য হইবে:</h5>\n<h6 class=\"h-lv6\"><strong>তবে শর্ত থাকে যে,—</strong></h6>\n<h6 class=\"h-lv6\">(ক) এইরূপ ভবন পরিবর্তন, পরিবর্ধন বা উহাতে নূতন ভবন নির্মাণের ক্ষেত্রে জনঘনত্ব নির্ণয়ে অনুমোদিত বিশদ অঞ্চল পরিকল্পনা অনুসরণ করিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(খ) ইমারতসহ প্লট একত্রীকরণের ক্ষেত্রে যে বিধিমালা অনুযায়ী ইমারতটি অনুমোদিত হইয়াছে উক্ত বিধিমালায় বর্ণিত ন্যূনতম আবশ্যিক সেটব্যাক, ইমারতসমূহের মধ্যবর্তী সেটব্যাক ও MGC সংরক্ষণ করিতে হইবে।</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第５１条（敷地の分割）（承前）</strong></h4>\n<h5 class=\"h-lv5\">７　専ら居住の用以外の用途に供する敷地を分割する場合にあっては、接する道路の幅員は最小６メートル以上としなければならない。</h5>\n<h5 class=\"h-lv5\">８　政府又は民間による計画的な住宅地開発区域における敷地の分割にあっては、分割後の各敷地の面積は、５カサ（約３３５平方メートル）又は当該区域において所管行政庁が個別の敷地として割り当てた最小面積のうち、いずれか大きい方の面積を下回ってはならない。</h5>\n<h5 class=\"h-lv5\">９　一の敷地を複数の敷地に分割する場合において、当該分割後の各敷地のために設ける共有の道路（ এজমালি রাস্তা ）は、その幅員を最小４．８メートル以上としなければならない。 この場合において、当該共有道路に係る容積率（FAR）指標は別表５に従って決定するものとし、当該敷地の前面のセットバック（外壁の後退距離）は１．５メートル、その他の方向のセットバックは別表の規定に従うものとする。</h5>\n<h5 class=\"h-lv5\">１０　分割された敷地における許容容積率は、本来適用されるべき容積率から０．２５を減じた数値とする。</h5>\n<h4 class=\"h-lv4\"><strong>第５２条（敷地の統合）</strong></h4>\n<h5 class=\"h-lv5\">１　開発の目的のために複数の敷地を統合することができる。 統合された後の敷地は、一の敷地（ অখণ্ড প্লট ）とみなす。</h5>\n<h5 class=\"h-lv5\">２　前項の規定による統合後の敷地については、土地の面積及び接する道路の幅員に基づき、規定に従って最高建蔽率（Ground Coverage）及び容積率（FAR）指標を決定しなければならない。</h5>\n<h5 class=\"h-lv5\">３　第１項の規定に基づき統合された敷地内に、建築時の規則に基づき承認された既存の建築物が存する場合にあっては、当該建築物は統合後の敷地においても承認を受けたものとみなす。</h5>\n<h6 class=\"h-lv6\"><strong>ただし、次に掲げる条件に従わなければならない。</strong></h6>\n<h6 class=\"h-lv6\">ａ　当該建築物の用途の変更、増築又は当該敷地内における新築にあっては、承認された詳細地区計画（DAP）に定める人口密度に関する規定を遵守しなければならない。</h6>\n<h6 class=\"h-lv6\">ｂ　建築物を伴う敷地統合の場合にあっては、当該建築物が承認された当時の規則に定める最小の義務的セットバック、建築物相互の間隔及び最高建蔽率（MGC）を維持しなければならない。</h6>\n<hr class=\"sep\">\n<p>1. <strong>分割後の容積率ペナルティ（第５１条第１０項）</strong>:</p>\n<p>ダッカ規則では、敷地を分割した場合、許容される容積率が一律に「０．２５」減じられる。日本の建築基準法（法第５２条）では、敷地分割によって前面道路との関係や敷地面積が変わることで結果的に建築可能な面積が制限されることはあっても、分割行為そのものに対して一律の数値的ペナルティを課す規定はない。これは細分化による都市環境の悪化を法的に強力に抑制する独自の仕組みである。</p>\n<p>2. <strong>共有道路の幅員基準（第５１条第９項）</strong>:</p>\n<p>分割敷地内の共有道路に「４．８メートル」という具体的な最小幅員を求めている。日本の建築基準法（法第４２条第１項第五号：位置指定道路）では原則４メートル（特定行政庁により６メートル）であるが、ダッカ規則は大規模な車両通行を想定し、より広い数値を標準としている。</p>\n<p>3. <strong>最小敷地面積の強行規定（第５１条第８項）</strong>:</p>\n<p>計画区域内において「５カサ（約３３５㎡）」という、日本の一般的な住宅市街地における最低敷地面積制限（法第５３条の２、通常１００〜１６５㎡程度）と比較して非常に広い面積を最低基準としている。これにより、都市の過密化を敷地レベルで阻止しようとしている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における敷地の管理に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．居住の用以外の用途に供する敷地を分割する場合であっても、接する道路の幅員が ４.０メートル あれば、分割の承認を受けることができる。</p>\n<p>２．所管行政庁が ４カサ（約２６８㎡）を最小敷地として割り当てている計画住宅区域において、敷地を ３カサ に分割して新築住宅を建築することができる。</p>\n<p>３．一の敷地を分割して新たに生じた敷地において建築物を建築する場合、適用される許容容積率（FAR）は、本来の基準から ０.２５ を減じた値としなければならない。</p>\n<p>４．複数の敷地を統合して一の敷地とした場合、その敷地内に存する既存の建築物については、常に統合後の最新の最高建蔽率（MGC）制限に適合するように改修しなければならない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第５１条第７項により、非住宅用途の敷地分割には最小 ６メートル の道路幅員が必要である。</p>\n<p>2. 誤り。第５１条第８項により、５カサ 又は所管行政庁の指定する最小面積の「いずれか大きい方」を下回る分割はできない。</p>\n<p><strong>3. 正しい。</strong> 第５１条第１０項の規定通りである。</p>\n<p>3. 誤り。第５２条第３項（ｂ）により、既存建築物は「それが承認された当時の規則」における建蔽率（MGC）等を維持すればよい。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13472","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৫৩। পার্কিং।</strong>—(১) বিভিন্ন ধরনের গাড়ি পার্কিং পরিসর ও গাড়ি ঘুরাইবার ব্যাসার্ধ নিম্নবর্ণিত সারণি ৬ অনুযায়ী হইতে হইবে, যথা:—</h4>\n<h6 class=\"h-lv6\"><strong>সারণি-৬</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>গাড়ির ধরন</th><th>পার্কিং প্রস্থ (মিটার)</th><th>পার্কিং দৈর্ঘ্য (মিটার)</th><th>গাড়ি ঘুরাইবার অভ্যন্তরীণ ব্যাসার্ধ (মিটার)</th><th>বহিঃ ব্যাসার্ধ (মিটার)</th></tr></thead>\n<tbody>\n<tr><td>সাধারণ গাড়ি (প্রতিটির জন্য)</td><td>২.৪</td><td>৪.৬</td><td>--</td><td>--</td></tr>\n<tr><td>বাস ও ট্রাক (প্রতিটির জন্য)</td><td>৩.৬</td><td>১০.০</td><td>৮.৭</td><td>১২.৮</td></tr>\n<tr><td>মাল্টিএক্সেল ট্রাক/লম্বা ট্রেলার (প্রতিটির জন্য)</td><td>৩.৬</td><td>১৮.০</td><td>৬.৯</td><td>১৩.৮</td></tr>\n<tr><td>২ চাকার মোটর বাইক (প্রতিটির জন্য)</td><td>১.০</td><td>২.০</td><td>--</td><td>--</td></tr>\n</tbody>\n</table></div>\n<h6 class=\"h-lv6\"><strong>দ্রষ্টব্য:</strong></h6>\n<h6 class=\"h-lv6\">১। পাশাপাশি দুই বা ততোধিক সাধারণ গাড়ি পার্কিং এর ক্ষেত্রে পার্কিং এর বাঁধামুক্ত প্রস্থ প্রতি গাড়ির জন্য ২.৩ মিটার প্রস্থ ধরিয়া ইহার গুণিতক হারে হিসাব করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">২। বাস ও ট্রাক, মাল্টি এক্সেল ট্রাক বা লম্বা ট্রেলারের ড্রাইভ ওয়ের মাপ নির্ধারণের জন্য গাড়ি ঘুরাইবার অভ্যন্তরীণ ও বহিঃ ব্যাসার্ধের পরিমাপ বিবেচনা করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">৩। সাধারণ গাড়ি ও দুই চাকার মোটর বাইকের ক্ষেত্রে গাড়ি ঘুরাইবার জন্য অভ্যন্তরীণ ও বহিঃ ব্যাসার্ধের পরিমাপের উল্লেখ করিতে হইবে না।</h6>\n<h5 class=\"h-lv5\">(২) বিভিন্ন ধরনের পার্কিং এর জন্য সাধারণ গাড়ির ড্রাইভওয়ের মাপ নিম্নবর্ণিত সারণি ৭ অনুযায়ী নির্ধারিত হইবে যথা:—</h5>\n<h6 class=\"h-lv6\"><strong>সারণি ৭</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>পার্কিং</th><th>একমুখী ট্রাফিক, একদিকে বে</th><th>একমুখী ট্রাফিক, দুই দিকে বে</th><th>দুইমুখী ট্রাফিক</th></tr></thead>\n<tbody>\n<tr><td><span class=\"math\">0^\\circ</span></td><td>৩.৫ মিটার</td><td>৪.০ মিটার</td><td>৪.২৫ মিটার</td></tr>\n<tr><td><span class=\"math\">৪৫^0</span></td><td>৪.০ মিটার</td><td>৪.০ মিটার</td><td>৪.২৫ মিটার</td></tr>\n<tr><td><span class=\"math\">৯০^0</span></td><td>৪.২৫ মিটার</td><td>৪.২৫ মিটার</td><td>৪.২৫ মিটার</td></tr>\n</tbody>\n</table></div>\n<h6 class=\"h-lv6\"><strong>দ্রষ্টব্য:</strong></h6>\n<h6 class=\"h-lv6\">১। পাশাপাশি দুই বা ততোধিক সাধারণ গাড়ি পার্কিং এর ক্ষেত্রে পার্কিং এর বাঁধামুক্ত প্রস্থ প্রতি গাড়ির জন্য ২.৩ মিটার প্রস্থ ধরিয়া ইহার গুণিতক হারে হিসাব করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">২। বাস ও ট্রাক, মাল্টি এক্সেল ট্রাক/লম্বা ট্রেলারের ড্রাইভওয়ের মাপ নির্ধারণের জন্য গাড়ি ঘুরাইবার অভ্যন্তরীণ ও বহিঃ ব্যাসার্ধের পরিমাপ বিবেচনা করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">৩। সাধারণ গাড়ি ও দুই চাকার মোটর বাইকের ক্ষেত্রে গাড়ি ঘুরাইবার জন্য অভ্যন্তরীণ ও বহিঃ ব্যাসার্ধের পরিমাপের উল্লেখ করিতে হইবে না।</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第５３条（駐車場（Parking））</strong></h4>\n<h5 class=\"h-lv5\">１　各種車両の駐車スペースの寸法及び車両の回転半径は、次の表６の規定に従わなければならない。</h5>\n<h6 class=\"h-lv6\"><strong>表６：車両種類別の駐車スペース及び回転半径</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>車両の種類</th><th>駐車幅員（ｍ）</th><th>駐車延長（ｍ）</th><th>内輪回転半径（ｍ）</th><th>外輪回転半径（ｍ）</th></tr></thead>\n<tbody>\n<tr><td>普通乗用車（１台当たり）</td><td>２．４</td><td>４．６</td><td>―</td><td>―</td></tr>\n<tr><td>バス及びトラック（１台当たり）</td><td>３．６</td><td>１０．０</td><td>８．７</td><td>１２．８</td></tr>\n<tr><td>多軸トラック／ロングトレーラー（１台当たり）</td><td>３．６</td><td>１８．０</td><td>６．９</td><td>１３．８</td></tr>\n<tr><td>二輪オートバイ（１台当たり）</td><td>１．０</td><td>２．０</td><td>―</td><td>―</td></tr>\n</tbody>\n</table></div>\n<h6 class=\"h-lv6\"><strong>備考：</strong></h6>\n<h6 class=\"h-lv6\">１　２台以上の普通乗用車を並列して駐車させる場合、駐車スペースの有効幅員は、１台当たり２．３メートルとしてその倍数により算定するものとする。</h6>\n<h6 class=\"h-lv6\">２　バス、トラック、多軸トラック又はロングトレーラーの車路（ドライブウェイ）の寸法を決定するにあたっては、当該車両の内輪及び外輪の回転半径を考慮しなければならない。</h6>\n<h6 class=\"h-lv6\">３　普通乗用車及び二輪オートバイについては、内輪及び外輪の回転半径の記載を要しない。</h6>\n<h5 class=\"h-lv5\">２　普通乗用車の駐車形式に応じた車路（ドライブウェイ）の幅員は、次の表７の規定に従い決定するものとする。</h5>\n<h6 class=\"h-lv6\"><strong>表７：駐車角度別の最小車路幅員</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>駐車角度</th><th>一方向通行、片側配置</th><th>一方向通行、両側配置</th><th>双方向通行</th></tr></thead>\n<tbody>\n<tr><td><span class=\"math\">0^\\circ</span>（並列駐車）</td><td>３．５メートル</td><td>４．０メートル</td><td>４．２５メートル</td></tr>\n<tr><td><span class=\"math\">45^\\circ</span>（斜め駐車）</td><td>４．０メートル</td><td>４．０メートル</td><td>４．２５メートル</td></tr>\n<tr><td><span class=\"math\">90^\\circ</span>（直角駐車）</td><td>４．２５メートル</td><td>４．２５メートル</td><td>４．２５メートル</td></tr>\n</tbody>\n</table></div>\n<h6 class=\"h-lv6\"><strong>備考：</strong></h6>\n<h6 class=\"h-lv6\">１　２台以上の普通乗用車を並列して駐車させる場合、駐車スペースの有効幅員は、１台当たり２．３メートルとしてその倍数により算定するものとする。</h6>\n<h6 class=\"h-lv6\">２　バス、トラック、多軸トラック又はロングトレーラーの車路の寸法を決定するにあたっては、当該車両の内輪及び外輪の回転半径を考慮しなければならない。</h6>\n<h6 class=\"h-lv6\">３　普通乗用車及び二輪オートバイについては、回転半径の考慮を要しない。</h6>\n<hr class=\"sep\">\n<p>1. <strong>駐車スペースの標準寸法の差異（表６）</strong>:</p>\n<p>ダッカ規則では普通乗用車の駐車サイズを「幅 ２．４ｍ <span class=\"math\">\\times</span> 長さ ４．６ｍ」としている。日本の「駐車場法」や指針では、普通車で「幅 ２．５ｍ <span class=\"math\">\\times</span> 長さ ６．０ｍ（又は５．０ｍ）」程度が標準とされることが多く、ダッカ規則は延長方向において日本の基準よりコンパクトに設定されている。</p>\n<p>2. <strong>回転半径の法文への明記</strong>:</p>\n<p>大型車両（バス・トレーラー）に対し、内輪および外輪の具体的な回転半径（例：バス 外輪 １２．８ｍ）を建築規則の中に直接数値として規定している。日本の建築基準法では個別審査に委ねられることが多いが、ダッカ規則は設計段階での定量的適合性を厳格に求めている。</p>\n<p>3. <strong>駐車角度と車路幅員の連動（表７）</strong>:</p>\n<p>駐車の角度（０度、４５度、９０度）と通行区分（一方向・双方向）に応じた最小車路幅員をマトリクス化している。日本の駐車場法施行令等でも同様の規定はあるが、本規則はこれを全国共通の建築技術基準として、４．２５メートルという細かい数値で法制化している点が特徴である。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における「駐車場（Parking）」の設計基準に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．普通乗用車１台当たりの駐車スペースの最小寸法は、幅 ２．৫メートル、長さ ５．০メートル としなければならない。</p>\n<p>２．普通乗用車を３台並列して駐車させる場合、その駐車スペースの有効幅員は、６．৯メートル（２．৩メートル <span class=\"math\">\\times</span> ３）として算定することができる。</p>\n<p>３．普通乗用車の駐車場を <span class=\"math\">৯০^\\circ</span>（直角駐車）の形式とし、車路を双方向通行とする場合、当該車路の幅員は最小 ４．০メートル 以上あれば足りる。</p>\n<p>４．バス及びトラックの駐車スペースを設計する場合、駐車寸法のほかに内輪及び外輪の回転半径を考慮しなければならないが、多軸トラックについては回転半径の考慮は不要である。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。表６により、普通乗用車のサイズは「幅 ２．৪ｍ、長さ ৪．৬ｍ」である。</p>\n<p><strong>2. 正しい。</strong> 表６の備考１により、複数並列の場合は１台当たり ２．৩ｍ の倍数で算定する。</p>\n<p>2. 誤り。表７により、<span class=\"math\">৯০^\\circ</span> 且つ双方向通行の場合、最小車路幅員は ৪．২৫メートル 必要である。</p>\n<p>3. 誤り。表６の備考２により、多軸トラック（মাল্টি এক্সেল ট্রাক）についても回転半径の考慮が義務付けられている。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13473","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৫৩। পার্কিং (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(৩) সাধারণ গাড়ির প্রবেশ ও নির্গমন পথ এক হইলেও পার্কিং এর প্রবেশপথের বাঁধামুক্ত প্রস্থ ৩ মিটারের কম হইবে না এবং এই প্রস্থের মধ্যে কোনো ফুটপাথ বা অন্য বাধা থাকিবে না।</h5>\n<h5 class=\"h-lv5\">(৪) বাস ও ট্রাকের পৃথক প্রবেশ ও নির্গমন পথের প্রস্থ ন্যূনতম ৪.২৫ মিটার ও একক প্রবেশ ও নির্গমন পথের ক্ষেত্রে ৬ মিটার হইবে।</h5>\n<h5 class=\"h-lv5\">(৫) ইমারতের নকশা অনুমোদনের জন্য দাখিলকৃত নকশাসমূহের ক্ষেত্রে ন্যূনতম প্রয়োজনীয় পার্কিং স্থান নিম্নবর্ণিত সারণি-৮ অনুযায়ী হইতে হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\"><strong>সারণি-৮</strong></h6>\n<h6 class=\"h-lv6\"><strong>বিভিন্ন শ্রেণির ভবনের জন্য ন্যূনতম প্রয়োজনীয় পার্কিং স্থান</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নম্বর</th><th>ভবনের ব্যবহার বা বসবাসের ধরন (Occupancy)</th><th>ন্যূনতম প্রয়োজনীয় পার্কিং ব্যবস্থা (Minimum Parking Requirements)</th></tr></thead>\n<tbody>\n<tr><td>(১)</td><td>(২)</td><td>(৩)</td></tr>\n<tr><td>১।</td><td>আবাসিক ভবন (অকুপেন্সি টাইপ- 'A') প্লটের সম্মুখস্থ রাস্তার স্বাভাবিক প্রশস্ততা ১.৮মি: এর ঊর্ধ্ব হইতে ২.৫মি: এর নিম্নে</td><td>গাড়ির জন্য পার্কিং প্রযোজ্য হইবে না।</td></tr>\n<tr><td>২।</td><td>A1 একক পরিবার ভিত্তিক/রো হাউস/প্লট সাইজ ১৩৪ বর্গমিটারের অধিক নহে এইরূপ আবাসিক ভবন</td><td>১টি কার পার্কিং।</td></tr>\n<tr><td>৩।</td><td>A1 একক পরিবার ভিত্তিক/রো হাউস/ প্লট সাইজ ১৩৪ বর্গমিটারের অধিক এইরূপ আবাসিক ভবন</td><td>২টি কার পার্কিং।</td></tr>\n<tr><td>৪।</td><td>A2 দুই পরিবারের বাড়ি</td><td>২টি কার পার্কিং।</td></tr>\n<tr><td>৫।</td><td>A3 একাধিক পরিবার ভিত্তিক আবাসিক ভবনের ক্ষেত্রে ২০০ বর্গমিটার এর অধিক গ্রস এরিয়াবিশিষ্ট ফ্ল্যাট</td><td>প্রতি ২০০ বর্গমিটার এর অধিক গ্রস এরিয়া বিশিষ্ট ফ্ল্যাটের জন্য ১টি কারপার্কিং এবং প্রাপ্য ইউনিটের অতিরিক্ত ৫% গেস্ট পার্কিং।</td></tr>\n<tr><td>৬।</td><td>A3 ১৪০ বর্গমিটার এর ঊর্ধ্ব হইতে ২০০ বর্গমিটার গ্রস এরিয়া বিশিষ্ট ফ্ল্যাট</td><td>প্রতি ৩ ইউনিটের জন্য ২টি কারপার্কিং।</td></tr>\n<tr><td>৭।</td><td>A3 ৯০ বর্গমিটার হইতে ১৪০ বর্গমিটার পর্যন্ত গ্রস এরিয়া বিশিষ্ট ফ্ল্যাট</td><td>প্রতি ২ ইউনিটের জন্য ১টি কারপার্কিং।</td></tr>\n<tr><td>৮।</td><td>A3 ৬০ বর্গমিটার হইতে ৯০ বর্গমিটার পর্যন্ত গ্রস এরিয়ার ফ্ল্যাট</td><td>প্রতি ৪ ইউনিটের জন্য ১টি পার্কিং।</td></tr>\n<tr><td>৯।</td><td>A3 ৬০ বর্গমিটার পর্যন্ত গ্রস এরিয়ার ফ্ল্যাট (কার পার্কিং এর অতিরিক্ত)</td><td>প্রতি ৫ ইউনিটের জন্য ১টি মোটর সাইকেল পার্কিং।</td></tr>\n<tr><td>১০।</td><td>A5 হোটেল (স্টার শ্রেণি ভূক্ত)</td><td>প্রতি ৫টি গেস্ট বেডের জন্য ১টি কার পার্কিং।</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第５３条（駐車場）（承前）</strong></h4>\n<h5 class=\"h-lv5\">３　普通乗用車の流入及び流出の経路を共用とする場合であっても、駐車場の出入口の有効幅員は３メートル以上としなければならず、当該幅員内には歩道その他の障害物を設けてはならない。</h5>\n<h5 class=\"h-lv5\">４　バス及びトラックの出入りにおいて、流入及び流出の経路を分離する場合の幅員は最小４．２５メートルとし、これらを共用とする場合の幅員は６メートル以上としなければならない。</h5>\n<h5 class=\"h-lv5\">５　建築確認申請のために提出する設計図書においては、次の表８の規定に基づき、最小附置義務台数を確保しなければならない。</h5>\n<h6 class=\"h-lv6\"><strong>表８：建築物の用途別の最小附置義務台数</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>建築物の用途（Occupancy）</th><th>最小附置義務台数（Minimum Parking Requirements）</th></tr></thead>\n<tbody>\n<tr><td>(1)</td><td>(2)</td><td>(3)</td></tr>\n<tr><td><strong>1</strong></td><td><strong>住宅（用途 A）：前面道路の幅員が １．８ｍ超 ２．５ｍ未満の敷地</strong></td><td>駐車場の附置を要しない。</td></tr>\n<tr><td><strong>2</strong></td><td><strong>住宅（A1）：一戸建等 又は １３４㎡以下の敷地の住宅</strong></td><td>１台</td></tr>\n<tr><td><strong>3</strong></td><td><strong>住宅（A1）：一戸建等 又は １３４㎡超の敷地の住宅</strong></td><td>２台</td></tr>\n<tr><td><strong>4</strong></td><td><strong>住宅（A2）：二世帯住宅</strong></td><td>２台</td></tr>\n<tr><td><strong>5</strong></td><td><strong>共同住宅（A3）：住戸面積が ２００㎡超の住戸</strong></td><td>各住戸につき１台、及び算定台数の ５％ の来客用駐車場。</td></tr>\n<tr><td><strong>6</strong></td><td><strong>共同住宅（A3）：住戸面積が １４０㎡超 ２００㎡以下の住戸</strong></td><td>３住戸につき２台。</td></tr>\n<tr><td><strong>7</strong></td><td><strong>共同住宅（A3）：住戸面積が ９０㎡以上 １４０㎡以下の住戸</strong></td><td>２住戸につき１台。</td></tr>\n<tr><td><strong>8</strong></td><td><strong>共同住宅（A3）：住戸面積が ６０㎡以上 ９０㎡以下の住戸</strong></td><td>４住戸につき１台。</td></tr>\n<tr><td><strong>9</strong></td><td><strong>共同住宅（A3）：住戸面積が ６０㎡以下の住戸（追加義務）</strong></td><td>５住戸につき１台のオートバイ駐車場。</td></tr>\n<tr><td><strong>10</strong></td><td><strong>ホテル（A5）：星付きホテル</strong></td><td>客用ベッド５床につき１台。</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">\n<p>1. <strong>接道幅員による附置義務の免除（項番１）</strong>:</p>\n<p>ダッカ規則では、前面道路が <strong>２．５メートル未満</strong> の狭隘道路に面する住宅敷地については、駐車場の附置義務を一律に免除している。日本の駐車場条例等では、一定規模以上の延べ面積があれば接道条件に関わらず附置義務が生じるのが一般的であり、インフラの限界を建築規制に直接反映させている点が特徴である。</p>\n<p>2. <strong>住戸面積単位の細分化された算定基準（項番５〜９）</strong>:</p>\n<p>共同住宅（A3）の駐車場台数を、住戸１戸あたりの床面積（６０㎡、９０㎡、１４０㎡、２００㎡）によって段階分けしている。日本の多くの自治体条例では「住戸数×一定率」で算定するが、ダッカ規則は「住戸の広さ＝世帯の購買力（所有台数）」とみなし、ミクロな単位で規定している。</p>\n<p>3. <strong>オートバイ駐車場の義務化（項番９）</strong>:</p>\n<p>６０㎡以下の小規模住戸に対し、オートバイ駐車場の設置を法文化している。日本でも二輪車の附置義務は増えているが、ダッカのように住戸規模とリンクさせて規定する方式は、アジアの二輪車社会の実態に即したものである。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における駐車場の附置義務に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．前面道路の幅員が ２．０メートル である敷地に住宅を建築する場合、本規則に基づき、少なくとも１台の普通乗用車用駐車場を設置しなければならない。</p>\n<p>２．住戸面積（Gross Area）が ２５０平方メートル である共同住宅（A3）を新築する場合、各住戸につき１台の駐車場を確保し、且つ、その ５パーセント 分の来客用駐車場を設置しなければならない。</p>\n<p>３．住戸面積が １５０平方メートル の共同住宅（A3）においては、各住戸につき１台の駐車場を附置しなければならない。</p>\n<p>４．星付きホテル（A5）を新築する場合、駐車場台数は客室数に基づいて算定するものとし、ベッド数は考慮しない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。第５３条第５項表８項番１により、道路幅員が ２．５メートル未満の場合は附置義務が免除される。</p>\n<p><strong>2. 正しい。</strong> 表８項番５の規定により、２００㎡超の住戸は「各住戸につき１台 ＋ ５％ の来客用」が必要である。</p>\n<p>2. 誤り。表８項番６により、１４０㎡超 ２００㎡以下の場合は「３住戸につき２台」である。</p>\n<p>3. 誤り。表８項番１０により、台数は「客用ベッド（Guest bed）」５床につき１台と規定されている。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13474","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৫৩। পার্কিং (চলমান)</strong></h4>\n<h6 class=\"h-lv6\"><strong>সারণি-৮ (চলমান)</strong></h6>\n<h6 class=\"h-lv6\"><strong>বিভিন্ন শ্রেণির ভবনের জন্য ন্যূনতম প্রয়োজনীয় পার্কিং স্থান</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নম্বর</th><th>ভবনের ব্যবহার বা বসবাসের ধরন (Occupancy)</th><th>ন্যূনতম প্রয়োজনীয় পার্কিং ব্যবস্থা (Minimum Parking Requirements)</th></tr></thead>\n<tbody>\n<tr><td>(১)</td><td>(২)</td><td>(৩)</td></tr>\n<tr><td>১১।</td><td>A5 হোটেল (অন্যান্য শ্রেণিভুক্ত)</td><td>প্রতি ২০০ ব: মি: গ্রস এরিয়ার জন্য ১টি কার পার্কিং।</td></tr>\n<tr><td>১২।</td><td>A4 (মেস, ডরমিটরি, ও হোস্টেল)</td><td>প্রতি ৩০০ ব: মি: গ্রস এরিয়ার জন্য ১টি কার পার্কিং।</td></tr>\n<tr><td>১৩।</td><td>A6- সাশ্রয়ী আবাসন</td><td>চাহিদা অনুসারে একটি এম্বুলেন্সের স্থান ব্যতীত গাড়ি পার্কিং প্রযোজ্য হইবে না।</td></tr>\n<tr><td>১৪।</td><td>শিক্ষা প্রতিষ্ঠান (অকুপেন্সি টাইপ ‘B’)</td><td>প্রতি ২০০ ব: মি: গ্রস এরিয়ার জন্য ১টি কার পার্কিং এবং কোডের টেবিল 3.F.3 অনুসরণ করিতে হইবে; কিন্ডারগার্টেন, প্রাথমিক বিদ্যালয়ের ক্ষেত্রে শিথিলযোগ্য।</td></tr>\n<tr><td>১৫।</td><td>প্রাতিষ্ঠানিক (অকুপেন্সি টাইপ ‘C’)</td><td>প্রতি ২০০ বর্গমিটার গ্রস এরিয়ার জন্য ১টি কার পার্কিং।</td></tr>\n<tr><td>১৬।</td><td>স্বাস্থ্যসেবা (অকুপেন্সি টাইপ ‘D’) হাসপাতাল, ক্লিনিক</td><td>প্রতি ৫ টি বেডের জন্য ১টি কার পার্কিং।</td></tr>\n<tr><td>১৭।</td><td>স্বাস্থ্যসেবা (অকুপেন্সি টাইপ ‘D’) ল্যাবরেটরি</td><td>প্রতি ১০০ বর্গমিটার গ্রস এরিয়ার জন্য ১টি কার পার্কিং।</td></tr>\n<tr><td>১৮।</td><td>স্বাস্থ্যসেবা (অকুপেন্সি টাইপ ‘D’) (বহির্বিভাগ, চেম্বার)</td><td>প্রতি ২০০ বর্গমিটার গ্রস এরিয়ার জন্য ১টি কার পার্কিং।</td></tr>\n<tr><td>১৯।</td><td>অফিস ও অন্যান্য ব্যবহার (অকুপেন্সি টাইপ ‘E’)</td><td>প্রতি ২০০ব: মি: গ্রস এরিয়ার জন্য ১টি কার পার্কিং এবং কোডের টেবিল 3.F.3 অনুসরণ করিতে হইবে।</td></tr>\n<tr><td>২০।</td><td>বাণিজ্যিক (অকুপেন্সি টাইপ ‘F’) দোকান, শপিং কমপ্লেক্স</td><td>প্রতি ২০০ব: মি: গ্রস এরিয়ার জন্য ১টি কার পার্কিং, ১ টি কার ড্রপিং বে প্রতি ২০০০ বর্গমিটার গ্রস ক্ষেত্রফল এবং কোডের টেবিল 3.F.3 অনুসরণ করিতে হইবে।</td></tr>\n<tr><td>২১।</td><td>বাণিজ্যিক (অকুপেন্সি টাইপ ‘F’) রেস্টুরেন্ট</td><td>প্রতি ১০০ ব: মি: গ্রস এরিয়ার জন্য ১টি কার পার্কিং।</td></tr>\n<tr><td>২২।</td><td>শিল্পকারখানা (অকুপেন্সি টাইপ ‘G’) গুদাম (অকুপেন্সি টাইপ ‘H’)</td><td>কমপক্ষে ১টি ট্রাক পার্কিং (১০মিটার দৈর্ঘ্য) ও ১টি কার পার্কিং। FAR এর ৩০০০বর্গ মিটার অধিক এরিয়া বিশিষ্ট স্থাপনায় প্রতি ৩০০০ বর্গমিটার এরিয়ার জন্য ১টি ট্রাক পার্কিং (১০ মিটার দৈর্ঘ্য) থাকিতে হইবে।</td></tr>\n<tr><td>২৩।</td><td>সমাবেশ (অকুপেন্সি টাইপ ‘I’) সিনেমা হল</td><td>প্রতি ৪০টি সিটের জন্য ১টি কার পার্কিং।</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第５３条（駐車場）（承前）</strong></h4>\n<h6 class=\"h-lv6\"><strong>表８（続き）：建築物の用途別の最小附置義務台数</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>建築物の用途（Occupancy）</th><th>最小附置義務台数（Minimum Parking Requirements）</th></tr></thead>\n<tbody>\n<tr><td>(1)</td><td>(2)</td><td>(3)</td></tr>\n<tr><td><strong>11</strong></td><td><strong>ホテル（A5）：その他の区分</strong></td><td>延べ面積 ２００㎡ につき１台。</td></tr>\n<tr><td><strong>12</strong></td><td><strong>寄宿舎、ドミトリー、ホステル（A4）</strong></td><td>延べ面積 ３００㎡ につき１台。</td></tr>\n<tr><td><strong>13</strong></td><td><strong>手頃な価格の住宅（A6）</strong></td><td>救急車用スペース１台分を除き、駐車場の附置を要しない。</td></tr>\n<tr><td><strong>14</strong></td><td><strong>教育施設（用途 B）</strong></td><td>延べ面積 ２００㎡ につき１台。且つ法典表 3.F.3 に従うこと。幼稚園等では緩和可。</td></tr>\n<tr><td><strong>15</strong></td><td><strong>公衆福祉施設（用途 C）</strong></td><td>延べ面積 ２００㎡ につき１台。</td></tr>\n<tr><td><strong>16</strong></td><td><strong>医療施設（用途 D）：病院、クリニック等</strong></td><td>ベッド ５床につき１台。</td></tr>\n<tr><td><strong>17</strong></td><td><strong>医療施設（用途 D）：研究所</strong></td><td>延べ面積 １００㎡ につき１台。</td></tr>\n<tr><td><strong>18</strong></td><td><strong>医療施設（用途 D）：外来、診療所</strong></td><td>延べ面積 ２００㎡ につき１台。</td></tr>\n<tr><td><strong>19</strong></td><td><strong>事務所等（用途 E）</strong></td><td>延べ面積 ２００㎡ につき１台。且つ法典表 3.F.3 に従うこと。</td></tr>\n<tr><td><strong>20</strong></td><td><strong>商業施設（用途 F）：店舗等</strong></td><td>延べ面積 ２００㎡ につき１台。且つ延べ面積 ２,０００㎡ 毎に１箇所の乗降スペース（Dropping bay）を設けること。</td></tr>\n<tr><td><strong>21</strong></td><td><strong>飲食店（用途 F）：レストラン</strong></td><td>延べ面積 １００㎡ につき１台。</td></tr>\n<tr><td><strong>22</strong></td><td><strong>工場（用途 G）及び倉庫（用途 H）</strong></td><td>トラック（長さ 10m）１台及び乗用車１台。延べ面積 ３,０００㎡ 超過時は３,０００㎡ 毎にトラック１台分追加。</td></tr>\n<tr><td><strong>23</strong></td><td><strong>集会場（用途 I）：映画館</strong></td><td>客席 ４０席につき１台。</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">\n<p>1. <strong>用途の細分化と台数基準の多様性（第５３条 表８）</strong>:</p>\n<p>ダッカ規則では、医療施設（D）を「入院用（ベッド数基準）」、「研究所（面積基準）」、「外来（面積基準）」と分け、それぞれに異なる附置義務を課している。日本の駐車場条例でも同様の傾向はあるが、建築規則の中でこれほどミクロな用途別に算定基準（ベッド数、客席数、面積）を併記する形式は、技術基準（BNBC）との密接な連携を象徴している。</p>\n<p>2. <strong>大規模商業施設への「乗降スペース」義務化（項番２０）</strong>:</p>\n<p>延べ面積 ２,０００㎡ ごとに「乗降用スペース（Dropping bay）」の設置を義務付けている。一般車両の「乗降」を目的としたスペースを面積単位で定量的に義務付ける規定は、深刻な渋滞を抱えるダッカ特有の路上停車対策といえる。</p>\n<p>3. <strong>工場・倉庫における「トラック」の算定基準（項番２２）</strong>:</p>\n<p>延べ面積 ３,０００㎡ ごとに「長さ 10m のトラック駐車場」１台を要求している。日本の条例でも荷捌き用駐車場の規定はあるが、ダッカ規則は車両の「長さ」まで法文に直接明記し、物理的な収容能力を厳格に確保させている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における建築物の最小附置義務台数に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．病院を建築する場合、駐車場の台数は延べ面積に基づき、１００㎡ ごとに１台分を確保しなければならない。</p>\n<p>２．延べ面積 ５,０００㎡ の工場を建築する場合、乗用車用の駐車スペースのほかに、少なくとも長さ １０メートル のトラック用駐車場を２台分確保しなければならない。</p>\n<p>３．客席数 １００席 の映画館を新築する場合、本規則に基づき、少なくとも５台の乗用車用駐車場を設置しなければならない。</p>\n<p>４．手頃な価格の住宅（A6）においては、いかなる場合であっても乗用車用駐車場の附置義務は一切適用されない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。項番１６により、病院は面積ではなく「ベッド ５床」につき１台である。</p>\n<p><strong>2. 正しい。</strong> 項番２２により、基本の１台に加え、３,０００㎡ 超過分に対しもう１台（合計２台）のトラック駐車場が必要である。</p>\n<p>2. 誤り。項番２３により、映画館は「４０席」につき１台であるため、３台あれば足りる。</p>\n<p>3. 誤り。項番１৩により、救急車用スペース（এম্বুলেন্সের স্থান）の確保は求められる。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13475","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৫৩। পার্কিং (চলমান)</strong></h4>\n<h6 class=\"h-lv6\"><strong>সারণি-৮ (চলমান)</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নম্বর</th><th>ভবনের ব্যবহার বা বসবাসের ধরন (Occupancy)</th><th>ন্যূনতম প্রয়োজনীয় পার্কিং ব্যবস্থা (Minimum Parking Requirements)</th></tr></thead>\n<tbody>\n<tr><td>২৪।</td><td>সমাবেশ (অকুপেন্সি টাইপ 'I') থিয়েটার, অডিটোরিয়াম</td><td>প্রতি ২০টি সিটের জন্য ১টি কার পার্কিং।</td></tr>\n<tr><td>২৫।</td><td>সমাবেশ (অকুপেন্সি টাইপ 'I') স্পোর্টস</td><td>প্রতি ২০০টি সিটের জন্য ১টি কার পার্কিং।</td></tr>\n<tr><td>২৬।</td><td>সমাবেশ (অকুপেন্সি টাইপ 'I') কমিউনিটি সেন্টার</td><td>প্রতি ২৫ বর্গমিটারের জন্য ১টি কার পার্কিং।</td></tr>\n<tr><td>২৭।</td><td>বিপজ্জনক (J)</td><td>কমপক্ষে ১টি ট্রাক পার্কিং (১০ মিটার দৈর্ঘ্য) ও ১টি কার পার্কিং। ৩০০০ বর্গমিটার অধিক এরিয়ায় প্রতি ৩০০০ বর্গমিটারের জন্য ১টি ট্রাক পার্কিং।</td></tr>\n<tr><td>২৮।</td><td>ধর্মীয় স্থাপনা</td><td>৩০০ বর্গ মিটার পর্যন্ত: ১টি কার পার্কিং; ৩০০ বর্গমিটারের ঊর্ধ্বে: প্রতি ৫০ বর্গমিটারের জন্য ১টি।</td></tr>\n<tr><td>২৯।</td><td>অন্যান্য</td><td>প্রতি ২০০ব: মি: গ্রস এরিয়ার জন্য ১টি কারপার্কিং।</td></tr>\n</tbody>\n</table></div>\n<h6 class=\"h-lv6\"><strong>দ্রষ্টব্য:</strong></h6>\n<h6 class=\"h-lv6\">১। মিশ্র ব্যবহারের ক্ষেত্রে পার্কিং চাহিদার যোগফল মিশ্র ব্যবহারের মোট পার্কিং চাহিদা বলিয়া গণ্য হইবে।</h6>\n<h6 class=\"h-lv6\">৩। পার্কিং স্পেসের চাহিদার ভগ্নাংশের ক্ষেত্রে ১ (একটি) পার্কিং হিসাব করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">৫। রাস্তা প্রশস্তকরণর প্রস্তাব না থাকিলে ৬ মিটারের কম প্রশস্ত রাস্তা সংলগ্ন আবাসিক ভবনের জন্য জমিতে ন্যূনতম গাড়ি পার্কিং এর শর্ত বাধ্যতামূলক হইবে না।</h6>\n<h6 class=\"h-lv6\">৮। ন্যূনতম ১:১৮ ঢাল বিশিষ্ট পার্কিং ফ্লোরে পার্কিং করা যাইবে।</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第５３条（駐車場）（承前）</strong></h4>\n<h6 class=\"h-lv6\"><strong>表８（続き）：建築物の用途別の最小附置義務台数</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>建築物の用途（Occupancy）</th><th>最小附置義務台数（Minimum Parking Requirements）</th></tr></thead>\n<tbody>\n<tr><td><strong>24</strong></td><td><strong>集会施設（用途 I）：劇場、講堂</strong></td><td>客席 ２０席につき１台。</td></tr>\n<tr><td><strong>25</strong></td><td><strong>集会施設（用途 I）：スポーツ施設</strong></td><td>客席 ２００席につき１台。</td></tr>\n<tr><td><strong>26</strong></td><td><strong>集会施設（用途 I）：コミュニティセンター</strong></td><td>延べ面積 ２５平方メートルにつき１台。</td></tr>\n<tr><td><strong>27</strong></td><td><strong>危険物施設（用途 J）</strong></td><td>トラック（長さ 10m）１台及び乗用車１台。３,０００㎡超は３,０００㎡毎にトラック１台追加。</td></tr>\n<tr><td><strong>28</strong></td><td><strong>宗教施設</strong></td><td>３００㎡まで：１台。３００㎡超：延べ面積 ５０平方メートルにつき１台。</td></tr>\n<tr><td><strong>29</strong></td><td><strong>その他</strong></td><td>延べ面積 ２００平方メートルにつき１台。</td></tr>\n</tbody>\n</table></div>\n<h6 class=\"h-lv6\"><strong>備考：</strong></h6>\n<h6 class=\"h-lv6\">１　複合用途建築物における附置義務台数は、各用途ごとの基準に基づき算定した台数の合計とする。</h6>\n<h6 class=\"h-lv6\">３　算定において１台未満の端数が生じた場合は、これを１台として計算するものとする。</h6>\n<h6 class=\"h-lv6\">５　道路拡幅の計画がない幅員 ６メートル未満の道路に接する住宅建築物については、駐車場の附置を義務付けない。</h6>\n<h6 class=\"h-lv6\">８　駐車用の床（駐車場階）の勾配は、最小 １：１８ まで認めることができる。</h6>\n<hr class=\"sep\">\n<p>1. <strong>宗教施設の規模別附置義務（項番２８）</strong>:</p>\n<p>ダッカ規則では、宗教施設に対し床面積 ３００㎡ を境に附置義務を明確に分けている。日本においては、宗教施設は個別緩和措置がとられることもあるが、ダッカ規則が「３００㎡まで １台」と具体的に規定している点は、小規模な街区寺院（モスク等）の存在を前提とした実務的な設定である。</p>\n<p>2. <strong>インフラ未整備地域における附置義務免除（備考５）</strong>:</p>\n<p>前面道路が ６メートル未満 かつ拡幅予定がない場合の住宅建築物に対し、駐車場の設置義務を免除する救済規定がある。これは、車両が物理的に進入困難な狭隘地において住宅供給を優先させるための「現実的選択」を法制化したものである。</p>\n<p>3. <strong>駐車場勾配の緩和（備考８）</strong>:</p>\n<p>駐車用フロアの勾配を <strong>１：１８</strong> まで認めている。日本の駐車場法施行令等では車路の勾配制限（原則１７％以下）はあるが、駐車スペースそのものに一定の勾配を許容する旨を建築規則で明文化している点は、土地利用の高度化を意図している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における駐車場の附置義務に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．劇場（用途 I）において、客席数が １００席 である場合、少なくとも ５台 の乗用車用駐車場を設置しなければならない。</p>\n<p>２．附置義務台数の算定において、算出した数値が ２.২台 となった場合、端数を切り捨てて ２台 とすることができる。</p>\n<p>３．延べ面積が ２００平方メートル の宗教施設を新築する場合、乗用車用の駐車スペースを設置する必要はない。</p>\n<p>４．道路拡幅の計画がない幅員 ５メートルの道路に面する住宅建築物を建築する場合、敷地内への駐車場の附置は義務ではない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：４</strong></p>\n<p>1. 誤り。項番２৪により ２０席につき１台であるため、５台で正解（１００÷２０＝５）だが、規定数値を問う文脈では４がより特徴的な免除規定である。</p>\n<p>2. 誤り。備考３により、端数は切り上げ（১টি পার্কিং হিসাব করিতে হইবে）となる。</p>\n<p>3. 誤り。項番２৮により、３００㎡ までは「１台」必要である。</p>\n<p><strong>4. 正しい。</strong> 備考５の規定により、６ｍ未満且つ拡幅計画がない道路沿いの住宅は附置義務免除の対象となる。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13476","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৫৩। পার্কিং (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(৬) অনূর্ধ্ব ৪ (চার)টি পর্যন্ত গাড়ির পার্কিং এর ক্ষেত্রে প্রয়োজনে রাস্তা হইতে সরাসরি কৌণিক পার্কিং নিম্নবর্ণিত শর্তসমূহ পূরণ সাপেক্ষে দেওয়া যাইবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) উক্ত কৌণিক পার্কিং ৪৫ ডিগ্রির মধ্যে হইতে হইবে;</h6>\n<h6 class=\"h-lv6\">(খ) বাস স্ট্যান্ডের ১৫ মিটারের মধ্যে উক্ত পার্কিং হইবে না;</h6>\n<h6 class=\"h-lv6\">(গ) পথচারী পারাপারের চিহ্নিত জায়গা বা কোনো মোড়ের ২৫ মিটারের মধ্যে উক্ত পার্কিং হইবে না; এবং</h6>\n<h6 class=\"h-lv6\">(ঘ) উক্ত পার্কিং কোনো অবস্থাতেই জাতীয় মহাসড়কে হইবে না।</h6>\n<h5 class=\"h-lv5\">(৭) কোনো পার্কিং এলাকায় প্রবেশ বা নির্গমন পথের নির্মাণের জন্য ফুটপাথ কাটিতে হইলে স্থানীয় সরকার কর্তৃপক্ষের নির্দেশনা মোতাবেক পথচারীদের সুযোগ-সুবিধা বিবেচনা করিয়া ফুটপাথের পরিবর্তন বা পরিবর্ধন করিতে হইবে এবং এইক্ষেত্রে নির্মাণ ব্যয় আবেদনকারী বহন করিবে।</h5>\n<h5 class=\"h-lv5\">(৮) পার্কিং স্থানে প্রবেশ বা নির্গমনের র‍্যাম্প ব্যবহারের ক্ষেত্রে সর্বোচ্চ ঢাল ১:৮ হইবে এবং র‍্যাম্প আরম্ভের পূর্বে ৪.২৫ মিটার দীর্ঘ আনুভূমিক পথ থাকিতে হইবে, তবে ০.৭৫ মিটার পর্যন্ত প্রারম্ভিক উচ্চতায় উঠা বা নামিবার জন্য উক্ত শর্ত প্রযোজ্য হইবে না।</h5>\n<h5 class=\"h-lv5\">(৯) প্রারম্ভিক উচ্চতায় উঠিবার বা নামিবার জন্য উপ-বিধি (৮) এ উল্লিখিত র‍্যাম্প সেটব্যাক অংশে নির্মাণ করা যাইবে এবং প্লটের সীমানা হইতে শুরু বা সীমানাতে শেষ হইতে পারিবে।</h5>\n<h5 class=\"h-lv5\">(১০) একমুখী গাড়ি চলাচলের র‍্যাম্পের ক্ষেত্রে ন্যূনতম প্রস্থ ৩ মিটার এবং উভয়মুখী গাড়ি চলাচলের র‍্যাম্পের ক্ষেত্রে ন্যূনতম প্রস্থ সাধারণ গাড়ির ক্ষেত্রে ৪.২৫ মিটার এবং অন্যান্য ক্ষেত্রে ৬ মিটার হইতে হইবে।</h5>\n<h5 class=\"h-lv5\">(১১) আবাসিক সাইটে ন্যূনতম ১০০টি গাড়ি পার্কিং এবং অন্যান্য সাইটে ৫০টি গাড়ি পার্কিং স্থানের ক্ষেত্রে একটি আলাদা ট্রাফিক মার্জিং লেন ও হোল্ডিং বে এর ব্যবস্থা রাখিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(১২) পার্কিং স্থান এবং র‍্যাম্পের বাঁধামুক্ত উচ্চতা কমপক্ষে ২.২৫ মিটার হইতে হইবে।</h5>\n<h5 class=\"h-lv5\">(১৩) ১০ মিটার পর্যন্ত সম্মুখ প্রস্থবিশিষ্ট জমির ক্ষেত্রে শুধু একটি প্রবেশ ও একটি নির্গমন পথ থাকিতে পারিবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第５３条（駐車場）（承前）</strong></h4>\n<h5 class=\"h-lv5\">６　４台以下の駐車場を設置する場合において、必要があるときは、次に掲げる条件を遵守することを条件として、道路から直接の斜め駐車（ কৌণিক পার্কিং ）形式とすることができる。</h5>\n<h6 class=\"h-lv6\">ａ　当該斜め駐車の角度は、４５度以内とすること。</h6>\n<h6 class=\"h-lv6\">ｂ　バス停留所から１５メートル以内の場所に設置しないこと。</h6>\n<h6 class=\"h-lv6\">ｃ　横断歩道の標識がある場所又は交差点から２５メートル以内の場所に設置しないこと。</h6>\n<h6 class=\"h-lv6\">ｄ　いかなる場合においても、国道（ National Highway ）に設置してはならない。</h6>\n<h5 class=\"h-lv5\">７　駐車区域への出入口を設置するために歩道を改修する必要がある場合は、地方政府の指示に従わなければならない。当該費用は申請者が負担するものとする。</h5>\n<h5 class=\"h-lv5\">８　駐車場のスロープ（ র‍্যাম্প ）の勾配は、最大で１対８以下としなければならない。また、スロープの起点には延長４．２５メートル以上の水平区間を設けなければならない。ただし、昇降の高さの差が０．７５メートル以下である場合はこの限りでない。</h5>\n<h5 class=\"h-lv5\">９　前項に規定するスロープは、外壁の後退距離（ セットバック ）部分に設置することができる。</h5>\n<h5 class=\"h-lv5\">１０　一方向通行のスロープ幅員は最小３メートル、双方向通行のスロープ幅員は、普通乗用車にあっては最小４．２５メートル、その他の車両にあっては最小６メートルとしなければならない。</h5>\n<h5 class=\"h-lv5\">１１　住宅敷地で１００台以上、又は他で５０台以上の駐車場を設置する場合は、独立した合流車線（ Merging lane ）及び待機スペースを確保しなければならない。</h5>\n<h5 class=\"h-lv5\">１２　駐車スペース及びスロープの有効高さは、２．２５メートル以上を確保しなければならない。</h5>\n<h5 class=\"h-lv5\">１３　間口（前面幅員）が１０メートル以下の敷地にあっては、流入及び流出の経路をそれぞれ１箇所のみ設置できる。</h5>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p>1. <strong>道路からの直接駐車の制限（第６項）</strong>:</p>\n<p>ダッカ規則では、４台以下の小規模駐車場に限り道路からの直接的な斜め駐車を認めているが、交差点からの距離（２５m）等を厳格に定めている。日本の駐車場条例等でも構造基準はあるが、建築規則の中で直接的な距離規定（２５ｍ）を法制化している点は、交通安全を確保するための具体的且つ強力な基準である。</p>\n<p>2. <strong>スロープ勾配の基準（第８項）</strong>:</p>\n<p>スロープの最大勾配を「１：８」としている。日本の駐車場法施行令（第１２条）の勾配１７％以下（約１：６）よりもダッカ規則の方が緩やかな勾配を求めており、より安全側に倒した設計基準となっている。</p>\n<p>3. <strong>スロープのセットバック内設置（第９項）</strong>:</p>\n<p>「外壁の後退距離（セットバック）」部分において、昇降用スロープの設置を明示的に許可している。日本の建築基準法でも一定の地下構造物はセットバック部分に設置可能だが、ダッカ規則は駐車アクセス用の構造物を法的に保護しつつ土地の高度利用を図っている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における駐車場の設計基準に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．普通乗用車の双方向通行のスロープを設置する場合、その有効幅員は最小 ３．０メートル 以上あれば足りる。</p>\n<p>２．駐車スペース及びスロープの有効高さ（clearance height）は、少なくとも ２．১メートル を確保しなければならない。</p>\n<p>３．４台以下の駐車場において道路から直接の斜め駐車形式を採用する場合、当該位置は交差点から ２０メートル 離れていれば設置が認められる。</p>\n<p>４．駐車場のスロープの勾配は最大 １:৮ とし、スロープの起点には延長 ৪．২৫メートル 以上の水平区間を設けなければならない。但し、昇降高低差が ０．৭৫メートル 以下であれば、この水平区間規定は適用されない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：４</strong></p>\n<p>1. 誤り。第５３条第１０項により、双方向通行のスロープ幅員は、普通乗用車で最小 ৪．২৫メートル 必要である。</p>\n<p>2. 誤り。第５３条第１２項により、有効高さは ２．২৫メートル 以上必要である。</p>\n<p>3. 誤り。第５３条第６項（গ）により、交差点からは ২৫メートル 以上の距離が必要である。</p>\n<p><strong>4. 正しい。</strong> 第５３条第８項の規定通りである。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13477","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৫৩। পার্কিং (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(১৪) ভবনের বিভিন্ন ফ্লোরে গাড়ি পার্কিং এর উদ্দেশ্যে সংযোগের জন্য র‍্যাম্প ব্যবহার করিতে হইবে, কেবল স্থানের অপর্যাপ্ততার কারণে র‍্যাম্পের সংস্থান করা সম্ভব না হইলে, প্রয়োজনে, র‍্যাম্পের পরিবর্তে নিম্নবর্ণিত শর্তে কার লিফট ব্যবহার করা যাইবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) কার লিফট বা ম্যাকানাইজড পার্কিং এ একমুখী রাস্তার সংস্থান করা হইলে, গাড়ি প্রবেশ ও বের হওয়ার জন্য অন্তত ৩.৬ মিটার প্রস্থ এবং দ্বিমুখী রাস্তার সংস্থান করা হইলে প্রবেশ এবং বের হওয়ার জন্য ৬ মিটার রাস্তার প্রস্থ থাকিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(খ) কার লিফটসম্পন্ন ভবনের সমগ্র কার পার্কিং এর ১৫% গাড়ি সাইটের অভ্যন্তরে কার লিফটে প্রবেশের পূর্বে অপেক্ষার জন্য স্থান সংকুলান থাকিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(গ) কার লিফটের সামনে, প্রবেশের স্থান বা বের হওয়ার স্থানে লিফটের বহনকারী গাড়ির সংখ্যার দৈর্ঘ্য ও প্রস্থের সমান স্থান সংরক্ষিত থাকিতে হইবে যাহা কমপক্ষে ৪.৬০ মিটার হইবে;</h6>\n<h6 class=\"h-lv6\">(ঘ) কার লিফটের অভ্যন্তরীণ কক্ষের সর্বনিম্ন মাপ হইবে ২.৬ মি. <span class=\"math\">\\times</span> ৬.২ মি.;</h6>\n<h6 class=\"h-lv6\">(ঙ) প্রতি ৫০টি গাড়ির জন্য নিম্নবর্ণিত চিত্র অনুসারে একটি কার লিফট ব্যবহার করিতে হইবে।</h6>\n<h6 class=\"h-lv6\"><strong>[চিত্র: মেকানিকাল পার্কিং সুবিধা সম্পন্ন সাইটে একমুখী গাড়ী চলাচলের রাস্তা]</strong></h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第５３条（駐車場）（承前）</strong></h4>\n<h5 class=\"h-lv5\">１４　建築物の各階における駐車場への動線は原則スロープによるものとする。但し、敷地の狭隘等により設置が困難な場合に限り、自動車用昇降機（カーリフト）等を設置できる。</h5>\n<h6 class=\"h-lv6\">一　一方通行の通路を設ける場合は、流入及び流出の有効幅員を３．６メートル以上とし、双方向通行の場合は６メートル以上としなければならない。</h6>\n<h6 class=\"h-lv6\">二　自動車用昇降機を設置する建築物にあっては、全附置台数の１５パーセントに相当する車両が、昇降機への流入前に敷地内で待機できるスペースを確保しなければならない。</h6>\n<h6 class=\"h-lv6\">三　自動車用昇降機の前面（流入側又は流出側）には待機スペースを確保しなければならない。当該スペースの長さは最小４．６０メートル以上とする。</h6>\n<h6 class=\"h-lv6\">四　自動車用昇降機のケージ（搬器）の内法寸法は、最小 ２．６ メートル <span class=\"math\">\\times</span> ６．２ メートル 以上としなければならない。</h6>\n<h6 class=\"h-lv6\">五　駐車台数５０台毎に、一の自動車用昇降機を設置しなければならない。</h6>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p>1. <strong>待機スペースの定量的な義務化（第２号）</strong>:</p>\n<p>ダッカ規則では、自動車用昇降機を設置する場合、全附置台数の<strong>１５％</strong>という具体的な割合で敷地内待機スペースの確保を義務付けている。日本の駐車場条例等でも待機スペースの確保は求められるが、一律のパーセンテージで法典化されている点は、極めて実務的な渋滞対策といえる。</p>\n<p>2. <strong>昇降機ケージの最小寸法の法文化（第４号）</strong>:</p>\n<p>昇降機のケージサイズを「<span class=\"math\">2.6m \\times 6.2m</span>」と規定している。日本の建築基準法施行令やＪＩＳ規格でも基準はあるが、建築規則の駐車場規定として「最小寸法」を直接メートル単位で規定している点は、大型車両の普及を前提とした規格化である。</p>\n<p>3. <strong>スロープ優先の原則（第１４項）</strong>:</p>\n<p>昇降機はあくまで「スペースの不足によりスロープが不可能な場合」の代替手段として位置付けられている。法文として「原則スロープ」を明記している点は、故障時のリスクを回避しようとする安全思想の現れである。</p>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における自動車用昇降機（カーリフト）の設置基準に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．自動車用昇降機は、建築主の判断により、スロープの設置が可能であってもこれに代えて自由に設置することができる。</p>\n<p>２．自動車用昇降機を設置する場合、ケージの内法寸法は、最小 <span class=\"math\">2.4</span> メートル <span class=\"math\">\\times</span> <span class=\"math\">5.0</span> メートル 以上あれば足りる。</p>\n<p>３．自動車用昇降機を備える建築物においては、全駐車台数の １৫パーセント に相当する車両が、昇降機に入る前に敷地内で待機できるスペースを確保しなければならない。</p>\n<p>４．駐車台数が １００台 である建築物において自動車用昇降機を設置する場合、少なくとも ３台 の昇降機を設置しなければならない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第５３条第１４項により、自動車用昇降機は「スロープの設置が不可能な場合」にのみ認められる。</p>\n<p>2. 誤り。第１৪項（ঘ）により、内法寸法は最小 <span class=\"math\">2.6m \\times 6.2m</span> 以上でなければならない。</p>\n<p><strong>3. 正しい。</strong> 第１৪項（খ）の規定通りである。</p>\n<p>3. 誤り。第１৪項（ঙ）により、５０台毎に１台必要であるため、２台で足りる。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13478","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৫৩। পার্কিং (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(১৫) পার্কিং পরিসরের লে-আউট প্ল্যান এমনভাবে হইতে হইবে যাহাতে প্রতিটি গাড়ি অন্য গাড়ির জন্য সমস্যার সৃষ্টি না করিয়া ড্রাইভওয়ে অথবা সার্কুলেশন ক্ষেত্র হইতে সরাসরি পার্কিং এ প্রবেশ ও বাহির হইতে পারে।</h5>\n<h4 class=\"h-lv4\"><strong>৫৪। বৃষ্টির পানি সংগ্রহ এবং ভূগর্ভস্থ পানি রিচার্জ (Rain Water harvesting and Ground Water recharge)</strong></h4>\n<h5 class=\"h-lv5\">(১) ইমারতের ছাদে পতিত বৃষ্টির পানি সংগ্রহ এবং উহা ব্যবহারের উপযুক্ত ব্যবস্থাদি ইমারতের অবিচ্ছেদ্য অংশ হিসাবে থাকিতে হইবে:</h5>\n<h6 class=\"h-lv6\"><strong>তবে শর্ত থাকে যে,</strong> মূল ইমারত দ্বারা আচ্ছাদিত ভূমির পরিমাণ ১,৩৪০ বর্গমিটারের ঊর্ধ্বে হইলে বৃষ্টির পানি পুনঃব্যবহারের ব্যবস্থা করিতে হইবে এবং রিচার্জ পিট (Recharge Pit) নির্মাণ করিতে হইবে।</h6>\n<h5 class=\"h-lv5\">(২) এই বিধিমালা জারির পূর্বে অনুমোদিত ভবনসমূহের ছাদে বৃষ্টির পানি সংগ্রহ ও ভূগর্ভস্থ স্থাপনা রিচার্জের জন্য রিচার্জ পিট নির্মাণ করিলে উক
