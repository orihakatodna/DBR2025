্ত সকল ইমারতের ব্যবহার সনদ প্রদানের ফি মওকুফ করা হইবে।</h5>\n<h5 class=\"h-lv5\">(৩) আচ্ছাদিত ক্ষেত্রফলের উপর ভিত্তি করিয়া কোড অনুযায়ী প্রয়োজনীয় সংখ্যক ও আকারের রিচার্জপিট নির্মাণ করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৪) বৃষ্টির পানি সংগ্রহ ও ভূগর্ভস্থ পানি রিচার্জের ব্যবস্থাদি কোড অনুযায়ী করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৫) নির্মিত রিচার্জপিট—</h5>\n<h6 class=\"h-lv6\">(ক) বৃষ্টির পানি সংরক্ষণ ও রিচার্জ ব্যতীত অন্য কোনো উদ্দেশ্যে ব্যবহার করা যাইবে না;</h6>\n<h6 class=\"h-lv6\">(খ) বৃষ্টির পানি ব্যতীত অন্য কোনো উৎসের পানি রিচার্জের জন্য রিচার্জপিট ব্যবহার করা যাইবে না;</h6>\n<h6 class=\"h-lv6\">(গ) সংরক্ষিত পানি দূষণমুক্ত রাখিতে কার্যকর ব্যবস্থা গ্রহণ করিতে হইবে।</h6>\n<h5 class=\"h-lv5\">(৬) উপ-বিধি (৫) এ উল্লিখিত বিধান লঙ্ঘন করিলে উহা নির্মাণ অনুমোদনের শর্ত লঙ্ঘন বলিয়া গণ্য হইবে।</h5>\n<h5 class=\"h-lv5\">(৭) কর্তৃপক্ষ, একটি মনিটরিং কমিটি গঠন করিবে এবং উহা রিচার্জপিট রক্ষণাবেক্ষণ পর্যবেক্ষণ করিবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第５３条（駐車場）（承前）</strong></h4>\n<h5 class=\"h-lv5\">１５　駐車場の配置計画は、各車両が他車の通行を妨げることなく、直接駐車スペースに出入りできるよう策定しなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第５４条（雨水の採取及び地下水への還元（Rain Water harvesting and Ground Water recharge））</strong></h4>\n<h5 class=\"h-lv5\"><strong>１</strong>　建築物の屋根に降下する雨水の採取及びその利用のための適切な設備は、建築物の不可分の一部（ অবিচ্ছেদ্য অংশ ）として設けなければならない。</h5>\n<h6 class=\"h-lv6\"><strong>ただし、</strong> 主要な建築面積が１,３４０平方メートルを超える場合にあっては、再利用設備を設け、且つ浸透桝（Recharge Pit）を建築しなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>２</strong>　本規則の施行前に承認された建築物が浸透桝を築造したときは、使用許可証（Occupancy certificate）の交付に係る手数料を免除（ মওকুফ ）するものとする。</h5>\n<h5 class=\"h-lv5\"><strong>৩</strong>　建築面積に基づき、法典（Code）に従って必要な数及び規模の浸透桝を築造しなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>৪</strong>　雨水採取及び地下水還元設備は、法典等の仕様に従わなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>৫</strong>　浸透桝については、次に掲げる規定を遵守しなければならない。</h5>\n<h6 class=\"h-lv6\"><strong>一</strong>　雨水の貯留及び地下水への還元以外の目的に使用してはならない。</h6>\n<h6 class=\"h-lv6\"><strong>二</strong>　雨水以外の水源からの水を還元するために使用してはならない。</h6>\n<h6 class=\"h-lv6\"><strong>三</strong>　貯留された水が汚染されないよう措置を講じなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>৬</strong>　前項の規定に違反したときは、建築確認の条件に違反したものとみなす。</h5>\n<h5 class=\"h-lv5\"><strong>７</strong>　所管行政庁は監視委員会を設置し、浸透桝の維持管理状況を監視するものとする。</h5>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p>1. <strong>環境インフラの「不可分性」の定義（第５４条第１項）</strong>:</p>\n<p>ダッカ規則では、雨水採取設備を建築物の「不可分の一部」と定義している。面積 <strong>１,３４０㎡</strong> という具体的な閾値で浸透桝の設置を強行的に義務付けている点は、日本の建築基準法（主に誘導規定）よりも強力な法的強制力を有している。</p>\n<p>2. <strong>遡及的なインセンティブ制度（第２項）</strong>:</p>\n<p>既存建築物が浸透桝を後付けした場合、使用許可の手数料を免除する規定がある。日本にはない独自の「行政手数料免除」を直接的な対価とする手法であり、環境対策を加速させる政策的意図が見える。</p>\n<p>3. <strong>浸透桝の用途外使用の厳格な禁止（第５項）</strong>:</p>\n<p>浸透桝に対し雨水以外の水源利用を禁じている。これは地下水汚染防止を主眼に置いたものであり、建築法規が環境保護法的な役割を直接担っている。</p>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における「雨水の採取及び利用（Rainwater Harvesting）」に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．建築物の屋根に降下する雨水の採取設備は、意匠上の理由があれば建築物の一部とみなさないことができる。</p>\n<p>２．主要な建築面積が １,৫০০平方メートル である建築物を新築する場合、雨水採取設備に加え、浸透桝（Recharge Pit）を設置しなければならない。</p>\n<p>３．本規則施行前に完成した建築物において浸透桝を設置した場合であっても、手数料が免除されることはない。</p>\n<p>４．浸透桝は、災害時等の緊急用として生活雑排水を地下へ還元するために一時的に使用することができる。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。第５４条第１項により、採取設備は「不可分の一部（অবিচ্ছেদ্য অংশ）」である。</p>\n<p><strong>2. 正しい。</strong> 第１項但書きにより、建築面積 １,৩৪০㎡ 超過時は設置義務がある。</p>\n<p>2. 誤り。第２項により、既存建築物が当該設備を設置した場合は手数料免除となる。</p>\n<p>3. 誤り。第５項（খ）により、雨水以外の水源利用は禁止されている。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13479","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৫৪। বৃষ্টির পানি সংগ্রহ (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(৮) রিচার্জ পিট আবশ্যিক বা অতিরিক্ত ভূমি আচ্ছাদনের অংশ হিসাবে গণ্য হইবে না।</h5>\n<h5 class=\"h-lv5\">(৯) বৃষ্টির পানি সংগ্রহ ও রিচার্জের ব্যবস্থাসহ ইমারত নির্মাণ করিলে ব্যবহার সনদপত্র গ্রহণ ও নবায়নের ক্ষেত্রে কোনো ফি প্রদান করিতে হইবে না।</h5>\n<h4 class=\"h-lv4\"><strong>৫৫। বৃক্ষরোপণ।</strong></h4>\n<h5 class=\"h-lv5\">(১) প্লটের পরিমাণ ১৩৪০ বর্গ মিটার (২০ কাঠা) এর অধিক হইলে প্লটের ন্যূনতম ১০% জায়গায় আবশ্যিকভাবে বৃক্ষরোপণ করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(২) বৃক্ষরোপনের স্থান আবশ্যিক অনাচ্ছাদিত স্থান ও সেটব্যাক স্থান সমন্বয়ে করা যাইবে এবং অনুরূপ স্থান সর্বোচ্চ ২ ভাগে বিভক্ত করা যাইবে।</h5>\n<h5 class=\"h-lv5\">(৩) ১৩৪০ বর্গমিটার (১৪ কাঠা) এর নিচের ক্ষেত্রফল বিশিষ্ট প্লটে আবশ্যিক উন্মুক্ত স্থানের অর্ন্তভুক্ত বাধ্যতামূলক সবুজ এলাকায় লতা বা মাঝারি গাছপালার সংস্থান রাখিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৪) ইমারতের মালিক বৃক্ষের যথাযথ পরিচর্যা করিবেন।</h5>\n<h5 class=\"h-lv5\">(৫) বিদ্যমান পরিণত বৃক্ষ সংরক্ষণপূর্বক নকশা অনুমোদন ও নির্মাণ করা হইলে সারণি-৯ এ উল্লিখিত প্রণোদনা প্রযোজ্য হইবে:</h5>\n<h6 class=\"h-lv6\"><strong>সারণি-৯</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>বিদ্যমান পরিণত বৃক্ষের ঘের (Girth) এর ব্যাস</th><th>প্রণোদনা</th><th>বৃক্ষের কেন্দ্র হইতে সেটব্যাক</th></tr></thead>\n<tbody>\n<tr><td>০.২০ মিটার হইতে ০.৩০ মিটারের কম</td><td>১০ বর্গমিটার</td><td>২.৪০ মিটার</td></tr>\n<tr><td>০.৩০ মিটার হইতে ০.৪০ মিটারের কম</td><td>১৫ বর্গমিটার</td><td>৩.৬০ মিটার</td></tr>\n<tr><td>০.৪০ মিটার হইতে ০.৫০ মিটারের কম</td><td>২০ বর্গমিটার</td><td>৪.৮০ মিটার</td></tr>\n<tr><td>০.৫০ মিটার হইতে ০.৬০ মিটারের কম</td><td>২৫ বর্গমিটার</td><td>৬.০০ মিটার</td></tr>\n<tr><td>০.৬০ মিটার বা তদূর্ধ্ব</td><td>৩০ বর্গমিটার</td><td>৭.২০ মিটার</td></tr>\n</tbody>\n</table></div>\n<h4 class=\"h-lv4\"><strong>৫৬। ব্লকভিত্তিক উন্নয়ন।</strong></h4>\n<h5 class=\"h-lv5\">ব্লকভিত্তিক উন্নয়নের ক্ষেত্রে ইমারত নির্মাণ করিতে চাহিলে মহাপরিকল্পনায় উল্লিখিত ব্লকভিত্তিক উন্নয়নের শর্তাবলি প্রযোজ্য হইবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第５４条（雨水採取等）承前</strong></h4>\n<h5 class=\"h-lv5\">８　浸透桝（Recharge Pit）は、建蔽率（Ground coverage）の算定に含めないものとする。</h5>\n<h5 class=\"h-lv5\">９　雨水採取及び地下水還元の設備を備えて建築物を建築した場合、使用許可証の取得及び更新に係る手数料を免除する。</h5>\n<h4 class=\"h-lv4\"><strong>第５５条（植栽（Tree Planting））</strong></h4>\n<h5 class=\"h-lv5\"><strong>１</strong>　敷地面積が１,３４０平方メートルを超える場合は、敷地の少なくとも１０パーセント以上の面積に植栽を行わなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>２</strong>　植栽を施す場所は、義務的空地及びセットバック部分と兼ねることができる。当該場所は最大２箇所に分割することができる。</h5>\n<h5 class=\"h-lv5\"><strong>３</strong>　敷地面積が１,３４０平方メートル以下の敷地においても、緑化区域に低木や中木等を配置しなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>৪</strong>　建築主は、樹木の適切な管理を行わなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>৫</strong>　敷地内に現存する成木を保存して建築等を行う場合、次の表９に掲げるインセンティブ（割増床面積）を適用し延べ面積に加算できる。</h5>\n<h6 class=\"h-lv6\"><strong>表９：既存樹木の保存に伴う容積率（FAR）のインセンティブ</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>既存成木の幹周直径</th><th>割増床面積</th><th>樹木中心からの後退距離</th></tr></thead>\n<tbody>\n<tr><td>０．２０ｍ以上 ０．３０ｍ未満</td><td>１０平方メートル</td><td>２．４０メートル</td></tr>\n<tr><td>０．３０ｍ以上 ０．４０ｍ未満</td><td>１５平方メートル</td><td>３．６０メートル</td></tr>\n<tr><td>０．４０ｍ以上 ０．５０ｍ未満</td><td>២０平方メートル</td><td>৪．৮০メートル</td></tr>\n<tr><td>０．５０ｍ以上 ０．６０ｍ未満</td><td>២৫平方メートル</td><td>৬．০০メートル</td></tr>\n<tr><td>０．６０ｍ以上</td><td>３０平方メートル</td><td>７．２０メートル</td></tr>\n</tbody>\n</table></div>\n<h4 class=\"h-lv4\"><strong>第５６条（街区単位の開発（Block based development））</strong></h4>\n<h5 class=\"h-lv5\">街区単位の開発を行う場合にあっては、都市計画（マスタープラン）に定める条件を適用する。</h5>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p>1. <strong>既存樹木の保存に対する直接的な容積率ボーナス（第５５条第５項）</strong>:</p>\n<p>ダッカ規則では、敷地内の既存の成木を保存する場合、１本当たり <strong>１０㎡〜３０㎡</strong> という具体的な数値を延べ面積に加算できるインセンティブ制度を法制化している。日本の総合設計制度等でも緑化は評価対象となるが、個別の「樹木１本」に対し直接的な床面積加算値を規定している点は非常にユニークである。</p>\n<p>2. <strong>植栽面積の定量的義務（第１項）</strong>:</p>\n<p>敷地面積が １,３４０㎡ を超える場合に「敷地の１０％」を植栽とすることを義務付けている。これを建築規則（Rules）という実体法の中で主要な制限項目として扱っている点が特徴である。</p>\n<p>3. <strong>環境貢献による手数料免除（第５４条第９項）</strong>:</p>\n<p>雨水採取設備等を設けることで、行政手数料を免除する規定がある。単なる義務ではなく行政コストメリットを提示し、環境インフラ普及を後押しする手法である。</p>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における「植栽（Tree Planting）」に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．敷地面積が ２,０００平方メートル である建築物の計画において、植栽面積は敷地面積の ５パーセント 以上確保すれば足りる。</p>\n<p>２．植栽を施す場所を分割して設ける場合、最大で３箇所まで分けることができる。</p>\n<p>３．敷地内の既存成木（幹周直径 ０．６０メートル 以上）を保存する場合、インセンティブとして ３０平方メートル の床面積を延べ面積に加算できる。</p>\n<p>４．既存樹木の保存による床面積の割増を受けた場合であっても、工事中に故意に当該樹木を損傷させた際に是正措置が適用されることはない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第５５条第１項により、１,３４０㎡ 超過敷地では「１０％ 以上」の植栽が必要である。</p>\n<p>2. 誤り。第５５条第２項により、分割は最大「２（দুই）」箇所までである。</p>\n<p><strong>3. 正しい。</strong> 表９により、直径 ０．৬０ｍ 以上の樹木保存に対し ３０㎡ のインセンティブが認められる。</p>\n<p>3. 誤り。第５５条第５項により、故意の損傷は措置の対象となる。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13480","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৫৭। ইমারতের পরিসরের ন্যূনতম চাহিদা।</strong>—সাশ্রয়ী আবাসন ব্যতীত অন্যান্য ইমারতের বিভিন্ন কক্ষ বা স্থানের আয়তন বা পরিসরের ক্ষেত্রে নিম্নবর্ণিত পরিমাপ ও শর্ত অনুসরণ করিতে হইবে:—</h4>\n<h5 class=\"h-lv5\">(ক) বসবাসযোগ্য কক্ষ:</h5>\n<h6 class=\"h-lv6\">(১) আবাসিক ভবনের প্রতিটি ইউনিটের ক্ষেত্রে ন্যূনতম ২.৯ মিটার প্রস্থ ও ৯.৫ বর্গমিটার ক্ষেত্রফল বিশিষ্ট অন্তত একটি কক্ষ থাকিতে হইবে এবং অন্যান্য বাসযোগ্য কক্ষসমূহের জন্য সর্বনিম্ন ক্ষেত্রফল ৫ বর্গমিটার এবং ন্যূনতম প্রস্থ ২ মিটার হইতে হইবে;</h6>\n<h6 class=\"h-lv6\">(২) বসবাসযোগ্য কক্ষের ন্যূনতম উচ্চতা ২.৭৫ মিটার হইবে এবং উন্মুক্ত বিমের নিচের উচ্চতা ন্যূনতম ২.১৫ মিটার থাকিতে হইবে, তবে ফলস সিলিং যুক্ত শীতাতপ নিয়ন্ত্রিত কক্ষের ক্ষেত্রে ফলস সিলিং এর নিচে ন্যূনতম উচ্চতা ২.৪৪ মিটার হইতে হইবে;</h6>\n<h5 class=\"h-lv5\">(খ) রান্নাঘর:</h5>\n<h6 class=\"h-lv6\">(১) রান্নাঘরের ন্যূনতম ক্ষেত্রফল ৪ বর্গমিটার এবং প্রস্থ ন্যূনতম ১.৫ মিটার হইবে;</h6>\n<h6 class=\"h-lv6\">(২) রান্নাঘরের ন্যূনতম উচ্চতা ২.৭৫ মিটার হইবে এবং ট্রাপের নিচ হইতে ন্যূনতম উচ্চতা ২.১৫ মিটার হইতে পারিবে;</h6>\n<h6 class=\"h-lv6\">(৩) বাসগৃহের রান্নাঘরের জানালা ন্যূনতম ১ বর্গমিটার হইতে হইবে;</h6>\n<h5 class=\"h-lv5\">(গ) গোসলখানা ও টয়লেট:</h5>\n<h6 class=\"h-lv6\">(১) বেসিন, ওয়াটার ক্লোজেট ও গোসলের স্থান সংবলিত টয়লেটের ক্ষেত্রে ন্যূনতম ফ্লোর এরিয়া ৩.০ বর্গমিটার এবং ন্যূনতম প্রস্থ ১.২৫ মিটার হইবে;</h6>\n<h6 class=\"h-lv6\">(২) বেসিন ও ওয়াটার ক্লোজেট সংবলিত টয়লেটের ক্ষেত্রে ন্যূনতম ফ্লোর এরিয়া ১.২ বর্গমিটার এবং ন্যূনতম প্রস্থ ১ মিটার হইবে;</h6>\n<h6 class=\"h-lv6\">(৩) বেসিন এবং গোসলের স্থান সংবলিত টয়লেটের ক্ষেত্রে ন্যূনতম ফ্লোর এরিয়া ১.৫ বর্গমিটার এবং ন্যূনতম প্রস্থ ১ মিটার হইবে;</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第５７条（建築物の各室の最小基準（Minimum requirements for building spaces））</strong></h4>\n<h5 class=\"h-lv5\"><strong>一</strong>　居室（Habitable rooms）：</h5>\n<h6 class=\"h-lv6\">ａ　住宅の各住戸には、幅員が最小２．９メートル以上、且つ床面積が９．５平方メートル以上である居室を少なくとも１室設けなければならない。その他の居室にあっては、床面積を最小５平方メートル以上、幅員を最小２メートル以上としなければならない。</h6>\n<h6 class=\"h-lv6\">ｂ　居室の天井高さは最小２．７５メートル以上としなければならない。但し、露出した梁の下面の高さは最小２．１５メートル以上とすることができる。なお、吊り天井（False ceiling）を有する空気調和設備を備えた居室にあっては、下面高さを最小２．４４メートル以上としなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>二</strong>　台所（Kitchen）：</h5>\n<h6 class=\"h-lv6\">ａ　台所の床面積は最小４平方メートル以上、幅員は最小１．５メートル以上としなければならない。</h6>\n<h6 class=\"h-lv6\">ｂ　台所の天井高さは最小２．７５メートル以上。但し、排水管トラップ等下面の高さは最小２．１５メートルまで認めることができる。</h6>\n<h6 class=\"h-lv6\">ｃ　住宅の台所には最小１平方メートル以上の面積の窓を設けなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>三</strong>　浴室及び便所（Bathroom and Toilet）：</h5>\n<h6 class=\"h-lv6\">ａ　洗面台、大便器及びシャワー室を備えた便所は、床面積最小３．０平方メートル以上、幅員最小１．２５メートル以上としなければならない。</h6>\n<h6 class=\"h-lv6\">ｂ　洗面台及び大便器を備えた便所は、床面積最小１．２平方メートル以上、幅員最小１メートル以上としなければならない。</h6>\n<h6 class=\"h-lv6\">ｃ　洗面台及びシャワー室を備えた便所は、床面積最小１．５平方メートル以上、幅員最小１メートル以上としなければならない。</h6>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p>1. <strong>天井高さの基準（第１号ｂ）</strong>:</p>\n<p>ダッカ規則では居室の天井高さを原則 <strong>２．７５メートル以上</strong> としている。日本の建築基準法では ２．１メートル以上 であり、ダッカの基準は日本よりも大幅に高く設定されている。これは熱帯気候における通風による室内環境維持を重視した設計思想である。</p>\n<p>2. <strong>居室の具体的寸法の義務化（第１号ａ）</strong>:</p>\n<p>住戸内に「幅 ２．９ｍ、面積 ９．５㎡」以上の居室を少なくとも１室設けることを義務付けている。日本の一律基準よりも居住水準の最低限度の確保に対する法的介入が直接的である。</p>\n<p>3. <strong>台所の窓面積の絶対値指定（第２号ｃ）</strong>:</p>\n<p>台所の窓について「最小 １平方メートル 以上」という絶対的な数値を求めている。日本のように床面積に対する割合ではなく、機能的な最小サイズを固定的に指定している点が特徴である。</p>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における建築物の各室の基準に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．住宅の各住戸には、幅員が最小 ２．১メートル 以上、且つ床面積が ７．৫平方メートル 以上である居室を少なくとも１室設けなければならない。</p>\n<p>２．吊り天井を有する居室の天井高さは、下面から ２．১০メートル 以上あれば足りる。</p>\n<p>３．住宅に設ける台所は、床面積が ４平方メートル 以上、幅員が １．৫メートル 以上であれば、壁によって区画されていない形態であっても認められる。</p>\n<p>４．浴室及び便所において、洗面台及び大便器のみを設置する場合、その最小床面積は ２．০平方メートル 以上としなければならない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第５７条第１号（১）により、基準は「幅 ２．৯メートル、面積 ９．৫平方メートル」以上である。</p>\n<p>2. 誤り。第１号（২）により、吊り天井下の高さは最小 「２．৪৪メートル」 以上必要である。</p>\n<p><strong>3. 正しい。</strong> 第２号（১）により、面積・幅員の基準を満たせば「壁によって囲まれる義務はない」とされている。</p>\n<p>3. 誤り。第３号（২）により、最小 「১．২平方メートル」 以上であればよい。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13481","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\">(৪) ওয়াটার ক্লোজেট এবং গোসলের স্থান সংবলিত টয়লেটের ক্ষেত্রে ন্যূনতম ফ্লোর এরিয়া ২.৮ বর্গমিটার এবং ন্যূনতম প্রস্থ ১ মিটার হইবে;</h5>\n<h5 class=\"h-lv5\">(৫) শুধু ওয়াটার ক্লোজেট সংস্থানের জন্য ন্যূনতম ফ্লোর এরিয়া ১.২ বর্গমিটার ও প্রস্থ ১ মিটার হইবে, অনুরূপ ক্ষেত্রে টয়লেট কিউবিকেল এর পাল্লা বাহিরের দিকে খুলিতে হইবে;</h5>\n<h5 class=\"h-lv5\">(৬) গোসলখানা ও টয়লেট এর উচ্চতা ২.১৫ মিটারের কম হইতে পারিবে না এবং অনুরূপ উচ্চতা ফিনিসড্ ফ্লোর হইতে ফিনিসড্ সিলিং বা ফলস্ সিলিং, উন্মুক্ত বিমের নিচ পর্যন্ত অথবা উপরের ফ্লোরের প্লাশ্বিং সিস্টেম এর ট্রাপ বা অন্যান্য পাইপ লাইনের নিচ পর্যন্ত পরিমাপকৃত হইবে;</h5>\n<h5 class=\"h-lv5\">(৭) গোসলখানা ও টয়লেটের জানালা ন্যূনতম ০.৩৭ বর্গমিটার ক্ষেত্রফলব্যাপী অভ্যন্তরীণ আঙিনা, বহিঃপরিসর বা যে-কোনো এয়ারওয়েল বা লাইটওয়েলের সহিত সরাসরি খোলা থাকিতে হইবে:</h5>\n<h6 class=\"h-lv6\"><strong>তবে শর্ত থাকে যে,</strong> শীতাতপ নিয়ন্ত্রিত বা যান্ত্রিক উপায়ে যথাযথভাবে নিয়ন্ত্রিত বায়ু প্রবাহের ব্যবস্থাপনা থাকিলে জানালা থাকা বাধ্যতামূলক হইবে না;</h6>\n<h4 class=\"h-lv4\"><strong>(ঘ) সিঁড়ি:</strong></h4>\n<h5 class=\"h-lv5\">(১) বিভিন্ন ধরনের সিঁড়ির প্রতিটি ফ্লাইটের বাঁধামুক্ত ন্যূনতম প্রশস্ততার পরিমাপ নিম্নবর্ণিত সারণি ১০ অনুযায়ী হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\"><strong>সারণি-১০</strong></h6>\n<h6 class=\"h-lv6\"><strong>সিঁড়ির ফ্লাইটের ন্যূনতম বাঁধামুক্ত প্রস্থ</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নম্বর</th><th>ভবনের শ্রেণি</th><th>সিঁড়ির ন্যূনতম প্রস্থ</th></tr></thead>\n<tbody>\n<tr><td>(১)</td><td>(২)</td><td>(৩)</td></tr>\n<tr><td>১।</td><td>A. আবাসিক:</td><td></td></tr>\n<tr><td></td><td>A1 একক পরিবার বাড়ি ও A6 (সাশ্রয়ী আবাসন)</td><td>১.০০</td></tr>\n<tr><td></td><td>A2 দুই পরিবারের বাড়ি</td><td>১.০০</td></tr>\n<tr><td></td><td>A3 ফ্ল্যাট ও এ্যাপার্টমেন্ট বাড়ি</td><td>১.১৫</td></tr>\n<tr><td></td><td>A4 মেস, ডরমিটরি ও হোস্টেল</td><td>১.২৫</td></tr>\n<tr><td></td><td>A5 হোটেল, মোটেল, গেস্টহাউজ, সার্ভিস এপার্টমেন্ট</td><td>১.২৫</td></tr>\n<tr><td>২।</td><td>B. শিক্ষা প্রতিষ্ঠান:</td><td></td></tr>\n<tr><td></td><td>(অকুপেন্ট লোড ১৩০ পর্যন্ত)</td><td>১.১৫</td></tr>\n<tr><td></td><td>(অকুপেন্ট লোড ১৩০-২৫০ পর্যন্ত)</td><td>২.২৫</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第５７条（建築物の各室の最小基準）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>四</strong>　大便器（WC）及びシャワー室を備えた便所にあっては、床面積を最小２.８平方メートル以上、幅員を最小１メートル以上としなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>五</strong>　大便器のみを設置する便所にあっては、床面積を最小１.２平方メートル以上、幅員を最小１メートル以上としなければならない。この場合において、当該便所の扉は外開き（ বাহিরের দিকে খুলিতে হইবে ）としなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>六</strong>　浴室及び便所の天井高さは、２.１５メートルを下回ってはならない。当該高さは、仕上げられた床面から、仕上げられた天井若しくは吊り天井、露出した梁の下面、又は上階の配管設備のトラップ若しくはその他の配管の下面までの垂直距離を算定するものとする。</h5>\n<h5 class=\"h-lv5\"><strong>七</strong>　浴室及び便所の窓は、最小面積０.３７平方メートル以上とし、中庭（内庭）、外部空間又は光庭（内庭）に直接面して開放できるものでなければならない。</h5>\n<h6 class=\"h-lv6\"><strong>ただし、</strong> 空気調和設備又は機械換気設備により適切に管理された換気体制が確保されている場合にあっては、窓の設置は義務付けないものとする。</h6>\n<h4 class=\"h-lv4\"><strong>(ঘ) 階段（Stairs）</strong></h4>\n<h5 class=\"h-lv5\">１　各種建築物の階段の各段（フライト）の有効幅員の最小寸法は、次の表１０の規定に従わなければならない。</h5>\n<h6 class=\"h-lv6\"><strong>表１０：階段の段（フライト）の最小有効幅員</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>建築物の用途分類</th><th>階段の最小幅員（ｍ）</th></tr></thead>\n<tbody>\n<tr><td>(1)</td><td>(2)</td><td>(3)</td></tr>\n<tr><td><strong>1</strong></td><td><strong>用途 A：住宅</strong></td><td></td></tr>\n<tr><td></td><td>A1（一戸建）及び A6（手頃な価格の住宅）</td><td>１.００</td></tr>\n<tr><td></td><td>A2（二世帯住宅）</td><td>１.００</td></tr>\n<tr><td></td><td>A3（共同住宅：アパートメント等）</td><td>１.１５</td></tr>\n<tr><td></td><td>A4（寄宿舎、ドミトリー、ホステル）</td><td>１.２５</td></tr>\n<tr><td></td><td>A5（ホテル、モーテル、ゲストハウス等）</td><td>１.２５</td></tr>\n<tr><td><strong>2</strong></td><td><strong>用途 B：教育施設</strong></td><td></td></tr>\n<tr><td></td><td>（収容人員 １３０人まで）</td><td>１.１５</td></tr>\n<tr><td></td><td>（収容人員 １３０人超 ２５０人まで）</td><td>２.２５</td></tr>\n</tbody>\n</table></div>\n<hr class=\"sep\">\n<p>1. <strong>階段幅の細分化された基準（表１０）</strong>:</p>\n<p>ダッカ規則では、住宅用途を A1〜A5 まで細分化し、それぞれに異なる階段幅（1.00m, 1.15m, 1.25m）を規定している。日本の建築基準法施行令第２３条では、住宅の階段幅は原則 ７５ｃｍ以上、直通階段などは ９０ｃｍ以上とされるが、ダッカの基準は最小でも １.００ｍ を求めており、設計にゆとりを持たせている。</p>\n<p>2. <strong>便所の扉の開き方向の指定（第５号）</strong>:</p>\n<p>小規模な便所において「外開き扉」を法的に義務付けている。日本の建築基準法には扉の開き方向に関する直接的な単体規定は少ないが、ダッカ規則では室内で倒れた際の救助の容易性等を考慮して明文化している。</p>\n<p>3. <strong>教育施設における収容人員による階段幅の変動（第２号）</strong>:</p>\n<p>収容人員が １３０人 を超えると階段幅を １.１５ｍ から ２.２５ｍ へと倍増させる規制を敷いている。人員負荷に直接リンクさせて階段幅を決定する方式は、避難工学的な視点が法典に強く組み込まれていることを示している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、建築物の各室の基準及び階段に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．大便器のみを設置する便所を設ける場合、その最小床面積は １.০平方メートル 以上あれば足りる。</p>\n<p>２．浴室及び便所の天井高さは、仕上げられた床面から ２.১০メートル 以上を確保しなければならない。</p>\n<p>３．共同住宅（用途 A3）に設ける階段の各段（フライト）の最小有効幅員は、１.১৫メートル 以上としなければならない。</p>\n<p>４．収容人員が ２００人 である教育施設に設ける階段の最小有効幅員は、１.৫০メートル 以上あれば、本規則の基準に適合する。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第５７条第５号により、最小床面積は 「১.২平方メートル」 必要である。</p>\n<p>2. 誤り。第６号により、高さは ２.１５メートル 以上必要である。</p>\n<p><strong>3. 正しい。</strong> 表１０の A3（共同住宅）の規定通りである。</p>\n<p>3. 誤り。表１０により、収容人員が １３０人〜２５０人 の教育施設では、最小幅員は ２.２５メートル 必要である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13482","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>(ঘ) সিঁড়ি (চলমান)</strong></h4>\n<h6 class=\"h-lv6\"><strong>সারণি-১০ (চলমান)</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নম্বর</th><th>ভবনের শ্রেণি</th><th>সিঁড়ির ন্যূনতম প্রস্থ</th></tr></thead>\n<tbody>\n<tr><td>(১)</td><td>(২)</td><td>(৩)</td></tr>\n<tr><td>৩।</td><td>C. প্রাতিষ্ঠানিক</td><td>১.৫০</td></tr>\n<tr><td>৪।</td><td>D. স্বাস্থ্যসেবা</td><td>২.২৫</td></tr>\n<tr><td>৫।</td><td>E. ব্যবসা</td><td>১.৫০</td></tr>\n<tr><td>৬।</td><td>F. বাণিজ্যিক</td><td></td></tr>\n<tr><td></td><td>F1. ছোট দোকান ও বাজার (অনধিক ৩০০ বর্গমিটার Construction Floor Area)</td><td>১.৫০</td></tr>\n<tr><td></td><td>F2. Large shops and market (over 300 sqm Construction Floor Area)</td><td>২.০০</td></tr>\n<tr><td>৭।</td><td>G. শিল্প কারখানা</td><td>১.৫০</td></tr>\n<tr><td>৮।</td><td>H. গুদাম</td><td>১.৫০</td></tr>\n<tr><td>৯।</td><td>I. সমাবেশ</td><td>২.০০</td></tr>\n<tr><td>১০।</td><td>অন্যান্য</td><td>১.২৫</td></tr>\n</tbody>\n</table></div>\n<h6 class=\"h-lv6\"><strong>নোট:</strong></h6>\n<h6 class=\"h-lv6\">(১) একাধিক ফ্লোর বিশিষ্ট পার্কিং এর ক্ষেত্রে বিভিন্ন ফ্লোরের সহিত সংযোগকারী সিঁড়ির (সাধারণ বা অগ্নি নিরাপদ উভয়ের ক্ষেত্রে) ন্যূনতম বাঁধামুক্ত প্রশস্ত হ্যান্ড রেইল ব্যতীত ১.১৫ মিটার হইবে।</h6>\n<h6 class=\"h-lv6\">(২) রেস্টুরেন্ট এর জন্য ন্যূনতম সিঁড়ির প্রস্থ ১.৫ মিটার হইবে।</h6>\n<h5 class=\"h-lv5\">(২) সিঁড়ির রাইজার ও ট্রেডের পরিমাপ এমন হইবে যেন একটি রাইজার ও একটি ট্রেডের যোগফল কমপক্ষে ৪০০ মিলিমিটার হয় এবং রাইজারের সর্বোচ্চ মাপ ১৭৫ মিলিমিটার এবং ট্রেডের সর্বনিম্ন মাপ ২২৫ মিলিমিটার হয়।</h5>\n<h5 class=\"h-lv5\">(৩) নোজিং এবং হেলানো রাইজারের কারণে বৃদ্ধিপ্রাপ্ত মাপ ট্রেডের মাপের মধ্যে গণ্য করা যাইবে এবং সিঁড়ির একটি ফ্লাইটের মধ্যে সর্বোচ্চ ও সর্বনিম্ন মাপের রাইজার এবং সর্বোচ্চ ও সর্বনিম্ন মাপের ট্রেডের পার্থক্য উভয় ক্ষেত্রে গড় মাপের ২ শতাংশের বেশি হইবে না এবং পাশাপাশি অবস্থিত রাইজার ও ট্রেডের মাপের পার্থক্য ৫ মিলিমিটার এর বেশি হইতে পারিবে না;</h5>\n<h5 class=\"h-lv5\">(৪) সিঁড়ির যে কোনো একটি ফ্লাইটে মোট ধাপের সংখ্যা সর্বোচ্চ ২০ এর মধ্যে সীমাবদ্ধ থাকিতে হইবে;</h5>\n<h5 class=\"h-lv5\">(৫) সিঁড়ির ফ্লাইটসমূহের অন্তবর্তী সর্বনিম্ন উচ্চতা (Head Room) ২.১৫ মিটার হইতে হইবে;</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第５７条（階段）（承前）</strong></h4>\n<h6 class=\"h-lv6\"><strong>表１０（続き）</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>建築物の用途分類</th><th>階段の最小幅員（ｍ）</th></tr></thead>\n<tbody>\n<tr><td>(1)</td><td>(2)</td><td>(3)</td></tr>\n<tr><td><strong>3</strong></td><td><strong>用途 C：公衆福祉施設</strong></td><td>１.５０</td></tr>\n<tr><td><strong>4</strong></td><td><strong>用途 D：医療施設</strong></td><td>２.２５</td></tr>\n<tr><td><strong>5</strong></td><td><strong>用途 E：事務所等</strong></td><td>１.５０</td></tr>\n<tr><td><strong>6</strong></td><td><strong>用途 F：商業施設</strong></td><td></td></tr>\n<tr><td></td><td>F1. 小規模店舗及び市場（建築床面積 300㎡以下）</td><td>１.５０</td></tr>\n<tr><td></td><td>F2. 大規模店舗及び市場（建築床面積 300㎡超）</td><td>２.００</td></tr>\n<tr><td><strong>7</strong></td><td><strong>用途 G：工場</strong></td><td>１.５０</td></tr>\n<tr><td><strong>8</strong></td><td><strong>用途 H：倉庫</strong></td><td>１.５０</td></tr>\n<tr><td><strong>9</strong></td><td><strong>用途 I：集会施設</strong></td><td>２.００</td></tr>\n<tr><td><strong>10</strong></td><td><strong>その他</strong></td><td>１.２５</td></tr>\n</tbody>\n</table></div>\n<h6 class=\"h-lv6\"><strong>備考：</strong></h6>\n<h6 class=\"h-lv6\">(1) 複数階にわたる駐車場において、各階を連絡する階段の有効幅員は、手摺を除き、最小１.１５メートル以上としなければならない。</h6>\n<h6 class=\"h-lv6\">(2) 飲食店（レストラン）に設ける階段の最小幅員は、１.５メートル以上としなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>２</strong>　階段の蹴上げ（Riser）及び踏面（Tread）の寸法は、一の蹴上げ及び一の踏面の寸法の和が４００ミリメートル以上でなければならない。また、蹴上げの寸法は１７５ミリメートル以下、踏面の寸法は２２５ミリメートル以上としなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>３</strong>　段鼻（Nosing）及び傾斜した蹴上げによって増加する踏面の寸法は、踏面寸法に算入することができる。また、階段の一つの段（フライト）内において、最大及び最小の蹴上げ寸法並びに最大及び最小の踏面寸法の差は、いずれの場合も平均寸法の２パーセントを超えてはならない。なお、隣接する蹴上げ及び踏面の寸法の差は、５ミリメートルを超えてはならない。</h5>\n<h5 class=\"h-lv5\"><strong>４</strong>　階段の一つの段（フライト）における蹴込み数は、最大２０段までとしなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>５</strong>　階段の段（フライト）における最小の有効高さ（Head Room）は、２.１５メートル以上としなければならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>階段の蹴上げ・踏面基準の厳格性（第２項）</strong>:</p>\n<p>ダッカ規則では蹴上げ <strong>１７.５ｃｍ以下</strong>、踏面 <strong>２２.５ｃｍ以上</strong> と規定されている。日本の建築基準法施行令第２３条では一般の階段で蹴上げ ２０ｃｍ以下、踏面 ２４ｃｍ以上とされるが、ダッカ規則は日本の「劇場・集会場」に近い、より緩やかな勾配を全般に求めている。さらに「蹴上げ＋踏面 ＝ ４０ｃｍ以上」という、安全性を確保するための数式基準がある。</p>\n<p>2. <strong>階段の連続踏面の均一性（第３項）</strong>:</p>\n<p>一つの段（フライト）内での寸法のばらつきを「平均の２％以内」かつ隣接段で「５ｍｍ以内」とする極めて精密な基準を課している。ダッカ規則は定量的数値により、階段の「リズム」を法的に保証している。</p>\n<p>3. <strong>連続段数の制限（第４項）</strong>:</p>\n<p>踊場を設けない連続段数を「最大２０段」としている。日本の建築基準法施行令第２３条では高さ４ｍごとに踊場を設ける必要があるが、段数による直接制限はない。ダッカ規則は、利用者の疲労や転倒リスク軽減をより直接的に制御している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、建築物の階段に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．医療施設（用途 D）に設ける階段の最小有効幅員は、２.০০メートル 以上を確保しなければならない。</p>\n<p>２．階段の蹴上げの寸法を １৮০ミリメートル、踏面の寸法を ２৪০ミリメートル とした場合、本規則の基準に適合する。</p>\n<p>３．飲食店（レストラン）に使用する階段の有効幅員は、最小 １.৫メートル 以上としなければならない。</p>\n<p>４．階段の段（フライト）における有効高さ（Head Room）は、階段の利用者の安全を考慮し、少なくとも ２.৪০メートル を確保しなければならない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。表１０により、医療施設の階段最小幅員は <strong>２.২৫メートル</strong> である。</p>\n<p>2. 誤り。第２項により、蹴上げの最大寸法は <strong>১৭৫ミリメートル</strong> 以下でなければならない。</p>\n<p><strong>3. 正しい。</strong> 備考(2)の規定通りである。</p>\n<p>3. 誤り。第５項により、有効高さ（Head Room）の最小基準は <strong>২.১৫メートル</strong> である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13483","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>(ঘ) সিঁড়ি (চলমান)</strong></h4>\n<h5 class=\"h-lv5\">(৬) সিঁড়ি ঘরের যে কোনো ল্যান্ডিং এর তলার প্যাসেজ, যাহা আবাসযোগ্য নহে এইরূপ সার্ভিস স্পেসকে যুক্ত করিয়া তাহার সর্বনিম্ন উচ্চতা ২.০৩ মিটার হইবে এবং ল্যান্ডিং এর তলার অন্য সকল প্যাসেজ ও স্পেস এর ন্যূনতম উচ্চতা ২.১৫ মিটার হইতে হইবে;</h5>\n<h5 class=\"h-lv5\">(৭) সিঁড়ির রেলিং এর ন্যূনতম উচ্চতা ০.৯০ মিটার হইবে এবং অনুরূপ মাপ সিঁড়ির ধাপের নোজ হইতে রেলিং এর উপরিতল পর্যন্ত উলম্ব দৈর্ঘ্য বুঝাইবে এবং শিশুরা এইরূপ ক্ষেত্রে সিঁড়ি ব্যবহার করিবে তবে বালাস্ট্রেড ডিজাইন শিশুদের জন্য যথেষ্ট নিরাপদ হইতে হইবে;</h5>\n<h5 class=\"h-lv5\">(৮) ল্যান্ডিং এর গভীরতা (depth) যে কোনো লেভেলে ন্যূনতম সিঁড়ির প্রস্থের সমান হইতে হইবে;</h5>\n<h5 class=\"h-lv5\">(৯) ছাদের সিঁড়িঘরের ন্যূনতম উচ্চতা ২.১০ মিটার হইতে হইবে;</h5>\n<h5 class=\"h-lv5\">(১০) পাশাপাশি দুইটি ফ্লাইটের মধ্যবর্তী দূরত্ব ন্যূনতম ১৫০ মি:মি: হইতে হইবে;</h5>\n<h4 class=\"h-lv4\"><strong>(ঙ) আবাসিক ভবনে কক্ষের উচ্চতার হিসাব ও অন্যান্য মাপসমূহ:</strong></h4>\n<h5 class=\"h-lv5\">(১) মেঝের উপরের ফিনিসড তল হইতে ছাদের নিচের ফিনিসড তল পর্যন্ত কক্ষের উচ্চতা হিসাব করিতে হইবে;</h5>\n<h5 class=\"h-lv5\">(২) কক্ষ বা স্পেসের বাঁধামুক্ত উচ্চতা হইবে নিম্নরূপ, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) স্টোর রুম, ইউটিলিটি রুম ও বক্স রুম ন্যূনতম ২.১০ মিটার;</h6>\n<h6 class=\"h-lv6\">(খ) বাথরুম, ল্যাভেটরি, টয়লেট, ব্যালকনি, পোর্চ, ইত্যাদি ন্যূনতম ২.১০ মিটার;</h6>\n<h6 class=\"h-lv6\">(গ) ঢালু ছাদের ক্ষেত্রে ছাদের গড় উচ্চতা ন্যূনতম ২.৪৪ মিটার হইতে হইবে এবং, মেঝে হইতে ছাদের সর্বনিম্ন তলার ন্যূনতম উচ্চতা ২.০০ মিটার হইতে পারিবে;</h6>\n<h6 class=\"h-lv6\">(ঘ) ছাদ, ফোল্ডেড প্লেট, শেল, ইত্যাদি এবং শীতাতপ নিয়ন্ত্রিত কক্ষে ফলস্ সিলিং এর নিচে অথবা ফলস সিলিং না থাকিলে ডাক্ট এর নিচে মেঝে হইতে ন্যূনতম উচ্চতা ২.৪৪ মিটার হইতে হইবে;</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第５７条（階段）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>６</strong>　階段室の踊場の下面を通る通路であって、居室（Habitable room）以外のサービススペースに接続するものの有効高さは最小２．０３メートル以上とし、踊場の下面を通るその他の全ての通路及び空間の高さは、最小２．１５メートル以上としなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>７</strong>　階段の手摺の高さは、段鼻（Nosing）から手摺の上端までの垂直距離において最小０．９０メートル以上としなければならない。この場合において、子供による階段の利用を考慮し、バラスター（手摺子）の意匠は十分な安全性を有するものでなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>８</strong>　階段の踊場の奥行（Depth）は、いかなる階層においても、当該階段の幅員以上を確保しなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>９</strong>　屋上に突出する階段室の有効高さは、最小２．１０メートル以上としなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>１０</strong>　隣接する二つの階段段（フライト）相互の離隔距離は、最小１５０ミリメートル以上としなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>(ঙ) 住宅建築物における室の高さの算定及びその他の寸法</strong></h4>\n<h5 class=\"h-lv5\">１　室の高さ（Height of room）は、仕上げられた床面から、仕上げられた天井の下面までの垂直距離により算定するものとする。</h5>\n<h5 class=\"h-lv5\">２　各室又は各空間の有効高さは、次に掲げる基準に従わなければならない。</h5>\n<h6 class=\"h-lv6\">ａ　貯蔵室、ユーティリティルーム及び物置：最小２．１０メートル以上</h6>\n<h6 class=\"h-lv6\">ｂ　浴室、洗面所、便所、ベランダ（Balcony）、ポーチ等：最小２．１０メートル以上</h6>\n<h6 class=\"h-lv6\">ｃ　傾斜屋根を有する場合の当該屋根の平均高さ：最小２．４４メートル以上。ただし、床面から当該屋根の最下部までの高さは、最小２．００メートル以上とすることができる。</h6>\n<h6 class=\"h-lv6\">ｄ　折版屋根、シェル構造等、又は空気調和設備を備える室であって吊り天井（False ceiling）若しくはダクトを有する場合の当該吊り天井若しくはダクトの下面までの高さ：最小２．４４メートル以上</h6>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p>1. <strong>踊場下の有効高さの基準（第６項）</strong>:</p>\n<p>ダッカ規則では、踊場下の通路の有効高さを、接続先の用途が「居室以外」か「その他」かで「２．０３ｍ」と「２．１５ｍ」に使い分けている。日本の建築基準法では、階段自体の有効高さは ２ｍ以上 とされるが、ダッカ規則は通路としての機能を重視し、より高い数値を標準としている。</p>\n<p>2. <strong>階段段（フライト）間の離隔距離（第１０項）</strong>:</p>\n<p>隣接する階段の段（フライト）の間に「最小１５０ミリメートル」の隙間を求めている。日本の建築基準法では、フライト間の水平離隔をミリメートル単位で一律に規定する例は少なく、これは主に「回り階段」の中央部における安全性や施工精度を担保する意図がある。</p>\n<p>3. <strong>用途別の有効高さの細分化（第２号）</strong>:</p>\n<p>日本では居室の天井高さは ２．１ｍ以上 と一括されるが、ダッカ規則では貯蔵室等を個別に「２．１０ｍ」、傾斜屋根等を「２．４４ｍ」と細かく分類している。特に空気調和設備のある室に対し高い ２．４４ｍ を要求している点は、設備スペースを含めた居住環境の質を保証する姿勢である。</p>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、建築物の室の高さ及び階段の基準に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．階段の踊場の下面を通る通路であって、居室以外のサービススペースに接続するものの有効高さは、１．৯০メートル 以上あれば足りる。</p>\n<p>２．住宅に設ける貯蔵室（Store room）の有効高さは、少なくとも ２．১০メートル を確保しなければならない。</p>\n<p>３．階段の手摺の高さは、段鼻から手摺の上端までの垂直距離において ０．৮০メートル 以上としなければならない。</p>\n<p>４．住宅の居室に空気調和設備を設置し吊り天井（False ceiling）を設ける場合、当該吊り天井の下端から床面までの有効高さは、２．১০メートル 以上あれば本規則の基準に適合する。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。第５７条第６項により、居室以外に接続する場合でも最小 「২.০৩メートル」 以上必要である。</p>\n<p><strong>2. 正しい。</strong> 第５７条（ঙ）第２号（ক）の規定通りである。</p>\n<p>2. 誤り。第７項により、手摺の高さは最小 「০.৯০メートル」 以上必要である。</p>\n<p>3. 誤り。第２号（ঘ）により、吊り天井下の高さは最小 「২.৪৪メートル」 以上必要である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13484","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>(ঙ) আবাসিক নহে এইরূপ ইমারতের ক্ষেত্রে ছাদের নিম্ন তলের উচ্চতা নির্ধারণের প্রয়োজনীয় শর্তসমূহ (চলমান)</strong></h4>\n<h6 class=\"h-lv6\"><strong>সারণি-১১</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নম্বর</th><th>ভবনের শ্রেণি</th><th>ন্যূনতম ছাদের উচ্চতা</th></tr></thead>\n<tbody>\n<tr><td>(১)</td><td>(২)</td><td>(৩)</td></tr>\n<tr><td>(১)</td><td>B. শিক্ষা প্রতিষ্ঠান</td><td>(ক) শীতাতপ নিয়ন্ত্রিত নহে এমন ভবনের ক্ষেত্রে ৩ মিটার;</td></tr>\n<tr><td>(২)</td><td>C. প্রাতিষ্ঠানিক</td><td>(খ) শীতাতপ নিয়ন্ত্রিত ভবনের ক্ষেত্রে ফলস সিলিং ব্যবহার করা হইলে মেঝে হইতে ফলস সিলিং পর্যন্ত উচ্চতা ২.৬ মিটার;</td></tr>\n<tr><td>(৩)</td><td>D. স্বাস্থ্য সেবা</td><td>(গ) শীতাতপ নিয়ন্ত্রিতকরণের জন্য উন্মুক্ত ডাক্ট ব্যবহারের ক্ষেত্রে ভবনের মেঝে হইতে ডাক্ট এর নিচ পর্যন্ত উচ্চতা ২.৬ মিটার।</td></tr>\n<tr><td>(৪)</td><td>I. সমাবেশ</td><td></td></tr>\n<tr><td>(৫)</td><td>E. ব্যবসা</td><td></td></tr>\n<tr><td>(৬)</td><td>F. বাণিজ্যিক</td><td></td></tr>\n<tr><td>(৭)</td><td>M. বিবিধ</td><td></td></tr>\n<tr><td>(৮)</td><td>L. ইউটিলিটি</td><td></td></tr>\n<tr><td>(৯)</td><td>G. শিল্প কারখানা</td><td>(ক) শীতাতপ নিয়ন্ত্রিত নহে এমন ভবনের ক্ষেত্রে ৩.৫ মিটার;</td></tr>\n<tr><td>(১০)</td><td>H. গুদাম ঘর</td><td>(খ) শীতাতপ নিয়ন্ত্রিত ভবনের ক্ষেত্রে ফলস সিলিং ব্যবহার করা হইলে মেঝে হইতে ফলস সিলিং পর্যন্ত উচ্চতা ৩ মিটার;</td></tr>\n<tr><td>(১১)</td><td>J. বিপজ্জনক ব্যবহারের ভবন</td><td>(গ) শীতাতপ নিয়ন্ত্রিতকরণের জন্য উন্মুক্ত ডাক্ট ব্যবহারের ক্ষেত্রে ভবনের মেঝে হইতে ডাক্ট এর নিচ পর্যন্ত উচ্চতা ৩ মিটার।</td></tr>\n<tr><td>(১২)</td><td>K3. Repair Garage</td><td></td></tr>\n<tr><td>(১৩)</td><td>L. ইউটিলিটি</td><td></td></tr>\n<tr><td>(১৪)</td><td>K1, K2</td><td>২.২৫ মিটার (প্রযোজ্য ক্ষেত্রে বিমের নিচে)</td></tr>\n</tbody>\n</table></div>\n<h4 class=\"h-lv4\"><strong>(চ) কমিউনিটি স্পেস:</strong></h4>\n<h5 class=\"h-lv5\">(১) FAR এর আওতাভুক্ত সর্বমোট ৩০০০ (তিন হাজার) বর্গমিটারের অধিক ক্ষেত্রফলবিশিষ্ট আবাসিক ভবনে বসবাসকারীদের ব্যবহারের জন্য FAR-ভুক্ত মেঝের আয়তনের ন্যূনতম ৫% স্থান বিভিন্ন সামাজিক সম্মেলন অনুষ্ঠানের জন্য নির্দিষ্ট করিয়া কমিউনিটি স্পেস হিসাবে রাখিতে হইবে:</h5>\n<h6 class=\"h-lv6\"><strong>তবে শর্ত থাকে যে,</strong> উক্ত কমিউনিটি স্পেস এ সামাজিক সম্মেলনের স্থানের সহিত পাঠাগার ও জিমনেসিয়াম, অনূর্ধ্ব ১০০ বর্গমিটারের ক্লাব, ধর্মীয় উপাসনার স্থান সংস্থান করা যাইবে:</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第５７条（室の高さ）（承前）</strong></h4>\n<h6 class=\"h-lv6\"><strong>表１１：非住宅建築物の最小天井高さ</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>建築物の用途分類</th><th>最小天井高さ</th></tr></thead>\n<tbody>\n<tr><td>(1)</td><td>(2)</td><td>(3)</td></tr>\n<tr><td>(1)</td><td>用途 B：教育施設</td><td>ａ　空気調和設備（AC）を備えない建築物にあっては、３メートル。</td></tr>\n<tr><td>(2)</td><td>用途 C：公衆福祉施設</td><td>ｂ　空気調和設備を備え吊り天井を設置する場合、床面から吊り天井下端までは ２．６メートル。</td></tr>\n<tr><td>(3)</td><td>用途 D：医療施設</td><td>ｃ　空気調和設備のために露出ダクトを設置する場合、床面からダクト下端までは ２．６メートル。</td></tr>\n<tr><td>(4)</td><td>用途 I：集会施設</td><td></td></tr>\n<tr><td>(5)</td><td>用途 E：事務所等</td><td></td></tr>\n<tr><td>(6)</td><td>用途 F：商業施設</td><td></td></tr>\n<tr><td>(7)</td><td>用途 M：その他</td><td></td></tr>\n<tr><td>(8)</td><td>用途 L：インフラ施設</td><td></td></tr>\n<tr><td>(9)</td><td>用途 G：工場</td><td>ａ　空気調和設備を備えない建築物にあっては、３．５メートル。</td></tr>\n<tr><td>(10)</td><td>用途 H：倉庫</td><td>ｂ　空気調和設備を備え吊り天井を設置する場合、床面から吊り天井下端までは ３メートル。</td></tr>\n<tr><td>(11)</td><td>用途 J：危険物施設</td><td>ｃ　空気調和設備のために露出ダクトを設置する場合、床面からダクト下端までは ３メートル。</td></tr>\n<tr><td>(12)</td><td>用途 K3：修理工場</td><td></td></tr>\n<tr><td>(13)</td><td>用途 L：インフラ施設</td><td></td></tr>\n<tr><td>(14)</td><td>用途 K1、K2：駐車場等</td><td>２．２５メートル（適用がある場合、梁の下面とする。）</td></tr>\n</tbody>\n</table></div>\n<h4 class=\"h-lv4\"><strong>(চ) コミュニティスペース（Community Space）</strong></h4>\n<h5 class=\"h-lv5\">１　延べ面積が合計３,０００平方メートルを超える住宅建築物にあっては、その ５パーセント以上の面積を、社会的集会のためのコミュニティスペースとして確保しなければならない。</h5>\n<h6 class=\"h-lv6\"><strong>ただし、</strong> 当該コミュニティスペースには、社会的集会のための場所のほか、図書室、体育館（ジム）、床面積１００平方メートル以下のクラブ、又は宗教的礼拝所を設けることができる。</h6>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p>1. <strong>非住宅建築物における天井高さの階層化（表１１）</strong>:</p>\n<p>日本の建築基準法では、居室の天井高さは一律 ２．１ｍ以上とされるが、ダッカ規則は用途により <strong>３ｍ（一般）</strong>、<strong>３．５ｍ（工場等）</strong> と高い基準を設けている。特筆すべきは、AC設備の有無や「吊り天井か露出ダクトか」によって、法的な数値を細かく変動させている点である。これは熱帯地域の建築における居住環境の維持を法的に直結させている。</p>\n<p>2. <strong>大規模住宅へのコミュニティスペース附置義務（第６号）</strong>:</p>\n<p>延べ面積 ３,０００㎡超の住宅に対し、床面積の <strong>５％</strong> という高水準なコミュニティスペースの確保を義務付けている。日本の建築基準法にはこれに相当する一律の附置義務はなく、ダッカ規則は過密化する共同住宅における社会的交流の場を「建築基準の一部」として数値化している。</p>\n<p>3. <strong>駐車場等の有効高さ（項番１４）</strong>:</p>\n<p>駐車場（K1, K2）等の最小高さを <strong>２．２５ｍ</strong> としている。日本の駐車場法施行令では、高さ ２．３ｍ以上 とされており、この点に関しては日本の方がわずかに厳しい。</p>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、建築物の天井高さ及びコミュニティスペースに関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．空気調和設備を備えない事務所（用途 E）において、室の天井高さは ２．১০メートル 以上あれば、本規則の基準に適合する。</p>\n<p>２．空気調和設備を備える工場（用途 G）において、吊り天井を設置する場合、床面から吊り天井下端までの高さは ２．৬メートル 以上としなければならない。</p>\n<p>３．延べ面積の合計が ৪,০০০平方メートル である住宅建築物において、コミュニティスペースとして確保すべき最小面積は ２০০平方メートル である。</p>\n<p>４．コミュニティスペース内に図書室や宗教的礼拝所を設けることは認められているが、体育館（ジム）を設置することは禁止されている。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。表１１により、AC設備のない事務所の最小天井高さは <strong>৩メートル</strong> である。</p>\n<p>2. 誤り。用途 G においては <strong>৩メートル</strong> である（２．６ｍは教育施設等の基準）。</p>\n<p><strong>3. 正しい。</strong> ３,０００㎡超の住宅は延べ面積の <strong>５％</strong> がコミュニティスペースとして必要である。</p>\n<p>3. 誤り。第６号但書きにより、体育館等の設置が可能である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13485","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>(চ) কমিউনিটি স্পেস (চলমান)</strong></h4>\n<h6 class=\"h-lv6\">আরও শর্ত থাকে যে, সামাজিক সম্মেলন ব্যবহারের স্থানের সহিত উপরে কোনো একক ব্যবহার প্রযোজ্য সর্বমোট ক্ষেত্রফলের ২৫% এর অধিক হইতে পারিবেনা;</h6>\n<h5 class=\"h-lv5\">(২) ব্লক ভিত্তিক উন্নয়ন ব্যতীত ১৩০০ (এক হাজার তিনশত) বর্গমিটার বা তদূর্ধ্ব পরিমাণের আবাসিক জমিতে এ্যাপার্টমেন্ট নির্মাণ করিতে চাহিলে সম্পূর্ণ জমির অন্তত ১০% উক্ত এ্যাপার্টমেন্টের বসবাসকারীগণের খেলার জায়গা হিসাবে একটি নির্দিষ্ট স্থানে রাখিতে হইবে, যাহার অর্ধেক আচ্ছাদিত এলাকায় হইতে পারিবে কিন্তু কোনো দেওয়াল দ্বারা আবদ্ধ করা যাইবে না এবং এই আচ্ছাদিত এলাকা FAR এর হিসাবে অন্তর্ভুক্ত হইবে না এবং সেটব্যাক এর জন্য সংরক্ষিত জায়গা সংক্রান্ত খেলার জায়গার অন্তর্ভুক্ত হইতে পারিবে।</h5>\n<h4 class=\"h-lv4\"><strong>৫৮। বিদ্যমান ইমারত নির্মাণ সংক্রান্ত বিধান।</strong></h4>\n<h5 class=\"h-lv5\">(১) ইমারত নির্মাণের ক্ষেত্রে মহাপরিকল্পনা, বিএনবিসি কোড ও এই বিধিমালা অনুসরণ করিতে হইবে:</h5>\n<h6 class=\"h-lv6\"><strong>তবে শর্ত থাকে যে,</strong> এই বিধিমালা জারির পূর্বে অনুমোদিত ইমারতসমূহের ক্ষেত্রে জমির পরিমান, সেটব্যাক, ইত্যাদি সঙ্গতিপূর্ণ হইলে বা করা হইলে এই বিধিমালা অনুযায়ী নির্ধারিত ফি প্রদান সাপেক্ষে নকশা সংশোধন ও অনুমোদনের জন্য আবেদন করা যাইবে, তবে ফাউন্ডেশন ও কাঠামো ডিজাইনের পর্যাপ্ততার বিষয়টি বিশেষজ্ঞ প্রকৌশলী কর্তৃক প্রত্যয়নকৃত হইতে হইবে।</h6>\n<h5 class=\"h-lv5\">(২) কর্তৃপক্ষের অনুমোদন গ্রহণ ব্যতীত কোনো ইমারত নির্মিত হইলে এবং অনুরূপ ইমারত এই বিধিমালার আলোকে অনুমোদনযোগ্য বলিয়া বিবেচিত হইলে, Building Construction Act, 1952 অনুযায়ী প্রযোজ্য জরিমানা ও ফি গ্রহণপূর্বক অনুমোদন প্রদান করা যাইবে।</h5>\n<h4 class=\"h-lv4\"><strong>৫৯। নির্মাণ ও নির্মাণ অনুমোদন সংশ্লিষ্ট সাধারণ জ্ঞাতব্য বিষয়সমূহ।</strong></h4>\n<h5 class=\"h-lv5\">(১) ১৮ (আঠারো) মিটারের অতিরিক্ত উচ্চতায় এক বা একাধিক তলা বিশিষ্ট ইমারতে লিফট স্থাপন করিতে হইবে এবং এইরূপ উচ্চতা নির্ধারণের জন্য ইমারতের বসবাসযোগ্য সর্বোচ্চ তলার ছাদের উপরিভাগের উচ্চতা গণ্য করা হইবে।</h5>\n<h5 class=\"h-lv5\">(২) ৩৩ (তেত্রিশ) মিটার বা ১০ (দশ) তলার অধিক উচ্চতা বিশিষ্ট ইমারতের জন্য কমপক্ষে ২ টি লিফটের সংস্থান রাখিতে হইবে এবং কমপক্ষে ১টি লিফট স্ট্রেচার লিফট হইতে হইবে:</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第５７条（コミュニティスペース）（承前）</strong></h4>\n<h6 class=\"h-lv6\">さらに、個別の用途（図書室等）に供する面積は、当該コミュニティスペース総面積の ２５パーセント を超えてはならない。</h6>\n<h5 class=\"h-lv5\"><strong>２</strong>　敷地面積１,３００平方メートル以上の住宅敷地においてアパートメントを建築する場合、面積の少なくとも １０パーセント 以上を居住者のための遊び場（ খেলার জায়গা ）として確保しなければならない。当該遊び場は半分までを屋根のある区域とすることができるが、壁で区画してはならず、且つ当該区域は容積率に算入しない。また、セットバック部分と兼ねることができる。</h5>\n<h4 class=\"h-lv4\"><strong>第正式５８条（既存建築物に関する規定）</strong></h4>\n<h5 class=\"h-lv5\"><strong>１</strong>　建築にあたっては、都市計画、BNBC、及び本規則を遵守しなければならない。</h5>\n<h6 class=\"h-lv6\"><strong>ただし、</strong> 本規則の施行前に承認された建築物について、本規則に適合し、又は適合させる場合にあっては、所定の手数料を納付した上で本規則に基づく容積率の適用を受け、設計修正の申請を行うことができる。この場合、構造設計等の妥当性について専門技術者の証明を要する。</h6>\n<h5 class=\"h-lv5\"><strong>２</strong>　無許可で建築された建築物が本規則に照らして承認可能なものである場合、１９５２年建築工事法に基づく過料（ জরিমানা ）等を納付した上で承認を受けることが可能である。</h5>\n<h4 class=\"h-lv4\"><strong>第５９条（建築確認に関する一般的事項）</strong></h4>\n<h5 class=\"h-lv5\"><strong>１</strong>　高さが １８メートル を超える建築物には昇降機（リフト）を設置しなければならない。高さの判定は「居住に供する最上階の屋根の上面」までの高さによる。</h5>\n<h5 class=\"h-lv5\"><strong>２</strong>　高さが ３３メートル 又は階数が １０階 を超える建築物にあっては、少なくとも ２台以上 の昇降機を設置し、そのうち少なくとも １台 はストレッチャー用昇降機としなければならない。</h5>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p>1. <strong>遊び場の定量的設置義務（第５７条第２項）</strong>:</p>\n<p>敷地面積 １,３００㎡ 以上の住宅に対し、敷地面積の <strong>１０％</strong> という具体的な割合で「遊び場」の設置を義務付けている。日本の建築基準法にはこれに相当する直接的な義務規定はなく、ダッカ規則は過密化する居住環境におけるオープンスペース確保を建築基準の根幹に据えている。</p>\n<p>2. <strong>既存不適格から新基準への移行促進（第５８条第１項）</strong>:</p>\n<p>新規則施行前の建物に対し、新基準への適合を条件に設計変更を認める規定があるが、その際「構造設計等の妥当性」について専門技術者の厳格な証明を求めている。これは、最新の技術基準（BNBC等）への適合証明をパッケージで要求する実務的な移行措置といえる。</p>\n<p>3. <strong>昇降機（リフト）の設置基準（第５９条）</strong>:</p>\n<p>昇降機の設置義務を高さ <strong>１８メートル</strong> から課している。日本の建築基準法では高さ ３１メートル を超える建築物に非常用昇降機の設置義務があるが、ダッカ規則はより低い位置から機械的動線を法的に義務化している。また、３３メートル超における「ストレッチャー用」の義務化も特徴的である。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、建築設備及び既存建築物の扱いに関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．高さが ２０メートル である共同住宅を新築する場合、居住又は使用に供する最上階の屋根の上面までの高さが １８メートル 未満であれば、昇降機を設置しなくてもよい。</p>\n<p>２．高さが ３５メートル の建築物に昇降機を設置する場合、台数は１台あれば足りるが、当該昇降機は必ずストレッチャー用でなければならない。</p>\n<p>３．敷地面積 １,৫০০平方メートル の住宅敷地において共同住宅を建築する場合、敷地面積の １０パーセント 以上の面積を居住者のための遊び場として確保しなければならない。</p>\n<p>４．所管行政庁の承認を受けずに建築された建築物は、その内容が本規則の基準に適合している場合であっても、一切の追認を受けることはできない。</p>\n<p>* <strong>解説</strong>: <span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。高さ １８メートル を超える建築物には昇降機の設置義務があり、判定は最上階の屋根の上面までの高さによる。</p>\n<p>2. 誤り。３３メートル超の建築物には「少なくとも２台以上」の昇降機が必要である。</p>\n<p><strong>3. 正しい。</strong> １,３００㎡以上の住宅敷地では １０％ の遊び場の確保が義務付けられている。</p>\n<p>3. 誤り。第５８条第２項により、承認可能であれば過料等を納付した上で承認を得ることが可能である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13486","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h4 class=\"h-lv4\"><strong>৫৯। নির্মাণ ও নির্মাণ অনুমোদন সংশ্লিষ্ট সাধারণ জ্ঞাতব্য বিষয়সমূহ (চলমান)</strong></h4>\n<h6 class=\"h-lv6\">তবে শর্ত থাকে যে, সাধারণ লিফটের ক্ষেত্রে লিফট লবির ন্যূনতম পরিমাপ লিফট ব্যবহারকারীর সংখ্যার উপর নির্ভর করিয়া নির্ধারিত হইবে এবং লিফট লবির গভীরতা ১.৫ মিটার এর কম হইতে পারিবে না:</h6>\n<h6 class=\"h-lv6\">আরও শর্ত থাকে যে, স্ট্রেচার লিফট সংস্থান করা হইলে স্ট্রেচার লিফট এর জন্য লিফট লবির গভীরতার মাপ ন্যূনতম ২.১ মিটার হইতে হইবে।</h6>\n<h5 class=\"h-lv5\">(৩) ইমারতের বিভিন্ন যান্ত্রিক ও বৈদ্যুতিক পরিসেবা সংক্রান্ত সকল প্রয়োজনীয় নকশা সংশ্লিষ্ট কারিগরি ব্যক্তি কর্তৃক প্রণীত হইতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৪) জেনারেটর, শীতাতপ নিয়ন্ত্রণ যন্ত্র, সাব-স্টেশন এবং অন্যান্য বৈদ্যুতিক ও যান্ত্রিক স্থাপনা হইতে নির্গত শব্দ নিয়ন্ত্রণের ব্যবস্থা রাখিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৫) কর্তন বা ধ্বংস সাধনের জন্য অনুমোদনপ্রাপ্ত পাহাড়ের পাদদেশে টার্ফিং এবং ঢালকে স্ট্যাবিলাইজ করিয়া নিয়ন্ত্রণের ব্যবস্থা করিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(৬) পুকুর খনন করিতে হইলে সাইটের সীমানা হইতে কমপক্ষে ৩ (তিন) মিটার দূরত্বে খনন করিতে হইবে, যাহার ঢাল পার্শ্ববর্তী সীমানা হইতে ৪৫ (পঁয়তাল্লিশ) ডিগ্রি কোণের অধিক হইবে না।</h5>\n<h5 class=\"h-lv5\">(৭) কেন্দ্রীয় শীততাপ নিয়ন্ত্রিত ব্যবস্থার কারণে নির্গত উষ্ণ বায়ু পরিবেশ দূষণকারী উপাদান প্রশমন ও নিয়ন্ত্রণ ব্যবস্থাপনা কোডের অনুসরণপূর্বক প্রতিপালন করিতে হইবে।</h5>\n<h4 class=\"h-lv4\"><strong>৬০। মিশ্র উন্নয়ন (Mixed Use Development) —</strong></h4>\n<h5 class=\"h-lv5\">(১) যদি আবাসিক ব্যবহার বাণিজ্যিক ব্যবহারের সহিত মিশ্রিত হয় তাহা হইলে FAR ও ভূমি আচ্ছাদন নির্ধারণের জন্য আবাসিক ব্যবহারের প্রযোজ্য বিধান কার্যকর হইবে।</h5>\n<h5 class=\"h-lv5\">(২) উপ-বিধি (১) এ বর্ণিত মিশ্র ব্যবহার ব্যতীত অন্য সকল মিশ্র ব্যবহার উন্নয়নের ক্ষেত্রে বিভিন্ন শ্রেণির জন্য প্রযোজ্য বিধানাবলির কঠোরতমটি (Stringent Requirements) গণ্য করা হইবে;</h5>\n<h6 class=\"h-lv6\">তবে এক্ষেত্রে যে অকুপেন্সি টাইপের ফ্লোর স্পেস (পার্কিং বাদে) সর্বোচ্চ হইবে সেই বিশেষ অকুপেন্সি টাইপ সংক্রান্ত বিধি প্রযোজ্য হইবে।</h6>\n<h5 class=\"h-lv5\">(৩) আবাসিক প্রকল্প এলাকার যে সকল প্লট আবাসিক হইতে মিশ্র ব্যবহারে রূপান্তর করা হইয়াছে, সেই সকল জমিতে অনাবাসিক ব্যবহারের জন্য গাড়ীর প্রবেশ এবং নির্গমন কেবল প্রশস্ত রাস্তা হইতে হইবে।</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>第５９条（建築確認に関する一般的事項）（承前）</strong></h4>\n<h6 class=\"h-lv6\">ただし、昇降機ロビーの奥行きは １.５メートル を下回ってはならない。</h6>\n<h6 class=\"h-lv6\">また、ストレッチャー用昇降機のためのロビー奥行きは最小 ２.১メートル 以上としなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>３</strong>　建築物の各種機械・電気設備に関する設計図書は、関連する専門技術者によって作成されなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>৪</strong>　発電機や変電所等から発生する騒音の制御措置を講じなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>৫</strong>　切土の承認を受けた丘陵（山）の麓においては、芝付け（ターフィング）を行い、且つ斜面を安定させる措置を講じなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>৬</strong>　池を掘削する場合は、敷地境界線から少なくとも ３メートル 以上の距離を保たなければならない。この場合、勾配は ４５度 を超えてはならない。</h5>\n<h5 class=\"h-lv5\"><strong>৭</strong>　空気調和設備等から排出される温風による環境汚染物質の軽減管理は、法典に従わなければならない。</h5>\n<h4 class=\"h-lv4\"><strong>第６０条（複合開発（Mixed Use Development））</strong></h4>\n<h5 class=\"h-lv5\"><strong>১</strong>　住宅用途が商業用途と複合する場合、容積率（FAR）及び建蔽率の算定にあたっては、住宅用途に適用される規定を適用する。</h5>\n<h5 class=\"h-lv5\"><strong>২</strong>　前項以外の複合開発においては、各用途に適用される規定のうち最も厳しいもの（Stringent Requirements）を適用しなければならない。</h5>\n<h6 class=\"h-lv6\">ただし、床面積が最大である特定の用途がある場合は、当該用途に関する規定を適用できる。</h6>\n<h5 class=\"h-lv5\"><strong>৩</strong>　住宅から複合用途へ転換された敷地については、非住宅用途のための車両出入りは幅員のある道路からのみ行わなければならない。</h5>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p>1. <strong>昇降機ロビーの奥行規定（第５９条第２項）</strong>:</p>\n<p>ダッカ規則では、一般用ロビーで <strong>１.５ｍ以上</strong>、ストレッチャー用で <strong>２.１ｍ以上</strong> と具体的な奥行数値を法制化している。日本の建築基準法では、非常用エレベーターの乗降ロビー等の面積規定はあるが、一般的なロビー奥行を一律に規定する例は少なく、設計の標準化がより強く求められている。</p>\n<p>2. <strong>丘陵・池の保全規定（第５９条第５項・第６項）</strong>:</p>\n<p>建築法規の中に「切土時の芝付け義務」や「池の掘削距離（境界から３ｍ）」を明文化している。日本の宅地造成等規制法等に相当する内容を建築規則の一体的な管理項目としている点は、土砂災害と浸水対策への強い関心を反映している。</p>\n<p>3. <strong>複合用途における「厳格ルール」の採用（第６０条第２項）</strong>:</p>\n<p>複合用途の場合、原則として「最も厳しい基準（Stringent Requirements）」を適用する仕組みを採っている。日本の面積按分による算定が一般的だが、ダッカ規則は「最も厳しい値」をベースとしつつ、最大用途のルール採用も認める等、過密抑制と実務的便宜のバランスをとっている。</p>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、建築設備及び複合開発に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．ストレッチャー用昇降機のロビー奥行きは、利用者の数に関わらず １.৫メートル を確保すれば足りる。</p>\n<p>２．敷地内に池を掘削する場合、敷地境界線からの距離を ２メートル 以上保ち、且つ勾配を ６０度 以下としなければならない。</p>\n<p>３．住宅用途と商業用途が複合する建築物において、容積率（FAR）等の算定にあたっては、住宅用途の規定が適用される。</p>\n<p>４．住宅から複合用途へ転換された敷地においては、非住宅用途のための車両出入口を、接する任意の道路に設けることができる。</p>\n<p>* <strong>解説</strong>: <span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。ストレッチャー用昇降機のロビー奥行きは最小 <strong>২.১メートル</strong> 必要である。</p>\n<p>2. 誤り。境界からの距離は最小 <strong>৩メートル</strong>、勾配は <strong>৪৫度</strong> 以下でなければならない。</p>\n<p><strong>3. 正しい。</strong> 第６０条第１項の規定通りである。</p>\n<p>3. 誤り。非住宅用途の車両出入りは、幅員のある特定の道路からのみと制限されている。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p><strong>১৩৪৮৭ | বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<hr class=\"sep\">\n<p>(৪) আবাসিক ভূমি সংলগ্ন জমিতে মিশ্র ব্যবহার ইমারত নির্মাণের ক্ষেত্রে, আবাসিক ভূমির দিকে সীমানা হইতে ২.৫ মিটার সেটব্যাক রাখিতে হইবে।</p>\n<p>(৫) মিশ্র ব্যবহারের ক্ষেত্রে আবাসিক ব্যবহারের অংশে জানালা বা বারান্দা পার্শ্ববর্তী আবাসিক জমির দিকে দেওয়া যাইবে, তবে অনাবাসিক ব্যবহারের অংশে পার্শ্ববর্তী আবাসিক জমির দিকে বারান্দা দেওয়া যাইবে না।</p>\n<p>(৬) সকল মিশ্র ব্যবহার উন্নয়নের ক্ষেত্রে বিশদ অঞ্চল পরিকল্পনা এবং কোড অনুসরণপূর্বক অকুপেন্সি মিশ্রণের নির্দেশনা নিশ্চিত করিতে হইবে।</p>\n<p><strong>ষষ্ঠ অধ্যায়</strong></p>\n<p><strong>স্বাস্থ্য ও নিরাপত্তা</strong></p>\n<h4 class=\"h-lv4\"><strong>৬১। স্বাস্থ্য ও নিরাপত্তা।</strong>—ইমারতের বসবাসযোগ্যতা নিশ্চিত করিবার লক্ষ্যে নিম্নবর্ণিত ব্যবস্থা গ্রহণ করিতে হইবে, যথা:—</h4>\n<h5 class=\"h-lv5\">(ক) আলো ও বায়ুপ্রবাহ:</h5>\n<h6 class=\"h-lv6\">(১) প্রত্যেকটি ইমারতে প্রাকৃতিক উপায়ে স্বাভাবিক আলো-বাতাসের প্রবাহ রাখিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(২) আবাসিক ও বাণিজ্যিক কক্ষের জানালার ক্ষেত্রফল উক্ত কক্ষের মেঝের ক্ষেত্রফলের ন্যূনতম ১৫% এর সমান হইবে, যাহার কমপক্ষে অর্ধেক অংশ খোলা থাকিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(৩) যথাযথ যান্ত্রিক বায়ু প্রবাহের ব্যবস্থাপনায় সুষ্ঠু পরিবেশ নিশ্চিত হইলে এবং কৃত্রিম আলোর ব্যবস্থা থাকিলে প্রাকৃতিক উপায়ে আলো ও বায়ুপ্রবাহের ব্যবস্থা বাধ্যতামূলক হইবে না;</h6>\n<h6 class=\"h-lv6\">(৪) বেজমেন্টে সকল ধরনের প্রয়োজনীয় আলো, পানি ও বর্জ্য নিষ্কাশন এবং বায়ুপ্রবাহের ব্যবস্থা নিশ্চিত করিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(৫) বসবাসযোগ্য কক্ষের আলো ও বাতাসের প্রধান উৎস অভ্যন্তরীণ অঙ্গন বা আঙিনা হইলে, উহার ক্ষেত্রফল নিম্নবর্ণিত সারণি ১২ অনুযায়ী হইতে হইবে।</h6>\n<hr class=\"sep\">\n<p><strong>第１３４８７頁 | バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<hr class=\"sep\">\n<h4 class=\"h-lv4\"><strong>第６０条（複合開発）（承前）</strong></h4>\n<h5 class=\"h-lv5\"><strong>৪</strong>　住宅地に隣接する敷地において複合用途建築物を建築する場合、当該住宅地側の敷地境界線から ２.৫メートル の外壁後退距離（セットバック）を確保しなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>৫</strong>　住宅用途の部分にあっては住宅地側に窓等を設けることができる。但し、非住宅用途の部分にあっては、当該隣接住宅地側にベランダ（ বারান্দা ）を設けてはならない。</h5>\n<h5 class=\"h-lv5\"><strong>৬</strong>　すべての複合開発にあっては、詳細地域計画（DAP）等に基づき用途混在の指針を遵守しなければならない。</h5>\n<h3 class=\"h-lv3\"><strong>第６章　衛生及び安全（Health and Safety）</strong></h3>\n<h4 class=\"h-lv4\"><strong>第６１条（衛生及び安全）</strong></h4>\n<h5 class=\"h-lv5\"><strong>一（ক） 採光及び換気：</strong></h5>\n<h6 class=\"h-lv6\"><strong>１</strong>　各建築物には、自然な方法により自然の採光及び換気を確保しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>２</strong>　居住・商業用の居室の窓面積は、床面積の １５パーセント 以上としなければならない。且つその少なくとも半分以上は、開放できる構造としなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>３</strong>　機械換気設備等により適切な環境が確保され人工照明が設置されている場合にあっては、自然の採光及び換気措置を講ずることを要しない。</h6>\n<h6 class=\"h-lv6\"><strong>৪</strong>　地階にあっては、必要な採光、給排水、廃棄物排出及び換気の措置を講じなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>৫</strong>　居室の主要開口部が中庭に面する場合、その面積は別表１２の規定に従わなければならない。</h6>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p>1. <strong>居室の窓面積の割合（第６１条第１項第２号）</strong>:</p>\n<p>ダッカ規則では、居住・商業用居室において床面積の <strong>１５％以上</strong> の窓面積を求めている。日本の建築基準法第２８条の住宅の採光面積（床面積の７分の１≒１４．３％）とほぼ同等だが、ダッカ規則は半分以上の開放も求めている点がより厳格である。</p>\n<p>2. <strong>複合用途におけるベランダの設置制限（第６０条第５項）</strong>:</p>\n<p>住宅地に隣接する複合ビルにおいて、「非住宅部分のベランダ」を住宅側に設けることを禁じている。これは日本の建築基準法にはない独自の「プライバシー及び騒音被害」への配慮規定であり、用途混在都市特有の隣隣トラブルを未然に防ぐ意図がある。</p>\n<p>3. <strong>機械換気等による自然採光義務の免除（第６１条第１項第３号）</strong>:</p>\n<p>適切な機械設備と人工照明があれば、自然採光等の義務を免除できるとしている。日本の建築基準法でも緩和はあるが、ダッカ規則は「窓そのものを必須としない」スタンスをより明示的に打ち出している。</p>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における建築物の衛生及び複合用途に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．住宅地に隣接する敷地において複合用途建築物を建築する場合、当該住宅側の境界線から １.৫メートル の後退距離を確保すれば本規則に適合する。</p>\n<p>２．複合用途建築物において、非住宅用途の部分であっても、隣接する住宅地側に向かってベランダを設けることができる。</p>\n<p>３．商業用の居室に設ける窓面積は、当該居室床面積の １০パーセント 以上あれば、その全面積を開放できない構造であっても認められる。</p>\n<p>４．空気調和設備及び人工照明が適切に設置されている建築物においては、居室に自然採光及び換気のための開口部を設けることは義務付けられない。</p>\n<p>* <strong>解説</strong>: <span style=\"color: #ffffff;\"></p>\n<p><strong>正解：４</strong></p>\n<p>1. 誤り。住宅地側には <strong>২.৫（２.５）メートル</strong> のセットバックが必要である。</p>\n<p>2. 誤り。非住宅部分から住宅地側へのベランダ設置は禁止されている。</p>\n<p>3. 誤り。面積は床面積の <strong>১৫%</strong> 以上必要であり、且つその半分以上を開放構造としなければならない。</p>\n<p><strong>4. 正しい。</strong> 第６１条第１項第３号の規定通りである。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p><strong>১৩৪৮৮ | বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<hr class=\"sep\">\n<h6 class=\"h-lv6\"><strong>সারণি-১২</strong></h6>\n<h6 class=\"h-lv6\"><strong>অভ্যন্তরীণ অঙ্গন বা আঙিনার ন্যূনতম ক্ষেত্রফল</strong></h6>\n<h6 class=\"h-lv6\"><strong>(বসবাসযোগ্য কক্ষের জন্য)</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নম্বর</th><th>তলার সংখ্যা</th><th>সর্বোচ্চ উচ্চতা (মিটার)</th><th>অভ্যন্তরীণ অঙ্গন বা আঙিনার ন্যূনতম নেট ক্ষেত্রফল (বর্গ মিটার)</th></tr></thead>\n<tbody>\n<tr><td>(১)</td><td>(২)</td><td>(৩)</td><td>(৪)</td></tr>\n<tr><td>(১)</td><td>৩ পর্যন্ত</td><td>১১</td><td>৯</td></tr>\n<tr><td>(২)</td><td>৪</td><td>১৪</td><td>১৬</td></tr>\n<tr><td>(৩)</td><td>৫</td><td>১৭</td><td>২৫</td></tr>\n<tr><td>(৪)</td><td>৬</td><td>২০</td><td>৩৬</td></tr>\n<tr><td>(৫)</td><td>৭</td><td>২৩</td><td>৪৯</td></tr>\n<tr><td>(৬)</td><td>৮</td><td>২৬</td><td>৬৪</td></tr>\n<tr><td>(৭)</td><td>৯</td><td>২৯</td><td>৮১</td></tr>\n<tr><td>(৮)</td><td>১০</td><td>৩৩</td><td>১০০</td></tr>\n<tr><td>(৯)</td><td>১১</td><td>৩৬</td><td>১২১</td></tr>\n<tr><td>(১০)</td><td>১২-১৩</td><td>৪২</td><td>১৪৪</td></tr>\n<tr><td>(১১)</td><td>১৪-১৫</td><td>৪৮</td><td>১৯৬</td></tr>\n<tr><td>(১২)</td><td>১৬-১৭</td><td>৫৪</td><td>২৫৬</td></tr>\n<tr><td>(১৩)</td><td>১৮ এবং তদুর্ধ্ব</td><td>৬৩ এবং তদুর্ধ্ব</td><td>৩৬১</td></tr>\n</tbody>\n</table></div>\n<h6 class=\"h-lv6\"><strong>দ্রষ্টব্য:</strong></h6>\n<h6 class=\"h-lv6\">অভ্যন্তরীণ অঙ্গন বা আঙিনার ক্ষেত্রফল পরিমাপের ক্ষেত্রে ক্ষুদ্র বাহুর দৈর্ঘ্য বৃহত্তর বাহুর দৈর্ঘ্যের এক তৃতীয়াংশের কম হইতে পারিবে না।</h6>\n<h5 class=\"h-lv5\">(৬) টয়লেটের জানালা অভ্যন্তরীণ অঙ্গন বা আঙিনা বা বায়ু চিমনীতে খুলিতে পারিবে;</h5>\n<h5 class=\"h-lv5\">(৭) স্বাভাবিক আলো এবং বায়ু চলাচলের মাত্রা ও মানের জন্য নিম্নবর্ণিত সারণি ১৩ অনুসরণ করিতে হইবে।</h5>\n<hr class=\"sep\">\n<p><strong>第１３４８８頁 | バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<hr class=\"sep\">\n<h4 class=\"h-lv4\"><strong>第６１条（内部の中庭）（承前）</strong></h4>\n<h6 class=\"h-lv6\"><strong>表１２：内部の中庭（Courtyard）の最小面積（居室に供する場合）</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>階数</th><th>最高高さ（ｍ）</th><th>中庭の最小有効面積（㎡）</th></tr></thead>\n<tbody>\n<tr><td>(1)</td><td>３階まで</td><td>１１</td><td>９</td></tr>\n<tr><td>(2)</td><td>４階</td><td>１４</td><td>１６</td></tr>\n<tr><td>(3)</td><td>５階</td><td>１７</td><td>២৫</td></tr>\n<tr><td>(4)</td><td>６階</td><td>២০</td><td>৩৬</td></tr>\n<tr><td>(5)</td><td>７階</td><td>២৩</td><td>৪৯</td></tr>\n<tr><td>(6)</td><td>８階</td><td>২৬</td><td>৬৪</td></tr>\n<tr><td>(7)</td><td>９階</td><td>២৯</td><td>৮১</td></tr>\n<tr><td>(8)</td><td>１０階</td><td>৩৩</td><td>１００</td></tr>\n<tr><td>(9)</td><td>１１階</td><td>৩৬</td><td>১২１</td></tr>\n<tr><td>(10)</td><td>１２階～１３階</td><td>４２</td><td>１４４</td></tr>\n<tr><td>(11)</td><td>１４階～１５階</td><td>４８</td><td>１９６</td></tr>\n<tr><td>(12)</td><td>１６階～１７階</td><td>５４</td><td>২৫６</td></tr>\n<tr><td>(13)</td><td>１８階以上</td><td>６３以上</td><td>৩৬１</td></tr>\n</tbody>\n</table></div>\n<h6 class=\"h-lv6\"><strong>備考：</strong></h6>\n<h6 class=\"h-lv6\">面積算定において中庭の短辺は、長辺の３分の１を下回ってはならない。</h6>\n<h5 class=\"h-lv5\"><strong>６</strong>　便所の窓は、内部の中庭又は換気用煙突（বায়ু চিমনী）に面して開放できる。</h5>\n<h5 class=\"h-lv5\"><strong>７</strong>　自然採光及び換気の基準については表１３に従わなければならない。</h5>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p>1. <strong>中庭面積の高さ連動制（表１２）</strong>:</p>\n<p>ダッカ規則では、建築物の高さが増すにつれて中庭に求められる最小面積が指数関数的に増大する仕組みを採っている。日本の建築基準法では「採光補正係数」等で判定するが、ダッカ規則のように「中庭の正味面積」を高さにリンクさせて一律に規定する方式は、高層化に伴う深部への通風確保をより物理的に担保するものである。</p>\n<p>2. <strong>中庭の形状制限（備考）</strong>:</p>\n<p>中庭の短辺を「長辺の３分の１以上」とするアスペクト比制限を設けている。日本の建築基準法では開口部からの水平距離を重視するが、ダッカ規則は空間そのものの形状の健全性を重視している。</p>\n<p>3. <strong>換気用煙突の法認（第６項）</strong>:</p>\n<p>便所の窓を「換気用煙突（ বায়ু চিমনী ）」に開放することを認めている。日本でも換気設備があれば窓は不要だが、ダッカ規則は高密建築における代替経路として「煙突」を明文化している。</p>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における「内部の中庭（Courtyard）」に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．高さ ２０メートル の時、居室の採光・換気に供する内部の中庭の最小有効面積は ２৫平方メートル 以上あれば足りる。</p>\n<p>２．内部の中庭の形状にかかわらず、必要な有効面積を満たしていれば短辺の長さ制限はない。</p>\n<p>３．階数が １０階 の建築物において、内部の中庭に求められる最小有効面積は １００平方メートル である。</p>\n<p>４．便所の窓は必ず道路側に設けなければならず、換気用煙突に面して設けることはできない。</p>\n<p>* <strong>解説</strong>: <span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。高さ ２０メートル の時の中庭面積は <strong>৩৬平方メートル</strong> 以上必要である。</p>\n<p>2. 誤り。短辺は長辺の <strong>３分の１</strong> 以上でなければならない。</p>\n<p><strong>3. 正しい。</strong> 表１２の項番８の規定通りである。</p>\n<p>3. 誤り。便所の窓は換気用煙突に開放可能である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p><strong>১৩৪৮৯ | বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<hr class=\"sep\">\n<h6 class=\"h-lv6\"><strong>সারণি-১৩</strong></h6>\n<h6 class=\"h-lv6\"><strong>অভ্যন্তরীণ এয়ারওয়েল বা লাইটওয়েল এর ন্যূনতম মাপসমূহ (গোসলখানা ও টয়লেটের জন্য)</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নম্বর</th><th>ভবনের উচ্চতা (তলা / মিটার)</th><th>শ্যাফটের ন্যূনতম নেট ক্রস সেকশন ক্ষেত্রফল (বর্গমিটার)</th><th>শ্যাফটের ন্যূনতম প্রস্থ (মিটার)</th></tr></thead>\n<tbody>\n<tr><td>১।</td><td>৩ তলা পর্যন্ত (১১ মিটার)</td><td>১.৫</td><td>১.০</td></tr>\n<tr><td>২।</td><td>৪ তলা (১৪ মিটার)</td><td>৩.০</td><td>১.২</td></tr>\n<tr><td>৩।</td><td>৫ তলা (১৭ মিটার)</td><td>৪.০</td><td>১.৫</td></tr>\n<tr><td>৪।</td><td>৬ তলা (২০ মিটার)</td><td>৫.০</td><td>২.০</td></tr>\n<tr><td>৫।</td><td>৬ তলার তদুর্ধ্ব (২০ মিটারের তদুর্ধ্ব)</td><td>৬.৫০</td><td>২.৫</td></tr>\n</tbody>\n</table></div>\n<h6 class=\"h-lv6\"><strong>দ্রষ্টব্য:</strong></h6>\n<h6 class=\"h-lv6\">(১) যান্ত্রিক বায়ু চলাচল ব্যবস্থা থাকিলে শ্যাফটের মাপ যান্ত্রিক ডিজাইনের ভিত্তিতে নিশ্চিত করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(২) বহিরাঙ্গনে বা আবশ্যিক উন্মুক্ত স্থানের সহিত সংযুক্ত এয়ারওয়েল সমূহের জন্য এই ক্ষেত্রফল প্রযোজ্য হইবে না, তবে শ্যাফটের ন্যূনতম প্রস্থ ১ মিটার হইতে হইবে।</h6>\n<h4 class=\"h-lv4\"><strong>(খ) সীমানা দেয়াল:</strong></h4>\n<h5 class=\"h-lv5\">(১) আবাসিক ইমারতের ক্ষেত্রে সকল পার্শ্বস্থ সীমানা দেয়ালের উচ্চতা ৩ মিটারের অধিক হইতে পারিবে না যাহা সংলগ্ন রাস্তার সর্বোচ্চ বিন্দু হইতে পরিমাপকৃত হইবে এবং সর্বোচ্চ ১.৭৫ মিটার উচ্চতা পর্যন্ত নিরেট ও বাকি অংশ জালি অথবা গ্রিল করা যাইবে;</h5>\n<h5 class=\"h-lv5\">(২) সরকারি ইমারতের সীমানা দেয়ালের উচ্চতা ২.৭৫ মিটারের অধিক হইতে পারিবে না, যাহা সংলগ্ন রাস্তার সর্বোচ্চ বিন্দু হইতে পরিমাপকৃত হইবে, পার্শ্ব এবং পশ্চাতে ১.৭৫ মিটার পর্যন্ত নিরেট ও সম্মুখ অংশে ১ মিটার পর্যন্ত নিরেট রাখা যাইবে।</h5>\n<h6 class=\"h-lv6\"><strong>তবে শর্ত থাকে যে,</strong> বিশেষ নিরাপত্তাজনিত কারণে নিরেট হইতে পারিবে এবং দেয়ালের উচ্চতা সংশ্লিষ্ট কর্তৃপক্ষ কর্তৃক নির্ধারিত হইবে;</h6>\n<hr class=\"sep\">\n<p><strong>第１３４８９頁 | バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<hr class=\"sep\">\n<h4 class=\"h-lv4\"><strong>第６１条（内部の光庭）（承前）</strong></h4>\n<h6 class=\"h-lv6\"><strong>表１３：内部の光庭（Air-well）の最小寸法（浴室・便所用）</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>建築物の高さ</th><th>最小有効断面積（㎡）</th><th>最小幅員（ｍ）</th></tr></thead>\n<tbody>\n<tr><td>1</td><td>３階まで (11m)</td><td>１.５</td><td>１.０</td></tr>\n<tr><td>2</td><td>４階 (14m)</td><td>３.０</td><td>１.２</td></tr>\n<tr><td>3</td><td>５階 (17m)</td><td>４.０</td><td>１.５</td></tr>\n<tr><td>4</td><td>６階 (20m)</td><td>５.０</td><td>២.０</td></tr>\n<tr><td>5</td><td>６階超 (20m超)</td><td>６.５０</td><td>២.৫</td></tr>\n</tbody>\n</table></div>\n<h6 class=\"h-lv6\"><strong>備考：</strong></h6>\n<h6 class=\"h-lv6\">(1) 機械換気設備を設置する場合、寸法は機械設計に基づき決定する。</h6>\n<h6 class=\"h-lv6\">(2) 外部空地に接続される光庭については、断面積規定は適用しないが最小幅員は １メートル 以上とする。</h6>\n<h4 class=\"h-lv4\"><strong>(খ) 境界塀（Boundary Walls）</strong></h4>\n<h5 class=\"h-lv5\"><strong>১</strong>　住宅建築物の境界塀の高さは道路最高地点から <strong>３メートル</strong> を超えてはならない。地盤面から １.７５メートル までを目隠し（ Solid ）構造とし、残りは格子状等としなければならない。</h5>\n<h5 class=\"h-lv5\"><strong>২</strong>　政府機関の境界塀の高さは <strong>２.７５メートル</strong> を超えてはならない。側面等は １.７５メートル、正面は １メートル までを目隠し構造とし、残りはグリル等としなければならない。</h5>\n<h6 class=\"h-lv6\"><strong>ただし、</strong> 重要拠点等の場合は全面目隠し構造を認め、高さは当局の決定に従う。</h6>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p>1. <strong>光庭の断面積規定（表１３）</strong>:</p>\n<p>ダッカ規則では、換気用光庭に対し建物の高さに連動した具体的な「最小断面積」を課している（例：６階建で５㎡）。日本の建築基準法では窓又は換気設備を求めるが、物理的面積を階数ごとに規定する方式は、高密度環境での衛生確保を空間構成で担保しようとする思想である。</p>\n<p>2. <strong>境界塀の「通風」義務（第খ節）</strong>:</p>\n<p>塀の高さ制限だけでなく、「上部を格子状にして通風を確保すること」を義務付けている。日本の基準法（令第６２条の８）では安全性が主だが、ダッカ規則は過密街区における熱気滞留防止を意図した独自の環境規定といえる。</p>\n<p>3. <strong>重要拠点（KPI）への特例</strong>:</p>\n<p>重要拠点に対し、通常の制限を解除し「全面目隠し塀」を認めている。建築規則の中に不透明性を安全保障上の要件として明記している点は実務的である。</p>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における内部の光庭及び境界塀に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．浴室換気用の内部光庭は、建築物の高さが １৪メートル である場合、最小幅員は １.০メートル 以上あれば足りる。</p>\n<p>２．義務的空地に接続されている光庭については、最小有効断面積の規定は適用されないが、最小幅員 １メートル 以上を確保しなければならない。</p>\n<p>３．住宅建築物の境界塀は、防犯上の理由があれば高さ ３メートル 全てを不透明な目隠し構造とすることができる。</p>\n<p>４．政府機関の建築物の境界塀は、正面部分において高さ １.৭৫メートル までを目隠し構造とすることが義務付けられている。</p>\n<p>* <strong>解説</strong>: <span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。高さ １৪メートル のとき、最小幅員は <strong>১.২メートル</strong> 必要である。</p>\n<p><strong>2. 正しい。</strong> 表１３の備考(2)の規定通りである。</p>\n<p>2. 誤り。住宅の塀は高さ <strong>১.৭৫メートル</strong> までしか目隠し構造にできず、残りは格子状等にする。</p>\n<p>3. 誤り。政府機関の塀の正面における目隠し部分は <strong>১メートル</strong> までとされる。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">\n<p><strong>১৩৪৯০ | বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<hr class=\"sep\">\n<h5 class=\"h-lv5\">(৩) দেয়ালের উচ্চতা ২.৭৫ মিটারের অধিক হইতে পারিবে না, যাহা সংলগ্ন রাস্তার সর্বোচ্চ বিন্দু হইতে পরিমাপকৃত হইবে এবং প্লটের সম্মুখ ১ মিটার, পার্শ্ব এবং পশ্চাতের দিকে সর্বোচ্চ ১.৭৫ মিটার পর্যন্ত নিরেট ও বাকি অংশ জালি অথবা গ্রিল ব্যবহার করা যাইবে;</h5>\n<h5 class=\"h-lv5\">(৪) পাহাড়ি বা অসমান সাইটে সীমানা দেয়ালের উচ্চতা প্রতিটি স্প্যানের মধ্যবর্তী বিন্দু হইতে হিসাব করিতে হইবে এবং এইরূপ স্প্যানের আনুভূমিক দৈর্ঘ্য ৩.০ মিটারের অধিক হইতে পারিবে না।</h5>\n<h4 class=\"h-lv4\"><strong>(গ) পানি সরবরাহ, পয়ঃপ্রণালি এবং নর্দমা:</strong></h4>\n<h5 class=\"h-lv5\">(১) সকল ইমারতে পানি সরবরাহ, সেপটিক ট্যাংক, সোকওয়েল, প্রযোজ্য ক্ষেত্রে, STP এবং স্বাস্থ্য বিধানের যথাযোগ্য সুবিধাসমূহ থাকিতে হইবে;</h5>\n<h5 class=\"h-lv5\">(২) সরকারি পয়ঃপ্রণালির ব্যবস্থা থাকিলে সমস্ত পয়ঃপ্রণালি ইহার সহিত সংযুক্ত হইতে পারিবে;</h5>\n<h5 class=\"h-lv5\">(৩) যেখানে কোনো সাধারণ পয়ঃপ্রণালি নাই সেইখানে সেপটিক ট্যাংক ব্যবহার করিয়া বর্জ্য পদার্থ এবং সোক পিট ব্যবহার করিয়া নোংরা পানি নিষ্কাশন করিতে হইবে। লে-আউট নকশায় STP, সেপটিক ট্যাংক এবং সোক পিট এর অবস্থান প্রদর্শন করিতে হইবে;</h5>\n<h5 class=\"h-lv5\">(৪) ছাদ হইতে বৃষ্টির পানি রাস্তার নর্দমায় বা অন্য কোনো নির্গমন প্রণালিতে নির্গমনের পর্যাপ্ত সুব্যবস্থা থাকিতে হইবে যাহা ভিত্তিতে কোনো ক্ষতি ঘটাইবে না এবং ছাদ হইতে নির্গত পানি সংলগ্ন সম্পত্তি বা রাস্তায় পড়িতে পারিবে না।</h5>\n<h4 class=\"h-lv4\"><strong>(ঘ) বর্জ্য নিষ্কাশন:</strong></h4>\n<h5 class=\"h-lv5\">(১) সাইটের আঙিনায় বর্জ্য সংগ্রহের জন্য নির্দিষ্ট করিয়া জায়গা রাখিতে হইবে;</h5>\n<h5 class=\"h-lv5\">(২) কঠিন বা রাসায়নিক বর্জ্য তৈরি করে এমন প্রতিষ্ঠানে তাহা সংগ্রহ ও নিরাপদ নিষ্কাশনের ব্যবস্থা থাকিতে হইবে;</h5>\n<hr class=\"sep\">"},{"num":"13491","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>(৩) কোনো প্রকার বর্জ্য সরাসরি জলাশয়, খাল, বিল ও নদী-নালাতে ফেলা যাইবে না; এবং</p>\n<p>(৪) রাসায়নিক বা বিষাক্ত বর্জ্য শোধন (treatment) না করিয়া নর্দমা, ড্রেন, ডাস্টবিন, পয়ঃনালা, জলাধার এবং উন্মুক্ত স্থানে নিষ্কাশন বা মাটির নিচে পুতিয়া রাখা যাইবে না;</p>\n<p><strong>(ঙ) খোলা বৈদ্যুতিক তার ও অন্যান্য ইউটিলিটি:</strong></p>\n<p>(১) খোলা বৈদ্যুতিক তার ও অন্যান্য ইউটিলিটির ক্ষেত্রে নিম্নবর্ণিত সারণি ১৪ এবং এতদসংক্রান্ত বিদ্যুৎ বিভাগের বিধিমালা/নির্দেশাবলি অনুসরণ করিতে হইবে, যথা:</p>\n<h6 class=\"h-lv6\"><strong>সারণি-১৪</strong></h6>\n<h6 class=\"h-lv6\"><strong>ভবন সংলগ্ন বৈদ্যুতিক লাইনের ন্যূনতম দূরত্ব</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>ক্রমিক নম্বর</th><th>লাইন ভোল্টেজ</th><th>উল্লম্ব (মিটার)</th><th>আনুভূমিক (মিটার)</th></tr></thead>\n<tbody>\n<tr><td>(১)</td><td>(২)</td><td>(৩)</td><td>(৪)</td></tr>\n<tr><td>১।</td><td>লো হইতে মিডিয়াম ভোল্টেজ লাইন এবং সার্ভিস লাইনসমূহ</td><td>২.৫</td><td>১.২৫</td></tr>\n<tr><td>২।</td><td>৩৩ কেভি পর্যন্ত হাই ভোল্টেজ লাইন</td><td>৩.৫</td><td>১.৭৫</td></tr>\n<tr><td>৩।</td><td>৩৩ কেভি এর অধিক হাই ভোল্টেজ লাইন</td><td>৩.৫ এবং প্রতি ৩৩ কেভি অথবা আংশিক মানের জন্য অতিরিক্ত ০.৩</td><td>১.৭৫ এবং প্রতি ৩৩ কেভি অথবা আংশিক মানের জন্য অতিরিক্ত ০.৩</td></tr>\n</tbody>\n</table></div>\n<h5 class=\"h-lv5\">(২) যদি এই সকল ইউটিলিটি লাইন জমির উপর দিয়া, মাটি ঘেঁষিয়া বা জমির নিচ দিয়া যায় এবং এই লাইনগুলি নির্মাণকার্যের সুবিধার্থে পরিবর্তন করিতে হয়, তাহা হইলে এই পরিবর্তনের খরচ আবেদনকারীকে বহন করিতে হইবে এবং এই ক্ষেত্রে সংশ্লিষ্ট স্থানীয় সরকার কর্তৃপক্ষের অনুমোদিত সড়ক খনন ও পুনঃনির্মাণ বিষয়ক বিধি-বিধান ও নীতিমালা অনুসরণ করিতে হইবে;</h5>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<p>（第６１条（衛生及び安全）第４号（ঘ）の続き）</p>\n<h5 class=\"h-lv5\">３　いかなる種類の廃棄物も、直接、水域、運河、池又は河川へ投棄してはならない。</h5>\n<h5 class=\"h-lv5\">４　化学的又は毒性の廃棄物については、処理（treatment）を施すことなく、下水溝、排水路、ゴミ箱、下水管、貯水施設、開放された場所への排出、又は地中への埋設を行ってはならない。</h5>\n<h4 class=\"h-lv4\"><strong>(ঙ) 架空電線及びその他の公共施設（Open electrical wires and other utilities）：</strong></h4>\n<h5 class=\"h-lv5\">１　架空電線及びその他の公共施設に関しては、次の表１４の規定、及び関連する電力部門の規則若しくは指示に従わなければならない。</h5>\n<h6 class=\"h-lv6\"><strong>表１４：建築物に近接する電線の最小離隔距離</strong></h6>\n<div class=\"table-wrap\"><table>\n<thead><tr><th>項番</th><th>電線電圧</th><th>垂直（ｍ）</th><th>水平（ｍ）</th></tr></thead>\n<tbody>\n<tr><td>1</td><td>低圧から中圧の電線及び引込線</td><td>2.5</td><td>1.25</td></tr>\n<tr><td>2</td><td>33kVまでの高圧電線</td><td>3.5</td><td>1.75</td></tr>\n<tr><td>3</td><td>33kVを超える高圧電線</td><td>3.5に33kV（又はその端数）ごとに0.3を加算</td><td>1.75に33kV（又はその端数）ごとに0.3を加算</td></tr>\n</tbody>\n</table></div>\n<h5 class=\"h-lv5\">２　これらの公共施設ラインが土地の上空、地上又は地下を通過しており、建築工事のために移設が必要となる場合、当該移設費用は申請者が負担しなければならない。 この場合において、関連する地方政府当局が承認した道路の掘削及び再構築に関する規定、基準及びガイドラインに従わなければならない。</h5>\n<hr class=\"sep\">\n<p>1. <strong>環境汚染防止規定の建築規則への明文化（第６１条第４号）</strong>:</p>\n<p>ダッカ規則では、化学廃棄物の未処理排出禁止や水域への投棄禁止が建築規則の中に直接盛り込まれている。日本の建築基準法では排水設備の構造規定はあるが、特定の廃棄物投棄禁止行為そのものは主に「水質汚濁防止法」等の環境法令の範疇であり、建築基準法の単体規定としてこれほど直接的に記述されることはない。</p>\n<p>2. <strong>電線との離隔距離の具体的規定（表１４）</strong>:</p>\n<p>電圧ごとの「垂直・水平離隔距離」を建築規則の本文として規定している。日本において電線との離隔距離は、主に「電気設備に関する技術基準を定める省令」に基づき電力会社との離隔として管理される事項であり、建築基準法の技術基準の中にこのような詳細な電圧別マトリクスが掲載されることはない。</p>\n<p>3. <strong>公共インフラ移設の申請者負担原則（第６１条第５号２）</strong>:</p>\n<p>工事に伴う公共施設ラインの移設費用を「申請者（আবেদনকারী）」が負担することを法的に明記している。日本では実務上、原因者負担の原則に基づき個別の契約等で処理されるが、建築規則という実体法の中で明示的に規定されている点は、工事の権利義務関係の明確化を図るダッカ独自の法制スタイルである。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、衛生、廃棄物処理及び公共施設に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．建築物の屋根からの雨水については、適切に処理されている場合であれば、隣接する敷地又は道路に直接流出させることができる。</p>\n<p>２．化学的又は毒性の廃棄物については、公共のゴミ箱（ডাস্টবিন）へ排出する場合であっても、適切な処理（treatment）を施さなければならない。</p>\n<p>３．建築物に近接する ３৩ কেভি（33kV）を超える高圧電線との垂直離隔距離は、一律に ３.৫メートル を確保すれば足りる。</p>\n<p>４．建築工事を円滑に進めるために敷地内の公共施設ラインを移設する必要がある場合、その移設費用は原則として所管行政庁が負担する。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：２</strong></p>\n<p>1. 誤り。第６１条第３号４により、雨水を隣地に流出させることは禁じられている。</p>\n<p><strong>2. 正しい。</strong> 第６１条第４号４により、ゴミ箱等への排出であっても処理を施さない排出は禁じられている。</p>\n<p>2. 誤り。表１４の項番３により、33kVを超える場合は、33kVごとに ０.৩ メートル を加算しなければならない。</p>\n<p>3. 誤り。第６１条第５号２により、移設費用は「申請者」が負担しなければならない。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13492","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>(চ) অগ্নি নিরাপত্তা:</p>\n<p>(১) ইমারত ব্যবহারকারীদের সঠিক নিরাপত্তার জন্য, প্রযোজ্য ক্ষেত্রে, অগ্নি নির্বাপক নিরাপত্তার সকল ব্যবস্থা পরিশিষ্ট- ১ অনুযায়ী নিশ্চিত করিতে হইবে;</p>\n<p>(২) প্রযোজ্য সকল ইমারতে জরুরি প্রস্থান প্রদর্শনকারী দিকচিহ্ন থাকিতে হইবে; এবং</p>\n<p>(৩) বিশেষ নির্দেশনা না থাকিলে যন্ত্রচালিত উঠানামার ব্যবস্থা জরুরি নির্গমন পথ (Fire Exit) হিসাবে ব্যবহার করা যাইবে না।</p>\n<h3 class=\"h-lv3\"><strong>সপ্তম অধ্যায়</strong></h3>\n<p><strong>বিবিধ</strong></p>\n<h4 class=\"h-lv4\"><strong>৬২। ল্যান্ডস্কেপিং এবং পার্ক।</strong>—</h4>\n<h5 class=\"h-lv5\">(১) সকল সরকারি ইমারত, বাণিজ্যিক ইমারত এবং বৃহদাকার ভবন বা অ্যাপার্টমেন্ট নির্মাণের ক্ষেত্রে একটি যথোচিত ল্যান্ডস্কেপ নকশা থাকিতে হইবে।</h5>\n<h5 class=\"h-lv5\">(২) পাবলিক পার্ক এবং খোলা পরিসরে যেকোনো স্থাপনা নির্মাণের জন্য অনুমোদনের প্রয়োজন হইবে এবং অনুরূপ স্থানে নিম্নবর্ণিত ক্ষেত্র ব্যতীত কোনো কাঠামো বা স্থাপনা নির্মাণের অনুমোদন প্রদান করা হইবে না, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) খেলাধুলা সংক্রান্ত ইমারত বা কাঠামো; এবং</h6>\n<h6 class=\"h-lv6\">(খ) পার্ক অথবা খোলা পরিসরের সর্বোচ্চ ৫% ক্ষেত্রফল এবং ৪ মিটার উচ্চতা পর্যন্ত সাধারণ জনগণের সুবিধা প্রদানের সহিত জড়িত কোনো ইমারত বা কাঠামো।</h6>\n<h5 class=\"h-lv5\">(৩) নিম্নবর্ণিত ক্ষেত্রে নগর উন্নয়ন কমিটির সুপারিশ বা সিদ্ধান্তের প্রয়োজন হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) যেকোনো ভাস্কর্য প্রতিষ্ঠার ক্ষেত্রে; এবং</h6>\n<h6 class=\"h-lv6\">(খ) যেকোনো কাঠামো নির্মাণ।</h6>\n<h4 class=\"h-lv4\"><strong>৬৩। ঐতিহ্যবাহী ইমারত, স্থান, এলাকা সংরক্ষণ (Conservation and Preservation)</strong>—</h4>\n<h5 class=\"h-lv5\">(১) সরকার কর্তৃক ঘোষিত ঐতিহ্যবাহী ইমারত ও গুরুত্বপূর্ণ স্থান এবং এলাকাসমূহ যথাযথ সংরক্ষণের উদ্দেশ্যে নিম্নবর্ণিত বিধানসমূহ প্রযোজ্য হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) সরকার কর্তৃক ঢাকা মহানগরীর সকল ঐতিহ্যবাহী ইমারত, গুরুত্বপূর্ণ ইমারত, গুরুত্বপূর্ণ স্থান ও এলাকাসমূহের তালিকা প্রস্তুত করিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(খ) সরকার ঢাকা মহানগরীর সকল ঐতিহ্যবাহী ইমারত, গুরুত্বপূর্ণ ইমারত, গুরুত্বপূর্ণ স্থান ও এলাকাসমূহের তালিকা প্রস্তুত ও হালনাগাদপূর্বক উহাদের ইমারতের তালিকা গেজেট আকারে প্রকাশ করিবে এবং মালিক এবং বসবাসকারীগণকে অনুরূপ তালিকাভুক্তির বিষয়ে অবহিতকরণের নিমিত্ত বিজ্ঞপ্তি জারি করিবে এবং ওয়েবসাইটে প্রকাশ করিবে;</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h4 class=\"h-lv4\"><strong>(চ) 防火安全（Fire safety）：</strong></h4>\n<h5 class=\"h-lv5\">１　建築物の使用者の適切な安全を確保するため、適用がある場合においては、防火安全（Fire safety）に係る全ての措置を付録（Appendix）１に従い講じなければならない。</h5>\n<h5 class=\"h-lv5\">２　適用される全ての建築物には、非常出口（Emergency exit）を示す方向標識を設けなければならない。</h5>\n<h5 class=\"h-lv5\">３　特別な指示がある場合を除き、機械式昇降設備（エレベーター等）を避難階段（Fire Exit）として使用してはならない。</h5>\n<h3 class=\"h-lv3\"><strong>第７章　雑則（Miscellaneous）</strong></h3>\n<h4 class=\"h-lv4\"><strong>第６２条（景観計画及び公園（Landscaping and Parks））</strong></h4>\n<h5 class=\"h-lv5\">１　全ての政府機関の建築物、商業建築物、並びに大規模建築物又は共同住宅（Apartment）の建築にあたっては、適切な景観計画（Landscaping）の図面を備えなければならない。</h5>\n<h5 class=\"h-lv5\">２　公衆公園（Public Park）及び開放空間におけるいかなる工作物の建築についても、承認を受けなければならない。この場合において、次に掲げる場合を除き、いかなる構造物又は工作物の建築も承認してはならない。</h5>\n<h6 class=\"h-lv6\">一　スポーツに関連する建築物又は構造物</h6>\n<h6 class=\"h-lv6\">二　公園又は開放空間の総面積の５パーセント以内、かつ高さ４メートル以内であって、一般公衆の利便に資する建築物又は構造物</h6>\n<h5 class=\"h-lv5\">３　次に掲げる事項については、都市開発委員会（Urban Development Committee）の勧告又は決定を必要とする。</h5>\n<h6 class=\"h-lv6\">一　いかなる彫刻（Sculpture）の設置</h6>\n<h6 class=\"h-lv6\">二　いかなる構造物の建築</h6>\n<h4 class=\"h-lv4\"><strong>第６３条（伝統的建築物、史跡、地域の保存（Conservation and Preservation））</strong></h4>\n<h5 class=\"h-lv5\">１　政府が布告した伝統的建築物（Heritage building）、重要史跡及び重要地域を適切に保存するため、次に掲げる規定を適用する。</h5>\n<h6 class=\"h-lv6\">一　政府は、ダッカ首都圏における全ての伝統的建築物、重要建築物、重要史跡及び重要地域の目録を作成しなければならない。</h6>\n<h6 class=\"h-lv6\">二　政府は、ダッカ首都圏の全ての伝統的建築物、重要建築物、重要史跡及び重要地域の目録を作成・更新した上で、当該建築物等の目録を官報（Gazette）により公示し、かつ、所有者及び居住者に対し当該登録に関する通知を行うとともに、ウェブサイトに掲載しなければならない。</h6>\n<hr class=\"sep\">\n<p>1. <strong>昇降機の避難利用の原則禁止（第６１条第６号３）</strong>:</p>\n<p>ダッカ規則では、特段の指示がない限り、機械式昇降機を避難経路として使用することを明文で禁じている。日本の建築基準法においても、避難施設は階段であることが原則であり、エレベーターは避難施設とはみなされない。ただし、ダッカ規則も「特別の指示（বিশেষ নির্দেশনা）」により例外を担保している。</p>\n<p>2. <strong>公園内建築物の厳格な定量制限（第６２条第２項）</strong>:</p>\n<p>公衆公園内の建築物を「面積５％以内・高さ４ｍ以内」且つ「公衆の利便」に限定している。日本の都市公園法でも管理事務所などの建築は認められるが、ダッカ規則は建築規則の中で直接的に厳しい数値を規定し、都市の緑地・開放空間の維持を強力に図っている。</p>\n<p>3. <strong>景観計画の義務付け範囲（第６２条第１項）</strong>:</p>\n<p>政府建築物、商業ビル、大規模住宅に対し「景観計画（ল্যান্ডস্কেপ নকশা）」の図面提出を義務付けている。日本では景観法に基づく計画区域内での届出義務はあるが、建築基準法の単体規定として全商業ビル等に景観図面を求める規定はない。ダッカ規則は都市美観の向上を直接的に求めている。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、防火、景観及び保存に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．建築物の避難経路として、日常的に使用しているエレベーターを所管行政庁の特段の指示なしに使用することができる。</p>\n<p>２．公衆公園内において、一般公衆の利便に資する建築物を建築する場合、その面積は公園面積の １０パーセント まで、高さは ６メートル まで認められる。</p>\n<p>３．全ての政府機関の建築物、商業建築物及び大規模な共同住宅（Apartment）の建築にあたっては、適切な景観計画（Landscaping）の図面を備えなければならない。</p>\n<p>４．伝統的建築物の目録の作成及び官報への公示は、各建物の所有者が自らの費用で行わなければならない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第６１条第６号３により、特別な指示がない限り、機械式昇降設備を避難階段として使用してはならない。</p>\n<p>2. 誤り。第６２条第２項により、上限は「面積 ５％ 以内」「高さ ４メートル 以内」である。</p>\n<p><strong>3. 正しい。</strong> 第６２条第１項の規定通りである。</p>\n<p>3. 誤り。第６３条第１項により、目録の作成、公示、通知は「政府（সরকার）」の責務である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13493","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>(গ) দফা (খ)-তে উল্লিখিত তালিকা প্রণয়ন, হালনাগাদ, স্থাপনা সংরক্ষণের ক্ষেত্রে সরকার, গণপ্রজাতন্ত্রী বাংলাদেশ সরকারের প্রধান স্থপতির নেতৃত্বে একটি উপদেষ্টা কমিটি গঠন করিবে এবং উক্ত কমিটিতে কর্তৃপক্ষ, প্রত্নতত্ত্ব অধিদপ্তর, পেশাজীবী প্রতিষ্ঠানের প্রতিনিধি এবং উক্ত বিষয়ে বিশেষজ্ঞ স্থপতি, প্রকৌশলী, পরিকল্পনাবিদ, ইতিহাসবিদ ও শিল্পীগণ সদস্য হিসাবে নিযুক্ত থাকিবেন;</p>\n<p>(ঘ) উক্ত সকল ঐতিহ্যবাহী ইমারত, গুরুত্বপূর্ণ স্থান ও এলাকাসমূহ তালিকাভুক্ত করিবার সময় কোড অনুসারে তিন শ্রেণিতে (গ্রেড-১, গ্রেড-২, গ্রেড-৩) ভাগ করিতে হইবে:</p>\n<p>তবে শর্ত থাকে যে, বাংলাদেশ ন্যাশনাল বিল্ডিং কোড অনুসারে (গ্রেড-১, গ্রেড-২, গ্রেড-৩) শ্রেণিবদ্ধ না হওয়া পর্যন্ত এ সংক্রান্ত বিদ্যমান গেজেটের তালিকাভুক্ত ইমারত গ্রেড-১ হিসাবে নকশা অনুমোদিত হইবে;</p>\n<p>(ঙ) যদি কোনো ব্যক্তি অথবা প্রতিষ্ঠান সংশ্লিষ্ট কর্তৃপক্ষ, ঐতিহ্যবাহী ইমারত, গুরুত্বপূর্ণ স্থান ও এলাকা সংক্রান্ত উপদেষ্টা কমিটি বা প্রত্নতত্ত্ব অধিদপ্তরের অনুমতি ব্যতীত তালিকাভুক্ত ইমারতের কোনো প্রকার পরিবর্তন, পরিবর্ধন, সংযোজন বা ধ্বংস সাধন করে, তাহা হইলে সংশ্লিষ্ট কর্তৃপক্ষ উক্ত ইমারতের মালিক বা দখলদারকে কাজ বন্ধ করিবার নির্দেশ প্রদান করিবে এবং সেইক্ষেত্রে কর্তৃপক্ষ উক্ত জমিতে নির্মাণের জন্য নূতন কোনো ভবনের নকশার অনুমোদন প্রদান করিবে না;</p>\n<p>(চ) ঐতিহ্যবাহী ইমারত, গুরুত্বপূর্ণ স্থান ও এলাকা সংক্রান্ত উপদেষ্টা কমিটি যদি মনে করে যে, কোনো তালিকাভুক্ত ইমারত ও এলাকাসমূহে অবস্থিত গুরুত্বপূর্ণ স্থাপনাসমূহের যথাযথ তত্ত্বাবধান হইতেছে না তাহা হইলে সরকার এইরূপ ইমারত ও গুরুত্বপূর্ণ স্থানসমূহ বাধ্যতামূলক অধিগ্রহণ করিবে;</p>\n<p>(ছ) ঐতিহ্যবাহী ইমারত, গুরুত্বপূর্ণ স্থান ও এলাকাসমূহের চারপাশে ২৫ মিটার সংরক্ষিত এলাকায় স্থাপনা নির্মাণের জন্য প্রস্তাবিত নূতন ইমারতের ক্ষেত্রে নিম্নবর্ণিত শর্তাবলি প্রযোজ্য হইবে;</p>\n<p>(১) গ্রেড-১, তালিকাভুক্ত ঐতিহ্যবাহী ইমারত/স্থাপনার ক্ষেত্রে:</p>\n<p>(i) ঐতিহ্য ইমারত হইতে অন্যূন ৯ মিটার দূরত্ব পর্যন্ত সম্পূর্ণরূপে খালি রাখিতে হইবে এবং উক্ত দূরত্বের মধ্যে কোনো প্রকার নির্মাণ/উন্নয়ন/পরিবর্তন করা যাইবে না;</p>\n<p>(ii) ঐতিহ্যবাহী ইমারত সংলগ্ন ২৫ মিটার দূরত্ব পর্যন্ত ইমারতের উচ্চতা ১৫ মিটার বা সর্বোচ্চ ৪ তলা পর্যন্ত সীমাবদ্ধ থাকিবে (সিঁড়িঘরের উচ্চতা বাদে);</p>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<p>（第６３条（伝統的建築物等）第１項の続き）</p>\n<h5 class=\"h-lv5\">三（গ）　目録の作成、更新及び工作物の保存に関し、政府は主任建築士（Chief Architect）を委員長とする助言委員会を設置しなければならない。当該委員会には専門職団体の代表者、歴史及び芸術の専門家を委員として含めなければならない。</h5>\n<h5 class=\"h-lv5\">四（ঘ）　全ての伝統的建築物等は目録登録に際し、法典（BNBC）に基づき３つの階級（第１級、第２級、第３級）に分類しなければならない。</h5>\n<h6 class=\"h-lv6\"><strong>ただし、</strong> 分類が完了するまでの間、現行の官報により登録されている建築物は第１級として扱う。</h6>\n<h5 class=\"h-lv5\">五（ঙ）　許可を受けることなく登録された建築物について変更、破壊等を行った場合、所管行政庁は工事の停止を命じ、且つ当該敷地における新たな設計承認を行ってはならない。</h5>\n<h5 class=\"h-lv5\">六（চ）　助言委員会が適切な維持管理が行われていないと認める場合、政府は当該建築物及び史跡を強制的に買収（অধিগ্রহণ）しなければならない。</h5>\n<h5 class=\"h-lv5\">七（ছ）　伝統的建築物等の周囲２５メートルの保存区域内において計画される新築建築物は、次に掲げる条件に従わなければならない。</h5>\n<h6 class=\"h-lv6\">１　第１級に登録された伝統的建築物等の場合：</h6>\n<h6 class=\"h-lv6\">ｉ　当該建築物から少なくとも９メートルまでの範囲は完全に空地として維持し、いかなる建築等も行ってはならない。</h6>\n<h6 class=\"h-lv6\">ｉｉ　隣接する２５メートルまでの範囲内においては、建築物の高さは１５メートル又は最大４階までに制限しなければならない（階段室を除く）。</h6>\n<hr class=\"sep\">\n<p>1. <strong>保存対象の階級制（第６３条第４号）</strong>:</p>\n<p>ダッカ規則では伝統的建築物を第１級〜第３級の３段階に分類している。日本の文化財保護法等でも区分はあるが、建築規則という実体法の中で「分類が未完了なら暫定的に第１級（最高位）として扱う」と明記している点は、開発圧力から歴史的遺産を保護しようとする強力な措置である。</p>\n<p>2. <strong>新築建築物に対する距離・高さ制限（第６３条第７号）</strong>:</p>\n<p>登録建築物の周囲２５ｍを保存区域とし、第１級の場合は「９ｍの絶対的な離隔（完全な空地）」と「１５ｍ（４階）の高さ制限」を課している。特定の指定建築物からの「絶対距離（９ｍ）」を新築禁止範囲とする方式は、歴史的建築物の物理的な空間を確保するための独自の強行規定である。</p>\n<p>3. <strong>強制買収規定（第６３条第６号）</strong>:</p>\n<p>管理が不適切である場合に政府が「強制買収」を行う義務を課している。建築関連の規制の中にこの強力な行政権限を直接的に埋め込むことで、所有者に対する保存の動機付けを最大化している。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、伝統的建築物（Heritage Building）の保存及び周辺での建築制限に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．第１級（Grade-1）に登録された伝統的建築物に隣接する敷地において、当該伝統的建築物から ５メートル 離せば、その範囲内での建設が認められる。</p>\n<p>２．伝統的建築物の分類が法典（BNBC）に基づき完了していない場合、現行の官報掲載建築物は暫定的に第３級として扱われる。</p>\n<p>３．第１級の伝統的建築物に隣接する ２５メートル までの保存区域内においては、新築する建築物の高さは １５メートル 又は 最大４階 までに制限される。</p>\n<p>４．登録された伝統的建築物の所有者が当局の許可なく無断で改築を行った場合であっても、所管行政庁は当該敷地における新たな設計承認を拒否することはできない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第６３条第７号１(i)により、第１級の場合は最小 <strong>９メートル</strong> までの離隔が必須である。</p>\n<p>2. 誤り。第４号但書きにより、分類未完了時は <strong>第１級</strong> として扱う。</p>\n<p><strong>3. 正しい。</strong> 第７号１(ii)の規定通りである。</p>\n<p>3. 誤り。第５号により、無断改築等があった場合は新築の設計承認を行ってはならない。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13494","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>(iii) ঐতিহ্যবাহী এলাকার অভ্যন্তরে আলাদাভাবে কোনো তালিকাভুক্ত ইমারত অবস্থিত হইয়া থাকিলেও ঐ ইমারত সংলগ্ন প্লটসমূহের ক্ষেত্রে বিধি ৬১ এর উপ-বিধি (১) ও (২) অনুসরণ করিতে হইবে;</p>\n<p>(iv) তালিকাভুক্ত ঐতিহ্যবাহী ইমারত, গুরুত্বপূর্ণ স্থান ও এলাকাসমূহের ২৫ মিটার পর্যন্ত সংরক্ষিত এলাকার অভ্যন্তরে প্রস্তাবিত নূতন ইমারতের নকশা অনুমোদনের ক্ষেত্রে গাড়ি পার্কিং এর ন্যূনতম নিয়মাবলি শিথিলযোগ্য হইবে এবং ক্ষেত্র বিশেষে কেবল পথচারীর জন্য pedestrian precinct হিসাবে ব্যবহারের নির্দেশনা প্রদান করা যাইবে;</p>\n<p>(v) তালিকাভুক্ত ঐতিহ্যবাহী ইমারত, গুরুত্বপূর্ণ স্থান ও এলাকাসমূহের এবং তাহার সীমানার সমান্তরালে ন্যূনতম সংরক্ষিত এলাকা (যাহা অবশ্যই খালি রাখিতে হইবে) সহ ২৫ মিটার পর্যন্ত সকল ইমারতের ব্যবহারের জন্য স্বল্প পরিসরে পর্যটন বান্ধব ভূমি ব্যবহার করা যাইবে যেমন- দোকানপাট, আর্ট গ্যালারি, মিউজিয়াম, পাঠাগার, প্রদর্শনীস্থল, ইত্যাদি যাহা স্থানীয় ঐতিহ্যের সহিত সংগতিপূর্ণ;</p>\n<p>(২) গ্রেড-২, তালিকাভুক্ত ঐতিহ্যবাহী ইমারত/স্থাপনার ক্ষেত্রে:</p>\n<p>(i) ঐতিহ্যবাহী ইমারত হইতে ন্যূনতম ৯ মিটার দূরত্ব পর্যন্ত সম্পূর্ণরূপে খালি রাখিতে হইবে এবং উক্ত দূরত্বের মধ্যে কোনো প্রকার নির্মাণ/ উন্নয়ন/ পরিবর্তন করা যাইবে না;</p>\n<p>(ii) ঐতিহ্যবাহী ইমারত, গুরুত্বপূর্ণ স্থান ও এলাকাসমূহের জন্য সংরক্ষিত ৯ মিটার দূরত্ব পরবর্তী সংলগ্ন প্লটসমূহে এই বিধিমালা অনুসরণ করিয়া নূতন ভবন নির্মাণ করা যাইবে;</p>\n<p>(iii) ব্যক্তি বা বেসরকারি প্রতিষ্ঠানের মালিকানাধীন তালিকাভুক্ত ঐতিহ্যবাহী ইমারত, গুরুত্বপূর্ণ স্থান ও এলাকাসমূহের জন্য সংরক্ষিত অংশে উন্নয়ন বিঘ্নিত হইলে অন্য এলাকায় উন্নয়ন স্বত্ব হস্তান্তর ও নির্মাণের অনুমতিপত্র TDR (Transfer of Development Right) এর নীতিমালা অনুসরণপূর্বক আবেদন করা যাইবে;</p>\n<p>(৩) গ্রেড-৩, তালিকাভুক্ত ঐতিহ্যবাহী ইমারত/স্থাপনার ক্ষেত্রে:</p>\n<p>(i) তালিকাভুক্ত ঐতিহ্যবাহী ইমারতের জন্য শুধু রাস্তা সংলগ্ন সেটব্যাক এলাকার আদিভবনের অংশটুকু সংরক্ষণ করিতে হইবে;</p>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<p>（第６３条（伝統的建築物等）第７号の続き）</p>\n<h6 class=\"h-lv6\"><strong>ｉｉｉ</strong>　伝統的地域（Heritage area）内に個別に登録された建築物が存する場合であっても、隣接敷地については本規則の規定を遵守しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>ｉｖ</strong>　登録された伝統的建築物等の周囲２５メートルまでの保存区域内における設計承認にあたっては、駐車場の最小附置義務台数を緩和することができ、また当該区域を歩行者専用区域（Pedestrian precinct）として指定できる。</h6>\n<h6 class=\"h-lv6\"><strong>ｖ</strong>　伝統的建築物等から２５メートルまでの範囲内にある全ての建築物の用途については、店舗、博物館等、地域の伝統と調和する小規模な観光親和的土地利用に供することができる。</h6>\n<h5 class=\"h-lv5\"><strong>２　第２級に登録された伝統的建築物等の場合：</strong></h5>\n<h6 class=\"h-lv6\"><strong>ｉ</strong>　伝統的建築物から少なくとも９メートルまでの範囲は完全に空地として維持しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>ｉｉ</strong>　保存される９メートルの離隔距離を超えた隣接敷地においては、本規則に従って新築することができる。</h6>\n<h6 class=\"h-lv6\"><strong>ｉｉｉ</strong>　個人又は民間機関が所有する伝統的建築物等において保存区域設定により開発が妨げられる場合、開発権移転（TDR）の指針に基づき、他区域への開発権移転を申請できる。</h6>\n<h5 class=\"h-lv5\"><strong>３　第３級に登録された伝統的建築物等の場合：</strong></h5>\n<h6 class=\"h-lv6\"><strong>ｉ</strong>　登録された伝統的建築物について、道路に接する壁面後退（セットバック）区域内にある当初の建築物（Original building）の部分のみを保存しなければならない。</h6>\n<hr class=\"sep\">\n<p>1. <strong>保存区域内における歩行者優先化権限（第６３条第７項第１号ｉｖ）</strong>:</p>\n<p>伝統的建築物の周辺２５ｍ以内において、当局が駐車場附置義務を緩和し、更にその区域を「歩行者専用区域」として指定する権限を有することを規定している。建築規則そのものの中で「歩行者専用化の指示」を設計承認の条件として組み込んでいる点は、強力な都市デザインの行使である。</p>\n<p>2. <strong>開発制限に対する補償としてのTDR制度（第６３条第７項第２号ｉｉｉ）</strong>:</p>\n<p>第２級登録建築物の所有者が保存義務により開発が制限される場合、「開発権移転（TDR）」の申請を認めている。ダッカ規則では文化財保存による「不利益」に対する具体的な救済手段としてTDRを法典内で直接マッピングしており、保存と開発の権利調整をシステム化している。</p>\n<p>3. <strong>部分保存の明確な定義（第６３条第７項第３号ｉ）</strong>:</p>\n<p>第３級登録建築物に対し、「道路側のセットバック区域内にある当初の建物部分のみを保存する」という非常に限定的な保存義務を課している。正面性（ファサード）のみを死守しようとする、極めて実務的な都市景観管理の手法である。</p>\n<hr class=\"sep\">\n<p><strong>問題：ダッカ首都圏建築規則2025における、伝統的建築物（Heritage Building）の保存及び開発権に関する次の記述のうち、正しいものはどれか。</strong></p>\n<p>１．第１級の伝統的建築物に隣接する ２５メートル までの保存区域内においては、観光親和的な土地利用（店舗等）であっても設置が禁じられている。</p>\n<p>２．第２級の伝統的建築物の所有者は、保存義務によって開発が著しく妨げられる場合であっても、開発権移転（TDR）の申請を行うことはできない。</p>\n<p>３．第３級に登録された伝統的建築物については、建物全体を保存する必要はなく、道路に接する壁面後退区域内の当初の建築物部分のみを保存すれば足りる。</p>\n<p>４．伝統的建築物の周辺保存区域内においては、駐車場の最小附置義務台数を緩和することは一切認められない。</p>\n<p>* <strong>解説</strong>:<span style=\"color: #ffffff;\"></p>\n<p><strong>正解：３</strong></p>\n<p>1. 誤り。第６３条第７項第１号ｖにより、２５ｍの範囲内であれば観光親和的な用途への供用が可能である。</p>\n<p>2. 誤り。第７項第２号ｉｉｉにより、開発が妨げられる場合は開発権移転（TDR）の申請が可能である。</p>\n<p><strong>3. 正しい。</strong> 第７項第３号ｉの規定通りである。</p>\n<p>3. 誤り。第７項第１号ｉｖにより、当該区域内においては駐車場義務は「緩和可能（শিথিলযোগ্য）」である。</span></p>\n<hr class=\"sep\">\n<hr class=\"sep\">"},{"num":"13495","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>(ii) ক্রমিক নং ১ এ উল্লিখিত আদি স্থাপনার অংশটুকু সংরক্ষণ পূর্বক পরবর্তী ভূমিতে বিদ্যমান ইমারত বিধিমালা অনুযায়ী নতুন ভবন নির্মাণ করা যাইবে;</p>\n<p>(iii) নূতন ভবনটি আদি স্থাপনার অংশটুকুর সংলগ্ন বা সম্মুখ সেটব্যাক ব্যতীত করা যাইবে এবং পার্শ্ববর্তী সেটব্যাক বিধিমালা অনুযায়ী করিতে হইবে।</p>\n<p>(২) ঐতিহ্যবাহী ইমারত, গুরুত্বপূর্ণ স্থান ও এলাকাসমূহের কারণে সংরক্ষিত এলাকায় যেকোনো প্লটের উচ্চতা, সেটব্যাক বা ভূমি আচ্ছাদন নিয়ন্ত্রিত হইলে এবং সেই প্লটসমূহের যে কোনোটিতে প্রাপ্ত FAR সূচক সম্পূর্ণভাবে ব্যবহার করা সম্ভব না হইলে কর্তৃপক্ষের নির্ধারিত ফরমে মালিকের আবেদনের প্রেক্ষিতে উক্ত প্লটে ব্যবহৃত FAR সূচকের অবশিষ্টাংশটুকু অন্য এলাকায় হস্তান্তর ও নির্মাণের অনুমতিপত্র TDR নীতিমালা অনুসরণপূর্বক করিতে পারিবে এবং উক্ত TDR সংক্রান্ত অনুমতি পত্রে নিম্নবর্ণিত বিষয়সমূহ উল্লিখিত থাকিবে, যথা:—</p>\n<p>(ক) যে প্লটের ক্ষেত্রে FAR সূচক সম্পূর্ণ ব্যবহৃত হয় নাই, সেই প্লটের অবস্থান, মালিকের নাম ও ঠিকানা;</p>\n<p>(খ) অব্যবহৃত FAR সূচকের পরিমাণ ও ক্ষেত্রফল (বর্গমিটারে);</p>\n<p>(গ) অব্যবহৃত FAR সূচক অনুযায়ী প্রাপ্য ক্ষেত্রফল অন্য যে এলাকায় কোনো প্রকল্পের জন্য FAR সূচক অনুযায়ী প্রাপ্য ক্ষেত্রফলের সহিত অতিরিক্ত ক্ষেত্রফল হিসাবে সংযুক্ত করা হইবে সেই এলাকার নাম ও ভূমি ব্যবহারের ধরন (আবাসিক ব্যতিরেকে);</p>\n<p>(ঘ) অব্যবহৃত FAR সূচক অনুযায়ী প্রাপ্ত এই অতিরিক্ত ক্ষেত্রফল ন্যূনতম ১৮ মিটার প্রশস্ত রাস্তার পাশে অবস্থিত প্লটে মহাপরিকল্পনা অনুসরণপূর্বক ব্যবহার করা যাইবে;</p>\n<p>(ঙ) অনুমতিপত্র (TDR Certificate) একের অধিকবার হস্তান্তর যোগ্য নহে।</p>\n<h4 class=\"h-lv4\"><strong>৬৪। বন্যাপ্রবণ অঞ্চল, জলাভূমির নিকটস্থ এবং পাহাড়ি এলাকায় উন্নয়ন ও নির্মাণ।</strong>—</h4>\n<h5 class=\"h-lv5\">(১) বন্যাপ্রবণ অঞ্চল, জলাশয়ের নিকটস্থ বা পাহাড়ি এলাকায় অবস্থিত সাইটের ক্ষেত্রে ভূমি ভরাট ও খননকালে কর্তৃপক্ষের অনুমোদন গ্রহণ করিতে হইবে এবং এতদ্বিষয়ে বিশদ অঞ্চল পরিকল্পনায় বর্ণিত বিধানাবলি অনুযায়ী অতিরিক্ত শর্ত প্রযোজ্য হইবে।</h5>\n<h5 class=\"h-lv5\">(২) ভূমি ভরাট ও খনন এলাকাসমূহ স্পষ্টরূপে প্রদর্শন করিতে হইবে এবং নিম্নবর্ণিত তথ্যসমূহ পেশ করিতে হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) সাইট ও সাইট সন্নিহিত রাস্তাসমূহের বিদ্যমান কন্ট্যুর (Contour), স্পট লেভেল ও ভূমির ঢাল; এবং</h6>\n<hr class=\"sep\">","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<p>（第６３条（伝統的建築物等）第３項（ｉ）の続き）</p>\n<h6 class=\"h-lv6\"><strong>ｉｉ</strong>　当初の工作物の一部を保存することを条件として、残余の敷地部分については現行の建築規則に従って新築することができる。</h6>\n<h6 class=\"h-lv6\"><strong>ｉｉｉ</strong>　新築建築物は、当該保存すべき工作物の一部に接して建築することができる。</h6>\n<h5 class=\"h-lv5\"><strong>２</strong>　伝統的建築物等の保存区域内において、高さや建蔽率が制限されることにより指定容積率（FAR）を完全に消化することが困難な場合、所有者は申請により未消化分を他の区域へ移転できる。許可証（TDR Certificate）には次に掲げる事項を記載しなければならない。</h5>\n<h6 class=\"h-lv6\">一　容積率が完全に消化されなかった敷地の位置及び所有者情報</h6>\n<h6 class=\"h-lv6\">二　未消化分の容積率の数値及び床面積</h6>\n<h6 class=\"h-lv6\">三　割増床面積を充当する移転先区域の名称及び土地利用区分（住宅用途を除く）</h6>\n<h6 class=\"h-lv6\">四　移転された床面積は、幅員１８メートル以上の道路に接する敷地において使用しなければならない。</h6>\n<h6 class=\"h-lv6\">五　開発権移転許可証（TDR Certificate）は、二回以上譲渡してはならない。</h6>\n<h4 class=\"h-lv4\"><strong>第６４条（洪水多発区域、湿地近傍及び丘陵地帯における開発及び建築）</strong></h4>\n<h5 class=\"h-lv5\">１　洪水多発区域、水域近傍又は丘陵地帯（পাহাড়ি এলাকা）に所在する敷地において、盛土又は掘削
