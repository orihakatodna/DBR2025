 অনুমোদনের আবেদন, প্রয়োজনে, যুক্তিসংগত শর্ত সাপেক্ষে, অনুমোদন অথবা প্রত্যাখ্যান করিতে পারিবে。</h6>\n<h6 class=\"h-lv6\">(৫) আবেদনকারীর কোনো তথ্যের ঘাটতি থাকিলে অথবা কোনো অতিরিক্ত তথ্যের প্রয়োজন হইলে উহা আবেদনকারীকে অবহিত করিতে হইবে এবং অনুরূপ অবহিতকরণের ৩০ (ত্রিশ) দিন অতিবাহিত হইবার পরও কোনো তথ্য প্রদান বা জবাব পাওয়া না গেলে আবেদন প্রত্যাখ্যান করা যাইবে।</h6>\n<h6 class=\"h-lv6\">(৬) যদি কোনো আবেদনকারী মহাপরিকল্পনায় বর্ণিত ভূমি ব্যবহারের উদ্দেশ্য ব্যতীত অন্য কোনো উদ্দেশ্যে ভূমি ব্যবহারের আবেদন করে তাহা হইলেও উক্ত আবেদন প্রত্যাখ্যান করা যাইবে।</h6>\n<h6 class=\"h-lv6\">(৭) পরিকল্পনা অনুমোদন কোনো উন্নয়ন বা নির্মাণ কাজের অনুমতি বলিয়া গণ্য হইবে না এবং ইহা আবেদনকারীকে কোনোরূপ কাজ আরম্ভ বা সম্পাদনের অধিকার প্রদান করিবে না।</h6>\n<h6 class=\"h-lv6\">(৮) পরিকল্পনা অনুমোদনপত্রের কোনো শর্ত লঙ্ঘন বা মালিকানা সংক্রান্ত মিথ্যা তথ্য প্রদান করা হইলে পরিকল্পনা অনুমোদনপত্র বাতিল করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৯) উপ-বিধি (৮) অনুযায়ী কোনো পরিকল্পনা অনুমোদন বাতিল হইলে বিষয়টি ভবন মালিক ও সংশ্লিষ্ট সকলকে কর্তৃপক্ষ কর্তৃক অবহিত করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(১০) পরিকল্পনা অনুমোদন বাতিল হইবার সঙ্গে সঙ্গে নির্মাণ অনুমোদনপত্র ও বসবার বা ব্যবহার সনদ বাতিল করিতে হইবে এবং কর্তৃপক্ষ সংশ্লিষ্ট সকলকে বিষয়টি অবহিত করিবে।</h6>\n<h5 class=\"h-lv5\"><strong>৭। পরিকল্পনা অনুমোদন প্রত্যাখ্যানের বিরুদ্ধে আপিল।</strong></h5>\n<h6 class=\"h-lv6\">(১) কোনো পরিকল্পনা অনুমোদনের আবেদন প্রত্যাখ্যান করা হইলে, আবেদনকারী উক্তরূপে প্রত্যাখ্যাত হইবার ৩০ (ত্রিশ) দিনের মধ্যে পরিশিষ্ট ৪ এ বর্ণিত ফি পরিশোধ সাপেক্ষে, কর্তৃপক্ষের চেয়ারম্যান বরারর আপিল করিতে পারিবে।</h6>\n<h6 class=\"h-lv6\">(২) উপ-বিধি (১) এর অধীন কোনো আপিল আবেদন প্রাপ্তির ৩০ (ত্রিশ) দিনের মধ্যে চেয়ারম্যান আপিল আবেদনের বিষয়ে সিদ্ধান্ত প্রদান করিবেন।</h6>\n<hr class=\"sep\">"},{"num":"13425","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第７条（計画承認の却下に対する不服申立て）（承前）</strong></h5>\n<h6 class=\"h-lv6\">３　第２項の規定による不服申立ての決定に不服がある者は、当該決定の通知を受けた日から３０日以内に、付録４に定める手数料を納付した上で、政府（Government）に対し再度不服申立てをすることができる。</h6>\n<h6 class=\"h-lv6\">４　前項の規定による不服申立てを受理したときは、政府は受理した日から６０日以内に当該申立てに関する決定を行わなければならない。</h6>\n<h6 class=\"h-lv6\">５　第４項の規定による不服申立ての決定に不服がある者は、当該決定の通知を受けた日から１５日以内に、政府に対し再審査の請求をすることができる。政府は、当該再審査の請求を受理した日から３０日以内にこれを裁決しなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第８条（計画承認書の有効期間）</strong></h5>\n<h6 class=\"h-lv6\">１　計画承認（Planning Permit）の有効期間は、確認済証（Construction Permit）の申請を行うため、承認の日から<strong>２年</strong>とする。</h6>\n<h6 class=\"h-lv6\">２　前項に規定する期間が経過する前に、申請者は、付録４に定める手数料を納付した上で、計画承認の更新を申請することができる。</h6>\n<h6 class=\"h-lv6\">３　前項の規定による更新の申請を受けたときは、所管行政庁は、法、都市計画（Master Plan）、法典（Code）及び本規則の関連規定に適合する場合に限り、有効期間満了の日から<strong>１年間</strong>に限り、計画承認を更新することができる。</h6>\n<h6 class=\"h-lv6\">４　計画承認又は、該当する場合、更新された計画承認の有効期間が満了したときは、新たに計画承認を受けなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第９条（確認済証の申請）</strong></h5>\n<h6 class=\"h-lv6\">１　建築物若しくは工作物を新築し、又は既存の建築物若しくは工作物の用途変更、増築若しくは改築をしようとする者（国、地方公共団体、民間企業又は法人を含む。）は、法、本規則及び関連規定に基づき、所管行政庁に対し確認済証（Construction Permit）の申請をしなければならない。</h6>\n<h6 class=\"h-lv6\">２　前項の申請書には、次に掲げる図書を添えなければならない。</h6>\n<h6 class=\"h-lv6\">一　計画承認書（Planning Permit）</h6>\n<h6 class=\"h-lv6\">二　専門技術者選任届：申請者と専門技術者が契約を締結したことを証する<strong>３００タカの非司法印紙（Non-judicial stamp）</strong>による連署の誓約書、及び申請者が法人である場合にあっては当該専門技術者の選任状</h6>\n<h6 class=\"h-lv6\">三　所定の縮尺による設計図書：法典（Code）に基づき作成された意匠、構造、電気設備、機械設備及び給排水衛生設備の各設計図</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৭। পরিকল্পনা অনুমোদন প্রত্যাখ্যানের বিরুদ্ধে আপিল (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(৩) উপ-বিধি (২) এর অধীন আপিলে প্রদত্ত সিদ্ধান্তের বিরুদ্ধে কোনো পক্ষ সংক্ষুব্ধ হইলে তিনি উক্ত সিদ্ধান্ত প্রাপ্তির ৩০ (ত্রিশ) দিনের মধ্যে পরিশিষ্ট ৪ এ বর্ণিত ফি পরিশোধ সাপেক্ষে, সরকার বরারর পুনরায় আপিল করিতে পারিবেন।</h6>\n<h6 class=\"h-lv6\">(৪) উপ-বিধি (৩) এর অধীন কোনো আপিল আবেদন প্রাপ্তির ৬০ (ষাট) দিনের মধ্যে সরকার আপিল আবেদনের বিষয়ে সিদ্ধান্ত প্রদান করিবেন।</h6>\n<h6 class=\"h-lv6\">(৫) উপ-বিধি (৪) এর অধীন আপিলে প্রদত্ত সিদ্ধান্তের বিরুদ্ধে উক্ত সিদ্ধান্ত প্রাপ্তির ১৫ (পনেরো) দিনের মধ্যে সরকার বরারর উহা পুনর্বিবেচনার আবেদন করা যাইবে এবং সরকার এইরূপ পুনর্বিবেচনার আবেদন ৩০ (ত্রিশ) দিনের মধ্যে নিষ্পত্তি করিবে।</h6>\n<h5 class=\"h-lv5\"><strong>৮। পরিকল্পনা অনুমোদনপত্রের মেয়াদ।</strong></h5>\n<h6 class=\"h-lv6\">(১) পরিকল্পনা অনুমোদনপত্র প্রাপ্তির পর নকশা অনুমোদনের আবেদন দাখিলের নিমিত্ত পরিকল্পনা অনুমোদনপত্রের মেয়াদ হইবে অনুমোদনের তারিখ হইতে ২ (দুই) বৎসর।</h6>\n<h6 class=\"h-lv6\">(২) উপ-বিধি (১) এ বর্ণিত মেয়াদ উত্তীর্ণ হইবার পূর্বে কোনো আবেদনকারী, পরিশিষ্ট ৪ এ বর্ণিত ফি পরিশোধপূর্বক, পরিকল্পনা অনুমোদনপত্র নবায়নের জন্য আবেদন করিতে পারিবেন।</h6>\n<h6 class=\"h-lv6\">(৩) উপ-বিধি (২) এর অধীন নবায়নের কোনো আবেদন প্রাপ্তির পর কর্তৃপক্ষ, আইন, মহাপরিকল্পনা, কোড এবং এই বিধিমালার সংশ্লিষ্ট বিধির সহিত সংগতিপূর্ণ হওয়া সাপেক্ষে, অনুমোদনপত্রের মেয়াদ অতিক্রান্ত হইবার পর হইতে অনুমোদনপত্রে উল্লিখিত মহাপরিকল্পনার অনুরূপ প্রস্তাবনা বলবৎ থাকা সাপেক্ষে, এক বৎসরের জন্য পরিকল্পনা অনুমোদনপত্র নবায়ন করিতে পারিবে।</h6>\n<h6 class=\"h-lv6\">(৪) পরিকল্পনা অনুমোদনপত্র বা, প্রযোজ্য ক্ষেত্রে, নবায়নকৃত পরিকল্পনা অনুমোদনপত্রের মেয়াদ উত্তীর্ণ হইলে নূতন করিয়া পরিকল্পনা অনুমোদন গ্রহণ করিতে হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>৯। নির্মাণ অনুমোদনপত্রের আবেদন।</strong></h5>\n<h6 class=\"h-lv6\">(১) কোনো ব্যক্তি, সরকারি, আধা-সরকারি, বেসরকারি বা স্বায়ত্তশাসিত সংস্থা নূতন কোনো ইমারত বা স্থাপনা নির্মাণ করিতে চাহিলে অথবা বিদ্যমান ইমারত বা স্থাপনা পরিবর্তন বা সংযোজন করিতে চাহিলে আইন, এই বিধিমালা এবং সংশ্লিষ্ট বিধি-বিধান অনুযায়ী কর্তৃপক্ষের নিকট হইতে নির্মাণ অনুমোদনপত্রের আবেদন করিতে হইবে。</h6>\n<h6 class=\"h-lv6\">(২) উপ-বিধি (১) এ উল্লিখিত আবেদনের সহিত নিম্নবর্ণিত তথ্য, কাগজাদি ও নকশা দাখিল করিতে হইবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) পরিকল্পনা অনুমোদনপত্র;</h6>\n<h6 class=\"h-lv6\">(খ) কারিগরি নিয়োগ পত্র: প্রকল্পে আবেদনকারী এবং কারিগরি ব্যক্তি চুক্তিবদ্ধ হইয়াছেন মর্মে ৩০০ (তিনশত) টাকার ননজুডিসিয়াল স্ট্যাম্পে যৌথ স্বাক্ষরে অঙ্গীকারনামা এবং আবেদনকারী প্রতিষ্ঠানের ক্ষেত্রে কারিগরি ব্যক্তির নিয়োগপত্র;</h6>\n<h6 class=\"h-lv6\">(গ) নির্ধারিত স্কেলে প্রয়োজনীয় নকশা: নকশা অনুমোদনের জন্য কোড অনুসরণপূর্বক স্থাপত্য, কাঠামোগত, ইলেকট্রিক্যাল, মেকানিক্যাল, এবং প্লাম্বিং নকশা;</h6>\n<hr class=\"sep\">"},{"num":"13426","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第９条（確認済証の申請）（承前）</strong></h5>\n<h6 class=\"h-lv6\">２（承前）</h6>\n<h6 class=\"h-lv6\">ঘ　個人又は民間機関による申請にあっては、最新の所得税確定申告書受領証（Income tax return slip）</h6>\n<h6 class=\"h-lv6\">ঙ　オンラインシステムにより取得した計画承認（Planning Permit）に係る関連情報</h6>\n<h6 class=\"h-lv6\">চ　法典（Code）に準拠した技術者による設計報告書</h6>\n<h6 class=\"h-lv6\">ছ　<strong>損害賠償保証書（Indemnity bond）</strong>：深基礎（Deep foundation）工事、杭打ち工事、地階（Basement）又は地下階の築造工事を行う場合にあっては、所管行政庁が承認する様式により申請者が署名した損害賠償保証書</h6>\n<h6 class=\"h-lv6\">３　前項に規定する書類のほか、**特殊建築物（Special Building）を建築する場合又は適用がある場合にあっては、次に掲げる書類を提出しなければならない。</h6>\n<h6 class=\"h-lv6\">ａ　道路築造のための土地提供に係る地役権設定証書（Easement deed）</h6>\n<h6 class=\"h-lv6\">ｂ　火災安全及び消火設計図</h6>\n<h6 class=\"h-lv6\">ｃ　所管行政庁による開発業者（Developer）登録証の写し</h6>\n<h6 class=\"h-lv6\">ｄ　地役権設定証書</h6>\n<h6 class=\"h-lv6\">ｅ　消防・民間防衛局の無異議証明書（NOC）</h6>\n<h6 class=\"h-lv6\">ｆ　重要拠点（KPI）又は文化遺産（Heritage）に関する事項に係る関連省庁、部門又は機関の無異議証明書</h6>\n<h6 class=\"h-lv6\">ｇ　駐屯地委員会（Cantonment Board）、国家住宅公社（NHA）、公務員局（PWD）、ダッカ・マス・トランジット会社（DMTCL）、民間航空局（CAAB）又は関連機関の承認書</h6>\n<h6 class=\"h-lv6\">ｈ　従前の承認済み設計図（存する場合に限る。）</h6>\n<h6 class=\"h-lv6\">ｉ　縮尺１：１００による特殊建築物の配置図（Layout drawing）**。当該図面には次に掲げる事項を記載しなければならない。</h6>\n<p>####### 一　敷地の各辺の寸法及び敷地境界線</p>\n<p>####### 二　適用がある場合において、敷地内の建築物の外形、建築物の外壁寸法、建築物の高さ、階数及び義務的外壁後退距離（Mandatory setbacks）の寸法</p>\n<p>####### 三　適用がある場合において、敷地内の建築物及び工作物の計画位置及び現況位置、池又は水域の位置、庭園を含むその他の区域、低地、開放草地、森林等の位置</p>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৯। নির্মাণ অনুমোদনপত্রের আবেদন (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(২) (চলমান)</h6>\n<h6 class=\"h-lv6\">(ঘ) ব্যক্তি বা বেসরকারি প্রতিষ্ঠানের আবেদনের ক্ষেত্রে হালনাগাদ আয়কর রিটার্ন স্লিপ;</h6>\n<h6 class=\"h-lv6\">(ঙ) অনলাইন সিস্টেম হইতে প্রাপ্ত পরিকল্পনা অনুমোদন পত্র সংশ্লিষ্ট তথ্যাদি;</h6>\n<h6 class=\"h-lv6\">(চ) কোড অনুসরণপূর্বক প্রকৌশলীর ডিজাইন প্রতিবেদন; এবং</h6>\n<h6 class=\"h-lv6\">(ছ) ইনডেমিনিটি বন্ড: গভীর ভিত্তি (foundation) নির্মাণ, পাইলিং, বেজমেন্ট বা ভূগর্ভস্থ তলা নির্মাণ কাজের ক্ষেত্রে কর্তৃপক্ষ অনুমোদিত ফরমে আবেদনকারী কর্তৃক স্বাক্ষরিত ইনডেমিনিটি বন্ড (Indemnity bond)。</h6>\n<h6 class=\"h-lv6\">(৩) উপ-বিধি (২) এ উল্লিখিত কাগজাদি ছাড়াও বিশেষ ইমারত নির্মাণ বা, প্রযোজ্য ক্ষেত্রে, নিম্নবর্ণিত কাগজাদি দাখিল করিতে হইবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) রাস্তার জন্য জমি সমর্পণের ইজমেন্ট দলিল;</h6>\n<h6 class=\"h-lv6\">(খ) অগ্নিনিরাপত্তা ও নির্বাপণ নকশা;</h6>\n<h6 class=\"h-lv6\">(গ) কর্তৃপক্ষ কর্তৃক ডেভেলপারের নিবন্ধনের কপি;</h6>\n<h6 class=\"h-lv6\">(ঘ) ইজমেন্ট দলিল;</h6>\n<h6 class=\"h-lv6\">(ঙ) ফায়ার সার্ভিস ও সিভিল ডিফেন্স অধিদপ্তরের অনাপত্তিপত্র;</h6>\n<h6 class=\"h-lv6\">(চ) Key Point Installation (কেপিআই) বা হেরিটেজ সংক্রান্ত বিষয়ে সংশ্লিষ্ট মন্ত্রণালয়, বিভাগ বা প্রতিষ্ঠানের অনাপত্তিপত্র;</h6>\n<h6 class=\"h-lv6\">(ছ) ক্যান্টনমেন্ট বোর্ড, জাতীয় গৃহায়ন কর্তৃপক্ষ, গণপূর্ত অধিদপ্তর, ঢাকা ম্যাস ট্রানজিট কোম্পানি লিমিটেড, বেসরকারি বিমান চলাচল কর্তৃপক্ষ বা সংশ্লিষ্ট প্রতিষ্ঠানের অনুমোদনপত্র;</h6>\n<h6 class=\"h-lv6\">(জ) পূর্বতন অনুমোদিত নকশা, যদি থাকে;</h6>\n<h6 class=\"h-lv6\">(ঝ) বিশেষ ইমারতের ১:১০০ স্কেলে অঙ্কিত লে-আউট ড্রইং যাহাতে মধ্যে নিম্নবর্ণিত তথ্যসমূহ সন্নিবেশিত থাকিবে, যথা:—</h6>\n<p>####### (১) সাইটের সকল দিকের মাপ ও সীমানা;</p>\n<p>####### (২) প্রযোজ্য ক্ষেত্রে, সাইটের উপর স্থাপিত ভবনসমূহের পরিসীমা, ভবনসমূহের বহিঃস্থ অংশের মাপ, উচ্চতা, তলার সংখ্যা ও বাধ্যতামূলক উন্মুক্ত স্থানের মাপ;</p>\n<p>####### (৩) প্রযোজ্য ক্ষেত্রে, সাইটের উপর অবস্থিত ভবন ও কাঠামোসমূহের প্রস্তাবিত ও বিদ্যমান অবস্থান, পুকুর বা জলাশয়ের অবস্থান, বাগানসহ অন্যান্য এলাকা, নিচুভূমি, উন্মুক্ত তৃণভূমি, বনাঞ্চল, ইত্যাদি;</p>\n<hr class=\"sep\">"},{"num":"13427","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第９条（確認済証の申請）（承前）</strong></h5>\n<h6 class=\"h-lv6\">３（承前）</h6>\n<h6 class=\"h-lv6\">ঝ　特殊建築物の配置図（承前）：</h6>\n<p>####### 四　区域及び道路の名称並びにその幅員</p>\n<p>####### 五　隣接道路及びその幅員との関係を考慮した当該敷地の方位（Indication of directions）、敷地に接する道路の幅員、並びに私道にあっては当該道路の全延長及び幅員</p>\n<p>####### 六　道路から敷地への出入口（Entrance / Exit）に設置される門の位置、並びに計画建築物及び既存建築物の周囲の排水施設（存する場合に限る。）の位置及び排水方向の指示</p>\n<p>####### 七　地下貯水槽、浄化槽（Septic tank）、浸透桝、汚水処理施設（STP）及び公共下水道への接続箇所の位置（存する場合に限る。）</p>\n<p>####### 八　敷地内における廃棄物集積所の位置</p>\n<p>####### 九　計画承認（Planning Permit）時に承認された全ての概念設計図、衛星写真、地図、並びに（適用がある場合）関連機関の無異議証明書（NOC）及び計画報告書</p>\n<p>####### 十　複数の建築物、その他の構造物又は工作物を含む特殊建築物にあっては、計画承認書に添付されたマスタープラン。当該図面には、全ての建築物若しくは構造物の配置、道路の形状、地上に存する全ての物件、並びに樹木、山、池、土工事（切土又は盛土）の範囲及び公共施設の位置を表示しなければならない。</p>\n<h6 class=\"h-lv6\"><strong>ঞ</strong>　地階（Basement）及び中二階（Mezzanine）を含む各階平面図（縮尺１：１００）。当該図面には次に掲げる事項を記載しなければならない。</h6>\n<h6 class=\"h-lv6\">一　開口部（窓及び扉）の位置を伴う全ての室及び空地の寸法、形状、位置並びに用途</h6>\n<h6 class=\"h-lv6\">二　階段室、エレベーターシャフト、スロープ、非常階段の位置及び配置図</h6>\n<h6 class=\"h-lv6\">三　屋根伏図。これには雨水排水計画、テラス（存する場合に限る。）、並びに（適用がある場合）エレベーター機械室、階段室屋根、非常出口、屋上固定貯水槽及び排水経路を表示しなければならない。</h6>\n<h6 class=\"h-lv6\">四　適用がある場合において、出入口（Entrance / Exit）、ドロップオフ・ベイ（Dropping bay）、車路及び駐車スペースを表示した駐車場計画並びに警備員室（Security post）の位置</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৯। নির্মাণ অনুমোদনপত্রের আবেদন (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(৩) (চলমান)</h6>\n<h6 class=\"h-lv6\">(ঝ) বিশেষ ইমারতের লে-আউট ড্রইং (চলমান)</h6>\n<p>####### (৪) এলাকা ও রাস্তাসমূহের নাম, প্রস্থ;</p>\n<p>####### (৫) পার্শ্ববর্তী রাস্তা ও তাহাদের প্রস্থের সঙ্গে সম্পর্ক বিবেচনা করিয়া সংশ্লিষ্ট সাইট ও প্লটের দিকসমূহের নির্দেশক (indication of directions), সাইটের সহিত সংযুক্ত রাস্তার প্রস্থ এবং ব্যক্তিগত বা নিজেদের রাস্তার ক্ষেত্রে সমগ্র রাস্তার দৈর্ঘ্য ও প্রস্থ;</p>\n<p>####### (৬) রাস্তা হইতে সাইটের প্রবেশ পথ (entrance) ও নির্গমন পথের (exit) উপর স্থাপিত গেটের অবস্থান, প্রস্তাবিত ও বিদ্যমান ইমারতসমূহের চারপাশ ঘিরে নর্দমার (ড্রেইন), যদি থাকে, অবস্থান ও পানিপ্রবাহের দিক নির্দেশক;</p>\n<p>####### (৭) ভূগর্ভস্থ জলাধার, সেপটিক ট্যাংক, সোক পিট, Sewerage Treatment Plant ও পয়ঃনিষ্কাশন লাইনের সহিত সংযোগসমূহের অবস্থান, যদি থাকে;</p>\n<p>####### (৮) সাইটের অভ্যন্তরে বর্জ্য বা আবর্জনা সংগ্রহস্থলের অবস্থান;</p>\n<p>####### (৯) নির্মাণ অনুমোদনের আবেদনের সহিত পরিকল্পনা অনুমোদনপত্র প্রদানকালে অনুমোদনকৃত সকল ধারণাগত নকশা, স্যাটেলাইট ইমেজ, ম্যাপ, প্রযোজ্য ক্ষেত্রে, অন্যান্য সংস্থার অনাপত্তি, পরিকল্পনা প্রতিবেদন;</p>\n<p>####### (১০) একাধিক ভবন, অন্যান্য কাঠামো ও স্থাপনা অন্তর্ভুক্ত রহিয়াছে এইরূপ বিশেষ ইমারতের ক্ষেত্রে প্রস্তুতকৃত একটি মাস্টারপ্ল্যান যাহা পরিকল্পনা অনুমোদনপত্রের সহিত সংযুক্ত এবং যাহাতে সকল ভবন বা কাঠামো, রাস্তাসমূহের লে-আউট, ভূমির উপর অবস্থিত সকল বস্তু ও সকল ভৌগোলিক উপাদান, যেমন- গাছ, পাহাড়, পুকুর বা জলাশয়, মাটি খনন বা মাটি ফরাট, ইত্যাদির অবস্থান, পরিসীমা ও নাগরিক সুবিধাসমূহ প্রদর্শিত থাকে;</p>\n<h6 class=\"h-lv6\"><strong>(ঞ)</strong> বেজমেন্ট ও মেজানাইন (mezzanine) তলাসহ ভবনের সকল তলার ১:১০০ স্কেলে অঙ্কিত ফ্লোর প্ল্যান যাহাতে নিম্নবর্ণিত তথ্যসমূহ সন্নিবেশিত থাকিবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(১) দরজা ও জানালার অবস্থান সহকারে সকল কক্ষ ও ফাঁকা জায়গার মাপ, আকার, অবস্থান ও ব্যবহার;</h6>\n<h6 class=\"h-lv6\">(২) সিঁড়িঘর, লিফট কোর, র‍্যাম্প, জরুরি বহির্গমন সিঁড়ির অবস্থান ও ম্যাপ;</h6>\n<h6 class=\"h-lv6\">(৩) ছাদের পানি নিষ্কাশন ব্যবস্থা, টেরাস (যদি থাকে), প্রযোজ্য ক্ষেত্রে, লিফটের মেশিনরুম, সিঁড়িঘরের ছাদ, জরুরি বহির্গমন, ছাদে স্থায়ী জলাধার, যদি থাকে, ও পানি বেরিয়ে যাওয়ার পথ প্রদর্শনপূর্বক ছাদের নকশা;</h6>\n<h6 class=\"h-lv6\">(৪) প্রযোজ্য ক্ষেত্রে, প্রবেশ পথ (entrance), নির্গমন পথ (exit), ড্রপিং বে ড্রাইভওয়ে ও পার্কিং স্থান প্রদর্শনপূর্বক পার্কিং পরিকল্পনা এবং নিরাপত্তা চৌকির (security post) অবস্থান;</h6>\n<hr class=\"sep\">"},{"num":"13428","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第９条（確認済証の申請）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>ঞ</strong>（承前）</h6>\n<h6 class=\"h-lv6\">五　適用がある場合において、電気設備室及び機械設備室の設置位置</h6>\n<h6 class=\"h-lv6\">六　複数の建築物若しくは工作物が存する複合施設（Complex）にあっては、車両及び歩行者のための出入口、敷地内通路、並びに旅客の乗降のための停留スペースの整備状況</h6>\n<h6 class=\"h-lv6\"><strong>ট</strong>　必要な箇所に寸法を記入した縮尺１：１００の<strong>断面図（Sections）</strong>。長手方向及び桁行方向の２面以上を作成しなければならない。この場合において、少なくとも１面は階段室を切り通す（cut）ものとし、当該図面には次に掲げる事項を表示しなければならない。</h6>\n<h6 class=\"h-lv6\">一　中二階（Mezzanine）を含む各階の高さ、ロフト（Loft / 小屋裏物置）、屋上水槽（存する場合に限る。）、昇降機機械室（存する場合に限る。）、屋上端部のパラペット（Parapet）の高さ、並びに現況地盤、道路及び歩道を基準とした建築物の最高高さ</h6>\n<h6 class=\"h-lv6\">二　外壁面から突出する各部分（ベランダ、庇等）の寸法</h6>\n<h6 class=\"h-lv6\">三　床面（Floor surface）の現況レベル及び設計レベル</h6>\n<h6 class=\"h-lv6\"><strong>ঠ</strong>　縮尺１：１００による、建築物の最高高さ及び必要な寸法を記載した全方位の<strong>立面図（Elevation drawing）</strong></h6>\n<h6 class=\"h-lv6\"><strong>ড</strong>　法典（Code）に準拠し、縮尺１：１００により作成された次に掲げる<strong>構造設計図（Structural Design）</strong>。当該図面には次に掲げる事項を記載しなければならない。</h6>\n<h6 class=\"h-lv6\">一　法典に基づく耐震詳細（Seismic detailing）及び設計定数を含む一般事項（General Notes）並びに材料仕様（Material specification）</h6>\n<h6 class=\"h-lv6\">二　基礎（Foundation）の詳細図及び断面図。適用がある場合においては、山留め（Shore Protection）及び根切り（Excavation）の設計図</h6>\n<h6 class=\"h-lv6\">三　柱、耐震壁（Shear wall）及び擁壁（Retaining wall）の配置図、リスト並びに詳細図</h6>\n<h6 class=\"h-lv6\">四　梁の配置図及び詳細図</h6>\n<h6 class=\"h-lv6\">五　床版（Slab）の厚さ及び配筋（Reinforcement）詳細図</h6>\n<h6 class=\"h-lv6\">六　階段の厚さ及び配筋詳細図</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৯। নির্মাণ অনুমোদনপত্রের আবেদন (চলমান)</strong></h5>\n<h6 class=\"h-lv6\"><strong>(ঞ)</strong> ফ্লোর প্ল্যান (চলমান)</h6>\n<h6 class=\"h-lv6\">(৫) প্রযোজ্য ক্ষেত্রে, বৈদ্যুতিক ও যান্ত্রিক কক্ষের অবস্থান; এবং</h6>\n<h6 class=\"h-lv6\">(৬) একাধিক ভবন বা স্থাপনা রহিয়াছে এইরূপ কমপ্লেক্সের ক্ষেত্রে যানবাহন ও পথচারীদের জন্য প্রবেশ পথ, অভ্যন্তরীণ চলাচলের রাস্তা, যাত্রীদের জন্য গাড়ি হইতে অবতরণ এবং আরোহণের ব্যবস্থা;</h6>\n<h6 class=\"h-lv6\"><strong>(ট)</strong> প্রয়োজনীয় অংশে মাপসহ ১:১০০ স্কেল অনুসরণপূর্বক প্রস্তুতকৃত নকশার অন্তর্গত অন্যূন ২ (দুই)টি সেকশন (লম্বালম্বি ও আড়াআড়ি) যাহার মধ্যে অন্তত একটি সেকশনকে অবশ্যই সিঁড়িঘর ছেদ (cut) করিতে হইবে এবং ছেদ করা নকশায় নিম্নবর্ণিত বিষয়গুলি প্রদর্শন করিতে হইবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(১) মেজানাইন (mezzanine) তলাসহ, প্রযোজ্য ক্ষেত্রে, প্রতিটি তলার উচ্চতা, চিলেকোঠা (loft), উপরে স্থাপিত জলাধার (যদি থাকে), লিফটের মেশিন রুম (যদি থাকে), ছাদের কিনারা বরাবর প্যারাপেট (parapet) এর উচ্চতা, বর্তমান ভূমি, রাস্তা ও ফুটপাথের প্রেক্ষিতে ইমারতের সর্বোচ্চ উচ্চতা;</h6>\n<h6 class=\"h-lv6\">(২) বিভিন্ন অংশের মাপ, যাহাদের বহিঃস্থ দিকগুলি দেয়াল হইতে সম্প্রসারিত (ব্যালকনি, সানশেড, ইত্যাদি); এবং</h6>\n<h6 class=\"h-lv6\">(৩) মেঝে-তল (floor surface) এর বর্তমান ও প্রস্তাবিত লেভেল (level);</h6>\n<h6 class=\"h-lv6\"><strong>(ঠ)</strong> ১:১০০ স্কেলে প্রণীত ভবনের সর্বোচ্চ উচ্চতা ও প্রয়োজনীয় মাপসহ সকল দিকের elevation drawing;</h6>\n<h6 class=\"h-lv6\"><strong>(ড)</strong> কোড অনুসরণপূর্বক ১:১০০ স্কেল অনুসরণ করিয়া ভবনের প্রস্তুতকৃত নিম্নবর্ণিত কাঠামো নকশা (Structural Design) যাহাতে নিম্নবর্ণিত তথ্যাদি সন্নিবেশিত থাকিবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(১) কোড মোতাবেক সিসমিক ডিটেইলিং ও প্যারামিটারসহ জেনারেল নোট (General Notes) এবং ম্যাটেরিয়াল স্পেসিফিকেশন;</h6>\n<h6 class=\"h-lv6\">(২) ফাউন্ডেশন ডিটেইলড প্লান, সেকশন, প্রযোজ্য ক্ষেত্রে, Shore Protection ও Excavation ডিজাইন;</h6>\n<h6 class=\"h-lv6\">(৩) কলাম, শিয়ার ওয়াল ও রিটেইনিং ওয়ালের লে-আউট এবং সিডিউল ও ডিটেইলিং;</h6>\n<h6 class=\"h-lv6\">(৪) বীম লে-আউট ও ডিটেইলিং;</h6>\n<h6 class=\"h-lv6\">(৫) স্লাবের পুরুত্ব (thickness)-সহ রেইনফোর্সমেন্ট (reinforcement) ডিটেইলড (detailed);</h6>\n<h6 class=\"h-lv6\">(৬) সিঁড়ির পুরুত্ব (thickness) রেইন্সফোর্সমেন্ট ডিটেইলড;</h6>\n<hr class=\"sep\">"},{"num":"13429","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第９条（確認済証の申請）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>ড</strong>（承前）</h6>\n<h6 class=\"h-lv6\">七　標準仕様に基づく浄化槽（セプティックタンク）、地下貯水槽及び高架水槽の配置図、断面図並びに配筋（Reinforcement）詳細図</h6>\n<h6 class=\"h-lv6\">八　適用がある場合において、伸縮継手（Expansion joint）及び耐震継手（Seismic joint）の詳細図</h6>\n<h6 class=\"h-lv6\">九　スロープ（Ramp）及び昇降機シャフト（Lift core）の詳細図</h6>\n<h6 class=\"h-lv6\">十　法典（Code）に基づき技術者が署名した証明書</h6>\n<h6 class=\"h-lv6\"><strong>ঢ</strong>　法典に準拠し、判読可能かつ適切な縮尺により作成された建築物の<strong>機械、電気、給排水衛生設備（MEP）及び火災安全設計図</strong>。当該図面には次に掲げる事項を記載しなければならない。</h6>\n<h6 class=\"h-lv6\">一　法典に定める指針に基づく建築物又は工作物の詳細な電気設備又は電気機械設備設計図</h6>\n<h6 class=\"h-lv6\">二　適用がある場合において、汚水処理施設（STP）を含む、法典に基づく建築物又は工作物の詳細な給排水衛生設備（Plumbing）設計図</h6>\n<h6 class=\"h-lv6\">三　本規則又は法典に基づく火災安全及び消火設計図、又は（適用がある場合）消防・民間防衛局が承認した設計図</h6>\n<h6 class=\"h-lv6\">四　適用がある場合において、空気調和、気流及び換気（Ventilation）システム</h6>\n<h6 class=\"h-lv6\">五　適用がある場合において、消火栓（Fire hydrant）及び消火設備</h6>\n<h6 class=\"h-lv6\">六　適用がある場合において、火災検知、警報及び非常出口（Emergency exit）システム</h6>\n<h6 class=\"h-lv6\">七　適用がある場合において、電気変電所、発電機及び太陽光発電システム</h6>\n<h6 class=\"h-lv6\">八　適用がある場合において、接地（Earthing）、避雷（Lightning arrester）及び電力供給システム</h6>\n<h6 class=\"h-lv6\">九　適用がある場合において、給水、排水、汚水排出及び水処理システム</h6>\n<h6 class=\"h-lv6\">十　適用がある場合において、音響制御システム</h6>\n<h6 class=\"h-lv6\">十一　適用がある場合において、昇降機、エスカレーター、動く歩道等の設備</h6>\n<h6 class=\"h-lv6\">十二　法典に基づき技術者が署名した証明書</h6>\n<h6 class=\"h-lv6\"><strong>ণ</strong>　次に掲げる事項を記載した<strong>設計報告書（Design Report）</strong>。</h6>\n<h6 class=\"h-lv6\">一　敷地の土質調査（Soil test）報告書</h6>\n<h6 class=\"h-lv6\">二　法典に基づく計算書を含む詳細な設計報告書</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৯। নির্মাণ অনুমোদনপত্রের আবেদন (চলমান)</strong></h5>\n<h6 class=\"h-lv6\"><strong>(ড)</strong> কাঠামো নকশা (Structural Design) (চলমান)</h6>\n<h6 class=\"h-lv6\">(৭) স্ট্যান্ডার্ড স্পেসিফিকেশনসহ সেপ্টিক ট্যাংক, আন্ডারগ্রাউন্ড এবং ওভারহেড ওয়াটার ট্যাঙ্কের প্ল্যান, সেকশনসহ রেইন্সফোর্সমেন্ট ডিটেইলড;</h6>\n<h6 class=\"h-lv6\">(৮) প্রযোজ্য ক্ষেত্রে, এক্সপানশন জয়েন্ট, সিসমিক জয়েন্ট ডিটেইলড;</h6>\n<h6 class=\"h-lv6\">(৯) র‍্যাম্প ও লিফট কোরের ডিটেইল্ড; এবং</h6>\n<h6 class=\"h-lv6\">(১০) কোড অনুসারে প্রকৌশলী কর্তৃক স্বাক্ষরিত প্রত্যয়নপত্র;</h6>\n<h6 class=\"h-lv6\"><strong>(ঢ)</strong> কোড অনুসরণপূর্বক, পঠনযোগ্য ও যথাযথ স্কেল অনুসরণে ভবনের নিম্নবর্ণিত মেকানিক্যাল, ইলেকট্রিক্যাল, প্লাম্বিং (MEP) ও অগ্নি-নিরাপত্তা নকশা (design) যাহাতে নিম্নবর্ণিত তথ্যাদি সন্নিবেশিত থাকিবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(১) কোডে উল্লিখিত নীতিমালা অনুযায়ী ইমারত বা স্থাপনার বিস্তারিত ইলেকট্রিক্যাল বা ইলেকট্রো মেকানিক্যাল নকশা;</h6>\n<h6 class=\"h-lv6\">(২) প্রযোজ্য ক্ষেত্রে, Sewage Treatment Plant-সহ কোড অনুসারে ইমারত বা স্থাপনার বিস্তারিত প্লাম্বিং (plumbing) নকশা;</h6>\n<h6 class=\"h-lv6\">(৩) এই বিধিমালা বা কোড অনুযায়ী অগ্নি নিরাপত্তা ও নির্বাপন নকশা বা, প্রযোজ্য ক্ষেত্রে, ফায়ার সার্ভিস ও সিভিল ডিফেন্স অধিদপ্তর কর্তৃক অনুমোদিত নকশা;</h6>\n<h6 class=\"h-lv6\">(৪) প্রযোজ্য ক্ষেত্রে, শীততাপ নিয়ন্ত্রণ, বায়ু চলাচল ও ভেন্টিলেশন ব্যবস্থা;</h6>\n<h6 class=\"h-lv6\">(৫) প্রযোজ্য ক্ষেত্রে, ফায়ার হাইড্রেন্ট ও অগ্নি নির্বাপন ব্যবস্থা;</h6>\n<h6 class=\"h-lv6\">(৬) প্রযোজ্য ক্ষেত্রে, ফায়ার ডিটেকশন, এলার্ম ও জরুরি নির্গমণ ব্যবস্থা;</h6>\n<h6 class=\"h-lv6\">(৭) প্রযোজ্য ক্ষেত্রে, বৈদ্যুতিক সাবস্টেশন, জেনারেটর ও সৌর বিদ্যুৎ ব্যবস্থা;</h6>\n<h6 class=\"h-lv6\">(八) প্রযোজ্য ক্ষেত্রে, আর্থিং, বজ্রপাত নিরোধক ও বিদ্যুৎ সরবরাহ ব্যবস্থা;</h6>\n<h6 class=\"h-lv6\">(৯) প্রযোজ্য ক্ষেত্রে, পানি সরবরাহ পয়ঃ ও পানি নিষ্কাশন ও পয়ঃপরিশোধন ব্যবস্থা;</h6>\n<h6 class=\"h-lv6\">(১০) প্রযোজ্য ক্ষেত্রে, শব্দ নিয়ন্ত্রণ ব্যবস্থা;</h6>\n<h6 class=\"h-lv6\">(১১) প্রযোজ্য ক্ষেত্রে, লিফট, এসকেলেটর, মুভিং ওয়াক, ইত্যাদির ব্যবস্থা; এবং</h6>\n<h6 class=\"h-lv6\">(১২) কোড অনুসারে প্রকৌশলী কর্তৃক স্বাক্ষরিত প্রত্যয়নপত্র;</h6>\n<h6 class=\"h-lv6\"><strong>(ণ)</strong> ডিজাইন প্রতিবেদন যাহাতে নিম্নবর্ণিত বিষয় সন্নিবেশিত থাকিবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(১) সাইটের মৃত্তিকা পরীক্ষা প্রতিবেদন;</h6>\n<h6 class=\"h-lv6\">(২) কোড অনুযায়ী ক্যালকুলেশনসহ বিস্তারিত ডিজাইন প্রতিবেদন;</h6>\n<hr class=\"sep\">"},{"num":"13430","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第９条（確認済証の申請）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>ণ</strong>（承前）</h6>\n<h6 class=\"h-lv6\">三　材料仕様書を含む構造設計報告書、技術資料及び<strong>施工安全計画（Construction Work Safety Plan）</strong>。これらは、建築工事により隣接する建築物、工作物、敷地、公共設備配管、道路その他のインフラストラクチャー、並びに人命、財産及び環境に対して損害を与えないものでなければならない。</h6>\n<h6 class=\"h-lv6\">四　電気又は電気機械設備設計計算報告書、並びに給排水設備、水供給及び（適用がある場合）汚水処理施設（STP）の設計計算報告書。</h6>\n<h6 class=\"h-lv6\">４　計画承認（Planning Permit）を取得済みである場合にあっては、確認済証（Construction Permit）の申請時に、土地の所有権に関する書類を再度提出することを要しない。</h6>\n<h6 class=\"h-lv6\">５　確認済証の申請に対し、工事期間中のために所管行政庁（Authority）が承認した建築物又は工作物の意匠、構造、電気、給排水の各図面、及び（適用がある場合）機械、火災安全・消火の各図面は、<strong>「確認済設計図書（নির্মাণ অনুমোদন নকশা）」</strong>とみなす。</h6>\n<h6 class=\"h-lv6\">６　建築物又は工作物の全部又は一部の工事完了後、使用許可証（Occupancy Certificate）を取得したことをもって、当該建築物の全部又は一部の最終的な承認とみなす。</h6>\n<h5 class=\"h-lv5\"><strong>第１０条（特殊建築物（Special Building））</strong></h5>\n<h6 class=\"h-lv6\">１　次に掲げる特徴のいずれかを有する建築物又は工作物は、特殊建築物（ বিশেষ ইমারত ）とみなす。</h6>\n<h6 class=\"h-lv6\">一　延べ面積（Gross Area）が７,５００平方メートルを超える建築物</h6>\n<h6 class=\"h-lv6\">二　国道（National Highway）に直接接続する建築物</h6>\n<h6 class=\"h-lv6\">三　都市計画（Master Plan）において指定された２以上の主要道路の交差点から１００メートル以内の地点に計画される工作物</h6>\n<h6 class=\"h-lv6\">四　環境局（Department of Environment）が宣言した環境保護区域（Ecologically Critical Area）から２５０メートル以内の距離におけるあらゆる建築又は開発</h6>\n<h6 class=\"h-lv6\">五　レンガ焼き窯を含む環境汚染若しくは危険用途の建築物（用途分類Ｊ）又は医療施設（用途分類Ｄ）</h6>\n<h6 class=\"h-lv6\">六　政府が指定した伝統的建築物（Heritage Building）又は工作物の境界壁から２５０メートル以内の距離における建築又は開発</h6>\n<h6 class=\"h-lv6\">七　都市計画において指定された自然景観区域（水辺公園、洪水流下区域、森林、公園等）から１５０メートル以内の距離における建築又は開発</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৯। নির্মাণ অনুমোদনপত্রের আবেদন (চলমান)</strong></h5>\n<h6 class=\"h-lv6\"><strong>(ণ)</strong> ডিজাইন প্রতিবেদন (চলমান)</h6>\n<h6 class=\"h-lv6\">(৩) ম্যাটেরিয়ালস স্পেসিফিকেশনসহ স্ট্রাকচারাল ডিজাইন প্রতিবেদন, কারিগরি তথ্যাদি ও কর্মপদ্ধতি (<strong>Construction Work Safety Plan</strong>) যাহাতে নির্মাণ কার্যক্রমের কারণে পার্শ্ববর্তী কোনো ইমারত, স্থাপনা, সাইট, ইউটিলিটি সার্ভিস লাইন, রাস্তা বা অন্য কোনো অবকাঠামো বা জানমাল ও পরিবেশের ক্ষতি না হয়;</h6>\n<h6 class=\"h-lv6\">(৪) ইলেকট্রিক্যাল বা ইলেকট্রোমেকানিক্যাল ডিজাইন ক্যালকুলেশন রিপোর্ট; প্লাম্বিং ও পানি সরবরাহ এবং, প্রযোজ্য ক্ষেত্রে, Sewage Treatment Plant (STP) এর ডিজাইন ক্যালকুলেশন রিপোর্ট。</h6>\n<h6 class=\"h-lv6\"><strong>(৪)</strong> পরিকল্পনা অনুমোদনপত্র গ্রহণ করা হইয়া থাকিলে নির্মাণ অনুমোদন আবেদনকালে মালিকানা সংক্রান্ত কাগজপত্র পুনরায় দাখিল করিতে হইবে না।</h6>\n<h6 class=\"h-lv6\"><strong>(৫)</strong> নির্মাণ অনুমোদনের আবেদনের প্রেক্ষিতে নির্মাণ সময়ের জন্য কর্তৃপক্ষ কর্তৃক ইমারত বা স্থাপনার স্থাপত্য, কাঠামোগত, ইলেকট্রিক্যাল, প্লাম্বিং নকশা এবং, প্রযোজ্য ক্ষেত্রে, মেকানিক্যাল, অগ্নিনিরাপত্তা ও নির্বাপন নকশা '<strong>নির্মাণ অনুমোদন নকশা</strong>' হিসাবে গণ্য হইবে।</h6>\n<h6 class=\"h-lv6\"><strong>(৬)</strong> ইমারত বা স্থাপনার সম্পূর্ণ বা আংশিক নির্মাণ শেষে বসবাস বা ব্যবহার সনদ প্রাপ্তি ইমারতের সম্পূর্ণ বা আংশিক অংশের চূড়ান্ত অনুমোদন হিসাবে গণ্য হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>১০। বিশেষ ইমারত।</strong></h5>\n<h6 class=\"h-lv6\">(১) নিম্নবর্ণিত যেকোনো বৈশিষ্ট্যসম্পন্ন স্থাপনার ক্ষেত্রে উহা বিশেষ ইমারত হিসাবে গণ্য হইবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) ৭,৫০০ (সাত হাজার পাঁচশত) বর্গমিটারের অধিক (গ্রস এরিয়া) মেঝে বিশিষ্ট যেকোনো ইমারত;</h6>\n<h6 class=\"h-lv6\">(খ) জাতীয় মহাসড়কের সহিত সরাসরি সংযোগ বিশিষ্ট যেকোনো ইমারত;</h6>\n<h6 class=\"h-lv6\">(গ) মহাপরিকল্পনায় নির্দেশিত ২ (দুই) বা ততোধিক প্রধান সড়কের ১০০ (একশত) মিটার সংযোগস্থলে প্রস্তাবিত স্থাপনা;</h6>\n<h6 class=\"h-lv6\">(ঘ) পরিবেশ অধিদপ্তর কর্তৃক ঘোষিত পরিবেশগত সংকটাপন্ন এলাকার ২৫০ (দুইশত পঞ্চাশ) মিটার দূরত্বের মধ্যে যেকোনো ধরনের নির্মাণ বা উন্নয়ন;</h6>\n<h6 class=\"h-lv6\">(ঙ) ইটের ভাটাসহ পরিবেশ দূষণমূলক বা বিপজ্জনক ব্যবহারের ভবন (J) বা স্বাস্থ্যসেবা (D);</h6>\n<h6 class=\"h-lv6\">(চ) সরকার কর্তৃক চিহ্নিত ঐতিহ্যবাহী ইমারত বা স্থাপনার সীমানা প্রাচীর হইতে ২৫０ (দুইশত পঞ্চাশ) মিটার দূরত্বের মধ্যে যেকোনো নির্মাণ বা উন্নয়ন;</h6>\n<h6 class=\"h-lv6\">(ছ) মহাপরিকল্পনায় চিহ্নিত প্রাকৃতিক সৌন্দর্যমণ্ডিত এলাকার ১৫০ (একশত পঞ্চাশ) মিটার দূরত্বের মধ্যে যেকোনো নির্মাণ বা উন্নয়ন (Water Based Park, বন্যাপ্রবাহ এলাকা, বনভূমি, উদ্যান);</h6>\n<hr class=\"sep\">"},{"num":"13431","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第１０条（特殊建築物）（承前）</strong></h5>\n<h6 class=\"h-lv6\">１（承前）</h6>\n<h6 class=\"h-lv6\">ｈ　都市計画（マスタープラン）において指定された森林地帯、丘陵地帯若しくは丘陵とみなされる土地、又は当該土地から１５０メートル以内の距離におけるあらゆる建築又は開発</h6>\n<h6 class=\"h-lv6\">ｉ　河川沿岸から２５０メートル以内の距離におけるあらゆる建築又は開発</h6>\n<h6 class=\"h-lv6\">ｊ　延べ面積（Gross Area）が５,０００平方メートルを超える物販店舗（ショッピングセンター）</h6>\n<h6 class=\"h-lv6\">ｋ　技術的又は環境的な理由により本規則の規定を直接適用することができず、かつ、隣接区域に重大な影響を及ぼすおそれのある特徴を有する施設</h6>\n<h6 class=\"h-lv6\">２　特殊建築物（Special Building）のために、追加の設計承認を受けることを要しない。</h6>\n<h5 class=\"h-lv5\"><strong>第１１条（特殊建築物の建築承認における考慮事項）</strong></h5>\n<h6 class=\"h-lv6\">１　建築審査委員会（Building Construction Committee）は、特殊建築物の建築承認において設計図書及び報告書を審査する際、次に掲げる事項その他関連する事項を考慮しなければならない。</h6>\n<h6 class=\"h-lv6\">ａ　計画承認（Planning Permit）の条件が遵守されているか、及び追加の条件が必要であるか。</h6>\n<h6 class=\"h-lv6\">ｂ　伝統的建築物（Heritage）の隣接地又は自然景観区域において、計画建築物の高さ、用途及び工期が当該地域と調和しているか。</h6>\n<h6 class=\"h-lv6\">ｃ　計画報告書に基づき、当該プロジェクトが周辺区域と調和しているか。</h6>\n<h6 class=\"h-lv6\">ｄ　必要な公共施設（Civic amenities）の整備がなされているか。</h6>\n<h6 class=\"h-lv6\">ｅ　集会、商業等の用途により、多量の車両流入が見込まれる場合、十分な交通循環（Traffic circulation）体系が確保されているか。</h6>\n<h6 class=\"h-lv6\">ｆ　河川沿岸又は洪水多発区域において、プロジェクトの立地が自然な洪水流下を妨げないか、また、プロジェクトの実施により洪水時の水位、流速等が上昇しないか、若しくは雨水排水にどのような影響を及ぼすか。</h6>\n<h6 class=\"h-lv6\">ｇ　プロジェクトの実施により環境への悪影響が生じないか。生じる場合にあっては、その対策が検討されているか。</h6>\n<h6 class=\"h-lv6\">ｈ　廃棄物管理（Waste management）において、必要な公共供給設備（Utility）が十分であるか。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>১০। বিশেষ ইমারত (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(১) (চলমান)</h6>\n<h6 class=\"h-lv6\">(জ) মহাপরিকল্পনায় চিহ্নিত বনাঞ্চল, পাহাড়ি এলাকা অথবা পাহাড় হিসাবে দৃশ্যমান ভূমি অথবা এইরূপ ভূমির ১৫০ (একশত পঞ্চাশ) মিটারের মধ্যে যেকোনো ধরনের নির্মাণ বা উন্নয়ন;</h6>\n<h6 class=\"h-lv6\">(ঝ) নদী তীরবর্তী ২৫০ (দুইশত পঞ্চাশ) মিটার দূরত্বের মধ্যে যেকোনো ধরনের নির্মাণ বা উন্নয়ন;</h6>\n<h6 class=\"h-lv6\">(ঞ) ৫,০০০ (পাঁচ হাজার) বর্গমিটারের অধিক (গ্রস এরিয়া) মেঝে বিশিষ্ট কোনো বিপণী কেন্দ্র; এবং</h6>\n<h6 class=\"h-lv6\">(ট) প্রযুক্তিগত অথবা পরিবেশগত কারণে এই বিধিমালার বিধানাবলি সরাসরি প্রয়োগ করা যাইবে না এইরূপ বৈশিষ্ট্যসম্পন্ন স্থাপনা যাহা সন্নিহিত এলাকায় বিশেষ প্রভাব তৈরি করিতে পারে।</h6>\n<h6 class=\"h-lv6\">(২) বিশেষ ইমারতের জন্য কোনো অতিরিক্ত নকশা অনুমোদন গ্রহণ করিতে হইবে না।</h6>\n<h5 class=\"h-lv5\"><strong>১১। বিশেষ ইমারতের নির্মাণ অনুমোদনে বিবেচ্য বিষয়।</strong></h5>\n<h6 class=\"h-lv6\">(১) বিশেষ ইমারত নির্মাণ অনুমোদনে ইমারত নির্মাণ কমিটি কর্তৃক নকশা ও প্রতিবেদন যাচাইকালে নিম্নবর্ণিত বিষয়াদিসহ প্রাসঙ্গিক অন্যান্য বিষয় বিবেচনা করিতে হইবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) পরিকল্পনা অনুমোদনপত্রের শর্তাবলি পালন করা হইয়াছে কিনা এবং কোনো অতিরিক্ত শর্তাদি প্রযোজ্য কিনা;</h6>\n<h6 class=\"h-lv6\">(খ) ঐতিহ্যবাহী ইমারত (heritage) সংলগ্ন ও প্রাকৃতিক সৌন্দর্যমণ্ডিত এলাকার ক্ষেত্রে প্রস্তাবিত ইমারতের উচ্চতা, ব্যবহার, নির্মাণ সময়ের সঙ্গে প্রস্তাবিত ইমারতের সামঞ্জস্যতা, প্রভৃতি;</h6>\n<h6 class=\"h-lv6\">(গ) পরিকল্পনা প্রতিবেদন অনুযায়ী প্রস্তাবিত প্রকল্প সন্নিহিত পারস্পরিক এলাকার সঙ্গে সামঞ্জস্যপূর্ণ কিনা;</h6>\n<h6 class=\"h-lv6\">(ঘ) প্রয়োজনীয় নাগরিক সুবিধাদির সংস্থান করা হইয়াছে কিনা;</h6>\n<h6 class=\"h-lv6\">(ঙ) সমাবেশ, বাণিজ্যিক, ইত্যাদি ব্যবহারের কারণে অধিক পরিমাণে যানবাহন সমাগমের জন্য পর্যাপ্ত ট্রাফিক সার্কুলেশন ব্যবস্থার সংস্থান করা হইয়াছে কিনা;</h6>\n<h6 class=\"h-lv6\">(চ) নদী তীরবর্তী বা বন্যাপ্রবণ এলাকার ক্ষেত্রে প্রকল্পের অবস্থান বন্যার প্রাকৃতিক প্রবাহ বাধাগ্রস্ত করিবে কিনা, প্রকল্প বাস্তবায়ন করা হইলে বন্যার পানির স্বাভাবিক উচ্চতা, গতিবেগ, ইত্যাদি বৃদ্ধি পাইবে কিনা কিংবা বৃষ্টির পানি নিষ্কাশন কিরূপ প্রভাব সৃষ্টি করিবে;</h6>\n<h6 class=\"h-lv6\">(ছ) প্রকল্প বাস্তবায়নের ফলে কোনো পরিবেশগত বিরূপ প্রতিক্রিয়া সৃষ্টি হইবে কিনা এবং হইলে সেক্ষেত্রে সম্ভাব্য করণীয়; এবং</h6>\n<h6 class=\"h-lv6\">(জ) বর্জ্য ব্যবস্থাপনার ক্ষেত্রে প্রয়োজনীয় ইউটিলিটি সরবরাহ পর্যাপ্ত কিনা।</h6>\n<hr class=\"sep\">"},{"num":"13432","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第１１条（特殊建築物の建築承認における考慮事項）（承前）</strong></h5>\n<h6 class=\"h-lv6\">２　国家の利益に関わるプロジェクト、特別な影響を及ぼすプロジェクト、又は環境に悪影響を及ぼすおそれのあるプロジェクトについては、所管行政庁は当該プロジェクトの全ての設計図書を一般の閲覧及び意見公募に供するため、１５日間、容易に視認できる場所に掲示しなければならない。</h6>\n<h6 class=\"h-lv6\">３　前項の規定による掲示の後、当該プロジェクトが法、本規則若しくは現行の他の法令に抵触し、又は公衆若しくは環境に損害を与え、若しくはこれらを危険にさらすと認める者は、所管行政庁に対し、当該プロジェクトの設計図書の閲覧を請求することができる。</h6>\n<h6 class=\"h-lv6\">４　建築審査委員会（Building Construction Committee）は、第２項の規定による掲示の後に公衆から寄せられた全ての意見（存する場合に限る。）を考慮した上で、承認又は却下の決定を行わなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第１２条（設計図書に関する専門技術者の義務）</strong></h5>\n<h6 class=\"h-lv6\">１　申請者により委任された専門技術者（Technical person）は、自ら作成し、かつ、確認済証（Construction Permit）の申請のために提出する設計図書に署名又は電子署名を行わなければならない。</h6>\n<h6 class=\"h-lv6\">２　前項の規定による設計図書は、コンピュータ支援設計（CAD）により作成し、JPEG及びPDFの双方の形式により提出しなければならない。</h6>\n<h6 class=\"h-lv6\">３　確認済証の申請のために提出する全ての設計図書には、次に掲げる事項を記載しなければならない。</h6>\n<h6 class=\"h-lv6\">ａ　設計図書の名称</h6>\n<h6 class=\"h-lv6\">ｂ　計画承認書（Planning Permit）の文書番号及び日付</h6>\n<h6 class=\"h-lv6\">ｃ　申請者の氏名、住所、電話番号、電子メールアドレス並びに署名（自署又は電子署名）</h6>\n<h6 class=\"h-lv6\">ｄ　関連する専門技術者の氏名、住所、電話番号、所属する専門職団体の会員番号及び登録番号</h6>\n<h6 class=\"h-lv6\">ｅ　申請者の代理人により申請が行われる場合にあっては、当該敷地（Plot）の所有者の氏名、住所、電話番号、電子メールアドレス並びに当該敷地に接する道路の名称</h6>\n<h6 class=\"h-lv6\">ｆ　法典（Code）に基づく建築物の構造及び予定される用途の類型</h6>\n<h6 class=\"h-lv6\">ｇ　工事現場が属する警察署（Thana）及び地区（Mouza）の名称、並びに地籍調査（CS, SA, RS又は都市調査）に基づく地番（Dag No.）及び、適用がある場合にあっては、敷地番号（Plot No.）</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>১১। বিশেষ ইমারতের নির্মাণ অনুমোদনে বিবেচ্য বিষয় (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(২) জাতীয় স্বার্থ সংশ্লিষ্ট অথবা বিশেষ প্রভাবসম্পন্ন কোনো প্রকল্পের ক্ষেত্রে অথবা পরিবেশের উপর বৈরী প্রভাব ফেলিতে পারে এইরূপ কোনো প্রকল্পের ক্ষেত্রে কর্তৃপক্ষ প্রকল্পের সকল নকশা জনসাধারণের অবলোকন ও মতামতের জন্য ১৫ (পনেরো) দিন যাবৎ সহজে দৃশ্যমান কোনো স্থানে প্রদর্শনের ব্যবস্থা করিবে।</h6>\n<h6 class=\"h-lv6\">(৩) উপ-বিধি (২) এর অধীন প্রদর্শনের পর যদি কোনো ব্যক্তি বিবেচনা করেন যে, কোনো প্রকল্প আইন, এই বিধিমালা অথবা বিদ্যমান অন্য কোনো আইন বা বিধি-বিধানের পরিপন্থি হইবে বা উহা জনগণ অথবা পরিবেশকে ক্ষতিগ্রস্থ বা বিপন্ন করিবে তাহা হইলে সংশ্লিষ্ট ব্যক্তির আবেদনের প্রেক্ষিতে উক্ত প্রকল্পের নকশাসমূহ তাহাকে পর্যবেক্ষণের সুযোগ প্রদান করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৪) উপ-বিধি (২) এর অধীন প্রদর্শনের পর জনগণের নিকট হইতে প্রাপ্ত সকল মতামত, যদি থাকে, বিবেচনাক্রমে ইমারত নির্মাণ কমিটি অনুমোদন বা প্রত্যাখ্যানের সিদ্ধান্ত গ্রহণ করিবে।</h6>\n<h5 class=\"h-lv5\"><strong>১২। নকশা বিষয়ে কারিগরি ব্যক্তির করণীয়।</strong></h5>\n<h6 class=\"h-lv6\">(১) আবেদনকারী কর্তৃক দায়িত্বপ্রাপ্ত কারিগরি ব্যক্তি তদ্কর্তৃক প্রণীত ও নির্মাণ অনুমোদনের জন্য দাখিলকৃত নকশায় স্বাক্ষর বা ডিজিটাল স্বাক্ষর প্রদান করিবেন।</h6>\n<h6 class=\"h-lv6\">(২) উপ-বিধি (১) এ বর্ণিত নকশা কম্পিউটার এইডেড ড্রইং এবং JPEG বা pdf উভয় ফরম্যাটে দাখিল করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৩) নির্মাণ অনুমোদনের জন্য দাখিলকৃত সকল নকশায় নিম্নবর্ণিত তথ্যসমূহ সন্নিবেশিত থাকিতে হইবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) নকশার শিরোনাম;</h6>\n<h6 class=\"h-lv6\">(খ) পরিকল্পনা অনুমোদনপত্রের স্মারক নম্বর ও তারিখ;</h6>\n<h6 class=\"h-lv6\">(গ) আবেদনকারীর পূর্ণ নাম, ঠিকানা, ফোন নম্বর, ই-মেইল, অমুদ্রিত বা ডিজিটাল স্বাক্ষর;</h6>\n<h6 class=\"h-lv6\">(ঘ) সংশ্লিষ্ট কারিগরি ব্যক্তিবর্গের নাম, ঠিকানা, ফোন নম্বর, সংশ্লিষ্ট পেশাজীবী ইনস্টিটিউশনের সদস্য নম্বর ও রেজিস্ট্রেশন নম্বর;</h6>\n<h6 class=\"h-lv6\">(ঙ) আবেদনকারীর প্রতিনিধি কর্তৃক আবেদনকৃত নকশায় সংশ্লিষ্ট প্লট বা হোল্ডিং মালিকের নাম, ঠিকানা, ফোন নম্বর, ই-মেইল, আবেদনকৃত প্লট সংলগ্ন রাস্তা বা সড়কের নাম;</h6>\n<h6 class=\"h-lv6\">(চ) কোড অনুসারে ইমারত নির্মাণ ও প্রস্তাবিত ব্যবহারের ধরন; এবং</h6>\n<h6 class=\"h-lv6\">(ছ) নির্মাণ সাইটটি যে থানার অন্তর্গত সেই থানা ও মৌজার নাম, এবং সিএস খতিয়ান বা এসএ খতিয়ান, আরএস খতিয়ান বা/ এবং মহানগর জরিপে উল্লিখিত দাগ নম্বর ও, প্রযোজ্য ক্ষেত্রে, প্লট নম্বর।</h6>\n<hr class=\"sep\">"},{"num":"13433","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第１３条（建築確認の申請の承認、却下及び取消し）</strong></h5>\n<h6 class=\"h-lv6\">１　確認済証（Construction Permit）の申請を受理したときは、関連する建築主事（Authorised Officer）は、第３６条の規定に基づき登録された専門技術者により構成される建築審査委員会（Building Construction Committee）に、設計図書及び報告書の審査及び検証を行わせなければならない。</h6>\n<h6 class=\"h-lv6\">２　建築審査委員会は、前項の規定により送付された設計図書等を審査し、第１５条に定める期限内に、承認可能な場合は承認の勧告を、承認不可能な場合はその理由を明記して却下の勧告を建築主事に対して行わなければならない。</h6>\n<h6 class=\"h-lv6\">３　前項の規定による勧告を受けたときは、建築主事は申請を承認又は却下し、その旨を申請者に通知しなければならない。</h6>\n<h6 class=\"h-lv6\">４　提出された書類若しくは情報に不足がある場合、又は設計図書の修正が必要な場合にあっては、建築主事は申請者にその旨を通知し、必要情報の提出又は設計図書の修正のために４５日の猶予期間を与えなければならない。</h6>\n<h6 class=\"h-lv6\">５　前項に規定する期間が経過しても、必要な情報又は修正された設計図書が提出されないときは、当該申請を却下するものとする。</h6>\n<h6 class=\"h-lv6\">６　承認された確認済証の条件に違反した場合、又は所有権に関し誤り若しくは虚偽の情報が提出されたことが判明した場合は、当該確認済証を取り消すことができる。</h6>\n<h6 class=\"h-lv6\">７　前項の規定により確認済証が取り消されたときは、所管行政庁は建築主及び関係者全員にその旨を通知しなければならない。</h6>\n<h6 class=\"h-lv6\">８　確認済証を取得した後、工事に着手しようとするときは、申請者は着手の日の少なくとも７日前までに、その旨を所管行政庁に通知しなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>১৩। নির্মাণ অনুমোদনপত্রের আবেদন অনুমোদন, প্রত্যাখ্যান ও বাতিল।</strong></h5>\n<h6 class=\"h-lv6\">(১) নির্মাণ অনুমোদনপত্রের আবেদন প্রাপ্তির পর সংশ্লিষ্ট অথরাইজড অফিসার বিধি ৩৬ অনুযায়ী তালিকাভুক্ত কারিগরি ব্যক্তিবর্গের সমন্বয়ে গঠিত ইমারত নির্মাণ কমিটি কর্তৃক নকশা ও প্রতিবেদনসমূহ পরীক্ষা ও যাচাই করিবে।</h6>\n<h6 class=\"h-lv6\">(২) ইমারত নির্মাণ কমিটি উপ-বিধি (১) অনুযায়ী প্রেরিত নকশা ও প্রতিবেদনসমূহ যাচাই করিয়া বিধি ১৫ এ উল্লিখিত সময়সীমার মধ্যে অনুমোদনযোগ্য হইলে অনুমোদনের জন্য এবং অনুমোদনযোগ্য না হইলে কারণ উল্লেখপূর্বক প্রত্যাখানের জন্য অথরাইজড অফিসারকে সুপারিশ করিবে।</h6>\n<h6 class=\"h-lv6\">(৩) উপ-বিধি (২) এর অধীন সুপারিশ প্রাপ্তির পর অথরাইজড অফিসার আবেদনটি অনুমোদন বা প্রত্যাখ্যান করিবে এবং বিষয়টি আবেদনকারীকে অবহিত করিবে।</h6>\n<h6 class=\"h-lv6\">(৪) যদি কোনো আবেদনকারীর দলিলাদি বা তথ্যের ঘাটতি থাকে অথবা নকশা সংশোধনের প্রয়োজন হয় তবে তাহা অথরাইজড অফিসার আবেদনকারীকে জানাইবেন এবং প্রয়োজনীয় তথ্যাদি দাখিল বা নকশা সংশোধনের জন্য ৪৫ (পঁয়তাল্লিশ) দিন সময় প্রদান করিবেন।</h6>\n<h6 class=\"h-lv6\">(৫) উপ-বিধি (৪) এ উল্লিখিত সময় অতিবাহিত হইবার পর প্রয়োজনীয় তথ্য বা সংশোধিত নকশা দাখিল করা না হইলে আবেদনটি প্রত্যাখ্যান করা হইবে।</h6>\n<h6 class=\"h-lv6\">(৬) অনুমোদিত নির্মাণ অনুমোদনপত্রের কোনো শর্ত লঙ্ঘন করা হইলে বা মালিকানা সংক্রান্ত কোনো ভুল বা মিথ্যা তথ্য দাখিল করা হইয়াছে মর্মে প্রমাণিত হইলে সংশ্লিষ্ট নির্মাণ অনুমোদনপত্র বাতিল করা যাইবে।</h6>\n<h6 class=\"h-lv6\">(৭) উপ-বিধি (৬) অনুযায়ী কোনো নির্মাণ অনুমোদনপত্র বাতিল করা হইলে কর্তৃপক্ষ ভবন মালিক ও সংশ্লিষ্ট সকলকে অবহিত করিবে।</h6>\n<h6 class=\"h-lv6\">(৮) নির্মাণ অনুমোদনপত্র প্রাপ্তির পর নির্মাণ কাজ আরম্ভ করিবার অন্যূন ৭ (সাত) দিন পূর্বে আবেদনকারী নির্মাণ কাজ আরম্ভের বিষয়টি কর্তৃপক্ষকে অবহিত করিবে।</h6>\n<hr class=\"sep\">"},{"num":"13434","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第１３条（建築確認の申請の承認等）</strong></h5>\n<h6 class=\"h-lv6\">９　建築確認の申請が勧告を受けたときは、付録４に定める建築確認手数料を納付しなければならない。当該手数料の納付後、建築審査委員会は承認された設計図書に署名を行うものとする。</h6>\n<h6 class=\"h-lv6\">１０　建築確認の申請が却下された場合、建築主事（Authorised Officer）は、手数料を徴収することなく、法、本規則、法典（Code）又はその他の法令の具体的な条項及び理由を明記して、申請者に対し却下通知書を送付しなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第１４条（建築確認の申請の却下に対する不服申立て）</strong></h5>\n<h6 class=\"h-lv6\">１　建築確認の申請が却下された場合、申請者は、当該却下の通知を受けた日から３０日以内に、付録４に定める手数料を納付した上で、不服申立委員会（Appellate Committee）に対し審査請求をすることができる。</h6>\n<h6 class=\"h-lv6\">２　不服申立委員会は、前項の審査請求を受理したときは、次項及び第４項の規定に従い、受理した日から３０日以内に当該請求に関する決定を行わなければならない。</h6>\n<h6 class=\"h-lv6\">３　不服申立委員会は、前項の規定による処理において、法律上の明確化又は更なる判断を要すると認める場合は、当該事項を都市開発委員会（Urban Development Committee）に付託することができる。</h6>\n<h6 class=\"h-lv6\">４　第２項の規定にかかわらず、都市開発委員会は、前項の規定により付託を受けたときは、４５日以内に勧告を行わなければならない。所管行政庁は、当該勧告に基づき必要な措置を講ずるものとする。</h6>\n<h6 class=\"h-lv6\">５　不服申立てに係る建築確認の申請については、次の各号に掲げる区分に応じ、当該各号に定めるところによる。</h6>\n<h6 class=\"h-lv6\">一　棄却された場合　申請者に対し、その旨を書面により通知しなければならない。</h6>\n<h6 class=\"h-lv6\">二　認容された場合　第１３条第９項の規定を準用し、関連する建築主事は承認された設計図書を添えて建築確認済証を申請者に交付しなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第１５条（建築確認済証の有効期間）</strong></h5>\n<h6 class=\"h-lv6\">１　第１３条又は、場合により、第１４条の規定により交付された建築物又は工作物の建築確認済証の有効期間は３年とする。当該期間内に、建築物の少なくとも土台面（Plinth Level）までの工事を完了しなければならない。</h6>\n<h6 class=\"h-lv6\">２　申請者が前項の規定による措置を講じなかったときは、新たに建築確認済証の交付を受けなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第１６条（承認された設計図書の修正）</strong></h5>\n<h6 class=\"h-lv6\">１　本規則の施行前に建築された建築物又は工事中の建築物のいずれにおいても、延べ面積（Total Floor Area）及び各階の面積を変更せず、かつ、設計図書の外郭形状（長さ $\\times$ 幅 $\\times$ 高さ）を承認された範囲内に維持する場合にあっては、当該建築物が承認された当時の規則に基づき、内部の変更又は修正を行うことができる。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>১৩। নির্মাণ অনুমোদনপত্রের আবেদন অনুমোদন, প্রত্যাখ্যান ও বাতিল (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(৯) নির্মাণ অনুমোদনপত্রের আবেদন সুপারিশ প্রাপ্ত হইলে পরিশিষ্ট ৪ অনুসারে নির্মাণ অনুমোদন ফি জমা দিতে হইবে এবং উক্তরূপ ফি জমাদানের পর ইমারত নির্মাণ কমিটি অনুমোদিত নকশায় স্বাক্ষর প্রদান করিবে।</h6>\n<h6 class=\"h-lv6\">(১০) কোনো নির্মাণ অনুমোদনপত্রের আবেদন প্রত্যাখ্যান করা হইলে নির্মাণ অনুমোদন ফি গ্রহণ ব্যতিরেকে অথরাইজড অফিসার আইন, এই বিধিমালা, কোড বা অন্যান্য আইন ও বিধি-বিধানের সুনির্দিষ্ট বিধান ও কারণ উল্লেখপূর্বক আবেদনকারীকে প্রত্যাখ্যান পত্র প্রেরণ করিবে।</h6>\n<h5 class=\"h-lv5\"><strong>১৪। নির্মাণ অনুমোদনের আবেদন প্রত্যাখ্যানের বিরুদ্ধে আপিল।</strong></h5>\n<h6 class=\"h-lv6\">(১) কোনো নির্মাণ অনুমোদনপত্রের আবেদন প্রত্যাখ্যান করা হইলে, আবেদনকারী উক্তরূপে প্রত্যাখ্যাত হইবার ৩০ (ত্রিশ) দিনের মধ্যে পরিশিষ্ট ৪ এ বর্ণিত ফি পরিশোধ সাপেক্ষে, আপিল কমিটি বরাবর আপিল আবেদন করিতে পারিবে।</h6>\n<h6 class=\"h-lv6\">(২) উপ-বিধি (১) এর অধীন কোনো আপিল আবেদন প্রাপ্তির পর আপিল কমিটি, উপ-বিধি (৩) ও (৪) এর বিধান সাপেক্ষে, ৩০ (ত্রিশ) দিনের মধ্যে আপিল আবেদনের বিষয়ে সিদ্ধান্ত গ্রহণ করিবে।</h6>\n<h6 class=\"h-lv6\">(৩) উপ-বিধি (২) অনুযায়ী আপিল নিষ্পত্তির ক্ষেত্রে আপিল কমিটি আইনি স্পষ্টতা ও অধিকতর সিদ্ধান্তের জন্য বিষয়টি নগর উন্নয়ন কমিটিতে প্রেরণ করিতে পারিবে।</h6>\n<h6 class=\"h-lv6\">(৪) উপ-বিধি (২) এ যাহা কিছুই থাকুক না কেন, নগর উন্নয়ন কমিটি উপ-বিধি (৩) এর অধীন কোনো আবেদন প্রাপ্ত হইলে ৪৫ (পঁয়তাল্লিশ) দিনের মধ্যে সুপারিশ প্রদান করিবে এবং নগর উন্নয়ন কমিটির সুপারিশের আলোকে কর্তৃপক্ষ ব্যবস্থা গ্রহণ করিবে।</h6>\n<h6 class=\"h-lv6\">(৫) আপিলে নির্মাণ অনুমোদনের আবেদন—</h6>\n<h6 class=\"h-lv6\">(ক) প্রত্যাখ্যাত হইলে আবেদনকারীকে বিষয়টি লিখিতভাবে অবহিত করিতে হইবে; অথবা</h6>\n<h6 class=\"h-lv6\">(খ) অনুমোদিত হইলে বিধি ১৩ এর উপ-বিধি (৯) অনুসরণ করিয়া সংশ্লিষ্ট অথরাইজড অফিসার অনুমোদিত নকশাসহ অনুমোদনপত্র আবেদনকারীকে প্রেরণ করিবে।</h6>\n<h5 class=\"h-lv5\"><strong>১৫। নির্মাণ অনুমোদনপত্রের মেয়াদ।</strong></h5>\n<h6 class=\"h-lv6\">(১) বিধি ১৩, বা ক্ষেত্রমত, বিধি ১৪ এর অধীন প্রদত্ত ইমারত বা অবকাঠামোর নির্মাণ অনুমোদনপত্রের মেয়াদ হইবে ৩ (তিন) বৎসর এবং এইরূপ মেয়াদের মধ্যে ইমারতের অন্যূন প্লিন্থ লেভেল পর্যন্ত নির্মাণ সম্পন্ন করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(২) আবেদনকারী উপ-বিধি (১) অনুযায়ী ব্যবস্থা গ্রহণে ব্যর্থ হইলে নূতন করিয়া নির্মাণ অনুমোদনপত্র গ্রহণ করিতে হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>১৬। অনুমোদিত নকশা সংশোধন।</strong></h5>\n<h6 class=\"h-lv6\">(১) এই বিধিমালা জারির পূর্বে নির্মিত ও নির্মাণাধীন উভয় ক্ষেত্রে অনুমোদিত ভবনসমূহের সর্বমোট ক্ষেত্রফলসহ তলা প্রতি ক্ষেত্রফল অপরিবর্তিত ও নকশার বহিঃঅবয়ব (দৈর্ঘ্য $\\times$ প্রস্থ $\\times$ উচ্চতা) অনুমোদিত পরিমাপের মধ্যে রাখিয়া যে বিধিমালার অধীনে নকশা অনুমোদিত হইয়াছে সেই বিধিমালা অনুযায়ী অভ্যন্তরীণ পরিবর্তন বা সংশোধন করা যাইবে।</h6>\n<hr class=\"sep\">"},{"num":"13435","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第１６条（承認された設計図書の修正）（承前）</strong></h5>\n<h6 class=\"h-lv6\">２　本規則に基づき承認された設計図書に関し、内部の再配置のみを行う場合であって、延べ面積（Total Floor Area）、容積率（FAR）、住戸数、構造設計、建蔽率（Building Coverage Ratio）、外郭境界線並びに垂直動線計画又は経路の設置位置に変更がないときは、新たに承認を受けることを要しない。</h6>\n<h6 class=\"h-lv6\">３　室の高さの変更が２０センチメートル以内である場合は、高さに関するその他の制限に適合している限りにおいて、新たに承認を受けることを要しない。</h6>\n<h6 class=\"h-lv6\">４　確認済証（Construction Permit）の有効期間内において承認された設計図書の修正が必要となった場合、申請者は、既に承認された設計図書に修正設計図書を添えて申請書を提出しなければならない。</h6>\n<h6 class=\"h-lv6\">５　設計図書の修正により床面積が増加した場合は、付録４の規定に基づき手数料を納付しなければならない。</h6>\n<h6 class=\"h-lv6\">６　修正設計図書の再承認を受ける前に当該修正部分の工事を完了した場合において、当該変更が本規則に基づき承認可能なものであるときは、付録４に定める建築確認手数料の１０倍の額の手数料を納付し、かつ、１９５２年建築建設法（Building Construction Act, 1952）の規定に基づき賦課される過料を納付した上で、改めて確認済証の交付を受けなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第１７条（申請者、専門技術者等の責務及び義務の怠慢）</strong></h5>\n<h6 class=\"h-lv6\">１　建築の承認を受けた申請者は、いかなる場合においても、承認された設計図書及び書類の内容に抵触する工事を行ってはならない。</h6>\n<h6 class=\"h-lv6\">２　確認済証（Construction Permit）の交付後、関連する建築主事（Authorised Officer）に通知することなく、いかなる建築、根切り（掘削）、撤去又は現場における工事に着手してはならない。</h6>\n<h6 class=\"h-lv6\">３　全ての意匠、構造及び設備設計（Service Design）の監理のため、申請者は専門技術者（Technical person）を任命しなければならない。</h6>\n<h6 class=\"h-lv6\">４　工事に関する情報を記載した掲示板（Signboard）及び承認された設計図書の写しを、工事現場内の容易に視認できる場所に掲示しなければならない。</h6>\n<h6 class=\"h-lv6\">５　中断していた工事を再開しようとする場合、申請者は、再開の日の少なくとも１５日前までに、所管行政庁（Authority）が定める申請様式によりその旨を所管行政庁に通知しなければならない。</h6>\n<h6 class=\"h-lv6\">６　プロジェクトに従事する専門技術者の新規選任又は変更があった場合、選任又は変更から１５日以内に所管行政庁に通知しなければならない。専門技術者を変更する場合にあっては、前任の専門技術者への通知を行い、かつ、後任の専門技術者が職務を引き継ぐまでの間は、建築工事を中断しなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>১৬। অনুমোদিত নকশা সংশোধন (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(২) এই বিধিমালার অধীন অনুমোদিত নকশার ক্ষেত্রে শুধু অভ্যন্তরীণ পুনর্বিন্যাসের ক্ষেত্রে সর্বমোট মেঝের আয়তন, FAR, আবাসন ইউনিট, কাঠামোগত নকশা, ভূমি আচ্ছাদনের পরিমাণ, বাইরের পরিসীমা এবং ভার্টিক্যাল সার্কুলেশন পদ্ধতি বা পথের অবস্থানগত পরিবর্তন না হইলে নূতন করিয়া অনুমোদনের প্রয়োজন হইবে না।</h6>\n<h6 class=\"h-lv6\">(৩) কক্ষের উচ্চতায় পরিবর্তন ২০ (বিশ) সেন্টিমিটারের মধ্যে হইলে নূতন কোনো অনুমোদনের প্রয়োজন হইবে না যদি না উচ্চতার সহিত সংশ্লিষ্ট অন্যান্য বাধ্যবাধকতা যথাযথ থাকে।</h6>\n<h6 class=\"h-lv6\">(৪) নির্মাণ অনুমোদনপত্রের মেয়াদে অনুমোদিত নকশার কোনো সংশোধনের প্রয়োজন হইলে আবেদনকারী অনুমোদিত নকশাসহ সংশোধিত নকশা সংযুক্ত করিয়া আবেদন দাখিল করিবেন।</h6>\n<h6 class=\"h-lv6\">(৫) নকশা সংশোধনের কারণে মেঝের ক্ষেত্রফল বৃদ্ধি পাইলে পরিশিষ্ট ৪ অনুযায়ী ফি পরিশোধ করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৬) সংশোধিত নকশা পুনরায় অনুমোদনের পূর্বে ভবনের সংশোধিত অংশের নির্মাণকাজ সম্পন্ন করা হইলে এবং অনুরূপ পরিবর্তন এই বিধিমালার অধীন অনুমোদনযোগ্য হইলে পরিশিষ্ট ৪ এ বর্ণিত নির্মাণ অনুমোদনের দশগুণ ফি এবং Building Construction Act, 1952 অনুসারে ধার্যকৃত জরিমানা প্রদানপূর্বক পুনরায় নির্মাণ অনুমোদনপত্র গ্রহণ করিতে হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>১৭। নির্মাণ সংশ্লিষ্ট বিষয়ে আবেদনকারী, কারিগরি ব্যক্তি ও অন্যান্যদের দায়িত্ব ও দায়িত্বে অবহেলা।</strong></h5>\n<h6 class=\"h-lv6\">(১) ইমারত নির্মাণে অনুমোদনপ্রাপ্ত আবেদনকারী কোনো অবস্থাতেই অনুমোদিত নকশা ও দলিলাদির পরিপন্থি কোনো কাজ করিতে পারিবে না।</h6>\n<h6 class=\"h-lv6\">(২) নির্মাণ অনুমোদনপত্র ইস্যু করিবার পর সংশ্লিষ্ট অথরাইজড অফিসারকে অবহিত না করিয়া কোনো নির্মাণ, খনন, অপসারণ বা সাইটে কোনো কাজ আরম্ভ করা যাইবে না।</h6>\n<h6 class=\"h-lv6\">(৩) সকল স্থাপত্য, কাঠামোগত ও সার্ভিস নকশা তদারকির জন্য আবেদনকারী কর্তৃক কারিগরি ব্যক্তি নিয়োজিত করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৪) নির্মাণ সম্পর্কিত তথ্যাবলি সংবলিত সাইনবোর্ড ও অনুমোদিত নকশাসমূহের কপি সাইটে সহজে দৃশ্যমান স্থানে প্রদর্শন করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৫) আবেদনকারীর স্থগিতকৃত কাজ পুনরায় আরম্ভ করিবার কমপক্ষে ১৫ (পনেরো) দিন পূর্বে কর্তৃপক্ষ কর্তৃক নির্ধারিত আবেদন ফরমের মাধ্যমে কাজ আরম্ভ করিবার বিষয়টি কর্তৃপক্ষকে অবহিত করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৬) প্রকল্পে নিয়োজিত কোনো কারিগরি ব্যক্তির নূতন নিয়োগ অথবা পরিবর্তন সম্পর্কে কর্তৃপক্ষকে নিয়োগ বা পরিবর্তনের ১৫ (পনেরো) দিনের মধ্যে অবহিত করিতে হইবে এবং কারিগরি ব্যক্তি পরিবর্তনের ক্ষেত্রে পূর্বের কারিগরি ব্যক্তিবর্গকে অবহিতকরণপূর্বক নূতন নিয়োগপ্রাপ্ত কারিগরি ব্যক্তি দায়িত্ব গ্রহণ না করা পর্যন্ত নির্মাণ কাজ স্থগিত থাকিবে।</h6>\n<hr class=\"sep\">"},{"num":"13436","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第１７条（申請者、専門技術者等の責務及び義務の怠慢）（承前）</strong></h5>\n<h6 class=\"h-lv6\">７　建築物の設計、工事期間中、工事完了後若しくは使用期間中における不適切な設計若しくは虚偽の情報提供、指定仕様に満たない建築資材の使用、承認された設計図書に違反した工事の実施、又は承認された建築資材を使用せず低品質な建築資材を使用したことに起因する建築上の瑕疵その他の付随的な瑕疵については、次に掲げる者又は機関が、それぞれの職務の怠慢及び当該建築上の瑕疵について責任を負わなければならない。</h6>\n<h6 class=\"h-lv6\">ａ　第３６条の規定に基づき申請者と契約を締結した専門技術者（Technical person）</h6>\n<h6 class=\"h-lv6\">ｂ　工事監理（Construction supervision）に従事する専門技術者</h6>\n<h6 class=\"h-lv6\">ｃ　建築主、申請者、開発事業者（Developer）又は施工者</h6>\n<h6 class=\"h-lv6\">８　土地の所有権及び申請者が提出した一切の虚偽の情報については、申請者が責任を負わなければならない。</h6>\n<h6 class=\"h-lv6\">９　建築物又は工作物の意匠、構造、電気、給排水衛生設備、火災安全及び計画報告書を含む一切の設計図書の設計の妥当性（<strong>Design adequacy</strong>）及び適合性に関する一切の責任は、当該設計を作成した建築士、技術者（Engineer）、ディプロマ建築士若しくはディプロマ技術者又は、場合により、都市計画家に帰属するものとする。</h6>\n<h6 class=\"h-lv6\">１０　建築物の工事期間中の事故に関するリスクを軽減するため、建築主、開発事業者及び施工者は、工事期間中、賠償責任保険（Liability insurance）に強制的に加入しなければならない。</h6>\n<h6 class=\"h-lv6\">また、建築工事完了後において、工業、商業及び共同住宅（Apartment complex）の用途に供する建築物にあっては、使用許可証（Occupancy Certificate）を取得した上で、建築物の使用開始から少なくとも１０年間、事故に関するリスクを軽減するため、建築主は賠償責任保険に強制的に加入しなければならない。</h6>\n<h6 class=\"h-lv6\">１１　申請者又は選任された専門技術者は、所管行政庁（Authority）による検査の際、自己の費用負担により、必要な情報、図面、建築資材の試験報告書その他の必要な書類を提供しなければならない。</h6>\n<h6 class=\"h-lv6\">１２　設計、段階的な検査、工事監理又は工事監理のみに従事する専門技術者が、工事完了前に当該建築物又はプロジェクトとの関係を終了した場合は、１５日以内に、実施した全部又は一部の工事監理について書面により所管行政庁に通知しなければならない。</h6>\n<h6 class=\"h-lv6\">１３　設計に従事する専門技術者が作成した設計図書が所管行政庁により承認された後、当該専門技術者に通知することなく工事が着手された場合、又は工事期間中に承認された設計図書との不適合が生じた場合、関連する専門技術者は直ちに申請者に対して書面により警告し、かつ、所管行政庁に通知しなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>১৭। নির্মাণ সংশ্লিষ্ট বিষয়ে আবেদনকারী, কারিগরি ব্যক্তি ও অন্যান্যদের দায়িত্ব ও দায়িত্বে অবহেলা (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(৭) ইমারতের নকশা প্রণয়ন, ইমারত নির্মাণকাল, ইমারত নির্মাণ শেষে অথবা ব্যবহারের সময়ে ত্রুটিপূর্ণ নকশা বা ভুল তথ্য প্রদান, ডিজাইনে বর্ণিত স্পেসিফিকেশন হইতে অপেক্ষাকৃত নিম্নমানের নির্মাণ সামগ্রী ব্যবহার, নির্মাণ নকশার ব্যত্যয় করিয়া নির্মাণ কাজ পরিচালনা, নির্মাণ নকশায় বর্ণিত নির্মাণ সামগ্রী ব্যবহার না করিয়া নিম্নমানের নির্মাণ সামগ্রী ব্যবহারের কারণে নির্মাণজনিত ত্রুটি এবং অন্যান্য আনুষঙ্গিক ত্রুটির জন্য নিম্নবর্ণিত ব্যক্তি বা প্রতিষ্ঠান, স্ব স্ব দায়িত্বে অবহেলা ও সংশ্লিষ্ট নির্মাণ ত্রুটির জন্য দায়ী থাকিবেন, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) বিধি ৩৬ অনুসারে আবেদনকারীর সহিত চুক্তিবদ্ধ কারিগরি ব্যক্তি;</h6>\n<h6 class=\"h-lv6\">(খ) নির্মাণ তদারকিতে নিযুক্ত কারিগরি ব্যক্তি; এবং</h6>\n<h6 class=\"h-lv6\">(গ) ভবন মালিক, আবেদনকারী, ডেভেলপার বা ঠিকাদার।</h6>\n<h6 class=\"h-lv6\">(৮) ভূমির মালিকানা ও আবেদনকারী কর্তৃক দাখিলকৃত যেকোনো অসত্য তথ্যের জন্য আবেদনকারী দায়ী থাকিবেন।</h6>\n<h6 class=\"h-lv6\">(৯) ইমারত বা স্থাপনার স্থাপত্য, কাঠামোগত, ইলেকট্রিক্যাল, প্লাম্বিং, অগ্নি নিরাপত্তা, পরিকল্পনা প্রতিবেদনসহ যাবতীয় নকশার ডিজাইন পর্যাপ্ততা (<strong>design adequacy</strong>) ও উপযুক্ততার যাবতীয় দায়িত্বভার সংশ্লিষ্ট নকশা প্রণয়নকারী স্থপতি, প্রকৌশলী, ডিপ্লোমা স্থপতি/ ডিপ্লোমা প্রকৌশলী বা, ক্ষেত্রমত, পরিকল্পনাবিদের উপর বর্তাইবে।</h6>\n<h6 class=\"h-lv6\">(১০) ইমারত নির্মাণকালীন যেকোনো দুর্ঘটনা সংক্রান্ত ঝুঁকি প্রশমন করিবার লক্ষ্যে ইমারত মালিক, ডেভেলপার এবং ঠিকাদার নির্মাণ মেয়াদকালের জন্য বাধ্যতামূলক দায় বীমা গ্রহণ করিবেন এবং ইমারত নির্মাণ শেষে শিল্প, বাণিজ্যিক এবং এ্যাপার্টমেন্ট কমপ্লেক্স অকুপেন্সি টাইপ ইমারতের ক্ষেত্রে বসবাস বা ব্যবহার সনদ গ্রহণ সাপেক্ষে, ইমারতের ব্যবহার আরম্ভ হইতে অন্যূন ১০ (দশ) বৎসর পর্যন্ত যেকোনো দুর্ঘটনা সংক্রান্ত ঝুঁকি প্রশমন করিবার লক্ষ্যে ইমারত মালিক বাধ্যতামূলক দায় বীমা গ্রহণ করিবেন।</h6>\n<h6 class=\"h-lv6\">(১১) আবেদনকারী বা নিয়োজিত কারিগরি ব্যক্তি, কর্তৃপক্ষের পরিদর্শনের সময়, নিজ খরচে প্রয়োজনীয় তথ্য, ড্রইং ও নির্মাণ উপকরণ পরীক্ষার প্রতিবেদনসহ অন্যান্য প্রয়োজনীয় কাগজপত্র সরবরাহ করিবেন।</h6>\n<h6 class=\"h-lv6\">(১২) ইমারত বা স্থাপনার নকশা প্রণয়ন ও পর্যায়ভিত্তিক পরিদর্শন, নির্মাণ তদারকি অথবা কেবল নির্মাণ তদারকিতে নিযুক্ত কোনো কারিগরি ব্যক্তির ইমারত বা প্রকল্পের সহিত তাহার সংশ্লিষ্টতার মেয়াদ নির্মাণ কাজ সম্পূর্ণ হইবার পূর্বেই সমাপ্ত হইলে ১৫ (পনেরো) দিনের মধ্যে সম্পূর্ণ বা আংশিক কাজ তদারকি বিষয়ে লিখিতভাবে কর্তৃপক্ষকে অবহিত করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(১৩) ইমারত বা যেকোনো স্থাপনা নির্মাণ প্রকল্পের নকশা প্রণয়নে নিযুক্ত কোনো কারিগরি ব্যক্তি কর্তৃক প্রণীত নকশা কর্তৃপক্ষ কর্তৃক অনুমোদনের পর কারিগরি ব্যক্তিকে অবহিত না করিয়া নির্মাণ কাজ আরম্ভ করা হইলে অথবা নির্মাণকালে অনুমোদিত নকশার ব্যত্যয় করা হইলে সংশ্লিষ্ট কারিগরি ব্যক্তি অবিলম্বে আবেদনকারীকে লিখিতভাবে সতর্ক করিবেন এবং কর্তৃপক্ষকে অবহিত করিবেন।</h6>\n<hr class=\"sep\">"},{"num":"13437","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第１７条（申請者、専門技術者等の責務及び義務の怠慢）（承前）</strong></h5>\n<h6 class=\"h-lv6\">１４　前項の規定による警告にもかかわらず、申請者が建築工事を継続する場合、専門技術者は、その旨を所管行政庁及び所属する職能団体に書面により通知しなければならない。また、当該建築工事への関与を終了する旨を申請者に書面により通知しなければならない。</h6>\n<h6 class=\"h-lv6\">１５　専門技術者の責任範囲は、建築工事の全部又は一部の完了後、使用許可証（Occupancy Certificate）を取得するための工事完了証明書を交付するまで継続するものとする。</h6>\n<h6 class=\"h-lv6\">１６　次に掲げる行為は、専門技術者の職務怠慢とみなす。</h6>\n<h6 class=\"h-lv6\">ａ　専門技術者の監理下にある建築物又は工作物の建築において、所管行政庁により承認された設計図書に違反すること。</h6>\n<h6 class=\"h-lv6\">ｂ　意匠設計図、構造設計図、設備図その他の承認された設計図書に関し、不実の情報を提供すること。</h6>\n<h6 class=\"h-lv6\">ｃ　耐火構造その他の安全対策に関し、不実の情報を提供すること。</h6>\n<h6 class=\"h-lv6\">ｄ　計画報告書において不実の情報を提供すること。</h6>\n<h6 class=\"h-lv6\">ｅ　不当な目的をもって建設承認委員会を働きかけること。</h6>\n<h5 class=\"h-lv5\"><strong>第１８条（専門技術者と申請者の間の紛争解決）</strong></h5>\n<h6 class=\"h-lv6\">１　専門技術者と申請者の間に建築関連の事項に関する紛争が生じた場合、関連する職能団体を通じて解決を図り、その旨を所管行政庁に通知するまでの間、当該建築工事を中断しなければならない。</h6>\n<h6 class=\"h-lv6\">２　前項の規定に基づき職能団体を通じて３０日以内に紛争が解決されないときは、所管行政庁が当該紛争を裁決するものとし、この場合における所管行政庁の決定は最終的なものとみなす。</h6>\n<h5 class=\"h-lv5\"><strong>第１９条（建築工事の監理）</strong></h5>\n<h6 class=\"h-lv6\">１　申請者により選任された専門技術者は、自ら署名した上で、所管行政庁により承認された点検表（Checklist）に従い、工作物及びプロジェクトの工事監理報告書を所管行政庁に提出しなければならない。</h6>\n<h6 class=\"h-lv6\">２　前項の報告書において、専門技術者は次に掲げる事項を証明しなければならない。</h6>\n<h6 class=\"h-lv6\">ａ　提出された写真、情報及び報告書が、完了した建築工事の真実かつ正確な状況を示すものであること。</h6>\n<h6 class=\"h-lv6\">ｂ　当該工事が法、承認された設計図書、法典（Code）及び本規則に準拠して完了したこと。</h6>\n<h6 class=\"h-lv6\">３　第１項の報告書において後に誤りが判明した場合、専門技術者は速やかに当該誤りを修正するための措置を講じなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>১৭। নির্মাণ সংশ্লিষ্ট বিষয়ে আবেদনকারী, কারিগরি ব্যক্তি ও অন্যান্যদের দায়িত্ব ও দায়িত্বে অবহেলা (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(১৪) উপ-বিধি (১৩) এর অধীন সতর্ক করা সত্ত্বেও আবেদনকারী নির্মাণ কাজ অব্যাহত রাখিলে কারিগরি ব্যক্তি বিষয়টি কর্তৃপক্ষকে এবং তাহার পেশাজীবী প্রতিষ্ঠানকে লিখিতভাবে অবহিত করিবেন এবং তিনি উক্ত নির্মাণ কাজে সংশ্লিষ্ট থাকিবেন না মর্মে আবেদনকারীকে লিখিতভাবে অবহিত করিবেন।</h6>\n<h6 class=\"h-lv6\">(১৫) নির্মাণ কাজ আংশিক বা সম্পূর্ণ সমাপনান্তে বসবাস বা ব্যবহার সনদ গ্রহণের জন্য নির্মাণ সমাপ্তি সনদ প্রদান করা পর্যন্ত কারিগরি ব্যক্তির দায়িত্বের সংশ্লিষ্টতা থাকিবে।</h6>\n<h6 class=\"h-lv6\">(১৬) নিম্নবর্ণিত কার্যাবলি কারিগরি ব্যক্তির দায়িত্বে অবহেলা হিসাবে গণ্য হইবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) কারিগরি ব্যক্তির তত্ত্বাবধানে ইমারত বা স্থাপনা নির্মাণে কর্তৃপক্ষ কর্তৃক অনুমোদিত নকশার কোনো ব্যত্যয়;</h6>\n<h6 class=\"h-lv6\">(খ) কর্তৃপক্ষ কর্তৃক অনুমোদিত নকশা, যেমন- স্থাপত্য নকশা, কাঠামো নকশা ও অন্যান্য সার্ভিস ড্রইং, ইত্যাদি সম্পর্কিত ভুল তথ্য প্রদান;</h6>\n<h6 class=\"h-lv6\">(গ) অগ্নি-প্রতিরোধক অথবা অনান্য নিরাপত্তা ব্যবস্থা সম্পর্কিত ভুল তথ্য প্রদান;</h6>\n<h6 class=\"h-lv6\">(ঘ) পরিকল্পনা প্রতিবেদনে ভুল তথ্য প্রদান; এবং</h6>\n<h6 class=\"h-lv6\">(ঙ) নির্মাণ অনুমোদন কমিটিকে অসৎ উদ্দেশ্যে প্রভাবিতকরণ।</h6>\n<h5 class=\"h-lv5\"><strong>১৮। কারিগরি ব্যক্তি ও আবেদনকারীর মধ্যে বিরোধ নিষ্পত্তি।</strong></h5>\n<h6 class=\"h-lv6\">(১) কারিগরি ব্যক্তি ও আবেদনকারীর মধ্যে নির্মাণ সংশ্লিষ্ট বিষয়ে কোনো বিরোধ সৃষ্টি হইলে সংশ্লিষ্ট পেশাজীবী প্রতিষ্ঠানের মাধ্যমে নিষ্পত্তি করিয়া কর্তৃপক্ষকে অবহিত না করা পর্যন্ত নির্মাণ কাজ স্থগিত থাকিবে।</h6>\n<h6 class=\"h-lv6\">(২) উপ-বিধি (১) এর অধীন পেশাজীবী প্রতিষ্ঠানের মাধ্যমে ৩০ (ত্রিশ) দিনের মধ্যে বিরোধ নিষ্পত্তি করা সম্ভব না হইলে উক্ত বিরোধ কর্তৃপক্ষ কর্তৃক নিষ্পত্তি করা হইবে এবং এই ক্ষেত্রে কর্তৃপক্ষের সিদ্ধান্ত চূড়ান্ত বলিয়া গণ্য হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>১৯। নির্মাণ প্রকল্পের তদারকি।</strong></h5>\n<h6 class=\"h-lv6\">(১) আবেদনকারী কর্তৃক নিয়োজিত কারিগরি ব্যক্তি তাহার স্বাক্ষরসহ কর্তৃপক্ষ কর্তৃক অনুমোদিত চেকলিস্ট অনুযায়ী স্থাপনা ও প্রকল্পের নির্মাণকাজ তদারকি প্রতিবেদন কর্তৃপক্ষ বরাবর দাখিল করিবেন।</h6>\n<h6 class=\"h-lv6\">(২) উপ-বিধি (১) এ উল্লিখিত প্রতিবেদনে কারিগরি ব্যক্তি এই মর্মে প্রত্যয়ন করিবেন যে,—</h6>\n<h6 class=\"h-lv6\">(ক) যে সকল ছবি, তথ্য ও প্রতিবেদন জমা দেওয়া হইয়াছে তাহা সম্পন্ন নির্মাণ কাজের সত্য ও সঠিক চিত্র; এবং</h6>\n<h6 class=\"h-lv6\">(খ) কাজটি আইন, অনুমোদিত নকশা, কোড এবং এই বিধিমালা অনুযায়ী সম্পন্ন হইয়াছে।</h6>\n<h6 class=\"h-lv6\">(৩) উপ-বিধি (১) এ উল্লিখিত প্রতিবেদনে কারিগরি ব্যক্তি কর্তৃক পরবর্তীতে প্রতিবেদনের ভুল-ত্রুটি গোচরীভূত হইলে তিনি অনুরূপ ভুল সংশোধন করিবার বিষয়ে ব্যবস্থা গ্রহণ করিবেন।</h6>\n<hr class=\"sep\">"},{"num":"13438","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第１９条（建築工事の監理）（承前）</strong></h5>\n<h6 class=\"h-lv6\">４　建築物又は工作物の工事期間中、所管行政庁（Authority）が定める様式又は方法に従い、段階的に次に掲げる報告書を提出しなければならない。</h6>\n<h6 class=\"h-lv6\">ａ　基礎（Foundation）工事の着手前及び完了後の関連報告書</h6>\n<h6 class=\"h-lv6\">ｂ　土台面（Plinth Level）並びに各階の床及び屋根の施工後の関連報告書</h6>\n<h6 class=\"h-lv6\">ｃ　電気、電気機械、給排水衛生設備（Plumbing System）の重要段階（Critical Phase）完了後の関連報告書</h6>\n<h6 class=\"h-lv6\">ｄ　建築工事完了後の関連報告書</h6>\n<h6 class=\"h-lv6\">５　承認された設計図書及び本規則に従って工事が実施されない場合、所管行政庁は現行の法律及び本規則に基づき、関係者に対して必要な措置を講ずるものとする。</h6>\n<h6 class=\"h-lv6\">６　建築に関連する専門技術者が誤り若しくは虚偽の情報若しくは書類を提出した場合、又は提出後に当該情報の誤りを認識しながら修正を拒否若しくは修正に失敗した場合、所管行政庁は当該技術者の活動を停止させ、又は法的措置を講じることができる。また、当該技術者の会員資格の取消し又は停止のための措置を講じるよう、関連する職能団体に通知するものとする。</h6>\n<h5 class=\"h-lv5\"><strong>第２０条（建築工事に関連する安全）</strong></h5>\n<h6 class=\"h-lv6\">１　建築工事によって道路又は公共の場所において公衆に妨害、危険又は不便が生じる場合は、申請者は当該場所に仮囲い、防護壁（Shield）及び迂回路を設けることで、公衆の安全を確保しなければならない。</h6>\n<h6 class=\"h-lv6\">２　工事用資材を公道又は歩道に置いて公衆の通行を妨げてはならない。また、昼夜を問わず、現場内で砕石機を使用してはならない。</h6>\n<h6 class=\"h-lv6\">３　住宅地域においては、午後６時から午前６時までの間、いかなる機械の使用若しくは建築工法を通じても、不快な騒音又は法典（Code）に定める許容限度を超える騒音を発生させてはならない。</h6>\n<h6 class=\"h-lv6\">４　第２項又は第３項の規定に違反した場合、所管行政庁は申請者又は施工会社に対して法的措置を講じることができる。</h6>\n<h6 class=\"h-lv6\">５　現行の法律、規則、及び政府が随時制定する諸規定に基づく安全に関する全ての条項を適切に遵守しなければならない。</h6>\n<h6 class=\"h-lv6\">６　建築プロジェクトに従事する労働者及び専門技術者の保護のため、法典に掲げられた条件の履行を確保しなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>১৯। নির্মাণ প্রকল্পের তদারকি (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(৪) ইমারত বা স্থাপনা নির্মাণকালে কর্তৃপক্ষ কর্তৃক নির্ধারিত ফরম বা পদ্ধতি অনুসারে পর্যায়ক্রমে নিম্নবর্ণিত প্রতিবেদন জমা প্রদান করিতে হইবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) ভিত্তি (foundation) নির্মাণ আরম্ভের প্রাক্কালে ও নির্মাণের পর এতদসংশ্লিষ্ট প্রতিবেদন;</h6>\n<h6 class=\"h-lv6\">(খ) প্রিন্থ লেভেল এবং প্রত্যেকটি তলা ও ছাদ লেভেল নির্মাণের পর এতদসংশ্লিষ্ট প্রতিবেদন;</h6>\n<h6 class=\"h-lv6\">(গ) ইলেকট্রিক্যাল বা ইলেকট্রো মেকানিক্যাল, পানি সরবরাহ ও পয়ঃনিষ্কাশন ব্যবস্থা (plumbing system) এর সংকটপূর্ণ পর্যায় (critical phase) সম্পন্ন হইবার পর এতদসংশ্লিষ্ট প্রতিবেদন; এবং</h6>\n<h6 class=\"h-lv6\">(ঘ) নির্মাণকাজ সম্পন্ন হইবার পর এতদসংশ্লিষ্ট প্রতিবেদন।</h6>\n<h6 class=\"h-lv6\">(৫) অনুমোদিত নকশা ও এই বিধিমালা অনুযায়ী সংশ্লিষ্ট নির্মাণ সম্পন্ন করা না হইলে কর্তৃপক্ষ প্রচলিত আইন এবং এই বিধিমালা অনুযায়ী সংশ্লিষ্টদের বিরুদ্ধে প্রয়োজনীয় ব্যবস্থা গ্রহণ করিবে।</h6>\n<h6 class=\"h-lv6\">(৬) নির্মাণ সংশ্লিষ্ট কারিগরি ব্যক্তি ভুল বা অসত্য তথ্য বা কাগজপত্র জমা প্রদান করিলে বা জমাদানের পর উক্ত অসত্য ও ভুল তথ্য সম্পর্কে অবগত হইবার পর তাহা সংশোধন করিতে অনিচ্ছুক বা ব্যর্থ হইলে, কর্তৃপক্ষ সংশ্লিষ্ট কারিগরি ব্যক্তির কার্যক্রম স্থগিত রাখিতে পারিবে অথবা আইনানুগ ব্যবস্থা গ্রহণ করিবে, এবং তাহার বিরুদ্ধে সদস্য পদ বাতিল বা স্থগিতের নিমিত্ত ব্যবস্থা গ্রহণের লক্ষ্যে সংশ্লিষ্ট পেশাজীবী সংগঠনকে বিষয়টি অবহিত করিবে।</h6>\n<h5 class=\"h-lv5\"><strong>২০। নির্মাণ সংশ্লিষ্ট নিরাপত্তা।</strong></h5>\n<h6 class=\"h-lv6\">(১) নির্মাণ কাজের ফলে কোনো রাস্তায় বা স্থানে জনসাধারণের জন্য বাধা, বিপত্তি অথবা অসুবিধা সৃষ্টি হইলে আবেদনকারী কর্তৃক উক্ত স্থানে অস্থায়ী ঘের, জীবনরক্ষাকারী বাধা (Shield) এবং বিকল্প চলাচল পথ তৈরি করিয়া জনসাধারণের নিরাপত্তা নিশ্চিত করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(২) নির্মাণ প্রকল্পের দ্রব্যাদি ও জিনিসপত্র জনপথে কিংবা ফুটপাতে রাখিয়া জনসাধারণের চলাচলে অসুবিধা সৃষ্টি অথবা দিবারাত্রির কোনো সময়ই সাইটে পাথর বা খোয়া ভাঙ্গানো মেশিন ব্যবহার করা যাইবে না।</h6>\n<h6 class=\"h-lv6\">(৩) আবাসিক এলাকায় সন্ধ্যা ৬টা হইতে সকাল ৬টা পর্যন্ত কোনো যন্ত্রপাতি ব্যবহার বা নির্মাণ পদ্ধতির মাধ্যমে নির্মাণ সাইট বা প্রকল্পস্থলে বিরক্তিকর কোনো আওয়াজ বা কোডে বর্ণিত গ্রহণযোগ্য মাত্রার অধিক শব্দের সৃষ্টি করা যাইবে না।</h6>\n<h6 class=\"h-lv6\">(৪) উপ-বিধি (২) হইতে (৩) এ বর্ণিত বিধানের ব্যত্যয় ঘটিলে কর্তৃপক্ষ আবেদনকারী কিংবা নির্মাতা প্রতিষ্ঠানের বিরুদ্ধে আইনানুগ ব্যবস্থা গ্রহণ করিতে পারিবে।</h6>\n<h6 class=\"h-lv6\">(৫) বিদ্যমান আইন, বিধিমালা, এবং সরকার কর্তৃক, সময় সময়, প্রণীত বিধি-বিধান অনুযায়ী নিরাপত্তা সংক্রান্ত সকল বিধান যথাযথভাবে অনুসরণ করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৬) নির্মাণ প্রকল্পে নিয়োজিত শ্রমিক ও কারিগরি ব্যক্তিবর্গের সুরক্ষার নিমিত্ত কোডে উল্লিখিত শর্তাবলির বাস্তবায়ন নিশ্চিত করিতে হইবে।</h6>\n<hr class=\"sep\">"},{"num":"13439","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第２１条（建築工事の停止又は無許可構造物の除却等）</strong></h5>\n<h6 class=\"h-lv6\">１　所管行政庁（特定行政庁）は、次の各号のいずれかに該当する場合において、工事の停止、公共設備（ユーティリティ）接続の遮断、是正措置の実施、又は構造物の除却（解体）を命ずることができる。</h6>\n<h6 class=\"h-lv6\">一　承認された設計図書に違反したとき。</h6>\n<h6 class=\"h-lv6\">二　所管行政庁の承認を受けずに建築工事を行ったとき。</h6>\n<h6 class=\"h-lv6\">三　いかなる段階においても、承認された設計図書外の工事が判明したとき。</h6>\n<h6 class=\"h-lv6\">四　本規則に基づく通知を行わずに工事に着手し、又は実施したとき。</h6>\n<h6 class=\"h-lv6\">五　計画承認書又は確認済証（Construction Permit）の規定及び条件に違反したとき。</h6>\n<h6 class=\"h-lv6\">六　工事の実施により、隣接住民の生命若しくは財産に損害を与え、又は環境に対する脅威若しくは危険が生じたとき。</h6>\n<h6 class=\"h-lv6\">２　次の各号のいずれかに該当するときは、確認済証を停止し、又は取り消すことができる。</h6>\n<h6 class=\"h-lv6\">一　当該土地又は敷地に関して法的紛争が生じたとき。</h6>\n<h6 class=\"h-lv6\">二　承認の条件に違反したとき。</h6>\n<h6 class=\"h-lv6\">三　申請書又はその他の様式において、誤り又は虚偽の情報を提供したとき。</h6>\n<h6 class=\"h-lv6\">四　承認取得後に、用途（使用の形態）を変更したとき。</h6>\n<h6 class=\"h-lv6\">五　工事の実施により、隣接住民の生命若しくは財産に損害を与え、又は環境に対する脅威若しくは危険が生じたとき。</h6>\n<h6 class=\"h-lv6\">３　建築物の設計承認が取り消され、又は停止された場合、所管行政庁は３０日以内に、法執行機関、供給事業者（サービス提供機関）、違反設計を行った者に対する処分を求めるための関連専門職団体、及び、適用がある場合において、銀行又は金融機関に対し、その旨を通知しなければならない。</h6>\n<h6 class=\"h-lv6\">４　設計承認が取り消され、又は停止された建築物について、所管行政庁は関連する供給事業者に対し、一切のサービスの提供を行わないよう、又は既に提供されているサービスを停止するよう通知するものとする。</h6>\n<h5 class=\"h-lv5\"><strong>第２２条（居住又は使用許可証）</strong></h5>\n<h6 class=\"h-lv6\">１　建築物又は工作物の完了後、これを使用し、又は居住しようとする者は、居住又は使用許可証（Occupancy Certificate）を取得しなければならない。</h6>\n<p>####### <strong>ただし、</strong> 建築物又は工作物の一部を使用し、又は居住しようとする場合であっても、当該部分について許可証を取得しなければならない。</p>\n<h6 class=\"h-lv6\">２　付録４に定める手数料を納付の上、所管行政庁に対し居住又は使用許可証を申請しなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>২১। নির্মাণ কাজ স্থগিতকরণ অথবা অননুমোদিত কাঠামো ভাঙিয়া দেওয়া, ইত্যাদি।</strong></h5>\n<h6 class=\"h-lv6\">(১) কর্তৃপক্ষ নিম্নবর্ণিত ক্ষেত্রে নির্মাণ কাজ স্থগিত, ইউটিলিটি সংযোগ বিচ্ছিন্নকরণ, সঠিক পদ্ধতি প্রয়োগ অথবা কাঠামো ভাঙ্গিবার আদেশ প্রদান করিতে পারিবে, যদি—</h6>\n<h6 class=\"h-lv6\">(ক) কর্তৃপক্ষ কর্তৃক অনুমোদিত নকশার ব্যত্যয় করা হয়;</h6>\n<h6 class=\"h-lv6\">(খ) কর্তৃপক্ষের অনুমোদন ব্যতিরেকে ইমারত নির্মাণ কাজ করা হয়;</h6>\n<h6 class=\"h-lv6\">(গ) যেকোনো পর্যায়ে অনুমোদিত নকশা বহির্ভূত নির্মাণ কাজ গোচরীভূত হয়;</h6>\n<h6 class=\"h-lv6\">(ঘ) কর্তৃপক্ষকে বিধি মোতাবেক অবহিতকরণ ব্যতিরেকে নির্মাণ কাজ আরম্ভ বা পরিচালনা করা হয়;</h6>\n<h6 class=\"h-lv6\">(ঙ) পরিকল্পনা অনুমোদনপত্র ও নির্মাণ অনুমোদনপত্রের নিয়ম ও শর্তসমূহ লঙ্ঘন করা হয়;</h6>\n<h6 class=\"h-lv6\">(চ) নির্মাণ কাজ চলাকালে পার্শ্ববর্তী জনগণের জীবন ও ধন-সম্পত্তির ক্ষতিসহ পরিবেশের জন্য হুমকি ও ঝুঁকিপূর্ণ হয়।</h6>\n<h6 class=\"h-lv6\">(২) নির্মাণ অনুমোদনপত্র স্থগিত বা বাতিল করা যাইবে, যদি—</h6>\n<h6 class=\"h-lv6\">(ক) সংশ্লিষ্ট জমি বা প্লটের বিষয়ে কোনো আইনগত জটিলতা দেখা দেয়;</h6>\n<h6 class=\"h-lv6\">(খ) অনুমোদনের শর্তাবলি ভঙ্গ করা হয়;</h6>\n<h6 class=\"h-lv6\">(গ) আবেদনপত্র বা অন্যান্য প্রযোজ্য ফরমসমূহে ভুল অথবা মিথ্যা তথ্য পরিবেশন করা হয়;</h6>\n<h6 class=\"h-lv6\">(ঘ) অনুমোদন গ্রহণের পর ব্যবহারের ধরন পরিবর্তন করা হয়;</h6>\n<h6 class=\"h-lv6\">(ঙ) নির্মাণ কাজ চলাকালে পার্শ্ববর্তী জনগণের জীবন ও ধন-সম্পত্তির ক্ষতিসহ পরিবেশের জন্য হুমকি ও ঝুঁকিপূর্ণ হয়।</h6>\n<h6 class=\"h-lv6\">(৩) কোনো ইমারতের অনুমোদিত নকশা বাতিল বা স্থগিত করা হইলে কর্তৃপক্ষ কর্তৃক তাহা আইন প্রয়োগকারী সংস্থা, সেবাদানকারী প্রতিষ্ঠান, বিধি বহির্ভূত নকশা প্রণয়নকারীর বিরুদ্ধে প্রয়োজনীয় ব্যবস্থা গ্রহণের নিমিত্ত সংশ্লিষ্ট পেশাজীবী প্রতিষ্ঠান এবং, প্রযোজ্য ক্ষেত্রে, ব্যাংক বা অর্থ বিনিয়োগকারী প্রতিষ্ঠানকে ৩০ (ত্রিশ) দিনের মধ্যে অবহিত করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৪) যে সকল ইমারতের অনুমোদিত নকশা বাতিল বা স্থগিত করা হয় সেই সকল ইমারতে কোনো রূপ সেবা প্রদান না করিবার জন্য অথবা ইতোমধ্যে প্রদত্ত সেবা প্রত্যাহার করিবার জন্য কর্তৃপক্ষ সংশ্লিষ্ট সেবাদানকারী প্রতিষ্ঠানকে অবহিত করিবে।</h6>\n<h5 class=\"h-lv5\"><strong>২২। বসবাস বা ব্যবহার সনদ।</strong></h5>\n<h6 class=\"h-lv6\">(১) ইমারত বা স্থাপনার নির্মাণের পর বসবাস বা ব্যবহারের জন্য বসবাস বা ব্যবহার সনদ গ্রহণ করিতে হইবে:</h6>\n<p>####### <strong>তবে শর্ত থাকে যে,</strong> ইমারত বা স্থাপনার আংশিক অংশের বসবাস বা ব্যবহারের জন্যও সনদ গ্রহণ করিতে হইবে।</p>\n<h6 class=\"h-lv6\">(২) পরিশিষ্ট ৪ এ বর্ণিত ফি প্রদান সাপেক্ষে, কর্তৃপক্ষের নিকট বসবাস বা ব্যবহার সনদের আবেদন করিতে হইবে।</h6>\n<hr class=\"sep\">"},{"num":"13440","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第２２条（居住又は使用許可証）（承前）</strong></h5>\n<h6 class=\"h-lv6\">３　建築主事（Authorised Officer）は、第２項の規定による申請を受理した日から１５執務日以内に、申請者及び技術者（Technical person）の立会いのもと、当該建築物の検査を行わなければならない。</h6>\n<h6 class=\"h-lv6\">４　前項の規定による検査においては、次に掲げる報告書及び書類を考慮するものとする。</h6>\n<h6 class=\"h-lv6\">ａ　基礎、土台面（Plinth level）並びに各階の床及び屋根の段階的な工事完了報告書</h6>\n<h6 class=\"h-lv6\">ｂ　承認された設計図書に従って工事が完了し、かつ、適切である旨を、工事監理を行った技術者又は施工業者が署名した監理報告書及び証明書</h6>\n<h6 class=\"h-lv6\">ｃ　適用がある場合において、建築物の竣工図（As-built drawings）</h6>\n<h6 class=\"h-lv6\">５　建築主事は、前項に規定する検査報告書その他の書類、公共サービス、構造耐力上の安全、火災安全及び計画に係る条件を審査した上で、申請の日から３０日以内に、承認又は却下の決定をすることができる。</h6>\n<p>####### <strong>ただし、</strong> 却下の決定をする場合にあっては、責任の所在を明確にした上でこれを行わなければならない。</p>\n<h6 class=\"h-lv6\">６　居住又は使用許可証（Occupancy Certificate）の発行をもって、建築物又は工作物の最終的な承認とみなす。</h6>\n<h5 class=\"h-lv5\"><strong>第２３条（居住又は使用許可証の却下に対する不服申立て）</strong></h5>\n<h6 class=\"h-lv6\">１　居住又は使用許可証の申請が却下された場合、申請者は、当該却下の日から３０日以内に、付録４に定める手数料を納付した上で、不服申立委員会（Appellate Committee）に対し審査請求をすることができる。</h6>\n<h6 class=\"h-lv6\">２　不服申立委員会は、前項の審査請求を受理したときは、３０日以内に決定を行わなければならない。</h6>\n<h6 class=\"h-lv6\">３　不服申立委員会は、法律上の明確化が必要な場合は、都市開発委員会（Urban Development Committee）に意見を求めることができる。</h6>\n<h6 class=\"h-lv6\">４　都市開発委員会は、前項の規定により付託を受けたときは、４５日以内に勧告を行わなければならない。</h6>\n<h6 class=\"h-lv6\">５　不服申立ての結果については、申請者に対し書面で通知しなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>২২। বসবাস বা ব্যবহার সনদ (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(৩) অথরাইজড অফিসার উপ-বিধি (২) এর অধীন আবেদন প্রাপ্তির ১৫ (পনেরো) কার্যদিবসের মধ্যে আবেদনকারী ও কারিগরি ব্যক্তির উপস্থিতিতে ইমারতটি পরিদর্শন করিবেন।</h6>\n<h6 class=\"h-lv6\">(৪) উপ-বিধি (৩) এর অধীন পরিদর্শনের ক্ষেত্রে নিম্নবর্ণিত প্রতিবেদন ও কাগজাদি বিবেচনা করিতে হইবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) ভিত্তি, প্রিন্থ লেভেল এবং প্রত্যেকটি ফ্লোর ও রুফ লেভেলের আংশিক নির্মাণ সমাপ্তির প্রতিবেদন;</h6>\n<h6 class=\"h-lv6\">(খ) অনুমোদিত নকশা অনুসরণপূর্বক নির্মাণ কাজটি সম্পন্ন হইয়াছে এবং নির্মাণ কাজ সঠিক রহিয়াছে মর্মে নির্মাণ তদারককারী কারিগরি ব্যক্তি বা, ক্ষেত্রমত, নির্মাণকারী প্রতিষ্ঠান কর্তৃক স্বাক্ষরিত তদারকি প্রতিবেদন ও প্রত্যয়নপত্র;</h6>\n<h6 class=\"h-lv6\">(গ) প্রযোজ্য ক্ষেত্রে, ইমারতের নির্মিত নকশা।</h6>\n<h6 class=\"h-lv6\">(৫) উপ-বিধি (৪) এ উল্লিখিত পরিদর্শন প্রতিবেদন ও অন্যান্য কাগজপত্র, পরিষেবা, কাঠামোগত নিরাপত্তা, অগ্নি নিরাপত্তা ও পরিকল্পনা সংশ্লিষ্ট প্রয়োজনীয় শর্তাবলি পর্যালোচনপূর্বক অথরাইজড অফিসার আবেদনের তারিখ হইতে ৩০ (ত্রিশ) দিনের মধ্যে আবেদন অনুমোদন বা, ক্ষেত্রমত, প্রত্যাখ্যান করিতে পারিবেন:</h6>\n<p>####### <strong>তবে শর্ত থাকে যে,</strong> কোনো আবেদন প্রত্যাখ্যান করিতে হইলে দায় দায়িত্ব নিরূপণসহ প্রত্যাখ্যান করিতে হইবে।</p>\n<h6 class=\"h-lv6\">(৬) বসবাস বা ব্যবহার সনদ ইমারত বা স্থাপনার চূড়ান্ত অনুমোদন বলিয়া গণ্য হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>২৩। বসবাস বা ব্যবহার সনদ প্রত্যাখ্যানের বিরুদ্ধে আপিল।</strong></h5>\n<h6 class=\"h-lv6\">(১) কোনো বসবাস বা ব্যবহার সনদ আবেদন প্রত্যাখ্যান করা হইলে, আবেদনকারী উক্তরূপে প্রত্যাখ্যাত হইবার ৩০ (ত্রিশ) দিনের মধ্যে পরিশিষ্ট ৪ এ বর্ণিত ফি পরিশোধ সাপেক্ষে, আপিল কমিটি বরাবর আপিল আবেদন করিতে পারিবে।</h6>\n<h6 class=\"h-lv6\">(২) উপ-বিধি (১) এর অধীন কোনো আপিল আবেদন প্রাপ্তির পর আপিল কমিটি, উপ-বিধি (৪) ও (৫) এর বিধান সাপেক্ষে, ৩০ (ত্রিশ) দিনের মধ্যে আপিল আবেদনের বিষয়ে সিদ্ধান্ত গ্রহণ করিবে।</h6>\n<h6 class=\"h-lv6\">(৩) উপ-বিধি (২) অনুযায়ী আপিল নিষ্পত্তির ক্ষেত্রে আপিল কমিটি আইনি স্পষ্টতা ও অধিকতর সিদ্ধান্তের জন্য বিষয়টি নগর উন্নয়ন কমিটিতে প্রেরণ করিতে পারিবে।</h6>\n<h6 class=\"h-lv6\">(৪) উপ-বিধি (২) এ যাহা কিছুই থাকুক না কেন, নগর উন্নয়ন কমিটি উপ-বিধি (৩) এর অধীন আবেদন প্রাপ্তির ৪৫ (পঁয়তাল্লিশ) দিনের মধ্যে সুপারিশ প্রদান করিবে এবং নগর উন্নয়ন কমিটির সুপারিশের আলোকে কর্তৃপক্ষ ব্যবস্থা গ্রহণ করিবে।</h6>\n<h6 class=\"h-lv6\">(৫) আপিলে বসবাস বা ব্যবহার সনদ আবেদন অনুমোদিত বা প্রত্যাখ্যাত হইলে আবেদনকারীকে বিষয়টি লিখিতভাবে অবহিত করিতে হইবে।</h6>\n<hr class=\"sep\">"},{"num":"13441","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第２４条（建築物の使用制限）</strong></h5>\n<h6 class=\"h-lv6\">１　承認された居住又は使用許可証（Occupancy Certificate）を得ることなく、いかなる建築物、住戸（フラット）又は区画も、居住、商業、工業その他いかなる目的にも使用してはならない。</h6>\n<h6 class=\"h-lv6\">２　デベロッパーは、住宅プロジェクトのレイアウトプランの承認を受ける前に、当該プロジェクト内の土地又は敷地（プロット）を譲渡、売却又は登記してはならない。</h6>\n<h6 class=\"h-lv6\">３　建築物又は工作物を、居住又は使用許可証に記載された用途以外の目的に使用し、又は他人に使用させてはならない。</h6>\n<h6 class=\"h-lv6\">４　居住又は使用許可証を備えていない建築物に対し、いかなる公共設備（ユーティリティ・サービス）の新規接続も行ってはならない。</h6>\n<h6 class=\"h-lv6\">５　居住又は使用許可証を得ることなく、建築物の全部又は一部（住戸又はフラット）を譲渡し、名義変更し、又は登記してはならない。</h6>\n<h6 class=\"h-lv6\">６　デベロッパー、不動産エージェント、法定代理人、抵当権設定機関又は権原担保会社（Title company）は、新たな所有者又は使用者に対し、居住又は使用許可証の写しを提供しなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第２５条（居住又は使用許可証の更新）</strong></h5>\n<h6 class=\"h-lv6\">１　次に掲げる場合においては、居住又は使用許可証を更新しなければならない。</h6>\n<h6 class=\"h-lv6\">一　建築物の全部又は一部の用途を変更したとき。</h6>\n<h6 class=\"h-lv6\">二　正規の設計変更手続による場合を除き、承認された設計図書との不適合又は変更が生じたとき。</h6>\n<h6 class=\"h-lv6\">三　火災、地震等の災害により、建築物の構造又は公共設備が損傷したと技術者により確認されたとき。</h6>\n<h6 class=\"h-lv6\">２　更新をしようとする者は、別表第４に定める手数料を納付の上、所管行政庁に申請しなければならない。</h6>\n<h6 class=\"h-lv6\">３　所管行政庁は、前項の申請を受理した日から１５日以内に当該建築物を検査し、承認された設計図書との不一致がないと認める場合は、さらに２０日以内に許可証を更新するものとする。不一致が認められる場合は、その理由を記録した上で申請を却下しなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第２６条（更新却下に対する不服申立て）</strong></h5>\n<h6 class=\"h-lv6\">１　居住又は使用許可証の更新申請が却下された者は、その日から３０日以内に、別表第４に定める手数料を納付した上で、不服申立委員会に審査請求をすることができる。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>২৪। ইমারতের ব্যবহার।</strong></h5>\n<h6 class=\"h-lv6\">(১) অনুমোদিত বসবাস বা ব্যবহার সনদ ব্যতীত কোনো ভবন, ফ্ল্যাট বা স্পেস আবাসিক, বাণিজ্যিক, শিল্প বা অন্য যে কোনো কাজে ব্যবহার করা যাইবে না।</h6>\n<h6 class=\"h-lv6\">(২) কোনো ডেভেলপার কোম্পানি কর্তৃক আবাসিক প্রকল্পের লে-আউট প্ল্যান অনুমোদনের পূর্বে উক্ত প্রকল্পের অন্তর্গত ভূমি বা প্লট হস্তান্তর, বিক্রয় অথবা রেজিস্ট্রি করা যাইবে না।</h6>\n<h6 class=\"h-lv6\">(৩) কোনো ইমারত বা স্থাপনা বসবাস বা ব্যবহার সনদে উল্লিখিত ব্যবহারের উদ্দেশ্য বহির্ভূত অন্য কোনো কাজে ব্যবহার করা যাইবে না বা অন্য কাউকে এইরূপ ব্যবহার করিতে দেওয়া যাইবে না।</h6>\n<h6 class=\"h-lv6\">(৪) বসবাস বা ব্যবহার সনদ ব্যতীত কোনো ভবনে কোনো প্রকার ইউটিলিটি সার্ভিসের নতুন সংযোগ প্রদান করা যাইবে না।</h6>\n<h6 class=\"h-lv6\">(৫) বসবাস বা ব্যবহার সনদ ব্যতীত কোনো ইমারতের সম্পূর্ণ বা আংশিক (অ্যাপার্টমেন্ট বা ফ্ল্যাট) হস্তান্তর, নামজারি ও রেজিস্ট্রেশন করা যাইবে না।</h6>\n<h6 class=\"h-lv6\">(৬) ডেভেলপার, রিয়েল এস্টেট এজেন্ট, আইনসম্মত প্রতিনিধি (আমমোক্তার), বন্ধককারী প্রতিষ্ঠান (মর্টগেজ), বা সম্পদ বিক্রয় বা হস্তান্তরের সঙ্গে সম্পৃক্ত কোনো স্বত্বাধিকারী কোম্পানি (title company) কর্তৃক নূতন মালিক বা ব্যবহারকারীকে বসবাস বা ব্যবহার সনদের কপি প্রদান করিতে হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>২৫। বসবাস বা ব্যবহার সনদ নবায়ন।</strong></h5>\n<h6 class=\"h-lv6\">(১) নিম্নবর্ণিত ক্ষেত্রে বসবাস বা ব্যবহার সনদ নবায়ন করিতে হইবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) ইমারতের সম্পূর্ণ বা আংশিক ব্যবহার পরিবর্তন;</h6>\n<h6 class=\"h-lv6\">(খ) নকশা সংশোধনের ক্ষেত্র ব্যতীত অনুমোদিত নকশার ব্যত্যয় বা পরিবর্তন;</h6>\n<h6 class=\"h-lv6\">(গ) যেকোনো ধরনের দুর্যোগ, যেমন- অগ্নি, ভূমিকম্প, ইত্যাদি কারিগরি ব্যক্তি কর্তৃক যাচাইক্রমে ইমারতের কাঠামো বা ইউটিলিটি সার্ভিস ক্ষতিগ্রস্ত হওয়া।</h6>\n<h6 class=\"h-lv6\">(২) বসবাস বা ব্যবহার সনদ নবায়নের জন্য পরিশিষ্ট ৪ এ উল্লিখিত ফি প্রদানপূর্বক কর্তৃপক্ষের নিকট আবেদন করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৩) উপ-বিধি (২) অনুসারে আবেদন প্রাপ্তির ১৫ (পনেরো) দিনের মধ্যে কর্তৃপক্ষ ভবনটি পরিদর্শন করিবে এবং পরিদর্শনকালে, অনুমোদিত নকশার কোনো প্রকার বিচ্যুতি বা অসংগতি বিদ্যমান না থাকিলে পরবর্তী ২০ (বিশ) দিনের মধ্যে বসবাস বা ব্যবহার সনদ নবায়ন করিবে, অন্যথায় শনাক্তকৃত বিচ্যুতি বা অসংগতি লিপিবদ্ধ করিয়া আবেদনটি প্রত্যাখ্যান করিবে।</h6>\n<h5 class=\"h-lv5\"><strong>২৬। বসবাস বা ব্যবহার সনদ নবায়ন প্রত্যাখ্যানের বিরুদ্ধে আপিল।</strong></h5>\n<h6 class=\"h-lv6\">(১) কোনো বসবাস বা ব্যবহার সনদ নবায়নের আবেদন প্রত্যাখ্যান করা হইলে, আবেদনকারী উক্তরূপে প্রত্যাখ্যাত হইবার ৩০ (ত্রিশ) দিনের মধ্যে পরিশিষ্ট ৪ এ বর্ণিত ফি পরিশোধ সাপেক্ষে, আপিল কমিটি বরাবর আপিল করিতে পারিবে।</h6>\n<hr class=\"sep\">"},{"num":"13442","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第２６条（更新却下に対する不服申立て）（承前）</strong></h5>\n<h6 class=\"h-lv6\">２　不服申立委員会は、審査請求を受理した日から３０日以内に決定を行わなければならず、当該決定は最終的なものとする。</h6>\n<h6 class=\"h-lv6\">３　不服申立委員会は、法律上の明確化又は更なる判断が必要な場合は、当該事項を都市開発委員会（Urban Development Committee）に付託することができる。</h6>\n<h6 class=\"h-lv6\">４　前項の規定による付託を受けた場合、都市開発委員会は４５日以内に勧告を行い、不服申立委員会は当該勧告を検討した上で最終決定を下すものとする。</h6>\n<h6 class=\"h-lv6\">５　不服申立ての結果については、申請者に書面で通知しなければならない。</h6>\n<h6 class=\"h-lv6\">６　第２５条第１項に定める事由があるにもかかわらず、居住又は使用許可証の更新を行わない場合は、建築主、専門技術者、及び当局の担当職員は連帯して責任を負い、法的措置の対象となる。</h6>\n<h5 class=\"h-lv5\"><strong>第２７条（塔の建設及び池の掘削等に係る手数料）</strong></h5>\n<h6 class=\"h-lv6\">通信塔等の建設、池の掘削等の承認、修正及び変更に関しては、付録４に定める所定の手数料を納付しなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第２８条（当局の検査、職務及び責任）</strong></h5>\n<h6 class=\"h-lv6\">１　所管行政庁（Authority）又はその委任を受けた検査員は、工事中の建築物が承認された設計図書及び仕様書に準拠しているかを検査し、必要に応じて<strong>リモートセンシング（Remote sensing）</strong>等の技術を活用することができる。</h6>\n<h6 class=\"h-lv6\">２　所管行政庁は、土台面（Plinth level）までの工事期間中、及び<strong>各階の工事ごとに少なくとも１回</strong>、実地検査を行わなければならない。検査結果は、当局指定の様式に基づき<strong>静止画及び動画</strong>を添えた報告書として提出し、設計との不適合が認められる場合は責任の所在を明確にするものとする。</h6>\n<h6 class=\"h-lv6\">３　所管行政庁又はその委任を受けた者の職務及び責任は次の通りとする。</h6>\n<h6 class=\"h-lv6\">一　法、法典（Code）及び本規則に基づき付与された職務を、所定の期間内に適切に遂行すること。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>২৬। বসবাস বা ব্যবহার সনদ নবায়ন প্রত্যাখ্যানের বিরুদ্ধে আপিল (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(২) উপ-বিধি (১) এর অধীন কোনো আপিল আবেদন প্রাপ্তির পর আপিল কমিটি, উপ-বিধি (৪) ও (৫) এর বিধান সাপেক্ষে, ৩০ (ত্রিশ) দিনের মধ্যে আপিল আবেদনের বিষয়ে সিদ্ধান্ত গ্রহণ করিবে এবং উক্ত সিদ্ধান্ত চূড়ান্ত বলিয়া গণ্য হইবে।</h6>\n<h6 class=\"h-lv6\">(৩) উপ-বিধি (২) অনুযায়ী আপিল নিষ্পত্তির ক্ষেত্রে আপিল কমিটি আইনি স্পষ্টতা ও অধিকতর সিদ্ধান্তের জন্য বিষয়টি নগর উন্নয়ন কমিটিতে প্রেরণ করিতে পারিবে।</h6>\n<h6 class=\"h-lv6\">(৪) উপ-বিধি (২) এ যাহা কিছুই থাকুক না কেন, নগর উন্নয়ন কমিটি উপ-বিধি (৩) এর অধীন আবেদন প্রাপ্তির ৪৫ (পঁয়তাল্লিশ) দিনের মধ্যে সুপারিশ প্রদান করিবে এবং নগর উন্নয়ন কমিটির সুপারিশ পর্যালোচনা করিয়া আপিল কমিটি চূড়ান্ত সিদ্ধান্ত গ্রহণ করিবে।</h6>\n<h6 class=\"h-lv6\">(৫) আপিলে বসবাস বা ব্যবহার সনদ নবায়নের আবেদন অনুমোদিত বা প্রত্যাখ্যাত হইলে আবেদনকারীকে বিষয়টি লিখিতভাবে অবহিত করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৬) বিধি ২৫ এর উপ-বিধি (১) এ উল্লিখিত কারণ থাকা সত্ত্বেও বসবাস বা ব্যবহার সনদ নবায়ন করা না হইলে তজ্জন্য ইমারতের স্বত্বাধিকারী, কারিগরি ব্যক্তি এবং কর্তৃপক্ষের সংশ্লিষ্ট কর্মচারী ও কর্মকর্তা দায়বদ্ধ থাকিবেন এবং দায়ী ব্যক্তির বিরুদ্ধে আইনগত ব্যবস্থা গ্রহণ করা হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>২৭। টাওয়ার নির্মাণ ও পুকুর খনন, ইত্যাদির জন্য অনুমোদন, সংশোধন ও পরিবর্তন ফি।</strong></h5>\n<h6 class=\"h-lv6\">টাওয়ার নির্মাণ ও পুকুর খনন, ইত্যাদির জন্য অনুমোদন, সংশোধন ও পরিবর্তন অনুমোদনের ক্ষেত্রে পরিশিষ্ট ৪ এ বর্ণিত নির্ধারিত ফি প্রদান করিতে হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>২৮। কর্তৃপক্ষের পরিদর্শন, কর্তব্য ও দায়িত্ব।</strong></h5>\n<h6 class=\"h-lv6\">(১) কর্তৃপক্ষ বা তদ্কর্তৃক ক্ষমতাপ্রাপ্ত কোনো কর্মচারী বা ইমারত পরিদর্শক বা কর্তৃপক্ষ কর্তৃক নিয়োগপ্রাপ্ত ব্যক্তি বা প্রতিষ্ঠান নির্মাণাধীন ইমারত নির্মাণের কাজ পরিদর্শন এবং অনুমোদিত নকশা, প্রতিবেদন ও স্পেসিফিকেশন অনুযায়ী নির্মাণ কাজ বাস্তবায়ন হইতেছে কিনা তাহা পরীক্ষা করিবে এবং, এক্ষেত্রে, প্রয়োজনে, দূর-পরিবীক্ষণ (Remote sensing) ও প্রযুক্তির সহায়তা গ্রহণ করা যাইবে।</h6>\n<h6 class=\"h-lv6\">(২) বিধি ১৯ এর উপ-বিধি ৪ অনুসারে প্রতিবেদন প্রাপ্তির পর কর্তৃপক্ষ বা তদ্কর্তৃক ক্ষমতাপ্রাপ্ত কোনো কমিটি, কর্মকর্তা বা ইমারত পরিদর্শক নির্মাণাধীন ইমারতের প্লিন্থ স্তর পর্যন্ত নির্মাণ চলাকালীন ও প্রতি তলার নির্মাণ কাজ অন্তত একবার করিয়া পরিদর্শন করিবেন এবং অনুমোদিত নকশা ও নিয়মানুযায়ী নির্মাণ কাজটি সম্পন্ন করা হইতেছে কিনা সে বিষয়ে কর্তৃপক্ষের নিকট কর্তৃপক্ষ কর্তৃক নির্ধারিত ছক অনুযায়ী স্থিরচিত্র ও ভিডিওসহ প্রতিবেদন দাখিল করিবেন এবং পরবর্তীতে নির্মিত বা নির্মাণাধীন ইমারতের যেকোনো ধরনের ব্যত্যয়ের ক্ষেত্রে তদানুযায়ী দায় দায়িত্ব নিরূপণ করা হইবে।</h6>\n<h6 class=\"h-lv6\">(৩) কর্তৃপক্ষ বা তদ্কর্তৃক ক্ষমতাপ্রাপ্ত বা নিয়োগকৃত কোনো ব্যক্তি বা প্রতিষ্ঠানের দায়-দায়িত্ব হইবে নিম্নরূপ, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) কর্তৃপক্ষ বা তদ্কর্তৃক ক্ষমতাপ্রাপ্ত বা নিয়োগকৃত কোনো কর্মচারী আইন, কোড এবং এই বিধিমালার বিধান অনুসারে যে সকল দায়িত্ব পালনের ক্ষমতাপ্রাপ্ত তাহা নির্ধারিত সময়ে যথাযথভাবে পরিপালন করা;</h6>\n<hr class=\"sep\">"},{"num":"13443","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第２８条（当局の検査、職務及び責任）（承前）</strong></h5>\n<h6 class=\"h-lv6\">３（承前）</h6>\n<h6 class=\"h-lv6\">二　所管行政庁の職員又は委任を受けた者は、直接又は間接を問わず、本規則により規制される建築物の計画策定、設計、工事監理、修繕、維持管理、増改築、資材・機器の証明、資材供給、労務、什器備品、又はその他の業務に関与してはならない。</h6>\n<h6 class=\"h-lv6\">三　所管行政庁の職員又は委任を受けた者は、直接又は間接を問わず、建築関連事業の運営、又はプランナー、技術者、建築士、施工者若しくは供給業者としての業務に従事してはならない。</h6>\n<h6 class=\"h-lv6\">４　所管行政庁の職員又は委任を受けた者が前項に規定する義務に違反したときは、関連法令に基づき、当該職員に対し必要な措置を講じるものとする。</h6>\n<h3 class=\"h-lv3\">第３章 [Chapter III]</h3>\n<h4 class=\"h-lv4\">委員会 [Committee]</h4>\n<h5 class=\"h-lv5\"><strong>第２９条（委員会の設置）</strong></h5>\n<h6 class=\"h-lv6\">１　本規則の目的を達成するため、次に掲げる委員会を設置する。</h6>\n<h6 class=\"h-lv6\">一　建築審査委員会（Building Construction Committee）</h6>\n<h6 class=\"h-lv6\">二　不服申立委員会（Appellate Committee）</h6>\n<h6 class=\"h-lv6\">三　都市開発委員会（Urban Development Committee）</h6>\n<h6 class=\"h-lv6\">２　所管行政庁は、必要があると認めるときは、その他の委員会を設置することができる。</h6>\n<h5 class=\"h-lv5\"><strong>第３０条（建築審査委員会）</strong></h5>\n<h6 class=\"h-lv6\">１　１９５２年建築工事法第３条第２項の規定に基づき、専門技術を有する委員により構成される建築審査委員会を設置する。当該委員会における建築主事（Authorised Officer）及び技術委員の意見は、義務的（Mandatory）なものとする。</h6>\n<h6 class=\"h-lv6\">２　不服申立委員会又は都市開発委員会の委員は、建築審査委員会の委員を兼ねることができない。</h6>\n<h5 class=\"h-lv5\"><strong>第３１条（不服申立委員会の構成）</strong></h5>\n<h6 class=\"h-lv6\">１　不服申立委員会は、次に掲げる委員をもって構成する。</h6>\n<h6 class=\"h-lv6\">一　所管行政庁の会長（Chairman）（委員長を兼ねる）</h6>\n<h6 class=\"h-lv6\">二　住宅公共事業省が指名する共同秘書（Joint Secretary）級以上の代表者</h6>\n<h6 class=\"h-lv6\">三　所管行政庁の主任建築士（Chief Architect）（事務局長を兼ねる）</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>২৮। কর্তৃপক্ষের পরিদর্শন, কর্তব্য ও দায়িত্ব (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(৩) (চলমান)</h6>\n<h6 class=\"h-lv6\">(খ) কর্তৃপক্ষ বা তদ্কর্তৃক ক্ষমতাপ্রাপ্ত বা নিয়োগকৃত কোনো কর্মচারী কোনোভাবেই প্রত্যক্ষ বা পরোক্ষভাবে পরিকল্পনা প্রণয়ন, নকশা প্রণয়ন, নির্মাণ তদারকি, মেরামত, রক্ষণাবেক্ষণ, পরিবর্তন বা পরিবর্ধনে সংশ্লিষ্ট কোনো ইমারত, কোনো কাজের বা উপকরণের সার্টিফিকেটশন, উপকরণ সরবরাহ, শ্রম, সরঞ্জাম, কোড বা এই বিধিমালার বিধান দ্বারা নিয়ন্ত্রিত যন্ত্রপাতি বা অন্য কোনো কাজের সংশ্লিষ্ট না হওয়া;</h6>\n<h6 class=\"h-lv6\">(গ) কর্তৃপক্ষ বা তদ্কর্তৃক ক্ষমতাপ্রাপ্ত বা নিয়োগকৃত কোনো কর্মচারী কর্তৃক প্রত্যক্ষ বা পরোক্ষভাবে নির্মাণ সংশ্লিষ্ট ব্যবসা পরিচালনা, পরিকল্পনাকারী, প্রকৌশলী, স্থপতি, নির্মাতা বা সরবরাহকারী হিসাবে জড়িত না হওয়া।</h6>\n<h6 class=\"h-lv6\">(৪) কর্তৃপক্ষ বা তদ্কর্তৃক ক্ষমতাপ্রাপ্ত বা নিয়োগকৃত কোনো কর্মচারী উপ-বিধি (৩) এ বর্ণিত কোনো দায়িত্বের ব্যত্যয় করিলে আইন ও সংশ্লিষ্ট বিধি-বিধান অনুসারে সংশ্লিষ্ট কর্মচারীর বিরুদ্ধে প্রয়োজনীয় ব্যবস্থা গ্রহণ করা যাইবে।</h6>\n<h3 class=\"h-lv3\">তৃতীয় অধ্যায়</h3>\n<h4 class=\"h-lv4\">কমিটি</h4>\n<h5 class=\"h-lv5\"><strong>২৯। কমিটি গঠন।</strong></h5>\n<h6 class=\"h-lv6\">(১) এই বিধিমালার উদ্দেশ্য পূরণকল্পে, নিম্নরূপ এক বা একাধিক কমিটি থাকিবে, যথা:---</h6>\n<h6 class=\"h-lv6\">(ক) ইমারত নির্মাণ কমিটি;</h6>\n<h6 class=\"h-lv6\">(二) আপিল কমিটি;</h6>\n<h6 class=\"h-lv6\">(গ) নগর উন্নয়ন কমিটি।</h6>\n<h6 class=\"h-lv6\">(২) কর্তৃপক্ষ, প্রয়োজনে, অন্য যেকোনো কমিটি গঠন করিতে পারিবে।</h6>\n<h5 class=\"h-lv5\"><strong>৩০। ইমারত নির্মাণ কমিটি।</strong></h5>\n<h6 class=\"h-lv6\">(১) আইনের section 3 এর sub-section (2) অনুযায়ী বিভিন্ন কারিগরি সদস্যের সমন্বয়ে এক বা একাধিক ইমারত নির্মাণ কমিটি থাকিবে এবং কমিটিতে অথরাইজড অফিসার ও কারিগরি সদস্যের মতামত বাধ্যতামূলক হইবে।</h6>\n<h6 class=\"h-lv6\">(২) আপিল কমিটি বা নগর উন্নয়ন কমিটির কোনো সদস্যকে এই কমিটির সদস্য পদে মনোনীত করা যাইবে না।</h6>\n<h5 class=\"h-lv5\"><strong>৩১। আপিল কমিটি গঠন।</strong></h5>\n<h6 class=\"h-lv6\">(১) আপিল কমিটি নিম্নবর্ণিত সদস্য সমন্বয়ে গঠিত হইবে, যথা:---</h6>\n<h6 class=\"h-lv6\">(ক) কর্তৃপক্ষের চেয়ারম্যান, যিনি উহার সভাপতিও হইবেন;</h6>\n<h6 class=\"h-lv6\">(খ) গৃহায়ন ও গণপূর্ত মন্ত্রণালয় কর্তৃক মনোনীত অন্যূন যুগ্মসচিব পদমর্যাদার একজন প্রতিনিধি; এবং</h6>\n<h6 class=\"h-lv6\">(গ) কর্তৃপক্ষের প্রধান নগর স্থপতি, যিনি উহার সদস্য-সচিবও হইবেন।</h6>\n<hr class=\"sep\">"},{"num":"13444","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第３１条（不服申立委員会の構成）（承前）</strong></h5>\n<h6 class=\"h-lv6\">２　不服申立委員会は、必要があると認めるときは、専門家、専門職の個人又は機関の助言を求めることができる。</h6>\n<h6 class=\"h-lv6\">３　建築審査委員会（Building Construction Committee）の委員は、不服申立委員会の委員に任命されることはできない。</h6>\n<h5 class=\"h-lv5\"><strong>第３２条（都市開発委員会）</strong></h5>\n<h6 class=\"h-lv6\">１　都市開発委員会（Urban Development Committee）は、次に掲げる委員をもって構成する。</h6>\n<h6 class=\"h-lv6\">一　住宅公共事業省秘書（次官級）（委員長を兼ねる）</h6>\n<h6 class=\"h-lv6\">二　首都開発庁（RAJUK）会長</h6>\n<h6 class=\"h-lv6\">三　国家住宅公社（NHA）会長</h6>\n<h6 class=\"h-lv6\">四　ダッカ地区行政官（Divisional Commissioner）</h6>\n<h6 class=\"h-lv6\">五　公務員局（PWD）主任技師</h6>\n<h6 class=\"h-lv6\">六　建築局（DoA）主任建築士</h6>\n<h6 class=\"h-lv6\">七　関
