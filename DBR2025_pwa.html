  <!-- Google Fonts: Noto Sans JP (weight 400, woff2) -->

<style>
:root {
  --bg:       #f5f4f0;
  --surface:  #ffffff;
  --border:   #d8d4cc;
  --accent:   #1a4c8b;
  --accent2:  #b05e00;
  --text:     #1a1a1a;
  --text-sub: #555;
  --toc-bg:   #f0eeea;
  --toc-w:    280px;
  --header-h: 56px;
  --font-jp:  'Noto Sans JP', sans-serif;
  --font-bn:  'Noto Sans Bengali', 'YuGothic', 'Yu Gothic', sans-serif;
  --font-mono: ui-monospace, 'SF Mono', 'Menlo', 'Consolas', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-jp);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.9;
}

/* ─── HEADER ─── */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--header-h);
  background: var(--accent);
  display: flex; align-items: center; gap: 16px;
  padding: 0 20px;
  box-shadow: 0 2px 6px rgba(0,0,0,.25);
}
#header .site-title {
  color: #fff; font-size: 13px; font-weight: 600;
  line-height: 1.3; flex: 1;
}
#header .site-title span { display: block; }
#header .site-title .sub { font-size: 11px; opacity: .75; font-weight: 400; font-family: var(--font-bn); }

.lang-toggle {
  display: flex; align-items: center; gap: 0;
  border: 1.5px solid rgba(255,255,255,.5); border-radius: 6px; overflow: hidden;
}
.lang-btn {
  padding: 5px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: none; background: transparent; color: rgba(255,255,255,.65);
  transition: background .15s, color .15s;
  font-family: var(--font-mono);
}
.lang-btn.active { background: #fff; color: var(--accent); }

#toc-toggle-btn {
  display: none;
  background: transparent; border: none;
  color: #fff; cursor: pointer; padding: 6px;
  font-size: 20px; line-height: 1;
}

/* ─── LAYOUT ─── */
#layout {
  display: flex;
  padding-top: var(--header-h);
  min-height: 100vh;
}

/* ─── TOC ─── */
#toc {
  width: var(--toc-w); flex-shrink: 0;
  background: var(--toc-bg);
  border-right: 1px solid var(--border);
  position: fixed; top: var(--header-h); bottom: 0;
  overflow-y: auto; overflow-x: hidden;
  padding: 16px 0 40px;
  transition: transform .25s ease;
  z-index: 50;
}
#toc::-webkit-scrollbar { width: 4px; }
#toc::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.toc-section-label {
  font-size: 10px; font-weight: 600; letter-spacing: .08em;
  color: var(--text-sub); text-transform: uppercase;
  padding: 14px 16px 4px; font-family: var(--font-mono);
}

.toc-item {
  display: block; width: 100%;
  padding: 5px 16px 5px calc(16px + var(--indent, 0px));
  font-size: 12.5px; line-height: 1.4; color: var(--text);
  text-decoration: none; border: none; background: none;
  cursor: pointer; text-align: left;
  transition: background .1s;
  border-left: 3px solid transparent;
  font-family: var(--font-jp);
}
.toc-item[data-level="3"] { --indent: 0px; font-weight: 600; font-size: 12px; color: var(--accent); }
.toc-item[data-level="5"] { --indent: 8px;  font-size: 11.5px; color: var(--text-sub); }
.toc-item[data-level="6"] { --indent: 18px; font-size: 11px;   color: var(--text-sub); }
.toc-item:hover { background: rgba(0,0,0,.05); }
.toc-item.active { background: #e8eef6; border-left-color: var(--accent); color: var(--accent); font-weight: 600; }

/* ─── 章アコーディオン ─── */
.toc-chapter {
  border-bottom: 1px solid var(--border);
}
.toc-chapter-toggle {
  display: flex; align-items: center;
  width: 100%; padding: 7px 12px 7px 16px;
  background: none; border: none; cursor: pointer;
  font-family: var(--font-jp); font-size: 12px; font-weight: 600;
  color: var(--text); text-align: left;
  border-left: 3px solid transparent;
  transition: background .1s;
  gap: 6px;
}
.toc-chapter-toggle:hover { background: rgba(0,0,0,.05); }
.toc-chapter-toggle.active {
  color: var(--accent); border-left-color: var(--accent);
  background: #e8eef6;
}
.toc-chapter-toggle .toggle-arrow {
  flex-shrink: 0; width: 14px; height: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: var(--text-sub);
  transition: transform .2s ease;
}
.toc-chapter-toggle .toggle-label { flex: 1; }
.toc-chapter-toggle[aria-expanded="false"] .toggle-arrow { transform: rotate(0deg); }
.toc-chapter-toggle[aria-expanded="true"]  .toggle-arrow { transform: rotate(90deg); }
.toc-chapter-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height .25s ease;
}
.toc-chapter-body.open { max-height: 9999px; }

/* Bengali TOC labels */
body.lang-bn .toc-item { font-family: var(--font-bn); }

/* ─── MAIN CONTENT ─── */
#main {
  margin-left: var(--toc-w);
  flex: 1; padding: 0 0 60px;
  min-width: 0;
}

/* ─── PAGE VIEW ─── */
.page-view {
  display: block;
  max-width: 860px; margin: 0 auto; padding: 32px 40px;
  border-bottom: 2px dashed var(--border);
  scroll-margin-top: calc(var(--header-h) + 12px);
}
.page-view:last-child { border-bottom: none; }

/* ジャンプ先見出しが固定ヘッダーに隠れないようオフセット */
.content h2, .content h3, .content h4,
.content h5, .content h6 {
  scroll-margin-top: calc(var(--header-h) + 16px);
}

.page-header {
  display: flex; align-items: center; gap: 12px;
  padding-bottom: 12px; margin-bottom: 24px;
  border-bottom: 2px solid var(--accent);
}
.page-num-badge {
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  color: #fff; background: var(--accent);
  padding: 3px 10px; border-radius: 3px; letter-spacing: .05em;
}
.page-gazette {
  font-size: 11.5px; color: var(--text-sub);
  font-family: var(--font-bn);
}
body:not(.lang-bn) .page-gazette { font-family: var(--font-jp); font-size: 11px; }

/* ─── CONTENT TYPOGRAPHY ─── */
.content { font-family: var(--font-jp); }
body.lang-bn .content { font-family: var(--font-bn); font-size: 14.5px; }

.content h2.h-lv2 {
  font-size: 14px; font-weight: 600; letter-spacing: .03em;
  color: var(--accent); text-transform: none;
  padding: 20px 0 4px; margin-bottom: 2px;
  border-top: 1px solid var(--border);
}
.content h3.h-lv3 {
  font-size: 14px; font-weight: 600;
  color: var(--accent2);
  padding: 14px 0 4px;
}
.content h4.h-lv4 {
  font-size: 15px; font-weight: 600;
  color: var(--text);
  margin: 18px 0 8px;
  padding-left: 10px;
  border-left: 3px solid var(--accent);
}
.content h5.h-lv5 {
  font-size: 14.5px; font-weight: 400;
  margin: 7px 0 5px; padding-left: 20px;
  color: var(--text);
}
.content h6.h-lv6 {
  font-size: 14px; font-weight: 400;
  margin: 5px 0; padding-left: 36px;
  color: var(--text);
}
.content p {
  font-size: 14.5px; margin: 6px 0 6px 20px;
  color: var(--text);
}
.content p.list-item { padding-left: 36px; text-indent: -14px; }
.content hr.sep { border: none; border-top: 1px dashed var(--border); margin: 16px 0; }

/* ─── FIGURE ─── */
.content .fig-wrap {
  margin: 20px 0;
  text-align: center;
}
.content .fig-img {
  max-width: 100%;
  height: auto;
  border: 1px solid var(--border);
  border-radius: 4px;
  display: block;
  margin: 0 auto;
}
.content .fig-caption {
  font-size: 12px;
  color: var(--text-sub);
  margin-top: 6px;
  font-family: var(--font-jp);
}
.content .fig-title {
  text-align: center;
  font-size: 15px;
  font-weight: 600;
  margin: 16px 0 8px;
  color: var(--text);
  font-family: var(--font-jp);
}

/* ─── TABLE ─── */
.content .table-wrap {
  overflow-x: auto; margin: 16px 0;
  border: 1px solid var(--border); border-radius: 4px;
}
.content table {
  width: 100%; border-collapse: collapse;
  font-size: 12px;
}
.content table thead tr { background: var(--accent); color: #fff; }
.content table th {
  padding: 8px 10px; font-weight: 600; text-align: left;
  border-right: 1px solid rgba(255,255,255,.2);
}
.content table td {
  padding: 7px 10px; border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  vertical-align: top;
}
.content table tbody tr:nth-child(even) { background: #f7f6f3; }
.content table tbody tr:hover { background: #eef2f8; }
.content .math { font-family: var(--font-mono); background: #f0f0f0; padding: 1px 5px; border-radius: 3px; }

/* ─── PAGE NAV ─── */
.page-nav { display: none; }
}
.nav-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; font-size: 13px; font-weight: 500;
  color: var(--accent); border: 1.5px solid var(--accent);
  border-radius: 4px; cursor: pointer; background: none;
  text-decoration: none; transition: all .15s;
  font-family: var(--font-jp);
}
.nav-btn:hover { background: var(--accent); color: #fff; }
.nav-btn:disabled { opacity: .3; cursor: default; }
.nav-btn:disabled:hover { background: none; color: var(--accent); }
.page-pos { font-family: var(--font-mono); font-size: 12px; color: var(--text-sub); }

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  :root { --toc-w: 260px; }
  #toc { transform: translateX(-100%); }
  #toc.open { transform: translateX(0); box-shadow: 4px 0 20px rgba(0,0,0,.15); }
  #main { margin-left: 0; }
  #toc-toggle-btn { display: block; }
  .page-view { padding: 20px 16px; }
  .page-nav { padding: 20px 16px 0; }
  #toc-overlay {
    display: none; position: fixed; inset: 0; z-index: 40;
    background: rgba(0,0,0,.35);
  }
  #toc-overlay.show { display: block; }
}

  /* iOS Safe Area (ノッチ・ホームバー対応) */
  @supports (padding-top: env(safe-area-inset-top)) {
    #header {
      padding-top: env(safe-area-inset-top);
      height: calc(var(--header-h) + env(safe-area-inset-top));
    }
    #layout {
      padding-top: calc(var(--header-h) + env(safe-area-inset-top));
    }
    #toc {
      top: calc(var(--header-h) + env(safe-area-inset-top));
    }
    #main {
      padding-bottom: calc(60px + env(safe-area-inset-bottom));
    }
    #pwa-banner {
      padding-bottom: calc(20px + env(safe-area-inset-bottom)) !important;
    }
    /* ノッチ分も加算してジャンプ位置を調整 */
    .content h2, .content h3, .content h4,
    .content h5, .content h6 {
      scroll-margin-top: calc(var(--header-h) + env(safe-area-inset-top) + 16px);
    }
  }
  /* スタンドアロン時のヘッダー調整 */
  @media (display-mode: standalone) {
    body { -webkit-user-select: none; user-select: none; }
    .content { -webkit-user-select: text; user-select: text; }
  }

</style>
</head>

<div id="header">
  <button id="toc-toggle-btn" aria-label="目次を開く">☰</button>
  <div class="site-title">
    <span>ダッカ首都圏建築規則 2025</span>
    <span class="sub">ঢাকা মহানগর ইমারত বিধিমালা, ২০২৫</span>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn active" data-lang="jp">日本語</button>
    <button class="lang-btn" data-lang="bn">বাংলা</button>
  </div>
</div>

<div id="toc-overlay"></div>

<div id="layout">
  <nav id="toc" aria-label="目次"></nav>
  <main id="main">
    <div id="pages-container"></div>
    <div class="page-nav">
      <button class="nav-btn" id="btn-prev" disabled>← 前頁</button>
      <span class="page-pos" id="page-pos"></span>
      <button class="nav-btn" id="btn-next">次頁 →</button>
    </div>
  </main>

<script>
(function(){
  const PAGES = [{"num":"13409","jp":"<h3 class=\"h-lv3\">第１章 [PART I]</h3>\n<h4 class=\"h-lv4\">序論 [Preliminary]</h4>\n<h5 class=\"h-lv5\">第１条　名称、適用及び施行 [Short Title, Application and Commencement]</h5>\n<h6 class=\"h-lv6\">１　本規則は、ダッカ首都圏建築規則2025（Dhaka Metropolitan Building Rules, 2025）と称する。</h6>\n<h6 class=\"h-lv6\">２　本規則は、1953年都市改良法（1953年法律第13号）に基づき策定されたダッカ首都圏マスタープランの対象区域内に適用する。</h6>\n<h6 class=\"h-lv6\">３　本規則は直ちに施行する。</h6>\n<h5 class=\"h-lv5\">第２条　用語の定義 [Definitions]</h5>\n<h6 class=\"h-lv6\">本規則において、文脈上別段の解釈を要する場合を除き、次の用語の定義は、それぞれ当該各号に定めるところによる。</h6>\n<h6 class=\"h-lv6\">（１）「承認図 [Approved Design]」とは、2020年バングラデシュ国家建築法典（BNBC 2020）及び関連法令に従い、所管行政庁によって承認された図面をいう。</h6>\n<hr class=\"sep\">","bn":"<h3 class=\"h-lv3\">প্রথম অধ্যায়</h3>\n<h4 class=\"h-lv4\">প্রারম্ভিক</h4>\n<h5 class=\"h-lv5\"><strong>১। শিরোনাম, প্রয়োগ ও প্রবর্তন।</strong></h5>\n<h6 class=\"h-lv6\">(১) এই বিধিমালা ঢাকা মহানগর ইমারত বিধিমালা, ২০২৫ নামে অভিহিত হইবে।</h6>\n<h6 class=\"h-lv6\">(২) ইহা Town Improvement Act, 1953 (Act No. XIII of 1953) এর আওতাভুক্ত ঢাকা মহানগর মহাপরিকল্পনাভুক্ত (Master Plan) এলাকার জন্য প্রযোজ্য হইবে।</h6>\n<h6 class=\"h-lv6\">(৩) ইহা অবিলম্বে কার্যকর হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>২। সংজ্ঞা।</strong></h5>\n<h6 class=\"h-lv6\">বিষয় বা প্রসঙ্গের পরিপন্থী কোনো কিছু না থাকিলে, এই বিধিমালায়—</h6>\n<h6 class=\"h-lv6\">(১) “অনুমোদিত নকশা” অর্থ Bangladesh National Building Code, 2020 এবং এতদসংক্রান্ত প্রচলিত অন্যান্য বিধি-বিধান অনুযায়ী যথাযথ কর্তৃপক্ষ কর্তৃক অনুমোদিত নকশা;</h6>\n<hr class=\"sep\">"},{"num":"13410","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第２条（用語の定義）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>２</strong>　<strong>「建築主事（Authorised Officer）」</strong>とは、１９５２年建築建設法（Building Construction Act, 1952）第２条第ａ項に規定する建築主事をいう。</h6>\n<h6 class=\"h-lv6\"><strong>３</strong>　<strong>「中庭（Courtyard / Angon / Angina）」</strong>とは、地盤面に位置する建築物によって全面的又は部分的に囲まれた、恒久的な開放空間をいう。</h6>\n<h6 class=\"h-lv6\"><strong>４</strong>　<strong>「避難階段（Fire Escape Stair）」</strong>とは、各階から踊場又はロビーによって連結された耐火材料で造られた階段であって、防火戸等によって建築物又はその他の用途部分から保護され、かつ、建築物の外部の開放された場所に直接通じているものをいう。</h6>\n<h6 class=\"h-lv6\"><strong>５</strong>　<strong>「防火戸（Fire-resistant Door）」</strong>とは、一定の時間、熱及び火災の延焼を遮断するように特別に製作された戸（耐火等級（Fire Grade））をいう。</h6>\n<h6 class=\"h-lv6\"><strong>６</strong>　<strong>「用途の類型（Occupancy Type）」</strong>とは、付録３に規定する建築物の用途別分類をいい、当該用途に附随する附属的な用途を含むものとする。ただし、疑義がある場合は、法典（BNBC）に従わなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>７</strong>　<strong>「法（Act）」</strong>とは、１９５２年建築建設法（１９５３年法律第２号）をいう。</h6>\n<h6 class=\"h-lv6\"><strong>８</strong>　<strong>「申請（Application）」</strong>とは、この規則に基づく申請をいう。</h6>\n<h6 class=\"h-lv6\"><strong>９</strong>　<strong>「申請者（Applicant）」</strong>とは、当該敷地の適法な所有者、又は適法な所有者から委任状により申請者として選任された者若しくは法人をいう。</h6>\n<h6 class=\"h-lv6\"><strong>１０</strong>　<strong>「申請手数料（Application Fee）」</strong>とは、この規則に基づきサービス受給者が納付する申請手数料をいう。</h6>\n<h6 class=\"h-lv6\"><strong>１１</strong>　<strong>「建築面積（被覆面積 / Covered Area / Acchadito sthan）」</strong>とは、建築物によって地盤面を含む上部が覆われた区域であって、基礎（Plinth）面の直上の階に位置するものをいう。ただし、次に掲げる場所は、これに含まないものとする。</h6>\n<h6 class=\"h-lv6\"><strong>ａ</strong>　庭園、パーゴラ、温室、水域、屋外水泳プール、樹木下のベンチ、貯水槽、噴水及び座席</h6>\n<h6 class=\"h-lv6\"><strong>ｂ</strong>　排水施設、カルバート、浄化槽、浸透桝</h6>\n<h6 class=\"h-lv6\"><strong>ｃ</strong>　境界塀及び門、ポーチ、車いす用スロープ、屋外階段（１階部分）、守衛室、独立したポンプ室（大規模工場、共同住宅等）、ダストシュート、覆いのない設備構造物、軒蛇腹（Cornice）及び庇（Sunshade）によって覆われた場所</h6>\n<h6 class=\"h-lv6\"><strong>１２</strong>　<strong>「不服審査委員会（Appellate Committee）」</strong>とは、第３１条の規定に基づき設置された不服審査委員会をいう。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>২। সংজ্ঞা (চলমান)</strong></h5>\n<h6 class=\"h-lv6\"><strong>(২)</strong> <strong>\"অথরাইজড অফিসার\"</strong> অর্থ Building Construction Act, 1952 এর section 2 এর clause (a)-তে বর্ণিত Authorised Officer;</h6>\n<h6 class=\"h-lv6\"><strong>(৩)</strong> <strong>\"অঙ্গন\"</strong> বা <strong>\"আঙিনা\"</strong> অর্থ ভূমিতে অবস্থিত ইমারত দ্বারা সম্পূর্ণ বা আংশিকভাবে বেষ্টিত স্থায়ীভাবে উন্মুক্ত কোনো পরিসর;</h6>\n<h6 class=\"h-lv6\"><strong>(৪)</strong> <strong>\"অগ্নি নিরাপদ সিঁড়ি”</strong> অর্থ বিভিন্ন তলা হইতে ল্যান্ডিং বা লবি দ্বারা সংযোজিত অগ্নি-নিরোধক উপকরণ দ্বারা নির্মিত সিঁড়ি, যাহা অগ্নি-প্রতিরোধক দরজার মাধ্যমে ইমারত বা অন্যান্য ব্যবহারিক এলাকা হইতে সুরক্ষিত এবং ইমারতের বহির্ভাগে খোলা স্থানের সহিত উন্মুক্ত থাকিবে;</h6>\n<h6 class=\"h-lv6\"><strong>(৫)</strong> <strong>“অগ্নি-প্রতিরোধক দরজা\"</strong> অর্থ বিশেষভাবে তৈরি দরজা (Fire Grade) যাহা নির্দিষ্ট সময়ের জন্য তাপ ও আগুন সঞ্চালনের প্রতিরোধক হিসাবে কাজ করে;</h6>\n<h6 class=\"h-lv6\"><strong>(৬)</strong> <strong>\"অকুপেন্সি টাইপ\"</strong> অর্থ পরিশিষ্ট-৩ এ নির্ধারিত ইমারতের ব্যবহারভিত্তিক শ্রেণিবিন্যাস এবং উক্ত নির্ধারিত ধরনের ব্যবহারের সহিত সংশ্লিষ্ট আনুষঙ্গিক ব্যবহারও ইহার অন্তর্ভুক্ত হইবে; তবে এক্ষেত্রে কোনো অস্পষ্টতা নিরসরণকল্পে কোড অনুসরণ করিতে হইবে;</h6>\n<h6 class=\"h-lv6\"><strong>(৭)</strong> <strong>\"আইন”</strong> অর্থ Building Construction Act, 1952 (Act No. II of 1953);</h6>\n<h6 class=\"h-lv6\"><strong>(৮)</strong> <strong>\"আবেদন”</strong> অর্থ এই বিধিমালার অধীন কোনো আবেদন;</h6>\n<h6 class=\"h-lv6\"><strong>(৯)</strong> <strong>\"আবেদনকারী\"</strong> অর্থ সংশ্লিষ্ট ভূমির বৈধ মালিক অথবা ভূমির বৈধ মালিক কর্তৃক আমমোক্তারনামা বলে আবেদনকারী হিসাবে নিযুক্ত ব্যক্তি অথবা প্রতিষ্ঠান;</h6>\n<h6 class=\"h-lv6\"><strong>(১০)</strong> <strong>\"আবেদন ফি\"</strong> অর্থ এই বিধিমালার অধীন সেবাগ্রহীতা কর্তৃক দাখিলকৃত আবেদনের ফি;</h6>\n<h6 class=\"h-lv6\"><strong>(১১)</strong> <strong>\"আচ্ছাদিত স্থান\"</strong> অর্থ ইমারত দ্বারা ভূমিতলসহ উপরিভাগের আচ্ছাদিত ক্ষেত্র, যাহা প্রিন্থ স্তরের ঠিক পরবর্তী স্তর বা তলা, তবে নিম্নবর্ণিত স্থানসমূহ ইহার অন্তর্ভুক্ত হইবে না, যথা:-</h6>\n<h6 class=\"h-lv6\"><strong>(ক)</strong> বাগান, পারগোলা, তরুশালা, জলাশয়, সুইমিংপুল (অনাচ্ছাদিত), গাছের নিচের বেদী, জলাধার, ফোয়ারা এবং আসন;</h6>\n<h6 class=\"h-lv6\"><strong>(খ)</strong> জলনির্গমন ব্যবস্থা, কালভার্ট, সেপটিক ট্যাংক, সোক পিট;</h6>\n<h6 class=\"h-lv6\"><strong>(গ)</strong> সীমানা প্রাচীর ও ফটক, পোর্চ, র‍্যাম্প, উন্মুক্ত সিঁড়ি (গ্রাউন্ড ফ্লোর), গার্ডরুম, বিচ্ছিন্ন পাম্প হাউস (বৃহৎ শিল্প, এ্যাপার্টমেন্ট কমপ্লেক্স, ইত্যাদি) গার্বেজ সুট, অনাচ্ছাদিত যেকোনো ইউটিলিটি স্ট্রাকচার, কার্নিশ এবং সানসেড কর্তৃক আচ্ছাদিত স্থান;</h6>\n<h6 class=\"h-lv6\"><strong>(১২)</strong> <strong>\"আপিল কমিটি\"</strong> অর্থ বিধি ৩১ এর অধীন গঠিত আপিল কমিটি;</h6>\n<hr class=\"sep\">"},{"num":"13411","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第２条（用語の定義）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>１３</strong>　<strong>「申請者の代理人（Representative of Applicant）」</strong>　設計の策定及び工事監理の目的で、所管行政庁（Authority）に登録された開発業者（Developer）、政府が承認した職能団体に登録された建築士、技術者若しくは計画策定者、又は政府に登録された関連する専門技術者若しくは法人であって、敷地所有者に代わり申請者としての職務を遂行するために次に掲げる条件に基づき指名されたものをいう。</h6>\n<h6 class=\"h-lv6\"><strong>ａ</strong>　代理人の選任は、所管行政庁が定める様式により書面で行い、署名を付さなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>ｂ</strong>　代理人が提出した土地又は資産に関する書類の正確性については、申請者が責任を負わなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>１４</strong>　<strong>「完成図（As-built Drawing）」又は「建築物の完成設計図」</strong>　工事完了後に担当技術者（建築士又は技術者）が署名した、建築物の実施又は完成に係る意匠、構造、建築設備（Building Services）に関する全ての設計図をいう。</h6>\n<h6 class=\"h-lv6\"><strong>１５</strong>　<strong>「建築物（Building）」</strong>　法の第２条第ｂ項及び本法典（BNBC）の第６条に定義される建築物（Building）をいう。</h6>\n<h6 class=\"h-lv6\"><strong>１６</strong>　<strong>「建築審査委員会（Building Construction Committee）」</strong>　法の第３条第２項に規定する委員会をいう。</h6>\n<h6 class=\"h-lv6\"><strong>１７</strong>　<strong>「建築物の高さ（Building Height）」</strong>　基準面（Reference Datum：直近の歩道の高さ、又はその中心に位置する直近の道路若しくは道路に隣接する歩道の高さのうち、いずれか高いもの）から建築物の最高点までの垂直距離をいう。これには、建築物の屋上に設置される他の工作物又は建築物の構成要素（屋上に位置する階段室、貯水槽、意匠部材、避雷針、アンテナ又は携帯電話鉄塔（Mobile tower）等）を含むものとする。</h6>\n<h6 class=\"h-lv6\"><strong>１８</strong>　<strong>「建築物検査員（Building Inspector）」</strong>　建築物の検査業務に従事するために、所管行政庁により任命された者をいう。</h6>\n<h6 class=\"h-lv6\"><strong>１９</strong>　<strong>「電気技術者（Electrical Engineer）」</strong>　関連分野の学士号を有し、バングラデシュ技術者協会（IEB）の会員であり、かつ、第３６条の規定に基づき登録された者をいう。</h6>\n<h6 class=\"h-lv6\"><strong>２０</strong>　<strong>「高さ（Height）」</strong>　次に掲げるものをいう。</h6>\n<h6 class=\"h-lv6\"><strong>ａ</strong>　居室の高さについては、仕上げられた床面から、障害物のない天井（屋根）の下面までの垂直距離をいう。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>২। সংজ্ঞা (চলমান)</strong></h5>\n<h6 class=\"h-lv6\"><strong>(১৩)</strong> <strong>\"আবেদনকারী প্রতিনিধি”</strong> অর্থ নকশা প্রণয়ন ও নির্মাণ তদারকির নিমিত্ত কর্তৃপক্ষ কর্তৃক নিবন্ধিত ডেভেলপার, সরকার অনুমোদিত পেশাজীবী প্রতিষ্ঠান কর্তৃক নিবন্ধিত স্থপতি, প্রকৌশলী বা পরিকল্পনাবিদ এবং সরকার কর্তৃক নিবন্ধিত এতদসংশ্লিষ্ট অন্যান্য কারিগরি ব্যক্তি বা প্রতিষ্ঠান যাহাকে ভূমির মালিকের পক্ষে আবেদনকারী হিসাবে দায়িত্ব পালন করিবার উদ্দেশ্যে নিম্নবর্ণিত শর্তসাপেক্ষে মনোনীত করা হইয়াছে, যথা:-</h6>\n<h6 class=\"h-lv6\"><strong>(ক)</strong> আবেদনকারীর প্রতিনিধির নিয়োগ লিখিতভাবে কর্তৃপক্ষ কর্তৃক নির্ধারিত ফরমের মাধ্যমে ও স্বাক্ষরযুক্ত হইতে হইবে; এবং</h6>\n<h6 class=\"h-lv6\"><strong>(খ)</strong> আবেদনকারীর প্রতিনিধি কর্তৃক দাখিলকৃত ভূমি বা সম্পত্তির দলিলাদির সঠিকতা সর্ম্পকে আবেদনকারী দায়ী থাকিবেন;</h6>\n<h6 class=\"h-lv6\"><strong>(১৪)</strong> <strong>\"অ্যাজ-বিল্ট ড্রয়িং\"</strong> বা <strong>\"ইমারতের নির্মিত নকশা\"</strong> অর্থ নির্মাণকাজ সম্পন্ন হইবার পর সংশ্লিষ্ট কারিগরি (স্থপতি বা প্রকৌশলী) ব্যক্তি দ্বারা স্বাক্ষরিত ইমারতের বাস্তবায়িত বা নির্মিত স্থাপত্য, কাঠামো, বিল্ডিং সার্ভিসেস সম্পর্কিত সকল নকশা;</h6>\n<h6 class=\"h-lv6\"><strong>(১৫)</strong> <strong>\"ইমারত”</strong> অর্থ আইনের section 2 এর clause (b) এবং কোডের Article 6 এ সংজ্ঞায়িত Building;</h6>\n<h6 class=\"h-lv6\"><strong>(১৬)</strong> <strong>\"ইমারত নির্মাণ কমিটি”</strong> অর্থ আইনের section 3 এর sub-section (2) এ উল্লিখিত কমিটি;</h6>\n<h6 class=\"h-lv6\"><strong>(১৭)</strong> <strong>\"ইমারতের উচ্চতা\"</strong> অর্থ রেফারেন্স ডেটাম (নিকটতম ফুটপাতের উচ্চতা অথবা উহার কেন্দ্রস্থলে অবস্থিত নিকটতম রাস্তা বা রাস্তা সংলগ্ন ফুটপাথের উচ্চতা, যাহা বেশি) হইতে ভবনের সর্বোচ্চ বিন্দু পর্যন্ত উল্লম্ব দূরত্ব, যাহার মধ্যে ইমারতের উপর অন্যান্য স্থাপনা বা ইমারতের অন্যান্য উপাদান, যেমন ইমারতের ছাদে অবস্থিত সিঁড়িঘর, জলাধার, স্থাপত্যের উপাদান, লাইটনিং এরেস্টর, এন্টেনা বা মোবাইল টাওয়ার, ইত্যাদি অন্তর্ভুক্ত হইবে;</h6>\n<h6 class=\"h-lv6\"><strong>(১৮)</strong> <strong>\"ইমারত পরিদর্শক\"</strong> অর্থ কর্তৃপক্ষ কর্তৃক নিয়োগপ্রাপ্ত কোনো ব্যক্তি যিনি ইমারত সংশ্লিষ্ট পরিদর্শন কাজে নিয়োজিত হইবেন;</h6>\n<h6 class=\"h-lv6\"><strong>(১৯)</strong> <strong>\"ইলেকট্রিক্যাল ইঞ্জিনিয়ার বা তড়িৎ প্রকৌশলী\"</strong> অর্থ যিনি সংশ্লিষ্ট বিষয়ে স্নাতক ডিগ্রি প্রাপ্ত, ইন্সটিটিউশন অব ইঞ্জিনিয়ার্স, বাংলাদেশ এর সদস্য এবং বিধি ৩৬ অনুযায়ী তালিকাভুক্ত;</h6>\n<h6 class=\"h-lv6\"><strong>(২০)</strong> <strong>\"উচ্চতা”</strong> অর্থ</h6>\n<h6 class=\"h-lv6\"><strong>(ক)</strong> কক্ষের উচ্চতার ক্ষেত্রে সম্পন্নকৃত মেঝের উপর হইতে বাঁধামুক্ত ছাদের নিচ তল পর্যন্ত উলম্ব পরিমাপ;</h6>\n<hr class=\"sep\">"},{"num":"13412","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第２条（用語の定義）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>２０</strong>　<strong>「高さ」（承前）</strong></h6>\n<h6 class=\"h-lv6\"><strong>二（খ）</strong>　階高（Story height）については、仕上げられた一の階の床面から、他の階の仕上げられた床面までの垂直距離、又は直上階がない場合にあっては屋根若しくは被覆物の上面までの垂直距離をいう 。</h6>\n<h6 class=\"h-lv6\"><strong>三（গ）</strong>　壁高（Wall height）については、一の壁の基部から当該壁の頂部までの垂直距離をいう 。</h6>\n<h6 class=\"h-lv6\"><strong>２１</strong>　<strong>空地（Open space / Unmukto jayga ba sthan）</strong>　敷地の最高建蔽率（Maximum Ground Coverage）に含まれない部分であって、地盤面から上部に向かって恒久的に開放されているものをいう 。</h6>\n<h6 class=\"h-lv6\"><strong>２２</strong>　<strong>開発権移転（Transfer of Development Rights, TDR）</strong>　所管行政庁の管轄下にある送出敷地（Sending site：マスタープラン、法律又は規則により開発行為が許可されない区域、若しくは開放空間、農地、洪水流下区域、環境敏感地域、史跡又は伝統的建築物等の保存区域）から、受入敷地（Receiving site：マスタープラン、法律又は規則により開発行為が許可されている区域）へ、金銭又は便益と引き換えに開発権を移転することをいう 。</h6>\n<h6 class=\"h-lv6\"><strong>２３</strong>　<strong>アトリウム（Atrium）</strong>　建築物内部の複数階にわたる広大な空間であって、最低２階以上の高さを有し、承認された建築物の最高高さ、廊下又はこれらに類する構成要素を含み、かつ上面がガラス張り（Glazing）又は屋根により全面的若しくは部分的に覆われているものをいう。ただし、適切な換気設備を備えなければならない 。</h6>\n<h6 class=\"h-lv6\"><strong>２４</strong>　<strong>光庭（Air-well / Light-well）</strong>　自然の換気及び採光を確保することを目的に、建築物の内部に設けられた上部に向かって恒久的に開放された空間であって、建築物に囲まれたものをいう 。</h6>\n<h6 class=\"h-lv6\"><strong>２５</strong>　<strong>アパートメント・コンプレックス（Apartment Complex）</strong>　複数の建築物の中に住居、アパートメント又は住戸（フラット）の集合体があるものであって、２００４年民間住宅プロジェクト土地開発規則及び詳細地域計画（DAP）に基づき、一般的な市民向け公共施設が共同使用のために備えられているものをいう 。</h6>\n<h6 class=\"h-lv6\"><strong>２６</strong>　<strong>伝統的建築物、工作物、場所又は地域（Heritage building, structure, site or area）</strong>　政府によって承認され、かつ官報に掲載された伝統的な建築物、工作物、場所又は地域をいう 。</h6>\n<h6 class=\"h-lv6\"><strong>２７</strong>　<strong>地区別容積率（Area-based Floor Area Ratio）</strong>　マスタープランに定められた各人口密度ブロックごとに規定された容積率（FAR）をいう 。</h6>\n<h6 class=\"h-lv6\"><strong>２８</strong>　<strong>所管行政庁（Authority）</strong>　１９５３年都市改良法に基づき設立された首都開発庁（RAJUK）をいう 。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>২। সংজ্ঞা (চলমান)</strong></h5>\n<h6 class=\"h-lv6\"><strong>(২০)</strong> <strong>\"উচ্চতা\" (চলমান)</strong></h6>\n<h6 class=\"h-lv6\"><strong>(খ)</strong> কোনো তলার উচ্চতার ক্ষেত্রে সম্পন্নকৃত একটি তলার মেঝের উপর হইতে অন্য তলার মেঝের উপর পর্যন্ত অথবা পরবর্তী তল না থাকিলে ছাদ বা আচ্ছাদনের উপর পর্যন্ত উলম্ব পরিমাপ;</h6>\n<h6 class=\"h-lv6\"><strong>(গ)</strong> দেয়ালের উচ্চতা হিসাবে একটি দেয়ালের ভূমি হইতে দেয়ালের উপরিভাগ পর্যন্ত উলম্ব পরিমাপ;</h6>\n<h6 class=\"h-lv6\"><strong>(২১)</strong> \"<strong>উন্মুক্ত জায়গা বা স্থান</strong>\" অর্থ সাইটের সর্বোচ্চ ভূমি আচ্ছাদনের বহির্ভূত অংশ যাহা ভূমিতল হইতে উর্ধ্বদিকে স্থায়ীভাবে উন্মুক্ত;</h6>\n<h6 class=\"h-lv6\"><strong>(২২)</strong> \"<strong>উন্নয়ন স্বত্ত্ব বিনিময় (Transfer of Development Rights, TDR)</strong>\" অর্থ কর্তৃপক্ষের আওতাধীন প্রেরণ এলাকা (sending site, যেখানে মহাপরিকল্পনা, আইন বা বিধিমালা দ্বারা উন্নয়ন কার্যক্রম অনুমোদিত নহে কিংবা সংরক্ষিত এলাকা যেমন, উন্মুক্ত স্থান, কৃষি জমি, বন্যাপ্রবাহ এলাকা, পরিবেশগতভাবে সংবেদনশীল এলাকা, ঐতিহাসিক গুরুত্বপূর্ণ স্থান বা স্থাপনা ইত্যাদি) হইতে গ্রহণ এলাকায় (receiving site, যেখানে মহাপরিকল্পনা, আইন বা বিধিমালা অনুযায়ী উন্নয়ন কার্যক্রম অনুমোদিত) উন্নয়ন স্বত্ত্ব অর্থের বা সুবিধাদির বিনিময়ে স্থানান্তর হয়;</h6>\n<h6 class=\"h-lv6\"><strong>(২৩)</strong> \"<strong>এট্রিয়াম (Atrium)</strong>\" অর্থ ইমারতের অভ্যন্তরে একাধিক তল বিশিষ্ট একটি বৃহৎ আয়তনের স্থান যাহা সর্বনিম্ন ২ (দুই) তলা ও অনুমোদিত ভবনের উচ্চতাকে সর্বোচ্চ, করিডোর বা অনুরূপ উপাদান রহিয়াছে এবং যাহার উপরিতল গ্লেজিং (Glazing) বা তল দ্বারা সম্পূর্ণ বা আংশিক আচ্ছাদিত, তবে যথাযথ বায়ু চলাচলের ব্যবস্থা থাকিতে হইবে;</h6>\n<h6 class=\"h-lv6\"><strong>(২৪)</strong> \"<strong>এয়ারওয়েল</strong>\" বা \"<strong>লাইটওয়েল</strong>\" অর্থ প্রাকৃতিক বায়ু ও আলো চলাচলের সুবিধা অর্জনের উদ্দেশ্যে ইমারতের অভ্যন্তরে অবস্থিত ঊর্ধ্বদিকে স্থায়ীভাবে উন্মুক্ত পরিসর যাহা ইমারত দ্বারা আবদ্ধ;</h6>\n<h6 class=\"h-lv6\"><strong>(২৫)</strong> \"<strong>এপার্টমেন্ট কমপ্লেক্স</strong>\" অর্থ একাধিক ভবনের মধ্যে একগুচ্ছ আবাস বা এপার্টমেন্ট বা ফ্ল্যাটের সমাবেশ যেখানে বেসরকারী আবাসিক প্রকল্পের ভূমি উন্নয়ন বিধিমালা, ২০০৪ ও বিশদ অঞ্চল পরিকল্পনা অনুযায়ী সাধারণ নাগরিক সুযোগ-সুবিধা সকলের সম্মিলিত ব্যবহারের জন্য বিদ্যমান থাকে;</h6>\n<h6 class=\"h-lv6\"><strong>(২৬)</strong> \"<strong>ঐতিহ্যবাহী ইমারত বা স্থাপনা বা স্থান বা এলাকা</strong>\" অর্থ সরকার কর্তৃক অনুমোদিত এবং গেজেটকৃত ঐতিহ্যবাহী ইমারত বা স্থাপনা বা স্থান বা এলাকা;</h6>\n<h6 class=\"h-lv6\"><strong>(২৭)</strong> \"<strong>এলাকা ভিত্তিক Floor Area Ratio (FAR)</strong>\" অর্থ মহাপরিকল্পনায় বর্ণিত প্রতিটি জনঘনত্ব ব্লকের অধীন উল্লিখিত FAR;</h6>\n<h6 class=\"h-lv6\"><strong>(২৮)</strong> \"<strong>কর্তৃপক্ষ</strong>\" অর্থ Town Improvement Act, 1953 এর অধীন প্রতিষ্ঠিত রাজধানী উন্নয়ন কর্তৃপক্ষ (রাজউক);</h6>\n<hr class=\"sep\">"},{"num":"13413","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第２条（用語の定義）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>２９</strong>　<strong>工事の着手（Commencement of work / Kaj arombho）</strong>　建築物の建築を目的とした根切り（掘削）、杭打ち若しくは基礎の築造、又は既存建築物に対するあらゆる新築、改築、模様替若しくは増築の実質的な開始をいう。</h6>\n<h6 class=\"h-lv6\"><strong>３０</strong>　<strong>軒蛇腹（Cornice）</strong>　日射又は雨水を防ぐための建築物の最上部屋根の張り出し部分であって、いかなる壁によっても囲まれていないものをいう。</h6>\n<h6 class=\"h-lv6\"><strong>３１</strong>　<strong>ロフト（Loft / Kar）</strong>　屋根（天井）と床の間の中間階として設けられた、高さが少なくとも１．５メートル以上の空間であって、断熱、防湿、衛生設備、機械設備、貯水、屋上庭園、水泳プールその他これらに類する用途に供されるものをいう。</h6>\n<h6 class=\"h-lv6\"><strong>３২</strong>　<strong>法典（Code）</strong>　バングラデシュ国家建築法典（Bangladesh National Building Code, 2020）をいう。</h6>\n<h6 class=\"h-lv6\"><strong>３３</strong>　<strong>構造設計一級建築士（Structural Engineer）</strong>　構造設計（Design）の策定に精通した土木・構造技術者であって、第３６条の規定により専門技術者として登録され、かつ関連する職能団体の正会員である者をいう。</h6>\n<h6 class=\"h-lv6\"><strong>３４</strong>　<strong>専門技術者（Technical person / Karigori byakti）</strong>　第３６条の規定により登録された者をいう。</h6>\n<h6 class=\"h-lv6\"><strong>３５</strong>　<strong>会長（Chairman）</strong>　首都開発庁（RAJUK）の会長をいう。</h6>\n<h6 class=\"h-lv6\"><strong>３６</strong>　<strong>煙突（Chimney）</strong>　熱発生装置から燃焼等により発生した物質を、煙道を通じて大気中に放出するための建築物の部分をいう。</h6>\n<h6 class=\"h-lv6\"><strong>３７</strong>　<strong>土質一級建築士（Geotechnical Engineer）</strong>　第３６条から第３８条までに規定する土木・構造工学の学士号又は修士号を有し、土質工学又は基礎工学に関する経験を有するバングラデシュ技術者協会（IEB）の正会員をいう。</h6>\n<h6 class=\"h-lv6\"><strong>３８</strong>　<strong>国道、地方道又は主要道路（National or Regional Highway or Main Road）</strong>　関連法令に基づき、又は首都開発庁（RAJUK）若しくは道路局によって指定された国道、地方道又は主要道路をいう。</h6>\n<h6 class=\"h-lv6\"><strong>３９</strong>　<strong>危険建築物（Unsafe building / Jhukipurno imarot）</strong>　法典に基づき、構造的な不備、老朽化、不衛生、火災の危険、適切な避難経路の欠如、崩壊の恐れ、適切な維持管理の欠如、又は放置等により、居住者及び近隣住民の安全に対する脅威であると所管行政庁によって特定された建築物又は建築工事をいう。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>২। সংজ্ঞা (চলমান)</strong></h5>\n<h6 class=\"h-lv6\"><strong>(২৯)</strong> <strong>\"কাজ আরম্ভ\"</strong> অর্থ ইমারত নির্মাণের উদ্দেশ্যে মাটি কাটা, পাইলিং বা ভিত্তি নির্মাণ বা যেকোনো নির্মাণ, পুনঃনির্মাণ অথবা বিদ্যমান ইমারতে পরিবর্তন বা পরিবর্ধনের প্রকৃত সূত্রপাত;</h6>\n<h6 class=\"h-lv6\"><strong>(৩০)</strong> <strong>\"কার্নিশ\"</strong> অর্থ রোদ বা বৃষ্টি হইতে রক্ষার জন্য ইমারতের সর্বশেষ ছাদের বর্ধিতাংশ যাহা কোনো দেয়াল দ্বারা আবদ্ধ করা যাইবে না;</h6>\n<h6 class=\"h-lv6\"><strong>(৩১)</strong> <strong>\"কাড় (Loft)\"</strong> অর্থ ছাদ ও মেঝের মধ্যবর্তী অপর একটি ছাদ দ্বারা তৈরি অন্যূন ১.৫ (এক দশমিক পাঁচ) মিটার উচ্চতা বিশিষ্ট স্থান, যাহা তাপ প্রতিরোধ এবং সর্বোচ্চ ছাদের আর্দ্রতা প্রতিরোধক হিসাবে, স্যানিটারি, মেকানিক্যাল কাজে, পানি সংরক্ষণ, ছাদে বাগান, সুইমিং পুল বা অনুরূপ কাজে ব্যবহৃত হইতে পারে;</h6>\n<h6 class=\"h-lv6\"><strong>(৩২)</strong> <strong>\"কোড\"</strong> অর্থ Bangladesh National Building Code (BNBC), 2020;</h6>\n<h6 class=\"h-lv6\"><strong>(৩৩)</strong> <strong>\"স্ট্রাকচারাল প্রকৌশলী\"</strong> অর্থ কোনো পুরকৌশলী বা পুর-প্রকৌশলী যিনি কাঠামো ডিজাইন (design) প্রণয়নে অভিজ্ঞ এবং বিধি ৩৬ অনুযায়ী কারিগরি ব্যক্তি হিসাবে তালিকাভুক্ত ও সংশ্লিষ্ট পেশাজীবী প্রতিষ্ঠানের সদস্য;</h6>\n<h6 class=\"h-lv6\"><strong>(৩৪)</strong> <strong>\"কারিগরি ব্যক্তি\"</strong> অর্থ বিধি ৩৬ এর অধীন তালিকাভুক্ত কোনো কারিগরি ব্যক্তি;</h6>\n<h6 class=\"h-lv6\"><strong>(৩৫)</strong> <strong>\"চেয়ারম্যান\"</strong> অর্থ রাজধানী উন্নয়ন কর্তৃপক্ষের চেয়ারম্যান;</h6>\n<h6 class=\"h-lv6\"><strong>(৩৬)</strong> <strong>\"চিমনি\"</strong> অর্থ ইমারতের এইরূপ অংশ যাহার মাধ্যমে তাপ উৎপাদনকারী যন্ত্রাদি হইতে দহনক্রিয়ার মাধ্যমে নির্গত বা উৎপন্ন বস্তুসমূহ ধূম্রনালীর মাধ্যমে উন্মুক্ত বাতাসে নির্গত হয়;</h6>\n<h6 class=\"h-lv6\"><strong>(৩৭)</strong> <strong>\"জিওটেকনিক্যাল প্রকৌশলী\"</strong> অর্থ বিধি ৩৬ হইতে বিধি ৩৮ এ বর্ণিত স্নাতক বা স্নাতকোত্তর পুর-প্রকৌশলী যাহার জিও টেকনিক্যাল বা ফাউন্ডেশন ইঞ্জিনিয়ারিং বিষয়ে অভিজ্ঞতা রহিয়াছে এবং যিনি ইনস্টিটিউশন অব ইঞ্জিনিয়ার্স, বাংলাদেশ (IEB) এর সদস্য;</h6>\n<h6 class=\"h-lv6\"><strong>(৩৮)</strong> <strong>\"জাতীয় বা আঞ্চলিক মহাসড়ক বা প্রধান সড়ক\"</strong> অর্থ সংশ্লিষ্ট আইন অনুযায়ী বা রাজধানী উন্নয়ন কর্তৃপক্ষ বা সড়ক ও জনপথ অধিদপ্তর কর্তৃক নির্ধারিত জাতীয় বা আঞ্চলিক মহাসড়ক বা প্রধান সড়ক;</h6>\n<h6 class=\"h-lv6\"><strong>(৩৯)</strong> <strong>\"ঝুঁকিপূর্ণ ইমারত\"</strong> অর্থ কোড অনুযায়ী কাঠামোগত অনিরাপদ, জরাজীর্ণ, অস্বাস্থ্যকর, অগ্নি-ঝুঁকিপূর্ণ, যথাযথ জরুরি নির্গমন পথবিহীন, ভগ্নপ্রায়, যথাযথ রক্ষণাবেক্ষণবিহীন, পরিত্যক্ত, অধিবাসী ও সংলগ্ন এলাকার জনসাধারণের নিরাপত্তার প্রতি হুমকি হিসাবে কর্তৃপক্ষ কর্তৃক চিহ্নিত যেকোনো ইমারত বা নির্মাণকার্য;</h6>\n<hr class=\"sep\">"},{"num":"13414","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第２条（用語の定義）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>４０</strong>　<strong>吊り下げ式プランター（Hanging Planter）</strong>　建築物から突き出した、植物を栽培するための最大深さ０．５０メートルの吊り下げられた空間をいい、その面積は当該階の床面積（Floor Area）の最大２．５パーセントまでとする。これを超える面積については、容積率（FAR）に算入するものとする。ただし、いかなる場合においても、外壁の後退距離（Setback）内に設置してはならない。</h6>\n<h6 class=\"h-lv6\"><strong>４１</strong>　<strong>延べ面積（Total Floor Area）</strong>　建築物の全ての階（容積率算入対象及び不算入対象の双方を含む）の床面積の合計をいう。</h6>\n<h6 class=\"h-lv6\"><strong>４２</strong>　<strong>詳細地区計画（Detailed Area Plan / DAP）</strong>　都市計画（Master Plan）の対象区域内における計画的な開発のための、詳細な空間設計を含む計画をいう。</h6>\n<h6 class=\"h-lv6\"><strong>４３</strong>　<strong>電子署名（Digital Signature）</strong>　２００６年情報通信技術法（２００６年法律第３９号）第２条第１号に定義される電子署名をいう。</h6>\n<h6 class=\"h-lv6\"><strong>４４</strong>　<strong>ディプロマ建築士（Diploma Architect）</strong>　認定されたポリテクニック・インスティテュート又は技術学院において建築学のディプロマ（Diploma in Architecture）を取得した者であって、バングラデシュ・ディプロマ技術者協会の会員であり、かつ第３６条の規定に基づき登録された専門技術者をいう。</h6>\n<h6 class=\"h-lv6\"><strong>４５</strong>　<strong>ディプロマ技術者（Diploma Engineer）</strong>　認定されたポリテクニック・インスティテュート又は技術学院において工学のディプロマ（Diploma in Engineering）を取得した者であって、バングラデシュ・ディプロマ技術者協会の会員であり、かつ第３６条の規定に基づき登録された専門技術者をいう。</h6>\n<h6 class=\"h-lv6\"><strong>４６</strong>　<strong>開発業者（Developer）</strong>　不動産業を営む目的で、２０１０年不動産開発管理法（２０１０年法律第４８号）に基づき登録された者をいう。</h6>\n<h6 class=\"h-lv6\"><strong>４７</strong>　<strong>建築（Construction / Nirman）</strong>　あらゆる種類の建築物若しくは工作物の新築、増築、改築、模様替又は移転をいう。</h6>\n<h6 class=\"h-lv6\"><strong>４８</strong>　<strong>工事監理（Construction Supervision / Nirman todaroki）</strong>　第３６条の規定に基づき登録された関連専門技術者による、工事期間中の全期にわたる工事監理をいう。</h6>\n<h6 class=\"h-lv6\"><strong>４９</strong>　<strong>施工者（Constructor / Nirmata）</strong>　申請者である土地所有者、又は申請者によって雇用された建築工事を行う個人若しくは法人をいう。</h6>\n<h6 class=\"h-lv6\"><strong>５０</strong>　<strong>確認済設計図書（Construction Permit Design）</strong>　この規則に基づき建築期間のために所管行政庁（Authority）が承認する、建築物又は工作物の意匠、構造、電気、給排水設備に関する設計図書をいい、必要に応じて、機械、防火及び消火設備に関する設計図書を含むものとする。</h6>\n<h6 class=\"h-lv6\"><strong>５１</strong>　<strong>設計図書（Drawing / Plan / Noksha）</strong>　この規則に基づき建築物又は工作物を建築する目的で作成された図面をいう。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>২। সংজ্ঞা (চলমান)</strong></h5>\n<h6 class=\"h-lv6\"><strong>(৪০)</strong> <strong>\"ঝুলন্ত প্ল্যান্টার\"</strong> অর্থ ইমারত হইতে বর্ধিত একটি ঝুলন্ত সর্বোচ্চ ০.৫০ (শূন্য দশমিক পাঁচ শূন্য) মিটার গভীরতা বিশিষ্ট স্থান যাহাতে গাছপালা জন্মাইতে পারে এবং যাহার ক্ষেত্রফল সংশ্লিষ্ট ফ্লোর এরিয়ার সর্বোচ্চ ২.৫% (দুই দশমিক পাঁচ শতাংশ) পর্যন্ত হইতে পারিবে, ইহার অধিক হইলে FAR অন্তর্ভুক্ত হইবে; তবে কোনোক্ষেত্রেই সেটব্যাকে করা যাইবে না;</h6>\n<h6 class=\"h-lv6\"><strong>(৪১)</strong> <strong>\"টোটাল ফ্লোর এরিয়া\"</strong> অর্থ ইমারতের সকল ফ্লোর (FAR অন্তর্ভুক্ত ও বহির্ভূত) এরিয়ার যোগফল;</h6>\n<h6 class=\"h-lv6\"><strong>(৪২)</strong> <strong>\"ডিটেইলড এরিয়া প্ল্যান (DAP)\"</strong> অর্থ মহাপরিকল্পনার আওতাভুক্ত কোনো এলাকার পরিকল্পিত উন্নয়নের জন্য বিস্তারিত স্থানিক নকশাসহ পরিকল্পনা;</h6>\n<h6 class=\"h-lv6\"><strong>(৪৩)</strong> <strong>\"ডিজিটাল স্বাক্ষর\"</strong> অর্থ তথ্য ও যোগাযোগ প্রযুক্তি আইন, ২০০৬ (২০০৬ সনের ৩৯ নং আইন) এর ধারা ২ এর দফা (১)-এ সংজ্ঞায়িত ইলেকট্রনিক স্বাক্ষর;</h6>\n<h6 class=\"h-lv6\"><strong>(৪৪)</strong> <strong>\"ডিপ্লোমা স্থপতি\"</strong> অর্থ এইরূপ কারিগরি ব্যক্তি যিনি স্বীকৃত কোনো পলিটেকনিক ইনস্টিটিউট বা কারিগরি ইনস্টিটিউট হইতে স্থাপত্য বিষয়ে ডিপ্লোমা ইন আর্কিটেকচার সনদপ্রাপ্ত ও ইনস্টিটিউশন অব ডিপ্লোমা ইঞ্জিনিয়ার্স, বাংলাদেশ এর সদস্য এবং বিধি ৩৬ অনুযায়ী তালিকাভুক্ত;</h6>\n<h6 class=\"h-lv6\"><strong>(৪৫)</strong> <strong>\"ডিপ্লোমা প্রকৌশলী\"</strong> অর্থ এইরূপ কারিগরি ব্যক্তি যিনি স্বীকৃত কোনো পলিটেকনিক ইনস্টিটিউট বা কারিগরি ইনস্টিটিউট হইতে প্রকৌশল বিষয়ে ডিপ্লোমা ইন ইঞ্জিনিয়ারিং সনদপ্রাপ্ত ও ইনস্টিটিউশন অব ডিপ্লোমা ইঞ্জিনিয়ার্স বাংলাদেশ এর সদস্য, এবং বিধি ৩৬ অনুযায়ী তালিকাভুক্ত;</h6>\n<h6 class=\"h-lv6\"><strong>(৪৬)</strong> <strong>\"ডেভেলপার\"</strong> অর্থ রিয়েল এস্টেট ব্যবসা পরিচালনার উদ্দেশ্যে রিয়েল এস্টেট উন্নয়ন ও ব্যবস্থাপনা আইন, ২০১০ (২০১০ সনের ৪৮ নং আইন) এর অধীনে নিবন্ধিত ব্যক্তি;</h6>\n<h6 class=\"h-lv6\"><strong>(৪৭)</strong> <strong>“নির্মাণ”</strong> অর্থ যেকোনো ধরনের ইমারত বা স্থাপনা নির্মাণ, পুনঃনির্মাণ বা প্রতিস্থাপন;</h6>\n<h6 class=\"h-lv6\"><strong>(৪৮)</strong> <strong>“নির্মাণ তদারকি”</strong> অর্থ বিধি ৩৬ অনুযায়ী তালিকাভুক্ত সংশ্লিষ্ট কারিগরি ব্যক্তি কর্তৃক পূর্ণকালীন নির্মাণ তদারকি;</h6>\n<h6 class=\"h-lv6\"><strong>(৪৯)</strong> <strong>“নির্মাতা”</strong> অর্থ আবেদনকারী ভূমি মালিক বা আবেদনকারী কর্তৃক নিয়োজিত নির্মাণকারী ব্যক্তি বা প্রতিষ্ঠান;</h6>\n<h6 class=\"h-lv6\"><strong>(৫০)</strong> <strong>“নির্মাণ অনুমোদন নকশা”</strong> অর্থ এই বিধিমালার অধীন নির্মাণ সময়ের জন্য কর্তৃপক্ষ কর্তৃক ইমারত বা স্থাপনার স্থাপত্য, কাঠামোগত, ইলেকট্রিক্যাল, প্লাম্বিং নকশা এবং, প্রযোজ্য ক্ষেত্রে, মেকানিক্যাল, অগ্নিনিরাপত্তা ও নির্বাপন নকশা;</h6>\n<h6 class=\"h-lv6\"><strong>(৫১)</strong> <strong>“নকশা”</strong> অর্থ এই বিধিমালার অধীন ইমারত বা স্থাপনা নির্মাণের উদ্দেশ্যে প্রস্তুতকৃত কোনো নকশা;</h6>\n<hr class=\"sep\">"},{"num":"13415","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第２条（用語の定義）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>５２</strong>　<strong>「都市開発委員会（Urban Development Committee）」</strong>　第３２条の規定に基づき設置された都市開発委員会をいう。</h6>\n<h6 class=\"h-lv6\"><strong>５３</strong>　<strong>「建築確認手数料（Construction Permit Fee）」</strong>　この規則に基づき工作物を建築する際に納付すべき付録４に記載の手数料をいう。</h6>\n<h6 class=\"h-lv6\"><strong>５４</strong>　<strong>「都市再開発（Urban Redevelopment）」</strong>　都市の危険、老朽化、又は市民向け公共施設が不十分な区域において、その固有の特性を維持しつつ、生活水準、経済状況及び構造的改善を行う再開発プロセスをいう。</h6>\n<h6 class=\"h-lv6\"><strong>５５</strong>　<strong>「階（Story / Tola）」</strong>　建築物の任意の階の床の上面から直上の階の仕上げられた上面までの間、又は直上の階がない場合は、屋根面若しくはその他の被覆物の上面までの間をいう。</h6>\n<h6 class=\"h-lv6\"><strong>５６</strong>　<strong>「登録建築物等（Listed Building or Structure）」</strong>　意匠、歴史、科学、社会、若しくは宗教上の重要性を有するもの、又は精神的に重要な拠点であって、政府によって承認され公報に掲載された建築物又は工作物をいう。</h6>\n<h6 class=\"h-lv6\"><strong>５７</strong>　<strong>「付録（Appendix）」</strong>　この規則の任意の付録をいう。</h6>\n<h6 class=\"h-lv6\"><strong>５８</strong>　<strong>「避難出口（Exit）」</strong>　建築物の任意の階から道路又は安全な開放空間へ至るための出口をいう。</h6>\n<h6 class=\"h-lv6\"><strong>５９</strong>　<strong>「自然換気（Natural Ventilation）」</strong>　建築物の扉又は窓を介して、室内に自然な空気の流れを供給するシステムをいう。</h6>\n<h6 class=\"h-lv6\"><strong>６０</strong>　<strong>「パラペット（Parapet）」</strong>　屋根又は床の周囲を囲むように設置される、高さ１メートル以上の手摺又は壁をいう。</h6>\n<h6 class=\"h-lv6\"><strong>６１</strong>　<strong>「駐車場（Parking Space）」</strong>　車両を駐車するための、屋内若しくは屋外の、規則に従い被覆された若しくは開放された十分な面積を有する場所であって、車両の通行に適した通路を介して内部及び外部の道路と接続されているものをいう。</h6>\n<h6 class=\"h-lv6\"><strong>６２</strong>　<strong>「職能団体（Professional Body）」</strong>　第３６条に規定する団体をいう。</h6>\n<h6 class=\"h-lv6\"><strong>６３</strong>　<strong>「都市計画家（Planner）」</strong>　都市計画、地域計画又は農村計画の学士号を有し、バングラデシュ都市計画家協会の会員であり、かつ、第３６条の規定に基づき登録された者をいう。</h6>\n<h6 class=\"h-lv6\"><strong>６４</strong>　<strong>「コンサルタント（Consultant）」</strong>　第３６条の規定に基づき登録された専門技術者又は法人をいう。</h6>\n<h6 class=\"h-lv6\"><strong>６５</strong>　<strong>「給排水衛生設備技術者（Plumbing Engineer）」</strong>　給排水衛生設備に関する経験を有する建築士、土木技術者、機械技術者又はディプロマ技術者（土木）であって、第３６条の規定に基づき専門技術者として登録され、かつ、関連する職能団体の会員である者をいう。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>২। সংজ্ঞা (চলমান)</strong></h5>\n<h6 class=\"h-lv6\"><strong>(৫২)</strong> \"<strong>নগর উন্নয়ন কমিটি</strong>\" অর্থ বিধি ৩২ এর অধীন গঠিত নগর উন্নয়ন কমিটি;</h6>\n<h6 class=\"h-lv6\"><strong>(৫৩)</strong> “<strong>নির্মাণ অনুমোদন ফি</strong>” অর্থ এই বিধিমালার অধীন স্থাপনা নির্মাণের নিমিত্ত পরিশিষ্ট ৪ এ উল্লিখিত ফি;</h6>\n<h6 class=\"h-lv6\"><strong>(৫৪)</strong> \"<strong>নগর পুনঃউন্নয়ন</strong>\" অর্থ শহরের কোনো ঝুঁকিপূর্ণ, জরাজীর্ণ বা অপ্রতুল নাগরিক সুযোগ-সুবিধা সম্পন্ন এলাকার সহজাত বৈশিষ্ট্য অক্ষুণ্ণ রাখিয়া পুনঃউন্নয়ন প্রক্রিয়ায় উক্ত এলাকার জীবনযাত্রার মান, অর্থনৈতিক অবস্থা ও কাঠামোগত উন্নয়ন;</h6>\n<h6 class=\"h-lv6\"><strong>(৫৫)</strong> “<strong>তলা</strong>” অর্থ ইমারতের যেকোনো ফ্লোর বা মেঝের উপরিপৃষ্ঠ এবং পরবর্তী ফ্লোরের সম্পন্নকৃত উপরিভাগ অথবা পরবর্তী ফ্লোর না থাকিলে ছাদ বা অন্য আচ্ছাদনের সম্পন্নকৃত উপরিপৃষ্ঠ;</h6>\n<h6 class=\"h-lv6\"><strong>(৫৬)</strong> \"<strong>তালিকাভুক্ত ইমারত বা স্থাপনা</strong>\" অর্থ নান্দনিক, ঐতিহাসিক, বৈজ্ঞানিক, সামাজিক, ধর্মীয় প্রতিষ্ঠান অথবা আধ্যাত্মিক গুরুত্ব বহনকারী অথবা সরকার কর্তৃক অনুমোদিত ও গেজেটকৃত ইমারত বা স্থাপনা;</h6>\n<h6 class=\"h-lv6\"><strong>(৫৭)</strong> \"<strong>পরিশিষ্ট</strong>” অর্থ এই বিধিমালার কোনো পরিশিষ্ট;</h6>\n<h6 class=\"h-lv6\"><strong>(৫৮)</strong> “<strong>প্রস্থান পথ (Exit)</strong>\" অর্থ কোনো বিল্ডিং এর যেকোনো তলা হইতে রাস্তা বা নিরাপদ উন্মুক্ত স্থানে যাইবার জন্য বহির্গমন পথ;</h6>\n<h6 class=\"h-lv6\"><strong>(৫৯)</strong> \"<strong>প্রাকৃতিক বায়ু চলাচল ব্যবস্থা</strong>\" বা \"<strong>বায়ু চলাচল ব্যবস্থা</strong>” অর্থ ইমারতের দরজা-জানালা মাধ্যমে বাতাসের স্বাভাবিক প্রবাহ ঘরের অভ্যন্তরে সরবরাহ ব্যবস্থা;</h6>\n<h6 class=\"h-lv6\"><strong>(৬০)</strong> \"<strong>প্যারাপেট</strong>” অর্থ অন্যূন ১ (এক) মিটার উচ্চতা বিশিষ্ট রেলিং অথবা দেয়াল যাহা ছাদ বা তলের চারপাশ ঘিরে তৈরিকৃত;</h6>\n<h6 class=\"h-lv6\"><strong>(৬১)</strong> \"<strong>পার্কিং স্থান</strong>\" অর্থ যানবাহন রাখিবার মতো আবদ্ধ বা খোলা, বিধি অনুযায়ী আচ্ছাদিত বা উন্মুক্ত পর্যাপ্ত আয়তনের জায়গা, যাহার সহিত যানবাহন যাতায়াত উপযোগী পথের মাধ্যমে ভিতর ও বাহিরের রাস্তার সংযোগ থাকে;</h6>\n<h6 class=\"h-lv6\"><strong>(৬২)</strong> \"<strong>পেশাজীবী প্রতিষ্ঠান</strong>\" অর্থ বিধি ৩৬ এ উল্লিখিত কোনো প্রতিষ্ঠান;</h6>\n<h6 class=\"h-lv6\"><strong>(৬৩)</strong> \"<strong>পরিকল্পনাবিদ</strong>” অর্থ যিনি নগর ও অঞ্চল বা গ্রামীণ পরিকল্পনা বিষয়ে স্নাতক ডিগ্রিপ্রাপ্ত ও বাংলাদেশ ইনস্টিটিউট অব প্লানার্স এর সদস্য এবং বিধি ৩৬ অনুযায়ী তালিকাভুক্ত;</h6>\n<h6 class=\"h-lv6\"><strong>(৬৪)</strong> \"<strong>পরামর্শক</strong>” অর্থ বিধি ৩৬ অনুযায়ী তালিকাভুক্ত কোনো কারিগরি ব্যক্তি বা প্রতিষ্ঠান;</h6>\n<h6 class=\"h-lv6\"><strong>(৬৫)</strong> \"<strong>প্লাম্বিং প্রকৌশলী</strong>\" অর্থ স্থপতি, পুরকৌশলী, যান্ত্রিক প্রকৌশলী বা ডিপ্লোমা পুরকৌশলী যিনি প্লাম্বিং বিষয়ে অভিজ্ঞ এবং বিধি ৩৬ অনুযায়ী কারিগরি ব্যক্তি হিসাবে তালিকাভুক্ত ও সংশ্লিষ্ট পেশাজীবী প্রতিষ্ঠানের সদস্য;</h6>\n<hr class=\"sep\">"},{"num":"13416","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第２条（用語の定義）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>６６</strong>　<strong>「排水設備（Sewage system）」</strong>　あらゆる排水管、下水溝、浄化槽（セプティックタンク）、浸透桝、処理施設又はこれらに関連するその他の設備をいう。</h6>\n<h6 class=\"h-lv6\"><strong>６７</strong>　<strong>「山（Hill / Pahar）」</strong>　周辺の地盤から特定の規模で盛り上がった、土又は石で構成された天然の地塊であって、ほぼ円形をなし、その傾斜が著しく急峻ではないものをいう。</h6>\n<h6 class=\"h-lv6\"><strong>６８</strong>　<strong>「基礎（土台 / Plinth）」</strong>　敷地に接する道路の路面から０．４５メートル以上１．８５メートル以下、かつ、造成レベル（Formation Level）から最高１メートルの高さにある床であって、建築物の主要な階（メインフロア）とみなされるものをいう。</h6>\n<h6 class=\"h-lv6\"><strong>６９</strong>　<strong>「ポディウム（Podium）」</strong>　建築物の全体（パラペットを除く。）又は一部の下層部であって、建築物の前面に接する道路の路面から高さ１２メートル以内に制限されるものをいう。</h6>\n<h6 class=\"h-lv6\"><strong>７０</strong>　<strong>「技術者（Engineer / Prokoushuli）」</strong>　工学の学士号を有し、第３６条の規定により専門技術者として登録された、関連する職能団体の正会員をいう。</h6>\n<h6 class=\"h-lv6\"><strong>７１</strong>　<strong>「コンサルタント機関（Consultancy firm）」</strong>　職能団体の会員及び規定により登録された技術的な人材によって構成され、専門的なサービスを提供することを目的として設立された機関をいう。</h6>\n<h6 class=\"h-lv6\"><strong>７２</strong>　<strong>「様式（Form）」</strong>　所管行政庁（Authority）が定める様式をいう。</h6>\n<h6 class=\"h-lv6\"><strong>７３</strong>　<strong>「吊り天井（False ceiling）」</strong>　室の高さの中間に設けられた追加の天井であって、意匠上の目的、倉庫又は設備の点検等のために使用されるものをいう。ただし、居室（居住用）として使用することはできない。</h6>\n<h6 class=\"h-lv6\"><strong>７４</strong>　<strong>「フィン又はルーバー（Fins or Louver）」</strong>　建築物の垂直又は水平の部材であって、通常、日射又は雨から保護するために、窓、縁側（Verandah）、バルコニー又は廊下の外部に使用されるものをいう。</h6>\n<h6 class=\"h-lv6\"><strong>７５</strong>　<strong>「設計床高（Finished Floor Level）」</strong>　仕上げられた床の上面のレベルをいう。</h6>\n<h6 class=\"h-lv6\"><strong>７６</strong>　<strong>「設計地盤面（Finished Ground Level）」</strong>　仕上げられた土地の表面のレベルをいう。</h6>\n<h6 class=\"h-lv6\"><strong>７７</strong>　<strong>「設計天井高（Finished Ceiling Level）」</strong>　仕上げられた天井の下面のレベルをいう。</h6>\n<h6 class=\"h-lv6\"><strong>７８</strong>　<strong>「歩道（Footpath）」</strong>　道路の側部又はその他の場所に設けられた歩行者専用の道をいう。</h6>\n<h6 class=\"h-lv6\"><strong>７９</strong>　<strong>「住戸（Flat or Apartment）」</strong>　居住に適した個別の住居であって、台所、浴室、便所、洗面所等を含むものをいう。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>২। সংজ্ঞা (চলমান)</strong></h5>\n<h6 class=\"h-lv6\"><strong>(৬৬)</strong> \"<strong>পয়ঃনিষ্কাশন ব্যবস্থা</strong>\" অর্থ যেকোনো পয়ঃনালী, নর্দমা, সেপটিক ট্যাংক, সোকওয়েল, পরিশোধন কেন্দ্র অথবা সংশ্লিষ্ট অন্যান্য ব্যবস্থাদি;</h6>\n<h6 class=\"h-lv6\"><strong>(৬৭)</strong> \"<strong>পাহাড়</strong>\" অর্থ সন্নিহিত স্থান হইতে নির্দিষ্ট আয়তনের উঁচু কোনো প্রাকৃতিক ভূখন্ড যাহা মাটি বা পাথরের তৈরি, প্রায় বর্তুলাকার এবং যাহার ঢাল খুব তীক্ষ্মভাবে খাড়া নহে;</h6>\n<h6 class=\"h-lv6\"><strong>(৬৮)</strong> “<strong>প্লিন্থ</strong>” অর্থ প্লট সংলগ্ন রাস্তার সাপেক্ষে অন্যূন ০.৪৫ (শূন্য দশমিক চার পাঁচ) মিটার ও অনধিক ১.৮৫ (এক দশমিক আট পাঁচ) মিটার এবং Formation Level হইতে সর্বোচ্চ ১ (এক) মিটার উচ্চতা বিশিষ্ট মেঝে যাহা ভবনের মূল তল হিসাবে বিবেচ্য;</h6>\n<h6 class=\"h-lv6\"><strong>(৬৯)</strong> “<strong>পোডিয়াম</strong>” অর্থ ইমারতের সম্পূর্ণ (প্যারাপেড ব্যতীত) বা আংশিক নিম্নাংশ যাহা ইমারতের সম্মুখ সংলগ্ন রাস্তার উপরিতল হইতে ১২ (বারো) মিটার উচ্চতার মধ্যে সীমাবদ্ধ হইবে;</h6>\n<h6 class=\"h-lv6\"><strong>(৭০)</strong> \"<strong>প্রকৌশলী</strong>” অর্থ যিনি প্রকৌশল বিষয়ে স্নাতক ডিগ্রিপ্রাপ্ত এবং বিধি ৩৬ অনুযায়ী কারিগরি ব্যক্তি হিসাবে তালিকাভুক্ত এবং সংশ্লিষ্ট পেশাজীবী প্রতিষ্ঠানের সদস্য;</h6>\n<h6 class=\"h-lv6\"><strong>(৭১)</strong> \"<strong>পরামর্শক প্রতিষ্ঠান</strong>\" অর্থ পেশাজীবী প্রতিষ্ঠানের সদস্য ও বিধি অনুযায়ী তালিকাভুক্ত কারিগরি লোকবলের সমন্বয়ে গঠিত প্রতিষ্ঠান যাহা পেশাগত সেবা প্রদানের জন্য গঠিত;</h6>\n<h6 class=\"h-lv6\"><strong>(৭২)</strong> \"<strong>ফরম</strong>\" অর্থ কর্তৃপক্ষ কর্তৃক নির্ধারিত ফরম;</h6>\n<h6 class=\"h-lv6\"><strong>(৭৩)</strong> \"<strong>ফলস সিলিং</strong>” অর্থ কক্ষের উচ্চতার মধ্যে একটি মধ্যবর্তী অতিরিক্ত ছাদ, যাহা নান্দনিক কারণে, ভান্ডার বা সার্ভিস তদারকি, ইত্যাদি কাজে ব্যবহৃত হয়, তবে উহা বসবাসযোগ্য নহে;</h6>\n<h6 class=\"h-lv6\"><strong>(৭৪)</strong> \"<strong>ফিনস্ বা লুভার (Fins or Louver)</strong>\" অর্থ ইমারতের একটি খাড়া বা আনুভূমিক উপাদান, যাহা সচরাচর সূর্য ও বৃষ্টি হইতে রক্ষা পাইবার জন্য জানালা, বারান্দা, বেলকনি ও করিডোরের বহির্মুখে ব্যবহৃত হয়;</h6>\n<h6 class=\"h-lv6\"><strong>(৭৫)</strong> \"<strong>ফিনিসড্ ফ্লোর লেভেল (Finished Floor Level)</strong>\" অর্থ মেঝের সম্পন্নকৃত উপরিতল;</h6>\n<h6 class=\"h-lv6\"><strong>(৭৬)</strong> \"<strong>ফিনিসড্ গ্রাউন্ড লেভেল (Finished Ground Level)</strong>\" অর্থ জমির সম্পন্নকৃত উপরিতল;</h6>\n<h6 class=\"h-lv6\"><strong>(৭৭)</strong> \"<strong>ফিনিসড্ সিলিং লেভেল (Finished Celling Level)</strong>\" অর্থ ছাদের সম্পন্নকৃত নিম্নতল;</h6>\n<h6 class=\"h-lv6\"><strong>(৭৮)</strong> \"<strong>ফুটপাত</strong>” অর্থ রাস্তার পার্শ্বে বা অন্য কোনো স্থানে পায়ে হাঁটার পথ;</h6>\n<h6 class=\"h-lv6\"><strong>(৭৯)</strong> \"<strong>ফ্ল্যাট বা এপার্টমেন্ট</strong>” অর্থ বাসযোগ্য একক আবাস, যাহার মধ্যে রান্নাঘর, গোসলখানা, শৌচাগার, প্রসাধনকক্ষ, ইত্যাদি অন্তর্ভুক্ত থাকিবে;</h6>\n<hr class=\"sep\">"},{"num":"13417","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第２条（用語の定義）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>８０</strong>　<strong>床面積（Floor Area）</strong>　壁その他の耐力構造の水平投影面積を含む、建築物の使用可能な一の階の面積をいう。</h6>\n<h6 class=\"h-lv6\"><strong>８１</strong>　<strong>容積率（Floor Area Ratio / FAR）</strong>　敷地面積に対する建築物の延べ面積の割合をいい、一の敷地内の各階床面積の合計を当該敷地の面積で除して得た数値をいう。その算定式は、次のとおりとする。</h6>\n<p>#######</p>\n<p>$$容積率（FAR） = \\frac{全床面積の合計（本規則に基づき除外される面積を除く。）}{敷地面積（適用がある場合において、道路後退部分の面積を除く。）}$$</p>\n<h6 class=\"h-lv6\"><strong>８２</strong>　<strong>住居（Residence / Basotbari）</strong>　独立した居住、調理及び衛生設備の機能を備えた自立的な居住体系であって、一又は二以上の室により構成される建築物又は建築物の一部をいう。</h6>\n<h6 class=\"h-lv6\"><strong>８３</strong>　<strong>洪水位（Flood water level）</strong>　特定の区域における地盤面又は河川の最高水位からの洪水時の水位であって、バングラデシュ水資源開発委員会による洪水ハザードマップ（Flood Hazard Map）に記録されたものをいう。</h6>\n<h6 class=\"h-lv6\"><strong>８４</strong>　<strong>居室（Habitable Room）</strong>　居間、寝室、書斎又は食事のために使用される室をいう。ただし、浴室、便所、台所、洗濯室、納戸、廊下、配膳室、地下室、屋根裏部屋及び一時的に使用される場所は、これに含まない。</h6>\n<h6 class=\"h-lv6\"><strong>８５</strong>　<strong>使用許可証（Occupancy Certificate / Bosobas ba byobohar sonod）</strong>　第２２条の規定により交付された使用許可証又は、場合により、第２５条の規定により更新された使用許可証をいう。</h6>\n<h6 class=\"h-lv6\"><strong>８６</strong>　<strong>高層建築物（High Rise Building）</strong>　法典（Code）第６条に定義される高層建築物をいう。</h6>\n<h6 class=\"h-lv6\"><strong>８７</strong>　<strong>ベランダ（Balcony）</strong>　建築物の主要構造部から外部に突出した部分であって、基礎（Plinth）から２．２８６メートル以上の高さに位置する使用可能な空間をいう。この場合において、地盤面まで達する支柱を有せず、外部に向かって不透明な囲いにより完全に密閉されておらず、かつ、２面又は３面が開放されているものをいう。</h6>\n<p>####### <strong>ただし、次に掲げる条件に従わなければならない。</strong></p>\n<h6 class=\"h-lv6\"><strong>一</strong>　ベランダに使用される不透明な囲いの高さは、最大１．２５メートルとすること。</h6>\n<h6 class=\"h-lv6\"><strong>二</strong>　いかなる場合においても、外壁の後退距離（セットバック）内に当該ベランダを突出させてはならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>২। সংজ্ঞা (চলমান)</strong></h5>\n<h6 class=\"h-lv6\"><strong>(৮০)</strong> \"<strong>ফ্লোর এরিয়া (Floor Area)</strong>\" অর্থ দেয়াল ও অন্যান্য ভারবাহী কাঠামোর আনুভূমিক ক্ষেত্রফলসহ ইমারতের ব্যবহারযোগ্য একটি তলার ক্ষেত্রফল;</h6>\n<h6 class=\"h-lv6\"><strong>(৮১)</strong> “<strong>ফ্লোর এরিয়া অনুপাত (Floor Area Ratio বা FAR)</strong>\" অর্থ জমির ক্ষেত্রফলের অনুপাতে ইমারতে সন্নিবেশযোগ্য সম্পূর্ণ মেঝের ক্ষেত্রফল, যথা: একটি প্লটের মাঝে তৈরি সম্পূর্ণ ফ্লোর এরিয়ার যোগফলকে উক্ত প্লটের বিদ্যমান জমির ক্ষেত্রফল দ্বারা বিভাজনের ফল, যাহার ফর্মুলা নিম্নরূপ—</h6>\n<p>#######</p>\n<p>$$FAR = \\frac{জমির ক্ষেত্রফল (প্রযোজ্য ক্ষেত্রে রাস্তার জন্য ছাড়িয়া দেওয়া জমির ক্ষেত্রফল ব্যতীত)）}{সকল মেঝের সম্মিলিত ক্ষেত্রফল (বিধিমালার আওতায় ছাড়যোগ্য ক্ষেত্রফলসমূহ ব্যতীত）}$$</p>\n<h6 class=\"h-lv6\"><strong>(৮২)</strong> \"<strong>বসতবাড়ি</strong>\" অর্থ স্বতন্ত্র বসবাস, রন্ধন এবং স্বাস্থ্য ব্যবস্থার সুবিধা সংবলিত এক স্বাবলম্বী বসত ব্যবস্থা যাহা এক বা একাধিক কক্ষের সমন্বয়ে গঠিত ইমারত বা ইমারতের অংশবিশেষ;</h6>\n<h6 class=\"h-lv6\"><strong>(৮৩)</strong> \"<strong>বন্যার পানি উচ্চতা</strong>\" অর্থ একটি নির্দিষ্ট এলাকার জন্য ভূমি অথবা নদীর সর্বোচ্চ তল হইতে বন্যাকালীন পানির উচ্চতা, যাহা বাংলাদেশ পানি উন্নয়ন বোর্ড কর্তৃক Flood Hazard Map এ সংরক্ষিত;</h6>\n<h6 class=\"h-lv6\"><strong>(৮৪)</strong> “<strong>বসবাসযোগ্য কক্ষ</strong>\" অর্থ লিভিং রুম, শয়ন, অধ্যয়ন বা খাওয়ার জন্য ব্যবহৃত কক্ষ; তবে বাথরুম, টয়লেট, রান্নাঘর, লন্ড্রি, ভান্ডার, করিডোর, প্যান্ট্রি, ভূগর্ভস্থ রুম, চিলেকোঠা, অনিয়মিত ব্যবহৃত জায়গা ইহার অন্তর্ভুক্ত হইবে না;</h6>\n<h6 class=\"h-lv6\"><strong>(৮৫)</strong> \"<strong>বসবাস বা ব্যবহার সনদ</strong>\" অর্থ বিধি ২২ এর অধীন প্রদত্ত বসবাস বা ব্যবহার সনদ বা, ক্ষেত্রমত, বিধি ২৫ এর অধীন নবায়নকৃত বসবাস বা ব্যবহার সনদ;</h6>\n<h6 class=\"h-lv6\"><strong>(৮৬)</strong> \"<strong>বহুতল ইমারত</strong>\" অর্থ কোডের Article 6 এ সংজ্ঞায়িত High Rise Building বা বহুতল ইমারত;</h6>\n<h6 class=\"h-lv6\"><strong>(৮৭)</strong> \"<strong>ব্যালকনি</strong>” অর্থ ইমারতের মূল অংশ হইতে বহিঃদিকে বর্ধিত যাহা প্লিন্থ হইতে অন্যূন ২.২৮৬ (দুই দশমিক দুই আট ছয়) মিটার উচ্চতায় ব্যবহারযোগ্য জায়গা যাহার ভূমি পর্যন্ত বর্ধিত কোনো অবলম্বন নাই, বাহিরের দিকে নিরেট কোনো বেষ্টনী দ্বারা সম্পূর্ণ আবদ্ধ নহে এবং যাহার ২ (দুই) বা ৩ (তিন) পার্শ্ব অবাধ বা উন্মুক্ত থাকিবে:</h6>\n<p>####### <strong>তবে শর্ত থাকে যে,</strong></p>\n<h6 class=\"h-lv6\"><strong>(ক)</strong> ব্যালকনিতে ব্যবহৃত নিরেট বেষ্টনীর উচ্চতা সর্বোচ্চ ১.২৫ (এক দশমিক দুই পাঁচ) মিটার হইবে;</h6>\n<h6 class=\"h-lv6\"><strong>(খ)</strong> কোনো অবস্থাতেই ইমারতের সেটব্যাকের মধ্যে উক্ত ব্যালকনি বর্ধিত হইতে পারিবে না;</h6>\n<hr class=\"sep\">"},{"num":"13418","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第２条（用語の定義）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>８８</strong>　<strong>不適合建築物（Deviated Building）</strong>　法典（BNBC）又は本規則の規定に抵触して建築された、承認済み又は未承認の建築物をいう。</h6>\n<h6 class=\"h-lv6\"><strong>８９</strong>　<strong>縁側（Verandah）</strong>　建築物の任意の階に位置する部分であって、屋根又は天井を有し、少なくとも一側面が外部に向かって２．１３メートル以上の高さまで開放され、かつ、本規則の規定に基づく一定の高さの柵又はガードレールにより囲われたものをいう。</h6>\n<h6 class=\"h-lv6\"><strong>９０</strong>　<strong>既存建築物（Existing Building）</strong>　本規則の施行前に、所管行政庁により承認を受け、又は承認を受けずに存在した建築物をいう。</h6>\n<h6 class=\"h-lv6\"><strong>９１</strong>　<strong>特別区域（Special Area）</strong>　自然又は文化的に重要であり、都市計画（マスタープラン）に基づき策定された詳細地域計画（ＤＡＰ）において指定された区域をいう。</h6>\n<h6 class=\"h-lv6\"><strong>９２</strong>　<strong>特殊建築物（Special Building）</strong>　第１０条第１項に規定する分類の建築物をいう。</h6>\n<h6 class=\"h-lv6\"><strong>９３</strong>　<strong>地階（Basement）</strong>　床の５０パーセント以上が、主要な出入口の最高接地面から１メートル以上の深さに位置する階をいう。</h6>\n<h6 class=\"h-lv6\"><strong>９４</strong>　<strong>建蔽率（Ground Coverage / Building Area Ratio）</strong>　建築物の建築面積の敷地面積に対する割合をいい、百分率で表す。算定式は、次のとおりとする。</h6>\n<p>#######</p>\n<p>$$建蔽率 = \\frac{建築面積（本規則に基づき除外される面積を除く。） \\times 100}{敷地面積（適用がある場合において、道路後退部分の面積を除く。）}$$</p>\n<h6 class=\"h-lv6\"><strong>９５</strong>　<strong>計画承認書（Planning Permit）</strong>　所管行政庁が、１９５３年都市改良法（１９５３年法律第１３号）に基づき策定された都市計画（マスタープラン）並びに２０００年公園、広場、庭園及び天然水体保存法（２０００年法律第３６号）その他関連法令に照らして交付する、計画承認に関する文書をいう。</h6>\n<h6 class=\"h-lv6\"><strong>９６</strong>　<strong>土地家屋調査士（Land Surveyor / Bhumi joripkari）</strong>　第３６条に掲げる専門職団体に土地家屋調査士として登録された専門技術者をいう。</h6>\n<h6 class=\"h-lv6\"><strong>９７</strong>　<strong>都市計画（マスタープラン）</strong>　１９５３年都市改良法（１９５３年法律第１３号）に基づき策定された、最新の承認済み計画をいう。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>২। সংজ্ঞা (চলমান)</strong></h5>\n<h6 class=\"h-lv6\"><strong>(৮৮)</strong> \"<strong>ব্যত্যয়কৃত ইমারত বা ভবন</strong>\" অর্থ কোড ও বিধির ব্যত্যয় করিয়া নির্মিত অনুমোদিত বা অননুমোদিত ইমারত;</h6>\n<h6 class=\"h-lv6\"><strong>(৮৯)</strong> \"<strong>বারান্দা</strong>\" অর্থ ইমারতের যেকোনো তলে অবস্থিত অংশ, যেখানে ছাদ বা সিলিং রহিয়াছে ও কমপক্ষে একটি দিক বাহিরের দিকে ২.১৩ (দুই দশমিক এক তিন) মিটার উচ্চতা পর্যন্ত খোলা এবং বিধি অনুযায়ী অন্যূন উচ্চতা বিশিষ্ট বেষ্টনী বা গার্ডরেইল দ্বারা আবদ্ধ;</h6>\n<h6 class=\"h-lv6\"><strong>(৯০)</strong> \"<strong>বিদ্যমান ইমারত</strong>\" অর্থ এই বিধিমালা কার্যকর হইবার পূর্বে কর্তৃপক্ষ কর্তৃক অনুমোদিত বা অ-অনুমোদিত কোনো ইমারত;</h6>\n<h6 class=\"h-lv6\"><strong>(৯১)</strong> \"<strong>বিশেষ এলাকা</strong>\" অর্থ প্রাকৃতিক বা সাংস্কৃতিক গুরুত্ব বহনকারী এবং মহাপরিকল্পনার অধীন প্রস্তুত বিশদ অঞ্চল পরিকল্পনাতে নির্দেশিত এলাকা;</h6>\n<h6 class=\"h-lv6\"><strong>(৯২)</strong> \"<strong>বিশেষ ইমারত</strong>\" অর্থ বিধি ১০ এর উপ-বিধি (১) এ উল্লিখিত শ্রেণির ইমারত;</h6>\n<h6 class=\"h-lv6\"><strong>(৯৩)</strong> \"<strong>বেজমেন্ট</strong>\" অর্থ ইমারতের তল যাহার ৫০% (পঞ্চাশ শতাংশ) বা তদূর্ধ্ব অংশ প্রধান প্রবেশ পথের সর্বোচ্চ উপরিতল হইতে ১ (এক) মিটার বা তদূর্ধ্ব গভীরতায় অবস্থিত;</h6>\n<h6 class=\"h-lv6\"><strong>(৯৪)</strong> \"<strong>ভূমি আচ্ছাদন</strong>\" অর্থ ইমারত দ্বারা আবৃত জমির পরিমাণ যাহা শতকরা হার হিসাবে উল্লিখিত হইবে, যথা:—</h6>\n<p>#######</p>\n<p>$$ভূমি আচ্ছাদন (Ground Coverage) = \\frac{বিধিমালার আওতায় ছাড়যোগ্য ক্ষেত্রফল বাদে ইমারত দ্বারা জমির আবৃত এলাকা \\times ১০০}{জমির ক্ষেত্রফল (প্রযোজ্য ক্ষেত্রে রাস্তার জন্য ছাড়িয়া দেওয়া জমির ক্ষেত্রফল ব্যতীত)}$$</p>\n<h6 class=\"h-lv6\"><strong>(৯৫)</strong> \"<strong>পরিকল্পনা অনুমোদনপত্র</strong>\" অর্থ কর্তৃপক্ষ কর্তৃক Town Improvement Act, 1953 (Act No. XIII of 1953) এর অধীন প্রণীত মহাপরিকল্পনা এবং মহানগরী, বিভাগীয় শহর ও জেলা শহরের পৌর এলাকাসহ দেশের সকল পৌর এলাকার খেলার মাঠ, উন্মুক্ত স্থান, উদ্যান এবং প্রাকৃতিক জলাধার সংরক্ষণ আইন, ২০০০ (২০০০ সনের ৩৬ নং আইন) ও সংশ্লিষ্ট অন্যান্য আইন ও বিধিমালার আলোকে প্রদত্ত পরিকল্পনা অনুমোদন সম্পর্কিত পত্র;</h6>\n<h6 class=\"h-lv6\"><strong>(৯৬)</strong> \"<strong>ভূমি জরিপকারী</strong>\" অর্থ কোনো কারিগরি ব্যক্তি যিনি ভূমি জরিপকারী হিসাবে বিধি ৩৬ এ উল্লিখিত কোনো পেশাজীবী প্রতিষ্ঠানে তালিকাভুক্ত;</h6>\n<h6 class=\"h-lv6\"><strong>(৯৭)</strong> \"<strong>মহাপরিকল্পনা</strong>\" অর্থ Town Improvement Act, 1953 (Act No. XIII of 1953) এর অধীন প্রণীত সর্বশেষ অনুমোদিত পরিকল্পনা;</h6>\n<hr class=\"sep\">"},{"num":"13419","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第２条（用語の定義）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>９８</strong>　<strong>中二階（Mezzanine Floor）</strong>　室の床と天井との間に設けられた一又は二以上の部分的な階をいう。ただし、当該中二階の面積は、直下階の床面積の３分の１を超えてはならない。建築物の階数を算定する場合、中二階は階数に算入しないものとする。ただし、中二階の該当する部分は、容積率（FAR）算定の基礎となる床面積に算入しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>９９</strong>　<strong>床（Floor）</strong>　建築物の各階における水平な面をいう。</h6>\n<h6 class=\"h-lv6\"><strong>１００</strong>　<strong>機械技術者（Mechanical Engineer）</strong>　関連分野の学士号を有し、バングラデシュ技術者協会（IEB）の会員であり、かつ、第３６条の規定により登録された者をいう。</h6>\n<h6 class=\"h-lv6\"><strong>１０１</strong>　<strong>機械換気設備（Mechanical ventilation system）</strong>　機械的作用により、建築物又はその一部に外気を導入し、又は必要に応じて内部の空気を排出するシステムをいう。</h6>\n<h6 class=\"h-lv6\"><strong>１０２</strong>　<strong>道路（Road / Rasta）</strong>　地籍図、関連する市公社（City Corporation）、首都開発庁（RAJUK）、地方自治体又は同等の市民向け公共サービス提供機関の地図若しくは記録に登録された通路、あらゆる種類の道路、高速道路、既存の道路に附随する歩道、排水溝、又は道路建設のために指定された区域（ROW）をいう。当該道路は、近隣の車両通行に適した道路に接続されていなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>１０３</strong>　<strong>道路幅員（Road Width）</strong>　道路、道路に附随する排水溝、歩道等を含む道路の全幅をいう。幅員の算定にあたっては、敷地が接する道路の境界線の両端からそれぞれ５０メートル区間における平均（最小及び最大）幅員を、現況の道路幅員とみなす。</h6>\n<h6 class=\"h-lv6\"><strong>１０４</strong>　<strong>不動産開発事業（Real estate development project）</strong>　住宅、施設、商業又は工業用区画の開発及び割り当てをいい、次に掲げる事業を含むものとする。</h6>\n<h6 class=\"h-lv6\"><strong>一</strong>　開発業者（Developer）による民間不動産の建設、売買、割り当て等のための事業</h6>\n<h6 class=\"h-lv6\"><strong>二</strong>　政府の主導による不動産の建設、売買、割り当て等のための事業</h6>\n<h6 class=\"h-lv6\"><strong>１０５</strong>　<strong>道路幅員別容積率（Road-based Floor Area Ratio）</strong>　都市計画（Master Plan）に基づき、道路幅員に応じて第４７条の規定により算定される容積率（FAR）をいう。</h6>\n<h6 class=\"h-lv6\"><strong>１０６</strong>　<strong>建築士（Architect / Sthapoti）</strong>　建築学の学士号を有し、バングラデシュ建築家協会（IAB）の会員であり、かつ、第３６条の規定により登録された者をいう。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>২। সংজ্ঞা (চলমান)</strong></h5>\n<h6 class=\"h-lv6\"><strong>(৯৮)</strong> \"<strong>মেজানাইন তলা (Mezzanine Floor)</strong>\" অর্থ যেকোনো কক্ষের মেঝে ও ছাদের অন্তর্বর্তী এক বা একাধিক আংশিক তলা, তবে ইহা মেঝের আয়তনের এক তৃতীয়াংশ অপেক্ষা অধিক হইতে পারিবে না, ইমারতের তলা গণনা করিবার ক্ষেত্রে মেজানাইন তলাকে ইমারতের তলা হিসাবে গণ্য করা হইবে না, কিন্তু মেজানাইন তলার প্রযোজ্য অংশ FAR ভুক্ত ক্ষেত্রফল এর অন্তর্ভুক্ত হইবে;</h6>\n<h6 class=\"h-lv6\"><strong>(৯৯)</strong> \"<strong>মেঝে</strong>\" অর্থ ভূমির আনুভূমিক ইমারতের তলা;</h6>\n<h6 class=\"h-lv6\"><strong>(১০০)</strong> \"<strong>মেকানিক্যাল ইঞ্জিনিয়ার বা যন্ত্র প্রকৌশলী</strong>\" অর্থ যিনি সংশ্লিষ্ট বিষয়ে স্নাতক ডিগ্রিপ্রাপ্ত, ইন্সটিটিউশন অব ইঞ্জিনিয়ার্স, বাংলাদেশ এর সদস্য এবং বিধি ৩৬ অনুযায়ী তালিকাভুক্ত;</h6>\n<h6 class=\"h-lv6\"><strong>(১০১)</strong> \"<strong>যান্ত্রিক বায়ু চলাচল ব্যবস্থা</strong>\" অর্থ যান্ত্রিকভাবে কোনো ইমারত বা উহার অংশ বিশেষ বাতাস প্রবেশ অথবা প্রয়োজনে বাতাস বাহির করিয়া দেওয়ার ব্যবস্থা;</h6>\n<h6 class=\"h-lv6\"><strong>(১০২)</strong> \"<strong>রাস্তা</strong>\" অর্থ ভূমি-জরিপ ম্যাপ, সংশ্লিষ্ট সিটি কর্পোরেশন, রাজধানী উন্নয়ন কর্তৃপক্ষ, মিউনিসিপ্যালিটি বা সমজাতীয় নাগরিক সুবিধা প্রদানকারী কোনো সংস্থার ম্যাপ বা রেকর্ডভুক্ত চলাচলের পথ, সকল ধরনের সড়ক, মহাসড়ক, বিদ্যমান সড়ক সংলগ্ন ফুটপাথ, ড্রেন অথবা পথ নির্মাণের জন্য নির্ধারিত স্থান (ROW); এবং উক্ত রাস্তাকে নিকটবর্তী গাড়ি চলাচলের জন্য উপযুক্ত কোনো রাস্তার সহিত সংযুক্ত হইতে হইবে;</h6>\n<h6 class=\"h-lv6\"><strong>(১০৩)</strong> \"<strong>রাস্তার প্রস্থ</strong>\" অর্থ রাস্তা, রাস্তা-সংলগ্ন ড্রেন, ফুটপাথ, ইত্যাদিসহ রাস্তার সর্বমোট বিস্তার এবং রাস্তার প্রস্থ বিবেচনার জন্য প্লটের রাস্তা সংলগ্ন দুই পাশের সীমানা কর্ণার হইতে উভয় দিকে ৫০ (পঞ্চাশ) মিটার রাস্তার দৈর্ঘ্য পর্যন্ত গড় (ন্যূনতম এবং সর্বোচ্চ) প্রস্থ বিদ্যমান রাস্তার প্রস্থ হিসাবে বিবেচনা করিতে হইবে;</h6>\n<h6 class=\"h-lv6\"><strong>(১০৪)</strong> \"<strong>রিয়েল এস্টেট উন্নয়ন প্রকল্প বা প্রকল্প</strong>\" অর্থ আবাসিক বা প্রাতিষ্ঠানিক বা বাণিজ্যিক বা শিল্প প্লট উন্নয়ন ও বরাদ্দকরণ এবং নিম্নবর্ণিত প্রকল্প বা প্রকল্পসমূহ ইহার অন্তর্ভুক্ত হইবে, যথা:—</h6>\n<h6 class=\"h-lv6\"><strong>(ক)</strong> ডেভেলপার কর্তৃক বেসরকারি রিয়েল এস্টেট নির্মাণ, ক্রয়-বিক্রয়, বরাদ্দ, ইত্যাদির জন্য গৃহীত প্রকল্প বা প্রকল্পসমূহ;</h6>\n<h6 class=\"h-lv6\"><strong>(খ)</strong> সরকারের উদ্যোগে রিয়েল এস্টেট নির্মাণ, ক্রয়-বিক্রয়, বরাদ্দ, ইত্যাদির জন্য গৃহীত প্রকল্প বা প্রকল্পসমূহ;</h6>\n<h6 class=\"h-lv6\"><strong>(১০৫)</strong> \"<strong>রোডভিত্তিক FAR</strong>\" অর্থ মহাপরিকল্পনার আলোকে রাস্তার প্রশস্ততার ভিত্তিতে বিধি ৪৭ অনুসারে নির্ধারিত FAR;</h6>\n<h6 class=\"h-lv6\"><strong>(১০৬)</strong> \"<strong>স্থপতি</strong>\" অর্থ যিনি স্থাপত্য বিষয়ে স্নাতক ডিগ্রিপ্রাপ্ত এবং ইনস্টিটিউট অব আর্কিটেক্টস, বাংলাদেশ এর সদস্য এবং বিধি ৩৬ অনুযায়ী তালিকাভুক্ত;</h6>\n<hr class=\"sep\">"},{"num":"13420","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第２条（用語の定義）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>１０７</strong>　<strong>修正又は変更（Modification or Alteration / Songshodhon ba Poriborton）</strong>　承認済み設計における用途の変更、又は建築物の面積若しくは高さに係る増築、部分的な撤去並びに壁、柱、梁、階段、昇降機若しくは床の築造、切断若しくは撤去による構造の変更、出入口若しくは避難経路の変更若しくは閉鎖、又はあらゆる材料及び備品の変更をいう。</h6>\n<h6 class=\"h-lv6\"><strong>１０８</strong>　<strong>増築（Addition / Sonzojon）</strong>　建築物の床面積、高さ又は容積に、いかなる種類であっても構造物を付加することをいう。</h6>\n<h6 class=\"h-lv6\"><strong>１０９</strong>　<strong>保存区域（Protected Area / Songrokkhito Elaka）</strong>　詳細地域計画（DAP）又はその他の法令により定義される保存区域をいう。</h6>\n<h6 class=\"h-lv6\"><strong>１１０</strong>　<strong>表（Table / Saroni）</strong>　本規則の別表をいう。</h6>\n<h6 class=\"h-lv6\"><strong>１１１</strong>　<strong>外壁の後退距離（Setback）</strong>　建築物の前面、側面及び背面において確保されるべき最小限の空地をいう。</h6>\n<h6 class=\"h-lv6\"><strong>１１２</strong>　<strong>後退線（Setback Line）</strong>　敷地（Plot / Site）において計画され、又は現に存する建築物の周囲に設定される、建築可能な境界線をいう。</h6>\n<h6 class=\"h-lv6\"><strong>１１３</strong>　<strong>設備図（Service Drawing / Service Droing）</strong>　第３６条の規定により登録された専門技術者（Technical person）が作成する図面であって、次に掲げる事項を含むものをいう。</h6>\n<h6 class=\"h-lv6\"><strong>ａ</strong>　給水、排水、雨水利用、汚水処理施設（STP）、産業廃液処理施設（ETP）、排水系、ガス供給、集中ガス供給システム等の配置図及び詳細図</h6>\n<h6 class=\"h-lv6\"><strong>ｂ</strong>　電気工作物、変電所、回路図、太陽光発電設備等の配置図及び詳細図</h6>\n<h6 class=\"h-lv6\"><strong>ｃ</strong>　空気調和設備（存する場合に限る。）の計画、設計及び配置、並びに昇降機、エスカレーター及び動く歩道（存する場合に限る。）の設置詳細図</h6>\n<h6 class=\"h-lv6\"><strong>ｄ</strong>　車庫、暖房、音響制御に関する図面（適用がある場合に限る。）</h6>\n<h6 class=\"h-lv6\"><strong>ｅ</strong>　ビル管理システム（BMS）に関する図面（適用がある場合に限る。）</h6>\n<h6 class=\"h-lv6\"><strong>ｆ</strong>　光ファイバーケーブル用ダクト（高層建築物においては必須とする。）</h6>\n<h6 class=\"h-lv6\"><strong>ｇ</strong>　その他建築物の各種サービスに関する詳細図（適用がある場合に限る。）</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>২। সংজ্ঞা (চলমান)</strong></h5>\n<h6 class=\"h-lv6\"><strong>(১০৭)</strong> \"<strong>সংশোধন বা পরিবর্তন</strong>\" অর্থ অনুমোদিত নকশার ব্যবহার পরিবর্তন বা কোনো স্থাপত্য বা কাঠামোগত পরিবর্তন যেমন: ইমারতের ক্ষেত্রফল বা উচ্চতার সহিত সংযোজন, অংশবিশেষ অপসারণ এবং কোনো দেয়াল, কলাম, বিম, সিঁড়ি, লিফট বা মেঝে নির্মাণ, কর্তন বা অপসারণ এর মাধ্যমে কাঠামোর কোনো পরিবর্তন, কোনো প্রবেশপথ বা বহির্গমন পথের পরিবর্তন বা বন্ধ করা অথবা যে কোনো উপকরণ ও সরঞ্জামাদি পরিবর্তন;</h6>\n<h6 class=\"h-lv6\"><strong>(১০৮)</strong> \"<strong>সংযোজন</strong>\" অর্থ ইমারতের মেঝের ক্ষেত্রফল, উচ্চতা বা ঘন আয়তনের সহিত যেকোনো ধরনের স্থাপনা যুক্তকরণ;</h6>\n<h6 class=\"h-lv6\"><strong>(১০৯)</strong> \"<strong>সংরক্ষিত এলাকা</strong>\" অর্থ বিশদ অঞ্চল পরিকল্পনা বা ডিটেইলড এরিয়া প্ল্যান (DAP) বা অন্য কোনো আইন বিধি দ্বারা সংজ্ঞায়িত সংরক্ষিত এলাকা;</h6>\n<h6 class=\"h-lv6\"><strong>(১১০)</strong> \"<strong>সারণি</strong>\" অর্থ এই বিধিমালার কোনো সারণি;</h6>\n<h6 class=\"h-lv6\"><strong>(১১১)</strong> \"<strong>সেটব্যাক (Setback)</strong>\" অর্থ প্রতিটি ইমারতের সম্মুখে, পার্শ্বে এবং পশ্চাতে ন্যূনতম উন্মুক্ত স্থান;</h6>\n<h6 class=\"h-lv6\"><strong>(১১২)</strong> \"<strong>সেটব্যাক লাইন</strong>\" অর্থ প্লট বা সাইটে প্রস্তাবিত বা বিদ্যমান ইমারতের চতুর্দিকের অনুমোদনযোগ্য বা অনুমোদিত সীমারেখা;</h6>\n<h6 class=\"h-lv6\"><strong>(১১৩)</strong> \"<strong>সার্ভিস ড্রইং</strong>\" অর্থ বিধি ৩৬ অনুযায়ী নিবন্ধিত কারিগরি ব্যক্তি কর্তৃক প্রস্তুতকৃত নকশাসমূহ, যাহাতে নিম্নবর্ণিত বিষয়সমূহ অন্তর্ভুক্ত থাকিবে, যথা:-</h6>\n<h6 class=\"h-lv6\"><strong>(ক)</strong> পানি সরবরাহ, পয়ঃ ও পানি নিষ্কাশন, প্রযোজ্য ক্ষেত্রে, রেইন ওয়াটার হার্ভেস্টিং, সুয়ারেজ ট্রিটমেন্ট প্ল্যান্ট (STP), শিল্পবর্জ্য শোধনাগার (ETP), ড্রেইনেজ, গ্যাস সরবরাহ, রেটিকুলেটেড গ্যাস সরবরাহ সিস্টেম, ইত্যাদির লে-আউট প্ল্যান ও ড্রইং;</h6>\n<h6 class=\"h-lv6\"><strong>(খ)</strong> বৈদ্যুতিক স্থাপনা, উপ-কেন্দ্র, বৈদ্যুতিক সার্কিট ডায়াগ্রাম, সৌর বৈদ্যুতিক, ইত্যাদির লে-আউট প্ল্যান ও ড্রইং;</h6>\n<h6 class=\"h-lv6\"><strong>(গ)</strong> শীতাতপ নিয়ন্ত্রণ ব্যবস্থার (যদি থাকে) প্ল্যান, ডিজাইন ও লে-আউট এবং লিফট, এস্কেলেটর ও মুভিং ওয়াক স্থাপন (যদি থাকে) স্থাপনের ড্রইং;</h6>\n<h6 class=\"h-lv6\"><strong>(ঘ)</strong> গ্যারেজ, উত্তাপন (Heating), অভ্যন্তরীণ শব্দ (Acoustics) নিয়ন্ত্রণ সংক্রান্ত ড্রইং (প্রযোজ্য ক্ষেত্রে);</h6>\n<h6 class=\"h-lv6\"><strong>(ঙ)</strong> বিল্ডিং ম্যানেজমেন্ট সিস্টেম (BMS) সংক্রান্ত ড্রইং (প্রযোজ্য ক্ষেত্রে);</h6>\n<h6 class=\"h-lv6\"><strong>(চ)</strong> ফাইবার অপটিক্যাল ক্যাবল নেটওয়ার্ক এর জন্য ডাক্ট (বহুতল ইমারতের ক্ষেত্রে বাধ্যতামূলক);</h6>\n<h6 class=\"h-lv6\"><strong>(ছ)</strong> ভবনের অন্যান্য সেবাসমূহের বিস্তারিত ড্রইং (প্রযোজ্য ক্ষেত্রে);</h6>\n<hr class=\"sep\">"},{"num":"13421","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第２条（用語の定義）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>１１４</strong>　<strong>「サービスルーム（Service Room / Sarvis kokkho）」</strong>　居室以外のその他の室及び被覆された空間をいい、駐車場、電気・機械設備室、空調プラント、建築設備用スペース、集中ガス供給室、医療用ガス室、発電機室、家事用貯蔵室、金庫室、サービスステーション、不燃物貯蔵室等を含む。</h6>\n<h6 class=\"h-lv6\"><strong>１１５</strong>　<strong>「サービス道路（Service Road）」</strong>　建築設備の維持管理等の必要に応じて、敷地の前面、背面又は側面に確保された道路又はレーンをいう。</h6>\n<h6 class=\"h-lv6\"><strong>１１６</strong>　<strong>「敷地（Site）」</strong>　建築物の建築、土地の開発、池の掘削のために特定の境界線により囲まれた場所をいう。</h6>\n<h6 class=\"h-lv6\"><strong>１１７</strong>　<strong>「庇（Sunshade）」</strong>　日射又は雨水を避ける目的で建築物の外壁に設けられたオーバーハングであって、主要構造部から最大０．５メートルまで突出したものをいう。</h6>\n<h6 class=\"h-lv6\"><strong>１１８</strong>　<strong>「ユニバーサルアクセシビリティ（Universal Accessibility）」</strong>　ユニバーサルアクセシビリティの原則に基づき設計された構築環境をいう。</h6>\n<h6 class=\"h-lv6\"><strong>１１９</strong>　<strong>「ユニバーサルデザイン（Universal Design）」</strong>　特別な能力を必要とする者や特別なニーズを持つ者の必要性を分けることなく、全ての人の普遍的なニーズを計画に組み込む設計方針をいう。</h6>\n<h3 class=\"h-lv3\">第２章 [Chapter II]</h3>\n<h4 class=\"h-lv4\">計画承認、確認済証の申請、承認及び使用許可証等 [Planning Approval, Building Permit Application, Approval and Occupancy Certificate]</h4>\n<h5 class=\"h-lv5\"><strong>第３条（計画承認、確認済証及び使用許可の承認手続）</strong></h5>\n<h6 class=\"h-lv6\">１　この規則に基づく計画、建築物の建築、その設計及び使用の承認手続は、次に掲げる段階を経て行わなければならない。</h6>\n<h6 class=\"h-lv6\">一　計画承認（Planning Permit）</h6>\n<h6 class=\"h-lv6\">二　確認済証（Construction Permit）</h6>\n<h6 class=\"h-lv6\">三　使用許可証（Occupancy Certificate）</h6>\n<h6 class=\"h-lv6\">２　前項に規定する承認等の事項について、申請者は自ら、又はその代理人を通じて申請することができる。</h6>\n<h6 class=\"h-lv6\">３　第１項に規定する承認又は、場合により、証書の交付に関する申請及び処理に係る事項は、電子又はデジタル方式により行わなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>২। সংজ্ঞা (চলমান)</strong></h5>\n<h6 class=\"h-lv6\"><strong>(১১৪)</strong> \"<strong>সার্ভিস কক্ষ</strong>\" অর্থ বসবাস ব্যতীত অন্যান্য কক্ষ এবং আবৃত স্থান, যেমন- পার্কিং এরিয়া, ইলেকট্রো মেকানিক্যাল সহায়ক কক্ষ, এয়ার কন্ডিশニング প্ল্যান্ট, বিল্ডিং সার্ভিসেসের জন্য সংরক্ষিত স্থান, রেটিকুলেটেড গ্যাস সরবরাহ কক্ষ, মেডিকেল গ্যাস কক্ষ, জেনারেটর এর জন্য নির্ধারিত স্থান, গৃহস্থালী কাজের জন্য স্টোর রুম, স্ট্রং রুম সার্ভিস স্টেশন, অদাহ্য বস্তু রাখিবার কক্ষসমূহ, ইত্যাদি;</h6>\n<h6 class=\"h-lv6\"><strong>(১১৫)</strong> \"<strong>সার্ভিস রোড</strong>\" অর্থ সার্ভিসের প্রয়োজনে প্লটের সম্মুখে পশ্চাতে কিংবা পার্শ্বে সংরক্ষিত রাস্তা বা লেইন;</h6>\n<h6 class=\"h-lv6\"><strong>(১১৬)</strong> \"<strong>সাইট</strong>\" অর্থ ইমারত নির্মাণ, ভূমি উন্নয়ন, পুকুর খননের জন্য নির্দিষ্ট সীমারেখা বেষ্টিত স্থান;</h6>\n<h6 class=\"h-lv6\"><strong>(১১৭)</strong> \"<strong>সানশেড</strong>\" অর্থ রোদ বা বৃষ্টি হইতে রক্ষার জন্য ইমারতের বহিঃদেওয়ালের উপর স্থাপিত ওভার হ্যাং যাহা মূল স্থাপনা হইতে সর্বোচ্চ ০.৫ (শূন্য দশমিক পাঁচ) মিটার পর্যন্ত বর্ধিত;</h6>\n<h6 class=\"h-lv6\"><strong>(১১৮)</strong> \"<strong>সার্বজনীন গম্যতা</strong>\" অর্থ সার্বজনীন গম্যতা নীতিতে নকশাকৃত নির্মিত পরিবেশ;</h6>\n<h6 class=\"h-lv6\"><strong>(১১৯)</strong> \"<strong>সার্বজনীন ডিজাইন</strong>\" অর্থ এমন একটি নকশানীতি কার্যক্রম যেখানে বিশেষ সক্ষমতা সম্পন্ন ও বিশেষচাহিদা সম্পন্ন ব্যক্তি বিশেষের প্রয়োজনকে আলাদা না করিয়া সকল মানুষের সার্বজনীন প্রয়োজনকে পরিকল্পনায় অর্ন্তভুক্ত করা হয়।</h6>\n<h3 class=\"h-lv3\">দ্বিতীয় অধ্যায়</h3>\n<h4 class=\"h-lv4\">পরিকল্পনা ও ইমারত নির্মাণ অনুমোদন পত্রের আবেদন, অনুমোদন এবং বসবাস বা ব্যবহার সনদ, ইত্যাদি</h4>\n<h5 class=\"h-lv5\"><strong>৩। পরিকল্পনা, ইমারত নির্মাণ ও বসবাস উপযোগিতার অনুমোদন পদ্ধতি।</strong></h5>\n<h6 class=\"h-lv6\">(১) এই বিধিমালার অধীন পরিকল্পনা, ইমারত নির্মাণ, উহার নকশা এবং বসবাস উপযোগিতার অনুমোদন পদ্ধতি নিম্নবর্ণিত পর্যায়ে সম্পন্ন হইবে, যথা:--</h6>\n<h6 class=\"h-lv6\">(ক) পরিকল্পনা অনুমোদন (Planning Permit);</h6>\n<h6 class=\"h-lv6\">(খ) নির্মাণ অনুমোদন (Construction Permit); এবং</h6>\n<h6 class=\"h-lv6\">(গ) বসবাস বা ব্যবহার সনদ (Occupancy Certificate)।</h6>\n<h6 class=\"h-lv6\">(২) উপ-বিধি (১) এ উল্লিখিত বিষয়ে আবেদনকারী নিজে বা তাহার প্রতিনিধির মাধ্যমে আবেদন করিতে পারিবে।</h6>\n<h6 class=\"h-lv6\">(৩) উপ-বিধি (১) এ উল্লিখিত অনুমোদন বা, ক্ষেত্রমত, সনদ প্রদানের আবেদন ও নিষ্পত্তি সংক্রান্ত বিষয়াদি ইলেক্ট্রনিক বা ডিজিটাল পদ্ধতিতে সম্পাদন করিতে হইবে।</h6>\n<hr class=\"sep\">"},{"num":"13422","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第４条（計画承認書の申請）</strong></h5>\n<h6 class=\"h-lv6\">１　確認済証（Construction Permit）の申請に先立ち、所管行政庁（Authority）の管轄下にある土地において建築物を建築しようとする場合は、所管行政庁に対し計画承認（Planning Permit）の申請を行わなければならない。</h6>\n<h6 class=\"h-lv6\">２　前項の申請にあたっては、次に掲げる書類を提出しなければならない。</h6>\n<h6 class=\"h-lv6\">一　申請者及び、該当する場合、当該土地若しくは建築物の所有者の国民身分証、最新の土地開発税納税証明、権利証、最新の名義変更（Mutation）記録、その他必要書類の原本の正本スキャン写し</h6>\n<h6 class=\"h-lv6\">二　付録４の規定に基づく手数料の納付証明書</h6>\n<h6 class=\"h-lv6\">三　適切な縮尺（１：１９８０、１：７９２等）による、最小４つの座標値（Coordinate values）を含むデジタル測量図（CAD、PDF、JPEG等の形式）並びに土地及び接道状況を示す写真（JPEG形式）</h6>\n<h6 class=\"h-lv6\">四　代理人により申請を行う場合にあっては、代理人の選任に係る証明書</h6>\n<h6 class=\"h-lv6\">３　前項に規定する書類のほか、特別な場合（５エーカーを超える敷地における共同住宅、不動産開発事業、街区単位の開発、特殊建築物等）においては、次に掲げる書類を提出しなければならない。</h6>\n<h6 class=\"h-lv6\">一　「２００４年民間居住プロジェクト土地開発規則」に基づき承認された開発区域においては、住宅会社が発行する最終引渡証明書（Possession certificate）及び、適用がある場合、敷地統合承諾書</h6>\n<h6 class=\"h-lv6\">二　「２００４年民間居住プロジェクト土地開発規則」に基づく公共施設を明記したＰＤＦ形式の配置図（Layout plan）</h6>\n<h6 class=\"h-lv6\">三　コンセプトプランを含む計画報告書</h6>\n<h6 class=\"h-lv6\">四　縮尺１：１９８０による敷地案内図</h6>\n<h6 class=\"h-lv6\">五　将来推計人口に基づく都市計画、周辺環境、既存交通網との接続性、並びに政策及び諸規定との整合性に関し、都市計画家（Planner）が作成及び署名した計画報告書</h6>\n<h6 class=\"h-lv6\">六　適用がある場合において、土地所有権に関する郡知事（District Collector / DC）の無異議証明書（NOC）</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৪। পরিকল্পনা অনুমোদনপত্রের আবেদন।</strong></h5>\n<h6 class=\"h-lv6\">(১) নির্মাণ অনুমোদনপত্রের আবেদন দাখিলের পূর্বে কর্তৃপক্ষের আওতাভুক্ত যেকোনো ভূমিতে ইমারত নির্মাণের ক্ষেত্রে, কর্তৃপক্ষের নিকট হইতে পরিকল্পনা অনুমোদন গ্রহণের জন্য আবেদন করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(২) উপ-বিধি (১) এ উল্লিখিত আবেদনের সহিত নিম্নবর্ণিত কাগজাদি দাখিল করিতে হইবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) আবেদনকারী ও, ক্ষেত্রমত, প্রস্তাবিত উন্নয়ন কাজে ব্যবহৃত ভূমি বা ভবনের মালিকের জাতীয় পরিচয়পত্র, হালনাগাদ ভূমি উন্নয়ন কর, দলিল, সর্বশেষ নামজারি খতিয়ান ও প্রযোজ্য ক্ষেত্রে, অন্যান্য কাগজপত্রের মূল কপির স্ক্যান কপি;</h6>\n<h6 class=\"h-lv6\">(খ) পরিশিষ্ট ৪ অনুযায়ী ফি পরিশোধের প্রমাণ পত্র;</h6>\n<h6 class=\"h-lv6\">(গ) উপযুক্ত স্কেলের (যেমন- ১:১৯৮০, ১:৭৯২) ন্যূনতম ৪ (চার) টি কো-অর্ডিনেট মানসহ ডিজিটাল সার্ভে (পরিমাপযোগ্য ফরম্যাটে ড্রইং, pdf, jpeg) এবং জমি ও সংলগ্ন রাস্তার স্থিরচিত্র (jpeg format);</h6>\n<h6 class=\"h-lv6\">(ঘ) আবেদনকারীর প্রতিনিধি কর্তৃক আবেদন দাখিলের ক্ষেত্রে প্রতিনিধি নিয়োগ সংক্রান্ত প্রত্যয়নপত্র।</h6>\n<h6 class=\"h-lv6\">(৩) উপ-বিধি (২) এ উল্লিখিত কাগজাদি ছাড়াও বিশেষ ক্ষেত্রে, যেমন:- ৫ একরের অধিক পরিমাণের ভূমিতে এপার্টメント কমপ্লেক্স বা রিয়েল এস্টেট উন্নয়ন প্রকল্প, ব্লকভিত্তিক উন্নয়ন, বিশেষ ইমারত, ইত্যাদি নিম্নবর্ণিত কাগজাদি দাখিল করিতে হইবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) বেসরকারী আবাসিক প্রকল্পের ভূমি উন্নয়ন বিধিমালা, ২০০৪ অনুসারে অনুমোদিত বেসরকারি আবাসিক প্রকল্প এলাকার ক্ষেত্রে সংশ্লিষ্ট হাউজিং কোম্পানি কর্তৃক প্রদত্ত চূড়ান্ত পজেশন সার্টিফিকেট এবং, প্রযোজ্য ক্ষেত্রে, প্লট একত্রীকরণ পত্র;</h6>\n<h6 class=\"h-lv6\">(খ) বেসরকারী আবাসিক প্রকল্পের ভূমি উন্নয়ন বিধিমালা, ২০০৪ অনুযায়ী নাগরিক সুবিধা সংবলিত Pdf ফরম্যাটে লে-আউট প্ল্যান;</h6>\n<h6 class=\"h-lv6\">(গ) কনসেপ্ট প্ল্যান সংবলিত পরিকল্পনা প্রতিবেদন;</h6>\n<h6 class=\"h-lv6\">(ঘ) ১:১৯৮০ স্কেলে সাইট প্ল্যান;</h6>\n<h6 class=\"h-lv6\">(ঙ) প্রক্ষেপিত জনসংখ্যার আলোকে নগর পরিকল্পনা, পারিপার্শিক অবস্থা, প্রস্তাবিত প্রকল্পের সহিত বিদ্যমান যোগাযোগ ব্যবস্থা, পলিসি ও অন্যান্য বিধি বিধানের আলোকে সামঞ্জস্যতা, ইত্যাদি বিষয়াদি সংক্রান্ত পরিকল্পনাবিদ কর্তৃক প্রস্তুত ও স্বাক্ষরিত পরিকল্পনা প্রতিবেদন;</h6>\n<h6 class=\"h-lv6\">(চ) প্রযোজ্য ক্ষেত্রে, জমির মালিকানার বিষয়ে জেলা প্রশাসকের অনাপত্তিপত্র;</h6>\n<hr class=\"sep\">"},{"num":"13423","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第４条（計画承認書の申請）（承前）</strong></h5>\n<h6 class=\"h-lv6\">３（承前）</h6>\n<h6 class=\"h-lv6\">ｇ　適用がある場合において、民間航空局、関連する市公社（City Corporation）若しくはその他の地方政府当局、道路・高速道路局、バングラデシュ内陸水運局（BIWTA）、公務員局（PWD）、国家住宅公社（NHA）又はその他の関連機関若しくは省庁の無異議証明書（NOC）。</h6>\n<h6 class=\"h-lv6\">ｈ　適用がある場合において、環境影響調査報告書並びに環境局の無異議証明書及び立地許可書。</h6>\n<h6 class=\"h-lv6\">ｉ　適用がある場合において、交通量調査報告書等及びダッカ交通調整局の無異議証明書。</h6>\n<h6 class=\"h-lv6\">ｊ　適用がある場合において、ダッカ交通調整局から承認された交通影響評価（TIA）及び交通循環許可書。</h6>\n<h6 class=\"h-lv6\">ｋ　適用がある場合において、重要拠点（KPI）又は遺産（Heritage）に関する事項に係る関連省庁、部門又は機関の無異議証明書。</h6>\n<h6 class=\"h-lv6\">４　第１項の規定による申請を受けた後、所管行政庁（Authority）により計画・開発された「サイト・アンド・サービス」プロジェクト区域内の敷地については、首都開発庁（RAJUK）又は国家住宅公社の地所・土地部門から、土地の所有権及び承認されたレイアウトに関する無異議証明書を取得しなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第５条（計画承認の一般条件）</strong></h5>\n<h6 class=\"h-lv6\">１　あらゆる用途（Occupancy Type）の建築物の計画承認において、別表５に定める最小容積率（FAR）指標を考慮する場合、当該最小容積率に関しては、<strong>現存する道路の幅員</strong>のみを考慮するものとする。</h6>\n<h6 class=\"h-lv6\">２　特殊建築物（Special Building）の建築承認において、建築審査委員会（Building Construction Committee）は、所管行政庁が計画承認書において課した条件に加え、追加の条件を課すことができる。ただし、当該条件は所管行政庁が課した条件の妨げとなるものであってはならない。</h6>\n<h6 class=\"h-lv6\">ただし、建築審査委員会が課す条件により、所管行政庁が計画承認書において課した条件を撤廃してはならない。</h6>\n<h5 class=\"h-lv5\"><strong>第６条（計画承認申請の承認、却下及び取消し）</strong></h5>\n<h6 class=\"h-lv6\">１　計画承認書の申請が提出されたときは、関連法令、本規則及び都市計画（Master Plan）に基づき、必要に応じて条件を付した上で、提出の日から<strong>３０執務日</strong>以内に承認又は却下の決定をしなければならない。</h6>\n<h6 class=\"h-lv6\">ただし、５エーカーを超える敷地におけるアパートメント・コンプレックス若しくは不動産開発事業、街区単位の開発又は特殊建築物に係る計画承認申請の処理期間は、<strong>４５執務日</strong>以内とする。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৪। পরিকল্পনা অনুমোদনপত্রের আবেদন (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(৩) (চলমান)</h6>\n<h6 class=\"h-lv6\">(ছ) প্রযোজ্য ক্ষেত্রে, বেসরকারি বিমান চলাচল কর্তৃপক্ষ, সংশ্লিষ্ট সিটি কর্পোরেশন বা অন্য কোনো স্থানীয় সরকার কর্তৃপক্ষ, সড়ক ও জনপথ অধিদপ্তর, বাংলাদেশ অভ্যন্তরীণ নৌ-পরিবহন কর্তৃপক্ষ, গণপূর্ত অধিদপ্তর, জাতীয় গৃহায়ন কর্তৃপক্ষ অথবা অন্য কোনো সংশ্লিষ্ট সংস্থা বা মন্ত্রণালয়ের অনাপত্তি পত্র;</h6>\n<h6 class=\"h-lv6\">(জ) প্রযোজ্য ক্ষেত্রে, পরিবেশগত সমীক্ষা প্রতিবেদন এবং পরিবেশ অধিদপ্তরের অনাপত্তিপত্র ও অবস্থানগত ছাড়পত্র;</h6>\n<h6 class=\"h-lv6\">(ঝ) প্রযোজ্য ক্ষেত্রে, ট্রাফিক সমীক্ষা প্রতিবেদন, ইত্যাদি এবং ঢাকা পরিবহন সমন্বয় কর্তৃপক্ষের অনাপত্তিপত্র;</h6>\n<h6 class=\"h-lv6\">(ঞ) প্রযোজ্য ক্ষেত্রে, ঢাকা পরিবহন সমন্বয় কর্তৃপক্ষ হইতে অনুমোদিত Traffic Impact Assessment (TIA) ও Traffic Circulation ছাড়পত্র; এবং</h6>\n<h6 class=\"h-lv6\">(ট) প্রযোজ্য ক্ষেত্রে, Key Point Installation (কেপিআই) বা হেরিটেজ সংক্রান্ত বিষয়ে সংশ্লিষ্ট মন্ত্রণালয়, বিভাগ বা প্রতিষ্ঠানের অনাপত্তিপত্র।</h6>\n<h6 class=\"h-lv6\">(৪) উপ-বিধি (১) এর অধীন আবেদন প্রাপ্তির পর কর্তৃপক্ষ কর্তৃক পরিকল্পিত ও উন্নয়নকৃত সাইট অ্যান্ড সার্ভিসেস প্রকল্প এলাকার প্লটের ক্ষেত্রে রাজউক বা জাতীয় গৃহায়ন কর্তৃপক্ষের এস্টেট ও ভূমি শাখা হইতে জমির মালিকানা ও অনুমোদিত লে-আউেটর বিষয়ে অনাপত্তি গ্রহণ করিতে হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>৫। পরিকল্পনা অনুমোদনের সাধারণ শর্তাবলি।</strong></h5>\n<h6 class=\"h-lv6\">(১) যেকোনো অকুপেন্সি টাইপের ইমারতের পরিকল্পনা অনুমোদনের নিমিত্ত উক্ত অকুপেন্সি টাইপের জন্য সারণি-৫ এ উল্লিখিত ন্যূনতম FAR বিবেচনার ক্ষেত্রে উক্ত ন্যূনতম FAR সূচক সাপেক্ষে, কেবল বিদ্যমান রাস্তার প্রশস্ততা বিবেচ্য হইবে।</h6>\n<h6 class=\"h-lv6\">(২) বিশেষ ইমারত নির্মাণ অনুমোদনের ক্ষেত্রে ইমারত নির্মাণ কমিটি, কর্তৃপক্ষ কর্তৃক পরিকল্পনা অনুমোদনপত্রে আরোপিত শর্তের অতিরিক্ত শর্ত আরোপ করিতে পারিবে, যাহা কর্তৃপক্ষ কর্তৃক আরোপিত শর্তের প্রতিবন্ধক হইবে না:</h6>\n<p>####### <strong>তবে শর্ত থাকে যে,</strong> ইমারত নির্মাণ কমিটি কর্তৃক আরোপিত শর্তের মাধ্যমে কর্তৃপক্ষ কর্তৃক পরিকল্পনা অনুমোদনপত্রে আরোপিত কোনো শর্ত অপসারণ করা যাইবে না।</p>\n<h5 class=\"h-lv5\"><strong>৬। পরিকল্পনা অনুমোদনের আবেদন অনুমোদন, প্রত্যাখ্যান ও বাতিল।</strong></h5>\n<h6 class=\"h-lv6\">(১) পরিকল্পনা অনুমোদনপত্রের আবেদন দাখিলের ৩০ (ত্রিশ) কার্যদিবসের মধ্যে সংশ্লিষ্ট আইন, বিধিমালা ও মহাপরিকল্পনার ভিত্তিতে আবেদন, প্রয়োজনে যেকোনো শর্ত সাপেক্ষে, অনুমোদন বা প্রত্যাখ্যানের মাধ্যমে নিষ্পত্তি করা হইবে:</h6>\n<p>####### <strong>তবে শর্ত থাকে যে,</strong> ৫ (পাঁচ) একরের অধিক পরিমাণের ভূমিতে এপার্টメント কমপ্লেক্স বা রিয়েল এস্টেট উন্নয়ন প্রকল্প, ব্লকভিত্তিক উন্নয়ন ও বিশেষ ইমারতের ক্ষেত্রে পরিকল্পনা অনুমোদনের আবেদন নিষ্পত্তির সময়সীমা হইবে ৪৫ (পঁয়তাল্লিশ) কার্যদিবস।</p>\n<hr class=\"sep\">"},{"num":"13424","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第６条（計画承認申請の承認、却下及び取消し）（承前）</strong></h5>\n<h6 class=\"h-lv6\">２　計画承認（Planning Permit）の申請は、所管行政庁（Authority）の都市計画部門の副都市計画家の段階において処理されるものとする。ただし、５エーカーを超える敷地におけるアパートメント・コンプレックス若しくは不動産開発事業、街区単位の開発又は特殊建築物（Special Building）に係る申請にあっては、所管行政庁の都市計画家又は主任都市計画家の承認を得て処理しなければならない。</h6>\n<h6 class=\"h-lv6\">３　計画承認の申請が承認されたときは、申請者に対し計画承認書を発行しなければならない。</h6>\n<h6 class=\"h-lv6\">４　所管行政庁は、計画承認の申請に対し、必要があると認めるときは、合理的な条件を付して承認し、又はこれを却下することができる。</h6>\n<h6 class=\"h-lv6\">５　申請書類に不足がある場合又は追加の情報を必要とする場合は、所管行政庁は申請者にその旨を通知しなければならない。当該通知から３０日を経過しても情報提供又は回答がないときは、当該申請を却下することができる。</h6>\n<h6 class=\"h-lv6\">６　申請者が、都市計画（Master Plan）に定められた土地利用の目的以外の目的で申請を行ったときは、当該申請を却下することができる。</h6>\n<h6 class=\"h-lv6\">７　計画承認は、開発又は工事の許可とみなしてはならず、また、申請者に工事の着手又は実施の権利を付与するものではない。</h6>\n<h6 class=\"h-lv6\">８　計画承認書の条件に違反した場合又は所有権に関する虚偽の情報が提供された場合は、計画承認を取り消さなければならない。</h6>\n<h6 class=\"h-lv6\">９　前項の規定により計画承認が取り消されたときは、所管行政庁は建築物の所有者及び関係者全員にその旨を通知しなければならない。</h6>\n<h6 class=\"h-lv6\">１０　計画承認が取り消されたときは、直ちに確認済証（Construction Permit）及び居住又は使用許可証（Occupancy Certificate）を取り消すものとし、所管行政庁は関係者全員にその旨を通知しなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第７条（計画承認の却下に対する不服申立て）</strong></h5>\n<h6 class=\"h-lv6\">１　計画承認の申請が却下された場合、申請者は、当該却下の通知を受けた日から３０日以内に、付録４に定める手数料を納付した上で、所管行政庁の会長（Chairman）に対し不服申立て（Appeal）をすることができる。</h6>\n<h6 class=\"h-lv6\">２　前項の規定による服申立てを受理したときは、会長は受理した日から３０日以内に当該申立てに関する決定を行わなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৬। পরিকল্পনা অনুমোদনের আবেদন অনুমোদন, প্রত্যাখ্যান ও বাতিল (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(২) পরিকল্পনা অনুমোদনপত্রের আবেদন, কর্তৃপক্ষের নগর পরিকল্পনার শাখার উপনগর পরিকল্পনাবিদ পর্যায়ে নিষ্পত্তি হইবে:</h6>\n<p>####### <strong>তবে শর্ত থাকে যে,</strong> ৫ (পাঁচ) একরের অধিক পরিমাণের ভূমিতে এপার্টメント কমপ্লেক্স বা রিয়েল এস্টেট উন্নয়ন প্রকল্প, ব্লকভিত্তিক উন্নয়ন ও বিশেষ ইমারতের ক্ষেত্রে কর্তৃপক্ষের নগর পরিকল্পনাবিদ বা প্রধান নগর পরিকল্পনাবিদের অনুমোদনক্রমে, নিষ্পত্তি করিতে হইবে।</p>\n<h6 class=\"h-lv6\">(৩) পরিকল্পনা অনুমোদনের আবেদন অনুমোদিত হইলে আবেদনকারীর অনুকূলে পরিকল্পনা অনুমোদনপত্র ইস্যু করা হইবে।</h6>\n<h6 class=\"h-lv6\">(৪) কর্তৃপক্ষ পরিকল্পনা
