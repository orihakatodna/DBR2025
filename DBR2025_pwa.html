連する市公社（City Corporation）の最高経営責任者（CEO）</h6>\n<h6 class=\"h-lv6\">八　都市計画局（UDD）局長</h6>\n<h6 class=\"h-lv6\">九　バングラデシュ建築士協会（IAB）会長</h6>\n<h6 class=\"h-lv6\">十　バングラデシュ都市計画家協会（BIP）会長</h6>\n<h6 class=\"h-lv6\">十一　バングラデシュ技術者協会（IEB）会長</h6>\n<h6 class=\"h-lv6\">十二　バングラデシュ・ディプロマ技術者協会（IDEB）会長</h6>\n<h6 class=\"h-lv6\">十三　政府が指名する大学教授４名（環境、建築、都市計画、土木の各専門分野から各１名）</h6>\n<h6 class=\"h-lv6\">十四　政府が指名する市民社会の代表者３名、及び法律の制定・解釈に精通した政府当局者１名</h6>\n<h6 class=\"h-lv6\">十五　ダッカ交通調整局（DTCA）執行局長</h6>\n<h6 class=\"h-lv6\">十六　消防・民間防衛局長官</h6>\n<h6 class=\"h-lv6\">十七　首都開発庁（RAJUK）主任技師（プロジェクト・実施担当）</h6>\n<h6 class=\"h-lv6\">十八　首都開発庁（RAJUK）主任都市計画家（事務局長を兼ねる）</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৩১। আপিল কমিটি গঠন (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(২) আপিল কমিটি, প্রয়োজনে, যেকোনো বিশেষজ্ঞ বা পেশাজীবী ব্যক্তি অথবা প্রতিষ্ঠানের পরামর্শ গ্রহণ করিতে পারিবে।</h6>\n<h6 class=\"h-lv6\">(৩) ইমারত নির্মাণ কমিটির কোনো সদস্যকে আপিল কমিটির সদস্য পদে মনোনীত করা যাইবে না।</h6>\n<h5 class=\"h-lv5\"><strong>৩২। নগর উন্নয়ন কমিটি।</strong></h5>\n<h6 class=\"h-lv6\">(১) নগর উন্নয়ন কমিটি নিম্নবর্ণিত সদস্য সমন্বয়ে গঠিত হইবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) সচিব, গৃহায়ন ও গণপূর্ত মন্ত্রণালয়, যিনি উহার সভাপতিও হইবেন;</h6>\n<h6 class=\"h-lv6\">(খ) চেয়ারম্যান, রাজধানী উন্নয়ন কর্তৃপক্ষ;</h6>\n<h6 class=\"h-lv6\">(গ) চেয়ারম্যান, জাতীয় গৃহায়ন কর্তৃপক্ষ;</h6>\n<h6 class=\"h-lv6\">(ঘ) বিভাগীয় কমিশনার, ঢাকা;</h6>\n<h6 class=\"h-lv6\">(ঙ) প্রধান প্রকৌশলী, গণপূর্ত অধিদপ্তর;</h6>\n<h6 class=\"h-lv6\">(চ) প্রধান স্থপতি, স্থাপত্য অধিদপ্তর;</h6>\n<h6 class=\"h-lv6\">(ছ) সংশ্লিষ্ট সিটি কর্পোরেশনের প্রধান নির্বাহী কর্মকর্তা;</h6>\n<h6 class=\"h-lv6\">(জ) পরিচালক, নগর উন্নয়ন অধিদপ্তর;</h6>\n<h6 class=\"h-lv6\">(ঝ) সভাপতি, ইনস্টিটিউট অব আর্কিটেক্টস বাংলাদেশ;</h6>\n<h6 class=\"h-lv6\">(ঞ) সভাপতি, বাংলাদেশ ইনস্টিটিউট অব প্ল্যানার্স;</h6>\n<h6 class=\"h-lv6\">(ট) সভাপতি, ইনস্টিটিউশন অব ইঞ্জিনিয়ার্স, বাংলাদেশ;</h6>\n<h6 class=\"h-lv6\">(ঠ) সভাপতি, ইনস্টিটিউশন অব ডিপ্লোমা ইঞ্জিনিয়ার্স, বাংলাদেশ;</h6>\n<h6 class=\"h-lv6\">(ড) সরকার কর্তৃক মনোনীত বিশ্ববিদ্যালয়ের ৪ (চার) জন অধ্যাপক যাহাদের মধ্যে ১ (এক) জন পরিবেশ বিষয়ক, ১ (এক) জন স্থাপত্য বিষয়ক, ১ (এক) জন পরিকল্পনা বিষয়ক ও ১ (এক) পুর-প্রকৌশল বিষয়ক হইবেন;</h6>\n<h6 class=\"h-lv6\">(ঢ) সরকার কর্তৃক মনোনীত সুশীল সমাজের ৩ (তিন) জন প্রতিনিধি এবং আইন প্রণয়ন ও ব্যাখ্যা প্রদান সংশ্লিষ্ট কাজে অভিজ্ঞতাসম্পন্ন সরকারের ১ (এক) জন কর্মকর্তা;</h6>\n<h6 class=\"h-lv6\">(ণ) নির্বাহী পরিচালক, ঢাকা পরিবহন সমন্বয় কর্তৃপক্ষ;</h6>\n<h6 class=\"h-lv6\">(ত) মহাপরিচালক, ফায়ার সার্ভিস ও সিভিল ডিফেন্স অধিদপ্তর;</h6>\n<h6 class=\"h-lv6\">(থ) প্রধান প্রকৌশলী (প্রকল্প ও বাস্তবায়ন), রাজধানী উন্নয়ন কর্তৃপক্ষ; এবং</h6>\n<h6 class=\"h-lv6\">(দ) প্রধান নগর পরিকল্পনাবিদ, রাজধানী উন্নয়ন কর্তৃপক্ষ, যিনি উহার সদস্য-সচিবও হইবেন।</h6>\n<hr class=\"sep\">"},{"num":"13445","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第３２条（都市開発委員会の構成）（承前）</strong></h5>\n<h6 class=\"h-lv6\">２　第１項第１２号及び第１３号に掲げる委員の任期は、指名の日から２年とする。</h6>\n<h6 class=\"h-lv6\">３　都市開発委員会（Urban Development Committee）は、必要があると認めるときは、専門家、実務家又は機関の助言を求めることができる。</h6>\n<h6 class=\"h-lv6\">４　建築物の建築承認業務に直接従事する者は、都市開発委員会の委員に指名されることはできない。</h6>\n<h5 class=\"h-lv5\"><strong>第３３条（都市開発委員会の職務）</strong></h5>\n<h6 class=\"h-lv6\">都市開発委員会の職務は、次に掲げる通りとする。</h6>\n<h6 class=\"h-lv6\">一　所管区域内の全ての計画、開発及び開発規制に係る政策及び将来の枠組みに関する勧告を行うこと。</h6>\n<h6 class=\"h-lv6\">二　本規則において解決できない事項について、実効性のある指針の提示及び決定を行うこと。</h6>\n<h6 class=\"h-lv6\">三　所管行政庁から事項の解釈又は分析に係る書面による要請を受けた場合において、必要に応じて関連する実務家又は専門家との協議及び助言に基づき、必要な指針を提示すること。</h6>\n<h6 class=\"h-lv6\">四　ダッカ首都圏のインフラ開発活動の調整、計画策定、交通体系の開発、規制及び実施を包括的に支援すること。</h6>\n<h6 class=\"h-lv6\">五　本規則の目的を達成するため、公正かつ平等の原則に基づき、必要なその他の指針を提示すること。</h6>\n<h5 class=\"h-lv5\"><strong>第３４条（都市開発委員会の会議）</strong></h5>\n<h6 class=\"h-lv6\">１　都市開発委員会は、必要があると認めるときは、毎月少なくとも１回会議を開催するものとする。</h6>\n<h6 class=\"h-lv6\">２　会議の成立（クォーラム）には、委員総数の３分の２以上の出席を必要とする。</h6>\n<h6 class=\"h-lv6\">３　会議に出席した委員は、各々１個の議決権を有する。</h6>\n<h6 class=\"h-lv6\">４　会議の議事は、出席委員の過半数をもって決する。ただし、可否同数のときは、委員長が決するところによる。</h6>\n<h5 class=\"h-lv5\"><strong>第３５条（都市開発委員会による小委員会の設置等）</strong></h5>\n<h6 class=\"h-lv6\">１　都市開発委員会は、その職務を円滑に遂行し、関連する勧告を行うため、一又は複数の小委員会を設置することができる。</h6>\n<h6 class=\"h-lv6\">２　前項の小委員会には、必要があると認めるときは、政府職員、専門家又は実務家を構成員として含めることができる。</h6>\n<h6 class=\"h-lv6\">３　都市開発委員会は、小委員会の勧告の全部又は一部を採択し、又は棄却することができる。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৩২। নগর উন্নয়ন কমিটি (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(২) উপ-বিধি (১) এর দফা (ঠ) ও (ড)-তে উল্লিখিত সদস্যগণের মেয়াদ হইবে মনোনয়নের তারিখ হইতে ২ (দুই) বৎসর।</h6>\n<h6 class=\"h-lv6\">(৩) নগর উন্নয়ন কমিটি, প্রয়োজনে, যেকোনো বিশেষজ্ঞ বা পেশাজীবী ব্যক্তি অথবা প্রতিষ্ঠানের পরামর্শ গ্রহণ করিতে পারিবে।</h6>\n<h6 class=\"h-lv6\">(৪) ইমারত নির্মাণ অনুমোদন সংশ্লিষ্ট কোনো ব্যক্তিকে নগর উন্নয়ন কমিটির সদস্য পদে মনোনীত করা যাইবে না।</h6>\n<h5 class=\"h-lv5\"><strong>৩৩। নগর উন্নয়ন কমিটির কার্যাবলি।</strong></h5>\n<h6 class=\"h-lv6\">নগর উন্নয়ন কমিটির কার্যাবলি নিম্নরূপ হইবে, যথা:---</h6>\n<h6 class=\"h-lv6\">(ক) কর্তৃপক্ষের আওতাভুক্ত এলাকার সকল পরিকল্পনা, উন্নয়ন এবং উন্নয়ন নিয়ন্ত্রণ কাজের জন্য নীতি ও ভবিষ্যৎ রূপরেখা বিষয়ে সুপারিশ করা;</h6>\n<h6 class=\"h-lv6\">(খ) এই বিধিমালার আওতায় নিষ্পত্তিযোগ্য নহে এইরূপ কোনো বিষয়ে কার্যকর দিক-নির্দেশনা ও সিদ্ধান্ত প্রদান করা;</h6>\n<h6 class=\"h-lv6\">(গ) কর্তৃপক্ষের নিকট হইতে কোনো বিষয়ে ব্যাখ্যা বা বিশ্লেষণের জন্য লিখিত অনুরোধ প্রাপ্ত হইলে, প্রয়োজনে, সংশ্লিষ্ট পেশাজীবী বা বিশেষজ্ঞের সহিত আলোচনা ও পরামর্শের ভিত্তিতে প্রয়োজনীয় নির্দেশনা প্রদান করা;</h6>\n<h6 class=\"h-lv6\">(ঘ) ঢাকা মহানগরীর অবকাঠামো উন্নয়ন কার্যক্রম সমন্বয়, পরিকল্পনা প্রণয়ন, পরিবহন ব্যবস্থা উন্নয়ন, নিয়ন্ত্রণ ও বাস্তবায়নে সার্বিক সহায়তা করা; এবং</h6>\n<h6 class=\"h-lv6\">(ঙ) এই বিধিমালার উদ্দেশ্যপূরণকল্পে, ন্যায় ও সমতা বিধানকল্পে প্রয়োজনীয় অন্যান্য নির্দেশনা প্রদান করা।</h6>\n<h5 class=\"h-lv5\"><strong>৩৪। নগর উন্নয়ন কমিটির সভা।</strong></h5>\n<h6 class=\"h-lv6\">(১) নগর উন্নয়ন কমিটি, প্রয়োজনে, প্রতিমাসে অন্যূন একবার সভায় মিলিত হইবে।</h6>\n<h6 class=\"h-lv6\">(২) নগর উন্নয়ন কমিটির যেকোনো সভায় কোরামের জন্য অন্যূন দুই তৃতীয়াংশ সদস্যের উপস্থিতির প্রয়োজন হইবে।</h6>\n<h6 class=\"h-lv6\">(৩) সভায় উপস্থিত নগর উন্নয়ন কমিটির প্রত্যেক সদস্যের একটি করিয়া ভোটাধিকার থাকিবে।</h6>\n<h6 class=\"h-lv6\">(৪) সভার যেকোনো সিদ্ধান্ত সভায় উপস্থিত সদস্যদের সংখ্যাগরিষ্ট ভোটে গৃহীত হইবে, তবে ভোটের সমতার ক্ষেত্রে সভাপতি দ্বিতীয় বা নির্ণায়ক ভোট প্রদান করিতে পারিবে।</h6>\n<h5 class=\"h-lv5\"><strong>৩৫। নগর উন্নয়ন কমিটি কর্তৃক উপ-কমিটি গঠন, ইত্যাদি।</strong></h5>\n<h6 class=\"h-lv6\">(১) নগর উন্নয়ন কমিটি উহার কার্যাবলি সুষ্ঠুভাবে সম্পাদনের জন্য এবং এতদ্‌সংক্রান্ত সুপারিশ প্রদানের এক বা একাধিক উপ-কমিটি গঠন করিতে পারিবে।</h6>\n<h6 class=\"h-lv6\">(২) উপ-বিধি (১) এ উল্লিখিত যেকোনো উপ-কমিটিতে, প্রয়োজনে, সরকারি কর্মকর্তা, বিশেষজ্ঞ বা পেশাজীবী কোনো ব্যক্তিকে অন্তর্ভুক্ত করা যাইবে।</h6>\n<h6 class=\"h-lv6\">(৩) নগর উন্নয়ন কমিটি উপ-কমিটির যেকোনো সুপারিশ সম্পূর্ণ বা আংশিকভাবে গ্রহণ অথবা অগ্রাহ্য করিতে পারিবে।</h6>\n<hr class=\"sep\">"},{"num":"13446","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h3 class=\"h-lv3\">第４章 [Chapter IV]</h3>\n<h4 class=\"h-lv4\">技術者のリスト、分類等 [List and Classification of Engineers]</h4>\n<h5 class=\"h-lv5\"><strong>第３６条（技術者等）</strong></h5>\n<h6 class=\"h-lv6\">１　本規則の目的を達成するため、次に掲げる専門職団体の登録会員は、技術者（Technical person）となる資格を有するものとする。</h6>\n<div class=\"table-wrap\"><table><thead><tr><th>項番</th><th>専門職団体の名称</th><th>登録可能な技術者の職種</th></tr></thead><tbody><tr><td>１</td><td>バングラデシュ技術者協会 (IEB)</td><td>技術者（エンジニア）</td></tr><tr><td>２</td><td>バングラデシュ建築士協会 (IAB)</td><td>建築士（アーキテクト）</td></tr><tr><td>３</td><td>バングラデシュ都市計画家協会 (BIP)</td><td>都市計画家（プランナー）</td></tr><tr><td>４</td><td>バングラデシュ・ディプロマ技術者協会 (IDEB)</td><td>ディプロマ技術者、ディプロマ建築士</td></tr></tbody></table></div>\n<h6 class=\"h-lv6\">２　申請者は、プロジェクトの開始時に技術者と契約を締結しなければならず、当該技術者は自ら署名した設計図書を提出しなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第３７条（専門職団体の責任等）</strong></h5>\n<h6 class=\"h-lv6\">１　関連する専門職団体は、技術者の業務及びサービスの質、並びに職業上の誠実性及び専門能力を確保する責任を負うものとし、当該技術者の登録に関する一切の情報及び、該当がある場合においては、当該技術者に対して講じられた懲戒処分について、随時、所管行政庁に通知しなければならない。</h6>\n<h6 class=\"h-lv6\">２　技術者が本規則の規定に違反したときは、所管行政庁は、当該技術者の会員資格の取消しを求めて、関連する専門職団体に通知するものとする。</h6>\n<h6 class=\"h-lv6\">３　第３６条の規定によりリスト化された技術者以外の者は、建築物の建築のための設計の策定及び署名、建築工事の検査及び監理、報告書の作成、並びにこれらに付随するいかなる業務も行ってはならない。</h6>\n<h5 class=\"h-lv5\"><strong>第３８条（技術者の権限及び責任等）</strong></h5>\n<h6 class=\"h-lv6\">１　建築物の種類又は用途に応じ、後記表１に掲げる建築物の分類及び後記表２に掲げる技術的事項に関し、経験及び資格を有する者は、本規則に従って設計図書の策定、署名、報告書の作成及び署名を行うことができる。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h3 class=\"h-lv3\">চতুর্থ অধ্যায়</h3>\n<h4 class=\"h-lv4\">কারিগরি ব্যক্তির তালিকা, শ্রেণিবিন্যাস, ইত্যাদি</h4>\n<h5 class=\"h-lv5\"><strong>৩৬। কারিগরি ব্যক্তি, ইত্যাদি।</strong></h5>\n<h6 class=\"h-lv6\">(১) এই বিধিমালার উদ্দেশ্যপূরণকল্পে, নিম্নবর্ণিত পেশাজীবী প্রতিষ্ঠানের তালিকাভুক্ত সদস্যগণ কারিগরি ব্যক্তি হইবার যোগ্য হইবেন, যথা:---</h6>\n<div class=\"table-wrap\"><table><thead><tr><th>ক্রমিক নং</th><th>পেশাজীবী প্রতিষ্ঠানের নাম</th><th>নিবন্ধনযোগ্য কারিগরি ব্যক্তির পেশা</th></tr></thead><tbody><tr><td>(১)</td><td>(২)</td><td>(৩)</td></tr><tr><td>১।</td><td>ইঞ্জিনিয়ার্স ইনস্টিটিউশন, বাংলাদেশ</td><td>প্রকৌশলী</td></tr><tr><td>২।</td><td>ইনস্টিটিউট অব আর্কিটেক্টস, বাংলাদেশ</td><td>স্থপতি</td></tr><tr><td>৩।</td><td>বাংলাদেশ ইনস্টিটিউট অব প্ল্যানার্স</td><td>পরিকল্পনাবিদ</td></tr><tr><td>৪।</td><td>ইনস্টিটিউশন অব ডিপ্লোমা ইঞ্জিনিয়ার্স, বাংলাদেশ</td><td>ডিপ্লোমা প্রকৌশলী, ডিপ্লোমা স্থপতি</td></tr></tbody></table></div>\n<h6 class=\"h-lv6\">(২) প্রকল্পের আরম্ভেই আবেদনকারীকে কারিগরি ব্যক্তিগণের সহিত চুক্তিবদ্ধ হইতে হইবে এবং কারিগরি ব্যক্তিগণ তাহাদের স্বাক্ষরিত নকশা জমা প্রদান করিবেন।</h6>\n<h5 class=\"h-lv5\"><strong>৩৭। পেশাজীবী প্রতিষ্ঠানের দায়িত্ব, ইত্যাদি।</strong></h5>\n<h6 class=\"h-lv6\">(১) সংশ্লিষ্ট পেশাজীবী প্রতিষ্ঠান কারিগরি ব্যক্তির কাজ ও সেবার মান এবং পেশাগত সততা ও দক্ষতা নিশ্চিত করিবার দায়িত্ব পালন করিবে এবং সংশ্লিষ্ট ব্যক্তির নিবন্ধন সংক্রান্ত যাবতীয় তথ্যাদি ও তাহার বিরুদ্ধে আনীত শাস্তিমূলক ব্যবস্থার, যদি থাকে, বিষয়ে, সময় সময়, কর্তৃপক্ষকে অবহিত করিবে।</h6>\n<h6 class=\"h-lv6\">(২) কোনো কারিগরি ব্যক্তি এই বিধিমালার কোনো বিধান লঙ্ঘন করিলে কর্তৃপক্ষ সংশ্লিষ্ট কারিগরি ব্যক্তির সদস্য পদ বাতিলের নিমিত্ত সংশ্লিষ্ট পেশাজীবী প্রতিষ্ঠানকে অবহিত করিবে।</h6>\n<h6 class=\"h-lv6\">(৩) বিধি ৩৬ এর অধীন তালিকাভুক্ত কারিগরি ব্যক্তি ব্যতীত অন্য কোনো ব্যক্তি ইমারত নির্মাণের নিমিত্ত নকশা প্রণয়ন ও স্বাক্ষর প্রদান, নির্মাণ কাজ পরিদর্শন ও তদারকি, প্রতিবেদন তৈরি এবং তদসংশ্লিষ্ট কোনো কাজ করিতে পারিবে না।</h6>\n<h5 class=\"h-lv5\"><strong>৩৮। কারিগরি ব্যক্তির কর্তৃত্ব ও দায়িত্ব, ইত্যাদি।</strong></h5>\n<h6 class=\"h-lv6\">(১) ইমারতের ধরন বা ব্যবহার অনুসারে নিম্নবর্ণিত ছক ১ এ উল্লিখিত ইমারতের শ্রেণি এবং নিম্নবর্ণিত ছক ২ এ উল্লিখিত কারিগরি বিষয়ে অভিজ্ঞতা ও যোগ্যতাসম্পন্ন ব্যক্তি এই বিধিমালা অনুযায়ী নকশা প্রণয়ন ও স্বাক্ষর প্রদান, প্রতিবেদন তৈরি ও স্বাক্ষর করিতে পারিবে, যথা:—</h6>\n<hr class=\"sep\">"},{"num":"13447","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第３８条（技術者の権限及び責任等）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>表１</strong></h6>\n<p><strong>建築物の高さ、床面積及び用途に基づく建築物の分類</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>建築物分類</th><th>建築物の高さ</th><th>床面積</th><th>用途分類</th></tr></thead><tbody><tr><td><strong>第 I 種</strong></td><td>２階建以下又は高さ８ｍ以下（地階を除く）</td><td>２５０㎡以下</td><td>居住用 A (A1-A2)</td></tr><tr><td><strong>第 II 種</strong></td><td>５階建以下（地階の有無を問わない）</td><td>１０００㎡以下</td><td>居住用 A (A1-A5) 及び A6</td></tr><tr><td><strong>第 III 種</strong></td><td>１０階建以下又は高さ３３ｍ以下（地階の有無を問わない）</td><td>７５００㎡以下</td><td>用途 A, B, C, E1, E2, F1, F2 及び H1</td></tr><tr><td><strong>第 IV 種</strong></td><td>地階の有無を問わず制限なし</td><td>制限なし</td><td>全ての用途</td></tr></tbody></table></div>\n<h6 class=\"h-lv6\"><strong>表２</strong></h6>\n<p><strong>設計、図面、報告書及び書類に署名する資格を有する登録技術者</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>項番</th><th>業務の種類</th><th>登録技術者の職種</th><th>建築物の分類に基づく最低必要経験年数（年）</th><th></th><th></th><th></th></tr></ ></tr><tr><td>৫।</td><td>কাঠামোগত নকশা</td><td>পুর প্রকৌশলী যাহার কাঠামোগত নকশা করিবার অভিজ্ঞতা অথবা Professional Engineer (পিইঞ্জ) সনদ রহিয়াছে</td><td>আবশ্যক নহে</td><td>২</td><td>৪</td><td>৮ (কাঠামোগত নকশা করিবার ক্ষেত্রে ৫ বৎসরের অভিজ্ঞতা)</td></tr><tr><td></td><td></td><td>পুরপ্রকৌশলী যাহার কাঠামোগত নকশায় স্নাতকোত্তর সনদ রহিয়াছে</td><td>আবশ্যক নহে</td><td>১</td><td>৩</td><td>৮ (কাঠামোগত নকশা করিবার ৪ বৎসরের অভিজ্ঞতা)</td></tr></tbody></table></div>\n<hr class=\"sep\">"},{"num":"13449","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第３８条（技術者の権限及び責任等）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>表２（続き）</strong></h6>\n<div class=\"table-wrap\"><table><thead><tr><th>項番</th><th>業務の種類</th><th>登録技術者の職種</th><th>建築物の分類に基づく最低必要経験年数（年）</th><th></th><th></th><th></th></tr></thead><tbody><tr><td></td><td></td><td></td><td>第 I 種</td><td>第 II 種</td><td>第 III 種</td><td>第 IV 種</td></tr><tr><td><strong>６</strong></td><td><strong>給排水設備設計</strong></td><td>給排水技術者</td><td>不要</td><td>不要</td><td>４</td><td>８</td></tr><tr><td></td><td></td><td>建築士 (Architect)</td><td>不要</td><td>不要</td><td>不要</td><td>―</td></tr><tr><td></td><td></td><td>ディプロマ技術者 (土木)</td><td>不要</td><td>３</td><td>不要</td><td>不要</td></tr><tr><td><strong>７</strong></td><td><strong>機械設備設計 (HVAC/垂直動線)</strong></td><td>機械技術者</td><td>不要</td><td>２</td><td>４</td><td>８</td></tr><tr><td><strong>８</strong></td><td><strong>電気設備設計</strong></td><td>電気技術者</td><td>不要</td><td>２</td><td>４</td><td>８</td></tr><tr><td></td><td></td><td>ディプロマ技術者 (電気)</td><td>不要</td><td>３</td><td>不要</td><td>不要</td></tr><tr><td><strong>９</strong></td><td><strong>工事監理 (Supervision)</strong></td><td>建築士、技術者又は PEng</td><td>不要</td><td>２</td><td>４</td><td>８</td></tr><tr><td></td><td></td><td>ディプロマ建築士/技術者</td><td>不要</td><td>２</td><td>４</td><td><strong>２０</strong>*</td></tr><tr><td><strong>10</strong></td><td><strong>建築物除却 (解体)</strong></td><td>土木・構造技術者</td><td>不要</td><td>不要</td><td>２</td><td>８</td></tr><tr><td></td><td></td><td>ディプロマ技術者 (土木)</td><td>不要</td><td>２</td><td>不要</td><td>不要</td></tr><tr><td><strong>11</strong></td><td><strong>工事完了報告書</strong></td><td>建築士及び技術者</td><td>不要</td><td>２</td><td>４</td><td>８</td></tr></tbody></table></div>\n<h6 class=\"h-lv6\"><strong>* 第 IV 種建築物については、適切な登録又はライセンスを保持する建築士若しくは技術者による連署（প্রতি স্বাক্ষরিত / Counter-signature）を要する。</strong></h6>\n<h6 class=\"h-lv6\">２　所管行政庁は、第１項に規定する者以外の者が作成した設計図書又は報告書を、承認のための審査対象としない。</h6>\n<h6 class=\"h-lv6\">３　設計を担当する技術者は、敷地の正確な位置、接道幅員、敷地面積及び寸法、並びに（該当する場合）計画報告書に記載された指示事項を確認した上で、本規則の規定に従って設計を行わなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৩৮। কারিগরি ব্যক্তির কর্তৃত্ব ও দায়িত্ব, ইত্যাদি (চলমান)</strong></h5>\n<h6 class=\"h-lv6\"><strong>ছক-২ (চলমান)</strong></h6>\n<div class=\"table-wrap\"><table><thead><tr><th>ক্রমিক নং</th><th>কাজের ধরন</th><th>নিবন্ধিত কারিগরি ব্যক্তি</th><th>ভবনের শ্রেণির ভিত্তিতে সর্বনিম্ন প্রয়োজনীয় অভিজ্ঞতা (বৎসরে)</th><th></th><th></th><th></th></tr></thead><tbody><tr><td></td><td></td><td></td><td>I</td><td>II</td><td>III</td><td>IV</td></tr><tr><td>(১)</td><td>(২)</td><td>(৩)</td><td>(৪)</td><td>(৫)</td><td>(৬)</td><td>(৭)</td></tr><tr><td>৬।</td><td>প্র্লাম্বিং নকশা</td><td>প্লাম্বিং প্রকৌশলী</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td><td>৪</td><td>৮</td></tr><tr><td></td><td></td><td>স্থপতি</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td><td>---</td></tr><tr><td></td><td></td><td>ডিপ্লোমা প্রকৌশলী (পুর)</td><td>আবশ্যক নহে</td><td>৩</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td></tr><tr><td>৭।</td><td>যান্ত্রিক নকশা (HVAC/উল্লম্ব পরিবহন)</td><td>যন্ত্র প্রকৌশলী</td><td>আবশ্যক নহে</td><td>২</td><td>৪</td><td>৮</td></tr><tr><td>৮।</td><td>বৈদ্যুতিক নকশা</td><td>তড়িৎ প্রকৌশলী</td><td>আবশ্যক নহে</td><td>২</td><td>৪</td><td>৮</td></tr><tr><td></td><td></td><td>ডিপ্লোমা প্রকৌশলী (তড়িৎ)</td><td>আবশ্যক নহে</td><td>৩</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td></tr><tr><td>৯।</td><td>নির্মাণ তদারকি</td><td>স্থপতি বা প্রকৌশলী অথবা পিইঞ্জ</td><td>আবশ্যক নহে</td><td>২</td><td>৪</td><td>৮</td></tr><tr><td></td><td></td><td>ডিপ্লোমা স্থপতি বা ডিপ্লোমা প্রকৌশলী</td><td>আবশ্যক নহে</td><td>২</td><td>৪</td><td>২০*</td></tr><tr><td>১০।</td><td>ভবন অপসারণ</td><td>পুর প্রকৌশলী</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td><td>২</td><td>৮</td></tr><tr><td></td><td></td><td>ডিপ্লোমা প্রকৌশলী (পুর)</td><td>আবশ্যক নহে</td><td>২</td><td>আবশ্যক নহে</td><td>আবশ্যক নহে</td></tr><tr><td>১১।</td><td>সমাপ্তি প্রতিবেদন</td><td>স্থপতি এবং প্রকৌশলী</td><td>আবশ্যক নহে</td><td>২</td><td>৪</td><td>৮</td></tr></tbody></table></div>\n<h6 class=\"h-lv6\"><strong>* ভবনের শ্রেণি IV এর জন্য উপযুক্ত এবং নিবন্ধিত বা লাইসেন্সধারী স্থপতি বা প্রকৌশলী দ্বারা প্রতি স্বাক্ষরিত।</strong></h6>\n<h6 class=\"h-lv6\">(২) কর্তৃপক্ষ উপ-বিধি (১) এ উল্লিখিত ব্যক্তি ব্যতীত অন্য কোনো ব্যক্তি কর্তৃক প্রস্তুতকৃত নকশা বা প্রতিবেদন অনুমোদনের জন্য বিবেচনা করিবে না।</h6>\n<h6 class=\"h-lv6\">(৩) নকশা প্রণয়নকারী কারিগরি ব্যক্তিকে প্রকল্প সাইটের সঠিক অবস্থান, সংলগ্ন রাস্তাসমূহের প্রশস্ততা, জমির পরিমাণ ও পরিমাপ এবং, প্রযোজ্য ক্ষেত্রে, পরিকল্পনা প্রতিবেদনে উল্লিখিত নির্দেশনাসমূহ নিশ্চিত হইয়া এই বিধিমালার বিধান সাপেক্ষে নকশা প্রণয়ন করিতে হইবে।</h6>\n<hr class=\"sep\">"},{"num":"13450","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第３８条（技術者の権限及び責任等）（承前）</strong></h5>\n<h6 class=\"h-lv6\">４　一の建築物の異なる段階、異なる種類の設計若しくは報告書又は建築工事に従事するチーム若しくは機関に、専門技術を有する複数の者が存在する場合、少なくともその中の一名は当該業務を行う資格を有していなければならない。この場合において、各技術者は自らが作成した設計図書に署名する権限を有する。</h6>\n<h6 class=\"h-lv6\">５　技術者はその資格に従って業務に任命されなければならない。一のプロジェクトに複数の技術者が任命された場合、建築士又は技術者は、意匠設計、構造設計その他の設計図書の実施の調整を図らなければならない。また、工事中及び完了後において、関連する建築士、技術者及び監理者は、それぞれの専門分野における設計図書及び工事完了報告書を作成しなければならない。</h6>\n<h6 class=\"h-lv6\">６　本規則の他の規定にかかわらず、技術者の資格要件の決定にあたっては、法典（Code）及び政府が随時発行するすべての指示に従わなければならない。</h6>\n<h3 class=\"h-lv3\">第５章 [Chapter V]</h3>\n<h4 class=\"h-lv4\">建築工事に関する付随事項 [Ancillary Matters Concerning Building Construction]</h4>\n<h5 class=\"h-lv5\"><strong>第３９条（道路）</strong></h5>\n<h6 class=\"h-lv6\">１　詳細地区計画（DAP）において指定された高密居住区域内に限り、現存する道路の幅員が最小 １．８０メートル 以上である場合に、住宅の建築確認申請を行うことができる。ただし、道路幅員の判定にあたっては、当該敷地の前面から、鉄道を除き、車両通行が可能な道路との接続点までの最小幅員を考慮するものとする。</h6>\n<h6 class=\"h-lv6\">２　計画承認（Planning Permit）において道路の拡幅が必要とされる場合、道路の両側に位置する敷地所有者は、次に掲げる方法により、均等に土地を供出しなければならない。</h6>\n<h6 class=\"h-lv6\">一　マスタープラン区域内において、拡幅計画が指定されていない進入道路については、当局は計画承認の交付に際し、現存する道路について公共の利益のために最大 ６メートル まで、第４７条第７項の規定に従い拡幅を提案することができる。</h6>\n<h6 class=\"h-lv6\">二　前号に掲げる道路拡幅の提案を行う場合、当局は当該道路計画に関する情報を一般の公覧に供しなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৩৮। কারিগরি ব্যক্তির কর্তৃত্ব ও দায়িত্ব, ইত্যাদি (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(৪) একটি ইমারতের বিভিন্ন স্তর, বিভিন্ন ধরনের নকশা বা প্রতিবেদন বা নির্মাণকার্যে নিয়োজিত দলগতভাবে বা কোনো প্রতিষ্ঠানের পক্ষে কর্মরত কারিগরি বিষয়ে অভিজ্ঞ একাধিক ব্যক্তি থাকিলে অন্যূন একজনের সংশ্লিষ্ট বিষয়ে কাজ করিবার যোগ্যতা থাকিতে হইবে এবং এক্ষেত্রে প্রত্যেকে স্ব স্ব নকশায় স্বাক্ষরের অধিকারী হইবেন।</h6>\n<h6 class=\"h-lv6\">(৫) সংশ্লিষ্ট কারিগরি ব্যক্তিগণকে তাহাদের যোগ্যতা অনুযায়ী কাজে নিয়োগ করিতে হইবে এবং একটি প্রকল্পে একাধিক কারিগরি ব্যক্তি নিযুক্ত করা হইলে স্থপতি বা প্রকৌশলী, প্রকল্পের স্থাপত্য নকশা, কাঠামো নকশাসহ অন্যান্য নকশা বাস্তবায়ন সমন্বয় সাধন করিবে এবং নির্মাণকালীন ও নির্মাণ শেষে সংশ্লিষ্ট স্থপতি, প্রকৌশলী ও নির্মাণ তদারককারী তাহাদের নিজ নিজ ক্ষেত্রের নির্মাণ নকশা ও সমাপ্তি প্রতিবেদন প্রণয়ন করিবেন।</h6>\n<h6 class=\"h-lv6\">(৬) এই বিধিমালার অন্যান্য বিধানে যাহা কিছুই থাকুক না কেন, কারিগরি ব্যক্তিদের যোগ্যতা নির্ধারণের ক্ষেত্রে কোড এবং সরকার কর্তৃক, সময় সময়, জারীকৃত সকল নির্দেশনা অনুসরণ করিতে হইবে।</h6>\n<h3 class=\"h-lv3\">পঞ্চম অধ্যায়</h3>\n<h4 class=\"h-lv4\">ইমারত নির্মাণ সংক্রান্ত আনুষঙ্গিক বিষয়</h4>\n<h5 class=\"h-lv5\"><strong>৩৯। রাস্তা।</strong></h5>\n<h6 class=\"h-lv6\">(১) কেবল বিশদ অঞ্চল পরিকল্পনায় চিহ্নিত ঘনবসতি এলাকায় বিদ্যমান রাস্তার প্রশস্ততা ন্যূনতম ১.৮০ (এক দশমিক আট শূন্য) মিটার হইলে আবাসিক ইমারতের নকশা অনুমোদনের জন্য আবেদন করা যাইবে, তবে রাস্তার প্রস্থ বিবেচনার জন্য প্লটের সম্মুখ হইতে, রেলপথ ব্যতীত, যানবাহন চলাচলের উপযুক্ত সড়কসমূহের সংযোগ পর্যন্ত ন্যূনতম প্রস্থ বিবেচ্য হইবে।</h6>\n<h6 class=\"h-lv6\">(২) পরিকল্পনা অনুমোদনপত্রে রাস্তা প্রশস্তকরনের জন্য, প্রযোজ্য ক্ষেত্রে, যে পরিমাণ জমি প্রয়োজন হইবে, রাস্তার উভয় দিকে অবস্থিত প্লট মালিকগণ সমপরিমাণে জমি নিম্নবর্ণিত পদ্ধতিতে ছাড়িয়া দিতে বাধ্য থাকিবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) মহাপরিকল্পনাভুক্ত এলাকার যে সকল প্রবেশ রাস্তা প্রশস্তকরণর প্রস্তাব মহাপরিকল্পনায় চিহ্নিত করা নাই, সেই সকল রাস্তা কর্তৃপক্ষ কর্তৃক পরিকল্পনা অনুমোদনপত্র প্রদানকালে পরিকল্পনা অনুমোদনকারী চলমান রাস্তার ক্ষেত্রে জনস্বার্থে ৬ (ছয়) মিটার পর্যন্ত বিধি ৪৭ এর উপ-বিধি (৭) অনুসরণক্রমে প্রশস্তকরণর প্রস্তাবনা প্রদান করিতে পারিবে;</h6>\n<h6 class=\"h-lv6\">(খ) দফা (ক) এ উল্লিখিত রাস্তা প্রশস্তকরণর ক্ষেত্রে কর্তৃপক্ষ উক্ত রাস্তার প্রস্তাবনা সংক্রান্ত তথ্য সর্বসাধারণের প্রদর্শনের জন্য উন্মুক্ত রাখিতে হইবে।</h6>\n<hr class=\"sep\">"},{"num":"13451","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第３９条（道路）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>３</strong>　道路拡幅のために土地を供出した場合、建築物の延べ面積、容積率、セットバック及び最高建蔽率の計算は、当該供出後の<strong>減歩された敷地面積</strong>に基づいて算定するものとする。</h6>\n<h6 class=\"h-lv6\"><strong>４</strong>　計画承認（Planning Permit）の指示に基づき道路拡幅に供する土地については、申請者は地方政府又は当局に対し、イজমেন্ট（地役権等）契約を通じて提供しなければならない。当該提供手続が完了する前は、建築確認の申請を行うことができず、確認審査時にその完了を確認するものとする。</h6>\n<h6 class=\"h-lv6\"><strong>５</strong>　民間事業者により開発された住宅地又は共同住宅地内の内部道路の最小幅員については、「民間居住プロジェクト土地開発規則2004」の規定を適用する。</h6>\n<p>####### <strong>ただし、</strong> 本規則の施行前に承認されたプロジェクトにおいて、その後の計画修正がないものについては、この限りでない。</p>\n<h5 class=\"h-lv5\"><strong>第４０条（角地の隅切り）</strong></h5>\n<h6 class=\"h-lv6\">全ての角地（Corner plot）においては、２メートル $\\times$ ２メートルの範囲を道路のために開放し、その境界に沿って外構壁を設置しなければならない。当該範囲は、道路以外の目的に使用してはならない。</h6>\n<h5 class=\"h-lv5\"><strong>第４１条（境界線からの壁面後退）</strong></h5>\n<h6 class=\"h-lv6\"><strong>１</strong>　建築物は、隣接する既存道路の中心線から４.５メートル、又は敷地境界線から１.５メートルのうち、<strong>いずれか大きい方の距離</strong>を超えて道路側に突き出して建築してはならない。</h6>\n<p>####### <strong>ただし、</strong> 計画承認又は詳細地区計画（DAP）に基づき将来の道路拡幅が予定されている場合は、当該拡幅予定地を除外した上で、上記の距離を算定するものとする。</p>\n<p>####### <strong>また、</strong> 袋路（Dead-end road）に面する敷地において、当該道路の長さが５０メートル以下である場合は、境界線から少なくとも１.５メートルの後退（外壁後退）距離を確保して建築することができる。</p>\n<h6 class=\"h-lv6\"><strong>２</strong>　各敷地の正面、側面及び背面の空地（セットバック）については、別表第５の規定に従い算定するものとする。この場合において、いずれか一面を「正面」として指定しなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৩৯। রাস্তা (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(৩) প্রযোজ্য সকল রাস্তা প্রশস্তকরণর জন্য জমির প্রযোজ্য অংশ হস্তান্তর করিবার পর হ্রাসকৃত প্লটের আকারের উপর ভিত্তি করিয়া প্লটের প্রয়োজনীয় সর্বমোট নির্মাণযোগ্য ক্ষেত্রফল, সেটব্যাক এবং সর্বোচ্চ ভূমি আচ্ছাদন হিসাব করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৪) পরিকল্পনা অনুমোদনপত্রের নির্দেশনা অনুযায়ী রাস্তা প্রশস্তকরণর জন্য আবেদনকারীকে প্রযোজ্য ভূমি সংশ্লিষ্ট স্থানীয় সরকার বা কর্তৃপক্ষের নিকট ইজমেন্ট দলিলের মাধ্যমে হস্তান্তর করিতে হইবে এবং হস্তান্তর প্রক্রিয়া সম্পন্ন হইবার পূর্বে ইমারত নির্মাণ অনুমোদনের আবেদন করা যাইবে না যাহা নির্মাণ অনুমোদনকালে নিশ্চিত করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৫) বেসরকারি প্রতিষ্ঠান কর্তৃক উন্নয়নকৃত হাউজিং বা অ্যাপার্টমেন্ট কমপ্লেক্স বা এলাকায় অভ্যন্তরীণ রাস্তাসমূহের ন্যূনতম প্রস্থ নির্ধারণের ক্ষেত্রে বেসরকারি আবাসিক প্রকল্পের ভূমি উন্নয়ন বিধিমালা, ২০০৪ প্রযোজ্য হইবে:</h6>\n<p>####### <strong>তবে শর্ত থাকে যে,</strong> উক্ত বিধিমালা জারির পূর্বে অনুমোদিত প্রকল্পের পরবর্তী কোনো সংশোধন অনুমোদন হইয়া না থাকিলে এই বিধান প্রযোজ্য হইবে না।</p>\n<h5 class=\"h-lv5\"><strong>৪০। কিনারা সরলীকরণ।</strong></h5>\n<h6 class=\"h-lv6\">সকল কর্নার প্লটের ক্ষেত্রে ২ মিটার $\\times$ ২ মিটার পরিসর বিশিষ্ট জমি রাস্তার জন্য ছাড়িয়া সীমানা দেয়াল নির্মাণ করিতে হইবে এবং উক্ত জায়গা রাস্তা ব্যতীত অন্য কোনো কাজে ব্যবহার করা যাইবে না।</h6>\n<h5 class=\"h-lv5\"><strong>৪১। সীমানা হইতে সেটব্যাক।</strong></h5>\n<h6 class=\"h-lv6\">(১) প্লট সংলগ্ন বিদ্যমান রাস্তার কেন্দ্র হইতে ৪.৫ (চার দশমিক পাঁচ) মিটার অথবা প্লটের সীমানা হইতে ১.৫ (এক দশমিক পাঁচ) মিটার দূরত্বের মধ্যে যাহা অধিক তাহার চাইতে কম দূরত্বে ইমারত নির্মাণ করা যাইবে না:</h6>\n<p>####### <strong>তবে শর্ত থাকে যে,</strong> প্রযোজ্য ক্ষেত্রে, পরিকল্পনা অনুমোদনপত্র বা বিশদ অঞ্চল পরিকল্পনার প্রস্তাবনা অনুযায়ী ভবিষ্যৎ রাস্তা প্রশস্তকরণর জন্য প্রয়োজনীয় জমি বাদ রাখিয়া উক্ত দূরত্ব হিসাব করিতে হইবে:</p>\n<p>####### <strong>আরও শর্ত থাকে যে,</strong> বন্ধ রাস্তার ক্ষেত্রে বিবেচ্য প্লটের সম্মুখের দৈর্ঘ্যসহ বন্ধ রাস্তার শেষ পর্যন্ত দৈর্ঘ্য অনধিক ৫০ (পঞ্চাশ) মিটার হইলে সীমানা হইতে অন্যূন ১.৫ (এক দশমিক পাঁচ) মিটার সেটব্যাক বা উন্মুক্ত স্থান রাখিয়া ইমারত নির্মাণ করা যাইবে।</p>\n<h6 class=\"h-lv6\">(২) প্রতিটি প্লটের সম্মুখ, পার্শ্ব এবং পশ্চাৎ পরিশিষ্ট-৫ অনুযায়ী নির্ধারণ করিতে হইবে এবং যেকোনো একটি দিক সম্মুখ বিবেচনার জন্য নির্ধারিত হইবে।</h6>\n<hr class=\"sep\">"},{"num":"13452","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第４１条（境界線からの壁面後退）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>３</strong>　建築物の配置にあたっては、第１項に規定する正面の後退距離に加え、同一敷地内における建築物相互の最短外壁間距離、並びに敷地境界線からの側面及び背面の後退距離（空地）について、次の表１に定める数値を確保しなければならない。</h6>\n<p>####### <strong>表１：建築物の最小後退距離（セットバック）</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>項番</th><th>建築物の階数</th><th>同一敷地内の建築物相互の最小間隔（ｍ）</th><th>側部敷地境界線からの後退距離（ｍ）</th><th>背後敷地境界線からの後退距離（ｍ）</th></tr></thead><tbody><tr><td>1</td><td>７階建まで</td><td>2.00</td><td>1.00</td><td>1.25</td></tr><tr><td>2</td><td>８階〜１０階</td><td>2.50</td><td>1.25</td><td>2.00</td></tr><tr><td>3</td><td>１１階〜１５階</td><td>5.00</td><td>3.00</td><td>3.00</td></tr><tr><td>4</td><td>１６階〜２０階</td><td>6.00</td><td>3.25</td><td>3.25</td></tr><tr><td>5</td><td>２１階〜３０階</td><td>6.50</td><td>3.50</td><td>3.50</td></tr><tr><td>6</td><td>３１階〜４０階</td><td>7.00</td><td>4.50</td><td>4.50</td></tr><tr><td>7</td><td>４０階超</td><td>10.00</td><td>5.00</td><td>5.00</td></tr></tbody></table></div>\n<p>####### <strong>備考：</strong></p>\n<p>####### １　マスタープランにおいて指定された特定の土地において、幅員のある道路の利便性を利用して非住宅用途に供する場合、マスタープランの規定に基づく追加のセットバックを適用する。ホテル（A-5）、教育施設（B）、医療施設（D）、集会施設（I）、商業施設（F）、事務所（E）、工場（G2）、倉庫（H）、危険物施設（J）及び複合用途建築物の<strong>前面</strong>には、車両の乗降のため、<strong>最小幅員６メートル</strong>かつ敷地の間口全幅にわたる空地を確保しなければならない。当該範囲においては、建蔽率の制限を考慮した上で、所定の前面セットバックラインまでの地下部分に地階を設けること、又は地上部分にポーチを設けること、若しくは仕上げ地盤面（Finished ground level）から<strong>高さ６メートルまで</strong>を吹き抜け（ピロティ等）として上部に建築物を建築することができる。</p>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৪১। সীমানা হইতে সেটব্যাক (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(৩) উপ-বিধি (১) অনুযায়ী সম্মুখ এবং নিম্নবর্ণিত সারণি-১ অনুযায়ী একই প্লটে অবস্থিত ভবনসমূহের মধ্যবর্তী ন্যূনতম দূরত্ব, ইমারতের পশ্চাৎ ও পার্শ্ব সেটব্যাক বা উন্মুক্ত স্থান রাখিতে হইবে, যথা:—</h6>\n<p>####### <strong>সারণি-১</strong></p>\n<p>####### <strong>ইমারতের ন্যূনতম সেটব্যাক</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>ক্রমিক নম্বর</th><th>ইমারতের তলা</th><th>একই প্লটে অবস্থিত ভবনসমূহের মধ্যবর্তী ন্যূনতম দূরত্ব (পাশাপাশি বা সামনা সামনি) (মিটার)</th><th>সীমানা রেখা হইতে পার্শ্ব সেটব্যাক (মিটার)</th><th>সীমানা রেখা হইতে পশ্চাৎ সেটব্যাক (মিটার)</th></tr></thead><tbody><tr><td>(১)</td><td>(২)</td><td>(৩)</td><td>(৪)</td><td>(৫)</td></tr><tr><td>১।</td><td>৭ তলা পর্যন্ত</td><td>২.০০</td><td>১.০০</td><td>১.২৫</td></tr><tr><td>২।</td><td>৮ তলা হইতে ১০ তলা পর্যন্ত</td><td>২.৫০</td><td>১.২৫</td><td>২.০০</td></tr><tr><td>৩।</td><td>১১ তলা হইতে ১৫ তলা পর্যন্ত</td><td>৫.০০</td><td>৩.০০</td><td>৩.০০</td></tr><tr><td>৪।</td><td>১৬ তলা হইতে ২০ তলা পর্যন্ত</td><td>৬.০০</td><td>৩.২৫</td><td>৩.২৫</td></tr><tr><td>৫।</td><td>২১ তলা হইতে ৩০ তলা পর্যন্ত</td><td>৬.৫</td><td>৩.৫০</td><td>৩.৫০</td></tr><tr><td>৬।</td><td>৩১ তলা হইতে ৪০ তলা পর্যন্ত</td><td>৭</td><td>৪.৫০</td><td>৪.৫০</td></tr><tr><td>৭।</td><td>৪০ তলার ঊর্ধ্বে</td><td>১০.০০</td><td>৫.০০</td><td>৫.০০</td></tr></tbody></table></div>\n<p>####### <strong>দ্রষ্টব্য:</strong></p>\n<p>####### ১। মহাপরিকল্পনায় চিহ্নিত কোনো নির্দিষ্ট ভূমি ব্যবহারে প্রশস্ত রাস্তার সুবিধা নিয়ে অন্য অ-আবাসিক ব্যবহার করিলে মহাপরিকল্পনায় উল্লিখিত বিধান মোতাবেক অতিরিক্ত সেটব্যাক প্রযোজ্য হইবে। আবাসিক হোটেল (A-5), শিক্ষা প্রতিষ্ঠান (B), স্বাস্থ্য-সেবা (D), সমাবেশ (I), বাণিজ্যিক (F), ব্যবসা (E), শিল্প কারখানা (G2), গুদাম (H), বিপজ্জনক ব্যবহারের ভবন (J) ও বহুবিধ ব্যবহারের শ্রেণিভুক্ত ইমারতের সম্মুখে যানবাহনে আরোহণ ও অবতরণের জন্য ন্যূনতম ৬ (ছয়) মিটার প্রস্থ ও সম্মুখের প্লটের দৈর্ঘ্যের সমপরিমাণ জায়গা খালি রাখিতে হইবে, এই অংশের মধ্যে বিধি অনুযায়ী ভূমি আচ্ছাদন বিবেচনায় রাখিয়া প্রযোজ্য সম্মুখ সেটব্যাক পর্যন্ত ভূমির নিচে বেজমেন্ট, ভূমির উপরিতলে পোর্চ অথবা ভূমিতল (finished ground level) হইতে ন্যূনতম ৬ (ছয়) মিটার উচ্চতা পর্যন্ত ঊর্ধ্ব দিকে উন্মুক্ত রাখিয়া তাহার উপরের অংশে ইমারত নির্মাণ করা যাইবে।</p>\n<hr class=\"sep\">"},{"num":"13453","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第４１条（境界線からの壁面後退）（承前）</strong></h5>\n<p>####### <strong>二</strong>　危険物貯蔵・処理施設（用途分類 J）については、周囲の全方位にわたり最小９メートルの後退距離を確保しなければならない。</p>\n<p>####### <strong>三</strong>　建築物の各階において、設備用スペースを除き、外壁の外側の義務的空地内（境界から０.５メートル以内）には、吊り下げ式のプランター、エアコン室外機、トイレ用ダクト、その他非居住目的のフロアスペースを設置することができる。</p>\n<h6 class=\"h-lv6\"><strong>４</strong>　当該敷地内のみで終端し、かつ共有ではない私道に接する土地において、計画建築物の前面後退距離は１.５メートルとする。</h6>\n<h5 class=\"h-lv5\"><strong>第４２条（地階の後退距離）</strong></h5>\n<h6 class=\"h-lv6\"><strong>１</strong>　地階（ベージェント）は、義務的空地の範囲内に拡張することができる。ただし、当該拡張部分は第４５条表３に規定する空地面積のうち、許容建蔽率の超過分として認められる範囲内に限るものとし、残りの土地は雨水の浸透を目的として地表面で開放しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>２</strong>　雨水の浸透を目的として表３に指定された「義務的非舗装空地」の直下には、地階を設けることができない。</h6>\n<h5 class=\"h-lv5\"><strong>第４３条（階及び地階）</strong></h5>\n<h6 class=\"h-lv6\"><strong>１</strong>　建築物の各階の名称は、地階（Basement）、半地階（Semi-basement）、１階（Ground floor）、２階、３階、屋上等と定義することができる。</h6>\n<h6 class=\"h-lv6\"><strong>２</strong>　地階の設置にあたっては、次に掲げる事項を遵守しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>一</strong>　必要に応じて機械換気・照明設備を設置し、適切な採光及び換気を確保するとともに、常に乾燥状態を維持すること。</h6>\n<h6 class=\"h-lv6\"><strong>二</strong>　雨水の流入又はその他の浸水を防止するため、適切な防水・防排水措置を講じること。</h6>\n<h6 class=\"h-lv6\"><strong>三</strong>　利用者数及び歩行距離に応じ、本規則及び法典（Code）に基づき避難出口数を決定すること。</h6>\n<p>####### <strong>ただし、</strong> 全ての地階は少なくとも一つの階段により、１階又は地盤面に直接接続していなければならない。</p>\n<h6 class=\"h-lv6\"><strong>四</strong>　地階の建設に伴う掘削工事の着手前に、適切な安全対策を完了しなければならない。対策が不十分な場合、当局は工事停止を命ずることができる。</h6>\n<h6 class=\"h-lv6\"><strong>五</strong>　工事期間中、隣接建築物及び公衆の利益を保護するため事前に対策を講じるとともに、損害賠償保証（Indemnity bond）を提出しなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৪১। সীমানা হইতে সেটব্যাক (চলমান)</strong></h5>\n<p>####### ২। বিপজ্জনক ব্যবহারের ভবন (J) এর ক্ষেত্রে সকল দিকের সেটব্যাক ন্যূনতম ৯ (নয়) মিটার হইবে।</p>\n<p>####### ৩। ইমারতের কোনো তলে, ইউটিলিটি সার্ভিস ব্যতীত ইহার বহিঃদেওয়ালের বাহিরে আবশ্যিক অনাচ্ছাদিত স্থানের (আনুষঙ্গিক দূরত্ব ০.৫ মিটার) মধ্যে ঝুলন্ত প্ল্যান্টার, এসি ও টয়লেট ডাক্ট (duct) বা যেকোনো ধরণের অ-ব্যবহারিক ফ্লোর স্পেস নির্মাণ করা যাইবে।</p>\n<h6 class=\"h-lv6\">(৪) শুধু সংশ্লিষ্ট প্লটেই শেষ হইয়াছে এবং এজমালি নহে এইরূপ রাস্তা সংবলিত জমিতে প্রস্তাবিত ইমারতের জন্য সম্মুখ সেটব্যাক ১.৫ (এক দশমিক পাঁচ) মিটার হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>৪২। বেজমেন্টের সেটব্যাক।</strong></h5>\n<h6 class=\"h-lv6\">(১) বেজমেন্ট আবশ্যিক অনাচ্ছাদিত স্থানের মধ্যে বর্ধিত করা যাইবে, তবে উক্ত বর্ধিতাংশ বিধি ৪৫ এ উল্লিখিত সারণি-৩ অনুযায়ী অনাচ্ছাদিত স্থানের যে পরিমাণ ভূমি অতিরিক্ত ভূমি আচ্ছাদনের আওতাভুক্ত হইবে তাহার মধ্যে সীমাবদ্ধ থাকিবে, অবশিষ্ট ভূমি বৃষ্টির পানি শোষনার্থে ভূমি সমতলে উন্মুক্ত রাখিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(২) বৃষ্টির পানি শোষনার্থে সারণি-৩ এ উল্লিখিত বাধ্যতামূলক অনাচ্ছাদিত স্থানে এ বেজমেন্ট নির্মাণ করা যাইবে না।</h6>\n<h5 class=\"h-lv5\"><strong>৪৩। তলা ও বেজমেন্ট।</strong></h5>\n<h6 class=\"h-lv6\">(১) ইমারতের বিভিন্ন তলাকে বেজমেন্ট, সেমি বেজমেন্ট, নিচতলা, দ্বিতীয় তলা, তৃতীয় তলা, ছাদ, ইত্যাদি নামকরণ করা যাইবে।</h6>\n<h6 class=\"h-lv6\">(২) বেজমেন্টের জন্য নিম্নবর্ণিত বিষয়াদি বিবেচনায় রাখিতে হইবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) বেজমেন্টকে প্রয়োজনে যান্ত্রিক পদ্ধতি ব্যবহার করিয়া প্রয়োজনীয় আলো ও বাতাসের ব্যবস্থা করিতে হইবে এবং সর্বদা শুষ্ক রাখিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(খ) বেজমেন্টে যাহাতে বৃষ্টির পানি প্রবেশ করিতে না পারে বা অন্য কোনো উপায়ে পানি জমিতে না পারে সেজন্য যথাযথ প্রতিরোধমূলক ব্যবস্থা রাখিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(গ) ব্যবহারকারীর সংখ্যা ও যাতায়াত দূরত্বের উপর নির্ভর করিয়া এই বিধিমালা ও কোড অনুযায়ী বেজমেন্টে প্রস্থান সংখ্যা নির্ধারণ করিতে হইবে:</h6>\n<p>####### <strong>তবে শর্ত থাকে যে,</strong> সকল বেজমেন্ট অন্যূন একটি সিঁড়ি দিয়া নিচতলা অথবা ভূমি সমতলের সহিত সরাসরি সংযুক্ত থাকিতে হইবে;</p>\n<h6 class=\"h-lv6\">(ঘ) বেজমেন্ট নির্মাণের জন্য খনন কাজ আরম্ভ করিবার পূর্বে যথাযথভাবে সকল নিরাপত্তামূলক ব্যবস্থা গ্রহণ ও সম্পন্ন করিতে হইবে, অন্যথায় কর্তৃপক্ষ নির্মাণ কাজ বন্ধ করিয়া দিতে পারিবে;</h6>\n<h6 class=\"h-lv6\">(ঙ) বেজমেন্ট নির্মাণ কাজ চলাকালে প্রতিবেশীর ইমারত ও জনগণের স্বার্থ সুবিধাদি রক্ষা করিবার জন্য পূর্ব হইতেই সতর্কতামূলক ব্যবস্থা গ্রহণ করিতে হইবে এবং ক্ষতিপূরণ মুচলেকা (Indemnity bond) প্রদান করিতে হইবে;</h6>\n<hr class=\"sep\">"},{"num":"13454","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第４３条（階及び地階）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>２</strong>（承前）</h6>\n<h6 class=\"h-lv6\"><strong>六</strong>　隣接する敷地に対して損害を与えないことを条件として、地階（ベージェント）の天井高は、接する道路の最高面から<strong>１.８５メートル以下</strong>としなければならない。当該１.８５メートルの高さに昇降するための階段又は র‍্যাম্প（スロープ）は、境界壁に接してセットバック（外壁後退）部分に設置することができる。ただし、当該階段又は র‍্যাম্পの上部のセットバック部分には、恒久的又は一時的な屋根（カバー）を設けてはならない。</h6>\n<h6 class=\"h-lv6\"><strong>七</strong>　本規則及び法典（BNBC）の規定に従い、機械換気設備により適切な環境が確保される場合にあっては、地階を居住目的、ガスシリンダー若しくは可燃物の貯蔵、又は可燃物倉庫として使用する場合を除き、法典に定める防火区画（Fire zone）に従った複合用途に供することができる。</h6>\n<p>####### <strong>ただし、</strong> 使用許可証（Occupancy Certificate）の申請に際し、消防局、電力当局、及び（該当する場合）関連当局の承認証明書を提出しなければならない。</p>\n<h5 class=\"h-lv5\"><strong>第４４条（セットバックの例外）</strong></h5>\n<h6 class=\"h-lv6\">敷地境界線から建築物までの距離（セットバック）は、原則として表１の規定に従うものとする。ただし、次の表２に掲げる例外を除き、いかなる構造物もセットバックの範囲内に突出してはならない。</h6>\n<p>####### <strong>表２：セットバック範囲内における許容例外事項</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>項番</th><th>項目</th><th>許容範囲</th><th>条件</th></tr></thead><tbody><tr><td>1</td><td>車路（ドライブウェイ）及び駐車場</td><td>前面部分の駐車場</td><td>(1) いかなる囲い（フェンス等）によっても密閉してはならない。</td></tr><tr><td></td><td></td><td></td><td>(2) 義務的空地（表３）の所定部分は、雨水浸透を目的として開放しなければならない。</td></tr></tbody></table></div>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৪৩। তলা ও বেজমেন্ট (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(২) (চলমান)</h6>\n<h6 class=\"h-lv6\">(চ) সংযুক্ত প্লটের কোনো রূপ ক্ষতি সাধন না করিয়া বেজমেন্টের ছাদ সংযুক্ত রাস্তার সর্বোচ্চ তল হইতে অনধিক ১.৮৫ (এক দশমিক আট পাঁচ) মিটার উপরে নির্মাণ করা যাইবে; উক্ত ১.৮৫ (এক দশমিক আট পাঁচ) মিটার উচ্চতায় উঠিবার বা নামিবার জন্য প্রযোজ্য সিঁড়ি বা র‍্যাম্প সীমানা দেয়াল সংলগ্ন করিয়া ইমারতের সেটব্যাক অংশ নির্মাণ করা যাইবে, তবে অনুরূপ সিঁড়ি বা র‍্যাম্পের উপর সেটব্যাক অংশে স্থায়ী বা অস্থায়ী আচ্ছাদন তৈরি করা যাইবে না;</h6>\n<h6 class=\"h-lv6\">(ছ) বেজমেন্ট যান্ত্রিক উপায়ে যথাযথভাবে নিয়ন্ত্রিত বায়ু প্রবাহের ব্যবস্থায় সুষ্ঠু পরিবেশ নিশ্চিত হইলে এবং এই বিধিমালা ও কোডের সংশ্লিষ্ট বিধানসমূহ যথাযথভাবে অনুসরণ করিলে বেজমেন্টে আবাসিক, গ্যাস সিলিন্ডার বা দাহ্য পদার্থ, দাহ্য পদার্থের গুদাম জাতীয় ব্যবহার ব্যতীত কোডে উল্লিখিত ফায়ার জোন অনুসরণপূর্বক মিশ্র ব্যবহার করা যাইবে:</h6>\n<p>####### <strong>তবে শর্ত থাকে যে,</strong> ব্যবহার সনদ আবেদন দাখিলের সহিত ফায়ার সার্ভিস, বিদ্যুৎ ও প্রযোজ্য ক্ষেত্রে, সংশ্লিষ্ট কর্তৃপক্ষের অনুমোদনের প্রমাণক দাখিল করিতে হইবে।</p>\n<h5 class=\"h-lv5\"><strong>৪৪। সেটব্যাকের ক্ষেত্রে ব্যতিক্রম।</strong></h5>\n<h6 class=\"h-lv6\">সাধারণভাবে প্লটের সীমানা হইতে স্থাপনার দূরত্ব বা সেটব্যাক, সারণি-১ এ উল্লিখিত নির্দেশনা অনুযায়ী নির্ণয় করিতে হইবে, তবে নিম্নবর্ণিত সারণি ২ এ উল্লিখিত প্রযোজ্য ব্যতিক্রমসমূহ ব্যতীত কোনো উপাদানই সেটব্যাকের সীমার ভিতরে অনুমোদনযোগ্য হইবে না, যথা:—</h6>\n<p>####### <strong>সারণি-২</strong></p>\n<p>####### <strong>সেটব্যাকের স্থানে প্রযোজ্য ব্যতিক্রমসমূহ</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>ক্রমিক নং</th><th>উপাদান</th><th>পরিমাণ</th><th>শর্ত</th></tr></thead><tbody><tr><td>১।</td><td>ড্রাইভওয়ে ও পার্কিং</td><td>সম্মুখ অংশ পার্কিং</td><td>(১) কোনো রূপ বেষ্টনী দিয়া ঘেরা যাইবে না;</td></tr><tr><td></td><td></td><td></td><td>(২) আবশ্যিক অনাচ্ছাদিত স্থানের সর্বমোট প্রযোজ্য অংশ (সারণি ৩) বৃষ্টির পানি শোষণের লক্ষ্যে উন্মুক্ত রাখিতে হইবে।</td></tr></tbody></table></div>\n<hr class=\"sep\">"},{"num":"13455","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第４４条（セットバックの例外）（承前）</strong></h5>\n<p>####### <strong>表２（承前）</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>項番</th><th>項目</th><th>許容範囲</th><th>条件</th></tr></thead><tbody><tr><td>2</td><td>警備室又は守衛所</td><td>道路面から高さ最大３.２５ｍ、床面積最大５㎡</td><td>前面道路側の境界壁に隣接して設置すること。</td></tr><tr><td>3</td><td>主屋根の張り出し部分</td><td>外壁面から最大１ｍまで</td><td>(1) 道路に面する側に限る。 (2) 地盤面から高さ８ｍ以上の位置にあること。 (3) いかなる囲いによっても密閉しないこと。 (4) 全側面を開放すること。</td></tr><tr><td>4</td><td>日よけ、プランター一体型日よけ、コーニス等</td><td>(a) 外壁面から最大０.５ｍまで。 (b) 側部・背後の後退距離が１.２５ｍ未満の場合は最大０.３ｍまで。</td><td>(1) 囲いによって密閉しないこと。 (2) ベランダ又はバルコニーとして使用しないこと。 (3) 維持管理目的以外での立入りを禁止すること。</td></tr><tr><td>5</td><td>垂直フィン又は日よけ用格子壁</td><td>厚さ最大２００ｍｍ</td><td>外壁の外側、日よけと並行して設置すること。</td></tr></tbody></table></div>\n<h5 class=\"h-lv5\"><strong>第４５条（建蔽率及び義務的空地）</strong></h5>\n<h6 class=\"h-lv6\"><strong>１</strong>　敷地面積に応じた許容最高建蔽率（Maximum Ground Coverage）及び義務的空地（Mandatory Open Space）並びに雨水浸透を目的とした義務的空地については、次の表３の規定に従うものとする。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৪৪। সেটব্যাকের ক্ষেত্রে ব্যতিক্রম (চলমান)</strong></h5>\n<p>####### <strong>সারণি-২ (চলমান)</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>ক্রমিক নং</th><th>উপাদান</th><th>পরিমাণ</th><th>শর্ত</th></tr></thead><tbody><tr><td>২।</td><td>গার্ডরুম বা নিরাপত্তা পোস্ট</td><td>রাস্তার লেভেল হইতে সর্বোচ্চ ৩.২৫ (তিন দশমিক দুই পাঁচ) মিটার উঁচু এবং সর্বোচ্চ ৫ (পাঁচ) বর্গমিটার ক্ষেত্রফল বিশিষ্ট</td><td>সম্মুখ রাস্তার দিকে সীমানা দেয়াল সংলগ্ন হইতে হইবে।</td></tr><tr><td>৩।</td><td>মূল ছাদের বর্ধিতাংশ</td><td>ইমারতের মূল অংশ হইতে সর্বোচ্চ ১ (এক) মিটার পর্যন্ত</td><td>(১) কেবল ইমারতের রাস্তাভিমুখী করা যাইবে; (২) ভূমি সমতল হইতে ৮ (আট) মিটারের নিচে হইবে না; (৩) সানশেড বা কার্নিশ কোনোরূপ বেষ্টনি দিয়া ঘেরা যাইবে না; (৪) সকল পার্শ্ব উন্মুক্ত হইতে হইবে।</td></tr><tr><td>৪।</td><td>সানশেড, সানশেড-প্লান্টার, কার্নিশ বা ছাদের বর্ধিতাংশ</td><td>(ক) ইমারতের মূল অংশ হইতে সর্বোচ্চ ০.৫ (শূন্য দশমিক পাঁচ) মিটার পর্যন্ত; (খ) পাশের ও পশ্চাতের সেটব্যাক ১.২৫ (এক দশমিক দুই পাঁচ) মিটারের কম হইলে সর্বোচ্চ ০.৩ (শূন্য দশমিক তিন) মিটার পর্যন্ত</td><td>(১) কোনোরূপ বেষ্টনী দিয়া ঘেরা যাইবে না; (২) বারান্দা বা ব্যালকনি হিসাবে ব্যবহার করা যাইবে না; (৩) রক্ষণাবেক্ষণ ব্যতীত অন্য কোনো কারণে প্রবেশযোগ্য হইবে না।</td></tr><tr><td>৫।</td><td>ভার্টিক্যাল ফিন (fin) বা সূর্যের আলো প্রতিরোধে জালির দেয়াল</td><td>সর্বোচ্চ ২০০ (দুইশত) মি.মি. পুরু</td><td>বহিঃদেয়ালের বাহিরে সানশেড বরাবর।</td></tr></tbody></table></div>\n<h5 class=\"h-lv5\"><strong>৪৫। ভূমি আচ্ছাদন ও আবশ্যিক অনাচ্ছাদিত স্থান।</strong></h5>\n<h6 class=\"h-lv6\">(১) প্লটের আয়তন অনুযায়ী অনুমোদনযোগ্য সর্বোচ্চ ভূমি আচ্ছাদন (Maximum Ground Coverage) ও আবশ্যিক অনাচ্ছাদিত স্থান (Mandatory Open Space), বৃষ্টির পানি শোষনার্থে বাধ্যতামূলক অনাচ্ছাদিত স্থান নিম্নবর্ণিত সারণি ৩ অনুসারে নির্ধারিত হইবে, যথা:—</h6>\n<hr class=\"sep\">"},{"num":"13456","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<p>####### <strong>表３：敷地面積に応じた建蔽率、空地及び雨水浸透用義務的保存領域（数値は全て敷地面積に対するパーセンテージ）</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>項番</th><th>敷地面積</th><th>最低建蔽率 (MGC)</th><th>最高建蔽率 (MGC)</th><th>義務的空地 (Mandatory Open Space)</th><th>例外規定による追加の建蔽率（最大）</th><th>雨水浸透用義務的空地領域 [Column 5 - 6]</th></tr></thead><tbody><tr><td>1</td><td>A6: 手頃な価格の住宅（全敷地対象）</td><td>52%</td><td>75%</td><td>25%</td><td>12.5%</td><td>12.5%</td></tr><tr><td>2</td><td>134㎡ (2 Katha) 以下</td><td>52.5%</td><td>70%</td><td>30%</td><td>15%</td><td>15%</td></tr><tr><td>3</td><td>134㎡超〜201㎡ (3 Katha) まで</td><td>50%</td><td>67.5%</td><td>32.5%</td><td>16.25%</td><td>16.25%</td></tr><tr><td>4< <td>৩২.৫%</td><td>১৬.২৫%</td><td>১৬.২৫%</td></tr><tr><td>৪।</td><td>২০১ ব.মি. (৩ কাঠা) এর অধিক হইতে ২৬৮ ব.মি. (৪ কাঠা) পর্যন্ত</td><td>৪৮.৫%</td><td>৬৫%</td><td>৩৫%</td><td>১৭.৫০%</td><td>১৭.৫০%</td></tr><tr><td>৫।</td><td>২৬৮ ব.মি. (৪ কাঠা) এর অধিক হইতে ৪০২ ব.মি. (৬ কাঠা) পর্যন্ত</td><td>৪৬.৫%</td><td>৬২.৫%</td><td>৩৭.৫%</td><td>১৮.৭৫%</td><td>১৮.৭৫%</td></tr><tr><td>৬।</td><td>৪০২ ব.মি. (৬ কাঠা) এর অধিক হইতে ৬৭০ ব.মি. (১০ কাঠা) পর্যন্ত</td><td>৪৫%</td><td>৬০%</td><td>৪০%</td><td>২০%</td><td>২০%</td></tr><tr><td>৭।</td><td>৬৭০ ব.মি. (১০ কাঠা) এর অধিক হইতে ৯৩৭ ব.মি. (১৪ কাঠা) পর্যন্ত</td><td>-</td><td>৫৫%</td><td>৪৫%</td><td>২২.৫%</td><td>২২.৫%</td></tr><tr><td>৮।</td><td>৯৩৭ ব.মি. (১৪ কাঠা) এর অধিক হইতে ১৩৩৯ ব.মি. (২০ কাঠা) পর্যন্ত</td><td>-</td><td>৫০%</td><td>৫০%</td><td>২৫%</td><td>২৫%</td></tr><tr><td>৯।</td><td>১৩৩৯ ব.মি. (২০ কাঠা) এর অধিক হইতে ২৬৭৭ ব.মি. (৪০ কাঠা) পর্যন্ত</td><td>-</td><td>৪৫%</td><td>৫৫%</td><td>২৭.৫%</td><td>২৭.৫%</td></tr><tr><td>১০।</td><td>২৬৭৭ ব.মি. (৪০ কাঠa) এর অধিক</td><td>-</td><td>৪০%</td><td>৬০%</td><td>৩০%</td><td>৩০%</td></tr></tbody></table></div>\n<hr class=\"sep\">"},{"num":"13457","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<p>####### <strong>備考：</strong></p>\n<p>####### １　適用上の例外による追加の建蔽率（最大）及び雨水浸透用の義務的空地は、第４５条表３の第５列及び第７列に掲げる「義務的空地」の割合に基づき算定する。「手頃な価格の住宅（Affordable Housing）」を除き、表３の第４列（最高建蔽率）と第６列（例外による追加分）の合計は、地階又は地上階において、敷地面積（道路等への提供分を除く）の<strong>７５％を超えてはならない</strong>。</p>\n<p>####### ２　専ら営利目的の立体駐車場又は共同駐車場建築物を建築する場合、第４４条表２の規定に基づくセットバック（後退距離）を確保しなければならない。この場合、表３に定める最高建蔽率の制限は適用しない。</p>\n<p>####### ３　中学校、高校、大学等の教育施設（用途分類 B1 及び B2）については、<strong>最高建蔽率を４５％とする。また、教育施設にあっては、基準（敷地面積の３分の１以上を一画にまとめ、セットバック面積を除外した上で、短辺が長辺の２分の１以上であること）に適合する運動場（Playing field）の設置を義務付ける</strong>。</p>\n<p>####### ４　危険物貯蔵・処理施設（用途分類 J）については、<strong>最高建蔽率を３０％</strong>とする。また、工業用建築物については、表３の項番７以降（大規模敷地）に該当する場合、最高建蔽率を６０％まで認めることができる。</p>\n<h6 class=\"h-lv6\"><strong>２</strong>　義務的空地は、建築開発における<strong>不可分の一部</strong>であり、建築承認の必須要件とみなす。当該空地を個別に分割し、売却し、又は開発の用に供してはならない。</h6>\n<h6 class=\"h-lv6\"><strong>３</strong>　表３の例外規定に明記された特定の部位を除き、建築物のいかなる部分も、最高建蔽率を超えて義務的空地内に突出させてはならない。</h6>\n<h6 class=\"h-lv6\"><strong>４</strong>　雨水浸透用義務的空地として指定された敷地部分は、地上及び地下（地階等の直上を含む）にわたって、<strong>完全に透水性（Permeable）</strong>を有する、すなわち雨水が浸透可能な状態で維持しなければならない。当該部分においては、地上及び地下を問わず、基礎、舗装構造物（Paved structures）又は建物の一部を設置若しくは拡張してはならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>####### <strong>দ্রষ্টব্য:</strong></p>\n<p>####### ১। প্রায়োগিক ব্যতিক্রম অনুযায়ী অতিরিক্ত ভূমি আচ্ছাদন (সর্বোচ্চ) এবং বৃষ্টির পানি শোষনার্থে বাধ্যতামূলক অনাচ্ছাদিত এলাকা, আবশ্যিক অনাচ্ছাদিত স্থানের শতকরা (কলাম- ৫ ও ৭ এ উল্লিখিত) হিসাবে নির্ধারিত হইবে। তবে “সাশ্রয়ী আবাসন” ব্যতীত কলাম ৪ ও ৬ এর যোগফল কোনোক্রমেই বেজমেন্ট বা ভূমি তলের উপরে মোট ভূমির (সমর্পিত জমি বাদে) ৭৫% অতিক্রম করিবে না।</p>\n<p>####### ২। শুধু বাণিজ্যিকভাবে গাড়ির পার্কিং গ্যারেজ বা কমিউনিটি পার্কিং ইমারত নির্মাণে সারণি ২ এ প্রদত্ত সেটব্যাক অনুযায়ী উন্মুক্ত স্থান রাখিতে হইবে, এক্ষেত্রে সারণি ৩ এ উল্লিখিত সর্বোচ্চ ভূমি আচ্ছাদন প্রযোজ্য হইবে না।</p>\n<p>####### ৩। মাধ্যমিক বিদ্যালয়, কলেজ, বিশ্ববিদ্যালয় (B1 ও B2) শ্রেণির ইমারতের ক্ষেত্রে সর্বোচ্চ ৪৫% ভূমি আচ্ছাদন প্রযোজ্য হইবে এবং শিক্ষা প্রতিষ্ঠানের ক্ষেত্রে মানদন্ড (মোট জমির এক তৃতীয়াংশ একত্রে যাহা সেটব্যাকের জন্য সংরক্ষিত জমি ব্যতীত এবং প্রস্থ দৈর্ঘ্যের অর্ধেকের কম হইতে পারিবে না) অনুযায়ী খেলার মাঠ থাকা বাধ্যতামূলক।</p>\n<p>####### ৪। বিপজ্জনক ব্যবহারের ভবন (J) এর ক্ষেত্রে ৩০% পর্যন্ত সর্বোচ্চ ভূমি আচ্ছাদন প্রযোজ্য হইবে এবং শিল্প শ্রেণির ইমারতের ক্ষেত্রে সারণি ৩ এর ক্রমিক নং ৭ হইতে যে-কোনো পরিমাণ জমির ক্ষেত্রে ৬০% পর্যন্ত সর্বোচ্চ ভূমি আচ্ছাদন নেওয়া যাইবে।</p>\n<h6 class=\"h-lv6\">(২) আবশ্যিক অনাচ্ছাদিত স্থান ইমারত উন্নয়নের অবিভাজ্য অংশ এবং ইমারত অনুমোদনের বিধান হিসাবে বিবেচিত হইবে এবং পৃথকভাবে বিভক্তি, বিক্রয় বা উন্নয়নযোগ্য হইবে না।</h6>\n<h6 class=\"h-lv6\">(৩) সারণি ৩ এ বর্ণিত প্রায়োগিক ব্যতিক্রম অংশে উল্লিখিত ভবনের নির্দিষ্ট উপাদান বা অংশ ব্যতীত ইমারতের অন্য কোনো অংশ সর্বোচ্চ অনুমোদিত ভূমি আচ্ছাদনের বাহিরে, আবশ্যিক অনাচ্ছাদিত স্থানের মধ্যে বর্ধিত করা যাইবে না।</h6>\n<h6 class=\"h-lv6\">(৪) বৃষ্টির পানি শোষনার্থে বাধ্যতামূলক অনাচ্ছাদিত এলাকা হিসাবে সংশ্লিষ্ট প্লটের নির্ধারিত পরিমাণ অংশ ভূমিতলের উপরে এবং নীচে (বেজমেন্ট ইত্যাদির ক্ষেত্রসহ) সম্পূর্ণ ভেদ্য (permeable) অর্থাৎ পানি প্রবেশের উপযোগী হিসাবে সংরক্ষণ করিতে হইবে এবং এই অংশে ভূমিতলের উপরে ও নীচে ফাউন্ডেশন বা কোনো পাকা স্থাপনা (paved) বা স্থাপনার অংশ বর্ধিত করা যাইবে না।</h6>\n<hr class=\"sep\">"},{"num":"13458","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第４６条（義務的空地における実務上の例外）</strong></h5>\n<h6 class=\"h-lv6\"><strong>１</strong>　義務的空地（Mandatory Open Space）における最高建蔽率の適用にあたっては、次の表４に掲げる条件を遵守する場合に限り、実務上の例外規定を適用するものとする。</h6>\n<p>####### <strong>表４：最高建蔽率における許容例外事項</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>項番</th><th>項目</th><th>許容範囲</th><th>条件</th></tr></thead><tbody><tr><td><strong>1</strong></td><td><strong>最高建蔽率を超えて設置する地盤面の舗装（Paved）部分</strong></td><td>第４５条表３に定める「例外規定による追加の建蔽率」の範囲内とする。</td><td>(1) 車路、駐車場及び守衛所（セキュリティブース）以外の目的に供してはならない。 (2) 駐車場として利用する場合、守衛所を除き、耐力壁や袖壁（Solid wall）で囲んではならない。 (3) 敷地内部の通風を確保しなければならない。</td></tr><tr><td><strong>2</strong></td><td><strong>被覆された空間（屋根・庇等）</strong></td><td>(a) 隣接道路面から<strong>高さ６メートルを超える位置</strong>に設けるものとする。 (b) 面積は表３の追加建蔽率の範囲内とする。</td><td>(1) セットバック（外壁後退）範囲内に設置してはならない。 (2) テラス又は屋上庭園以外の目的に供してはならない。 (3) 恒久的又は一時的な構造物によって密閉してはならない。</td></tr><tr><td><strong>3</strong></td><td><strong>コーニス（道路に面する側）</strong></td><td>セットバック距離以上の余剰空地を確保して建築する場合、建物本体から<strong>最大２メートルまで</strong>。これを超える場合は建蔽率に算入する。</td><td>(1) セットバック範囲内に設置してはならない。 (2) 道路に面する側に限る。 (3) 地盤面から<strong>高さ８メートル以上</strong>の位置になければならない。 (4) プランター部分を除き、張り出し部分の三方を stag（開放）しなければならない。</td></tr></tbody></table></div>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৪৬। আবশ্যিক অনাচ্ছাদিত স্থানের ক্ষেত্রে প্রায়োগিক ব্যতিক্রম।</strong></h5>\n<h6 class=\"h-lv6\">(১) আবশ্যিক অনাচ্ছাদিত স্থানের জন্য সর্বোচ্চ ভূমি আচ্ছাদন কার্যকর করিবার ক্ষেত্রে নিম্নবর্ণিত সারণি ৪ এ উল্লিখিত শর্তসমূহ পালন সাপেক্ষে কতিপয় প্রায়োগিক ব্যতিক্রম প্রযোজ্য হইবে, যথা:—</h6>\n<p>####### <strong>সারণি ৪</strong></p>\n<p>####### <strong>সর্বোচ্চ ভূমি আচ্ছাদনের ক্ষেত্রে প্রযোজ্য ব্যতিক্রমসমূহ</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>ক্রমিক নং</th><th>উপাদান</th><th>পরিমাপ</th><th>শর্ত</th></tr></thead><tbody><tr><td>১।</td><td>সর্বোচ্চ ভূমি আচ্ছাদনের অতিরিক্ত পাকা (Paved) আচ্ছাদন (ভূমি তলে)</td><td>প্লটের আয়তন অনুযায়ী সারণি-৩ এ উল্লিখিত অতিরিক্ত ভূমি আচ্ছাদনের পরিমাপের অধিক নহে</td><td>(১) ড্রাইভওয়ে, পার্কিং ও নিরাপত্তা বুথ ব্যতীত অন্য কোনো কাজে ব্যবহার করা যাইবে না; (২) পার্কিং হিসাবে ব্যবহৃত হইলে নিরেট দেয়াল দিয়া (নিরাপত্তা পোস্ট ব্যতীত) বন্ধ করা যাইবে না; (৩) জমির অভ্যন্তরে বায়ু চলাচলের সুব্যবস্থা থাকিতে হইবে।</td></tr><tr><td>২।</td><td>আবৃত পরিসর (ছাদ)</td><td>(ক) প্লটের সংলগ্ন রাস্তার লেভেল হইতে ৬ (ছয়) মিটার অধিক উচ্চতায় ছাদ হইতে পারিবে; (খ) প্লটের আয়তন অনুযায়ী সারণি ৩ এ উল্লিখিত অতিরিক্ত ভূমি আচ্ছাদনের পরিমাপের চেয়ে বেশি নহে</td><td>(১) কোনোভাবেই সেটব্যাক স্থানের মধ্যে তৈরি করা যাইবে না; (২) শুধু টেরেসা বা টেরেসা গার্ডেন ব্যতীত অন্য কোনো কাজে ব্যবহার করা যাইবে না; (৩) কোনো ভাবেই স্থায়ী বা অস্থায়ী কাঠামো দ্বারা আচ্ছাদিত হইতে পারিবে না。</td></tr><tr><td>৩।</td><td>কার্নিশ (রাস্তাভিমুখী দিকে)</td><td>সেটব্যাকের অতিরিক্ত জায়গা ছাড়িয়া ইমারত নির্মাণ করিলে ইমারতের মূল অংশ হইতে সর্বোচ্চ ২ (দুই) মিটার পর্যন্ত; উল্লিখিত সীমার অধিক বৃদ্ধি করিলে অতিরিক্ত অংশ ভূমি আচ্ছাদনের পরিমাপের অন্তর্ভুক্ত হইবে</td><td>(১) কোনভাবেই সেটব্যাক স্থানের মধ্যে তৈরি করা যাইবে না; (২) কেবল ইমারতের রাস্তাভিমুখী দিকে করা যাইবে; (৩) ভূমি সমতল হইতে ৮ মিটারের নিচে হইবে না; (৪) প্লান্টার ব্যতীত ছাদের বর্ধিতাংশ তিন পার্শ্ব উন্মুক্ত থাকিতে হইবে।</td></tr></tbody></table></div>\n<hr class=\"sep\">"},{"num":"13459","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第４６条（義務的空地における実務上の例外）（承前）</strong></h5>\n<p>####### <strong>表４（承前）</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>項番</th><th>項目</th><th>許容範囲</th><th>条件</th></tr></thead><tbody><tr><td><strong>4</strong></td><td><strong>日よけ、プランター、コーニス等（道路面以外）</strong></td><td>セットバック以上の余剰空地を確保する場合、建物本体から<strong>最大１.５ｍまで</strong>。これを超える部分は建蔽率に算入する。</td><td>(1) セットバック（外壁後退）範囲内に設置しないこと。 (2) 囲い等で密閉しないこと。 (3) ベランダ等として使用しないこと。 (4) 維持管理以外での立入りを禁止すること。 (5) 三方を stag（開放）すること。</td></tr><tr><td><strong>5</strong></td><td><strong>バルコニー</strong></td><td>道路に面する壁面幅の３０％に、幅１ｍを乗じた面積を超えてはならない。</td><td>(1) セットバック範囲内に設置しないこと。 (2) 道路に面する側に限る。 (3) 地盤面から<strong>高さ３.５０ｍ以上</strong>に設置すること。</td></tr></tbody></table></div>\n<h6 class=\"h-lv6\"><strong>２</strong>　前項の例外は、他の建築物や工作物の部位には適用されない。また、追加の建蔽率の合計は、第４５条表３に定める上限を超えてはならない。</h6>\n<h5 class=\"h-lv5\"><strong>第４７条（容積率（FAR）指標の算定）</strong></h5>\n<h6 class=\"h-lv6\"><strong>１</strong>　住宅、住戸数、及びマスタープランに定める各種インセンティブを適用する建築物においては、次の２つの容積率（FAR）指標を考慮するものとする。</h6>\n<h6 class=\"h-lv6\"><strong>一</strong>　地区別容積率（Area-based FAR）</h6>\n<h6 class=\"h-lv6\"><strong>二</strong>　接道別容積率（Road-based FAR）</h6>\n<h6 class=\"h-lv6\"><strong>２</strong>　地区別容積率は、当該敷地が位置するマスタープラン上の人口密度ブロックの指定値に従うものとする。</h6>\n<h6 class=\"h-lv6\"><strong>３</strong>　地区別容積率と接道別容積率のうち、<strong>いずれか小さい方の値</strong>を「基礎容積率（Base FAR）」として無条件に適用する。両者のうち大きい方の値を「最高容積率」とし、これを得るにはインセンティブの適用を受けなければならない。ただし、許可される容積率は最高容積率を超えてはならない。</h6>\n<p>####### <strong>ただし、</strong> ブロック単位の開発、都市再生区域、及び開発権移転（TDR）が適用される場合は、インセンティブにより最高容積率を<strong>最大０.５</strong>まで加算することができる。</p>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>####### <strong>সারণি ৪ (চলমান)</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>ক্রমিক নং</th><th>উপাদান</th><th>পরিমাপ</th><th>শর্ত</th></tr></thead><tbody><tr><td>৪।</td><td>সানশেড, প্লান্টার, কার্নিশ বা ছাদের বর্ধিতাংশ সমূহ (রাস্তা ব্যতীত অন্যান্য দিকে)</td><td>সেটব্যাকের অতিরিক্ত জায়গা ছাড়িয়া ইমারত নির্মাণ করিলে ইমারতের মূল অংশ হইতে সর্বোচ্চ ১.৫ মিটার পর্যন্ত; উল্লিখিত সীমার অধিক বৃদ্ধি করিলে অতিরিক্ত অংশ ভূমি আচ্ছাদনের পরিমাপের অন্তর্ভুক্ত হইবে</td><td>(১) কোনভাবেই সেটব্যাক স্থানের মধ্যে তৈরি করা যাইবে না; (২) কোনোরূপ বেষ্টনি দিয়া ঘেরা যাইবে না; (৩) বারান্দা বা ব্যালকনি হিসাবে ব্যবহার করা যাইবে না; (৪) রক্ষণাবেক্ষণ ব্যতীত অন্য কোনো কারণে প্রবেশযোগ্য হইবে না; (৫) প্লান্টার ব্যতীত ছাদের বর্ধিতাংশ তিন পার্শ্ব উন্মুক্ত থাকিতে হইবে।</td></tr><tr><td>৫।</td><td>ব্যালকনি</td><td>ব্যালকনির ক্ষেত্রফল ইমারতের রাস্তা সংলগ্ন প্রস্থের ৩০% এবং ১ মিটার ব্যালকনির প্রস্থ বিবেচনা করিলে যাহা হয় তাহার অধিক হইতে পারিবে না</td><td>(১) কোনভাবেই সেটব্যাক স্থানের মধ্যে তৈরি করা যাইবে না; (২) কেবল ইমারতের সকল রাস্তাভিমুখী দিকে করা যাইবে; (৩) ভূমি সমতল হইতে ৩.৫০ মিটারের নিচে হইবে না।</td></tr></tbody></table></div>\n<h6 class=\"h-lv6\">(২) উপ-বিধি (১) এ উল্লিখিত বাহিরের ভবন বা স্থাপনার অন্য কোনো অংশ বা উপাদানের ক্ষেত্রেই অনুরূপ ব্যতিক্রম প্রযোজ্য হইবে না এবং অতিরিক্ত আচ্ছাদনের পরিমাণ কোনোভাবেই সারণি ৩ এ উল্লিখিত অতিরিক্ত ভূমি আচ্ছাদনের পরিমাণ হইতে অধিক হইবে না।</h6>\n<h5 class=\"h-lv5\"><strong>৪৭। Floor Area Ratio (FAR) সূচক নির্ণয়।</strong></h5>\n<h6 class=\"h-lv6\">(১) আবাসিক ভূমির ব্যবহার, আবাসন ইউনিট ও মহাপরিকল্পনায় বর্ণিত অন্যান্য প্রণোদনাসহ ইমারতের ক্ষেত্রে নিম্নবর্ণিত ২ (দুই) টি FAR সূচক মান বিবেচনা করিতে হইবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) এলাকাভিত্তিক FAR; ও</h6>\n<h6 class=\"h-lv6\">(খ) রোডভিত্তিক FAR।</h6>\n<h6 class=\"h-lv6\">(২) আবেদনকৃত জমির অবস্থান যে জনঘনত্ব ব্লকে অবস্থিত তাহার এলাকাভিত্তিক FAR মহাপরিকল্পনায় উল্লিখিত মান অনুযায়ী নির্ধারিত হইবে।</h6>\n<h6 class=\"h-lv6\">(৩) এলাকাভিত্তিক FAR এবং রোডভিত্তিক FAR উভয়ের মধ্যে ক্ষুদ্রতরটি ভিত্তি FAR যাহা নিঃশর্তভাবে প্রযোজ্য হইবে এবং উভয়ের মধ্যে যাহা সর্বোচ্চ তাহা সর্বোচ্চ FAR হিসাবে বিবেচিত হইবে এবং সর্বোচ্চ FAR অর্জন করিতে হইলে প্রণোদনা গ্রহণ করিতে হইবে, তবে অনুমোদনযোগ্য FAR কোনোভাবেই সর্বোচ্চ FAR কে অতিক্রম করিবে না:</h6>\n<p>####### <strong>তবে শর্ত থাকে যে,</strong> ব্লকভিত্তিক উন্নয়ন, আরবান রিজেনারেশন এলাকা, এবং টিডিআর এর ক্ষেত্রে প্রণোদনাযুক্ত সাপেক্ষে সর্বোচ্চ FAR-কে ০.৫ পর্যন্ত অতিক্রম করা যাইবে।</p>\n<hr class=\"sep\">"},{"num":"13460","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第４７条（容積率（FAR）指標の算定）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>４</strong>　住宅建築物及び住宅の用途を含む複合建築物を除く、都市計画（マスタープラン）に基づき延べ面積の１００パーセントを非住宅の用途に供する建築物にあっては、２つの容積率（FAR）指標を考慮することに代え、道路幅員のみを基準として容積率を決定するものとする。</h6>\n<h6 class=\"h-lv6\"><strong>５</strong>　道路幅員別容積率は、次の表５に定めるところによる。</h6>\n<p>####### <strong>表５：敷地に接する現存道路の幅員に基づく許容容積率（FAR）指標</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>項番</th><th>建築物の分類</th><th>小分類</th><th>用途の類型</th><th>道路幅員に応じた許容容積率（FAR）指標</th><th></th><th></th><th></th><th></th><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td></td><td></td><td></td><td></td><td>1.8m以上 2.5m未満</td><td>2.5m以上 3.66m未満</td><td>3.66m以上 4.88m未満</td><td>4.88m以上</td><td>6.0m以上</td><td>9.0m以上</td><td>12.0m以上</td><td>18.0m以上</td><td>24.0m以上</td></tr><tr><td><strong>1</strong></td><td><strong>用途 A：住宅（中央ダッカ）</strong></td><td><strong>A1</strong></td><td>戸建住宅（一世帯）</td><td>1.25</td><td>1.5</td><td>1.75</td><td>2.0</td><td>2.5</td><td>3.0</td><td>3.2</td><td>3.75</td><td>4.25</td></tr><tr><td></td><td></td><td><strong>A2</strong></td><td>二世帯住宅</td><td>1.25</td><td>1.5</td><td>1.75</td><td>2.0</td><td>2.5</td><td>3.0</td><td>3.2</td><td>3.75</td><td>4.25</td></tr><tr><td></td><td></td><td><strong>A3</strong></td><td>共同住宅</td><td>1.25</td><td>1.75</td><td>2.00</td><td>2.25</td><td>3.25</td><td>3.4</td><td>4.0</td><td>4.25</td><td>4.75</td></tr><tr><td></td><td></td><td><strong>A4</strong></td><td>寄宿舎、ホステル</td><td>―</td><td>2.0</td><td>2.25</td><td>2.5</td><td>3.0</td><td>3.4</td><td>4.0</td><td>4.5</td><td>5.5</td></tr><tr><td></td><td></td><td><strong>A5</strong></td><td>ホテル等</td><td>―</td><td>―</td><td>―</td><td>―</td><td>4.0</td><td>4.5</td><td>5.0</td><td>6.0</td><td>7.0 *NR</td></tr><tr><td></td><td></td><td><strong>A6</strong></td><td>手頃な価格の住宅</td><td>1.5</td><td>2.0</td><td>2.25</td><td>2.5</td><td>3.0</td><td>3.25</td><td>3.75</td><td>4.0</td><td>4.25</td></tr><tr><td><strong>2</strong>< r><tr><td></td><td></td><td>J4</td><td>বিকিরন ধরনের বিপজ্জনক ভবন (Radiation hazard building)</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>৩.০</td><td>৪.০</td></tr><tr><td>১৩</td><td>K: বিবিধ</td><td>K1</td><td>বাণিজ্যিক পার্কিং</td><td>-</td><td>-</td><td>-</td><td>-</td><td>৩.৫</td><td>৪.০</td><td>৪.৫</td><td>৬.০০</td><td>৬.৫০</td></tr><tr><td></td><td></td><td>K2</td><td>ব্যক্তি মালিকানাধীন পার্কিং</td><td>-</td><td>-</td><td>১.০</td><td>১.৪</td><td>৩.৫</td><td>৪.০</td><td>৪.৫</td><td>৬.০০</td><td>৬.৫০</td></tr><tr><td></td><td></td><td>K3</td><td>মেরামত কারখানা</td><td>-</td><td>-</td><td>-</td><td>-</td><td>২.০</td><td>২.২৫</td><td>২.৫</td><td>৩.০</td><td>৪.০</td></tr><tr><td>১৪</td><td>L: ইউটিলিটি</td><td>L</td><td>ইউটিলিটি সার্ভিসসমূহ (পাম্প হাউজ, সাব-স্টেশন, আন্ডার-গ্রাউন্ড সাব স্টেশন ইত্যাদি)</td><td>নগর উন্নয়ন কমিটির পরামর্শক্রমে নির্ধারিত হইবে।</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr></tbody></table></div>\n<hr class=\"sep\">"},{"num":"13465","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<p>####### <strong>表５（承前）</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>項番</th><th>建築物の用途分類</th><th>小分類</th><th>用途の形態</th><th>道路幅員に応じた許容容積率（FAR）指標</th></tr></thead><tbody><tr><td><strong>15</strong></td><td><strong>用途 M：その他</strong></td><td><strong>M1</strong></td><td>特殊な構造物（記念碑、殉職者記念塔等）</td><td>都市開発委員会の助言に基づき決定するものとする。</td></tr><tr><td></td><td></td><td><strong>M2</strong></td><td>塔、ビルボード（看板）又はこれらに類する工作物</td><td>都市開発委員会の助言に基づき決定するものとする。</td></tr></tbody></table></div>\n<p>####### <strong>備考：</strong></p>\n<p>####### １　ホテル、モーテル、ゲストハウス、サービスアパートメント（用途分類 A5）は、詳細地域計画（2022-2035）に基づき<strong>商業用途</strong>としてみなされ、これに応じた手数料が適用される。ただし、容積率（FAR）の算定にあたっては<strong>住宅用途</strong>として扱い、法典（BNBC）に従った構造設計及びその他の設計を行わなければならない。</p>\n<p>####### ２　教育施設（用途分類 B）については、基準（敷地面積の３分の１以上を一画にまとめ、セットバック面積を除外した上で、短辺が長辺の２分の１以上であること）に従い、義務的に<strong>運動場（Playing field）</strong> を設置しなければならない。</p>\n<p>####### ３　寄宿舎、ドミトリー、ホステル（用途分類 A4）は、医療施設、教育施設、政府による建設プロジェクト、又は工業地域における土地利用の場合に適用される。</p>\n<p>####### ４　共同住宅（用途分類 A3）を除き、人口密度の算定において住戸数（Housing units）の制限は適用されない。</p>\n<p>####### ５　用途分類 A5、B、C、D、E 及び I の建築物において、幅員 12.0m 以上の道路に接し、かつ面積 1339㎡（20 Katha）以上の敷地である場合は、高さ <strong>12.0m 以下</strong>（パラペットを除く）の<strong>ポディウム（Podium）</strong>を建築することができる。当該ポディウムは容積率に算入されるものとする。ポディウムの建築面積は追加建蔽率を超えてはならず、またセットバック範囲内に建築してはならない。</p>\n<p>####### ６　住宅用途の敷地を除き、ホテル等（用途分類 A5）で面積 1エーカー（約4047㎡）以上のものについては、<strong>容積率の制限を受けない（NR）</strong>。</p>\n<p>####### ７　大学（B2）については 3エーカー以上、矯正施設（C4, C5）、病院（D1, D2）及び事務所（E1, E3）については 20 Katha（約1339㎡）以上の敷地である場合、<strong>容積率の制限を受けない（NR）</strong>。</p>\n<p>####### ８　住宅と他の用途が混在する場合、法典及びマスタープランに従い、計画承認書に用途の類型が明記されるものとする。</p>\n<p>####### <strong>**NR = 制限なし（Non-Restricted）</strong></p>\n<h6 class=\"h-lv6\"><strong>６</strong>　現存する道路の幅員が表に定める段階値の中間にある場合、容積率は当該道路幅員に基づき、次の段階の指標まで<strong>比例配分</strong>により算定されるものとする。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>####### <strong>সারণি-৫ (চলমান)</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>ক্রমিক নং</th><th>ইমারতের শ্রেণি</th><th>ইমারতের উপ-শ্রেণি</th><th>ব্যবহারের ধরন</th><th>রাস্তার প্রশস্ততা সংশ্লিষ্ট অনুমোদনযোগ্য FAR সূচক</th></tr></thead><tbody><tr><td>১৫</td><td>M: বিবিধ</td><td>M1</td><td>বিশেষ ধরনের কাঠামো (স্মৃতি সৌধ, শহীদ মিনার ইত্যাদি)</td><td>নগর উন্নয়ন কমিটির পরামর্শক্রমে নির্ধারিত হইবে।</td></tr><tr><td></td><td></td><td>M2</td><td>টাওয়ার, বিলবোর্ড বা এরূপ স্থাপনা</td><td>নগর উন্নয়ন কমিটির পরামর্শক্রমে নির্ধারিত হইবে।</td></tr></tbody></table></div>\n<p>####### <strong>দ্রষ্টব্য:</strong></p>\n<p>####### ১। A5 (হোটেল, মোটেল, গেস্ট হাউজ, সার্ভিস এপার্টমেন্ট) শ্রেণি বিশদ অঞ্চল পরিকল্পনা (২০২২-২০৩৫) অনুসারে বাণিজ্যিক ব্যবহার হিসাবে গণ্য হইবে এবং তদানুযায়ী ফি প্রযোজ্য হইবে, তবে আবাসিক হিসাবেই FAR বিবেচ্য হইবে এবং কোড অনুযায়ী কাঠামোগত ও অন্যান্য নকশা প্রণয়ন করিতে হইবে।</p>\n<p>####### ২। অকুপেন্সি টাইপ B এর জন্য আবশ্যিকভাবে মানদণ্ড (মোট জমির এক তৃতীয়াংশ একত্রে যাহা সেটব্যাকের জন্য সংরক্ষিত জমি ব্যতীত এবং প্রস্থ দৈর্ঘ্যের অর্ধেকের কম হইতে পারিবে না) অনুযায়ী খেলার মাঠ রাখিতে হইবে।</p>\n<p>####### ৩। A4 (মেস, বোর্ডিং, ডরমিটরি, ও হোস্টেল) শ্রেণির ইমারত স্বাস্থ্যসেবা, শিক্ষা প্রতিষ্ঠান, সরকারি উদ্যোগে নির্মিত, বা শিল্প অঞ্চল ভূমি ব্যবহারের ক্ষেত্রে প্রযোজ্য হইবে।</p>\n<p>####### ৪। A3 ব্যতীত অন্যান্য ক্ষেত্রে জনঘনত্ব নিরূপণে আবাসন ইউনিটের সংখ্যা প্রযোজ্য হইবে না।</p>\n<p>####### ৫। A5, B, C, D, E এবং I অকুপেন্সি শ্রেণির ইমারতের ক্ষেত্রে ১২ মিটার বা তদূর্ধ্ব প্রশস্ত রাস্তার পাশে ১৩৩৯ বর্গমিটার (২০ কাঠা) বা তদূর্ধ্ব প্লটে সর্বোচ্চ ১২ মিটার (প্যারাপেডের উচ্চতা ব্যতীত) পোডিয়াম নির্মাণ করা যাইবে যাহা FAR অন্তর্ভুক্ত হইবে। পোডিয়াম দ্বারা আচ্ছাদিত ভূমির পরিমাপ অতিরিক্ত ভূমি আচ্ছাদনের বেশি হইতে পারিবে না এবং পোডিয়াম সেটব্যাক স্পেসে নির্মাণ করা যাইবে না।</p>\n<p>####### ৬। আবাসিক ভূমি ব্যবহারের প্লট ব্যতীত A5 (হোটেল, মোটেল, গেস্ট হাউজ, সার্ভিস এপার্টমেন্ট) শ্রেণির ক্ষেত্রে এক একর বা ইহার অধিক জমির জন্য NR FAR গ্রহণ করা যাইবে।</p>\n<p>####### ৭। B2 (শিক্ষা প্রতিষ্ঠান) এর জন্য ৩ একর; C4, C5, D1, D2, E1, এবং E3 এর ক্ষেত্রে ২০ কাঠা বা ইহার অধিক জমির জন্য NR FAR গ্রহণ করা যাইবে।</p>\n<p>####### ৮। আবাসিকের সহিত অন্যান্য ব্যবহার মিশ্রণের ক্ষেত্রে কোড ও মহাপরিকল্পনা অনুসরণপূর্বক অকুপেন্সি টাইপ পরিকল্পনা অনুমোদন পত্রে উল্লেখ থাকিবে।</p>\n<p>####### **NR = Non-Restricted</p>\n<h6 class=\"h-lv6\">(৬) বিদ্যমান রাস্তাটি বর্ণিত ধাপ অপেক্ষা প্রশস্ত হইলে রাস্তার অতিরিক্ত প্রশস্ততার উপর ভিত্তি করিয়া FAR নির্ধারিত হইবে এবং উক্ত বৃদ্ধির পরিমাণ রাস্তার প্রশস্ততা অনুযায়ী পরবর্তী ধাপের FAR সূচক পর্যন্ত সমানুপাতিক হারে বৃদ্ধি পাইবে।</h6>\n<hr class=\"sep\">"},{"num":"13466","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第４７条（容積率（FAR）指標の算定）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>７</strong>　敷地に接する道路の幅員が２.５メートル以上６メートル未満である場合は、当該道路を６メートルまで拡幅しなければならない。また、６メートルを超える幅員の道路であっても、都市計画（マスタープラン）において拡幅の提案がある場合は、当該道路を拡幅しなければならない。</h6>\n<p>####### <strong>ただし、</strong> ６メートルを超える幅員の道路であってマスタープランに拡幅の提案がない場合、又は６メートル未満の道路であって何らかの理由により拡幅が不可能な場合は、現存する道路幅員に基づいて接道別容積率を決定するものとする。なお、一の道路区間（例：交差点Ａから交差点Ｂまで）に接する全ての敷地について、当局は一律に道路の拡幅を確保しなければならない。</p>\n<p>####### <strong>さらに、</strong> マスタープランに基づき高密居住区域に指定された旧ダッカ地区に限り、１.８メートル以上２.５メートル未満の道路であっても建築の承認を与えることができる。</p>\n<h6 class=\"h-lv6\"><strong>８</strong>　道路拡幅の提案がある場合、接道別容積率は、現存する道路に基づく容積率と拡幅予定の道路に基づく容積率の平均値（算術平均）とする。</h6>\n<h6 class=\"h-lv6\"><strong>９</strong>　第７項及び第８項の規定による道路拡幅に必要な土地については、道路の両側の敷地からそれぞれ必要量の半分を供出しなければならない。拡幅のために供出された土地は、地役権設定証書（Easement deed）により地方政府当局へ譲渡するものとする。</h6>\n<h6 class=\"h-lv6\"><strong>১০</strong>　一の敷地が複数の道路に接する場合、車両の出入口の位置に関わらず、最も幅員の広い道路を基準として現存幅員を算定するものとする。</h6>\n<h6 class=\"h-lv6\"><strong>১১</strong>　街区単位の開発（Block based development）については、詳細地区計画（DAP）に基づき、基礎容積率、最高容積率及び人口密度を再設定するものとする。</h6>\n<h6 class=\"h-lv6\"><strong>১২</strong>　基礎容積率と最高容積率の差が ０.১ 以下である場合、申請者は無条件で最高容積率の適用を受けることができる。</h6>\n<h6 class=\"h-lv6\"><strong>১৩</strong>　政府承認済みの計画区域において、政府の告示に基づきプロジェクト全体のレイアウトや用途が変更又は修正された場合、変更後の用途に応じた容積率を適用する。</h6>\n<h6 class=\"h-lv6\"><strong>১৪</strong>　敷地所有者の申請に基づき、政府承認済みの計画区域内において敷地の主たる用途が変更された場合、従前の用途と変更後の用途に係る容積率のうち、いずれか小さい方の数値を適用する。この場合において、交通影響評価（TIA）報告書の提出を必須とする。</h6>\n<h6 class=\"h-lv6\"><strong>১৫</strong>　計画承認書（Planning Permit）には、マスタープランに基づく当該敷地の許容住戸数及び容積率（FAR）指標を記載するものとする。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৪৭। Floor Area Ratio (FAR) সূচক নির্ণয় (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(৭) ২.৫ মিটার বা তদূর্ধ্ব কিন্তু ৬ মিটারের কম প্রশস্ত প্লট সংলগ্ন সকল রাস্তা ৬ মিটার পর্যন্ত প্রশস্ত করিতে হইবে এবং ৬ মিটারের অধিক প্রশস্ত প্লট সংলগ্ন কোনো রাস্তা মহাপরিকল্পনায় প্রশস্তকরণর প্রস্তাব থাকিলে উক্ত রাস্তাও প্রশস্ত করিতে হইবে:</h6>\n<p>####### <strong>তবে শর্ত থাকে যে</strong> ৬ মিটারের অধিক প্রশস্ত প্লট সংলগ্ন কোনো রাস্তা মহাপরিকল্পনায় প্রশস্তকরণর কোনো প্রস্তাব না থাকিলে এবং ৬ মিটারের কম প্রশস্ত কোনো রাস্তা কোনো কারণে প্রশস্তকরণ সম্ভব না হইলে রাস্তার বিদ্যমান প্রশস্ততার ভিত্তিতে রোডভিত্তিক FAR নির্ধারিত হইবে, তদুপরি একটি রাস্তার লিংক (উদাহরণস্বরূপ ইন্টারসেকশন A হইতে ইন্টারসেকশন B) এর সকল প্লট সংলগ্ন রাস্তা একইভাবে কর্তৃপক্ষ কর্তৃক প্রশস্তকরণ নিশ্চিত করিতে হইবে:</p>\n<p>####### <strong>আরও শর্ত থাকে যে,</strong> মহাপরিকল্পনা অনুযায়ী অধিক জনবসতি এলাকা কেবল পুরাতন ঢাকার জন্য অন্যূন ১.৮ মিটার হইতে ২.৫ মিটার কম রাস্তার জন্য অনুমোদন দেওয়া যাইবে।</p>\n<h6 class=\"h-lv6\">(৮) রাস্তা প্রশস্তকরণর প্রস্তাব থাকিলে বিদ্যমান রাস্তার FAR ও প্রস্তাবিত রাস্তার FAR এর গড় FAR সূচকই রোডভিত্তিক FAR হিসাবে বিবেচিত হইবে।</h6>\n<h6 class=\"h-lv6\">(৯) উপ-বিধি (৭) ও (৮) এ বর্ণিত উভয় ক্ষেত্রেই রাস্তা প্রশস্তকরণর জন্য যে পরিমাণ জমি প্রয়োজন হইবে রাস্তার উভয় পাশের প্লট হইতে উহার অর্ধেক জমি সমর্পণ করিতে হইবে, এবং প্রশস্তকরণর নিমিত্ত সমর্পিত জমি ইজমেন্ট দলিলের মাধ্যমে স্থানীয় সরকার কর্তৃপক্ষের নিকট হস্তান্তর করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(১০) কোনো প্লটে একাধিক রাস্তা থাকিলে প্লটে গাড়ি প্রবেশ ও বাহির যাহাই হোক না কেন, সর্বোচ্চ প্রশস্ত রাস্তার ভিত্তিতে বিদ্যমান প্রশস্ততা বিবেচনা করা হইবে।</h6>\n<h6 class=\"h-lv6\">(১১) ব্লকভিত্তিক উন্নয়নের ক্ষেত্রে বিশদ অঞ্চল পরিকল্পনা অনুযায়ী ভিত্তি FAR, সর্বোচ্চ FAR ও জনঘনত্ব পুনঃনির্ধারিত হইবে।</h6>\n<h6 class=\"h-lv6\">(১২) ভিত্তি FAR ও সর্বোচ্চ FAR এর পার্থক্য ০.১ বা উহার কম হইলে আবেদনকারী শর্তহীনভাবে সর্বোচ্চ FAR প্রাপ্ত হইবে।</h6>\n<h6 class=\"h-lv6\">(১৩) সরকার অনুমোদিত পরিকল্পিত এলাকায় সরকার কর্তৃক জারীকৃত প্রজ্ঞাপনের আলোকে প্রকল্পের সম্পূর্ণ লে-আউটের ব্যবহার পরিবর্তন বা সংশোধন করা হইলে পরিবর্তিত ব্যবহারের জন্য FAR প্রযোজ্য হইবে।</h6>\n<h6 class=\"h-lv6\">(১৪) কোনো প্লটের মালিকের আবেদনের প্রেক্ষিতে সরকার অনুমোদিত পরিকল্পিত এলাকায় প্লটের মূল ব্যবহার পরিবর্তিত হইলে মূল ব্যবহার ও পরিবর্তিত ব্যবহারের FAR এর মধ্যে ক্ষুদ্রতরটি প্রযোজ্য হইবে এবং এক্ষেত্রে Traffic Impact Assesment প্রতিবেদন আবশ্যক হইবে।</h6>\n<h6 class=\"h-lv6\">(১৫) পরিকল্পনা অনুমোদনপত্রে মহাপরিকল্পনা অনুযায়ী প্রস্তাবিত প্লটের বিবেচ্য আবাসিক ইউনিট এবং FAR সূচক উল্লেখ থাকিবে।</h6>\n<hr class=\"sep\">"},{"num":"13467","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第４８条（延べ面積の算定（Determination of Total Floor Area））</strong></h5>\n<h6 class=\"h-lv6\"><strong>১</strong>　敷地面積の算定にあたっては、自己の所有する道路を含まないものとする。すなわち、容積率（FAR）指標に基づく建築可能な延べ面積を算定する場合、敷地面積に当該道路の面積を加算してはならない。</h6>\n<h6 class=\"h-lv6\"><strong>২</strong>　適用がある一又は複数の全ての道路の拡幅のために土地を供出した後の減歩された敷地面積に基づいて、敷地面積を算定しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>৩</strong>　角地の隅切り（ কিনারা সরলীকরণ ）を行う場合に限り、供出された土地を含む建築前の敷地面積に基づいて、延べ面積を算定することができる。</h6>\n<h6 class=\"h-lv6\"><strong>৪</strong>　計画承認書に基づき道路拡幅のために地役権設定証書（Easement deed）により提供された土地の面積の３倍に相当する床面積を、割増床面積（Additional floor area compensation）として取得することができる。当該床面積は、容積率により算出された床面積に加算して延べ面積を算定するものとし、複数の道路がある場合は各道路への提供面積について本規定を適用する。</h6>\n<h6 class=\"h-lv6\"><strong>৫</strong>　道路拡幅のために従来の道路境界線から敷地を後退させる場合、前項に規定する割増床面積の規定を適用する。</h6>\n<h6 class=\"h-lv6\"><strong>৬</strong>　容積率に基づき床面積を算定する場合、室の最高高さは、仕上げられた床面から天井（屋根の下面）まで４.২৫メートルを上限とする。傾斜屋根の場合は、平均の最高高さを４.২৫メートルとする。</h6>\n<h6 class=\"h-lv6\"><strong>৭</strong>　高さに関する他の制限がない場合、容積率に基づく床面積の算定において、室の最高高さを４.২৫メートルから７.৬৫メートルまで引き上げることができる。当該室の床面積が建築物の全床面積の５０パーセント以内であれば、容積率の加算（FAR PENALTY）を要しない。ただし、当該室の面積が全床面積の５０パーセントを超える場合、又は室の高さが７.৬৫メートルを超える場合には、当該超過部分の面積と同等の面積を割増床面積として算入しなければならない。なお、用途分類 A-5、B、D、E1、F、Lの建築物の１階部分、並びに分類 G、I、K、H及びJの建築物の全ての階においては、本項の高さに関する制限は適用しない。</h6>\n<h6 class=\"h-lv6\"><strong>৮</strong>　床面積の算定において、中二階（Mezzanine floor）の面積は加算しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>৯</strong>　道路拡幅のための土地提供後の残存敷地に基づいて、建蔽率（Ground Coverage）及び建築可能な延べ面積を算定するものとする。複合用途（Mixed occupancy）の場合は、マスタープランに定める床面積の割合に従って、各用途ごとの床面積を算定しなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৪৮। মোট মেঝের ক্ষেত্রফল নির্ণয়।</strong>—(১) জমির পরিমাণ নির্ধারণের ক্ষেত্রে নিজস্ব মালিকানাধীন রাস্তা অন্তর্ভুক্ত হইবে না অর্থাৎ FAR সূচক অনুযায়ী নির্মাণযোগ্য মোট ক্ষেত্রফল নির্ধারণের ক্ষেত্রে জমির ক্ষেত্রফলের সহিত উক্ত রাস্তার ক্ষেত্রফলের পরিমাণ যোগ করা যাইবে না।</h5>\n<h6 class=\"h-lv6\">(২) প্রযোজ্য এক বা একাধিক সকল রাস্তা প্রশস্তকরণর জন্য জমির প্রযোজ্য অংশ হস্তান্তরের পর হ্রাসকৃত প্লটের আকারের উপর ভিত্তি করিয়া প্লটের জমির পরিমাণ হিসাব করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৩) কেবল কিনারা সরলীকরণের ক্ষেত্রে সমর্পিত জমিসহ অর্থাৎ মূল জমির পরিমাণের উপর ভিত্তি করিয়া মোট মেঝের ক্ষেত্রফল নিরূপণ করা যাইবে।</h6>\n<h6 class=\"h-lv6\">(৪) পরিকল্পনা অনুমোদনপত্র অনুযায়ী রাস্তা প্রশস্তকরণর জন্য সংশ্লিষ্ট প্লটের যে ক্ষেত্রফলের জমি ইজমেন্ট দলিলের মাধ্যমে হস্তান্তর করিতে হইবে সেই ক্ষেত্রফলের ৩ (তিন) গুণ সমপরিমাণ মেঝের ক্ষেত্রফল অতিরিক্ত ক্ষেত্রফল ক্ষতিপূরণ হিসাবে পাওয়া যাইবে এবং উক্ত ক্ষেত্রফল প্রাপ্য FAR অনুযায়ী নির্ধারিত মেঝের ক্ষেত্রফলের সহিত যোগ করিয়া মোট মেঝের ক্ষেত্রফল নির্ণয় করিতে হইবে এবং একাধিক রাস্তার ক্ষেত্রে প্রত্যেক রাস্তার জন্য সমর্পিত জমির পরিমাণের ক্ষেত্রেও উক্ত নির্দেশনা প্রযোজ্য হইবে।</h6>\n<h6 class=\"h-lv6\">(৫) রাস্তার প্রশস্তকরণর জন্য কোনো প্লটের প্রশস্তকরণর পূর্বের রাস্তার সীমারেখা হইতে প্লটের জায়গা ছাড়িতে হইলে উপ-বিধি (৪) এ উল্লিখিত অতিরিক্ত ক্ষেত্রফল ক্ষতিপূরণ প্রযোজ্য হইবে।</h6>\n<h6 class=\"h-lv6\">(৬) FAR সূচক অনুযায়ী মেঝের ক্ষেত্রফল নির্ণয়ের ক্ষেত্রে কক্ষের সর্বোচ্চ উচ্চতা ৪.২৫ মিটার হইতে পারিবে, যাহা ফিনিসড মেঝের উপরিতল হইতে ছাদের নিচ পর্যন্ত ধরা হইবে এবং ঢালু ছাদের ক্ষেত্রে সর্বোচ্চ গড় উচ্চতা ৪.২৫ মিটার হইতে পারিবে।</h6>\n<h6 class=\"h-lv6\">(৭) উচ্চতা সংক্রান্ত অন্য কোনো বাধ্যবাধকতা না থাকিলে FAR সূচক অনুযায়ী মেঝের ক্ষেত্রফল নির্ণয়ের ক্ষেত্রে কক্ষের উচ্চতা ৪.২৫ মিটার হইতে ৭.৬৫ মিটার পর্যন্ত উন্নীত করা যাইবে এবং উক্ত কক্ষের মেঝের ক্ষেত্রফল ইমারতের মোট মেঝের ক্ষেত্রফলের ৫০% এর মধ্যে সীমাবদ্ধ থাকিলে কোনো অতিরিক্ত FAR ভুক্ত ক্ষেত্রফল যোগ (FAR PENALTY) করিতে হইবে না, কিন্তু মেঝের ক্ষেত্রফল ৫০% এলাকার অতিরিক্ত বা কক্ষের উচ্চতা ৭.৬৫ মিটারের ঊর্ধ্বে হইলে অনুরূপ নির্দিষ্ট মেঝের ক্ষেত্রফলের সহিত সমপরিমাণ ক্ষেত্রফল অতিরিক্ত হিসাবে সংযুক্ত হইবে, তবে ইহা A-5, B, D, E1, F, L শ্রেণির ইমারতের শুধু নিচতলা এবং G, I, K, H ও J শ্রেণির ইমারতের সকল ফ্লোরের ক্ষেত্রে ফ্লোর উচ্চতা সংক্রান্ত সীমাবদ্ধতা প্রযোজ্য হইবে না।</h6>\n<h6 class=\"h-lv6\">(৮) ফ্লোর এরিয়া হিসাবের ক্ষেত্রে মধ্যবর্তী মেজানাইন তলার ক্ষেত্রফল যোগ হইবে।</h6>\n<h6 class=\"h-lv6\">(৯) রাস্তা প্রশস্তকরণর জমি হস্তান্তরের পরে অবশিষ্ট জমির উপর ভিত্তি করিয়া ভূমি আচ্ছাদন এবং নির্মাণযোগ্য ক্ষেত্রফল নিরূপিত হইবে এবং মিশ্র অকুপেন্সির ক্ষেত্রে মহাপরিকল্পনায় উল্লিখিত প্রাপ্ত মেঝের ক্ষেত্রফলের অনুপাত অনুসারে প্রতিটি অকুপেন্সি টাইপের ক্ষেত্রফলের পরিমাপ নিরূপিত হইবে।</h6>\n<hr class=\"sep\">"},{"num":"13468","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第４９条（延べ面積に算入しない部分（Additional floor area excluded from total floor area））</strong></h5>\n<h6 class=\"h-lv6\"><strong>ক</strong>　階段の最上階の部分の面積であって、基準階（Typical floor）の階段の面積を超えないもの。</h6>\n<h6 class=\"h-lv6\"><strong>খ</strong>　エレベーターの機械室であって、基準階のエレベーター及びロビーの合計面積を超えないもの。</h6>\n<h6 class=\"h-lv6\"><strong>গ</strong>　床面積を算定する場合において、専ら駐車場（Parking）として供される地階（Basement）又はその他の階の床面積の３分の１を限度として、電気機械設備室、守衛室（Security booth）、受付（Reception booth）、貯水槽、ポンプ室、標準的な階段及びエレベーターの部分。</h6>\n<h6 class=\"h-lv6\"><strong>ঘ</strong>　屋上において、少なくとも二面が開放され、かつ、屋根面積の１０％を限度とする被覆部分、所定の駐車場の面積に相当する面積（最小１２㎡）、敷地に接する道路の幅員が６メートル以上の場合は最小駐車場の２倍の面積、６メートル未満の場合は最小駐車場の１.５倍の面積に相当する地下貯水槽及び高架水槽。</h6>\n<p>####### <strong>ただし、</strong> 階段室及びエレベーター機械室の上部に高架水槽を設置することができるものとし、その高さは、使用可能な最終階の屋根の設計床高（Finished floor level）から５メートルを限度とする。</p>\n<h6 class=\"h-lv6\"><strong>ঙ</strong>　建築物のための電気設備室、機械設備室及び廃棄物集積所。構造設計一級建築士の証明がある場合は、地階又は任意の階に配置することができる。</h6>\n<p>####### <strong>ただし、</strong> 変電所及び変圧器の設置については、関連当局の指示及び法典（Code）に従わなければならない。また、集中ガス供給室（Reticulated gas chamber）は地階に配置してはならない。</p>\n<h6 class=\"h-lv6\"><strong>চ</strong>　駐車場に附随する便所及び運転手控室であって、その面積が当該駐車場の面積の１０％を超えないもの。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৪৯। মোট মেঝের ক্ষেত্রফলের আওতাবহির্ভূত অতিরিক্ত ফ্লোর এরিয়া।</strong>—অনুমোদনযোগ্য FAR সূচক অনুযায়ী ফ্লোর এরিয়া নির্ধারণের ক্ষেত্রে ইমারতের নিম্নবর্ণিত অংশসমূহ বিবেচনায় নেওয়া যাইবে না, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) সিঁড়ির সর্বোচ্চ তলার ক্ষেত্রফল যাহা টিপিক্যাল তলার সিঁড়ির ক্ষেত্রফল অপেক্ষা অধিক নহে;</h6>\n<h6 class=\"h-lv6\">(খ) লিফটের যন্ত্রকক্ষ, যাহা টিপিক্যাল তলার লিফট এবং লবির সম্মিলিত ক্ষেত্রফল অপেক্ষা বড় নহে;</h6>\n<h6 class=\"h-lv6\">(গ) মেঝের ক্ষেত্রফল হিসাব করিবার ক্ষেত্রে কেবল পার্কিং হিসাবে ব্যবহৃত বেজমেন্ট বা অন্য কোনো ফ্লোরের সর্বোচ্চ এক তৃতীয়াংশ পর্যন্ত এরিয়া কেবল ইলেকট্রোমেকানিক্যাল রুম, সিকিউরিটি বুথ, রিসেপশন বুথ, পানির জলাধার, পাম্প হাউস, টিপিক্যাল সিঁড়ি ও লিফটের অংশসমূহ মূল ক্ষেত্রফলের অংশ হিসাবে বিবেচিত হইবে না;</h6>\n<h6 class=\"h-lv6\">(ঘ) ছাদের উপর ন্যূনতম দুই দিক উন্মুক্ত এবং ছাদের আয়তনের সর্বোচ্চ ১০% পর্যন্ত আচ্ছাদন, নির্ধারিত পার্কিংয়ের সমপরিমাণ ক্ষেত্রফল (ন্যূনতম ১২ ব:মি:), প্লট সংলগ্ন বিদ্যমান রাস্তার প্রস্থ ৬ মিটার বা তাহার অধিক হইলে ন্যূনতম পার্কিংয়ের দুইগুণ ক্ষেত্রফল এবং ইহার কম হইলে ন্যূনতম পার্কিংয়ের দেড়গুণ ক্ষেত্রফল ভূগর্ভস্থ এবং ওভারহেড জলাধার (যদি থাকে):</h6>\n<p>####### <strong>তবে শর্ত থাকে যে,</strong> সিঁড়ি এবং লিফটের যন্ত্রকক্ষের উপর ওভারহেড জলাধার হইতে পারিবে এবং ব্যবহারযোগ্য সর্বশেষ তলের ছাদের ফিনিসড লেভেলের উপর হইতে সর্বোচ্চ উচ্চতা ৫ মিটারের মধ্যে সীমাবদ্ধ থাকিতে হইবে;</p>\n<h6 class=\"h-lv6\">(ঙ) ইমারতের জন্য প্রযোজ্য বৈদ্যুতিক, যান্ত্রিক কক্ষসমূহ ও বর্জ্য সংগ্রহের নির্ধারিত স্থান, যেখানে রেটিকুলেটেড গ্যাস চেম্বার, ETP (Effluent Treatment Plant), WTP (Water Treatment Plant), স্যানিটারি পাইপ ও পাম্পসমূহের সংস্থান, সাব-স্টেশন, জেনারেটর, ট্রান্সফরমার, মিটাররুম, BMS ও এয়ার কন্ডিশন প্ল্যান্ট এর সংস্থান করা যাইবে; এই সকল কক্ষ বেজমেন্ট বা কাঠামো প্রকৌশলীর প্রত্যয়ন সাপেক্ষে যে-কোনো ফ্লোরে সংস্থান করা যাইবে:</h6>\n<p>####### <strong>তবে শর্ত থাকে যে,</strong> সাব-স্টেশন ও ট্রান্সফরমার সংস্থানের ক্ষেত্রে সংশ্লিষ্ট কর্তৃপক্ষের নির্দেশনা এবং কোড অনুসরণ করিতে হইবে এবং রেটিকুলেটেড গ্যাস চেম্বার বেজমেন্টে সংস্থান করা যাইবে না;</p>\n<h6 class=\"h-lv6\">(চ) গাড়ি পার্কিং এর সুবিধা থাকিলে পার্কিং এর টয়লেট সুবিধাসহ গাড়িচালকদের অপেক্ষার স্থান, যাহার ক্ষেত্রফল প্রদত্ত পার্কিং এরিয়ার ১০% এর অধিক নহে;</h6>\n<hr class=\"sep\">"},{"num":"13469","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第４条（延べ面積に算入しない部分）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>ছ</strong>　１階に設けられた屋根のある遊び場、植栽（Landscape）を施した開放空間、及び床面積が最大５.０平方メートルである１階の守衛室。</h6>\n<h6 class=\"h-lv6\"><strong>জ</strong>　教育施設に限り、１階に設けられた開放空間であって、屋根を有する場合でも側面が開放され、壁によって囲まれていないもの。</h6>\n<h6 class=\"h-lv6\"><strong>ঝ</strong>　空に向かって開放されたテラス、屋根及びパーゴラ。</h6>\n<h6 class=\"h-lv6\"><strong>ঞ</strong>　ロフト（Loft）部分であって、居室（Habitable room）に変更することができないもの。</h6>\n<h6 class=\"h-lv6\"><strong>ট</strong>　採光及び換気のための吹き抜け（シャフト）であって、その有効面積を縮小することができないもの。</h6>\n<h6 class=\"h-lv6\"><strong>ঠ</strong>　義務的に設置される避難階段。ただし、階段が１つのみ設置されている建築物においては、避難階段の仕様であっても本号の適用はない。</h6>\n<h6 class=\"h-lv6\"><strong>ড</strong>　雨水利用又は太陽光エネルギー利用のための工作物であって、他の目的に使用されないもの。</h6>\n<h6 class=\"h-lv6\"><strong>ঢ</strong>　外部に突出した吊り下げ式のベランダであって、その面積が当該階の床面積の２.５パーセント以下であるもの。ただし、義務的空地内に突出してはならない。</h6>\n<h6 class=\"h-lv6\"><strong>ণ</strong>　駐車場への出入りのためのスロープ、車路、自動車用昇降機の占める部分及び階段。</h6>\n<h6 class=\"h-lv6\"><strong>ত</strong>　床面積が最大１５平方メートルである火災安全管理室。</h6>\n<h6 class=\"h-lv6\"><strong>থ</strong>　道路に面する建築物の前面に設けられた前面ベランダの面積。</h6>\n<h5 class=\"h-lv5\"><strong>第５０条（建築物又は工作物の高さ）</strong></h5>\n<h6 class=\"h-lv6\"><strong>১</strong>　空港、マイクロ波基地局、重要施設等の近隣区域においては、建築物の高さは関連当局によって制限される。</h6>\n<h6 class=\"h-lv6\"><strong>২</strong>　河川の沿岸、史跡及び特別に重要な区域においては、所管行政庁は建築物の高さに制限を課すことができる。</h6>\n<h6 class=\"h-lv6\"><strong>৩</strong>　建築物の高さが４５.７０メートル以上となる場合は、頂部に赤色の航空障害灯を設置しなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৪৯। মোট মেঝের ক্ষেত্রফলের আওতাবহির্ভূত অতিরিক্ত ফ্লোর এরিয়া (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(ছ) প্রযোজ্য ক্ষেত্রে, ভবনের নিচতলার আচ্ছাদিত খেলার জায়গা, Landscape সংবলিত উন্মুক্ত জায়গা এবং সর্বোচ্চ ৫.০ বর্গমিটার ক্ষেত্রফল বিশিষ্ট নিচতলার নিরাপত্তা পোষ্ট;</h6>\n<h6 class=\"h-lv6\">(জ) শুধু শিক্ষা প্রতিষ্ঠানের নিচ তলায় উন্মুক্ত স্থান যাহার ছাদ থাকিলেও পার্শ্ব খোলা থাকিবে এবং কোনোরূপ দেয়াল দ্বারা আবদ্ধ হইতে পারিবে না;</h6>\n<h6 class=\"h-lv6\">(ঝ) আকাশের দিকে উন্মুক্ত টেরেস, ছাদ এবং পারগোলা;</h6>\n<h6 class=\"h-lv6\">(ঞ) কাড় (Loft) এলাকা যাহা কক্ষ হিসাবে পরিবর্তন করা যাইবে না;</h6>\n<h6 class=\"h-lv6\">(ট) আলো এবং বাতাস কূপ যাহা সংকুচিত করা যাইবে না;</h6>\n<h6 class=\"h-lv6\">(ঠ) আবশ্যকীয় অগ্নিনিরাপদ সিঁড়ি, তবে যে ইমারতে মাত্র একটি সিঁড়ি রহিয়াছে তাহা একইসঙ্গে অগ্নিনিরাপদ সিঁড়ি হিসাবে ব্যবহৃত হইলেও এই সুবিধা পাইবে না;</h6>\n<h6 class=\"h-lv6\">(ড) পানি ও সৌর শক্তি সংগ্রহের জন্য যেকোনো কাঠামো, যাহা অন্য কোনো উদ্দেশ্যে ব্যবহৃত হইবে না;</h6>\n<h6 class=\"h-lv6\">(ঢ) ইমারতের বাহিরের দিকে ঝুলন্ত ব্যালকনি যাহার ক্ষেত্রফল সংশ্লিষ্ট মেঝের ক্ষেত্রফলের ২.৫% পর্যন্ত হইবে, তবে এই ব্যালকনি আবশ্যিক অনাচ্ছাদিত স্থানের মধ্যে বর্ধিত হইতে পারিবে না;</h6>\n<h6 class=\"h-lv6\">(ণ) পার্কিং ও উহার আনুষঙ্গিক ব্যবহার হিসাবে বেজমেন্ট বা অন্যান্য ফ্লোর ব্যবহৃত হইলে বেজমেন্টে বা অন্যান্য ফ্লোরে প্রবেশ ও বাহির হওয়ার জন্য সংস্থানকৃত র‍্যাম্প, ড্রাইভওয়ে, কার লিফট এলাকার অংশ ও সিঁড়িসমূহ;</h6>\n<h6 class=\"h-lv6\">(ত) প্রযোজ্য ক্ষেত্রে, সর্বোচ্চ ১৫ বর্গমিটার ক্ষেত্রফল বিশিষ্ট একটি অগ্নি-নিরাপত্তা বিষয়ক কন্ট্রোল কক্ষ অতিরিক্ত ভূমি আচ্ছাদনে নির্মাণ করা যাইবে তবে আবশ্যিক অনাচ্ছাদিত স্থানের মধ্যে বর্ধিত হইতে পারিবে না;</h6>\n<h6 class=\"h-lv6\">(থ) ইমারতের রাস্তার দিকে সামনের ব্যালকনিসমূহের (সম্মুখ ব্যালকনি) ক্ষেত্রফল যাহা মেঝের ক্ষেত্রফলের আওতাভুক্ত নহে।</h6>\n<h5 class=\"h-lv5\"><strong>৫০। ইমারত বা অবকাঠামোর উচ্চতা।</strong></h5>\n<h6 class=\"h-lv6\">(১) বিমানবন্দর, মাইক্রোওয়েভ স্টেশন, টেলিযোগাযোগ স্টেশন, গুরুত্বপূর্ণ স্থাপনা অথবা অন্যান্য বিশেষ কাঠামোর নিকটবর্তী এলাকার ক্ষেত্রে ইমারতের উচ্চতা সংশ্লিষ্ট কর্তৃপক্ষ কর্তৃক নির্ধারিত থাকিবে।</h6>\n<h6 class=\"h-lv6\">(২) নদীর ধার, বৃহৎ জলাশয়, বাগান, ঐতিহাসিক এবং বিশেষ গুরুত্বপূর্ণ এলাকায় অবস্থার পরিপ্রেক্ষিতে ইমারতের উচ্চতার উপর কর্তৃপক্ষ বিধিনিষেধ আরোপ করিতে পারিবে।</h6>\n<h6 class=\"h-lv6\">(৩) কোনো ইমারত ৪৫.৭০ মিটার বা তদূর্ধ্ব উচ্চতার হইলে ইমারতের শীর্ষে লাল নিরাপত্তা বাতি স্থাপন করিতে হইবে।</h6>\n<hr class=\"sep\">"},{"num":"13470","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第５０条（建築物の高さ等）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>৪</strong>　人口密度の決定にあたっては、詳細地区計画（DAP）の指示を最終的なものとみなす。</h6>\n<h5 class=\"h-lv5\"><strong>第５１条（敷地の分割）</strong></h5>\n<h6 class=\"h-lv6\"><strong>১</strong>　更地又は建築物の存する敷地は分割することができる。各敷地について道路及び車両の通行可能性を確保しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>২</strong>　義務的空地は建築開発の不可分の一部であり、個別に分割し、譲渡し、又は開発の用に供してはならない。</h6>\n<h6 class=\"h-lv6\"><strong>৩</strong>　分割により新たに生じた敷地において既存の建築物を保存する場合、当該建築物の建築時の規則に基づく後退距離（セットバック）等を維持しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>৪</strong>　計画的な住宅地開発区域における敷地の分割にあっては、専用道路の幅員は最小３.６５メートル以上とし、駐車台数は最大２０台までとする。２０台を超える場合は幅員４.８メートル以上を要する。</h6>\n<p>####### <strong>ただし、</strong> 本規則の施行前に承認・登記されている分割については、２.５メートル以上の幅員があれば駐車場を２０台まで設置できる。</p>\n<h6 class=\"h-lv6\"><strong>৫</strong>　専用道路の延長が３３メートル以下の場合は、容積率（FAR）指標の算定にあたって接続する主道路の幅員を基準とすることができる。</h6>\n<h6 class=\"h-lv6\"><strong>৬</strong>　専用道路の延長が３３メートルを超える場合は、当該敷地に接する道路の幅員に基づいて容積率指標を適用するものとする。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h6 class=\"h-lv6\">(৪) যেকোনো এলাকার জনঘনত্ব নির্ধারণে অনুমোদিত মহাপরিকল্পনার (বিশদ অঞ্চল পরিকল্পনা) নির্দেশনা চূড়ান্ত হিসাবে বিবেচ্য হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>৫১। প্লট বিভাজন।</strong>—(১) কোনো খালি বা ইমারতসহ প্লট দুই বা ততোধিক প্লটে বিভক্ত করা যাইবে এবং এইরূপ বিভক্ত করিবার ক্ষেত্রে, প্রতিটি উপ-প্লটের জন্য রাস্তা এবং যানবাহন প্রবেশগম্যতা নিশ্চিত করিতে হইবে।</h5>\n<h6 class=\"h-lv6\">(২) প্লট বিভাজনের ক্ষেত্রে আবশ্যিক অনাচ্ছাদিত স্থান ইমারত উন্নয়নের অবিভাজ্য অংশ এবং ইমারত অনুমোদনের বিধান হিসাবে বিবেচিত হইবে এবং পৃথকভাবে বিভক্তি, হস্তান্তর বা উন্নয়নযোগ্য হইবে না।</h6>\n<h6 class=\"h-lv6\">(৩) প্লট বিভক্তিকরণের ফলে নূতনভাবে সৃষ্ট উপ-প্লটসমূহে বিদ্যমান ইমারত বা ইমারতসমূহ যদি অপসারণ না করিয়া সংরক্ষণ করা হয় তাহা হইলে যে বিধিমালা বা বিধি অনুসরণপূর্বক ইমারত বা ইমারতসমূহ অনুমোদন ও নির্মাণ করা হইয়েছিল, সেই বিধিমালা বা বিধি অনুসরণপূর্বক প্রয়োজনীয় সেটব্যাক এবং অন্যান্য শর্তাবলি যেমন- ভবনের উচ্চতা, প্রযোজ্য ক্ষেত্রে FAR ভুক্ত মেঝের ক্ষেত্রফল, সর্বোচ্চ ভূমি আচ্ছাদন, ইত্যাদি বজায় রাখিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৪) সরকার কর্তৃক অনুমোদিত আবাসিক প্রকল্পের অভ্যন্তরে আবাসিক প্লট বিভক্তিকরণের ক্ষেত্রে, শুধু একটি উপ-প্লটের জন্য ব্যক্তিগত রাস্তার প্রশস্ততা ন্যূনতম ৩.৬৫ মিটার হইতে হইবে এবং সর্বোচ্চ ২০টি পর্যন্ত সাধারণ গাড়ি পার্কিং এর ব্যবস্থা করা যাইবে, এবং পার্কিং এর সংখ্যা ২০ এর অধিক করিতে হইলে ব্যক্তিগত রাস্তার প্রশস্ততা ন্যূনতম ৪.৮ মিটার হইতে হইবে:</h6>\n<p>####### <strong>তবে শর্ত থাকে যে,</strong> এই বিধিমালা জারির পূর্বে এই ধরনের আবাসিক প্লটসমূহ উপ-প্লট বিভক্তিকরণের ক্ষেত্রে ব্যক্তিগত রাস্তার প্রশস্ততা যদি ৩.৬৫ মিটার এর কম কিন্তু ২.৫ মিটার বা তাহার অধিক হয় এবং অনুরূপ বিভাজন সংশ্লিষ্ট সংস্থা অথবা, প্রযোজ্য ক্ষেত্রে, মন্ত্রণালয় কর্তৃক অনুমোদিত বা রেজিস্ট্রিকৃত থাকিলে বিভাজিত উপ-প্লটের জন্য ব্যক্তিগত রাস্তার ক্ষেত্রে উল্লিখিত ন্যূনতম প্রশস্ততা প্রযোজ্য হইবে না এবং উহাতে সর্বোচ্চ ২০টি পর্যন্ত গাড়ি পার্কিং এর সংস্থান করা যাইবে।</p>\n<h6 class=\"h-lv6\">(৫) উপ-বিধি (৪) এ উল্লিখিত আবাসিক উপ-প্লটের ক্ষেত্রে ব্যক্তিগত রাস্তা, যাহা এজমালি নহে, ৩৩ মিটারের অধিক দীর্ঘ না হইলে উক্ত রোডের FAR সূচক নির্ধারণের জন্য মূল রাস্তার প্রশস্ততা বিবেচনায় নিতে হইবে; এইরূপ ক্ষেত্রে নিজস্ব সংযোগকারী রাস্তার ক্ষেত্রফল, FAR সূচক অনুযায়ী FAR ভুক্ত মোট নির্মাণ ক্ষেত্রফল নির্ধারণ ও ভূমি আচ্ছাদনের পরিমাণ নির্ধারণের ক্ষেত্রে বিবেচ্য হইবে না এবং সংযোগ রাস্তার জন্য সমর্পিত জমির পরিমাণ FAR প্রণোদনার ক্ষেত্রে প্রযোজ্য হইবে না।</h6>\n<h6 class=\"h-lv6\">(৬) উপ-বিধি (৪) এ উল্লিখিত আবাসিক উপ-প্লটের ক্ষেত্রে রাস্তা ৩৩ মিটারের অধিক দীর্ঘ হইলে উপ-প্লট সংলগ্ন রাস্তার প্রশস্ততা বিবেচনায় অনুমোদনযোগ্য FAR সূচক প্রযোজ্য হইবে এবং মোট নির্মাণ ক্ষেত্রফল ও ভূমি আচ্ছাদনের পরিমাণ নির্ধারণের ক্ষেত্রে সংযোগকারী রাস্তার ক্ষেত্রফল বিবেচ্য হইবে না।</h6>\n<hr class=\"sep\">"},{"num":"13471","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第５１条（敷地の分割）（承前）</strong></h5>\n<h6 class=\"h-lv6\">７　専ら居住の用以外の用途に供する敷地を分割する場合にあっては、接する道路の幅員は最小６メートル以上としなければならない。</h6>\n<h6 class=\"h-lv6\">８　政府又は民間による計画
