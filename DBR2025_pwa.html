ctrical wires and other utilities）："},{"page":"13492","level":3,"jp":"第７章　雑則（Miscellaneous）","bn":"সপ্তম অধ্যায়"},{"page":"13492","level":4,"jp":"(চ) 防火安全（Fire safety）：","bn":"৬২। ল্যান্ডস্কেপিং এবং পার্ক।—"},{"page":"13495","level":4,"jp":"第６４条（洪水多発区域、湿地近傍及び丘陵地帯における開発及び建築）","bn":"৬৪। বন্যাপ্রবণ অঞ্চল, জলাভূমির নিকটস্থ এবং পাহাড়ি এলাকায় উন্নয়ন ও নির্মাণ।—"},{"page":"13496","level":4,"jp":"第６５条（特別規制（Special Controls））","bn":"৬৫। বিশেষ নিয়ন্ত্রণ।—"},{"page":"13497","level":4,"jp":"第６６条（障害者等を含むユニバーサルアクセシビリティに関する特別規定）","bn":"৬৬। প্রতিবন্ধীসহ সার্বজনীনগম্যতা সম্পর্কিত বিশেষ বিধান।—"},{"page":"13498","level":4,"jp":"第６８条（水の再利用（Water Reuse））","bn":"৬৮। পানির পুনঃব্যবহার।—"},{"page":"13499","level":4,"jp":"第７３条（除却）","bn":"৭৩। অপসারণ।—"},{"page":"13501","level":4,"jp":"第３条（避難出口の配置（Location of Exit））","bn":"৩. Exit এর অবস্থান:"},{"page":"13502","level":4,"jp":"第５条（避難施設の規模（Size of Exit））","bn":"৫. Exit এর আকার:"},{"page":"13503","level":4,"jp":"第６条（廊下及び通路（Corridor and Passage））","bn":"৬. করিডোর ও প্যাসেজ:"},{"page":"13504","level":4,"jp":"第７条 客席内通路（Assembly Aisles）","bn":"৭। এসেম্বলি আইলস্ (Assembly Aisles):"},{"page":"13505","level":4,"jp":"第９条 階段（Stairs）","bn":"৯. সিঁড়ি:"},{"page":"13507","level":4,"jp":"第１０条 スロープ（勾配路）","bn":"১০. র‍্যাম্প:"},{"page":"13508","level":4,"jp":"第１１条 水平避難出口（Horizontal Exit）","bn":"১১. আনুভূমিক Exit:"},{"page":"13509","level":4,"jp":"第１３条 歩行距離（Travel Distance）","bn":"১৩. ভ্রমণের দৈর্ঘ্য:"},{"page":"13510","level":4,"jp":"付録２ ユニバーサルアクセシビリティの最小基準","bn":"১। সাধারণ নিয়ম:"},{"page":"13511","level":4,"jp":"第２条（戸（Doors））","bn":"২। দরজা :"},{"page":"13512","level":4,"jp":"第４条（階段（Stairs））","bn":"৪। সিঁড়ি:"},{"page":"13513","level":4,"jp":"第６条（昇降機（Lift））","bn":"৬। লিফট :"},{"page":"13514","level":4,"jp":"付録３ 用途分類（Occupancy Type）又は建築物の使用用途に基づく区分","bn":"পরিশিষ্ট- ৩"},{"page":"13516","level":4,"jp":"付録４ 手数料（Fees）等","bn":"পরিশিষ্ট- ৪"},{"page":"13518","level":4,"jp":"付録５","bn":"পরিশিষ্ট- ৫"}];

  let currentLang = 'jp';

  const tocEl     = document.getElementById('toc');
  const container = document.getElementById('pages-container');
  const gazetteLine = {
    jp: 'バングラデシュ公報 臨時増刊 2025年12月14日',
    bn: 'বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫'
  };

  // ─── TOC対象見出しの判定 ───
  // lv2/lv3/lv4 は全て、lv5/lv6 は表・図・付録で始まるもののみ
  function isTocEl(el) {
    const cls = el.className;
    // h-lv3(編), h-lv4(章), h-lv5(条) は全てTOC対象
    if (cls === 'h-lv3' || cls === 'h-lv4' || cls === 'h-lv5') return true;
    // h-lv6 は表・図・付録で始まるもののみ
    if (cls === 'h-lv6') {
      return /^(?:表|図|付録)/.test(el.textContent.trim());
    }
    return false;
  }

  // ─── 見出しへ一意IDを付与 ───
  function assignHeadingIds() {
    let idx = 0;
    container.querySelectorAll('h2,h3,h4,h5,h6').forEach(el => {
      if (isTocEl(el)) el.id = 'th-' + (idx++);
    });
  }

  // ─── TOC構築（章ごとアコーディオン） ───
  // 新データ構造: h-lv3=編(固定表示) h-lv4=章(アコーディオン) h-lv5=条(body内)
  function buildToc() {
    tocEl.innerHTML = '';
    const sectionLabel = document.createElement('div');
    sectionLabel.className = 'toc-section-label';
    sectionLabel.textContent = currentLang === 'jp' ? '目　次' : 'বিষয়সূচি';
    tocEl.appendChild(sectionLabel);

    const nodes = [];
    container.querySelectorAll('h2,h3,h4,h5,h6').forEach(el => {
      if (isTocEl(el)) nodes.push(el);
    });

    let currentBody   = null;
    let currentToggle = null;

    nodes.forEach(el => {
      const level = parseInt(el.className.slice(-1));
      const hid   = el.id;
      const text  = el.textContent.trim();

      if (level === 3) {
        // 編レベル：折りたたまず固定表示
        const btn = document.createElement('button');
        btn.className = 'toc-item';
        btn.dataset.level = level;
        btn.dataset.hid   = hid;
        btn.textContent   = text;
        btn.addEventListener('click', () => {
          location.hash = '#' + hid;
          if (window.innerWidth <= 768) closeToc();
        });
        tocEl.appendChild(btn);
        currentBody   = null;
        currentToggle = null;

      } else if (level === 4) {
        // 章レベル：アコーディオントグル
        const chap = document.createElement('div');
        chap.className = 'toc-chapter';

        const toggle = document.createElement('button');
        toggle.className = 'toc-chapter-toggle';
        toggle.dataset.hid = hid;
        toggle.setAttribute('aria-expanded', 'false');
        toggle.innerHTML =
          `<span class="toggle-arrow">▶</span>` +
          `<span class="toggle-label">${text}</span>`;

        const body = document.createElement('div');
        body.className = 'toc-chapter-body';

        toggle.addEventListener('click', () => {
          const isOpen = toggle.getAttribute('aria-expanded') === 'true';
          // 他の章を閉じる
          tocEl.querySelectorAll('.toc-chapter-toggle').forEach(t => {
            t.setAttribute('aria-expanded', 'false');
            t.nextElementSibling.classList.remove('open');
          });
          if (!isOpen) {
            toggle.setAttribute('aria-expanded', 'true');
            body.classList.add('open');
          }
          location.hash = '#' + hid;
          if (window.innerWidth <= 768) closeToc();
        });

        chap.appendChild(toggle);
        chap.appendChild(body);
        tocEl.appendChild(chap);

        currentBody   = body;
        currentToggle = toggle;

      } else {
        // lv4/lv5/lv6：現在の章bodyに追加
        const btn = document.createElement('button');
        btn.className = 'toc-item';
        btn.dataset.level = level;
        btn.dataset.hid   = hid;
        btn.textContent   = text;
        btn.addEventListener('click', () => {
          location.hash = '#' + hid;
          if (window.innerWidth <= 768) closeToc();
        });
        if (currentBody) {
          currentBody.appendChild(btn);
        } else {
          tocEl.appendChild(btn);
        }
      }
    });
  }

  // ─── 全ページレンダリング ───
  function renderAllPages() {
    container.innerHTML = '';
    PAGES.forEach(p => {
      const view = document.createElement('div');
      view.className = 'page-view';
      view.id = 'page-' + p.num;

      const hdr = document.createElement('div');
      hdr.className = 'page-header';
      hdr.innerHTML = `
        <span class="page-num-badge">p. ${p.num}</span>
        <span class="page-gazette">${gazetteLine[currentLang]}</span>
      `;
      view.appendChild(hdr);

      const cnt = document.createElement('div');
      cnt.className = 'content';
      cnt.innerHTML = currentLang === 'jp' ? p.jp : p.bn;
      view.appendChild(cnt);
      container.appendChild(view);
    });

    assignHeadingIds();   // 先にIDを振る
    buildToc();           // IDを使ってTOCを構築
    setupScrollSpy();     // 見出しを監視
  }

  // ─── スクロールスパイ ───
  let scrollSpyObserver = null;
  function setupScrollSpy() {
    if (scrollSpyObserver) scrollSpyObserver.disconnect();

    const headerH = parseInt(
      getComputedStyle(document.documentElement).getPropertyValue('--header-h')
    ) || 56;

    scrollSpyObserver = new IntersectionObserver(entries => {
      let topEntry = null;
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          if (!topEntry || entry.boundingClientRect.top < topEntry.boundingClientRect.top) {
            topEntry = entry;
          }
        }
      });
      if (!topEntry) return;
      const hid = topEntry.target.id;

      // toc-item のアクティブ更新
      tocEl.querySelectorAll('.toc-item').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.hid === hid);
      });
      // toc-chapter-toggle のアクティブ更新 & 自動展開
      tocEl.querySelectorAll('.toc-chapter-toggle').forEach(toggle => {
        const body = toggle.nextElementSibling;
        // toggleそのもの、またはbody内のtoc-itemがアクティブなら展開
        const isActive = toggle.dataset.hid === hid ||
          !!body.querySelector(`.toc-item[data-hid="${hid}"]`);
        toggle.classList.toggle('active', isActive);
        if (isActive && toggle.getAttribute('aria-expanded') !== 'true') {
          tocEl.querySelectorAll('.toc-chapter-toggle').forEach(t => {
            t.setAttribute('aria-expanded', 'false');
            t.nextElementSibling.classList.remove('open');
          });
          toggle.setAttribute('aria-expanded', 'true');
          body.classList.add('open');
        }
      });

      // アクティブ項目を目次内でスクロール表示
      const active = tocEl.querySelector('.toc-item.active') ||
                     tocEl.querySelector('.toc-chapter-toggle.active');
      if (active) active.scrollIntoView({ block: 'nearest' });
    }, {
      rootMargin: `-${headerH + 10}px 0px -70% 0px`,
      threshold: 0
    });

    container.querySelectorAll('h2,h3,h4,h5,h6').forEach(el => {
      if (isTocEl(el)) scrollSpyObserver.observe(el);
    });
  }

  // ─── 言語切替 ───
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentLang = btn.dataset.lang;
      document.querySelectorAll('.lang-btn').forEach(b =>
        b.classList.toggle('active', b === btn)
      );
      document.body.classList.toggle('lang-bn', currentLang === 'bn');
      renderAllPages();
    });
  });

  // ─── モバイル目次 ───
  const tocToggle  = document.getElementById('toc-toggle-btn');
  const tocOverlay = document.getElementById('toc-overlay');
  const tocNav     = document.getElementById('toc');

  function openToc()  { tocNav.classList.add('open'); tocOverlay.classList.add('show'); }
  function closeToc() { tocNav.classList.remove('open'); tocOverlay.classList.remove('show'); }

  tocToggle.addEventListener('click', () => {
    tocNav.classList.contains('open') ? closeToc() : openToc();
  });
  tocOverlay.addEventListener('click', closeToc);

  // ─── 初期化 ───
  renderAllPages();
})();
</script>

<script>
// Service Worker 登録（Blob URL方式 - 単一ファイルPWA対応）
if ('serviceWorker' in navigator) {
  const swCode = "\nconst CACHE = 'dbr2025-v1';\nconst SHELL = ['./'];\n\nself.addEventListener('install', e => {\n  e.waitUntil(\n    caches.open(CACHE).then(c => c.addAll(SHELL)).then(() => self.skipWaiting())\n  );\n});\n\nself.addEventListener('activate', e => {\n  e.waitUntil(\n    caches.keys().then(keys =>\n      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))\n    ).then(() => self.clients.claim())\n  );\n});\n\nself.addEventListener('fetch', e => {\n  e.respondWith(\n    caches.match(e.request).then(cached => {\n      if (cached) return cached;\n      return fetch(e.request).then(res => {\n        if (res && res.status === 200 && res.type === 'basic') {\n          const clone = res.clone();\n          caches.open(CACHE).then(c => c.put(e.request, clone));\n        }\n        return res;\n      }).catch(() => caches.match('./'));\n    })\n  );\n});\n";
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, {scope: './'} )
    .then(reg => {
      console.log('[PWA] SW registered:', reg.scope);
      // 即時アクティベート
      if (reg.waiting) reg.waiting.postMessage({type: 'SKIP_WAITING'});
    })
    .catch(err => console.warn('[PWA] SW registration failed:', err));
}
