的な住宅地開発区域における敷地の分割にあっては、分割後の各敷地の面積は、５カサ（約３３５平方メートル）又は当該区域において所管行政庁が個別の敷地として割り当てた最小面積のうち、いずれか大きい方の面積を下回ってはならない。</h6>\n<h6 class=\"h-lv6\">９　一の敷地を複数の敷地に分割する場合において、当該分割後の各敷地のために設ける共有の道路（ এজমালি রাস্তা ）は、その幅員を最小４．８メートル以上としなければならない。 この場合において、当該共有道路に係る容積率（FAR）指標は別表５に従って決定するものとし、当該敷地の前面のセットバック（外壁の後退距離）は１．５メートル、その他の方向のセットバックは別表の規定に従うものとする。</h6>\n<h6 class=\"h-lv6\">１０　分割された敷地における許容容積率は、本来適用されるべき容積率から０．２５を減じた数値とする。</h6>\n<h5 class=\"h-lv5\"><strong>第５２条（敷地の統合）</strong></h5>\n<h6 class=\"h-lv6\">１　開発の目的のために複数の敷地を統合することができる。 統合された後の敷地は、一の敷地（ অখণ্ড প্লট ）とみなす。</h6>\n<h6 class=\"h-lv6\">２　前項の規定による統合後の敷地については、土地の面積及び接する道路の幅員に基づき、規定に従って最高建蔽率（Ground Coverage）及び容積率（FAR）指標を決定しなければならない。</h6>\n<h6 class=\"h-lv6\">３　第１項の規定に基づき統合された敷地内に、建築時の規則に基づき承認された既存の建築物が存する場合にあっては、当該建築物は統合後の敷地においても承認を受けたものとみなす。</h6>\n<h6 class=\"h-lv6\"><strong>ただし、次に掲げる条件に従わなければならない。</strong></h6>\n<h6 class=\"h-lv6\">ａ　当該建築物の用途の変更、増築又は当該敷地内における新築にあっては、承認された詳細地区計画（DAP）に定める人口密度に関する規定を遵守しなければならない。</h6>\n<h6 class=\"h-lv6\">ｂ　建築物を伴う敷地統合の場合にあっては、当該建築物が承認された当時の規則に定める最小の義務的セットバック、建築物相互の間隔及び最高建蔽率（MGC）を維持しなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৫১। প্লট বিভাজন (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(৭) শুধু আবাসিক ব্যবহার ব্যতীত অন্যান্য সকল ব্যবহারের ক্ষেত্রে কোনো প্লটকে উপ-প্লটে বিভাজনের জন্য রাস্তার প্রশস্ততা ন্যূনতম ৬ মিটার হইতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৮) সরকারি বা বেসরকারি আবাসিক প্রকল্প এলাকাতে প্লট বিভাজনের ক্ষেত্রে উপ-প্লটের আয়তন কমপক্ষে ৫ (পাঁচ) কাঠা অথবা উক্ত এলাকাতে একক প্লট হিসাবে কর্তৃপক্ষ কর্তৃক বরাদ্দকৃত সর্বনিম্ন আয়তনের প্লট, যাহা বেশি হইবে, তাহা অপেক্ষা ক্ষুদ্র আয়তনের প্লট হিসাবে বিভাজন করা যাইবে না।</h6>\n<h6 class=\"h-lv6\">(৯) কোনো প্লটকে একাধিক উপ-প্লটে বিভাজন করা হইলে উক্ত উপ-প্লটসমূহের ক্ষেত্রে এজমালি রাস্তা ন্যূনতম ৪.৮ মিটার প্রশস্ত হইতে হইবে এবং এজমালী রাস্তার ক্ষেত্রে রোডের FAR সূচক সারণি ৫ অনুযায়ী নির্ধারিত হইবে এবং এই ধরণের প্লটে সম্মুখের সেটব্যাক ১.৫ মিটার এবং অন্যান্য সেটব্যাক সারণি অনুযায়ী প্রাপ্ত হইবে।</h6>\n<h6 class=\"h-lv6\">(১০) বিভাজিত প্লটের ক্ষেত্রে অনুমোদনযোগ্য FAR হইতে ০.২৫ কম প্রাপ্ত হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>৫২। প্লট একত্রীকরণ।</strong></h5>\n<h6 class=\"h-lv6\">(১) উন্নয়নকল্পে একাধিক প্লট একত্রীকরণ করা যাইবে এবং একত্রিত প্লটসমূহ একটি অখণ্ড প্লট হিসাবে গণ্য হইবে।</h6>\n<h6 class=\"h-lv6\">(২) উপ-বিধি (১) এ উল্লিখিত অখণ্ড প্লটের ক্ষেত্রে জমির ক্ষেত্রফল বিবেচনা করিয়া সর্বোচ্চ ভূমি আচ্ছাদন এবং সংলগ্ন রাস্তার প্রশস্ততা বিবেচনা করিয়া বিধি অনুযায়ী FAR সূচক নির্ধারণ করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৩) উপ-বিধি (১) এর অধীন একত্রিত প্লটসমূহ অবস্থিত ভবনাদি নির্মাণকালে বিদ্যমান ইমারত নির্মাণ বিধিমালা অনুযায়ী অনুমোদিত হইয়া থাকিলে উক্ত ভবনাদি একত্রীকরণকৃত প্লটের জন্য ও অনুমোদিত বলিয়া গণ্য হইবে:</h6>\n<h6 class=\"h-lv6\"><strong>তবে শর্ত থাকে যে,—</strong></h6>\n<h6 class=\"h-lv6\">(ক) এইরূপ ভবন পরিবর্তন, পরিবর্ধন বা উহাতে নূতন ভবন নির্মাণের ক্ষেত্রে জনঘনত্ব নির্ণয়ে অনুমোদিত বিশদ অঞ্চল পরিকল্পনা অনুসরণ করিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(খ) ইমারতসহ প্লট একত্রীকরণের ক্ষেত্রে যে বিধিমালা অনুযায়ী ইমারতটি অনুমোদিত হইয়াছে উক্ত বিধিমালায় বর্ণিত ন্যূনতম আবশ্যিক সেটব্যাক, ইমারতসমূহের মধ্যবর্তী সেটব্যাক ও MGC সংরক্ষণ করিতে হইবে।</h6>\n<hr class=\"sep\">"},{"num":"13472","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第５３条（駐車場（Parking））</strong></h5>\n<h6 class=\"h-lv6\">１　各種車両の駐車スペースの寸法及び車両の回転半径は、次の表６の規定に従わなければならない。</h6>\n<p>####### <strong>表６：車両種類別の駐車スペース及び回転半径</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>車両の種類</th><th>駐車幅員（ｍ）</th><th>駐車延長（ｍ）</th><th>内輪回転半径（ｍ）</th><th>外輪回転半径（ｍ）</th></tr></thead><tbody><tr><td>普通乗用車（１台当たり）</td><td>２．４</td><td>４．６</td><td>―</td><td>―</td></tr><tr><td>バス及びトラック（１台当たり）</td><td>３．６</td><td>１０．０</td><td>８．７</td><td>１２．８</td></tr><tr><td>多軸トラック／ロングトレーラー（１台当たり）</td><td>３．６</td><td>１８．０</td><td>６．９</td><td>１３．８</td></tr><tr><td>二輪オートバイ（１台当たり）</td><td>１．０</td><td>２．０</td><td>―</td><td>―</td></tr></tbody></table></div>\n<p>####### <strong>備考：</strong></p>\n<p>####### １　２台以上の普通乗用車を並列して駐車させる場合、駐車スペースの有効幅員は、１台当たり２．３メートルとしてその倍数により算定するものとする。</p>\n<p>####### ２　バス、トラック、多軸トラック又はロングトレーラーの車路（ドライブウェイ）の寸法を決定するにあたっては、当該車両の内輪及び外輪の回転半径を考慮しなければならない。</p>\n<p>####### ３　普通乗用車及び二輪オートバイについては、内輪及び外輪の回転半径の記載を要しない。</p>\n<h6 class=\"h-lv6\">２　普通乗用車の駐車形式に応じた車路（ドライブウェイ）の幅員は、次の表７の規定に従い決定するものとする。</h6>\n<p>####### <strong>表７：駐車角度別の最小車路幅員</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>駐車角度</th><th>一方向通行、片側配置</th><th>一方向通行、両側配置</th><th>双方向通行</th></tr></thead><tbody><tr><td>$0^\\circ$（並列駐車）</td><td>３．５メートル</td><td>４．０メートル</td><td>４．２５メートル</td></tr><tr><td>$45^\\circ$（斜め駐車）</td><td>４．０メートル</td><td>４．０メートル</td><td>４．２５メートル</td></tr><tr><td>$90^\\circ$（直角駐車）</td><td>４．２５メートル</td><td>４．２５メートル</td><td>４．２５メートル</td></tr></tbody></table></div>\n<p>####### <strong>備考：</strong></p>\n<p>####### １　２台以上の普通乗用車を並列して駐車させる場合、駐車スペースの有効幅員は、１台当たり２．３メートルとしてその倍数により算定するものとする。</p>\n<p>####### ２　バス、トラック、多軸トラック又はロングトレーラーの車路の寸法を決定するにあたっては、当該車両の内輪及び外輪の回転半径を考慮しなければならない。</p>\n<p>####### ３　普通乗用車及び二輪オートバイについては、回転半径の考慮を要しない。</p>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৫৩। পার্কিং।</strong>—(১) বিভিন্ন ধরনের গাড়ি পার্কিং পরিসর ও গাড়ি ঘুরাইবার ব্যাসার্ধ নিম্নবর্ণিত সারণি ৬ অনুযায়ী হইতে হইবে, যথা:—</h5>\n<p>####### <strong>সারণি-৬</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>গাড়ির ধরন</th><th>পার্কিং প্রস্থ (মিটার)</th><th>পার্কিং দৈর্ঘ্য (মিটার)</th><th>গাড়ি ঘুরাইবার অভ্যন্তরীণ ব্যাসার্ধ (মিটার)</th><th>বহিঃ ব্যাসার্ধ (মিটার)</th></tr></thead><tbody><tr><td>সাধারণ গাড়ি (প্রতিটির জন্য)</td><td>২.৪</td><td>৪.৬</td><td>--</td><td>--</td></tr><tr><td>বাস ও ট্রাক (প্রতিটির জন্য)</td><td>৩.৬</td><td>১০.০</td><td>৮.৭</td><td>১২.৮</td></tr><tr><td>মাল্টিএক্সেল ট্রাক/লম্বা ট্রেলার (প্রতিটির জন্য)</td><td>৩.৬</td><td>১৮.০</td><td>৬.৯</td><td>১৩.৮</td></tr><tr><td>২ চাকার মোটর বাইক (প্রতিটির জন্য)</td><td>১.০</td><td>২.০</td><td>--</td><td>--</td></tr></tbody></table></div>\n<p>####### <strong>দ্রষ্টব্য:</strong></p>\n<p>####### ১। পাশাপাশি দুই বা ততোধিক সাধারণ গাড়ি পার্কিং এর ক্ষেত্রে পার্কিং এর বাঁধামুক্ত প্রস্থ প্রতি গাড়ির জন্য ২.৩ মিটার প্রস্থ ধরিয়া ইহার গুণিতক হারে হিসাব করিতে হইবে।</p>\n<p>####### ২। বাস ও ট্রাক, মাল্টি এক্সেল ট্রাক বা লম্বা ট্রেলারের ড্রাইভ ওয়ের মাপ নির্ধারণের জন্য গাড়ি ঘুরাইবার অভ্যন্তরীণ ও বহিঃ ব্যাসার্ধের পরিমাপ বিবেচনা করিতে হইবে।</p>\n<p>####### ৩। সাধারণ গাড়ি ও দুই চাকার মোটর বাইকের ক্ষেত্রে গাড়ি ঘুরাইবার জন্য অভ্যন্তরীণ ও বহিঃ ব্যাসার্ধের পরিমাপের উল্লেখ করিতে হইবে না।</p>\n<h6 class=\"h-lv6\">(২) বিভিন্ন ধরনের পার্কিং এর জন্য সাধারণ গাড়ির ড্রাইভওয়ের মাপ নিম্নবর্ণিত সারণি ৭ অনুযায়ী নির্ধারিত হইবে যথা:—</h6>\n<p>####### <strong>সারণি ৭</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>পার্কিং</th><th>একমুখী ট্রাফিক, একদিকে বে</th><th>একমুখী ট্রাফিক, দুই দিকে বে</th><th>দুইমুখী ট্রাফিক</th></tr></thead><tbody><tr><td>$0^\\circ$</td><td>৩.৫ মিটার</td><td>৪.০ মিটার</td><td>৪.২৫ মিটার</td></tr><tr><td>$৪৫^0$</td><td>৪.০ মিটার</td><td>৪.০ মিটার</td><td>৪.২৫ মিটার</td></tr><tr><td>$৯০^0$</td><td>৪.২৫ মিটার</td><td>৪.২৫ মিটার</td><td>৪.২৫ মিটার</td></tr></tbody></table></div>\n<p>####### <strong>দ্রষ্টব্য:</strong></p>\n<p>####### ১। পাশাপাশি দুই বা ততোধিক সাধারণ গাড়ি পার্কিং এর ক্ষেত্রে পার্কিং এর বাঁধামুক্ত প্রস্থ প্রতি গাড়ির জন্য ২.৩ মিটার প্রস্থ ধরিয়া ইহার গুণিতক হারে হিসাব করিতে হইবে।</p>\n<p>####### ২। বাস ও ট্রাক, মাল্টি এক্সেল ট্রাক/লম্বা ট্রেলারের ড্রাইভওয়ের মাপ নির্ধারণের জন্য গাড়ি ঘুরাইবার অভ্যন্তরীণ ও বহিঃ ব্যাসার্ধের পরিমাপ বিবেচনা করিতে হইবে।</p>\n<p>####### ৩। সাধারণ গাড়ি ও দুই চাকার মোটর বাইকের ক্ষেত্রে গাড়ি ঘুরাইবার জন্য অভ্যন্তরীণ ও বহিঃ ব্যাসার্ধের পরিমাপের উল্লেখ করিতে হইবে না।</p>\n<hr class=\"sep\">"},{"num":"13473","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第５３条（駐車場）（承前）</strong></h5>\n<h6 class=\"h-lv6\">３　普通乗用車の流入及び流出の経路を共用とする場合であっても、駐車場の出入口の有効幅員は３メートル以上としなければならず、当該幅員内には歩道その他の障害物を設けてはならない。</h6>\n<h6 class=\"h-lv6\">４　バス及びトラックの出入りにおいて、流入及び流出の経路を分離する場合の幅員は最小４．２５メートルとし、これらを共用とする場合の幅員は６メートル以上としなければならない。</h6>\n<h6 class=\"h-lv6\">５　建築確認申請のために提出する設計図書においては、次の表８の規定に基づき、最小附置義務台数を確保しなければならない。</h6>\n<p>####### <strong>表８：建築物の用途別の最小附置義務台数</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>項番</th><th>建築物の用途（Occupancy）</th><th>最小附置義務台数（Minimum Parking Requirements）</th></tr></thead><tbody><tr><td>(1)</td><td>(2)</td><td>(3)</td></tr><tr><td><strong>1</strong></td><td><strong>住宅（用途 A）：前面道路の幅員が １．８ｍ超 ２．５ｍ未満の敷地</strong></td><td>駐車場の附置を要しない。</td></tr><tr><td><strong>2</strong></td><td><strong>住宅（A1）：一戸建等 又は １３４㎡以下の敷地の住宅</strong></td><td>１台</td></tr><tr><td><strong>3</strong></td><td><strong>住宅（A1）：一戸建等 又は １３４㎡超の敷地の住宅</strong></td><td>２台</td></tr><tr><td><strong>4</strong></td><td><strong>住宅（A2）：二世帯住宅</strong></td><td>２台</td></tr><tr><td><strong>5</strong></td><td><strong>共同住宅（A3）：住戸面積が ２００㎡超の住戸</strong></td><td>各住戸につき１台、及び算定台数の ５％ の来客用駐車場。</td></tr><tr><td><strong>6</strong></td><td><strong>共同住宅（A3）：住戸面積が １４０㎡超 ２００㎡以下の住戸</strong></td><td>３住戸につき２台。</td></tr><tr><td><strong>7</strong></td><td><strong>共同住宅（A3）：住戸面積が ９０㎡以上 １４０㎡以下の住戸</strong></td><td>２住戸につき１台。</td></tr><tr><td><strong>8</strong></td><td><strong>共同住宅（A3）：住戸面積が ６０㎡以上 ９０㎡以下の住戸</strong></td><td>４住戸につき１台。</td></tr><tr><td><strong>9</strong></td><td><strong>共同住宅（A3）：住戸面積が ６０㎡以下の住戸（追加義務）</strong></td><td>５住戸につき１台のオートバイ駐車場。</td></tr><tr><td><strong>10</strong></td><td><strong>ホテル（A5）：星付きホテル</strong></td><td>客用ベッド５床につき１台。</td></tr></tbody></table></div>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৫৩। পার্কিং (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(৩) সাধারণ গাড়ির প্রবেশ ও নির্গমন পথ এক হইলেও পার্কিং এর প্রবেশপথের বাঁধামুক্ত প্রস্থ ৩ মিটারের কম হইবে না এবং এই প্রস্থের মধ্যে কোনো ফুটপাথ বা অন্য বাধা থাকিবে না।</h6>\n<h6 class=\"h-lv6\">(৪) বাস ও ট্রাকের পৃথক প্রবেশ ও নির্গমন পথের প্রস্থ ন্যূনতম ৪.২৫ মিটার ও একক প্রবেশ ও নির্গমন পথের ক্ষেত্রে ৬ মিটার হইবে।</h6>\n<h6 class=\"h-lv6\">(৫) ইমারতের নকশা অনুমোদনের জন্য দাখিলকৃত নকশাসমূহের ক্ষেত্রে ন্যূনতম প্রয়োজনীয় পার্কিং স্থান নিম্নবর্ণিত সারণি-৮ অনুযায়ী হইতে হইবে, যথা:—</h6>\n<p>####### <strong>সারণি-৮</strong></p>\n<p>####### <strong>বিভিন্ন শ্রেণির ভবনের জন্য ন্যূনতম প্রয়োজনীয় পার্কিং স্থান</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>ক্রমিক নম্বর</th><th>ভবনের ব্যবহার বা বসবাসের ধরন (Occupancy)</th><th>ন্যূনতম প্রয়োজনীয় পার্কিং ব্যবস্থা (Minimum Parking Requirements)</th></tr></thead><tbody><tr><td>(১)</td><td>(২)</td><td>(৩)</td></tr><tr><td>১।</td><td>আবাসিক ভবন (অকুপেন্সি টাইপ- 'A') প্লটের সম্মুখস্থ রাস্তার স্বাভাবিক প্রশস্ততা ১.৮মি: এর ঊর্ধ্ব হইতে ২.৫মি: এর নিম্নে</td><td>গাড়ির জন্য পার্কিং প্রযোজ্য হইবে না।</td></tr><tr><td>২।</td><td>A1 একক পরিবার ভিত্তিক/রো হাউস/প্লট সাইজ ১৩৪ বর্গমিটারের অধিক নহে এইরূপ আবাসিক ভবন</td><td>১টি কার পার্কিং।</td></tr><tr><td>৩।</td><td>A1 একক পরিবার ভিত্তিক/রো হাউস/ প্লট সাইজ ১৩৪ বর্গমিটারের অধিক এইরূপ আবাসিক ভবন</td><td>২টি কার পার্কিং।</td></tr><tr><td>৪।</td><td>A2 দুই পরিবারের বাড়ি</td><td>২টি কার পার্কিং।</td></tr><tr><td>৫।</td><td>A3 একাধিক পরিবার ভিত্তিক আবাসিক ভবনের ক্ষেত্রে ২০০ বর্গমিটার এর অধিক গ্রস এরিয়াবিশিষ্ট ফ্ল্যাট</td><td>প্রতি ২০০ বর্গমিটার এর অধিক গ্রস এরিয়া বিশিষ্ট ফ্ল্যাটের জন্য ১টি কারপার্কিং এবং প্রাপ্য ইউনিটের অতিরিক্ত ৫% গেস্ট পার্কিং।</td></tr><tr><td>৬।</td><td>A3 ১৪০ বর্গমিটার এর ঊর্ধ্ব হইতে ২০০ বর্গমিটার গ্রস এরিয়া বিশিষ্ট ফ্ল্যাট</td><td>প্রতি ৩ ইউনিটের জন্য ২টি কারপার্কিং।</td></tr><tr><td>৭।</td><td>A3 ৯০ বর্গমিটার হইতে ১৪০ বর্গমিটার পর্যন্ত গ্রস এরিয়া বিশিষ্ট ফ্ল্যাট</td><td>প্রতি ২ ইউনিটের জন্য ১টি কারপার্কিং।</td></tr><tr><td>৮।</td><td>A3 ৬০ বর্গমিটার হইতে ৯০ বর্গমিটার পর্যন্ত গ্রস এরিয়ার ফ্ল্যাট</td><td>প্রতি ৪ ইউনিটের জন্য ১টি পার্কিং।</td></tr><tr><td>৯।</td><td>A3 ৬০ বর্গমিটার পর্যন্ত গ্রস এরিয়ার ফ্ল্যাট (কার পার্কিং এর অতিরিক্ত)</td><td>প্রতি ৫ ইউনিটের জন্য ১টি মোটর সাইকেল পার্কিং।</td></tr><tr><td>১০।</td><td>A5 হোটেল (স্টার শ্রেণি ভূক্ত)</td><td>প্রতি ৫টি গেস্ট বেডের জন্য ১টি কার পার্কিং।</td></tr></tbody></table></div>\n<hr class=\"sep\">"},{"num":"13474","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第５３条（駐車場）（承前）</strong></h5>\n<p>####### <strong>表８（続き）：建築物の用途別の最小附置義務台数</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>項番</th><th>建築物の用途（Occupancy）</th><th>最小附置義務台数（Minimum Parking Requirements）</th></tr></thead><tbody><tr><td>(1)</td><td>(2)</td><td>(3)</td></tr><tr><td><strong>11</strong></td><td><strong>ホテル（A5）：その他の区分</strong></td><td>延べ面積 ２００㎡ につき１台。</td></tr><tr><td><strong>12</strong></td><td><strong>寄宿舎、ドミトリー、ホステル（A4）</strong></td><td>延べ面積 ３００㎡ につき１台。</td></tr><tr><td><strong>13</strong></td><td><strong>手頃な価格の住宅（A6）</strong></td><td>救急車用スペース１台分を除き、駐車場の附置を要しない。</td></tr><tr><td><strong>14</strong></td><td><strong>教育施設（用途 B）</strong></td><td>延べ面積 ２００㎡ につき１台。且つ法典表 3.F.3 に従うこと。幼稚園等では緩和可。</td></tr><tr><td><strong>15</strong></td><td><strong>公衆福祉施設（用途 C）</strong></td><td>延べ面積 ２００㎡ につき１台。</td></tr><tr><td><strong>16</strong></td><td><strong>医療施設（用途 D）：病院、クリニック等</strong></td><td>ベッド ５床につき１台。</td></tr><tr><td><strong>17</strong></td><td><strong>医療施設（用途 D）：研究所</strong></td><td>延べ面積 １００㎡ につき１台。</td></tr><tr><td><strong>18</strong></td><td><strong>医療施設（用途 D）：外来、診療所</strong></td><td>延べ面積 ２００㎡ につき１台。</td></tr><tr><td><strong>19</strong></td><td><strong>事務所等（用途 E）</strong></td><td>延べ面積 ２００㎡ につき１台。且つ法典表 3.F.3 に従うこと。</td></tr><tr><td><strong>20</strong></td><td><strong>商業施設（用途 F）：店舗等</strong></td><td>延べ面積 ２００㎡ につき１台。且つ延べ面積 ２,０００㎡ 毎に１箇所の乗降スペース（Dropping bay）を設けること。</td></tr><tr><td><strong>21</strong></td><td><strong>飲食店（用途 F）：レストラン</strong></td><td>延べ面積 １００㎡ につき１台。</td></tr><tr><td><strong>22</strong></td><td><strong>工場（用途 G）及び倉庫（用途 H）</strong></td><td>トラック（長さ 10m）１台及び乗用車１台。延べ面積 ３,０００㎡ 超過時は３,０００㎡ 毎にトラック１台分追加。</td></tr><tr><td><strong>23</strong></td><td><strong>集会場（用途 I）：映画館</strong></td><td>客席 ４０席につき１台。</td></tr></tbody></table></div>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৫৩। পার্কিং (চলমান)</strong></h5>\n<p>####### <strong>সারণি-৮ (চলমান)</strong></p>\n<p>####### <strong>বিভিন্ন শ্রেণির ভবনের জন্য ন্যূনতম প্রয়োজনীয় পার্কিং স্থান</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>ক্রমিক নম্বর</th><th>ভবনের ব্যবহার বা বসবাসের ধরন (Occupancy)</th><th>ন্যূনতম প্রয়োজনীয় পার্কিং ব্যবস্থা (Minimum Parking Requirements)</th></tr></thead><tbody><tr><td>(১)</td><td>(২)</td><td>(৩)</td></tr><tr><td>১১।</td><td>A5 হোটেল (অন্যান্য শ্রেণিভুক্ত)</td><td>প্রতি ২০০ ব: মি: গ্রস এরিয়ার জন্য ১টি কার পার্কিং।</td></tr><tr><td>১২।</td><td>A4 (মেস, ডরমিটরি, ও হোস্টেল)</td><td>প্রতি ৩০০ ব: মি: গ্রস এরিয়ার জন্য ১টি কার পার্কিং।</td></tr><tr><td>১৩।</td><td>A6- সাশ্রয়ী আবাসন</td><td>চাহিদা অনুসারে একটি এম্বুলেন্সের স্থান ব্যতীত গাড়ি পার্কিং প্রযোজ্য হইবে না।</td></tr><tr><td>১৪।</td><td>শিক্ষা প্রতিষ্ঠান (অকুপেন্সি টাইপ ‘B’)</td><td>প্রতি ২০০ ব: মি: গ্রস এরিয়ার জন্য ১টি কার পার্কিং এবং কোডের টেবিল 3.F.3 অনুসরণ করিতে হইবে; কিন্ডারগার্টেন, প্রাথমিক বিদ্যালয়ের ক্ষেত্রে শিথিলযোগ্য।</td></tr><tr><td>১৫।</td><td>প্রাতিষ্ঠানিক (অকুপেন্সি টাইপ ‘C’)</td><td>প্রতি ২০০ বর্গমিটার গ্রস এরিয়ার জন্য ১টি কার পার্কিং।</td></tr><tr><td>১৬।</td><td>স্বাস্থ্যসেবা (অকুপেন্সি টাইপ ‘D’) হাসপাতাল, ক্লিনিক</td><td>প্রতি ৫ টি বেডের জন্য ১টি কার পার্কিং।</td></tr><tr><td>১৭।</td><td>স্বাস্থ্যসেবা (অকুপেন্সি টাইপ ‘D’) ল্যাবরেটরি</td><td>প্রতি ১০০ বর্গমিটার গ্রস এরিয়ার জন্য ১টি কার পার্কিং।</td></tr><tr><td>১৮।</td><td>স্বাস্থ্যসেবা (অকুপেন্সি টাইপ ‘D’) (বহির্বিভাগ, চেম্বার)</td><td>প্রতি ২০০ বর্গমিটার গ্রস এরিয়ার জন্য ১টি কার পার্কিং।</td></tr><tr><td>১৯।</td><td>অফিস ও অন্যান্য ব্যবহার (অকুপেন্সি টাইপ ‘E’)</td><td>প্রতি ২০০ব: মি: গ্রস এরিয়ার জন্য ১টি কার পার্কিং এবং কোডের টেবিল 3.F.3 অনুসরণ করিতে হইবে।</td></tr><tr><td>২০।</td><td>বাণিজ্যিক (অকুপেন্সি টাইপ ‘F’) দোকান, শপিং কমপ্লেক্স</td><td>প্রতি ২০০ব: মি: গ্রস এরিয়ার জন্য ১টি কার পার্কিং, ১ টি কার ড্রপিং বে প্রতি ২০০০ বর্গমিটার গ্রস ক্ষেত্রফল এবং কোডের টেবিল 3.F.3 অনুসরণ করিতে হইবে।</td></tr><tr><td>২১।</td><td>বাণিজ্যিক (অকুপেন্সি টাইপ ‘F’) রেস্টুরেন্ট</td><td>প্রতি ১০০ ব: মি: গ্রস এরিয়ার জন্য ১টি কার পার্কিং।</td></tr><tr><td>২২।</td><td>শিল্পকারখানা (অকুপেন্সি টাইপ ‘G’) গুদাম (অকুপেন্সি টাইপ ‘H’)</td><td>কমপক্ষে ১টি ট্রাক পার্কিং (১০মিটার দৈর্ঘ্য) ও ১টি কার পার্কিং। FAR এর ৩০০০বর্গ মিটার অধিক এরিয়া বিশিষ্ট স্থাপনায় প্রতি ৩০০০ বর্গমিটার এরিয়ার জন্য ১টি ট্রাক পার্কিং (১০ মিটার দৈর্ঘ্য) থাকিতে হইবে।</td></tr><tr><td>২৩।</td><td>সমাবেশ (অকুপেন্সি টাইপ ‘I’) সিনেমা হল</td><td>প্রতি ৪০টি সিটের জন্য ১টি কার পার্কিং।</td></tr></tbody></table></div>\n<hr class=\"sep\">"},{"num":"13475","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第５３条（駐車場）（承前）</strong></h5>\n<p>####### <strong>表８（続き）：建築物の用途別の最小附置義務台数</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>項番</th><th>建築物の用途（Occupancy）</th><th>最小附置義務台数（Minimum Parking Requirements）</th></tr></thead><tbody><tr><td><strong>24</strong></td><td><strong>集会施設（用途 I）：劇場、講堂</strong></td><td>客席 ２０席につき１台。</td></tr><tr><td><strong>25</strong></td><td><strong>集会施設（用途 I）：スポーツ施設</strong></td><td>客席 ２００席につき１台。</td></tr><tr><td><strong>26</strong></td><td><strong>集会施設（用途 I）：コミュニティセンター</strong></td><td>延べ面積 ２５平方メートルにつき１台。</td></tr><tr><td><strong>27</strong></td><td><strong>危険物施設（用途 J）</strong></td><td>トラック（長さ 10m）１台及び乗用車１台。３,０００㎡超は３,０００㎡毎にトラック１台追加。</td></tr><tr><td><strong>28</strong></td><td><strong>宗教施設</strong></td><td>３００㎡まで：１台。３００㎡超：延べ面積 ５０平方メートルにつき１台。</td></tr><tr><td><strong>29</strong></td><td><strong>その他</strong></td><td>延べ面積 ２００平方メートルにつき１台。</td></tr></tbody></table></div>\n<p>####### <strong>備考：</strong></p>\n<p>####### １　複合用途建築物における附置義務台数は、各用途ごとの基準に基づき算定した台数の合計とする。</p>\n<p>####### ３　算定において１台未満の端数が生じた場合は、これを１台として計算するものとする。</p>\n<p>####### ５　道路拡幅の計画がない幅員 ６メートル未満の道路に接する住宅建築物については、駐車場の附置を義務付けない。</p>\n<p>####### ８　駐車用の床（駐車場階）の勾配は、最小 １：１８ まで認めることができる。</p>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৫৩। পার্কিং (চলমান)</strong></h5>\n<p>####### <strong>সারণি-৮ (চলমান)</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>ক্রমিক নম্বর</th><th>ভবনের ব্যবহার বা বসবাসের ধরন (Occupancy)</th><th>ন্যূনতম প্রয়োজনীয় পার্কিং ব্যবস্থা (Minimum Parking Requirements)</th></tr></thead><tbody><tr><td>২৪।</td><td>সমাবেশ (অকুপেন্সি টাইপ 'I') থিয়েটার, অডিটোরিয়াম</td><td>প্রতি ২০টি সিটের জন্য ১টি কার পার্কিং।</td></tr><tr><td>২৫।</td><td>সমাবেশ (অকুপেন্সি টাইপ 'I') স্পোর্টস</td><td>প্রতি ২০০টি সিটের জন্য ১টি কার পার্কিং।</td></tr><tr><td>২৬।</td><td>সমাবেশ (অকুপেন্সি টাইপ 'I') কমিউনিটি সেন্টার</td><td>প্রতি ২৫ বর্গমিটারের জন্য ১টি কার পার্কিং।</td></tr><tr><td>২৭।</td><td>বিপজ্জনক (J)</td><td>কমপক্ষে ১টি ট্রাক পার্কিং (১০ মিটার দৈর্ঘ্য) ও ১টি কার পার্কিং। ৩০০০ বর্গমিটার অধিক এরিয়ায় প্রতি ৩০০০ বর্গমিটারের জন্য ১টি ট্রাক পার্কিং।</td></tr><tr><td>২৮।</td><td>ধর্মীয় স্থাপনা</td><td>৩০০ বর্গ মিটার পর্যন্ত: ১টি কার পার্কিং; ৩০০ বর্গমিটারের ঊর্ধ্বে: প্রতি ৫০ বর্গমিটারের জন্য ১টি।</td></tr><tr><td>২৯।</td><td>অন্যান্য</td><td>প্রতি ২০০ব: মি: গ্রস এরিয়ার জন্য ১টি কারপার্কিং।</td></tr></tbody></table></div>\n<p>####### <strong>দ্রষ্টব্য:</strong></p>\n<p>####### ১। মিশ্র ব্যবহারের ক্ষেত্রে পার্কিং চাহিদার যোগফল মিশ্র ব্যবহারের মোট পার্কিং চাহিদা বলিয়া গণ্য হইবে।</p>\n<p>####### ৩। পার্কিং স্পেসের চাহিদার ভগ্নাংশের ক্ষেত্রে ১ (একটি) পার্কিং হিসাব করিতে হইবে।</p>\n<p>####### ৫। রাস্তা প্রশস্তকরণর প্রস্তাব না থাকিলে ৬ মিটারের কম প্রশস্ত রাস্তা সংলগ্ন আবাসিক ভবনের জন্য জমিতে ন্যূনতম গাড়ি পার্কিং এর শর্ত বাধ্যতামূলক হইবে না।</p>\n<p>####### ৮। ন্যূনতম ১:১৮ ঢাল বিশিষ্ট পার্কিং ফ্লোরে পার্কিং করা যাইবে।</p>\n<hr class=\"sep\">"},{"num":"13476","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第５３条（駐車場）（承前）</strong></h5>\n<h6 class=\"h-lv6\">６　４台以下の駐車場を設置する場合において、必要があるときは、次に掲げる条件を遵守することを条件として、道路から直接の斜め駐車（ কৌণিক পার্কিং ）形式とすることができる。</h6>\n<h6 class=\"h-lv6\">ａ　当該斜め駐車の角度は、４５度以内とすること。</h6>\n<h6 class=\"h-lv6\">ｂ　バス停留所から１５メートル以内の場所に設置しないこと。</h6>\n<h6 class=\"h-lv6\">ｃ　横断歩道の標識がある場所又は交差点から２５メートル以内の場所に設置しないこと。</h6>\n<h6 class=\"h-lv6\">ｄ　いかなる場合においても、国道（ National Highway ）に設置してはならない。</h6>\n<h6 class=\"h-lv6\">７　駐車区域への出入口を設置するために歩道を改修する必要がある場合は、地方政府の指示に従わなければならない。当該費用は申請者が負担するものとする。</h6>\n<h6 class=\"h-lv6\">８　駐車場のスロープ（ র‍্যাম্প ）の勾配は、最大で１対８以下としなければならない。また、スロープの起点には延長４．２５メートル以上の水平区間を設けなければならない。ただし、昇降の高さの差が０．７５メートル以下である場合はこの限りでない。</h6>\n<h6 class=\"h-lv6\">９　前項に規定するスロープは、外壁の後退距離（ セットバック ）部分に設置することができる。</h6>\n<h6 class=\"h-lv6\">１０　一方向通行のスロープ幅員は最小３メートル、双方向通行のスロープ幅員は、普通乗用車にあっては最小４．２５メートル、その他の車両にあっては最小６メートルとしなければならない。</h6>\n<h6 class=\"h-lv6\">１１　住宅敷地で１００台以上、又は他で５０台以上の駐車場を設置する場合は、独立した合流車線（ Merging lane ）及び待機スペースを確保しなければならない。</h6>\n<h6 class=\"h-lv6\">１２　駐車スペース及びスロープの有効高さは、２．２５メートル以上を確保しなければならない。</h6>\n<h6 class=\"h-lv6\">１３　間口（前面幅員）が１０メートル以下の敷地にあっては、流入及び流出の経路をそれぞれ１箇所のみ設置できる。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৫৩। পার্কিং (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(৬) অনূর্ধ্ব ৪ (চার)টি পর্যন্ত গাড়ির পার্কিং এর ক্ষেত্রে প্রয়োজনে রাস্তা হইতে সরাসরি কৌণিক পার্কিং নিম্নবর্ণিত শর্তসমূহ পূরণ সাপেক্ষে দেওয়া যাইবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) উক্ত কৌণিক পার্কিং ৪৫ ডিগ্রির মধ্যে হইতে হইবে;</h6>\n<h6 class=\"h-lv6\">(খ) বাস স্ট্যান্ডের ১৫ মিটারের মধ্যে উক্ত পার্কিং হইবে না;</h6>\n<h6 class=\"h-lv6\">(গ) পথচারী পারাপারের চিহ্নিত জায়গা বা কোনো মোড়ের ২৫ মিটারের মধ্যে উক্ত পার্কিং হইবে না; এবং</h6>\n<h6 class=\"h-lv6\">(ঘ) উক্ত পার্কিং কোনো অবস্থাতেই জাতীয় মহাসড়কে হইবে না।</h6>\n<h6 class=\"h-lv6\">(৭) কোনো পার্কিং এলাকায় প্রবেশ বা নির্গমন পথের নির্মাণের জন্য ফুটপাথ কাটিতে হইলে স্থানীয় সরকার কর্তৃপক্ষের নির্দেশনা মোতাবেক পথচারীদের সুযোগ-সুবিধা বিবেচনা করিয়া ফুটপাথের পরিবর্তন বা পরিবর্ধন করিতে হইবে এবং এইক্ষেত্রে নির্মাণ ব্যয় আবেদনকারী বহন করিবে।</h6>\n<h6 class=\"h-lv6\">(৮) পার্কিং স্থানে প্রবেশ বা নির্গমনের র‍্যাম্প ব্যবহারের ক্ষেত্রে সর্বোচ্চ ঢাল ১:৮ হইবে এবং র‍্যাম্প আরম্ভের পূর্বে ৪.২৫ মিটার দীর্ঘ আনুভূমিক পথ থাকিতে হইবে, তবে ০.৭৫ মিটার পর্যন্ত প্রারম্ভিক উচ্চতায় উঠা বা নামিবার জন্য উক্ত শর্ত প্রযোজ্য হইবে না।</h6>\n<h6 class=\"h-lv6\">(৯) প্রারম্ভিক উচ্চতায় উঠিবার বা নামিবার জন্য উপ-বিধি (৮) এ উল্লিখিত র‍্যাম্প সেটব্যাক অংশে নির্মাণ করা যাইবে এবং প্লটের সীমানা হইতে শুরু বা সীমানাতে শেষ হইতে পারিবে।</h6>\n<h6 class=\"h-lv6\">(১০) একমুখী গাড়ি চলাচলের র‍্যাম্পের ক্ষেত্রে ন্যূনতম প্রস্থ ৩ মিটার এবং উভয়মুখী গাড়ি চলাচলের র‍্যাম্পের ক্ষেত্রে ন্যূনতম প্রস্থ সাধারণ গাড়ির ক্ষেত্রে ৪.২৫ মিটার এবং অন্যান্য ক্ষেত্রে ৬ মিটার হইতে হইবে।</h6>\n<h6 class=\"h-lv6\">(১১) আবাসিক সাইটে ন্যূনতম ১০০টি গাড়ি পার্কিং এবং অন্যান্য সাইটে ৫০টি গাড়ি পার্কিং স্থানের ক্ষেত্রে একটি আলাদা ট্রাফিক মার্জিং লেন ও হোল্ডিং বে এর ব্যবস্থা রাখিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(১২) পার্কিং স্থান এবং র‍্যাম্পের বাঁধামুক্ত উচ্চতা কমপক্ষে ২.২৫ মিটার হইতে হইবে।</h6>\n<h6 class=\"h-lv6\">(১৩) ১০ মিটার পর্যন্ত সম্মুখ প্রস্থবিশিষ্ট জমির ক্ষেত্রে শুধু একটি প্রবেশ ও একটি নির্গমন পথ থাকিতে পারিবে।</h6>\n<hr class=\"sep\">"},{"num":"13477","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第５３条（駐車場）（承前）</strong></h5>\n<h6 class=\"h-lv6\">１４　建築物の各階における駐車場への動線は原則スロープによるものとする。但し、敷地の狭隘等により設置が困難な場合に限り、自動車用昇降機（カーリフト）等を設置できる。</h6>\n<h6 class=\"h-lv6\">一　一方通行の通路を設ける場合は、流入及び流出の有効幅員を３．６メートル以上とし、双方向通行の場合は６メートル以上としなければならない。</h6>\n<h6 class=\"h-lv6\">二　自動車用昇降機を設置する建築物にあっては、全附置台数の１５パーセントに相当する車両が、昇降機への流入前に敷地内で待機できるスペースを確保しなければならない。</h6>\n<h6 class=\"h-lv6\">三　自動車用昇降機の前面（流入側又は流出側）には待機スペースを確保しなければならない。当該スペースの長さは最小４．６０メートル以上とする。</h6>\n<h6 class=\"h-lv6\">四　自動車用昇降機のケージ（搬器）の内法寸法は、最小 ２．６ メートル $\\times$ ６．２ メートル 以上としなければならない。</h6>\n<h6 class=\"h-lv6\">五　駐車台数５０台毎に、一の自動車用昇降機を設置しなければならない。</h6>\n<p class=\"fig-title\">図</p>\n<figure class=\"fig-wrap\"><img src=\"images/069_13477-1_mechanical_parking_one_way_road.png\" alt=\"メカニカルパーキング設備のある敷地における一方通行車路\" class=\"fig-img\"><figcaption class=\"fig-caption\">メカニカルパーキング設備のある敷地における一方通行車路</figcaption></figure>\n<figure class=\"fig-wrap\"><img src=\"images/069_13477-2_mechanical_parking_one_way_road.png\" alt=\"メカニカルパーキング設備のある敷地における一方通行車路\" class=\"fig-img\"><figcaption class=\"fig-caption\">メカニカルパーキング設備のある敷地における一方通行車路</figcaption></figure>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৫৩। পার্কিং (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(১৪) ভবনের বিভিন্ন ফ্লোরে গাড়ি পার্কিং এর উদ্দেশ্যে সংযোগের জন্য র‍্যাম্প ব্যবহার করিতে হইবে, কেবল স্থানের অপর্যাপ্ততার কারণে র‍্যাম্পের সংস্থান করা সম্ভব না হইলে, প্রয়োজনে, র‍্যাম্পের পরিবর্তে নিম্নবর্ণিত শর্তে কার লিফট ব্যবহার করা যাইবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) কার লিফট বা ম্যাকানাইজড পার্কিং এ একমুখী রাস্তার সংস্থান করা হইলে, গাড়ি প্রবেশ ও বের হওয়ার জন্য অন্তত ৩.৬ মিটার প্রস্থ এবং দ্বিমুখী রাস্তার সংস্থান করা হইলে প্রবেশ এবং বের হওয়ার জন্য ৬ মিটার রাস্তার প্রস্থ থাকিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(খ) কার লিফটসম্পন্ন ভবনের সমগ্র কার পার্কিং এর ১৫% গাড়ি সাইটের অভ্যন্তরে কার লিফটে প্রবেশের পূর্বে অপেক্ষার জন্য স্থান সংকুলান থাকিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(গ) কার লিফটের সামনে, প্রবেশের স্থান বা বের হওয়ার স্থানে লিফটের বহনকারী গাড়ির সংখ্যার দৈর্ঘ্য ও প্রস্থের সমান স্থান সংরক্ষিত থাকিতে হইবে যাহা কমপক্ষে ৪.৬০ মিটার হইবে;</h6>\n<h6 class=\"h-lv6\">(ঘ) কার লিফটের অভ্যন্তরীণ কক্ষের সর্বনিম্ন মাপ হইবে ২.৬ মি. $\\times$ ৬.২ মি.;</h6>\n<h6 class=\"h-lv6\">(ঙ) প্রতি ৫০টি গাড়ির জন্য নিম্নবর্ণিত চিত্র অনুসারে একটি কার লিফট ব্যবহার করিতে হইবে।</h6>\n<p class=\"fig-title\">চিত্র</p>\n<figure class=\"fig-wrap\"><img src=\"images/069_13477-1_mechanical_parking_one_way_road.png\" alt=\"মেকানিকাল পার্কিং সুবিধা সম্পন্ন সাইটে একমুখী গাড়ী চলাচলের রাস্তা\" class=\"fig-img\"><figcaption class=\"fig-caption\">মেকানিকাল পার্কিং সুবিধা সম্পন্ন সাইটে একমুখী গাড়ী চলাচলের রাস্তা</figcaption></figure>\n<figure class=\"fig-wrap\"><img src=\"images/069_13477-2_mechanical_parking_one_way_road.png\" alt=\"মেকানিকাল পার্কিং সুবিধা সম্পন্ন সাইটে একমুখী গাড়ী চলাচলের রাস্তা\" class=\"fig-img\"><figcaption class=\"fig-caption\">মেকানিকাল পার্কিং সুবিধা সম্পন্ন সাইটে একমুখী গাড়ী চলাচলের রাস্তা</figcaption></figure>\n<hr class=\"sep\">"},{"num":"13478","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第５３条（駐車場）（承前）</strong></h5>\n<h6 class=\"h-lv6\">１５　駐車場の配置計画は、各車両が他車の通行を妨げることなく、直接駐車スペースに出入りできるよう策定しなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第５４条（雨水の採取及び地下水への還元（Rain Water harvesting and Ground Water recharge））</strong></h5>\n<h6 class=\"h-lv6\"><strong>１</strong>　建築物の屋根に降下する雨水の採取及びその利用のための適切な設備は、建築物の不可分の一部（ অবিচ্ছেদ্য অংশ ）として設けなければならない。</h6>\n<p>####### <strong>ただし、</strong> 主要な建築面積が１,３４０平方メートルを超える場合にあっては、再利用設備を設け、且つ浸透桝（Recharge Pit）を建築しなければならない。</p>\n<h6 class=\"h-lv6\"><strong>２</strong>　本規則の施行前に承認された建築物が浸透桝を築造したときは、使用許可証（Occupancy certificate）の交付に係る手数料を免除（ মওকুফ ）するものとする。</h6>\n<h6 class=\"h-lv6\"><strong>৩</strong>　建築面積に基づき、法典（Code）に従って必要な数及び規模の浸透桝を築造しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>৪</strong>　雨水採取及び地下水還元設備は、法典等の仕様に従わなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>৫</strong>　浸透桝については、次に掲げる規定を遵守しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>一</strong>　雨水の貯留及び地下水への還元以外の目的に使用してはならない。</h6>\n<h6 class=\"h-lv6\"><strong>二</strong>　雨水以外の水源からの水を還元するために使用してはならない。</h6>\n<h6 class=\"h-lv6\"><strong>三</strong>　貯留された水が汚染されないよう措置を講じなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>৬</strong>　前項の規定に違反したときは、建築確認の条件に違反したものとみなす。</h6>\n<h6 class=\"h-lv6\"><strong>７</strong>　所管行政庁は監視委員会を設置し、浸透桝の維持管理状況を監視するものとする。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৫৩। পার্কিং (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(১৫) পার্কিং পরিসরের লে-আউট প্ল্যান এমনভাবে হইতে হইবে যাহাতে প্রতিটি গাড়ি অন্য গাড়ির জন্য সমস্যার সৃষ্টি না করিয়া ড্রাইভওয়ে অথবা সার্কুলেশন ক্ষেত্র হইতে সরাসরি পার্কিং এ প্রবেশ ও বাহির হইতে পারে।</h6>\n<h5 class=\"h-lv5\"><strong>৫৪। বৃষ্টির পানি সংগ্রহ এবং ভূগর্ভস্থ পানি রিচার্জ (Rain Water harvesting and Ground Water recharge)</strong></h5>\n<h6 class=\"h-lv6\">(১) ইমারতের ছাদে পতিত বৃষ্টির পানি সংগ্রহ এবং উহা ব্যবহারের উপযুক্ত ব্যবস্থাদি ইমারতের অবিচ্ছেদ্য অংশ হিসাবে থাকিতে হইবে:</h6>\n<p>####### <strong>তবে শর্ত থাকে যে,</strong> মূল ইমারত দ্বারা আচ্ছাদিত ভূমির পরিমাণ ১,৩৪০ বর্গমিটারের ঊর্ধ্বে হইলে বৃষ্টির পানি পুনঃব্যবহারের ব্যবস্থা করিতে হইবে এবং রিচার্জ পিট (Recharge Pit) নির্মাণ করিতে হইবে।</p>\n<h6 class=\"h-lv6\">(২) এই বিধিমালা জারির পূর্বে অনুমোদিত ভবনসমূহের ছাদে বৃষ্টির পানি সংগ্রহ ও ভূগর্ভস্থ স্থাপনা রিচার্জের জন্য রিচার্জ পিট নির্মাণ করিলে উক্ত সকল ইমারতের ব্যবহার সনদ প্রদানের ফি মওকুফ করা হইবে।</h6>\n<h6 class=\"h-lv6\">(৩) আচ্ছাদিত ক্ষেত্রফলের উপর ভিত্তি করিয়া কোড অনুযায়ী প্রয়োজনীয় সংখ্যক ও আকারের রিচার্জপিট নির্মাণ করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৪) বৃষ্টির পানি সংগ্রহ ও ভূগর্ভস্থ পানি রিচার্জের ব্যবস্থাদি কোড অনুযায়ী করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৫) নির্মিত রিচার্জপিট—</h6>\n<h6 class=\"h-lv6\">(ক) বৃষ্টির পানি সংরক্ষণ ও রিচার্জ ব্যতীত অন্য কোনো উদ্দেশ্যে ব্যবহার করা যাইবে না;</h6>\n<h6 class=\"h-lv6\">(খ) বৃষ্টির পানি ব্যতীত অন্য কোনো উৎসের পানি রিচার্জের জন্য রিচার্জপিট ব্যবহার করা যাইবে না;</h6>\n<h6 class=\"h-lv6\">(গ) সংরক্ষিত পানি দূষণমুক্ত রাখিতে কার্যকর ব্যবস্থা গ্রহণ করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৬) উপ-বিধি (৫) এ উল্লিখিত বিধান লঙ্ঘন করিলে উহা নির্মাণ অনুমোদনের শর্ত লঙ্ঘন বলিয়া গণ্য হইবে।</h6>\n<h6 class=\"h-lv6\">(৭) কর্তৃপক্ষ, একটি মনিটরিং কমিটি গঠন করিবে এবং উহা রিচার্জপিট রক্ষণাবেক্ষণ পর্যবেক্ষণ করিবে।</h6>\n<hr class=\"sep\">"},{"num":"13479","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第５４条（雨水採取等）承前</strong></h5>\n<h6 class=\"h-lv6\">８　浸透桝（Recharge Pit）は、建蔽率（Ground coverage）の算定に含めないものとする。</h6>\n<h6 class=\"h-lv6\">９　雨水採取及び地下水還元の設備を備えて建築物を建築した場合、使用許可証の取得及び更新に係る手数料を免除する。</h6>\n<h5 class=\"h-lv5\"><strong>第５５条（植栽（Tree Planting））</strong></h5>\n<h6 class=\"h-lv6\"><strong>１</strong>　敷地面積が１,３４０平方メートルを超える場合は、敷地の少なくとも１０パーセント以上の面積に植栽を行わなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>２</strong>　植栽を施す場所は、義務的空地及びセットバック部分と兼ねることができる。当該場所は最大２箇所に分割することができる。</h6>\n<h6 class=\"h-lv6\"><strong>３</strong>　敷地面積が１,３４０平方メートル以下の敷地においても、緑化区域に低木や中木等を配置しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>৪</strong>　建築主は、樹木の適切な管理を行わなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>৫</strong>　敷地内に現存する成木を保存して建築等を行う場合、次の表９に掲げるインセンティブ（割増床面積）を適用し延べ面積に加算できる。</h6>\n<p>####### <strong>表９：既存樹木の保存に伴う容積率（FAR）のインセンティブ</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>既存成木の幹周直径</th><th>割増床面積</th><th>樹木中心からの後退距離</th></tr></thead><tbody><tr><td>０．２０ｍ以上 ０．３０ｍ未満</td><td>１０平方メートル</td><td>２．４０メートル</td></tr><tr><td>０．３０ｍ以上 ０．４０ｍ未満</td><td>１５平方メートル</td><td>３．６０メートル</td></tr><tr><td>０．４０ｍ以上 ０．５０ｍ未満</td><td>២０平方メートル</td><td>৪．৮০メートル</td></tr><tr><td>０．５０ｍ以上 ０．６０ｍ未満</td><td>២৫平方メートル</td><td>৬．০০メートル</td></tr><tr><td>０．６０ｍ以上</td><td>３０平方メートル</td><td>７．２０メートル</td></tr></tbody></table></div>\n<h5 class=\"h-lv5\"><strong>第５６条（街区単位の開発（Block based development））</strong></h5>\n<h6 class=\"h-lv6\">街区単位の開発を行う場合にあっては、都市計画（マスタープラン）に定める条件を適用する。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৫৪। বৃষ্টির পানি সংগ্রহ (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(৮) রিচার্জ পিট আবশ্যিক বা অতিরিক্ত ভূমি আচ্ছাদনের অংশ হিসাবে গণ্য হইবে না।</h6>\n<h6 class=\"h-lv6\">(৯) বৃষ্টির পানি সংগ্রহ ও রিচার্জের ব্যবস্থাসহ ইমারত নির্মাণ করিলে ব্যবহার সনদপত্র গ্রহণ ও নবায়নের ক্ষেত্রে কোনো ফি প্রদান করিতে হইবে না।</h6>\n<h5 class=\"h-lv5\"><strong>৫৫। বৃক্ষরোপণ।</strong></h5>\n<h6 class=\"h-lv6\">(১) প্লটের পরিমাণ ১৩৪০ বর্গ মিটার (২০ কাঠা) এর অধিক হইলে প্লটের ন্যূনতম ১০% জায়গায় আবশ্যিকভাবে বৃক্ষরোপণ করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(২) বৃক্ষরোপনের স্থান আবশ্যিক অনাচ্ছাদিত স্থান ও সেটব্যাক স্থান সমন্বয়ে করা যাইবে এবং অনুরূপ স্থান সর্বোচ্চ ২ ভাগে বিভক্ত করা যাইবে।</h6>\n<h6 class=\"h-lv6\">(৩) ১৩৪০ বর্গমিটার (১৪ কাঠা) এর নিচের ক্ষেত্রফল বিশিষ্ট প্লটে আবশ্যিক উন্মুক্ত স্থানের অর্ন্তভুক্ত বাধ্যতামূলক সবুজ এলাকায় লতা বা মাঝারি গাছপালার সংস্থান রাখিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৪) ইমারতের মালিক বৃক্ষের যথাযথ পরিচর্যা করিবেন।</h6>\n<h6 class=\"h-lv6\">(৫) বিদ্যমান পরিণত বৃক্ষ সংরক্ষণপূর্বক নকশা অনুমোদন ও নির্মাণ করা হইলে সারণি-৯ এ উল্লিখিত প্রণোদনা প্রযোজ্য হইবে:</h6>\n<p>####### <strong>সারণি-৯</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>বিদ্যমান পরিণত বৃক্ষের ঘের (Girth) এর ব্যাস</th><th>প্রণোদনা</th><th>বৃক্ষের কেন্দ্র হইতে সেটব্যাক</th></tr></thead><tbody><tr><td>০.২০ মিটার হইতে ০.৩০ মিটারের কম</td><td>১০ বর্গমিটার</td><td>২.৪০ মিটার</td></tr><tr><td>০.৩০ মিটার হইতে ০.৪০ মিটারের কম</td><td>১৫ বর্গমিটার</td><td>৩.৬০ মিটার</td></tr><tr><td>০.৪০ মিটার হইতে ০.৫০ মিটারের কম</td><td>২০ বর্গমিটার</td><td>৪.৮০ মিটার</td></tr><tr><td>০.৫০ মিটার হইতে ০.৬০ মিটারের কম</td><td>২৫ বর্গমিটার</td><td>৬.০০ মিটার</td></tr><tr><td>০.৬০ মিটার বা তদূর্ধ্ব</td><td>৩০ বর্গমিটার</td><td>৭.২০ মিটার</td></tr></tbody></table></div>\n<h5 class=\"h-lv5\"><strong>৫৬। ব্লকভিত্তিক উন্নয়ন।</strong></h5>\n<h6 class=\"h-lv6\">ব্লকভিত্তিক উন্নয়নের ক্ষেত্রে ইমারত নির্মাণ করিতে চাহিলে মহাপরিকল্পনায় উল্লিখিত ব্লকভিত্তিক উন্নয়নের শর্তাবলি প্রযোজ্য হইবে।</h6>\n<hr class=\"sep\">"},{"num":"13480","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第５７条（建築物の各室の最小基準（Minimum requirements for building spaces））</strong></h5>\n<h6 class=\"h-lv6\"><strong>一</strong>　居室（Habitable rooms）：</h6>\n<h6 class=\"h-lv6\">ａ　住宅の各住戸には、幅員が最小２．９メートル以上、且つ床面積が９．５平方メートル以上である居室を少なくとも１室設けなければならない。その他の居室にあっては、床面積を最小５平方メートル以上、幅員を最小２メートル以上としなければならない。</h6>\n<h6 class=\"h-lv6\">ｂ　居室の天井高さは最小２．７５メートル以上としなければならない。但し、露出した梁の下面の高さは最小２．１５メートル以上とすることができる。なお、吊り天井（False ceiling）を有する空気調和設備を備えた居室にあっては、下面高さを最小２．４４メートル以上としなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>二</strong>　台所（Kitchen）：</h6>\n<h6 class=\"h-lv6\">ａ　台所の床面積は最小４平方メートル以上、幅員は最小１．５メートル以上としなければならない。</h6>\n<h6 class=\"h-lv6\">ｂ　台所の天井高さは最小２．７５メートル以上。但し、排水管トラップ等下面の高さは最小２．１５メートルまで認めることができる。</h6>\n<h6 class=\"h-lv6\">ｃ　住宅の台所には最小１平方メートル以上の面積の窓を設けなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>三</strong>　浴室及び便所（Bathroom and Toilet）：</h6>\n<h6 class=\"h-lv6\">ａ　洗面台、大便器及びシャワー室を備えた便所は、床面積最小３．０平方メートル以上、幅員最小１．２５メートル以上としなければならない。</h6>\n<h6 class=\"h-lv6\">ｂ　洗面台及び大便器を備えた便所は、床面積最小１．２平方メートル以上、幅員最小１メートル以上としなければならない。</h6>\n<h6 class=\"h-lv6\">ｃ　洗面台及びシャワー室を備えた便所は、床面積最小１．５平方メートル以上、幅員最小１メートル以上としなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৫৭। ইমারতের পরিসরের ন্যূনতম চাহিদা।</strong>—সাশ্রয়ী আবাসন ব্যতীত অন্যান্য ইমারতের বিভিন্ন কক্ষ বা স্থানের আয়তন বা পরিসরের ক্ষেত্রে নিম্নবর্ণিত পরিমাপ ও শর্ত অনুসরণ করিতে হইবে:—</h5>\n<h6 class=\"h-lv6\">(ক) বসবাসযোগ্য কক্ষ:</h6>\n<h6 class=\"h-lv6\">(১) আবাসিক ভবনের প্রতিটি ইউনিটের ক্ষেত্রে ন্যূনতম ২.৯ মিটার প্রস্থ ও ৯.৫ বর্গমিটার ক্ষেত্রফল বিশিষ্ট অন্তত একটি কক্ষ থাকিতে হইবে এবং অন্যান্য বাসযোগ্য কক্ষসমূহের জন্য সর্বনিম্ন ক্ষেত্রফল ৫ বর্গমিটার এবং ন্যূনতম প্রস্থ ২ মিটার হইতে হইবে;</h6>\n<h6 class=\"h-lv6\">(২) বসবাসযোগ্য কক্ষের ন্যূনতম উচ্চতা ২.৭৫ মিটার হইবে এবং উন্মুক্ত বিমের নিচের উচ্চতা ন্যূনতম ২.১৫ মিটার থাকিতে হইবে, তবে ফলস সিলিং যুক্ত শীতাতপ নিয়ন্ত্রিত কক্ষের ক্ষেত্রে ফলস সিলিং এর নিচে ন্যূনতম উচ্চতা ২.৪৪ মিটার হইতে হইবে;</h6>\n<h6 class=\"h-lv6\">(খ) রান্নাঘর:</h6>\n<h6 class=\"h-lv6\">(১) রান্নাঘরের ন্যূনতম ক্ষেত্রফল ৪ বর্গমিটার এবং প্রস্থ ন্যূনতম ১.৫ মিটার হইবে;</h6>\n<h6 class=\"h-lv6\">(২) রান্নাঘরের ন্যূনতম উচ্চতা ২.৭৫ মিটার হইবে এবং ট্রাপের নিচ হইতে ন্যূনতম উচ্চতা ২.১৫ মিটার হইতে পারিবে;</h6>\n<h6 class=\"h-lv6\">(৩) বাসগৃহের রান্নাঘরের জানালা ন্যূনতম ১ বর্গমিটার হইতে হইবে;</h6>\n<h6 class=\"h-lv6\">(গ) গোসলখানা ও টয়লেট:</h6>\n<h6 class=\"h-lv6\">(১) বেসিন, ওয়াটার ক্লোজেট ও গোসলের স্থান সংবলিত টয়লেটের ক্ষেত্রে ন্যূনতম ফ্লোর এরিয়া ৩.০ বর্গমিটার এবং ন্যূনতম প্রস্থ ১.২৫ মিটার হইবে;</h6>\n<h6 class=\"h-lv6\">(২) বেসিন ও ওয়াটার ক্লোজেট সংবলিত টয়লেটের ক্ষেত্রে ন্যূনতম ফ্লোর এরিয়া ১.২ বর্গমিটার এবং ন্যূনতম প্রস্থ ১ মিটার হইবে;</h6>\n<h6 class=\"h-lv6\">(৩) বেসিন এবং গোসলের স্থান সংবলিত টয়লেটের ক্ষেত্রে ন্যূনতম ফ্লোর এরিয়া ১.৫ বর্গমিটার এবং ন্যূনতম প্রস্থ ১ মিটার হইবে;</h6>\n<hr class=\"sep\">"},{"num":"13481","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第５７条（建築物の各室の最小基準）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>四</strong>　大便器（WC）及びシャワー室を備えた便所にあっては、床面積を最小２.８平方メートル以上、幅員を最小１メートル以上としなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>五</strong>　大便器のみを設置する便所にあっては、床面積を最小１.２平方メートル以上、幅員を最小１メートル以上としなければならない。この場合において、当該便所の扉は外開き（ বাহিরের দিকে খুলিতে হইবে ）としなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>六</strong>　浴室及び便所の天井高さは、２.１５メートルを下回ってはならない。当該高さは、仕上げられた床面から、仕上げられた天井若しくは吊り天井、露出した梁の下面、又は上階の配管設備のトラップ若しくはその他の配管の下面までの垂直距離を算定するものとする。</h6>\n<h6 class=\"h-lv6\"><strong>七</strong>　浴室及び便所の窓は、最小面積０.３７平方メートル以上とし、中庭（内庭）、外部空間又は光庭（内庭）に直接面して開放できるものでなければならない。</h6>\n<p>####### <strong>ただし、</strong> 空気調和設備又は機械換気設備により適切に管理された換気体制が確保されている場合にあっては、窓の設置は義務付けないものとする。</p>\n<h5 class=\"h-lv5\"><strong>(ঘ) 階段（Stairs）</strong></h5>\n<h6 class=\"h-lv6\">１　各種建築物の階段の各段（フライト）の有効幅員の最小寸法は、次の表１０の規定に従わなければならない。</h6>\n<p>####### <strong>表１０：階段の段（フライト）の最小有効幅員</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>項番</th><th>建築物の用途分類</th><th>階段の最小幅員（ｍ）</th></tr></thead><tbody><tr><td>(1)</td><td>(2)</td><td>(3)</td></tr><tr><td><strong>1</strong></td><td><strong>用途 A：住宅</strong></td><td></td></tr><tr><td></td><td>A1（一戸建）及び A6（手頃な価格の住宅）</td><td>１.００</td></tr><tr><td></td><td>A2（二世帯住宅）</td><td>１.００</td></tr><tr><td></td><td>A3（共同住宅：アパートメント等）</td><td>１.１５</td></tr><tr><td></td><td>A4（寄宿舎、ドミトリー、ホステル）</td><td>１.２５</td></tr><tr><td></td><td>A5（ホテル、モーテル、ゲストハウス等）</td><td>１.２５</td></tr><tr><td><strong>2</strong></td><td><strong>用途 B：教育施設</strong></td><td></td></tr><tr><td></td><td>（収容人員 １３０人まで）</td><td>１.１５</td></tr><tr><td></td><td>（収容人員 １３０人超 ２５０人まで）</td><td>２.２５</td></tr></tbody></table></div>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h6 class=\"h-lv6\">(৪) ওয়াটার ক্লোজেট এবং গোসলের স্থান সংবলিত টয়লেটের ক্ষেত্রে ন্যূনতম ফ্লোর এরিয়া ২.৮ বর্গমিটার এবং ন্যূনতম প্রস্থ ১ মিটার হইবে;</h6>\n<h6 class=\"h-lv6\">(৫) শুধু ওয়াটার ক্লোজেট সংস্থানের জন্য ন্যূনতম ফ্লোর এরিয়া ১.২ বর্গমিটার ও প্রস্থ ১ মিটার হইবে, অনুরূপ ক্ষেত্রে টয়লেট কিউবিকেল এর পাল্লা বাহিরের দিকে খুলিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(৬) গোসলখানা ও টয়লেট এর উচ্চতা ২.১৫ মিটারের কম হইতে পারিবে না এবং অনুরূপ উচ্চতা ফিনিসড্ ফ্লোর হইতে ফিনিসড্ সিলিং বা ফলস্ সিলিং, উন্মুক্ত বিমের নিচ পর্যন্ত অথবা উপরের ফ্লোরের প্লাশ্বিং সিস্টেম এর ট্রাপ বা অন্যান্য পাইপ লাইনের নিচ পর্যন্ত পরিমাপকৃত হইবে;</h6>\n<h6 class=\"h-lv6\">(৭) গোসলখানা ও টয়লেটের জানালা ন্যূনতম ০.৩৭ বর্গমিটার ক্ষেত্রফলব্যাপী অভ্যন্তরীণ আঙিনা, বহিঃপরিসর বা যে-কোনো এয়ারওয়েল বা লাইটওয়েলের সহিত সরাসরি খোলা থাকিতে হইবে:</h6>\n<p>####### <strong>তবে শর্ত থাকে যে,</strong> শীতাতপ নিয়ন্ত্রিত বা যান্ত্রিক উপায়ে যথাযথভাবে নিয়ন্ত্রিত বায়ু প্রবাহের ব্যবস্থাপনা থাকিলে জানালা থাকা বাধ্যতামূলক হইবে না;</p>\n<h5 class=\"h-lv5\"><strong>(ঘ) সিঁড়ি:</strong></h5>\n<h6 class=\"h-lv6\">(১) বিভিন্ন ধরনের সিঁড়ির প্রতিটি ফ্লাইটের বাঁধামুক্ত ন্যূনতম প্রশস্ততার পরিমাপ নিম্নবর্ণিত সারণি ১০ অনুযায়ী হইবে, যথা:—</h6>\n<p>####### <strong>সারণি-১০</strong></p>\n<p>####### <strong>সিঁড়ির ফ্লাইটের ন্যূনতম বাঁধামুক্ত প্রস্থ</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>ক্রমিক নম্বর</th><th>ভবনের শ্রেণি</th><th>সিঁড়ির ন্যূনতম প্রস্থ</th></tr></thead><tbody><tr><td>(১)</td><td>(২)</td><td>(৩)</td></tr><tr><td>১।</td><td>A. আবাসিক:</td><td></td></tr><tr><td></td><td>A1 একক পরিবার বাড়ি ও A6 (সাশ্রয়ী আবাসন)</td><td>১.০০</td></tr><tr><td></td><td>A2 দুই পরিবারের বাড়ি</td><td>১.০০</td></tr><tr><td></td><td>A3 ফ্ল্যাট ও এ্যাপার্টমেন্ট বাড়ি</td><td>১.১৫</td></tr><tr><td></td><td>A4 মেস, ডরমিটরি ও হোস্টেল</td><td>১.২৫</td></tr><tr><td></td><td>A5 হোটেল, মোটেল, গেস্টহাউজ, সার্ভিস এপার্টমেন্ট</td><td>১.২৫</td></tr><tr><td>২।</td><td>B. শিক্ষা প্রতিষ্ঠান:</td><td></td></tr><tr><td></td><td>(অকুপেন্ট লোড ১৩০ পর্যন্ত)</td><td>১.১৫</td></tr><tr><td></td><td>(অকুপেন্ট লোড ১৩০-২৫০ পর্যন্ত)</td><td>২.২৫</td></tr></tbody></table></div>\n<hr class=\"sep\">"},{"num":"13482","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第５７条（階段）（承前）</strong></h5>\n<p>####### <strong>表１０（続き）</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>項番</th><th>建築物の用途分類</th><th>階段の最小幅員（ｍ）</th></tr></thead><tbody><tr><td>(1)</td><td>(2)</td><td>(3)</td></tr><tr><td><strong>3</strong></td><td><strong>用途 C：公衆福祉施設</strong></td><td>１.５０</td></tr><tr><td><strong>4</strong></td><td><strong>用途 D：医療施設</strong></td><td>２.２５</td></tr><tr><td><strong>5</strong></td><td><strong>用途 E：事務所等</strong></td><td>１.５０</td></tr><tr><td><strong>6</strong></td><td><strong>用途 F：商業施設</strong></td><td></td></tr><tr><td></td><td>F1. 小規模店舗及び市場（建築床面積 300㎡以下）</td><td>１.５０</td></tr><tr><td></td><td>F2. 大規模店舗及び市場（建築床面積 300㎡超）</td><td>２.００</td></tr><tr><td><strong>7</strong></td><td><strong>用途 G：工場</strong></td><td>１.５０</td></tr><tr><td><strong>8</strong></td><td><strong>用途 H：倉庫</strong></td><td>１.５０</td></tr><tr><td><strong>9</strong></td><td><strong>用途 I：集会施設</strong></td><td>２.００</td></tr><tr><td><strong>10</strong></td><td><strong>その他</strong></td><td>１.２５</td></tr></tbody></table></div>\n<p>####### <strong>備考：</strong></p>\n<p>####### (1) 複数階にわたる駐車場において、各階を連絡する階段の有効幅員は、手摺を除き、最小１.１５メートル以上としなければならない。</p>\n<p>####### (2) 飲食店（レストラン）に設ける階段の最小幅員は、１.５メートル以上としなければならない。</p>\n<h6 class=\"h-lv6\"><strong>２</strong>　階段の蹴上げ（Riser）及び踏面（Tread）の寸法は、一の蹴上げ及び一の踏面の寸法の和が４００ミリメートル以上でなければならない。また、蹴上げの寸法は１７５ミリメートル以下、踏面の寸法は２２５ミリメートル以上としなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>３</strong>　段鼻（Nosing）及び傾斜した蹴上げによって増加する踏面の寸法は、踏面寸法に算入することができる。また、階段の一つの段（フライト）内において、最大及び最小の蹴上げ寸法並びに最大及び最小の踏面寸法の差は、いずれの場合も平均寸法の２パーセントを超えてはならない。なお、隣接する蹴上げ及び踏面の寸法の差は、５ミリメートルを超えてはならない。</h6>\n<h6 class=\"h-lv6\"><strong>４</strong>　階段の一つの段（フライト）における蹴込み数は、最大２０段までとしなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>５</strong>　階段の段（フライト）における最小の有効高さ（Head Room）は、２.１５メートル以上としなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>(ঘ) সিঁড়ি (চলমান)</strong></h5>\n<p>####### <strong>সারণি-১০ (চলমান)</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>ক্রমিক নম্বর</th><th>ভবনের শ্রেণি</th><th>সিঁড়ির ন্যূনতম প্রস্থ</th></tr></thead><tbody><tr><td>(১)</td><td>(২)</td><td>(৩)</td></tr><tr><td>৩।</td><td>C. প্রাতিষ্ঠানিক</td><td>১.৫০</td></tr><tr><td>৪।</td><td>D. স্বাস্থ্যসেবা</td><td>২.২৫</td></tr><tr><td>৫।</td><td>E. ব্যবসা</td><td>১.৫০</td></tr><tr><td>৬।</td><td>F. বাণিজ্যিক</td><td></td></tr><tr><td></td><td>F1. ছোট দোকান ও বাজার (অনধিক ৩০০ বর্গমিটার Construction Floor Area)</td><td>১.৫০</td></tr><tr><td></td><td>F2. Large shops and market (over 300 sqm Construction Floor Area)</td><td>২.০০</td></tr><tr><td>৭।</td><td>G. শিল্প কারখানা</td><td>১.৫০</td></tr><tr><td>৮।</td><td>H. গুদাম</td><td>১.৫০</td></tr><tr><td>৯।</td><td>I. সমাবেশ</td><td>২.০০</td></tr><tr><td>১০।</td><td>অন্যান্য</td><td>১.২৫</td></tr></tbody></table></div>\n<p>####### <strong>নোট:</strong></p>\n<p>####### (১) একাধিক ফ্লোর বিশিষ্ট পার্কিং এর ক্ষেত্রে বিভিন্ন ফ্লোরের সহিত সংযোগকারী সিঁড়ির (সাধারণ বা অগ্নি নিরাপদ উভয়ের ক্ষেত্রে) ন্যূনতম বাঁধামুক্ত প্রশস্ত হ্যান্ড রেইল ব্যতীত ১.১৫ মিটার হইবে।</p>\n<p>####### (২) রেস্টুরেন্ট এর জন্য ন্যূনতম সিঁড়ির প্রস্থ ১.৫ মিটার হইবে।</p>\n<h6 class=\"h-lv6\">(২) সিঁড়ির রাইজার ও ট্রেডের পরিমাপ এমন হইবে যেন একটি রাইজার ও একটি ট্রেডের যোগফল কমপক্ষে ৪০০ মিলিমিটার হয় এবং রাইজারের সর্বোচ্চ মাপ ১৭৫ মিলিমিটার এবং ট্রেডের সর্বনিম্ন মাপ ২২৫ মিলিমিটার হয়।</h6>\n<h6 class=\"h-lv6\">(৩) নোজিং এবং হেলানো রাইজারের কারণে বৃদ্ধিপ্রাপ্ত মাপ ট্রেডের মাপের মধ্যে গণ্য করা যাইবে এবং সিঁড়ির একটি ফ্লাইটের মধ্যে সর্বোচ্চ ও সর্বনিম্ন মাপের রাইজার এবং সর্বোচ্চ ও সর্বনিম্ন মাপের ট্রেডের পার্থক্য উভয় ক্ষেত্রে গড় মাপের ২ শতাংশের বেশি হইবে না এবং পাশাপাশি অবস্থিত রাইজার ও ট্রেডের মাপের পার্থক্য ৫ মিলিমিটার এর বেশি হইতে পারিবে না;</h6>\n<h6 class=\"h-lv6\">(৪) সিঁড়ির যে কোনো একটি ফ্লাইটে মোট ধাপের সংখ্যা সর্বোচ্চ ২০ এর মধ্যে সীমাবদ্ধ থাকিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(৫) সিঁড়ির ফ্লাইটসমূহের অন্তবর্তী সর্বনিম্ন উচ্চতা (Head Room) ২.১৫ মিটার হইতে হইবে;</h6>\n<hr class=\"sep\">"},{"num":"13483","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第５７条（階段）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>６</strong>　階段室の踊場の下面を通る通路であって、居室（Habitable room）以外のサービススペースに接続するものの有効高さは最小２．０３メートル以上とし、踊場の下面を通るその他の全ての通路及び空間の高さは、最小２．１５メートル以上としなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>７</strong>　階段の手摺の高さは、段鼻（Nosing）から手摺の上端までの垂直距離において最小０．９０メートル以上としなければならない。この場合において、子供による階段の利用を考慮し、バラスター（手摺子）の意匠は十分な安全性を有するものでなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>８</strong>　階段の踊場の奥行（Depth）は、いかなる階層においても、当該階段の幅員以上を確保しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>９</strong>　屋上に突出する階段室の有効高さは、最小２．１０メートル以上としなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>１０</strong>　隣接する二つの階段段（フライト）相互の離隔距離は、最小１５０ミリメートル以上としなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>(ঙ) 住宅建築物における室の高さの算定及びその他の寸法</strong></h5>\n<h6 class=\"h-lv6\">１　室の高さ（Height of room）は、仕上げられた床面から、仕上げられた天井の下面までの垂直距離により算定するものとする。</h6>\n<h6 class=\"h-lv6\">２　各室又は各空間の有効高さは、次に掲げる基準に従わなければならない。</h6>\n<h6 class=\"h-lv6\">ａ　貯蔵室、ユーティリティルーム及び物置：最小２．１０メートル以上</h6>\n<h6 class=\"h-lv6\">ｂ　浴室、洗面所、便所、ベランダ（Balcony）、ポーチ等：最小２．１０メートル以上</h6>\n<h6 class=\"h-lv6\">ｃ　傾斜屋根を有する場合の当該屋根の平均高さ：最小２．４４メートル以上。ただし、床面から当該屋根の最下部までの高さは、最小２．００メートル以上とすることができる。</h6>\n<h6 class=\"h-lv6\">ｄ　折版屋根、シェル構造等、又は空気調和設備を備える室であって吊り天井（False ceiling）若しくはダクトを有する場合の当該吊り天井若しくはダクトの下面までの高さ：最小２．４４メートル以上</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>(ঘ) সিঁড়ি (চলমান)</strong></h5>\n<h6 class=\"h-lv6\">(৬) সিঁড়ি ঘরের যে কোনো ল্যান্ডিং এর তলার প্যাসেজ, যাহা আবাসযোগ্য নহে এইরূপ সার্ভিস স্পেসকে যুক্ত করিয়া তাহার সর্বনিম্ন উচ্চতা ২.০৩ মিটার হইবে এবং ল্যান্ডিং এর তলার অন্য সকল প্যাসেজ ও স্পেস এর ন্যূনতম উচ্চতা ২.১৫ মিটার হইতে হইবে;</h6>\n<h6 class=\"h-lv6\">(৭) সিঁড়ির রেলিং এর ন্যূনতম উচ্চতা ০.৯০ মিটার হইবে এবং অনুরূপ মাপ সিঁড়ির ধাপের নোজ হইতে রেলিং এর উপরিতল পর্যন্ত উলম্ব দৈর্ঘ্য বুঝাইবে এবং শিশুরা এইরূপ ক্ষেত্রে সিঁড়ি ব্যবহার করিবে তবে বালাস্ট্রেড ডিজাইন শিশুদের জন্য যথেষ্ট নিরাপদ হইতে হইবে;</h6>\n<h6 class=\"h-lv6\">(৮) ল্যান্ডিং এর গভীরতা (depth) যে কোনো লেভেলে ন্যূনতম সিঁড়ির প্রস্থের সমান হইতে হইবে;</h6>\n<h6 class=\"h-lv6\">(৯) ছাদের সিঁড়িঘরের ন্যূনতম উচ্চতা ২.১০ মিটার হইতে হইবে;</h6>\n<h6 class=\"h-lv6\">(১০) পাশাপাশি দুইটি ফ্লাইটের মধ্যবর্তী দূরত্ব ন্যূনতম ১৫০ মি:মি: হইতে হইবে;</h6>\n<h5 class=\"h-lv5\"><strong>(ঙ) আবাসিক ভবনে কক্ষের উচ্চতার হিসাব ও অন্যান্য মাপসমূহ:</strong></h5>\n<h6 class=\"h-lv6\">(১) মেঝের উপরের ফিনিসড তল হইতে ছাদের নিচের ফিনিসড তল পর্যন্ত কক্ষের উচ্চতা হিসাব করিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(২) কক্ষ বা স্পেসের বাঁধামুক্ত উচ্চতা হইবে নিম্নরূপ, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) স্টোর রুম, ইউটিলিটি রুম ও বক্স রুম ন্যূনতম ২.১০ মিটার;</h6>\n<h6 class=\"h-lv6\">(খ) বাথরুম, ল্যাভেটরি, টয়লেট, ব্যালকনি, পোর্চ, ইত্যাদি ন্যূনতম ২.১০ মিটার;</h6>\n<h6 class=\"h-lv6\">(গ) ঢালু ছাদের ক্ষেত্রে ছাদের গড় উচ্চতা ন্যূনতম ২.৪৪ মিটার হইতে হইবে এবং, মেঝে হইতে ছাদের সর্বনিম্ন তলার ন্যূনতম উচ্চতা ২.০০ মিটার হইতে পারিবে;</h6>\n<h6 class=\"h-lv6\">(ঘ) ছাদ, ফোল্ডেড প্লেট, শেল, ইত্যাদি এবং শীতাতপ নিয়ন্ত্রিত কক্ষে ফলস্ সিলিং এর নিচে অথবা ফলস সিলিং না থাকিলে ডাক্ট এর নিচে মেঝে হইতে ন্যূনতম উচ্চতা ২.৪৪ মিটার হইতে হইবে;</h6>\n<hr class=\"sep\">"},{"num":"13484","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第５７条（室の高さ）（承前）</strong></h5>\n<p>####### <strong>表１１：非住宅建築物の最小天井高さ</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>項番</th><th>建築物の用途分類</th><th>最小天井高さ</th></tr></thead><tbody><tr><td>(1)</td><td>(2)</td><td>(3)</td></tr><tr><td>(1)</td><td>用途 B：教育施設</td><td>ａ　空気調和設備（AC）を備えない建築物にあっては、３メートル。</td></tr><tr><td>(2)</td><td>用途 C：公衆福祉施設</td><td>ｂ　空気調和設備を備え吊り天井を設置する場合、床面から吊り天井下端までは ２．６メートル。</td></tr><tr><td>(3)</td><td>用途 D：医療施設</td><td>ｃ　空気調和設備のために露出ダクトを設置する場合、床面からダクト下端までは ２．６メートル。</td></tr><tr><td>(4)</td><td>用途 I：集会施設</td><td></td></tr><tr><td>(5)</td><td>用途 E：事務所等</td><td></td></tr><tr><td>(6)</td><td>用途 F：商業施設</td><td></td></tr><tr><td>(7)</td><td>用途 M：その他</td><td></td></tr><tr><td>(8)</td><td>用途 L：インフラ施設</td><td></td></tr><tr><td>(9)</td><td>用途 G：工場</td><td>ａ　空気調和設備を備えない建築物にあっては、３．５メートル。</td></tr><tr><td>(10)</td><td>用途 H：倉庫</td><td>ｂ　空気調和設備を備え吊り天井を設置する場合、床面から吊り天井下端までは ３メートル。</td></tr><tr><td>(11)</td><td>用途 J：危険物施設</td><td>ｃ　空気調和設備のために露出ダクトを設置する場合、床面からダクト下端までは ３メートル。</td></tr><tr><td>(12)</td><td>用途 K3：修理工場</td><td></td></tr><tr><td>(13)</td><td>用途 L：インフラ施設</td><td></td></tr><tr><td>(14)</td><td>用途 K1、K2：駐車場等</td><td>２．２５メートル（適用がある場合、梁の下面とする。）</td></tr></tbody></table></div>\n<h5 class=\"h-lv5\"><strong>(চ) コミュニティスペース（Community Space）</strong></h5>\n<h6 class=\"h-lv6\">１　延べ面積が合計３,０００平方メートルを超える住宅建築物にあっては、その ５パーセント以上の面積を、社会的集会のためのコミュニティスペースとして確保しなければならない。</h6>\n<p>####### <strong>ただし、</strong> 当該コミュニティスペースには、社会的集会のための場所のほか、図書室、体育館（ジム）、床面積１００平方メートル以下のクラブ、又は宗教的礼拝所を設けることができる。</p>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>(ঙ) আবাসিক নহে এইরূপ ইমারতের ক্ষেত্রে ছাদের নিম্ন তলের উচ্চতা নির্ধারণের প্রয়োজনীয় শর্তসমূহ (চলমান)</strong></h5>\n<p>####### <strong>সারণি-১১</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>ক্রমিক নম্বর</th><th>ভবনের শ্রেণি</th><th>ন্যূনতম ছাদের উচ্চতা</th></tr></thead><tbody><tr><td>(১)</td><td>(২)</td><td>(৩)</td></tr><tr><td>(১)</td><td>B. শিক্ষা প্রতিষ্ঠান</td><td>(ক) শীতাতপ নিয়ন্ত্রিত নহে এমন ভবনের ক্ষেত্রে ৩ মিটার;</td></tr><tr><td>(২)</td><td>C. প্রাতিষ্ঠানিক</td><td>(খ) শীতাতপ নিয়ন্ত্রিত ভবনের ক্ষেত্রে ফলস সিলিং ব্যবহার করা হইলে মেঝে হইতে ফলস সিলিং পর্যন্ত উচ্চতা ২.৬ মিটার;</td></tr><tr><td>(৩)</td><td>D. স্বাস্থ্য সেবা</td><td>(গ) শীতাতপ নিয়ন্ত্রিতকরণের জন্য উন্মুক্ত ডাক্ট ব্যবহারের ক্ষেত্রে ভবনের মেঝে হইতে ডাক্ট এর নিচ পর্যন্ত উচ্চতা ২.৬ মিটার।</td></tr><tr><td>(৪)</td><td>I. সমাবেশ</td><td></td></tr><tr><td>(৫)</td><td>E. ব্যবসা</td><td></td></tr><tr><td>(৬)</td><td>F. বাণিজ্যিক</td><td></td></tr><tr><td>(৭)</td><td>M. বিবিধ</td><td></td></tr><tr><td>(৮)</td><td>L. ইউটিলিটি</td><td></td></tr><tr><td>(৯)</td><td>G. শিল্প কারখানা</td><td>(ক) শীতাতপ নিয়ন্ত্রিত নহে এমন ভবনের ক্ষেত্রে ৩.৫ মিটার;</td></tr><tr><td>(১০)</td><td>H. গুদাম ঘর</td><td>(খ) শীতাতপ নিয়ন্ত্রিত ভবনের ক্ষেত্রে ফলস সিলিং ব্যবহার করা হইলে মেঝে হইতে ফলস সিলিং পর্যন্ত উচ্চতা ৩ মিটার;</td></tr><tr><td>(১১)</td><td>J. বিপজ্জনক ব্যবহারের ভবন</td><td>(গ) শীতাতপ নিয়ন্ত্রিতকরণের জন্য উন্মুক্ত ডাক্ট ব্যবহারের ক্ষেত্রে ভবনের মেঝে হইতে ডাক্ট এর নিচ পর্যন্ত উচ্চতা ৩ মিটার।</td></tr><tr><td>(১২)</td><td>K3. Repair Garage</td><td></td></tr><tr><td>(১৩)</td><td>L. ইউটিলিটি</td><td></td></tr><tr><td>(১৪)</td><td>K1, K2</td><td>২.২৫ মিটার (প্রযোজ্য ক্ষেত্রে বিমের নিচে)</td></tr></tbody></table></div>\n<h5 class=\"h-lv5\"><strong>(চ) কমিউনিটি স্পেস:</strong></h5>\n<h6 class=\"h-lv6\">(১) FAR এর আওতাভুক্ত সর্বমোট ৩০০০ (তিন হাজার) বর্গমিটারের অধিক ক্ষেত্রফলবিশিষ্ট আবাসিক ভবনে বসবাসকারীদের ব্যবহারের জন্য FAR-ভুক্ত মেঝের আয়তনের ন্যূনতম ৫% স্থান বিভিন্ন সামাজিক সম্মেলন অনুষ্ঠানের জন্য নির্দিষ্ট করিয়া কমিউনিটি স্পেস হিসাবে রাখিতে হইবে:</h6>\n<p>####### <strong>তবে শর্ত থাকে যে,</strong> উক্ত কমিউনিটি স্পেস এ সামাজিক সম্মেলনের স্থানের সহিত পাঠাগার ও জিমনেসিয়াম, অনূর্ধ্ব ১০০ বর্গমিটারের ক্লাব, ধর্মীয় উপাসনার স্থান সংস্থান করা যাইবে:</p>\n<hr class=\"sep\">"},{"num":"13485","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第５７条（コミュニティスペース）（承前）</strong></h5>\n<p>####### さらに、個別の用途（図書室等）に供する面積は、当該コミュニティスペース総面積の ２５パーセント を超えてはならない。</p>\n<h6 class=\"h-lv6\"><strong>２</strong>　敷地面積１,３００平方メートル以上の住宅敷地においてアパートメントを建築する場合、面積の少なくとも １０パーセント 以上を居住者のための遊び場（ খেলার জায়গা ）として確保しなければならない。当該遊び場は半分までを屋根のある区域とすることができるが、壁で区画してはならず、且つ当該区域は容積率に算入しない。また、セットバック部分と兼ねることができる。</h6>\n<h5 class=\"h-lv5\"><strong>第正式５８条（既存建築物に関する規定）</strong></h5>\n<h6 class=\"h-lv6\"><strong>１</strong>　建築にあたっては、都市計画、BNBC、及び本規則を遵守しなければならない。</h6>\n<p>####### <strong>ただし、</strong> 本規則の施行前に承認された建築物について、本規則に適合し、又は適合させる場合にあっては、所定の手数料を納付した上で本規則に基づく容積率の適用を受け、設計修正の申請を行うことができる。この場合、構造設計等の妥当性について専門技術者の証明を要する。</p>\n<h6 class=\"h-lv6\"><strong>２</strong>　無許可で建築された建築物が本規則に照らして承認可能なものである場合、１９５２年建築工事法に基づく過料（ জরিমানা ）等を納付した上で承認を受けることが可能である。</h6>\n<h5 class=\"h-lv5\"><strong>第５９条（建築確認に関する一般的事項）</strong></h5>\n<h6 class=\"h-lv6\"><strong>１</strong>　高さが １８メートル を超える建築物には昇降機（リフト）を設置しなければならない。高さの判定は「居住に供する最上階の屋根の上面」までの高さによる。</h6>\n<h6 class=\"h-lv6\"><strong>２</strong>　高さが ３３メートル 又は階数が １０階 を超える建築物にあっては、少なくとも ２台以上 の昇降機を設置し、そのうち少なくとも １台 はストレッチャー用昇降機としなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>(চ) কমিউনিটি স্পেস (চলমান)</strong></h5>\n<p>####### আরও শর্ত থাকে যে, সামাজিক সম্মেলন ব্যবহারের স্থানের সহিত উপরে কোনো একক ব্যবহার প্রযোজ্য সর্বমোট ক্ষেত্রফলের ২৫% এর অধিক হইতে পারিবেনা;</p>\n<h6 class=\"h-lv6\">(২) ব্লক ভিত্তিক উন্নয়ন ব্যতীত ১৩০০ (এক হাজার তিনশত) বর্গমিটার বা তদূর্ধ্ব পরিমাণের আবাসিক জমিতে এ্যাপার্টমেন্ট নির্মাণ করিতে চাহিলে সম্পূর্ণ জমির অন্তত ১০% উক্ত এ্যাপার্টমেন্টের বসবাসকারীগণের খেলার জায়গা হিসাবে একটি নির্দিষ্ট স্থানে রাখিতে হইবে, যাহার অর্ধেক আচ্ছাদিত এলাকায় হইতে পারিবে কিন্তু কোনো দেওয়াল দ্বারা আবদ্ধ করা যাইবে না এবং এই আচ্ছাদিত এলাকা FAR এর হিসাবে অন্তর্ভুক্ত হইবে না এবং সেটব্যাক এর জন্য সংরক্ষিত জায়গা সংক্রান্ত খেলার জায়গার অন্তর্ভুক্ত হইতে পারিবে।</h6>\n<h5 class=\"h-lv5\"><strong>৫৮। বিদ্যমান ইমারত নির্মাণ সংক্রান্ত বিধান।</strong></h5>\n<h6 class=\"h-lv6\">(১) ইমারত নির্মাণের ক্ষেত্রে মহাপরিকল্পনা, বিএনবিসি কোড ও এই বিধিমালা অনুসরণ করিতে হইবে:</h6>\n<p>####### <strong>তবে শর্ত থাকে যে,</strong> এই বিধিমালা জারির পূর্বে অনুমোদিত ইমারতসমূহের ক্ষেত্রে জমির পরিমান, সেটব্যাক, ইত্যাদি সঙ্গতিপূর্ণ হইলে বা করা হইলে এই বিধিমালা অনুযায়ী নির্ধারিত ফি প্রদান সাপেক্ষে নকশা সংশোধন ও অনুমোদনের জন্য আবেদন করা যাইবে, তবে ফাউন্ডেশন ও কাঠামো ডিজাইনের পর্যাপ্ততার বিষয়টি বিশেষজ্ঞ প্রকৌশলী কর্তৃক প্রত্যয়নকৃত হইতে হইবে।</p>\n<h6 class=\"h-lv6\">(২) কর্তৃপক্ষের অনুমোদন গ্রহণ ব্যতীত কোনো ইমারত নির্মিত হইলে এবং অনুরূপ ইমারত এই বিধিমালার আলোকে অনুমোদনযোগ্য বলিয়া বিবেচিত হইলে, Building Construction Act, 1952 অনুযায়ী প্রযোজ্য জরিমানা ও ফি গ্রহণপূর্বক অনুমোদন প্রদান করা যাইবে।</h6>\n<h5 class=\"h-lv5\"><strong>৫৯। নির্মাণ ও নির্মাণ অনুমোদন সংশ্লিষ্ট সাধারণ জ্ঞাতব্য বিষয়সমূহ।</strong></h5>\n<h6 class=\"h-lv6\">(১) ১৮ (আঠারো) মিটারের অতিরিক্ত উচ্চতায় এক বা একাধিক তলা বিশিষ্ট ইমারতে লিফট স্থাপন করিতে হইবে এবং এইরূপ উচ্চতা নির্ধারণের জন্য ইমারতের বসবাসযোগ্য সর্বোচ্চ তলার ছাদের উপরিভাগের উচ্চতা গণ্য করা হইবে।</h6>\n<h6 class=\"h-lv6\">(২) ৩৩ (তেত্রিশ) মিটার বা ১০ (দশ) তলার অধিক উচ্চতা বিশিষ্ট ইমারতের জন্য কমপক্ষে ২ টি লিফটের সংস্থান রাখিতে হইবে এবং কমপক্ষে ১টি লিফট স্ট্রেচার লিফট হইতে হইবে:</h6>\n<hr class=\"sep\">"},{"num":"13486","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第５９条（建築確認に関する一般的事項）（承前）</strong></h5>\n<p>####### ただし、昇降機ロビーの奥行きは １.５メートル を下回ってはならない。</p>\n<p>####### また、ストレッチャー用昇降機のためのロビー奥行きは最小 ２.১メートル 以上としなければならない。</p>\n<h6 class=\"h-lv6\"><strong>３</strong>　建築物の各種機械・電気設備に関する設計図書は、関連する専門技術者によって作成されなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>৪</strong>　発電機や変電所等から発生する騒音の制御措置を講じなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>৫</strong>　切土の承認を受けた丘陵（山）の麓においては、芝付け（ターフィング）を行い、且つ斜面を安定させる措置を講じなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>৬</strong>　池を掘削する場合は、敷地境界線から少なくとも ３メートル 以上の距離を保たなければならない。この場合、勾配は ４５度 を超えてはならない。</h6>\n<h6 class=\"h-lv6\"><strong>৭</strong>　空気調和設備等から排出される温風による環境汚染物質の軽減管理は、法典に従わなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第６０条（複合開発（Mixed Use Development））</strong></h5>\n<h6 class=\"h-lv6\"><strong>১</strong>　住宅用途が商業用途と複合する場合、容積率（FAR）及び建蔽率の算定にあたっては、住宅用途に適用される規定を適用する。</h6>\n<h6 class=\"h-lv6\"><strong>২</strong>　前項以外の複合開発においては、各用途に適用される規定のうち最も厳しいもの（Stringent Requirements）を適用しなければならない。</h6>\n<p>####### ただし、床面積が最大である特定の用途がある場合は、当該用途に関する規定を適用できる。</p>\n<h6 class=\"h-lv6\"><strong>৩</strong>　住宅から複合用途へ転換された敷地については、非住宅用途のための車両出入りは幅員のある道路からのみ行わなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৫৯। নির্মাণ ও নির্মাণ অনুমোদন সংশ্লিষ্ট সাধারণ জ্ঞাতব্য বিষয়সমূহ (চলমান)</strong></h5>\n<p>####### তবে শর্ত থাকে যে, সাধারণ লিফটের ক্ষেত্রে লিফট লবির ন্যূনতম পরিমাপ লিফট ব্যবহারকারীর সংখ্যার উপর নির্ভর করিয়া নির্ধারিত হইবে এবং লিফট লবির গভীরতা ১.৫ মিটার এর কম হইতে পারিবে না:</p>\n<p>####### আরও শর্ত থাকে যে, স্ট্রেচার লিফট সংস্থান করা হইলে স্ট্রেচার লিফট এর জন্য লিফট লবির গভীরতার মাপ ন্যূনতম ২.১ মিটার হইতে হইবে।</p>\n<h6 class=\"h-lv6\">(৩) ইমারতের বিভিন্ন যান্ত্রিক ও বৈদ্যুতিক পরিসেবা সংক্রান্ত সকল প্রয়োজনীয় নকশা সংশ্লিষ্ট কারিগরি ব্যক্তি কর্তৃক প্রণীত হইতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৪) জেনারেটর, শীতাতপ নিয়ন্ত্রণ যন্ত্র, সাব-স্টেশন এবং অন্যান্য বৈদ্যুতিক ও যান্ত্রিক স্থাপনা হইতে নির্গত শব্দ নিয়ন্ত্রণের ব্যবস্থা রাখিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৫) কর্তন বা ধ্বংস সাধনের জন্য অনুমোদনপ্রাপ্ত পাহাড়ের পাদদেশে টার্ফিং এবং ঢালকে স্ট্যাবিলাইজ করিয়া নিয়ন্ত্রণের ব্যবস্থা করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৬) পুকুর খনন করিতে হইলে সাইটের সীমানা হইতে কমপক্ষে ৩ (তিন) মিটার দূরত্বে খনন করিতে হইবে, যাহার ঢাল পার্শ্ববর্তী সীমানা হইতে ৪৫ (পঁয়তাল্লিশ) ডিগ্রি কোণের অধিক হইবে না।</h6>\n<h6 class=\"h-lv6\">(৭) কেন্দ্রীয় শীততাপ নিয়ন্ত্রিত ব্যবস্থার কারণে নির্গত উষ্ণ বায়ু পরিবেশ দূষণকারী উপাদান প্রশমন ও নিয়ন্ত্রণ ব্যবস্থাপনা কোডের অনুসরণপূর্বক প্রতিপালন করিতে হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>৬০। মিশ্র উন্নয়ন (Mixed Use Development) —</strong></h5>\n<h6 class=\"h-lv6\">(১) যদি আবাসিক ব্যবহার বাণিজ্যিক ব্যবহারের সহিত মিশ্রিত হয় তাহা হইলে FAR ও ভূমি আচ্ছাদন নির্ধারণের জন্য আবাসিক ব্যবহারের প্রযোজ্য বিধান কার্যকর হইবে।</h6>\n<h6 class=\"h-lv6\">(২) উপ-বিধি (১) এ বর্ণিত মিশ্র ব্যবহার ব্যতীত অন্য সকল মিশ্র ব্যবহার উন্নয়নের ক্ষেত্রে বিভিন্ন শ্রেণির জন্য প্রযোজ্য বিধানাবলির কঠোরতমটি (Stringent Requirements) গণ্য করা হইবে;</h6>\n<p>####### তবে এক্ষেত্রে যে অকুপেন্সি টাইপের ফ্লোর স্পেস (পার্কিং বাদে) সর্বোচ্চ হইবে সেই বিশেষ অকুপেন্সি টাইপ সংক্রান্ত বিধি প্রযোজ্য হইবে।</p>\n<h6 class=\"h-lv6\">(৩) আবাসিক প্রকল্প এলাকার যে সকল প্লট আবাসিক হইতে মিশ্র ব্যবহারে রূপান্তর করা হইয়াছে, সেই সকল জমিতে অনাবাসিক ব্যবহারের জন্য গাড়ীর প্রবেশ এবং নির্গমন কেবল প্রশস্ত রাস্তা হইতে হইবে।</h6>\n<hr class=\"sep\">"},{"num":"13487","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<hr class=\"sep\">\n<h5 class=\"h-lv5\"><strong>第６０条（複合開発）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>৪</strong>　住宅地に隣接する敷地において複合用途建築物を建築する場合、当該住宅地側の敷地境界線から ２.৫メートル の外壁後退距離（セットバック）を確保しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>৫</strong>　住宅用途の部分にあっては住宅地側に窓等を設けることができる。但し、非住宅用途の部分にあっては、当該隣接住宅地側にベランダ（ বারান্দা ）を設けてはならない。</h6>\n<h6 class=\"h-lv6\"><strong>৬</strong>　すべての複合開発にあっては、詳細地域計画（DAP）等に基づき用途混在の指針を遵守しなければならない。</h6>\n<h3 class=\"h-lv3\">第６章 [Chapter VI]</h3>\n<h4 class=\"h-lv4\">衛生及び安全 [Health and Safety]</h4>\n<h5 class=\"h-lv5\"><strong>第６１条（衛生及び安全）</strong></h5>\n<h6 class=\"h-lv6\"><strong>一（ক） 採光及び換気：</strong></h6>\n<h6 class=\"h-lv6\"><strong>１</strong>　各建築物には、自然な方法により自然の採光及び換気を確保しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>２</strong>　居住・商業用の居室の窓面積は、床面積の １５パーセント 以上としなければならない。且つその少なくとも半分以上は、開放できる構造としなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>３</strong>　機械換気設備等により適切な環境が確保され人工照明が設置されている場合にあっては、自然の採光及び換気措置を講ずることを要しない。</h6>\n<h6 class=\"h-lv6\"><strong>৪</strong>　地階にあっては、必要な採光、給排水、廃棄物排出及び換気の措置を講じなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>৫</strong>　居室の主要開口部が中庭に面する場合、その面積は別表１２の規定に従わなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>(৪) আবাসিক ভূমি সংলগ্ন জমিতে মিশ্র ব্যবহার ইমারত নির্মাণের ক্ষেত্রে, আবাসিক ভূমির দিকে সীমানা হইতে ২.৫ মিটার সেটব্যাক রাখিতে হইবে।</p>\n<p>(৫) মিশ্র ব্যবহারের ক্ষেত্রে আবাসিক ব্যবহারের অংশে জানালা বা বারান্দা পার্শ্ববর্তী আবাসিক জমির দিকে দেওয়া যাইবে, তবে অনাবাসিক ব্যবহারের অংশে পার্শ্ববর্তী আবাসিক জমির দিকে বারান্দা দেওয়া যাইবে না।</p>\n<p>(৬) সকল মিশ্র ব্যবহার উন্নয়নের ক্ষেত্রে বিশদ অঞ্চল পরিকল্পনা এবং কোড অনুসরণপূর্বক অকুপেন্সি মিশ্রণের নির্দেশনা নিশ্চিত করিতে হইবে।</p>\n<h3 class=\"h-lv3\">ষষ্ঠ অধ্যায়</h3>\n<h4 class=\"h-lv4\">স্বাস্থ্য ও নিরাপত্তা</h4>\n<h5 class=\"h-lv5\"><strong>৬১। স্বাস্থ্য ও নিরাপত্তা।</strong>—ইমারতের বসবাসযোগ্যতা নিশ্চিত করিবার লক্ষ্যে নিম্নবর্ণিত ব্যবস্থা গ্রহণ করিতে হইবে, যথা:—</h5>\n<h6 class=\"h-lv6\">(ক) আলো ও বায়ুপ্রবাহ:</h6>\n<h6 class=\"h-lv6\">(১) প্রত্যেকটি ইমারতে প্রাকৃতিক উপায়ে স্বাভাবিক আলো-বাতাসের প্রবাহ রাখিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(২) আবাসিক ও বাণিজ্যিক কক্ষের জানালার ক্ষেত্রফল উক্ত কক্ষের মেঝের ক্ষেত্রফলের ন্যূনতম ১৫% এর সমান হইবে, যাহার কমপক্ষে অর্ধেক অংশ খোলা থাকিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(৩) যথাযথ যান্ত্রিক বায়ু প্রবাহের ব্যবস্থাপনায় সুষ্ঠু পরিবেশ নিশ্চিত হইলে এবং কৃত্রিম আলোর ব্যবস্থা থাকিলে প্রাকৃতিক উপায়ে আলো ও বায়ুপ্রবাহের ব্যবস্থা বাধ্যতামূলক হইবে না;</h6>\n<h6 class=\"h-lv6\">(৪) বেজমেন্টে সকল ধরনের প্রয়োজনীয় আলো, পানি ও বর্জ্য নিষ্কাশন এবং বায়ুপ্রবাহের ব্যবস্থা নিশ্চিত করিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(৫) বসবাসযোগ্য কক্ষের আলো ও বাতাসের প্রধান উৎস অভ্যন্তরীণ অঙ্গন বা আঙিনা হইলে, উহার ক্ষেত্রফল নিম্নবর্ণিত সারণি ১২ অনুযায়ী হইতে হইবে।</h6>\n<hr class=\"sep\">"},{"num":"13488","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第６１条（内部の中庭）（承前）</strong></h5>\n<p>####### <strong>表１２：内部の中庭（Courtyard）の最小面積（居室に供する場合）</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>項番</th><th>階数</th><th>最高高さ（ｍ）</th><th>中庭の最小有効面積（㎡）</th></tr></thead><tbody><tr><td>(1)</td><td>３階まで</td><td>１１</td><td>９</td></tr><tr><td>(2)</td><td>４階</td><td>１４</td><td>１６</td></tr><tr><td>(3)</td><td>５階</td><td>１７</td><td>២৫</td></tr><tr><td>(4)</td><td>６階</td><td>២০</td><td>৩৬</td></tr><tr><td>(5)</td><td>７階</td><td>២৩</td><td>৪৯</td></tr><tr><td>(6)</td><td>８階</td><td>২৬</td><td>৬৪</td></tr><tr><td>(7)</td><td>９階</td><td>២৯</td><td>৮১</td></tr><tr><td>(8)</td><td>１０階</td><td>৩৩</td><td>１００</td></tr><tr><td>(9)</td><td>１１階</td><td>৩৬</td><td>১২１</td></tr><tr><td>(10)</td><td>１２階～１３階</td><td>４２</td><td>１４４</td></tr><tr><td>(11)</td><td>１４階～１５階</td><td>４８</td><td>１９６</td></tr><tr><td>(12)</td><td>１６階～１７階</td><td>５４</td><td>২৫６</td></tr><tr><td>(13)</td><td>１８階以上</td><td>６３以上</td><td>৩৬１</td></tr></tbody></table></div>\n<p>####### <strong>備考：</strong></p>\n<p>####### 面積算定において中庭の短辺は、長辺の３分の１を下回ってはならない。</p>\n<h6 class=\"h-lv6\"><strong>６</strong>　便所の窓は、内部の中庭又は換気用煙突（বায়ু চিমনী）に面して開放できる。</h6>\n<h6 class=\"h-lv6\"><strong>７</strong>　自然採光及び換気の基準については表１３に従わなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>####### <strong>সারণি-১২</strong></p>\n<p>####### <strong>অভ্যন্তরীণ অঙ্গন বা আঙিনার ন্যূনতম ক্ষেত্রফল</strong></p>\n<p>####### <strong>(বসবাসযোগ্য কক্ষের জন্য)</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>ক্রমিক নম্বর</th><th>তলার সংখ্যা</th><th>সর্বোচ্চ উচ্চতা (মিটার)</th><th>অভ্যন্তরীণ অঙ্গন বা আঙিনার ন্যূনতম নেট ক্ষেত্রফল (বর্গ মিটার)</th></tr></thead><tbody><tr><td>(১)</td><td>(২)</td><td>(৩)</td><td>(৪)</td></tr><tr><td>(১)</td><td>৩ পর্যন্ত</td><td>১১</td><td>৯</td></tr><tr><td>(২)</td><td>৪</td><td>১৪</td><td>১৬</td></tr><tr><td>(৩)</td><td>৫</td><td>১৭</td><td>২৫</td></tr><tr><td>(৪)</td><td>৬</td><td>২০</td><td>৩৬</td></tr><tr><td>(৫)</td><td>৭</td><td>২৩</td><td>৪৯</td></tr><tr><td>(৬)</td><td>৮</td><td>২৬</td><td>৬৪</td></tr><tr><td>(৭)</td><td>৯</td><td>২৯</td><td>৮১</td></tr><tr><td>(৮)</td><td>১০</td><td>৩৩</td><td>১০০</td></tr><tr><td>(৯)</td><td>১১</td><td>৩৬</td><td>১২১</td></tr><tr><td>(১০)</td><td>১২-১৩</td><td>৪২</td><td>১৪৪</td></tr><tr><td>(১১)</td><td>১৪-১৫</td><td>৪৮</td><td>১৯৬</td></tr><tr><td>(১২)</td><td>১৬-১৭</td><td>৫৪</td><td>২৫৬</td></tr><tr><td>(১৩)</td><td>১৮ এবং তদুর্ধ্ব</td><td>৬৩ এবং তদুর্ধ্ব</td><td>৩৬১</td></tr></tbody></table></div>\n<p>####### <strong>দ্রষ্টব্য:</strong></p>\n<p>####### অভ্যন্তরীণ অঙ্গন বা আঙিনার ক্ষেত্রফল পরিমাপের ক্ষেত্রে ক্ষুদ্র বাহুর দৈর্ঘ্য বৃহত্তর বাহুর দৈর্ঘ্যের এক তৃতীয়াংশের কম হইতে পারিবে না।</p>\n<h6 class=\"h-lv6\">(৬) টয়লেটের জানালা অভ্যন্তরীণ অঙ্গন বা আঙিনা বা বায়ু চিমনীতে খুলিতে পারিবে;</h6>\n<h6 class=\"h-lv6\">(৭) স্বাভাবিক আলো এবং বায়ু চলাচলের মাত্রা ও মানের জন্য নিম্নবর্ণিত সারণি ১৩ অনুসরণ করিতে হইবে।</h6>\n<hr class=\"sep\">"},{"num":"13489","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<hr class=\"sep\">\n<h5 class=\"h-lv5\"><strong>第６１条（内部の光庭）（承前）</strong></h5>\n<p>####### <strong>表１３：内部の光庭（Air-well）の最小寸法（浴室・便所用）</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>項番</th><th>建築物の高さ</th><th>最小有効断面積（㎡）</th><th>最小幅員（ｍ）</th></tr></thead><tbody><tr><td>1</td><td>３階まで (11m)</td><td>１.５</td><td>１.０</td></tr><tr><td>2</td><td>４階 (14m)</td><td>３.０</td><td>１.２</td></tr><tr><td>3</td><td>５階 (17m)</td><td>４.０</td><td>１.５</td></tr><tr><td>4</td><td>６階 (20m)</td><td>５.０</td><td>២.０</td></tr><tr><td>5</td><td>６階超 (20m超)</td><td>６.５０</td><td>២.৫</td></tr></tbody></table></div>\n<p>####### <strong>備考：</strong></p>\n<p>####### (1) 機械換気設備を設置する場合、寸法は機械設計に基づき決定する。</p>\n<p>####### (2) 外部空地に接続される光庭については、断面積規定は適用しないが最小幅員は １メートル 以上とする。</p>\n<h5 class=\"h-lv5\"><strong>(খ) 境界塀（Boundary Walls）</strong></h5>\n<h6 class=\"h-lv6\"><strong>১</strong>　住宅建築物の境界塀の高さは道路最高地点から <strong>３メートル</strong> を超えてはならない。地盤面から １.７５メートル までを目隠し（ Solid ）構造とし、残りは格子状等としなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>২</strong>　政府機関の境界塀の高さは <strong>２.７５メートル</strong> を超えてはならない。側面等は １.７５メートル、正面は １メートル までを目隠し構造とし、残りはグリル等としなければならない。</h6>\n<p>####### <strong>ただし、</strong> 重要拠点等の場合は全面目隠し構造を認め、高さは当局の決定に従う。</p>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>####### <strong>সারণি-১৩</strong></p>\n<p>####### <strong>অভ্যন্তরীণ এয়ারওয়েল বা লাইটওয়েল এর ন্যূনতম মাপসমূহ (গোসলখানা ও টয়লেটের জন্য)</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>ক্রমিক নম্বর</th><th>ভবনের উচ্চতা (তলা / মিটার)</th><th>শ্যাফটের ন্যূনতম নেট ক্রস সেকশন ক্ষেত্রফল (বর্গমিটার)</th><th>শ্যাফটের ন্যূনতম প্রস্থ (মিটার)</th></tr></thead><tbody><tr><td>১।</td><td>৩ তলা পর্যন্ত (১১ মিটার)</td><td>১.৫</td><td>১.০</td></tr><tr><td>২।</td><td>৪ তলা (১৪ মিটার)</td><td>৩.০</td><td>১.২</td></tr><tr><td>৩।</td><td>৫ তলা (১৭ মিটার)</td><td>৪.০</td><td>১.৫</td></tr><tr><td>৪।</td><td>৬ তলা (২০ মিটার)</td><td>৫.০</td><td>২.০</td></tr><tr><td>৫।</td><td>৬ তলার তদুর্ধ্ব (২০ মিটারের তদুর্ধ্ব)</td><td>৬.৫০</td><td>২.৫</td></tr></tbody></table></div>\n<p>####### <strong>দ্রষ্টব্য:</strong></p>\n<p>####### (১) যান্ত্রিক বায়ু চলাচল ব্যবস্থা থাকিলে শ্যাফটের মাপ যান্ত্রিক ডিজাইনের ভিত্তিতে নিশ্চিত করিতে হইবে।</p>\n<p>####### (২) বহিরাঙ্গনে বা আবশ্যিক উন্মুক্ত স্থানের সহিত সংযুক্ত এয়ারওয়েল সমূহের জন্য এই ক্ষেত্রফল প্রযোজ্য হইবে না, তবে শ্যাফটের ন্যূনতম প্রস্থ ১ মিটার হইতে হইবে।</p>\n<h5 class=\"h-lv5\"><strong>(খ) সীমানা দেয়াল:</strong></h5>\n<h6 class=\"h-lv6\">(১) আবাসিক ইমারতের ক্ষেত্রে সকল পার্শ্বস্থ সীমানা দেয়ালের উচ্চতা ৩ মিটারের অধিক হইতে পারিবে না যাহা সংলগ্ন রাস্তার সর্বোচ্চ বিন্দু হইতে পরিমাপকৃত হইবে এবং সর্বোচ্চ ১.৭৫ মিটার উচ্চতা পর্যন্ত নিরেট ও বাকি অংশ জালি অথবা গ্রিল করা যাইবে;</h6>\n<h6 class=\"h-lv6\">(২) সরকারি ইমারতের সীমানা দেয়ালের উচ্চতা ২.৭৫ মিটারের অধিক হইতে পারিবে না, যাহা সংলগ্ন রাস্তার সর্বোচ্চ বিন্দু হইতে পরিমাপকৃত হইবে, পার্শ্ব এবং পশ্চাতে ১.৭৫ মিটার পর্যন্ত নিরেট ও সম্মুখ অংশে ১ মিটার পর্যন্ত নিরেট রাখা যাইবে।</h6>\n<p>####### <strong>তবে শর্ত থাকে যে,</strong> বিশেষ নিরাপত্তাজনিত কারণে নিরেট হইতে পারিবে এবং দেয়ালের উচ্চতা সংশ্লিষ্ট কর্তৃপক্ষ কর্তৃক নির্ধারিত হইবে;</p>\n<hr class=\"sep\">"},{"num":"13490","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第６１条（衛生及び安全）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>ｃ</strong>　境界塀の高さは <strong>２.７５メートル</strong> を超えてはならない。前面部分は高さ <strong>１メートル</strong> まで、側面等は高さ <strong>１.７５メートル</strong> までを目隠し（ Solid ）構造とすることができ、残りは格子状等としなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>ｄ</strong>　傾斜地における境界塀の高さは各スパンの中央点から算定し、スパンの水平長は <strong>３.０メートル</strong> を超えてはならない。</h6>\n<h5 class=\"h-lv5\"><strong>(গ) 給水、排水及び下水道</strong></h5>\n<h6 class=\"h-lv6\"><strong>১</strong>　全ての建築物には、給水設備、浄化槽（セプティックタンク）、浸透桝、且つ適用がある場合は汚水処理施設（ＳＴＰ）等を備えなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>২</strong>　公共下水道が整備されている場合は、建築物の排水管等を接続することができる。</h6>\n<h6 class=\"h-lv6\"><strong>৩</strong>　公共下水道がない場合は、浄化槽及び浸透桝を設置して汚水を排出しなければならない。配置図には、<strong>ＳＴＰ、浄化槽及び浸透桝の設置位置を表示しなければならない</strong>。</h6>\n<h6 class=\"h-lv6\"><strong>৪</strong>　屋根からの雨水等は、排水溝への排出措置を講じなければならない。当該措置は基礎に損害を与えないものでなければならず、且つ<strong>雨水を隣地や道路に直接流出させてはならない</strong>。</h6>\n<h5 class=\"h-lv5\"><strong>(ঘ) 廃棄物処理</strong></h5>\n<h6 class=\"h-lv6\"><strong>১</strong>　敷地内において、廃棄物を収集するための専用の場所を確保しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>২</strong>　化学的廃棄物等を排出する施設は、敷地内において廃棄物を収集し安全に処理するための設備を備えなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h6 class=\"h-lv6\">(৩) দেয়ালের উচ্চতা ২.৭৫ মিটারের অধিক হইতে পারিবে না, যাহা সংলগ্ন রাস্তার সর্বোচ্চ বিন্দু হইতে পরিমাপকৃত হইবে এবং প্লটের সম্মুখ ১ মিটার, পার্শ্ব এবং পশ্চাতের দিকে সর্বোচ্চ ১.৭৫ মিটার পর্যন্ত নিরেট ও বাকি অংশ জালি অথবা গ্রিল ব্যবহার করা যাইবে;</h6>\n<h6 class=\"h-lv6\">(৪) পাহাড়ি বা অসমান সাইটে সীমানা দেয়ালের উচ্চতা প্রতিটি স্প্যানের মধ্যবর্তী বিন্দু হইতে হিসাব করিতে হইবে এবং এইরূপ স্প্যানের আনুভূমিক দৈর্ঘ্য ৩.০ মিটারের অধিক হইতে পারিবে না।</h6>\n<h5 class=\"h-lv5\"><strong>(গ) পানি সরবরাহ, পয়ঃপ্রণালি এবং নর্দমা:</strong></h5>\n<h6 class=\"h-lv6\">(১) সকল ইমারতে পানি সরবরাহ, সেপটিক ট্যাংক, সোকওয়েল, প্রযোজ্য ক্ষেত্রে, STP এবং স্বাস্থ্য বিধানের যথাযোগ্য সুবিধাসমূহ থাকিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(২) সরকারি পয়ঃপ্রণালির ব্যবস্থা থাকিলে সমস্ত পয়ঃপ্রণালি ইহার সহিত সংযুক্ত হইতে পারিবে;</h6>\n<h6 class=\"h-lv6\">(৩) যেখানে কোনো সাধারণ পয়ঃপ্রণালি নাই সেইখানে সেপটিক ট্যাংক ব্যবহার করিয়া বর্জ্য পদার্থ এবং সোক পিট ব্যবহার করিয়া নোংরা পানি নিষ্কাশন করিতে হইবে। লে-আউট নকশায় STP, সেপটিক ট্যাংক এবং সোক পিট এর অবস্থান প্রদর্শন করিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(৪) ছাদ হইতে বৃষ্টির পানি রাস্তার নর্দমায় বা অন্য কোনো নির্গমন প্রণালিতে নির্গমনের পর্যাপ্ত সুব্যবস্থা থাকিতে হইবে যাহা ভিত্তিতে কোনো ক্ষতি ঘটাইবে না এবং ছাদ হইতে নির্গত পানি সংলগ্ন সম্পত্তি বা রাস্তায় পড়িতে পারিবে না।</h6>\n<h5 class=\"h-lv5\"><strong>(ঘ) বর্জ্য নিষ্কাশন:</strong></h5>\n<h6 class=\"h-lv6\">(১) সাইটের আঙিনায় বর্জ্য সংগ্রহের জন্য নির্দিষ্ট করিয়া জায়গা রাখিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(২) কঠিন বা রাসায়নিক বর্জ্য তৈরি করে এমন প্রতিষ্ঠানে তাহা সংগ্রহ ও নিরাপদ নিষ্কাশনের ব্যবস্থা থাকিতে হইবে;</h6>\n<hr class=\"sep\">"},{"num":"13491","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<p>（第６１条（衛生及び安全）第４号（ঘ）の続き）</p>\n<h6 class=\"h-lv6\">３　いかなる種類の廃棄物も、直接、水域、運河、池又は河川へ投棄してはならない。</h6>\n<h6 class=\"h-lv6\">４　化学的又は毒性の廃棄物については、処理（treatment）を施すことなく、下水溝、排水路、ゴミ箱、下水管、貯水施設、開放された場所への排出、又は地中への埋設を行ってはならない。</h6>\n<h5 class=\"h-lv5\"><strong>(ঙ) 架空電線及びその他の公共施設（Open electrical wires and other utilities）：</strong></h5>\n<h6 class=\"h-lv6\">１　架空電線及びその他の公共施設に関しては、次の表１４の規定、及び関連する電力部門の規則若しくは指示に従わなければならない。</h6>\n<p>####### <strong>表１４：建築物に近接する電線の最小離隔距離</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>項番</th><th>電線電圧</th><th>垂直（ｍ）</th><th>水平（ｍ）</th></tr></thead><tbody><tr><td>1</td><td>低圧から中圧の電線及び引込線</td><td>2.5</td><td>1.25</td></tr><tr><td>2</td><td>33kVまでの高圧電線</td><td>3.5</td><td>1.75</td></tr><tr><td>3</td><td>33kVを超える高圧電線</td><td>3.5に33kV（又はその端数）ごとに0.3を加算</td><td>1.75に33kV（又はその端数）ごとに0.3を加算</td></tr></tbody></table></div>\n<h6 class=\"h-lv6\">２　これらの公共施設ラインが土地の上空、地上又は地下を通過しており、建築工事のために移設が必要となる場合、当該移設費用は申請者が負担しなければならない。 この場合において、関連する地方政府当局が承認した道路の掘削及び再構築に関する規定、基準及びガイドラインに従わなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>(৩) কোনো প্রকার বর্জ্য সরাসরি জলাশয়, খাল, বিল ও নদী-নালাতে ফেলা যাইবে না; এবং</p>\n<p>(৪) রাসায়নিক বা বিষাক্ত বর্জ্য শোধন (treatment) না করিয়া নর্দমা, ড্রেন, ডাস্টবিন, পয়ঃনালা, জলাধার এবং উন্মুক্ত স্থানে নিষ্কাশন বা মাটির নিচে পুতিয়া রাখা যাইবে না;</p>\n<p><strong>(ঙ) খোলা বৈদ্যুতিক তার ও অন্যান্য ইউটিলিটি:</strong></p>\n<p>(১) খোলা বৈদ্যুতিক তার ও অন্যান্য ইউটিলিটির ক্ষেত্রে নিম্নবর্ণিত সারণি ১৪ এবং এতদসংক্রান্ত বিদ্যুৎ বিভাগের বিধিমালা/নির্দেশাবলি অনুসরণ করিতে হইবে, যথা:</p>\n<p>####### <strong>সারণি-১৪</strong></p>\n<p>####### <strong>ভবন সংলগ্ন বৈদ্যুতিক লাইনের ন্যূনতম দূরত্ব</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>ক্রমিক নম্বর</th><th>লাইন ভোল্টেজ</th><th>উল্লম্ব (মিটার)</th><th>আনুভূমিক (মিটার)</th></tr></thead><tbody><tr><td>(১)</td><td>(২)</td><td>(৩)</td><td>(৪)</td></tr><tr><td>১।</td><td>লো হইতে মিডিয়াম ভোল্টেজ লাইন এবং সার্ভিস লাইনসমূহ</td><td>২.৫</td><td>১.২৫</td></tr><tr><td>২।</td><td>৩৩ কেভি পর্যন্ত হাই ভোল্টেজ লাইন</td><td>৩.৫</td><td>১.৭৫</td></tr><tr><td>৩।</td><td>৩৩ কেভি এর অধিক হাই ভোল্টেজ লাইন</td><td>৩.৫ এবং প্রতি ৩৩ কেভি অথবা আংশিক মানের জন্য অতিরিক্ত ০.৩</td><td>১.৭৫ এবং প্রতি ৩৩ কেভি অথবা আংশিক মানের জন্য অতিরিক্ত ০.৩</td></tr></tbody></table></div>\n<h6 class=\"h-lv6\">(২) যদি এই সকল ইউটিলিটি লাইন জমির উপর দিয়া, মাটি ঘেঁষিয়া বা জমির নিচ দিয়া যায় এবং এই লাইনগুলি নির্মাণকার্যের সুবিধার্থে পরিবর্তন করিতে হয়, তাহা হইলে এই পরিবর্তনের খরচ আবেদনকারীকে বহন করিতে হইবে এবং এই ক্ষেত্রে সংশ্লিষ্ট স্থানীয় সরকার কর্তৃপক্ষের অনুমোদিত সড়ক খনন ও পুনঃনির্মাণ বিষয়ক বিধি-বিধান ও নীতিমালা অনুসরণ করিতে হইবে;</h6>\n<hr class=\"sep\">"},{"num":"13492","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>(চ) 防火安全（Fire safety）：</strong></h5>\n<h6 class=\"h-lv6\">１　建築物の使用者の適切な安全を確保するため、適用がある場合においては、防火安全（Fire safety）に係る全ての措置を付録（Appendix）１に従い講じなければならない。</h6>\n<h6 class=\"h-lv6\">２　適用される全ての建築物には、非常出口（Emergency exit）を示す方向標識を設けなければならない。</h6>\n<h6 class=\"h-lv6\">３　特別な指示がある場合を除き、機械式昇降設備（エレベーター等）を避難階段（Fire Exit）として使用してはならない。</h6>\n<h3 class=\"h-lv3\">第７章 [Chapter VII]</h3>\n<h4 class=\"h-lv4\">雑則 [Miscellaneous]</h4>\n<h5 class=\"h-lv5\"><strong>第６２条（景観計画及び公園（Landscaping and Parks））</strong></h5>\n<h6 class=\"h-lv6\">１　全ての政府機関の建築物、商業建築物、並びに大規模建築物又は共同住宅（Apartment）の建築にあたっては、適切な景観計画（Landscaping）の図面を備えなければならない。</h6>\n<h6 class=\"h-lv6\">２　公衆公園（Public Park）及び開放空間におけるいかなる工作物の建築についても、承認を受けなければならない。この場合において、次に掲げる場合を除き、いかなる構造物又は工作物の建築も承認してはならない。</h6>\n<h6 class=\"h-lv6\">一　スポーツに関連する建築物又は構造物</h6>\n<h6 class=\"h-lv6\">二　公園又は開放空間の総面積の５パーセント以内、かつ高さ４メートル以内であって、一般公衆の利便に資する建築物又は構造物</h6>\n<h6 class=\"h-lv6\">３　次に掲げる事項については、都市開発委員会（Urban Development Committee）の勧告又は決定を必要とする。</h6>\n<h6 class=\"h-lv6\">一　いかなる彫刻（Sculpture）の設置</h6>\n<h6 class=\"h-lv6\">二　いかなる構造物の建築</h6>\n<h5 class=\"h-lv5\"><strong>第６３条（伝統的建築物、史跡、地域の保存（Conservation and Preservation））</strong></h5>\n<h6 class=\"h-lv6\">１　政府が布告した伝統的建築物（Heritage building）、重要史跡及び重要地域を適切に保存するため、次に掲げる規定を適用する。</h6>\n<h6 class=\"h-lv6\">一　政府は、ダッカ首都圏における全ての伝統的建築物、重要建築物、重要史跡及び重要地域の目録を作成しなければならない。</h6>\n<h6 class=\"h-lv6\">二　政府は、ダッカ首都圏の全ての伝統的建築物、重要建築物、重要史跡及び重要地域の目録を作成・更新した上で、当該建築物等の目録を官報（Gazette）により公示し、かつ、所有者及び居住者に対し当該登録に関する通知を行うとともに、ウェブサイトに掲載しなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>(চ) অগ্নি নিরাপত্তা:</p>\n<p>(১) ইমারত ব্যবহারকারীদের সঠিক নিরাপত্তার জন্য, প্রযোজ্য ক্ষেত্রে, অগ্নি নির্বাপক নিরাপত্তার সকল ব্যবস্থা পরিশিষ্ট- ১ অনুযায়ী নিশ্চিত করিতে হইবে;</p>\n<p>(২) প্রযোজ্য সকল ইমারতে জরুরি প্রস্থান প্রদর্শনকারী দিকচিহ্ন থাকিতে হইবে; এবং</p>\n<p>(৩) বিশেষ নির্দেশনা না থাকিলে যন্ত্রচালিত উঠানামার ব্যবস্থা জরুরি নির্গমন পথ (Fire Exit) হিসাবে ব্যবহার করা যাইবে না।</p>\n<h3 class=\"h-lv3\">সপ্তম অধ্যায়</h3>\n<h4 class=\"h-lv4\">বিবিধ</h4>\n<h5 class=\"h-lv5\"><strong>৬২। ল্যান্ডস্কেপিং এবং পার্ক।</strong>—</h5>\n<h6 class=\"h-lv6\">(১) সকল সরকারি ইমারত, বাণিজ্যিক ইমারত এবং বৃহদাকার ভবন বা অ্যাপার্টমেন্ট নির্মাণের ক্ষেত্রে একটি যথোচিত ল্যান্ডস্কেপ নকশা থাকিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(২) পাবলিক পার্ক এবং খোলা পরিসরে যেকোনো স্থাপনা নির্মাণের জন্য অনুমোদনের প্রয়োজন হইবে এবং অনুরূপ স্থানে নিম্নবর্ণিত ক্ষেত্র ব্যতীত কোনো কাঠামো বা স্থাপনা নির্মাণের অনুমোদন প্রদান করা হইবে না, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) খেলাধুলা সংক্রান্ত ইমারত বা কাঠামো; এবং</h6>\n<h6 class=\"h-lv6\">(খ) পার্ক অথবা খোলা পরিসরের সর্বোচ্চ ৫% ক্ষেত্রফল এবং ৪ মিটার উচ্চতা পর্যন্ত সাধারণ জনগণের সুবিধা প্রদানের সহিত জড়িত কোনো ইমারত বা কাঠামো।</h6>\n<h6 class=\"h-lv6\">(৩) নিম্নবর্ণিত ক্ষেত্রে নগর উন্নয়ন কমিটির সুপারিশ বা সিদ্ধান্তের প্রয়োজন হইবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) যেকোনো ভাস্কর্য প্রতিষ্ঠার ক্ষেত্রে; এবং</h6>\n<h6 class=\"h-lv6\">(খ) যেকোনো কাঠামো নির্মাণ।</h6>\n<h5 class=\"h-lv5\"><strong>৬৩। ঐতিহ্যবাহী ইমারত, স্থান, এলাকা সংরক্ষণ (Conservation and Preservation)</strong>—</h5>\n<h6 class=\"h-lv6\">(১) সরকার কর্তৃক ঘোষিত ঐতিহ্যবাহী ইমারত ও গুরুত্বপূর্ণ স্থান এবং এলাকাসমূহ যথাযথ সংরক্ষণের উদ্দেশ্যে নিম্নবর্ণিত বিধানসমূহ প্রযোজ্য হইবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) সরকার কর্তৃক ঢাকা মহানগরীর সকল ঐতিহ্যবাহী ইমারত, গুরুত্বপূর্ণ ইমারত, গুরুত্বপূর্ণ স্থান ও এলাকাসমূহের তালিকা প্রস্তুত করিতে হইবে;</h6>\n<h6 class=\"h-lv6\">(খ) সরকার ঢাকা মহানগরীর সকল ঐতিহ্যবাহী ইমারত, গুরুত্বপূর্ণ ইমারত, গুরুত্বপূর্ণ স্থান ও এলাকাসমূহের তালিকা প্রস্তুত ও হালনাগাদপূর্বক উহাদের ইমারতের তালিকা গেজেট আকারে প্রকাশ করিবে এবং মালিক এবং বসবাসকারীগণকে অনুরূপ তালিকাভুক্তির বিষয়ে অবহিতকরণের নিমিত্ত বিজ্ঞপ্তি জারি করিবে এবং ওয়েবসাইটে প্রকাশ করিবে;</h6>\n<hr class=\"sep\">"},{"num":"13493","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<p>（第６３条（伝統的建築物等）第１項の続き）</p>\n<h6 class=\"h-lv6\">三（গ）　目録の作成、更新及び工作物の保存に関し、政府は主任建築士（Chief Architect）を委員長とする助言委員会を設置しなければならない。当該委員会には専門職団体の代表者、歴史及び芸術の専門家を委員として含めなければならない。</h6>\n<h6 class=\"h-lv6\">四（ঘ）　全ての伝統的建築物等は目録登録に際し、法典（BNBC）に基づき３つの階級（第１級、第２級、第３級）に分類しなければならない。</h6>\n<p>####### <strong>ただし、</strong> 分類が完了するまでの間、現行の官報により登録されている建築物は第１級として扱う。</p>\n<h6 class=\"h-lv6\">五（ঙ）　許可を受けることなく登録された建築物について変更、破壊等を行った場合、所管行政庁は工事の停止を命じ、且つ当該敷地における新たな設計承認を行ってはならない。</h6>\n<h6 class=\"h-lv6\">六（চ）　助言委員会が適切な維持管理が行われていないと認める場合、政府は当該建築物及び史跡を強制的に買収（অধিগ্রহণ）しなければならない。</h6>\n<h6 class=\"h-lv6\">七（ছ）　伝統的建築物等の周囲２５メートルの保存区域内において計画される新築建築物は、次に掲げる条件に従わなければならない。</h6>\n<h6 class=\"h-lv6\">１　第１級に登録された伝統的建築物等の場合：</h6>\n<p>####### ｉ　当該建築物から少なくとも９メートルまでの範囲は完全に空地として維持し、いかなる建築等も行ってはならない。</p>\n<p>####### ｉｉ　隣接する２５メートルまでの範囲内においては、建築物の高さは１５メートル又は最大４階までに制限しなければならない（階段室を除く）。</p>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>(গ) দফা (খ)-তে উল্লিখিত তালিকা প্রণয়ন, হালনাগাদ, স্থাপনা সংরক্ষণের ক্ষেত্রে সরকার, গণপ্রজাতন্ত্রী বাংলাদেশ সরকারের প্রধান স্থপতির নেতৃত্বে একটি উপদেষ্টা কমিটি গঠন করিবে এবং উক্ত কমিটিতে কর্তৃপক্ষ, প্রত্নতত্ত্ব অধিদপ্তর, পেশাজীবী প্রতিষ্ঠানের প্রতিনিধি এবং উক্ত বিষয়ে বিশেষজ্ঞ স্থপতি, প্রকৌশলী, পরিকল্পনাবিদ, ইতিহাসবিদ ও শিল্পীগণ সদস্য হিসাবে নিযুক্ত থাকিবেন;</p>\n<p>(ঘ) উক্ত সকল ঐতিহ্যবাহী ইমারত, গুরুত্বপূর্ণ স্থান ও এলাকাসমূহ তালিকাভুক্ত করিবার সময় কোড অনুসারে তিন শ্রেণিতে (গ্রেড-১, গ্রেড-২, গ্রেড-৩) ভাগ করিতে হইবে:</p>\n<p>তবে শর্ত থাকে যে, বাংলাদেশ ন্যাশনাল বিল্ডিং কোড অনুসারে (গ্রেড-১, গ্রেড-২, গ্রেড-৩) শ্রেণিবদ্ধ না হওয়া পর্যন্ত এ সংক্রান্ত বিদ্যমান গেজেটের তালিকাভুক্ত ইমারত গ্রেড-১ হিসাবে নকশা অনুমোদিত হইবে;</p>\n<p>(ঙ) যদি কোনো ব্যক্তি অথবা প্রতিষ্ঠান সংশ্লিষ্ট কর্তৃপক্ষ, ঐতিহ্যবাহী ইমারত, গুরুত্বপূর্ণ স্থান ও এলাকা সংক্রান্ত উপদেষ্টা কমিটি বা প্রত্নতত্ত্ব অধিদপ্তরের অনুমতি ব্যতীত তালিকাভুক্ত ইমারতের কোনো প্রকার পরিবর্তন, পরিবর্ধন, সংযোজন বা ধ্বংস সাধন করে, তাহা হইলে সংশ্লিষ্ট কর্তৃপক্ষ উক্ত ইমারতের মালিক বা দখলদারকে কাজ বন্ধ করিবার নির্দেশ প্রদান করিবে এবং সেইক্ষেত্রে কর্তৃপক্ষ উক্ত জমিতে নির্মাণের জন্য নূতন কোনো ভবনের নকশার অনুমোদন প্রদান করিবে না;</p>\n<p>(চ) ঐতিহ্যবাহী ইমারত, গুরুত্বপূর্ণ স্থান ও এলাকা সংক্রান্ত উপদেষ্টা কমিটি যদি মনে করে যে, কোনো তালিকাভুক্ত ইমারত ও এলাকাসমূহে অবস্থিত গুরুত্বপূর্ণ স্থাপনাসমূহের যথাযথ তত্ত্বাবধান হইতেছে না তাহা হইলে সরকার এইরূপ ইমারত ও গুরুত্বপূর্ণ স্থানসমূহ বাধ্যতামূলক অধিগ্রহণ করিবে;</p>\n<p>(ছ) ঐতিহ্যবাহী ইমারত, গুরুত্বপূর্ণ স্থান ও এলাকাসমূহের চারপাশে ২৫ মিটার সংরক্ষিত এলাকায় স্থাপনা নির্মাণের জন্য প্রস্তাবিত নূতন ইমারতের ক্ষেত্রে নিম্নবর্ণিত শর্তাবলি প্রযোজ্য হইবে;</p>\n<p>(১) গ্রেড-১, তালিকাভুক্ত ঐতিহ্যবাহী ইমারত/স্থাপনার ক্ষেত্রে:</p>\n<p>(i) ঐতিহ্য ইমারত হইতে অন্যূন ৯ মিটার দূরত্ব পর্যন্ত সম্পূর্ণরূপে খালি রাখিতে হইবে এবং উক্ত দূরত্বের মধ্যে কোনো প্রকার নির্মাণ/উন্নয়ন/পরিবর্তন করা যাইবে না;</p>\n<p>(ii) ঐতিহ্যবাহী ইমারত সংলগ্ন ২৫ মিটার দূরত্ব পর্যন্ত ইমারতের উচ্চতা ১৫ মিটার বা সর্বোচ্চ ৪ তলা পর্যন্ত সীমাবদ্ধ থাকিবে (সিঁড়িঘরের উচ্চতা বাদে);</p>\n<hr class=\"sep\">"},{"num":"13494","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<p>（第６３
