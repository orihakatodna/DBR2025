条（伝統的建築物等）第７号の続き）</p>\n<p>####### <strong>ｉｉｉ</strong>　伝統的地域（Heritage area）内に個別に登録された建築物が存する場合であっても、隣接敷地については本規則の規定を遵守しなければならない。</p>\n<p>####### <strong>ｉｖ</strong>　登録された伝統的建築物等の周囲２５メートルまでの保存区域内における設計承認にあたっては、駐車場の最小附置義務台数を緩和することができ、また当該区域を歩行者専用区域（Pedestrian precinct）として指定できる。</p>\n<p>####### <strong>ｖ</strong>　伝統的建築物等から２５メートルまでの範囲内にある全ての建築物の用途については、店舗、博物館等、地域の伝統と調和する小規模な観光親和的土地利用に供することができる。</p>\n<h6 class=\"h-lv6\"><strong>２　第２級に登録された伝統的建築物等の場合：</strong></h6>\n<p>####### <strong>ｉ</strong>　伝統的建築物から少なくとも９メートルまでの範囲は完全に空地として維持しなければならない。</p>\n<p>####### <strong>ｉｉ</strong>　保存される９メートルの離隔距離を超えた隣接敷地においては、本規則に従って新築することができる。</p>\n<p>####### <strong>ｉｉｉ</strong>　個人又は民間機関が所有する伝統的建築物等において保存区域設定により開発が妨げられる場合、開発権移転（TDR）の指針に基づき、他区域への開発権移転を申請できる。</p>\n<h6 class=\"h-lv6\"><strong>３　第３級に登録された伝統的建築物等の場合：</strong></h6>\n<p>####### <strong>ｉ</strong>　登録された伝統的建築物について、道路に接する壁面後退（セットバック）区域内にある当初の建築物（Original building）の部分のみを保存しなければならない。</p>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>(iii) ঐতিহ্যবাহী এলাকার অভ্যন্তরে আলাদাভাবে কোনো তালিকাভুক্ত ইমারত অবস্থিত হইয়া থাকিলেও ঐ ইমারত সংলগ্ন প্লটসমূহের ক্ষেত্রে বিধি ৬১ এর উপ-বিধি (১) ও (২) অনুসরণ করিতে হইবে;</p>\n<p>(iv) তালিকাভুক্ত ঐতিহ্যবাহী ইমারত, গুরুত্বপূর্ণ স্থান ও এলাকাসমূহের ২৫ মিটার পর্যন্ত সংরক্ষিত এলাকার অভ্যন্তরে প্রস্তাবিত নূতন ইমারতের নকশা অনুমোদনের ক্ষেত্রে গাড়ি পার্কিং এর ন্যূনতম নিয়মাবলি শিথিলযোগ্য হইবে এবং ক্ষেত্র বিশেষে কেবল পথচারীর জন্য pedestrian precinct হিসাবে ব্যবহারের নির্দেশনা প্রদান করা যাইবে;</p>\n<p>(v) তালিকাভুক্ত ঐতিহ্যবাহী ইমারত, গুরুত্বপূর্ণ স্থান ও এলাকাসমূহের এবং তাহার সীমানার সমান্তরালে ন্যূনতম সংরক্ষিত এলাকা (যাহা অবশ্যই খালি রাখিতে হইবে) সহ ২৫ মিটার পর্যন্ত সকল ইমারতের ব্যবহারের জন্য স্বল্প পরিসরে পর্যটন বান্ধব ভূমি ব্যবহার করা যাইবে যেমন- দোকানপাট, আর্ট গ্যালারি, মিউজিয়াম, পাঠাগার, প্রদর্শনীস্থল, ইত্যাদি যাহা স্থানীয় ঐতিহ্যের সহিত সংগতিপূর্ণ;</p>\n<p>(২) গ্রেড-২, তালিকাভুক্ত ঐতিহ্যবাহী ইমারত/স্থাপনার ক্ষেত্রে:</p>\n<p>(i) ঐতিহ্যবাহী ইমারত হইতে ন্যূনতম ৯ মিটার দূরত্ব পর্যন্ত সম্পূর্ণরূপে খালি রাখিতে হইবে এবং উক্ত দূরত্বের মধ্যে কোনো প্রকার নির্মাণ/ উন্নয়ন/ পরিবর্তন করা যাইবে না;</p>\n<p>(ii) ঐতিহ্যবাহী ইমারত, গুরুত্বপূর্ণ স্থান ও এলাকাসমূহের জন্য সংরক্ষিত ৯ মিটার দূরত্ব পরবর্তী সংলগ্ন প্লটসমূহে এই বিধিমালা অনুসরণ করিয়া নূতন ভবন নির্মাণ করা যাইবে;</p>\n<p>(iii) ব্যক্তি বা বেসরকারি প্রতিষ্ঠানের মালিকানাধীন তালিকাভুক্ত ঐতিহ্যবাহী ইমারত, গুরুত্বপূর্ণ স্থান ও এলাকাসমূহের জন্য সংরক্ষিত অংশে উন্নয়ন বিঘ্নিত হইলে অন্য এলাকায় উন্নয়ন স্বত্ব হস্তান্তর ও নির্মাণের অনুমতিপত্র TDR (Transfer of Development Right) এর নীতিমালা অনুসরণপূর্বক আবেদন করা যাইবে;</p>\n<p>(৩) গ্রেড-৩, তালিকাভুক্ত ঐতিহ্যবাহী ইমারত/স্থাপনার ক্ষেত্রে:</p>\n<p>(i) তালিকাভুক্ত ঐতিহ্যবাহী ইমারতের জন্য শুধু রাস্তা সংলগ্ন সেটব্যাক এলাকার আদিভবনের অংশটুকু সংরক্ষণ করিতে হইবে;</p>\n<hr class=\"sep\">"},{"num":"13495","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<p>（第６３条（伝統的建築物等）第３項（ｉ）の続き）</p>\n<p>####### <strong>ｉｉ</strong>　当初の工作物の一部を保存することを条件として、残余の敷地部分については現行の建築規則に従って新築することができる。</p>\n<p>####### <strong>ｉｉｉ</strong>　新築建築物は、当該保存すべき工作物の一部に接して建築することができる。</p>\n<h6 class=\"h-lv6\"><strong>２</strong>　伝統的建築物等の保存区域内において、高さや建蔽率が制限されることにより指定容積率（FAR）を完全に消化することが困難な場合、所有者は申請により未消化分を他の区域へ移転できる。許可証（TDR Certificate）には次に掲げる事項を記載しなければならない。</h6>\n<h6 class=\"h-lv6\">一　容積率が完全に消化されなかった敷地の位置及び所有者情報</h6>\n<h6 class=\"h-lv6\">二　未消化分の容積率の数値及び床面積</h6>\n<h6 class=\"h-lv6\">三　割増床面積を充当する移転先区域の名称及び土地利用区分（住宅用途を除く）</h6>\n<h6 class=\"h-lv6\">四　移転された床面積は、幅員１８メートル以上の道路に接する敷地において使用しなければならない。</h6>\n<h6 class=\"h-lv6\">五　開発権移転許可証（TDR Certificate）は、二回以上譲渡してはならない。</h6>\n<h5 class=\"h-lv5\"><strong>第６４条（洪水多発区域、湿地近傍及び丘陵地帯における開発及び建築）</strong></h5>\n<h6 class=\"h-lv6\">１　洪水多発区域、水域近傍又は丘陵地帯（পাহাড়ি এলাকা）に所在する敷地において、盛土又は掘削を行う場合は承認を受けなければならない。</h6>\n<h6 class=\"h-lv6\">２　土工事区域を明確に表示するとともに、次に掲げる情報を提出しなければならない。</h6>\n<h6 class=\"h-lv6\">一　敷地及び隣接道路の現況の等高線図（Contour）、標高及び勾配</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>(ii) ক্রমিক নং ১ এ উল্লিখিত আদি স্থাপনার অংশটুকু সংরক্ষণ পূর্বক পরবর্তী ভূমিতে বিদ্যমান ইমারত বিধিমালা অনুযায়ী নতুন ভবন নির্মাণ করা যাইবে;</p>\n<p>(iii) নূতন ভবনটি আদি স্থাপনার অংশটুকুর সংলগ্ন বা সম্মুখ সেটব্যাক ব্যতীত করা যাইবে এবং পার্শ্ববর্তী সেটব্যাক বিধিমালা অনুযায়ী করিতে হইবে।</p>\n<p>(২) ঐতিহ্যবাহী ইমারত, গুরুত্বপূর্ণ স্থান ও এলাকাসমূহের কারণে সংরক্ষিত এলাকায় যেকোনো প্লটের উচ্চতা, সেটব্যাক বা ভূমি আচ্ছাদন নিয়ন্ত্রিত হইলে এবং সেই প্লটসমূহের যে কোনোটিতে প্রাপ্ত FAR সূচক সম্পূর্ণভাবে ব্যবহার করা সম্ভব না হইলে কর্তৃপক্ষের নির্ধারিত ফরমে মালিকের আবেদনের প্রেক্ষিতে উক্ত প্লটে ব্যবহৃত FAR সূচকের অবশিষ্টাংশটুকু অন্য এলাকায় হস্তান্তর ও নির্মাণের অনুমতিপত্র TDR নীতিমালা অনুসরণপূর্বক করিতে পারিবে এবং উক্ত TDR সংক্রান্ত অনুমতি পত্রে নিম্নবর্ণিত বিষয়সমূহ উল্লিখিত থাকিবে, যথা:—</p>\n<p>(ক) যে প্লটের ক্ষেত্রে FAR সূচক সম্পূর্ণ ব্যবহৃত হয় নাই, সেই প্লটের অবস্থান, মালিকের নাম ও ঠিকানা;</p>\n<p>(খ) অব্যবহৃত FAR সূচকের পরিমাণ ও ক্ষেত্রফল (বর্গমিটারে);</p>\n<p>(গ) অব্যবহৃত FAR সূচক অনুযায়ী প্রাপ্য ক্ষেত্রফল অন্য যে এলাকায় কোনো প্রকল্পের জন্য FAR সূচক অনুযায়ী প্রাপ্য ক্ষেত্রফলের সহিত অতিরিক্ত ক্ষেত্রফল হিসাবে সংযুক্ত করা হইবে সেই এলাকার নাম ও ভূমি ব্যবহারের ধরন (আবাসিক ব্যতিরেকে);</p>\n<p>(ঘ) অব্যবহৃত FAR সূচক অনুযায়ী প্রাপ্ত এই অতিরিক্ত ক্ষেত্রফল ন্যূনতম ১৮ মিটার প্রশস্ত রাস্তার পাশে অবস্থিত প্লটে মহাপরিকল্পনা অনুসরণপূর্বক ব্যবহার করা যাইবে;</p>\n<p>(ঙ) অনুমতিপত্র (TDR Certificate) একের অধিকবার হস্তান্তর যোগ্য নহে।</p>\n<h5 class=\"h-lv5\"><strong>৬৪। বন্যাপ্রবণ অঞ্চল, জলাভূমির নিকটস্থ এবং পাহাড়ি এলাকায় উন্নয়ন ও নির্মাণ।</strong>—</h5>\n<h6 class=\"h-lv6\">(১) বন্যাপ্রবণ অঞ্চল, জলাশয়ের নিকটস্থ বা পাহাড়ি এলাকায় অবস্থিত সাইটের ক্ষেত্রে ভূমি ভরাট ও খননকালে কর্তৃপক্ষের অনুমোদন গ্রহণ করিতে হইবে এবং এতদ্বিষয়ে বিশদ অঞ্চল পরিকল্পনায় বর্ণিত বিধানাবলি অনুযায়ী অতিরিক্ত শর্ত প্রযোজ্য হইবে।</h6>\n<h6 class=\"h-lv6\">(২) ভূমি ভরাট ও খনন এলাকাসমূহ স্পষ্টরূপে প্রদর্শন করিতে হইবে এবং নিম্নবর্ণিত তথ্যসমূহ পেশ করিতে হইবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) সাইট ও সাইট সন্নিহিত রাস্তাসমূহের বিদ্যমান কন্ট্যুর (Contour), স্পট লেভেল ও ভূমির ঢাল; এবং</h6>\n<hr class=\"sep\">"},{"num":"13496","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<p>（第６４条（丘陵地帯等）第２項（ক）の続き）</p>\n<h6 class=\"h-lv6\">二（খ）　新設する法面並びに当該法面の補強のために有資格の技術者によって推奨された擁壁（রিটেইনিং ওয়াল）若しくはその他の必要な工作物。</h6>\n<h6 class=\"h-lv6\">３　確認済証の申請に際しては、擁壁等の必要な設計図書を添付しなければならない。</h6>\n<h6 class=\"h-lv6\">４　丘陵地とみなされる土地におけるあらゆる開発にあたっては、等高線図に従わなければならない。</h6>\n<h6 class=\"h-lv6\">５　当該土地においては、いかなる場合も工場（শিল্প স্থাপনা）を建築してはならない。</h6>\n<h6 class=\"h-lv6\">６　丘陵地の地滑りを防止するため、麓において他のいかなる工事を開始する前であっても、安全のための擁壁を建設しなければならない。</h6>\n<h6 class=\"h-lv6\">７　丘陵地から流出する水の自然な経路を妨げるようないかなる行為も行ってはならない。</h6>\n<h6 class=\"h-lv6\">８　全ての建築にあたっては、詳細地区計画（DAP）の指針を遵守しなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第６５条（特別規制（Special Controls））</strong></h5>\n<h6 class=\"h-lv6\">１　政府が指定した特別区域に関し、防衛規制、重要拠点（KPI）、航空等に関する一切の制限は当該区域の建築に適用される。</h6>\n<h6 class=\"h-lv6\">２　政府指定のVIP道路の沿道における建築にあたっては、政府が課す条件を適用する。</h6>\n<h6 class=\"h-lv6\">３　ナショナル・モニュメント、駐屯地、造幣局、ラルバック・フォート等の国家的に重要な特別区域における高さ規制については、都市計画の勧告及び政府の制限を適用する。</h6>\n<h6 class=\"h-lv6\">４　空港及び航空路（Air funnel）指定区域においては、民間航空局（CAAB）が定める高さ制限規定を適用する。</h6>\n<h6 class=\"h-lv6\">５　所管行政庁は、各区域において許可される建築物の最高高さに関するガイドラインを作成し、閲覧に供さなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>(খ) নতুন ঢাল বা বাঁধ (যদি প্রস্তাবে থাকে) এবং প্রস্তাবিত ঢাল বা বাঁধ সুদৃঢ়করণের জন্য যোগ্য কারিগরি ব্যক্তি কর্তৃক নিরূপিত এবং সুপারিশকৃত রিটেইনিং ওয়াল বা অন্য প্রয়োজনীয় অবকাঠামো।</p>\n<h6 class=\"h-lv6\">(৩) নির্মাণ অনুমোদনপত্রের জন্য আবেদনের সময়ে রিটেইনিং ওয়াল বা বাঁধের প্রয়োজনীয় নকশা সংযোজন করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৪) পাহাড় হিসাবে দৃশ্যমান জমিতে যেকোনো ধরনের উন্নয়নের ক্ষেত্রে কন্ট্যুর ম্যাপ অনুসরণ করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৫) এইরূপ ভূমিতে কোনো অবস্থাতেই শিল্প স্থাপনা নির্মাণ করা যাইবে না।</h6>\n<h6 class=\"h-lv6\">(৬) পাহাড়ের ভূমিধ্বস এড়াইবার উদ্দেশ্যে পাহাড়ের পাদদেশে অন্যান্য যেকোনো কাজ আরম্ভের পূর্বে নিরাপত্তামূলক রিটেইনিং ওয়াল নির্মাণ করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৭) পাহাড় হইতে আগত পানির স্বাভাবিক প্রবাহের গতিপথ বাধাগ্রস্ত হয় এইরূপ কোনো কর্মকাণ্ড করা যাইবে না।</h6>\n<h6 class=\"h-lv6\">(৮) সকল ক্ষেত্রে বিশদ অঞ্চল পরিকল্পনার নির্দেশিকা অনুযায়ী স্থাপনা নির্মাণ করিতে হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>৬৫। বিশেষ নিয়ন্ত্রণ।</strong>—</h5>\n<h6 class=\"h-lv6\">(১) সরকার কর্তৃক নির্ধারিত কোনো বিশেষ এলাকার জন্য জারীকৃত প্রতিরক্ষা নিয়ন্ত্রণ, Key Point Installation (KPI), জাতীয় নিরাপত্তা, বিমান চলাচল বিষয়ক নিষেধাজ্ঞা ইত্যাদি উক্ত এলাকায় প্রযোজ্য হইবে।</h6>\n<h6 class=\"h-lv6\">(২) সরকার কর্তৃক নির্ধারিত ভিআইপি সড়কসমূহের পার্শ্বে ইমারত নির্মাণের ক্ষেত্রে জনস্বার্থে সরকার কর্তৃক আরোপিত যেকোনো শর্তাবলি প্রযোজ্য হইবে।</h6>\n<h6 class=\"h-lv6\">(৩) জাতীয় স্মৃতি সৌধ, ক্যান্টনমেন্ট এলাকা, টাকশাল, লালবাগ দুর্গ ইত্যাদি রাষ্ট্রীয় গুরুত্বপূর্ণ বিশেষ এলাকাসমূহ উচ্চতা নিয়ন্ত্রণে মহাপরিকল্পনার সুপারিশ ও সরকারি নিষেধাজ্ঞা প্রযোজ্য হইবে।</h6>\n<h6 class=\"h-lv6\">(৪) বিমান বন্দর ও সংলগ্ন এয়ার ফানেল এর জন্য নির্ধারিত এলাকায় সকল ধরনের ইমারত নির্মাণের ক্ষেত্রে বেসামরিক বিমান চলাচল কর্তৃপক্ষ কর্তৃক নির্ধারিত উচ্চতা নিয়ন্ত্রণ নিয়মাবলি প্রযোজ্য হইবে।</h6>\n<h6 class=\"h-lv6\">(৫) কর্তৃপক্ষ বিভিন্ন এলাকাতে অনুমোদনযোগ্য ইমারতের সর্বোচ্চ উচ্চতার বিষয়টি উল্লেখপূর্বক একটি নির্দেশিকা ও নকশা পেশাজীবী ও জনসাধারণের অবগতির জন্য প্রদর্শন বা সরবরাহের ব্যবস্থা করিবে।</h6>\n<hr class=\"sep\">"},{"num":"13497","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第６５条（特別規制）（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>৬</strong>　高さ制限区域内の敷地において指定容積率（FAR）を完全に消化できない場合は、義務的空地の配置に代えて、所定の後退距離（セットバック）を確保した上で、承認された高さまで建築できる。この場合も床面積上限は遵守しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>৭</strong>　高さ制限区域内の角地において、一方の道路を正面とする場合は道路中心から ４.５メートル 等のセットバックを要する。</h6>\n<p>####### <strong>ただし、</strong> 両方の道路を正面とする場合は双方に所定のセットバックを確保しなければならない。</p>\n<h5 class=\"h-lv5\"><strong>第６６条（障害者等を含むユニバーサルアクセシビリティに関する特別規定）</strong></h5>\n<h6 class=\"h-lv6\"><strong>ক</strong>　すべての建築物において、駐車場からエレベーターロビーに至るまでのアクセシビリティを確保しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>খ</strong>　ホテル、学校、延べ面積１００平方メートルを超える公衆利用建築物等における次に掲げる事項：</h6>\n<h6 class=\"h-lv6\"><strong>１</strong>　ユニバーサルアクセシビリティの確保</h6>\n<h6 class=\"h-lv6\"><strong>２</strong>　各階に少なくとも一つの便所、又は全便所数の ５パーセント 以上の車椅子対応便所の確保</h6>\n<h6 class=\"h-lv6\"><strong>গ</strong>　すべての住宅建築物において、少なくとも一つの便所の扉の有効幅員は ９００ミリメートル 以上としなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>ঘ</strong>　アクセシビリティの最小基準は、法典（Code）及び付録２に従うものとする。</h6>\n<h5 class=\"h-lv5\"><strong>第６７条（廃棄物管理活動）</strong></h5>\n<h6 class=\"h-lv6\"><strong>১</strong>　住戸数が ２００ 以上の建築物にあっては、自ら廃棄物管理を行うために必要な活動を講じなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h6 class=\"h-lv6\">(৬) ব্লকভিত্তিক উন্নয়ন ব্যতীত বিমান চলাচল বা অন্য কোনো কারণে উচ্চতা নিয়ন্ত্রিত এলাকাসমূহের প্লটের ক্ষেত্রে প্রযোজ্য সর্বোচ্চ FAR প্রয়োগ করিতে না পারিলে উক্ত প্লটের জন্য আবশ্যিক অনাচ্ছাদিত স্থান সংস্থানের পরিবর্তে প্রযোজ্য সেটব্যাক স্পেস রাখিয়া অনুমোদিত উচ্চতা পর্যন্ত ইমারত নির্মাণ করা যাইবে এবং উক্ত নির্মিত ভবনের FARভুক্ত ক্ষেত্রফল কোনোক্রমেই উক্ত প্লটের জন্য প্রযোজ্য ফারে প্রাপ্য ক্ষেত্রফলের চাইতে বেশি হইতে পারিবে না।</h6>\n<h6 class=\"h-lv6\">(৭) উচ্চতা নিয়ন্ত্রিত এলাকাসমূহের কর্ণার প্লটের ক্ষেত্রে যে রাস্তাকে সম্মুখ ধরিয়া প্লটে প্রবেশ ও বাহির নিয়ন্ত্রিত হইবে শুধু উক্ত রাস্তাকে সম্মুখ বিবেচনা করিয়া রাস্তার কেন্দ্রস্থল হইতে ৪.৫ মিটার অথবা জমির সীমানা হইতে ১.৫ মিটার, যাহা অধিক তাহাই সম্মুখ সেটব্যাক হিসাবে রাখিতে হইবে:</h6>\n<p>####### <strong>তবে শর্ত থাকে যে,</strong> কর্ণার প্লটের ক্ষেত্রে উভয় রাস্তাকে সম্মুখ হিসাবে ব্যবহারের জন্য উভয় রাস্তার দিককে সম্মুখ বিবেচনা করিয়া প্রযোজ্য সেটব্যাক রাখিতে হইবে।</p>\n<h5 class=\"h-lv5\"><strong>৬৬। প্রতিবন্ধীসহ সার্বজনীনগম্যতা সম্পর্কিত বিশেষ বিধান।</strong>—</h5>\n<h6 class=\"h-lv6\">(ক) সকল ইমারতে পার্কিং স্পেস হইতে সংলগ্ন তলার লিফট লবি পর্যস্ত সার্বজনীনগম্যতার ব্যবস্থা;</h6>\n<h6 class=\"h-lv6\">(খ) হোটেল, শিক্ষা প্রতিষ্ঠান, চিকিৎসা সেবা ইত্যাদি ১০০ বর্গমিটারের অধিক গণব্যবহার উপযোগী ইমারতে—</h6>\n<h6 class=\"h-lv6\">(১) প্রতিবন্ধীসহ সার্বজনীনগম্যতা;</h6>\n<h6 class=\"h-lv6\">(২) প্রতি তলায় অন্যূন একটি টয়লেট অথবা সর্বমোট টয়লেট সংখ্যার ৫% (যাহা অধিক) পরিমাণ টয়লেট সহজেই প্রবেশযোগ্য হইতে হইবে;</h6>\n<h6 class=\"h-lv6\">(গ) সকল আবাসিক ভবনের ক্ষেত্রে অন্যূন একটি টয়লেট শারীরিক প্রতিবন্ধকতার ক্ষেত্রে হুইল চেয়ারসহ ব্যবহারের জন্য অন্যূন ৯০০ মি.মি. প্রশস্ত; এবং</h6>\n<h6 class=\"h-lv6\">(ঘ) সার্বজনীনগম্যতার অন্যূন মান কোড ও পরিশিষ্ট-২ অনুযায়ী নির্ধারিত হইতে হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>৬৭। বর্জ্য ব্যবস্থাপনা কার্যক্রম।</strong>—</h5>\n<h6 class=\"h-lv6\">(১) ২০০ (দুই শত) বা তদূর্ধ্ব আবাসন ইউনিট বিশিষ্ট ইমারতের নিজস্ব বর্জ্য ব্যবস্থাপনার জন্য প্রয়োজনীয় কার্যক্রম গ্রহণ করিতে হইবে।</h6>\n<hr class=\"sep\">"},{"num":"13498","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<p>（第６７条（廃棄物管理）の続き）</p>\n<h6 class=\"h-lv6\"><strong>২</strong>　設計図書において廃棄物管理用スペースを明記しなければならない。当該スペースは容積率（FAR）には算入しないが、追加の建蔽率制限内とする。</h6>\n<h6 class=\"h-lv6\"><strong>৩</strong>　建築、除却、資材輸送にあたっては、環境汚染に関する一切の法律等を遵守しなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第６８条（水の再利用（Water Reuse））</strong></h5>\n<h6 class=\"h-lv6\"><strong>১</strong>　住戸数が２００以上の住宅、又は客室５０以上のホテル、事務所、大規模集会施設等においては、水の<strong>再利用（পানির পুনঃব্যবহার）</strong>設備を設けなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>২</strong>　再利用施設は容積率には算入しないが、追加の建蔽率制限内とする。</h6>\n<h5 class=\"h-lv5\"><strong>第６９条（太陽光発電及び利用）</strong></h5>\n<h6 class=\"h-lv6\"><strong>১</strong>　建築物の所有者は、太陽光発電及びその利用措置を講じなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>২</strong>　設置構造物の高さは、民間航空局が定める制限高を超えてはならない。</h6>\n<h5 class=\"h-lv5\"><strong>第７０条（汚水処理施設（STP））</strong></h5>\n<h6 class=\"h-lv6\"><strong>১</strong>　敷地面積が<strong>５カサ（約３３５㎡）</strong>以上の土地における建築物には、ＳＴＰの設置を義務付ける。</h6>\n<h6 class=\"h-lv6\"><strong>২</strong>　既存の建築物にあっては、本規則の施行から１年以内にＳＴＰを設置しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>৩</strong>　ダッカ上下水道局（DWASA）のネットワークに接続されている建築物はＳＴＰ設置を要しない。</h6>\n<h5 class=\"h-lv5\"><strong>第７১条（規則の違反）</strong></h5>\n<h6 class=\"h-lv6\">本規則のいずれかの規定に違反した者に対しては、法律に基づき必要な措置を講じる。</h6>\n<h5 class=\"h-lv5\"><strong>第７２条（不適合建築物及び無許可建築物の是正）</strong></h5>\n<h6 class=\"h-lv6\"><strong>১</strong>　無許可建築物又は承認設計に違反して建築された建築物は、全て<strong>違法（অবৈধ）</strong>とみなす。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h6 class=\"h-lv6\">(২) নির্মাণ অনুমোদনের জন্য দাখিলকৃত নকশায় বর্জ্য ব্যবস্থাপনা স্পেস, যাহা FAR মুক্ত কিন্তু অতিরিক্ত ভূমি আচ্ছাদনের আওতাভুক্ত হইবে।</h6>\n<h6 class=\"h-lv6\">(৩) ইমারত নির্মাণ, অপসারণ সংশ্লিষ্ট কাজ ও মালামাল পরিবহণে পরিবেশ দূষণ বিষয়ক সকল আইন ও নির্দেশনাবলী অনুসরণ করিতে হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>৬৮। পানির পুনঃব্যবহার।</strong>—</h5>\n<h6 class=\"h-lv6\">(১) ২০০ (দুই শত) বা তদূর্ধ্ব আবাসন ইউনিট বিশিষ্ট ইমারত বা হোটেল (A-5, ৫০ বা তদূর্ধ্ব কক্ষ), অফিস ও সমাবেশ (I, ৭৫০০ বর্গ মিটার বা তদূর্ধ্ব) ভবনে ব্যবহৃত পানির পুনঃব্যবহারের ব্যবস্থা থাকিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(২) পানির পুনঃব্যবহারের স্থাপনা FAR মুক্ত হইবে কিন্তু অতিরিক্ত ভূমি আচ্ছাদনের আওতাভুক্ত হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>৬৯। সৌর বিদ্যুৎ উৎপাদন ও ব্যবহার।</strong>—</h5>\n<h6 class=\"h-lv6\">(১) ইমারতের মালিককে সৌর বিদ্যুৎ উৎপাদন ও ব্যবহারের ব্যবস্থা গ্রহণ করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(২) সৌর বিদ্যুৎ প্যানেলসমূহ স্থাপনের কাঠামো সিভিল এভিয়েশন কর্তৃপক্ষ কর্তৃক নির্ধারিত উচ্চতার অধিক হইবে না।</h6>\n<h5 class=\"h-lv5\"><strong>৭০। Sewage Treatment Plant (STP)</strong>—</h5>\n<h6 class=\"h-lv6\">(১) ৫ (পাঁচ) কাঠা বা তদূর্ধ্ব জমির ক্ষেত্রে বাধ্যতামূলক STP এর সংস্থান রাখিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(২) বিদ্যমান ভবনসমূহের ক্ষেত্রে উক্ত বিধিমালা জারির এক বৎসরের মধ্যে STP স্থাপন করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৩) ঢাকা ওয়াসার পয়ঃবর্জ্য ব্যবস্থাপনা নেটওয়ার্কের সহিত সংযোগ রহিয়াছে এমন ভবনের ক্ষেত্রে STP স্থাপনের প্রয়োজন হইবে না।</h6>\n<h5 class=\"h-lv5\"><strong>৭১। বিধিমালা লঙ্ঘন।</strong>—কোনো ব্যক্তি এই বিধিমালার কোনো বিধান লঙ্ঘন করিলে লঙ্ঘনকারীর বিরুদ্ধে আইন অনুযায়ী ব্যবস্থা গ্রহণ করা হইবে।</h5>\n<h5 class=\"h-lv5\"><strong>৭২। ব্যত্যয়কৃত ও অননুমোদিত ইমারতের সংশোধন।</strong>—</h5>\n<h6 class=\"h-lv6\">(১) অননুমোদিত অথবা অনুমোদিত নকশার ব্যত্যয় ঘটাইয়া নির্মিত সকল ভবন অবৈধ বলিয়া বিবেচিত হইবে।</h6>\n<hr class=\"sep\">"},{"num":"13499","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<p>（第７２条（不適合建築物等）の続き）</p>\n<p>####### <strong>ただし、</strong> 本規則施行前の不適合建築物等については、当局は本規則等に従い承認、修正又は<strong>除却（অপসারণ）</strong>を命ずることができる。</p>\n<h5 class=\"h-lv5\"><strong>第７３条（除却）</strong></h5>\n<h6 class=\"h-lv6\"><strong>১</strong>　建築物の所有者は、建築物を除却（解体）しようとする場合は、あらかじめ所管行政庁に対し通知しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>২</strong>　除却を行う際は、少なくとも１名の<strong>構造設計一級建築士</strong>の監督の下、法典（Code）に従って作業を行わなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>৩</strong>　通知なく除却し、又は法典に違反した者に対しては、法律に基づき必要な措置を講ずる。</h6>\n<h5 class=\"h-lv5\"><strong>第７４条（規則の優先）</strong></h5>\n<h6 class=\"h-lv6\"><strong>১</strong>　本規則と法典（BNBC）との間に矛盾がある場合は、<strong>本規則が優先</strong>する。</h6>\n<h6 class=\"h-lv6\"><strong>২</strong>　都市計画（Master Plan）と本規則との間に矛盾がある場合は、<strong>都市計画が優先</strong>する。</h6>\n<h5 class=\"h-lv5\"><strong>第７５条（廃止及び経過措置）</strong></h5>\n<h6 class=\"h-lv6\"><strong>১</strong>　「ダッカ首都圏建築規則２００８」は廃止する。</h6>\n<h6 class=\"h-lv6\"><strong>২</strong>　廃止にかかわらず、旧規則に基づく行為は本規則に基づくものとみなす。進行中の事務は、本規則と矛盾しない範囲で継続される。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>####### তবে শর্ত থাকে যে, এই বিধিমালা জারির পূর্বে নির্মিত ব্যত্যয়কৃত বা অননুমোদিত ভবনসমূহ কর্তৃপক্ষ এই বিধিমালা ও কোড অনুসরণপূর্বক অনুমোদন বা সংশোধন বা অপসারণ করিতে পারিবে।</p>\n<h6 class=\"h-lv6\">(২) কর্তৃপক্ষের আওতাধীন এলাকায় অননুমোদিত বা ব্যত্যয়কৃত ভবনের ব্যবস্থাপনার বিষয়ে কর্তৃপক্ষ একটি নীতিমালা প্রণয়ন করিবে এবং তদানুযায়ী কার্যকর ব্যবস্থা গ্রহণ করিবে।</h6>\n<h5 class=\"h-lv5\"><strong>৭৩। অপসারণ।</strong>—</h5>\n<h6 class=\"h-lv6\">(১) ইমারতের মালিককে ঢাকা মহানগর এলাকায় অনুমোদিত বা অননুমোদিত ইমারত অপসারণের পূর্বে কর্তৃপক্ষ কর্তৃক অবহিত করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(২) অপসারণের সময় নিরাপত্তাজনিত বিষয়ের জন্য অন্তত একজন স্ট্রাকচারাল প্রকৌশলীর তত্ত্বাবধানে কোড অনুযায়ী কার্যক্রম গ্রহণ করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(৩) মালিক কর্তৃপক্ষকে অবহিত না করিয়া ইমারত অপসারণ করিলে বা কোড অমান্য করিলে আইন অনুযায়ী ব্যবস্থা গ্রহণ করা হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>৭৪। বিধিমালার প্রাধান্য।</strong>—</h5>\n<h6 class=\"h-lv6\">(১) এই বিধিমালা ও কোডের মধ্যে কোনো প্রকার অসংগতির ক্ষেত্রে বিধিমালা প্রাধান্য পাইবে।</h6>\n<h6 class=\"h-lv6\">(২) পরিকল্পনা সংশ্লিষ্ট বিষয়ে মহাপরিকল্পনা ও বিধিমালার মধ্যে কোনো অসংগতির ক্ষেত্রে মহাপরিকল্পনা প্রাধান্য পাইবে।</h6>\n<h5 class=\"h-lv5\"><strong>৭৫। রহিতকরণ ও হেফাজত।</strong>—</h5>\n<h6 class=\"h-lv6\">(১) ঢাকা মহানগর ইমারত বিধিমালা, ২০০৮ এতদ্দ্বারা রহিত করা হইলো।</h6>\n<h6 class=\"h-lv6\">(২) উক্তরূপ রহিতকরণ সত্ত্বেও—</h6>\n<h6 class=\"h-lv6\">(ক) রহিত বিধিমালার অধীনকৃত সকল কাজকর্ম এই বিধিমালার অধীন বলিয়া গণ্য হইবে;</h6>\n<h6 class=\"h-lv6\">(খ) অনিষ্পন্ন কাজকর্ম রহিত বিধিমালার সহিত সামঞ্জস্যপূর্ণ ও এই বিধিমালার সহিত সাংঘর্ষিক না হওয়া সাপেক্ষে অব্যাহত থাকিবে।</h6>\n<hr class=\"sep\">"},{"num":"13500","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h3 class=\"h-lv3\">付録１（第６１条第６号関係） [Appendix 1]</h3>\n<h4 class=\"h-lv4\">防火安全 [Fire Safety]</h4>\n<h6 class=\"h-lv6\"><strong>第１条 避難施設の構成要素：</strong></h6>\n<p><strong>避難施設（Means of Egress）</strong>は３つの部分から構成される。（ａ）<strong>避難通路（Exit access）</strong>、（ｂ）<strong>避難出口（Exit）</strong> 及び（ｃ）<strong>避難放出口（Exit discharge）</strong>。避難通路は出口に至るまでの経路、避難出口は安全に避難させるための当該部分、避難放出口は出口の終末から避難場所の最終壁面までをいう。</p>\n<h6 class=\"h-lv6\"><strong>১.১ 避難施設（Means of Egress）の構成：</strong></h6>\n<h6 class=\"h-lv6\">一　扉、廊下、スロープ、非常用昇降機（Fire-lift）等の組み合わせであって、道路や避難場所に容易に到達できるもの。</h6>\n<h6 class=\"h-lv6\">二　安全な避難場所へ通じる水平避難出口（Horizontal Exit）。</h6>\n<h6 class=\"h-lv6\"><strong>১.২</strong> 昇降機、エスカレーター等は原則として避難施設の一部として構成してはならない。</h6>\n<h6 class=\"h-lv6\"><strong>第２条 一般要件：</strong></h6>\n<h6 class=\"h-lv6\"><strong>২.১</strong> すべての建築物には、利用者が迅速且つ安全に脱出できるよう十分な避難経路を備えなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>২.২</strong> 避難出口は、避難機能を阻害するような目的で使用してはならない。</h6>\n<h6 class=\"h-lv6\"><strong>২.৩</strong> 避難通路の廊下を空調用ダクトとして使用してはならない。</h6>\n<h6 class=\"h-lv6\"><strong>২.৪</strong> 避難経路の床面に <strong>５３０ミリメートル</strong> を超える段差がある場合はスロープ（勾配路）を使用しなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h3 class=\"h-lv3\">পরিশিষ্ট-১</h3>\n<h4 class=\"h-lv4\">অগ্নি নিরাপত্তা</h4>\n<h5 class=\"h-lv5\"><strong>(বিধি ৬১ (চ) দ্রষ্টব্য)</strong></h5>\n<h5 class=\"h-lv5\"><strong>অগ্নিনিরাপত্তা</strong></h5>\n<h6 class=\"h-lv6\"><strong>১. নির্গমন পথের বিভিন্ন অংশ:</strong></h6>\n<p><strong>Means of Egress</strong>, যাহা একটি ইমারতে আগুন লাগিলে নিরাপদ নির্গমনের পথ, তাহার তিনটি অংশ হইতেছে; (ক) <strong>Exit access</strong>, (খ) <strong>Exit</strong>, এবং (গ) <strong>Exit discharge</strong>; এখানে <strong>Exit access</strong> অর্থ <strong>Exit</strong> এর মুখ পর্যন্ত পৌঁছানোর রাস্তা; <strong>Exit</strong> হইলো ইমারতের ঐ অংশটুকু যাহা আগুন লাগা অংশ হইতে <strong>Exit discharge</strong> পর্যন্ত নিরাপদে নির্গমন ঘটায়; <strong>Exit discharge</strong> হইলো <strong>Exit</strong> শেষ হওয়া হইতে আশ্রয়স্থলের শেষ দেয়াল পর্যন্ত।</p>\n<h6 class=\"h-lv6\"><strong>১.১ Means of Egress এর বিভিন্ন অংশে নিম্নরূপ যে কোনো Exit থাকিবে, যথা:—</strong></h6>\n<p>(ক) দরজা, সিঁড়ি সংযোগকারী করিডোর, র‍্যাম্প, ফায়ার-লিফট অথবা উক্ত অংশসমূহের কয়েকটি একসঙ্গে যেইস্থান হইতে সড়ক বা কোনো নির্দিষ্ট নিরাপদ আশ্রয়স্থলে সহজে প্রবেশ করা যায়;</p>\n<p>(খ) আগুন ও তৎসংলগ্ন এলাকাসমূহ হইতে নিরাপদ কোনো ইমারত সংলগ্ন কোনো নিরাপদ আশ্রয় স্থলে আনুভূমিক <strong>Exit</strong>।</p>\n<h6 class=\"h-lv6\"><strong>১.২</strong> লিফট, এক্সেলেটর, চলন্ত হাঁটার রাস্তাকে সাধারণত <strong>Means of Egress</strong> এর অংশ করা যাইবে না।</h6>\n<h6 class=\"h-lv6\"><strong>২. সাধারণ প্রয়োজন:</strong></h6>\n<h6 class=\"h-lv6\"><strong>২.১</strong> জনসাধারণের ব্যবহারের জন্য নির্মিত সকল ইমারতে যথেষ্ট সংখ্যক নির্গমন পথের ব্যবস্থা থাকিতে হইবে, যাহাতে ব্যবহারকারীরা দ্রুত ও নিরাপদে বাহির হইয়া যাইতে পারে।</h6>\n<h6 class=\"h-lv6\"><strong>২.২ Exit</strong> কে কখনই এমন কোনো কাজে ব্যবহার করা যাইবে না, যাহাতে <strong>Means of Egress</strong> হিসাবে ইহার ব্যবহার ব্যাহত হয়।</h6>\n<h6 class=\"h-lv6\"><strong>২.৩ Exit</strong> এবং <strong>Exit access</strong> এর করিডোরকে <strong>Supply</strong> বা <strong>Return air duct</strong> এর কাজে ব্যবহার করা যাইবে না।</h6>\n<h6 class=\"h-lv6\"><strong>২.৪</strong> নির্গমন পথের তল কোথাও ৫৩০ মি.মি. এর বেশি পরিবর্তিত হইলে র‍্যাম্প ব্যবহার করিতে হইবে।</h6>\n<hr class=\"sep\">"},{"num":"13501","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h6 class=\"h-lv6\"><strong>２.５</strong> すべての避難出口（Exit）は明確に視認できなければならず、且つ避難通路（Exit access）が標示されていなければならない。暗所となるおそれがある場所には誘導灯（ আলোকিত চিহ্ন ）を設置しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>２.６</strong> 建築物の各所有者等は、利用者の安全を確保しなければならない。避難施設が不十分である場合、所管行政庁は適切な整備を命ずることができる。</h6>\n<h5 class=\"h-lv5\"><strong>第３条（避難出口の配置（Location of Exit））</strong></h5>\n<h6 class=\"h-lv6\"><strong>３.১</strong> 避難出口は、隣接する室が当該区域の不可分の一部でない限り、又は危険な用途に供されていない限り、当該隣接室に面して設けてはならない。</h6>\n<h6 class=\"h-lv6\"><strong>３.২</strong> 避難経路の一部は、建築物の利用時間中に施錠されるおそれがある部分を経由してはならない。</h6>\n<h6 class=\"h-lv6\"><strong>３.৩</strong> 集客施設等にあっては、少なくとも一側面を主要な避難放出口（Exit discharge）が位置する道路に面して配置しなければならない。複数階の場合は各階に避難出口を設け、当該階利用者の少なくとも３分の２以上の需要を満たさなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>３.৪</strong> 避難出口は、建築物のすべての部分から連続して障害のない避難へのアクセス（ Means of Access ）を確保するように配置しなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第４条（収容人員（Number of Users））</strong></h5>\n<h6 class=\"h-lv6\"><strong>４.১</strong> 避難施設は、別表１に定める最大収容人員に基づき管理されなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>４.২</strong> 固定席を有する講堂等にあっては、総座席数により算定する。肘掛けのない座席にあっては、幅員 <strong>５００ミリメートル</strong> につき１名として算定しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>４.৩</strong> 算定される収容人員は、有効床面積の <strong>０.３平方メートル</strong> につき１名の割合を超えてはならない。</h6>\n<h6 class=\"h-lv6\"><strong>４.৩</strong> 中二階（Mezzanine floor）の収容人員は、直下階の収容人員に加算するものとする。</h6>\n<h6 class=\"h-lv6\"><strong>４.৪</strong> 屋上を公衆が集まる用途に使用する場合にあっては、収容人員に応じた避難施設を備えなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h6 class=\"h-lv6\"><strong>২.৫</strong> সকল Exit পরিষ্কার দৃষ্টিগম্য হইতে হইবে এবং Exit access চিহ্নিত থাকিতে হইবে; যেখানে একাধিক Exit বা Exit access থাকিবে এবং জনগণের ব্যবহার্য যেসব এলাকা অন্ধকারে থাকিতে পারে সেইসব স্থানে Exit এর অবস্থান ও দিক নির্দেশক আলোকিত চিহ্ন ব্যবহার করিতে হইবে।</h6>\n<h6 class=\"h-lv6\"><strong>২.৬</strong> প্রতিটি ইমারতের মালিক বা ইজারাদার ইহার সমস্ত ব্যবহারকারীর নিরাপত্তা নিশ্চিত করিবে এবং বর্তমান কোনো ইমারতে Exit সুবিধা অপ্রতুল হইলে, কর্তৃপক্ষ তাহার যথাযথ সংস্থানের নির্দেশ দিতে পারিবে।</h6>\n<h5 class=\"h-lv5\"><strong>৩. Exit এর অবস্থান:</strong></h5>\n<h6 class=\"h-lv6\"><strong>৩.১</strong> কোনো Exit, কোনো সংলগ্ন কক্ষ বা এলাকায় খুলিবে না যদি উহা পূর্বোক্ত এলাকার অবিচ্ছেদ্য বা বর্ধিত অংশ না হয়, বিপজ্জনক কাজে ব্যবহৃত হয় এবং নির্দিষ্ট Exit এলাকার সহিত সরাসরি সংযুক্ত না থাকে।</h6>\n<h6 class=\"h-lv6\"><strong>৩.২</strong> Exit পথের কোনো অংশ ইমারতের এমন কোনো অংশ দিয়া যাইবে না যাহা ইমারত ব্যবহারকালীন সময়ে তালাবদ্ধ থাকিতে পারে।</h6>\n<h6 class=\"h-lv6\"><strong>৩.৩</strong> সব ধরনের জনসমাগমের জন্য মিলনায়তন জাতীয় ইমারতের অন্যূন একটি পার্শ্ব একটি রাস্তার দিকে হইবে যেই দিকে প্রধান Exit discharge অবস্থিত হইতে পারে এবং প্রধান আগমন পথ কমপক্ষে অর্ধেক সংখ্যক ব্যবহারকারীর নির্গমন পথ হিসাবে ব্যবহার করা যাইবে; এই ধরনের ইマーত কয়েক তলা হইলে প্রতিটি তলায় Exit থাকিবে, যাহা কমপক্ষে উক্ত তলার দুই-তৃতীয়াংশ ব্যবহারকারীর প্রয়োজন মিটাইবে।</h6>\n<h6 class=\"h-lv6\"><strong>৩.৪</strong> Exit সমূহ এইরূপ থাকিতে হইবে যাহা ইমারতের সকল অংশের জন্য একটি অবিরাম বাঁধামুক্ত Means of Access নিশ্চিত করিবে।</h6>\n<h5 class=\"h-lv5\"><strong>৪. ব্যবহারকারীর সংখ্যা:</strong></h5>\n<h6 class=\"h-lv6\"><strong>৪.১</strong> ইমারতের Exit সুবিধা ছক-১ অনুযায়ী সর্বোচ্চ ব্যবহারকারীর সংখ্যা দ্বারা নিয়ন্ত্রিত হইবে。</h6>\n<h6 class=\"h-lv6\"><strong>৪.২</strong> যেসব মিলনায়তন ও প্রতিষ্ঠান জাতীয় ইমারতে স্থায়ী আসন রহিয়াছে সেইখানে সর্বমোট আসন সংখ্যা দ্বারা ব্যবহারকারীর সংখ্যা নির্ণিত হইবে; এই ধরনের আসন হাতলবিহীন হইলে প্রতি ৫০০ মি.মি. প্রস্থের জন্য একজন ব্যবহারকারী হিসাব করিতে হইবে।</h6>\n<h6 class=\"h-lv6\"><strong>৪.৩</strong> উপরের হিসাব, ব্যবহার্য মেঝে এলাকার প্রতি ০.৩ বর্গমিটারে একজন ব্যবহারকারী হারের হিসাবের চাইতে বেশি হইবে না।</h6>\n<h6 class=\"h-lv6\"><strong>৪.৩</strong> (sic) মেজেনাইন তল ব্যবহারকারীর সংখ্যা, সংলগ্ন নীচের মেঝে ব্যবহারকারীর সংখ্যার সহিত যোগ হইবে।</h6>\n<h6 class=\"h-lv6\"><strong>৪.৪</strong> ছাদ যদি কোনো রকম জনসমাগমের কাজে ব্যবহৃত হয়, তবে তাহা ব্যবহারকারীর সংখ্যা অনুযায়ী Exit সুবিধা সংবলিত হইতে হইবে।</h6>\n<hr class=\"sep\">"},{"num":"13502","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第５条（避難施設の規模（Size of Exit））</strong></h5>\n<h6 class=\"h-lv6\">避難施設の規模は収容人員に対し十分なものでなければならず、当該算定には次表１を適用する。</h6>\n<p>####### <strong>表１：用途別の単位収容人員算定基準（Occupant Load Factors）</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>類型</th><th>建築物の用途（Occupancy）</th><th>１人当たりの占有床面積（㎡）</th></tr></thead><tbody><tr><td>A</td><td>住宅</td><td>１８（延べ面積基準）</td></tr><tr><td>B</td><td>教育施設</td><td></td></tr><tr><td></td><td>教室</td><td>２（正味面積基準）</td></tr><tr><td></td><td>幼稚園・保育園</td><td>３.５（正味面積基準）</td></tr><tr><td>C</td><td>公衆福祉・矯正施設</td><td>１２（延べ面積基準）</td></tr><tr><td>D</td><td>医療施設</td><td></td></tr><tr><td></td><td>入院部門</td><td>１５（延べ面積基準）</td></tr><tr><td></td><td>外来部門</td><td>１０（延べ面積基準）</td></tr><tr><td>E</td><td>事務所・業務施設</td><td>１０（延べ面積基準）</td></tr><tr><td>F</td><td>商業施設</td><td>３（延べ面積基準）</td></tr><tr><td>G</td><td>工場</td><td>１０（延べ面積基準）</td></tr><tr><td>H</td><td>倉庫</td><td>２０（延べ面積基準）</td></tr><tr><td>I</td><td>集会施設</td><td></td></tr><tr><td></td><td>固定席がある場合</td><td>座席数による</td></tr><tr><td></td><td>固定席がない場合</td><td>０.９３（正味面積基準）</td></tr><tr><td></td><td>立席のみの場所</td><td>０.３７（正味面積基準）</td></tr><tr><td></td><td>テーブル・椅子を伴う場所</td><td>１.５（正味面積基準）</td></tr><tr><td></td><td>ターミナル（駅等）</td><td>０.１５（正味面積基準）</td></tr><tr><td>J</td><td>危険物施設</td><td>１０（延べ面積基準）</td></tr></tbody></table></div>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৫. Exit এর আকার:</strong></h5>\n<h6 class=\"h-lv6\">Means of Exit এর আকার ব্যবহারকারীর সংখ্যা সাপেক্ষে পর্যাপ্ত হইতে হইবে এবং উক্ত বিষয়ে ছক-১ প্রযোজ্য হইবে; Exit এর প্রতিটি অংশের আবশ্যকীয় প্রস্থ ও আকার ছক- ২ ও অনুচ্ছেদ ৬ অনুযায়ী নির্ণীত হইবে।</h6>\n<p>####### <strong>ছক-১</strong></p>\n<p>####### <strong>বিভিন্ন ব্যবহারকারীর সংখ্যা</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>টাইপ</th><th>ইমারতের শ্রেণি</th><th>ব্যবহারকারীর মাথাপিছু মেঝে এলাকা (বর্গমিটার)</th></tr></thead><tbody><tr><td>A.</td><td>আবাসিক</td><td>১৮ গ্রস</td></tr><tr><td>B.</td><td>শিক্ষা প্রতিষ্ঠান</td><td></td></tr><tr><td></td><td>শ্রেণি কক্ষ</td><td>০২ নেট</td></tr><tr><td></td><td>প্রাক-স্কুল</td><td>৩.৫ নেট</td></tr><tr><td>C.</td><td>প্রাতিষ্ঠানিক</td><td>১২ গ্রস</td></tr><tr><td>D.</td><td>স্বাস্থ্য সেবা</td><td></td></tr><tr><td></td><td>ইন-পেশেন্ট এলাকা</td><td>১৫ গ্রস</td></tr><tr><td></td><td>আউট-পেশেন্ট এলাকা</td><td>১০ গ্রস</td></tr><tr><td>E.</td><td>Business</td><td>১০ গ্রস</td></tr><tr><td>F.</td><td>Mercantile</td><td>০৩ গ্রস</td></tr><tr><td>G.</td><td>শিল্প কারখানা</td><td>১০ গ্রস</td></tr><tr><td>H.</td><td>গুদাম</td><td>২০ গ্রস</td></tr><tr><td>I.</td><td>সমাবেশ</td><td></td></tr><tr><td></td><td>ফিক্সড আসন</td><td>আসন সংখ্যা অনুযায়ী</td></tr><tr><td></td><td>ফিক্সড আসনহীন</td><td>০.৯৩ নেট</td></tr><tr><td></td><td>শুধু দাঁড়ানোর জায়গা</td><td>০.৩৭ নেট</td></tr><tr><td></td><td>টেবিল-চেয়ারসহ</td><td>১.৫ নেট</td></tr><tr><td></td><td>টার্মিনাল</td><td>০.১৫ নেট</td></tr><tr><td>J.</td><td>বিপজ্জনক</td><td>১০ গ্রস</td></tr><tr><td>K.</td><td>বিবিধ (প্রযোজ্য ক্ষেত্রে)</td><td>ব্যবহারকারীর সংখ্যা অনুযায়ী</td></tr><tr><td>L.</td><td>ইউটিলিটি</td><td>ব্যবহারকারীর সংখ্যা অনুযায়ী</td></tr></tbody></table></div>\n<hr class=\"sep\">"},{"num":"13503","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<p>####### <strong>表２：収容人員１人当たりの避難出口等の最小幅員</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>用途分類</th><th>スプリンクラー無 (mm/人)</th><th></th><th></th><th>スプリンクラー有 (mm/人)</th><th></th><th></th></tr></thead><tbody><tr><td></td><td>階段</td><td>傾斜路・廊下</td><td>戸</td><td>階段</td><td>傾斜路・廊下</td><td>戸</td></tr><tr><td>A. 住宅</td><td>８</td><td>５</td><td>４</td><td>５</td><td>４</td><td>４</td></tr><tr><td>D. 医療施設</td><td>২５</td><td>１৮</td><td>１０</td><td>১৫</td><td>১২</td><td>１０</td></tr><tr><td>I. 集会施設</td><td>１０</td><td>৭</td><td>৫</td><td>７</td><td>৫</td><td>৫</td></tr></tbody></table></div>\n<h5 class=\"h-lv5\"><strong>第６条（廊下及び通路（Corridor and Passage））</strong></h5>\n<h6 class=\"h-lv6\"><strong>৬.১</strong> 廊下等は避難出口（Exit）に到達できるよう配置しなければならない。行き止まり部分（Dead-end）の長さは <strong>１０メートル</strong> を超えてはならない。</h6>\n<h6 class=\"h-lv6\"><strong>৬.২</strong> 幅員の最小寸法は次の通りとする。</h6>\n<h6 class=\"h-lv6\">一　収容人員５０人超：<strong>１.１メートル</strong></h6>\n<h6 class=\"h-lv6\">三　医療施設（用途分類Ｄ）：<strong>２.４メートル</strong></h6>\n<h6 class=\"h-lv6\">四　収容人員１５０人超の教育施設（用途分類Ｂ）：<strong>１.８メートル</strong></h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>####### <strong>ছক-২</strong></p>\n<p>####### <strong>ব্যবহারকারীর মাথা পিছু Exit এর প্রস্থ</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>ভবনের শ্রেণি</th><th>Sprinkler System ছাড়া (মি. মি.)</th><th></th><th></th><th>Sprinkler System সহ (মি. মি.)</th><th></th><th></th></tr></thead><tbody><tr><td></td><td>সিঁড়ি</td><td>র‍্যাম্প/করিডোর</td><td>দরজা</td><td>সিঁড়ি</td><td>র‍্যাম্প/করিডোর</td><td>দরজা</td></tr><tr><td>A. আবাসিক</td><td>৮</td><td>৫</td><td>৪</td><td>৫</td><td>৪</td><td>৪</td></tr><tr><td>B. শিক্ষা প্রতিষ্ঠান</td><td>৮</td><td>৫</td><td>৪</td><td>৫</td><td>৪</td><td>৪</td></tr><tr><td>E, F1, F2, G, H</td><td>৮</td><td>৫</td><td>৪</td><td>৫</td><td>৪</td><td>৪</td></tr><tr><td>C3, C4, C5 প্রাতিষ্ঠানিক</td><td>১০</td><td>৫</td><td>৪</td><td>৮</td><td>৫</td><td>৪</td></tr><tr><td>D স্বাস্থ্যসেবা</td><td>২৫</td><td>১৮</td><td>১০</td><td>১৫</td><td>১২</td><td>১০</td></tr><tr><td>I. সমাবেশ</td><td>১০</td><td>৭</td><td>৫</td><td>৭</td><td>৫</td><td>৫</td></tr><tr><td>J. বিপজ্জনক ব্যবহার</td><td>৮</td><td>৫</td><td>৪</td><td>৮</td><td>৫</td><td>৪</td></tr></tbody></table></div>\n<h5 class=\"h-lv5\"><strong>৬. করিডোর ও প্যাসেজ:</strong></h5>\n<h6 class=\"h-lv6\"><strong>৬.১</strong> ব্যবহারকারী যে কোনো দিকে করিডোর দিয়া রওয়ানা হউক না কেন তাহা কোনো একটি Exit এ পৌঁছাইতে হইবে; যেইদিকে Exit নাই ঐ দিকে বদ্ধ গলির দূরত্ব ১০ মিটার এর বেশি হইবে না।</h6>\n<h6 class=\"h-lv6\"><strong>৬.২</strong> করিডোর ও প্যাসেজের প্রস্থ নিম্নরূপ হইবে, যথা:—</h6>\n<h6 class=\"h-lv6\">(ক) ৫০ এর বেশি ব্যবহারকারীর ক্ষেত্রে ১.১ মিটার;</h6>\n<h6 class=\"h-lv6\">(খ) ৫০ বা উহার কম ব্যবহারকারীর ক্ষেত্রে ০.৯ মিটার;</h6>\n<h6 class=\"h-lv6\">(গ) স্বাস্থ্যসেবামূলক ভবনে (D) ২.৪ মিটার;</h6>\n<h6 class=\"h-lv6\">(ঘ) ১৫০ এর অধিক ব্যবহারকারী শিক্ষা প্রতিষ্ঠানে (B) ১.৮ মিটার।</h6>\n<hr class=\"sep\">"},{"num":"13504","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h6 class=\"h-lv6\"><strong>৬.৪</strong> 廊下及び通路の有効高さは、<strong>２.৪メートル</strong> を下回ってはならない。</h6>\n<h6 class=\"h-lv6\"><strong>৬.৫</strong> 廊下の最小耐火性能（fire rating）は１時間としなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第７条 客席内通路（Assembly Aisles）</strong></h5>\n<h6 class=\"h-lv6\"><strong>৭.২</strong> 避難通路のスロープ勾配は <strong>１／１０</strong> 以下としなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>৭.৪</strong> 通路（Aisle）の両側に座席がある場合の最小幅員は １メートル、片側のみの場合は ０.৯メートル とする。</h6>\n<h5 class=\"h-lv5\"><strong>第８条 扉（Doors）</strong></h5>\n<h6 class=\"h-lv6\"><strong>৮.১</strong> 各居室の利用者は少なくとも一の避難出口を利用できなければならない。最大歩行距離（Travel Distance）は次表の通り制限される。</h6>\n<p>####### <strong>表３：一の避難扉当たりの最大収容人員及び最大歩行距離</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>建築物の用途分類</th><th>最大収容人員</th><th>最大歩行距離（ｍ）</th></tr></thead><tbody><tr><td>A. 住宅</td><td>１２</td><td>２３</td></tr><tr><td>I. 集会施設</td><td>５０</td><td>２３</td></tr></tbody></table></div>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h6 class=\"h-lv6\"><strong>৬.৩</strong> Exit করিডোর ও প্যাসেজের প্রস্থ, যেসব দরজা করিডোর ও প্যাসেজের শেষ প্রান্তে বাহির হইয়া যাইবার জন্য একসঙ্গে ব্যবহৃত হইবে তাহাদের প্রস্থের যোগফলের চাইতে কম হইবে না।</h6>\n<h6 class=\"h-lv6\"><strong>৬.৪</strong> করিডোর ও প্যাসেজের বাঁধামুক্ত উচ্চতা ২.৪ মিটারের কম হইবে না।</h6>\n<h6 class=\"h-lv6\"><strong>৬.৫</strong> Exit access এর করিডোরের ন্যূনতম fire rating ১ ঘণ্টা হইবে।</h6>\n<h6 class=\"h-lv6\"><strong>৬.৬</strong> Exit করিডোরে যাইবার দরজার ন্যূনতম fire rating ২০ মিনিট হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>৭। এসেম্বলি আইলস্ (Assembly Aisles):</strong></h5>\n<h6 class=\"h-lv6\"><strong>৭.১</strong> সমাবেশ ভবনের যেখানে আসন রহিয়াছে সেইখানে Exit এর দিকে গমনকারী বাঁধামুক্ত আইল (Aisle) থাকিতে হইবে।</h6>\n<h6 class=\"h-lv6\"><strong>৭.২</strong> Exit access সর্বাধিক ১:১০ ঢালের র‍্যাম্প হইতে পারিবে এবং ইহার ন্যূনতম প্রস্থ ব্যবহারকারী পিছু ৫ মি.মি. হইবে।</h6>\n<h6 class=\"h-lv6\"><strong>৭.৩</strong> Exit access ধাপওয়ালা হইলে ট্রেডের ন্যূনতম গভীরতা ২৭৫ মি.মি. এবং রাইজার এর উচ্চতা ১০০-২০০ মি.মি. এর ভিতর হইতে হইবে।</h6>\n<h6 class=\"h-lv6\"><strong>৭.৪</strong> আইল (Aisle) এর দুই দিকে আসন হইলে ন্যূনতম প্রস্থ ১ মিটার এবং একদিকে আসন হইলে ন্যূনতম প্রস্থ ০.৯ মিটার হইতে হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>৮. দরজা:</strong></h5>\n<h6 class=\"h-lv6\"><strong>৮.১</strong> একটি কক্ষ ব্যবহারকারী প্রত্যেকে অন্ততপক্ষে একটি Exit পাইবে এবং প্রতি নির্গমন দরজার জন্য ব্যবহারকারীর সংখ্যা এবং যাতায়াত দূরত্ব ছক-৩ এর বেশি হইতে পারিবে না।</h6>\n<p>####### <strong>ছক-৩</strong></p>\n<p>####### <strong>একটি নির্গমন দরজার ক্ষেত্রে সর্বোচ্চ ব্যবহারকারীর সংখ্যা এবং সর্বোচ্চ যাতায়াত দূরত্ব</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>ভবনের শ্রেণি</th><th>সর্বোচ্চ ব্যবহারকারীর সংখ্যা</th><th>সর্বোচ্চ যাতায়াত দূরত্ব (মিটার)</th></tr></thead><tbody><tr><td>A. আবাসিক</td><td>১২</td><td>২৩</td></tr><tr><td>B. শিক্ষা প্রতিষ্ঠান</td><td>৫০</td><td>২৩</td></tr><tr><td>I. সমাবেশ</td><td>৫০</td><td>২৩</td></tr></tbody></table></div>\n<hr class=\"sep\">"},{"num":"13505","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第８条 扉（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>৮.৩</strong> 避難扉の有効幅員は <strong>１メートル</strong> 以上、有効高さは <strong>２メートル</strong> 以上としなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>৮.৫</strong> 収容人員が５０人を超える場合、扉は室外側へ開く構造とし、且つ廊下の残余有効幅員を <strong>０.৯メートル</strong> 未満としてはならない。</h6>\n<h6 class=\"h-lv6\"><strong>৮.৭</strong> 収容人員が２００人以上の建築物において、回転ドアを使用してはならない。</h6>\n<h5 class=\"h-lv5\"><strong>第９条 階段（Stairs）</strong></h5>\n<h6 class=\"h-lv6\"><strong>৯.১</strong> 避難階段の幅員は、次表４に定める数値を下回ってはならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>ভবনের শ্রেণি</th><th>সর্বোচ্চ ব্যবহারকারীর সংখ্যা</th><th>সর্বোচ্চ যাতায়াত দূরত্ব (মিটার)</th></tr></thead><tbody><tr><td><strong>G. শিল্প-কারখানা</strong></td><td>৩০</td><td>৩০</td></tr><tr><td><strong>H. গুদাম</strong></td><td>৩০</td><td>৩০</td></tr><tr><td><strong>J. বিপজ্জনক</strong></td><td>৫</td><td>৮</td></tr></tbody></table></div>\n<h6 class=\"h-lv6\"><strong>৮.২</strong> Exit দরজা ব্যবহারকারীর সংখ্যা এবং যাতায়াত দূরত্ব ছক-৩ এর নির্দিষ্ট মানের চাইতে বেশি হইলে, কমপক্ষে দুইটি নির্গমন দরজার ব্যবস্থা করিতে হইবে।</h6>\n<h6 class=\"h-lv6\"><strong>৮.৩</strong> Exit দরজার প্রস্থ ১ মিটার এবং উচ্চতা ২ মিটারের কম হইতে পারিবে না।</h6>\n<h6 class=\"h-lv6\"><strong>৮.৪</strong> Exit দরজা হিসাবে স্লাইডিং দরজা ব্যবহার করা যাইবে না।</h6>\n<h6 class=\"h-lv6\"><strong>৮.৫</strong> সকল Exit দরজা সাইড-সুইংগিং ধরনের হইতে হইবে; ব্যবহারকারীর সংখ্যা ৫০ এর বেশি হইলে দরজার সুইং কক্ষ হইতে বাহিরের দিকে হইবে; করিডোরের বাকি বাঁধামুক্ত অংশকে কোনোক্রমেই ০.৯ মিটার এর কম করিতে পারিবে না।</h6>\n<h6 class=\"h-lv6\"><strong>৮.৬</strong> Exit দরজাসমূহ কোনো সিঁড়ির ফ্লাইট এ সরাসরি খুলিতে পারিবে না।</h6>\n<h6 class=\"h-lv6\"><strong>৮.৭</strong> ব্যবহারকারীর সংখ্যা ২০০ বা তাহার বেশি হইবে সেইখানে ঘূর্ণায়মান দরজা ব্যবহার করা যাইবে না।</h6>\n<h6 class=\"h-lv6\"><strong>৮.৮</strong> প্রতিটি নির্গমন পথের দরজা চাবি ছাড়াই খুলিতে পারিতে হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>৯. সিঁড়ি:</strong></h5>\n<h6 class=\"h-lv6\"><strong>৯.১</strong> Exit সিঁড়ির প্রয়োজনীয় প্রস্থ ছক-৪ এ বর্ণিত প্রস্থ হইতে কম হইতে পারিবে না।</h6>\n<hr class=\"sep\">"},{"num":"13506","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<p>####### <strong>表４：避難階段（Fire Safe Stair）の幅員</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>建築物の用途分類</th><th>階段の最小有効幅員（ｍ）</th></tr></thead><tbody><tr><td><strong>A. 住宅</strong></td><td></td></tr><tr><td>A3（アパートメント）</td><td>１.１５</td></tr><tr><td><strong>B. 教育施設</strong></td><td></td></tr><tr><td>１５０名超</td><td>２.０</td></tr><tr><td><strong>D. 医療施設</strong></td><td></td></tr><tr><td>患者エリア</td><td>２.２５</td></tr></tbody></table></div>\n<p>####### <strong>注釈</strong></p>\n<p>####### ２　６階を超える住宅建築物において階段が１つの場合、当該階段は避難階段（Fire safe stair）でなければならない。</p>\n<h6 class=\"h-lv6\"><strong>৯.২</strong> 踊場（Landing）の最小寸法は、移動方向において <strong>１.２メートル</strong> を超えることは義務付けられない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>####### <strong>ছক- ৪</strong></p>\n<p>####### <strong>অগ্নি নিরাপদ সিঁড়ির প্রস্থ</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>ভবনের শ্রেণি</th><th>সিঁড়ির ন্যূনতম প্রস্থ (মিটার)</th></tr></thead><tbody><tr><td><strong>A. আবাসিক</strong></td><td></td></tr><tr><td>A1, A2</td><td>১.০</td></tr><tr><td>A3</td><td>১.১৫</td></tr><tr><td>A4, A5</td><td>১.৫</td></tr><tr><td><strong>B. শিক্ষা প্রতিষ্ঠান</strong></td><td></td></tr><tr><td>১৫০ জন পর্যন্ত</td><td>১.৫</td></tr><tr><td>১৫০ জনের অধিক</td><td>২.০</td></tr><tr><td><strong>D. স্বাস্থ্য সেবা</strong></td><td></td></tr><tr><td>পেশেন্ট এরিয়া</td><td>২.২৫</td></tr><tr><td>স্টাফ এরিয়া</td><td>১.১৫</td></tr><tr><td><strong>I. সমাবেশ</strong></td><td></td></tr><tr><td>I1, I3, I5</td><td>২.০</td></tr><tr><td>I2, I4</td><td>১.৫</td></tr></tbody></table></div>\n<p>####### <strong>নোট</strong></p>\n<p>####### ২। ৬ তলার অধিক উচ্চতা বিশিষ্ট আবাসিক (A-2, A3, A-4, A-5) ইমারতে একটি মাত্র সিঁড়ি থাকিলে উক্ত সিঁড়িটি অগ্নি নিরাপদ সিঁড়ি হইতে হইবে।</p>\n<h6 class=\"h-lv6\"><strong>৯.২</strong> Exit সিঁড়ির ল্যান্ডিং ও প্ল্যাটফর্মসমূহের ন্যূনতম মাপ সিঁড়ির জন্য নির্ধারিত প্রস্থের চাইতে কম হইতে পারিবে না, তবে যাতায়াতের দিকের মাপ ১.২ মিটার এর বেশি হওয়া বাধ্যতামূলক নহে।</h6>\n<hr class=\"sep\">"},{"num":"13507","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第９条 階段（承前）</strong></h5>\n<h6 class=\"h-lv6\"><strong>৯.৪</strong> 避難階段の幅員が <strong>２.২メートル</strong> を超える場合、中央にも手すりを設けなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>৯.৮</strong> 階段室には <strong>加圧防煙（Positive Pressure）</strong> 又は自然換気設備を設けなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第１０条 スロープ（勾配路）</strong></h5>\n<h6 class=\"h-lv6\"><strong>১০.২</strong> 避難用スロープの勾配は <strong>１／８</strong> 以下としなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h6 class=\"h-lv6\"><strong>৯.৩</strong> স্পাইরাল সিঁড়ি কেবল বসতবাড়ির অভ্যন্তরে এবং ২৫ বর্গমিটার পর্যন্ত মেজানাইন ফ্লোরের জন্য জরুরি নির্গমন হিসাবে ব্যবহার করা যাইবে।</h6>\n<h6 class=\"h-lv6\"><strong>৯.৪</strong> Fire Exit সিঁড়ির বাঁধামুক্ত প্রস্থ ২.২ মিটার এর বেশি হইলে মাঝামাঝি দিয়াও হাত-রেইল দিতে হইবে।</h6>\n<h6 class=\"h-lv6\"><strong>৯.৫</strong> ইমারতের প্রতিটি সিঁড়ি অগ্নি প্রতিরোধী নির্মাণ সামগ্রী দ্বারা তৈরি হইতে হইবে।</h6>\n<h6 class=\"h-lv6\"><strong>৯.৬</strong> লিফট-শ্যাফট এর চারদিক ঘিরিয়া Exit সিঁড়ি দেওয়া যাইবে; তবে দরজা দ্বারা আবদ্ধ অন্তবর্তী স্পেস থাকিতে হইবে।</h6>\n<h6 class=\"h-lv6\"><strong>৯.৭</strong> বহিস্থ সিঁড়িসমূহ সরাসরি ভূমি তলে খোলা জমিতে নির্গমন নিশ্চিত না করিলে Exit হিসাবে বিবেচ্য হইবে না।</h6>\n<h6 class=\"h-lv6\"><strong>৯.৮</strong> সিঁড়িঘরসমূহে প্রাকৃতিকভাবে সুষ্ঠু বায়ু চলাচল (Cross Ventilation) ব্যবস্থা অথবা পজেটিভ প্রেসার থাকিতে হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>১০. র‍্যাম্প:</strong></h5>\n<h6 class=\"h-lv6\"><strong>১০.১</strong> Exit র‍্যাম্প এর ন্যূনতম প্রস্থ করিডোরের প্রস্থ হইতে কম হইবে না।</h6>\n<h6 class=\"h-lv6\"><strong>১০.২</strong> Exit র‍্যাম্প এর ঢাল ১:৮ এর কম হইবে না এবং তাহার উপরিতল অ-পিচ্ছিল সামগ্রী দ্বারা প্রস্তুত হইতে হইবে।</h6>\n<hr class=\"sep\">"},{"num":"13508","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第１１条 水平避難出口（Horizontal Exit）</strong></h5>\n<h6 class=\"h-lv6\"><strong>১১.২</strong> 避難出口（Exit）の幅員は <strong>１メートル</strong> を下回ってはならない。</h6>\n<h6 class=\"h-lv6\"><strong>১১.৫</strong> 避難場所（Refuge area）の最小床面積は、利用者１人当たり <strong>０.২৮平方メートル</strong> として算定しなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第１２条 避難出口の数</strong></h5>\n<h6 class=\"h-lv6\"><strong>১২.৩</strong> 各階の収容人員に基づき、次の数を設けなければならない。</h6>\n<h6 class=\"h-lv6\">二　収容人員が５１人から５００人までの場合：少なくとも <strong>２箇所</strong></h6>\n<h6 class=\"h-lv6\">四　収容人員が１０００人を超える場合：少なくとも <strong>４箇所</strong></h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h6 class=\"h-lv6\"><strong>১০.৩</strong> র‍্যাম্পের ঢাল ১:১৫ এর চাইতে বেশি হইলে ইহার উভয় পার্শ্বে হ্যান্ড-রেইল দিতে হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>১১. আনুভূমিক Exit:</strong></h5>\n<h6 class=\"h-lv6\"><strong>১১.১</strong> আনুভূমিক নির্গমন নিজ হইতে বন্ধ হয় এই রকম দরজা দ্বারা আলাদা হইতে হইবে।</h6>\n<h6 class=\"h-lv6\"><strong>১১.২</strong> এইরূপ Exit এর প্রস্থ ১ মিটার এর কম হইতে পারিবে না।</h6>\n<h6 class=\"h-lv6\"><strong>১১.৩</strong> আনুভূমিক নির্গমন পথ ঢালু হইলে এই ঢাল সর্বাধিক ১:১২ হইবে।</h6>\n<h6 class=\"h-lv6\"><strong>১১.৫</strong> আশ্রয়স্থলের মেঝের ক্ষেত্রফল ব্যবহারকারীর মাথাপিছু ০.২৮ বর্গমিটার ধরিয়া নির্ধারণ করা হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>১২. Exit এর সংখ্যা:</strong></h5>\n<h6 class=\"h-lv6\"><strong>১২.৩</strong> Exit এর সংখ্যা ব্যবহারকারীর সংখ্যার ভিত্তিতে নির্ণিত হইবে-</h6>\n<h6 class=\"h-lv6\">(ক) ৫০ পর্যন্ত- কমপক্ষে ১টি Exit</h6>\n<h6 class=\"h-lv6\">(খ) ৫১ হইতে ৫০০ পর্যন্ত- কমপক্ষে ২টি Exit</h6>\n<h6 class=\"h-lv6\">(গ) ৫০১ হইতে ১০০০ পর্যন্ত- কমপক্ষে ৩টি Exit</h6>\n<h6 class=\"h-lv6\">(ঘ) ১০০০ এর অধিক- কমপক্ষে ৪টি Exit</h6>\n<hr class=\"sep\">"},{"num":"13509","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第１２条 避難出口（承前）</strong></h5>\n<h6 class=\"h-lv6\">共同住宅（A3）等では、各階４戸以内且つ歩行距離２３ｍ以内であれば <strong>１０階建て</strong> まで単一階段が認められる。</h6>\n<h6 class=\"h-lv6\"><strong>১২.৪</strong> １０階建て若しくは高さ３３メートルを超えるすべての建築物等は、少なくとも <strong>２箇所の階段</strong> を設けなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第１３条 歩行距離（Travel Distance）</strong></h5>\n<h6 class=\"h-lv6\"><strong>১৩.১</strong> 用途分類 A, B, C, D 等の歩行距離は一律 <strong>２３メートル</strong> 以内とする。</h6>\n<h5 class=\"h-lv5\"><strong>第１４条 倉庫建築物の避難出口</strong></h5>\n<h6 class=\"h-lv6\"><strong>১৪.১</strong> 収容人員が１０名超、又は面積が １４００㎡ 超の場合は二以上の独立した避難手段を備えなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>####### <strong>ছক- ৫</strong></p>\n<p>####### <strong>একটি সিঁড়ি বা একটি বহির্গমন পথযুক্ত ইমারতসমূহ</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>ব্যবহারের শ্রেণি</th><th>সর্বোচ্চ সংখ্যক তলা</th><th>শর্ত</th></tr></thead><tbody><tr><td>A3, A6</td><td>১০</td><td>প্রতি তলায় সর্বোচ্চ ৪ ইউনিট এবং ভ্রমণ দূরত্ব ২৩ মি:</td></tr><tr><td>A4, A5, B, C, D, E, F</td><td>২</td><td>ব্যবহারকারীর সংখ্যা ৫০ এবং ভ্রমণ দূরত্ব ২৩ মি:</td></tr></tbody></table></div>\n<h6 class=\"h-lv6\"><strong>১২.৪</strong> ১০ তলা বা ৩৩ মিটার অপেক্ষা অধিক উচ্চতাবিশিষ্ট সকল ইমারতের জন্য কমপক্ষে ২ টি সিঁড়ি থাকিতে হইবে এবং সরাসরি উন্মুক্ত স্থানে খুলিতে হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>১৩. ভ্রমণের দৈর্ঘ্য:</strong></h5>\n<h6 class=\"h-lv6\"><strong>১৩.১</strong> মেঝের ব্যবহৃত অংশ হইতে যে কোনো Exit এর সর্বোচ্চ দূরত্ব নিম্নরূপ হয়-</h6>\n<h6 class=\"h-lv6\">(ক) ভবনের শ্রেণি A, B, C, D, I, J - ২৩ মি:</h6>\n<h6 class=\"h-lv6\">(গ) ভবনের শ্রেণি G - ৪৫ মি:</h6>\n<h5 class=\"h-lv5\"><strong>১৪. গুদাম জাতীয় ভবনের Exit:</strong></h5>\n<h6 class=\"h-lv6\"><strong>১৪.১</strong> গুদামশ্রেণি ভবনের ব্যবহারকারীর সংখ্যা ১০ এর বেশি অথবা মেঝে এলাকা ১৪০০ বর্গমিটার এর বেশি হইলে ন্যূনতম দুইটি আলাদা Means of Exit থাকিতে হইবে।</h6>\n<hr class=\"sep\">"},{"num":"13510","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h3 class=\"h-lv3\">付録２ [Appendix 2]</h3>\n<h4 class=\"h-lv4\">ユニバーサルアクセシビリティの最小基準 [Minimum Standards for Universal Accessibility]</h4>\n<h6 class=\"h-lv6\"><strong>১.ক</strong> すべての室等には、車椅子転回用に最小 <strong>１５００ミリメートル角</strong> の空間を確保しなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>১.খ</strong> 公共の出入口等の有効幅員は、最小 <strong>１２００ミリメートル</strong> としなければならない。</h6>\n<h6 class=\"h-lv6\"><strong>১.ঘ</strong> 高さ <strong>５８０ミリメートル</strong> を超える突出物は、通路内へ <strong>１００ミリメートル</strong> を超えて突出してはならない。</h6>\n<h6 class=\"h-lv6\"><strong>১.ছ</strong> 床面の段差が <strong>６ミリメートルから１２ミリメートル</strong> の間であれば、勾配 <strong>１／２</strong> 以下で面取り（Bevel）を行わなければならない。</h6>\n<p class=\"fig-title\">図</p>\n<figure class=\"fig-wrap\"><img src=\"images/102_13510_bevel_slope_ramp_if_level_difference_exceeds.png\" alt=\"面取り（ベベル）処理：段差が所定値を超える場合はスロープとする\" class=\"fig-img\"><figcaption class=\"fig-caption\">面取り（ベベル）処理：段差が所定値を超える場合はスロープとする</figcaption></figure>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h3 class=\"h-lv3\">পরিশিষ্ট-২</h3>\n<h4 class=\"h-lv4\">সার্বজনীন গম্যতার ন্যূনতম মান</h4>\n<h5 class=\"h-lv5\"><strong>১। সাধারণ নিয়ম:</strong></h5>\n<h6 class=\"h-lv6\">(ক) প্রতিটি কক্ষের কোনো না কোনো অংশে হুইল চেয়ার ঘুরাইবার জন্য ন্যূনতম <strong>১৫০০ মি.মি. X ১৫০০ মি.মি.</strong> বাধামুক্ত জায়গা রাখিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(খ) গণপ্রবেশ পথ ও করিডোরের ন্যূনতম প্রস্থ <strong>১২০০ মি.মি.</strong> হইতে হইবে।</h6>\n<h6 class=\"h-lv6\">(গ) পথের প্রস্থ ১৫০০ মি.মি. এর কম হইলে প্রতি <strong>৩০ মি.</strong> দূরত্বে অন্তত একবার <strong>১৫০০ মি.মি. X ১৫০০ মি.মি.</strong> বাধামুক্ত জায়গা রাখিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(ঘ) <strong>৫৮০ মি.মি.</strong> অধিক উচ্চতায় অবস্থিত বস্তু করিডোরের ভিতর <strong>১০০ মি.মি.</strong> এর বেশি বাহির হইয়া আসিতে পারিবে না।</h6>\n<h6 class=\"h-lv6\">(ঙ) মেঝে হইতে <strong>২ মিটার</strong> উচ্চতার ভিতর উপর হইতে কোনোপ্রকার বাধাদানকারী বস্তু থাকিতে পারিবে না।</h6>\n<h6 class=\"h-lv6\">(ছ) তল পরিবর্তন <strong>৬-১২ মি.মি.</strong> এর মধ্যে হইলে সর্বোচ্চ <strong>১:২</strong> ঢালে <strong>বেভেল (Bevel)</strong> করিতে হইবে।</h6>\n<p class=\"fig-title\">চিত্র</p>\n<figure class=\"fig-wrap\"><img src=\"images/102_13510_bevel_slope_ramp_if_level_difference_exceeds.png\" alt=\"ঢালে (বেভেল) করিতে হইবে; তলের পার্থক্য এর চাইতে বেশি হইলেই র‍্যাম্পিদতে হইবে\" class=\"fig-img\"><figcaption class=\"fig-caption\">ঢালে (বেভেল) করিতে হইবে; তলের পার্থক্য এর চাইতে বেশি হইলেই র‍্যাম্পিদতে হইবে</figcaption></figure>\n<hr class=\"sep\">"},{"num":"13511","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第２条（戸（Doors））</strong></h5>\n<h6 class=\"h-lv6\">一（ক）　戸の有効幅員は、最小 <strong>９００ミリメートル</strong> としなければならない。また、当該戸に回転扉（回転ドア）又はターンタイルを使用してはならない。</h6>\n<h6 class=\"h-lv6\">二（খ）　戸の両側には、通行に十分な空地を確保しなければならない。</h6>\n<h6 class=\"h-lv6\">１　戸を押し開く側にあっては、<strong>１２００ミリメートル × １２００ミリメートル</strong> の障害のない空間を確保し、かつ、戸の引手（ラッチ又はハンドル）の側に <strong>３００ミリメートル</strong> の壁面後退（空地）を設けなければならない。</h6>\n<h6 class=\"h-lv6\">２　戸を手前に引いて開く側にあっては、<strong>１５００ミリメートル × １５００ミリメートル</strong> の障害のない空間を確保し、かつ、戸の引手の側に <strong>６００ミリメートル</strong> の壁面後退（空地）を設けなければならない。</h6>\n<h6 class=\"h-lv6\">三（গ）　戸のハンドル（把手）の高さは、床面から <strong>８５０ミリメートル以上９５０ミリメートル以下</strong> とし、少ない力で操作できることを確実にしなければならない。</h6>\n<h6 class=\"h-lv6\">四（ঘ）　戸及び戸の枠（フレーム）は、周囲の壁面とは異なる色彩とし、かつ、触覚により識別可能な標示を付さなければならない。</h6>\n<p class=\"fig-title\">図</p>\n<figure class=\"fig-wrap\"><img src=\"images/103_13511_door_clear_space_in_front.png\" alt=\"戸の前面の障害のない空間\" class=\"fig-img\"><figcaption class=\"fig-caption\">戸の前面の障害のない空間</figcaption></figure>\n<figure class=\"fig-wrap\"><img src=\"images/103_13511_door_clear_width.png\" alt=\"戸の有効幅員\" class=\"fig-img\"><figcaption class=\"fig-caption\">戸の有効幅員</figcaption></figure>\n<h5 class=\"h-lv5\"><strong>第３条（手すり（Railing））</strong></h5>\n<h6 class=\"h-lv6\">一（ক）　手すり（ハンドレール）及び掴み棒（グラブレール）の形状は円形とし、その外径は <strong>３５ミリメートルから５０ミリメートル</strong> の間としなければならない。また、隣接する壁面からは <strong>４０ミリメートルから６０ミリメートル</strong> の距離を保たなければならない。ただし、当該手すり等は、規定された有効通路幅員内に突出してはならない。</h6>\n<h6 class=\"h-lv6\">二（খ）　手すりは連続した構造とし、その全長にわたって一定の高さ（床面から <strong>８００ミリメートルから９００ミリメートル</strong> の間）に設置しなければならない。特別な必要がある場合にあっては、当該高さの上下に追加の手すりを設けることができる。</h6>\n<h6 class=\"h-lv6\">三（গ）　手すりの端部は、通行の妨げや危険が生じないよう、円形とするか、又は壁面若しくは床面側へ折り曲げて納めなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>২। দরজা :</strong></h5>\n<h6 class=\"h-lv6\">(ক) দরজার প্রতিবন্ধকতা বিহীন ন্যূনতম প্রস্থ <strong>৯০০ মি.মি.</strong> হইতে হইবে এবং উক্ত দরজা ঘূর্ণায়মান হইতে পারিবে না, অথবা টার্নস্টাইল ব্যবহার করা যাইবে না;</h6>\n<h6 class=\"h-lv6\">(খ) দরজার উভয় পার্শ্বে যথেষ্ট পরিমাণ চলাচল উপযোগী খালি জায়গা থাকিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(১) যেদিক হইতে দরজা ধাক্কা দিতে হয় সেইদিকে <strong>১২০০ মি.মি. X ১২০০ মি.মি.</strong> বাধামুক্ত জায়গা এবং দরজার ছিটকিনি বা হাতলের দিকে <strong>৩০০ মি.মি.</strong> খালি দেওয়াল থাকিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(২) যেদিক হইতে দরজা টানিয়া খুলিতে হয় সেইদিকে <strong>১৫০০ মি.মি. X ১৫০০ মি.মি.</strong> বাধামুক্ত জায়গা এবং দরজার ছিটকিনি বা হাতলের দিকে <strong>৬০০ মি.মি.</strong> খালি দেওয়াল থাকিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(গ) দরজার হাতল মেঝে হইতে <strong>৮৫০ মি.মি.</strong> হইতে <strong>৯৫০ মি.মি.</strong> উচ্চতার মধ্যে হইতে হইবে এবং উহা কম শক্তি প্রয়োগের ব্যবহারের বিষয়টি নিশ্চিত করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(ঘ) দরজা ও দরজার ফ্রেম আশপাশের দেওয়াল হইতে ভিন্ন রং এর হইতে হইবে এবং স্পর্শ করিয়া বুঝা যায় এইরূপ চিহ্ন থাকিতে হইবে।</h6>\n<p class=\"fig-title\">চিত্র</p>\n<figure class=\"fig-wrap\"><img src=\"images/103_13511_door_clear_space_in_front.png\" alt=\"দরজার সামনের বাধামুক্ত স্থান\" class=\"fig-img\"><figcaption class=\"fig-caption\">দরজার সামনের বাধামুক্ত স্থান</figcaption></figure>\n<figure class=\"fig-wrap\"><img src=\"images/103_13511_door_clear_width.png\" alt=\"দরজার বাধামুক্ত প্রস্থ\" class=\"fig-img\"><figcaption class=\"fig-caption\">দরজার বাধামুক্ত প্রস্থ</figcaption></figure>\n<h5 class=\"h-lv5\"><strong>৩। রেইলিং :</strong></h5>\n<h6 class=\"h-lv6\">(ক) হ্যান্ড রেইল ও গ্র্যাব-রেইল গোলাকার হইবে যাহার বাহিরের ব্যাস <strong>৩৫-৫০ মি.মি.</strong> হইতে হইবে এবং ইহা সংলগ্ন দেওয়ালের <strong>৪০ মি.মি.</strong> হইতে <strong>৬০ মি.মি.</strong> দূরত্বে হইতে হইবে, তবে ইহা কোনোভাবেই প্রয়োজনীয় বাধামুক্ত চলাচলের পথের ভিতর চলিয়া আসিতে পারিবে না।</h6>\n<h6 class=\"h-lv6\">(খ) হ্যান্ড রেইল অনবরত এবং পুরো দৈর্ঘ্য জুড়িয়া একই উচ্চতায় (<strong>৮০০-৯০০ মি.মি.</strong>) হইতে হইবে। ইহার চাইতে উপরে বা নীচে বিশেষ প্রয়োজনে অতিরিক্ত হ্যান্ড রেইল দেওয়া যাইবে।</h6>\n<h6 class=\"h-lv6\">(গ) হ্যান্ড রেইলের প্রান্তসমূহ গোলাকার অথবা দেওয়াল বা মেঝের দিকে এইভাবে বাঁকানো বা ঢুকানো থাকিবে যেন তাহা চলার পথে কোনো বিপদ না ঘটায়।</h6>\n<hr class=\"sep\">"},{"num":"13512","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第４条（階段（Stairs））</strong></h5>\n<h6 class=\"h-lv6\">一（ক）　階段の全域にわたって、踏面（Tread）及び蹴上げ（Riser）の寸法は変更せず、均一でなければならない。</h6>\n<h6 class=\"h-lv6\">二（খ）　階段の踏面は最小 <strong>３００ミリメートル</strong> の奥行きとし、蹴上げは最大 <strong>１５０ミリメートル</strong> としなければならない。</h6>\n<h6 class=\"h-lv6\">三（গ）　各踏面には、最大 <strong>１５ミリメートル</strong> 突出した丸みを帯びた段鼻（Nosing）を設けなければならない。</h6>\n<h6 class=\"h-lv6\">四（ঘ）　蹴込み板のない（オープンライザー）構造としてはならない。</h6>\n<h6 class=\"h-lv6\">五（ঙ）　階段の段（Flight）の両側に手すりを設けなければならない。当該手すりは、階段の下端において最小 <strong>３００ミリメートル</strong> 、上端においては踏面１段分の奥行きに <strong>３００ミリメートル</strong> を加えた距離だけ、それぞれ水平方向に延長しなければならない。</h6>\n<h6 class=\"h-lv6\">六（চ）　階段の床面は滑りにくい材料で仕上げるものとし、当該場所には十分な照明を確保しなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第５条（勾配路（Ramps））</strong></h5>\n<h6 class=\"h-lv6\">一（ক）　勾配路の勾配は最大 <strong>１／１２</strong>（1:12）以下かつ均一でなければならず、一箇所の連続した長さは <strong>１２メートル</strong> を超えてはならない。</h6>\n<h6 class=\"h-lv6\">二（খ）　勾配路の長さが <strong>１８００ミリメートル</strong> を超える場合にあっては、両側に高さ <strong>８００ミリメートルから９００ミリメートル</strong> の手すりを設けなければならない。当該手すりは、勾配路の起終点からさらに <strong>３００ミリメートル</strong> 水平方向に延長しなければならない。</h6>\n<h6 class=\"h-lv6\">三（গ）　両側の手すり間の有効幅員は、<strong>１２００ミリメートル</strong> を下回ってはならない。</h6>\n<h6 class=\"h-lv6\">四（ঘ）　勾配路の開放された端部には、床面から最小 <strong>６５ミリメートル</strong> 立ち上げた縁石等の障壁を設けなければならない。</h6>\n<h6 class=\"h-lv6\">五（ঙ）　勾配路の起終点、及び長さが９メートルを超える場合若しくは進行方向を変更する場合にあっては、休憩場所又は踊場（Landing）を設けなければならない。転回のための踊場は最小 <strong>１．５メートル × １．５メートル</strong> の面積を確保しなければならない（電動車椅子を利用する場合にあっては、<strong>２．２５メートル × ２．２５メートル</strong> の面積を確保しなければならない）。</h6>\n<h6 class=\"h-lv6\">六（চ）　踊場の最小幅員は勾配路の幅員を下回ってはならない。</h6>\n<h6 class=\"h-lv6\">七（ছ）　戸が設置された勾配路にあっては、戸の前後に必要とされる最小空間を本付録第２条第二号の規定に従い確保しなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৪। সিঁড়ি:</strong></h5>\n<h6 class=\"h-lv6\">(ক) পুরো সিঁড়ি জুড়িয়া ট্রেড ও রাইজারের মাপ অপরিবর্তিত ও সুষম থাকিবে।</h6>\n<h6 class=\"h-lv6\">(খ) সিঁড়ির ট্রেড ন্যূনতম <strong>৩০০ মি.মি.</strong> গভীর ও রাইজার সর্বোচ্চ <strong>১৫০ মি.মি.</strong> হইবে।</h6>\n<h6 class=\"h-lv6\">(গ) প্রতিটি ট্রেড এ সর্বাধিক <strong>১৫ মি.মি.</strong> বাহির হওয়া গোলাকার নোজিং থাকিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(ঘ) উন্মুক্ত রাইজার হইতে পারিবে না।</h6>\n<h6 class=\"h-lv6\">(ঙ) ফ্লাইটের দুই পার্শ্বেই হ্যান্ড রেইল থাকিবে এবং সিঁড়ির শেষে তাহা ন্যূনতম <strong>৩০০ মি.মি.</strong> ও শুরুতে একটি ট্রেডের গভীরতা ও <strong>৩০০ মি.মি.</strong> এর যোগফলের সমান আনুভূমিকভাবে বর্ধিত হইতে হইবে।</h6>\n<h6 class=\"h-lv6\">(চ) সিঁড়ির তলা অপিচ্ছিল বস্তুতে তৈয়ার করিতে হইবে এবং স্থানটি যথেষ্ট আলোকিত হইতে হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>৫। র‍্যাম্প:</strong></h5>\n<h6 class=\"h-lv6\">(ক) র‍্যাম্প সর্বোচ্চ <strong>১:১২</strong> অনুপাতে ও সুষম ঢালওয়ালা হইতে হইবে এবং একাধিকে একনাগাড়ে <strong>১২ মিটার</strong> এর বেশি দীর্ঘ হইতে পারিবে না।</h6>\n<h6 class=\"h-lv6\">(খ) র‍্যাম্প <strong>১৮০০ মি.মি.</strong> এর চাইতে দীর্ঘ হইলে র‍্যাম্পের উভয়দিকে <strong>৮০০-৯০০ মি.মি.</strong> উচ্চতায় হ্যান্ড রেইল দিতে হইবে এবং এই রেইল র‍্যাম্পের শুরুতে ও শেষে আরো <strong>৩০০ মি.মি.</strong> আনুভূমিকভাবে বর্ধিত হইতে হইবে।</h6>\n<h6 class=\"h-lv6\">(গ) দুই পার্শ্বের হ্যান্ড রেইলের মাঝখানের দূরত্ব <strong>১২০০ মি.মি.</strong> এর কম হইবে না।</h6>\n<h6 class=\"h-lv6\">(ঘ) র‍্যাম্পের খোলাপ্রান্তে মেঝে হইতে ন্যূনতম <strong>৬৫ মি.মি.</strong> উপরের দিকে তুলিয়া বাধা সৃষ্টি করিতে হইবে এবং আলাদা রং ও স্পর্শ দিয়া বুঝা যায় এইরূপ চিহ্ন ব্যবহার করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(ঙ) প্রতিটি র‍্যাম্পের শুরুতে ও শেষে এবং ৯ মিটার এর চাইতে দীর্ঘ বা দিক ঘুরাইতে হয় এইরূপ র‍্যাম্পে বিশ্রামস্থল বা ল্যান্ডিং দিতে হইবে; ঘুরিবার জন্য ল্যান্ডিং এ ন্যূনতম <strong>১.৫ মিটার X ১.৫ মিটার</strong> জায়গা থাকিতে হইবে (বিদ্যুৎ চালিত হুইল চেয়ারের জন্য <strong>২.২৫ মিটার X ২.২৫ মিটার</strong> জায়গা থাকিতে হইবে)।</h6>\n<h6 class=\"h-lv6\">(চ) ল্যান্ডিং এর ন্যূনতম প্রস্থ র‍্যাম্পের প্রস্থের কম হইতে পারিবে না এবং ১৮০° ঘুরিলে ল্যান্ডিং এর দৈর্ঘ্য কমপক্ষে র‍্যাম্পের প্রস্থ বা ১৫০০ মি.মি. (যাহা অধিক) হইতে হইবে。</h6>\n<h6 class=\"h-lv6\">(ছ) দরজা দ্বারা যুক্ত র‍্যাম্পে দরজার সামনে ও পিছনে প্রয়োজনীয় ন্যূনতম জায়গা ক্রমিক ২(খ) অনুযায়ী থাকিতে হইবে।</h6>\n<hr class=\"sep\">"},{"num":"13513","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>第６条（昇降機（Lift））</strong></h5>\n<h6 class=\"h-lv6\">一（ক）　エレベーターロビーは、アクセシブルであり、最小 <strong>１．５メートル × １．５メートル</strong> の障害のない転回空間を備えていなければならない。</h6>\n<h6 class=\"h-lv6\">二（খ）　エレベーターの操作ボタンは、床面から <strong>８９０ミリメートルから１２００ミリメートル</strong> の高さの範囲内に設置しなければならない。</h6>\n<h6 class=\"h-lv6\">三（গ）　エレベーターのかごの最小有効内法寸法は <strong>１５００ミリメートル × １７２５ミリメートル</strong> とし、出入口の有効幅員は最小 <strong>９００ミリメートル</strong> としなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第７条（洗面所、便所等）</strong></h5>\n<h6 class=\"h-lv6\">一（ক）　各階には、少なくとも一箇所又は全便所数の <strong>５パーセント</strong>（いずれか多い方の数値）以上の便所について、障害者が利用可能な構造としなければならない。</h6>\n<h6 class=\"h-lv6\">二（খ）　便所の内部には最小 <strong>１．５メートル × １．７５メートル</strong> の障害のない空間を確保し、且つ大便器の一方の側壁から最小 <strong>１２００ミリメートル</strong> の空地を設けなければならない。</h6>\n<h6 class=\"h-lv6\">三（গ）　大便器の座面から３００ミリメートルの高さの位置に、前方へ最小 <strong>６００ミリメートル</strong> 延長した手すりを設けなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第８条（駐車場）</strong></h5>\n<h6 class=\"h-lv6\">二（খ）　障害者等用駐車区画の幅員は最小 <strong>３．２メートル</strong> 、奥行きは最小 <strong>４．８０メートル</strong> としなければならない。</h6>\n<h5 class=\"h-lv5\"><strong>第９条（座席（Seating））</strong></h5>\n<h6 class=\"h-lv6\">一（ক）　各種集会施設においては、車椅子利用者のための専用座席を一定数確保しなければならない。</h6>\n<h6 class=\"h-lv6\">二（খ）　当該座席に至るために <strong>９００ミリメートル × １５００ミリメートル</strong> の障害のない空間を確保し、且つ最小幅員 <strong>１２００ミリメートル</strong> の通路（アイル）に面していなければならない。</h6>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h5 class=\"h-lv5\"><strong>৬। লিফট :</strong></h5>\n<h6 class=\"h-lv6\">(ক) লিফট লবি প্রবেশগম্য, আলোকিত, চিহ্নিত, আনুভূমিক ও ন্যূনতম (<strong>১.৫ মিটার X ১.৫ মিটার</strong>) বাধাহীন ঘুরিবার জায়গা সম্পন্ন হইতে হইবে।</h6>\n<h6 class=\"h-lv6\">(খ) লিফট নিয়ন্ত্রণের বোতামসমূহ <strong>৮৯০-১২০০ মি.মি.</strong> উচ্চতার মধ্যে অবস্থিত হইতে হইবে এবং বিশেষ সুবিধা সম্পন্ন ব্যক্তিবর্গের ব্যবহার উপযোগী হইতে হইবে।</h6>\n<h6 class=\"h-lv6\">(গ) লিফট কেবিন এর ন্যূনতম বাধামুক্ত পরিমাপ <strong>১৫০০ মি.মি. X ১৭২৫ মি.মি.</strong> হইবে এবং দরজার ন্যূনতম প্রস্থ <strong>৯০০ মি.মি.</strong> হইতে হইবে।</h6>\n<h6 class=\"h-lv6\">(ঘ) যখন লিফট বা র‍্যাম্প দেওয়া সম্ভব হইবে না তখন ন্যূনতম <strong>৯০০ মি.মি. X ১২০০ মি.মি.</strong> আকারের প্ল্যাটফর্ম লিফটিং জাতীয় যন্ত্র ব্যবহার করিতে হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>৭। ওয়াশরুম, টয়লেট, ইত্যাদি:</strong></h5>\n<h6 class=\"h-lv6\">(ক) প্রতি তলায় কমপক্ষে একটি অথবা মোট টয়লেটের <strong>৫%</strong> (যাহা অধিক) সংখ্যক টয়লেট প্রতিবন্ধীদের জন্য প্রবেশগম্য করিয়া তৈরি করিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(খ) টয়লেটের ভিতর ন্যূনতম <strong>১.৫ মিটার X ১.৭৫ মিটার</strong> বাধামুক্ত জায়গা থাকিতে হইবে এবং <strong>WC</strong>-এর একদিকের সংলগ্ন দেওয়াল হইতে ন্যূনতম <strong>১২০০ মি.মি.</strong> জায়গা খালি থাকিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(গ) <strong>WC</strong>-এর আসন হইতে <strong>৩০০ মি.মি.</strong> উচ্চতায় পেছনের দেওয়াল হইতে সর্বাধিক <strong>৩০০ মি.মি.</strong> দূরত্বে এবং সামনের দিকে ন্যূনতম <strong>৬০০ মি.মি.</strong> বর্ধিত করিয়া হ্যান্ডরেইল থাকিতে হইবে।</h6>\n<h6 class=\"h-lv6\">(ঘ) পানির কল মেঝে হইতে <strong>৮৫০ মি.মি.</strong> উপরে হইতে হইবে এবং বেসিনের তলা ও পাইপ এমনভাবে থাকিতে হইবে যেন হুইল চেয়ার পৌঁছাইতে পারে।</h6>\n<h6 class=\"h-lv6\">(ঙ) গোসলের জায়গা <strong>১.০ মিটার</strong> প্রস্থসহ <strong>১.৫০ বর্গ মি.</strong> হইবে এবং মেঝেতে কোনো প্রকার বেষ্টনী থাকিতে পারিবে না।</h6>\n<h5 class=\"h-lv5\"><strong>৮। পার্কিং:</strong></h5>\n<h6 class=\"h-lv6\">(ক) প্রতিবন্ধীসহ সার্বজনীন ব্যবহারযোগ্য ন্যূনতম একটি পার্কিং স্পেস থাকিতে হইবে。</h6>\n<h6 class=\"h-lv6\">(খ) উক্ত পার্কিং স্পেসের প্রশস্ততা ন্যূনতম <strong>৩.২ মিটার</strong> এবং দৈর্ঘ্য ন্যূনতম <strong>৪.৮০ মিটার</strong> হইতে হইবে।</h6>\n<h5 class=\"h-lv5\"><strong>৯। সিটিং :</strong></h5>\n<h6 class=\"h-lv6\">(ক) বিভিন্ন সমাবেশ স্থলে নির্দিষ্ট সংখ্যক হুইলচেয়ার ব্যবহারকারীদের উপযোগী আসন সংরক্ষিত ও সমভাবে বণ্টিত থাকিতে হইবে, যাহা প্রবেশ পথ হইতে সহজে দৃশ্যমান ও গম্য হইতে হইবে।</h6>\n<h6 class=\"h-lv6\">(খ) উক্ত আসনসমূহে যাইবার জন্য <strong>৯০০ মি.মি. X ১৫০০ মি.মি.</strong> বাধামুক্ত জায়গা থাকিতে হইবে এবং আসনসমূহ ন্যূনতম <strong>১২০০ মি.মি.</strong> চওড়া আইল এর ধারে হইতে হইবে।</h6>\n<h6 class=\"h-lv6\">(গ) সংরক্ষিত আসন একই সারিতে অন্যান্য আসনের একইতলে অবস্থিত হইবে এবং তাহা অন্যান্য সাধারণ আসনগুলো ব্যবহারে কোনো প্রতিবন্ধকতা তৈরি করিতে পারিবে না।</h6>\n<hr class=\"sep\">"},{"num":"13514","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h3 class=\"h-lv3\">付録３ [Appendix 3]</h3>\n<h4 class=\"h-lv4\">用途分類（Occupancy Type）又は建築物の使用用途に基づく区分 [Classification by Occupancy Type]</h4>\n<div class=\"table-wrap\"><table><thead><tr><th>項番</th><th>建築物の用途分類</th><th>小分類</th><th>使用用途の具体的種類</th></tr></thead><tbody><tr><td><strong>１</strong></td><td><strong>A：住宅（Residential）</strong></td><td>A1</td><td>一戸建て住宅</td></tr><tr><td></td><td></td><td>A3</td><td>フラット及び共同住宅</td></tr><tr><td></td><td></td><td>A5</td><td>ホテル、サービスアパートメント等</td></tr><tr><td><strong>２</strong></td><td><strong>B：教育施設（Educational）</strong></td><td>B1</td><td>学校及びカレッジ等（第１２学年まで）</td></tr><tr><td></td><td></td><td>B2</td><td>大学等（第１２学年超）</td></tr><tr><td><strong>３</strong></td><td><strong>C：公衆福祉・矯正施設</strong></td><td>C1</td><td>託児所</td></tr><tr><td></td><td></td><td>C2</td><td>高齢者介護施設（身体的に自立している者）</td></tr><tr><td></td><td></td><td>C3</td><td>高齢者介護施設（身体的に自立していない者）</td></tr><tr><td><strong>４</strong></td><td><strong>D：医療施設（Health Care）</strong></td><td>D1</td><td>一般医療サービス（病院等）</td></tr><tr><td></td><td></td><td>D2</td><td>非常時に機能維持が必要な医療施設</td></tr><tr><td><strong>５</strong></td><td><strong>E：業務施設（Business）</strong></td><td>E1</td><td>事務所（Offices）</td></tr><tr><td></td><td></td><td>E3</td><td>銀行、郵便局及びこれらに類するもの</td></tr></tbody></table></div>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<h3 class=\"h-lv3\">পরিশিষ্ট-৩</h3>\n<h4 class=\"h-lv4\">অকুপেন্সি টাইপ বা ইমারতের ব্যবহার ভিত্তিক শ্রেণিবিন্যাস</h4>\n<h5 class=\"h-lv5\"><strong>[বিধি ২(৬) দ্রষ্টব্য]</strong></h5>\n<h5 class=\"h-lv5\"><strong>অকুপেন্সি টাইপ (Occupancy Type) বা ইমারতের ব্যবহার ভিত্তিক শ্রেণিবিন্যাস</strong></h5>\n<div class=\"table-wrap\"><table><thead><tr><th>ক্রমিক নং</th><th>ইমারত ব্যবহারের শ্রেণি</th><th>উপ- শ্রেণি</th><th>ব্যবহারের ধরন</th></tr></thead><tbody><tr><td>(১)</td><td>(২)</td><td>(৩)</td><td>(৪)</td></tr><tr><td><strong>১।</strong></td><td><strong>A : আবাসিক</strong></td><td>A1</td><td>একক পরিবার বাড়ি</td></tr><tr><td></td><td></td><td>A2</td><td>দুই পরিবারের বাড়ি</td></tr><tr><td></td><td></td><td>A3</td><td>ফ্ল্যাট ও এ্যাপার্টমেন্ট বাড়ি</td></tr><tr><td></td><td></td><td>A4</td><td>মেস, বোর্ডিং, ডরমিটরি ও হোস্টেল</td></tr><tr><td></td><td></td><td>A5</td><td>হোটেল, মোটেল, গেস্ট হাউজ, সার্ভিস এ্যাপার্টমেন্ট ও স্টুডিও এ্যাপার্টমেন্ট</td></tr><tr><td></td><td></td><td>A6</td><td>সাশ্রয়ী আবাসন</td></tr><tr><td><strong>২।</strong></td><td><strong>B : শিক্ষা প্রতিষ্ঠান</strong></td><td>B1</td><td>স্কুল ও কলেজ জাতীয় শিক্ষা প্রতিষ্ঠান (১২ ক্লাস পর্যন্ত)</td></tr><tr><td></td><td></td><td>B2</td><td>বিশ্ববিদ্যালয়, ট্রেনিং একাডেমী ইত্যাদি (১২ ক্লাসের উপরে)</td></tr><tr><td></td><td></td><td>B3</td><td>প্রি-স্কুল</td></tr><tr><td><strong>৩।</strong></td><td><strong>C : প্রাতিষ্ঠানিক</strong></td><td>C1</td><td>শিশু পরিচর্যা</td></tr><tr><td></td><td></td><td>C2</td><td>বয়স্ক পরিচর্যা (শারীরিক সক্ষম)</td></tr><tr><td></td><td></td><td>C3</td><td>বয়স্ক পরিচর্যা (শারীরিক সক্ষম নহে)</td></tr><tr><td></td><td></td><td>C4</td><td>শিশুদের জন্য মানসিক ও অন্যান্য শোধন কেন্দ্র (Penal and mental institutions for children)</td></tr><tr><td></td><td></td><td>C5</td><td>বয়স্কদের জন্য কারাগার, মানসিক ও অন্যান্য শোধন কেন্দ্র (Penal and mental institutions for adults)</td></tr><tr><td><strong>৪।</strong></td><td><strong>D : স্বাস্থ্যসেবা</strong></td><td>D1</td><td>সাধারণ স্বাস্থ্য সেবা (হাসপাতাল, ক্লিনিক মেডিকেল হাসপাতাল)</td></tr><tr><td></td><td></td><td>D2</td><td>স্বাস্থ্য সেবা জরুরি অবস্থায় কার্যকর (হাসপাতাল, ক্লিনিক (দুর্যোগকালীন এবং পরবর্তী জরুরি ব্যবস্থাপনাসহ)</td></tr><tr><td></td><td></td><td>D3</td><td>ডক্টর চেম্বার, ডায়াগনস্টিক ল্যাব, প্যাথলজি ল্যাব (বেড ব্যতীত)</td></tr><tr><td><strong>৫।</strong></td><td><strong>E : ব্যবসা (Business)</strong></td><td>E1</td><td>অফিস (Offices)</td></tr><tr><td></td><td></td><td>E2</td><td>গবেষণা ও পরীক্ষাগার (রিসার্চ প্রতিষ্ঠান জাতীয় স্থাপনা)</td></tr><tr><td></td><td></td><td>E3</td><td>নিত্য প্রয়োজনীয় অন্যান্য সেবা (ব্যাংক, পোস্ট অফিস ও সম জাতীয়)</td></tr></tbody></table></div>\n<hr class=\"sep\">"},{"num":"13515","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>付録３ 用途分類（承前）</strong></h5>\n<div class=\"table-wrap\"><table><thead><tr><th>項番</th><th>建築物の用途分類</th><th>小分類</th><th>使用用途の具体的種類</th></tr></thead><tbody><tr><td><strong>６</strong></td><td><strong>F：商業（Mercantile）</strong></td><td>F1</td><td>小規模な店舗及び市場（３００㎡未満）</td></tr><tr><td></td><td></td><td>F2</td><td>大規模な店舗及び市場（３００㎡以上）</td></tr><tr><td><strong>７</strong></td><td><strong>G：工場（Industrial）</strong></td><td>G1</td><td>低公害・低危険の工場及び家内工業</td></tr><tr><td><strong>８</strong></td><td><strong>H：倉庫（Storage）</strong></td><td>H1</td><td>低可燃性物質の倉庫</td></tr><tr><td><strong>９</strong></td><td><strong>I：集会（Assembly）</strong></td><td>I1</td><td>大規模ホール（座席固定型）</td></tr><tr><td></td><td></td><td>I2</td><td>小規模ホール（座席固定、３００人未満）</td></tr><tr><td><strong>１０</strong></td><td><strong>J：危険物（Hazardous）</strong></td><td>J1</td><td>爆発の危険性がある建築物</td></tr><tr><td></td><td></td><td>J3</td><td>生物学的危険性がある建築物</td></tr><tr><td><strong>１１</strong></td><td><strong>K：駐車場（Parking）</strong></td><td>K1</td><td>商業用駐車場</td></tr><tr><td></td><td></td><td>K3</td><td>自動車修理工場</td></tr><tr><td><strong>１２</strong></td><td><strong>L：ユーティリティ</strong></td><td>L</td><td>公共設備施設（ポンプ室、変電所等）</td></tr><tr><td><strong>１３</strong></td><td><strong>M：その他</strong></td><td>M1</td><td>特殊な構造物（記念碑等）</td></tr><tr><td></td><td></td><td>M2</td><td>境界塀、タワー、看板等</td></tr></tbody></table></div>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>ক্রমিক নং</th><th>ইমারত ব্যবহারের শ্রেণি</th><th>উপ- শ্রেণি</th><th>ব্যবহারের ধরন</th></tr></thead><tbody><tr><td>(১)</td><td>(২)</td><td>(৩)</td><td>(৪)</td></tr><tr><td><strong>৬।</strong></td><td><strong>F : বাণিজ্যিক (Mercantile)</strong></td><td>F1</td><td>ছোট দোকান ও বাজার (৩০০ স্কয়ার মিটার এর কম ক্ষেত্রফল বিশিষ্ট)</td></tr><tr><td></td><td></td><td>F2</td><td>বড় দোকান ও বাজার (৩০০ স্কয়ার মিটার এর বেশি ক্ষেত্রফল বিশিষ্ট)</td></tr><tr><td></td><td></td><td>F3</td><td>ফিলিং স্টেশন (Refueling station)</td></tr><tr><td><strong>৭।</strong></td><td><strong>G : শিল্পকারখানা</strong></td><td>G1</td><td>কম দূষণকারী, কম বিপজ্জনক কারখানা ও কুটিরশিল্প (Low hazard industries)</td></tr><tr><td></td><td></td><td>G2</td><td>সাধারণ বিপজ্জনক কারখানা ও সাধারণ দূষণকারী (Moderate hazard industries)</td></tr><tr><td><strong>৮।</strong></td><td><strong>H : গুদাম</strong></td><td>H1</td><td>কম দাহ্য পদার্থের গুদাম (Low fire risk storage)</td></tr><tr><td></td><td></td><td>H2</td><td>সাধারণ দাহ্য পদার্থের গুদাম (Moderate fire risk storage)</td></tr><tr><td><strong>৯।</strong></td><td><strong>I : সমাবেশ (Assembly)</strong></td><td>I1</td><td>বড় মিলনায়তন (আসন স্থানান্তরযোগ্য নহে)</td></tr><tr><td></td><td></td><td>I2</td><td>ছোট মিলনায়তন (আসন স্থানান্তরযোগ্য নহে এবং জনসংখ্যা ৩০০ এর কম)</td></tr><tr><td></td><td></td><td>I3</td><td>বড় মিলনায়তন (আসন স্থানান্তরযোগ্য)</td></tr><tr><td></td><td></td><td>I4</td><td>ছোট মিলনায়তন (আসন স্থানান্তরযোগ্য এবং জনসংখ্যা ৩০০ এর কম)</td></tr><tr><td></td><td></td><td>I5</td><td>ক্রীড়া বিষয়ক</td></tr><tr><td><strong>১০।</strong></td><td><strong>J : বিপজ্জনক ভবনের ব্যবহার</strong></td><td>J1</td><td>বিস্ফোরণ ঘটাইতে পারে এইরূপ ভবন (Explosion hazard building)</td></tr><tr><td></td><td></td><td>J2</td><td>রাসায়নিক ধরনের বিপজ্জনক ভবন (Chemical hazard building)</td></tr><tr><td></td><td></td><td>J3</td><td>জীবাণু ধরনের বিপজ্জনক ভবন (Biological hazard building)</td></tr><tr><td></td><td></td><td>J4</td><td>বিকিরণ ধরনের বিপজ্জনক ভবন (Radiation hazard building)</td></tr><tr><td><strong>১১।</strong></td><td><strong>K : পার্কিং</strong></td><td>K1</td><td>বাণিজ্যিক পার্কিং</td></tr><tr><td></td><td></td><td>K2</td><td>ব্যক্তি মালিকানাধীন পার্কিং</td></tr><tr><td></td><td></td><td>K3</td><td>মেরামত কারখানা</td></tr><tr><td><strong>১২।</strong></td><td><strong>L : ইউটিলিটি</strong></td><td>L</td><td>ইউটিলিটি সার্ভিসসমূহ (পাম্প হাউজ, সাব-স্টেশন ইত্যাদি)</td></tr><tr><td><strong>১৩।</strong></td><td><strong>M : Miscellaneous</strong></td><td>M1</td><td>বিশেষ ধরনের কাঠামো (স্মৃতি সৌধ, শহীদ মিনার ইত্যাদি)</td></tr><tr><td></td><td></td><td>M2</td><td>সীমানা দেয়াল, জলাধার, টাওয়ার, বিলবোর্ড ইত্যাদি</td></tr></tbody></table></div>\n<hr class=\"sep\">"},{"num":"13516","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<p>####### <strong>注釈:</strong></p>\n<p>####### １　コーヒーショップ等は商業（<strong>F1</strong>）分類とする。</p>\n<p>####### ２　レストランの客席等は集会（<strong>I</strong>）分類、厨房等は公共設備（<strong>L</strong>）分類に含める。</p>\n<h3 class=\"h-lv3\">付録４ [Appendix 4]</h3>\n<h4 class=\"h-lv4\">手数料（Fees）等 [Fees, etc.]</h4>\n<h6 class=\"h-lv6\">一（ক）　<strong>土地利用許可（Planning Permit）等の申請手数料：</strong> ５,０００タカ。</h6>\n<h6 class=\"h-lv6\">二（খ）　<strong>ブロック住宅開発申請手数料：</strong> １カタ当たり ５,０００タカ。</h6>\n<h6 class=\"h-lv6\">三（গ）　<strong>建築確認（Construction Permit）申請手数料：</strong> 延べ面積に対し次に掲げる表の料率により算定する。</h6>\n<div class=\"table-wrap\"><table><thead><tr><th>項番</th><th>建築物の用途分類</th><th>小分類</th><th>１㎡当たりの規定額（タカ）</th></tr></thead><tbody><tr><td><strong>１</strong></td><td>住宅</td><td>A-1, A-2, A-3, A-6</td><td>５０</td></tr><tr><td></td><td></td><td>A-4, A-5</td><td>７５</td></tr><tr><td><strong>２</strong></td><td><strong>B-教育施設</strong></td><td>B-1, B-2, B-3</td><td>５０</td></tr><tr><td><strong>４</strong></td><td><strong>D-医療施設</strong></td><td>D-1, D-2</td><td>６０</td></tr><tr><td><strong>５</strong></td><td><strong>E-業務施設</strong></td><td>E-1, E-2, E-3</td><td>１５０</td></tr><tr><td><strong>６</strong></td><td><strong>F-商業施設</strong></td><td>F-1, F-2, F-3</td><td>１５０</td></tr><tr><td><strong>９</strong></td><td><strong>I-集会施設</strong></td><td>I-1, I-2, I-3, I-4, I-5</td><td>７５</td></tr></tbody></table></div>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<p>####### <strong>নোট:</strong></p>\n<p>####### ১। কফিশপ, টি-স্টল, বেকারির দোকান বাণিজ্যিক (<strong>F1</strong>) শ্রেণীভুক্ত হইবে।</p>\n<p>####### ২। বাংলাদেশ ন্যাশনাল বিল্ডিং কোড অনুসারে রেস্টুরেন্টের ডাইনিং এবং পার্কিং (<strong>I</strong>) শ্রেণীর অন্তর্ভুক্ত হইবে এবং রান্নাঘর ও স্টোরেজ (<strong>L</strong>) শ্রেণীর অন্তর্ভুক্ত হইবে।</p>\n<p>####### ৩। পরিশিষ্ট- ৩ যে সকল ইমারত অন্তর্ভুক্ত নেই সেই সকল ইমারতের শ্রেণিবিন্যাস কোড অনুসারে নির্ধারিত হইবে।</p>\n<h3 class=\"h-lv3\">পরিশিষ্ট-৪</h3>\n<h4 class=\"h-lv4\">ফি, ইত্যাদি</h4>\n<h5 class=\"h-lv5\"><strong>[৪(২), ১৩(৯) দ্রষ্টব্য]</strong></h5>\n<h6 class=\"h-lv6\">(ক) <strong>পরিকল্পনা অনুমোদন পত্রের আবেদন ফি:</strong> ৫,০০০ (পাঁচ হাজার) টাকা।</h6>\n<h6 class=\"h-lv6\">(খ) <strong>ব্লকভিত্তিক আবাসন আবেদন ফি:</strong> প্রতি কাঠার জন্য ৫,০০০ (পাঁচ হাজার) টাকা。</h6>\n<h6 class=\"h-lv6\">(গ) <strong>ইমারত নির্মাণ অনুমোদন ফি:</strong> নিম্নবর্ণিত হারে সর্বমোট মেঝে এলাকার জন্য নির্ধারণযোগ্য হইবে:</h6>\n<div class=\"table-wrap\"><table><thead><tr><th>ক্রমিক নম্বর</th><th>ভবনের শ্রেণি</th><th>ভবনের উপ-শ্রেণি</th><th>প্রতি বর্গমিটার মেঝের জন্য ফি</th></tr></thead><tbody><tr><td>১।</td><td>আবাসিক</td><td>A-1, A-2, A-3, A-6</td><td>৫০/-</td></tr><tr><td></td><td></td><td>A-4, A-5</td><td>৭৫/-</td></tr><tr><td>২।</td><td>B-শিক্ষা প্রতিষ্ঠান</td><td>B-1, B-2, B-3</td><td>৫০/-</td></tr><tr><td>৩।</td><td>C-প্রাতিষ্ঠানিক</td><td>C-1, C-2, C-3, C-4, C-5</td><td>৫০/-</td></tr><tr><td>৪।</td><td>D-স্বাস্থ্যসেবা</td><td>D-1, D-2</td><td>৬০/-</td></tr><tr><td>৫।</td><td>E- ব্যবসা</td><td>E-1, E-2, E-3</td><td>১৫০/-</td></tr><tr><td>৬।</td><td>F-বাণিজ্যিক</td><td>F-1, F-2, F-3</td><td>১৫০/-</td></tr><tr><td>৭।</td><td>G-শিল্প কারখানা</td><td>G-1, G-2</td><td>১৫০/-</td></tr><tr><td>৮।</td><td>H-গুদাম</td><td>H-1, H-2</td><td>১৫০/-</td></tr><tr><td>৯।</td><td>I-সমাবেশ</td><td>I-1, I-2, I-3, I-4, I-5</td><td>৭৫/-</td></tr></tbody></table></div>\n<hr class=\"sep\">"},{"num":"13517","jp":"<p><strong>バングラデシュ公報、臨時増刊、２０２５年１２月１４日</strong></p>\n<h5 class=\"h-lv5\"><strong>付録４ 手数料一覧（承前）</strong></h5>\n<div class=\"table-wrap\"><table><thead><tr><th>項番</th><th>建築物の用途分類</th><th>小分類</th><th>１㎡当たりの規定額（タカ）</th></tr></thead><tbody><tr><td>１０</td><td>J-危険物施設</td><td>J-1 〜 J-4</td><td>７５</td></tr><tr><td>１１</td><td>J-駐車場（※）</td><td>K-1 〜 K-3</td><td>５０</td></tr><tr><td>１２</td><td>L-ユーティリティ</td><td>L</td><td>２５</td></tr><tr><td>１３</td><td>M-その他</td><td>M-1, M-2</td><td>５０</td></tr></tbody></table></div>\n<p>####### <strong>特別注記:</strong></p>\n<p>####### １　複数用途の建築物を建築する場合、各用途ごとに個別に算出した手数料の合計額を支払わなければならない。</p>\n<p>####### ２　モスク等の宗教施設については、建築確認申請手数料を免除する。</p>\n<p>####### ３　混合用途の場合、含まれる用途のうち最も高い料率の手数料を適用する。</p>\n<h6 class=\"h-lv6\">五（ঙ）　囲障（塀）の築造手数料： １㎡当たり ２０タカ（最低額 ２,０００タカ）。</h6>\n<h6 class=\"h-lv6\">六（চ）　看板（M2）の設置手数料： １㎡当たり ５０タカ（最低額 ５,０００タカ）。</h6>\n<h6 class=\"h-lv6\">七（ছ）　貯水槽（M2）の築造手数料： １㎥当たり １００タカ（最低額 １０,０００タカ）。</h6>\n<h6 class=\"h-lv6\">八（জ）　タワー（M2）の設置手数料： １㎥当たり １００タカ（最低額 １０,０００タカ）。</h6>\n<h6 class=\"h-lv6\">九（ঝ）　使用適合証（OC）交付・更新手数料： １,０００タカ。</h6>\n<h6 class=\"h-lv6\">十（ঞ）　工作物除却手数料： ５,０００タカ。</h6>\n<p>####### <strong>特別注記:</strong></p>\n<p>####### 屋上タワー用機械室は、面積 <strong>１５平方メートル</strong> までは容積率（FAR）に算入しない。</p>\n<hr class=\"sep\">","bn":"<p><strong>বাংলাদেশ গেজেট, অতিরিক্ত, ডিসেম্বর ১৪, ২০২৫</strong></p>\n<div class=\"table-wrap\"><table><thead><tr><th>ক্রমিক নম্বর</th><th>ভবনের শ্রেণি</th><th>ভবনের উপ-শ্রেণি</th><th>প্রতি বর্গমিটার মেঝের জন্য নির্ধারিত ফি</th></tr></thead><tbody><tr><td>(১)</td><td>(২)</td><td>(৩)</td><td>(৪)</td></tr><tr><td>১০।</td><td>J-বিপজ্জনক ভবনের ব্যবহার</td><td>J-1, J-2, J-3, J-4</td><td>৭৫/-</td></tr><tr><td>১১।</td><td>J-পার্কিং</td><td>K-1, K-2, K-3</td><td>৫০/-</td></tr><tr><td>১২।</td><td>L- ইউটিলিটি</td><td>L</td><td>২৫/-</td></tr><tr><td>১৩।</td><td>M- বিবিধ</td><td>M-1, M-2</td><td>৫০/-</td></tr></tbody></table></div>\n<p>####### <strong>বিশেষ দ্রষ্টব্য:</strong></p>\n<p>####### ১। একই সাইটে একাধিক শ্রেণির ইমারত নির্মাণের ক্ষেত্রে প্রতিটি শ্রেণির জন্য আলাদা হিসাবে ফি প্রদান করিতে হইবে।</p>\n<p>####### ২। ধর্মীয় উপাসনালয়ের উপাসনালয়ের জন্য ইমারত নির্মাণ অনুমোদন ফি প্রদান করিতে হইবে না।</p>\n<p>####### ৩। মিশ্র উন্নয়নের ক্ষেত্রে, যে ব্যবহারের ফি বেশি সেই ফি নির্ধারিত হইবে।</p>\n<h6 class=\"h-lv6\">(ঙ) প্রাচীর নির্মাণের ফি: প্রতি বর্গমিটারের জন্য ২০ টাকা এবং সর্বমোট ন্যূনতম ২,০০০ টাকা।</h6>\n<h6 class=\"h-lv6\">(চ) বিলবোর্ড (M2) স্থাপনের ফি: প্রতি বর্গমিটারের জন্য ৫০ টাকা এবং সর্বমোট ন্যূনতম ৫,০০০ টাকা।</h6>\n<h6 class=\"h-lv6\">(ছ) জলাধার (M2) নির্মাণের ফি: প্রতি ঘনমিটারের জন্য ১০০ টাকা এবং সর্বমোট ন্যূনতম ১০,০০০ টাকা।</h6>\n<h6 class=\"h-lv6\">(জ) টাওয়ার (M2) স্থাপনের ফি: প্রতি ঘনメータের জন্য ১০০ টাকা এবং সর্বমোট ন্যূনতম ১০,০০০ টাকা。</h6>\n<h6 class=\"h-lv6\">(ঝ) ব্যবহার উপযোগিতা সনদপত্র ও নবায়নের জন্য ফি: প্রতিবারের জন্য ১,০০০ টাকা।</h6>\n<h6 class=\"h-lv6\">(ঞ) অপসারণের জন্য আবেদন ফি: ৫,০০০ টাকা মাত্র।</h6>\n<h6 class=\"h-lv6\">(ট) আপিলের জন্য আবেদন ফি: ৫,০০০ টাকা মাত্র।</h6>\n<p>####### <strong>বিশেষ দ্রষ্টব্য:</strong></p>\n<p>####### ইমারতের ছাদে টেলিযোগাযোগ টাওয়ারের জন্য সংস্থানক
